front:
  text: 續附南豊先生行状碑誌哀挽
  hash: sha256:c4a9dba0b0ae98f7cffb60dd95e9fbccd510bf078d95feb3f1014bfeb96e4639
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_051-1a}
body:
  text: 行狀公諱鞏字子固建昌軍南豊人曽祖諱仁旺贈尚書水部員外郎祖諱致尭尚書戸部郎中直史舘贈右諌議大夫考諱易占太常博士贈光禄卿母吳氏文城郡太君母朱氏仁壽郡大君公嘉祐二年進士及第為太平州司法參軍召編校史舘書籍歷舘閣校勘集賢校理兼判官告院嘗為英宗實録檢討官不踰月罷出通判越州歴知齊㐮洪州進直龍圖閣知福州兼福建路兵焉鈴轄賜緋衣銀魚召判太常寺未至改知明州徙亳州又徙滄州不行留判三班院遷史舘脩撰管句編脩院兼判太常寺元豊五年四月擢試中書舍人賜服金紫九月丁母憂明年四月丙辰終于江寕府享年六十有五自大理寺丞五遷尚書度攴貟外郎換朝散郎動累加輕車都尉元配晁氏光祿少卿宗格之女継室李氏司農少卿禹卿之女子男三人綰太平州司理參軍綜太廟斎郎綱承務郎二女蚤卒孫男六人悊怘愈􅘔怤憇悊假承務郎餘未仕孫女五人元豊七年六月丁酉葬南豊從周郷之源頭曽氏姒姓其先魯人至其後世避地遷于豫章子孫散䖏江南今家南豊者自高祖諱延鐸始也𥘉箴及參父子俱事孔子箴樂道忘仕孔子與之參以孝徳為卋穪首而參孫西耻自比扵管仲其世徳渊源所徔来逺矣至皇祖大夫以直道正言為宋名臣皇考光禄博學懿文惇行孝友明古誼逹時変位不配徳著書垂後畜厚流長天以道徳文章鍾于公身以侈大前烈開覺後嗣實命世之宏材不待文王而興者歟公生而警敏不類童子讀書数百千言一覧輙誦年十有二試六論授筆而成辭甚偉也未冠名聞四方是時宋興八十餘年海内無事異林間出歐陽文忠公赤然特起為學者宗師公稍後出遂與文忠公齊名自朝廷至閭巷海隅障塞婦人孺子皆䏻道公姓字其所為文落𥿄輙為人傳去不旬月而周天下學士大夫手抄口誦唯恐得之晚也盖自楊雄以後士罕知經至施扵政事亦皆卑近苟簡故道術寖㣲先生之迹不復見扵世公生扵末俗之中絶學之後其扵剖折㣲言闡明疑義卓然自得足以彂六藝之緼正百家之繆破数千載之惑其言古今治亂得失是非成敗人賢不肖以至彌綸當世之務斟酌損益必本扵經不少敗以就俗非與前世列扵儒林及以功名自見者比也至其文章上下馳騁愈出而愈新讀者不必䏻知知者不必䏻言盖天材獨至若非人力所䏻學者憊精思莫䏻到也卋謂其辭扵漢唐可方司馬遷韓愈而要其㱕必止扵仁義言近指逺雖詩書之作者未能逺過也其為人惇大直方取舎必度扵礼義不為矯偽姑息以阿世媚俗弗在扵義雖勢官大人不為之屈非其好雖舉世徔之不輙與之比以其故世俗多忌嫉之然不為之變也其材雖不大施而所治常出人上為司法論决重䡖能盡法意繇是明習律令世以法家自名者有弗及也為通判雖政不􅌹出而州頼以治𥘉嘉祐中州取酒埸錢給牙前之應募者錢不足廼俾郷户輸錢助役期七年止後酒埸錢有餘應募者利扵多入錢期盡而責郷户輸錢如故公閱文書得其姦立罷輸錢者二百餘户且請下詔約束毋擅増募人錢歲饑度常平不足仰以賑給而田居野䖏之人不能皆至城郭至者羣聚有疾癘之虞前期喻屬縣富人使自實粟数緫得十五萬石視常平賈稍増以予民民得徔便受粟不出田里而食有餘粟賈平又出錢粟五萬貸民為種糧使随歲賦入官農事頼以不乏為州務去民疾苦急姦彊盗賊而寛貧弱曰為人害者不去則吾人不寕齊曲提周氏衣冠族也以貲雄里中周氏子高横縱滛亂至賊殺平民汙人婦女服噐擬乗輿高力䏻動權貴州縣势反出其下故前後吏莫敢詰公至首取高寘扵法歴城章丘民聚黨数十横行村落間號覇王社椎埋盗奪簒囚縦火無敢正視者公悉擒致之特配徙者三十一人餘黨皆潰是時州縣未属民為保伍公獨行之部中使㡬察居人行旅出入經宿皆籍記有盗則鳴鼓相援又設方畧明賞購急追𥙷且開人自言故盗發輙得有葛友諒者屡剽民家以名捕不獲一日自出告其黨公子𫀆帶酒食假以騎從輦所購金帛随之狥諸郡中盗聞多出自言友智力兼人公外示章顯實𣣔擕貳其徒使之不能復合也齊俗悍彊喜攻刼至是豪宗大姓歛手莫敢動㓂攘屏迹州部肅清無枹鼓之警民外户不閉道不拾遺閩粤負山瀕海有銅塩之利故大盗数起公至部時賊渠廖恩者既赦其罪誘降之然餘衆觀望十百為群既潰復合隂相推附至連数州其尤桀者隷将樂縣縣嘗呼之不出愈自疑且起踵恩所為居人大恐公念𣣔緩之恐势滋大急之是趣其為亂卒以計致之前後自㱕若就執者㡬二百人又擒海盗八人自殺者五人老姦宿偷相繼縛致者又数十人吏士以次受賞公復請並海增廵檢貟以壮聲勢自是愊貟数千里無敢竊發者民山行海宿如在郛郭亳亦號多盗治之如齊盜為引去公為人除大患者既如此至扵澄清風俗振理頽壞闘訟哀熄綱紀具修所至皆然也其餘廢舉後先則視其時因其便為之在齊㑹朝廷変法遣使四出公推行有方民用不優使者或希望私欲有所為公亦不聴也河北發民濬河調及它路齊當出夫二萬縣𥘉按籍二丁三丁出一夫公括其隱漏後有至九丁出一夫者首費数倍又損後人以紓民力弛無名渡錢為橋以齊徃来徙傳舎自長清抵博州以逹于魏祖舊省六驛人皆以為利其餘力比次案牘簿書蔵之以十五萬計它州亦然既罷州人絶橋閉門遮留夜乗間廼得去㐮州継有大獄逮繫充滿有執以為死罪者公至閱囚牘法當勿論即日縦去并釋者百餘人州人噪呼曰吾州前坐死者衆矣孰知非冤乎在洪㑹歲大疫自州至縣鎮亭傳皆儲藥以授病者民若軍士不能自飬者以官舎舍之資其食𣣔衣衾之具以庫錢佐其費青醫候視記其全失多寡以為殿最人頼以生安南軍興道江西者詔為萬人備州縣暴賊急歛芻粟賈踴貴百姓不堪公獨不以煩民前期而辦又為之區䖏次舎井㸑什器皆有條理兵既過而市里不知也楅州多佛寺爲僧者利其冨饒争𣣔爲主守賕請公行公俾其徒自相推擇籍其名以次𥙷之授文㨿廷中却其私謝以絶左右徼求之敝民出家者三歲一附籍殆萬人闔府徼賂至裒錢数千萬公至不禁而自止廢寺二皆囊橐爲奸者禁婦女毋入寺舎明州有詔完城既程工費而㑹公至𥘉度城周二千五百餘丈爲門楼十故甓可用者收十之四公爲再計城减七十餘丈門當高麗使客出入者爲楼二收故甓十之六募人簡棄甓可用者量酬以錢又得十之二凢省工費甚衆而力出扵役兵傭夫不以及民城成總役者皆進官而公不自言也公甞以謂州縣困扵文移煩数民病扵追呼之優也故所至出教事應下縣責其蜀度緩急與之期期未盡不復移書督趣期盡不報按其罪期與事不相當聴縣自言别與之期而案與期者即有所追逮州不遣人至縣縣毋遣人至田里縣𥘉未甚聽公小則罰典吏大則并劾縣官扵是莫敢慢事皆先期而集民不知優所省文移数十倍事在州者督祭句稽皆有程式分任僚屬因能而使公緫覧綱條責成而巳盖公所領州多號難治及公為之令行禁止莫敢不自盡政巨細畢舉庭無留事囹圄屡空人徒見公朝夕視事数刻而罷若無所用心者不知其所操者約且要而聦明威信足以濟之故不勞而治也吏民𥘉或憚公嚴巳而皆安其政既去乆而彌思之其扵内所更官告院三班太常遇事不爲苟簡革官告院宿敝尤多凢所規畫至今守之不改盖公自在閭巷巳屬意天下事如在朝廷而天下亦謂公有王佐之材起且大任庶㡬能明斯道澤期民以追先王巳墜之迹然晚廼得仕仕不肯苟合施設止扵一州州又有䂓矩䋲墨為吏者不敢毫髮出入則其所設施特因時趣冝固不足以發公之緼又况其大者乎公自為小官至在朝廷挺立無所附逺迹權貴繇是愛公者少為編校書籍積九年自求𥙷外轉徙六州更十餘年人皆為公慊然而公䖏之自若也公扵是時既與任事者不合而小人乗間又𣣔擠之一時知名士徃徃坐刺譏辝語廢逐公扵防微絶人逺甚政事施張操縦雖出于巳而未嘗廢法自用以其故莫能中傷公亦不為之動也頼天子明聖察公賢𣣔用公者数矣㑹徙滄州召見勞問甚寵且諭之曰以卿才學冝為衆所忌也遂留公京師公亦感激奮勵𣣔有所自効数對便殿所言皆大體務開廣上意上未嘗不従容領納期以大任一日手詔中書門下曰曽鞏以史學見稱士類宜典五朝史事遂以為脩撰既而復諭公曰此特用卿之漸爾近卋修國史必衆選文學之士以大臣監緫未有以五朝大典獨付一人如公者也故世不以用公為難而以天子知人明扵屬任之為難也公夙夜討論未及屬藁㑹正官名擢中書舍人不俟入謝使諭就職時自三省至百執事選授一新除史日至数十人人人舉其職事以戒辭約義盡論者謂有三代之風上亦数稱其典雅皇子延安郡王牋奏故事命翰林學士典之至是上特以屬公在職百餘日不幸属疾遭家不造以至不起始公之進天下相慶以爲得人謂且大用及聞公殁皆嘆息相吊以謂公之志卒不大施扵世其命也夫公性嚴謹而待物坦然不爲疑阻扵朋友喜盡言雖取怨怒不悔也扵人有所長奨勵成就之如弗及與人接必盡禮有懐不善之意来者竢之益恭至使其人心恱而去遇僚属盡其情未嘗有所按謫有所過誤抵法者力為辨理無事而後巳在官有所市易取賈必以厚予賈必以薄扵門生故吏以幣交者一無所受福州無職田嵗鬻園𬞞收其直自入常三四十萬公曰太守與民争利可乎罷之後至者亦不復取也平生無所玩好顧喜蔵書至二萬卷仕四方常與之俱手自讐對至老不倦又集古今篆刻為金石録五百卷公未嘗著書其所論述皆因事而發既殁集其藁為元豊類藁五十卷續元豊類藁四十卷外集十卷後之學者因公之所嘗言扵公之所不言可推而知也𥘉光禄仕不遂而歸無田以食無屋以居公時尚少皇皇四方營飦粥之飬光禄不幸蚤世太夫人在堂闔門待哺者数十口太夫人以勤儉經理其内而教飬四弟相継得禄仕嫁九妹皆以時且得所歸自委廢單弱之中振起而亢大之實公是頼平㞐未嘗逺去太夫人左右其仕扵外数以便親求徙官太夫人受之異甚嗚呼天奪吾母不数月又奪吾兄何降禍之酷至扵斯極也豈其子弟積悪罰不扵其身而及其母兄使之抱終天之痛為世之所大僇耶不然吾毋之賢也吾兄之盛徳也相継而殞所謂天道常與善人果何如也為子弟者不自㓕身罪固大矣又不䏻推原前人徳善勞績托扵當卋之文章以明著之無窮是又罪之大者也矧公扵肇属則昆弟恩猶父師其扵論次始終所不敢廢維公扵葬宜有銘扵墓隧宜有碑扵囯史宜有載輙不自知其迷謬忍痛輟位謹述公歴官行事如左至扵論議文章見扵公集者後當自傅此弗著特著其大莭弗敢略弗敢誣以告銘公葬若碑者且以待史官之訪焉墓誌公曽氏諱鞏字子固其先魯人後丗迁豫章因家江南公之四世祖延鐸始為建昌軍南豊人曽祖諱仁旺贈尚書水部員外郎祖諱致尭太宗真宗時上書言天下亊嘗見選用仕至尚書戸部郎中直史舘贈右諌議大夫文忠歐陽公為銘其墓碑考諱易占太常愽士贈光禄卿公生而警敏讀書過目輙誦十二歲能文語巳驚人日草数千言始冠遊太學歐陽公一見其文而竒之公扵經微言奥㫖多所自得一不蔽扵俗斈随問講觧以開學者之惑其議論古今治亂得失賢不肖必考諸道不少貶以合世其為文章句非一律雖開闔馳騁應用不窮然言近指逺要其㱕必止扵仁義自韓愈氏以来作者莫能過繇慶暦至嘉祐𥘉公之聲名在天下二十餘年雖窮閻絶徼之人得其文手抄口誦惟恐不及謂公在朝廷乆矣而公方以郷貢中進士苐為太平州司法參軍歲餘召編校史館書籍為舘閣校勘集賢校理兼判官告院為英宗實録院檢討官出通判越州𥘉嘉祐中州取酒埸錢給牙前之應募者錢不足廼使郷户輸錢助役期七年止期盡而責郷户輸錢如故公閱文書得其姦立罷之且請下詔約束毋得擅増募人錢歲饉度常平不足以賑前期諭属縣使冨人自實粟得十五萬石視常平價稍増以予民又出錢粟五萬貸民為種糧使随歲賦以入民頼以全活徙知齊州齊俗悍喜攻刼豪宗大姓多撓法曲隄周氏世衣冠以貲雄里中其子僣横至賊殺平人州縣莫敢詰公至首寘之法歴城章丘民聚黨数十百人椎埋盗􅐁横行無敢正視者公禽致悉黥徙之弛無名渡錢為橋以濟徃来是時州縣未属民為保伍公獨行之設方畧明賞購急追捕且開人自言盗發輙得由是奸㓂屏迹民外户不閉道至不拾遺獄以屡空㑹朝廷𥘉變法公推法意施行之有次第民便安之後使者至或希望私𣣔有所爲公不聴也徙㐮州州継有大獄乆不决有當論死者公閱其狀曰是論勿論何得留此吏不䏻對即出之縁而釋者百餘人州人叩頭曰吾州前坐死者衆矣寜知非冤乎又徙洪州歲大疫自州至縣鎮亭傳皆儲薬以授病者其不能具飲食衣衾者佐以庫錢師出安南道江西者䛇爲萬人備公獨不以煩民爲之區䖏次舎井㸑什噐皆前期而辦兵既過市里有不知者巳而它州以不蚤計優民者皆得罪進直龍圖閣知福州兼福建路兵馬鈐轄賜緋章服時部中大盗数起南劒州賊渠廖㤙者既赦其罪誘降之餘衆猶觀望隂相推附至連数州其尤桀者隷将楽縣又呼之不肯岀居人大恐公遣使者以謀致之前後自㱕若就執者哉二百人海盗自殺與縛致者又数十人吏士以次受賞復請並海増廵檢員以壮聲勢自是無敢竊發者民行山浮海如在郛郭召判太常寺未至改知明州有詔完城役有期公親廵行裁其工費甚衆其力出扵籍兵傭夫而不以及民城繇是亟就数月徙亳州亳亦多盗公治之如在齊時公素慨然有志扵天下事仕既晚其大者未及試而外六州皆劇處然公為之無難始至必先去民所甚患者然後理頽弊正風俗凢所措畫皆曲折就䋲墨其餘力比次案牘簿書與属縣為期㑹以省追呼皆有法終其去州未嘗有一人至田里者故所至有惠爱既去民思之不巳所為法後終不可改寮属聞公名始皆嚴惮之乆而察公㢘平無私又未嘗有所按擿卒皆愧服福州無職田州宅嵗收菜錢常三四十萬公獨不取以佐公錢後至者亦不敢取平居推誠待物坦然無疑扵朋友喜盡言雖取怨怒亦不悔自求𥙷外凡十二年而不恱公者屢𣣔有以擠之然公奉法循理終莫能中傷頼天子聖明察公賢𣣔召用者数矣元豊三年徙知滄州過都召見勞問乆之留勾當三班院公亦感激奮勵思有所自效数對便殿其所言上毎嘉納之四年手詔中書門下曰曽鞏史學見称士類宜典五朝史亊遂以爲史舘脩撰𬋩句編脩院判太常寺兼禮儀事近丗修國史必衆選文學之士以大臣監総未有以五朝大典獨付一人如公者公入謝曰此大事非臣所敢當上曰此用卿之漸爾因諭公使自擇其属公薦邢恕以爲史舘檢討五年四月正官名擢拜中書舎人賜紫章服始受命促使就職時自三省至百執事選授一新除吏日至数十人人舉其職事以戒上数稱其典雅天下翕然傳之皇子延安郡王牋奏故事命翰林學士典之上特以属公九月遭母丧罷六年四月丙辰卒于江寕府享年六十有五公自大理寺丞五遷尚書度攴貟外郎換朝散郎毋曰文城郡太君吳氏仁壽郡太君朱氏娶眺氏宜興縣君又娶李氏嘉興縣君三男子綰太平州司理參軍綜太廟齋郎綱未仕孫六人悊怘愈􅘔怤憇公既卒上以綱為承務郎悊為假承務郎敕所在量給其䘮亊以七年六月丁酉葬公南豊從周郷之源頭公扵取舎去就必應禮義未始有所阿附治平中大臣嘗議典禮而言亊者多異論歐陽公方執政患之公著議一篇㩀經以断衆惑雖親戚莫知也後十餘年歐陽公退老于家始出而示之歐陽公謝曰此吾昔者願見而不可得者也所著元豊類藁五十卷續元豊類藁四十卷外集十卷性嗜書家蔵至二萬卷集古今篆刻為金石録又五百卷出䖏必與之俱平生論事甚多與夫所下條教可以為世法者不可悉著公少事光祿家甚貧犇走四方以致飬既孤奉太夫人孝鞠其四弟九妹友爱甚篤宦學婚嫁一出公力公既以文章名天下其弟牟宰布肇又継中進士科布嘗任翰林學士肈以選為尚書吏部郎中與公同時在舘閣丗言名家者推曾氏公方遭時得君未及有為而不幸以殁士大夫為之相吊公之盛徳抑復有以遺于後乎嗚呼曽氏其顯矣銘曰曽氏在南三世有聞維祖維考始亨復屯畜厚潜深儒學之門迨公之興益顯扵文奮躬力行道義之存公自布衣譽望四出既位扵朝其剛不屈公乆扵外或留或徙誰其知之惟聖天子天子曰咨予惟汝賢典予史亊五聖之傳公拜稽首臣敢不勉肈新有官左右慎選扵時中書命令所在帝曰徃㦲予言汝代凡百執亊分属列職肅然盈庭俛聴訓敕靖共夙夜以出謀猷四方鼓舞天子之休昔蒧父子見稱仲尼淵源有来公則承之矧公親逢聖人之時帝祭其忠從容睠睞赫然荣名受祉未艾奄以艱去計聞訃亟搢紳咨嗟相顧失色有存者言有遺者直惟兹之銘是謂不没神道碑公姓曽氏諱鞏字子固其先魯人後世遷豫章因家江南其四卋祖延鐸始為建昌軍南豊人曽祖諱仁旺贈尚書水部員外郎祖諱致尭尚書户部郎中直史舘贈右諌議大夫考諱易占太常愽士贈右銀青光禄大夫其履閱行實則有國史若墓銘在公生而警敏自􅏊讀書為文卓然有大過者嘉祐二年登進士第調太平州司法參軍歲餘召編校史舘書藉歴舘閣校勘集賢校理兼判官告院又為英宗實録院檢討官出通判越州属歲饑公興積蔵通有無老稚怡怡不出里閭果腹而嬉擢齊州齊俗悍強豪宗大姓抵冐僣濫其尤無良者羣行剽劫光火發塚吏不敢正視公属民為伍謹㡬察急追胥且捕且誘盗發輙得市無攫金室無穴坏貨委于塗犬不夜吠徙知㐮州州有大獄乆不决公一閱知其冤盡釋去一郡稱其神明又徙洪州歲大疫公儲藥物飲食在所授病者民以不天死師出南道江西者且萬人公隂計逆具師至如㱕既去而市里有不知者進直龍圖閣知福州兼福建路兵馬鈴轄賜五品服時閩有大盗𢾗千人朝廷赦其罪降之餘黨疑不順徃徃屯聚居人惴恐瀕海山林阻深椎理剽盗依以為淵薮公以方略禽獲募誘亡慮数百人増置廵邏水行陸宿坦如在邪郭召判太常寺未至改知明州有詔完州城公程工賦裁省費十六民不知役而城具数月徙亳州元豊三年知滄州道由京師召對神宗察公賢留句當三班院数對便殿其所言皆安危大計天子嘉納之四年手詔中書門下曰曽鞏史學見稱去類宜與五朝史亊遂以為史舘脩撰管勾編修院判太常寺兼禮儀事公入謝曰此大事非臣所敢獨當上諭以此特用卿之漸耳毋重辤五年大正官名擢拜中書舍人賜三品服時除授日数十百人公各舉其職以訓丁寕深厚學者以為復見三代遺風今天子為延安郡王其牋奏故事命翰林學士典之先帝特以屬公九月以母䘮罷六年四月丙辰卒于江寕府年六十有五七年六月丁酉葬于南豊從周郷之源頭敕在所給其䘮事公剛毅直方外謹嚴而内和𥙿與人交不苟合朋友有不善必書言其過有善必推揚其所長奨誘後進汲汲惟恐不逮其為政嚴而不優必去民疾苦而與所𣣔者未甞按劾官交所􅊩至于今思之天子且𣣔大用而公不幸死矣自大理寺丞五遷尚書度攴員外郎換朝散郎勲累加䡖車都尉母周氏豫章郡太夫人吳氏㑹稽郡太夫人朱氏遂寕郡太夫人元配眺氏先禄少卿宗恪之女継室李氏司農少卿禹卿之女子男三人綰瀛州防禦推官知揚州天長縣事綜瀛州防禦推官知宿州蘄縣事綱右承務郎監常州稅務二女蚤卒孫男六人悊怘愈􅘔怤憇悊假承務郎餘未仕孫女五人公平生無所好惟蔵書至二萬卷皆手自讎㝎又集古今篆刻爲金石録五百卷出䖏必與之俱既没集其遺藁爲元豊類藁五十卷續元豊類藁四十卷外集十卷自唐衰天下之文変而不善者数百年歐陽文忠公始大正其體一復扵雅其後公與王荆公介父相継而出為學者所宗扵是大家之文章炳然與漢唐侔盛矣𥘉光禄公㱕家甚貧公竭力以飬温清㫖甘無一不如志者既孤奉太夫人如事光禄教飬弟妹曲有㤙意四第牟宰布肈継登進士苐布肇以文學論議有聲當世九妹皆得其所㱕嗟乎子固而但止扵斯而壽止扵斯然其所以自立者可以為不亡矣亦可以無憾矣銘曰猗嗟子固文與質生不勤其師㓜則大成學冨行茂其蓄弸弸發為文章一卋大驚哲人既萎邪說噑吠公不聴莹徑前無閡砭廢藥痬抉昏則聵波濤沄沄東入于海姬淪劉亡文弊辤靡引商召羽偶六駢四組綉芬葩不見粉米公扵其間鷹揚虎視發揮奥雅㨂斥浮累巍然高山為衆仰止拪遲椽曺翶翔書府如鷙之鶚如薪之椘出貳于越䆒問疾苦属歲大歉稼荒于畆興積于民發蔵于庾既助既𥙷裹糧含哺或謌或呼謂公父母一麾出守六上郡計振張領目𥙷葺刑弊庭不留訟獄無濫繋劳之耒之鰥寡以遂公殿海服有命耒覲帝曰汝賢毋逺王室其代予言汝且輔弼五聖大典唯公紬繹百官正名唯公訓敕忠言嘉謀入則造膝公用不既公志不卒偉望廣譽如星如日石可磷兮公名不沒哀詞皇受命而熈洽兮實千祀而一時恊氣欝而四塞兮與盛德其俱升麟鳯出而旁午兮猶氤氲而扶輿薦生我公兮以文章爲世師公神禹之苗裔兮肇子爵而鄫封逮去邑而爲氏兮季葉汨其南征祖騫翔而續著兮考踡跼而文嗚公既生而多艱兮踵祖武而好修既輕車又良御兮遂大放乎厥詞發天人之奥秘兮約六藝而成章元氣含而未泄兮洞芒芴而窅冥挽天河而一㵼兮物應手而華昌楫揚馬使先路兮咸告公曰不敢彼崖蔡之紛紛兮孰云窺其藩翰辰耒遅兮而去速兮固前脩以䟦㚄方盤礡而上征兮遽相羊而𥙷外皇揆公之忠誠兮即商墟而賜環紬史牒乎東觀兮裁誥命乎西垣典貢絶而復作兮世争覩而快先正經緯乎終古兮配維斗而昭然変化詭而難常兮雖司命其或昧忽遭艱而去國兮遂衘哀而即世述作分其具存兮悵爽靈之焉詣信百年纔斯湏兮遒電㓕而歘逝天不愸遺一老兮固搢紳之所傷矧不肖以薄技兮早獲進扵門墙路貫江而脩阻兮曽莫奠乎酒漿悲填膺而茀欝兮聊自託扵斯文挽詞早棄人間世真從地下㳺丘原無起日江漢有東流身世徔違裏功名取次休不應湏礼樂始作後程仇又精爽回長夜衣冠出廣庭勲庸留琬琰形像付丹青道䘮餘篇翰人亡更典刑侯芭才一足白首太玄經續附南豊先生行狀碑誌哀挽卷終元豐類藁後序僕嘗讀舍人王公所著南豊先生文集序喜其有波濤煙雲三軍朝氣之語足以摹寫斯文之玅及觀𬗋陽夫子序公家譜甚恨卋之知公者淺而後未敢以前言爲可喜也公先世亦魯人常𣣔䄂瓣香脩桑梓敬而未䏻大徳壬寅春假守是邦既拜公墓又獲展拜祠下摩挲石刻知為魁樞千峯陳公名筆至品藻曽蘇二公文則獨以金精玉良許曽文之正信乎曽文定之文價至陳文㝎而後論㝎也公餘進學官諸生訪舊本謂前邑令黄斗齋嘗綉諸梓後以兵燬夫以先生文獻之邦而文竟無傳守烏淂辝其責廼致書雲仍留畊公淂所刻善本亟捐俸倡僚属及寓公士友恊力鳩工摹而新之踰年而後成其用心亦勤矣後必有不汲汲扵它務者憫其勤而壽其傳斯無負雪楼先生品題云大徳甲辰良月東平丁思敬拜手書于卷尾後序畢
