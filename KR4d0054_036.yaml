front:
  text: 元豐類藁卷之三十六
  hash: sha256:ac09c744f2a83a85fd93af9267c8d39a74ec33b5cfdb28475d7de25d8262ecb0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_036-1a}
body:
  text: 啓狀應舉啓右鞏啓伏念鞏材質淺陋藝學荒蕪讀聖人之經未知大義明當世之務多泥舊聞雖堅樹立之心豈適變通之用矧罹福釁屢抱憂哀是以三遇文闈一踰歲紀足迹不遊于埸屋姓名不署于鄉閭僕僕東南有衣食婚嫁之纍拘拘蚤夜惟米鹽薪水之憂今者側聽詔書講求士類顧私恩之可念迫生理之難周義不自皇勢當強起蓋以出而載質無他業之可為仕以為貧亦古人之所處遇高明之見照殆否結之將通伏以某官梁棟瓌材琮璜茂器發文章之素藴當仁聖之盛期忠言加謀施之有效流風善治所至可傳喜奬士倫助成世教况親氶于著令方序别于群材藐是羇孤最為滯拙仰遵舊禮敢忘桑梓之恭輒進曼辭庶當雞鶩之贄察其素學采以寸長盡繄及物之仁惟俟至公之賜謝杜相公啓伏念鞏志雖策礪性實滯頑行不足比古之人材不足適時之用居常齟齬動輒困窮往以孤生而蒙收接又遭大故而𬒳救存非常之恩德所加空知感激無用之技能素定曷有報償至于數千里之間三四年之後去冬之首方能屬思以為書積日之勤庶或因辝而見意不謂使者至門之日正值相君失子之𥘉逺瀆高明巳難期于省覽况逢哀惻豈能必于薦聞因此復憂懇悃之誠無由自逹視聽之側雖推心之逺大寧責禮于賤微然義未足以論酬而言又不得以敘謝其為私計豈敢自皇伏惟相公當世表儀本朝柱石許還私第聖意雖優于大臣召用安車人心素望于元老伏祈上為邦國善保寢興回傅侍講啓鞏啓伏審祗膺詔檢入奉經筵伏惟慶慰伏以某官秉德粹沖受村閎廓遘盛辰而開迹席膴仕以升華善政流風以推行于民上高文大䇿久聳動于朝端果允僉言特膺迅用徔容帝幕方演暢于微言密勿禁林佇裁成于明命自聆拜寵方念騰書辱見奬于舊遊遽先流于華問欣愈感幸交集悃誠代人謝余侍郎啓右某啓伏念某歸而間處時所背馳分功名之無期嗟志意之空大言當世之事懼尚口而更窮求後人之知因著書而自見踈闊巳甚抵棄未能輒布聽聞方虞訶譴屬小兒之過拜辱餘論之見存指瑾掩疵大為之地憫窮悼屈勤出于衷省枯稿之姿力乖報德激哀殘之氣感𣣔忘身聸風采之敻遙役魂神而飛去尚當益壯以塞誤知與劉沆龍圖啓右鞏啓伏念鞏方抱憂哀且多疾病貧不得巳則俗事皆當自謀旅無所容則世人誰肯見恤今者伏遇知府龍圗給事愷悌成德勸勉為懷忘後進之至微假溫顔而與接知其孤立念其數竒謂其有詩書之勤則曲加于奬待謂其有衣食之纍則特甚于矜憐且使受田之獲安實由為地之至大在甘旨有毫髮之助于子弟乃丘山之恩况此餘庥可圴敝族雖逺台坐常注愚心復得交遊之傳愈知意愛之厚自非土石豈不激昻粗知古今可勝感勵恨當迷塞曷用報償而方先人之葬送未成偏親之奉飬多乏四弟懷仰哺之託九妹有待年之期凡縻敝于秋毫皆經營于方寸顧惟私計當議逺逰世俗險艱豈諳嘗之不熟性靈踈拙實齟齬之可憂未卜超承更增慕戀謝解啓伏覩解文首蒙舉選伏念鞏才非卓越識匪該通素志慕乎古人故時情之所背虛名聞于當世故衆忌之所排患難艱危流離頓挫孰有至孤之迹敢萌希進之心顧生理之難周迫私衷之可念舉而干祿誠匪素懷仕以為貧竊將自比是以聞詔之出負笈以耒豈意片文首塵高選以至天倫之薄陋子黨之空踈皆自單平得蒙收齒退惟會合亦有端原此蓋伏遇某官崇奬士倫助成世教以虹霓之光而𬒳飾以律呂之氣而吹噓致此屯窮階于振發敢不勉增素學益勵前修庶全必勝之名以答至公之賜謹奉啓陳謝回李清臣范百祿謝中賢良啓右鞏啓竊以設科以求特起之材發䇿以訪可行之論是維髙選果得異能伏以賢良某官志敏以強詞嚴而贍迹前世之事而博極群書議當今之宜而常引大體及親氶于聖問遂絶出于時髦方喜聞風遽蒙枉記仰惟謙抑之過第積感銘之深回人謝館職啓伏審試藝禁林升華儒館伏惟慶慰伏以都官學士英材傑出玉璞混成遘時運之光華奮文章之溫雅第榮科于祕殿蚤邁等倫升膴仕于本朝荐騰譽望較雕龍之麗藻利架鼇之祕扁果彼明緍式符輿頌方展騰書之好遽蒙削牘之私仰服謙撝退深感戢與北京韓侍中啓一右鞏啓伏念鞏顧以諸生守兹劇郡撫敝封之云始望仁境以非遙恨無羽翼之飛馳與操几杖𣣔以緘滕之託寓聊布腹心然而治獄訟之浩煩振紀綱之弛壞覺形勞之少暇信林短以難周致是懇誠稽于進逹屬高秋之在序惟坐鎮之多餘必有祺祥來寧動履伏以留守司徒太師侍中蓍龜四海柱石三朝有太平之功周公之所以勤王室有純一之德伊尹之所以格皇天固巳書在宗彛藏之盟府而乃以退為進處上用謙自避逺于煩機久淹回于外服宜從巖石之望趣正衮衣之歸敢冀上為宗祊善綏寢餗二鞏啓伏念鞏習吏非長得州最劇耗神明于簿領疲精思于追胥尚恃餘庥幸無曠事然而塞茅心而巳甚飾竿牘以未遑故魂爽雖騖于門閎而候問不通于幕府仰繄明恕終賜矜容今者北土旦霜晏隂始肅伏惟順天時之常序飬浩氣之至和神民所依福祿來萃恭以司徒太師侍中股肱三世龜鑑四方勤勞著于邦家功德施于社稷方且㰸嘉謀于一靣鬱群望者五年郭令之繫安危素形公論周公之為左右宜冠本朝華夏蠻貊之傾心昆蟲草木之望賜豈伊蕞質獨注微誠伏惟上為宗祊善調寢餗回許安世謝館職啓右鞏伏審顯氶詔檢進踐書林伏惟慶慰國家聚四部之書藏之祕近擇一時之俊任以校讐映朝序以甚清簡上心而滋厚恭以檢正學士學深而冨識大以明擢平津于廷中蔚為首選賴王祥于海上休有治功天衢寢亨時望攸屬遂膺給扎之召來賁登瀛之遊侍從邇班廟堂大任自兹而往計日可期氶逺貶于􅎇函苐仰懷于謙德賀韓相公啓右鞏啓伏審入膺典册首秉鈞衡凡在生靈孰不慶幸仗以史館相公言為蓍蔡行應凖繩仔肩一德之純弼亮三朝之盛君牙之纘舊服世濟忠勞吉甫之憲萬邦身兼文武果還柄用復冠中台茂惟拔出之材素藴非常之略方且誼形王室盡邴魏之謀謨澤潤生民本蕭曺之清靜遂長生于百姓付衆聀于群能躋世太和與人休息使雨腸寒燠罔不從時草木蟲魚皆當蒙惠聲教可加于異俗功名必紀于無窮鞏一去朝行六更歲序顧兹舊物自慚簮屨之微保是孤生方賴陶鈞之賜其為欣抃實倍等倫襄州與交代孫頎啓右鞏伏念講聞譽望積有歲時歷下分符巳出吏部之後漢南守土又居仁政之前惟事契之稠重實愚冥之幸會比于道路始接光儀蒙特異于眷存仍曲加於燕勞論情至厚曽何謝于古人處義甚高固可敦于薄俗違離未允感戀交深諒惟得日之良甫及下車之始頒條多預納福甚隆伏惟知府少卿積學內充懷材間出久更當世之用自結明主之知高冠兩梁入綴班于九列輕車駟馬出按部于百城方圖間燕之宜自請蕃宣之便佇膺䛇召不待歲成更惟上為廟朝善綏寢餗禱頌之至序述寧殫洪州到任謝兩府啓伏念鞏天與朴愚衆知凡近材不堪於施設動輒乖冝學多失于變通理難應用久與逰于儒館仍有列于朝紳適當千載之期曽乏一毫之祚既不能明國家逺大之躰為上建言又未知究鄉閭委曲之情與民興利七移歲序四易外官坐尸祿廪之優寂無稱效幸屬章程之備得以詩循兹蒙輔郡之恩碑遂便親之請望故鄉而接壤與仲弟以連城及是忝踰出于假借此蓋伏遇某官心存博愛量極兼容簮履之微未忘于舊物陶鈞之大不間于孤生曲致公言俾諧私計惟盡承流之分庶禆造物之仁過此巳還未知所措賀東府啓右鞏啓伏覩十月二十三日麻制伏審史館相公登庸天下幸甚伏惟史館相公言為蓍蔡行應凖繩兼文武之閎材冨天人之奧學神祗幽贊遭聖賢相得之時夷夏聳觀備君臣咸有之德果繇樞軸首秉鈞衡竊惟不世之姿深逹當今之務必且開公平之路以序進群能銷壅蔽之萌以廣延衆論以寬大為拯救瘡痍之要以安靜為休息疲瘵之端絀聚斂之無名偃甲兵而不用果推此道以澤吾民食味别聲之倫舉皆受賜殊鄰絶黨之俗孰不嚮風福祿可等于丘山功名必求于金石鞏蚤遊墻屏幸遇陶鎔齟齬餘生始免擠排之患零丁滯迹漸期亨泰之來想望門闌以欣以躍賀蹇周輔授館職右鞏啓竊審奉𬒳詔函進登史觀伏惟慶慰竊以安撫運使學士材資秀特識度淹沖冨華國之懿文抱據經之宿學一人嗟異欲相如之同時多士推先服桓榮之稽古果繇時望特𬒳朝恩流焉木牛方佐中都之費金匱石室遂窺廣內之書竊惟寵數之行兹實要塗之漸佇躋法從用協僉言鞏獲在下風側聞成命分符海徼幸依德庇之餘寓直書林更託雋逰之末其為欣慶曷可縷陳回泉州陳都官啓右鞏啓竊審祗奉茂恩進升寵秩伏惟慶慰竊以知府都官周材經務令德鎮浮席膴仕以彌優簡清衷而有素循良之政巳洽于民謡恬退之風足敦于世教果膺異數進陟名曺側聆成命之行方竊同聲之喜豈期厚眷特枉長箋載規謙抑之辭但切感銘之懇明州到任謝兩府啓右鞏啓伏奉敕命授前件差遣巳于正月二十五日到任上訖伏念鞏才無逺用學殆小知誤蒙假器之恩愧之當官之效屬時泰豫遇上休明𣣔治之心敻追于三代非常之旦恃起于千齡顧是孤生最為逺迹雖逢辰之難得獨揣巳之無堪故群村衒鬻之𥘉未始自陳于薄枝而衆論聘馳之際何嘗輒預于半辭錙銖動謹于成規毫髮敢萌于私晃以兹循分庶獲寡尤然而一去本朝六祗外服十年荏苒未諧拱極之誠萬里周流尚負循陔之念當至仁之平施亦微物之可衰兹者方抵詔以在塗復析符而假守惟四明之窮裔處百奧之東偏浮海之航䁀耒于逺國踐山之築益起于堅城猥出選掄冒膺寄屬此蓋伏遇某官輔成世教樂育士倫隂推覆護之私每借吹噓之力致兹頑鈍與在甄收然而察無他惡之腸方賴兼容之度草苑之質使遂于向陽菽水之歡許伸于反哺盡待曲成之賜俯厭難止之情誓在糜捐用酬鈞播賀趙大資致政啓右鞏啓竊審進秩宫朝歸榮里閈伏惟慶慰恭以致政宫保大資言為蓍蔡行應凖繩肩一德以在躬歷三朝而遇主讜言大論著在朝堂善政流風𬒳干藩服引年求謝抗疏彌堅屢降德音方倚老成之重難回壯莭閔有官職之勞躐升儲宷之華退遂家居之樂門開祖帳衆嘆大夫之賢庭列賜車自知稽古之力惟能諧于素志實何愧于昔人鞏蚤荷陶鈞與遊門館觀大賢出處之迹足勸士倫知儒者進退之宜敢忘師慕其為欣躍倍萬等儔亳州到任謝兩府啓右鞏啓蒙恩授上件差遣巳于今月十六日到任上訖伏念鞏少雖好學長乏異能燭理甚踈蓋聰明之難強受材素薄顧齒髮之巳衰誤竊寵靈叨塵器使兹者緣避親之著令蒙易地之推恩距畿甸以非遙就庭闈而甚便夫何蕞質乃爾冒居此蓋伏遇某官以廣愛之心而輔成世教以并容之度而奬育士倫致是顓愚及于推齒慰倚門之望巳出于埏鎔謝推轂之言敢忘于䇿勵庶收薄效仰答誤知過此以還未知所措到亳州與南京張宣徽啓右鞏啓蒙易近藩獲鄰樂境雖未得就諸生之列請益于詩書然足以聞長者之風仰高于道誼始敢通箋記參候之禮庶幾將心誠飢渴之勤載省孤蒙實為幸會今者抄秋伊始嚴氣將升仰惟吐納之宜無爽燕間之喜伏惟某官言為蓍蔡行應凖繩茂勤烈于三朝聳儀刑于四海仲山之明且哲宜保令名魯公之壽而臧永膺全福更冀上為邦國善保寢興禱頌之誠敘陳罔既元豐類藁卷之三十六
