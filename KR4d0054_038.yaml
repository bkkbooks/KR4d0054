front:
  text: 元豐類藁卷之三十八
  hash: sha256:7a18f4c7332ea6e22250330d56e9f4d642e306cd48c11dae072de13e10d845f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_038-1a}
body:
  text: 祭文祭歐陽少師文惟公學為儒宗材不世出文章逸發醇深炳蔚體備韓馬思兼莊屈垂光簡編焯若星日絶去刀尺渾然天質辭窮卷盡含意未卒讀者心醒開蒙愈疾當代一人顧無儔匹諌垣抗議氣震回遹鼓行無前跋疐非恤世偽難勝孤堅竟窒𬗋微玉堂獨當大筆二典三謨生明藏室頓挫彌厲誠純志一斟酌損益論思得失經體慮萌沃心造膝帝曰汝賢引登輔弼公在廟堂尊明道術清靜簡易仁民愛物斂不煩苛令無迫猝棲置木索里安户逸櫝斂兵革天清地謐日進昌言從容密勿開建國本情忠力悉卯未之歲龍駕颷欻再極大艱垂紳秉笏乾坤正位上下有秩功𬒳社稷等夷召畢公在廟堂總持紀律一用公直兩忘猜狔不狹朋比不虞訕嫉獨立不回其剛仡仡愛飬人材奬成誘掖甄拔寒素振興滯屈以為巳任無有廢咈維公平生愷悌忠實內外洞徹𥘉終若一年始六十懇辭冕黻連章纍歲乃愈所乞放意丘樊脫遺羈􅎗沉浸圖史左右琴瑟氣志浩然不陋蓬蓽意謂百齡重休纍吉還斡鼎軸贊微計密云胡傾殂憗遺則弗聞訃失聲皆淚橫溢戅冥不敏早蒙振祓言繇公誨行繇公率戴德不酬懷情獨欎西望轜車莫持紖紼維公犖犖德義撰述為後世法終天不沒託辭敘心曷究髣佛祭王達龍圖文惟公有獨立之志不羈之材揚旌閩楚按莭江淮止如山淵動若風雷衆皆異其施設曽孰測其津涯若夫拯急難于水火下雋傑于蒿萊越拘攣而不惑豈淺狹之能偕至于稱物引類興言寓懷逺參騷雅近雜嘲諧麗兼組藻美軼瓊瑰皆足以聲駕多士望隆九陔然而位不過郎中名不過直閣流落白頭委蛇一壑豈人事之當然信命存于冥漠昏愚不肖早辱公知拊循愛勉施及其私聞公之逝惻楚歔欷戴德莫酬寓薦以辭祭張唐公文熙寧六年六月一日維公作德于躬實方實厚實夷實訐實堅實茂彼嗜而爭我有不惑彼嫵為朋我肆而特我抗其辭維彼之默始燁其華儒林禮官乃碩其實侍從之班維帝時咨維士時附尚其昌言式久在序告疾于朝乃長南服里無嘆聲士女輯穆以老得謝俶其歸裝車御未驅計聞四方維余先人公同年友公子我姪又託婚媾實殽于豆實酒于觴馳辭告誠維以永傷祭孔長源文嗚呼長源拔迹孤艱刻志勵力升德自幽乃不家食燕其壽母歸飬以色興其士友跂我淳則微獨考古載辭于䇿亦從爾知有婉軍畫為長以舒為將不亟乃使荆粵銓材著職滅熄苛嬈蘇僵博瘠會稽之治里無猝迫𥘉以詆去民實戴德卒還省部廷論之直維曰將歸東符之析孰云不幸奄與生隔有親九十丗為楚側維其篤行匪矜匪飾其彪為文其霈為澤天與厥後賢能交跖有實有華光長譽白善豈無勸慶馬兹得維我與公綢繆平昔詩書討論相求以益我試于鄉自公考擇彌久彌親情隆意獲聞公之訃泫然心䀌馳奠千里寓陳悃愊祭王平甫文熙寧十年十月二十一日嗚呼平甫決江河不足以為子之高談雄辨吞雲夢不足以為子之博聞強記至若操𥿄為文落筆千字徜徉恣肆如不可窮祕怪恍惚亦莫之係皆足以高視古今桀出倫類而况好學不倦垂老愈專自信獨立在約彌厲而志屈于不申材窮于不試人皆待子以將昌神胡速子于長逝嗚呼平甫念昔相逢我壯子稚間託婚􅊚相期道義每心腹于超軼亦情親于樂易何堂堂而山立忽泯泯而颷駛訃皎皎而猶疑淚汍汍而莫制聊寓薦于一觴纂斯言而見意祭宋龍圖文嗟乎次道公之一無之字于古今典章沿革得之于心山藏海積又于舊聞隱顯纎悉析之以口天髙日白公在朝廷群公百司解惑釋疑公為蓍龜公在太史維僚與屬正繆辨訛公為耳目今公亡矣廷有大議問故事者衆夫其歸國有大典考前載者人失其師况公行不絶俗而動有常度言不忤物而辭可疪靖退之風愈而彌邵方直之操自信而不回至于篤友尚舊比義親仁追往烈而競逐豈庸態之能鄰然而蚤蹈厲于儒館晚委蛇于從臣曽未得歷禁之任廊廟之彌綸何鵉儀而鵠峙忽颷逝而皇淪哭公之喪者客不絶于門庭弔公之家者使相望于道路維昏鈍之少與獨綢繆而有素淚淋浪而莫收情忉怛而奚訴嗚呼唐季五君史曠其録公搜亡而集霣蓋旁羅而逺屬至于帝宅神州祖功宗德咸在筆削具存方册爭日月之光輝與天地而終極則公位雖屈而未盡名益久而逾章彼冨貴而磨滅豈得公之亳芒纂佘衰而以此聊寓薦于一觴祭亡妻朝氏文治平元年五月三十日子有仁孝之行勤儉之德宏𥙿端莊聰明靜默窮逹能安死生不惑可以齊古淑人為丗常則歸我之昔明年始笄言無疵悔動應衡規親踈恱慕雅艾嗟咨事姑之禮左右無違服難體順惟日孜孜諧我屬人又篤以私有犯不校有勞不施人隆巳約乃以為宜衣有穿弊珥無光輝曰順吾性餘復何為紛綸丗務逼仄群疑子陳得失效若蓍龜及其既退婉婉其儀不矜以色不伐以辭幽間深謐度量誰窺吾貧口衆智不繼資脫粟藜藿具無鹽醯人不堪憂子獨怡怡綰綜雖愛不偏以慈訓誨惟謹曰宜矣時我扶我翼共處窮羇鋤荒輔漏細大無遺嗚呼天禍我家降集凶厲始來京師辛丑之歲子之方壯疾疹中傷孰云此日一女先亡子雖自逹病豈冝然自秋至春有益無痊迎醫市藥我力為殫術寧非善不勝于天將逝之夕逆知其期語論自若精神不衰遍召室人告以長歸嗚呼哀哉父失賢女姑亡孝婦子喪嚴師吾虧益友時歲雖往悲酸則新禫月之終奠此一樽教飬二子期獲子心時良返子託葬先林言如不復誰為我人長號敘哀寓以斯文祭眺少卿文鞏蚤以孤蒙與託嘉好自始迄今踰二十載繾綣相與義厚情親會合乖闊則有書問開𥿄披辭猶若際遇不意今者公遽淪亡得訃歔欷涕隨聲發海濵獨哭心與誰言仍聞歸旐旅次餘杭隔此濤江寓陳薄奠公乎知否巳矣奈何館中祭丁元􅎇文嗟乎元珍别子幾時孰謂子往無復來期子之為人渾厚平夷不阻為崖不巧為機朋僚恱附族黨懷依其動恂恂必應繩規其語諄諄不見瑕疵從事之畫吾無妄隨長人之政彼有遺思其蓄鈞石其出銖錙惟夫學問冨有書詩濡墨操𥿄寫之文辭春陽滿野萬物榮滋匪營匪飾疊異并竒既精衆作于詩復尤清新俊逸與古為儔讀之􅎈然可破百憂哀鳥之秩天祿之逰謂淹巳久既晚方收孰云未幾斥置南州書猶未復訃巳來投衆為哀傷况于吾屬初疑終駭失淚滿目莫矧子棺莫禭子服禮多不及情豈能忘寓辭千里侑此一觴朝中祭錢純老文嗚呼公乎窮經及史旁兼百氏廢寢與食不虛寸晷篤好無倦華顛愈勵強記多識箱輸屋偫闊議崇論河垂海委詩賦講説射䇿三科金馬玉堂經帷三職寒若自至無馮與翼銓綜再試士曰豫歸尹正三歲衆曰豫依公于所聞維學之力公於所知則維自得利害之際人鮮能安彼為惴惴公獨恆恆愛惡之情人鮮自克彼有贅虧公為衡石世所並逐公有不求彼囂我靜則莫我尤曽不三事位云未究曽不百年數云非壽殱國之良在列嗟咨貴民之望耋艾歔欷天子聞喪馳使臨視勞恤煢孤賙憐乏匱凡我同朝矧曰同志哀由感觸孰知失涕寓焉在庭薦羞在機公乎來哉寄誠兹誄祭李太尉文公先種德碩大于久母宋仁祖維莊懿后公維后姪考異姓王入長六師外垣大邦不以貴盈遜悌慈良昭陵未逺公奄云亡輤車之東致薦一觴祭致仕湛郎中文維公早以郎潛安于飬志晚而家食曽不待年治績紀于朝廷行實椎于鄉里掄亡未逺窀穸有期竊仰高風敢陳薄奠又祭亡妻朝氏文鞏無狀遭禍早失賢妻徘徊京師零丁孤宦乃致旅櫬未就先塋夙夜思惟心顔愧怍今蒙恩輔外道出東南敢啓菆宮進登舟御間關回阻將致鄉園而鞏比至淮瀕邊趨官守其于奉承靈輿經涉大江方復假人經營護視永惟見亮尚賴有靈若夫觸冒川途幾數千里使保清謐則惟餘休至于推擇吉辰修嚴葬禮俟得時日敢不躬親惟其鑒之故以情告代人祭李白文子之文章傑立人上地闢天開雲蒸雨降播産萬物瑋麗瑰竒大巧自然人力何施又如長河浩浩奔放萬里一瀉末勢猶壯大騁厥辭至于如此意氣飄然發楊儔偉飛黃駃騠軼群絶類擺棄羈􅎗脫遺轍軌捷出橫步志狹四裔側睨駑駘與無物比始來玉堂旋去江湖麒麟鳯凰世豈能拘古今僻儒鉤章摛字下里之學辭卑義鄙士有一曲拘牽泥滯亦或狡巧爭馳勢利子之可異豈獨兹文輕世肆志有激斯人姑熟之野豫耒長民舉觴墓下感嘆餘芬祭王都官文維公材敏而宏志視萬里高辝大篇出仕天子主簿于閩聲駕其長清江之謀矯矯逾壯于韶于升條教出巳伺公所為萬目齊視奪姦于幽耋吏喪膽悍黨睢睢根柢卒斬里謳戶歌惟惸寡獨在右惟監在下惟屬在側惟僚相講戴服將起將昌俞考以難曷赴曷歸忽殞無還公于先人實歡實厚至公諸子鞏辱親友於公家行表裏洞知于黨不校於尊不違出升公堂不撓毫髮退從其私婉婉曲折鍾山峥嶸下惟江水昔公此臨委蛇舄履今子六人葬公于此銘鞏之為辭貧事偉千里寄誠以兹一簋祭袁大監文於乎越蜀荆吳三方萬里公馬騑騑幞印而使蠻墟海聚獄無濫辭峨峩卭𤏡貨走京師東南之粟風帆手筰歲鎮太倉萬艘尾錯遂副會府肆其心畫出屏于宣以我偃側九卿之行得謝以歸冕辨入里昔時布衣進退則然當世所嗟不貴以驕不冨以奢翼翼其行坦坦其衷隤然順退長者之風白髮雖多几杖未隨笑言在耳巳哭于帷眷然撫我孰如公尤先人不幸託載公舟我生方屯戴德莫疇羞醪則微以陳我悲祭關職方文嗚呼關公以文中科以材為吏艱于厥𥘉四十始仕終領兩州其治大肆告老于朝郎官以歸卿士大失觀望嗟咨孰為公居竹水之寰孰為公園正據湖山公出公休八子侍側仕者太半同時共籍其聲顯揚其習順慈萬石之風百世相差有後如斯世誰能及而况公年躋于八十或如公壽莫如公安履勞撫少其意桓桓拜公以晚見託以姻書猶在機訃巳及門福祿之全在公奚憾念昔思耒族親之感吊廬在東逺不及會泣敘斯文千里之外繾綣之情巳于一酹祭黃君文嗚呼宋且百年號令萬里姦臣黜除尤者擯死巖材里秀驅駕而使蓋君之生有時如此當世之官有微有盛盛者廟堂斟酌王命千隸百司進俟退聽出長四方玉斧金乘邦侯衆將傳牒而令微者紛紛或陪或正千品萬名各有操柄人皆敏手捷取能併君獨于求以死終病同時之人勤營善蓄萬籯儲金萬襲藏玉遺餘野積不能匱櫝君獨一身衣食常蹙兹非其命曷以至兹君能自逹可以無悲親戚念君能不歔欷我之老姑歸君為婦與君歷年顛沛同有今對其孀寧匪我傷來問來吊屢至其堂葬君南山冬氣巳烈薄醪時羞觴豆肅設侑以兹文與君一訣元豐類藁卷之三十八
