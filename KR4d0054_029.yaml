front:
  text: 元豐類藁卷之二十九
  hash: sha256:942e41191d30a8e6c18fcea1f3327d39f85ae1ff3d3d81081121e4b625bc1481
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_029-1a}
body:
  text: 疏熙寧轉對疏準御史臺告報臣寮朝辭日具轉對臣愚淺薄恐言不采然臣竊觀唐太宗即位之初延群臣與圖天下之事而能絀封倫用魏鄭公之説所以成正觀之治周世宗𥘉即位亦延羣臣使陳當世之務而能知王朴之可用故顯德之政亦獨能變五代之因循夫當衆説之馳騁而以獨見之言陳未形之得失此聽者之所難也然二君能辨之於羣衆之中而用之以收一時之效此後世之士所以常感知言之少而頌二君之明也今陛下始承天序亦詔群臣使以次對然且將歲餘未聞取一人得一言豈當世固乏人不足以當陛下之意與抑所以延問者特用纍世之故事而不必求其實歟臣愚竊計殆進言者未有以當陛下之意也陛下明智大略固將比迹于唐虞三代之盛如太宗世宗之所至恐不足以望陛下故臣之所言亦不敢效二臣之卑近伏惟陛下超然獨觀于丗俗之表詳思臣言而擇其中則二君之明豈足道于後世而士之懷抱忠義者豈復感知言之少乎臣所言如左臣伏以陛下恭儉慈仁有能承祖宗一作宗廟之德聰明􅌖知有能任天下之材即位以來早朝晏罷廣問兼聽有更制變俗比迹唐虞之志此非群臣之所能及也然而所遇之時在天則有日食皇變之異在地則震動陷裂水泉湧溢之災在人則有飢饉流亡訛言相驚之患三者皆非常之變也及一作又從而察今之天下則風俗日以薄惡紀綱日以弛壞百司庶務一切文具而已內外之任則不足於人材公恐之計則不足于食貨近則不能不以盜賊為慮逺則不能不以夷狄為憂海內智謀之士常恐天下之勢不得以久安也以陛下之明而所遇之時如此陛下有更制變俗比迹唐虞之志則亦在正其本而已矣易曰正其本萬事理臣以謂正其本者在陛下得之於心而已臣觀洪範所以和同天人之際使之無間而要其所以為始一作本者思也大學所以誠意正心修身治其國家天下而要其所以為始者致其知也故臣以謂正其本者在得之于心而已得之于心者其術非他學焉而巳矣此致其知所以為大學之道也古之聖人舜禹成湯文武未有不由學而成而傳説周公之輔其君未嘗不勉之以學故孟子以謂學焉而後有為則湯以王齊桓公以霸皆不勞而能也蓋學所以成人主之功德如此誠能磨礱長飬至于有以自得則天下之事在于理者未有不能盡也能盡天下之理則天下之事物接于我者無以纍其內天下之以言語接于我者無以蔽其外夫然則循理而已矣邪情之所不能入也從善而巳矣邪説之所不能亂也如是而用之以持久資之以不息則積其小者必至于大積其微者必至于顯古之人自可𣣔之善而充之至於不可知之神自十五之學而積之至於從心之不踰矩豈他道哉由是而巳矣故曰念終始典于學又曰學然後知不足孔子亦曰吾學不厭蓋如此者孔子之所不能巳也夫能使事物之接于我者不能纍其內所以治內也言語之接于我者不能蔽其外所以應外也有以治內此所以成德化也有以應外此所以成法度也德化法度既成所以彂育萬物而和同天人之際也自周衰以耒道術不明為人君者莫知學先王之道以明其心為人臣者莫知引其君以及先王之道也一切苟簡溺于流俗末丗之卑淺以先王之道為迂逺而難遵人主雖有聰明敏逹之質而無磨礱長飬之具至於不能有以自得則天下之事在于理者有所不能盡也不能盡天下之理則天下之以事物接於我者足以纍其內天下之以言語接于我者足以蔽其外夫然故欲循理而邪情足以害之欲從善而邪説足以亂之如是而用之以持久則愈甚無輔行之以不息則不能見效其弊則至于邪情勝而正理滅邪説長而正論消天下之所以不治而有至于亂者以是而巳矣比周衰以來人主之所以可傳于後世者少也可傳於後卋者若漢之文帝宣帝唐之太宗皆可謂有美質矣由其學不能逺而所知者陋故足以賢於近世之庸主矣若夫議唐虞三代之盛德則彼烏足以云乎由其如此故自周衰以來千有餘年天下之言理者亦皆卑近淺陋以超世主之所便而言先王之道者皆絀而不省故以孔子之聖孟子之賢而猶不遇也今去孔孟之時又逺矣臣之所言乃周衰以來千有餘年所謂遊逺而難遵者也然臣敢獻之于陛下者臣觀先王之所巳試其言最近而非逺其用最要而非迂故不敢不以告者此臣所以事陛下區區之志也伏惟陛下有自然之聖質而漸清于道義之日又不為不久然臣以一作所謂陛下有更制變俗比迹唐虞之志則在得之于心得之於心則在學焉而巳者臣愚以謂陛下宜觀洪範大學之所陳知治道之所本不在于他觀傅説周公之所戒一作勉知學者非明主之所宜巳也陛下有更制變俗比迹唐虞之志則當懇誠惻懼以講明舊學而推廣之務當于道德之體要不取乎口耳之小知不急乎朝夕之近效復之熟之使聖心之所存從容于自得之地則萬事之在于理者未有不能盡也能盡萬事之理則內不纍于天下之物外不纍一作蔽于天下之言然後明先王之道而行之邪情之所不能入也合天下之正論而用之邪説之所不能亂也如是而用之以持久資之以不息則雖細必巨雖微必顯以陛下之聰明而充之以至于不可知之神以陛下之睿知而積之以至于從心作心之不踰矩夫豈逺哉顧勉強如何耳夫然故內成德化以成法度以發育萬物而和同天人之際甚易也若夫移風俗之薄惡振綱紀之他壞變百司庶務之文具厲天下之士使稱其位理天下之財使贍其用近者使之親附逺者使之服從海內之勢使之常安則惟陛下之所欲何求而不得何為而不成乎未有若是而福應不臻而變異不消者也如聖心之所存未及于此內未能無秋毫之纍外未能無纎芥之蔽則臣恐𣣔法先王之政而智慮有所未審欲用天下之智謀林諝之士而議論有所未一于國家天下愈甚無輔而風俗綱紀愈以衰壞也非獨如此自古所以安危治亂之幾未嘗不出于此臣幸蒙降問言天下之細務而無益于得夫之數者非臣所以事陛下區區之志也輒不自知其固陋而敢言國家之大體惟陛下審察而擇其宜天下幸甚劄子自福州召判太常寺上殿改明州不果上伏以陛下聰明睿知天性自然可謂有不世出之姿自在藩邸入承顔色出奉朝請怡怡翼翼不自暇豫至恭極孝聞于天下及踐大位內事兩宮外嚴七廟仁𬒳公族德形閨門嬪御備官不淫于色音樂備數不溺于聲食菲衣綈務遵莭儉臺卑囿小無所增莭近習無便嬖左右無私謁未嘗出逰幸未嘗從畋魚其于憂憫元元勤勞庶政則念慮先於兆朕祗慎蓋于纎芥晝而訪問至日昃夕而省者覽至于夜分每群臣進見接之禮篤而情通凡四方奏事莫不朝入而暮報雖大禹之勤于邦文王之不暇食無以加此其淵謀逺略必中事幾善訓嘉謨可為世則者傳聞下土雖僅得其一二巳足以度越衆慮非可窺測可謂有君人之大德其高深宏逺則憫自晚周秦漢以來世主不能獨見于衆人之表其政治所出大氐踵襲卑陋因于世俗而已于是慨然以上追唐虞三代荒絶之迹修列先王法度之政為其任在已可謂有出于數千載之大志變革因循號令必信使海內觀聽莫不震動群下遵職惟恐在後可謂有能行之效蓋刻意尚行不差毫髮縉紳之士有所不能及憂勞惕勵無懈須臾又非羣臣之所能望可謂持起于三代之後非常之主也愚臣孤陋熙寧二年出通判越州因轉對幸得論事敢據經之説以誠意正心修身治國家天下之道必本于學為獻逮今十有一年始得望穆穆之清光敢别白前説而終之臣以謂陛下有不世出之姿有君人之大德與出于數千載之大志又有能行之效特起于三代之後然顧以治國家天下之道必本于學為獻于陛下何也蓋古之聖人雖出平其類拔乎其萃然至其成德莫不由學故堯舜性之也而見于傳記則皆有師其史官識其行事則皆曰若稽古至于湯武身之也則湯學于伊尹武王學于太公見于詩禮孟子在商高宗得傅説作相其命説之辭曰豫小子舊學于甘盤而傅説告之則曰學于古訓乃有獲又曰惟學遜志務時敏厥修乃來又曰惟斆學半念終始典于學蓋髙宗既巳學于甘盤矣及傅説相之乃更丁寧反復勉之以學其要歸則以謂當終始常念于學明學蓋不可一日而廢也至于孔子之自敘則自有十五而志于學至于七十而從心所欲不踰矩天以孔子之聖必志于學其學之漸每十年而一進至于七十矣其從心也蓋不踰矩則傳説所稱當終始常念于學者雖孔子之聖不能易也故揚子曰學之為王者事久矣堯舜禹湯文武汲汲仲尼皇皇其巳久矣聖賢之篤于學至于如此者蓋樂而不亂復而不厭者道也測之而益深窮之而益逺者聖人之言也知不足與困者學也方其始也求之貴傳畜之貴多及其得之則于言也在知其要于德也在知其奧能至于是矣則求之博畜之多者乃筌蹄而巳所謂多間則守之以約多見則守之以卓也如求之不博畜之不多則未有于言也能知其要未有於德也能知其奧所謂寡聞則無約寡見則無卓也子貢稱孔子之學識其逺者大者則于言也能知其要于德也能知其奧然後能當于孔子之所謂學也審能是則存于心者有以為主于內天下之事雖其變無窮而吾所以待之者其應無方古之大有為于天下者未有不出于此也堯舜湯武所以為盛德之至孔子所以從心而不踰矩或得其行者未得其所以行得其言者未得其所以言孟子之所謂聖而不可知之謂神在是而巳矣陛下萬幾之餘日引天下之士推原道德而講明其意陳六藝載籍之文而紬繹其説博者深思無有解倦其折衷是非獨見之明老師宿儒所不能到此臣之所聞也有不世出之姿與君人之大德又有出于數千載之大志持起于三代之後此臣之所知也則陛下之學巳可謂至矣然臣區區敢誦經之陳言以進于左右者誠將順陛下之聖志采傳説始終典學之言觀孔子少長進學之漸以陛下之明智知言之要知德之奧皆陛下之所素畜誠以陛下之樂道而繼之以不倦以陛下之稽古而加之以不巳使天性之睿智所造者益深所積益厚日日新又日新其于自得之者非徒足以待萬事無窮之變而應之以無方天下之人必將得陛下之行者不得其所以行得陛下之言者不得其所以言堯舜湯武所以為盛德之至孔子所以從心而不踰矩孟子所謂聖而不可知之謂神不在于陛下而孰在哉繇是斂五福之慶以大賚庶民享萬年之休以永綏方夏德厚于天地名昭于日月惟聖意之所在而巳臣愚不敏蒙恩賜對不敢毛舉藂細之常務而于國家之體冒言其逺且大者此臣所以愛君區區之分也伏惟留神省察元豐類藁卷之二十九
