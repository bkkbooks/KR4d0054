body:
  text: 元豐類藁卷十二宋曾鞏撰序李白詩集後序李白詩集二十卷舊七百若干篇今九百若干篇者知制誥常山宋敏求字次道之所廣也次道既以類廣白詩自為序而未考次其作之先後余得其書乃考其先後而次第之盖白蜀郡人初隱岷山出居襄漢之間南游江淮至楚觀雲夢雲夢許氏者高宗時宰相圉師之家也以女妻白因留雲夢者三年去之齊魯居徂徠山竹溪入吳至長安明皇聞其名召見以為翰林供奉頃之不合去北抵趙魏燕晉西抵岐邠歴商於至洛陽游梁最久復之齊魯南浮淮泗再入吳轉徙金陵上秋浦潯陽天寶十四載安禄山反明年明皇在蜀永王璘節度東南白時卧廬山璘廹致之璘軍敗丹陽白奔亡至宿松坐繋潯陽獄宣撫大使崔渙與御史中丞宋若思驗治白以為罪薄宜貰而若思軍赴河南遂釋白囚使謀其軍事上書肅宗薦白材可用不報是時白年五十有七矣乾元元年終以污璘事長流夜郎遂泛洞庭上峽江至巫山以赦得釋憇岳陽江夏久之復如潯陽過金陵徘徊於歴陽宣城二郡其族人陽氷為當塗令白過之以病卒年六十有四是時寶應元年也其始終所更涉如此此白之詩書所自叙可考者也范傳正為白墓誌稱白偶乘艑一日千里或遇勝景終年不移則見於白之自叙者盖亦其略也舊史稱白山東人為翰林待詔又稱永王璘節度揚州白在宣城謁見遂辟為從事而新書又稱白流夜郎還潯陽坐事下獄宋若思釋之者皆不合白之自叙盖史誤也白之詩連類引義雖中於法度者寡然其辭閎肆雋偉殆騷人所不及近世所未有也舊史稱白有逸才志氣宏逺飄然有超世之心余以為實録而新書不著其語故録之使覽者得詳焉先大夫集後序公所為書號仙鳬羽翼者三十卷西陲要紀者十卷清邉前要五十卷廣中台志八十卷為臣要紀三卷四聲韻五卷總一百七十八卷皆刋行於世今類次詩賦書奏一百二十三篇又自為十卷藏於家方五代之際儒學既擯焉後生小子治術業於閭巷文多淺近是時公雖少所學已皆知治亂得失興壊之理其為文閎深雋美而長於諷諭今類次樂府已下是也宋既平天下公始出仕當此之時太祖太宗已綱紀大法矣公於是勇言當世之得失其在朝廷疾當事者不忠故凡言天下之要必本天子憂憐百姓勞心萬事之意而推大臣從官執事之人觀望懐奸不稱天子属任之心故治久未洽至其難言則人有所不敢言者雖屢不合而出而所言益切不以利害禍福動其意也始公尤見竒於太宗自光禄寺丞越州監酒税召見以為直史館遂為兩浙轉運使未久而眞宗即位益以材見知初試以知制誥及西兵起又以為自陜以西經略判官而公常激切論大臣當時皆不恱故不果用然眞宗終感其言故為泉州未盡一歲拜蘇州五日又為揚州將復召之也而公於是時又上書語斥大臣尤切故卒以齟齬終公之言其大者以自唐之衰民窮久矣海内既集天子方修法度而用事者尚多煩碎治財利之臣又益急公獨以謂宜遵簡易罷筦𣙜以與民休息塞天下望祥符初四方爭言符應天子因之遂用事泰山祠汾陰而道家之説亦滋甚自京師至四方皆大治宫觀公益諍以謂天命不可專任宜絀姦臣修人事反復至數百千言嗚呼公之盡忠天子之受盡言何必古人此非傳之所謂主聖臣直者乎何其盛也何其盛也公在兩浙奏罷苛稅二百三十餘條在京西又與三司爭論免民租釋逋負之在民者盖公之所試如此所試者大其庻幾矣公所甞言甚衆其在上前及書亡者盖不得而集其或從或否而後常可思者與歴官行事廬陵歐陽修公已銘公之碑特詳焉此故不論論其不盡載者公卒以齟齬終其功行或不得在史氏記藉令記之當時好公者少史其果可信歟後有君子欲推而考之讀公之碑與其書及予小子之序其意者具見其表裏其於虛實之論可覈矣公卒乃贈諫議大夫姓曾氏諱某南豐人序其書者公之孫鞏也至和元年十二月日謹序王深甫文集序深甫吾友也姓王氏諱回當先王之迹熄六藝殘缺道術衰微天下學者無所折衷深甫於是奮然獨起因先王之遺文以求其意得之於心行之於已其動止語黙必考於法度而窮達得喪不易其志也文集二十卷其辭反復辨達有所開闡其卒盖將歸於簡也其破去百家傳註推散缺不全之經以明聖人之道於千載之後所以振斯文於將墜囘學者於既溺可謂道德之要言非世之别集而已也後之潛心於聖人者將必由是而有得則其於世教豈小補之而已哉嗚呼深甫其志方強其德方進而不幸死矣故其澤不加於天下而其言止於此然觀其所考者豈非孟子所謂名世者歟其文有片言半簡非大義所存皆附而不去者所以明深甫之於其細行皆可傳於世也深甫福州候官縣人今家於潁甞舉進士中其科為亳州衛眞縣主簿未一歲棄去遂不復仕卒於治平二年之七月二十八日年四十有三天子甞以某軍節度推官知陳州南頓縣事就其家命之而深甫既卒矣王子直文集序至治之極教化既成道德同而風俗一言理者雖異人殊世未甞不同其指何則理當故無二也是以詩書之文自唐虞以來至秦魯之際其相去千餘載其作者非一人至於其間甞更衰亂然學者尚䝉餘澤雖其文數萬而其所發明更相表裏如一人之説不知時世之逺作者之衆也嗚呼上下之間漸磨陶冶至於如此豈非盛哉自三代教養之法廢先王之澤熄學者人人異見而諸子各自為家豈其固相反哉不當於理故不能一也由漢以來益逺於治故學者雖有魁竒拔出之材而其文能馳騁上下偉麗可喜者甚衆然是非取舍不當於聖人之意者亦已多矣故其説未甞一而聖人之道未甞明也士之生於是時其言能當於理者亦可謂難矣由是觀之則文章之得失豈不繋於治亂哉長樂王向字子直少已著文數萬言與其兄弟俱名聞天下可謂魁竒拔出之材而其文能馳騁上下偉麗可喜者也讀其書知其與漢以來名能文者俱列於作者之林未知其孰先孰後考其意不當於理亦少矣然子直晩自以為不足而悔其少作更欲窮探力取極聖人之指要盛行則欲發而見之事業窮居則欲推而託之於文章將與詩書之作者並而又未知孰先孰後也然不幸蚤世故雖有難得之材獨立之志而不得及其成就此吾徒與子直之兄囘字深甫所以深恨於斯人也子直官世行治深甫已為之銘而書其數萬言者属予為叙予觀子直之所自見者已足暴於世矣故特為之序其志云王容季文集序叙事莫如書其在堯典述命羲和宅土測日晷星候氣揆民緩急兼蠻夷鳥獸其財成輔相備三才萬物之理以治百官授萬民興衆功可謂愽矣然其言不過數十其於舜典則曰在璿璣玉衡以齊七政盖堯之時觀天以厯象至舜又察之璣衡聖人之法至後世益備也曰宅者則日月五星曰政者則羲和之所治無不任焉其體至大盖一言而盡可謂微矣其言微故學者所不得不盡心能盡心然後能自得之此所以為經而歴千餘年盖能得之者少也易詩禮春秋論語皆然其曰測之而益深窮之而益逺信也世既衰能言者益少承孔子者孟子而已承孟子者揚子而已揚子之稱孟子曰知言之要知德之奥若揚子則亦足以幾乎此矣其次能叙事使可行於逺者若子夏左丘明司馬遷韓愈亦可謂拔出之材其言庻乎有益者也吾友王氏兄弟曰囘深甫曰向子直曰冏容季皆善属文長於叙事深甫尤深而子直容季盖能稱其兄者也皆可謂拔出之材令其克壽得就其志則將紹六藝之遺言其可禦哉予甞叙深甫子直之文銘容季之墓而容季之兄固子堅又集容季之遺藁属予序之予憫俗之偷朋友故舊道缺不自知其不能強次是説以為容季文集序熙寧九年冬南昌郡齋范貫之奏議集序尚書户部郎中直龍圖閣范公貫之之奏議凡若干篇其子世京集為十卷而属予序之盖自至和已後十餘年間公常以言事任職自天子大臣至于羣下自掖庭至于四方幽隱一有得失善惡闗於政理公無不極意反復為上力言或矯拂情欲或切劘計慮或辨别忠佞而處其進退章有一再或至於十餘上事有陰爭獨陳或悉引諫官御史合議肆言仁宗常虚心采納為之變命令更廢舉近或立從逺或越月踰時或至於其後卒皆聽用盖當是時仁宗在位歲久熟於人事之情偽與羣臣之能否方以仁厚清靜休養元元至於是非與奪則一歸之公議而不自用也其所引拔以言為職者如公皆一時之選而公與同時之士亦皆樂得其言不曲從苟止故天下之情因得畢聞於上而事之害理者常不果行至於竒衺恣睢有為之者亦輙敗悔故當此之時常委事七八大臣而朝政無大闕失羣臣奉法遵職海内乂安夫因人而不自用者天也仁宗之所以其仁如天至于享國四十餘年能承太平之業者繇是而已後世得公之遺文而論其世見其上下之際相成如此必將低徊感慕有不可及之嘆然後知其時之難得則公言之不没豈獨見其志所以明先帝之盛德於無窮也公為人温良慈恕其從政寛易愛人及在朝廷危言正色人有所不能及也凡同時與公有言責者後多至大官而公獨早卒公諱師道其世次州里歴官行事有今資政殿學士趙公抃為公之墓銘云王平甫文集序王平甫既没其家集其遺文為百卷属予序平甫自少已傑然以材高見於世為文思若决河語出驚人一時爭傳誦之其學問尤敏而資之以不倦至晚愈篤愽覽強記於書無所不通其明於是非得失之理為尤詳其文閎富典重其詩愽而深矣自周衰先王之遺文既喪漢興文學猶為近古及其衰而陵夷盡矣至唐久之而能言之士始幾於漢及其衰而遂泯泯矣宋受命百有餘年天下文章復侔於漢唐之盛盖自周衰至今千有餘歲斯文濵於泯滅能自抜起以追於古者此三世而已各於其盛時士之能以特見於世者率常不過三數人其世之不數其人之難得如此平甫之文能特見於世者也世皆謂平甫之詩宜為樂謌薦之郊廟其文宜為典册施諸朝廷而不得用於世然推其實千歲之日不為不多焦心思於翰墨之間者不為不衆在富貴之位者未甞一日而無其人彼皆湮滅而無傳或播其醜於後平甫乃躬難得之姿負特見之能自立於不朽雖不得其志然其文之可貴人亦莫得而揜也則平甫之求於内亦奚憾乎古今作者或能文不必工於詩或長於詩不必有文平甫獨兼得之其於詩尤自喜其憂喜哀樂感激怨懟之情一於詩見之古詩尤多也平甫居家孝友為人質直簡易遇人豁然推腹心不為毫髪疑礙與人交於恩意尤篤也其死之日天下識與不識皆聞而哀之其州里世次歴官行事將有待於識平甫之葬者故不著於此云元豐元年強幾聖文集序幾聖諱至姓強氏錢塘人幾聖字也為三司戸部判官尚書祠部郎中既殁其子浚明集其遺文為二十卷囑予序幾聖少貧能自謀學為進士材拔出輩類出輒收其科其文詞大傳於時及為吏未甞不以其間益讀書為文尤工於詩句出驚人世皆推其能然最為相國韓魏公所知魏公既罷政事鎭京兆及徙鎭相魏常引幾聖自助魏公喜為詩每合属士大夫賔客與游多賦詩以自見其属而和之者幾聖獨思致逸發若不可追躡魏公未甞不嘆得之晚也其在幕府魏公每上奏天子以歲時慶賀候問及為書記通四方之好幾聖為属藁草必聲比字属曲當繩墨然氣質渾渾不見刻畫逺近多稱誦之及為他文若誌銘序記策問學士大夫則簡古典則不少貶以就俗其所長兼人如此魏公數薦之朝廷以謂宜在館閣然未及用魏公既薨之明年幾聖亦以疾卒幾聖之遺文在魏公幕府者最為多故序亦反復見之覽者可推而考之也其行治官世已著於誌幾聖之葬者故此不著思軒詩序今天子至和之初尚書屯田員外郎林君慥通判撫州恊于上下以修其職於是時蝗起京東轉入江淮之間秋又皆旱撫獨無害災故君得以其間益疏其寢北之地厚池之北涯立屋其上入而燕焉名其軒曰思軒士之能詩者皆為君賦之觀君之蚤夜於其治既有餘日乃自以為不足而深思於此得士大夫之作讀而推之以察君之志將無小大言動萬事之作止一擇其宜則思之盡豈獨一時寄此軒之内哉君之大父水部君當太宗時實通判是州今六十餘年而君來世其官衆於是考於州人以求水部之餘思遺德又榮君之能業其家而謂君之勢且益顯以大其宗門將豈止於此後有君子低徊此軒而迹君之思見於事者不遺於理不墜其先人則詩之信天下其可蔽也哉九月日序元豐類藁卷十二
