body:
  text: 元豐類藁巻三十七宋曾鞏撰啓狀囬陸佃謝館職啓右鞏啓伏審祗膺詔檢入踐書林伏惟慶慰伏惟侍講學士敏識兼人英辭華國翰林子墨之賦蚤擅貴名玉杯繁露之篇多名大義豈獨坐收於士望固能自結於主知特啓書筵密鄰禁戶凡將急就之字已頼發明廣内石室之藏更資是正兹惟兾選奚測遠塗方喜托於餘光遽先承於華問􅂱如黼藻實駭於彌文沛若江河更欽於善下其為感幸曷罄敷陳與定州韓相公啓右鞏啓伏念鞏轉走江湖推移歲月望門牆而既遠通書問以無縁兹者蒙易近藩匪遥台席雖未得就諸生之列請益於詩書猶足以聞長者之風仰髙於道誼始敢脩牋記叅候之禮庶幾將心誠飢渴之勤載省孤蒙實為幸會属晏隂之在序當嚴氣之方升仰惟吐納之宜無爽燕閒之喜伏惟判府相公言為蓍蔡行應凖繩茂勞烈於三朝聳儀刑於四海韓侯之鞗革金厄暫殿方維周公之衮衣繡裳佇還鈞軸更冀上為邦國善保寢興禱頌之誠叙陳罔既賀韓相公赴許州啓右鞏啓伏審遠持信瑞入奉清閒假泰筮以諏辰命倌人而飭駕百靈奔衛宜無陟降之勞六氣節宣當遂神明之適伏以判府相公材為人傑行備天常出堯舜之盛時紹韋平之慶閥忠純之操簡注於三朝愷悌之風儀刑於四海比較廟堂之任少畱藩輔之雄力抗至言屢辭於榮祿眷求舊德方属於上心用均邊閫之勤便易鄉邦之便鞗革金厄巳嚴入覲之裝衮衣繡裳行允公歸之望佇膺典冊首秉鈞衡鞏處勢多竒誤知最久持心素厚未忘墜屨之微引脰永懷巳動掃門之喜更冀上為宗社善保寢興授中書舍人謝啓右鞏伏蒙制命授前件官者竊以賛為明命資討論潤色之工服在從官備諏度詢謀之用属非常之興運經不世之大猷方追三代之風以建一王之法其於講求體要裁正典章出獨斷之淵深號積年之希濶所以訓齊羣下播告四方非究極於人文曷宣明於上意矧參獻納尤愼選掄如鞏者識慮少通襟靈多蔽徒恐隳於先緒頗能味於經言有顓愚好古之心自知迃㪚無廣博為人之學分甘棄捐顧一作嘆齒髪之巳衰困風波而且久晩逢眞主獨賜誤知取於寡與之中假以踰涯之寵俾專史法非薄質之能堪遂掌訓詞豈䛕能之可稱况策名於近要預責實於論思揣已以慚瘝官可畏何縁致此固有繇然兹盖伏遇某官翼亮天功彌綸庶務仁接於物每樂育於時材誼在承君故旁招於衆俊致兹頑鈍獲備甄收惟殫許國之誠彌堅素志庶答知人之遇不在他門賀提刑狀右伏審祗奉詔恩總持使務伏惟慶慰伏以提刑屯田躬高明之德席熈盛之期起收科榮光映朝序發明吾道則有文章之深淳推行當時是為治行之尤異果膺迅用以允僉言自江之東握節而使固將粹美於風俗豈特是正於刑書不次之陞為端於此鞏獲分郡寄得與公庥幸喜之深叙陳㒺既太平州囬轉運狀右鞏伏念鞏夙惟孤質最荷誤知属仗節以來思得通名而覯止辱為殊禮尤出過恩委曲拊循丁寧顧訪軫艱難於即路則許之假寵於舟艎憫匱乏於騰裴則期以致憐於教墨側思寒陋何用克堪聚集感慚豈勝指數去違再宿懷嚮兼年伏惟通久禱於萬靈亨洪休於百順竊以運使郎中受材閎廓經德粹冲布盛府之詔條樹外臺之風績洽於人望簡在天心行被命書即膺遠用伏惟順遵氣節安養寢興太平州與本路轉運狀右鞏啓伏念更移歲序阻越道途音塵莫及於賔階書問不通於記室飛馳精思徯仰風威伏惟順履川流安行舟御享神明之恊相具福禄之來成伏以運使郎中德紹家聲材周世用雋望傾乎天下壯猷藹於朝端建使者之節旄宣揚惠澤佐大農之計策蕃長貨財拊勞烈以甚隆席寵靈而宜厚竚膺詔召以協輿言伏惟上為朝廷善綏寢餗越州賀提刑夏倚狀右鞏伏審祗奉詔封榮分使節伏惟慶愜伏以提刑屯田抱材精敏涵德粹温文章為國之光華治行迺時之表則輟於朝著處以使臺士望藹然時名籍甚官用視年之豐耗巳實倉儲邦刑以世而重輕竚清獄繫使仁聲之既洽則嚚訟之可無然後入奉命書進升法從在於公議實允輿情鞏於此備官云初託庇喜趨風之甚邇諒考履之惟和更冀副上倚毗順時調護其為禱頌曷究敷陳賀轉運狀伏審祗奉詔封就更使節伏惟慶慰伏以運使司封受材閎遠植性粹冲風猷為世之表儀治行迺時之軌則果用詳刑之最來分將漕之權威名巳動於連城惠術行周於比戶豈止調盈虚於歲計内足邦儲方且知緩急於人情下流主澤然後進陪侍從入奉詢謀在公論以猶稽實輿誠之所係鞏備官於此託庇云初將承望於餘光但忻愉於懦思属祁寒之在序諒福履之保和敢冀上為朝廷善調興寢禱頌之至叙述奚周賀杭州趙資政冬狀右鞏竊以布律而候氣萌動於黄宮立表以須景長至於南極伏惟知府資政受材閎廓含德粹純壯京國之大猷儕格天之盛業履兹令序茂集休祺典冊衮衣竚履一作復三公之位旂常鼎鼐當傳萬世之功鞏祗服官箴遠違門著素積依歸之望彌深禱頌之勤賀北京畱守韓侍中正旦狀右鞏伏以歲起於東茂對三陽之盛物生於震聿開萬化之端伏惟某官行應中和道含純粹属四方之係望簡三后之眷懷德為民彛故稱宗廟之器功在王室是為社稷之臣順履昌期具膺繁祉佇奉承於典冊復登翊於巖廊鞏限守印章阻趨牆屏仰望威重不任禱頌之至賀鄆州邵資政改侍郎狀右鞏竊審祗被明緍進陞寵秩伏惟慶慰伏以安撫資政侍郎材經世務文擅國華攀日月之髙衢踐機衡之要地方兼榮於祕殿用均逸於价藩属時靖嘉維上豫動訪昔遊於博望懷舊學於甘盤迺陞宗伯之聯居貳卿曹之重惟隆名異數之錫巳絶當時固元勲盛德之殊豈稽圖任佇還柄用式允輿情馳慶末繇依歸滋劇襄州囬相州韓侍中狀右鞏僻守陋邦遠違嚴屏永言嚮慕但傾茅塞之心自便退藏莫馳竿牘之問敢期賜教出自過恩形意愛之拊循枉題評之奬引譬如寒谷幸蒙六律之吹有若秋毫遂借千鈞之重秘藏巾衍銘鏤肺肝惟偃息於便藩素充盈於浩氣百神所相萬福來綏伏以司徒侍中行應準繩言為蓍蔡肩一心之忠誼弼三后之謀謨安社稷之元功傳於竹帛被華夷之盛德布在管絃方且辭鈞軸於廟堂擁旌幢於鄉國然而人詠方叔克壯元老之猷時思謝安出慰蒼生之望宜就贊書之拜佇諧華衮之歸囬樞密侍郎狀右鞏啓伏念鞏久兹外補利在退藏一切不為京師之書以此亦踈左右之問分當棄置理絶收憐豈期尚記於姓名特賜親紆於翰墨處大寒而不變乃知松栢之堅兼庶類而並容則維江漢之廣孤懷易感重誼難忘但注仰於門䦨實鏤銘於肺腑今者景風扇物畏日御纒伏惟襄贊萬幾順膺百福敢覬上為邦國善保寢興懤頌之誠指陳難既囬亳州知府諫議狀右鞏伏念自違牆屛浸易歲時比潜伏於外邦久棄捐於人事雖嚮徃之意不暫弭忘而叅動之勤至於曠絶敢謂曲敦雅舊尚記庸虚賜勞問於華牋致恩勤於親筆文如黼藻加一字以為榮操若松筠貫四時而不改以慙且感欲報奚言今者竊審固避機衡出臨屏翰始敢瀝茅心之至懇具竿牘之常儀少贖曠疎覬蒙開察盖天時之迭運属春令之方行伏惟開閤之初偃藩甚樂休有神明之助茂臻福履之宜鎭撫名城暫屈承流之寄旋歸宰路竚膺圖舊之求更惟上為宗祊善調寢餗禱頌之至但切下情囬運使郎中狀右鞏啓伏念鞏仰髙所至馳思為深戀勢之殊属書以進枉過恩之特厚流華問以見存文辭爛然意氣勤甚雖德心之大遺名秩以自謙而士品之微顧材資而安稱其為佩服曷罄指陳急景云初祁寒將盛伏惟遵道塗之易詢采於風謡察閭里之勤布行於德惠神靈所護福祿攸宜恭以運使郎中材足兼人志存及物出髙明之慶族接熈洽之盛期通班於朝揭節而使自簿書期會之纎悉莫不注心至山巖窟穴之幽深舉皆受賜足以救一時之敝故能得萬事之宜休聲所歸遠用行及伏惟遵時之順養氣以恬庶允輿人之情不違拙者之望到任謝職司諸官員狀右鞏比者祗命守邦涓辰視事維是孤蒙之質幸依庇冒之餘竊鞏才不逮人學多泥古久備官於冊府徒竊食於累朝兹假便藩實縁私請伏遇某官體仁為任充美在躬素自結於主知方出宣於使指歛時利澤播在東南籍甚休聲洽於中外顧忝属城之任實諧德宇之依尚阻參承但深欣忭福州囬曾侍中狀右鞏伏念自遠門闌荐更時序顧兹艱拙利在退藏雖有心誠嚮徃之勤而無書寄候問之禮敢期眷與特賜誨存獲承黼藻之褒彌見松筠之操其為感激但切銘藏属凝沍之在辰惟燕間之均福伏以致政太傅侍中素推仁傑蚤代天工意誠心正而家齊巳儀刑於王室功成名遂而身退遂表則於士倫聊曼衍以窮年坐優游而進道矧臧孫之有後繼周公之拜前阿衡之格于天書載君臣之德司徒之善其職詩稱父子之功方賴壯猷隂禆至治更冀上為邦國善保寢興禱頌之誠不勝懇悃移亳州囬人賀狀右鞏比縁懇請得假善藩既諧竊祿之私實獲事親之便慙無善政可稱厚恩豈謂某人特枉緘封曲垂奬録言為黼藻飾陋質以為榮操若松筠處大寒而不變其為感愧曷盡指陳惟溽暑之方隆諒燕居之多適更祈保攝用竚遷陞東府賀冬狀右鞏伏以氣動於微升一陽而方長物資其始萌萬寳於將亨伏惟某官行蹈中庸業存久大為生民之蓍蔡任王室之股肱四岳之亮天功其凝庶績百揆之熈帝載攸叙彛倫茂對休辰具膺繁祉鞏方祗官次阻詣門䦨西府賀冬狀右鞏伏以物資其始萌萬寳於將亨氣動於微升一陽於方長伏惟某官業存久大行蹈中庸為蓍蔡於生民任股肱於王室共武之服久專總於樞機秉國之均佇首當於衡軸對休辰而茂恊膺繁祉以具宜鞏限此守邦末縁為壽囬人賀授史館脩撰狀右鞏誤被上恩進專史事顧慙孤陋曷稱選掄伏念鞏齒髮蚤衰材資素薄差池一紀久流落於風波推徙七州寖沉迷於簿領詎期皓首獲奉清光抜於多士之中寵以非常之遇惟累朝之盛典垂列聖之洪名宜得異能使之實録豈伊鄙鈍可盡形容懼莫副於簡求方内懷於兢愧敢意眷私之厚特迂慶問之勤矧奬飭之踰涯俾夤縁而借重其為感幸難既敷陳囬人賀授舍人狀右鞏啓叨奉制恩進登詞掖誤蒙任属私積兢慙鞏器識少通性資多蔽非有為人之學徒堅好古之心矧齒髮之巳衰困風波而且久晩逢眞主獨賜重知取於寡與之中假以踰涯之寵甫專史筆遂掌訓辭惟清切之近班實論思之要地方驚冒處良用㥏顔未遑削牘之勤遽辱騰書之貺其為感佩曷罄敷陳元豐類藁卷三十七
