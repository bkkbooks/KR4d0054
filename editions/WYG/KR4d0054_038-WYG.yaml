body:
  text: 元豐類藁巻三十八宋曾鞏撰祭文祭歐陽少師文惟公學為儒宗材不世出文章逸發醇深炳蔚體備韓馬思兼莊屈垂光簡編焯若星日絶去刀尺渾然天質辭窮巻盡含意未卒讀者心醒開蒙愈疾當代一人顧無儔匹諫垣抗議氣震囬遹鼔行無前䟦㚄非恤世偽難勝孤堅竟窒紫微玉堂獨當大筆二典三謨生明藏室頓挫彌厲誠純志一斟酌損益論思得失經軆慮萌沃心造膝帝曰汝賢引登輔弼公在廟堂尊明道術清靜簡易仁民愛物歛不煩苛令無迫猝棲置木索里安戶逸櫝歛兵革天清地謐日進昌言從容密勿開建國本情忠力悉卯未之歲龍駕飈欻再極大艱垂紳秉笏乾坤正位上下有秩功被社稷華夷召畢公在廟堂總持紀律一用公直兩忘猜狔不挾朋比不虞訕嫉獨立不囬其剛仡仡愛養人材奬成誘掖甄㧞寒素振興滯屈以為已任無有廢咈維公平生愷悌忠實内外洞徹初終若一年始六十懇辭冕黻連章累歲乃俞所乞放意丘樊脫遺羈馽沉浸圖史左右琴瑟氣志浩然不陋蓬蓽意謂百齡重休累吉還幹鼎軸贊微計密云胡傾殂憗遺則弗聞訃失聲眥淚横溢戅㝠不敏早蒙振祓言繇公誨行繇公率戴德不酬懷情獨欝西望轜車莫持紖紼維公犖犖德義譔述為後世法終天不没託辭叙心曷究髣髴祭王逵龍圖文惟公有獨立之志不羈之材揚旌閩楚按節江淮止如山淵動若風雷衆皆異其施設曽孰測其津涯若夫拯急難於水火下雋傑於蒿萊越拘攣而不惑豈淺狹之能偕至於稱物引類興言寓懷遠恭騷雅近雜嘲諧麗兼組藻美軼瓊瑰皆足以聲駕多士望隆九陔然而位不過郎中名不過直閣流落白頭委蛇一壑豈人事之當然信命存於㝠漠昏愚不肖早辱公知拊循愛勉施及其私聞公之逝惻楚歔欷戴德莫酬寓薦以辭祭張唐公文熈寧六年六月一日維公作德于躬實方實厚實夷實訏實堅實茂彼嗜而爭我有不惑彼嫵為朋我肆而特我抗其辭維彼之黙始􅂱其華儒林禮官迺碩其實侍從之班維帝時咨維士時附尚其昌言式久在序告疾于朝迺長南服里無嘆聲士女輯穆以老得謝俶其歸裝車御未驅訃聞四方維余先人公同年友公子我姪又託婚媾實殽于豆實酒于觴馳辭告誠維以永傷祭孔長源文嗚呼長源㧞迹孤艱刻志勵力升德自幽迺不家食燕其壽母歸養以色興其士友跂我淳則微獨考古載辭于策亦從爾知有婉軍畫為長以舒為將不亟迺使荆粤銓材著職滅熄苛嬈蘇僵博瘠會稽之治里無猝迫初以詆去民實戴德卒還省部廷論之直維曰將歸東符之析孰云不幸奄與生隔有親九十世為楚惻維其篤行匪矜匪飾其彪為文其霈為澤天與厥後賢能交蹠有實有華光長譽白善豈無勸慶焉兹得維我與公綢繆平昔詩書討論相求以益我試于鄉自公考擇彌久彌親情隆意獲聞公之計泫然心䀌馳奠千里寓陳悃愊祭王平甫文嗚呼平甫决江河不足以為子之髙談䧺辯吞雲夢不足以為子之博聞強記至若操紙為文落筆千字徜徉恣肆如不可窮祕怪恍惚亦莫之係皆足以髙視古今傑出倫類而况好學不倦垂老愈專自信獨立在約彌厲而志屈於不申材窮於不試人皆待子以將昌神胡速子於長逝嗚呼平甫念昔相逢我壯子稚間託婚姻相期道義每心服於超軼亦情親於樂易何堂堂而山立忽泯泯而颷駛訃皎皎而猶疑淚汍汍而莫制聊寓薦於一觴纂斯言而見意祭宋龍圖文嗟乎次道公之一無之字於古今典章沿革得之於心山藏海積又於舊聞隱顯纎悉析之以口天髙日白公在朝廷羣公百司解惑釋疑公為蓍龜公在太史維僚與属正繆辨訛公為耳目今公亡矣廷有大議問故事者衆失其歸國有大典考前載者人失其師况公行不絶俗而動有常度言不忤物而辭無可疵靖退之風愈老而彌邵方直之操自信而不囬至於篤友尚舊比義親仁追徃烈而競逐豈庸態之能隣然而蚤蹈厲於儒館晚委蛇於從臣曾未得厯禁林之獻納任廊廟之彌綸何鸞儀而鵠峙忽颷逝而星淪哭公之喪者客不絶於門庭弔公之家者使相望於道路維昏鈍之少與獨綢繆而有素淚淋浪而莫收情忉怛而奚愬嗚呼唐季五君史曠其録公蒐亡而集霣盖旁羅而遠属至於帝宅神州祖功宗德咸在筆削具存方冊爭日月之光輝與天地而終極則公位雖屈而未盡名益久而逾章彼富貴而磨滅豈得公之毫芒纂余哀而以此聊寓薦於一觴祭亡妻晁氏文子有仁孝之行勤儉之德宏裕端莊聰明靜黙窮達能安死生不惑可以齊古淑人為世常則歸我之昔明年始笄言無疵悔動應衡規親踈悦慕稚艾嗟咨事姑之禮左右無違服難體順惟日孜孜諧我属人又篤以私有犯不校有勞不施人隆已約乃以為宜衣有穿弊珥無光輝曰順吾性餘復何為紛綸世務偪仄羣疑子陳得失効若蓍龜及其既退婉婉其儀不矜以色不伐以辭幽閒深謐度量誰窺吾貧口衆智不繼資脫粟藜藿具無鹽醯人不堪憂子獨怡怡綰綜雖愛不偏以慈訓誨惟謹曰宜幼時我扶我翼共處窮羇鋤荒補漏細大無遺嗚呼天禍我家降集㐫厲始來京師辛丑之歲子之方壯疾疢中傷孰云此日一女先亡子雖自達病豈宜然自秋至春有益無痊迎醫市藥我力為殫術寧非善不勝于天將逝之夕逆知其期語論自若精神不衰徧召室人告以長歸嗚呼哀哉父失賢女姑亡孝婦子喪嚴師吾虧益友時歲雖往悲酸則新禫月之終奠此一樽教養二子期獲子心時良返子託葬先林言如不復誰為我人長號叙哀寓以斯文祭晁少卿文鞏蚤以孤蒙與託嘉好自始迄今踰二十載繾綣相與義厚情親會合乖闊則有書問開紙披辭猶若際遇不意今者公遽淪亡得訃歔欷涕隨聲發海濵獨哭心與誰言仍聞歸旐旅次餘杭隔此濤江寓陳薄奠公乎知否巳矣奈何館中祭丁元珍文嗟乎元珍别子幾時孰謂子往無復來期子之為人渾厚平夷不阻為崖不巧為機朋僚悦附族黨懷依其動恂恂必應繩規其語諄諄不見瑕疵從事之畫吾無妄隨長人之政彼有遺思其蓄鈞石其出銖錙惟夫學問富有書詩濡墨操紙冩之文辭春陽滿野萬物榮滋匪營匪飾疊異并竒既精衆作於詩復尤清新俊逸與古為儔讀之灑然可破百憂哀鳥之秩天祿之遊謂淹已久既晩方收孰云未幾斥置南州書猶未復訃巳來投衆為哀傷况於吾属初疑終駭哭淚滿目莫紖子棺莫襚子服禮多不及情豈能忘寓辭千里侑此一觴朝中祭錢純老文嗚呼公乎窮經及史旁兼百氏廢寢與食不虚寸晷篤好無倦華顚愈勵强記多識箱輸屋偫闊議崇論河垂海委詩賦講説射䇿三科金馬玉堂經帷三職寒苦自至無馮與翼銓宗再試士曰予歸尹正三歲衆曰予依公於所聞維學之力公於所知則維自得利害之際人鮮能安彼為惴惴公獨桓桓愛惡之情人鮮自克彼有贅虧公為衡石世所並逐公有不求彼囂我靜則莫我尤曽不三事位云未究曽不百年數云非壽殱國之良在列嗟咨隤民之望耋艾歔欷天子聞喪馳使臨視勞侐㷀孤賙憐乏匱凡我同朝矧曰同志哀由感觸孰知失涕寓馬在庭薦羞在几公乎來哉寄誠兹誄祭李太尉文公先種德碩大于乆母宋仁祖維莊懿后公維后姪考異姓王入長六師外垣大邦不以貴盈遜悌慈良昭陵未遠公奄云亡輤車之東致薦一觴祭致仕湛郎中文維公卑以郎濳安於養志晩而家食曽不待年治績紀於朝廷行實推於鄉里淪亡未遠窀穸有期竊仰髙風敢陳薄奠又祭亡妻晁氏文鞏無狀遭禍早失賢妻徘徊京師零丁孤宦迺致旅櫬未就先塋夙夜思惟心顏愧怍今蒙恩補外道出東南敢啓菆宮進登舟御間關囬阻將致鄉園而鞏比至淮瀕迫趨官守其於奉承靈轝經涉大江方復假人經營護視永惟見亮尚頼有靈若夫觸冒川途幾數千里使保清謐則惟餘休至於推擇吉辰脩嚴葬禮俟得時日敢不躬親惟其鑒之故以情告代人祭李白文子之文章傑立人上地闢天開雲蒸雨降播產萬物瑋麗瑰竒大巧自然人力何施又如長河浩浩奔放萬里一㵼末勢猶壯大騁厥辭至於如此意氣飄然發揚儔偉飛黄駃騠軼羣絶類擺弃羈􅎗脫遺轍軌捷出横步志狹四裔側睨駑駘與無物比始來玉堂旋去江湖麒麟鳳凰世豈能拘古今僻儒鉤章摛字下里之學辭卑義鄙士有一曲拘牽泥滯亦或狡巧爭馳勢利子之可異豈獨兹文輕世肆志有激斯人姑熟之野予來長民舉觴墓下感嘆餘芬祭王都官文維公材敏而宏志眎萬里髙辭大篇出仕天子主簿于閩聲駕其長清江之謀矯矯逾壯于韶于昇條教出已伺公所為萬目齊眎奪奸于幽耋吏喪膽悍黨睢睢根柢卒斬里謳戶歌惟惸寡獨在右惟監在下惟属在側惟僚相講戴服將起將昌俞考以難曷赴曷歸忽殞無還公於先人實歡實厚至公諸子鞏辱親友於公家行表裏洞知於黨不校於尊不違出升公堂不撓毫髮退從其私婉婉曲折鍾山崢嶸下惟江水昔公此臨委蛇舄履今子六人葬公于此銘鞏之為辭貧事偉千里寄誠以兹一簋祭袁大監文於乎越蜀荆呉三方萬里公馬騑騑幞印而使蠻墟海聚獄無濫辭峨峨卭僰貨走京師東南之粟風䑺手筰歲填大倉萬艘尾錯遂副會府肆其心畫出屏于宣以我偃側九卿之行得謝以歸冕弁入里昔時布衣進退則然當世所嗟不貴以驕不富以奢翼翼其行坦坦其衷隤然順退長者之風白髮雖多几杖未隨笑言在耳巳哭于帷眷然撫我孰如公尤先人不幸託載公舟我生方屯戴德莫疇羞醪則微以陳我悲祭關職方文嗚呼關公以文中科以材為吏艱于厥初四十始仕終領兩州其治大肆告老于朝郎官以歸卿士大夫觀望嗟咨孰為公居竹水之寰孰為公園正據湖山公出公休八子侍側仕者大半同時共籍其聲顯揚其習順慈萬石之風百世相差有後如斯世誰能及而况公年躋于八十或如公壽莫如公安履勞撫少其意桓桓拜公以晚見託以姻書猶在几訃巳及門福祿之全在公奚憾念昔思來族親之感弔廬在東遠不及會泣叙斯文千里之外繾綣之情已於一酹祭黄君文嗚呼宋且百年號令萬里姦臣黜除尤者擯死巖材里秀驅駕而使盖君之生有時如此當世之官有微有盛盛者廟堂斟酌王命千𨽻百司進竢退聽出長四方玉斧金乘邦侯衆將傳牒而令微者紛紛或陪或正千品萬名各有操柄人皆敏手捷取能併君獨無求以死終病同時之人勤營善蓄萬籯儲金萬襲藏玉遺餘野積不能匱櫝君獨一身衣食常蹙兹非其命曷以至兹君能自達可以無悲親戚念君能不歔欷我之老姑歸君為婦與君厯年顚沛同有今對其孀寧匪我傷來問來弔屢至其堂葬君南山冬氣已烈薄醪時羞觴豆肅設侑以兹文與君一訣元豐類藁巻三十八
