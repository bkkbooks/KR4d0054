body:
  text: 元豐類藁巻四十五宋曾鞏撰誌銘金華縣君曾氏墓誌銘夫人嫁王氏為侍御史諱平妻姓曾氏泉州晉江人祖諱穆殿中丞追封魏國公考諱㑹尚書刑部郎中集賢殿修撰追封楚國公皆累贈太師中書令兼尚書令妣黄氏楚國太夫人未嫁承順父母盡子道既嫁夫家貧養姑盡婦道輔其夫盡妻道夫死寓食於潁以勤儉積日大其家以誘教不倦成其子又可謂盡母道也蓋其子五人回向固同冋皆有學行回有道為儒宗向冋尤有文三人皆身在隠約而聲震天下於是時夫人兄魯公公亮實為宰相當國然夫人處里舎彌約未嘗以為泰及其後回向同冋皆蚤世人以為難處夫人能自廣以理未嘗亂其志教養其孫至男有立女有歸熙寧之間魯公告老以太傅侍中就第夫人少魯公一嵗食其子禄皆居京師二人白首相顧怡然元豐元年春魯公薨四月丁卯夫人亦以疾終春秋七十有九夫人以夫恩封金華縣君以魯公恩賜冠帔子回忠武軍節度推官知陳州南頓縣事向峽州硤石縣主簿固大名府軍巡判官國子監主簿同陳州宛丘縣令冋蔡州新蔡縣主簿女嫁太子右贊善大夫陳臻古孫五人泌汾汶沂潢汾郊社齋郎汶試將作監主簿夫人既卒之明年某月某甲子葬潁之汝陰縣懷音鄉南髙村祔御史之兆其將葬也固以狀來乞銘惟夫人為子若婦為妻若母皆盡其道於囏阨流寄之中能立其家成就其子所以自處於通塞之際者無不當於理是其智術徳性過人逺甚宜得銘且余實與其子遊最舊乃不辭而為銘曰曽禹之苖氏自鄫子或言厥志有稱闕里或以孝顯於經實紀或守所聞羞踐霸軌遥遥千載歴世有聞自荆徂粤篤生夫人楚公之子魏公之孫魯公維伯御史是嬪迺立厥家自墜而興迺教厥子自幼而成巻服貂冠伯也在廷子也在幽碩實洪聲莫親巳宗莫重夫氏兩有其盛世誰與嫓維能既試維徳寔孚尚寵爾後列銘陰墟夀安縣君錢氏墓誌銘劉凝之仕既齟齬退處廬山之陽初無一畆之宅一㕓之田而凝之囂囂然樂若有餘者豈獨凝之能以義自勝哉亦其妻能安於理不戚戚於貧賤有以相之也凝之晩有宅於彭蠡之上有田於西澗之濵子進於朝廷薦於鄉閭凝之夫婦康寧夀考自肆於山川之間白髪皤然體不知駕乗之勞心不知機擭之畏世人之所慕者無慊焉聖人之有所不能及者獨得也其夫婦如此可不謂賢哉熙寧九年凝之年七十有七哭其妻之喪自為狀次其妻之世出行事來乞銘予為之因其言而識之曰夫人姓錢氏考内殿崇班穆祖考内閣使昭晟曽祖考宣徳軍節度使同中書門下平章事湛髙祖吳越文穆王元瓘夫人色莊氣仁言動不失繩墨居族人長幼親疎間盡其宜事夫能成其忠教子能成其孝是皆可傳者也夫人年七十有三卒於四月之庚子而𦵏於其嵗某月某甲子墓在南康軍西城之某原初以凝之恩封夀光縣君再以子恕恩封夀安縣君有子曰恕祕書丞曰格鄉貢進士皆以文學顯於世女嫁進士徐彦伯太子中允黄廉孫某某凝之名渙筠州某人今為尚書屯田員外郎致仕銘曰士不苟合安於賤貧其難其豫繇嫓有人維不終窶又夀以康有續孔辰既庶而臧世迫而求獨優以取世懦以處獨肆而有士也則然女實作輔考則錢媛尚配於古天長縣君黄氏墓誌銘夫人姓黄氏福州福清縣人祖諱某考諱偏皆仕閩越夫人嫁同縣林氏為殿中丞諱某之家婦尚書屯田員外郎諱某之妻有子曰概為太常博士集賢校理有孫八人曰希宣州涇縣主簿編校集賢院書籍曰旦明州象山縣令曰邵杭州南新縣令曰顔許州臨川縣令曰稽曰雄未仕也其二人早卒有曽孫十有二人曰睿虙虞虡虔膚據處其三人亦早卒夫人年七十有七治平四年正月癸丑卒於京師之昭化坊累封嘉興天長二縣君始殿中府君與其配福清縣太君鄭氏皆春秋髙安其鄉里不肯出屯田府君乃從事漳州泉州興化軍踰二十年終養而後去夫人能盡其力治飲食衣服以進及喪能盡其哀皆如其夫之志其子既就學夫人常夜治絲枲居其旁以勉之至其後其子遂以文學名天下既而其子不克夀屯田府君亦卒于官諸孫皆幼夫人巳老矣乃栖吳郡斥賣簪珥以經理其家絲蓄􅀈聚至有田以食有宅以居平居日夜課諸孫以學有不中程輙朴之及長遂多知名連以進士中其科涇縣復校書集賢世其父職夫人乃顧諸孫謂曰吾始得事祖姑今得弄曽孫遂保有汝家起于既墜吾老且死不恨矣涇縣既服夫人之喪以其柩歸吳郡寶華山某年某月某日附屯田府君之兆而屬余銘銘曰女職在宫行止於柔扶㣲捄阨則匪我謀勢有孔棘義不得寧任重于巳振壞為興我儲我積乃續烝嘗我字我飭乃襲印章蒼顛秀眉燕其作止其燕伊何維終受祉莫仁且智疇濟登兹播告無極視此銘辭仁夀縣太君吳氏墓誌銘仁夀縣太君撫州金谿吳氏尚書都官員外郎贈尚書刑部侍郎撫州臨川王公諱益之夫人衞尉寺丞諱用之之婦年六十有六嘉祐八年八月辛巳卒於京師十月乙酉𦵏於江寧府之蔣山夫人好學强記老而不倦其取舎是非有人所不能及者然好問自下於事未嘗有所專也其平生養舅姑甚孝蓋侍郎七十而少子五人吳氏出也然夫人之愛其長子甚於少子曰吾愛之甚於吾子然後家人愛之能不異於吾子也故其子孫巳壯大有不知為異母者居久之二長子前死夫人巳老矣每遇其嫠婦異甚而身為字其孤兒忘其力之憊也其處内外親疎之際一主於㤙有䜛訕踞罵已者數困苦常置之不以動聲色亦未嘗有所含怒於後也有以窮歸巳者急或分衣食不為秋毫計惜以其故至不能自給然亦未嘗不自若也其嫁三從之孤女如巳女而待長子之母族如巳族蓋篤行如此而天性之所有也其自奉養未嘗擇衣食其視世俗之好無足累心者方其隠約窮匱之時朝廷嘗選用其子堅讓至於數十或謂可强起之夫人曰此非吾所以教子也卒不强之及處顯矣其子尚有歸志而以不足於養為憂夫人曰吾豈不安於命哉安於命者非有待於外也其子為知制誥故事其母得封郡太君夫人不許言故卒不及封此夫人之徳見於行事之迹而余以通家故熟於耳目者也夫人之考諱畋畋之配黄氏兩人者皆有善行鄉里稱之而黄氏兼喜陰陽數術學故夫人亦通於其説七子者曰安仁安道安石安國安世安禮安上安仁宣州司戸參軍安石尚書工部郎中知制誥安世太平州當塗縣主簿安禮大名府莘縣主簿餘未仕也女三人長適尚書虞部員外郎沙縣張奎次適前衢州西安縣令天長朱明之次適揚州沈季長孫男九人曰雱旉旁旄􅣆防斿旂放孫女九人長適解州安邑縣主簿徐公翊次許嫁太廟齋郎吳安持餘尚幼銘曰嗟若人兮洵好善兮始終一徳仁七子兮遺棄細故篤九族兮脫珥推食光惠施兮以義易利能無累兮縱心委命志彌邵兮謂宜百嵗奄忽逝兮風有采蘋經所首兮原念美實輯此辭兮庶㡬徳音與古對兮夀昌縣太君許氏墓誌銘夫人許氏蘇州吳縣人考仲容太子洗馬兄洞名能文見國史夫人讀書知大意其兄所為文輒能成誦父母衣食服御待之而後安既嫁惇行孝謹宜於其家其夫為吏有名稱夫人實相之及春秋髙於内外屬為髙曽軰行而慈幼字㣲愈久彌篤故親疎懷附無有惡斁昔先王之治必本之家達於天下而女子言動有史以昭勸戒後世以古為迂為政者治吏事而巳女子之善既非世教所奬成其事實亦罕發聞於後其苟如此其衰㣲所以益甚則夫人之事其可使無傳也哉夫人嫁沈氏其夫諱周太常少卿贈尚書刑部侍郎其舅諱某贈兵部尚書杭州錢塘人夫人封六安縣君夀昌縣太君年八十有三熙寧元年八月丁巳卒於京師二年八月某甲子合𦵏杭州錢塘縣龍車原子曰披國子博士有吏材曰括掦州司理參軍館閣校勘有文學其幼皆夫人所自教也女二人蚤卒銘曰生民之治必本於身教行於家餘以為人世弊俗偷恕於在已内替常度外彊於理淑惟夀昌學與心成篤於孝慈匪勸而能有翼於夫有迪於子尚類古人其傳以此徳清縣君周氏墓誌銘夫人姓周氏湖州長興人曽大父諱某大父諱某父諱某嫁同縣陳氏為秘書省著作佐郎諱某之妻為人柔嫕靜莊在父母家至歸於夫氏本於自脩而卒於能孚於屬人陳氏有姒婦寡居當家事夫人常曲意下之於事常退避不敢與姒婦以其故顧夫人甚歡而親疎觀者莫不悦著作有田數千畆而愛士好施夫人常悉力助之以其故至不能自給而夫人處之自若遇子之非巳出者與已子無毫髪厚薄意人以為過人而夫人若有所不及也享年三十有五封徳清縣君子曰樞為尚書屯田員外郎曰楷曰權未仕也卒於慶厯五年之二月辛丑𦵏於熙寧三年之三月庚申其墓在長興縣永昌鄉卞山之陽銘曰嗟淑人體明徳外惟均内自克不永年隕嬪則兆親宫藏石刻夫人周氏墓誌銘夫人諱琬字東玉姓周氏父兄皆舉明經夫人獨喜圖史好為文章日夜不倦如學士大夫從其舅邢起學為詩既嫁無舅姑順夫慈子嚴饋祀諧屬人行其素所學皆應儀矩有詩七百篇其文靜而正柔而不屈約於言而謹於禮者也昔先王之教非獨行於士大夫也葢亦有婦教焉故女子必有師傅言動必以禮養其徳必以樂歌其行勸其志與夫使之可以託㣲而見意必以詩此非學不能故教成於内外而其俗易美其治易治也兹道廢若夫人之學出於天性而言行不失法度是可賢也已其夫來乞銘予與之親且舊故為之序而銘之蓋夫人之王父諱協為尚書刑部郎中父約今為尚書虞部員外郎青州益都人也夫人嫁闗氏為徐州豐縣令景仁之妻為尚書職方員外郎贈尚書都官郎中諱魯之子婦生一男二女年二十有六卒於治平二年之九月某甲子𦵏於杭州錢塘縣履泰鄉葛松原實某年某月某甲子闗氏錢塘人也銘曰女有圖史傳於師氏其勸以樂其康以禮能此非他繇學而已王政之興蓋自此始今孰登兹維周之媛學繇自好終之不倦言循於矩行循於典尚配古人輝光日逺永安縣君謝氏墓誌銘宋故衞尉寺丞王公諱用之之夫人尚書都官員外郎贈尚書工部郎中諱益之母姓謝氏累封永安縣君其卒皇祐五年之六月十四日其𦵏於撫州金谿縣某鄉某原既卒之百有五十一日也其子曰益曰某皆已卒曰某曰某曰孟楚州司理參軍亦已卒其孫曰安仁宣州司戸參軍曰安道皆已卒曰安石殿中丞通判舒州曰沆荆南府建寧縣令曰安國曰安禮其曽孫曰某曰某曰某其墓工部故人之子曽鞏誌之曰王氏由工部之叔父尚書主客郎中贈太常少卿諱觀之始起家為能吏遂追榮其父諱某為尚書職方員外郎至於工部父子遂皆進於朝為聞人其世浸大夫人及拜其舅與夫之榮而享其子與孫之禄其夀至於九十其卒於撫州之臨川安於其寢余既與夫人之諸孫遊而嘗得拜於堂上見其色和其容謹聞其言儉而勤退而聞其為婦順為母慈知其所以享其福禄者其宜也已余嘗觀詩人之歌其后妃至於諸侯大夫之妻内脩法度輔佐其夫而其效之見則兎罝之人至於江漢汝墳之婦女皆承其化而篤於禮余固歎其當是之時上下之間内外相飭何其至也如夫人之資而使出於其時則必有歌於風而被之於無窮之事若余之鄙其亦曷能知其所至也哉謝氏之祖曰某考曰某銘曰士顯其施其行易知女處於私其有孰窺嚴嚴秀眉不見缺虧曷以長之眎此銘辭永安縣君李氏墓誌銘夫人姓李氏其先燕人而今家許州之長葛贈太子太傅諱譚之曾孫贈禮部尚書諱運之孫贈刑部尚書諱昌言之女而母晉平縣君聶氏也夫人嫁駱氏駱氏亦家許州之長葛其夫諱與京為某官檢校某官知某州享年七十有九封永安縣君有子男四人長吉逢吉元吉皆三班奉職早卒嘉福今為右班殿直女三人亦早卒夫人以嘉祐八年十一月丙辰卒於其家之正寢而以熙寧二年十月𦵏於許州長社之舞鸞鄉白兎里祔駱侯之塋夫人仁孝慈恕言動必擇義理事父母不違其教事舅姑不違其志事夫順而有以相其善遇子至於内外屬人一以恩而不違於禮初刑部之兄昌齡當太宗真宗時輔朝政李氏族大而貴然刑部嫁女常擇寒士而至其後多為名臣范文正公仲淹鄭文肅公或與駱侯是也夫人之弟光禄少卿禹卿余妻父也寔𦵏夫人故屬余銘銘曰性有能否行有失得一當於理士有不克淑哉夫人秉是壼彛周旋大小無過無虧貴不稱徳夀則謂遐維藏在許永裕厥家試秘書省校書郎李君墓誌銘君諱迂字明逺姓李氏為人孝友慈恕讀書務大㫖生五代之際再試明經不合退居楚丘有田百餘頃皆推與其族人獨留五頃而巳曰無令子孫以財自累也宋初秘書監彭君薦其行義詔以為試秘書省校書郎而君終不肯强起淳化三年壬辰九月二十一日以疾卒於家享年八十有四維李氏逺出於臯陶而其後李耳之孫曇為秦司徒曇子璣璣子牧事趙始家趙郡牧子汨汩子左車於趙號廣武君廣武君子遐涿郡太守遐子岳諌議大夫岳子秉潁川太守又徙家潁川秉七世子膺河南尹膺子瑾復家趙瑾曾孫楷晉治書侍御史有子五人曰輯晃芬勁叡以所居巷東西自别故勁稱西祖勁子隆後魏阜城令隆後九世棲筠唐御史大夫贊皇文獻公文獻公子吉甫相憲宗吉甫子徳脩楚州刺史徳裕相文宗武宗楚州子煴宋州宋城令君曾祖也又徙家宋之楚丘故今為楚丘人宋城子確萊州膠水令君祖也膠水子譚磁州邯鄲令君考也邯鄲之少子運為太常少卿有子曰昌齡太宗真宗時為尚書戸部侍郎參知政事故膠水贈太子少保邯鄲贈太子少傅君娶丁氏王氏王氏有子曰昌震為建州松溪令贈尚書駕部郎中駕部有子曰漢卿今為諸王府侍講尚書虞部員外郎虞部有子曰彦龍彦龍復有子四人矣君卒後七十四年治平三年丙午四月某甲子虞部𦵏君於開封府開封縣保安鄉永寧里之原以王夫人從銘曰不累於物全吾質兮不羈於世遂吾志兮作宅新原維孝孫兮納銘幽扄永淑聲兮試秘書省校書郎李君妻太原王氏墓誌銘夫人姓王氏太原人嫁趙郡李氏為磁州邯鄲令贈太子少傅諱譚之冡婦試秘書省校書郎諱迂之妻為人明識强記博覽圖籍子孫受學皆自為先生其行仁孝慈恕始於為女中於為婦終於為母無不盡其道享年八十大中祥符三年庚戌十二月己巳卒於虢州盧氏縣其子之官舎子曰昌震建州松溪令贈尚書駕部郎中駕部子曰漢卿令為諸王府侍講尚書虞部員外郎虞部嘗為李氏九世譜其博而詳多夫人之所為言也治平三年丙午四月丁酉虞部以夫人之喪從校書君𦵏於開封府開封縣保安鄉永寧里之原銘曰嗚呼夫人既有其質又賜爾力古有遺辭罔不采獲克踐以躬亦畀爾息維瘞有銘尚以載徳池州貴池縣主簿沈君夫人元氏墓誌銘夫人姓元氏錢塘人祖諱徳昭事吳越國王錢氏宋興贈太保考諱好文尚書比部員外郎贈某官嫁吳興沈氏其舅為尚書屯田郎中諱某一作玊其夫為池州貴池縣主簿諱播夫人在父母家内外上下親疎長幼皆宜之年十有七而嫁既嫁如在父母家時貴池君早世無兄弟太夫人春秋髙諸子尚幼夫人年三十餘於羈旅單獨之中闔門事姑能盡其孝教養諸子至其後皆為成材能世其先人方其憂戚囏阨之時人恐其不能堪夫人既奮厲經理以保有其家又退能自安不亂其志是人之所難而其後世之不可以無述者也夫人年七十以治平二年某月某日卒卒之若干日𦵏真州揚子縣甘泉鄉三城里北山之原子男四人皆進士曰伯莊未仕曰季長越州司法參軍曰叔通秘書省著作佐郎曰次通試將作監主簿貴池君於先人為同年友而諸子又與余遊故為銘銘曰元出於危於東得姓有保有郎重世之盛允淑夫人集享家慶來嬪沈宗作徳維令處平不盈在險能正姑曰㣲婦余老誰據子曰㣲母余幼誰怙自振單弱卒持艱急老肆而安幼强以立實保沈宗自替而昌有烈如此何愧烝嘗後世原美孰可無述刻辭幽宫庶㡬不沒雙君夫人邢氏墓誌銘夫人邢氏無為軍巢人也嫁為贈大理寺丞姓雙氏諱華之妻封萬年縣太君子男三人曰漸為尚書屯田員外郎通判吉州軍州事餘未名皆早夭夫人年八十有六嘉祐四年九月二十七日卒於宣州之官舎六年十二月二十七日葬於無為軍巢縣無為鄉惲良里之原方大理府君之在隠約屯田始就書學夫人能經理其家使無内憂以卒就其志及屯田有列於朝夫人食其禄養就封大縣實受成報天之施與善人豈非信哉夫人之在疾也屯田之配長夀縣君陳氏共養營救有過人之行州上其事天子聞而嘉之勅州使致粟帛賜其家於是人知夫人之善不獨能成其子又能化其家也銘曰允淑夫人秉是壼彛有韡車服維寵嘉之𦵏其卜壤其吉在斯推求美實眎此銘辭旌徳縣太君薛氏墓誌銘夫人姓薛氏累封旌徳縣太君為故太子右清道率府副率致仕贈右監門衞將軍姓段氏諱某之妻今提㸃江南東路刑獄公事禮賔副使名某之母某州某縣人也大父諱某當吳越錢忠懿王時娶王女為王國官父諱某祥符初為東頭供奉官供奉常將屯宫門而監門之父右班殿直諱某者屯三陽二人者以意氣喜相得也遂以夫人歸段氏夫人性柔淑能和其屬人自珮服櫛珥凡資巳者常出於儉而有餘好施雖盡費不以為侈也生男一人禮賔也女二人長適開封黄思問次適吳郡潘孝孫皆進士夫人年四十有三大中祥符七年五月某甲子以疾卒於京師之敦教坊某年某月某甲子祔其夫人柩𦵏於某州之某縣某鄉某所之原前𦵏禮賔稱夫人之行與其世序封號之詳託銘於南豐曾鞏為述而銘之曰約乎已厚乎人發其積在子孫韡兮翟列封君硈兮石瑑銘文永興尉章佑妻夫人張氏墓誌銘夫人姓張氏建安人父諱士龍舉進士嫁同郡章氏為永興尉佑之妻所出三男四女曰造适述皆舉進士造及第為清海軍節度掌書記女嫁俞瑾徐立之陳震亦皆舉進士其一蚤死初永興府君起家二十年止於為尉及死三男尚幼造既起又蚤死已而适亦死夫人維能忘其貧所以使其夫能屈於小官而説維能務其生所以使其子能安於幼學而成維能順其性所以居流離顛頓之間而不為悲哀愁憂亂其志也其為人卑極於順其為人尊極於慈推於其䟽宗逺屬之間極於愛男之有不能葬者為葬之女之有不能嫁者為嫁之忘其力之匱而為之也此皆古今學士儒者所難而女子之善能如此此非可銘者歟嘉祐二年十一月三十日卒於洪州之私第即以其年十二月十八日𦵏於洪州某州之某鄉某原銘曰彼以吾窮我以吾仁二者皆天吾樂而因夀止七十豈不得年維其有之愈逺彌傳福昌縣君傅氏墓誌銘福昌縣君姓傅氏㑹稽人尚書職方員外郎霖之女同郡尚書職方員外郎闗公魯之妻後闗公五年至和三年二月丙申卒於家年六十有四子男八人景棻景元景仁希聲杞景山景宣景良女一人景華嫁著作佐郎史叔軻福昌君在家為父母所器異既嫁而夫屬無退言布衣惡食身治細㣲故闗公之禄及其䟽昆弟姊妹之孤其事闗公正以從其教子慈以肅闗公起進士為郎為池䑓兩州年八十以歸曰吾少得盡力於官而老得自休於家不以家事累吾志者以有夫人也八子學行脩立景芬希聲杞同時皆中進士夫人之卒景芬為江陰尉希聲寳應尉把和州判官景元亦以父恩為廣徳尉皆能其官景仁而下皆有聞於人寔受教於夫人也始闗公既貧而孤其仕與婚又皆後至其終有百口為大家福昌君維厚勤薄養所以經理其微維可否以明行止以公善訓能使誠恕愛人所以使其家有節法以有其成也某月甲子從𦵏錢塘之某原其子來屬以銘景宣予妹婿也宜為銘其辭曰闗氏爰昔始如萌芽臺州奮拔垂寔敷華進勤退佚不䘏其家繇嫓有人作其内治孰致其休不懈於勩孰致其隆不簡於細髙明純約坦坦其夷無怨無疵小大化之有容有則婦子順之公為朝老子宦以成象衣華軼我止我行巍冠文笏我翼我承公曰㣲子誰據誰依子曰㣲母莫濟登兹云誰無母其孰無妻為妻為母如我誰亢生雖有止存也其長鴻鴻號聲垂此銘章沈氏夫人墓誌銘夫人姓沈氏其先家於越之㑹稽曽祖仁諒令海州之朐山徙家於和州歴陽故今為歴陽人祖平贈尚書刑部侍郎父立今為右諫議大夫判都水監母馮氏濮陽縣君董氏仁夀郡君夫人年二十有二嫁揚州進士朱延之有子三人寅萬廣女五人尚幼夫人年四十有五卒於熈寧元年十一月之庚辰𦵏於某年某月之某甲子其墓在揚州天長之秦蘭里夫人為人柔閒靜專事父母盡子道事姑長興縣太君賈氏盡婦道事夫盡妻道為母及與内外屬人接一皆盡其道故其處也愛於其家其嫁也夫之屬人上下逺近皆愛之而其殁也哭之者皆哀是不宜無銘而朱君余舅也屬余銘銘曰媛維沈女經徳以身柔嫕靜簡一作間孚於屬人維祉在後有子詵詵瑑詩告美愈逺彌新夀安縣太君張氏墓誌銘夫人姓張氏濟州鉅野人嫁為同郡尚書駕部員外郎贈開府儀同三司吏部尚書晁公諱遘之夫人而為贈太傅諱佺之子婦有子男四人曰宗曜進士曰宗裕光禄少卿曰宗願真州軍事推官曰宗懿尚書司門員外郎女一人嫁進士桑况夫人初封清河縣君累封清河夀安縣太君年八十有七卒於熙寧二年之十一月某甲子𦵏於某年之某月某甲子其墓在開封府祥符縣旌孝鄉合儀同之兆卒時子宗曜宗願皆已死既而光禄居喪以疾亦死而諸孫男女凡三十人男多巳仕女多已嫁矣夫人為人仁厚莊靜自為女及既嫁處内外親尊卑長幼親疎之際無不當於禮而恩稱之其長者皆以為善事我而平居為等夷及少者莫不願以為歸也雖老未嘗懈而雖疾未嘗有惰容維其初終受養收封既夀而康實備成福可謂盛矣余之亡妻於夫人之孫女為第三而光禄之長女也知夫人之行為尤詳故為之銘曰女婉張氏處躬以厚來嬪晁宗太傅維舅儀同維夫卿士維子有孫詵詵亦紹厥美累封備養維康以夀徳則既成福亦多有納詩新藏尚告爾後元豐類藁巻四十五
