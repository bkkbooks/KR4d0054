body:
  text: 元豐類藁巻十宋曾鞏撰傳洪範傳惟十有三祀王訪于箕子王乃言曰嗚呼箕子惟天陰騭下民相恊厥居我不知其彞倫攸叙箕子乃言曰我聞在昔鯀陻洪水汩陳其五行帝乃震怒不畀洪範九疇彞倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彞倫攸叙何也武王嘆而謂箕子天不言而黙定下民相助恊順其所居居謂所以安者也而我不知其常理所次叙箕子乃言我聞在昔鯀之治水也至於五行皆亂其陳列故上帝震怒不與之以洪範九疇而常理所以敗鯀則殛死及禹繼而起天乃與之以洪範九疇而常理所以叙盖水之性潤下而其為利害也尤甚故鯀之治水也陻之則失其性而至於五行皆亂其陳列及禹之治水也導之則得其性而至於常倫所以叙常倫之叙者則舜稱禹地平天成六府三事允治萬世永賴時乃功也其曰天乃錫禹洪範九疇盖易亦曰洛出書然而世或以為不然原其説之所以如此者以非其耳目之所習見也天地之大萬物之衆不待非常之智而知其變之不可盡也人之耳目之所及亦不待非常之智而知其不能逺也彼以非其所習見則果於以為不然是以天地萬物之變為可盡於耳目之所及亦可謂過矣為是説者不獨蔽於洪範之錫禹至鳯凰麒麟𤣥鳥生民之見於經者亦且以為不然執小而量大用一而齊萬信臆決而疑經不知其不可亦可謂惑矣五行五者行乎三才萬物之間故初一曰五行其在人為五事故次二曰敬用五事五事敬則身修矣身修然後可以出政故次三曰農用八政政必恊天時故次四曰恊用五紀修身出政恊天時不可以不有常也常者大中而已矣故次五曰建用皇極立中以為常而未能適變則猶之執一也故次六曰乂用三德三德所以適變而人治極矣極人治而不敢絶天下之疑故次七曰明用稽疑稽疑者盡之於人神也人治而通於神明者盡然猶未敢以自信也必考已之得失於天故次八曰念用庶徵徵有休咎則得失之應於天者可知矣猶以為未盡也故次九曰嚮用五福威用六極福極之在民者皆吾所以致之故又以考己之得失於民也敬本諸心而見諸外故五事曰敬用用其厚者固治人之道也故八政曰農用農厚也天時恊則人事得故五紀曰恊用謹其常則中不可不立也故皇極曰建用建立也乂者所以救其過持其常也故三德曰乂用明則疑釋故稽疑曰明用庻徵之見於天不可以不念故庶徵曰念用福之在于民則宜嚮之故五福曰嚮用極之在于民則宜畏之故六極曰威用威畏也凡此者皆人君之道其信不可雜而其序不可亂也推其為類則有九要其始終則猶之一言而已也學者知此則可以知洪範矣一五行曰水曰火曰木曰金曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘何也盖爰者於也潤下炎上者言其所性之成於天者也曲直從革者言其所化之因於人者也於是稼穡而不及其他者於是稼穡亦言其所化之因於人者也不及其他者莫大乎於是稼穡也夫潤下炎上言其所性之成於天者然水導之則行潴之則聚火燃之則熾宿之則壯則其所化亦未甞不因之於人也或曲直之或從革之或稼穡之言其所化之因於人者然可以曲直可以從革可以稼穡則其所性亦未甞不成之於天也所謂天不人不因人不天不成者也其文所以不同者非固相反所以互相明而欲學者之自得之也潤下者水也故水曰潤下炎上者火也故火曰炎上木金亦然惟稼穡則非土也故言其於是稼穡而已者辭不得不然也又言潤下所以起鹹炎上所以起苦曲直所以起酸從革所以起辛稼穡所以起甘者凡為味五或言其性或言其化或言其用或言其味者皆養人之所最大者則不言此所以為要言也虞書禹告舜曰政在養民而陳養民之事則曰水火金木土榖惟修與此意同也二五事曰貎曰言曰視曰聽曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖何也盖自外而言之則貌外於言自内言之則聽内於視自貌言視聽而言之則思所以為主於内故曰貌曰言曰視曰聽曰思彌逺者彌外彌近者彌内此其所以為次序也五者思所以為主於内而用四事於外者也至於四者則皆自為用而不相因故貌不恭者不害於言從視不明者不害於聽聰非貌恭言從然後能哲能哲然後能謀能謀然後能思而至於聖也曰思曰睿睿作聖者盖思者所以充人之材以至於其極聖者人之極也孟子曰人之性或相倍蓰而無筭者不能盡其材不能盡其材者弗思耳矣盖思之於人也如此然而或曰不思而得何也盖人有自誠明者不思而得堯舜性之是也所謂誠者天之道也有自明誠者思之弗得弗措也湯武身之是也所謂思誠者人之道也然而堯舜湯武之德其至皆足以動容周旋中禮則身之者終亦不思而得之也堯舜性之矣然堯之德曰欽明文思盖堯之所以與人同者法也則性之者亦未甞不思故曰誠則明矣明則誠矣而性之身之者及其成孟子皆以為盛德之至也箕子言思所以作聖孟子言弗思故相倍蓰而無筭其所言者皆法也曰視曰明明作哲聽曰聰聰作謀者視之明無所不照所以作哲聽之聰無所不聞所以作謀也人之於視聽有能察於閭巷之間米鹽之細而不知蔽於堂阼之上治亂之幾者用其聰明於小且近故不能無蔽於大且逺也古之人知其如此故前旒蔽明黈纊塞聰又以作聰明為戒夫如是者非塗其耳目也亦不用之於小且近而已矣所以養其聰明也養其聰明者故將用之於大且逺夫天下至廣不可以家至户察而能用其聰明於大且逺者盖得其要也昔舜治天下以諸侯百官而總之以四岳舜於視聽欲無蔽於諸侯百官則詢于四岳欲無蔽於四岳則闢四門欲無蔽於四門則明四目達四聰夫然故舜在士民之上非家至戸察而能立於無蔽之地得其要而已矣其曰明四目達四聰者舜不自任其視聽而因人之視聽以為聰明也不自任其聰明而因之於人者固君道也非君道為然也不自任其聰明而因之於人者固天道也故曰天聰明自我民聰明又曰惟天聰明惟聖時憲舜於聰明下盡人上參天斯其所以為舜也舜之時至治之極也人豈有欺舜者哉舜於待人亦豈疑其欺己也然而訪問反復相參以考察又推之於四面若惟恐不能無所蔽者盖君天下之體固不得不立於無蔽之地也立於無蔽之地者其於視聽如此亦不用之於小且近矣夫然故蔽明塞聰而天下之情可坐而盡也言曰從從作乂者易曰出其言善則千里之外應之出其言不善則千里之外違之則言之要為可從而已也言為可從也則其施於用治道之所由出也古之君人者知其如此故其戒曰愼乃出令令出惟行弗惟反又曰其惟不言言乃雍而舜以命龍亦曰夙夜出納朕命惟允言之不可違如此貌曰恭恭作肅者孟子曰今夫蹶者趨者是氣也而反動其心故曰持其志無暴其氣盖威儀動作見於外者無不恭則生於心者無不肅也傳曰人受天地之中以生所謂命也禮義威儀之則所以定命也故顔淵問仁孔子告之以視聽言動以禮而衛之君子所以稱仁者亦曰威儀棣棣不可選也貌之不可慢如此也存其思飬其聰明而不失之於言貌故堯之德曰欽明文思言貎者盖堯之所謂文則雖堯之聖未有不先於謹五事也三八政曰食曰貨曰祀曰司空曰司徒曰司寇曰賓曰師曰食曰貨曰祀曰賓曰師稱其事者達乎下也曰司空曰司徒曰司寇稱其官者任乎上也人道莫急於飬生莫大於事死莫重於安土故曰食曰貨曰祀曰司空孟子以使民養生送死無憾為王道始此四者所以不得不先也使民足於養生送死之具然後教之教之不率然後刑之故曰司徒曰司寇此􅂜倫之序也其教之也固又有叙可得而考者古之欲明明德於天下者必始於知至意誠心正然後身修身修然後國家天下治以是為大學之道百王莫不同然而見於經者莫詳於堯盖欽明文思堯之得於心者也克明峻德有諸心故能求諸身也以親九族九族既睦有諸身故能求諸家也平章百姓百姓昭明有諸家故能求諸國也恊和萬邦黎民於變時雍有諸國故能求諸天下也積於其心以至於身修此堯之所以先覺非求之於外也積於其家以至於天下治此堯之所以覺斯民非強之於耳目也夫然故堯之治何為也哉民之從之也豈識其所以從之者哉此先王之化也然以是為無法立司徒之官以教之者法也教之者導之以效上之所為而已也養之於學所以使之講明文之以禮樂所以使之服習皆教之之具也使之講明者所以達上之所為使之服習者所以順上之所為所謂效之也上之所有故下得而效之未有上之所無下得而效之也當堯之時萬邦黎民之所效者堯之百官百官之所效者堯之九族九族之所效者堯之身而導之以效上之所為者舜為司徒也舜於其官則又愼徽五典身先之也然後至於五典克從民效之也及舜之時舜之導民者固有素矣然水害之後其命契為司徒則猶曰百姓不親五品不遜敬敷五教在寛盖憂民之不親而念其不順上之化命之以謹布其教而終戒之以在寛豈迫蹴之也哉其上下之際導民者如此此先王之教也為之命令為之典章為之官守以致於民此先王之政也盖化者所以覺之也教者所以導之也政者所以率之也覺之無可言未有可以導之者也導之無可言未有可以率之者也而况於率之無可言而欲一斷之以刑乎孟子曰徒善不足以為政徒法不能以自行其所謂善覺之者也其所謂法導之者也其所謂政率之者也其相須以成未有去其一而可以言王道之備者也先王之飬民而廸之以教化如此其詳且盡矣而民猶有不率者故不得不加之以刑加之以刑者非可已而不已也然先王之刑固又有叙矣民之有罪也必察焉𤯝也過也非終也雖厥罪大未加之以刑也民之有罪也必察焉非𤯝也非過也終也其飬之有所不足其教之有所不至則必責己而恕人故湯誥曰惟爾萬方有罪在予一人予一人有罪無以爾萬方如是故以民之罪為自我致之未加之以刑也民之有罪必察焉其養之無所不足教之無所不至不若我政人之有罪矣民之罪自作也然猶有漸於惡者久而䝉化之日淺者則有曰勿庸殺之姑惟教之未加之以刑也民之有罪非𤯝也非過也終也自作也教之而猶不典式我也則是其終無悛心衆之所棄而天之所討也然後加之以刑多方之所謂至于再至于三者也故有雖厥罪小乃不可以不殺用刑如此其詳且愼故先王之刑刑也其養民之具教民之方不如先王之詳且盡未有可以先王之刑刑民者也矧曰其以非先王之刑刑民也昔唐虞之際相繼百年天下之人四罪而已及至於周成康之世刑措不用亦四十餘年則先王之民加之以刑者殆亦無矣先王之治使百姓足於衣食遷善而逺罪矣人之所以相交接者不可以廢故曰賓賓者非獨施於來諸侯通四夷也人之所以相保聚者不可以廢故曰師師者非獨施於征不庭伐不悛也八政之所先後如此所謂彛倫之叙也不然則彛倫之斁而已矣四五紀曰歲曰月曰日曰星辰曰厯數盖恊之以歲恊之以月恊之以日者所以正時而恊之以星辰者所以考其驗於顯也恊之以厯數者所以考其驗於微也正時然後萬事得其叙所謂厯象日月星辰期三百六旬有六日以閏月定四時成歲也五皇極皇建其有極歛時五福用敷錫厥庻民惟時厥庻民于汝極錫汝保極凡厥庻民無有淫朋人無有比德惟皇作極何也言大建其有中故能聚是五福以布與衆民而惟時厥衆民皆于汝中與汝保中盖中者民所受以生而保中者不失其性也凡厥衆民無有以淫為朋人無有以比為德盖淫者有所過也比者有所附也無所過無所附故能惟大作中也人謂學士大夫别於民者也凡厥庻民有猷有為有守汝則念之不恊于極不罹于咎皇則受之而康而色曰予攸好德汝則錫之福時人斯其惟皇之極無虐煢獨而畏高明人之有能有為使羞其行而邦其昌何也言厥庻民有猷有為有守者汝則念其中不中其不恊于中不罹于咎若狂也肆矜也亷愚也直之類大則受之言大者非小者之所能受也而安汝顔色而謂之曰予攸好德所以教之使協於中也有猷有為有守而不罹于咎者民之有志而無惡者也不恊于極者不能無所過而已教之則其從可知也如是而汝則與之以福富之以禄貴之以位所以示天下之人而使之勸也如此則是人斯其惟大之中矣夫剛不中者至於虐煢獨柔不中者至於畏高明今也惟大之中故剛無虐煢獨柔無畏高明所謂剛而無虐柔而立也盖剛至於虐煢獨則六極惡之事也柔至於畏高明則六極弱之事也惟皇之極則五福攸好德之事所以言之者不同至其可以推而明之也則猶一言而已也洪範於皇極於三德於五福六極言人之性或剛柔之中或剛柔有過與不及故或得或失而其要未甞不欲去其偏與䕫之教胄子臯陶之陳九德者無以異盖人性之得失不易乎此而所以教與所以察之者亦不易乎此也教之福之而民之恊于中者如此又使有能有為者進其行而不已則久而後能積積而後能大大而後能著人材之盛如此而國其有不興者乎故曰人之有能有為使羞其行而邦其昌也凡厥正人既富方榖汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎何也言凡正人之道既富之然後可以責善責善者又始于汝家使無所好于汝家則是人斯其辜矣既言不能正家以率之則陷人於罪又言不好德之人而汝與之福其起汝為咎而已故曰于其無好德汝雖錫之福其作汝用咎也自皇建其有極至使羞其行皆所以教也而於此乃曰凡厥正人既富方榖又曰使無好于而家時人斯其辜者明教之又本於富行之又始於家其先後次序然也無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極何也無偏無陂遵王之義者無過與不及無偏也無不平無陂也所循者惟其宜而無適莫遵王之義也無有作好遵王之道無有作惡遵王之路者作好作惡偏於己之所好惡者也好惡以理不偏於己之所好惡無作好作惡也所循者通道大路而不由徑遵王之道路也道路云者異辭也無偏無黨王道蕩蕩者存於已者無偏則施於人者無黨無偏無黨也其為道也廣大而不狹吝王道蕩蕩也無黨無偏王道平平者施於人者無黨則存於己者無偏無黨無偏也其為道也夷易而無阻艱王道平平也無反無側王道正直者無所背無所反也非在左而不得乎右在右而不得乎左無側也其為道也所止者不邪所由者不曲王道正直也如是所以為王之義為王之道為王之路明王天下者未有不如是而可也㑹于有極者來而赴乎中也歸于有極者往而反乎中也由無偏以至無側所知者非一曲所守者非一方推天下之理達天下之故能大而不遺小能逺而不遺近能顯而不遺微所謂天下之通道也來者之所赴歸者之所反中者居其要而宗之者如此所應者彌廣所操者彌約所謂天下之大本也君人者未有不由此而國家天下可為者也其可考於經則易之智周乎萬物道濟乎天下故不過其可考於行事則舜之執其兩端而用中於民湯之執中立賢無方能推其無偏陂無作好惡無偏黨無反側之理而用其無適莫無由徑無狹吝無阻艱無所背無在左而不得乎右在右而不得乎左者以通天下之故而不泥執其所㑹所歸之中以為本故能定也夫然故易之道為聖人之要道非窮技曲學之謂也舜之治民為皇建其有極用敷錫厥庻民非偏政逸德之謂也湯之用賢為翕受敷施九德咸事非私好獨惡之謂也洪範之為類雖九然充人之材以至於其極者則在於思通天下之故而能定者則在於中其要未有易此也曰皇極之敷言是彞是訓于帝其訓凡厥庻民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王何也曰者其辭也其辭以謂人君之於大中既成之以德又布之以言是以為常是以為順于帝其順而巳人君之於言順天而致之於民故凡其衆民亦於極之布言是順是行以親附天子之輝光而曰天子作民父母為天下王曰父母者親之辭也曰王者尊之辭也上之人於遵王之義至王道正直能繇前之説則下之人於順上之所行所言而相與附之其愛之曰父母而戴之曰天下王必繇後之説經所以始其義於彼而終其效於此者以明上之所以王者如是則下之所以王之者如是非虚致也六三德一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克何也正直者常德也剛克者剛勝也柔克者柔勝也平康正直彊弗友剛克爕友柔克者所遇之變殊故所乂之德異也凡此者所以治人也高明柔克沉潛剛克何也人之為德高亢明爽者本於剛而柔有不足也故濟之以柔克所以救其偏沉深潛晦者本於柔而剛有不足也故濟之以剛克所以救其偏正直則無所偏故無所救凡此者以治己與人也惟辟作福作威玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒何也作福者柔克之所有也作威者剛克之所有也惟辟作福作威玉食臣無有作福作威玉食者正直之所有也以其卒曰臣之有作福作威玉食則人用側頗僻民用僭忒是以知惟辟作福作威玉食臣無有作福作威玉食者正直之所有也明矣箕子之言者皆九疇之所有九疇之所無者箕子盖不得而言也知此則知九疇之為九矣人君於五事思無所不通聰明無所不達言之出納無所不允於皇極所遵者正直所不可入者偏跛反側作好作惡淫朋比德之事人臣雖有小人之桀者未有能蔽其上而作福作威玉食者也人臣雖作福作威玉食者必窺其間縁其有可蔽之端故雖小人之庸者猶得以無忌憚而放其邪心也洪範以作福柔克之所有作威剛克之所有惟辟作福作威玉食正直之所有臣而作福則僣君之柔克臣而作威則僭君之剛克臣而作福作威玉食則為側頗僻無所不僭矣故於三德詳言之至若杜其間使無可蔽之端雖有邪臣不得萌其僭者則在於五事修皇極建而已也七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰䝉曰驛曰克曰貞曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言何也言選擇知卜筮之人而建立之乃命之以其職曰雨霽䝉驛克之五兆所以卜所謂五者也曰貞曰悔之二卦所以筮所謂凡七者也已命之以其職矣乃立是人使作卜筮之事三人占則從二人之言卜不同則從多也汝則有大疑謀及乃心謀及卿士謀及庻人謀及卜筮何也謀及乃心揆諸己也謀及卿士謀及庻人質諸人也謀及龜筮叅諸鬼神也舜典曰朕志先定詢謀僉同鬼神其依龜筮恊從謂此也汝則從龜從筮從卿士從庻民從是之謂大同身其康彊子孫其逢吉何也從於心而人神之所共與也故謂之大同則身其康彊子孫其逢吉也汝則從龜從筮從卿士逆庻民逆吉卿士從龜從筮從汝則逆庻民逆吉庻民從龜從筮從汝則逆卿士逆吉何也所從者多則吉可知也汝則從龜從筮逆卿士逆庻民逆作内吉作外凶龜筮共違於人用靜吉用作凶何也心與龜之所從則作内吉而已龜筮之所共違則不可以有作矣凡謀先人者盡人事也從逆先卜筮者欽鬼神也吉有三有卿士逆庻民逆者矣有汝則逆庻民逆者矣有汝則逆卿士逆者矣若龜從筮從則皆不害其為吉又至於龜從筮逆則可以作内而已龜筮共違則皆不可以有作也盖疑故卜筮卜筮者吾以謂通諸神明神明之所從則吾必其吉神明之所違則吾必其凶誠之至謹之盡也八庻徵曰雨曰暘曰燠曰寒曰風曰時五者來備各以其序庻草繁廡一極備凶一極無凶曰休徵曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徵曰狂恒雨若曰僭恒暘若曰豫恒燠若曰急恒寒若曰䝉恒風若何也曰雨曰暘曰燠曰寒曰風所謂五者也曰時則五者之時也五者無不至則所謂五者來備也無不時所謂各以其序也五者無不至無不時則至於庻草莫不蕃廡言陰陽和則萬物莫不茂盛也五者有所甚則為沴所謂一極備凶也有所不至亦為沴所謂一極無凶也於五事貎足以作肅則時雨順之其咎狂則常雨順之言足以作乂則時暘順之其咎僭則常暘順之視足以作哲則時燠順之其咎豫則常燠順之聽足以作謀則時寒順之其咎急則常寒順之思足以作聖則時風順之其咎䝉則常風順之凡言時者皆休之徵凡言常者皆咎之徵也五事之當否在於此而五徵之休咎應於彼為人君者所以不敢不念而考己之得失於天也曰王省惟歲卿士惟月師尹惟日歲月日時無易百榖用成乂用明俊民用章家用平康日月歲時既易百榖用不成乂用昏不明俊民用微家用不寧何也此章之所言者皆念用庻徵也休咎之徵各象其事任其事者王也與王共其任者卿士師尹也則庻徵之來王與卿士師尹之所當省其所以致之者所謂念用庻徵也王計一歲之徵而省之卿士計一月之徵而省之師尹計一日之徵而省之所省多者其任責重所省少者其任責輕其所處之分然也王與卿士師尹之所省歲日月三者之時無易言各順其任則百榖用成乂用明俊民用章家用平康王與卿士師尹之所省日月歲三者之時既易言各違其任則百榖用不成乂用昏不明俊民用微家用不寧也庻民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨何也言星之所好不同而日月之行則有常度有常度者不妄從則星不得作其好如民之好不同而王與卿士師尹之動則有常理有常理者不妄從則民不能作其好故月行失其道而從星之所好則以風雨猶王政失其常而從民之所好則以非僻言此者以庻徵之來王與卿士師尹則能自省而民則不能自省者也民不能自省則王與卿士師尹當省民之得失而知己之所以致之者也已之所致者民得其性則休徵之所集也己之所致者民失其性則咎徵之所集也故省民者乃所以自省也其反復如此者所以畏天變盡人事也知王與卿士師尹之所省者如此則知此章之所言非念用庻徵則不言也不知王與卿士師尹之所省者如此則於念用庻徵無所當而於言為贅矣是不知九疇之為九也九五福一曰壽二曰富三曰康寧四曰攸好德五曰考終命六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱何也民能保極則不為外物戕其生理故壽食貨足故富無疾憂故康寧于汝極故攸好德無不得其死者故考終命人君之道失則有不得其死者有戕其生理者故凶短折不康故疾不寧故憂食貨不足故貧不能使之于汝極則剛者至於暴故惡柔者不能立故弱此人君所以考已之得失於民者也或曰福極之言如此而不及貴賤何也曰九疇者皆人君之道也福極者人君所以考己之得失於民福之在於民則人君之所當嚮極之在于民則人君之所當畏福言攸好德則致民於善可知也極言惡弱則致民於不善可知也視此以嚮畏者人君之事也未有攸好德而非可貴者也未有惡弱而非可賤者也故攸好德則錫之福謂貴之所以勸天下之人使恊于中固已見之皇極矣於皇極言之者固所以勉人於福極不言之者攸好德與惡弱之在乎民則考吾之得失者盡矣貴賤非考吾之得失者也人君之於五行始之以五事修其性於己次之以八政推其用於人次之以五紀恊其時於事次之以皇極謹其常以應天下之故而率天下之民次之以三德治其中不中以適天下之變次之以稽疑以審其吉凶於人神次之以庻徵以考其得失於天終之以福極以考其得失於民其始終先後與夫粗精小大之際可謂盡矣自五事至于六極皆言用而五行不言用者自五事至于六極皆以順五行則五行之用可知也虞書於六府言修則箕子於五行言其所化之因於人者是也虞書於六府次之以三事則箕子於五行次之以五事而下是也虞書於九功言戒之用休董之用威則箕子於九疇言庻徵之與福極是也則知二帝三王之治天下其道未甞不同者萬世之所不能易此九疇之所以為大法也進太祖皇帝總序狀右臣誤被聖恩付以史事今月三日延和殿伏䝉面諭所以任屬臣者臣愚不肖不知所處是以蚤夜一心極慮惟祖宗積累功德非可形容矧臣之鄙豈能擬議髣髴將無以使列聖巍巍之偉跡焜燿昭徹布在方册此臣之所以惴惴也竊惟前世原大推功必始於受命之君以明王迹之所自故商頌所紀繇湯上至於契周詩生民清廟本於后稷文王宋興太祖開建鴻業更立三才為帝者首陛下所以命臣顯揚褒大之意固以謂太祖雄材大略千載以來特起之主國家所繇興無前之烈宜明白暴見以覺悟萬世傳之無窮臣竊考舊聞伏念旬月次輯太祖行事揆其指意所出終始之際論著于篇敢繕寫上陳臣内自省大懼智不足以窺測高逺文不足以推闡精微使先帝成功盛德晦昧不章不能滿足陛下仁孝繼述之心仰負恩待無以自贖伏惟陛下聰明睿智不世之姿非羣臣所能望如賜裁定使臣獲受成法更去紕繆存其可采繋於太祖本紀篇末以為國史書首以稱明詔萬分之一臣不勝大願惟陛下留意萬幸臣未敢請對謹具狀以所論著隨狀上進以聞伏候勅旨太祖皇帝總敘盖唐之敝自天寶已後紀綱寖壊不能自振以至於失天下五代興起五十餘年之間更八姓十有四君危亡之變數矣其尤甚也契丹遂入中國擅立名號當是時天地五行人事之理反易繆亂民之能存者亡幾耳太祖為天下所戴踐尊位以生民為任故勸農桑薄賦歛緩刑罰除舊政之不便民者詔令勉覈相属推其心無一日不在百姓也知方鎭之病民也故設通判之員使歛以繩墨憂吏之不良也故數使在位舉其所知患吏或受賕或不奉法也故罪至死徙一無所貸原其意盖以謂遭世大衰不如是吏不知禁不能救民於焚溺之中也征伐既下諸國必先已逋欠滌煩苛賙乏絶雪寃滯惠農民拔人才申命郡邑反復不倦或遇水旱輒蔬食請禱欲移災於已其於羣臣有恩舊有勞能待之各盡其分以位貴之以財富之有男使尚主有女使嫁宗室其予人之周也如此即材可用雖讎不廢不可用雖光顯矣不處以勢其有罪多縱貸之或賜之使自媿及至堅明約束以整齊天下者亦使之不能踰也強僣之國皆接以恩禮商賈往來不禁有出境犯其令者廼為之置市邉邑使兩利有所乏少常賑助之征伐所加必其罪暴著師出未甞不以義也其君長已降及就俘執道路勞問迎致使者相望既至罪不數辱之優假秩禄及其宗親吏屬賜以田宅使子孫世守擁䕶保全皆得以壽考終自晉既覆滅契丹寖大中國惴畏不敢當太祖拔用材武䕶西北邉寵以非常之恩任属專聽信明常遣戍卒戒之曰我猶赦汝郭進殺汝矣有訟進者謂曰進軍政嚴此必犯進法送進使殺之闗市租賦諸將得恣用不問出入以其故士附鬬者盡力諜者盡情邉臣可委者皆十餘年不易其任然位不過廵檢使衆不過三五千人盖任專則勢便位不極則士勵兵少則用約御將亦多術矣總其所長能兼用之故能省費息民振新集之衆屈憑陵之勢也盖太祖篤於孝友有天下之行聰明智勇有天下之材仁心愛人有天下之志包含徧覆有天下之量守之以勤儉恭愼虛心納諌鑒於粤蜀以奢侈為戒思天下之重不復遊畋封拜諸子務自約損不盡循故典收納學士大夫用之不求其備或守難進之節亦不奪也晩喜讀書勸諸將以學曰欲使之知治道也兼覆夷夏從容以德江南平覽㨗書而泣曰師征不義而顧令吾民死兵彼何負哉秦州已入尚波于之地却而不受錢俶來朝復歸之越契丹願聽盟約逡廵退抑不自矜伐天下大勢連數十城之鎭割其故地以小其力易動難畜之兵歛置懐服以消其難至於舉賢良崇孝弟綴禮樂明考課雖宇内初輯然庻政大體彌綸備具遺文故事施於後世皆可為法民於是時從死更生室家相保士農工賈各還其職鳥獸草木亦莫不遂前世舊臣備將相處腹心爪牙之任者一旦回心奉令北鄉如素委質天下廣都通邑兼地千里德懐二三之臣負衆自用令之不從召之不至者尚數十皆束衽來庭代易奔走如水湊下粤蜀吳楚甌閩之君分天下為八九曰帝與王傳子及孫更數十歲者編名囚虜並聚闕下四海之内混齊為一海東之國高麗極南交阯西戎吐蕃回紇北狄契丹皆請吏奉貢天地所養通途之属莫不内附當是時更立天下與民為始天地五行人事之理亂而復正盖太祖之於受命非如前世之君圖衆以智圖柄以力其處心積慮非一夕一日在於取天下也其在天者厯數在人者羣臣萬民三軍之士不歸周歸太祖未有知其所以然者所謂天也及其傳天下也舍子属弟是則太祖之受天下與舜受之堯禹受之舜其揆一也其傳天下與堯傳之舜舜傳之禹其揆一也受天下及傳天下視天與人而已非其心未甞有天下豈能如是哉世以謂太祖不世出之主與漢高祖同盖太祖為人有大度意豁如也知人善任使與漢高祖同固然也太祖承自天寶以後更五代二百餘年極敝之天下漢祖承全盛之秦二世之末天下始亂所因之勢既殊太祖開建帝業作則垂憲後常可行漢祖粗定海内而已不及一太祖立折杖法脫民榜笞死禍定著常刑一本寛大漢祖雖約法三章然肉刑三族之誅至孝文始去不及二太祖功臣皆故等夷及位定上下相安始終一意漢祖疑間諸將夷滅其家不及三太祖削大弱彊藩臣遵職漢祖封國過制反者更起累世乃定不及四太祖征伐必克漢祖數戰輒北不及五太祖文武自出羣臣莫及漢祖非得三傑之助不得無失不及六開寶之初南海先下趙佗分越而帝漢祖不能禁不及七太祖不用兵契丹自附漢祖折厄白登身僅免禍不及八太祖後宫二百問願歸者復去四之一漢祖溷於衽席女禍及宗不及九太祖明於大計以属天下漢祖擇嗣不審幾墜厥世不及十也漢祖所不能及其大者如此是自三代以來撥亂之主未有及太祖也三代盛矣然禹之孫太康失國湯之孫太甲放廢文武之後三世傳昭王不返於楚繇漢以下變故之密盖不可勝道也太祖經始大基流風遺澤所被者逺五聖遵業至今百有二十餘年上下和樂無變容動色之慮接於耳目治安久長自三代以來所未有也惟太祖創始傳後比迹堯舜綱理天下軼於漢祖太平之業施於無窮三代所不及成功盛德其至矣哉盖唐天寶十四年天下户八百九十一萬太祖元年户九十六萬末年天下既定戸三百九萬今上元豐二年戸一千三百九十一萬六聖之德澤覆露生養斯其所以盛也本原事實其所由致此有自也哉元豐類藁卷十
