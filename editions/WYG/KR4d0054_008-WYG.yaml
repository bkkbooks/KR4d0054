body:
  text: 元豐類藁巻八宋曽鞏撰雜詩高郵逢人約襄陽之遊一川風月高郵夜玉麈清談畫鷁舟未把迂疎笑山簡更須同上習池遊彭城道中百步洪聲潦退初白沙新岸凑舟車一時屠釣英雄盡千載河山戰伐餘楚漢舊歌流俚耳韓彭遺壁冠荒墟可憐馬上縱横畧只在邳橋一巻書送程殿丞還朝如雲青髪擁朝簮佳譽喧喧動士林自重肯悲三獻玉不欺常慎四知金芝蘭秀出清門盛鴻鷺飜飛紫殿深别後齋中掛塵榻更將梁甫向誰吟送高秘丞簿書擁處精神健風俗澆時質性淳公退種花常滿縣政成春雉不驚人指麾細栁通河外歌詠甘棠付漢濱惆悵不能留自助謾將樽酒駐車輪康定軍使高秘丞自襄陽司農寺勾業寺丞自光化相繼遷拜簽判程殿丞受代還朝預有惜别之意輒書長句奉呈千里分符漢上城為僚方喜得時英已無楚澤行吟意更有南陽坐嘯名驥力用來精爽𦂳鵷行歸去羽翰輕須知别後狂山簡夢寐清談鄙吝生雨中王駕部席上鳩鳴連日始成隂薄雨聊寛望嵗心浴雁野塘新浪細藏鵶宮栁嫩條深春寒巧放花遲發人老嗟辭酒滿斟英雋並逰知最幸名園偷暇更追尋贈張伯常之郢見過因話荆楚故事仍貺佳什一見心親十載前相望南北久茫然喜傾白髪論文酒重訪清江下瀬船志大肯同悲抱璞識高寧許笑求田已闚品藻傳荆楚更味陽春白雪篇伯常少留别業寄詩索酒以奉報未擁雙騶謁漢庭暫留車馬憩林坰多情置驛邀佳客好事磨鉛勘舊經芳草連門三徑遠朝雲臨幌數峯青春醪有禁無繇寄誰為江潭訪獨醒贈黄降自宜城赴官許昌所學從誰得最完豫章新出已難攀不摇聲利心能定欲正哇淫手自刪潁水珠璣來席上鄢城桃李任人間高齋掛榻驪歌後坐守塵編少往還招擇甫竹亭閒話偶歸塞馬應何定粒食鷦鷯頗自安雲壓楚山春後雪風吹襄水坐來寒詩豪已分材難強酒聖還諳量未寛頼有佳賔堪下榻且將清話對檀欒和鄭微之故人容下榻清讌得傳杯地秀偏宜竹天寒未見梅雲林千嶂出煙艇一㠶開且醉休言别歸期信召催送陳世脩沙渚鴻飛入楚雲遠林樵爨宿煙昏姢姢野菊經秋澹漠漠滄江帶雨渾歸路賞心應駐節客亭離思暫開樽莫嗟問俗淹翔久從此頻繁不次恩和張伯常自郢中將及敝境先寄長句㧞薤威名高外服握蘭風力冠中臺好音忽有雙魚至喜氣遥知五馬來棃顆玉腴含雨重菊房金粉傍寒開池邉且欲留同醉思拙難酬白雪才和張伯常峴山亭晚起元韻揮手紅塵意浩然夙興招客與攀聨烟雲秀發春前地草木清含雪後天已卜畊桑臨富水暫抛魚鳥去伊川更追羊杜經行樂况有風騷是謫仙峴山亭置酒石磴縈回入杳㝠松筠高下簇虛亭春歸野路梅初白雪盡沙田麥正青馬窟飛雲臨畫棟鳳林斜日照踈櫺長年酒量殊山簡却上籃輿恨獨醒韓魏公挽歌詞二首堂堂風骨氣如春衮服貂冠社稷臣天上立談迎白日握中隨物轉洪鈞忽騎箕尾精靈遠長誓山河寵數新萬里耕桑無一事三朝功徳在生民錙銖赤舄無驕志咳唾黄金有古風覆冒荒遐知大度委蛇艱急見孤忠謀謨邴魏丹青力擁立昭宣柱石功御筆新詩在新隴哀榮誰得似初終詶吳仲庻龍圖嵗春感懐𤨏闈延閣腹心臣籍甚聲華動縉紳藥石言行天下雨袴襦恩達國中春召公去後餘思在綸氏歸來壯志新莫為流年嗟白髪濟時須仗老成人陳君式恭軒不要墻頭俗眼看故開蒼蘚種檀欒虛心得處從天性勁節知來在嵗寒葉養風煙誇酒美枝留氷雪送歌殘名即感慕同桑梓手植依然一畝寛贈正倚大師庵居蘭械方袍振錫回結茅蕭寺遠塵埃五峯日破朝雲出三谷花浮澗水來風散異香禪榻静鳥闚清唄法筵開因過舊國枌榆地松麈高談喜暫陪以白山茶寄吳仲庻見貺佳篇依韻和詶山茶純白是天真筠籠封題摘尚新秀色未饒三谷雪清香先得五峯春瓊花散漫情終蕩玉蕋蕭條跡更塵逺寄一枝隨驛使欲分芳種更無因初惟此花與揚州后土廟瓊花天下一枝近年瓊花可接遂散漫而此花為獨出也詶江西運使蔣潁叔収科同日曵華裾砉劃驚聞刅有餘驄馬已騰雙闕路木牛還實太倉儲多岐易感千名别置袖空榮一紙書欲佩左符甌越去更從南斗望單車刁景純挽歌詞二章史觀郎闈得謝歸桓桓筋力未全衰園林笑傲笙歌擁山水追尋几杖隨尺牘百封虛有意文章十帙更傳誰餘花自出藏春塢一㸃青燈照繐帷陳遵善書與人尺牘莫不藏以為榮又云遵日作書數百封親疎各有意義白樂天無子其詩云文章十帙官三品身後傳誰與廕誰景純善作書亦無子故云藏春塢􅕺純自名其所居也八十登高步更輕殷勤愛客是平生能臨緩急敦風誼不向炎凉逐世情北岳雲烟思抗志東門冠盖羡遺榮可憐昨日壺觴地嗚咽唯聞薤露聲寄留友代元子發青雲寳構雖同直白髪魚符各未歸倚玉詎應公論許續貂還恐邑人非莫辭海畔留連久須惜天涯故舊稀預想明年雙節召九霄鵬翼看横飛遊東山示客虞寄庵餘蘚徑通滿山臺殿出青紅難逢堆案文書少偶見凭欄笑語同梅粉巧含溪上雪栁黄微破日邉風從今凖擬頻行樂日伴罇前白髪翁大乘寺行春門外是東山籃轝寧辭數往還溪上鹿隨人去遠洞中花照水長閒樓臺勢出塵埃外鐘磬聲來縹緲間自笑麄官偷暇日暫携妻子一開顔聖泉寺笑問并兒一舉鞭亦逢佳景暫留連清冥日抱山腰閣碧野雲含石眼泉躡屐路通林北寺落㠶門繫海東船閩王舊事今何在惟有前村供佛田昇山靈巖寺脩竹長松十里隂任教燒藥洞門深獨闚金版驚人語能到青霞出世心雞犬亦隨雲外去蓬瀛何必海中尋丹樓碧閣唐朝寺鐘唄香花滿舊林鳳池寺經年聞說鳳池山蠟屐方偷半日閒笑語客隨朱閣上醉醒身在白雲間溪橋野水清猶急海岸輕寒去却還為郡天涯亦瀟洒莫嗟流落鬢毛班上元金鞍馳騁屬兒曹夜半喧闐意氣豪明月滿街流水遠華燈入望衆星高風吹玉漏穿花急人近朱䦨送目勞自笑無心逐年少祗尋前事撚霜毛元沙院昇山南下一峯高上盡層軒未厭勞際海煙雲常慘淡大寒松竹更蕭騷經臺日永銷香篆談席風生落麈毛我亦有心從自得瑠璃瓶水照秋毫酬栁國博行止恂恂衆所褒東南佳譽映時髦洞無畦畛心常坦凛若氷霜節最高朱紱少留居客左白頭難敵是詩豪須知别後山城寺悵望歸艎送目勞閏正月十一日呂殿丞寄新茶新最早者生處地向陽也偏得朝陽借力催千金一跨過溪來曾坑貢後春猶早海上先嘗第一杯旬休日過仁王寺雜花飛盡緑隂成處處黄鸝百囀聲隨分笙歌與樽酒且偷閒日試閒行亂山亂山深處轉山多此地棲身奈遠何莫問吾親在何處舉頭東岸是新羅福州際海東海即新羅諸國圖經亦云長溪與外國接界親舊書報京師盛聞治聲自知孤宦無材術誰道京師有政聲黙坐海邊何計是白頭親在鳯凰城寄獻新茶種處地靈偏得日摘時春早未聞雷京師萬里争先到應得慈親手自開方推官寄新茶採摘東溪最上春壑源諸葉品尤新龍團貢罷争先得肯寄天涯主諾人嘗新茶丁晉公北苑新茶詩序云茶芽採時如麰麥之大者麥粒収來品絶倫葵花製出様争新一杯永日醒雙眼草木英華信有神厚卿子中使高麗並使時推出衆材異方迎拜六城開宣風直到東西部仗節遥臨大小梅滄海路從三島去玉山人待二星回黄金白㲲饒君用銅器應餘寄我來出郊葛葉催畊二月時斜橋曲岸馬行遲家家賣酒清明近紅白花開一兩枝蹇磻翁寄新茶二首龍焙嘗茶第一人最憐溪岸兩旗新肯分方跨醒衰思應恐慵眠過一春貢時天上雙龍去鬬處人間一水争分得餘甘慰憔悴碾嘗終夜骨毛清城南二首雨過横塘水滿堤亂山高下路東西一畨桃李花開盡惟有青青草色齊水滿横塘雨過時一畨紅影雜花飛送春無限情惆悵身在天涯未得歸寒食一麾飄泊在天涯寒食園林不見花唯有市亭酤酒客俚歌聲到日西斜夜出過利涉門紅紗籠竹過斜橋複觀翬飛入斗杓人在畫船猶未睡滿堤明月一溪潮夜出城南禱雨海天重疊四山雲半出星辰亦半昏上得籃轝是中夜兩街燈照九重門西樓海浪如雲去却回北風吹起數聲雷朱樓四靣鈎踈箔卧看千山急雨來荔枝四首剖見隋珠醉眼開丹砂縁手落塵埃誰能有力如黄犢摘盡繁星始下來玉潤氷清不受塵仙衣裁翦絳紗新千門萬戸誰曽得只有昭陽第一人綘縠嚢収白露團未曽封植向長安昭陽殿裏才聞得已道佳人不奈寒金釵雙捧玉纎纎星宿光芒動寳奩解笑詩人誇愽物祗知紅顆味酸甜白樂天詠荔枝詩云津液甘酸如醴酪杜工部詩云紅顆酸甜祗自知此皆巴蜀荔枝而巳不知閩越荔枝酸也王虞部惠佳篇叙述昔與湘潭亡弟逰從仍以亡弟舊作見示薄宦紅塵常拂靣早衰黄髪已盈顛棣華零落曽誰語鴻羽蕭條祗自憐已矣空聞懐舊賦泫然猶獲濟江篇慇懃愛我如君少更悟之他友最賢北歸三首召判太常終日思歸今日歸著鞭鞭馬尚嫌遲曲臺殿裏官雖冷須勝天涯海角時拜捧恩書喜滿顔馬蹄遥望斗杓還從今步步行平地出得千山與萬山江海多年似轉蓬白頭歸拜未央宫堵墻學士驚相問何處塵埃瘦老翁和酬孫少述自信簞瓢樂寕羞猿鶴驚論髙知峻節交淡見純誠自昔心無間相逢眼更明何當薦有道坐想軟輪迎和孫少述侯職方同燕席兩翁頭白喜追陪好事鈴齋燕席開臘在未消盈尺雪春歸先放一枝梅况無庭下書投缿更盡筵中酒滿杯周召二南皆絶唱抑揚賡和愧非材寄趙宮保銅扉得謝從今日玉鉉辭榮已十年素節讜言留簡冊高情清興入林泉海邉愛日疲人戀劔外仁風故老傳門外最應瀟洒客喜公平地作神仙和詶趙宮保致政言懐二首讜論危言望素隆獨於聲利性偏慵龍樓調䕶官雖寵鳩杖躋攀興已濃不變松篁心轉勁無邉江海量兼容磻溪從老寧閒得㑹為蒼生起更重愛國憂民有古風米鹽親省尚嫌慵衮衣天上歸何晚霖雨人間望正濃三少官儀雖赫赫五湖心事肯容容角巾藜杖經行處知在雲山第㡬重和趙宮保别杭州紞鼔留公豈是催公詩云湖過漁船疊鼓催湖山得意且徘徊更應准擬須乗興范蠡扁舟去却來過靈璧張氏園三首梨棗纍纍正熟時粟田鶉兎亦争肥園亭盡日追尋遍只欠厭厭醉始歸汴水容容帶雨流黄花艶艶亦迎秋看花引水園林主應笑行人易白頭秫地成來多醸酒杏林熟後亦留錢不須置驛迎賓客直到門前繫畫船雪亳州欲下蒼凉日全低黯霮天飄颻投夜急𤨏碎得風儇穢壤彌縫徧枯荄㸃綴妍繁英飛面旋艶舞起翩躚已壓穿林竹還冰落澗泉抵􅇖輕自肆乗隙巧争先壅隔書郵斷侵凌客履穿恐傾貧巷屋覺重泝溪船唶有顔空姣洵無質可鐫包藏兼海岳䝉蔽匝坤乾枚叟招何晩袁安卧正堅㑹須逢見睍萬里豁晴川送元厚之資政致仕歸蘇笑指家園是五湖畫船東下載圖書収功玉鉉丹青後得老銅樓羽翼初醒醉放懐從野服登臨乗興屬安車一作輿公既謝事即田野服安輿優游從適都門飲餞光華盛不獨當年有二疏壽聖院昌山主静軒一峯蕭洒背城隂碧瓦新堂地布金花落禪衣松砌冷日臨經帙紙牕深幽棲鳥得林中樂燕坐人存世外心應似白蓮香火社不妨籃轝客追尋鶴林寺李渉所謂因過竹院逢僧話又得浮生半日閒即此寺也昔人春盡強登山只肯逢僧半日閒何似一尊乗興去醉中騎馬月中還送闗彦遠赴河北子明高誼衆人知苗裔清材世所推詩作士林誇刻燭賦成天路喜同時豈當白首淹風力自合青雲縱羽儀北部經營應不久玉堦朝夕是歸期正月十一日迎駕呈諸同舍錦袍周衛一番新警蹕朝嚴下紫宸俗眼望來猶眩日天顔回處自生春行齊鵷鷺常隨仗歩穏驊騮不起塵歸路青雲喧鼔吹樂遊從此屬都人是時上服慈聖光獻皇后三年䘮畢始聴樂及許然燈和御製上元觀燈翠􅎻霓旌夾露臺夜凉宮扇月中開龍銜燭抱金門出鰲負山趨玉座來碭極戲添夷客喜漢饗四夷之客作海中之戲栢梁篇較從臣材共知天意同民樂願奏君王萬夀杯和史館相公上元觀燈九衢僊仗豫遊歸寳燭星繁換夕暉傳醆未斜清禁月散花還拂侍臣衣天香暗度金虬煖宮扇雙開彩鳯飛法曲世人聽未足却迎朱輦下端闈集賢院春燕呈諸同舍御爐風細麝煙浮法樂聲和酒味柔冠劍九重霄漢路鶯花三月帝王州重廊四合盤龍幕當殿雙高彩鳯樓歸去人人誇雨露總含􅂬意躍驊騮上已日瑞聖園錫燕呈諸同舍北上郊園一據鞭華林清集綴儒冠方塘渰渰春先渌密竹姢姢午更寒流渚酒浮金鑿落照庭花並玉䦨干君恩倍覺丘山重長日從容笑語懽池上即席送况之赴宣城池上紅深緑淺時春風蕩漾水逶迤南州鼔舞歸慈惠東觀壺觴惜别離遠岫煙雲供醉眼雙溪魚鳥付新詩陵陽豈是遲留地赴駕追鋒自有期寄題饒君茂才葆光菴適意藜羮與布裘結廬人境地還幽清談汝水孤猨夜爽氣麻源一葉秋應有風騷歸健筆可無尊酒付扁舟因君更起家園興夢寐思從几杖遊朝退即事呈大尹正仲龍圖六街塵斷早凉生細葛含風體更輕官府吏閒時樂易市㕓人喜政和平揮金蓛䔩宮槐蕊鳴玉淙淙御水聲觀闕漸迎初日上馬頭還傍緑隂行桃花源來時秋不見桃花空樹寒泉瀉石涯争得時人見鸞鳳不教身去憶烟霞元豐類藁巻八
