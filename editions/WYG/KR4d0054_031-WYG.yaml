body:
  text: 元豐類藁巻三十一宋曾鞏撰劄子再議經費臣嘗言皇祐治平歲入皆一億萬以上而歲費亦畧盡之景德官一萬餘員皇祐治平皆三一作二萬餘員景德郊費六百萬皇祐治平皆一千萬以上是二者費皆倍於景德使皇祐治平入官之門多於景德者可考而知皇祐治平郊費之端多於景德者可考而知然後議其可罷者罷之可損者損之使歲入如皇祐治平而禄吏奉郊之費同於景德則二者所省盖半矣則又以類推而省之以歲入一億萬計之所省者十之一則歲有餘財一萬萬所省者十之三則歲有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄自古國家之富未有及此也陛下謂臣所言以節用為理財之要世之言理財者未有及此也令一作今付之中書臣待罪三班按國初承舊以供奉官左右班殿直為三班立都知行首領之又有殿前承㫖班院別立行首領之端拱以後分東西供奉又置左右侍禁及承㫖借職皆領于三班三班之稱亦不改初三班吏員止於三百或不及之至天禧之間迺總四千二百有餘至于今迺總一萬一千六百九十宗室又八百七十盖景德員數巳十倍於初而以今考之殆三倍於景德畧以三年出入之籍較一作校之熈寧八年入籍者四百八十有七九年五百四十有四十年六百九十而死亡退免出籍者歲或過二百人或不及之則是歲歲有増未見其止也臣又畧考其入官之繇條於別記以聞議其可罷者罷之可損者損之惟陛下之所擇臣之所知者三班也吏部東西審官與天下他費尚必有近於此者惟陛下試加考察以類求之盖有約於舊而浮於今者有約於今而浮於舊者其浮者必求其所以浮之自而杜之其約者必本其所以約之由而從之如是而力行使天下歲入億萬而所省者什三計三十年之通當有十五年之蓄夫財用天下之本也使國家富盛如此則何求而不得何為而不成以陛下之聖質而加之勵精以變因循苟簡之敝方大脩法度之政以幸天下詒萬世故臣敢因官守以講求其損益之數而終前日之說以獻惟陛下財擇請改官制前預選官習行逐司事務臣伏以陛下稽古正名脩定官制今百工庶務類别已明其於講求經畫皆出聖慮彌綸之體固巳詳盡然推行之始去故取新竊恐百執事之人素未諭於其心習於其耳目一日之間或未盡知其任羣吏萬民聽治於上者或未盡知所趨待夫問而後辨推而後通則必有煩阻之患畱滯之虞若圖之於早定之於素則一日之間官號法制一新於上而彛倫庶政叙行於下内外遠近雖易視改聽而持循安習無異於常此臣所以區區之愚庶有補於萬一也今百司庶務既巳類别若以所分之職所總之務因今日之有司擇可属以事者使之區處自立叙分名憲令版圖文移案牘訟訴期會總領循行舉明鈎考有革有因有損有益有舉諸此而施諸彼有捨諸彼而受諸此有當警於官有當布於衆者自一事巳上本末次第使更制之前習勒巳定則命出之日但在奉行而已蓋吏部於尚書為六官之首試即而言之其所總者選事也流内銓三班東西審官之任皆當歸之誠因今日之有司擇可属以事者使之區處自令僕射尚書侍郎及員外郎以其位之升降為其任之煩簡使省書審决某當属郎員外郎某當属尚書侍郎某當属令僕射各以其所属預為科别如此則新命之官不煩而知其任矣曹局吏員如三班諸房十有六諸吏六十有四其所别之司所𨽻之人不必盡易惟當合者合之當析者析之當損者損之當益者益之使諸曹所主因其舊習如此則新補之吏不諭而知其守矣憲令版圖文移案牘訟訴期會總領循行舉明鈎考其因革損益之不同與有舉諸此而施諸彼有捨諸彼而受諸此有當警於官布於衆者皆前事之期莫不考定如此則新出之政不戒而知其叙矣夫新命之官不煩而知其任新補之吏不諭而知其守新出之政不戒而知其叙則推行之始去故取新所以待之者備矣其於選事如此旁至於司封司勲考功當𨽻之者内服外服庶工萬事當歸之者皆推此以通彼則吏部之任一作仕不待政出之日問而後辨推而後通也推吏部之事以通於百工庶職如此則體雖至大而操之有要事雖一變而處之有素一日之間官號法制鼎新於上而彛倫庶政叙行於下内外遠近雖改視易聽而持循安習無異於常區區之愚庶有補於萬一者在此而臣愚淺薄不知治體貪於傾盡而不知其言之妄採掇增損實待聖斷惟陛下之所裁幸取進止請改官制前預令諸司次比整齊架閣版籍等事臣伏以陛下發德音正官號法制度數皆易以新書太平之原實在於此今論次巳定宣布有期四方顒顒跂足而望臣切恐施行之際新舊代易之初庶工之間或吏屬因循或簿書縁絶其於督察漏畧檢防㪚逸彌綸之體不可不早有飭戒欲乞明諭有司架閣有未備者備之版籍有未正者正之凡憲令圖牒簿書案牘皆當次比整齊歛藏識别以至於宫寺什器凡物之属公上者亦皆當鈎考詳於簿録庶於新舊更易之間得無漏畧㪚逸之敝非獨儆當今典領之懈且以絶異時追䆒之煩取進止請以近更官制如周官六典為書臣竊以周制六卿各率其属皆有分職見於禮經至唐自三省而下分命庶官亦各以其職事見於六典今陛下講求化原更定官制盖作憲垂法繇古以來其於大體有不可易者雖唐虞三代未嘗易也至於縁人情因世故斟酌損益有不可不易者故雖唐虞之際極盛之時凡巡守四方則皆脩五禮而周人治象之法亦歲有更革况於時異事殊而可以膠於一方之說泥於一偏之跡哉故陛下更制改作其彌綸大意則遠體周官而近因唐制此所謂於其大體有不可易者也至於從宜應變則解縱拘攣獨出聖謀不牽常算此謂斟酌損益有不可不易者也夫能審其不可易者而因之斷其不可不易者而更之惟當而巳然後可謂明制作之體惟陛下聖性之卓故能處之無疑此非羣臣之所能望也今更定官制其所先者在於使羣臣庶位皆明知其職分職分既明然後在事者得各因其名以効其實而考察者欲覈其實則必推其名此作法之大要所謂不可易者也今庶尹百工分位既定宜有新書如周官六典明白之文使内外上下曉然究悉以熈庶績而康萬事臣適典明命亦得各以百執事所分之職載於訓詞以飭戒在列以稱陛下董正治官循名責實之意其書宜以時頒布以幸天下如體重事鉅其不可不易者文字論次尚有未周則百司所守小大之務亦宜先有條具委曲章明施於列位使人人皆知其任勸於赴功而臣亦得討論演暢見於王者之訓以副聖君勵精求治為世作則之心取進止史館申請三臣脩定國史止依司馬遷以下編年體式至於書事隨便今略具條目進呈其餘文義曲折難預為之例者須候著撰之際徐更隨宜候書成日為逐篇述傳繫於末巻以見論次之意盖若預為定例恐於文義須至拘牽就例或有所妨其書事隨便今略具條目如左一羣臣拜罷見於百官表一刑法食貨五行天文災祥之類各見於逐志巳上更不於本紀載述之類一名位雖崇而事迹無可紀者更不立傳或善惡有可見者則附見之一善惡可勸戒是非後世當考者書之其細故常行更不備書右取進止臣脩定五朝國史有合申請事具下項一自宋興以來名臣良士或增有名位或素在丘園其有嘉言善行厯官行事軍國勲勞或有貢獻封章或有著撰文字或本家有碑誌行狀紀述之文或他人為作傳記之類今來所脩國史須合收採載述恐慮舊書訪尋之初有所未盡至今歲月巳遠耳目所及者少或至漏畧欲乞京畿委開封知府及畿縣知縣在外委逐路監司州縣長吏愽加求訪有子孫者延致詢問諭以朝廷之意欲使名臣良士言行功實傳之不朽為人子孫者亦宜知父祖善狀合要顯揚使得見於國史以稱為人後嗣之義各令以其所有事迹或文字盡因郡府納於史局以備論次或文字稍多其家無力繕寫即官為委官以官用傭寫字人書寫校正其曾任兩府兩制臺諫之家須逐家一一詢訪無令漏畧各限自指揮到日一月内取到文字發送史局其逐路監司州府逐縣長吏各具無漏畧文狀連申一申中書向來編集累朝文字本局不見得從初名目及樞密院有編集機要文字并兩處有録得累朝御扎手詔副本文字欲乞令檢送本局以備討論取進止臣脩定五朝國史據舊書及更加採摭以備紀録外竊慮五聖臨御之日德音行事外廷有所未聞及自來更有紀述發明文字藏在宮禁者欲乞特賜頒示以慿論次所貴祖宗功德傳布方冊得以周盡右取進止請訪問髙麗世次臣竊考舊史髙句驪自朱蒙得紇升骨城居焉號曰髙句驪因以髙為氏厯漢至唐髙宗時其王髙藏失國内徙聖厯中藏子德武得為安東都督其後稍自為國元和之末嘗献樂工自此不復見於中國五代同光天成之際髙驪王髙氏復來貢而失其名長興三年乃稱權知國事王建遣使奉貢因以建為王建子武武子昭昭子伷伷弟治治弟誦誦弟詢相繼立盖自朱蒙至藏可考者一姓九百年傳二十一君而失國其後復自為國而名及世次興廢之本末與夫王建之所以始皆不可考王氏自建至伷四王皆傳子自治至詢三王皆傳弟詢自天聖八年來貢至熈寧三年今王徽來貢其不見於中國者盖四十有三年今陛下仁聖文武聲教之盛東漸海外徽所遣使方集闕下蓋髙句驪文字之國也其使者宜知其國之君長興壞本末名及世次欲乞詔諭典客之臣問自德武之東也其後何以能復其國何以復失之嘗傳幾君其名及世次可數否王建之所以興者何繇其興也自建始歟抑建之先巳有興者歟自天聖至熈寧四十三年之間而徽復見於中國其繼詢而立者歟豈其中間復自有繼詢者歟徽於詢為何属如其言可論次足以補舊史之闕明陛下德及萬里殊方絶域前世有不能致者慕義來庭故能究知四夷之事非聲教之所被者遠不能及此取進止貼黄欲乞諭畢仲衍因話從容訪問或來使未能盡對即諭以候歸本國討尋記録因向後別使人附來髙麗世次髙句驪其先出夫餘王得河伯女因閉於室感日而孕生朱蒙及長夫餘之臣謀殺之朱蒙走得免至紇升骨城居焉號髙句驪因以髙為氏朱蒙死子如栗立如栗死子莫來立漢武帝元封三年滅朝鮮置𤣥莬郡以髙句驪為縣属之騶立史失其世次王莽時發髙麗兵伐胡不欲行遂皆出塞為宼歸咎於騶令嚴尤誘而斬之莽乃大悅更名髙句驪王為下句驪侯光武建武八年髙句驪遣使朝貢復其王號史不著其名莫來裔孫宮立殤安之間宼遼東宮死子遂成立安帝建光元年也遂成死子伯固立北史云宮死子伯固立伯固死子伊夷模立伊夷模死子位宮立位宮死元孫乙弗利立頻宼遼東弗利死子釗立安立史失其世次而云以髙麗王安為平州牧晉孝武大元十年也釗曾孫璉立晉太武時始遣使者詣安東奉表璉死孫雲立後魏孝文太和五年也南史云璉死子雲立雲死子安立後魏宣武神龜中安死子延立延死子成立成死子湯立湯死子元立隋開皇大業中皆伐之元死弟建武立建武之立隋末也唐髙祖武徳中拜遼東郡王建武死弟之子藏立建武為蓋蘇文所斃更立建武弟之子藏為王自為莫離支專國猶唐兵部尚書中書令之職貞觀十八年遣李勣伐之十九年太宗親征髙宗龍朔元年遣任推相以三十六軍水陸分途觀髙麗之釁乾豐三年李勣拔扶餘城總章元年李勣拔平壤城執藏收其地蓋朱蒙至藏有國九百年矣藏子德武為安東都督武后聖厯二年也後稍自為國至元和末遣使獻樂工同光天成間髙麗國王髙氏累遣使朝貢唐末中原多事其國遂自立君長同光後唐莊宗時天成明宗時天德元年至長興二年二百六十四年通上九百年計一千一百六十四年髙麗國王王建立明宗長興三年權知國事王建遣使朝貢明宗拜為王建死子武立武死子昭立建隆三年四年開寳五年來貢昭死子伷立開寳元年太平興國二年三年五年六年來貢伷死弟治立太平興國七年九月遣使來貢制以治為王九年端拱元年來貢淳化二年遣使來印經詔賜之四年又來貢五年來乞師優詔答之治死弟誦立誦初立遣兵校徐遠來候朝廷德音遠久不至咸平三年其臣吏部侍郎趙之遴命牙將朱仁紹至登州訪之州將以聞召見仁紹囬因賜誦鈿函詔六年來貢乞師優詔答之誦死弟詢立大中祥符七年天禧元年五年天聖八年來貢元豐類藁巻三十一
