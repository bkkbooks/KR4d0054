body:
  text: 元豐類藁卷三十五宋曾鞏撰奏狀福州擬貢荔枝狀并荔枝録右臣竊以禹貢揚州厥包橘柚錫貢則百果之實列於土貢所從來巳久二帝三王所未嘗易也荔枝於百果為殊絶產閩粤者比巴蜀南海又為殊絶閩粤官舍民廬與僧道士所居自階庭場圃至于山谷無不列植歲取其實不可勝計故閩粤茘枝食天下其餘被於四夷而其尤殊絶者閩人著其名至三十餘種然生荔枝畱五七日輒壞故雖歲貢皆乾而致之然貢盡為常品相沿巳久其尤殊絶者未嘗以獻盖東漢交阯七郡貢生荔枝十里一置五里一候晝夜馳走有毒蠱猛獸之害而唐天寳之間亦自巴蜀驛致實開侈心當陛下之時方以㳟儉寡欲為天下先固不可得而議及於此也至於歲貢既乾而致之然顧以常品其尤殊絶者則抑於下土使田夫野叟往往属厭而太官不得獻之於陛下陛下不得獻之於宗廟兩宮使勞人費財如此何也盖荔枝尤殊絶者固不可多致若每種歲貢數百或至千數毎州不過用三五步卒使之日行兩驛固不為勤且煩非有勞人費財之患而修貢者不知及此此臣之所未諭也又荔枝成實在六七月間雖乾而致之然新者於其甘滋猶未盡失至於經歲則所存者特其滓苴而巳而毎歲貢入常至冬春夫蠻夷異類贄其方物皆知用其土產之良而不敢慢今邦域之内守藩之臣効其貢職而曾不知出此此臣之所以不敢安也故臣常欲至荔枝成實約旁近州各擇其尤殊絶列於名品者差其多少以時上進其領於有司備燕賜之用者自如故事盖建安貢茶自蔡襄易以小團而茶之絶特者始得獻之天子今荔枝復得貢其尤者則閩粤之產選擇而充庭實者始備所以致臣之恭於其貢職此臣之官守也荔枝録陳紫出興化軍秘書省著作佐郎陳琦家於品為第一江緑出福州類陳紫差大而香味盖為次也方紅徑可二寸色味俱美荔枝之大無出此者歲生二一作一二百顆而巳出興化軍尚書屯田郎中方蓁家紫種似陳紫實大過之出興化軍小陳紫實差小出興化軍宋公荔枝實如陳紫而小甘美亦如之出興化軍宋氏世傳其木巳三百歲藍家紅泉州第一出尚書都官員外郎藍丞家周家紅初於興化軍為第一及陳紫方紅出而周家紅為次何家紅出漳州何氏法石白出泉州法石院色青白其大次於藍家紅緑核出福州荔枝核紫而此獨核緑圓丁香丁香荔枝皆旁蒂大而下銳此獨圓而味尤勝右十四種皆以次第著於録虎皮色紅而有青斑類虎皮出福州牛心以狀名之長二寸餘皮厚肉澁出福州惟一本玳瑁紅色紅而又有黒㸃類玳瑁出福州城東琉黄以色類琉黄朱杮色朱如杮出福州蒲桃荔枝穗生一穗之實至三一作一二百然其品殊下蚶殻以狀名之龍牙長可三四寸彎曲如爪牙而無瓤核出興化軍然不常有水荔枝漿多而淡出興化軍蜜荔枝以甘為名然過於甘丁香荔枝核小如丁香大丁香殻厚色紫味微澁出福州天慶觀雙髻小荔枝毎朶數十皆並蔕雙實真珠荔枝團白如珠無核荔枝之最小者十八娘荔枝色深紅而細長閩王王氏有女第十八好食此因而得名女家在福州城東報國院冡旁猶有此木或云謂物之美少者為十八娘閩人語將軍荔枝五代時有此官者種之因以得名出福州釵頭顆荔枝顆紅而小可施釵頭粉紅荔枝荔枝多深紅而此以色淺為異中元紅實時最晩因以得名火山荔枝本出南越四月熱穗生味甘酸肉薄閩中近年有之右二十種無次第荔枝三十四種或言姓氏或言州郡或皆識其所出或不言姓氏州郡則福泉漳州興化軍盖皆有也一品紅言於荔枝為極品也出近歲在福州州宅堂前狀元紅言於荔枝為第一出近歲在福州報國寺明州擬辭高麗送遺狀竊見接送髙麗使副儀内一項髙麗國進奉使副經過州軍送知州通判土物並無答謝書候進奉使囬日依例估價以係官生帛就數類量加囬答撿㑹熈寧六年髙麗國進奉有使副送明州知州通判土物共估錢一百貫以上九十九陌熈寧五年及九年有進奉使無副使送明州知州通判土物共估計價錢一百貫以上九十九陌其土物奉聖㫖並依例令收估價囬答臣今有愚見合具奏聞者右謹如前竊以髙麗在蠻夷中為通於文學頗有知識可以德懷難以力服也故以隋之全盛煬帝之世大兵三出天下騷然而不能朝其君及至唐室以太宗之英武李勣之善將至於君臣皆東嚮以身督戰而不能㧞其一城此臣之所謂難以力服也宋興自建隆以來其王王昭以降六王繼脩貢職使者相望其中間厭於强隣自天勝以後始不能自通於中國陛下即阼聲教四塞其國聞風不敢寧息不忌强胡之難不虞大海之阻效其土實五歲三至如東西州唯恐在後其所以致之者不以兵威此臣之所謂可以德懷也陛下亦憐其萬里惓惓歸心有德收而撫之恩禮甚厚州郡當其道途所出迎勞燕餞所以宣達陛下寵錫待遇之意此守臣之職分也其使者所厯之州贄其所有以為好於邦域之臣陛下加恩皆許受之而資以官用為其酬幣其使一再至之間許其如此不為常制可也今其使數來邦域之臣受其贄遺著於科條以為常制則臣竊有疑焉盖古者相聘贄有珪璋及其卒事則皆還之以明輕財重禮之義今蠻夷使來邦域之臣與之相接示之以輕財重禮之義使知中國之所以為貴此人事之所宜先則當還其贄如古之聘禮還其珪璋此誼之所不可巳也又古之以贄見君者國君於其臣則受之非其臣則還之今蠻夷嚮化來献其方物以致其為臣之義天子受之以明天下一尊有臣而畜之之義此不易之制也邦域之臣與其使接以非其臣之義還其贄以明守禮而不敢踰亦不易之制也以此相厲以明天子之尊中國之貴所重者禮義所輕者貨財其於待遇蠻夷之道未有當先於此者也且彼贄其所有以明州一州計之知州通判所受為錢三一作一二十萬受之者既於義未安其使自明而西以達京師厯者尚十餘州當皆有贄以彼之力度之蠻夷小國其於貨財恐未必有餘也使其有親附中國之心而或憂於貨財之不足臣竊恐有傷中國之義而非陛下所以畜之幸之之意也臣愚竊欲自今髙麗使來贄其所有以為好於邦域之臣者許皆以詔㫖還之其資於官用以為酬幣巳有故事者許皆以詔㫖與之如故惟陛下詳擇之如可推行願更著於令盖復其贄以及於恐其力之不足厚其與以及於察其來之不易所謂尚之以義綏之以仁中國之所以待蠻夷未有可以易此者也其國粗為有知轉相告語必皆心服誠悦慕義於無窮此不論而可知也臣愚非敢以是為亷誠以拊接蠻夷示之以輕財重禮之義不可不先庶幾萬分之一無累於陛下以德懷遠人之體是以不敢不言惟陛下裁擇謹具狀奏聞伏候勑㫖擬辭免脩五朝國史狀右臣去年八月伏奉勑命充史館脩撰又奉聖㫖專典史事且將三朝國史先加考詳候兩朝史了日一處脩定又於延和殿伏䝉面諭所以任属臣之意臣是以祗服聖恩不敢辭避天下皆知臣居此職出自主知以為榮遇况臣以至孤至遠之跡出深忌積毁之餘獨蒙明主知而用之且自古以來天下之士不遇者多矣如臣遭遇者無幾則臣捐草茅之軀以報天地之德固其分也至於效其區區之愚豈足為陛下道哉况以文字薄技得因聖宋之大典託名萬世學士大夫莫不願備其任而獨臣之愚幸預采擇此臣所以窮日夜憊精思不敢忘須臾志在於斯文惟恐不稱其任以負陛下任属之意也自到局以來仰尊聖訓且將三朝國史先加考詳伏見祖宗以來神功聖德巍巍之烈至於厯世將相文武士吏言行聲實殊尤之跡至髙至大巳非愚臣所能究盡况兩朝國史臣所未見竊惟五世百有餘年聖賢事業本末閎大臣之淺薄加以齒髮衰晩誠恐不能發明論次以稱陛下顯揚褒大之心虚食大官汗青無日以負陛下任属之意此臣之所大懼也况五朝舊史皆累世公相卿士道德文學朝廷宗工所共凖裁既巳勒成為國大典臣以至孤至遠之跡出深忌積毁之餘材質駑下豈宜輒議損益使臣仰恃日月之照不知自任之妄貪慕恩待趣之以就事誠恐黒白不雪律呂失次方於舊史有失無得以負陛下任属之意此又臣之大懼也若不早具上陳自求罷退至於歲月寖久不職之罪巳不可逃雖欲乞身已無可及是以不避萬死之責敢干聖聽伏望出自聖慈察臣悃愊罷臣史事別與臣一差遣臣之昏愚不肖固已盡在陛下聽察之中如蒙終賜收憐别加驅策顧臣之鄙奉令承詔可幸無罪則碎首捐軀固臣之所以此明臣之志在於量能知分非敢苟且之事也伏惟陛下天地父母哀而憐之元豐類藁卷三十五
