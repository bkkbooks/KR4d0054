front:
  text: 爾心以無撓于余法在知所守可不勉歟
  hash: sha256:6b452b415567e1c5305e5cbee1fad3e9bd5bf423ecf15577bb704241ff1c9342
body:
  text: 元豐類藁巻二十四欽定四庫全書元豐類藁巻二十五宋曾鞏撰制誥袐書監制帝王之治必有圖籍之藏又擇當世聰明拔出之士聚於其間使得漸磨文學之益奬成其材以待國家之用故書省之設吾不計近功而要於廣畜徳所以厚其禮秩而艱於用人庶以明朕好古樂善之勤而勵學士大夫之行也某多識博聞操守純篤諸儒所尚令問惟舊延處兹位蔽自朕知夫尊其所聞而行之不倦使輔於世教而其效可言非獨優游册府而已在爾自强以承朕志著作郎制麟臺著作之任郎以詞學為之必惟其人爾以材選惟能明於理要乃可見於文章其尚敏於厥修朕方觀汝之效秘書郎制秘藏四部之圖籍郎所守也職清秩美必也屬之其人爾以材稱俾服茲選尚惟敏於畜徳朕方觀汝之能正字制是正文字之官實為儒學之選宜體育材之意勉思畜徳之勤殿中監制分職殿内叅侍左右監總六尚之官以供服御之事位視九列禮秩甚優正名之初考擇惟慎某明習吏治勞閱有聞選於在廷俾踐厥任徃其祗飭無忘訓詞殿中丞制丞於殿内叅總六尚之官而察其得失出於公選首以材升尚務欽承方觀汝效太常丞制丞於奉常叅總禮樂之事祠祀之義惟學古知方乃能不失其守尚務秪飭以服官箴衞尉卿制典領宿衞之官地親責重位在九列禮秩甚隆考擇其人屬任惟慎某忠篤謹信濟以材敏周廬屯候之士武庫弓鎧之器往顓總治僉曰汝諧其尚懋哉以祗朕命太僕卿制書曰僕臣正厥后克正蓋親近左右有輔導之義矧車府廏馬牧監之政莫不咨焉非得其人曷稱厥位某材質敏明久更器使司馭之選汝惟克諧其祗厥官以服朕命大理卿制折獄詳刑之事朕所重也典領之官位在九列正名之始選用非輕某明習吏治通於法令廷尉之任僉曰汝諧往其欽哉以率厥屬國子祭酒司業制學校之法雖使之通經術治文字然要其大致則在於明上之教以導民養人之材以成俗故師氏之位必惟其能某質性粹冲術業通博訓誨之任宜正寵名夫行其所知以先游學之士使風化之出自京師始待爾稱職可不懋哉太學博士制博士以文學為官徃者列於成均其秩未正朕登之朝序所以尊庠序之教而勵士大夫也爾以經行選用往服厥官蓋尊其所聞以誘率學者汝之守也惟是懋哉少府監制百工伎巧之事展采備物之政典領之任位視列卿正名之初考擇惟慎其明習吏治勞閱有聞選於僉言俾踐厥職尚其祗飭以服訓詞軍器監制繕治戎械訓工程作之任置監典領禮秩甚隆正名之初考擇惟慎某明習吏事勞閲有聞選於在廷俾踐厥位尚其祗飭以服訓詞大宗正丞制司宗之於國族門内之治也然合逺近之屬而齊之有不得專於愛者其於斟酌緩急恩義之際信難處哉故其屬有丞以參聽其事而交修其官考擇爾能俾在茲選夫親九族以刑萬邦此有國之先務也其體朕心往從而長服茲是訓以欽厥司諸丞制丞於有司參其政事而察其稽失以材選用尚懋爾勤知開封府制開封府朕建國焉天下所並湊衆大而俗雜尹正之寄非仁篤公勇材任煩劇不能稱其職今朕修定官儀正其名號固將考求其實使效見於事則用人之際豈輕也哉某爽邁開達練習治體閱試惟舊功用顯白處以茲任莫如汝諧夫慈惠足以煦養惸弱剛嚴足以帖伏奸强然𨗳民之方尚有可識使四方有以觀則而朕有以仰成在汝勉哉以稱朕命開府儀同三司制開府之於榮名重矣矧優其禮命視于三事故其品為第一所以隆崇大臣古今之通制也朕順于舊典考正官儀惟是首於文階是用制其禄入秩莫厚焉非時宗工夫豈虚授某材資傑異識慮閎深莊重足以鎮浮精明足以成務熙帝之載有賛元經體之庸提將之符有折衝綏逺之效今百揆攸叙方内靖嘉時乃之功助朕致此是用峻其名秩申此寵章夫褒有功顯有徳朕於尊奬近輔之心可謂至矣親百姓撫四夷爾於將順朕志之義可不懋哉尚體至懷往承厥叙開封府獄空轉官制京師天下之聚俗雜五方之民至於智或侵愚强或凌弱巧偽滋出獄訟繁興統理之難為日已乆某明敏開達曉習吏事輟自禁近屬之尹正以公於奉上之志絶阿以附下之私摘發姦欺動而必中彈治豪右勇於敢為使縲絏無非罪之嗟囹圄有空虚之效求之近歲罕能及此聞于朕聴時惟汝加夫賞所以褒善而勸衆也進官一等疇爾之庸其尚懋哉以永來譽樞密遷官加殿學士知州制典國樞要之臣協相帷幄之謀彌綸疆域之事夙夜不懈風力施於省决精明用於思慮蓋勤且煩如是而歴時且乆豈朕優禮耆舊之意歟某忠嘉惠和徳操惟劭先帝所遺以輔朕躬當國本兵庶言惟允而屢辭幾政每請彌確志不可易朕所重違是用改進文階延升祕殿乃眷東夏處以近藩衍食真封併加寵數朕於隆崇近輔時其勞逸使得自擇出入之宜可以為有恩矣爾於迺心王室罔以内外無忘益勵始終之節其可以不勉哉侍讀制蓋用儒學之臣入閣侍讀所以考質疑義非專誦習而已其列於分職始自開元而朕尤意嚮之某博通今古服在從官茲選甚高屬爾惟允朕以未聞於史者究觀前世之變而至夫理亂興壞之際未嘗不反復焉其悉所知以輔朕志是為爾守其往欽哉殿前都指揮使制朕擇材勇之士備宫屯之兵以宿衛京師鎮撫方夏置帥殿陛屬之董齊非强毅忠勞閱試惟舊不在茲選豈非重歟某篤實沉雄明於䇿慮護邊制敵身有顯庸茲用命爾就列大廷典綏王族建旄立纛為國藩翰爰田真食並錫寵恩夫兵有擊刺射馭之能有坐作進退之法教習可以程其技節制可以閑其侮然能使之合心一力則在知所以附之能使之取威决勝則在知所以用之審如是焉厥惟難矣蓋熟之於易所以圖其難得之於素所以應其變非造形而後定計非合戰而後屈人故師飽於逸而朝廷尊馬肥於休而邊隅靖惟予之武以無敵於四方則爾之良亦有聞於來世往遵辭訓以服厥官使相制在昔大雅所歌成周之盛吕侯申伯並為國藩休父太師實將王旅出入踐更之雖異中外屏毗而則均時予宗臣分保近服蓋循斯義以告在廷某精慮造微翹材絶衆崇論閎議富于文辭强識博聞飽於術學繇禁林之獻納任廊廟之弼諧浸更歲時休有功烈而屢形懇請願避煩幾雖敦譬之甚勤顧壯懷之難奪是用錫之土宇寵以節旄視宰路之等威益爰田之恩數往釐東夏外倡庶邦予有式羣辟之典彛爾其底迪予有覃四方之徳澤爾其布宣以夾輔於本朝以阜康於生齒配於前哲屬在老成其代天工矧乆聞於大政迺心王室尚思告於嘉猷節度使制有地千里治兵與民内衞京師外撫疆埸非文武器幹望臨一時朕所寵嘉不在茲選某温良能斷沉靜善謀直道著於當官周材見於經務承流宣化善政有聞綏逺折衝壯猷彌顯是用錫之土宇授以節旄生齒實繁屬爾以安輯師屯甚衆諉爾以訓齊以作朕股肱之良以為國藩輔之重無忘忠烈庶訖外庸惟亮天功待汝守四方之效無輕民事副予安百姓之心尚體眷懷豈煩多訓節度加宣徽制維昔牧伯長師之官有土與民共于外服所以為國藩輔今方鎮之任連數十城之地籍兵與衆而授之建旄立纛殿于大邦以作衞王室亦惟用稽于古非文武之特才擅一時孰能稱茲選哉厥有顯庸宜加寵命迺揚孚號以告庶位某莊毅足以任重肅哲足以禔身有能斷大事之明有克勤小物之慎考于僉議付以成師宣化承流實禆治體折衝綏逺克暢武經故能紓朕之憂副人之望夫徳茂者其賞異功隆者其報殊是疇其底績之勤錫以宣猷之號揆于常典非朕爾私蓋位重者其憂深禄富者其責厚名數禮秩朕既無忘爾勞功實事為爾尚協朕之志矧夫填臨塞路總領兵防班籍聨于輔臣謀畫參于國論其思勉勵以副眷懷軍師制𤓰牙之臣典領周衛非特强主威以鎮内外也蓋禮彌盛者備彌飭上下之節然也則任吾事者豈可以非其人哉某沉勇忠實勞閲有聞蔽自朕心俾供厥服仍遷位等其尚叙承將軍制朕有連營列校之衆以宿衞京師鎮撫諸夏能使士齊而奮其惟統督之臣求之在廷其選甚重某忠勇仁厚將以智謀使治吾軍必能副朕所屬今閱士之藝朕皆親臨拔其異能而汰其疲軟其於撫循訓勵之方可謂至矣爾於典領惟公賞罰可以服其心惟篤恩信可以致其力使處則有以養朕之威出則有以揚朕之武待爾任職稱朕意焉都虞候制士之以材武宿衛左右者其選甚精而虞度候視於軍中者其任甚寵某忠勇有勞宜在此位進遷使號其往欽承都知制門闈房闥之間朝夕給事非謹信忠篤烏可處斯任哉某服勞左右閱歲已深淑慎厥躬朕所考察俾率厥屬往惟汝宜其思永於厥修尚終綏于榮禄内臣制給事長秋服勤惟舊今其老矣思就便安録爾之勞宜進位等尚思祗服以稱朕恩責帥制朕拊士於閒暇之時蓋將責其效也至於臨敵逋亡朕雖假之以恩而將帥之臣則當濟之以肅使紀律章明然後威可勵而士可用也爾握兵之要宜知其職而潰卒之入煦煦受之勞問餉給如勞歸師使夫三軍之衆將何視焉有苟簡姑息之心無守正奉公之誼閫外之事朕孰賴哉議罪正刑有國之典奪其近職處以偏州尚自省循茲為薄責監司制分部而使連數十城事之與奪吏之黜陟係焉古方伯之任也其選甚重固無假人爾修潔純明治行强敏刺督之寄往共厥服夫能使政舉刑清和樂交於上下人足家給富饒洽於公私皆汝守也可不念哉廣西轉運制自既開百粤而地盡南海提封萬里莫不内屬本朝之制始分桂林以為西部非獨鎮撫吾民亦以綏馭山居谷聚並海之蠻夷故將命而使其選常重爾嘗試而可居是用任屬惟柔逺則能邇其務宣布上恩輯寧異土無失朕指往欽厥司蜀轉運判官制西南之地延袤萬餘里外臨殊俗内雜谿谷諸蠻列州成縣以保安吾民境大人衆故屬部為四而利居其一最逺且險參於使事其選甚高求於在廷是用屬爾夫保民以仁而懷逺以徳茲朕所嚮其往欽哉轉運使制國家歲漕東南之粟以實京師故命使部之臣推擇能吏使度材具舟以濟其役爾應其選歲課甚優是用遷秩京司以為爾寵朕於臣下之勤勞雖微且逺無所遺矣則爾之自効可不勉哉陜西轉運使制分部而使兼地數千里治兵與民與夫征賦之出入自陜以右則又與疆埸之事具於寄屬必惟其人察于在廷無以易爾夫使督課明而政事舉經畫當而財用足吏與士皆悅而勸兵與民皆贍而靖爾之任也其尚起哉提舉常平制一朕憫農之不易故擇材諝之臣分部四出以平其政令而佐其衣食之業爾以能聞當是任屬其務知朕之意在於惠民往慎厥司慰彼黎庶提舉常平制二朕憫夫農之艱且勤故詳為勸助之政又擇能吏分部四出使推而行之爾以材聞預在茲選其思宣布朕恩使敦本業之民安其田里而足於衣食則爾為能稱其職可不勉哉元豐類藁巻二十五
