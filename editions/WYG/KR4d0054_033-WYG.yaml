body:
  text: 元豐類藁卷三十三宋曾鞏撰奏狀進奉熈寧四年明堂絹狀祀而嚴配王國之上儀助者駿奔人臣之常奉前件物實之用篚旅以造庭阻就列以陪祠庶將心於拱極載循僣冒伏積震惶進奉熈寧七年南郊銀絹狀天休不宰故大報於親郊上德難名唯駿奔於助祭兹為邦禮以合人情前件物輒用土毛敢叅庭實第從臣之嘉頌獨遠清光得萬國之歡心庶將薄意干冒宸扆臣不任進奉熈寧七年同天節銀絹狀自天生德與世為歸属當載育之期敢薦無疆之祚前件物輒備土毛之末用叅篚貢之餘遠守蠻荆莫預造庭之會仰懷象魏但祈難老之祥進奉熈寧八年同天節銀絹狀元命在躬方啓龍興之運鴻圖集祉爰開鳦降之祥前件物敢薦服官用叅庭實縁易供之薄献祝難老之殊祥襄州乞宣洪二郡狀右臣今任至今年九月成資巳蒙差太常少卿孫頎替臣成資闕今臣去替秪有數月竊念臣為有私便欲乞就移洪州或宣州一任情願守待遠闕謹具狀奏聞伏候勅㫖奏乞囬避呂叔卿右臣伏奉勅命就差權知洪州軍州事充江南西路兵馬都鈐轄巳發來赴任次今覩呂叔卿授江西轉運副使伏縁臣先任齊州得替後呂叔卿為京東路察訪於齊州多端非理求臣過失頼臣無可捃拾兼臣弟布與呂惠卿又有嫌隙二事皆中外共知今叔卿任江西監司洪州在其統属須至陳乞囬避伏乞指揮檢會臣先奏乞移洪州或宣州或東南一般州郡臣為母親現在饒州迤邐前去饒州伺候朝㫖奏乞與潘興嗣子推恩狀右臣伏覩本州人試將作監主簿潘興嗣五歲以父任得官二十二歲授江州德化縣尉不行熈寧二年朝廷察其髙以為筠州軍事推官不就今年五十六歲安於静退三十餘年臣竊以康定中徐復以處士収用辭不就得官其一子近王囬孫侔皆以幽潜見録命下而囬巳死亦得官其一子李覯以國子直講退歸死十年亦得録其後則國家之於激奬亷退既肆其所守又恩及其世盖有故事今與王囬同時見録之人有孫侔而後又有興嗣處幽不改其操皆巳白首然未有為上聞者故其子獨未蒙恩竊以康定至今幾四十年士之抗志於隱約而為朝廷所知者止此數人盖枯槁沉溺其守至難故其人至少為國家者取而顯之使天下皆知士之特立無求於世者不為上之所遺則自重者孰不勉浮競者孰不悔可謂施約而勸博寵録之所以勵世其實在此臣故敢以聞伏惟陛下幸察侔及興嗣躬難進之節遭遇聖時用王囬徐復李覯為比加恩其子使斯人不卒窮於閭巷足以明示天下興嗣有子羣年二十六歲孫侔今家眞州謹狀奏聞伏候勅旨奏乞復呉中復差遣狀右臣復見提㸃本州玉隆觀龍圖閣直學士給事中呉中復年六十六歲精力未衰志意甚壯歴事累朝嘗任諫官御史以直道正言能稱其職又任邦伯理兵治民皆有可紀孔子曰如有所譽者其有所試矣如中復之材有巳試之效可謂明白方今中外任使嘗患乏人如中復者豈可遂其閒逸欲乞召至左右使典司獻納或委以藩鎭使剸治煩劇必能上副憂勤不負寄任況中復年未當退又無疾病處之㪚地衆謂非宜伏望早賜收用以稱朝廷尚賢求舊之意臣忝任州長不敢不言謹具狀奏聞伏候勅旨辭直龍圖閣知福州狀右臣準洪州送到勅牒一道授臣直龍圖閣就差權知福州交割本職公事以次官員發赴本任者孤遠之臣幸蒙收擢聖恩深厚誼豈敢辭伏念臣老母年髙近歲多病臣弟布巳移知廣州見赴本任臣若更適閩越則兄弟並就遠官犬馬之志不勝徬徨伏望聖慈矜憫特寢新命與臣一便地差遣所有勅牒臣未敢祗受巳牒洪州寄軍資庫收管臣巳交割本職公事與以次官員不敢於舊任處久住見迤邐前來聴候指揮謹具狀奏聞伏候勅旨福州舉知泉州陳樞久不磨勘特與轉官狀右臣體訪得轄下知泉州尚書屯田員外郎陳樞不下磨勘文字巳十五年中間曾遇覃恩改官其於綿歴歲月積累勞能則考課常法蓋未及之列於郎曹為日已久方當朝廷崇尚廉素誡抑浮競之時樞獨安於冲靜所守如此况樞操履純篤出自天資治行循良見於衆論自歴州縣及任淮南提㸃刑獄與今來再任泉州所至風績皆可稱記伏乞特降指揮下審官東院檢會樞合該磨勘月日采其久不自陳特與優轉名曹以奬恬退臣沗備寄任不敢不言謹具狀奏聞伏候勅旨福州奏乞在京主判閒慢曹局或近京一便郡狀右臣輒露悃愊仰干旈扆臣母老多病見居京師臣任福州臣弟布任廣州相去皆數千里臣犬馬之志寔不遑寧臣昨移福州之日曾乞哀憐改授近地尋奉聖旨不允不敢再請臣既到任属所部之内冦孽遺類往往尚聚山谷居人未寧遠近疑駭而州之属邑又有出於旱饑之後臣於此時正當竭其駑鈍復不敢以私計自陳自去冬及今春以來上頼朝廷威德蟻聚餘㓂悉又殄除田疇之間連獲登稔今山海清謐千里宴然里閭相安粟米豐羡臣於所部乃無一事可以自効况臣到任今年八月巳及一年遠去庭闈為日巳久晨昏之戀誼難苟止則臣可以乞恩寔在今日伏見朝廷至仁比來羣臣之中有欲便於養親者並蒙聽許况臣母子各巳白頭兄弟二人皆任遠地今臣於官守又無可以驅馳之事伏望聖慈憫惻以臣老母見在京師與臣一在京主判閒慢曹局差遣或就移近京一便郡庶便親養臣雖糜殞曷報聖恩臣不任惶懼戰汗激切屏營之至移明州乞至京迎侍赴任狀右臣昨以老母在京而臣知福州臣弟布知廣州相去各數千里幸臣所部之内盗賊殄除年穀豐稔臣於守官既無驅馳之事而臣到任巳及一年遠去庭闈為日巳久奏乞聖慈哀憐以臣老母見在京師與臣一在京主判閒慢曹局差遣或移臣近京一便郡庶便親養尋准中書劄子巳降勅命差臣權判太常寺兼禮儀事奉聖㫖仰臣交割職分公事訖發來赴闕臣遂起離前來至洪州覩進奏院報巳差臣知明州伏念臣巳奔馳在路屈指計日望至親側竊計臣老母之心聞臣而來倚門之望固巳深切今母子垂欲相見而臣忽他改差遣晨昏之戀既未得伸迫急之誠惟知涕泗且臣母子各巳白首臣母近歲多病臣弟布又知桂州私門之内長子二人皆違左右而臣於兄弟之内又最居長犬馬之志豈敢苟安况今所得明州足可迎侍臣不敢别有陳乞欲望出自聖恩特賜矜憫許臣徑馬暫至京師迎侍老母赴任不敢别有住滯伏惟天地之德哀而憐之臣欲候授勅後陳此懇誠臣見在道路恐慮勅命附遞前來或致遲延須至便具奏請所貴早得指揮不致别有畱滯臣見水路前去所有朝㫖乞降至眞州以來付臣謹具狀奏聞伏候勅㫖明州奏乞囬避朱明之狀伏為本路提㸃刑獄朱明之是臣母之親堂弟牒明州檢到勅條竊慮合該回避須至奏聞者右謹具如前乞賜檢會如合該囬避欲望聖慈念臣在外十有一年巳更六任幸遇非常之主職與内朝而自陛下即祚以來未得一親玉色人臣愛君惓惓希慕之心未能自棄為日巳久兼臣昨任福州已係遠地迎侍不得即今老母多病見在京師人子之義晨昏之戀固難苟止二者於臣之心實為迫切如臣合當避親臣不敢陳乞在京差遣只乞對移陳蔡一郡許臣暫至京師迎侍老母赴任使臣仰得就日月之光俯得伸犬馬之養臣至孤至遠之迹抱此微誠如不自言誰當為臣言者伏惟陛下天地父母哀而憐之出自聖慈特賜矜許臣不任臣子區區激切之情謹具狀奏聞伏候勅旨進奉元豐元年同天節功德疏狀彌月開祥本周家之極盛千秋紀節繇唐室之寖昌矧属熈朝寔標華旦是敢䖍遵象教恭啓法筵傾率土之歡心祝後天之遐算庶偕動植永頼生成進奉元豐元年同天節銀狀鳦鳥之詩本商人之所自出生民之什原周室之所繇興矧属休辰寔開令節生成之造雖難稱於大恩愛戴之心庶可將於薄物用祝乾坤之久永為夷夏之依進奉元豐二年同天節銀絹狀人神祐助是開彌月之祥夷夏歸依方祝後天之算前件物旅於庭實出自土毛仰睎北極之尊用將微意願固南山之壽永庇羣生移知亳州乞至京迎侍赴任狀右臣五月二十日伏奉勅命就差知亳州既近輦轂又便庭闈仰荷天恩俯從人欲非臣淺薄所能報稱伏念臣前奏中具陳在外十有一年巳更六任幸遇非常之主職與内朝而自陛下即祚以來未得一親玉色人臣愛君惓惓希慕之心未能自棄為日巳久兼臣昨任福州巳係遠地迎侍不得即今老母多病見在京師人子之誼晨昏之戀固難苟止二者於臣之分實為迫切如臣合當避親臣不敢陳乞在京差遣只乞對移陳蔡一郡許臣暫至京師迎侍老母赴任使臣仰得依日月之光俯得伸犬馬之養今臣幸蒙恩詔移守亳州如臣所請况亳州去京不遠欲乞許臣暫至京師迎侍老母赴任臣見巳交割訖發離前來所有囬降朝旨乞降至泗州付臣謹具狀奏聞候勅旨元豐類藁巻三十三
