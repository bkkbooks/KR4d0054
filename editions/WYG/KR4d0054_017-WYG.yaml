body:
  text: 元豐類藁巻十七宋曾鞏撰記分寧縣雲峯院記分寧人勤生而嗇施薄義而喜爭其土俗然也自府來抵其縣伍百里在山谷窮處其人修農桑之務率數口之家留一人守舍行饁其外盡在田田髙下磽腴隨所宜雜殖五糓無廢壤女婦蠶抒無懈人茶塩蜜紙竹箭材葦之貨無有纎鉅治咸盡其身力其勤如此富者兼田千畝廪實藏錢至累嵗不發然視捐一錢可以易死寧死無所損其於施何如也其間利害不能以稊米父子兄弟夫婦相去若奕碁然於其親固然於義厚薄可知也長少挨坐里閭相講語以法律意嚮小矣則相告訐結黨詐張事闗節以動視聽甚者畫刻金木為章印摹文書以貽吏立縣庭下變偽一日千出雖笞朴徒死交迹不以属心其喜争訟豈比他州縣哉民雖勤而習如是漸涵入骨髓故賢令長佐吏比肩常病其未易治教使移也雲峯院在縣極西界無籍圖不知自何時立景德三年邑僧道常治其院而侈之門闥靚深殿􅃦言言棲客之廬齋庖庫庾序列兩傍浮圖所用鐃鼓魚螺鐘磬之編百器備完吾聞道常氣質偉然雖索其學其歸未能當於義然治生事不廢其勤亦稱其土俗至有餘輙斥散之不為黍累計惜樂淡泊無累則又苦能勝其嗇施喜爭之心可言也或曰使其人不汨溺其所學其歸一當於義則桀然眎邑人者必道常乎未敢必也慶厯三年九月與其徒謀曰吾排蓬藋治是院不自意成就如此今老矣恐泯泯無聲畀來人相與圖文字買石刻之使永永與是院俱傳可不可也咸曰然推其徒子思來請記遂來予不讓為申其可言者寵加之使刻示邑人其有激也二十八日南豐曾鞏記僊都觀三門記門之作取備豫而已然天子諸侯大夫各有制度加於度則譏之見於易禮記春秋其旁三門門三塗惟王城為然老子之教行天下其宫視天子或過焉其門亦三之其備豫之意葢本於易其加於庭則知禮者所不能損知春秋者所太息而已甚矣其法之蕃昌也建昌軍南城縣麻姑山僊都觀世傳麻姑於此僊去故立祠在焉距城六七里由絶嶺而上至其處地反平寛衍沃可宫可田其獲之多與他壤倍水旱之所不能灾予嘗視而歎曰豈天遺此以安且食其衆使世之衎衎施施趨之者不已歟不然安有是邪則其法之蕃昌人力固如之何哉其田入既饒則其宫從而侈也直慶厯六年觀主道士凌齊曅相其室無不修而門獨􅋻曰是不足以稱吾法與吾力遂大之既成託予記予與齊曅里人也不能辭噫為里人而與之記人之情也以禮春秋之義告之天下之公也不以人之情易天下之公齊曅之取予文豈不得所欲也夫豈以予言為厲已也夫八月日記秃秃記秃秃髙宻孫齊兒也齊眀法得嘉州司法先娶杜氏留髙宻更紿娶周氏與抵蜀罷歸周氏恚齊紿告縣齊貲謝得釋授歙州休寧縣尉與杜氏俱迎之官再朞得告歸周氏復恚求絶齊急曰為若出杜氏祝髪以誓周氏可之齊獨之休寧得娼陳氏又納之代受撫州司法歸間周氏不復見使人竊取其所產子合杜氏陳氏載之撫州明道二年正月至是月周氏亦與其弟來欲入據其署吏遮以吿齊齊在寳應佛寺収租米趍歸捽挽至廡下出偽劵曰若傭也何敢爾辯於州不直周氏訴於江西轉運使不聴久之以布衣書里姓聨訴事行道上乞食蕭貫守饒州馳告貫饒州江東也不當受訴貫受不拒轉運使始遣吏祝應言為覆周氏引産子為據齊懼子見事得即送匿旁方政舍又懼則收以歸搤其咽下不死陳氏從旁引兒足倒持之抑其首甕水中乃死秃禿也召役者鄧旺穿寢後垣下為坎深四尺瘞其中生五嵗云獄上更赦猶停齊官徙濠州八月也慶厯三年十月二十二日司法張彦慱改作寢廬治地得坎中死兒驗問知状者小吏熊簡對如此又召鄧旺詰之合獄辭留州者皆是惟殺禿秃狀盖不見與予言而悲之遂以棺服歛之設酒脯奠焉以錢與浮圖人昇倫買塼為壙城南五里張氏林下瘞之治地後十日也嗚呼人固擇於禽獸昆蟲也禽獸昆蟲於其配合孕養知不相禍也相禍則其類絶也久矣如齊何議焉買石刻其事納之壙中以慰秃秃且有警也事始末惟杜氏一無忌言二十九日南豐曾鞏作醒心亭記滁州之西南泉水之涯歐陽公作州之二年搆亭曰豐樂自為記以見其名之意既又直豐樂之東幾百步得山之髙搆亭曰醒心使鞏記之凡公與州賓客者遊焉則必即豐樂以飲或醉且勞矣則必即醒心而望以見夫羣山之相環雲烟之相滋曠野之無窮草樹衆而泉石嘉使目新乎其所覩耳新乎其所聞則其心洒然而醒更欲久而忘歸也故即其所以然而為名取韓子退之北湖之詩云噫其可謂善取樂於山泉之間而名之以見其實又善者矣雖然公之樂吾能言之吾君優游而無為於上吾民給足而無憾於下天下學者皆為才且良禽魚鳥獸草木之生者皆得其宜公樂也一山之隅一泉之旁豈公樂哉乃公所以寄意於此也若公之賢韓子殁數百年而始有之今同遊之賓客尚未知公之難遇也後百千年有慕公之為人而覽公之跡思欲見之有不可及之歎然後知公之難遇也則凢同遊於此者其可不喜且幸歟而鞏也又得以文詞託名於公文之次其又不喜且幸歟慶厯七年八月十五日記繁昌縣興造記太宗二年取宣之三縣為太平州而繁昌在籍中繁昌者故南陵地唐昭宗始以為縣縣百四十餘年無城垣而濱大江常編竹為障以自固嵗輙更之用材與力一取於民出入無門闗賓至無舍舘今治所雖有屋而庳逼破露至聴松於廡下案牘簿書棲列無所徃徃散亂不可省而獄訟賦役失其平厯七代為令者不知㡬人恬不知改革日入於壊故世指繁昌為陋縣而仕者不肯來行旅者不肯遊政事愈以疵市區愈以索寞為鄉老吏民者羞且憾之事之窮必變故今有能令出因民之所欲為悉破去竹障而垣其故基為門以通道往来而屋以取固即門之東北構亭瞰江以納四方之賓客既又自大其治所為重門歩廊門之上為樓斂勅書置其中廊之兩旁為羣吏之舎眎事之㕔使坐之齋寢廬庖湢各以序為㕔之東西隅凢案牘簿書室而藏之於是乎在自門至於寢廬總為屋凢若干區自計材至於用工總為日凢二十三又九十六日而落成焉夏希道太初此令之姓名字也慶厯七年十月二十三日此成之年月日也始繁昌為縣止三千戶九十年間四聖之德澤覆露生養今幾至萬家田利之入倍他壤有餘魚蝦竹􅓗柿栗之貨足以自資而無貧民其江山又天下之勝處可樂也今復得能令為樹立如此使得無嵗費而有巨防賔至不惟得以休而耳目尚得以為之觀令居不惟得以安而民吏之出入仰望者益知尊且畏之獄訟賦役之書悉完則是非倚而可定也予知縣之去陋名而仕者争欲來行旅者争欲遊昔之疵者日以减去而索寞者日以富蕃稱其縣之名其必自此始夏令用薦者為是縣至二十七日而計材以至於落成不惟興利除弊可法也而其變因循就功效獨何其果且速歟昔孟子譏子産恵而不知為政於戲如夏令者庶幾所謂知政者歟於是過子産矣凢縣之得令為難幸而得能令而興事尤難幸而事興而得後人不廢壊之又難也今繁昌民既幸得其所難得而令又幸無不便已者得卒興其所尤難皆可喜無憾也惟其欲後人不廢壊之未可必也故屬予記其不特以著其成其亦有以警也某月日南豐曾鞏記墨池記臨川之城東有地隠然而髙以臨於溪曰新城新城之上有池窪然而方以長曰王羲之之墨池者荀伯子臨川記云也羲之嘗慕張芝臨池學書池水盡黑此為其故跡豈信然邪方羲之之不可强以仕而嘗極東方出滄海以娯其意於山水之間豈有徜徉肆恣而又嘗自休於此邪羲之之書晩乃善則其所能盖亦以精力自致者非天成也然後世未有能及者豈其學不如彼邪則學固豈可以少哉况欲深造道德者邪墨池之上今為州學舎教授王君盛恐其不章也書晉王右軍墨池之六字於楹間以掲之又告於鞏曰願有記推王君之心豈愛人之善雖一能不以廢而因以及乎其跡邪其亦欲推其事以勉其學者邪夫人之有一能而使後人尚之如此况仁人莊士之遺風餘思被於來世者如何哉慶厯八年九月十二日曾鞏記莱園院佛殿記慶厯八年四月撫州莱園僧可栖得州之人髙慶王眀饒傑相與率民錢為殿於其院成以佛之像置其中而來乞予文以為記初莱園有籍於尚書有地於城南五里而草木生之牛羊踐之求屋室居人焉無有也可栖至則喜曰是天下之廢地也人不争吾得之以老斯足矣遂以醫取資於人而即其處立寢廬講堂重門齋庖之房棲客之舎而合其徒入而居之獨殿之役最大自度其力不能為乃使慶明傑持簿乞民間有得輙記之微細無不受浸漸積累期月而用以足役以就自可栖之來居至於此葢十年矣吾觀佛之徒凢有所興作其人皆用力也勤刻意也專不肯苟成不求速效故善以小致大以難致易而其所為無一不如其志者豈獨其說足以動人哉其中亦有智然也若可栖之披攘經營攟摭纎悉忘十年之久以及其志之成其所以自致者豈不近是哉噫佛之法固方重於天下而其學者又善殖之如此至於世儒習聖人之道既自以為至矣及其任天下之事則未嘗有勤行之意堅持之操少長相與語曰苟一時之利耳安能必世百年為教化之漸而待遲久之功哉相薫以此再厯千餘載雖有賢者作未可以得志於其間也由是觀之反不及佛之學者逺矣則彼之所以盛不由此之所自守者衰歟與之記不獨以著其能亦媿吾道之不行也已曾鞏記宜黄縣縣學記古之人自家至於天子之國皆有學自㓜至於長未嘗去於學之中學有詩書六藝絃歌洗爵俯仰之容升降之節以習其心體耳目手足之舉措又有祭祀鄉射養老之禮以習其恭讓進材論獄出兵授㨗之法以習其從事師友以解其惑勸懲以勉其進戒其不率其所為具如此而其大要則務使人人學其性不獨防其邪僻放肆也雖有剛柔緩急之異皆可以進之中而無過不及使其識之明氣之充於其心則用之於進退語黙之際而無不得其宜臨之以禍福死生之故無足動其意者為天下之士為所以養其身之備如此則又使知天地事物之變古今治亂之理至於損益廢置先後始終之要無所不知其在堂户之上而四海九州之業萬世之策皆得及出而履天下之任列百官之中則隨所施為無不可者何則其素所學問然也盖凢人之起居飲食動作之小事至於脩身為國家天下之大體皆自學出而無斯須去於教也其動於視聴四支者必使其洽於内其謹於初者必使其要於終馴之以自然而待之以積久噫何其至也故其俗之成則刑罰措其材之成則三公百官得其士其為法之永則中材可以守其入人之深則雖更衰世而不亂為教之極至此鼓舞天下而人不知其從之豈用力也哉及三代衰聖人之制作盡壊千餘年之間學有存者亦非古法人之體性之舉動惟其所自肆而臨政治人之方固不素講士有聰明朴茂之質而無教養之漸則其材之不成夫然葢以不學未成之材而為天下之吏又承衰弊之後而治不教之民嗚呼仁政之所以不行賊盗刑罰之所以積其不以此也歟宋興幾百年矣慶厯三年天子圖當世之務而以學為先於是天下之學乃得立而方此之時撫州之宜黄猶不能有學士之學者皆相率而寓於州以羣聚講習其明年天下之學復廢士亦皆散去而春秋釋奠之事以著於令則常以廟祀孔氏廟又不復理皇祐元年㑹令李君詳至始議立學而縣之士某某與其徒皆自以謂得發憤於此莫不相勵而趍為之故其材不賦而羡匠不發而多其成也積屋之區若干而門序正位講藝之堂棲士之舍皆足積器之數若干而祀飲寢食之用皆具其像孔氏而下從祭之士皆備其書經史百氏翰林子墨之文章無外求者其相基㑹作之本末總為日若干而已何其周且速也當四方學廢之初有司之議固以謂學者人情之所不樂及觀此學之作在其廢學數年之後惟其令之一唱而四境之内嚮應而圖之如恐不及則夫言人之情不樂於學者其果然也歟宜黄之學者固多良士而李君之為令威行愛立訟清事舉其政又良也夫及良令之時而順其慕學發憤之俗作為宫室教肄之所以圖書器用之須莫不皆有以養其良材之士雖古之去今逺矣然聖人之典籍皆在其言可考其法可求使其相與學而明之禮樂節文之詳固有所不得為者若夫正心脩身為國家天下之大務則在其進之巳使一人之行脩移之於一家一家之行脩移之於鄉鄰族黨則一縣之風俗成人材出矣教化之行道德之歸非逺人也可不勉歟縣之士來請曰願有記其記之十二月某日也學舍記予㓜則從先生受書然是時方樂與家人童子嬉戲上下未知好也十六七時闚六經之言與古今文章有過人者知好之則於是銳意欲與之並而是時家事亦滋出自斯以來西北則行陳蔡譙苦睢汴淮泗出於京師東方則絶江舟漕河之渠踰五湖並封禺㑹稽之山出於東海上南方則載大江臨夏口而望洞庭轉彭蠡上庾嶺繇真陽之瀧至南海上此予之所渉世而奔走也蛟魚洶湧湍石之川巔崖莽林驅虺之聚與夫雨暘寒燠風波霧毒不測之危此予之所單遊逺寓而冒犯以勤也衣食藥物廬舍器用箕筥碎細之間此予之所經營以養也天傾地壊殊州獨哭數千里之逺抱䘮而南積時之勞乃畢大事此予之所遘禍而憂艱也太夫人所志與夫弟婚妺嫁四時之祠属人外親之問王事之輸此予之所皇皇而不足也予於是力疲意耗而又多疾言之所序葢其一二之略也得其閒時挾書以學於夫為身治人世用之損益考觀講解有不能至者故不得專力盡思琢雕文章以載私心難見之情而追古今之作者為並以足予之所好慕此予之自視而嗟也今天子至和之初予之侵擾多事故益甚予之力無以為乃休於家而即其旁之草舎以學或疾其卑議其隘者予顧而笑曰是予之宜也予之勞心困形以役於事者有以為之矣予之卑巷窮廬冗衣礱飯芑莧之羮隠約而安者固予之所以遂其志而有待也予之疾則有之可以進於道者學之有不至至於文章平生所好慕為之有不暇也若夫土堅木好髙大之觀固世之聰明豪雋挾長而有恃者所得為若予之拙豈能易而志彼哉遂厯道其少長出處與夫好慕之心以為學舎記南軒記得隣之茀地燔之樹竹木灌􅂼於其間結茅以自休􅅝然而樂世固有處廊廟之貴抗萬乗之富吾不願易也人之性不同於是知伏閑隠隩吾性所最宜驅之就煩非其器所長况使之争於勢利愛惡毁譽之間邪然吾親之養無以脩吾之昆弟飯菽藿羮之無以繼吾之役於物或田於食或野於宿不得常此處也其能無欿然於心邪少而思凢吾之拂性苦形而役於物者有以為之矣士固有所勤有所肆識其皆受之於天而順之則吾亦無處而非其樂獨何必休於是邪顧吾之所好者逺無與處於是也然而六藝百家史氏之籍箋䟽之書與夫論美刺非感微記逺山鑱冡刻浮誇詭異之文章下至兵權厯法星官藥工山農野圃方言地記佛老所傳吾悉得於此皆伏羲巳來下更秦漢至今聖人賢者魁傑之材殫嵗月憊精思日夜各推所長分辨萬事之說其於天地萬物小大之際脩身理人國家天下治亂安危存亡之致無不畢載處與吾俱可當所謂益者之友非邪吾窺聖人指意所出以去疑解蔽賢人智者所稱事引類始終之槩以自廣養吾心以忠約守而恕行之其過也改超之以勇而至之以不止此吾之所以求於内者得其時則行守深山長谷而不出者非也不得其時則止僕僕然求行其道者亦非也吾之不足於義或愛而譽之者過也吾之足於義或惡而毁之者亦過也彼何與於我哉此吾之所任乎天與人者然則吾之所學者雖博而所守者可謂簡所言雖近而易知而所任者可謂重也書之南軒之壁間蚤夜覽觀焉以自進也南豐曾鞏記金山寺水陸堂記慶厯八年潤之金山寺成明年寺之僧瑞新來治寺事某月擇山之陽爽亢之地勸州之人某氏為水陸堂積錢之數百三十萬積日之數若干而成夫金山之以觀遊之美取勝於天下非獨據江瞰海並楚之衡而瀕呉之要也蓋其浮江之檻負崖之屋椽摩棟掲環山而四出亦有以夸天下者則天下之東馳而莫不顧慕者豈特一山之好哉而其作之完蓋非一人一日之力及此矣余固嗟夫未嘗得與時之君子者游而縱夫余心之所樂焉至於今未久也則聞夫山之穹堂奥殿􅅛傑之觀滋起矣此非佛之法足以動天下蓋新者余嘗與之從容彼其材且辨有以動人者故成此不難也夫廢於一時而後人不能更興者天下之事多如此至於更千百年委棄鬱塞而不得振行於天下者吾之道是也豈獨牽於勢哉蓋學者之難得而天下之材不足也使如此寺之壊而有新之材一日之作軼於百年累世之迹則事廢者豈足憂而世之治可勝道哉新方以書告某氏之世善而其子某又業為士因以求予記堂之始故為之厯道其興壊之端而并予之所感者寓焉鵝湖院佛殿記慶厯某年某月日信州鈆山縣鵝湖院佛殿成僧紹元來請記遂為之記曰自西方用兵天子宰相與士大夫勞於議謀材武之士勞於力農工商之民勞於賦歛而天子嘗减乗輿掖庭諸費大臣亦往往辭賜錢士大夫或暴露其身材武之士或秉義而死農工商之民或失其業惟學佛之人不勞於謀議不用其力不出賦歛食與寢自如也資其宫之侈非國則民力焉而天下皆以為當然予不知其何以然也今是殿之費十萬不已必百萬也百萬不巳必千萬也以累累而千萬之不可知也其費如是廣欲勿記其日時其得邪而請予文者又紹元也故云耳元豐類藁巻十七
