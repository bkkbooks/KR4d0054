body:
  text: 元豐類藁巻十八宋曾鞏撰記思政堂記尚書祠部貟外郎集賢校理太原王君為池州之明年治其後堂北嚮而命之曰思政之堂謂其出政於南嚮之堂而思之於此也其冬予客過池而属予記之初君之治此堂得公之餘錢以易其舊腐壊㫁既完以固不窘寒暑闢而即之即舊圃之勝涼臺清池遊息之亭微歩之徑皆在其前平畦淺檻佳花羙木竹林香草之植皆在其左右君於是退處其中心一意用其日夜之思者不敢忘其政則君之治民之意勤矣乎夫接於人無窮而使人善惑者事也推移無常而不可以拘者時也其應無方而不可以易者理也知時之變而因之見必然之理而循之則事者雖無窮而易應也雖善惑而易治也故所與由之必人之所安也所與違之必人之所厭也如此者未有不始於思然後得於巳得於巳故謂之德正已而治人故謂之政政者豈止於治文書督賦歛斷獄訟而已乎然及其巳得矣則無思也已化矣則亦豈止於政哉古君子之治未嘗有易此者也今君之學於書無所不讀而尤深於春秋其挺然獨見破去前惑人有所不及也来為是邦施用素學以脩其政元氏得以休其暇日乃自以為不足而思之於此雖今之吏不得以盡行其志然迹君之勤如此則池之人其不有蒙其澤者乎故予為之書嘉祐三年冬至日南豐曾鞏記兠率院記古者為治有常道生民有常業若夫祝除髪毛禁棄冠環帶裘不撫耞耒機盎至他器械水土之物其時節經營皆不自踐君臣父子兄弟夫婦皆不為其所當然而曰其法能為人禍福者質之於聖人無有也其始自漢魏傳挾其言者浸滛四出抵今為尤盛百里之縣為其徒者少㡬千人多至萬以上宫廬百十大抵穹墉奥屋文衣精食輿馬之華封君不如也古百里之國封君一人然而力殆不輕得足也今地方百里過封君者累百十飛竒鈎貨以病民民往徃頻伸而為途中瘠者以此治教信讓奚而得行也而天下若是者盖㡬宫㡬人乎有司常錮百貨之利細若蓬芒一無所漏失僕僕然其勞也而至於浮圖人雖費如此皆置不問反傾府空蔵而棄與之豈不識其非古之制邪抑識不可然且固存之邪愚不能釋也分寧縣郭内外名為宫者百八十餘所兠率院在治之西十里其徒尤相率悉力以侈之者也其構興端原有邑人黄庠所為記其後院主僧某又治其故而大之殿舍中嚴齋宫宿廬庖湢之房布列兩序廐園囷倉以固以宻資所以奉養之物無一而外求䟽其事而來請記者其徒省懐也意予之法四方人奔走附集者衎衎施施未有止也予無力以拒之者獨介然於心而掇其􅀹切者為是說以與之其使子之徒知巳之享利也多而人䝉病已甚且以吿有司而諗其終何如焉飲歸亭記金溪尉汪君名遘為尉之三月斥其四垣為射亭既成教士於其間而名之曰飲歸之亭以書走臨川請記於予請數反不止予之言何足取汪君徒深望予也既不得辭乃託之曰射之用事已逺其先之以禮樂以辨德記之所謂賓燕郷飲大射之射是也其貴力而尚技以立武記之所謂四時教士貫革之射是也古者海内洽和則先禮射而弓矢以立武亦不廢於有司及三代衰王政缺禮樂之事相属而盡壊揖讓之射滋亦熄至其後天下嘗集國家嘗閒暇矣先王之禮其節文皆在其行之不難然自秦漢以来千有餘嵗衰微絀塞空見於六藝之文而莫有從事者由世之苟簡者勝也争奪興而戰禽攻取之黨奮則彊弓疾矢巧技之出不得而廢其不以勢哉今尉之校射不比乎禮樂而貴乎技力其衆雖小然而旗旄鐲鼓五兵之器便習之利與夫行止歩趨遲速之節皆宜有法則其所教亦非獨射也其幸而在乎無事之時則得以自休守境而填衛百姓其不幸殺越剽攻駭驚閭巷而並逐於大山長谷之間則將犯晨夜䝉霧露蹈阨馳危不避矢石之患湯火之難出入千里而與之有事則士其可以不素教哉今亭之作所以教士汪君又謂古者師還必飲至於廟以紀軍實今廟廢不設亦欲士勝而歸則飲之於此遂以名其亭汪君之志與其職可謂恊矣或謂汪君儒生尉文吏以禮義禁盗宜可止顧乃習鬬而喜勝其是歟夫治固不可以不兼文武而施澤於堂廡之上服冕搢笏使士民化姦宄息者固亦在彼而不在此也然而天下之事能大者固可以兼小未有小不治而能大也故汪君之汲汲於斯不忽乎任小而非所謂有志者邪擬峴臺記尚書司門員外郎晉國裴君治撫之二年因城之東隅作臺以遊而命之曰擬峴臺謂其山谿之形擬乎峴山也數與其属與州之寄客者遊其間獨求記於予初州之東其城因大邱其隍因大谿其隅因客土以出谿上其外連山高陵野林荒墟逺近高下壮大閎廓怪竒可喜之觀環撫之東南者可坐而見也然而雨隳潦毁盖藏棄委於榛藂茀草之間未有即而愛之者也君得之而喜增甓與土易其破缺去榛與草發其亢爽繚以横檻覆以高甍因而為臺以脫埃氛絶煩囂出雲氣而臨風雨然後谿之平沙漫流微風逺響與夫浪波洶湧破山㧞木之奔放至於高桅勁艣沙禽水獸下上而浮沉者出乎履舄之下山之蒼顔秀壁巔厓㧞出挾光景而薄星辰至於平岡長陸虎豹踞而龍蛇走與夫荒蹊藂落樹陰晻曖遊人行旅隠見而繼續者皆出乎衽席之内若夫雲烟開斂日光出没四時朝暮雨暘明晦變化不同則雖覽之不厭而雖有智者亦不能窮其状也或飲者淋漓歌者激烈或靚觀微歩旁皇徙倚則得於耳目與得之於心者雖所寓之樂有殊而亦各適其適也撫非通道故貴人富賈之遊不至多良田故水旱螟螣之菑少其民樂於耕桑以自足故牛馬之牧於山谷者不収五糓之積於郊野者不垣而晏然不知枹鼓之驚發召之役也君既因其土俗而治簡靜故得以休其暇日而寓其樂於此州人士女樂其安且治而又得遊觀之羙亦将同其樂也故予為之記其成之年月日嘉祐二年之九月九日也撫州顔魯公祠堂記贈司徒魯郡顔公諱真卿事唐為太子太師與其從父兄杲卿皆有大節以死至今雖小大婦人皆知公之為烈也初公以忤楊國忠斥為平原太守策安禄山必反為之備禄山既舉兵與常山太守杲卿伐其後賊之不能直闚潼闗以公與杲卿撓其勢也在肅宗時數正言宰相不悅斥去之又為御史唐旻所構連輒斥李輔國遷太上皇居西宫公首率百官請問起居又輒斥代宗時與元載争論是非載欲有所壅蔽公極論之又輒斥楊炎盧杞既相德宗益惡公所為連斥之猶不滿意李希烈䧟汝州杞即以公使希烈希烈初慙其言後卒縊公以死是時公年七十有七矣天寳之際久不見兵禄山既反天下莫不震動公獨以區區平原遂折其鋒四方聞之爭奮而起唐卒以振者公為之倡也當公之開土門同日歸公者十七郡得兵二十餘萬繇此觀之苟順且誠天下從之矣自此至公殁垂三十年小人繼續任政天下日入於弊大盗繼起天子輒出避之唐之在朝臣多畏怯觀望能居其間一忤於世失所而不自悔者寡矣至於再三忤於世失所而不自悔者葢未有也若至於起且仆以至於七八遂死而不自悔者則天下一人而巳若公是也公之學問文章往往雜於神仙浮屠之說不皆合於理及其奮然自立能至於此者葢天性然也故公之能處其死不足以觀公之大何則及至於勢窮義有不得不死雖中人可勉焉况公之自信也歟維厯忤大奸顛跌撼頓至於七八而終始不以死生禍福為秋毫顧慮非篤於道者不能如此此足以觀公之大也夫世之治亂不同而士之去就亦異若伯夷之清伊尹之任孔子之時彼各有義夫既自比於古之任者矣乃欲睠顧回隠以市於世其可乎故孔子惡鄙夫不可以事君而多殺身以成仁者若公非孔子所謂仁者歟今天子至和三年尚書都官郎中知撫州聶君某尚書屯田員外郎通判撫州林君某相與慕公之烈以公之嘗為此邦也遂為堂而祠之既成二君過予之家而告之曰願有述夫公之赫赫不可冺者固不繫於祠之有無葢人之嚮徃之不足者非祠則無以致其志也聞其烈足以感人况拜其祠而親炙之者歟今州縣之政非法令所及者世不復議二君獨能追公之節尊而事之以風示當世為法令之所不及是可謂有志者也洪州新建縣㕔壁記為後世之吏得行其志者少矣此仕之所以難也而縣為最甚何哉凢縣之政無小大令主簿皆獨任而民士委曲當有所操縱緩急不能一斷以法舉法而繩之則其罪固易求也凡有所為問可不可於州執一而違之則其勢固易撓也其罪易求其勢易撓故為之者有以得於州然後其濟可幾也不幸其一錙銖與之咈則大者求其罪小者撓其勢將不遺其力矣吏之不能自安豈足道哉縣有不與其擾者乎方是時也而天下之能忘其勢而好惡不妄者鮮矣能忘人之勢而强立不苟者亦鮮矣州負其强以取威縣憂其弱以求免其習已久其俗已成之後而守正循理以求其得於州其亦不可以必也則仕於此者欲行其志豈非難也哉君子者雖無所處而不安然其於自處也未嘗不擇仕而得擇其自處則縣之事有不敢任者豈可謂過也哉洪州新建自太平興國六年分南昌為縣至嘉祐三年凡若干年為令者凢三十有九人而祕書省著作佐郎黄巽公權来為其令抑豪縱恵下窮守正循理而得濟其志者也公權亦喜其職之行因考次凡為令者名氏將伐石以書而列置於壁間故予為之載其行治而因著其為縣之難使來者得覽焉清心亭記嘉祐六年尚書虞部員外郎梅君為徐之蕭縣改作其治所之東亭以為燕息之所而名之曰清心之亭是嵗秋冬來請記於京師屬余有亡妺殤女之悲不果為眀年春又來請屬余有悼亡之悲又不果為而其請猶不止至冬乃為之記曰夫人之所以神明其德與天地同其變化者夫豈逺哉生於心而已矣若夫極天下之知以窮天下之理於夫性之在我者能盡之命之在彼者能安之則萬物自外至者安能累我哉此君子之所以虛其心也萬物不能累我矣而應乎萬物與民同其吉凶者亦未嘗廢也於是有法誡之設邪僻之防此君子之所以齊其心也虚其心者極乎精㣲所以入神也齊其心者由乎中庸所以致用也然則君子之欲修其身治其國家天下者可知矣今梅君之為是亭曰不敢以為遊觀之羙盖所以推本為治之意而且將清心於此其所存者亦可謂能知其要矣乃為之記而道予之所聞者焉十一月五日南豐曾鞏記閬州張侯廟記事常蔽於其智之不周而辨常過於所惑智足以周於事而辨至於不惑則理之微妙皆足以盡之今夫推策灼龜審於夢寐其為事至淺世常尊而用之未之有改也坊庸道路馬蠶貓虎之靈其為類至細世常嚴而事之未之有廢也水旱之災日月之變與夫兵師疾癘昆蟲䑕豕之害凡一慝之作世常有祈有報未之有止也金縢之書雲漢之詩其意可謂至而其辭可謂盡矣夫精神之極其叩之無端其測之甚難而尊而信之如此其備者皆聖人之法何也彼有接於物者存乎自然世既不得而無則聖人固不得而廢之亦理之自然也聖人者豈用其聰明哉善因於理之自然而已其智足以周於事而其辨足以不惑則理之微妙皆足以盡之也故古之有為於天下者盡已之智而聽於人盡人之智而聽於神未有能廢其一也書曰朕志先定詢謀僉同鬼神其依龜筮恊從所謂盡已之智而聽於人盡人之智而聽於神也繇是觀之則荀卿之言以謂雩筮救日小人以為神者以疾夫世之不盡在乎巳者而聽於人不盡在乎人者而聽於神其可也謂神之為理者信然則過矣蔽生於其智之不周而過生於其所惑也閬州於蜀為巴西郡蜀車騎将軍領司隸校尉西鄉張侯名飛字翼德嘗守是州州之東有張侯之冡至今千有餘年而廟祀不廢毎嵗大旱禱雨輒應嘉祐中比數嵗連熟閬人以謂張侯之賜也乃相與率錢治其廟舍大而新之侯以智勇為將號萬人敵當蜀之初與魏將張郃相距於此能破郃軍以安此土可謂功施於人矣其殁也又能澤而賜之則其食於閬人不得而廢也豈非宜哉知州事尚書職方貟外郎李君獻卿字材叔以書來曰為我書之材叔好古君子也乃為之書而以予之所聞於古者告之歸老橋記武陵栁侯圖其青陵之居属予而叙以書曰武陵之西北有湖属於梁山者白馬湖也梁山之西南有田属於湖上者吾之先人青陵之田也吾築廬於是而將老焉青陵之西二百歩有泉出於兩厓之間而東注於湖者曰采陵之澗吾為橋於其上而為屋以覆之武陵之徃來有事於吾廬者與吾異日得老而歸皆出於此也故題之曰歸老之橋維吾先人遺吾此土者宅有桑麻田有秔稌而渚有蒲蓮弋於髙而追鳧雁之下上緡於深而逐鱣鮪之潛泳吾所以衣食其力而無愧於心也息有喬木之繁陰藉有豐草之幽香登山而凌雲覽天地之奇變弄泉而乗月遺氛埃之溷濁此吾所以處其怠倦而樂於自遂也吾少而安焉及壯而從事於四方累乎萬物之自外至者未嘗不思休於此也今又獲位於朝而榮於寵禄以為觀遊於此而吾亦將老矣得無志於歸哉又曰世之老於官者或不樂於歸幸而有樂之者或無以為歸今吾有是以成吾樂也其為我記之使吾後之人有考以承吾志也余以謂先王之養老者備矣士大夫之致其位者曰不敢煩以政盖尊之也而士亦皆明於進退之節無留禄之人可謂兩得之也後世養老之具既不備士大夫之老於位者或擯而去之也然士猶有冒而不知止者可謂兩失之也今栁侯年六十齒髪未衰方為天子致其材力以恵澤元元之時雖欲遺章綬之榮從湖山之樂余知未能遂其好也然其志於退也如此聞其風者亦可以興起矣乃為之記尹公亭記君子之於巳自得而巳矣非有待於外也然而曰疾沒世而名不稱焉者所以與人同其行也人之於君子潛心而已矣非有待於外也然而有表其閭名其鄉欲其風聲氣烈暴於世之耳目而無窮者所以與人同其好也内有以得諸巳外有以與人同其好此所以為先王之道而異乎百家之說也隨為州去京師逺其地僻絶慶厯之間起居舍人直龍圖閣河南尹公洙以不為在勢者所容謫是州居於城東五里開元佛寺之金燈院尹公有行義文學長於辨論一時與之遊者皆世之聞人而人人自以為不能及於是時尹公之名震天下而其所學葢不以貧富貴賤死生動其心故其居於隨日考圖書通古今為事而不知其官之為謫也嘗於其居之北阜竹栢之間結茅為亭以苃為嬉嵗餘乃去既去而人不忍廢壊輒理之因名之曰尹公之亭州從事謝景平刻石記其事至治平四年司農少卿贊皇李公禹卿為是州始因其故基増􅋻益狹斬材以易之陶瓦以覆之既成而寛深亢爽環隨之山皆在几席又以其舊亭峙之於北於是隨人皆喜慰其思而又獲遊觀之羙其冬李公以圖走京師属予記之葢尹公之行見於事言見於書者固已赫然動人而李公於是又侈而大之者豈獨慰隨人之思於一時而與之共其樂哉亦將使夫荒遐僻絶之境至於後人見聞之所不及而傳其名覽其跡者莫不低徊俯仰想尹公之風聲氣烈至於愈逺而彌新是可謂與人同其好也則李公之傳於世亦豈有已乎故予為之書時熈寧元年正月日也筠州學記周衰先王之迹熄至漢六藝出於秦火之餘士學於百家之後言道德者矜高逺而遺世用語政理者務卑近而非師古刑名兵家之術則狃於暴詐惟知經者為善矣又爭為章句訓詁之學以其私見妄穿鑿為說故先王之道不明而學者靡然溺於所習當是時能眀先王之道者揚雄而已而雄之書世未知好也然士之出於其時者皆勇於自立無苟簡之心其取與進退去就必度於禮義及其巳衰而搢紳之徒抗志於强暴之間至於廢錮殺戮而其操愈厲者相望於先後故雖有不軌之臣猶低徊没世不敢遂其簒奪自此至於魏晉以來其風俗之弊人材之乏久矣以迄於今士乃有特起於千載之外明先王之道以寤後之學者世雖不能皆知其意而往往好之故習其說者論道德之㫖而知應務之非近議政理之體而知法古之非迂不亂於百家不蔽於傳䟽其所知者若此此漢之士所不能及然能尊而守之者則未必衆也故樂易惇朴之俗微而詭欺薄惡之習勝其於貧冨貴賤之地則養㢘逺恥之意少而偷合苟得之行多此俗化之美所以未及於漢也夫所聞或淺而其義甚高與所知有餘而其守不足者其故何哉繇漢之士察舉於鄉閭故不得不篤於自修至於漸磨之久則果於義者非强而能也今之士選用於文章故不得不篤於所學至於循習之深則得於心者亦不自知其至也由是觀之則上所好下必有甚者焉豈非信歟令漢與今有教化開𨗳之方有庠序養成之法則士於學行豈有彼此之偏先後之過乎夫大學之道將欲誠意正心脩身以治其國家天下而必本於先致其知則知者固善之端而人之所難至也以今之士於人所難至者既幾矣則上之施化莫易於斯時顧所以𨗳之如何爾筠為州在大江之西其地僻絶當慶厯之初詔天下立學而筠獨不能應詔州之士以為病至治平三年葢二十有三年矣始告於知州事尚書都官郎中董君儀董君乃與通判州事國子愽士鄭君舊相州之東南得亢爽之地築宫於其上齋祭之室誦講之堂休息之廬至於庖湢庫廐各以序為經始於其春而落成於八月之望既而來學者常數十百人二君乃以書走京師請記於予予謂二君之於政可謂知所務矣使筠之士相與升降乎其中講先王之遺文以致其知其賢者超然自信而獨立其中材勉焉以待上之教化則是宫之作非獨使夫來者玩思於空言以干世取禄而已故為之著予之所聞者以為記而使歸刻焉瀛州興造記熈寧元年七月甲申河北地大震壊城郭屋室瀛州為甚是日再震民訛言大水且至驚欲出走諌議大夫李公肅之為高陽闗路都總管安撫使知瀛州事使人分出慰曉訛言乃止是日大雨公私暴露倉儲庫積無所覆冒公開示便宜使有攸處遂行倉庫經營葢障雨止粟以石數之至一百三十萬兵器他物稱是無壊者初變作公命援兵警備訖於既息人無爭偷里巷安輯維北邉自通使契丹城壁樓櫓禦守之具寢弛不治習以為故公因災變之後以興壊起廢為已任知民之不可重困也廼請於朝力取於旁路之羡卒費取於備河之餘材又以錢千萬市木於真定既集廼築新城方十五里高廣堅壯率加於舊其上為敵樓戰屋凢四千六百間先時州之正門弊在狹陋及是始斥而大之其餘凢圮壊之屋莫不繕理復其故常周而覽之聽斷有所燕休有次食有高廪貨有深蔵賔属士吏各有寧宇又以其餘力為南北甬道若千里人去汙淖即於夷塗自七月庚子始事至十月已未落成其用人之力積若干萬若干千若干百工其竹􅓗木瓦之用積若干萬若干千若干百葢遭變之初財匱民流此邦之人以謂役鉅用艱不累數稔城壘室屋未可以復也至於始作踰時功以告具葢公經理勸督内盡其心外盡其力故能易壊為成如是之敏事聞有詔嘉奨昔鄭火灾子產救灾補敗得宜當理史實書之衛有狄人之難文公治其城市宫室合於時制詩人歌之今瀛地震之所摧敗與鄭之火灾衛之㓂難無異公禦備構築不失其方亦猶古也故瀛之士大夫皆欲刻石著公之功而予之從父兄適與軍政在公幕府廼以書來属予記之予不得辭故為之記尚俾來世知公之嘗勤於是邦也廣德軍重脩鼓角樓記熈寧元年冬廣德軍作新門鼔角樓成太守合文武賓属以落之既而以書走京師属鞏曰為我記之鞏辭不能書反復至五六辭不獲乃為其文曰葢廣德居呉之西疆故障之墟境大壤沃食貨富穰人力有餘而獄訟赴訴財貢輸入以縣附宣道路回阻衆不便利厯世久之大宗皇帝在位四年乃按地圖因縣立軍使得奏事專次體如大邦自是以來田里辨争嵗時稅調始不勤逺人用宜之而門閎隘庳樓觀弗飾於以納天子之命出令行化朝夕吏民交通四方覽示賓客弊在簡陋不中度程治平四年尚書兵部員外郎知制誥錢公輔守是邦始因豐年聚材積土将改而新之㑹尚書駕部郎中朱公夀昌来繼其任明年政成封内無事乃擇能吏揆時庀徒以畚以築以繩以削門阿是經觀闕是營不督不期役者自勸自冬十月甲子始事至十二月甲子卒功崇墉崛興複宇相瞰壮不及僭麗不及奢憲度政理於是出納士吏賓客於是馳走尊施一邦不失宜稱至於代鼓鳴角以警昏昕下漏數刻以節晝夜則又新是四器列而棲之邦人士女易其聽觀莫不悦喜推羙誦勤夫禮有必隆不得而殺政有必舉不得而廢二公於是兼而得之宜刻金石以書羙實使是邦之人百世之下於二公之德尚有考也元豐類藁巻十八
