body:
  text: 元豐類藁巻二十八宋曽鞏撰表謝熈寧五年厯日表進奏院遞到宣頭一道伏䝉聖㤙賜臣熈寧五年厯日一巻者竊以振舉舊章推明新厯欲謹天時之正俾諧人事之宜藐是孤生與均寵錫中謝伏惟皇帝陛下力行大道惇敘彛倫贊天地而平四時理陰陽而成萬物爰兹頒朔咸暨有邦臣敢不深究土風詳求氣序躬勸耕桑之業輔成坏冶之仁仰望闕廷臣無任謝熈寧六年厯日表進奏院遞到宣頭一道熈寧六年厯日一巻賜臣收管者一與外符之寄再䝉班厯之㤙乆矣去朝幸兹拜賜中謝竊以天地陰陽之動不得違時蟲魚草木之生必皆有政故兹告朔宣布有邦伏惟皇帝陛下兢慎萬幾恊諧五紀式謹王正之授俾知民事之常臣敢不動靜詳觀夙宵祗奉庻召和平之氣用裨化育之仁臣不任謝熈寧七年厯日表進奏院遞到宣頭一道賜臣熈寧七年厯日一本者顧慚孤拙與被寵靈中謝竊以陶唐之定四時稽于厯象虞氏之齊七政審以璣衡盖求於天道者能盡其宜則施於人事者不違其序伏惟皇帝陛下聰明好古仁厚愛民深原制作之方務恊生成之理在於垂憲尤重頒正臣乆去闕廷逺臨藩服惟竭遵承之力庻符欽順之心臣不任謝熈寧八年厯日表進奏院遞到宣頭一道賜臣熈寧八年厯日一本者竊以治厯於中所以察天時之運動班正于外所以一王度之推行舉是彛章施於有土中謝伏惟皇帝陛下至仁不世盛徳無名恊五紀以遂羣生合二儀而成萬化廼明告朔咸俾守藩臣敢不悉意究詳勵精遵奉庻盡承流之効俾無作事之違仰望闕廷臣無任謝熈寧十年厯日表進奏院遞到宣頭一道熈寧十年厯日一巻賜臣者竊以推行嵗時天道所以化育考正厯度人事所以財成故頒朔之舊章為守邦之先務伏惟皇帝陛下徳兼載幬仁及昆蟲體履中和敘九疇而開物欽明象數齊七政以導民臣獲奉王正親承聖詔念闕廷之方逺藐然江上之身感星晷之屢新尚嘆周南之滯仰望旒扆臣不任謝元豐元年厯日表進奏院遞到宣頭一道賜臣元豐元年厯日一巻者一逺闕廷十移星厯顧凋零於齒髪無報補於毫分中謝伏惟皇帝陛下敘大禹之九疇齊有虞之七政陰陽寒暑罔不若時草木昆蟲舉皆遂性循用頒正之典寵詒分土之官臣幸備守藩預聞告朔去親方逺巳驚嵗月之新許國雖堅更嘆功名之晩惟體在民之意庻禆及物之仁仰望冕旒臣不任謝元豐三年厯日表進奏院遞到宣頭一道賜臣元豐三年厯日一本者竊以脩人事者必也正時明天道者在於治厯爰從頒布俾一奉承中謝伏惟皇帝陛下則大居尊體元凝命成六府三事之敘合志於虞遂八政五紀之宜同方於禹是遵人統用謹王正獲以守邦預於受朔勸豳土耕桑之業方務承流采堯民作息之歌庻知戴徳仰望旒扆臣不任進奉熈寧八年同天節功徳䟽表伏遇皇帝同天節臣預於本州天慶觀鷲嶺興化禪院大殿上建置道塲一月日及設齋功徳䟽各一軸金鍍銀軸頭紅羅複封全上祝皇帝聖夀者竊以績禹撫期盖自天而開迹生商肇􅍈實與世以為歸故預託於坏鎔皆永思於戴燾中賀伏惟皇帝陛下性由仁義徳備聖神維候紀於長贏屬祥開於震夙是敢致嚴道妙嚮意佛乗庻將不轉之心用獻無疆之夀臣無任英宗實録院謝賜御筵表伏䝉聖慈以臣等編脩英宗皇帝實録今月十四日開局賜臣等御筵者方次舊聞已叨優禮省循非稱慚負失容中謝伏以先帝功徳之殊將傳後世儒者文章之用正在此時猥以空踈誤當屬任甫磨鉛而就職遽置醴以均㤙寵異羣司幸踰素望此盖伏遇皇帝陛下永懐先烈務廣孝思故因始於信書俾特豐於燕豆所懼不能名乾坤之至徳摹日月之大明上以副陛下顯親之心下以盡愚臣歸美之志惟粗明於書法庻少補於素餐臣等無任代皇太子免延安郡王第一表伏奉制命䝉㤙特授臣檢校太尉開府儀同三司充彰武軍節度使進封延安郡王者寵踰於徳愧甚於榮輒露危誠仰干睿聴臣某誠惶誠恐頓首頓首竊以衮衣備物禮均上宰之崇土宇分封位列眞王之貴非智能足以謀國勞烈足以及人屬在休明詎容玷冐若臣者侗然固陋𣺌爾穉䝉雖甫逮勝衣習為容於趨拜而方思就傅頼齒學之漸磨庻幾識古今之通方知國家之大體施於為巳可以持循必也當官覬無違曠巳叨分於將鉞復誤假於公圭虚冐鴻私未伸薄効敢圖奬渥薦及謭微視儀數於三台超爵名於五等既加真食仍益爰田固非録善而量能又異校勞而數最將安稱此自顧缺然而况皇帝陛下處父子之間常先義訓君臣之際每狥公言伏望察臣精懇之由𠂻不顧小嫌之反汗許還新命俯遂㣲情使臣得奉定省於晨昏稍安㓜志報生成於天地更待壯年臣無任代皇子免延安郡王第二表伏䝉聖慈以臣所上表陳乞䝉㤙授臣檢校太尉開府儀同三司充彰武軍節度使進封延安郡王特賜批荅不允者輒布愚𠂻未回宸聴仰闚誨諭彌集兢慚臣某誠惶誠恐頓首頓首竊以明徳懿親在天功而有助隆名重器為國論之所歸然後材位不浮望實相稱若臣者夙依煦育生處深嚴雖無好㺯之心甫逮垂髫之齒方圖講學知臣子之大方庻得周旋奉君親之素敎敢意靡縁績用薦被寵靈遂兼將相之榮仍極王公之貴雖參諸邦典或故事之可循而質以人情實煩言之可畏顧兹沖昧尤積震惶伏遇皇帝陛下新一代之彛章革千年之流弊方循名而責課以官方而任人其於明信賞之科必先於近然則推至公之誼宜始於臣惟特寢於誤㤙可曲全於拙分使乾坤之施不累於私親則塵露之㣲庻幾於報上臣不任代皇子延安郡王謝表伏奉制命除授臣檢校太尉開府儀同三司充彰武軍節度使進封延安郡王再奉表陳乞䝉賜批答不允仍繼來章者祗膺詔版彌積靦顔盖崇大於宗藩以盛强於帝室豈伊奬渥可假幼冲中謝伏念臣器匪夙成材無特異徒歸依於鞠育每親炙於高明欲善在身忘髧髦之至弱知書可學慕佔畢之相從庻繇受教於童䝉覬獲成能於壯大敢意攬攸司之宻啟循厯世之彛章寵以官儀體均於丞弼殊其爵列秩右於公侯揣稱何堪踰涯已甚知隆名之難冐廹大號之既行控避莫從震惶滋集此盖伏遇皇帝陛下心潜高厚智極精微推廣愛之仁以隆於父子盡太公之義以篤於君臣故舊典之當行雖至親而莫間致兹異數猥及譾能臣敢不仰體聖懐勤遵慈訓省躬擇術庻不蹈於匪彛臨事知方或可收於近用臣無任代皇子延安郡王謝皇太后表伏奉制命除授臣檢校太尉開府儀同三司充彰武軍節度使進封延安郡王再奉表陳乞䝉賜批荅不允仍繼來章者竊以盛威儀於宰路以重朝廷强形勢於宗藩用臨方夏宜兼奬渥屬在親賢誤及㓜冲倍深兢惕中謝伏念臣䝉休宸極託蔭慈闈未闚六甲之書甫在兩髦之嵗揆材至薄智無特異之資知善可遷竊有自强之志巳塵高位愧乏微勞詎意仁㤙更崇命秩抗等威於元宰躋爵列於真王自顧空踈將安報稱此盖伏遇皇太后殿下輔成世教陰厚人倫均至愛於諸孫假餘光於穉齒致兹異數猥被謭能敢不自勵童䝉嚮慕日新之益庻幾壯大仰酬坤育之私臣不任代皇太子延安郡王謝皇后牋伏奉制命除授臣檢校太尉開府儀同三司充彰武軍節度使進封延安郡王再奉表陳免䝉賜批荅不允仍繼來章者異其恩數兼將相之殊榮尊以爵名極王公之寵列雖優隆於天屬必考察於人材假是㓜冲懼非宜稱臣某以感以懼叩頭伏念臣性非蚤悟學未少成徒依均飬之私甫及垂髫之始巳䝉休於帝所獲備位於宗藩豈意慈憐更加襃進夫位崇者徳厚禄重者功高而臣無可録之勞能冐非常之禮秩此盖伏遇皇后殿下彌綸内治則象坤元惇鞠育之至仁推奬成之素志致滋渥澤誤及童䝉敢不盡子職之微勤無忘砥礪答母儀之大賜庻補毫分謹奉牋稱謝以聞臣以感以懼叩頭謹牋代宋敏求知絳州謝到任表伏奉勅命差知絳州軍州事巳於某月某日到任上訖備官無效竊寵過優尚聨清近之班仍獲安閒之幸中謝伏念臣器非宏逺性不敏明徒嗜好於文章寖推移於嵗月濫名儒館接武朝紳與釐坰牧之蕃參莅神州之劇進聞邦計出假使符㑹仁祖之升遐圖信書之示後起於衰病寄以討論旋躋右史之華遂冐西垣之選惟兹典禮屬在奉常猥用滯䝉首當總領悉心謀慮雖務竭於愚忠妄意變通遂自乖於素論實干昭憲奚逭嚴科荷屈法以申㤙止奪官而補外罪浮於罰慙溢於顔何僥冐之使然實矜全之有自此盖伏遇皇帝陛下乾剛獨㫁坤厚兼容躬親庻政而昭之以明付用群材而飬之以恕故俾兼榮於近侍尚容竊食於外邦仰戴生成將安補報敢不服勤夙夜期練逹於政經延見吏民一作祗順簡書以一作誓布宣於上徳庻收來效少答鴻私仰望闕廷臣無任代翰林侍讀學士錢藻遺表犬馬之質難駐於頽齡日月之光尚攀於愛景臣藻誠悲誠哽頓首頓首伏念臣出於悴族進以謏材文辭講說制䇿之科衆稱華選儒館掖垣經帷之職世謂清塗獨徧竊於美名葢親逄於亨運至於總銓衡之要劇領京邑之浩煩蔑有勞能可論報稱冐寵靈而過厚致災疚以交攻廹霜露之所侵且將澌盡幸髪膚之無毁得以全歸方去闕庭長投泉壤輒陳遺志猶及能言伏願皇帝陛下御六氣之和慎調興止享萬年之祚永冠華夷再念臣偷殘息之僅存覬餘息之可丐敢祈仁睿終賜矜憐臣有男進士孫男某親堂弟茂共出寒郷稍親薄技葑菲不棄儻微禄之獲霑魚一作水菽可供庻㳺鬼之未餒伏望聖慈並於文資内安排妄兹干澤愧在忘亷保存歿之孤縱託始終之大賜生而無益曽莫及於銜環死或有知猶庶幾於結草仰望旒扆臣不任代太平州知州謝到任表伏奉勅命差知太平州軍州事巳扵某月某日到任上訖惟此方彫瘵之舊屬比嵗㐫饑之餘任在拊循懼無稱效中謝竊念臣受材不敏託勢甚㣲竊郎位之寵名濫憲䑓之優選因䝉中詔獲備外邦方喜便於庭闈遽已罹於家禍苟全生理復齒班榮用乆次而得州以親嫌而易地低回積日黽勉至官忽被新恩復還舊印江湖孤蹇之跡道路奔馳之勞甫兹即安敢忘盡瘁自惟蕞爾何以及兹兹盖伏遇尊號皇帝陛下日月之光旁照萬物天地之徳平施四方猥致妄庸誤䝉器使當力行於寛惠上副至仁惟少假於寵靈庶成薄効臣不任代太平州知州謝賜欽恤刑獄勅書表進奏院逓到勅一道賜臣欽恤刑獄者屬在煩暑聖躬無倦於焦勞言念繫囚恩㫖遂加於惻憫中謝伏惟尊號皇帝陛下繼祖宗之功徳體天地之生成發政施仁恐遺於一物勝殘去殺思厝於五刑謙不自專動遵故事眷幅貟之至廣軫囹圄之未空申明詔以丁寧飭守臣之撫視豈止奉行於時令固足感召於人和臣與被徳音當宣上意惟盡哀矜之理庻符欽恤之心臣無任元豐類藁巻二十八
