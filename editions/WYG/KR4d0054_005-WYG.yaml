body:
  text: 元豐類藁巻五宋曽鞏撰古詩送程公闢使江西程侯昔使西山下金印出懐光滿把坐馳雷電破姦伏力送春陽煦鰥寡袴襦優足徧里巷禾黍豐穣罄郊野訟庭終日自虛曠徳宇平生本瀟洒龍淵決水漲清沼鳥背誅林開廣厦蒼顔擁檻四山出翠色横櫩大江㵼掌平百里露州郭髮密千甍銜屋瓦雲裘數曲秀蘭蕙鳯盖相摩擢梧榎客來尚喜井投轄主禮寧論燭飛灺三吳月出照金㦸百越風來吹玉斝羽釵絶艶舞回雪寳劔諸儒談炙輠一尊放意受天籟萬累回頭真土苴我思飛步綴登躡又欲生綃乞圖冩身縻東觀願雖阻目注漳門心豈捨過臨有幸破氛霧奮厲方欣入陶冶齋航又自日邊去信節初從天上假舊邦往靖寄揮麈新榖來輸付流馬遥知素譽在民口已有歡聲騰里社郤尋泉石引幽士想憶沙塵笑勞者何當一解豫章榻強賦土風令中雅逰金山寺作候潮動鳴艣出浦縱方舟舉箔見兹山巋然峙中流朱堂出烟霧縹緲若瀛洲十年入夢想一日恣尋遊屣履上層閣披襟當九秋地勢已瀟灑風飊更颼飀遠挹蜀浪來旁臨滄海浮壺觴對京口笑語落揚州久聞神龍伏况覩鷙鳥投行縁石徑盡却倚巖房幽頗諧雲林思頓豁塵土憂昏鐘滿江路歸榜尚夷猶自揚子渡以兩小舟夾引所乗舟故云方舟答葛藴我初未識子已知子能文春風吹我衣暮召入九閽衆中得子辭黙許非他人方將引飛黄使出萬馬羣差之在須㬰氣沮不復論大明臨萬物我亦傍車塵相逢扶桑側一揖意自親屈子果由我相示以無言同行千歩廊攬轡金馬門歸來客舍中未及還往頻東舟載子去千里不逡廵今者坐甌越相望若三辰忽有海上使問我及牆藩得子百篇作讀之為忻忻大章巳逸發小章更新清遠去筆墨畦徒識斧鑿痕想當經營初落紙有如神勉哉不自止直可闚靈均我老未厭此持誇希代珍朝吟忘日昃暮吟㤀日曛發聲欲薦子自笑不足云南湖行二首二月南湖春雨多春風蕩漾吹湖波著紅少年里中出百金市上裁輕羅挿花步步行看影手中掉旗唱吳歌放船縱櫂鼓聲促蛟龍擘水争馳逐倐親忽遠誰可追朝在西城暮南溪奪標得雋唯恐遲雷轟電激使人迷紅簾彩舫觀者多美人坐上揚雙蛾斷瓶取酒飲如水盤中白筍兼青螺生長江湖樂卑濕不信中州天氣和東南溪水來何長若耶清明宜靚粧南湖一吸三百里古人已疑行鏡裏春風來吹不生波秀壁如奩四邉起蒲芽荇蔓自相依躑躅夭桃開滿枝求羣白鳥映沙去接翼黄鸝穿樹飛我坐荒城苦卑濕春至花開曽未知蕩槳如從武陵入千花百草使人迷山回水轉不知遠手中紅螺豈須勸輕舟短楫此溪人相要水上亦湔裙家住横塘散時晚分明笑語隔溪聞種牡丹經冬種牡丹明年待看花春條始秀出蠧已病其芽柯枯葉亦落重尋但空槎朱欄猶照耀所待已泥沙本不固其根今朝謾咨嗟西湖二月二十日平生拙人事出走臨東藩紛此獄訟地欣乗刀筆閒漾舟明湖上清鏡照衰顔春風隨我來掃盡氷雪頑花開滿北渚水淥到南山魚鳥自翔泳白雲時往還吾亦樂吾樂放懐天地間顧視彼誇者錙銖何足言北湖常時泛西湖已覺烟水永北隄復誰開長涵一川静乆幽繇地偏跬歩人跡屏我初得之喜指顧闢榛梗種花延妙香挿栁待清影飛梁通両涯結宇臨四境包羅盡高卑開拓極壬丙洒然塵滓消恍爾心目醒與物振滯淹如人出竒穎日携二三子杖履屢觀省念時方有為衆智各馳騁獨此得逍遥固知拙者幸百花隄如玉水中沙誰為北湖路久翳荒草根未承青霞步我為發其狂修營極幽趣髮直而砥平驊騮可馳騖周以百花林繁霜泫清露間以緑楊隂芳風轉朝暮飛梁憑太虛嶢榭躡烟霧直通高城顛海岱歸指顧為州乏長材幸嵗足秔稌與衆飽而嬉陶然無外慕芙蓉臺芙蓉花開秋水冷水靣無風見花影飄香上下兩嬋娟雲在巫山月在天清瀾素礫為庭戸羽盖霓裳不知數臺上逰人下流水柱脚亭亭挿花裏闌邊飲酒櫂女歌臺北臺南花正多莫笑來時常著屐緑栁墻連使君宅秋懐二首流水寒更澹虛牕深自明褰帷遠鐘斷擁褐晨香清油然素心適緬彼外物輕因時固有應在理復何營隠几公事退巻書坐南榮只兹遠塵垢何異山中情為州詎非忝即事亮何成幸兹桑麻熟復示倉箱盈閭里凶黨戢堦除嚚訟清日携二三子飽食中園行念非形勢迫免有彈弋驚幽閒固可樂勿慕高遠名送李撰赴舉湖水碧槐花黄山川揺落牕戸凉宿雲星稀日東出青冥風高雁南翔華堂昨夜讀書客匹馬今朝逰大梁風鋩拂塵見飛影把握驚人持夜光康衢四闢通萬里天駟得地方騰驤我留東山意頗卓屏棄外慮無毫芒子能相從味沖漠捉箠勿暫遲歸裝送韓玉汝春日城東送韓玉汝赴兩浙轉運以池塘生春草園栁變鳴禽為韻得生字野岸漲流水名園分雜英旭景冠盖集清談樽酒傾重此臺省秀駕言江海行已喜懐抱粹况推材實精衆許極髙遠時方藉經營詎止富中廩固將澤東氓還當本朝用不待芳嵗更功名自兹始勿嘆華髮生招隠寺一徑入松下兩峯横馬前攀援緑羅磴飛步蒼崖巔昔人此嘉遯手弄朱絲絃想當林間月獨寫山中泉此樂非外得肯受世網牽我亦本蕭散至此更怡然偏憐最幽處流水鳴濺濺延慶寺㑹景純正仲希道介夫明叟納凉同觀建鄴宮中畫象翰林墨跡延慶寺者劉裕故宅中有夀丘山禪方夀丘山平昔宋公宅好風吹雨來暑氣一蕩滌我與二三友歡言同几席神清軼埃􅅽趣合盡肝膈嶺竹翠尚新水花紅可摘以此侑罇酒隤然岸巾幘建業舊丹青金鑾餘翰墨綽約桃李顔迢遥龍虎跡􅃡矣霸王業信哉文章伯感古巳躊躇慕竒復嘆息泊無勢利心自覺衿慮適起坐相扳牽遲留日將夕送豐稷桃華染破南山青漢江此時春水生客舟相語人夜起勁艣亂江羣雁聲知君飄泊動歸思告我舉裝千里行閎材壯思風雨發緑鬢少年氷雪清讀書一見若經誦下筆千言能立成精㣲自得有天質操行秀出存鄉評嗟從薄禄困流滯能誘鄙俗銷紛爭絃歌躬勸士強學田里堵安人力耕嗟予據案但畫諾遇事縮手方䝉成雖知璞玉難強獻欲挂塵榻空含情歲寒不變廼知確物理先否終當亨維舟且盡今夕語明日㠶隨百鳥輕不飲酒不飲酒不善諧少年醒眼看花開况從多病乆衰耗自顧白髪埀毰毸縱遇花時少情思經春不曽銜酒杯布榖但憂天雨少提壺謾聞山鳥催且坐蒲團紙牕暖兩衙退後睡敦敦初發襄陽攜家夜登峴山置酒維舟沔南岸置酒峴山堂入坐松雨濕吹衣水風凉烟嶺火明滅秋湍聲激揚乍釋塵垢累况餘燈燭光羊公昔宴客為樂未遽央而我獨今夕攜家對壺觴頗適麋鹿性頓驚清興長歸去任酩酊詎期誇阿强高陽池山公昔在郡日醉高陽池歸時誇酩酊更問并州兒我亦愛池上眼明見清漪二年始再徃一杯未嘗持念豈公事衆又非筋力衰局束避世網低回紲塵羈獨慚曠達意竊禄誠已卑逰鹿門不果方舟下秋瀬已遠漢南城念昔在郡日苦為塵網嬰低心就薄禄實負山水情鹿門最發秀十里行松檉宿幌白雲影入牕流水聲龎公昔抱道遯世此躬耕風雨塞天地向晨獨先鳴故巖但聞說已覺醒朝酲及兹道途出謂諧猿鶴迎顧值深濘阻獨憐幽思并不踏蘓嶺石虛作襄陽行漢廣亭悠悠漢水長剡剡楚山密若與心目期爭從牕戸出太守朴鄙人迂無適時術治民務不煩得意偷暇日北城最憑高局促皆曠逸雲根辨毫芒鳥背臨嵂崒亦以樂賓逰豈惟慰衰疾欲寄别後情嗟無少文筆聞喜亭聞喜名自昔廣亭臨漢津飛甍出萬屋地絶無纎塵盤道城堞古遠林􅇕曲新静覺耕釣勝幽宜鷗鷺馴賴此荒僻郡幸容朴愚人閣鈴晝常寂齋釀寒更醇一罇且勤設勿負頭上巾劉景升祠景升得二蒯坐諭勝凶殘正當䘮亂時能使憔悴寛繽紛多士至肅穆萬里安能収衆材助圖大信不難諸公龍鳯姿有待久盤桓得一固足興致之豈無端廼獨采樗櫟不知取椅檀盖云器有極在理良足歎隆中志士固有待顯黙非苟然孔明方微時息駕隆中田出身感三顧魚水相後先開迹在庸蜀欲正九鼎遷垂成中興業復漢臨秦川平生許與際獨比管樂賢人材品目異自得豈虛傳蔡州蔡州昔人居遺堵不可尋青石久埋沒荒􅃄起空林昔人依劉表意氣傳至今廣路競朱轂深藏閟黄金構難琦琮間咎責積已深終貽覆宗累苟得非所欽為惡理當爾足懲誇者心谷隠寺峴南衆峯外窅然空谷深丹樓倚碧殿夐出道安林習池抱鄰曲虛牕漱清音竹静幽鳥語果熟孤猨吟故多物外趣足慰倦客心但恨紲塵羈無繇數追尋萬山萬山臨漢臯峰嶺頗秀發王繁舊居處荒草久埋沒解佩盖巳迷沈碑終自伐最宜北城望正值氛藹歇縹緲出烟雲清明動毛髮留連至歸時長見西林月題張伯常漢上茅屋遠出清漢上隠然一隄長槐栁若雲布連隂入虛堂架險注鳴溜分畦殖羣芳豈惟富桑柘盖亦餘囷倉主人事幽屏不願尚書郎即此狥高志風騷恣徜徉強起迫義重還歸直明光清風凜然在素壁盈文章故栖勿回眄黄鵠本高翔移守江西先寄潘延之節推憶昔江西别子時我初折腰五斗粟南北相望十八年俯仰飛光如轉燭子遺萬事遂恬曠我繫一官尚局促早衰膽氣自然薄多病顛毛那更緑人情畦畛阻肝膈世路風波悸心目毎嗟太守兩朱輪寧及田家一黄犢幸逢懐紱入斗牛喜得披山収寳玉薄材頑鈍待磨琢舊學搶攘期反覆雲鴻可近眼先明野鹿尚縻顔自忸長鬚幸未阻誨存下榻應容拜臨辱漢陽泊舟暫泊漢陽岸不登黄鶴樓江含峩岷氣萬里正東流驚風孤鴈起蔽日寒雲浮祗役雖遠道放懐成薄游興隨滄洲發事等魚樵幽烟波一尊酒盡室載扁舟鄖口昔與宜興君同過此我行去此二十年鄖水不改流潺湲風光滿眼宛如昨故人乗鸞獨騰鶱今人隨我不知昔我記昔逰何處言淚向幽襟落如㵼况聞江漢斷腸猿促促為物役促促為物役區區追世情但嗟束縳急未覺章綬榮奈此兩鬢白顧無一廛耕所求亦云幾脫粟與藜羮鴻鴈江南岸邉江水平水荇青青渚蒲緑鴻鴈此時儔侶多亂下沙汀恣棲宿羣依青荇唼且鳴煖浴蒲根戯相逐長無矰繳意自閒不飽稻粱心亦足性殊凡鳥自知時飛不亂行聊漸陸豈同白鷺空潔白俛啄腥汙期滿腹喜晴天晴萬里無纎風江平水面磨青銅光華逸發萬物上精氣夐與扶桑通我行江漢道苦惡十歩九折遺西東况遭積雨駕高浪沙翻石走相撞舂操舟衆工立噤岸濕櫓鑚火磨星紅荒蹊成瀦尺寸礙永日四望無人蹤一時得意數蛙黽鳴躍振踞泥塗中隂消陽勝有先兆宇宙丹翠含沖融今晨霾曀一埽蕩羲和徐行驅六龍眼明意豁萬事快預喜來年麰麥豐詶王正仲登嶽麓寺閣見寄聞君東南使攬轡雲松間皇華照楚甸吉玉投衡山幽尋得臨觀意豁窮躋攀顧我客牛斗三年疎往還低心念弱志引領望衰顔未共尊酒樂良嗟人事艱叱馭犯氷雪廻鑣馳九闗何足慰離思徳音鏘佩環訪石僊巖杜法師杜君袖銜丹砂書一顧訶斥百恠除聲如飜河落天衢四方争迎走高車方瞳秀貌白髪垂買船東南㝷舊居石巖天開立精廬四山波瀾勢争趨君琴一張酒一壺笑談衮衮樂有餘我今歸來尚踟蹰羨君决發真丈夫曉出曉出城南羅卒乗皁纛采旗密相映貔貅距躍良家子鶴鸛彌縫司馬令奪摽一一飛歩疾槃槊兩兩飜身勁㶚上今朝且兒戲衛青異日須天幸和貢甫送元考不至蓬山有行客欲上北城舟學問本閎博言談非謬悠常陳帝王略得試紫雲樓一時驚豪㨗况復富春秋朋遊所欣附争欲致綢繆承明動鄉思嵗久道苦修忽懐淄川組夙昔願始酬出餞集信侶清歡期少留酒䦨竟不至睠睠久臨流微我獨有咎此詩聊可求京師觀音院新堂九衢言語亂人耳三市塵沙眯人目猿狙未慣裹章綬魚鳥寧忘慕谿谷悵無棲宿在清曠欲弄潺湲愈煩燠道人誰氏斥佳境决漢披霄敞華屋駢羅嶷嶷三秀石藂迸娟娟兩脩竹雲蒸雨泄被巖壑海倒河垂動林麓頓驚俯仰遠囂濁豈直形骸擺羈束解衣堅坐暝忘返飲水清談心亦足丈夫壯志須坦蕩曲士隂機謾飜覆青鞋赤舄偶然爾安用區區巧追逐元豐類藁巻五
