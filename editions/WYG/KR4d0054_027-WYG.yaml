body:
  text: 元豐類藁巻二十七宋曽鞏撰表上謝中書舎人表伏承制命授臣試中書舎人者甫上程篇遽塵寵任載惟遭遇倍集兢慙中謝盖聖君難諭之情將欲施於號令得當世能言之士然後逹於文辭矧今綱理四方彌綸庻政肇惟新之王度備乆簡之官儀計謀常越於拘攣注錯舉為於希闊豈伊凢庻可測高深方當覺悟邇遐使徧知於上意訓齊内外用丕變於羣心尤資演暢之材曲盡丁寧之㫖布為邦典兹謂人文顧在臣愚豈堪此選伏惟皇帝陛下超逾千載特起一時躬堯帝之聰明而不忘講學集成湯之勇智而無倦諮詢惟左右前後之臣有耳目腹心之寄尤非淺識所可叨居如臣性實滯蒙噐非廣博知自强於名節恥隂附於貴權無因縁毫髮之扳援有積累丘山之忌嫉晚逢睿聖獨賜收憐襃加特異於常倫進用每從於中出猥以五朝之大典屬於一介之孤生已愧缺然將安稱此敢期誤寵仍寘近班敷𨗳訓辭懼空踈之難强追參諷議憂蹇淺之易窮於風波流落之餘以蒲桞衰殘之質自循涯分曷副恩榮雖日月之光何加於潤色而天地之徳無待於論思然臣素堅好古之誠粗識愛君之義旣抗顔而就列敢恕已以懐私謹當尋繹舊聞用闡揚於明命激昂懦志庻補助於謀猷仰荅主知誓殫臣節無任齊州謝到任表伏奉勅命就差知齊州軍州事已今月十六日到任上訖顧以諸生備兹煩使據非其所懼不克堪中謝伏念臣素乏他長偶知好學議先王之制作甞究本原論夫子之文章頗探閫奥厯事聖君於三世與㳺儒館者十年不知苟曲以取容但信樸愚而自守比縁私計請貳外藩嗟疾病之餘生困米䀋之細務方指期於滿嵗將垂翼於故棲遽此外遷處之劇郡維般陽之列壤實季崱之遺區習詐而夸著流風於在昔多盗與訟號難治於當今比試用於此邦必資求於强吏盖因能而任官者不違其分則量力而受位者得竭其材豈伊儒懦之資可副浩煩之用恐殫精思無補毫分然而繇積累以冐恩實飬成之有自此盖伏遇皇帝陛下智周萬物明照四方在踈逺迂賤之中而察其所守無左右逰談之助而知其所長故令覆露之仁及此滯䝉之質敢不無忘夙夜勉盡疲駑行歸于周乆自安於直道老當益壯誓無易於初心仰望闕廷臣無任襄州到任表伏奉勅命就差權知襄州巳於今月二十七日到任上訖縁同氣之私恩陳便親之微志就更善郡得侍安輿中謝伏念臣素堅向學之心幸遇好文之主備名儒館十有三年然而三易外邦五回星嵗比亦再過於雙闕未甞一對於清光常存傾藿之誠雖知向日居有戴盆之勢何以望天而臣昨治濟南最為煩劇野有羣行之盗里多武斷之豪馴致肅清始熄㐫殘之害自强柔懦頗殫竭蹙之勞今者或就安閒少休疲鈍出觀美俗尤多漢廣之高入奉慈顔不憫汝墳之瘁兹為竊冐厥有端原此盖伏遇皇帝陛下奬引士倫推崇世教小藝片言之善偏長一曲之材皆欲養成未甞棄廢故令優秩俯及孤䝉敢不拊慰此民宣明上徳永念沉碑之舊自顧何功未忘投慱之勤庻幾小補臣無任洪州謝到任表伏承勅命就差臣權知洪州軍州事充江南西路兵馬都鈐轄巳於今月二十四日到任上訖撫臨便郡獲奉於親闈總制屬城實兼於故里中謝伏念臣志雖擇善材不過人玩思詩書無出倫之異見逰心翰墨多涉俗之塵言竊食累朝備官儒館智非早悟曽不習於人情學匪兼通固難堪於世用兹縁私請得假善藩惟八換於嵗朞巳四臨於外服幸遇非常之主未奉燕閒實當難得之時獨無稱效儻獲伸於肝膈冀少益於毫分伏惟皇帝陛下恭儉愛人聰明好古卑漢唐之近事慕堯舜之逺圖臣敢不上體聖心勤脩民政奉行寛大方盡瘁於兹時補助高深庻納忠於來日仰望旒扆臣無任福州謝到任表伏奉勅命授臣守本官直龍圖閣就差權知福州巳於今月初九日到任上訖列職内朝分符督府荷收憐之俯及省孤陋以何堪中謝伏念臣蹇薄多艱戅愚少與遇繼承於興運未進望於清光至於九換嵗朞常從外徙四臨州部曽未代還兹者備延閣之美名假東甌之劇郡顧惟同氣亦預改藩但虞人品之輕莫稱主㤙之厚然臣最為寒族實奉偏親臣弟既適於遐陬臣愚固難於逺役理當懇請輒奉冐聞雖未賜於矜從亦終寛於僣黷頗識事君之義敢忘奔命之恭惟皓首之慈闈抱累年之宿疹牽衣辭訣泣涕分馳計音信之徃來殆將萬里阻晨昏之定省各在一涯足感動於人情况親逄於孝治草茒弱質素依及物之仁犬馬㣲誠終冀因心之恕再念臣撫臨城邑勞問士民皆狎處於太寧但遵行於明詔則臣實慚尸於廪食曷補報於寵靈皆出誤知致斯冐處伏惟皇帝陛下多能天縱盛徳日新躬神聖之姿而兼容小善履富貴之極而深逹下情在於隠恤之心豈間么㣲之跡敢不誓殫勤瘁匪懈夙宵慰海徼之幽荒布徳音之寛大承流寵寄方自効於驅馳反哺愚情冀尚䝉於憫惻仰望旒扆臣不任明州謝到任表臣於去年十二月於江寧府進福州公文送到勅牒一道就差臣權知明州當月十八日於真州據進奏官伏准中書孔目房帖子臣乞迎侍老母赴任不行巳於今年正月二十五日到任上訖預於分土愧在假人竊自省循懼無報稱中謝伏惟皇帝陛下有聰明睿智固天縱之高姿有㳟儉慈仁不世出之琦行上嘉堯舜之際下悼漢唐之間以超曠之迹為可追以苟簡之治為無取甚盛徳之事敏於絶倫大有為之君審於在已所以更張庻政憂憫百姓之心至於推廣大㤙鎮撫四夷之略無忘夙夜匪懈斯須其志之所存則有孔之卓其行之以力則有禹之勤若夫甄序羣材蒐揚衆論偏一作寸長一曲之善半辭片説之工逺自巖穴之幽深旁暨草萊之踈賤莫不從容賜對以盡其情委曲因能以收其用可謂三代以後特起之盛時千載以來幾希之嘉㑹而臣濫中䑓之優秩玷内閣之美名然而荏苒十年周流六郡當陛下闢四門以延天下之士而臣未得一望於清光遇陛下開數路以來天下之言而臣未得少陪於未議盖兹逺跡最謂多竒故雖抱於愚忠每自安於靜晦竊恃皇明之必照終期素蓄之獲伸昨者爰自江呉就更閩粤唶有畏塗之阻藐無將母之因頼上威靈致㓂攘之熄滅屬時休慶獲稼穡之豐登既此䝉城且將滿嵗輒露由衷之請果紓及逺之仁召自天涯還之闕下巳慰循陔之念更諧栱極之誠方攬轡以在行復分符而補外維鄞江之列壤實浙右之名邦素號寛閒可容尸素尋敷陳於奏牘冀迎奉於輕輿􅒺是微情未回洪造已宵行而祗命甫夕惕以當官眷是遐陬遘此昭旦來廷之國實為出入之途表海之城方始經營之緒仰荷選掄之寄敢忘策勵之勤矧皆禀於成䂓庻可圖於薄效再念臣比更逺守乆去偏親出自推㤙幸兹易地環走已臨於新部相望猶邇於舊封仰晞天日之光未親户牖俯計晨昏之戀尚隔庭闈眇是羇單了無黨助每益堅於巳志獨有待於主知自效驅馳敢廢資忠之義庻依長育未愆致飬之私傾葵藿之一心極蓬茒之丹懇論醻有在之死無渝仰望冕旒臣不任亳州謝到任表伏奉勅命就差權知亳州軍州事巳於今月十六日到任上訖比從閩粤中易句章益起堅城以强表海之勢閎開列館以待來廷之賔皆承䂓晝之餘方始經營之緒程工省費俾無靡敝之材計力與庸俾無發召之役以至屬材能而董事分什伍以庀徒已略具於科條可粗施於士吏身方督作匪懈於服勞法有避親遽䝉於易地竊陪京之寵寄申將母之微情輒冐㤙榮何堪報稱中謝臣竊觀前籍所載千載以來大道鬰而未彰莫承于古王者䟽而不作無甚兹時在理可推乆衰必復去五代八姓寖㣲之弊肇自宋興承一祖四宗丕顯之謨實在陛下盖繇體粹精之睿質執剛徤之純誠運獨㫁之明則天清水止昭不殺之武則雷厲風行故能並起百工越熈庻績追二帝三代之甚盛行兩漢有唐之所難使天地人神莫不順序雨暘寒燠罔或違時厥戴徳者田耕井飲之倫盖㳺泳於遐邇之内其䝉澤者蟄潜嫗伏之類無殰殈於胎卵之中寳鼎靈芝聲流於樂府來麰嘉糓實牣於太倉至於武庫歛藏之兵羽林閱習之伎匠盡其巧而工妙擅於一時士盡其材而精銳軼於近代威靈所覆夷貉允懐是以扶桑戴斗之區度索尋橦之國來於四海之外㑹無一嵗之虚盖令不待期而萬里奔走治非有跡而九域阜安可謂不世之宏休難名之盛烈夫應之福者既極其厚則報其貺者必盡其隆方當秩盛禮大樂之文薦諸清廟采増封廣禪之義類于名山於以較著日新拔出之顯庸闡布天錫永昌之大業臣性姿固塞人品𦕈微獨於軰流素嗜文學如得鏤諸金玉述陛下赫赫之功播在筦絃紀陛下巍巍之徳措之六藝而無愧告諸百世而無疑庻幾不後古人可以昭示來者存於肺腑積有嵗時然臣籍雖預於内朝身屢更於外服巳彫零於齒髮乆轉走於東南曽未得側望塵於清蹕之間參第頌於從官之後惟堅悃愊欲効毫分今者獲便養於親闈預分憂於輔郡上體焦勞之意敢忘夙夜之勤宣化承流方盡駑駘之力望雲就日但傾葵藿之心注仰冕旒無任依戀賀熈寧四年明堂禮畢大赦表今月十三日樞宻院遞到赦書一道以宗祀明堂禮畢大赦天下臣已即時集軍州官吏將校等宣布訖伏以奉承聖考升配上天秩盛禮於法宫推大㤙於率土中賀伏惟皇帝陛下有聰明好古之質有恭儉愛人之誠兢畏萬幾仔肩一徳燔柴展報既昭告於元功嚴父致隆又推明於極孝越成釐事均布鴻休草木昆蟲皆令受賜華夏蠻貊莫不歸仁臣心係北辰身縻東土永懐故事難求汶上之圖獨逺清塵方嘆周南之滯想望旒扆臣無任賀熈寧十年南郊禮畢大赦表今月初七日遞到赦書一道以十一月二十七日南郊禮畢大赦天下者臣已集軍州官吏將校軍民等宣讀訖伏以人之所歸者莫如徳天之所享者在於誠其惟聖王克有全美中賀伏惟皇帝陛下聰明稽古承繼祖宗慈惠愛人撫臨邦國有徧覆并容之大度有防微慎獨之小心不從逰畋不近聲色無紛華盛麗之好無便僻側媚之私嵗時吉蠲以承七廟左右順適以奉兩宫其功施於人効見於事則宅仁由義搢紳之徒成材於學校超距蹋鞠熊羆之旅養勇於營屯甌窶汚邪之收充於倉廪關石和鈞之利阜於市㕓家有豫樂之聲人無愁怨之色恊氣所召休應自殊鈎陳太微星緯咸若崑崙渤澥波濤不驚近則金石之聲一作音鳥獸忻躍逺則干羽之舞蠻夷駿奔象齒旅於闕廷龍媒納於閒廐是謂六府三事皆可以謌四海九州罔不率俾盖巍巍而特起非瑣𤨏之能闚前世議泰山之封謀梁甫之禪者度崇比大疇克登兹陛下抑而不圖謙以自牧以謂先后一作王創業垂統其功莫得而名上帝隤祉發祥其徳無可以稱思所以報一本於心故寅畏嚴恭積之有素而齊明薫袚進而益䖍在於物者不取其煩盡諸已者必求其實是以蕭光之烈奏於宗祊柴燎之蒸焜於郊兆幽隠昭答神靈顧懐無疆惟休方寖昌於萬世不敢專享故敷錫於羣元稽參典彛定著赦令弛張從理同異稱情蠲罪𤯝而棄瑕疵録勞能而縱逋負顯晦咸暨洪纎不遺萬國之歡既交於冲漠一人之慶遂及於蚑蠕孚于上下之間極乎帝王之盛臣被學最舊䝉㤙寖深莫侍甘泉之祠獨嘆周南之滯第從臣之嘉頌未効薄材望屬車之清塵但馳逺思想仰宸扆臣無任賀元豐三年明堂禮畢大赦表今月二十日樞宻院遞到赦書一道以明堂禮畢大赦天下者已即時集軍州官吏軍民宣讀訖竊以昊天無聲之載人莫能名先帝罔極之㤙物何以稱維總章之正位秩宗祀之鴻儀可薦至誠用伸昭報中賀伏惟皇帝陛下躬夙夜之聖質而博古多聞經特起之大猷而虚心廣覽振千齡之墜緒紹三代之遐蹤霈澤之所涵濡太和之所煦嫗華夏蠻貊無一夫不獲其宜草木蟲魚無一物不遂其性爰求祭典用告王功盖諸儒之說為不經則折𠂻於孔子而近世之事為非古則取法於周公罷黜異端推明極孝以尊莫大於祖故郊於吉土以配天以本莫重於親故享於合宫以配帝㤙義兩得其當情文皆盡其詳徹爼云初均釐甚廣君哉皇矣實難偶之昌期巍乎煥焉信非常之盛禮臣幸逄熈洽未奉燕閒一違前蹕之音四遇親祠之慶青雲多士皆預橋門之聴觀黄髪孤生獨嘆周南之㽞滯仰望旒宸臣不任賀克伏交趾表伏覩進奏院報安南招討司已克伏交趾其首領李乾徳具表乞降者螻蟻之微自投必死乾坤之大終許更生惟徳及於幽遐實均慶於中外中賀伏惟皇帝陛下順稽古憲敘正民彛鬯聲教於四方壹書文於萬國唶海隅之昧俗肆井底之狂謀聖㤙所懐凶氣自失雕題交趾心服於威靈大賂南金嵗遵於貢職允出止戈之武是稱無敵之仁臣逺守藩維獲聞㨗奏永懐竊忭實倍常情臣伏恨職守所拘不獲稱慶闕廷臣不任慰慈聖光獻皇太后上仙表今月二十日太皇太后遺誥奄棄宫闈者承問震驚失容號慟臣某誠悲誠感頓首頓首伏以太皇太后表儀三世徳首於人倫保佑兩朝功存於王室遽違孝養未究遐齡無間近踈實均欷慕伏惟皇帝陛下痛貫宸極聖情難居臣伏恨方守印章不獲躬詣闕廷臣無任謝賜唐六典表伏䝉聖慈賜臣唐六典一部者冐貢微誠敢徼寵賚獲盈私望特出異㤙中謝竊以繼貞觀之造邦維開元之稱治財成唐典本庻務於尚書則象周官綴舊聞於經禮行之當世垂及方來伏遇皇帝陛下接五聖之休期振千齡之絶業號令風采卑秦漢而不言綱紀文章體唐虞而特起爰因廣覽俯逮遺編俾加鏤板之傳賜及在廷之士顧最踈之庸下忘輒請之妄逾猥荷并容預均蕃錫敢不自强衰邁悉意闚尋竊典故之緒餘少俾寡陋審官儀之委曲益勵疲駑臣不任元豐類藁巻二十七
