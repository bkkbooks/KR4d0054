body:
  text: 元豐類藁巻四宋曾鞏撰古詩降龍降龍左右施襟裾兩廊夾廟深渠渠禮下天子一等爾衣服居處何其殊文旛列㦸照私第青紫若若官其拏先後熒煌首珠翠侍者百十顔温瑜凝寒墮指熱侵骨一宴百盞傾金壺窮民疾首望雨露太上欲倚攀姚虞君胡為乎日時病槖鍼爆艾恬以愉生前赫赫浪自重身後沒沒寧非愚湘㓂衡湘有冦未誅剪殺氣凛凜圍江潯北兵居南匪便習若以大舶乗高岑傖人操兵快如鶻千里其旅巢深林超突溪崖出又伏勢變不易施戈鐔能者張弓入城郭連邑累鎮遭驅侵羣黨争誇殺吏士白骨棄野誰棺衾貔貅數萬直何用月費空已逾千金楚為貧鄉乃其素應此調發寧能禁㨗如馬援不得志強曳兩足登嶔崟烏蟻睢盱倚嵓險此虜難勝端非今較然大體著方册唯用守長懐其心祝良張僑乃真選李瑑道古徒為擒嗚呼廟堂不慎擇彼士齪齪何能任大中咸通乃商鑒養以嵗月其憂深願書此語致太史獻之以補丹扆箴地動吾聞元氣判為二升降相輔非相傷今者無端越疆畔隂氣焰焰侵於陽陽収剛明避其勢隂負㨗勝尤倡佯地乗是氣抗於下震盪裂拆乖其常齊秦晉代及荆楚千百其堵崩連墻隆丘桀屋不自定翩若猛吹揺旌幢生民洶洶避無所如寄厥命於湖江有聲四出嘻可怕誰擊萬鼓何雷硠隂為氣静乃如此天意昧密寧能詳或云蠻夷尚侵軼已事豈必垂灾祥意者邪臣有專恣氣象翕翕難為當據經若此非臆决皎如秋日浮青霜祖宗威靈陛下聖安得直語聞廟堂朝廷肅穆法度治豈用凛凛憂氐羌邊將太祖太宗能得人長壘横邊遮烟塵太傅李漢超侍中何繼筠二子追接吳與孫鎮齊撫棣功業均卓哉祖宗信英特明如秋水斷如石一朝出節合二子口付心隨斷纎惑靡笄之旁郡城下酒利商租若山積二子開庫啗戰士以屋量金乗量帛洪濤入坐行酒杯牛胾羊蒸委若灰嵗費巨萬不計籍戰士歡酣氣皆百二子按轡行邊隅牙纛宛轉翻以舒汎掃沙磧無纎埃塞門千里常夜開壯耕老餔安且愉桑麻蔽野華芬敷濟南遠清書樂石百井夜出摧穹廬神哉祖宗知大體趙任李牧真如是漢文齷齪豈足稱郎吏致激面汙騂當今羌夷久倡蹶兵如疽癰理須决堂堂諸公把旄鉞碩䇿神韜困羈紲祖宗憲度存諸書㸌若白日明天衢國容軍政不可亂薦此以為陛下娛多雨嗟江之濱地多雨冬雷不収開蟄戸隂氣濁晦化為霧或雲扵山水於礎雜花萬株紅與紫臘風吹開不可數入春十日寒始至春氣欲歸寒格住羣山巉空雪相亘摧折草木何可禦霖傾澇雨那復止穹林大丘滅無渚及今孟夏理宜熱重裘無温坐當午四時云然了安謂吁吾有愁誰可語秋日隂氣先嬴縱秋熱時節有㡬相與奪情知赫日不可久須聽西風生木末浮雲滿天明復暗天意自然如惨怛園林秀色已漸失次第豈能無葉脫南山獨佳不可挫氣象更清連日月燕飛度海向何處今去昔來真可劣綉簾錦幕不筭重從此朱門戒霜雪誰憐丱角歌者哀嵗嵗苦貧思短褐山水屏吳縑落寒機舒巻光亂目秋刀剪新屏尺寸隨折曲搜羅得珍匠徙倚思先屬經營頃刻内千里在一幅定眎乃漸通紀一作悉數難迫促山亂若無窮負抱頗重複高稜最當中桀大勢尤獨回環衆峰接趨向若奔伏矜雄跨九州争險挂星宿深疑雪霜積暗覺烟霧觸泉源出青冥漲潦兩崖束厯遠始紆徐派别輸衆谷輕舟漾其間沿泝無緩速微尋得修逕側起破蒼麓遠到無限極窮升犯雲族遊子定何之顧盼停馬足盤石長自閒空源偶誰築塵氛見荒林物色存古俗粲粲弄幽花蒼蒼䕃嘉木遺牛上巖巔驚麏出槎腹鮮明極萬狀指似纔一粟雖從人力為頗類隂怪續深堂得欹眠高枕生遠矚餘光耀衾幬清意凝幔褥愚訶世幸略慵卧嗜尤酷因能助佳夢肻顧躋杲旭將相有時材溪嵓真我欲儒林恥未博俗穽思自贖婚嫁累苟輕耕釣吾已卜圖屏持自慰寤寐心思逐八月二十九日小飲隂陽在天地鼓吹猶槖籥煩蒸翕已盡灝氣乃浮薄羣山翠相抱塵靄如洗濯川源亦虛徹派别歸衆壑囂音滅蛙蚓勁意動鵰鶚蠅蚊自不容雖有類鉗縛驅之舊苦衆忽去寧匪樂俯仰自醒然意適忘體瘼天運雖已晏生物固未剥薑芋圃可掘禾黍田始穫脫苞紫栗迸透葉紅梨渥幽花媚清景鮮藂耀新萼西風動孤格露曉愈修擢能終犯寒沍詎可忽纎弱況當九日近家釀成已昨温顔几杖適弱質衣冠恪閨門自可㑹非必千里約筝匏出人指迤邐奮宮角初言小人獻終拜長者酢清言喜自洽細故憂可略幸無職事顧況荷租賦薄讀書有休暇得醉且吟噱食梨今嵗天旱甚百榖病已久山梨最大樹屬此亦乾朽當春花盛時雪滿山前後常期摘秋實穣穣落吾手忽驚氷玉敗不與膏澤偶清朝起周覽映葉才八九閒居問時物此說得溪叟貧齋分寂絶塵抱徒噎嘔寧知蕭條内把握忽先有食新恐非稱分少覺已厚開苞日星動落刃氷雪剖烟潯擇新汲遠負盈素缶英華兩相發光彩生戸牖初嘗蜜經齒久嚼泉垂口蠲煩慰諸親愈渴忻衆友肯視故畦𤓰寧論濁泥藕嵗晩迫風霜人饑乏藜糗真味雖暫御未許置樽酒追租耕耨筋力苦収刈田野樂鄉鄰約來往樽酒追酬酢生涯給俯仰公斂忘厚薄胡為此嵗暮老少顔色惡國用有緩急時議廢量度内外奔氣勢上下窮割剥今嵗九夏旱赤日萬里灼陂湖蹙埃壒禾黍死磽确衆期必見省理在非可畧謂須倒廩賑詎止追租閤吾人已廹切此望亦迂邈奈何呻吟訴卒受鞭捶却寧論救憔悴反與争合龠問胡應驅迫久已罹匱涸計須賣強壯勢不存尫弱去嵗已如此愁呼徧郊郭饑羸乞分寸斯須死笞縛法令尚修明此理可驚愕公卿飽天禄耳目知民瘼忍令瘡痍内每肆誅求虐但憂值空虛寧無挺犁钁暴吏體宜除浮費義可削吾卧避囂喧兹言偶斟酌試起望遺材霾風振墟落桐樹棄地瓦礫間兹桐偶誰樹憶見擁西墻俄成劃烟霧得時花葉鮮照影清泉助當軒蔽赤日對卧醒百慮惜哉禀受弱妄使鸞凰顧商聲動猶㣲秀色觸已沮泫摧亂繁條逼迫畏清露暄晴幸未闋飄落儻可拒噫號衝飈回激射隂霰聚此勢復可言瞪視空薄暮九月九日凄凄風露滋靡靡塵埃屛已忻廬舎清未苦裘褐冷眠食味尤嘉起坐日尚永虚天照積水精鑑出幽礦石瑩見山稜林踈覺牕冏黄花宿蕋破艶艶晨粧靚頻尋遠逕香每愛蒼池影為誰佳色鮮慰我貧齋静寒醅出家法異果得他境甘腴饌新兔醜怪薦修蒲猛反幽閒重時節老大珍物景獻酬興未薄比諷思猶騁況同親戚歡詎匪田野幸俱醉任棲鵶燭炬尚可秉路中對月山川困遊人而不斷歸夢其餘惟日月朝夕南北共日光驅人身擾擾逐羣動鄉思須暫忘世事那止重豈如月可喜露坐惜倥傯清明入襟懐萬里絶纎霿愛之不能飡但以目睛送想知吾在廬皎皎上脩棟慈親坐高堂切切兒女衆憐其到吾前不使降帷幪豈不映時節荏苒更季仲而我去方急其能計歸鞚我非土木為耳目異聾瞢念之曷由安腸胃百憂中何言月下喜喜意亦有用為其同此時水木光可弄猶勝夢中事記之聊一誦聽鵲寄家人鵲聲喳喳寧有知家人聽鵲占歸期物情固不等人事爾意自驚思别離秋風粲粲正可愛黄菊芙蓉開滿枝春風千樹變顔色遠水静照紅霞衣梧桐楊柳豈知數沙歩露冷銀牀欹新黄暗緑各自媚爛漫未减春風時誰言秋物不可賞人意自移隨盛衰山田正冷酒味美禾黍半収雞鶩肥霜梨野栗處處有雪蜜薦口清香隨鄉園物物可想見我意祗隨魂夢飛家人未用占鵲語應到歸時春亦歸讀書一作辛邜嵗讀書吾性雖嗜學年少不自強所至未及門安能望其堂荏苒嵗云暮家事已獨當經營食衆口四方走遑遑一身如飛雲遇風任飄揚山川浩無涯險怪靡不嘗落日號虎豹吾未停車箱波濤動蛟龍吾方進舟航所勤半天下所濟一毫芒最自憶往嵗病軀久羸尫呻吟千里外蒼黄值親䘮母弟各在遠訃歸恐驚惶凶禍甘獨任危形載孤艎﨑嶇䕶旅櫬􅃡邈投故鄉至今驚未定生還乃非常憂慮心膽耗馳驅筋力傷况已近衰境而常犯風霜驅之久如此負痾固宜長朝晡暫一飽百囘步空廊未免廢坐卧其能眎縑緗新知固云少舊學亦已忘百家異㫖趣六經富文章其言既卓濶其義固荒茫古人至白首搜窮敗肝腸僅名通一藝著書欲煌煌瑕疵自掩覆後世更昭彰世久無孔子指畫随其方後生以中才胷臆妄度量披尋猶未達吾慵復何望端憂類童稚習書倒偏傍况今議文物規摹詎能詳輪轅孰撓直冠盖孰纁黄珪璋國之器孰殺孰鋒鋩問十九未諭其一猶靣牆㡬微言性命萌兆審興亡兹尤覺浩浩吾詎免倀倀因思幸尚壯曷不自激昂前謀信已拙來效庻云臧漸有田數畝春秋可畊桑休問就醫藥疾病可消禳性本反澄澈情田去榛荒長編倚修架大軸解深囊収功畏奔景窺星起幽房虚窓達深暝明膏續飛光搜窮力雖憊磨礪志須償譬如勤種藝無憂匱囷倉又如導㳙㳙寧難致湯湯昔廢漸開闢新輸日收藏經營但亹亹積累自穰穰既多又須擇儲精棄其糠一正以孔孟其揮乃韓莊賓朋顧空館議論據方牀試為出其有始如宮應商紛紜遇叩擊律呂乃交相須臾極萬變開闔争隂陽南山對塵按相磨露青蒼百鳥聽徘徊忽如來鳯凰乃知千載後坐可見虞唐施行雖未果貯畜豈非良何殊廏中馬縱齕草滿場形骸苟充實氣力易騰驤此求苦未晚此志在堅剛雜詩五首三季已千載古道久荒榛紛紛東漢士飛鳴不當辰經營救氛沴此志卒埃塵士生有進退何必棄其身其道雖褊迫其行絶緇磷公心不吾誑復求無此人貧士任固小㑹計未可失方今備千品内外有卑秩孰當責在已施設能自必拘文已難騁避世固多屈細云且可略於大復何實所就正如斯與古豈同術雖非萬鍾富苟冒歸一律焉能示朋友學士空自咄韓公綴文辭筆力乃天授並驅六經中獨立千載後謂為學可及不覺驚縮手如天有日月厥耀無與偶當之萬象瑩所照百恠走此其自然光萬物安得有其人雖已歿其氣著星斗窮天破大惑更覺功業久其餘施諸小未負風義厚當身止自善所遇時則不致官九列齊此理嗟亦苟去就惟用舍士固無常守孔孟非其稱斗禄應未取惜哉天下才甘為外物誘少年百事銳豈謂身力孱心笑古時士樹立勢苦難差池嵗月邁自照失朱顔初心不復道齟齬常未安紛紛憂與勞㡬不傷肺肝人自省已分静黙固其端詩書可自喜施設諒漫漫相去幾年今與古睢陽幾人朱與紫嗟哉二子獨有名義烈乃能長不死當時美人歓未足一日倉皇行萬里豈無公卿尊且寵急反與胡為眼耳丈夫感激世莫測二子引身高不起忠驅義激鬼神動漠漠胡沙來此止與舎弟别舟岸間相望感嘆成詠涕淚昨辭親酸心今别子舟陸空相望掺袂即千里戲呈休文屯田陳侯雋㧞人所羡嵗晩江湖初識面已聞清論至更僕更讀新詩欲焚硯天子無由熟姓名諸公固合思論薦烏鞾况已踏臺省黒綬未得辭州縣落落逢人愈難合欣欣顧我能忘倦跬步麄官别經嵗角巾廣坐今相見遶郭青山疊寒玉縈隄遠水鋪文練明紅靚白花千樹隔葉跳枝鶯百囀佳時苦雨已蕭索落蕋随風還回旋縱無供帳出郊野尚有清樽就閒燕脫遺拘檢任真率放恣嘲諧較豪健東廊解榻不共語明日離亭空眷眷送宣州杜都官夜間陵陽峰上雨曉見宛溪春水平畫船不待雙櫓挾歸客喜成千里行牧之文采宜未泯夫子風流今有聲篇什高吟鳯凰下翰墨醉洒烟雲生撥置簿書有餘力放意樽罍無俗情志義非徒勸風俗愷悌固可交神明餘休比戸得涵泳嚚訟累嵗皆澄清薦章交論付丞相士行如此宜名卿江湖一見十年舊談笑相逢肝膽傾鷦鷯一枝亦自得去矣黄鵠高飛鳴麻姑山送南城尉羅君麻姑之路摩青天蒼苔白石松風寒峭壁直上無攀援懸磴十歩九屈盤上有錦繡百頃之平田山中遺人耕紫烟又有白玉萬仞之飛泉噴崖直㵼蛟龍淵豐堂廣殿何言言階脚挿入斗牛間樛枝古木不記年空槎枵然卧道邉幽花自嬋姢林深為誰妍但見塵消境静翔白鶴吟清猿鶵禽乳鹿往往嘷荒巔却視來徑如縁絙千重萬疊窮巖巒下有荆吳粟粒之羣山又有甌閩一髮之平川奕棋縱衡遠近布城郭魚鱗參差高下分岡原千竒萬異可意得墨筆盡秃誰能傳丈夫舒巻要宏達世路俯仰多拘牽偶來到此醒心目便欲洗耳辭囂喧羅夫子一日遠補東南官愛此層崖峻壑之秀發開軒把酒可縱觀喜此披霄挿漢之夐起出門舉足得往還羅夫子一尉龍蛇方屈蟠此邦人人衣食足闔境年年枹鼓閒几案剸裁得休暇山水登躡遺紛煩我行送之思故園引領南望心長懸東軒小飲呈坐中二年委質繋官次一日偷眼看青山念隨薄禄困垂首似見故人羞滿顔及門幸得二三友把酒能共頃刻閒海魚腥醎聊復進野果酸澁誰能刪談劇清風生麈柄氣酣落日解醉鐶瑰材壯志皆可喜自笑我拙何由攀高情坐使鄙悋去病體頓覺神明還簡書皇皇奔走地筦庫碌碌塵埃間功名難合若捕影日月遽易如循環不如飲酒不知厭欲罷更起相牽扳明妃曲二首明妃未出漢宮時秀色傾人人不知何况一身辭漢地驅令萬里嫁胡兒喧喧異俗方滿眼皎皎丹心欲語誰延夀爾能私好惡令人不自保妍媸丹青有迹尚如此何况無形論是非窮通豈不各有命南北由來非爾為黄雲塞路鄉國遠鴻雁在天音信稀幾成新曲無人聽彈向東風空淚垂若道人情無感慨何故衛女苦思歸蛾眉絶世不可尋能使花羞在上林自信無由汙白玉向人不肯用黄金一辭椒屋風塵遠去託氊廬沙磧深漢姬尚自有妬色胡女豈能無忌心直欲論情通漢地獨能將恨寄胡琴但取當時能託意不論何代有知音長安美人誇富貴未央宮殿競光隂豈知泯泯沈烟霧獨有明妃傳至今喜二弟侍親將至京師書多言六弟為縣之美嗟予懐抱徒蠢蠢二弟胷中何落落政如魯衛各馳騁文似機雲飽磨琢坐曹風義動江淮為縣聲名到京洛鴻雁峩峩並羽儀棠棣韡韡聨跗鄂我於兩處抱饑渴恨寄一官如束縛周南留滯勿復論平陸可來無厭數慈親况不倦行役官長幸復寛期約似聞笑語已髣髴想見追隨先踴躍共眠布被取温暖同舉菜羮甘淡薄山花得折隨好醜村酒可醉無清濁屈伸有命更勿疑細故偶然皆可略春風為子送㠶檣速放船頭來此泊七月一日休假作初秋尚苦暑歸沐乃君恩地閒少來客日晏猶閉門家乏念藜藿開顔無一樽况復辭貌拙敢隨車馬奔盥濯何所事讀書坐前軒豈堪當世用空味古人言頗喜市朝内獨無塵土喧終年但如此真竊大官餐秋夜秋露隨節至霄零在幽篁灝氣入我牖蕭然衾簟凉念往不能寐枕書嗟漏長平生肺腑友一訣餘空牀况有鵲巢徳顧方共糟糠偕老遂不可輔賢真淼茫家事成濩落嬌兒亦徬徨晤言豈可接虚貌在中堂清淚昏我眼沈憂回我腸誠知百無益恩義故難忘七月十四日韓持國直廬同觀山海經高閣在清禁長軒憑廣虛御幄閟圖象依然臨幸餘翠甓布天路黄簾分直廬一雨清景早稍凉秋興初解帶就君坐臨牀闚素書山海所錯出飛潜類紛如此語果虛實遺編空巻舒自笑正豕亥更微注蟲魚君材合遠用就此固已疎如我乃斯幸地閒容誤居竹影散良席花香浮廣裾俯仰自足適歸時更當徐李氏素風堂丞相事唐室獨馳三絶名家世在圖史詩書傳後生郎位逮流澤出令儕輩驚嵗暮營燕坐高居遺世情翠竹帶書幌青山臨酒觥已使襟韻適况聞吟誦聲自可化鄉里豈唯門戸榮果有過庭子頴然材思精抱璞已三獻驚人當一鳴風義故常在兹堂非偶成秋聲喬柯與長谷秀色故未凂秋風來吹之聲如振江海怒號無晨夕唱和若有待翏翏徧㘭窪豈獨縁􅐑嵬百川亦相投取閙不知悔竹籬更謞然呂律焉足采蜩螿豈知微切切如怨憝惟人亦吟哦沸若烹鼎鼐八荒同一鳴静裏安得在獨有虛空翁恬然故無改戯書家貧故不用籌筭官冷又能無外憂交遊斷絶正當爾眠飯安穏餘何求君不見黄金滿籝要心計大印如斗為身讎妻孥意氣賔客附往往主人先白頭李節推亭子盱江郭東門江水湛虛碧東南望羣峰連延倚天壁長林相蔽虧蒼翠浮日夕青㝠牕戸寒居者非咫尺子初得從誰有此烟霧宅燕坐遠世喧及門無塵客築亭更求深緩帶聊自適時花笑婀娜山鳥吟格磔家醸熟新樽歡言命良席故巳輕華簮寧論珍拱璧我亦有菑田相望在阡陌安得巾柴車過從佇三益秋夜露坐偶作白雲飛尚低清露泫猶早風來亦依㣲濁暑焉得掃客堂虛四楹洒水恨枯槁喜兹宵漏初露坐散襟抱河明帶飛觀月白通馳道顧盻塵慮銷瓶泉謝頻倒恨無同聲人詩義與探討踟躇拂方牀歸卧夢亦好韓玉汝使歸顧命逮殊隣輶軒遵此道公府戒行期禁庭頒重寳積雪正東流渡河盛前導士勇踐邊塵馬驕嘶塞草玉節所鎮臨氊廬先汛掃赫爾示威靈坦然布懐抱國倚材實優慮得聲名早慷慨服天驕從容問遺老光華及原隰沆碭看西顥迎勞動都門旌旗風亦好苦熱憶初中伏時怫欝炎氣升赫日已照灼赤雲助軒騰積水殆將沸清風豈能興草木恐焚燎牕扉似炊蒸冰雪氣已奪蚊蠅勢相矜發狂憂不免暑飲詎復勝過介甫日暮驅馬去停鑣叩君門傾諸肺肝盡不聞可否言淡爾非外樂恬然忘世喧况值秋節應清風蕩歊煩徘徊至星漢更復坐前軒過介甫歸偶成結交謂無嫌忠告期有補直道詎非難盡言竟多迕智者尚復然悠悠誰可語合醬作孺人捨我亡稚子未堪役家居拙經營生理見侵迫海鹽從私求厨麪自官得揀豆連數晨汲泉候將夕調澆遵古書煎熬需日力庻以具藜羮故將供膾食豈有寄徑憂提缾無所適但慙著書非覆瓿固其職送章婺州方擁使君節駕言自東還又聞白丞相懐紱出九闗遂縱大船去欲追詎能攀已喜所寄徑幽尋足谿山仍誇越西部逈在雲林間屋瓦徧高下青蒼更回環穿路竹裊裊鳴沙水潺潺㑹有尊酒適每需庭訟閒况席鼔琴舊政行故非艱嵗暮當趨召馳歸復玉班瞿秘校新授官還南豐栁色映馳道水聲通御溝雖喜芳物盛未同故人遊叩門忽去我躍馬振輕裘佩印自兹始過家當少留中園何時到薇蕨亦巳柔山翠入幽屐渚香浮迴舟阡陌有還往壺觴時獻酬應笑天禄閣寂寥誰見求元豐類藁巻四
