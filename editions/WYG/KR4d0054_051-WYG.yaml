body:
  text: 南豐先生文集後序南豐先生曾氏之文與廬陵歐陽氏眉山蘇氏臨川王氏並稱名家而皆有集行於世先生之集蓋刻自元大徳甲辰此為元豐類藁宜興有刻為樂安鄒君旦豐學重刻為南靖楊君參縉紳章縫遂有善本爭相摹印人人得而觀之鄒孟氏所謂誦其詩讀其書不知其人可乎學者觀先生之文則知先生矣知先生則於感發也特易易耳厯歲兹逺板畫多磨雖嘗正於謝簿普再補於莫君駿顧旋就湮至不可讀予謫旴之再稔公暇輒留意於斯而郡齋所存若李旴江先生集養生雜纂耕織圖和唐詩昔所殘缺悉為增定既又取是集讎校焉易其敝朽剔其汚漫更新且半庶幾全錄越三月始就緒嗚呼先生之文何事於予顧誠有不容已者而亦學者誦法所在髙山仰止景行行止願相與勉之若徒以其文焉爾也淺之乎求先生者矣仁和後學陳克昌謹識欽定四庫全書元豐類藁附錄行狀公諱鞏字子固建昌軍南豐人曾祖諱仁旺贈尚書水部員外郎祖諱致堯尚書户部郎中直史館贈右諫議大夫考諱易占太常博士贈光祿卿母呉氏文城郡太君母朱氏仁壽郡太君公嘉祐二年進士及第為太平州司法參軍召編校史館書籍厯館閣校勘集賢校理兼判官告院嘗為英宗實錄檢討官不踰月罷出通判越州厯知齊襄洪州進直龍圖閣知福州兼福建路兵馬鈐轄賜緋衣銀魚召判太常寺未至改知明州徙亳州又徙滄州不行留判三班院遷史館修撰管句編修院兼判太常寺元豐五年四月擢試中書舍人賜服金紫九月丁母憂明年四月丙辰終於江寧府享年六十有五自大理寺丞五遷尚書度支員外郎換朝散郎勲累加輕車都尉元配晁氏光祿少卿宗恪之女繼室李氏司農少卿禹卿之女子男三人綰太平州司理參軍綜太廟齋郎綱承務郎二女蚤卒孫男六人悊怘愈􅘔怤憩悊假承務郎餘未仕孫女五人元豐七年六月丁酉葬南豐從周鄉之原頭曾氏姒姓其先魯人至其後世避地遷於豫章子孫散處江南今家南豐者自髙祖諱延鐸始也初蒧及參父子俱事孔子蒧樂道忘仕孔子與之參以孝徳為世稱首而參孫西恥自比於管仲其世徳淵源所從來逺矣至皇祖大夫以直道正言為宋名臣皇考光禄博學懿文惇行孝友明古誼達時變位不配徳著書垂後畜厚流長天以道徳文章鍾于公身以侈大前烈開覺後嗣實命世之宏材不待文王而興者歟公生而警敏不類童子讀書數百千言一覽輒誦年十有二試六論援筆而成辭甚偉也未冠名聞四方是時宋興八十餘年海内無事異材間出歐陽文忠公赫然特起為學者宗師公稍後出遂與文忠公齊名自朝廷至閭巷海隅障塞婦人孺子皆能道公姓字其所為文落紙輒為人傳去不旬月而周天下學士大夫手抄口誦唯恐得之晩也蓋自揚雄以後士罕知經至施於政事亦皆卑近苟簡故道術寖微先王之迹不復見於世公生於末俗之中絶學之後其於剖折微言闡明疑義卓然自得足以發六藝之藴正百家之繆破數千載之惑其言古今治亂得失是非成敗人賢不肖以至彌綸當世之務斟酌損益必本於經不少貶以就俗非與前世列於儒林及以功名自見者比也至其文章上下馳騁愈出而愈新讀者不必能知知者不必能言蓋天材獨至若非人力所能學者憊精思莫能到也世謂其辭於漢唐可方司馬遷韓愈而要其歸必止於仁義言近指逺雖詩書之作者未能逺過也其為人惇大直方取舍必度於禮義不為矯偽姑息以阿世媚俗弗在於義雖勢官大人不為之屈非其好雖舉世從之不輒與之比以其故世俗多忌嫉之然不為之變也其材雖不大施而所治常出人上為司法論决重輕能盡法意繇是明習律令世以法家自名者有弗及也為通判雖政不專出而州賴以治初嘉祐中州取酒場錢給牙前之應募者錢不足迺俾鄉户輸錢助役期七年止後酒場錢有餘應募者利於多入錢期盡而責鄉戸輸錢如故公閲文書得其姦立罷輸錢者二百餘户且請下詔約束毋擅增募人錢歲饑度常平不足仰以賑給而田居野處之人不能皆至城郭至者羣聚有疾癘之虞前期喻屬縣富人使自實粟數總得十五萬石視常平賈稍增以予民民得從使受粟不出田里而食有餘粟賈平又出錢粟五萬貸民為種糧使隨歲賦入官農事賴以不乏為州務去民疾苦急姦彊盗賊而寛貧弱曰為人害者不去則吾人不寧齊曲堤周氏衣冠族也以貲雄里中周氏子髙横縱淫亂至賊殺平民汙人婦女服器擬乘輿髙力能動權貴州縣勢反出其下故前後吏莫敢詰公至首取髙寘於法厯城章丘民聚黨數十横行村落間號霸王社椎埋盗奪簒囚縱火無敢正視者公悉擒致之特配徙者三十一人餘黨皆潰是時州縣未屬民為保伍公獨行之部中使譏察居人行旅出入經宿皆籍記有盗則鳴鼓相援又設方畧明賞購急追捕且開人自言故盗發輒得有葛友諒者屢剽民家以名捕不獲一日自出告其黨公予袍帶酒食假以騎從輦所購金帛隨之狥諸郡中盗聞多出自言友智力兼人公外示章顯實欲攜貳其徒使之不能復合也齊俗悍彊喜攻刼至是豪宗大姓歛手莫敢動冦攘屏迹州部肅清無枹鼓之警民外戸不閉道不拾遺閩粤負山瀕海有銅鹽之利故大盗數起公至部時賊渠廖恩者既赦其罪誘降之然餘衆觀望十百為羣既潰復合陰相推附至連數州其尤桀者𨽻將樂縣縣嘗呼之不出愈自疑且起踵恩所為居人大恐公念欲緩之恐勢滋大急之是趣其為亂卒以計致之前後自歸若就執者幾二百人又擒海盗八人自殺者五人老姦宿偷相繼縛致者又數十人吏士以次受賞公復請並海增巡檢員以壯聲勢自是幅員數千里無敢竊發者民山行海宿如在郛郭亳亦號多盗治之如齊盗為引去公為人除大患者既如此至於澄清風俗振理頽壞鬭訟衰熄綱紀具修所至皆然也其餘廢舉後先則視其時因其便為之在齊㑹朝廷變法遣使四出公推行有方民用不擾使者或希望私欲有所為公亦不聴也河北發民濬河調及它路齊當出夫二萬縣初按籍二丁三丁出一夫公括其隠漏後有至九丁出一夫者省費數倍又損役人以紓民力弛無名渡錢為橋以濟往來徙傳舍自長清抵博州以達於魏視舊省六驛人皆以為利其餘力比次案牘簿書藏之以十五萬計它州亦然既罷州人絶橋閉門遮留夜乘間廼得去襄州繼有大獄逮繫充滿有執以為死罪者公至閲囚牘法當勿論即日縱去并釋者百餘人州人噪呼曰吾州前坐死者衆矣孰知非寃乎在洪㑹歲大疫自州至縣鎮亭傳皆儲藥以授病者民若軍士不能自養者以官舍舍之資其食飲衣衾之具以庫錢佐其費責醫候視記其全失多寡以為殿最人賴以生安南軍興道江西者詔為萬人備州縣暴賊急歛芻粟賈踴貴百姓不堪公獨不以煩民前期而辦又為之區處次舍井爨什器皆有條理兵既過而市里不知也福州多佛寺為僧者利其富饒爭欲為主守賕請公行公俾其徒自相推擇籍其名以次補之授文據廷中却其私謝以絶左右徼求之敝民出家者三歲一附籍殆萬人闔府徼賂至裒錢數千萬公至不禁而自止廢寺二皆囊橐為奸者禁婦女毋入寺舍明州有詔完城既程工費而㑹公至初度城周二千五百餘丈為門樓十故甓可用者收十之四公為再計城減七十餘丈門當髙麗使客出入者為樓二收故甓十之六募人簡棄甓可用者量酬以錢又得十之二凡省工費甚衆而力出於役兵傭夫不以及民城成總役者皆進官而公不自言也公嘗以謂州縣困於文移煩數民病於追呼之擾也故所至出教事應下縣責其屬度緩急與之期期未盡不復移書督趣期盡不報按其罪期與事不相當聴縣自言别與之期而案與期者即有所追逮州不遣人至縣縣毋遣人至田里縣初未甚聴公小則罰典吏大則并劾縣官於是莫敢慢事皆先期而集民不知擾所省文移數十倍事在州者督察勾稽皆有程式分任僚屬因能而使公總覽綱條責成而已蓋公所領州多號難治及公為之令行禁止莫敢不自盡政巨細畢舉庭無留事囹圄屢空人徒見公朝夕視事數刻而罷若無所用心者不知其所操者約且要而聰明威信足以濟之故不勞而治也吏民初或憚公嚴已而皆安其政既去久而彌思之其於内所更官告院三班太常遇事不為苟簡革官告院宿敝尤多凡所規畫至今守之不改蓋公自在閭巷已屬意天下事如在朝廷而天下亦謂公有王佐之材起且大任庶幾能明斯道澤斯民以追先王已墜之迹然晩迺得仕仕不肯苟合施設止於一州州又有規矩繩墨為吏者不敢毫髪出入則其所設施特因時趣宜固不足以發公之藴又況其大者乎公自為小官至在朝廷挺立無所附逺迹權貴繇是愛公者少為編校書籍積九年自求補外轉徙六州更十餘年人皆為公慊然而公處之自若也公於是時既與任事者不合而小人乘間又欲擠之一時知名士往往坐刺譏辭語廢逐公於慮患防微絶人逺甚政事施張操縱雖出於已而未嘗廢法自用以其故莫能中傷公亦不為之動也賴天子明聖察公賢欲用公者數矣㑹徙滄州召見勞問甚寵且諭之曰以卿才學宜為衆所忌也遂留公京師公亦感激奮勵欲有所自効數對便殿所言皆大體務開廣上意上未嘗不從容領納期以大任一日手詔中書門下曰曾鞏以史學見稱士類宜典五朝史事遂以為修撰既而復諭公曰此特用卿之漸爾近世修國史必衆選文學之士以大臣監總未有以五朝大典獨付一人如公者也故世不以用公為難而以天子知人明於屬任之為難也公夙夜討論未及屬藁㑹正官名擢中書舍人不俟入謝使諭就職時自三省至百執事選授一新除吏日至數十人人人舉其職事以戒辭約義盡論者謂有三代之風上亦數稱其典雅皇子延安郡王牋奏故事命翰林學士典之至是上特以屬公在職百餘日不幸屬疾遭家不造以至不起始公之進天下相慶以為得人謂且大用及聞公歿皆嘆息相弔以謂公之志卒不大施於世其命也夫公性嚴謹而待物坦然不為疑阻於朋友喜盡言雖取怨怒不悔也於人有所長奬勵成就之如弗及與人接必盡理有懷不善之意來者竢之益恭至使其人心悦而去遇僚屬盡其情未嘗有所按謫有所過誤抵法者力為辨理無事而後已在官有所市易取賈必以厚予賈必以薄於門生故吏以幣交者一無所受福州無職田歲鬻園蔬收其直自入常三四十萬公曰太守與民爭利可乎罷之後至者亦不復取也平生無所玩好顧喜藏書至二萬巻仕四方常與之俱手自讐對至老不倦又集古今篆刻為金石錄五百巻公未嘗著書其所論述皆因事而發既歿集其藁為元豐類藁五十巻續元豐類藁四十巻外集十巻後之學者因公之所嘗言於公之所不言可推而知也初光祿仕不遂而歸無田以食無屋以居公時尚少皇皇四方營飦粥之養光祿不幸蚤世太夫人在堂闔門待哺者數十口太夫人以勤儉經理其内而教養四弟相繼得祿仕嫁九妹皆以時且得所歸自委廢單弱之中振起而亢大之實公是賴平㞐未嘗逺去太夫人左右其仕於外數以便親求徙官太夫人愛之異甚嗚呼天奪吾母不數月又奪吾兄何降禍之酷至於斯極也豈其子弟積惡罰不於其身而及其母兄使之抱終天之痛為世之所大僇耶不然吾母之賢也吾兄之盛徳也相繼而殞所謂天道常與善人果何如也為子弟者不自滅身罪固大矣又不能推原前人徳善勞績托於當世之文章以明著之無窮是又罪之大者也矧公於肇屬則昆弟恩猶父師其於論次始終所不敢廢維公於葬宜有銘於墓隧宜有碑於國史宜有載輒不自知其迷謬忍痛輟泣謹述公歴官行事於左至於論議文章見於公集者後當自傳故此弗著特著其大節弗敢畧弗敢誣以告銘公葬若碑者且以待史官之訪焉墓誌公曾氏諱鞏字子固其先魯人後世遷豫章因家江南公之四世祖延鐸始為建昌軍南豐人曾祖諱仁旺贈尚書水部員外郎祖諱致堯太宗真宗時上書言天下事嘗見選用仕至尚書户部郎中直史館贈右諫議大夫文忠歐陽公為銘其墓碑考諱易占太常博士贈光祿卿公生而警敏讀書過目輒誦十二歲能文語已驚人日草數千言始冠遊太學歐陽公一見其文而奇之公於經微言奥㫖多所自得一不蔽於俗學隨問講解以開學者之惑其議論古今治亂得失賢不肖必考諸道不少貶以合世其為文章句非一律雖開闔馳騁應用不窮然言近指逺要其歸必止於仁義自韓愈氏以來作者莫能過繇慶厯至嘉祐初公之聲名在天下二十餘年雖窮閻絶徼之人得其文手抄口誦惟恐不及謂公在朝廷久矣而公方以鄉貢中進士第為太平州司法參軍歲餘召編校史館書籍為館閣校勘集賢校理兼判官告院為英宗實錄院檢討官出通判越州初嘉祐中州取酒場錢給牙前之應募者錢不足迺使鄉户輸錢助役期七年止期盡而責鄉户輸錢如故公閲文書得其姦立罷之且請下詔約束毋得擅增募人錢歲饉度常平不足以賑前期諭屬縣使富人自實粟得十五萬石視常平價稍增以予民又出錢粟五萬貸民為種糧使隨歲賦以入民賴以全活徙知齊州齊俗悍喜攻劫豪宗大姓多撓法曲隄周氏世衣冠以貲雄里中其子僣横至賊殺平人州縣莫敢詰公至首寘之法厯城章丘民聚黨數十百人椎埋盗敓横行無敢正視者公禽致悉黥徙之弛無名渡錢為橋以濟往來是時州縣未屬民為保伍公獨行之設方畧明賞購急追捕且開人自言盗發輒得由是奸冦屏迹門外戸不閉道至不拾遺獄以屢空㑹朝廷初變法公推法意施行之有次第民便安之後使者至或希望私欲有所為公不聴也徙襄州州繼有大獄久不決有當論死者公閲其狀曰是當勿論何得留此吏不能對即出之縁而釋者百餘人州人叩頭曰吾州前坐死者衆矣寧知非寃乎又徙洪州歲大疫自州至縣鎮亭傳皆儲藥以授病者其不能具飲食衣衾者佐以庫錢師出安南道江西者詔為萬人備公獨不以煩民為之區處次舍井爨什器皆前期而辦兵既過市里有不知者已而它州以不蚤計擾民者皆得罪進直龍圖閣知福州兼福建路兵馬鈐轄賜緋章服時部中大盗數起南劔州賊渠廖恩者既赦其罪誘降之餘衆猶觀望陰相推附至連數州其尤桀者𨽻將樂縣縣呼之不肯出居人大恐公遣使者以謀致之前後自歸若就執者幾二百人海盗自殺與縛致又數十人吏士以次受賞復請並海增巡檢員以壯聲勢自是無敢竊發者民行山浮海如在郛郭召判太常寺未至改知明州有詔完城役有期公親巡行裁其工費甚衆其力出於籍兵傭夫而不以及民城繇是亟就數月徙亳州亳亦多盗公治之如在齊時公素慨然有志於天下事仕既晩其大者未及試而外六州皆劇處然公為之無難始至必先去民所甚患者然後理頽弊正風俗凡所措畫皆曲折就繩墨其餘力比次案牘簿書與屬縣為期㑹以省追呼皆有法終其去州未嘗有一人至田里者故所至有惠愛既去民思之不已所為法後終不可改寮屬聞公名始皆嚴憚之久而察公㢘平無私又未嘗有所按擿卒皆愧服福州無職田州宅歲收菜錢常三四十萬公獨不取以佐公錢後至者亦不敢取平居推誠待物坦然無疑於朋友喜盡言雖取怨怒亦不悔自求補外凡十二年而不悦公者屢欲有以擠之然公奉法循理終莫能中傷賴天子聖明察公賢欲召用者數矣元豐三年徙知滄州過都召見勞問久之留勾當三班院公亦感激奮勵思有所自効數對便殿其所言上每嘉納之四年手詔中書門下曰曾鞏史學見稱士類宜典五朝史事遂以為史館修撰管句編修院判太常寺兼禮儀事近世修國史必衆選文學之士以大臣監總未有以五朝大典獨付一人如公者公入謝曰此大事非臣所敢當上曰此用卿之漸爾因諭公使自擇其屬公薦邢恕以為史館檢討五年四月正官名擢拜中書舍人賜紫章服始受命促使就職時自三省至百執事選授一新除吏日至數十人人舉其職事以戒上數稱其典雅天下翕然傳之皇子延安郡王牋奏故事命翰林學士典之上特以屬公九月遭母喪罷六年四月丙辰卒於江寧府享年六十有五公自大理寺丞五遷尚書度支員外郎換朝散郎母曰文城郡太君呉氏仁壽郡太君朱氏娶晁氏宜興縣君又娶李氏嘉興縣君三男子綰太平州司理參軍綜太廟齋郎綱未仕孫六人悊怘愈􅘔怤憩公既卒上以綱為承務郎悊為假承務郎勅所在量給其喪事以七年六月丁酉葬公南豐從周鄉之原頭公於取舍去就必應禮義未始有所阿附治平中大臣嘗議典禮而言事者多異論歐陽公方執政患之公著議一篇據經以斷衆惑雖親戚莫知也後十餘年歐陽公退老於家始出而示之歐陽公謝曰此吾昔者願見而不可得者也所著元豐類藁五十巻續元豐類藁四十巻外集十巻性嗜書家藏至二萬巻集古今篆刻為金石錄又五百巻出處必與之俱平生論事甚多與夫所下條教可以為世法者不可悉著公少事光祿家甚貧犇走四方以致養既孤奉太夫人孝鞠其四弟九妹友愛甚篤宦學婚嫁一出公力公既以文章名天下其弟牟宰布肇又繼中進士科布嘗任翰林學士肇以選為尚書吏部郎中與公同時在館閣世言名家者推曾氏公方遭時得君未及有為而不幸以歿士大夫為之相弔公之盛徳抑復有以遺於後乎嗚呼曾氏其顯矣銘曰曾氏在南三世有聞維祖維考始亨復屯畜厚潛深儒學之門迨公之興益顯於文奮躬力行道義之存公自布衣譽望四出既位於朝其剛不屈公久於外或留或徙誰其知之惟聖天子天子曰咨予惟汝賢典予史事五聖之傳公拜稽首臣敢不勉肈新有官左右慎選於時中書命令所在帝曰往哉予言汝代凡百執事分屬列職肅然盈庭俛聴訓敇靖共夙夜以出謀猷四方鼓舞天子之休昔蒧父子見稱仲尼淵源有來公則承之矧公親逢聖人之時帝察其忠從容睠睞赫然榮名受祉未艾奄以艱去計聞訃亟搢紳咨嗟相顧失色有存者言有遺者直惟兹之銘是謂不沒神道碑公姓曾氏諱鞏字子固其先魯人後世遷豫章因家江南其四世祖延鐸始為建昌軍南豐人曾祖諱仁旺贈尚書水部員外郎祖諱致堯尚書户部郎中直史館贈右諫議大夫考諱易占太常博士贈右銀青光祿大夫其履閲行實則有國史若墓銘在公生而警敏自幼讀書為文卓然有大過人者嘉祐二年登進士第調太平州司法參軍歲餘召編校史館書籍厯館閣校勘集賢校理兼判官告院又為英宗實錄院檢討官出通判越州屬歲饑公興積藏通有無老稺怡怡不出里閭鼓腹而嬉擢齊州齊俗悍强豪宗大姓抵冒僣濫其尤無良者羣行剽劫光火發塚吏不敢正視公屬民為伍謹譏察急追胥且捕且誘盗發輒得市無攫金室無穴坏貨委於塗犬不夜吠徙知襄州州有大獄久不决公一閲知其寃盡釋去一郡稱其神明又徙洪州歲大疫公儲藥物飲食所在授病者民以不夭死師出安南道江西者且萬人公陰計逆具師至如歸既去而市里有不知者進直龍圖閣知福州兼福建路兵馬鈐轄賜五品服時閩有大盗數干人朝廷赦其罪降之餘黨疑不順往往屯聚居人惴恐瀕海山林阻深椎埋剽盗依以為淵藪公以方畧禽獲募誘亡慮數百人增置巡邏水行陸宿坦如在郛郭召判太常寺未至改知明州有詔完州城公程工賦裁省費十六民不知役而城具數月徙亳州元豐三年知滄州道由京師召對神宗察公賢留勾當三班院數對便殿其所言皆安危大計天子嘉納之四年手詔中書門下曰曾鞏史學見稱士類宜典五朝史事遂以為史館修撰管勾編修院判太常寺兼禮儀事公入謝曰此大事非臣所敢獨當上諭以此特用卿之漸耳毋重辭五年大正官名擢拜中書舍人賜三品服時除授日數十百人公各舉其職以訓丁寧深厚學者以為復見三代遺風今天子為延安郡王其牋奏故事命翰林學士典之先帝特以屬公九月以母喪罷六年四月丙辰卒於江寧府年六十有五七年六月丁酉葬於南豐從周鄉之原頭勅在所給其喪事公剛毅直方外謹嚴而内和裕與人交不苟合朋友有不善必盡言其過有善必推揚其所長奬誘後進汲汲惟恐不逮其為政嚴而不擾必去民疾苦而與所欲者未嘗按劾官吏所蒞至於今思之天子且欲大用而公不幸死矣自大理寺丞五遷尚書度支員外郎換朝散郎勲累加輕車都尉母周氏豫章郡太夫人呉氏㑹稽郡太夫人朱氏遂寧郡太夫人元配晁氏光祿少卿宗恪之女繼室李氏司農少卿禹卿之女子男三人綰瀛州防禦推官知揚州大長縣事綜瀛州防禦推官知宿州蘄縣事綱右承務郎監常州税務二女蚤卒孫男六人悊怘愈􅘔怤憩悊假承務郎餘未仕孫女五人公生平無所好惟藏書至二萬巻皆手自讎定又集古今篆刻為金石錄五百巻出處必與之俱既沒集其遺藁為元豐類藁五十巻續元豐類藁四十巻外集十巻自唐衰天下之文變而不善者數百年歐陽文忠公始大正其體一復於雅其後公與王荆公介甫相繼而出為學者所宗於是大宋之文章炳然與漢唐侔盛矣初光祿公歸家甚貧公竭力以養温清㫖甘無一不如志者既孤奉太夫人如事光祿教養弟妹曲有恩意四弟牟宰布肇繼登進士第布肇以文學論議有聲當世九妹皆得其所歸嗟乎子固而但止於斯而壽止於斯然其所以自立者可以為不亡矣亦可以無憾矣銘曰猗嗟子固文與質生不勤其師幼則大成學富行茂其蓄弸弸發為文章一世大驚哲人既萎邪説嘷吠公不聴瑩徑前無閡砭廢藥瘍抉昏剔聵波濤沄沄東入於海姬淪劉亡文弊辭靡引商召羽偶六駢四組綉芬葩不見粉米公於其間鷹揚虎視發揮奥雅揀斥浮累巍然髙山為衆仰止栖遲掾曹翺翔書府如鷙之鶚如薪之楚出貳于越究問疾苦屬歲大歉稼荒于畆興積于民發藏于庾既助既補裹糧含哺或謌或呼謂公父母一麾出守六上郡計鎮張領目補葺刑弊庭不留訟獄無濫繫勞之來之鰥寡以遂公殿海服有命來覲帝曰汝賢母逺王室其代予言汝其輔弼五聖大典唯公紬繹百官正名唯公訓勅忠言嘉謀入則造膝公用不既公志不卒偉望廣譽如星如日石可磷兮公名不沒哀詞皇受命而熙洽兮實千祀而一時協氣欝而四塞兮與盛徳其俱升麟鳳出而旁午兮猶氤氲而扶輿篤生於公兮以文章為世師公神禹之苖裔兮肇子爵而酆封逮去邑而為氏兮季葉汨其南征祖騫翔而續著兮考踡跼而文鳴公既生而多艱兮踵祖武而好修既輕車又良御兮遂大放乎厥詞發天人之奥祕兮約六藝而成章元氣含而未泄兮洞芒芴而窅㝠挽天河而一㵼兮物應手而華昌揖揚馬使先路兮咸告公曰不敢被崔蔡之紛紛兮孰云窺其藩翰辰來遲兮而去速兮固前修以跋㚄方盤礴而上征兮遽相羊而補外皇揆公之忠誠兮即商墟而賜環紬史牒乎東觀兮裁誥命乎西垣典貢絶而復作兮世爭覩而快先正經緯乎終古兮配維斗而昭然變化詭而難常兮雖司命其或昧忽遭艱而去國兮遂銜哀而即世述作紛其具存兮悵爽靈之焉詣信百年纔斯須兮遒電㓕而歘逝天不憖遺一老兮固搢紳之所傷矧不肖以薄技兮早獲進於門牆路貫江而修阻兮曾莫奠乎酒漿悲填膺而茀欝兮聊自託於斯文挽詞早棄人間世真從地下㳺丘原無起日江漢有東流身世從違裏功名取次休不應須禮樂始作後程仇又精爽回長夜衣冠出廣庭勲庸留琬琰形像付丹青道喪餘篇翰人亡更典型侯芭才一足白首太𤣥經元豐類藳附録元豐類藁後序僕嘗讀舍人王公所著南豐先生文集序喜其有波濤煙雲三軍朝氣之語足以摹冩斯文之妙及觀紫陽夫子序公家譜甚恨世之知公者淺而後未敢以前言為可喜也公先世亦魯人常欲抽瓣香修桑梓敬而未能大徳壬寅春假守是邦既拜公墓又獲展拜祠下摩挲石刻知為魁樞干峯陳公名筆至品藻曾蘇二公文則獨以金精玉良許曾文之正信乎曾文定之文價至陳文定而後論定也公餘進學官諸生訪舊本謂前邑令黄斗齋嘗繡諸梓後以兵燬夫以先生文獻之邦而文竟無傳守烏得辭其責迺致書雲仍留畊公得所刻善本亟捐俸倡僚屬及寓公士友協力鳩工摹而新之踰年而後成其用心亦勤矣後必有汲汲於它不務者憫其勤而壽其傳斯無負雪樓先生品題云大徳甲辰良月東平丁思敬拜手書於卷尾
