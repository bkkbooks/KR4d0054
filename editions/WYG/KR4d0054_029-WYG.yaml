body:
  text: 元豐類藁巻二十九宋曽鞏撰䟽熈寧轉對䟽准御史䑓告報臣寮朝辭日具轉對臣愚淺薄恐言不足采然臣竊觀唐太宗即位之初延羣臣與圖天下之事而能絀封倫用魏鄭公之說所以成貞觀之治周世宗初即位亦延羣臣使陳當世之務而能知王樸之可用故顯徳之政亦獨能變五代之因循夫當衆說之馳騁而以獨見之言陳未形之得失此聴者之所難也然二君能辨之於羣衆之中而用之以收一時之效此後世之士所以常感知言之少而頌二君之明也今陛下始承天序亦詔羣臣使以次對然且將嵗餘未聞取一人得一言豈當世固乏人不足以當陛下之意與抑所以延問者特用累世之故事而不必求其實歟臣愚竊計殆進言者未有以當陛下之意也陛下明智大畧固將比跡於唐虞三代之盛如太宗世宗之所至恐不足以望陛下故臣之所言亦不敢効二臣之卑近伏惟陛下超然獨觀於世俗之表詳思臣言而擇其中則二君之明豈足道於後世而士之懐抱忠義者豈復感知言之少乎臣所言如左臣伏以陛下恭儉慈仁有能承祖宗一作宗廟之徳聰明睿知有能任天下之材即位以來早朝晏罷廣問兼聴有更制變俗比迹唐虞之志此非羣臣之所能及也然而所遇之時在天則有日食星變之異在地則有震動䧟裂水泉湧溢之災在人則有饑饉流亡訛言相驚之患三者皆非常之變也及一作又從而察今之天下則風俗日以薄惡紀綱日以弛壊百司庻務一切文具而巳内外之任則不足於人材公私之計則不足於食貨近則不能不以盗賊為慮逺則不能不以夷狄為憂海内智謀之士常恐天下之勢不得以乆安也以陛下之明而所遇之時如此陛下有更制變俗比迹唐虞之志則亦在正其本而巳矣易曰正其本萬事理臣以謂正其本者在陛下得之於心而已臣觀洪範所以和同天人之際使之無間而要其所以為始一作本者思也大學所以誠意正心脩身治其國家天下而要其所以為始者致其知也故臣以謂正其本者在得之於心而已得之於心者其術非他學焉而已矣此致其知所以為大學之道也古之聖人舜禹成湯文武未有不由學而成而傅說周公之輔其君未甞不勉之以學故孟子以謂學焉而後有為則湯以王齊桓公以覇皆不勞而能也盖學所以成人主之功徳如此誠能磨礱長飬至於有以自得則天下之事在於理者未有不能盡也能盡天下之理則天下之事物接於我者無以累其内天下之以言語接於我者無以蔽其外夫然則循理而巳矣邪情之所不能入也從善而已矣邪說之所不能亂也如是而用之以持乆資之以不息則積其小者必至於大積其微者必至於顯古之人自可欲之善而充之至於不可知之神自十五之學而積之至於從心之不踰矩豈他道哉由是而已矣故曰念終始典于學乂曰學然後知不足孔子亦曰吾學不厭盖如此者孔子之所不能巳也夫能使事物之接於我者不能累其内所以治内也言語之接於我者不能蔽其外所以應外也有以治内此所以成徳化也有以應外此所以成法度也徳化法度既成所以發育萬物而和同天人之際也自周衰以來道術不明為人君者莫知學先王之道以明其心為人臣者莫知引其君以及先王之道也一切苟簡溺於流俗末世之卑淺以先王之道為迂逺而難遵人主雖有聰明敏逹之質而無磨礱長飬之具至於不能有以自得則天下之事在於理者有所不能盡也不能盡天下之理則天下之以事物接於我者足以累其内天下之以言語接於我者足以蔽其外夫然故欲循理而邪情足以害之欲從善而邪說足以亂之如是而用之以持乆則愈甚無補行之以不息則不能見效其弊則至於邪情勝而正理㓕邪說長而正論消天下之所以不治而有至於亂者以是而已矣此周衰以來人主之所以可傳於後世者少也可傳於後世者若漢之文帝宣帝唐之太宗皆可謂有美質矣由其學不能逺而所知者陋故足以賢於近世之庸主矣若夫議唐虞三代之盛徳則彼烏足以云乎由其如此故自周衰以來千有餘年天下之言理者亦皆卑近淺陋以趨世主之所便而言先王之道者皆絀而不省故以孔子之聖孟子之賢而猶不遇也今去孔孟之時又逺矣臣之所言乃周衰以來千有餘年所謂迂逺而難遵者也然臣敢獻之於陛下者臣觀先王之所已試其言最近而非逺其用最要而非迂故不敢不以告者此臣所以事陛下區區之志也伏惟陛下有自然之聖質而漸漬於道義之日又不為不乆然臣以一作所謂陛下有更制變俗比迹唐虞之志則在得之於心得之於心則在學焉而已者臣愚以謂陛下宜觀洪範大學之所陳知治道之所本不在於他觀傅說周公之所戒一作勉知學者非明主之所宜巳也陛下有更制變俗比迹唐虞之志則當懇誠惻懼以講明舊學而推廣之務當於道徳之體要不取乎口耳之小知不急乎朝夕之近効復之熟之使聖心之所存從容於自得之地則萬事之在於理者未有不能盡也能盡萬事之理則内不累於天下之物外不累一作蔽於天下之言然後明先王之道而行之邪情之所不能入也合天下之正論而用之邪說之所不能亂也如是而用之以持久資之以不息則雖細必鉅雖微必顯以陛下之聰明而充之以至於不可知之神以陛下之睿知而積之以至於從心所欲之不踰矩夫豈逺哉顧勉强如何耳夫然故内成徳化外成法度以發育萬物而和同天人之際甚易也若夫移風俗之薄惡振綱紀之弛壊變百司庶務之文具屬天下之士使稱其位理天下之財使贍其用近者使之親附逺者使之服從海内之勢使之常安則惟陛下之所欲何求而不得何為而不成乎未有若是而福應不臻而變異不消者也如聖心之所存未及於此内未能無秋毫之累外未能無纎芥之蔽則臣恐欲法先王之政而智慮有所未審欲用天下之智謀材諝之士而議論有所未一於國家天下愈甚無補而風俗綱紀愈以衰壊也非獨如此自古所以安危治亂之幾未甞不出於此臣幸䝉降問言天下之細務而無益於得失之數者非臣所以事陛下區區之志也輒不自知其固陋而敢言國家之大體惟陛下審察而擇其宜天下幸甚劄子自福州召判太常寺上殿劄子改明州不果上伏以陛下聰明睿知天性自然可謂有不世出之姿自在藩邸入承顔色出奉朝請怡怡翼翼不自暇豫至恭極孝聞於天下及踐大位内事兩宫外嚴七廟仁被公族徳形閨門嬪御備官不滛於色音樂備數不溺於聲食菲衣綈務遵節儉䑓卑囿小無所増餙近習無便嬖左右無私謁未甞出逰幸未甞從畋漁其於憂憫元元勤勞庶政則念慮先於兆朕祗慎盡於纎芥晝而訪問至於日昃夕而省覽至於夜分每羣臣進見接之禮篤而情通凢四方奏事莫不朝入而暮報雖大禹之勤于邦文王之不暇食無以加此其淵謀逺畧必中事幾善訓嘉謨可為世則者傳聞下土雖僅得其一二已足以度越衆慮非可闚測可謂有君人之大徳其高深宏逺則憫自晩周秦漢以來世主不能獨出於衆人之表其政治所出大抵踵襲卑陋因於世俗而已於是慨然以上追唐虞三代荒絶之迹修列先王法度之政為其任在已可謂有出於數千載之大志變革因循號令必信使海内觀聴莫不震動羣下遵職惟恐在後可謂有能行之效盖刻意尚行不差毫髪縉紳之士有所不能及憂勞惕勵無懈湏臾又非羣臣之所能望可謂持起於三代之後非常之主也愚臣孤陋熈寧二年出通判越州因轉對幸得論事敢據經之說以誠意正心修身治國家天下之道必本於學為獻逮今十有一年始得望穆穆之清光敢別白前說而終之臣以謂陛下有不世出之姿有君人之大徳與出於數千載之大志又有能行之效特起於三代之後然顧以治國家天下之道必本於學為獻於陛下何也盖古之聖人雖出乎其類㧞乎其萃然至其成徳莫不由學故堯舜性之也而見於傳記則皆有師其史官識其行事則皆曰若稽古至於湯武身之也則湯學於伊尹武王學於太公見於詩禮孟子在商高宗得傅說作相其命說之辭曰予小子舊學於甘盤而傅說告之則曰學于古訓乃有獲又曰惟學遜志務時敏厥修乃來又曰惟斆學半念終始典于學盖高宗既巳學于甘盤矣及傅說相之乃更丁寧反復勉之以學其要歸則以謂當終始常念於學明學盖不可一日而廢也至於孔子之自敘則自十有五而志於學至於七十而從心所欲不踰矩夫以孔子之聖必至於學其學之漸每十年而一進至於七十矣其從心也盖不踰矩則傅說所稱當始終常念於學者雖孔子之聖不能易也故楊子曰學之為王者事乆矣堯舜禹湯文武汲汲仲尼皇皇其巳久矣聖賢之篤於學至於如此者盖樂而不亂復而不厭者道也測之而益深窮之而益逺者聖人之言也知不足與困者學也方其始也求之貴愽畜之貴多及其得之則於言也在知其要於徳也在知其奥能至於是矣則求之愽畜之多者乃筌蹄而巳所謂多聞則守之以約多見則守之以卓也如求之不愽畜之不多則未有於言也能知其要未有於徳也能知其奥所謂寡聞則無約寡見則無卓也子貢稱孔子之學識其逺者大者則於言也能知其要於徳也能知其奥然後能當於孔子之所謂學也審能是則存於心者有以為主於内天下之事雖其變無窮而吾所以待之者其應無方古之大有為於天下者未有不出於此也堯舜湯武所以為盛徳之至孔子所以從心而不踰矩者或得其行者未得其所以行得其言者未得其所以言孟子之所謂聖而不可知之謂神在是而已矣陛下萬幾之餘日引天下之士推原道徳而講明其意陳六藝載籍之文而細繹其說慱考深思無有懈倦其折𠂻是非獨見之明老師宿儒所不能到此臣之所聞也有不世出之姿與君人之大徳又有出於數千載之大志特起於三代之後此臣之所知也則陛下之學巳可謂至矣然臣區區敢誦經之陳言以進於左右者誠將順陛下之聖志采傅說始終典學之言觀孔子少長進學之漸以陛下之明智知言之要知徳之奥皆陛下之所素畜誠以陛下之樂道而繼之以不倦以陛下之稽古而加之以不已使天性之睿智所造者益深所積者益厚日日新又日新其於自得之者非徒足以待萬事無窮之變而應之以無方天下之人必將得陛下之行者不得其所以行得陛下之言者不得其所以言堯舜湯武所以為盛徳之至孔子所以從心而不踰矩孟子所謂聖而不可知之謂神不在於陛下而孰在哉繇是歛五福之慶以大賚庶民享萬年之休以永綏方夏徳厚於天地名昭於日月惟聖意之所在而巳臣愚不敏䝉恩賜對不敢毛舉藂細之常務而於國家之體冐言其逺且大者此臣所以愛君區區之分也伏惟留神省察元豐類藁卷二十九
