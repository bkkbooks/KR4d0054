body:
  text: 元豐類藁巻四十九宋曾鞏撰本朝政要策考課建隆初始以户口增耗為州縣吏歳課之升降興國初又定三等之法以覈能否其後遂詔郭贄滕正中雷徳驤典其事雍熙間上嘗閲班簿欲擇用人而患不能徧知羣下之材始詔徳驤以羣臣功過之迹引與俱對淳化中又分京朝官考課使王沔主之幕職州縣官考課使張宏主之三班考課使魏廷式主之沔既奏其法於是御史弋子元郎吏張紳皆以負黜焉然沔之法亦以煩碎無待士君子之體物議非之久之復嚴京朝官考課而置審官院以錢若水主之廢州縣官考課歸之流内銓以蘇易簡主之唯三班無所改易其後天子又嘗欲自宰相修唐制書考之事既而但欲責其稱職遂不行焉然親書課最之意二十餘幅以賜若水等蓋其丁寧之意如此焉訓兵古者四時田獵以習武事孔子譏不教民戰者周禮司馬軍旅之政詳矣戰國至於漢唐兵法尤具焉自府衞廢而執兵者皆市人故有天寳之敗以至晉漢兵雖數十萬而皆不素習士居閒暇則自為生業將乘勢重則取其課直至周世宗髙平之退遂收驍勇之士命太祖習焉取其尤者為殿前軍而禁衞之精自此始也宋興益精其法壯鋭者升其軍籍老懦者黜而去之以至太宗真宗屢自臨試而蒐擇故興國有楊村之閲咸平有東武之蒐軍旅之盛近世無比焉然自此兵益以廣議者以動衆為疑而簡練之綱遂踈黜廢之法益恕矣雖天子丁寧欲捄其敝而羣臣莫能本其意焉添兵唐罷府兵始置神武䇿為禁兵不過三數萬人以備天子扈從藩衞而已故祿山之叛驅市人以戰賊徳宗䝉塵扈駕者四百餘騎甲兵皆散在郡國自河朔三鎮不統於京師餘可舉者太原青杜各十萬人邠寧寧武各六萬人潞徐荆揚各五萬人襄宣壽鎮海各二萬人而觀察團練據要害之地者亦各不下萬人五代之際四方割裂以區區中州之地晉漢之兵嘗至於數十萬人養之既廢教與用之又皆不得其理周世宗髙平之退中國兵制始修列焉宋興太祖鑒前世之敝益修教習之法始黜老懦之兵至於邊鄙務在擇用將帥以折衝一方之難故姚内斌領慶州董遵誨領環州二人所領之兵纔五六千而已當是之時舉中國之兵纔十六萬人平五强國不知兵之少也至太宗伐劉繼元駕前之兵盖十餘萬兵之稍稍益廣自是矣其後曹彬之敗祁溝闗也在行之兵實二十萬既而楊業敗於陳家谷口劉廷讓敗於君子館全軍歿焉士卒前後戰死沿邊瘡痍之兵不滿萬計皆無鬭志河朔振摇悉科鄉民為兵以守城咸平之間又集近京諸州丁壯以為兵而西北邊臣猶請益兵不已張齊賢請調江淮丁壯八萬以益西師天子憂之謂吕䝉正曰方事之警急衞兵亦可抽減其如衞兵數亦不足䝉正復請取河南丁壯以益兵天子難其言然不得已而卒聴焉其後又請濟師不已遂令劉承珪取環慶諸州之兵升為禁兵號振武軍以益焉自此募兵之法益廣矣天子延見近臣屢歎兵數之倍而思太祖之法有減兵之意嘗曰雖議者恐其動衆亦當斷在必行然羣臣莫能承上意兵器百工之事皆聖人為而其於兵械尤重弓矢之取諸聧始見於經至於周官考工所陳五兵之法可謂詳矣漢興言兵者十三家其要皆以便手足利器械立攻守之勝語曰器不堅利與徒摶同是兵械之不可不修也宋興太祖將平定四方命魏丕主作責以稱職每造兵器十日一進謂之旬課上親閲之作治之巧盡矣國公署有南北作坊歳造甲鎧具裝鎗劔刀鋸器械箭箶簏皮笠弩撞床子弩凡三萬二千又有弓弩院歳造弓弩箭弦鏃等凡千六百五十餘萬諸州歳造弓弩箭劒甲兠鍪甲葉箭鏃等凡六百二十餘萬又别造諸兵幕甲袋征鼓炮炒鍋䥷行槽鍬钁鎌斧等謂之什器凡諸兵械置五庫以貯之戎具精勁近古未有焉景徳中以歳造之器可支三二十年而創作不已天子念勞費之宜省也因遣内都知秦翰閲武庫所聚令給用有餘諸作治以權宜罷焉城壘周世宗時韓通築城於李晏口凡立十二縣又築束鹿增鼓城葺祁州數年又自浮陽至乾寜補壊防開游口三十六遂通瀛莫宋興王全斌葺鎮州西山堡障劉遇築保州威虜靜戎平塞長城等五城太宗既平太原以潘美守之隳舊州遷於榆次又命美鎮三交三交在西北二百里地號故軍溪谷險絶為戎人之咽喉多由此入冦美帥師襲之偽軍使安慶以城降因積粟屯兵以守之久之遷并州於三交以美為帥焉宗廟堯舜禹皆立三昭三穆與始祖之廟而五商人祀湯與契及昭穆之廟而六周人祀后稷文武及親廟而七漢初立廟不合古制至晉采周官定七廟之數而虚太祖之室隋興但立髙曾祖禰四廟而已唐初因其制正觀立七廟天寳祠九室梁氏以來皆立四廟宋興采張昭任徹之議追尊僖順翼宣四祖而立其廟用近制也蓋自禰至於髙祖親親之恩盡矣故有四廟之制前世祖有功宗有徳不可預為其數故有五廟六廟七廟之禮先儒以謂有其人則七無其人則五此古今之文損益之數昭昭可考者也邊糴建隆元年以河北仍歳豐稔榖賤命髙其價以糴之常平倉淳化二年詔置常平倉命當本官領之歲熟增價以糴歳歉減價以糶用賑貧民復舊制也偵探淳化中柴禹錫趙瑢掌機務潛遣吏卒變服偵事卒王遂與賣書人韓玉有不平誣玉有惡言禹錫等以狀聞上怒誅玉京人皆寃之自是亷得他事上不復聴至道中又有趙贊性險詖㨗給專伺中書樞密及三司事乘間言於上上以為忠無他膓中外畏其口既而天子覺悟卒誅贊焉貢舉貢舉之制建隆初始禁謝恩於私室開寳三年召進士安守亮等三十八人對於講武殿下詔賜其第六年又召宋準等覆試於講武殿殿試自此始也自隋大業中始設進士科至唐以來尤盛歲取不過三十人咸亨上元中增至七八十尋亦復故開成中連歲取四十人又復舊制進士外以經中科者亦不過百人至太宗即位興國二年以郡縣闕官浹旬之間拔士幾五百以補闕員而賑滯淹又未命官而賜之綠袍靴笏使解褐焉八年進士萬二百六十人淳化二年萬七千三百人始命知貢舉蘇易簡等受詔即赴貢院不更至私第以防請託至殿試又為糊名之制軍賞罰天寳之後將之廢置出於軍則軍之驕可知也五代之際國之興亡出於軍則軍之驕又可知也及周世宗奮然獨見誅敗撓之將而軍之約束始修太祖之為將也每有臨陣逗撓不用命者必斫其皮笠以誌之明日悉斬以狥自是人皆死戰及太祖受天命謂征蜀諸將曰所破郡縣當傾帑藏為朕賞戰士國家所取惟在土疆爾故人皆用命所至成功如席巻之易蜀既平擇其親兵得百二十人𨽻殿前司謂之川班殿直廩賜優給與御馬直等其後郊祀優賞太祖特詔賞御馬直更增五千而川班殿直以不在此例擊登聞鼓訴之太祖怒立命中使執歸本營各杖二十明日盡戮於營中餘八十人配諸州遂廢其班初太祖嘗問唐莊宗享國不久何也飛龍使李重進對曰莊宗好畋而將士驕縱姑息每出近郊衞士必控馬首曰兒郎輩寒必望勅賜莊宗即隨所欲給之如此者非一末年之禍蓋令不行而賞賚無節也太祖撫手嘆曰二十年夾河爭取天下而不能以軍法約束此輩縱其無厭之求誠為兒戲我今養士卒固不恡爵賞但犯法者惟有劒耳及聞川班殿直之訴使中使謂之曰朕之所與便為恩澤又焉有例故盡誅之世宗太祖之馭軍賞罰如此故世宗取淮南闗南之地太祖平五强國如拾地芥由是觀之軍無驕否惟所馭之術何如若太祖之智可謂神矣雅樂周世宗患雅樂陵替得王朴竇儼考正之宋興儼定文舞為文徳之舞武舞為武功之舞大朝㑹用之又定十一曲名以為祭祀㑹朝出入之節焉朴儼所考正有未備者和峴繼成之然裁減舊樂乃太祖之聖意章聖用隨月之律主上新皇祐之制雅樂備焉佛教建隆初詔佛寺已廢於顯徳中不得復興開寳中令僧尼百人許歲度一人至道初又令三百人歲度一人以誦經五百紙為合格先是泉州奏僧尼未度者四千人已度者萬數天子驚駭遂下詔曰古者一夫耕三人食尚有受餒者今一夫耕十人食天下安得不重困水旱安得無轉死之民東南之俗游惰不職者跨村連邑去而為僧朕甚嫉焉故立此制史官天子動則左史書之春秋是也言則右史書之尚書是也漢武帝有禁中起居注魏晉歸之著作其後亦命近臣典其事後魏始置起居令史行幸宴㑹則在御座前記君臣酬答之語又别置起居注二人北齊有起居省隋置起居舍人二人以掌内史唐起居之官𨽻於門下顯慶中郎與舍人分𨽻兩省每天子御殿則左右夾香案分立殿下螭頭之側和墨濡翰皆就螭頭之坳處有命則臨陛俯聴對而書之典禮文物册命起奏羣臣薨免懲勸之事悉載於起居注季冬終則送於史官長壽中姚璹以為帝王謨訓不可使無紀述若不宣自宰相史官無由而書請仗下所言軍國政要命宰相一人專知撰錄季終付於史官即今之時政記也元和十二年又委承㫖宰相宣示左右起居注令其綴錄大和九年詔郎舍人准故事入閣日齎紙筆立於螭頭以記言動故文宗實錄為備焉至後唐明宗亦命端明殿學士樞密直學士修日厯世宗用陶穀之言修明宗之制開寳中扈䝉為修撰以謂内庭日厯樞密院抄錄送史官所記者不過對見辭謝而已蓋宰相虞漏洩而史官限疎逺故莫得而具也請言動可書者委宰相參政月錄以送史官使修日厯遂以參知政事盧多遜專其事興國中詔書病史氏之漏落又以參知政事李昉專其任而樞密院亦令副使一人專知纂述昉請每月先以奏御乃送史官時政記之奏御自昉始也淳化之間從張佖之請始置起居院修左右史之職以梁周翰掌起居郎事李宗諤掌舍人事焉周翰宗諤言崇徳殿長春殿宣諭論列之事時政記記之樞密院事闗機密本院記之餘百司封拜除改沿革制撰之事請悉使條送以備論撰月終皆送史官從之又令郎舍人分直崇政殿記言動别為起居注每月先以奏御起居注奏御自周翰宗諤始也正量衡建隆初頒量衡於天下淳化中以太府之式不足以合信取平守藏吏縁為奸天下歲輸者至於破産以萬數守者更代動必數歲計爭於是天子詔有司使為新法劉承珪劉䝉言權衡之法起於黍十黍為系十系為銖四十銖為兩度之法起於忽十忽為絲十絲為毫十毫為釐十釐為分為一絫四絫以開元通寳錢肉好周均者校之十分為錢十錢為兩自分釐毫絲忽轉轉十倍增之凡一錢為十萬忽因取毫髪計之皆有準自一錢至半錢為衡以較之得錢二千四百輕重等者為十五斤可施用并以絲忽毫釐銖累之準奏御詔三司較之以御書淳化三體錢二千四百磨令與開元通寳錢輕重等定其法為新式頒之天下權衡之法得焉户口版圖太祖元年有州一百一十一縣六百三十户九十六萬七千三百五十三末年州二百九十七縣一千八百六户二百五十萬八千九百六十五興國初有上言事以閏為限三歲一令天下貢地圖與版籍上尚書省所以周知地理之險易户口之衆寡至道初又令更造天下州縣户口之版籍焉任將太祖之置將也隆之以恩厚之以誠富之以財小其名而崇其勢略其細而求其大久其官而責其成每朝必命坐賜與優厚撫而遣之嘗令為郭進治第悉用􅝕瓦有司言非親王公主不得用之上曰郭進控㧖西山十餘年使我無北顧憂我視進豈減兒女耶趣作無復言此可謂隆之以恩矣取董遵誨於仇讎取姚内斌於俘虜皆用之不惑郭進在西山嘗有軍校訟其不法上曰進馭下嚴是必罪人懼進法欲誣進以自免也使中人執以賜進令詰而殺之此可謂厚之以誠矣西北邊軍市之租多賜諸將不問出入往往賞賚又輒以千萬李漢超守闗南屬州錢七八萬貫悉以給與又加賜賚漢超猶私販榷場規免商算有以事聞者上即詔漢超私物所在悉免闗征故邊將皆養士足以得死力用間足以得敵情以居則安以動則勝此可謂富之以財矣李漢超郭進皆終於觀察使所居不過巡檢使之名終不以大將處之然皆得以便宜從事郭進在西山上每遣戍卒又諭之曰汝等謹奉法我猶赦汝郭進殺汝矣其假借如此故郭進所至兵未嘗少衂此可謂小其名而崇其勢矣王彦昇之好勇馮繼業之自伐然用彦昇守原州繼業守靈州皆邊境以安此可謂略其小而求其大矣何繼筠屯棣州二十餘年董遵誨屯通逺軍四十年其餘皆不減十餘年邊境賴之此可謂久其官而責其成矣夫寵之以非常之恩則其感深待之以赤心則其志固養之以關市之租則其力足小其名而不撓其權則在位者有赴功之心而勇智者得以騁略其過則材能進久其任則功利悉自古用將之術不易於是太祖兼用之故以李漢超屯闗南馬仁瑀守瀛州韓令坤鎮常山賀惟忠守易州何繼筠領棣州以防北邊郭進控西山武守琪戍晉州李謙溥守隰州李繼勲鎮昭義以禦太原趙贊屯延州姚内斌守慶州董遵誨屯環州王彦昇守原州馮繼業守靈武以備西戎如姚内斌董遵誨之徒所領不過五六千人而威名皆行乎戎狄當此之時建隆元年六月誅李重進收潞州十一月誅李筠收揚州四年收湖南北六年收蜀十三年收南越十七年定江表之地内則呉越閩海歲奉貢職外則交州丁璉髙麗王伷請吏嚮化而契丹修好之使數至於闕廷拱挹指麾而天下一定不知封疆之憂蓋太祖用將之術如此故養士少而蓄力多操術簡而收功博也水災周世宗嘗使竇儼論水沴所興儼以謂陰陽者水火之本陰之主始於淵獻水之行紀於九六凡千七百二十有八歲為浩浩之㑹當此之時雖有周唐之君不能弭其患者數也若至於后辟狂妄以自率權臣昧冒以下專政不明賢不章則苦雨數至潦水厚積徳宗壬申之水者政也漢以來言災異者亦然然則誠古今之通論宋興常雨之沴間輙有之然未嘗有百川沸騰黎民昏墊之患也而太祖開寳之間常以霖雨之憂出後宫以銷幽閉之感太宗淳化之歲嘗自七月至九月雨不止崇明門外皆浮甖栰以濟壁壘廬舍多壞人多壓死物價踴貴秋歛用微於是流移者衆而陳潁宋亳之間盜亦稍稍而起太宗加給復之恩賜糜淖之餉以救其變此祖宗所以懼天災圖政務之遺事也汴水昔禹於滎澤下分大河為陰溝出之淮泗至浚儀西北復分二渠其後或曰鴻溝始皇疏之以灌魏郡者是也或曰浪宕渠自滎陽五池口來注鴻溝者是也或曰浚儀渠漢明帝時循河流故瀆作渠渠成流注浚儀者是也或曰石門渠靈帝時於敖城西北累石為門以遏渠口者是也石門渠東合濟水與河渠東注至敖山之北而兼汴水又東至滎陽之北而旃然之水東流入汴滎陽之西有廣武二城汴水自二城間小間中東流而入濟水至此乃絶桓温將通之而不果者晉大和之中也劉裕浚之始有湍流奔注而岸善潰塞裕更疏鑿以漕運者義熙之間也皇甫誼發河南丁夫百萬開之起滎澤入淮千有餘里更名之曰通濟渠者隋大業之初也裴耀卿有江南租船自淮而北泝鴻溝轉相輸納於河陰含嘉太原等倉凡三年運米七百萬石者唐開元之際也後世因其利焉太宗嘗命張洎論著其興鑿漕運之本末如此宋至道之間也刑法太祖始用士人治州郡之獄太祖即位尤重用典刑哀矜之詔歲輙有之刑部設詳覆之員諸路命糾察之使至於淳化又置審刑院於禁中防大理刑部之失凡具獄先上二司然後闗報審刑事從中覆然後下丞相府又以聞始命論蓋其重慎之備如此焉管榷太祖知百姓疾苦五代之政欲與之休息故詔書屢下弛鹽禁於河北實鹽價於海濵有司嘗欲重新茶之估以出於民上曰是不重困吾人耶遂置其議既平五强國收天下之地未嘗不去其煩苛與百姓更始焉故民始得更生於水火之中當是之時靡敝少而用約也自時以來兵簿既衆他費稍稍亦滋錮利之法始急於是言礬課則劉熙古深茶禁則樊若水峻酒榷則程能變鹽令則楊允恭各騁其意從而助之者寖廣自此山海之人征榷之算古禁之尚疏者皆密焉猶不能以為足也厯察天時以授民事則厯象不可不謹也唐虞以來尚矣唐髙祖有戊寅之厯髙宗有麟徳之厯中宗有景龍之厯明皇有大衍之厯肅宗有至徳之厯代宗有五紀之厯徳宗有正元之厯憲宗有觀象之厯穆宗有宣明之厯昭愍有崇元之厯自時以後至於梁唐日官之任缺焉晉髙祖始用趙仁錡有調元之厯周世宗用王朴有欽天之厯當朴之成厯也王處訥謂之曰此厯可且行久則差矣既而果然宋興命處訥正之於是有應天之厯久之又差而苗守信等承詔論定於是有乾元之厯至道淳化之間王睿鄭昭晏之徒屢校其疎密而日官韓顯符始定渾儀之器楊文溢增用甲子之數皆施行焉錢幣興國初絀江南鐵錢鑄農器以給流民而於江東之地始鑄銅錢民便之自樊若水始其後以鉛錫雜鑄雖歲增數倍而錢始麤惡自張齊賢始淳化之間趙安易請鑄大錢行於蜀自大臣皆以為不可而安易之辨不可屈既鑄非便天子卒斷而罷之焉宦者淳化中改黄門院為内侍省而置昭宣使以王延徳王繼恩杜彦鈞處之繼恩收蜀有功宰相欲以為宣徽使天子以為宦官不可令預政事切責宰相而置宣政使以命繼恩其後張洎居翰林請以藍敏正為學士裴愈副之上曰此亂政朕方復古道安得踵此覆轍邪洎慙而退蓋祖宗之明理亂慎威福之漸如此焉學校宋興承五代之亂建隆初嘗命崔頌教國子始聚生徒講學天子使使者臨賜酒果以寵厲學者淳化中上始視學命孫奭講説命之篇天子嗟異久之名教唐氏五代之亂教化之事久缺雍熙初始勅羣臣用通喪之制至道之間近臣有不能養者上為賜錢使迎其母而使者亦言蜀人有事於中州其父家居不能自存者天子驚嘆於是詔書遂下稱人子之義以風曉切責而使執法舉不能養者定著於令焉銓選建隆初定考判之制著循資之格䄍祭博士和峴言䄍始伊耆而三代有嘉平清祀䄍祭之名䄍臘之别名也漢乘火徳以戌日為臘臘接也言新故相接故田獵取禽以報百神享宗廟旁及五祀以致孝盡䖍晉魏同之唐以土王正觀之際尚用前寅䄍百神夘日祭社宫辰日臘宗廟至開元始定禮制三祭皆於臘辰以應土徳議者是之宋興推應火行以戍日為臘而獨以前七日辛夘䄍不應於禮請如開元故事䄍百神祀社稷享宗廟同用戍臘如禮便制曰可感生帝乾徳初用博士聶崇義之言以赤帝為感生毎歲正月祠用壇其後又以正月上辛祀昊天上帝五帝皆從祀與感生帝祭同日既瀆且從祀禮殺失所以致崇極意自此感生帝始别祭不從祀昊天西京郊配太祖開寳元年幸河南定圓丘之位以四月郊祀上帝將行躬告於太廟既行不載主焉祠太一興國中兆太一於城南用學士張齊賢春官正楚芝蘭領祠事齊賢等以為太一者五帝之佐天之貴神祠宜半祀天之禮又小損之天子使加伶官百人自昏祠至明如漢制焉郊配太祖已尊四祖之廟郊祀以宣祖配天宗祀以翼祖配帝及太宗繼大統禮官以為王業所興自太祖始故興國之初天子再郊皆太祖配天及欲封泰山扈䝉建白以謂嚴父莫大於配天宜以宣祖配天太祖配帝其後封禪之禮輟而雍熙之郊遂用䝉議學者病之至淳化之春合祭天地於圜丘遂以宣祖太祖同配如永徽故事自此孟春祈穀孟冬祀神州季秋大響明堂用宣祖配冬至祀昊天夏至祀皇地祇孟夏雩祀用太祖配如永泰之禮皆禮儀使蘇易簡所定焉賦税周世宗嘗患賦税之不均詔長吏重定潁州刺史王祚躬行部縣均其輕重補流民逋賦以萬數增其舊籍百姓詣闕稱頌焉三司鹽鐵户部度支凡二十四案吏千餘人乾徳定考課之法興國增判官之員淳化之間或專置一使或離為二司已又復之為三而副貳官屬之損益視焉天子嘗召見其吏李浦等問利害之理浦等言七十餘事多見聴納於是三司使陳恕等皆以不勝任見讓而浦遂試用顯於世焉俸祿太祖哀憐元元之困而患吏之煩擾欲髙吏之行以便民於是定俸户之制修益俸之令太祖猶以為煩民也於是出庫財以賦吏祿詔書屢出欲吏之有餘而無内顧之憂然後於義徳備焉蓋其任人之知所先後如此南蠻南蠻於四夷為類最微然動輙一方受其患至覆軍殺將與夫轉餉煩敝之久也則他盜亦縁而有大中咸通之間安南之蠻是也故為政者不得不戒焉宋興嘗設廣捷之兵習摽牌之器其後又益澄海之師皆以備蠻之為疆場害也蓋及其輙動而我之所以威附之術可得而談者有用兵深入伐而克之興國之初翟守素之平梅峒是也有兵已克破赦而受之咸平之間曹克明之收撫水是也有計能屈之納以恩信章聖之世謝徳權之靖宜州是也蓋兵不足以克則赦不能以來計不足以屈則信不能以收此古今之通理而智謀者之所易覩也今溪洞往往為東南之憂而議者不謀威略一欲懷之以利是見其一未見其二也折中倉折中之法聴商人入粟而趨江淮受茶鹽之給公私便之或以為敝濫既廢而歳失百萬之入端拱初復置以歲旱而止淳化中遂復之𣙜易宋興既收南越之地而交阯奉貢職海外之國亦通闗市犀象珠璣百貨之産皆入於中國府庫既充有司遂言宜出於民始置𣙜易之場嵗收其直數十萬貫自此有加焉左藏興國初左藏之財既充斥始分為三錢與金帛皆别藏典守者亦各異焉賊盜宋興既斂兵於内盜賊輒發而州郡無武備急則吏走匿自存天子常薄吏罪而言事者以為適然故盜起輒轉刼數百千里非天子自出兵往往不能格愚固異焉及覽近世之迹若宋璫守益州張雍守梓州秦傅序守開州何邴守象州皆以區區一城抗賊之鋒不為不義屈於是知天子待吏盡恕道矣而吏之走匿自存者何其不自力也漕運宋興承周制置集津之運轉闗中之粟以給大梁故用侯贊典其任而三十年間縣官之用無不足及收東南之地興國初始漕江淮粟四五百萬石至汴至道間楊允恭漕六百萬石自此歲增廣焉文館三館之設盛於開元之世而衰於唐室之壞五代髙武力雖存西館之署而法度卑矣宋興太祖急於經營收天下之地其於文儒之事稍集然未能備也太宗始度升龍之右設署於禁中收舊府圖籍與呉蜀之書分六庫以藏之又重亡書之購而閭巷山林之藏稍稍益出天下圖書始復聚而縉紳之學彬彬矣悉擇當世聰明魁礨之材處之其中食於大官謂之學士其義非獨使之尋文字窺筆墨也蓋將以觀天下之材而備大臣之選此天子所以發徳音留聖意也屯田自漢昭始田張掖趙充國耕金城曹操以區區之魏力農許下晉用鄧艾田壽春羊祜田襄陽杜預田荆州荀羨田東陽隋耕朔方之地而唐起屯振武皆内益蓄積外有守禦之利故能服夷狄兼隣國或定南面之業焉宋興當雍熙之間契丹屢為邊害天子念守兵歲廣而趙魏失寧廢耕桑之務於是方田之法自此始是後開易水疏雞距修鮑河之吏邊屯以次立矣然中國一統内輯百萬之師議者以為豈晏然不知兵農兼務哉天子乃遣議臣東出宿亳至壽春西出許潁轉陳蔡之間至襄鄧得田可治者二十二萬頃欲修耕屯之業度其功用矣天子之意嚮之而任事者破壞其計故功不立水利自史起溉鄴田鄭國鑿涇水李冰以區區之蜀修二江之利漢興文翁穿煎㳛鄭當時引渭莊熊引洛兒寛奏鑿六輔渠而白公注涇渭邵信臣廣鉗盧之浸自是後王景理芍陂馬臻築鑑湖至晉杜預疏荆兖之水張闓理曲阿之塘宋人引渒魏人引河唐疏雷陂築句城除堰遏之害皆代天施長地力衣食元元而足公家之費故三代溝澮之法替而赴時務功此不可不重也聖宋當雍熙之間以下並同屯田篇但改欲修耕屯之業作水之浸灌者舊迹皆可理黄河一作旅河河自西出而南又東折然後北注於海當禹之行水功之所施者最多自大伾而北既釃為二至大陸又播為九然後為逆河以與海屬非屢散裂而順導之莫能為功蓋其難如此故厯三代千有餘年無河患者以禹故迹未嘗變也至周定王之時禹迹遂改故河之為敗自此始自是之後言治河者尤衆有欲索故迹而穿之許商解光之説是也有欲出之胡中齊人延年之説是也有以為天事可勿理者田蚡谷永之説是也有以為宜空水衝以縱其決穿漕渠以通其勢者闗並賈讓之説是也有以為宜弛灌溉之防使水得自行者張戒之説是也有以為宜徙之寛平者王横之説是也有以為宜計為隄防又以為隄防非古義者王延平當之説是也凡此數者各乖異總之隄防之起自戰國西漢以來築作者輒復敗故務壅塞居水者最闇於用而復二渠則水之害去絶屯氏之河則害作故言河宜散裂倣於禹迹是當盛宋之隆河數為敗興國之間房材之決為甚當此之時勞十萬之衆然後復理天子為賦詩比瓠子之歌屬者雖有商胡之憂非曩時比也然天子大臣講求利害之理勤矣愚既以為隄防壅塞闇於用倣禹之迹為可然水之為迹難明久矣非深考博通心知其詳固難以臆見決䇿舉事也宜博求能疏川浚河者與之慮定然後施功則可以下安元元上追禹績矣邊防周世宗之時築李晏口立縣十二又築束鹿增鼓城葺祁州遂自浮陽至乾寧之塞補壞防開㳺口三十有六瀛莫以通作治之功自韓通宋興葺鎮州西山保障自王全斌而築保州威虜靜戎平塞長城寨自劉遇太宗既平晉隳舊州遷之榆次又遷三交奪故軍之險而守之得邉人咽喉之地自潘美平糴使歲穰穀不賤出歲㓙民不病食故平糴之令自此始李悝修之魏以富彊漢興耿壽昌開常平之法以至晉齊不能廢後魏定和糴之制北齊築富人之倉隋人置監唐人置東西市之糴雖號名殊其為法一也當盛宋建隆之間始因河内之稔修邊糴之事至淳化而天下之糴復大備義倉使歲穰輸其餘歲㓙受而食之故義倉之法自此始長孫平修之隋以富足唐用戴胄之言而復定著令髙宗又開雜用之禁神龍之後綱理疏濶而義倉遂廢殆盡至開元自王公以下至於庶人皆有入故義倉之實至六千萬以上自是後而衰宋興乾徳之初天子哀歲不登而倉吏不以時出與民於是著發粟之制使不待詔令其後又病吏之煩擾而民罹輸轉之困又罷之至今上而舊制復行茶唐正元初趙贊興茶税而張滂繼之什取其一以助軍費長慶初王播又增其數大中中裴休立十二條之利宋興茶鹽之法屢有變易而茶法幾至大壞景徳中嘗乘邊備之急而倉卒變法髙塞下入粟之虚直易江淮茗荈之實其厚利悉歸於商人矣是時議臣請以見緡入中而天聖初又設三説之法入見緡金帛則官雖為便而商者不通用三説則官有七倍之損而香象之貨居積停滯公私皆失其利焉景祐康定之間又增以鹽利為四説雖公家虧於半而賈販者復壅至皇祐中又用見緡之法雖壅滯稍去然調視小失固未免於乖迂也元豐類藁巻四十九
