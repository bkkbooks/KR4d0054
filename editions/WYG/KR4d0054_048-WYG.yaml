body:
  text: 元豐類藁巻四十八宋曾鞏撰傳徐復傳徐復字希顔興化軍莆田人嘗舉進士不中去不復就博學於書無所不讀尤通星厯五行術數之説世罕有能及者為人倜儻有大志内自飾勵不求當世之譽樂其所自得謂富貴不足慕也貧賤不足憂也故窮門漏屋敝衣糲食或至於不能自給未嘗動其意也遇人無少長貴賤皆盡恭謹其言前世因革興壞是非之理人少能及然其家未嘗蓄書蓋其强記如此也康定中李元昊叛詔求有文武材可用者叅知政事宋綬天章閣侍讀林瑀皆薦復詔賜裝錢州郡迫趣上道既至仁宗見復於崇政殿訪以世務復所以為上言者世莫得聞也仁宗因命講易乾坤既濟未濟又問今歳直何卦西兵欲出如何復對歳直小過而太一守中宫兵宜内不宜外仁宗善其言復又獻所為邊防䇿太一主客立成厯洪範論上曰卿所獻書為卿留中必欲官之復固辭迺官其子晞留復登聞鼓院與林瑀同修周易㑹元紀歳餘固求東歸仁宗髙其行禮以束帛賜號沖晦處士復久遊呉因家杭州州牧每至必先加禮然復未嘗肯至公門范仲淹知杭州數就復訪問甚禮重之仲淹嘗言西兵既起復豫言罷兵歳月又斗牛間嘗有星變復言呉當大疫死者數十萬人後皆如其言復平居以周易太𤣥授學者人或勸復著書復曰古聖賢書已具顧學者不能求吾復何為以徼名後世哉晚取其所為文章盡焚之今其家有書十餘篇皆出於門人故舊之家復卒時年七十餘既病故人王稷居睦州欲往省之復報曰來以五六月之交尚及見子稷未及往至期復果已死其終事皆預自處子晞年五十餘亦致仕官至國子博士復贈尚書虞部員外郎復死十餘年而沈遘知杭州牓其居曰髙士坊云贊曰復之文章存者有慎習贊困䝉養等篇歸於退求諸已不矜世取寵余論次復事頗采其意云若復自㧞汙濁之中隠約於閭巷久而不改其操可謂樂之者矣洪渥傳洪渥撫州臨川人為人和平與人游初不甚歡久而有味家貧以進士從鄉舉有能賦名初進於有司連輙出久之乃得官官不自馳騁又久不進卒監黄州麻城之茶場以死死不能歸葬亦不能返其孥里中人聞渥死無賢愚皆恨失之予少與渥相識而不深知其為人渥死迺聞有兄年七十餘渥得官而兄已老不可與俱行渥至官量口用費掇其餘以歸買田百畝居其兄復去而之官則必安焉渥既死兄無子數使人至麻城撫其孥欲返之而居以其田其孥蓋弱力不能自致其兄益已老矣無可奈何則念輙悲之其經營之猶不已忘其老也渥兄弟如此無愧矣渥平居若不可任以事及至赴人之急早夜不少懈其與人真有恩者也予觀古今豪傑士傳論人行義不列於史者往往務摭奇以動俗亦或事髙而不可為繼或伸一人之善而誣天下以不及雖歸之輔教警世然考之中庸或過矣如渥所存蓋人人所易到故載之云元豐類藁巻四十八
