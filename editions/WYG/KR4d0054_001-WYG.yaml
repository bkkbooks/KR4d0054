front:
  text: 古詩
  hash: sha256:19f0ee052a81a17b4096cd858b974347364c764efe449c00a8b7ada12629122a
body:
  text: 冬望霜餘荆吳倚天山鐡色萬仞光鋩開麻姑最秀揷東極一峯挺立髙嵬嵬我生智岀豪俊下逺跡乆此安蒿萊譬如驊騮踏天路六轡豈議收駑駘巔崖初冬未氷雪蘚花入履思莫裁長松夾樹葢十里蒼顔毅氣不可廻浮雲栁絮誰汝礙欲往自尼誠愚哉南忩聖賢有遺文滿簡字字傾琪瑰旁搜逺探得戸牖入見奥作何雄魁日令我意失枯槁水之灌養源源來千年大説沒荒宂義路寸土誰能培嗟予計真不自料欲挽白日之西頽嘗聞古者禹稱智過門不暇慈其孩况今尩人冒壯任力蹶豈更餘纎埃龍潭瀑布入胸臆歎息但謝宗與雷著書豈即遽有補天下自古無能才一鶚北風萬里開蓬蒿山木洶洶鳴波濤嘗聞一鶚今始見眼駿骨𦂳精神豪天昏雪宻飛轉疾暮畧東海朝臨洮社中神狐倐閃内腦尾分磔垂弓櫜巧兎獰雞失草木勇鷙一下崩其毛窟穴呦呦哭九子帳前活送雙青猱啁啾燕雀誰爾數駭散亦自亡其曹勢疑空山竭九澤殺氣已應太白高歸來磥嵬載俎豆快飲百瓮行春醪酒酣始聞壮士歎丈夫試用何時遭宿尊勝院朝寒陟山砠宵雨集僧堂敝衣盖苦短客卧夢不長鳴風木間起枯槁吹欲僵向來雪雲端葉下百仭隍起攀蒼崖望正受萬慮戕嵗運忽當爾我顔安得芳傳聞羡門僊飛身憩蒼蒼誰能乞其靈相與超八方苦雨霧圍南山鬱𡨕𡨕狹谷荒風驅水聲秪疑日失黄道去又見雨含滄海生如催病骨夜寒入似送客心衰思驚揚州青銅不在照應有白鬚添數莖里社郊天社地君所重翦秸刲匏㣲得供秦皇漢帝陋古初桀畤殊壇傾力奉年年屬車九重出羽衞千人萬人從黄金日搜盡崖窟飛檣走箠華夷動馬蹄一作鳥啼路南村有社里老邀神迎且送荒林破屋風雨入野䑕山狐狼藉共何言茅箸古瓦甌稻飯豚蹄人得用南源莊床上不廢看青山門前便踏南澗路繞牆頓失車馬喧岸幘日得滄洲趣嘗嗟秋蓬轉未有茅屋據到此耳目新始覺精爽聚滄溟未可泛舟入鴈蕩誰能胝足去醫閭在夷蠻羅浮若煙霧子真自愛谷口家仲尼老亦洙泗住吾能放意遊八極此興乆與前賢附悄然怪我思慮深已欲摧倒聞猿樹眼前了了破青坂屈椽小棟隨時具野柔川深春事來筍鞵瞑戛青雲步秫田試犢耕早風茗圃分籃摘宵露竹林掃月散絺葛雪艇搜溪出魴鱮㡌塵便可臨水濯里鬭何妨閉門拒介推母厭俗乆思顛崖住不顧梁鴻妻亦高能快穿衣與藜茹成家儻已嫁諸妹有立不憂吾弟孺攘攘天地間萬類殊好惡歡合無一非暌窮有百牾吾獨安能逐毛髮飲泉食力從所慕論交徳操龎公林下時入門豈復知客主夷吾鮑叔貧賤間分財亦不辭多取相傾頓使形迹空素定已各肝膽許世間未信亦論交得失秋毫有乖忤南軒木端青崖軒慘淡寒日暮鳴鳩已安巢飛鵲尚求樹物情限與奪兹理奚以據諒知巧者勞豈得違所賦乆無胷中憂頗識書上趣聖賢雖山丘相望心或庻兵間大義缺絶乆未圖小人輕險何不至世上固自有百為兵間乃獨求一試趙括敢將亦已危李平請守那復議吁嗟忍易萬人生冀幸將徼一身利種園於陵為人灌園蔬我今園地不自種惰慵苟恃鄉井助緩急孰與朋友共支離有疾上雖恕陳平不事家焉用著書儻得一言利長者或許醻内訟歎嗟夜歎不為絺綌單晝嗟不為薇蕨少天弓不肯射狼星欃槍乆已躔朱鳥徐楊復憂羽蟲孽襄漢正病昭回杳力能懷畏未足憂憂在北極羣隂繞寄孫之翰孫侯腹載天下書崔嵬豈啻重百車伏羲以來可悉數孰若自作何有餘更能議論恣傾倒萬里一瀉崑崙渠誰為胷中斡太極元氣浩浩隨巻舒昔來諫臣對天子何穢不欲親芟鋤不容乃獨見磊落出走並海飄長裾孫侯風節何所似雪洗八荒看太虛親如國忠眼不顧舊若張禹手所除歸來已絶褒貶筆進用袛調敖倉儲合持詩書白虎論更䕶日月金華居萬世根深固社稷百年舊叟休田閭素識孤生愛茅屋乆將老母求仙砠秋歸願事九江穫夜出未捲安豐漁孔明苟欲性命遂孟子豈病王公疎塵埃未得見此樂太息一付西江魚豪傑老哺薇蕨西山翁樂傾瓢水陋巷士不顧無復問周公可歸乃獨知孔子自期動即重丘山所去何啻輕糠粃取合悠悠富貴兒豈知豪傑心之恥侯荆侯嬴夷門白髮翁荆軻易水奇節士偶邀禮數車上足暫飽腥羶館中侈師迴拔劔不顧生酒酣拂衣亦送死磊落髙賢勿笑今豢養傾人乆如此黄金陳侯坐收百戰楚吕氏行取萬乗秦田生立顧開兩國陸公㣲辭交二臣道旁白日忽再去囊中黄金如有神何須首陽二夫子不是九鼎輸西鄰揚顔揚雄纂言唯仲尼顔氏為身慕虞舜千里常憂及門止為山更欲一簣進小人君子在所蹈烈士貪夫不同徇安得蠢蠢尚自恕百年過眼猶一瞬橙子家林香橙有兩樹根纒鐡鈕凌坡陀鮮明百數見秋實錯綴衆葉傾霜柯翠羽流蘓出天伏黄金戱毬相蕩摩入苞豈數橘柚賤芼鼎始足鹽梅和江湖苦遭俗眼慢禁籞尚覺凡木多誰能出口獻天子一致大樹凌滄波山檻小飲變秋長雲豪洒雨北風壮餘熇尚争威積晦頗異状山回攢楓顛屋立懸狖上飲檻聚石為謌筵注溪當歡言乆諠譁罷興一怊悵旅人正飄颻豈得諧放蕩北使南粟鱗鱗多送北北兵林林備邉隅北使一來大梁下塞頭彎弓士如無折衝素恃將與相大䇿合副艱難須還來里閭索窮下斗食尺衣皆北輸中原相觀歎失色馬騎日肥兵氣麄九州四海盡帝有何不用之藩北郛上翁嶺放車秋崖望所得過舊聞初疑古軸畫山水秋毫分時見厓下雨多從衣上雲濯足行尚側心憂踏天文八荒正搖落獨餘草木薫但覺耳目勝未知筋力勤顛毛已種種世患方紛紛何當嘯吟此日與樵蘇羣雜詩四首張陳貧時交干戈忽相逐范蔡憎嫌人卒自歸鼎軸害奪怨為欣利敺愛成戮世間不可料人事常反覆日磾斷内討坐享七世榮霍光狥所愛兩忘家與名卓闊俱抗志纎㣲獨紆情得失萬世視長令壮夫驚皇皇謁荆人伈伈遵陽虎及覺一禮亡翩然遂違魯全身有遜接直道無苟處故稱聖如龍屈伸兹可覩揮袂謝幽側騰身集崔嵬心胎太極氣手揚斗間魁荒荆忽成桂蟄鱗冬有雷君看九州寳自入朱門來欲求天下友欲求天下友試為滄海行風來㝠㝠内擺觸怪浪生突兀萬里怒勢疑九州傾鯨鵬不自保况此一舟輕我徒幸來即可留石根耕日將書上客共須天地清冬暮感懷荒山未有雪野水不見冰一臘今已半浮陽壮猶矜奈此一嵗除未有嚴氣升坐思崆峒間負雪山千層雖受凛冽僵愈此穢濁蒸感激崑崙祇一氣吹丘陵炎埃滅無遺古色萬里興我病一洗濯懷抱失所憎因思大羽獵屬車上崚􅜤六軍騎皆駿争先雪中登天時傾人意踴躍士氣増大義雖不殺四方懾兵稜今此效安在東南塞猶乗將帥色彫槁蚍蜉勢趫騰惨錯天運内止戈信誰能寄舎弟新霖洗窮臘東南始知寒驚我千里意覺汝征途難空江挂風席扁舟與誰安羇旅費亦乆橐衣豈無單念汝西北去壮心始桓桓竟逢有司惑斥走懷琅玕士固有大意秋毫豈能干所憂道里困乆無一罇歡我意生惻惻為之却朝餐人生飄零内何處懷抱寛已期採芝樂握手青霞端無令及門喜淹留雪霜殘至荷湖二首鐡色對我馬林林露南山草根巳變緑氷雪尚滿顔解鑣蒼煙脚我栖就柴闗乖時遭飄躓豈免生事艱夙意待周孔此士豈可還濁醪且斟酌收心一缾間悲風我眼澁酸狖我耳愁我顛水沒馬我起雪滿裘百里不逢人豈有烟火投却依青壁望白霧滿九州蒼蒼運乃爾何地寛我憂夜卧夢成魘猶疑沃山湫送徐竑著作知康州溪蠻肯負命殺氣凌南州城郭漲烟火堂皇嘯蜉蝣被髮盡冠巾吾人反縲囚行剽至抄忽歸載越山丘驅攘事雖定收合信瘡疣不有異澤霑何令餘患瘳寒風在林鳴君馬不能留初佩太守章慨然任人憂問俗灰燼餘咄唶令人謀士材為世用因難乃知尤煩苛一蕩滌幽逺偏懷柔四封鳴雞犬五穀被原疇里閭多娱宴歌鼔震溟陬明義每所希古人不難侔日月有常運志士無安輈山川自兹始努力千里遊詠雪北風蕭蕭鳴且歇短日悠悠生復滅朝含滄海滿天雲暮斷行人千里雪初通壑谷氣先冷漸蔽郊原路疑絶併包華夷徳豈薄改造乾坤事尤譎驅除已與塵滓隔濯溉終令枯槁悦相持始信竹栢勁易敗可嗟萑葦折條垂巧綴如自愛眢井隨形呀且缺飛檐䡾䡾駕長浪巨壁林林倚精鐵弊衣或有骭猶凍荒宴誰能耳偏熱壯夫撫劍生鋭氣志士扄門養高節已開襟胸絶煩憒更足溝塍慰空竭雖無酒醴發嘲笑亦有詩謠恣搜抉新陽髣髴送鑱鑿舊徑参差分曲折留當屐齒印崖石徙倚長松看寥泬寫懷二首羣生各有趣營慮自纒結名網智巳羅利械愚所紲古今遞主客真贗兩興滅洗然大人意杳與能者别不必條蔓榮中自老根節曾非故澆培獨得較霜雪蛟龍無安舟虎兕有危轍將能此人追得匪合明哲荒城絶所之嵗暮浩多思病眼對山湖孤吟寄天地用心長者間巳與兒女異况排千年非獨抱六經意終非常情度豈補當世治幽懷但自信盛事皆空議氣昏繁霜多節老寒日駛局促去朋友咄唶牽夢寐将論道精麤豈必在文字茅堂閒坐荆門常晝掩不必雲山深豈敢尚孤絶自能収寸心草萌被逺徑鳥語遍喬林㪚帙味新趣鳴絃嘆餘音脱粟幸可飽一瓢方獨斟顔徒􅃡雖卓非此誰為尋盛服纒紫艾重印鑄黄金信使憂喘息詎無勤苦侵埃塵緇冠葢霜露泫衣衿脅肩已自昔俛首微獨今豈誰智所拙曽是力難任為樂聊在此焉知玉山岑靖安縣幽谷亭横江捨輕楫對靣見青山行盡車馬塵豁見水石寰地氣方以潔崖聲落潺潺誰為千家縣正在清華間風煙凜人心世慮自可刪况無訟訴囂得有觴詠閒常疑此中吏白首豈思還人情貴公卿煜煜就玉斑光華雖一時憂悸或滿顔雞鳴已争馳驊騮振鑣鐶豈如此中吏日髙未開關一不謹所守名聲别妖奸豈如此中吏一官老無癏愔愔謀謨消洎洎氣象孱豈如此中吏明心懾強頑况云此中居一亭衆峯環崖聲夢猶聞谷秀坐可攀倚天巉巖姿青蒼露媥斕對之精神恬一作帖可謝世網艱人生慕虛榮歛收意常慳誠思此憂愉自應喜榛菅青雲亭閒望一登此亭高夐脱藩廡擁開顔廣軒闢吹面驚颷動城回石崖抱山亂寒潮湧谷草晚更芳沙泉細猶洶峥嶸四封社縹渺佳氣捧連天廣衢走拂日長簷聳區區射聲利浩浩奔蹄踵趨榮衆所便冒涉吾乆恐緬想山水宅環觀松檜拱屬耳天籟樂脱身人事冗幽閒味雖薄放蕩愚所勇窮㐫勢猶競殺伐聲更詾揚揚歛臣貴􅂱􅂱官兵寵諒知草茅㣲無補社稷重牧放手黝鞭畊鋤躬瘦隴尚或此心諧豈云吾道壅元豐類藳巻一
