body:
  text: 元豐類藁巻七宋曽鞏撰雜詩冬夜即事印奩封罷閣鈴閒喜有秋毫免素餐市粟易求倉廩實邑尨無警里閭安香消一榻氍毹暖月澹千門霧凇寒聞說豐年從此始更回籠燭巻簾看齊寒甚夜氣如霧凝於木上旦起視之如雪日出飄滿堦庭尤為可愛齊人謂之霜滋諺曰霜凇重霜凇窮漢置飯甕以為豐年之兆詶介甫還自舅家書所感旱氣滿原野子行歸舊廬籲天高未動望嵗了何如荒土欲生火涸溪容過車民期得霖雨吾豈灌園蔬西湖二首左符千里走東方喜有西湖六月涼塞上馬歸終反覆泰山鴟飽正飛揚懶宜魚鳥心常静老覺詩書味更長行到平橋初見日滿川風露紫荷香湖靣平隨葦岸長碧天垂影入清光一川風露荷花曉六月蓬瀛燕坐涼滄海桴浮成曠蕩明河槎上更微芒何須辛苦求人外自有仙鄉在水鄉早起赴行香枕前聽盡小梅花起見中庭月未斜微破宿雲猶度鴈欲深烟栁已藏鴉井轤聲急推寒玉籠燭光繁秉絳紗行到市橋人語密馬頭依約對朝霞席上市井蕭條烟火微兩衙散雪夜深時若無一曲傳金盞争奈衰翁兩鬢絲和陳郎中材薄安時甘寂寞身閒乗興喜登臨毎尋香草牽狂思曽向幽蘭費苦吟明月㡬人非按劒高山從古少知音數篇清絶賡歌意黙見馮唐異俗心雪後雪景鮮妍猶弄色栁條葱蒨已抽萌風光冉冉流雙轂人事悠悠寄一枰射羿未應今獨有嘲雄何必史能評且將畫諾供談笑更選名園載酒行舜泉山麓舊耕迷故壟井幹餘汲見飛泉清涵廣陌能成雨冷浸平湖别有天南狩一時成往事重華千古似當年更應此水無休歇餘澤人間世世傳閲武堂五朝坏冶歸皇極萬里車書共太平朔馬不窺光禄塞漢家常𨽻羽林兵栁間自詫投壺樂桑下方安佩犢行高枕四封無一事腐儒何幸偶專城環波亭水心還有拂雲堆日日應須把酒杯楊栁巧含烟景合芙蓉争帶露華開城頭山色相圍出簷底波聲四靣來誰信瀛洲未歸去兩州俱得小蓬萊鵲山亭大亭孤起壓城顛屋角峨峨挿紫煙濼水飛綃來野岸鵲山浮黛入晴天少陵騷雅今誰和東海風流世謾傳太守自唫還自笑歸時乗月尚留連芍藥㕔小碧䦨干四月天露紅煙紫不勝妍肯為雲住陽臺女恐逐風飛石室仙洧外送歸情放蕩省中番直勢拘攣何如蕭洒山城守淺酌清吟濟水邉水香亭臨池飛構鬱岧嶤櫺檻無風影自搖羣玉過林抽翠竹雙虹垂岸跨平橋頻依美藻魚争餌清見寒沙水滿橈莫問荷花開㡬曲但知行處異香飄静化堂修簷䡾䡾背成隂行盡松篁一徑深好鳥自飛還自下白雲無事亦無心客來但飲平陽酒衙退常攜靖節琴世路人情方擾擾一逰須抵萬黄金仁風㕔凛凛風生寄此堂塵埃消盡興何長朱絲鼓舞逢千載白羽吹揚慰一方已散浮雲滄海上更飛霖雨泰山傍誰知萬物心焦日獨對松筠四座涼閱武堂下新渠方渠新鑿北林開流水遥經畫閣來洗耳厭聞誇勢利濯纓羞去傍塵埃不憂待月供詩筆已欲看花泛酒杯却憶虎谿橋上過夜涼臨砌尚徘徊凝香齋每覺西齋景最幽不知官是古諸侯一尊風月身無事千里耕桑嵗有秋雲水醒心鳴好鳥玉沙清耳漱寒流沉烟細細臨黄巻疑在香爐最上頭北渚亭四楹虚徹地無鄰斷送孤高與使君午夜坐臨滄海日半天吟看泰山雲青徐氣接川原秀常碣風連草木薫莫笑一尊留戀久下階塵土便紛紛芙蓉橋鴈翅横連杜若洲碧䦨干影在中流蓬萊日日逰人到誰道僊風解引舟百花臺煙波與客同尊酒風月全家上采舟莫問臺前花遠近試看何似武陵逰次道子中書問歸期竊食東州嵗未期蓬萊人問㡬時歸凭䦨到處臨清泚開閣終朝對翠微兩印毎閒軍市静雙旌多偃送迎稀一枝數粒身安穏不羡雲鵬九萬飛霧凇園林初日静無風霧凇花開處處同記得集英深殿裏舞人齊挿玉籠􅟰正月六日雪霽雪消山水見精神滿眼東風送早春明日杏園應爛漫便須期約看花人寄顧子敦清曠亭邉雁欲回南湖分浪入城來空山過臘猶藏雪野岸先春已放梅三徑未歸聊自適一尊尋勝每同開如今試想長松下玉麈高談豈易陪二月八日北城閒步土膏初動麥苖青飽食城頭信意行便起高亭臨北渚欲乗長日勸春耕詠栁亂條猶未變初黄倚得東風勢便狂解把飛花䝉日月不知天地有清霜北園㑹客不飲畫橋南北水西東高下花枝緑間紅殢得春風人盡醉獨醒誰似白頭翁西湖納凉問吾何處避炎蒸十頃西湖照眼明魚戯一篙新浪滿鳥啼千步緑隂成虹腰隠隠松橋出鷁首峩峩畫舫行最喜晚凉風月好紫荷香裏聽泉聲喜雨偶狥一官偷禄計便懐千里長人憂桑間舉箔蠶初繭隴上揮鐮麥已秋更喜風雷生北極頓敺雲雨出靈湫從今菽粟非虛禱㑹見甌窶果滿篝雨後環波亭次韻四首次李秀才得魚字韻候月已知星好雨卜年方喜夢維魚從今撥置庭中事最喜西軒睡枕書次綰得風字韻荷芰東西魚映葉樵舟朝暮客乗風清泉雨後分毛髮何必南湖是鏡中次維得禽字韻黄蜀葵開収宿雨紫桑椹熟轉新禽看花弄水非無事猶勝紛紛别用心次維得花字韻丹杏一畨収美實緑荷無數放新花西湖雨後清心目坐到城頭泊暝鵶去年久旱六月十三日入境得雨今年復旱得雨亦六月十三日也去年六月焦原雨入得東州第一朝今日看雲舊時節又來農畔聴蕭蕭到郡一年薄材何幸擁朱軒竊食東風已一年隴上雨餘看麥秀桑間日永問蠶眠官名雖冗身無累心事長閒地自偏祗恐再朞官滿去每來湖岸合留連孔教授張法曹以曽論薦特示長牋緑髪朱顔兩少年出倫清譽每相先壁中字為時人考圯上書從老父傳泮水笑談邀法飲高臺閒燕屬佳篇衰翁厚幸懐雙璧更起狂心慕薦賢酬強㡬聖俯仰林泉繞舍清經年閒卧濟南城山田雨足心無事水榭華開眼更明新霽煙雲飛觀出晚凉歌吹畫橋横寄聲裴令樽前客祗欠高談一座傾人情人情當面蔽山丘誰可論心向白頭天禄閣非真學士玉麟符是假諸侯詩書落落成孤論耕釣依依憶舊逰早晚抽簮江海去笑將風月上扁舟寄王樂道荆州南走困塵埃應喜文章意自開明世正逢多事日要塗須用出倫材不回霜雪天應惜未得風雲衆忍摧若向沙頭弔杜甫近詩懸望自書來戲書集賢自笑文章少為郡誰言樂事多報答書題親筆硯逢迎使客聴笙歌一心了了無人語兩􅁂蕭蕭奈老何還有不隨流俗處秋毫無累損天和贈張濟憶初蘭渚訪沈淪一畝蕭然里舍貧節行久窮彌好古文章垂老更驚人詩書就我論新意冠劒投誰拂舊塵山驛荒凉煩枉道一觴相屬莫嫌頻北渚亭雨中振衣已出塵土外巻箔更當風雨間泉聲漸落石溝澗雲氣逈壓金輿山寒沙漠漠鳥飛去野路悠悠人自還耕桑千里正無事况有罇酒聊開顔送趙資政鎮撫西南衆望傾玉書天上掇持衡春風不覺岷山遠和氣還從錦水生學舍却尋餘教在棠郊應喜舊隂成歸來促召調鑪冶莫為兒童竹馬迎趵突泉一派遥從玉水分暗來都洒厯山塵滋榮冬茹温常早潤澤春茶味更真已覺路傍行似鑑最憐沙際涌如輪曽城齊魯封疆㑹况託娥英詫世人金絲泉玉甃常浮灝氣鮮金絲不定路南泉雲依美藻争成縷月照靈漪巧上弦已繞渚花紅灼灼更縈沙竹翠姢姢無風到底塵埃盡界破氷霜一片天北池小㑹笑語從容酒慢廵笙歌隨賞北池春波間鏤檻花迷眼沙際朱橋栁拂人金縷暗移泉溜急銀簧相合鳥聲新幸時無事須行樂物外乾坤一㸃塵送韓廷評謝庭冠盖舊追尋僻郡相從喜更深進道由來輕拱璧傳經知不羡籯金騏騮要試風沙遠竹柏須忘霰雪侵别後壯懐應努力白頭傾耳聽徽音寄孫莘老湖州墨妙亭隆名盛位知難久壯字碑豐亦易忘棗木巳非真篆刻色絲空喜好文章峴山漢水成虛擲大厦深簷且秘藏好事今推霅溪守故開新館集琳瑯鵲山一峯孤起勢崔嵬秀色挼藍入酒盃靈藥已從清露得平湖長泛宿雲回翰林明月舟中過司馬虚亭竹外開我亦退公思蠟屐㑹看歸路送人來華不注山水經華不注山虎牙桀立孤峰特起以刺天青崖翠發望同㸃黛輿地志又云亦名金輿山虎牙千仭立巉巉峻㧞遥臨濟水南翠嶺嫩嵐晴可掇金輿陳迹久誰探高標特起青雲近壯士三周戰氣酣丑父遺忠無處問空餘一掬野泉甘靈巖寺兼簡重元長老二劉居士法定禪房臨峭谷辟支靈塔冠層巒軒牕勢聳雲林合鐘磬聲高鳥道盤白鶴已飛泉自湧青龍無迹洞常寒更聞惠遠相從樂世道囂塵豈可干和孔仲平園池方喜共追㝷正是槐榆夾路隂雙燭縱談樽酒淥一枰消日紙牕深波濤萬字驚人筆塵土千鍾異俗心佳句從來知寡和愧將沙礫報一作兼黄金郡樓滿眼青山更上樓偶携閒客此間逰飛花不盡隨風起野水無邉帶雨流懐舊有情惟社燕忘機相得更沙鷗黄金駟馬皆塵土莫靳當歡酒百甌鮑山雲中一㸃鮑山青東望能令兩眼明若道人心是矛㦸山中那得叔牙城鄆州新堂百尺豐堂汶水濵魯侯清燕此逡巡谿寒素礫偏宜月壁瑩黄金不受塵引客笙歌行處是賞心花木四時新未應久作林泉主天子今思舊學臣垓下三傑同歸漢道興㧞山餘力爾徒矜泫然垓下真兒女不悟當從一范増離齊州後五首雲㠶十幅順風行卧聴隨船白浪聲好在西湖波上月酒醒還對紙牕明畫船終日扒沙行已去齊州一月程千里相隨是明月水西亭上一般明文犀剡剡穿林筍翠靨田田出水荷正是西亭銷暑日却將離恨寄煙波將家須向習池逰難放西湖十頃秋從此七橋風與月夢魂常到木蘭舟荷氣夜凉生枕席水聲秋醉入簾帷一㠶千里空回首寂寞船牕祗自知寄齊州同官西湖一曲舞霓裳勸客花前白玉觴誰對七橋今夜月有情千里不相忘庭檜呈蔣潁叔樛枝高下秀森森曽寄名卿一作郎異俗心草舍一時成往事松身千尺見新隂聲清不受笙竽雜氣勁能遺霰雪侵漢節從來縱真賞謝庭蘭玉載芳音甘露寺多景樓欲収嘉景此樓中徙倚䦨干四望通雲亂水光浮紫翠天含山氣入青紅一川鐘唄淮南月萬里㠶檣海外風老去衣衿塵土在祗將心目羡㝠鴻孫少述示近詩兼仰高致大句閎篇久擅塲一函初得勝琳瑯少陵雅健材孤出彭澤清閒興最長世外麒麟誰可係雲中鴻雁本高翔白頭多病㐮陽守展巻臨風欲自強金山寺塵外岧嶤鷲嶺宮架虚排險出青紅林光巧轉滄波上海色遥涵白日東夜静神龍聴呪食秋深蒼鶻起摶風連荆控蜀長江水盡在回廊顧盼中水西亭書事一畨雨熟林間杏四面風開水上花岸盡龍鱗盤翠篠谿深鰲背露晴沙隴頭刈麥催行饁桑下繅絲急轉車總是白頭官長事莫嫌麤俗向人誇按此詩諸本皆缺今依顧崧齡從宋槧校正本補入元豐類藁巻七
