body:
  text: 元豐類藳巻二宋曾鞏撰古詩寄子進弟憶子去家日南風始吹衣今來日未幾蠅蚊已羣飛思子兼晝夜何啻如渴飢喜聞逺客至手自排荆扉客送書一紙翰墨子所揮上言山居惡夢寐接庭闈次言服畎畝禾黍膴以肥其餘業文字頗測隱與㣲題詩在紙尾語老意不非我喜何所似大似客得歸我與子事親未飽藿與薇常若去左右辛勤治鞍鞿子行何時反我眼日巳晞應須秋畢刈相見慰依依喜寒純一作沌陽四時行無復氣節勁日火相吐吞乾離力還拼𤣥𡨕失所安恇怯擅操柄我行東南野憒憒若酣醟喜逢青林長葉蔓可韜映正嗟天之高玉色萬里浄忽驚西山雲毫末生一鏡須臾油然合㸃滴飛雨迸颼颼漸相扶霶霈一何盛積陰類潛師形勢乆巳偵乗時出幽墟奮發精爽競亘天逐炎官顓頊修火令威加乾坤從洌洌氣貌正人無焦煩憂氷釋天下病豈須雪包林已壓朱鳥横南方天精兵瘴濕灾可屏争難奪刀殳發巧搜壍穽收功當在今殺伐順天正况云麰麥祥已覺閭里慶髙歌叩吾轅上頌天子聖詠史二首京室天下歸飛甍無餘地國士憂社稷塗人養聲利貴賤競一時峩冠各麟次子龍獨幽逺聘召漠無意子雲無由歸俛首天禄閣君平獨西南抗顔觀廖廓無猜到沉𡨕有故驚寂寞用心豈必殊拘肆事終各江湖江湖俗畏逺幽好自相宜淪迹異驚衆辭囂如避時復游可以學薇蕨易為私胡然棄回櫂霜雪有驅馳将之江淛延祖子山師柔㑹别飲散獨宿孤亭遂書懷别蜀客向何處欲觀浙江潮擬舟吳門柵况㑹故人招置酒吴亭上無人吹紫簫浩觀萬物變䬃爾生凉飈遂恐時節晚芳蘭從此凋功名竟安在富貴空寥寥鴻鵠舉千里鸞鳯翔九霄胡為蓬蒿下日夜悲鷦鷯車馬夕巳還行人亦飄颻浩然滄海志寂寞守空宵詠雪嚴嚴層氷塞川澤洶洶北風鳴木石黄雲半夜滿千里大雪平明深一尺兩儀混合去纎間萬類韜藏絶塵迹蛟龍岌起抱岡巒江海横奔控阡陌野林縹𣺌苦難状庭樹鮮姸疑可摘開門更覺山市静散帙偏宜紙忩白精光蕩射徧巖谷氣象峥嶸見松栢少年登望就臺觀壮士衡凌向沙磧饑鼯嘷卧伏牙爪獵隼飛挐矜羽翮茅薝客聚滿幽缶桑徑人行沒雙屐髙堂暖熱厭羅綺環堵蕭條尚絺綌何當仰見白日照坐看先従沙際釋漸涵溝畎兆豐富洗濯閭閻消瘴疫便乖東北生氣起自駕疲牛理墝塉荅裴煜二首拙者羞強合因成杜門居豈知公相尊一室若有餘愛子富文行顧為巳不如所以子之黨頓見我僕車歡誠激孤緒合若水縱魚新詩八十言筆端産璠璵屑屑委地蓬清風為吹噓相期在規誨庻以補頑疎寥寥今非古感激事真妄曾誰省孤心祗以弭羣謗参差勢巳甚决起意猶強親朋為憂危議語敢鐫蕩久之等聾眊兀矣坐閭巷長嗟貧累心更苦病摧壯㣲誠豈天與今晨子來貺顧慙小人愚未出衆夫上狂言屈子吟浩歌仍子唱相歡匪貌濟所得實心尚時節雖巳宴梅栁幸欲放過從勿厭倦相持非鬱盎寄王介甫憶昨走京塵衡門始相識踈簾掛秋日客庖留共食紛紛説古今洞不置藩域有司甄棟榦度量棄樗櫟振轡行尚早分首學壖北初冬憩海昏夜坐探書䇿始得讀君文大匠謝刀尺周孔日乆逺遺經竄墻壁倡佯百怪起冠裾稔回慝君材信魁崛議論恣排闢如川流渾渾東海為委積如躋極髙望萬物著春色寥寥孟韓後斯文大難得嗟予見之晚反覆不能釋胡然藴環堵不救謀者惑明朝渡江還念念非可抑如醖冒炎暑每進意愈塞維時南風薫木葉晃繁碧頽雲走石瀬逆坂上文艗欣聞被檄來窮閻駐鑣軾促榻叩其言咸池播純繹行身抗淵損及物窺龍稷綢繆指疵病攻砭甚鍼石淺沚有停沙亦可洗珠璧論憂或共嚬遇愜每同蟄正道祝融横金隅未提職髙樓豁可望命載屢攀陟一不羅俗嬉怡然治紈墨露注尚忘疲更得蟾蜍昃雅愛張與余挽之置茵席羣兒困不酬吽嚬聚譏摘仁義殊齟齬昧者尊惡音烏砳一作跖霧草變衰黄吟蛩閙朝夕君子畏簡書薄言返行役商歌孺子别失淚染衣襋自從促櫂去㑹此隆冬逼河神鼔隂韛萬竅動謞儌城顛睨江浪蛟怪助掀射仁賢保無恙所想掛驚惕􅂱􅂱多吏從良巳饋藜齸迨兹尺書至疑念始氷析蘭滫杳慈祥筠梧肆諧適繽紛衆胥土署壘各嬉息其餘書牘背栗宻縷機織巻書勞來翰寸懷良士懌野泊轉平緑梅梢㺯繁白金縚引栁荑芳氣滿原澤出門無所抵歸卧四楹寂術學頗思講人事多可惻含意不得發百憤注㣲臆搖搖詠顔色企足闗途隔自慚兒女情宛轉抱悽慼吾念非吾私何當託雲翼竒偶轉如輪終期援焦溺上人金節横光馬珂鬧瑞鶻宫袍腰玉繞烟沙轣轆高軒過路上千人瞻羽纛瑤魁精彩浮蒼龍江城四面生春風城中壞屋書籖碧有客苦吟連旦夕麻衣塵暗抱書泣嵗暮黄粱不供食白日瞳曨望龍坂坐上一言寒口暖西入天闗灑霖雨須惜窮鱗在泥土初夏有感我從得病在閭巷三見夏物争滋榮紅英紫萼逐風盡髙榦宻葉還隂成山亭水館處處好朱碧萬實相駢擎林烏梁燕各生子翅羽已足争飛騰雉雞五色繡新翮鷕鷕慕匹相隨鳴穴蜂露蜨亦有類歘徃復聚何翾輕箔蠶滿室事方盛繭綴下上如連星麥芒秧穎錯雜出髙壠大澤填黄青物從草木及蟲鳥無一不自盈其情嗟我獨病不如彼胷氣卧立常伻伻筋酸骨楚頭目眩強食豈得肌膚盈我身今雖落衆後我志素欲希軻卿十年萬事常坎壈奔走未足供藜羮愁勤未老鬚先白多學只自為身兵自然感疾憊形體後日雖復應伶俜非同世俗顧顔色所慕少壮成功名但令命在尚可晚屑細詎足傷吾平送人移知賀州溪石膠船秋瀨㣲南山巉空勢峩巍風露氣嚴花草緋天色㵳㵳初鴈飛君子往守東南圻旟旝綵錯如翔翬象茜照地榮笏衣先後𨽻從何頎頎初君治縣参徳威吾人涵濡樂以肥念今奪去失所依出者遮行居者希我思羣公坐天圍心與星斗争光輝薦賢絀否言無違迅若發石乗髙機何此茂器時所稀噤無一語為發揮敢作此什傳王畿旦暮璽書來勅歸之南豐道上寄介甫應逮冐煩暑驅馳山水間泥泉沃渴肺沙風吹汗顔疲驂喘沬白殆僕負肩殷仰嗟旱雲高俯愛芳陂潺空郵降塵榻浄館排霞闗城隍壮形勢岡谷來回環紅芰姹相照翠樹欝可攀野苗雜青黄雨露施上慳巫覡謁羣望簫鼔鳴空山憂農非吾職望嵗竊所歎憩當午日烈行瞻月初彎星斗㺯光彩羅絡龜火斑跂履雖云倦桑梓得暫還林僧授館舎田客攀鞍􅀈吾心本皎皎彼詬徒㘖㘖方投定鑑照即使征馬班相期本蘭檝蕩漾窮川灣謝章伯益惠硯人生對門東西陌口耳一閒心誰傳况乃天地相去逺一在南海一在燕古今萬世復萬世彼亦居下此在前是非得失錯且繁以情相語何由緣造化豈不大且淵到此縮縮智已慳聖人智出造化先始獨俯仰吾乾坤一人詰曲意百千以文寫意意乃宣簡書軸載道相聫馳夷走貊通百蠻羲皇向今谷屢遷言語應接旦暮間聖人不死一作能術以此久與其類殊蚑蠕外之君臣内父子仁義禮樂定筆端硯與筆墨乃舟船論功次第誰能攀伯益於文敏且顓字向紙上生戈鋋與硯出入宜不捐胡乃贄我璧棄泉作詩知硯功小大報不充賜心焦然送劉醫博小人乆病如愁感每嘆地僻無良醫窮居索寞俗事少對坐荏苒風光移深冬山城萬木落隂氣蕩財生寒颸東方吐日光入户素壁閃閃含清輝臨汀劉君落落者六伎絶偉如天資濳心宻與造化㑹布指夐有精靈隨馬蹄所至病厯屈我於此時忻得之一來握手與我話委曲衰旺肺與脾囊中珍丸撮星斗俾我咀嚼心顔怡灑然沈疴一日解始免未老無枯骸越人湔腸術已緩仲景納餅術可卑劉君與我徳至大拱璧巨鼎非酬禆我嗟劉君乃士類進退婉婉無瑕玼况又新承太守薦羈鞅日背東門馳禁林侍從務周慎君挾所有直相宜貴人四難真可患去此足以為時趄送陳商學士桞黄牛出年将破溪溜侵苔強萬箇溪頭蒲葦各萌芽山梅最繁花已墮物色撩人思易狂况躋别館清河那城東日晚公将去纛影未離愁四座公於萬事不彫鐫心意恢恢無坎坷來從奎壁光鋩下笑倚樽筵成郡課嗟予齪齪才性下棄置合守丘樊餓公持姓名動人主袚飾寧嫌筆端挫從今清夜思江路夢送公船先北過送錢生天下學校廢師生無所依子來滿槖書璨璨璧與璣一字未得讀叩言忽言歸憐子甚有志事時與子違吾與一畝宫留子為發揮去矣善自立毋使嗣音稀雪詠雪花好潔白不待詠説知區區取相合今古同一辭誰能比衆作小去筆墨畦誰能出千載為雪立傳碑四座且勿歌聽我白雪詩天地於降雪其功大艱難去年暖風日冬在春巳還山屏盡深碧危溜聲亦潺草萌各已動梅花開最繁鑪火殆可謝衣絮誰復言推排臘巳過一變天更寒飄風動木石激射難出闗深房擁高燎領用曽不温仰視雪壓疊垂欲藉屋山元氣不復呵飛鳥折羽翰誰排河漢流欲墮莽蒼間首為黒風遮凝凍無住著紛紛成片縷六出非刻削初時漏餘滴雜雨猶可惡迤邐縱飛洒態状不可名或抽若有待或宻以相縈或溺乆宛轉或狂自軒騰羣來信汗漫孤飄亦零丁屋角初漸斑瓦溝忽皆平㘭窪一已滿茅茨壓將傾樹木遍封裹岡山助峥嶸堦除斷纎穢池臺有餘清流塵寂已掩物象窅皆明厨煙或中鑱里表仍孤擎長街隱缺甃荒城混觚稜沙水眇相合扁舟在圖屏啄草鳥雀蹤篆字遺縱横頓驚宇宙内侈麗皆天成引望誰倚樓秀色亂目睛永懷衡門士辛苦守六經山藜不充腹筆硯乆已氷柔茵坐中堂誰問公與卿世事汨無意燭換猶飛觥文犀壓朱箔陽春謝秦筝所處殊處所苦樂固異情誰致此不齊上天意何營蒼蒼不可問奕奕洒未停明晨起相視寒日已滿忩井甃破圓素砌苔還故蒼萬物去覆冒顔色皆復常融為大田水其流日滂滂方塘接深甽澄徹碧玉光豈惟癘疾消庻驗百穀祥願彼守經士幸可繼糗糧憂民既非職空致新詩章送僧曉容飛光無停芳嵗闌羣陽不行寒氣動疎篁有韻忩含雪重幕無温筆棲凍蕭條山草葉始枯綽約江梅蘂先㺯無人為我取酒斟有客來前乞詩送多情為客不能已捲紙連書筆鋒縱七言百字拙且卑俗眼方憎汝休重送叔延判官北風吹空雪花冷平鋪雲濤冐峰頂江長水闊飛鳥絶沙樹参差動波影君子從戎碧油下緑髮清瞳笏袍整大馬高車府中罷一船沿流背丁丙魴魚勝銀尊酒美物色當前若圖屏危帆健櫓醉中去千里奔過猶一頃明年隨春到京國紅紫燒空折桃杏獻書又謁蓬萊宫新斸豪曹試鋒穎况遇朝廷方急材驥騄騤騤足當聘山茶花山茶花開春未歸春歸正值花盛時蒼然老樹昔誰種照耀萬朶紅相圍蜂藏鳥伏不得見東風用力先吹嘘追思前者葉蓋地萬木惨惨攅空枝寒梅數綻小顔色霰雪滿眼常相迷豈如此花開此日絳艶獨出凌朝曦為憐勁意侣松栢欲攀更惜長依依山榴淺薄豈足比五月霧雨空芳霏丁亥三月十五日茫茫月色如溪沙萬里不有纎雲遮今年寒氣争春來雪大如掌隨驚雷臨川城中三月雨城東大丘汨為渚天地惨惨無開時常恐蟄死和與羲此時謂月水中没溺入蛙腸那復出豈知今夜月光圓照徹萬物無遺偏人間有人司重輕安得知汝有時明舎弟南源刈稻買田南山下禾黍忽巳秋糟牀待此注豈止衣食謀窮隂廹霜霰不可遲揫收吾黨二三子晨行已寒裘乆苦城中囂至山諒優游况已除險穢新堂置嵓幽窓軒衆峯出階墀水淙流良材未成種草樹亦巳稠寒花開照耀谷鳥樂啾啁心與珍境接佳興固巳遒而况饋朝夕甘美日可搜黄雞肥落俎清酤湛盈甌時鮮鱠氷鯽餘滋折丹溜此味何以侑文辭頗賡酬晝務誠遺滯夜工督舂鍮因觀稼穡勞始覺奉養優此樂詎非幸人生復何求送子固自起往意不可留奉和滁州九詠九首并序先生貶守滁滁小州先生為之殆無事環州多佳山水最有名瑯琊山近得之曰幽谷先生散遊其間又賦詩以樂之鞏得而賡之者凡九章瑯琊泉石篆陽氷絶藝天下稱瑯琊石篆新有名初留泉涯俗誰顧一日貴重繇先生古今書法不可數猶有字本存於經我於八體未曾學雖得此字寧能評高文老筆又所愛欲叙髣髴辭非精筆端應驅鬼神聚筆妙夐與隂陽争刻雕萬象出𡨕昩不見刀斧曽經營奇形挺若聳崖巘險勢直恐生風霆雨來莽蒼蛟龍起秋入寥泬星斗明先生七言載其側為地自與丘山平先生抱材置荒郡有若此字存嵓扄當還先生坐廊廟悉引萬事歸繩衡遂收此字入秘府不使日灼莓苔縈髙材重寳不失一唐舜湯禹寧非明遊瑯琊山飛光洗積雪南山露崔嵬長淮水未緑深塢花巳開逺聞山中泉隱若氷谷摧初誰愛蒼翠排空結樓臺䡾䡾架梁棟輝輝刻瓊瑰先生鸞鳯姿未免燕雀猜飛鳴失其所徘徊此山隈萬事於人身九州一浮埃所要挾道徳不愧丘與回先生逐二子誰能計垠崖所懷雖未寫所適在懽咍為語幕下士殷勤羞甕醅歸雲洞洞逺人言接滄海洞幽晴始見莓苔天下顒顒望霖雨豈知雲入此中來瑯琊溪野草山花夾亂流橋邊旌斾影悠悠即應要地無人見可忍開時不出遊班春亭山亭嘗自絶浮埃山路輝光五馬來春滿人間不知主誰言鑪冶此中開庶子亭瑯琊石泉清照人裏無泥沙表無塵風翻日炙夏潦盡古練一匹常奫淪石屏路石屏不見刀斧痕石下初誰得行徑千騎來時停管絃月明更覺山中静慧覺方丈七言老意蒼松蟠百金古字青霞鐫儒林孟子先生是墨者夷之後代傳幽谷晚飲先生卓難攀材真帝王佐皎皎衆所病蜿蜿龍方卧巻彼天下惠赴此一郡課幕府既多暇山水乃屢過旌旗拂䝉宻車馬驚坎坷愛此谷中泉聲響逺已播槎横勢逾急雨㸃緑新破旁生竹相圍竦竦碧千箇遙源窅難窺盤古坦如磋遊鱗戢可數飛鳥嚶相和援琴薫風後結字寒嵓左觥筵已得月金䊵尚圍坐心如含逍遙語不綴招些一時聳傳觀千載激柔懦甘棠詩之懷峴首淚甞墮况在盛徳下襦袴人所荷不假碑刻垂棟牖敢隳挫當今甲兵後天地合轗軻先生席上珍豈忍溝中餓母徐黑轓召當馳四方賀元豐類藳巻二
