body:
  text: 元豐類藁巻四十宋曾鞏撰祭文五龍堂祈雨文廼四月以旱禱于邪溪薤山應時得雨麥以豐成稻可播種獨異於他境實維其賜今稻田又乾矣此邦之人皆謂龍虎之河五龍之神禱雨輙應余敢不告神其降鑒大施澤于斯民使獲有年則人於報神亦維無斁無俾薤山邪溪專羙于此邦以作神羞靈溪洞祈雨文吏不勝任薦致旱菑禱于山川為黷已甚然稻田日瘁民命所託夙夜憂懼不知所為維爾有神世載靈徳是用靦顏有請忘其慚羞尚其降祥時賜甘雨俾嵗無害維神之休又大悲祈雨文盛夏在辰常暘為沴稻將萎瘁人用嗟憂繇吏治之不明致奸和氣維佛乘之無礙善濟羣生是敢同祓精誠䖍祈覺蔭覬滂沱於膏澤俾浹洽於原田用救焦枯實依慈惠大悲謝雨文民無常心惟安於足食佛有慧力善救於含生比緣盛夏之辰久苦驕陽之沴懼傷稼穡將致㓙飢故仗節之雋良暨守藩之孤陋俱陳精懇䖍對晬容果蒙感答之慈立致霶􅑛之澤滌除害氣勃起良苖變瘁為榮物遂更生之理易憂以喜人諧望嵗之心維是鴻私敢忘昭報尚期降鑒常畀有秋諸廟謝雨文吏之罪大矣一切從事於謹繩墨督賦役而已民之所欲不能與所惡不能去自恕以竊食不知其可愧安能使陰陽和風雨時乎故若鞏者任職於外六年于兹而無嵗不勤於請雨頼天之仁鬼神之靈閔人之窮輙賜甘澤以救大旱吏知其幸而已其為酒醴牲饔以報神之賜曷敢不䖍維神尚終惠之使永有年則神亦無窮有依于人諸廟謝雨文積是驕陽莫救稻苖之悴獲兹嘉霔尚滋秋物之榮是荷靈休敢忘祇報諸寺院謝雨文比以常暘仰祈真蔭果獲滂沱之澤大蘇焦旱之田敢擇佳辰特申嚴謝尚期降祐常畀有秋諸葛武侯廟祈雨文天子以嵗久旱所被者廣分命守臣禱其境内鬼神之有靈徳在于人者維靈有志于民舊矣故敢以告尚其降鑒大施澤于四方以稱天子憂人閔雨之意諸廟祈晴文從渉嵗以來自春徂夏久陰不解積雨已多今麥待燥而成粟待暘而種而雲屯尚密土潤方升民皆竊憂吏用深懼百姓之困甚矣惟神得無念乎尚其開除山川相導岀日俾嵗無害為民之休謝晴文比苦雨淫懼為嵗害蒙神之徳賜以時晹今蠶麥甫成里閭相慶敢不嚴報尚祈終惠諸廟祈雨文諸寺改作敢于真覺伸布䖍誠惟佛至慈與人為歸今嵗之初未愆雨澤然而麥纔薄稔蠶不甚宜則民之窮葢可知矣今兹農望惟在秋成而溫風方騰旱氣彌盛是用側身以懼有禱于神尚其降衷時賜甘霔俾嵗無害亦神有依薤山祈雨文誌言衆山雲起此山無雲終不降雨衆山無雲此山雲起必降大雨是能為雨能為不雨在神而已今嵗數不登而旱氣乂作吏之不良無所逃罪民貧可閔神能為雨而不為是何情哉神其為民岀膚寸之雲致數尺之雨使㓙為穰以救民之急則此邦之人所以報事神者子子孫孫其孰敢怠尚其念之無作神羞諸廟謝雨文比苦亢陽具陳致禱實蒙甘澤敢不昭報洪州謁諸廟文惟神播澤在人廟食兹土鞏守藩之始敢脩禱謁尚祈靈徳常庇斯民神於無窮亦永有賴洪州謁夫子廟文惟神播澤在人廟食兹土鞏守藩之始敢脩禮謁永惟聖徳覆被無窮尚祈聖徳啓寤學者洪州諸寺觀祈晴文佛有大慈速於善應人無常產理則難安惟穡事之將成而淫雨之不止腆然省懼豈敢皇寧葢兹疲癃之民已岀旱災之後室家凋弊閭里愁嗟如復薦飢將焉託命今蚤稼甫畢晚苖方興窪下之田已傷稼穡亢爽之地實懼浸淫是敢䖍對睟容仰陳淨懇伏望廓山川之曀滯囘日月之光華諧此順成湛然澄霽實其慧廕感慰輿情諸觀云道實無方物來斯應民惟難保食足為先䖍對上靈實繄真蔭謹詞諸廟云神實無方物來斯應氏惟難保食足為先䖍對至靈實繄妙蔭謹告諸寺觀廟謝晴文比虞水溢將敗嵗功不自皇寧敢陳懇廹果蒙陰施即俾時暘田里歡呼粢盛有望惟神靈所以賜于人者豈愚足以當之尚冀餘休終成多稼民能自保神則有依祭西山玉龍觀許真君陰功及物靈徳在天緬惟真馭之升實以中秋之序人承餘烈嵗即遺祠故兹守土之微敢體愛民之素俾往陳於薄具尚永庇於羣生仲秋告祭諸廟文嵗在仲秋祀有常典維神邁徳實庇此邦敢率舊章用陳明薦諸寺觀祈雪文窮臘未雪方冬尚溫人有疾癘之憂地無膏澤之潤職在綏撫心焉震慚敢祈膚寸之雲播為盈尺之瑞盪除陰氣順致時寒使閭巷消薦瘥之菑田疇成多稼之利實依孚佑俯徇微誠諸寺觀謝雪文比緣窮臘之期久苦亢陽之沴敢徼靈施仰布愚誠蒙膏澤之應時致祁寒之協序人無疵癘之患物有豐成之祥實賴洪休敢忘昭報更祈密雪尚及餘冬祭順濟王文維爾有神克相王師章示見象皇帝侈神之徳俾錫號位秩尊禮盛非以序升今州遣從事即神之祠致皇帝命尚其欽哉以對休寵福州謁夫子廟文惟夫子之徳仰之彌髙夫子之言窮之益遠學者潛心庶㡬髣髴某守邦之始躬即學宫敢脩禮謁尚其降鑒福州謁諸廟文維神作徳自幽信于兹土人用報事秩祭有常鞏甫此守邦敢修禮謁尚其降福終賚斯民福州鱔溪禱雨文嗟乎旱也誰則為之芃芃之稼將槁而萎嗷嗷之衆曷望而依維閩屬者㓂賊之罹逮其既附我士已疲餘醜成羣百十睢睢跳踉岀没負力乘巇亦有為渠諸偷所推相望棊布未受􅎗羈室家莫寧遠近並疑我畜以柔亦震以威從有法賞不從係纍或擾而序或就纆徽逮嵗朔易盪定無遺山林夜行笑語追隨吾人即安含糗而嬉士馬亦奮桓桓騤騤天子聖徳海邦是綏維此海邦初亦難一作艱飢今寧宇矣師征始歸今食足矣廩實尚微若嵗大熟如梁如茨如京如坁自公及私獄無訟繫里無盗闚式于來世方始在兹今此大田既碩而齊俾不卒成孰忍為斯神有靈蹟國人所祗神有顯號天子所躋萎能起之槁能澤之胡寧有餘斂而不施我用卜日蚤駕以馳即告潭側尚其聴之攘除驕陽騰雲彍霓播為甘液霈洒淋漓俾農有秋百物是宜熄偷與爭長置刑笞人於報事豈有斁思諸廟禱雨文常暘為沴將害農功夙夜懷憂不皇啓處敢徼靈貺時賜膏澤俾人獲濟惟神亦永有依謝雨文維閩之人前嵗苦飢去嵗苦盗足食而安期自今始而方夏旱暵懼害穡事兹余用稽于衆葢可以徼福於民者罔不馳告不敢愛力不敢寧居賴神之仁畀以膏澤自未至酉遠近周浹維嵗大熟可立而需敢飭豆籩報用典禮吏無明徳而但知告其困急於神神既賜之其尚終惠題禱雨文後福州元豐元年戊午自四月甲子至五月辛巳凡十有八日不雨田已憂旱太守率屬吏士分禱諸佛祠迎像能致雨者陳之通路用浮圖法為道場率屬吏士羅拜以請丁亥夜五鼓岀禱鱔溪屬吏士分禱羣望己丑率屬吏士蔬食夜四鼔就城南近水祭告后土將為壇祭龍庚寅蔬食如己丑夜三更就壇壝刲鵝祭龍辛卯夜五鼔就視牲血以法推之當得雨壬辰就紫極宫壇用青童二十有八人更咒蜥蜴如古法癸巳分禱諸祠未徧者取黄蘖山龍潭水置道場率屬吏士徃請甲午又往乙未夜二更得雨連三日夜遠近皆有餘葢自辛巳至丙申凡十有六日無日不致禱自丙戌至甲午四境多得雨至丁酉乃皆有餘是日罷道場還所迎像及水蜥蜴南澗之濵庚子遍祭謝欲知閩粤之間兼旬不雨則巳憂旱而請禱之為不誣也故刻其祝辭於石而并識之明州脩城祭土神文州有帝命繕治城墉得日之良肅工始事斯人允頼維爾土神尚其降休敢不以告亳州謁諸廟文維此譙郡年嵗順而風俗厚者雖人之力實神之助鞏獲守此土敢薦尊爵與人為福實待神休亳州謁夫子廟文維人之生尊卑長㓜知有其序悖于理者知有所畏何以致然實自夫子鞏長人於此敢不嚴事是用寅薦罇爵式遵典禮元豐類藁巻四十
