body:
  text: 元豐類藁巻三十宋曽鞏撰劄子移滄洲過闕上殿劄子臣聞基厚者勢崇力大者任重故功徳之殊垂光錫􅍈舄奕繁衍久而彌昌者盖天人之理必至之符然生民以來能躋登兹者未有如大宋之隆也夫禹之績大矣而其孫太康乃墜厥緒湯之烈盛矣而其孫太甲既立不明周自后稷十有五世至於文王而大統未集武王成王始收太平之功而康王之子昭王難於南狩昭王之子穆王殆於荒服暨於幽厲陵夷盡矣及秦以累世之智并天下然二世而亡漢定其亂而諸吕七國之禍相尋以起建武中興然冲質以後世故多矣魏之患天下為三晋宋之患天下為南北隋文始一海内然傳子而失唐之治在於貞觀開元之際而女禍世出天寶以還綱紀微矣至於五代盖五十有六年而更八姓十有四君其廢興之故甚矣宋興太祖皇帝為民去大殘致更生兵不再試而粤蜀吳楚五國之君生致闕下九州來同復禹之跡内輯師旅而齊以節制外卑藩服而納以䋲墨所以安百姓禦四夷綱理萬事之具雖創始經營而彌綸已悉莫貴於為天子莫富於有天下而舍子傳弟為萬世策造邦受命之勤為帝太祖功未有高焉者也太宗皇帝遹求厥寧既定晋疆錢俶自歸作則乗憲克紹克類保世靖民丕丕之烈為帝太宗未有高焉者也真宗皇帝繼統遵業以涵煦生飬蕃息齊民以並容徧覆擾服異類盖自天寶之末宇内板蕩及真人出天下平而西北之兵猶間入闚邉至於景徳一百五十餘年契丹始講和好徳明亦受約束而天下銷鋒灌燧無雞鳴犬吠之驚一作警以迄於今故於是時遂封㤗山禪社首薦告功徳以明示萬世不祧之廟所以為帝者宗仁宗皇帝寛仁慈恕虚心納諫慎注措謹䂓矩早朝晏退無一日之懈在位日乆明於羣臣之賢不肖忠邪選用政事之臣委任責成然公聽並觀以周知其情偽其用舍之際一稽於衆故任事者亦皆警懼否輒罷免世以謂得馭臣之體春秋未高援立有徳傳付惟允故傳天下之日不陳一兵不宿一士以戒非常而上下晏然殆古所未有其豈弟之行足以附衆者非家施而人恱之也積之以誠心民皆有父之尊有母之親故棄羣臣之日天下聞之路祭巷哭人人感動歔欷其得人之深未有知其所繇然者故皇祖之廟為宋仁宗英宗皇帝聰明睿智言動以禮上帝眷相天命所集而稱疾遜避至於累月自踐東朝淵黙㳟慎無所言議施為而天下傳頌稱說徳號彰聞及正南靣勤勞庶政毎延見三事省决萬幾必咨詢舊章考求古義聞者惕然皆知其志在有為雖早遺天下成功盛烈未及宣究而明識大畧足以克配前人之休故皇考之廟為宋英宗陛下神聖文武可謂有不世出之姿仁孝恭儉可謂有君人之大徳憫自晩周秦漢以來世主率皆不能獨見於衆人之表其政治所出大抵踵襲卑近因於世俗而巳於是慨然以上追唐虞三代荒絶之跡修列先王法度之政為其任在已可謂有出於數千載之大志變易因循號令必信使海内觀聴莫不奮起羣下遵職以後為羞可謂有能行之效今斟酌損益革敝興壊制作法度之事日以大備非因陋就寡拘牽常見之世所能及也繼一祖四宗之緒推而大之可謂至矣盖前世或不能附其民者刑與賦役之政暴也宋興以來所用者鞭扑之刑然猶詳審反復至於緩既縱之誅重誤入之辟盖未甞用一暴刑也田或二十而稅一然嵗時省察數議寛减之宜下蠲除之令盖未甞加一暴賦也民或老死不知力疲然猶憂憐惻怛常謹復除之科急擅興之禁盖未甞興一暴役也所以拊民者如此前世或失其操柄者天下之勢或在於外戚或在於近習或在於大臣宋興以來戚里宦臣曰將曰相未甞得以擅事也所以謹其操柄者如此而况輯師旅於内天下不得私尺兵一卒之用卑藩服於外天下不得專尺土一民之力其自處之勢如此至於畏天事神仁民愛物之際未甞有須臾懈也其憂勞者又如此盖不能附其民而至於失其操柄又怠且忽此前世之所以危且亂也民附於下操柄謹於上處勢甚便而加之以憂勞此今之所以治安也故人主之尊意諭色授而六服震動言傳號渙而萬里奔走山巖窟穴之氓不待期㑹而時輸嵗送以供其職者惟恐在後航浮索引之國非有發召而籝齎槖負以致其贄者惟恐不及西北之戎投弓縱馬相與袛服而戲豫東南之夷正冠束衽相與挾冊而吟誦至於六府順敘百嘉鬯遂凡在天地之内含氣之屬皆裕如也盖逺莫懿於三代近莫盛於漢唐然或四三年或一二世而天下之變不可勝道也豈有若今五世六聖百有二十餘年自通邑大都至於荒陬海聚無變容動色之慮萌於其心無援枹擊柝之戒接於耳目臣故曰生民以來未有如大宋之隆也竊觀於詩其在風雅陳太王王季文王致王迹之所由與武王之所以繼代而成王之興則美有假樂鳧鷖戒有公劉泂酌其所言者盖農夫女工築室治田師旅祭祀飲尸受福委曲之常務至於兎罝之武夫行修於隠牛羊之牧人愛及㣲物無不稱紀所以論功徳者由小以及大其詳如此後嗣所以昭先人之功當世之臣子所以歸美其上非徒薦告鬼神覺寤黎庶而已也書稱勸之以九歌俾勿壊盖歌其善者所以興其嚮慕興起之意防其怠廢難久之情養之於聼而成之於心其於勸帝者之功美昭法戒於將來聖人之所以列之於經􅂷為世教也今大宋祖宗興造功業猶太王王季文王陛下承之以徳猶武王成王而羣臣之於考次論撰列之簡册被之金石以通神明昭法戒者闕而不圖此學士大夫之過也盖周之徳盛於文武而雅頌之作皆在成王之世今以時考之則祖宗神靈固有待於陛下臣誠不自揆輒冐言其大體至於尋類取稱本隱以之顯使莫不究悉則今文學之臣充於列位惟陛下之所使至若周之積仁累善至成王周公為最盛之時而泂酌言皇天親有徳饗有道所以為成王之戒盖履極盛之勢而動之以戒懼者明之至智之盡也如此者非周獨然唐虞至治之極也其君臣相飭曰兢兢業業一日二日萬幾則處至治之極而保之以祗慎唐周之所圖也今陛下履祖宗之基廣太平之祚而世世治安三代所不及則宋興以來全盛之時實在今日陛下仰探皇天所以親有徳饗有道之意而奉之寅畏俯念一日二日萬幾之不可以不察而處之以兢兢使休光美實日新嵗盛益閎逺崇侈循之無窮至千萬世永有法則此陛下之素所蓄積臣愚區區愛君之心誠不自揆欲以庶幾詩人之義也惟陛下之所擇請令長貳自舉屬官劄子臣伏以陛下本原周禮參之以有唐六典之書考諸當世之宜裁以聖慮更定官制以幸天下臣誠不自揆欲少助萬一令無足取者亦足以致區區愛君之心竊觀於書其在堯典稱堯之徳曰平章百姓百姓昭明則于其賢不肖功罪之分而章之以爵賞使百官莫不昭明者此人主之事也其在說命曰惟說式克欽承旁招俊乂列於庶位則承人主之志廣引人材進諸朝廷者此宰相之事也其在冏命穆王命伯冏為周太僕正其戒之曰慎簡乃僚無以巧言令色便僻側媚其惟吉士則使得自簡屬僚以共成其任者此諸司長官之事也其上下之體相承如此所以周天下之務盖先王之成法也故陸贄相唐陳致理之具以謂有司之長至於副貳之官與夫兩省供奉之職請諉宰臣叙擬以聞其餘臺省屬僚請委長官選擇指陳材實終身保任其以舉授之繇各載除書之内得賢則有進考増秩褒升之賞失實則有奪俸贖金黜免之罰非特搜揚下位而已亦以閱試大官其所取之士既責行能亦計資望此䞇之大指也䞇於經畫之材近世未見其比其在相位所陳先務如此質之於古實應先王之法施之後世可以推行誠古今之通議也陛下隆至道開大明配天地立人極循名定位以董正治官千載以來盛徳之事也創制之始新命之官任之以彌綸衆職所繫尤重其所更革著於甲令或差若毫髪四方受其敝或誤於須臾累嵗不能救則於選用之體尤不可假非其人且䑓省長官僕射尚書左右丞侍郎御史中丞皆國之重任陛下所選擇而授今尚書既領天下之事郎員外郎凡二十四司用吏幾百員其餘屬佐尚不在數中若使本司長貳之官自郎以下員有未備皆舉二人以聞以陛下之明其於羣臣材分無不周知取其所舉擇用其一其餘書之於籍以為内外之官選用之備庶幾為官得人足以上副陛下作則垂憲非常之大志且本朝著例御史中丞知雜至於省府之長固得自舉其屬而舘閣監司牧守之官亦甞屢詔近位皆得薦用所知名臣偉人徃徃由此而出則推而廣之求於故事實有巳試之効其所薦之士采用其一其餘書之於籍以備選擇猶舊闕御史一員聴舉二人其一不中選者亦以次甄進則稽諸累朝亦故事也伏惟陛下本周命太僕慎簡乃僚之意采陸䞇䑓省長官舉吏懇懇之論推本朝巳試之法使先王之迹自陛下追而踐之如此則任衆之道隆進賢之路廣踈逺之士懐材者皆得彚征要近之臣奬善者皆得自逹以陛下之臨照誰敢不應之以公以陛下之考覈誰敢不赴之以實既得其人授之以位然後陛下以公聴並觀分別淑慝以執中主要信行其賞罰如此則允釐百工庶績咸熈可無為而致堯之平章百姓百姓昭明如是而已如臣之說為可采者其推行之法陸贄所陳惟陛下察其踈宻詳加損益取進止元豐六年十一月二十一日垂拱殿進呈請令州縣特舉士劄子臣聞三代之道鄉里有學士之秀者自鄉升諸司徒自司徒升諸學大樂正論其秀者升諸司馬司馬論其賢者以告於王論定然後官之任官然後爵之位定然後禄之論定然後官之者鄭康成云謂使試守任官然後爵之者盖試守而能任其官然後命之以位也其取士詳如此然此特於王畿之内論其鄉之秀士耳故在周禮則稱鄉老獻賢能之書於王也至於諸侯貢士則有一適再適三適之賞黜爵削地之罰而其法之詳莫得而考此三代之事也漢興來董生之議始令郡國舉孝亷一人其後又以口為率口百二十萬至不滿十萬自一嵗至三嵗自六人至一人察舉各有差至用丞相公孫𢎞太常孔臧議則又置太常博士弟子員郡國縣官有好文學孝弟謹順出入無悖者所聞令相長丞上屬所二千石二千石謹察可者令詣太常受業如弟子一嵗皆課試通一藝以上補文學掌故缺其高第其可為郎中者太常籍奏即有秀才異等輒以名聞又請以治禮掌故比二百石及百石吏選擇為左右内史大行下郡太守卒史皆各二人邉郡一人不足擇掌故以補中二千石屬文學掌故補郡屬備員其郡國貢士太常試選之法詳矣此漢之事也今陛下隆至徳昭大道參天地本人倫興學崇化以風天下唐虞用心何以加此然患今之學校非先王教養之法今之科舉非先王選士之則聖意卓然自三代以後當塗之君未有能及此者也臣以謂三代學校勸教之具漢氏郡國太常察舉之目揆今之宜理可參用今州郡京師有學同於三代而教養選舉非先王之法者豈不以其遺素厲之實行課無用之空文非陛下隆世教育人材之本意歟誠令州縣有好文學厲名節孝悌謹順出入無悖者所聞令佐升諸州學州謹察其可者上太學以州大小為嵗及人數之差太學一嵗謹察其可者上禮部禮部謹察其可者籍奏自州學至禮部皆取課試通一藝以上御試與否取自聖裁今既正三省諸寺之任其都事主事掌故之屬舊品不卑宜清其選更用士人以應古義遂取禮部所選之士中第或高第者以次使試守滿再嵗或三嵗選擇以為州屬及縣令丞即有秀才異等皆以名聞不拘此制如此者謂之特舉其課試不用糊名謄録之法使之通一藝以上者非獨采用漢制而已周禮大司徒以鄉三物教萬民而賓興之亦以禮樂射御書數也如臣之議為可取者其教養選用之意願降明詔以諭之得人失士之效當信賞罰以厲之以陛下之所嚮孰敢不䖍於奉承以陛下之至明孰敢不公於考擇行之以漸循之以久如是而俗化不美人材不盛官守不修政事不舉者未之聞也其舊制科舉以習者既久難一日廢之請且如故事惟貢舉踈數一以特舉為凖而入官試守選用之敘皆出特舉之中至夫教化已洽風俗既成之後則一切罷之如聖意以謂可行其立法彌綸之詳願詔有司而定議焉取進止元豐三年十一月二十一日垂拱殿進呈請西北擇將東南益兵臣聞古者兵出於農故三時耕稼一時閱武其於四時蒐田則又率之從事然則農之用力於兵以少言之嵗當兩月計其大槩則今之專力之兵一當古之兼農之兵六先王之制天子六軍大國三軍次國二軍小國一軍軍萬二千五百人其餘夫以為羡卒周有天下諸侯之國千有八百以中數之通有兵二萬五千為兵四千五百萬而羡卒未在其數以今之兵一當其六今有兵百萬為八十倍少於古以跡言之其專力兼農之人固異以多少言之其用人之力費人之財今可謂省矣古者兵出於農故干戈車乗馬牛亦皆取具而國無預焉今兵出於國故干戈車乗馬牛亦皆取具而民無預焉此今之兵又於民為便者也秦既開阡陌而亦兵出於民其干戈屢動則至於發閭左之戍漢魏而下亦皆以民為兵其轉徙殺戮之禍甞甚矣至於後周隋唐修列府衛而兵復近古天寶以後彍騎立而募兵之法行自是之後綱紀失序天子之勢屈於方鎮之兵方鎮之勢屈於所部之兵至其甚也將之廢置出於兵至於五代而國之廢置出於兵兵之禍天下未有甚於此也宋興撥亂世反之正太祖外削藩服而歸之軌道内操師旅而束以法制天下之惡子非鰌之以刑而自列於行伍非敺之以暴而自就於䋲墨以鎮城邑以戍疆塲非獨為朝廷之用其於天下之良民得以樂職而安業者實頼其力況又其費少於古其便多於民近世以來制兵之善未有及此者也陛下出衆慮之表起百職之廢其於常武尤屬聖心今連營之士訓練精銳武庫之兵繕治工巧殆古所未有臣誠不自揆計今之事竊以謂西北之宜當擇將率東南之備當益戍兵庶幾上副陛下威夷狄守四方不世出之大志何以言之昔太祖之世其捍北狄則用李漢超於關南馬仁瑀於瀛州韓令坤於常山賀惟忠於易州何繼筠於棣州其禦太原則用郭進於西山李謙溥於隰州李繼勲於昭義其備西戎則用姚内斌於慶州董遵誨於環州王彦昇於原州馮繼業於靈州大抵如内斌遵誨之兵率不過五六千人皆責之以自守其地今士之精銳兵之工巧無以復加矣在乎得人屬之統督之寄而已故臣以謂西北之宜當擇將率付之一州一路任之以戰守之責陛下明考覈信賞罰以馭之而巳以此制勝則何求而不得也臣又竊以古者百里之地為千乗之國有兵三萬七千五百人今州小者非特百里而巳士徒之衆雖不必盡如古制然今東南之隅地方萬里有山海江湖險絶之勢溪洞林麓深僻之虞而此諸路之兵不過數千人而已其於防邏常患不足萬一有追胥討捕之事理必乏人向者邕州之不守盖患於救援之不繼至於廖恩之䑕竊而能稽誅於時月者盖由追討之兵不足恩巳自歸而所遣北兵猶在道路則東南之寡弱盖可知也以陛下之明綱理天下無所不備其於東南之兵計今之宜雖不必如古者千乗之法然稍増兵屯使緩急足用以銷奸萌除患於未然亦治體之所宜及臣故以謂東南之備當益戍兵區區憂國之心惟陛下之所裁擇取進止元豐三年十一月二十一日垂拱殿進呈議經費臣聞古者以三十年之通制國用使有九年之蓄而制國用者必於嵗杪盖量入而為出國之所不可儉者祭祀也然不過用數之仂則先王飬財之意可知矣盖用之有節則天下雖貧其富易致也漢唐之始天下之用甞屈矣文帝太宗能用財有節故公私有餘所謂天下雖貧其富易致也用之無節則天下雖富其貧亦易致也漢唐之盛時天下之用常裕矣武帝明皇不能節以制度故公私耗竭所謂天下雖富其貧亦易致也宋興承五代之敝六聖相繼與民休息故生齒既庶而財用有餘且以景徳皇祐治平校之景徳户七百三十萬懇田一百七十萬頃皇祐户一千九十萬墾田二百二十五萬頃治平户一千二百九十萬墾田四百三億萬以上景徳官一萬餘員皇祐二萬餘員治平并幕職州縣官三千三百餘員總二萬四千員景徳郊費六百萬皇祐一千二百萬治平一千三百萬以二者校之官之衆一倍於景徳郊之費亦一倍於景徳官之數不同如此則皇祐治平入官之門多於景徳也則皇祐治平用財之端多於景徳也誠詔有司按尋載籍而講求其故使官之數入者之多門可考而知郊之費用財之多端可考而知然後各議其可罷者罷之可損者損之使天下之人如皇祐治平之盛而天下之用官之數郊之費皆同於景徳二者所省者葢半矣則又以類而推之天下之費有約於舊而浮於今者有約於今而浮於舊者其浮者必求其所以浮之自而杜之其約者必本其所以約之由而從之如是而力行以嵗入一億萬以上計之所省者十之一則嵗有餘財一萬萬馴致不巳至於所省者十之三則嵗有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄自古國家之富未有及此也古者言九年之蓄者計每嵗之入存十之三耳盖約而言之也今臣之所陳亦約而言之今其數不能盡同然要其大致必不逺也前世於彫敝之時猶能易貧而為富今吾以全盛之勢用財有節其所省者一則吾之一也其所省者二則吾之二也前世之所難吾之所易可不論而知也伏惟陛下冲靜質約天性自然乗輿器服尚方所造未甞用一竒巧嬪嫱左右掖廷之間位號多闕躬履節儉為天下先所以憂憫元元更張庶事之意誠至惻怛格於上下其於明法度以養天下之財又非陛下之所難也臣誠不自揆敢獻其區區之愚惟陛下裁擇取進止元豐三年十一月二十一日垂拱殿進呈請减五路城堡臣甞議今之兵以謂西北之宜在擇將帥東南之備在益戍兵臣之妄意盖謂西北之兵已多東南之兵不足也待罪三班修定陜西河東城堡之賞法因得考於載籍盖秦鳯鄜延涇原環慶并代五路嘉祐之間城堡一百一十有二熈寧二百一十有二元豐二百七十有四熈寧較於嘉祐為一倍元豐較於嘉祐為再倍而熈河城堡又三十有一雖故有之城始籍在於三班者或在此數然以再倍言之新立之城固多矣夫將之於兵猶奕之於棋善奕者置棋雖踈取數必多得其要而巳故敵雖萬變塗雖百出而形勢足以相援攻守足以相赴所保者必其地也非特如此所應者又合其變故用力少而得筭多也不善變者置棋雖宻取數必寡不得其要而巳故敵有他變塗有他出而形勢不得相援攻守不能相赴所保者非必其地也非特如此所應者又不能合其變故用力多而得筭少也守邉之臣知其要者所保者必其地故立城不多則兵不分兵不分則用士少所應者又能合其變故用力少而得筭多猶之善奕也不得其要者所保非必其地故立城必多立城多則兵分兵分則用士衆所應者又不能合其變故用力多而得筭少猶之不善奕也昔張仁愿度河築三受降城相去各四百餘里首尾相應繇是朔方以安减鎮兵數萬此則能得其要立城雖踈所保者必其地也仁愿之建三城皆不為守備曰㓂至當併力出戰回顧望城猶須斬之何用守備自是突厥遂不敢度山可謂所應者合其變也今五路新立之城十數嵗中至於再倍則兵安得不分士安得不衆殆疆塲之吏謀利害者不得其要也以奕棋况之則城不必多臣言不為無據也以他路况之則北邉之備胡以遵誓約之故數十年間不増一城一堡而不患戍守之不足則立城不必多又巳事之明驗也臣以此竊意城多則兵分故謂西北之兵已多而殆恐守邉之臣未有稱其任者守邉之臣遇陛下之明常受成筭以從事又不敢不奉法令幸可備驅䇿然出萬全之畫常諉於上人臣之於職苟簡而巳固非體理之所當然况繇其所保者未得其要所應者未合其變顧使西北之兵獨多而東南不足在陛下之時方欲事無不當其理官無不稱其任則因其舊而不變必非聖意之所取也夫公選天下之材而屬之以三軍之任以陛下之明聖慮之緒餘足以周此臣厯觀世主知人善任使未有如宋興太祖之用將英偉特出者也故能撥唐季五代數百年之亂使天下大定四夷軌道可謂千嵗已來不世出之盛美非常材之君拘牽常見者之所能及也以陛下之聰明睿聖有非常之大畧同符太祖則能任天下之材以定亂莫如太祖能繼太祖之志以經武莫如陛下臣誠不自揆得太祖任將之一二竊甞見於斯文敢繕寫以獻萬分之一或有以上當天心使西北守邉之臣用衆少而得筭多不益兵而東南之備足有助聖慮之纎芥以終臣前日之議惟陛下之所裁擇任將篇見本朝政要䇿貼黄五路城堡據逐次降下三班院窠名數目如此竊恐係舊來城堡自來屬樞密院差遣後來逐度方降到窠名係三班院差人所以逐度數目加多若雖是舊來城堡即五路二百七十餘城亦是立城太多元豐類藁巻三十
