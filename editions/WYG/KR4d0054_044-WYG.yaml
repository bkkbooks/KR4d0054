body:
  text: 元豐類藁巻四十四宋曽鞏撰誌銘殿中丞致仕王君墓誌銘君諱某字某其先琅邪人嘗徙家于蜀至君之考又徙家于揚故今為揚之江都人曾祖諱錫祖諱得中為真定府獲鹿縣令贈尚書刑部侍郎考諱汝能為尚書都官郎中贈尚書工部侍郎君少以父仕為太廟齋郎養其父不忍一日去左右至卒喪年已四十餘始出為南劒州司户參軍歴監劒州銀銅場和州司户參軍用薦者監頴州税去為越州山隂縣尉滑峒錄事參軍隨州唐城縣令其為銀銅場治者復業而嵗課大溢為尉能發奸偷為錄事能治獄不撓為令能有惠愛於人其試於事者如此其為人居家孝友遇人和易質厚不為聰明機巧以譁世動俗故知之者少而君亦自若也至年七十遂上書還政遷太子中舍今上即位恩遷殿中丞賜緋衣銀魚卒於熙寧五年之五月甲辰年七十有七以其年十月乙酉𦵏于江都之東興寧鄉馬坊里以其配永嘉縣君周氏祔有子二人曰幾大理寺丞曰深潤州丹徒縣主簿皆有文行能世其家有女一人嫁陸氏有孫男二人孫女二人尚幼也寺丞娶余之仲妹以書來乞君之墓銘余不能辭也銘曰養心以和動已以直不為世巧安於自得顯不在躬實詒爾子欲鴻厥聲勒銘於此贈大理寺丞致仕杜君墓誌銘君姓杜氏澶州濮陽人卒於皇祐元年十月庚申𦵏於熙寧八年十月丁酉其墓在濮陽縣桂技里之欒村以夫人僊居縣太君潘氏祔君曾王考佑王考延嗣考珣子男三人曰言曰宗諌皆蚤世曰宗誨殿中丞女二人嫁馬氏欒氏孫男二人曰良輔餘未名也君諱瑩字徳温贈大理評事又贈大理寺丞為人孝友温良以清静為學而以淡泊自足行修於家而譽聞於鄉其自得者夀考見於身其有餘者流澤見於後故其年至於八十而有子能大其門言理之士以此多君也宗誨為人質厚恬夷世俗之所為有不為者余為襄陽宗誨實僉書節度判官公事愛其所守而知其有所受也其以君之銘乞於余故不辭銘曰有以養其内克遐者壽有以行於遠克昌者後帝原厥初追錫命書余與此銘賁于幽胡君墓誌銘君名敏生於天僖之戊午卒時皇祐之辛夘也既卒之明年𦵏於其所家撫州金谿縣之東某里某原字某姓胡氏父名晏教君學已為之求師又為之求四方善人君子與之接致其力不敢懈至於老以死不敢變君亦能奉其意故君之為進士其强學其廣記其博問其能文辭於其業可以謂之修其事親其居家與人遊不見其缺虧其約其質其不苟其寡言於其行可以謂之修夫積其勤以至於業之修而止薦於鄉積其謹以至於行之修而不克顯於世此世之所以哀君也然君有可以慰其親而不疚於其内比於得其欲富貴於一時而有愧於其心者其得失何如固易知也母某氏妻某氏子某弟某君嘗學於余也故銘之銘曰慰其親學也勤短而屯塞不伸震無垠琢斯珉光祿寺丞通判太平州呉君墓誌銘龍圖閣直學士給事中呉仲庶具書載其子業官世行治屬余曰吾子某不克夀不得見其志幸得名信後世則某其不泯泯尚足以慰吾思也余為之述曰維呉氏以文學直道繼有顯人其家子晩出並茂亦多以材能見於世君居其間孝友篤學有大志未見其止其不幸蚤死故君既自重無所試而其家葢識君之事亦略也君以父任守將作監主簿今上即位恩遷太常寺奉禮郎是嵗進士及第僉書廣濟軍判官公事上書言時事有人之所難言者部多盜君請取酒場羡錢益賞購轉運使難其言君以聞詔用君議盜以衰息君以母濟陽郡君蔡氏憂去官服除遷光祿寺丞通判太平州州賴以治行部中視河還不入其家將行廣濟圩度姑熟溪橋壊以水死年三十有三熙寧八年四月某甲子也朝廷聞而官其一子君娶陳氏尚書職方員外郎亢之女前君一年死子曰塤郊社齋郎曰圻未仕女一人始五嵗君初名秉禮字子鈞其先興國軍某人曽祖考某祖考某贈户部尚書仲庶名中復以君卒之二年正月某甲子𦵏君南康軍都昌縣沐浴保之龍回山以陳氏祔銘曰家紀其行官紀其能収科于少是紹是承維曰未試方勃而起云胡不遐一跌而逝命則誰為昧不可稽畀爾萬年式諗以辭殿中丞監揚州税徐君墓誌銘唐之亡彊者分其地為國以十數楊行密有淮南稱呉海州人徐溫為呉將有功行密死三子相次立温用事貴顯温死其養子知誥遂代楊氏盡有江淮之地稱唐去温所與為姓名者姓李氏名昪温已子知諫事昪為將死昪追以為中書令臨淄王知諫子遜事昪子璟為中書侍郎上饒郡公遜子徐君事璟子煜為其秘書郎賜緋魚袋宋既受命平天下俘李氏以歸徐君亦隨之京師得為太常寺大祝不樂棄官歸江南久之為殿中丞監楊州税以死子天錫為秘書丞亦死女四人其第二女與季皆嫁吕氏徐君死祥符間後四十餘年嫁吕氏女有子倚始𦵏徐君與徐君之母李氏妻陸氏於楊州之某原方徐氏之先與楊氏俱起東南收其土地而有之遭行宻子弱徐氏實任其國至昪遂代呉而徐氏子孫亦皆據士民之上有王公之勢於其一時富貴之際豈非盛哉百年之後其世凌遲至於徐君遂死而無以𦵏𦵏於異姓之孫盛衰之變何其速也然自前世無不皆若此富貴之不可以久恃亦何必異也而世之不安其命者方枉義挈挈以覬幸其偶得之者又惴惴恐失之是真可以常處也哉初東南之地既入於有司天子憐士民許皆復田其故所有地徐君之地為尤多多不取有冐徐君之地以賣之者亦不問是以其貧甚而徐君獨自得徐君諱元榆字僊材好學善屬文吏部賈黄中嘗試其書判曰元白不足多也尤能詩詩數百篇號南歸集大扺多慨其不得志徐君之所以自見也嫁吕氏女之夫名某憐徐君之死無以𦵏死以屬其子倚倚貧甚能自力卒𦵏徐君而就其父志銘曰富吾不争可謂既好之貧吾不懟可謂又安之諧歸此丘女子之為永昭厥聲維此銘詩永州軍事推官孫君墓誌銘黟縣之孫氏有起進士為尚書工部郎中廣南西路轉運使以卒者諱杭以文學見於世其𦵏在黟之上林有子亦起進士為永州推官以卒卒時年二十有八者諱適亦以文學見稱𦵏在其父之左將𦵏其弟邈以告而乞銘於南豐曽鞏其序曰孫氏世家富春唐有徙歙之黟縣者諱師睦始自别為黟縣之孫氏師睦生延緒延緒生旦旦生遂良以子恩為尚書職方員外郎職方生工部工部實生君君年十有四辭親學問江東已有聞於人往從臨川王安石受學安石稱之後主越州上虞簿去以父恩得永州父卒萬里致喪疾不忍廢事既𦵏㩦扶幼老将就食淮南疾益革遂卒於池州大安鎮實至和二年始工部為御史不合而出及使南方仆且起遽卒君尤自力學行謂藴必發其在君又止此君於學問好其治亂得失之説不狃近卑於為文以古為歸不夸以浮雖素羸不廢書雖進不㤀以止既肆而通矣而不得極其志其銘曰孫世來黟拔身艱故為世聞家始自工部工部孰有有書百篇永州之學自其父傳其果以力其敏以明内有其質外以華英再以不就其後當侈君不有子君多兄弟尚書都官員外郎王公墓誌銘王氏其先太原人世久遷徙而今家撫州之臨川公諱益字舜良曽祖諱某不仕祖諱某以子故贈尚書職方員外郎考諱某以公故即其家拜衛尉寺丞公祥符八年舉進士及第初為建安主簿時尚少縣人頗易之及觀公所為乃皆大畏服其督賦税未嘗急貧民或有所笞罰唯豪劇吏耳以故建安人尤愛之嘗病闔縣為祠禱改臨江軍判官軍多諸豪大姓之家以財力自肆而二千石亦有所挾為不法吏乘其然乾没無所忌公至以義折正二千石使不能有所縱以明憚吏使不敢動摇居頃之部中肅然諸豪大吏見公皆側目而視至以鄙言目公曰是不可欺也卒不得已以他計出公領新淦縣縣以治聞去改大理寺丞知廬陵縣又改殿中丞知新繁縣縣有宿奸數人公既繩以法其餘一以恩信遇之嘗踰月不笞一人知韶州改太常博士尚書屯田員外郎嶺以南素習於夷無男女之别日浸月滋為吏者師耳目謂俗止如此凡姦事雖得有可已者皆不究公曰夫所謂因其俗豈謂是耶居郡求姦事最急苟有萌蘖一切擿發窮治之屬縣翁源多虎公教捕之令欲媚公言虎自死者五輿之致州為頌以獻公使歸之曰政在徳不在異州有屯兵五百人代者久不至欲謀為變事覺一郡皆駭公不為動獨取其首五人即日斷流之或請以付獄公不聴既而聞其徒曰若五人者繫獄當夜刼之然後衆乃服韶居南方雖小州然獄訟最多號難治公既以才能治之有餘遂以無事又因民之暇時為之理營驛表坊市道巷使皆可以久逺為後利歸丁衛尉府君憂服除通判江寧府改都官員外郎二千石常以事倚公公亦為之盡寳元元年二月二十三日以疾卒於官享年四十六母謝氏封永安縣君娶徐氏又娶呉氏封長夀縣君子男七人曰安仁曰安道曰安石曰安國曰安世曰安禮曰安上女一人嫁張氏處者三人安石今為大理評事知鄞縣慶歴七年十一月上書乞告𦵏公明年某月詔曰可遂以某月某日與其昆弟奉公之喪𦵏江寧府之某縣某處吾嘗聞鄉里長老言公為人倜儻有大志在外當事輒可否矯矯不可撓及退歸其家歛色下氣致孝於父母致愛於族人之間委曲順承一以恩自克位不滿其意故在外之所施用者見於小而已今吾所書是也其大可知則家行最篤已先人嘗從公遊其言亦然而吾又與安石友故得知公事㝡詳其將𦵏也使者以安石之述與書來請銘遂為之銘其尤可哀者也公堂有母老不覺哀公庭有子仁孝而才世所可喜公兩棄之莫不皆死公有餘悲衛尉寺丞致仕金君墓誌銘今上皇祐二年祀明堂推恩羣臣祕書丞金君得以其父為大理評事致仕五年郊金君為太常博士又得以其父為衛尉寺丞惟衛尉府君諱某字温叟浮梁人初君之考贈大理評事諱某有三子伯曰鼎臣為某軍節度掌書記仲曰汝臣為太常博士季即君兄弟俱舉進士書記與仲既起家君因不復肯就舉曰吾兄弟不可俱去吾親也後三十餘年卒以有子為丞云君有四子曰君著曰君佐曰君卿博士也曰君佑兄弟又皆舉進士博士既有名秩于朝三子皆復養於家葢其父子兄弟之出處如此何其相似也當是時宋興已百年博士方以材自起於賤貧欲以其所為為天下慨然有志者也君獨自得於大山長谷之間日從子孫來四方之客與夫鄉人之老詩書樽席之側嘯歌息偃以㤀其年隤然遂其志者也遭天子既宗祀明堂顧朝士大夫皆褒崇其親欲以風示天下命書寵章降於其家顯榮一時夀考康寧有孫有曽以承以翼何其祥也君為人簡易無町畦能事父兄衣食奉養自與者嘗取其薄嘗有盜其牛羊巳又盜其所乘馬者君知之皆不校盜卒自悔以伏葢君之質與其恕又有足多者如是也生於淳化之庚寅卒於嘉祐之丁酉遺命三月而𦵏從薄遂以其年十二月四日𦵏於饒州浮梁縣萬户山之前夫人徐氏累贈夀安縣君君之歿也有子四人女六人孫男九人女十二人曽孫男三人女二人金氏或曰出少昊金天氏或曰出漢侍中秺侯傳至孫則亡至曽孫復侯而秺侯有弟倫倫子若孫四世六人皆侍中以忠孝名尊顯於世世稱金氏云至君之先皆家京兆唐僖宗時有令浮梁者遭黄巢亂徙人築險自保所活人以數萬因留治之凡十有七年遂家浮梁以功至檢校尚書右僕射昭信軍節度使諱某君曽祖也子諱某君祖也博士以君之外孫尚書屯田員外郎臧論道之狀來屬曰子為我銘吾親吾死足矣鞏不敢辭銘曰卑少恭老惟物之常即强棄父廼理之亡帝用慨然尊祀明堂顧褒耋夀風示九有君勢之亨與享其榮擁笏巍巾於家以息有子有孫嚴嚴我側志無不得君子之祥銘以發之君子之光撫州金谿縣主簿徐洪墓誌銘嘉祐元年䖍州安逺闕縣令建安徐洪以撫州金谿主簿攝安逺事明年八月十一日死安逺十二月其父尚書屯田郎中舉以書告君之故人南豐曽鞏曰子為我銘洪之墓遂考次君世序行已歴官卒𦵏之終始銘於其墓曰君曽大父某某官大父某某官君字孺興為人有大志讀書好其治亂得失之大㫖為文長於辨説其奔放馳騁上下反復之際有足壯也未冠聲號聞四方初中進士除洪州司户參軍不就退居大江之南好倜儻非常之竒節不肯少屈於人居八年以父命始强出為主簿非其好也君居家遇人無親疎豁如也樂赴人之急為主簿不以非其好故怠其意其治能有愛於人金谿富人錮山林之利數十年君始奪之而縣之貧人賴其利葢君之所試者小其為日又近而其所既立如是也享年三十有二死之若干日𦵏饒州鄱陽東門外母某氏某縣君妻凌氏黄氏男一人曰還孫始二嵗女四人尚幼也銘曰嗚呼孺興志果而大不勝于柔以窒其外不隕其剛以亨于内胡短其施而多其與父老失子兒嬰失父維銘告哀以納于墓太子右司禦率府副率致仕沈君墓誌銘君諱某字某姓沈氏沈氏自齊太子家令約家於呉興故世為呉興人至君之大父諱某考諱某始自呉興之東林徙家於錢塘故今為錢塘人君以宗室宻州觀察使宗旦恩即其家得為太子右清道率府副率致仕又以祀明堂恩遷太子右司禦率府副率兼官檢校國子祭酒兼監察御史階銀青光祿大夫勲武騎尉葢宻州觀察使宗旦者今天子之姪潞王之孫而其母夫人葢君之姪也君為人質樸無外飾其居鄉閭寛然長者也其事父兄能力以嚴眎族人能愛以均雖饒財為大家而衣服飲食自與尤寡約至人有急歸我則推財赴之無錙銖顧惜意隣里或嵗饑輒發倉以救人有欺其財者皆不校既老治其家事不肯懈曰吾先人之所以付我也處其子孫不以逸曰所以使汝守吾先人之法也嘉祐二年三月一日以疾卒於家享年七十有六其年十一月十五日𦵏錢塘之西城初娶呉氏再娶車氏某縣君其𦵏也呉氏實從子三人曰曄曰晼曰時孫八人曰沔曰溱曰沂曰淑曰灌曰湜曰漸曰渥曽孫三人曰師楊曰師荀曰師軻時沔沂皆舉進士餘亦皆有學行葢君之教也銘曰赫赫宗子保藩于宻天子曰嘻汝惟沈出予假汝寵錫其外親東宫之屬有長衛軍命君子家俾休其老以偃以側服章華好天子命我匪我有求隤然順退媚于林丘不藴為機不阻為畦曰逺無仇曰近無庇里巷之衣惟此令人流聞餘澤化其子孫惟身之祥既夀而康惟後之祥冝熾而昌惟墓有域其藏有石刻此銘詩昭示無極寳月大師塔銘君名修廣字叔微杭州錢塘人姓王氏九嵗出家學佛居州之明慶院十一嵗落髮為僧景佑二年詔賜紫衣五年又賜號寳月大師治平某年州選為管内僧正熙寧元年十月感疾癸丑㑹門人與常所往來學佛之人告以將終其夕沐浴更衣正坐而卒享年六十有一門人曰慈化大師了性曰崇照大師了然曰賜紫衣了藴以明年某月某甲子為塔𦵏君於某縣某鄉某原君為人樂易慈祥有智識度量人不見其喜怒讀五經略知大義頗喜為詩少羸多病始學為醫既成而有疾者多歸之無貴賤貧富皆為之盡其術未嘗有所厚薄尤貧者或資之衣食以其故自京師至於四方自公卿至於學士大夫多知其名既見皆樂從之游而鄉邑之人至於羈旅游客其歸之者無不厭其意君於接之雖勞未嘗有懈惓不欲之色於資之藥物衣食雖窮無未嘗有所計惜其應外者如此及退而處夫貧富死生之際又有所不累其心故至於不能自給而未嘗動意至於且死而末嘗變容改色噫是非可銘也歟銘曰不以貧故累其心此學士大夫所難至於遭死生之變而不驚又難也君之學不同而自得者則然固不可以無傳況於名聞於世行信於人故為之書尚使長存元豐類藁巻四十四
