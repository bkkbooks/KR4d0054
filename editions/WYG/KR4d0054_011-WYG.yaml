body:
  text: 元豐類藁卷十一宋曾鞏撰序新序目録序劉向所集次新序三十篇録一篇隋唐之世尚為全書今可見者十篇而已臣既考正其文字因為其序論曰古之治天下者一道德同風俗盖九州之廣萬民之衆千歲之逺其教已明其習已成之後所守者一道所傳者一説而已故詩書之文歴世數十作者非一而其言未甞不為終始化之如此其至也當是之時異行者有誅異言者有禁防之又如此其備也故二帝三王之際及其中間甞更衰亂而餘澤未熄之時百家衆説未有能出於其間者也及周之末世先王之教化法度既廢餘澤既熄世之治方術者各得其一偏故人奮其私智家尚其私學者蠭起於中國皆明其所長而昧其短矜其所得而諱其失天下之士各自為方而不能相通世之人不復知夫學之有統道之有歸也先王之遺文雖在皆絀而不講况至於秦為世之所大禁哉漢興六藝皆得於斷絶殘脱之餘世復無明先王之道以一之者諸儒苟見傳記百家之言皆悦而嚮之故先王之道為衆説之所蔽闇而不明鬰而不發而怪竒可喜之論各師異見皆自名家者誕漫於中國一切不異於周之末世其弊至於今尚在也自斯以來天下學者知折衷於聖人而能純於道德之美者揚雄氏而止耳如向之徒皆不免乎為衆説之所蔽而不知有所折衷者也孟子曰待文王而興者凡民也豪傑之士雖無文王猶興漢之士豈無明先王之道以一之者哉亦其出於是時者豪傑之士少故不能特起於流俗之中絶學之後也盖向之序此書於今為最近古雖不能無失然逺至舜禹而次及於周秦以來古人之嘉言善行亦往往而在也要在愼取之而已故臣既惜其不可見者而校其可見者特詳焉亦足以知臣之攻其失豈好辯哉臣之所不得已也梁書目録序梁書六本紀五十列傳合五十六篇唐貞觀三年詔右散騎常侍姚思廉撰思廉者梁史官察之子推其父意又頗采諸儒謝吳等所記以成此書臣等既校正其文字又集次為目録一篇而叙之曰自先王之道不明百家並起佛最晚出為中國之患而在梁為尤甚故不得而不論也盖佛之徒自以謂吾之所得者内而世之論佛者皆外也故不可絀雖然彼惡覩聖人之内哉書曰思曰睿睿作聖盖思者所以致其知也能致其知者察三材之道辨萬物之理小大精粗無不盡也此之謂窮理知之至也知至矣則在我者之足貴在彼者之不足玩未有不能明之者也有知之之明而不能好之未可也故加之誠心以好之有好之之心而不能樂之未可也故加之至意以樂之能樂之則能安之矣如是則萬物之自外至者安能累我哉萬物之所不能累故吾之所以盡其性也能盡其性則誠矣誠者成也不惑也既誠矣又充之使可大焉既大矣又推之使可化焉能化矣則含智之民肖翹之物有待於我者莫不由之以全其性遂其生而吾之用與天地參矣德如此其至也而應乎外者未甞不與人同此吾之道所以為天下之逹道也故與之為衣冠飲食冠婚䘮祭之具而由之以教其為君臣父子兄弟夫婦者莫不一出乎人情與之同其吉凶而防其憂患者莫不一出乎人理故與之處而安且治之所集也危且亂之所去也與之所處者其具如此使之化者其德如彼可不謂聖矣乎既聖矣則無思也其至者循理而已無為也其動者應物而已是以覆露乎萬物鼔舞乎羣衆而未有能測之者也可不謂神矣乎神也者至妙而不息者也此聖人之内也聖人者道之極也佛之説其有以易此乎求其有以易此者故其所以為失也夫得於内者未有不可行於外也有不可行於外者斯不得於内矣易曰智周乎萬物而道濟乎天下故不過此聖人所以兩得之也知足以知一偏而不足以盡萬事之理道足以為一方而不足以適天下之用此百家之所以兩失之也佛之失其不以此乎則佛之徒自以謂得諸内者亦可謂妄矣夫學史者將以明一代之得失也臣等故因梁之事而為著聖人之所以得及佛之所以失以傳之者使知君子之所以距佛者非外而有志於内者庻不以此而易彼也列女傳目録序劉向所叙列女傳凡八篇事具漢書向列傳而隋書及崇文總目皆稱向列女傳十五篇曹大家注以頌義考之盖大家所注離其七篇為十四與頌義凡十五篇而益以陳嬰母及東漢以來凡十六事非向書本然也盖向舊書之亡久矣嘉祐中集賢校理蘇頌始以頌義為篇次復定其書為八篇與十五篇者並藏於館閣而隋書以頌義為劉歆作與向列傳不合今驗頌義之文盡向之自叙又藝文志有向列女傳頌圖明非歆作也自唐之亂古書之在者少矣而唐志録列女傳凡十六家至大家注十五篇者亦無録然其書今在則古書之或有録而亡或無録而在者亦衆矣非可惜哉今校讐其八篇及其十五篇者已定可繕寫初漢承秦之敝風俗已大壊矣而成帝後宫趙衛之属尤自放向以謂王政必自内始故列古女善惡所以致興亡者以戒天子此向述作之大意也其言大任之娠文王也目不視惡色耳不聽淫聲口不出敖言又以謂古之人胎教者皆如此夫能正其視聽言動者皆大人之事而有道者之所畏也顧令天下之女子能之何其盛也以臣所聞盖為之師傅保姆之助詩書圖史之戒珩璜琚瑀之節威儀動作之度其教之者雖有此具然古之君子未甞不以身化也故家人之義歸於反身二南之業本於文王夫豈自外至哉世皆知文王之所以興能得内助而不知所以然者盖本於文王之躬化故内則后妃有闗雎之行外則羣臣有二南之美與之相成其推而及逺則商辛之昬俗江漢之小國兔罝之野人莫不好善而不自知此所謂身修故國家天下治者也後世自學問之士多徇於外物而不安其守其家室既不見可法故競於邪侈豈獨無相成之道哉士之苟於自恕顧利冒恥而不知反己者往往以家自累故也故曰身不行道不行於妻子信哉如此人者非素處顯也然去二南之風亦已逺矣況於南鄉天下之主哉向之所述勸戒之意可謂篤矣然向號愽極羣書而此傳稱詩芣苢柏舟大車之類與今序詩者之説尤乖異盖不可考至於式微之一篇又以謂二人之作豈其所取者愽故不能無失歟其言象計謀殺舜及舜所以自脫者頗合於孟子然此傳或有之而孟子所不道者盖亦不足道也凡後世諸儒之言經傳者固多如此覽者采其有補而擇其是非可也故為之叙論以發其端云禮閣新儀目録序禮閣新儀三十篇韋公肅撰記開元以後至元和之變禮史館秘閣及臣書皆三十篇集賢院書二十篇以㕘相校讐史館秘閣及臣書多複重其篇少者八集賢院書獨具然臣書有目録一篇以考其次序盖此書本三十篇則集賢院書雖具然其篇次亦亂既正其脫謬因定著從目録而禮閣新儀三十篇復完夫禮者其本在於養人之性而其用在於言動視聽之間使人之言動視聽一於禮則安有放其邪心而窮於外物哉不放其邪心不窮於外物則禍亂可息而財用可充其立意微其為法逺矣故設其器制其物為其數立其文以待其有事者皆人之起居出入吉凶哀樂之具所謂其用在乎言動視聽之間者也然而古今之變不同而俗之便習亦異則法制度數其久而不能無弊者勢固然也故為禮者其始莫不宜於當世而其後多失而難遵亦其理然也失則必改制以求其當故羲農以來至於三代禮未甞同也後世去三代盖千有餘歲其所遭之變所習之便不同固已逺矣而議者不原聖人制作之方乃為設其器制其物為其數立其文以待其有事而為其起居出入吉凶哀樂之具者當一一以追先王之迹然後禮可得而興也至其説之不可求其制之不可考或不宜於人不合於用則寧至於漠然而不敢為使人之言動視聽之間蕩然莫之為節至患夫為罪者之不止則繁於為法以禦之故法至於不勝其繁而犯者亦至於不勝其衆豈不惑哉盖上世聖人有為耒耜者或不為宮室為舟車者或不為棺椁豈其智不足為哉以謂人之所未病者不必改也至於後聖有為宫室者不以土處為不可變也為棺椁者不以葛溝為不可易也豈好為相反哉以為人之所既病者不可因也又至於後聖則有設兩觀而更采椽之質攻文梓而易瓦棺之素豈不能從儉哉以謂人情之所好能為之節而不能變也由是觀之古今之變不同而俗之便習亦異則亦屢變其法以宜之何必一一以追先王之迹哉其要在於養民之性防民之欲者本末先後能合乎先王之意而已此制作之方也故瓦樽之尚而薄酒之用太羮之先而庻羞之飽一以為貴本一以為親用則知有聖人作而為後世之禮者必貴爼豆而今之器用不廢也先弁冕而今之衣服不禁也其推之皆然然後其所改易更革不至乎拂天下之勢駭天下之情而固已合乎先王之意矣是以羲農以來至於三代禮未甞同而制作之如此者未甞異也後世不知其如此而或至於不敢為或為之者特出於其勢之不可得已故苟簡而不能備希濶而不常行又不過用之於上而未有加之於民者也故其禮本在於養人之性而其用在於言動視聽之間者歴千餘歲民未甞得接於耳目况於服習而安之者乎至其陷於罪戾則繁於為法以禦之其亦不仁也哉此書所紀雖其事已淺然凡世之記禮者亦皆有所本而一時之得失具焉昔孔子於告朔愛其禮之存况於一代之典籍哉故其書不得不貴因為之定著以俟夫論禮者考而擇焉戰國策目録序劉向所定戰國䇿三十三篇崇文總目稱十一篇者闕臣訪之士大夫家始盡得其書正其誤謬而疑其不可考者然後戰國策三十三篇復完叙曰向叙此書言周之先明教化修法度所以大治及其後謀詐用而仁義之路塞所以大亂其説既美矣卒以謂此書戰國之謀士度時君之所能行不得不然則可謂惑於流俗而不篤於自信者也夫孔孟之時去周之初已數百歲其舊法已亡舊俗已熄久矣二子乃獨明先王之道以為不可改者豈將強天下之主以後世之不可為哉亦將因其所遇之時所遭之變而為當世之法使不失乎先王之意而已二帝三王之治其變固殊其法固異而其為國家天下之意本末先後未甞不同也二子之道如是而已盖法者所以適變也不必盡同道者所以立本也不可不一此理之不易者也故二子者守此豈好為異論哉能勿苟而已矣可謂不惑乎流俗而篤於自信者也戰國之游士則不然不知道之可信而樂於説之易合其設心注意偷為一切之計而已故論詐之便而諱其敗言戰之善而蔽其患其相率而為之者莫不有利焉而不勝其害也有得焉而不勝其失也卒至蘇秦商鞅孫臏吳起李斯之徒以亡其身而諸侯及秦用之者亦滅其國其為世之大禍明矣而俗猶莫之寤也惟先王之道因時適變為法不同而考之無疵用之無弊故古之聖賢未有以此而易彼也或曰邪説之害正也宜放而絶之則此書之不泯一作不泯民其可乎對曰君子之禁邪説也固將明其説於天下使當世之人皆知其説之不可從然後以禁則齊使後世之人皆知其説之不可為然後以戒則明豈必滅其籍哉放而絶之莫善於是是以孟子之書有為神農之言者有為墨子之言者皆著而非之至於此書之作則上繼春秋下至楚漢之起二百四十五年之間載其行事固不可得而廢也此書有高誘注者二十一篇或曰二十二篇崇文總目存者八篇今存者十篇陳書目録序陳書六本紀三十列傳凡三十六篇唐散騎常侍姚思廉撰始思廉父察梁陳之史官也録二代之事未就而陳亡隋文帝見察甚重之每就察訪梁陳故事察因以所論載每一篇成輒奏之而文帝亦遣虞世基就察求其書又未就而察死察之將死属思廉以繼其業唐興武德五年高祖以自魏以來二百餘歲世統數更史事放逸乃詔論次而思廉遂受詔為陳書久之猶不就貞觀三年遂詔論撰於祕書内省十年正月壬子始上之觀察等之為此書歴三世傳父子更數十歲而後乃成盖其難如此然及其既成與宋魏梁等書世亦傳之者少故學者於其行事之迹亦罕得而詳之也其書亦以罕傳則自祕府所藏往往脱誤嘉祐六年八月始詔校讐使可鏤版行之天下而臣等言梁陳等書缺獨館閣所藏恐不足以定著願詔京師及州縣藏書之家使悉上之先皇帝為下其事至七年冬稍稍始集臣等以相校至八年七月陳書三十六篇者始校定可傳之學者其疑者亦不敢稍損益特各䟽于篇末其書舊無目列傳名氏多闕謬因别為目録一篇使覽者得詳焉夫陳之為陳盖偷為一切之計非有先王經紀禮義風俗之美制治之法可章示後世然而兼權尚計明於任使恭儉愛人則其始之所以興惑於邪臣溺於嬖妾㤀患縱欲則其終之所以亡興亡之端莫非自己致者至於有所因造以為號令威刑職官州郡之制雖其事已淺然亦各施於一時皆學者之所不可不考也而當時之士爭奪詐偽苟得偷合之徒尚不得不列以為世戒而况於壊亂之中倉皇之際士之安貧樂義取舍去就不為患禍勢利動其心者亦不絶於其間若此人乎可謂篤於善矣盖古人之所思見而不可得風雨之詩所為作者也安可使之泯泯不少概見於天下哉則陳之史其可廢乎盖此書成之既難其後又久不顯及宋興已百年古文遺事靡不畢講而始得盛行於天下列於學者其傳之之難又如此豈非遭遇固自有時也哉南齊書目録序南齊書八紀十一志四十列傳合五十九篇梁蕭子顯撰始江淹已為十志沈約又為齊紀而子顯自表武帝别為此書臣等因校正其訛謬而叙其篇目曰將以是非得失興壊理亂之故而為法戒則必得其所託而後能傳於久此史之所以作也然而所託不得其人則或失其意或亂其實或析理之不通或設辭之不善故雖殊功韙德非常之迹將闇而不章鬰而不發而檮杌嵬𤨏姦回凶慝之形可幸而掩也嘗試論之古之所謂良史者其明必足以周萬事之理其道必足以適天下之用其智必足以通難知之意其文必足以發難顯之情然後其任可得而稱也何以知其然也昔者唐虞有神明之性有微妙之德使由之者不能知知之者不能名以為治天下之本號令之所布法度之所設其言至約其體至備以為治天下之具而為二典者推而明之所記者豈獨其迹邪并與其深微之意而傳之小大精粗無不盡也本末先後無不白也使誦其説者如出乎其時求其㫖者如即乎其人是可不謂明足以周萬事之理道足以適天下之用知足以通難知之意文足以發難顯之情者乎則方是之時豈特任政者皆天下之士哉盖執簡操筆而隨者亦皆聖人之徒也兩漢以來為史者去之逺矣司馬遷從五帝三王既没數千載之後秦火之餘因散絶殘脫之經以及傳記百家之說區區掇拾以集著其善惡之迹興廢之端又創已意以為本紀世家八書列傳之文斯亦可謂竒矣然而蔽害天下之聖法是非顚倒而采摭謬亂者亦豈少哉是豈可不謂明不足以周萬事之理道不足以適天下之用智不足以通難知之意文不足以發難顯之情者乎夫自三代以後為史者如遷之文亦不可不謂雋偉拔出之材非常之士也然顧以為明不足以周萬事之理道不足以適天下之用智不足以通難知之意文不足以發難顯之情者何哉盖聖賢之高致遷固有不能純達其情而見之於後者矣故不得而與之也遷之得失如此况其他邪至於宋齊梁陳後魏後周之書盖無以議為也子顯之於斯文喜自馳騁其更改破析刻彫藻繢之變尤多而其文益下豈夫材固不可以强而有邪數世之史既然故其事迹曖昧雖有隨世以就功名之君相與合謀之臣未有赫然得傾動天下之耳目播天下之口者也而一時偷奪傾危悖禮反義之人亦幸而不暴著於世豈非所託不得其人故邪可不惜哉盖史者所以明夫治天下之道也故為之者亦必天下之材然後其任可得而稱也豈可忽哉豈可忽哉唐令目録序唐令三十篇以常員定職官之任以府衛設師徒之備以口分永業為授田之法以租庸調為歛財役民之制雖未及三代之政然亦庻幾乎先王之意矣後世從事者多率其私見故聖賢之道廢而苟簡之術用太宗能超然逺覽絀封倫而納鄭公之議其為國家天下之意故能及此而當是之時遂成太平之功使能推其類盡其道則唐之治豈難至於三代之盛哉讀其書嘉其制度有庻幾于古者而惜不復行也故掇其大要可紀者論之於此焉徐幹中論目録序臣始見館閣及世所有徐幹中論二十篇以謂盡於此及觀貞觀政要怪太宗稱甞見幹中論復三年䘮篇而今書此篇闕因考之魏志見文帝稱幹著中論二十餘篇於是知館閣及世所有幹中論二十篇者非全書也幹字偉長北海人生於漢魏之間魏文帝稱幹懐文抱質恬澹寡慾有箕山之志而先賢行狀亦稱幹篤行體道不耽世榮魏太祖時旌命之辭疾不就後以為上艾長又以疾不行盖漢承周衰及秦滅學之餘百氏雜家與聖人之道並傳學者罕能獨觀於道德之要而不牽於流俗頽風至於治心養性去就語黙之際能不悖於理者固希矣况至於魏之濁世哉幹獨能考六藝推仲尼孟軻之㫖述而論之求其辭時若有小失者要其歸不合於道者少矣其所得於内者又能信而充之逡廵濁世有去就顯晦之大節臣始讀其書察其意而賢之因其書以求其為人又知其行之可賢也惜其有補於世而識之者少盖迹其行之所至而以世俗好惡觀之彼惡足以知其意哉顧臣之力豈足以重其書使學者尊而信之因校其脫謬而序其大略盖所以致臣之意焉說苑目録序劉向所著說苑二十篇崇文總目云今存者五篇餘皆亡臣從士大夫間得之者十有三篇與舊為十有八篇正其脫謬疑者闕之而叙其篇目曰向采傳記百家所載行事之迹以為此書奏之欲以為法戒然其所取往往又不當於理故不得而不論也夫學者之於道非知其大略之難也知其精微之際固難矣孔子之徒三千其顯者七十二人皆高世之材也然獨稱顔氏之子其殆庻幾乎及回死又以謂無好學者而回亦稱夫子曰仰之彌高鑽之彌堅子貢又以謂夫子之言性與天道不可得而聞也則其精微之際固難知久矣是以取舍不能無失於其間也故曰學然後知不足豈虛言哉向之學愽矣其著書及建言尤欲有為於世至其枉已而為之者有矣何其狥物者多而自為者少也盖古之聖賢非不欲有為也然而曰求之有道得之有命故孔子所至之邦必聞其政而子貢以謂非夫子之求之也豈不求之有道哉子曰道之將行也與命也道之將廢也與命也豈不得之有命哉令向知出此安於行止以彼其志能擇其所學以盡乎精微則其所至未可量也是以孔子稱古之學者為已孟子稱君子欲其自得之則取之左右逢其原豈汲汲於外哉向之得失如此亦學者之戒也故見之叙論令讀其書者知考而擇之也然向數困於䜛而不改其操與夫患失之者異矣可謂有志者也鮑溶詩集目録序鮑溶詩集六卷史館書舊題云鮑防集五卷崇文總目叙别集亦然知制誥宋敏求為臣言此集詩見文粹唐詩類選者皆稱鮑溶作又防之雜感詩最顯而此集無之知此詩非防作也臣以文粹類選及防雜感詩考之敏求言皆是又得叅知政事歐陽修所藏鮑溶集與此集同然後知為溶集決也史館書五卷總二百篇歐陽氏書無卷第纔百餘篇然其三十三篇史館書所無今别為一卷附於後而總題曰鮑溶詩集六卷盖自先王之澤熄而詩亡晩周以來作者嗜文辭杼情思而已然亦往往有可采者溶詩尤清約謹嚴而違理者少亦近世之能言者也故既正其誤謬又著其大㫖以傳焉曾鞏謹序元豐類藁卷十一
