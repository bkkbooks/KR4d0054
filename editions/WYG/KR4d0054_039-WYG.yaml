body:
  text: 元豐類藁巻三十九宋曾鞏撰祭文先君焚告文鞏蒙昏不肖不能稱先君敎誨養育之意賴遺徳所及嗣有官祿以世其家今天子始見郊廟加恩朝臣以及其先而先君先夫人咸有官封追榮之賜鞏繫官京師謹遣弟布肇奉告第至墓次以告皇妣仙源縣太君周氏焚黄文鞏薄陋獲守緒業常懼失墜賴先君先夫人餘澤有列位于朝今天子始郊加恩羣臣皆得追榮其先故先君先夫人咸被命書贈官封邑鞏伏念厥繇不任感慕𨽻職京師遣弟布肇奉告第黄詣墓次以告謹焚皇妣昌福縣太君吳氏焚告文維先君先夫人積徳累善鞏獲蒙餘澤備位于朝今天子始郊加恩羣臣皆許追榮其先故先君先夫人咸被賛書命官封邑而鞏方羈於職事不得躬至墓下謹遣弟布肇奉告第以告戊午十月展墓文二首鞏去春在江西蒙恩予告得省視松楸今自福州被召還朝又得便道展拜墓下敢陳薄薦用申感慕仰惟降鑒俾蒙福於無疆鞏自福州被召還朝得便道展墓敢陳薄薦以下同上代太平州知州謁廟文天子不以某不敏使有兹土凡境之内鬼神能福于人敢不恭事今得日之吉始兹薦見惟神之賜使民宜其家及其嵗事則某敢不繼自今具酒醴牲牷以報于神神其鑒之太平州祈晴文去嵗之水其為害大矣民之免於死亡而不為盗賊亦幸而已矣水之既去民於完隄防修疆隴以從事於田其艱且勞亦甚矣使今嵗大穰恐未足以復其力今苖始蒔而雨不止若將又病之民有轉死之憂吏之不能事神治民以降兹沴不敢逃其責然沴之既降非吏之所能扞而止也惟神舊依吾民而食于此土扞患除菑固神之職敢不以告使雨速止而嵗有成亦惟神於此土永有依歸惟神其圖之泰山祈雨文維泰山厯古至今有天下者廵狩封禪勒成告代莫不之焉或企足動容卒莫能至實卓瑋殊尤神明之地故天下宗焉二典所記其光靈威烈焯示萬世夫豈他山可得而視維齊與魯獲仰而事粒食縷衣莫匪陰施今二邦不雨自四月巳訖于兹積水之澤塵起㝠㝠粟將槁死蝗亦滋生雖政或不良足以致此而百姓何罪宜見哀矜彼撮土之山勺水之川尚能與民為福錫之有年豈如泰山朝岀一雲暮澤天下其勢之易易於轉圜而比近託麗顧不能憐殆莫之或告告或不䖍夫民之生葢亦艱矣無儲與藏重斂煩使嵗一不登多濵於死奸强無知或起乘時聚為盗攘以取誅夷循理安業田間之民亦與俱亡奚可不傷鞏受命天子守藩于東敢齋以嚴告于靈宫惟神閔人之病助嵗之功霈然下雨變沴為豐尚俾斯民以牛羊黍稷得承事于無窮泰山謝雨文臣愚行為時之所背言為時之所輕寡儔少和眇眇煢煢竒於人而如此敢望信於㝠㝠屬東轅而進謁託斯文而薦誠眷齊魯之舊邦依大鎮之崢嶸苦旱魃之方驕憂嵗事之不登民且瘠於溝壑或椎埋而死兵冀聰明之響答霈膏雨之宵零言丁寧而上訴心􅞕恍而潜驚顧不能以諧世將何動夫威靈乃不知夫神與道而為徒雖窅黙而難明其虛心也物有來而必應其公聴也無憎愛之常情彼大雖自大小雖謂小吾與善而已矣常一視而持平故微衷得以上徹利澤為之旁行或噫為風或震為霆隠然雷出靄然雲蒸洒甘霔以兼夕㓕害氣於無形葢西極于甸服東屬乎滄溟人盈其望物遂其生黍芃芃而擢秀粟薿薿而敷榮使時沴遂熄年功可成人食豐乎鍾鬴神祀衍乎粢盛民相安於田里吏無用於威刑信大恩之莫報而至徳之難名愚所以意激而感深者方渉世之零丁荷降鑒之不昧知忠信之可憑敢因辭以進謝愧抽思之非精齊州到任謁舜廟文嶽廟云維神以豐功盛徳作鎮此方宜有以稱民望維帝側微之初躬耕此土厯數千載盛徳彌新傳于無窮享有廟食鞏受命岀守敢陳薄薦維帝常垂陰施惠此困窮庶使遺民永有依賴齊州謁夫子廟文惟夫子言行之所以一作及葢不可得而學者師仰各以其一無其字材之所及而已鞏潛心久矣兹者受命撫封進謁廟下敢陳薄薦式遵典禮齊州謁諸廟文維神以功徳之羙列于祀典受命守土敢陳薄薦惟神常垂陰施以惠此邦泰山祈雨文惟神含徳體仁鎮兹東夏興雲致雨澤施八紘今此齊邦近在山趾方夏久旱麥苖將萎吏思其繇奔走羣望而人微言賤不能上動頻陰復散忽巳兼旬念此疲民弊於征斂方嵗之富食常不足一遇災害必捐溝壑惟神威烈覆被羣生顧此比州宜先蒙賜豈伊靈眷獨忍遺之是用飭遣士民布誠祠下情窮詞急冀獲哀矜使一雨霈然則倒懸可解尚其降鑒無作神羞嶽廟祈雨文去嵗之旱有請于神蒙畀嘉澤田則大稔今春河役發民二萬更迭齎送衆又倍之葢此齊人岀者㡬半迨其反室維夏之初勞費既深又違穡事夫民數嵗乃遇一稔敝之如此其㡬尚完今二麥方包而亢陽為虐吏任其咎所不敢逃惟民何辜賴神終惠能致雲雨則實在神尚其念之故敢以告襄州謁文宣王廟文鞏獲承餘敎列職書林來守此邦敢遵常禮躬謁祠下尚其臨之襄州謁諸廟文惟靈功徳在人廟食兹土鞏到官之始敢脩禮謁尚期降惠以佑吾民襄州諸廟祈雨文今麥苖方岀而時澤尚愆冬令交行而寒氣未應嗟吏治之不善以奸陰陽惟神理之無方能興雲雨是用兢慚以任咎蠲祓以乞靈尚期降休以答人望大悲祈雨文維嵗孟冬盛陽猶亢旱暵滋久陰寒未興吏非循良敢不任咎佛有慈惠則宜降祥是敢躬􅅹懇誠䖍祈覺蔭俾風雲之奮作致雨雪之漸涵田畆順成里閭安輯仰期真理俯徇輿情襄州嶽廟祈雨文自秋不雨方冬尚溫麥田苦於旱乾民室憂於病癘永惟責任内集兢慚惟神作鎮岱宗著靈南夏敢􅅹由衷之懇冀囬降鑒之仁遂俾膏澤以時祁寒式序甽畮克諧於豐富里閭皆保於靖康尚其垂訓副此羣望又諸廟祈雨文去嵗之冬時雪不厚今兹春晚膏澤尚微農於稻田待水而種苦兹旱涸人用焦然吏不能有惠於民而惟嵗之善則刑清事簡尚有望焉是用􅅹懇有禱于神惟神依人尚其降鑒使霈然下雨以大濟于此邦則人於事神亦曷不盡薤山祈雨文自去秋之始至于今春之暮雨不霶霈今麥苗將病稻種未布農事急矣而禱請未効惟神靈應在人是用奔告尚其降鑒大施澤于此邦使民獲善嵗而不罹于艱阨則人於報神之賜亦曷敢不䖍邪溪祈雨文自去秋至今雨常不足今麥苖將槁稻種未布而春既盡矣若又不雨至於十日則麥必盡死稻不可種民將安所寄命乎吏知其急而不知其所以為神知其急而力能為雨者也其亦何惜數尺之澤救民於無所寄命之急乎故敢以請神其鑒之諸寺觀謝雨文向者以大田之稼雖多而西郊之雲方密輙伸䖍禱葢以為民甫及夏初霈然蒙潤兹展至誠之謝式遵舊典之傳欽惟神明鑒此精意邪溪謝雨文吏能奉法令治獄訟督賦斂而巳導和氣致豐年則力不能徳不及也故一有水旱則犇禱於鬼神幸蒙降答則自恕以竊食此鞏之所不敢不自訟也今兹請雨不能異此獲神之賜敢不䖍報惟神之靈徳既足以驚動澤施于此民尚終畀之有年則神之依人亦有永賴薤山謝雨文廼故秋至今雨不霑足麥苖將槁稻不可種民將無以為命更不知其所為維神能岀雲致雨記於古經信於百姓之耳目是用犇告果蒙降答廼戊辰雲起西北至夕大雨逹於甲戌四境告足麥則滋榮稻可播種民得以託命吏得以竊食維神之威靈大顯于此土澤施大及於斯民敢不嚴報尚其終惠俾嵗大穰則人於事神永永其不敢怠諸廟謝雨文吏治不能順陰陽時風雨而以嵗之旱犇告于神賴神之靈時賜甘雨敢不嚴報尚其鑒之元豐類藁巻三十九
