body:
  text: 元豐類藳巻三宋曽鞏撰古詩遊麻姑山軍南古原行數里忽見峻嶺横千尋誰開一徑破蒼翠對植松柏何森森危根自迸古崖出老色不畏莓苔侵脩竹整整儼朝士下䕃石齒明如金遂登半嶺望城郭但見積靄縈江潯岡陵稍轉露樓閣沙莽忽盡横園林秋光已逼花草歇寒氣况乗嵓谷深我馳輕輿豈知倦倐忽遂覺窮嶔崟龍門誰來此中鑿玉簡不記何年沉泉聲可聽真衆籟泉意欲瀉無瑤琴斗迴地勢平如削䆉稏百頃黄差參横開三門兩路出却立兩殿當崖隂深廊千步抵嵓腹桀木萬本摩天心碑文磊嵬氣不俗筆畫縹緲工非今世傳仙人家此地天風泠泠吹我衿今人豈解不老術可怪緑髪常盈簪根源分明我能説一室傾里輸瑯琳相高既不擁耒耜方壯又不持戈鐔我丁轗軻豈暇議直喜虚曠開煩襟清謡出口若先搆白酒到手無停斟山人執袂與我語留我饋我山中禽玲瓏當忩急雨洒窈窕隔溪孤笛吟未昏已移就明燭病骨夜宿添重衾神醒氣王目無睡到曉獨愛流泉音起來身去接塵事片心未省忘登臨丹霞洞麻姑石壇起雲霧常意已極高峯巔豈知造化有神處别聳翠嶺參青天長松桀柏枝嵬砢中畫一道如流泉林風颼飀滿丘壑山鳥嘲哳凌飛烟山腰古亭豁可望下見秋色清無邊忽驚隂崖勢回合中抱幽谷何平圜初誰鑿險搆樓觀更使遶舍開芝田令人到此毛骨醒欲求老筆丹青傳羌夷干戈今未解天地瘡痏誰能痊大夏棟梁置沙莽肯復顧盼桷與椽吾徒於時直何用欲往未得心茫然舞鶴蓬瀛歸未得偃翼清溪隂忽聞瑶琴奏遂舞玉山岑舞罷復嘹唳誰知天外心半山亭樹杪蒼崖路屈盤半空亭榭午猶寒平時舉眼看山處到此憑欄直不看顔碑碑文老勢信可愛碑意少缺誰能鐫巳推心膽破姦宄安用筆墨傳神仙碧蓮池神仙恍惚不可明空有池蓮變紅碧清香冷落秋風前似被麻姑妬顔色流杯池行盡壇前石崖路忽見一曲清泠泉酒行到我不辭醉安用了了分愚賢七星杉古杉蒼蒼横斗文其榦十圍隂蔽野應到夜深山月來林色天光迷上下瀑布泉飛泉一支天上來寒影沉沉瀉龍穴山靈欲以怪動人山路先冬積霜雪秋懷天地四時誰主張縱使羣隂入風日日光在天已蒼凉風氣吹人更憀慄樹木慘慘顔色衰鷰雀啾啾羣似失我有愁輪行我觴顛倒回環不能律我本孜孜學詩書詩書與今豈同術智慮過人祗自讐聞見於時未禆一片心皎皎事乖背衆醉㝠㝠勢凌突出門榛棘不可行終嵗蒿藜尚誰䘏逺夢頻迷憶故人客被初寒卧沉疾将相公卿雖不為消長窮通豈須詰聖賢穣穣力可攀安能俯心為苟屈送歐陽員外歸覲滁州舎人病卧不出門非關避塵土深秋影雖清孤懷共誰語辱子問吾廬煇如就賔廡足音固可喜况乆捉松麈子生何其祥家庭坐軻愈顧我齒諸生漸摩苦頑魯有如仰天潢勢豈識津渚又若馬牛然安能望熊虎空搖在門心常苦風中羽羡子筋骨輕歸飛得其所從今夣無南隨子渡江艣一晝千萬思一晝千萬思一夜千萬愁晝思復夜愁晝夜千萬秋故人逺為縣海邊句踐州故人道何如不間孔與周我如道邊塵安能望高丘又若澗與溪敢比滄海流景山與學海汲汲强自謀愁思雖爾勤故人得知不送鄭秀才鄭生雙瞳光欲溢我意海月藏其中齒清髮紺心獨老秋崖直聳千年松來趨學宮業文字進退佩玉何玲瓏一朝束書别我去馬蹄脱若風中蓬當今文人密如櫛子勿浪漫西與東處身不可不擇處一跳萬里無還蹤荅所勸灸灸灼君所勸感君書上辭勿難火艾痛要使功名垂我道世所背君知餘有誰筋骸尚且健學行肯教隳菊花菊花秋開只一種意逺不隨桃與梅遊人有幾愛孤淡零落野水空嵓隈層層露萼間枝葉金靨萬箇圍蒼苔直從陶令酷愛尚始有我見心眼開為憐清香與正色欲搴更惜常徘徊當携玉軫就花醉一飲不辭三百杯荅石秀才月下今宵月色明千里秋水與天無表裏樹木矯矯蛟龍蟠屋瓦鱗鱗雪霜洗林下病人毛骨醒目愛清光不知已秋風自作竽籟聲更送城笳夜深起客衾初寒睡未能忽得子詩哦以喜子求我和何勤劬我知枯疎少知已子真愛我常在心安用蕪辭煩筆紙冬曉書懷羣鷄啁哳天始明東方吐日霜尚氷長簾高褰掃落葉短杌背立吹殘燈昔時氣鋭過奔浪今日病減真無蠅南箕翻翻世所效白璧皎皎誰非憎屠龍破産習已妄畫蛇著足棄未能不容當時孔何病更譽衆列顔非朋坐知天下書最樂心縱塵土酒可憑莫過二事賢且聖胡不學外常騰騰代書寄趙宏憶承昨嵗致書召遂入江城同一笑羸奴小馬君所借出犯朝寒鞅頻掉從來萬事固已拙况乃病敦顔不少去隨衆後已自枉更苦世情非可料一心耿耿浪誠直百口幡幡競訶誚獨君踴躍於我顧譬於真玉火空燒别來未幾嵗云換楊栁得春還窈窕東溪最好水已淥桃李萬株紅白照當時病卧不能出日倚東風想同調逡巡紅白委地休新葉可書隂可釣君持使傳入南師忽領貔貅過蓬藋僧堂取酒就君飲不覺乗懽盞頻釂屋西明月過簾白簾角有時飛熠燿明聞鉦鼓催軍發共上高樓看旗旐日高行忽又别君從此閉門誰可嘯秋風已盡始得書喜聽車輪返窮徼身欲追隨病未能目斷珊瑚遮海嶠是時肺氣壯更惡日以沉溟憂不療豈其艱苦天所憫晩節幸値巫彭妙放心已保性命在握手猶驚骨骸峭今年霜霰雖未重室冷尚無薪可燎一畝酸寒豈易言局促不殊魚在罩勞君書劄數問訊深愧薄材無象肖君心卓犖衆未識安得辨口聞廊廟東津歸催吳秀才寄酒荒城懶出門常掩春氣欲歸寒不斂東鄰咫尺猶不到况乃傍溪潭石險風光得暖才幾日不覺溪上碧於染欣然與客到西岸衣幘不避塵泥㸃谷花洲草各萌芽高下迸生如刻剡梅花開早今已滿若洗新粧竟妖臉栁條前日尚憔悴時節與催還荏苒沙禽翅羽亦已好争趂午暄浮翠瀲從今物物已可愛有酒便醉情何慊君厨山杏舊所識速致百壺須灧灧心知萬事難刻畫惟有醉眠知不忝預愁酩酊苦大熱已令洒屋鋪風簟送吳秀才一年過臘已十日餘日到春能有幾春來逺近不可問冷碧先歸在流水梅花向今獨已繁玉艷都占春風間草萌出土亦過寸衆芳次第掛清寒虛堂盡日對風影我獨此守青瑯玕故人逺來未一醉車鞅欲去今誰攀憐君滿腹富文綵倦尾赤色無波瀾連年禮部試多士白羽捨置操榛菅今君怱怱負壯節我亦春色羞衰顔况逢離别可奈何憶人日老情日多和章友直城東春日東流抱孤城雨洗見春色風吹百草根道路千里碧莫盡溪漫漫去波瀾散無跡遥林缺見山冉冉蒼藹積沙禽有遺蹤文字不可識青松對桃李桃紅李花白紅白勢方競青青守嵓側君意無不諧研談欲俱得賦詩多所陳炳若觀龜拆城東不待到衆物已厯厯簡如晦伯益一年孟春月已晦思去去臈如須臾春事競在二月間急景豈與正月殊今看桃李花未出不知花開能幾日日尋桃李不暫停恐未十回花已失筋骸縱病心尚壯酒醴雖無隣可乞城東欲與君試行莫嫌冷落逐書生高松高松高干雲衆木安可到湯湯鳴寒溪􅟠􅟠倚翠纛側聽心神醒仰視目睛眊風雨天地動一葉不欹倒豈同澗中萍上下逐流潦豈同墻根槐巻巻秋可掃鳯凰引衆禽此木隂可燾君求百常柱星日此可造般匠世有無方鍾野人好青青間青青青青間青青盡望密如罅風柔聲自和草蓐陰可藉遊蜂不暫去啼鳥時獨下繚牆隔深園高枝出虛榭貴人無餘事歡言持玉斚茅屋亦自好吾廬四如畫故人儻可遲倒屣不辭迓洪州洪州城中荒且逺每到弱馬常驅馳交朋顧我亦已厚謝詞有禮寧當違人生有累乃汲汲萬事敦迫如銜羈山中無塵水青白安得去吟梁甫辭詠史二首仲尼一旅人吳楚據南面不知千載下究竟誰貴賤賜也相國尊子思終不慕乃知古今士輕重復内顧泝河客舟泝河西北行日夜似與河流争不知洶洶竟何為怒意彼此何時平但疑天地送秋至惡雨疾風相觸聲我病入寒饒睡思歸夢正美還遭驚東南水鄉我所住楊花散時春水生湖江渺邈不見岸汨汨自流無可憎石泉百丈落山觜此縱有聲清可聽莫如此水極㓙驁土木暫觸還轟轟吁嗟造化何厚薄惡物受稟無由更尹師魯衆人生死如塵泥一賢廢死千載悲漢初董生不大用厥政自此慙隆姬至今董生沒雖乆語者為漢常嗟欷尹公素志任天下衆亦共望齊臯伊文章氣節盖當世尚在功德如毛釐安知蔓草蔽原野雪霰先折青松枝百身可贖世豈惜訃告四至人猶疑悲公尚至千載後况復悲者同其時非公生平舊相識跽向北極陳斯詩發松門寄介甫南風夜發吹孤舟起視北極星辰稠曉開征㠶破長浪挾以兩艣當中流松門東面見廬阜其上少日煙氣浮舟人指我極四望黑處無底蛟龍湫櫧溪左蠡信浩蕩兩涘若粒分岡丘落星囷囷孰可狀清漢夜獨垂牽牛故人曾期此同載捨櫂直抵雲山游念今五載負斯語心獨動蕩風中斿况聞肥遯須山在早時事力胡能謀所嗟親老食未足安得一畝操鋤耰此言此笑吾此取非子世孰吾相投今諧與子脱然去亦有文字歌唐周北風北風動地江飜天我坐極浦維空船浮雲溟溟下無日老樹自擺相樛纒薰琴空聞不可見應已乆絶朱絲絃遂令陰飈自回幹安得嵗物無疪愆江頭酒賤且就醉勿復著口問陶甄過彭澤淵明昔抱道為貧仕兹邑幡然復謝去肯受一官縶予觀長者憂慷慨在遺集豈同孤䝉人剪剪慕原隰遭時乃肥遯兹理固可執獨有田廬歸嗟我未能及江上懷介甫江上信清華月風亦蕭洒故人在千里樽酒難獨把由來懶拙甚豈免交游寡朱絃任塵埃誰是知音者讀五代史唐衰匪一日逺自開元中尚傳十四帝始告厯數窮由來根本强暴戾豈易攻嗟哉梁周間卒莫相始終興無累世德滅若燭向風當時積薪上曾寧廢歌鐘庭木庭中有佳樹清影四面垂往往風雨夜蛟龍此投依留之待鸞鳯未許燕雀窺誰謂烏鳥惡安巢最高枝不顧白日照直傍陰虹飛自恃棲託穩豈憂彈射危三春獨翺翔百鳥斂羽儀鳯凰不能争况乃鳬鴈微既務志意得都為世可欺白晝攫鼎肉從容擇牷犧近人不肯避一怒終夜啼遭其瞰牆屋禍患豈可移聽之欲占赦婦女固已癡忿害乃其所何肻報福釐行路指之嘆童稚争罵譏鸚鵡獻至尊言語固可奇翡翠輸太府器服所取資雉雞美文章贄贈理亦宜鷹鸇逐惡鳥天威得施為關雎於周室耿潔配后妃莫如此鳥頑飽食無所禆一善不能有醜聲日交馳但知擇嘉處巍然治其栖衆怒未易忽徼幸亦有斯安知無刀斧崩分弃毛皮且勿引蠧蟲使樹心本披亦有愛搏擊鉤連梟與鴟亦勿樂順已窟穴藏狐貍凡能致大患尠不自毫釐未知引避去此語足自規惜哉種樹意長與事乖違古來亦如此壯士徒嗟悲發彭澤卧聞擄聲知雨來起見江流與天合山回風吹霧不盡帆健船衝浪相沓歸雲難乗望空斷落日乍掩涼可納去家今夜一千里誰見愁來坐方榻菊花東籬菊花今已開萬物各自相驅催却尋桃杏那復有舊樹惨惨空牆隈年光日日已非昔人世可能無盛衰朱顔白髪相去幾勢利聲名相抑排三公未能逃餓死九鼎竟亦為塵埃乃知萬事皆自枉有便只宜持酒杯落葉秋雨與風相噴薄樹木可能無葉落琅玕散漫不可收野霧滿船誰掃掠垂楊千樹舊所惜顔色易衰由力弱空條尚舞不可休物意豈能知索寞菊花雖開能幾許新酒縱酸猶可酌朱顔久已拌銷減豈有功名堪冩貌衣冠塵土欲更洗其奈滿隄河水濁花開葉落須强醉壯士豈憂常落魄元豐類藁巻三
