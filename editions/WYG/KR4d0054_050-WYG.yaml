body:
  text: 元豐類藁巻五十宋曾鞏撰金石錄跋尾茅君碑茅君碑三茅者盈太元真君固定録真君衷保命僊君皆漢景帝中元間人盈天漢四年道成至元帝初元五年來江左句曲之山哀帝元壽二年乗雲而去至梁普通三年五百四十四年矣固至孝元時拜執金吾卿衷宣帝地節四年拜上郡太守五更大夫並解任還家修學成帝永始三年固為定錄真君衷為保命僊君梁普通三年道士張繹建此碑孫文韜書常樂寺浮圖碑常樂寺浮圖碑周保定四年立州人治記室曹明逵撰其辭云襄州刺史王秉字孝直建常樂寺塼塔七層其碑文今仆在襄州開元寺塔院其文字書畫無過人者特以後周時碑文少見於世者故存之九成宫醴泉銘九成宫醴泉銘祕書省檢校侍中鉅鹿郡公魏徵撰兼太子率更令歐陽詢書九成宫乃隋之仁壽宫也魏為此銘亦欲太宗以隋為戒可以見魏之志也魏侍中王粲石井欄記魏侍中王粲石井欄記貞元十七年山南東道節度使于頔撰掌書記胡證書一記參謀太子舍人甄濟撰判官彭朝議書云上元二年山南東道節度使來瑱移井欄置於襄州刺史官舍故為記甄濟者韓愈所謂陽瘖避職卒不汚祿山父子事者也其文得之為可喜而朝議書尤善皆可愛者也襄州徧學寺禪院碑襄州徧學寺禪院碑黄門侍郎修國史韋承慶撰太子少詹事鍾紹京書開元二年立其文云襄州人將仕郎阮𢎞靜與其屬人建徧學寺禪院故立此碑承慶有辭學張易之敗時承慶以附託方待罪衆推令草赦書永慶援筆而成衆壯之紹京景龍中以苑總監從討韋氏有功惟嗜書家藏王羲之獻之褚遂良書至數十百巻以善書直鳳閣武后時榜諸宫殿明堂及銘九鼎皆紹京書也其字畫妍媚遒勁有法誠少與為比然今所見特此碑尚完尤為可愛也徧學寺於宇文周為常樂寺於今為開元寺襄州興國寺碑丁道䕶書啓法寺碑一興國寺碑一皆隋開皇中立啓法寺今為龍興寺在襄陽城西興國寺今為延慶寺在望楚山歐陽永叔云興國寺碑不知所在特見其模本於太學官楊衷家而此碑陰又有道䕶書襄州鎮副總管府長史栁止戈而下十八官號姓名其字尤可喜得之自余始世蓋未有傳之者也韓公井記韓公井記開元二十二年初置十道採訪使韓朝宗以襄州刺史兼山東道襄州南楚故城有昭王井傳言汲者死行人雖暍困不敢視朝宗移書諭神自是飲者亡恙人更號韓公井楚故城今謂之故牆即鄢也此記今移在郡廨中故城改為牆者由梁太祖父烈祖名誠當時避之故至今猶然晉陸禕碑晉陸禕碑此碑云禕字元容呉郡呉人其先家於陸鄉因氏姓焉顯考呉故左丞相禕赤烏六年召宿衞郎中轉右郎中左郎中治書執法平中校尉平義都尉五官郎中騎都尉遷黄門侍郎封海鹽縣侯加裨將軍行左丞相鎮西大將軍事又云委戈執笏入賔皇儲而呉志云孫皓大鼎元年以陸凱為左丞相又云凱子禕初為黄門侍郎出領部曲拜偏將軍凱亡後入為太子中庶子皆與此碑合而此碑晉泰寧三年立也尚書省郎官石記序尚書省郎官石記序陳九言撰張顛書記自開元二十九年郎官石名氏為此序張顛草書見於世者其縱放可怪近世未有而此序獨楷字精勁嚴重出於自然如動容周旋中禮非强為者書一藝耳至於極者迺能如此其楷字蓋罕見於世則此序尤為可貴也桂陽周府君碑并碑陰桂陽周府君碑并碑陰歐陽永叔按韶州圖經云後漢桂陽太守周府君廟在樂昌縣西一百一十八里武溪上武溪驚湍激石流數百里昔馬援南征其門人爰寄生善吹笛援為作謌和之名曰武溪深曰滔滔武溪一何深鳥飛不渡獸不能臨嗟哉武溪何毒淫周府君開此溪合真水桂陽人便之為立廟刻石又云碑在廟中郭蒼文今碑文磨滅云府君字君光而名已訛缺不辨圖經但云周使君亦不著其名後漢書又無傳遂不知為何人也按武水源出郴州臨武縣鸕鷀石南流三百里入桂陽水真水黎溪盧溪曹溪諸水皆與武水合流其俗謂湍峻為瀧溪退之詩云南下樂昌瀧即此水也碑首題云神漢者如唐人云聖唐爾蓋當時已有此語而史傳他書無之獨見於此碑也熙寧八年余從知韶州王之材求得此本之材又以書來曰按曲江縣圖經周府君名昕字君光則永叔云圖經不著其名者蓋考之未詳也又有碑陰列故吏及工師官號州里姓名之材并模以來永叔蓋未之得也其碑陰曲江字皆作曲紅而蒼江字江夏字亦作紅蓋古字通用不可不知此學者所以貴乎博覽也永叔又記劉原父所得商洛之鼎銘云惟十有亖古四字月旁死魄君謨問十四月者何謂原父不能言也以余考之古字如亦作㚐人作冗之類皆重出如此者甚衆則此文作亖者特二字耳永叔原父君謨皆博識而亦有所未達學者又不可不知故并見之於此也唐安鄉開元寺卧禪師凈土堂碑銘唐安鄉郡開元寺卧禪師凈土堂碑銘監察御史張鼎撰雍縣尉呉郁書天寳九載庚寅立稱卧禪俗姓辛氏名順忠隴西狄道人隴右按察使崔昇進奏住河南開元寺右脅而卧諸漏已無開元中詔隴右節度使張守珪為就寺造凈土堂故為銘自河隴沒於羌夷州縣城郭官寺民廬莫不毁廢唯佛寺與碑銘文字載佛寺者往往多在世皆以謂四方幽逺殊類異俗不知禮義出於天性故夷之然其於佛皆知信慕以其有罪福報應之説余以謂四夷雖恣睢甚者及曉之以曲直是非悦且從也固不可謂其天性無欲善之端是以虞夏之世東漸於海西被於流沙朔南暨聲教則能令其信慕者亦非特有佛而已也彼以罪福報應之説動之未若不動之以利害而使之心化此先王之徳所以為盛也江西石幢記江西石幢記觀察支使試左武衞兵曹參軍來擇撰太和二年建自採訪使班景倩兼知黔中道為始判官已下皆列次姓名後石幢記都團練判官試太常寺協律郎李方𤣥撰太和七年建自使檢校右散騎常侍兼侍御史中丞裴誼為始副使已下皆列次姓名續石幢記節度掌書記陳象撰光化三年建自使開府儀同三司檢校太保兼侍中潁川郡鍾某為始列副使已下如後記續立石柱題名記知節度判官胡順之撰天聖元年建自太平興國元年自殿中丞通判軍州事李斡為始至熙寧九年祠部郎中集賢校理葉均此下闕辱井銘辱井銘辱井有篆文云辱井在斯可不戒乎并下文共十八字在井石檻上不知誰為文又有景陽樓下井銘又有陳後主叔寳辱井記云江寧縣興巖寺井石檻銘莫知誰作也厯序隋文帝命晉王廣伐陳後主自投井中令人取之驚其太重及出乃與張貴妃孔貴人三人同束而上其末云唐開元二十二年三月十七日前單父縣令左轉此縣丞太原王此下闕漢武都太守漢陽阿陽李翕西狹頌漢武都太守漢陽阿陽李翕西狹頌武都太守漢陽阿陽李翕字伯都以郡之西狹閣道通梁益縁壁立之山臨不測之溪危難阻峻數有顛覆霣墜之害乃與功曹吏李旻定策勅衡官掾仇審治東坂有秩李瑾治西坂鐉燒大石改髙即平正曲廣阸既成人得夷塗可以夜涉迺相與作頌刻石其頌有二其所識一也其一立於建寧四年六月十三日壬寅其一是年六月三十日立也又稱翕嘗令澠池治崤嶔之道有黄龍白鹿之瑞其後治武都又有嘉禾甘露木連理之詳皆圖畫其像刻石在側蓋嘉祐之間晁仲約質夫為興州還京師得郙閣頌以遺余稱析里橋郙閣漢武都太守阿陽李翕字伯都之所建以去沉没之患而翕字殘缺不可辨得歐陽永叔集古錄目跋尾以為李㑹余亦意其然及熙寧十年馬瑊中玉為轉運判官於江西出成州所得此頌以視余始知其為李翕也永叔於學博矣其於是正文字尤審然一以其意質之遂不能無失則古之人所以闕疑其可忽歟近世士大夫喜藏畫自晉以來名能畫者其筆迹有存於尺帛幅紙蓋莫知其真偽往往皆傳而貴之而漢畫則未有能得之者及得此圖所畫龍鹿承露及嘉禾連理之木然後漢畫始見於人又皆出於石刻可知其非偽也漢武帝元鼎六年以汧隴西南接於巴蜀為武都郡及其後始分而為興州為成州成州則武都之上祿也郙閣立於建寧五年翕治崤嶔西狹郙閣之道有益於人而史不傳則頌之作所以備史之闕是則傳之亦不可以不廣也元豐類藁巻五十
