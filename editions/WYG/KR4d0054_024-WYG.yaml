body:
  text: 元豐類藁卷二十四宋曾鞏撰制誥吏部尚書制尚書政本而吏部天官所以考擇人材以成天下之務近世既失其職但受成事而已今朕既正官名且將歸其屬任立法之始推行在人其於程能議功定勲頒爵當率厥屬謹循科條非得周材曷稱茲位某忠厚仁篤秉義守正列於侍從休有令名是用選而授之其務將明使朕所以作則垂憲不獨於今可行方當施之後世蓋汝有稱職之美則朕有知人之明尚其懋哉無替厥服吏部侍郎制尚書本天下之務而吏部典掌選舉至於所屬之曹有行封爵議勲庸稽功課之事咸以咨焉近世以來職分於他司而位為虚器今朕董正治官使歸其名分者豈虚為哉固將循之以求其實蓋明紀綱定制度以釐百工熙庶績此朕志也侍郎實貳其長非獨當修其官且將推明新制以行今而傳後則其選授豈不重哉某文學行義有聞於時列于從官獻納惟允是用命爾實首茲選其體予所以擇而使爾之意務祗厥服使政舉法行稱朕之意惟爾亦永有稱於後世可不勉歟户部尚書制戸部之於中臺為周官司徒之職掌財賦之調度金糓之出入以待邦國之用歴唐五代征歛煩興而使名雜出地官之職蓋存虚號而已今朕正名以定羣臣之位辨位以責庶務之實尚書政本典領經費之司所屬尤重博求天下之士以宜其官某誠篤强敏智慮精密董煩治劇材力有餘民曹上卿無以易汝理財之術待汝有為今歲入甚廣而歲費所餘者無幾使官用有節而餘蓄可致公藏贍足而民賦可輕在爾能知其方庶幾承朕之志尚懋爾守以承厥叙户部侍郎制田疇生齒之籍榖帛貨泉之計下以制民之産上以經國之用地官之貳實叅總焉朕方因能以用人正名以授職俾服予事必惟其材某頃以通敏之姿久更要劇之任往副民部孰如汝宜夫知農之艱難而有以勸助視財之豐匱而有以均節使公藏贍足而私蓄羡盈朕將觀爾之能爾其無懈於位禮部尚書制昔舜命伯夷典禮后䕫典樂至周并為宗伯之官今禮部尚書蓋其任也威儀度數之詳聲音律吕之别莫不屬焉精微之至所以統和天人順遂萬物其體可謂大矣矧今典領實乂考擇天下之材夫能無曠其官以充吾所以寄屬之意歴選在位今得其人某明允直清知經信道制作之事舊惟討論春官古卿是用授汝朕承百工之敝方欲作則垂憲以成一代之典使五禮之節同於天地八音之和格於祖考天下智謀材諝之士得而用之恃汝能稱其官庶幾輔予于治無懈于位以副朕知禮部侍郎制夫禮之節文樂之和聲所以成三材而育萬物典掌之任秩亞春官朕方考正百工之名而大修法度之政其於寄屬必惟其人某材出士倫學通經術宗伯之貳爾往欽哉其思先王制作之方而務知治民易俗之要其於理體非在於鐘鼓玉帛而已尚稱厥職以副予作則垂憲之心可兵部尚書制中臺政事所出兵部司馬之任所以典總師徒揚國威武至於按圖辨地駕乘庫兵司存之事莫不咨焉今朕考古以正官儀將使處其名者必効其實由是以推朕之志明紀綱成法度焉八座之貴夫豈輕以屬人某明達事幾好謀能斷列於侍從忠益居多夏官古卿是用顯授朕患今之兵不與農合故因保伍之法修閲試之令庶夫使民知兵近於古義夫究宣朕意使吏能奉承而民皆嚮勸以共武之服時汝稱職可不勉歟兵部侍郎制夫兵天下之備誰能去之自士不出於井地而將非六事之人歴世以來皆知古之宜法而患夫勢之難行朕獨慨然有志於是故修保伍之令明戰陣之教先王之跡庶或可幾經營之勤心亦至矣惟是夏卿之亞實參典領之司方正官儀尤慎推擇某材敏忠篤明習治體圻父之貳往惟汝諧夫能奬誘務農之民悅趨講武之政馴致有漸而彌綸不踈惟無廢爾之勤可以輔朕之志尚思自勉以服訓詞刑部尚書制昔舜命臯陶曰汝作士明于五刑以弼五教蓋刑者所以助治而非致治之本也其縱入輕重得失之際人之舒􅃤繫焉此古之聖王所以未有不先慎罰也今朕悉心以正庶官之任而中臺八座典司邦禁選用之體得人惟艱某明允通博資以術學服采于位厥聲顯聞秋官古卿是用命汝蓋前世之治斵雕為樸破觚為圜而憲網踈風俗美朕甚慕焉爾尚體朕之心折民以恕使辨訟自息而王政寖明可不勉歟以輔台徳刑部侍郎制刑者所以禁人為非而聖王之所尤慎中臺總領之任秩貳秋官之崇朕方正名以稽羣吏之治而大修制度之文必惟其人俾服予采某慈恕忠篤明習法令叅執邦典莫如汝宜夫能使民無寃亦已善矣推之可以至於使民無訟爾尚勉哉以承予綱紀四方之志工部尚書制昔舜咨于衆疇若予工羣臣薦垂往祗厥序蓋繕修興造程衆藝飭五材國家之務不可以不屬之其人今中臺起曹實踐其任矧屯田虞衡平水之職莫不𨽻焉正名之初其選尤重某材力强敏周于畫計更閱内外時稱汝能俾服冬官蔽自朕志夫詳明品式以訓匠建事使費省於國力寛於人至於墾地山林溝洫之政莫不畢舉皆汝守也其尚懋哉以率厥屬工部侍郎制夫飭五材程匠事國家之務所不可已也故共工之事任屬非輕朕方若稽舊章財正官號思得智能之士以副采擇之詳某開達敏强明習典故冬官寵列俾介厥司考究制度之文紀綱修繕之政在爾能舉其職以稱吾經理萬事之心其尚懋哉往祗厥服禮部制朕正郡司之名而責其實歸天下之務而本之尚書故郎選甚高維春官之屬禮樂所出宜得智謀材諝之士以修厥官某業履望實見於世用考擇於衆莫如汝諧其尚體予董正治官之意於夫創制之初明紀綱興曠廢惟知其要乃能圖其詳惟悉心以祗厥服主客制朕甚重郎吏之選欲以斂羣材責功實典客之任列於門曹維時右人宜服茲寵國家之有賞典所以待汝有為膳部制牲豆酒膳辨其儀數而修其政春官之屬郎秩甚寵詢求材實爾允僉言尚思欽承以稱推擇駕部制輿馬輦乘之奉郵驛圉牧之治中臺要務主以郎曹敷求得人俾任吾事夫駉之頌養馬之詩也蓋其大㫖曰思無邪然則為政之方斯可知矣能識於是夫何逺哉庫部甲盾弓矢之器乘輿鹵簿之式武藏之任郎選甚高得士於朝屬任惟允夫稽功實以勸賞朕方必行悉忠力於事為爾尚無懈都官制係累舂饎之人恤其廪給而申其訴競主以郎吏國之舊章爾惟惠茲宜莅厥職尚思奮勵以稱敷求比部制内外經費之事總於句考之司郎實主之位重省闥爾惟明敏宜能厥官惟時懋哉以服予訓司門制門關筦鍵之事啓閉出入之節總其籍賦而審其禁令郎官之任爾允詢求尚敏勞能朕將考察屯田制率屯戍之兵服畎畝之事所以益邊省饋佐國裕民郎於中臺總其政令用爾之敏宜能厥官往服寵名無忘奮勵虞部制蒐田有時而澤梁有禁虞衡之守所以遂羣生而參化育中臺典領咸屬汝材其思順鳥獸草木之宜以稱朕愛人及物之意水部制川瀆隄防宣其利而備其害四方萬里之逺郎實總領秩甚寵焉爾以周材朕用選授夫知水之不以障而𨗳之使行此成法也推而見之於事待爾能稱其官御史中丞制御史府持吾邦法所以糾官邪繩不恪輔予于治非秉義純篤望實敷於上下不稱其任某强毅肅哲以禔其身博學精識通于世用是以考擇于衆寵以茲位夫有守正向公之志又有能辨是非之明抗論於朝使賢不肖忠邪不失其實此法之所以為治具而能佐吾以善養人之意使汝能宜其官則朕為得其所屬尚體予訓其惟懋哉知制誥授中司制典掌明命總持憲綱非博學有文强毅忠篤曷可以兼斯任哉某志行清夷材資敏達更踐内外試用惟允論思禁掖肅正朝端蔽自朕知拔于不次惟明於體要可以見於訓辭惟公於是非可以施於刺督尚懋厥守方觀爾能中司授太中大夫制朕正名以定百官之位辨位以責要務之實矧風憲之臣紀綱所屬曷可以不明其任哉某强敏開逺行誼仁篤學通古今擢典訓辭遂持邦法宜專分職以應新書是用進爾之階品在第四俾爾納忠宣力得壹意於中司以董齊衆工肅正内外庶余之作則更制罔或不䖍在爾懋哉知其所守責御史制中執法所以糾官邪繩不恪也其可以自為欺且怠歟某拔於䟽逺之中服在此位宜殫忠力以稱所䝉而按劾大臣既非其實稽其分職則自餒焉朕為之優容俾從薄責而進對之際公肆誕謾屬吏推窮獄辭明具論其情則懷詐比其治則瘝官夫身任紀綱之司而抵冒若此雖朕欲貸汝而如公議何斥守偏州尚仍階品往新厥志庶蓋前愆御史遷郎官制御史董攝紀綱肅正朝廷於政之有不當于理於臣之有不協于極皆得言之故吾甚重其選爾有列于此能勤厥職雖歲月未乆而風望甚高今有司奏爾之課於法當遷吾不得留易之郎位使爾知自効能不擇官則吾於報功亦有異賞爾其勉矣無忘訓言御史知雜制臺無大夫中丞則御史之首當專决庶務實總邦憲朕選於衆然後屬之其人豈不重哉某敏茂直清通於學問輟自右史往踐厥司夫振舉紀綱以闡明法度糾繩邪慝以肅正臣工朕方虚心志在於與人為善爾能苦口無患於不得其言其尚自强以允公論監察御史制御史持國紀綱所以糾官邪齊内外選衆而授厥惟艱哉爾好古知方强於自立刺察之任往其欽哉惟不回于
