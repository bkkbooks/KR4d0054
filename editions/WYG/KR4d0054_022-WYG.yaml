body:
  text: 元豐類藁卷二十二宋曾鞏撰制誥吳居厚京東轉運副使呂孝廉轉運判官制勅具官某朕進拔能吏以督視一路盖州縣政令之舉措公私貨食之歛散莫不任焉得人之難考擇惟慎以爾幹敏閲試惟舊用是分兹東部屬以使事夫施於民者厚而刑罰清求於民者約而財用贍使德流澤通而風化輯穆以稱朕憂憫元元而勵精庶務之意爾其勉矣徃服訓辭可西頭供奉官武遂等轉官制勅具官某王師西出以討不庭爾能殱擊兇殘恢復州聚錄功增位不以次遷勉服朕恩益思奮勵可曲珍四廂都指揮使絳州防禦使制勅具官某羌之獸心内相危害王師薄伐盖將天威爾能躬將士徒摧堅殪敵斬捕甚衆鼓行無前周衞典軍之官名城禦侮之寄兼是寵數以疇爾庸尚有異恩待爾來效可文思使張俊等遷官制勅具官某朕爰命六師奉辭西伐爾能効其忠勇深入羌中獲醜摧堅以㨗來上躐陞位等以懋爾勞其能繼於前功朕豈稽於信賞可文及甫吏部員外郎制勅具官某朕正百工之名而將責其實効其官吏考擇尤慎天官之屬僉曰汝能其往欽哉無忘勉勵可許安世都官員外郎制勅具官某徒𨽻傭役之人典其廢置而時其遷序主以郎吏其選甚高爾蚤以敏明升華儒館冝増階等往涖厥職尚思勉懋以稱簡求可皇伯宗諤贈太尉韓王制勅王者之於天屬覆之以光榮而恤其死喪之戚所以本人倫教天下也具官某以徳則循理小心始終無悔以功則受命仁祖趣定儲極以位則渠門赤舄任兼相將以爵則躐於五等列為真王以親則先帝之從父兄而余曰伯父顯名美實福禄之全可謂盛矣奄遘癘疾至於不起余聞震悼臨奠致哀再不御朝以伸情禮是用追加書賛進秩上公啓此大邦隆崇號稱余於親親之恩可謂備矣尚惟不昧服此寵章可齊宗壽三班借職制勅某有司言爾滿嵗當遷而奬進爾勞又當躐等是用加茲寵渥列於命秩往惟祗服以稱甄收可交州進奉使副梁用律洛菀副使阮陪太常博士制勅具官某䇿名蕃服納貢王庭將事之勤朕用甄録進其位等茲惟舊章往稱茂恩母忘祗恪可皇伯宗惠新婦郭氏進封郡夫人制勅具官某新婦某氏司宗於屬為近於位為重王於爵為貴蓋禮秩之見於外者既寵則施於内者宜殊爾徳性淑均稱其家室爰加象服之盛以大鵲巢之榮其尚欽承茲為異數可賈昌衡知鄧州制勅記舊俗者稱南陽之民夸奢上氣力難制御今其餘習殆尚有存者故有邦之任朕不輕以屬人具官某中外踐更令聞惟舊茲用考擇往分彼土蓋穰淯之間雖俗雜難治然教民敦本興於好善召信臣杜詩之遺跡在焉使農桑勸而風俗厚爾尚思繼於前人其往懋哉無替朕命可李良輔知廬州張竚陜州崔度蔡州王說徐州制勅具官某朕董正治官自朝廷始至於六服羣吏莫不考循其名以督課其實夫宣恩徳以逮下厚風俗以承上其選為重者非長民之任乎爾惟其人屬以茲位蓋奉職遵禮以有循良之稱苟能自勉則寵勞録最以明國家之典朕敢忘哉往欽厥司方稽爾效可知泉州陳偁梓州吳幾復湖州唐淑問並任制勅具官某吏之奉職循理能附其民使之乆於其官則上下相安而治化易洽今爾之材宜於既試俾仍舊服以懋厥庸尚體朕恩益思逺効可吳安特太僕少卿制勅具官某車府廐馬牧監之政典以卿士其選甚高念非得人曷賛其治爾材質明茂嘗更器使以憂去位既終喪紀宜更階等徃貳厥官其勤夙宵以敏功實可菊曩二右班殿直制勅具官某夷獠背恩賊殺命吏爾能擊刺醜類獻其首級宜陞位序以奬爾勞尚勵壯圖益思來効可馮正符借職制勅某西南夷背徳獸心敢闚邊隙爾能通宣兩誼協助軍謀宜進官榮屬之守護勉思奮勵無替前功可奉議郎景思誼授東上閣門使鄜延第一副將制勅具官某西討之兵有陳戰之功者朕無不錄爾能致其材武奮擊黠羌克敵摧鋒屢以㨗報疇庸較實宜有異恩介上閣之使名貳連營之將領兹為奬拔蓋匪常科尚勵壯謀益思來効可皇太后親姪高公繪通州刺史高公紀達州刺史制勅具官某等朕有顯親之心欲形於天下故加恩母黨所以本人情隆世教也爾等皆於外家實在近屬持身恭慎朕所識察刺臨州郡典視祠宫秩寵地優並膺拔用尚勵爾欽承之志以稱余廣愛之仁可梅福封壽春真人制勅某在漢之際數以孤逺極言天下之事其志壯哉晩而家居讀書養性卒遺俗高蹈世傳為仙今大江之西實存廟像禱祠輒應能澤吾民有司上聞是用錫茲顯號光靈不冺其服朕恩可卓順之直翰林醫官局等制勅某稽其醫事而制其食先王之興也屬以愛主之疾爾能調治有瘳是用寵以官榮進其服品往遵厥職無替恪恭可成卓閣門祗候制勅具官某長川廣谷之間與蠻夷壤接爾處徼巡之任能練達人情輯寧疆候守邊之臣稱爾之材謂難代易是用進爾職於上閣而俾恭其舊服朕於念勞奬善之心可謂至矣其思綏靖以稱朕恩可溪氊本族副都軍主等制勅某守邊之臣屬爾奉其方物來獻闕庭朕惟爾嘉是用命爾還其種落典治一軍徃勵忠勤益思來効可景青宜黨令支團練使阿星刺史制勅某爾有摧鋒克敵之功而又奉其方貢來見闕廷寔勇且忠法當甄進兵團之任以寵爾勞往其祗服益思來効可論氊巴柯族軍主結厮雞柯族副軍主制勅某爾父有嚮慕中國之心殁而不遂其志屬爾于朕願備一官朕甚憐之是用加命爾秩往其祗服益勵忠勤可阿憐官捉厮雞並本族副軍主制勅某爾父效貢來庭因得進見以爾為請願備一官朕嘉其尊嚮中國之勤是用錫爾命秩往思忠恪以稱朕恩可内一段作爾父因其種人入脩貢職以爾為請温暠知欽州制勅某州有兵民之寄而地在疆埸之間則常擇用材武之臣屬之守禦之任爾以能進往祗厥服尚思綏靖以稱簡求可劉安等中書省主事令史制勅具官某等右省詔命之所出也吏治文書非習法令熟成事不能稱其任爾等皆以命秩往祗乃服無忘恭恪以慎厥司可知潁昌府韓維再任制勅朕待天下之士未嘗不篤於恩况於故舊之臣朕所加厚則於順遂其意夫何愛哉具官某昔在宫朝事朕左右今列職秘殿位寵且親而便其故鄉屬以州任雖歲既再滿然重奪其志是用仍其舊服俾祗厥官以致朕求舊之仁尚勵爾在公之義可米贇等轉官制勅具官某爾以衆西出討擊羌虜斬獲首級有司以聞是用甄録爾功躐陞位等往其勉矣益勵壯圖可雍王顥乳母宋氏贈郡君制勅某氏惟雍王顥於國屬之親且愛而爾有乳養之勤故其生也錫之爵邑其殁也飭以恩榮是用追命爾封進於列郡以光幽穸尚服寵章可豐稷吏部員外郎制勅具官某尚書正本而吏部天官所以綜叙羣材以成天下之治郎於典領其選甚高是用擢爾之能俾叅厥服朕方勵精政理而務在得人爾惟懋於其官庶幾承朕之志可吕和卿考功員外郎制勅具官某計羣吏之治而明黜陟之法臺郎典領列於左曹拔用爾能俾叅厥位夫能善於其職固將圖爾之勞可韓晉卿莫君陳刑部郎中制勅具官某刑者所以助治而聖人之所尤慎中臺叅綜郎選甚高爾曉達吏方宜在茲任夫惟篤於明恕乃以副朕欽恤之心其往懋哉以祗厥叙可范諤知密州范子諒濮州劉士彦泗州制勅具官某守土之官民事所屬朕方勵精庶政之日尤務在於得人考擇於朝爾往惟允夫能宣布恩徳以拊循吾民而綱理風俗則為能稱其任爾其可不勉歟東端翰林醫官制勅某爾父易簡以醫入侍處劑湯液有勞可旌進遷爾官用申奬寵往惟祗恪以稱朕恩可沈士安西綾錦副使制勅具官某明習禁方以醫入侍處劑湯液有勞可旌進貳使名以申奬寵往承厥叙無替爾勤可王暎楊宗三班借職制勅某爾等備吏屬治文書勤亦乆矣是用從爾之請錫之命秩往惟祗飭以稱朕恩可王從伾知岢嵐軍制勅具官某崇築壘培本以輯治軍旅及四方既平而假守之臣實任民事列於有土之官矧嵐谷並邊寄屬尤慎爾以選擇往祗朕命夫能開示恩威以惠養吾人而懷撫異俗則為善於其職尚思爾守無替訓辭可吕升卿館閣校勘通判鄆州制勅具官某鄆有提封之廣生齒之衆於東為極郡賛貳政理選授惟艱爾蚤以藝文列於辭館宜更階品往承厥叙無忘祗慎以服朕恩可陳康民管勾永興等路常平張太寧提舉秦鳯等路常平制勅具官某等朕為保伍之法寓耕戰之政典農之官屬以兼領蓋分路而治隃制或難固當從宜使之易地是用命爾換部而使夫能利力田之民脩講武之令務在各奮爾庸不失其職則為能體朕意其尚懋哉往遵迺服可詹中行知無為軍制御史有言責之臣朕之所取信也言而欲遂其忿鬩之私乃至於失是非之當豈獨朕於取信失其所屬蓋汝之以言為職誼豈當然俾去憲臺兼榮職秩往臨軍壁宜體朕心駙馬都尉王師約轉觀察使制朕於婣戚之臣未嘗不篤於恩意然其積勤累善不罹罪悔而七歲一遷其官則必循用舊章蓋爵賞者天下之至公朕不敢以私撓法也具官某出于景族選上貴主有淑慎之行無怠肆之失第其閥閱宜得叙陞廉按一州以為爾寵蓋爾自初仕迄此再増厥位皆以歲滿應於遷格則朕之謹于信賞爾之安其常守上下之際豈不兩義俱得哉無忘勉勵以永保於榮名可崔象先等帶御器械制勅具官某乘輿所在供御之物無一不備具者故鎧甲弓矢屬之以從者亦不去於側非左右親信惡足以任此哉爾給事惟舊宜就茲列益思祗恪以稱厥官蔡京起居郎制勅具官某王者言動必書豈獨思為後嗣法哉施之於已固欲擇語黙慎行止也執簡肆筆必也屬之其人爾之弟卞既已列於右史今復不次用爾使記予事位於左省士之在此選者希矣而爾之叔季並直同升其於榮遇世罕及者朕恩若此則汝之自効宜如何哉其懋厥脩以報所受可王中正种諤降官制朕大興士衆屬汝等以伐羌固將舉其巢穴非徒卻虜收並塞之地而已兵西出則近而爾等東繇綏徳囘逺之路以疲士馬費芻粟致功用不集中正議既不審又約有分地當攻其左而不能奮擊以殱除醜類夫軍賞吾必信而罰亦安得已哉是用按爾之罪降秩有差其體寛恩尚思報稱可封曹諭母制曹氏國之外屬而諭實爾之出諭既有列於朝亦有追榮及爾是以封之列郡秩以寵名茲為異恩以光幽窆張知均州制嶺之西南桂為劇部外有溪居海聚之民壤錯内屬拊巡鎮守詎可屬非其人爾比選于朝往備茲任而内不能統齊士吏外不能綏靖華夷致茲繹騷自干邦憲奪其美職處爾偏州茲惟朕恩無忘思省可元豐類藁巻二十二
