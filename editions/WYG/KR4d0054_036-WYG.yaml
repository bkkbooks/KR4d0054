body:
  text: 元豐類藁巻三十六宋曾鞏撰啓狀應舉啓右鞏啓伏念鞏材質淺陋藝學荒蕪讀聖人之經未知大義明當世之務多泥舊聞雖堅樹立之心豈適通變之用矧罹禍釁屢抱憂哀是以三遇文闈一踰歲紀足跡不游於塲屋姓名不署於鄉閭僕僕東南有衣食婚嫁之累拘拘蚤夜惟米鹽薪水之憂今者側聽詔書講求士類顧私恩之可念迫生理之難周義不自皇勢當强起盖以出而載質無他業之可為仕以為貧亦古人之所處遇髙明之見照殆否結之將通伏以某官梁棟懷材琮璜茂器發文章之素藴當仁聖之盛期忠言嘉謀施之有效流風善治所至可傳嘉奬士倫助成世教况親承於著令方序别於羣材藐是羇孤最為滯拙仰遵舊禮敢忘桑梓之恭輒進曼辭庶當鷄鶩之贄察其素學采以寸長盡繄及物之仁惟俟至公之賜謝杜相公啓伏念鞏志雖策礪性寔滯頑行不足比古之人材不足適時之用居常齟齬動輒困窮徃以孤生而蒙牧接又遭大故而被救存非常之恩德所加空知感激無用之技能素定曷有報償至於數千里之間三四年之後去冬之首方能属思以為書積日之勤庶或因辭而見意不謂使者至門之日正値相君失子之初遠瀆髙明巳難期於省覽况逢哀惻豈能必於薦聞因此復憂懇悃之誠無由自達視聽之側雖推心之遠大寧責禮於賤微然義未足以論酬而言又不得以叙謝其為私計豈敢自皇伏惟相公當世表儀本朝柱石許還私第聖意雖優於大臣召用安車人心素望於元老伏祈上為邦國善保寢興囬傅侍講啓鞏啓伏審祗膺詔檢入奉經筵伏惟慶慰伏以某官秉德粹冲受材閎廓遘盛辰而開迹席膴仕以陞華善政流風已推行於民上髙文大策久聳動於朝端果允僉言特膺迅用從容帝幙方演暢於微言密勿禁林佇裁成於明命自聆拜寵方念騰書辱見奬於舊遊遽先流於華問欣愉感幸交集悃誠代人謝余侍郎啓右某啓伏念某歸而閒處時所背馳分功名之無期嗟志意之空大言當世之事懼尚口而更窮求後人之知因著書而自見疎闊巳甚抵棄未能輒布聽聞方虞訶譴属小兒之過拜辱餘論之見存指瑾掩疵大為之地憫窮悼屈勤出於衷省枮槁之姿力乖報德激哀殘之氣感欲忘身瞻風采之夐遥役魂神而飛去尚當益壯以塞誤知與劉沆龍圖啓右鞏啓伏念鞏方抱憂哀且多疾病貧不得巳則俗事皆當自謀旅無所容則世人誰肯見恤今者伏遇知府龍圖給事愷悌成德勸勉為懷忘後進之至微假温顔而與接知其孤立念其數竒謂其有詩書之勤則曲加於奬待謂其有衣食之累則特甚於矜憐且使受田之獲安實由為地之至大在甘㫖有毫髮之助於子弟乃丘山之恩况此餘庥可均敝族雖遠台坐常注愚心復得交游之傳愈知意愛之厚自非土石豈不激昻粗知古今可勝感勵恨當迷塞曷用報償而方先人之葬送未成偏親之奉養多乏四弟懷仰哺之託九妹有待年之期凡糜敝於秋毫皆經營於方寸顧惟私計當議遠遊世俗險艱豈諳甞之不熟性靈疎拙寔齟齬之可憂未卜趨承更増慕戀謝解啓伏覩解文首蒙舉選伏念鞏才非卓越識匪該通素志慕乎古人故時情之所背虚名聞於當世故衆忌之所排患難艱危流離頓挫孰有至孤之迹敢萌希進之心顧生理之難周迫私衷之可念舉而干祿誠匪素懷仕以為貧竊將自比是以聞詔之出負笈以来豈意片文首塵髙選以至天倫之薄陋子黨之空疎皆自單平得蒙收齒退惟會合亦有端原此盖伏遇某官崇奬士倫助成世教以虹蜺之光而被飾以律呂之氣而吹嘘致此屯窮階於振發敢不勉増素學益勵前修庶全必勝之名以答至公之賜謹奉啓陳謝囬李清臣范百祿謝中賢良啓右鞏啓竊以設科以求特起之材發策以訪可行之論是維髙選果得異能伏以賢良某官志敏以强詞嚴而贍迹前世之事而愽極羣書議當今之宜而常引大體及親承於聖問遂絶出於時髦方喜聞風遽蒙枉記仰惟謙抑之過第積感銘之深囬人謝館職啓伏審試藝禁林陞華儒館伏惟慶慰伏以都官學士英材傑出玉璞混成遘時運之光華奮文章之温雅第榮科於秘殿蚤邁等倫陞膴仕於本朝荐騰譽望較雕龍之麗藻利架鼇之秘局果被明緡式符輿頌方展騰書之好遽蒙削牘之私仰服謙撝退深感戢與北京韓侍中啓右鞏啓伏念鞏顧以諸生守兹劇郡撫敝封之云始望仁境以非遥恨無羽翼之飛馳與操几杖欲以緘縢之託寓聊布腹心然而治獄訟之浩煩振紀綱之弛壞覺形勞之少暇信材短以難周致是懇誠稽於進達属髙秋之在序惟坐鎭之多餘必有禎祥來寧動履伏以畱守司徒太師侍中蓍龜四海柱石三朝有太平之功周公之所以勤王室有純一之德伊尹之所以格皇天固巳書在宗彛藏之盟府而乃以退為進處上用謙自避遠於煩機久淹囬於外服宜從巖石之望趣正衮衣之歸敢冀上為宗祊善綏寢餗二鞏啓伏念鞏習吏非長得州最劇耗神明於簿領疲精思於追胥尚恃餘庥幸無曠事然而塞茅心而已甚飾竿牘以未遑故魂爽雖鶩於門閎而候問不通於幕府仰繄明恕終賜矜容今者北土早霜晏隂始肅伏惟順天時之常序養浩氣之至和神民所依福祿來萃恭以司徒太師侍中股肱三世龜鑑四方勤勞著於邦家功德施於社稷方且歛嘉謀於一面欝羣望者五年郭令之繫安危素形公論周公之為左右宜冠本朝華夏蠻貊之傾心昆蟲草木之望賜豈伊蕞質獨注微誠伏惟上為宗祊善調寢餗囬許安世謝館職啓右鞏伏審顯承詔檢進踐書林伏惟慶慰國家聚四部之書藏之秘近擇一時之俊任以校讐映朝序以甚清簡上心而滋厚恭以檢正學士學深而富識大以明擢平津於廷中蔚為首選頼王祥於海上休有治功天衢寢亨時望攸属遂膺給札之召來賁登瀛之遊侍從邇班廟堂大任自兹而徃計日可期承遠貺於珍函第仰懷於謙德賀韓相公啓右鞏啓伏審入膺典冊首秉鈞衡凡在生靈孰不慶幸伏以史館相公言為蓍蔡行應凖繩仔肩一德之純弼亮三朝之盛君牙之纘舊服世濟忠勞吉甫之憲萬邦身兼文武果還柄用復冠中台茂惟㧞出之材素藴非常之畧方且誼形王室盡邴魏之謀謨澤潤生民本蕭曹之清靜遂長生於百姓付衆職於羣能躋世太和與人休息使雨暘寒燠罔不從時草木蟲魚皆當蒙惠聲教可加於異俗功名必紀於無窮鞏一去朝行六更歲序顧兹舊物自慚簮履之微保是孤生方頼陶鈞之賜其為忻忭寔倍等倫襄州與交代孫頎啓右鞏伏念講聞譽望積有歲時厯下分符巳出吏部之後漢南守土又居仁政之前惟事契之稠重實愚㝠之幸會比於道路始接光儀䝉特異於眷存仍曲加於燕勞論情至厚曾何謝於古人處義甚髙固可敦於薄俗違離未久感戀交深諒惟得日之良甫及下車之始頒條多預納福甚隆伏惟知府少卿積學内充懷材間出久更當世之用自結明主之知髙冠兩梁入綴班於九列輕車駟馬出按部於百城方圖閒燕之宜自請蕃宣之便佇膺詔召不待歲成更惟上為廟朝善綏寢餗禱頌之至序述寧殫洪州到任謝兩府啓伏念鞏天與樸愚衆知凡近材不堪於施設動輒乖宜學多失於變通理難應用久與遊於儒館仍有列於朝紳適當千載之期曾乏一毫之補既不能明國家遠大之體為上建言又未知究鄉閭委曲之情與民興利七移歲序四易外官坐尸祿廪之優寂無稱効幸属章程之備得以持循兹蒙補郡之恩俾遂便親之請望故鄉而接壤與仲弟以連城及是忝踰出於假借此盖伏遇某官心存博愛量極兼容簪履之微未忘於舊物陶鈞之大不間於孤生曲致公言俾諧私計惟盡承流之分庶裨造物之仁過此以還未知所措賀東府啓右鞏啓伏覩十月二十三日麻制伏審史館相公登庸天下幸甚伏惟史館相公言為蓍蔡行應凖繩兼文武之閎材富天人之奥學神祗幽贊遭聖賢相得之時夷夏聳觀備君臣咸有之德果繇樞軸首秉鈞衡竊惟不世之姿深達當今之務必且開公平之路以序進羣能銷壅蔽之萌以廣延衆論以寛大為拯救瘡痍之要以安靜為休息疲瘵之端絀聚歛之無名偃甲兵而不用果推此道以澤吾民食味别聲之倫舉皆受賜殊隣絶黨之俗孰不嚮風福祿可等於丘山功名必永於金石鞏蚤游牆屏幸遇陶鎔齟齬餘生始免擠排之患零丁滯跡漸期亨泰之來想望門䦨以欣以躍賀蹇周輔授館職右鞏啓竊審奉被詔函進登史觀伏惟慶慰竊以安撫運使學士材資秀特識度淹冲富華國之懿文抱據經之宿學一人嗟異欲相如之同時多士推先服桓榮之稽古果繇時望特被朝恩流馬木牛方佐中都之費金匱石室遂窺廣内之書竊惟寵數之行兹寔要塗之漸佇躋法從敦恊僉言鞏獲在下風側聞成命分符海徼幸依德庇之餘寓直書林更託雋遊之末其為欣慶曷可縷陳囬泉州陳都官啓右鞏啓竊審祗奉茂恩進陞寵秩伏惟慶慰竊以知府都官周材經務令德鎭浮席膴仕以彌優簡清衷而有素循良之政巳洽於民謡恬退之風足用於世教果膺異數進陟名曹側聆成命之行方竊同聲之喜豈期厚眷特枉長牋載規謙抑之辭但切感銘之懇明州到任謝兩府啓右鞏啓伏奉勑命授前件差遣巳於正月二十五日到任上訖伏念鞏才無遠用學殆小知誤蒙假器之恩愧乏當官之効属時泰豫遇上休明欲治之心夐追於三代非常之旦特起於千齡顧是孤生最為遠迹雖逢辰之難得獨揣巳之無堪故羣材􅃷鬻之初未始自陳於薄技而衆論騁馳之際何嘗參預於半辭錙銖動謹於成規毫髪敢萌於私見以兹循分庶獲寡尤然而一去本朝六祗外服十年荏苒未諧拱極之誠萬里周流尚負循陔之念當至仁之平施亦微物之可哀兹者方抵詔以在塗復析符而假守惟四明之窮裔處百粤之東偏浮海之航鼎來於遠國踐山之築益起於堅城猥出選掄冒應寄属此盖伏遇某官輔成世教樂育士倫隂推覆護之私毎借吹嘘之力致兹頑鈍與在甄收然而察無他惡之膓方頼兼容之度草茅之質使遂於向陽菽水之歡許伸於反哺盡待曲成之賜俯厭難止之情誓在糜捐用酬鈞播賀趙大資致政啓右鞏啓竊審進秩宫朝歸榮里閈伏惟慶慰恭以致政宮保大資言為蓍蔡行應凖繩肩一德以在躬厯三朝而遇主讜言大論著在朝堂善政流風被于藩服引年求謝抗疏彌堅屢降德音方倚老成之重難囬壯節閔有官職之勞躐陞儲寀之華退遂家居之樂門開祖帳衆嘆大夫之賢庭列賜車自知稽古之力惟能諧於素志實何愧於昔人鞏密荷陶鈞與游門館觀大賢出處之迹足勸士倫知儒者進退之宜敢忘師慕其為忻躍倍萬等儔亳州到任謝兩府啓右鞏啓蒙恩授上件差遣巳於今月十六日到任上訖伏念鞏少雖好學長乏異能燭理甚疎盖聰明之難强受材素薄顧齒髮之已衰誤竊寵靈叨塵器使兹者縁避親之著令蒙易地之推恩距畿甸以非遥就庭闈而甚便夫何蕞質迺爾冒居此盖伏遇某官以廣愛之心而輔成世教以并容之度而奬育士倫致是顓愚及於推齒慰倚門之望已出於埏鎔謝推轂之言敢忘於策勵庶收薄效仰答誤知過此以還未知所措到亳州與南京張宣徽啓右鞏啓蒙易近藩獲隣樂境雖未得就諸生之列請益於詩書然足以聞長者之風仰髙於道誼始敢通牋記參候之禮庶幾將心誠饑渴之勤載省孤蒙寔為幸會今者杪秋伊始嚴氣將升仰惟吐納之宜無爽燕閒之喜伏惟某官言為蓍蔡行應凖繩茂勤烈於二朝聳儀刑於四海仲山之明且哲宜保令名魯公之壽而臧永膺全福更冀上為邦國善保寢興禱頌之誠叙陳罔既元豐類藁卷三十六
