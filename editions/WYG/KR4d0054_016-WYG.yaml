body:
  text: 元豐類藁巻十六宋曾鞏撰書與杜相公書鞏啟鞏多難而貧且賤學與衆違而言行少合於世公卿大臣之門無可藉以進而亦不敢輙有意於求聞閤下致位天子而歸始獨得望舄履於門下閤下以舊相之重元老之尊而猥自抑損加禮於草茒之中孤㷀之際然去門下以来九嵗於此初不敢為書以進比至近嵗嵗不過得以一書之問薦於左右以伺侍御者之作止又輙拜教之辱是以滋不敢有意以干省察以煩貺施而自以得不韙之誅顧未甞一日而忘拜賜也伏以閤下朴厚清明讜直之行樂善好義逺大之心施於朝廷而慱見於天下鋭於强力而不懈於耄期當今内自京師外至巖野宿師碩士傑立相望必将􅉵精疲思冩之册書磊磊明明宣布萬世固非淺陋小生所能道說而有益毫髪也鞏年齒益長血氣益衰疾病人事不得以休然用心於載籍之文以求古人之緒言餘㫖以自樂於環堵之内而不亂於貧賤之中雖不足希盛德之萬一亦庶幾不負其意非自以為能也懐區區之心於數千里因尺書之好而惟所以報大君子之誼不知所以裁而急欲知其趣故輙及之也春暄不審尊用如何伏惟以時善保尊重不勝鄙劣之望不宣鞏再拜答范資政書鞏啟王寺丞至䝉賜手書及絹等伏以閤下賢德之盛而所施為在於天下鞏雖不熟於門然於閤下之事或可以知若鞏之鄙竊伏草茅閤下於覊旅之中一見而已今鞏有所自得者尚未可以致閤下之知况鞏學不足以明先聖之意識古今之變材不足以任中人之事行不足以無媿悔於心而流落寄寓無田疇屋廬匹夫之業有奉養嫁送百事之役非可責思慮之精詔道德之進也是皆無以致閤下之知者而拜别朞年之間相去數千里之逺不意閤下猶記其人而不為年軰爵徳之間有以存之此蓋閤下樂得天下之英材異於世俗之常見而如鞏者亦不欲棄之故以及此幸甚幸甚夫古之人以王公之勢而下貧賤之士者盖惟其常而今之布衣之交及其窮逹毫髮之殊然相棄者有之則士之愚且賤無積素之義而為當世有大賢德大名位君子先之以禮是豈不於衰薄之中為有激於天下哉則其感服固宜如何仰望門下不任區區之至謝杜相公書伏念昔者方鞏之得禍罰於河濱去其家四千里之逺南嚮而望迅河大淮埭堰湖江天下之險為其阻阨而以孤獨之身抱不測之疾㷀㷀路隅無攀縁之親一見之舊以為之託又無至行上之可以感人利勢下之可以動俗惟先人之醫藥與凢䘮之所急不知所以為頼而旅櫬之重大懼無以歸者明公獨於此時閔閔勤勤營救䕶眎親屈車騎臨於河上使其方先人之病得一意於左右而醫藥之有與謀至其既孤無外事之奪其哀而毫髮之私無有不如其欲莫大之䘮得以卒致而南其為存全之恩過越之義如此竊惟明公相天下之道吟誦推說者窮萬世非如曲士汲汲一節之善而位之極年之髙天子不敢煩以政豈郷閭新學危苦之情叢細之事冝以徹於眎聴而䝉省察然明公存先人之故而所以盡於鞏之德如此蓋明公雖不可起而寄天下之政而愛育天下之人材不忍一夫失其所之道於自然推而行之不以進退而鞏獨幸遭明公於此時也在䘮之日不敢以世俗淺意越禮進謝䘮除又惟大恩之不可名空言之不足陳徘徊迄今一書之未進顧其慚生於心無須臾廢也伏惟明公終賜亮察夫明公存天下之義而無有所私則鞏之所以報於明公者亦惟天下之義而巳誓心則然未敢謂能也寄歐陽舎人書鞏頓首載拜舎人先生去秋人還䝉賜書及所譔先大父墓碑銘反覆觀誦感與慚并夫銘誌之著於世義近於史而亦有與史異者盖史之於善惡無所不書而銘者蓋古之人有功德材行志義之美者懼後世之不知則必銘而見之或納於廟或存於墓一也苟其人之惡則於銘乎何有此其所以與史異也其辭之作所以使死者無有所憾生者得致其嚴而善人喜於見傳則勇於自立惡人無有所紀則以媿而懼至於通材逹識義烈節士嘉言善状皆見於篇則足為後法警勸之道非近乎史其将安近及世之衰人之子孫者一欲褒揚其親而不本乎理故雖惡人皆務勒銘以誇後世立言者既莫之拒而不為又以其子孫之所請也書其惡焉則人情之所不得於是乎銘始不實後之作銘者當觀其人苟託之非人則書之非公與是則不足以行世而傳後故千百年來公卿大夫至於里巷之士莫不有銘而傳者蓋少其故非他託之非人書之非公與是故也然則孰為其人而能盡公與是歟非畜道德而能文章者無以爲也盖有道德者之於惡人則不受而銘之於衆人則能辨焉而人之行有情善而迹非有意奸而外淑有善惡相懸而不可以實指有實大於名有名侈於實猶之用人非畜道德者惡能辨之不惑議之不徇不惑不徇則公且是矣而其辭之不工則世猶不傳於是又在其文章兼勝焉故曰非畜道德而能文章者無以為也豈非然哉然畜道德而能文章者雖或並世而有亦或數千年或一二百年而有之其傳之難如此其遇之難又如此若先生之道德文章固所謂數百年而有者也先祖之言行卓卓幸遇而得銘其公與是其傳世行後無疑也而世之學者每觀傳記所書古人之事至其所可感則往徃衋然不知涕之流落也况其子孫也哉况鞏也哉其追晞祖德而思所以傳之之繇則知先生推一賜於鞏而及其三世其感與報宜若何而圗之抑又思若鞏之淺薄滯拙而先生進之先祖之屯蹷否塞以死而先生顯之則世之魁閎豪傑不世出之士其誰不願進於門潜遁幽抑之士其誰不有望於世善誰不為而惡誰不愧以懼為人之父祖者孰不欲教其子孫為人之子孫者孰不欲寵榮其父祖此數美者一歸於先生既拜賜之辱且敢進其所以然所諭世族之次敢不承教而加詳焉愧甚不宣鞏再拜與王介甫第一書鞏啓近託彦弼黄九各奉書當致矣鞏至金陵後自宣化渡江来滁上見歐陽先生住且二十日今從泗上出及舟船侍從以西歐公悉見足下之文愛嘆誦寫不勝其勤間以王回王向文示之亦以書來言此人文字可驚世所無有盖古之學者有或氣力不足動人使如此文字不光耀於世吾徒可恥也其重之如此又嘗編文林者悉時人之文佳者此文與足下文多編入矣至此論人事甚衆恨不與足下共講評之其恨無量雖歐公亦然也歐公甚欲一見足下能作一來計否胷中事萬萬非靣不可道鞏此行至春方應得至京師也時乞寓書慰區區疾病尚如黄九見時未知竟何如也心中有與足下論者想雖未相見足下之心潜有同者矣歐公更欲足下少開廓其文勿用造語及摸擬前人請相度示及歐云孟韓文雖髙不必似之也取其自然耳餘俟到京作書去不宣鞏再拜與王介甫第二書鞏頓首介甫足下比辱書以謂時時小有案舉而謗議已紛然矣足下無怪其如此也夫我之得行其志而有為於世則必先之以教化而待之以久然後乃可以為治此不易之道也盖先之以教化則人不知其所以然而至於遷善而逺罪雖有不肖不能違也待之以久則人之功罪善惡之實自見雖有幽隠不能掩也故有漸磨陶冶之易而無按致操切之難有愷悌忠篤之純而無偏聽摘抉之苛已之用力也簡而人之從化也博雖有不從而俟之以刑者固少矣古之人有行此者人皆悅而恐不得歸之其政已熄而人皆思而恨不得見之而豈至於謗且怒哉今為吏於此欲遵古人之治守不易之道先之以教化而待之以久誠有所不得為也以吾之無所於歸而不得不有負冒於此則姑汲汲乎於其厚者徐徐乎於其薄者其亦庶㡬乎其可也顧反不然不先之以教化而遽欲責善於人不待之於久而遽欲人之功罪善惡之必見故按致操切之法用而怨忿違倍之情生偏聴摘抉之勢行而譛訴告訐之害集巳之用力也愈煩而人之違已也愈甚况今之士非有素厲之行而為吏者又非素擇之材也一日卒然梗化遂欲齊之以法豈非左右者之誤而不為無害也哉則謗怒之來誠有以召之故曰足下無怪其如此也雖然致此者豈有他哉思之不審而已矣顧吾之職而急於奉法則志在於去惡務於逹人言而廣視聽以謂為治者當如此故事至於巳察曽不思夫志於去惡者俟之之道巳盡矣則為惡者不得不去也務於逹人言而廣視聽者已之治亂得失則吾将於此而觀之人之短長之私則吾無所任意於此也故曰思之不審而巳矣足下於今最能取於人以為善而比聞有相曉者足下皆不受之必其理未有以奪足下之見也鞏比懶作書既離南康相見尚逺故因書及此足下以為如何不宣鞏頓首與王介甫第三書鞏啟八月中承大夫人大祥於郵中寓書奉慰十月梅厚秀才行又寓書不審皆到否昨日忽被來問良慰積日之思深甫殂背痛毒同之前書已具道矣示及誌銘反復不能去手所云令深甫而有合乎彼則不能同乎此矣是道也過千嵗以來至於吾徒其智始能及之欲相與守之然今天下同志者不過三數人爾則於深甫之没尤可為痛而介甫於此獨能發明其志讀之滿足人心可謂能言人之所不能言者矣顧猶見使商確所未安觀介甫此作大抵哀斯人之不夀不得成其材使或可以澤今或可以覺後是介甫之意也而其首則云深甫書足以致其言是乃稱深甫以未成之材而著書與夫本意違矣願更詳之孟子之書韓愈以謂非軻自作理恐當然則所云幸能著書者亦惟更詳之也如何幸復見諭所云讀禮因欲有所論著恐嘗為介甫言亦有此意顧不能自强又無所考質故莫能就今介甫既意及於此願遂成之就令未可為書亦可因得商㩁矣相别數年鞏在此全純愚以靜俟庶無大悔顧苟禄以棄時日為可悵惜未知何日得相從講學以朂其所未及盡其所可樂於衰暮之嵗乎此日夜惓惓往來於心也示諭溲血比良巳否即日不審寢食如何上奏當稱前某官十數日前見劉琮言已報去承見問故更此及之爾今介甫果以何時此来乎不惜見諭子進弟奄䘮巳易三時矣悲苦何可以堪二姪年可教者近巳隨老親到此二尤小者六舎弟尚且留在懐仁視此痛割何可以言承介甫有女弟之悲亦巳屢更時序竊計哀戚何以自勝餘惟强食自愛不惜時以一二字見及不宣鞏啓上答李㳂書鞏頓首李君足下辱示書及所為文意嚮甚大且曰足下以文章名天下師其職也顧鞏也何以任此足下無乃盈其禮而不情乎不然不宜若是云也足下自稱有憫時病俗之心信如是是足下之有志乎道而予之所愛且畏者也末曰其發憤而為詞章則自謂淺俗而不眀不若其始思之銳也乃欲以是質於予夫足下之書始所云者欲至乎道也而所質者則辭也無乃務其淺忘其深當急者反徐之歟夫道之大端非他欲其得諸心充諸身擴而被之國家天下而已非汲汲乎辭也其所以不已乎辭者非得已也孟子曰予豈好辨哉予不得巳也此其所以為孟子也今足下其自謂已得諸心充諸身歟擴而被之國家天下而有不得已歟不然何遽急於辭也孔子曰古之學者為已今之學者為人足下其得無已病乎雖然足下之有志乎道而予之所愛且畏者不疑也姑思其本而勉充之則予将後足下其奚師之敢不宣鞏再拜謝章學士書鞏啟鞏不佞以身得察於下執事明公過恩召而見之所以矜嗟奨寵開慰拊循之者甚備雖至親篤友之愛不隆於此巳又收弟兄之不肖不謀賓客任而舉之明公之所以畜幸鞏者可謂厚矣鞏竊自惟求所以堪明公之意者未知所出也鞏愚無知不適於世用不能用身於世俗之外力耕於大山長谷之中以共饘粥之養魚菽之祭以其餘日考先王之遺文竊六藝之微㫖以求其志意之所存而足其自樂於巳者顧反去士君子之林而夷於皁𨽻之間捨自肆之安而踐乎廹制之地欲比於古之為貧而仕者可謂妄矣固有志者之所嘆嗟天下之所賤而至親篤友之所棄而違之也復安敢自通於大人之門望知於侍御者之側乎明公懐使者之印為福於東南以地計其廣狹則數十百城之人待明公之畜養以材計其多寡則文武之士以百千數待明公之推察而収拊之任而舉之者乃獨在於鞏與鞏之少弟此鞏之所以自維求堪明公之意者而未知所出也抑鞏聞之廣聴博觀不遺汙賤戹辱之士者此所以無棄士也兼収並采不遺偏材一曲之人者所以無棄材也故明公之意儻在於此而古之士出汙賤戹辱之中能成功名以報知者亦不可勝數彼皆豪傑之人故有以自致也若鞏之鄙則安敢望此乎故憂不能堪明公之意誤左右之知者此鞏之所大懼也竭固陋之分庶㡬不愧於偏材一曲之人者此鞏之所可至也敢獻其情而以為進謝之資惟明公之垂察焉答孫都官書提刑都官閣下伏承賜書及示盛製六編凢三千首盛矣哉文之多工之深且専以久其於君臣父子兄弟夫婦朋友天地三辰鬼神山川地理四夷中國風俗萬物治亂善惡通塞離合憂歡怨懟無不畢載而其語則博而精麗而不浮其歸要不離於道視昔以文名於天下者夫豈易至於是耶鞏之愚且懶且為事物疾病所侵以不専而且未久於學也使之觀若於海不見其涯涘於深山長谷不見其形勢之所極而敢議其大小髙下邪而閣下不以所深且専以久者勵鞏博而精麗而不浮其歸本於道者教鞏乃告之曰其詳擇而去其非是者焉鞏誠恠閤下自處之過而為以賜鞏者乃所以怠且蔽之也凢鞏之學盖将以學乎為身以至於可以為人也方愚且懶且不専以久之病也推閤下之仁豈欲怠且蔽之也其欲使知閤下之貴而長其業之富而成而猶不止如是能下於後軰如是是所以教之也孟子曰吾不屑之教誨是亦教誨之而巳矣敢不拜賜也盛編尚且借觀而先以此謝皇恐皇恐不宣鞏再拜答袁陟書鞏頓首世弼足下辱書說介甫事或有以為矯者而歎自信獨立之難因以教鞏以謂不仕未為非得計者非足下愛我之深處我之重不至於此雖親戚之於我未有過此者然介甫者彼其心固有所自得世以為矯不矯彼必不顧之不足論也至於仕進之說則以鞏所考於書常謂古之仕者皆道德明備巳有餘力而可以治人非苟以治人而不足於已故子使漆雕開仕對曰吾斯之未能信子說然世不講此久矣故當孔子之時獨顔子者未嘗仕而孔子稱之曰好學其餘弟子見於書者獨開之言如此若鞏之愚固已不足者方自勉於學豈可以言仕不仕邪就使異日有可仕之道而仕不仕固自有時古之君子法度備於身而有仕不仕者是也豈為呶呶者邪然鞏不敢便自許不應舉者鞏貧不得已也亦不敢與古之所謂為貧者比何則彼固所謂道德明備而不遇於世者非若鞏之鄙遽捨其學而欲謀食也此其心愧於古人然鞏之家苟能自足便可以䖏而一意於學鞏非好進而不知止者此其心固無愧於古人辱足下愛之深處之重不敢不報答所示詩序及答楊生書甚善甚善不宣鞏頓首謝曹秀才書鞏頓首曹君茂才足下嗟乎世之好惡不同也始足下試於有司鞏為封彌官得足下與方造孟起之辭而讀之以謂宜在髙選及来取號而三人者皆無姓名於是憮然自悔許與之妄既而推之特世之好惡不同耳鞏之許與豈果為妄哉今得足下之書不以解名失得置於心而汲汲以相從講學為事其慱觀於書而見於文字者又過於鞏向時之所與甚盛足下家居無事可以優㳺以進其業自力而不已則其進孰能禦哉世之好惡之不同足下固已能不置於心顧鞏適自被召不得與足下久相從學此情之所惓惓也用此為謝不宣謝呉秀才書鞏啟承足下不以大熱之酷為可畏畏塗之阻為可憚徒歩之勞為可病候問之勤為可諱三及吾門見投以書及所業五編發而觀之足下之學多矣見於文辭者亦多矣其說往往有非郷閭新學所能至者使能充其言其得豈少哉况其進之未巳耶顧不自足忘前之患而有求於鄙闇推足下此志其進豈可量哉僕之所可告於足下者無易於自勉也薄遽不宣與王深甫書鞏再拜與深甫别四年矣嚮往之心固不可以書道而比得深甫書輙反復累紙示諭相存之勤相與之深無不盡者讀之累日不能釋手故亦欲委曲自叙已意以報而怠惰因循經渉嵗月遂使其意欲周而反畧其好欲宻而反踈以汔於今顧深父所相與者誠不在於書之踈數然嚮徃之心非書則無以自解而乖謬若此不能不欿然也不審幸見察否比得介甫書知數到京師比已還亳即日不審動止如何計太夫人在潁子直代歸與諸令弟應書皆在京師各萬福鞏比侍親幸無恙宣和日得書四弟應舉今亦在京師去年第二妺嫁王補之者不幸疾不起以二女甥之失其所依而補之欲繼舊好遂以第七妺歸之此月初亦巳成婣鞏質薄去朋友逺且久其過失日積而思慮日昏其不免於小人之歸者将若之何在官折節於奔走悉力於米鹽之末務此固任小者之常無不自安之意顧初至時遇在勢者横逆又議法數不合常恐不免於構䧟方其險阻艱難之時常欲求脫去而卒無由今在勢者已更幸自免於悔咎而鞏至此亦巳二年矣比承諭及介甫所作王令誌文以為揚子不過恐不然也夫學者其心篤於仁其視聽言動由於禮則無常産而有常心乃所履之一事耳何則使其心篤於仁其視聽言動由於禮然而無常産也則其於親也生事之以禮故啜菽飲水之養與養以天下一也死葬之以禮故歛手足形旋葬之葬與葬以天下一也而况於身乎况於妻子乎然其心篤於仁其視聽言動由於禮者非盡於此也故曰乃所履之一事耳而孟子亦以謂無常産而有常心者惟士為然則為聖賢者不止於然也介甫又謂士誠有常心以操羣聖人之說而力行之此孔孟以下所以有功於世也夫學者苟不能其心篤於仁其視聴言動由於禮則必不能不失其常心此後之學者之患也苟能其心篤於仁其視聽言動由於禮則必不失其常心且既已皆中於禮矣而復操何說而力行之哉此學者治心脩身本末先後自然之理也所以始乎為士而終乎為聖人也顔子三月不違仁盖謂此也人不堪其憂而不改其樂盖樂此也凢介甫之所言似不與孔子之所言者合故曰以為揚子不過恐不然也此吾徒所學之要義以相去逺故畧及之不審以為如何其他未及子細劇寒自重書至幸報答不宣鞏再拜答王深甫論揚雄書蒙䟽示鞏謂揚雄處王莽之際合於箕子之明夷夷甫以謂紂為繼世箕子乃同姓之臣事與雄不同又謂美新之文恐箕子不為也又謂雄非有求於莽特於義命有所未盡鞏思之恐皆不然方紂之亂微子箕子比干三子者盖皆諫而不從則相與謀以為去之可也任其難可也各以其所守自獻於先王不必同也此見於書三子之志也三子之志或去或任其難乃人臣不易之大義非同姓獨然者也於是微子去之比干諫而死箕子諫而不從至辱於囚奴夫任其難者箕子之志也其諫而不從至辱於囚奴盖盡其志矣不如比干之死所謂各以其所守自獻於先王不必同也當其辱於囚奴而就之乃所謂明夷也然而不去非懐禄也不死非畏死也辱於囚奴而就之非無恥也在我者固彼之所不能易也故曰内難而能正其志又曰箕子之貞明不可息也此箕子之事見於書易論語其說不同而其終始可考者如此也雄遭王莽之際有所不得去又不必死辱於仕莽而就之固所謂明夷也然雄之言著於書傳著於史者可得而考不去非懐禄也不死非畏死也辱於仕莽而就之非無恥也在我者亦彼之所不能易也故吾以謂與箕子合吾之所謂與箕子合者如此非謂合其事紂之初也至於美新之文則非可已而不已者也若可已而不已則鄉里自好者不為况若雄者乎且較其輕重辱於仕莽為重矣雄不得巳而巳則於其輕者其得已哉箕子者至辱於囚奴而就之則於美新安知其不為而為之亦豈有累哉不曰堅乎磨而不磷不曰白乎湼而不緇顧在我者如何耳若此者孔子所不能免故於南子非所欲見也於陽虎非所欲敬也見所不見敬所不敬此法言所謂斂身所以伸道者也然則非雄所以自見者歟孟子有言曰天下有道小德役大德小賢役大賢天下無道小役大弱役强二者皆天也順天者存逆天者亡而孔子之見南子亦曰予所否者天厭之天厭之則雄於義命豈有不盡哉又云介甫以謂雄之仕合於孔子無不可之義夷甫以謂無不可者聖人微妙之處神而不可知者也雄德不逮聖人强學力行而於義命有所未盡故於仕莽之際不能無差乂謂以美新考之則投閤之事不可謂之無也夫孔子所謂無不可者則孟子所謂聖之時也而孟子厯叙伯夷以降終曰乃所願則學孔子雄亦為太𤣥賦稱夷齊之徒而亦曰我異於是執太𤣥兮蕩然肆志不拘攣兮以二子之志足以自知而任已者如此則無不可者非二子之所不可學也在我者不及二子則宜有可有不可以學孔子之無可無不可然後為善學孔子此言有以寤學者然不得施於雄也前世之傳者以謂伊尹以割烹要湯孔子主癰疽瘠環孟子皆㫁以為非伊尹孔子之事盖以理考之知其不然也觀雄之所自立故介甫以謂世傳其投閤者妄豈不猶孟子之意哉鞏自維度學每有所進則於雄書每有所得介甫亦以為然則雄之言不㡬於測之而愈深窮之而愈逺者乎故於雄之事有所不通必且求其意况若雄處莽之際考之於經而不謬質之於聖人而無疑固不待議論而後明者也為告夷甫或以為未盡願更䟽示與王向書鞏啟比得吕南公愛其文南公數稱吾子然恨未相見及至南豐又得黄曦復愛其文而吾子亦來以文見貺實可歎愛吾子與吕南公黄曦皆秀出吾鄉一時之俊私心喜慰何可勝言惟强於自立使可愛者非特文詞而已此鄙劣所望於二君子也道中忽忽奉啓鞏啟上囬傅權書鞏啟辱恵書及古律詩雜文指意所出義甚髙文辭甚羙以鞏有鄉人之好又於聞道有一日之先使獲承重貺幸甚足下論古今學者自守者少苟合者多則固然矣因以謂如鄙劣者能知所守則豈敢當抑足下欲勉之至此則豈敢怠足下之材可謂特出自强不巳則道德之歸其孰可禦恨不相從不能一一具道能㳂牒至此一相見否荒隅之中孤拙寡偶欽企欽企春暄餘保愛保愛不宣福州上執政書鞏頓首再拜上書某官竊以先王之迹去今逺矣其可槩見者尚存於詩詩存先王養士之法所以撫循待遇之者恩意可謂備矣故其長育天下之材使之成就則如蘿蒿之在大陵無有不遂其賔而接之出於懇誠則如鹿鳴之相呼召其聲音非自外至也其燕之則有飲食之具樂之則有琴瑟之音将其厚意則有幣帛筐篚之贈要其大㫖則未嘗不在於得其歡心其人材既衆列於庶位則如棫樸之盛得而薪之其以為使臣則寵其徃也必以禮樂使其光華皇皇於逺近勞其來也則既知其功又本其情而叙其勤其以為将率則於其行也既送遣之又識薇蕨之始生而恐其歸時之晩及其還也既休息之又追念其悄悄之憂而及於僕夫之瘁當此之時后妃之於内助又知臣下之勤勞其憂思之深至於山脊石砠僕馬之間而志意之一至於雖采卷耳而心不在焉盖先王之世待天下士其勤且詳如此故稱周之士也貴又稱周之士也肆而天保亦稱君能下下以成其政臣能歸美以報其上其君臣上下相與之際如此可謂至矣所謂必本其情而叙其勤者在四牡之三章曰王事靡盬不遑将父四章曰王事靡盬不遑将母而其卒章則曰豈不懐歸是用作歌将母來諗釋者以謂諗告也君勞使臣叙述其情曰豈不誠思歸乎故作此詩之歌以養父母之志來告其君也既休息之而又追叙其情如此繇是觀之上之所以接下未嘗不恐失其養父母之心下之所以事上有養父母之心未嘗不以告也其勞使臣之辭則然而推至於戍役之人亦勞之以王事靡盬憂我父母則先王之政即人之心莫大於此也及其後世或任使不均或苦於征役而不得養其父母則有北山之感鴇羽之嗟或行役不巳而父母兄弟離散則有陟岵之思詩人皆推其意見於國風所謂發乎情止乎禮義者也伏惟吾君有出於數千載之大志方興先王之治以上繼三代吾相於時皆同德合謀則所以待天下之士者豈異於古士之出於是時者豈有不得盡其志邪鞏獨何人幸遇兹日鞏少之時尚不敢飾其固陋之質以干當世之用今齒髮日衰聰明日耗令其至愚固不敢有徼進之心况其少有知邪轉走五郡盖十年矣未嘗敢有半言片辭求去邦域之任而冀陪朝廷之儀此鞏之所以自䖏竊計巳在聽察之日久矣今輙以其區區之腹心敢布於下執事者誠以鞏年六十老母年八十有八老母寓食京師而鞏守閩越仲弟守南越二越者天下之逺處也於著令有一人仕於此二邦者同居之親當逺仕者皆得不行鞏固不敢為不肖之身求自比於是也顧以道里之阻既不可御老母而南則非獨省晨昏承顔色不得効其犬馬之愚至於書問徃還盖以萬里非累月踰時不通此白首之母子所以義不可以苟安恩不可以苟止者也方去嵗之春有此邦之命鞏敢以情告於朝而詔報不許属閩有賊盗之事因不敢繼請及去秋到職閩之餘盗或數十百為曹伍者徃徃蟻聚於山谷桀㸃能動衆為魁首者又以十數相望於州縣閩之室閭莫能寧而逺近聞者亦莫不疑且駭也州属邑又有出於饑旱之後鞏於此時又不敢以私計自陳其於㓂孽属前日之屢敗士氣既奪而吏亦無可属者其於經營既不敢以輕動廹之又不敢以少縱玩之一則諭以招納一則戒以剪除既而其悔悟者自相執拘以歸其不變者亦為士吏之所係獲其魁首則或糜而致之或殱而去之自冬至春逺近皆定亭無抱鼔之警里有室家之樂士氣始奮而人和始洽至於風雨時若田出自倍今野行海渉不待朋儔市粟而來價减什七此皆吾君吾相至仁元澤覆冒所及故冦旱之餘曾未朞嵗既安且富至於如此鞏與斯民與䝉其幸方地數十里既無一事繫官於此入已彌年則可以将母之心告於吾君吾相未有易於此時也伏惟推古之所以待士之詳思勞歸之詩本士大夫之情而及於其親逮之以即乎人心之政或還之闕下或處以閒曹或引之近畿属以一郡使得諧其就養之心慰其髙年之母則仁治之行豈獨昏愚得䝉賜於今日其流風餘法傳之永久後世之士且將賴此其無北山之怨鴇羽之譏陟岵之歎盖行之甚易為德於士類者甚廣惟留意而圗之不宣鞏頓首元豐類藁卷十六
