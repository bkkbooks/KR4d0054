body:
  text: 元豐類藳巻二十一宋曾鞏撰制誥左僕射門下侍郎王珪追封三代并妻制曾祖永贈開府儀同三司勅禮取其稱故位益尊則事其先者世益逺今予良弼褒命其親得上至于三世求之於禮豈非取其稱哉具官某曾祖某仁篤慈祥畜徳甚盛葢其為積也厚則其流澤也廣故能開相厥裔為時宗臣百辟是師王室是輔推功原大肇基自爾顯揚崇寵兹惟舊章是用進爾之階秩在第一尚其不昩服此茂恩可曾祖母尹氏追封燕國太夫人勅優禮大臣厚其寵數所以勸在位之功徳而共成天下之治也宰相之任重矣尊榮光大上施于其三世豈不即乎人情而稱其位序哉具官某曾祖母某氏幽閒靜専躬蹈純徳嬪於盛族壼彛是稱啓佑後人任國㡬政流澤所自宜極褒崇追命定封列于大國光靈不冺尚服朕恩可祖贄追封魏國公勅天下之忠乎上教有所自故上之仁乎下恩有所延其體相成治道所出惟吾股肱之佐共任天下之重愍書寵秩施其祖廟所以慰其顯親之心稱其事君之義具官某明允純篤德業惟茂義訓不倦彌逺益彰維時聞孫實輔予治念功原始宜極褒嘉庸建爾于上公俾受國于全魏歿而尚有知也其服朕之厚恩祖母立氏追封魏國太夫人勅夫其先之畜德也厚則其裔之䝉澤也長故寵禄在其子孫則襃榮施其祖禰奬功録善必揆所繇所以勸天下之成其家也具官某祖母某氏身蹈純行嬪於令人教行閨門自隱而顯惟予哲輔實爾慈孫質厥所元宜有加命一作嘉全魏大國從夫之尊服此寵章尚綏爾後可父凖追封漢國公勅朕敷求哲人以共大政隆名寵禄既俾集于厥躬襃大推崇則又施其禰廟所以遂吾大臣欲顯其親之志而開示在位予一人尊奨近輔之心具官某父某材通世用行蹈天常德畜不施澤流及逺惟時有子為國宗臣叅聽萬幾人望惟允慶所自出朕惟汝嘉屏蔽四方漢為最大受兹封土承裕爾家可母薛氏追封漢國太夫人勅位有貴賤升降之等故禮有隆殺損益之差今輔予聽斷萬幾之臣在師長百官之任蓋列於廊廟名秩既殊故追榮其親命數亦異兹惟故事其可易哉具官某母某氏婦道以順母儀以慈言為壼彛動應圖法能教其子為時宗工股肱朕躬王室是頼褒崇之典既啓名城漢為大邦改進封號尚宜寵渥永祚厥家可妻鄭氏追封楚國夫人勅詩人之義君之夫人有委蛇之行河山之德然後在尊位備盛服從其夫榮可以為稱施於世教所以始人倫而出治道也具官某妻某氏淑茂柔眀生于令族動静以禮恊於經言相予宗臣慎其内行曽不偕老永綏厥家湯沐之田既受方國有加追寵宜易新封尚其光靈服我休命可中大夫尚書左丞蒲宗孟追封三代并進封妻制曽祖頴士贈太子少保勅朕稽于古以正百官惟尚書政本而左轄綱紀之司延登􅈒人俾祇厥叙愍有加寵逮其重祖所以隆崇大臣國之典也具官某曾祖某潛徳西南在約彌勵流光錫祚集其後昆總典中臺實輔予治東朝二品是用命爾尚維幽漠服此茂恩可曽祖母鮮于氏追封大寧郡太夫人勅宗廟之數諸侯以五蓋任彌重者禮彌盛貴賤之節然也今吾大臣追命及其三世與夫朝制豈異意哉具官某曾祖母某氏作德於内以宜厥家啓相後人預蔽國論按圗考地俾定爾封其尚有知服兹寵號可祖伸贈太子少傅勅人本乎祖故吾加恩近輔褒榮其先至於累世豈不縁人之情而制為命數哉具官某祖某内含純明外蹈規矩流澤也逺有孫而賢進於中臺總國綱轄善有所自朕惟汝嘉東朝之孤傅位為寵用賁幽宅尚其欽承可祖母陳氏追封蜀郡太夫人勅世德之積者久則發於其後者長故朕隆崇近輔而褒榮其先非一二世而止所以勸天下之善豈非愽哉具官某祖母某氏淑慎恭儉化行閨門啟其元孫持國綱要蜀惟爾土以定新封尚其如存膺此茂渥可繼祖母朱氏封閬中郡太夫人勅夫位以德升禮以位叙不失其稱兹為義榮今吾崇進大臣而圗其先烈内外命秩亦惟其宜所以使上下之間公論惟允具官某繼祖母某氏婉嫕冲静行孚於家祚爾之孫興以輔朕西南上郡愍有褒封垂聲贊書尚其不殁可父師道贈太子少師勅吾之大臣繇聰明材諝以有爵禄之榮予有命書愍贈賁其考廟所以稱其顯親之心慰其霜露之感位不次授厥惟故常具官某父某忠篤純明德履惟茂壮謀循政聲列在人積厚慶隆及子而顯時予左轄司國紀綱惟流有原開跡自爾宫師之貳名寵秩尊以告幽扄尚其祗服可母陳氏追封頴川郡太夫人勅人子之於其父母莫不有顯揚褒大之心惟任重秩尊得盡其志此隆名寵禄所以勸天下也具官某母某氏經德履善宜其家室錫羡流祉在爾後人時予宗工任國綱轄陪京望郡俾定新封服我命書尚其不泯可妻陳氏封河東郡夫人勅朕援用天下之材以為共政之臣就位之初恩數禮秩所以尊榮光大之者上施其祖禰而旁及於閨門蓋任属之者重則褒隆之者其可以不異哉具官某妻某氏言容功德柔閒懿恭嬪于令人休有華問惟時哲輔進秉國成相助之勤爾效彌顯改擇加郡登崇號名尚宜厥家永綏寵禄可陸佃兼侍講蔡卞兼崇政殿說書制勅朕於書無所不學於天下之事無所不考而不敢自以為足故設置講解之官使以先王之六藝日陳于前朕於求多聞以建事之心可謂勤矣具官某好古知經宜在此位夫尊其所聞以懋厥職兹為爾守其尚起哉可蔡卞改講解作誦說徐禧給事中制勅有殿内之臣職在於平奏述詳命令糾其違者而止之覆其是者而行之至於決獄官人條陳法式之事莫不當考察焉其任可謂重矣具官某以材進拔興執邦憲兹用推擇俾踐厥位惟精敏不懈可以周閲讀惟忠實不撓可以司論較朕方觀爾之效爾尚慎於厥修可鍾浚将作少監制勅具官某繕脩興造程工督作之任不可不属之其人位視九卿禮秩甚寵正名之始考擇惟慎爾以材選往貳厥官尚其祗承以允收㧞可蔡燡河東運判制勅具官某分部而使雖以將漕為名然實在於總庻務之予奪察羣吏之能否叅予任属選授其艱以爾為能俾承厥序夫均通貨食使物有羨嬴審覈幽眀使人知勸畏兹為爾守其往懋哉可供備庫副使董琰等十一人轉官制勅具官某等西南之蠻恃阻且逺跳踉溪谷負誼干誅王師鼓行舉其巢穴斬獲摧䧟爾預奏功第賞有差尚惟祗服可待制王堯臣知單州制勅提將之符顓制一道使紀律明於士衆忠實紀於朝廷然後為國藩垣能稱其位具官某統治晉陽宜知其任而西伐之卒比有逋亡繼形奏陳皆以疾告無直繩肅下之誼有浮言罔上之迹雖付之刺督考騐甚明而既更詔恩法當貸爾俾仍近職往守偏州尚自省循兹為薄責可鄧忠臣母周氏封縣太君制勅具官某母某氏爾子忠臣有勞應賞願更寵典以啓爾封俾錫命書兹為異數尚惟祗服以稱茂恩可杜常兵部郎中制勅具官某朕為保伍之法寓戰陣之教欲使兵與農合庶幾先王之迹夏官之属實參典領以材擢爾往祗厥序夫能奨誘服田之人悅趨講武之政馴致有漸而彌綸不疏惟無廢爾之勤可以承朕之志可李士京韓宗文大理寺主簿制勅具官李士京等察治犴獄之官勾稽簿領之事往祗選用無懈厥脩可許懋兩浙運副制勅具官某朕擇遣使者分部而治雖以將漕為稱然實總民政之舉措察吏屬之能否蓋連數十城之地舉而屬之其選豈不重哉爾詳練敏明宜服予采蓋爾之職非止於督賦歛斷獄訟而已惟除苛熄擾可以使民遂其宜惟務實去華可以使吏馴其行宣恩德而美風俗待爾能善其官可不勉歟以祗朕命可内殿承制叚綽等知州制勅具官某州有兵民之寄而地在疆埸之間則常擇用材武之臣屬之守禦之任爾以能選往祗厥服尚思綏靖以稱簡求可宗室承操新婦王氏進封國夫人制勅親愛之而欲其貴富朕於公族皆推是心寵數徽章施於閨壼兹惟故事朕敢忘哉具官某新婦某氏作合宗籓躬有馴德啓兹全國用進爾封以致朕尊奨近屬之恩尚懋爾服承休顯之稱可宗室克懼復官制勅具官某属在近親享有榮禄以愆坐法亦既再期稽於故常宜服位等勉思祗飭稱此茂恩可李德明遥郡團練使制勅具官某擐甲執兵人之重任賞信而速所以勸功爾忠力武材稱于種落往殲醜類屢以㨗聞圗爾之勞進位二等益思奮勵以待異恩可陳景等尚書省主事令史制勅某中臺政本主曹事治文書亦不可不属之其人爾往懋哉皆仍􅃇秩可折克行彭保轉官制勅具官某朕惟羌之猖狂内相賊虐致天之罰爰命六師開通道塗收復城聚摧堅獲醜爾功居多蓋失軍賞之行速則衆勸是用進爾之秩以激士之心尚有不次之恩以待非常之效可程嗣恭祖無頗程愽文開封府推官制勅具官某開封天下之聚俗雜五方之民蓋巧偽繁興獄訟滋出贊治之任考擇維艱以爾為能俾祗厥服夫慈恵足以煦養惸弱剛嚴足以帖伏姧强然導民之方尚有可識使風俗有以粹美而四方有以觀則往助爾長其尚懋哉可李憲武勝軍節度觀察留後制勅王師西出士大夫皆奮力行陣有尺寸之功者朕無不録况議勞數實有大於此者其於信賞朕敢忘哉具官某比自臨洮率衆躬将摧殪醜虜恢復故疆鼔行羗中屢以㨗告敀按閥閱朕用寵嘉秘殿榮名便藩留務兼是茂渥以奨爾庸其往茂哉益思來効可李靖臣王存趙彦若曽肇轉官制勅惟朕祖考成功盛徳覆被天下固非文字可得而名然史記册書國家之典上以紀先帝言動之迹下以及羣臣善惡之實傳之萬世宜有論次具官某以文學選用真誠信實朕惟汝嘉是用褒進尚其祗服以稱朕恩李舜舉等轉官制勅具官某朕惟先帝功德之殊宜見之方冊故詔擇儒臣属之論譔而爾於其官次與有祗事之勤亦既書成例當褒録進升位等其尚欽承可皇伯滕王第十六女封縣主制勅具官某第十六女親在近屬生而懿柔宜開縣甸之封以榮湯沐之號予惟惇序爾尚欽承可元豐類藁巻二十一
