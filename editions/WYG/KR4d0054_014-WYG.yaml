body:
  text: 元豐類藁卷十四宋曾鞏撰序送傅向老令瑞安序向老傅氏山陰人與其兄元老讀書知道理其所為文辭可喜太夫人春秋高而其家故貧然向老昆弟尤自守不苟取而妄交太夫人亦忘其貧余得之山陰愛其自處之重而見其進而未止也特心與之向老用舉者令温之瑞安將奉其太夫人以往予謂向老學古其為令當知所先後然古之道盖無所用於今則向老之所守亦難合矣故為之言庻夫有知予為不妄者能以此而易彼也送周屯田序士大夫登朝廷年七十上書去其位天子官其一子而聽之亦可謂榮矣然而有若不釋然者余為之言曰古之士大夫倦而歸者安居几杖膳羞被服百物之珍好自若天子養以燕饗飲食鄉射之禮自比子弟袒韝鞠􅎽以薦其物諮其辭説不於庠序則於朝廷時節之賜縉紳之禮於其家者不以朝則以夕上之聽其休為不敢勤以事下之自老為無為而尊榮也今一日辭事還其廬徒御散矣賔客去矣百物之順其欲者不足人之羣嬉属好之交不與約居而獨遊散棄乎山墟林莽僻巷窮閭之間如此其於長者薄也亦曷能使其不欿然於心邪雖然不及乎尊事可以委蛇其身而益閒不享乎珍好可以窒煩除薄而益安不去乎深山長谷豈不足以易其庠序之位不居其榮豈有患乎其辱哉然則古之所以殷勤奉老者皆世之任事者所自為於士之倦而歸者顧為煩且勞也今之置古事者顧有司為少耳士之老於其家者獨得其自肆也然則何為動其意邪余為之言者尚書屯田員外郎周君中復周君與先人俱天聖二年進士與余舊且好也既為之辨其不釋然者又欲其有以處而樂也讀余言者可無異周君而病今之失矣南豐曾鞏序送江任序均之為吏或中州之人用於荒邉側境山區海聚之間蠻夷異域之處或燕荆越蜀海外萬里之人用於中州以至四遐之鄉相易而往其山行水渉沙莽之馳往往則風霜氷雪瘴霧之毒之所侵加蛟龍虺蜴虎豹之羣之所抵觸衝波急洑隤崖落石之所覆壓其進也莫不籯粮舉藥選舟易馬刀兵曹伍而後動戒朝奔夜變更寒暑而後至至則宫廬器械被服飲食之具土風氣候之宜與夫人民謡俗語言習尚之務其變難遵而其情難得也則多愁居惕處嘆息而思歸及其久也所習已安所蔽已解則歲月有期可引而去矣故不得專一精思修治具以宣布天子及下之仁而為後世可守之法也或九州之人各用於其土不在西封在東境士不必勤舟車輿馬不必力而已傳其邑都坐其堂奥道途所次升降之倦凌冒之虞無有接于其形動于其慮至則耳目口鼻百體之所養如不出乎其家父兄六親故舊之人朝夕相見如不出乎其里山川之形土田市井風謡習俗辭説之變利害得失善惡之條貫非其童子之所聞則其少長之所遊覽非其自得則其鄉之先生老者之所告也所居已安所有事之宜皆已習熟如此能專慮致勤職事以宣上恩而修百姓之急其施為先後不待旁諮久察而與奪損益之幾已斷於胷中矣豈累夫孤客逺寓之憂而以苟且决事哉臨川江君任為洪之豐城此兩縣者牛羊之牧相交樹木果蔬五榖之壟相入也所謂九州之人各用於其土者孰近於此既已得其所處之樂而厭聞飫聽其人民之事而江君又有聰明敏給之材廉潔之行以行其政吾知其不去圖書講論之適賔客之好而所為有餘矣盖縣之治則民自得於大山深谷之中而州以無為於上吾將見江西之幕府無南嚮而慮者矣於其行遂書以送之南豐曾鞏序送劉希聲序東明劉希聲來臨川見之其貎勉於禮其言勉於義其行亦然其久益堅其讀書為辭章日盛從予遊三年予愛之今年慶厯五年還其鄉過予别與之言曰東明汴邑也子之行問道之所嚮者以告子子也一趨焉而不息至乎爾也苟為一從焉一違焉雖不息决不至也子也好問聖人之道亦如是而已矣五月四日序送李材叔知栁州談者謂南越偏且逺其風氣與中州異故官者皆不欲久居往往車船未行輒以屈指計歸日又咸小其官以為不足事其逆自為慮如此故其至皆傾摇解弛其憂且勤之心其習俗從古而爾不然何自越與中國通已千餘年而名能撫循其民者不過數人邪故越與閩蜀始俱為夷閩蜀皆已變而越獨尚陋豈其俗不可更與盖吏者莫致其治教之意也意亦其民之不幸也已彼不知繇京師而之越水陸之道皆安行非若閩溪峽江蜀棧之不測則均之吏於逺此非獨優歟其風氣吾所諳之與中州亦不甚異起居不違其節未甞有疾苟違節雖中州寧能不生疾邪其物産之美果有荔子龍眼蕉柑橄欖花有素馨山丹含笑之属食有海之百物累歲之酒醋皆絶於天下人少鬬訟喜嬉樂吏者唯其無久居之心故謂之不可如其有久居之心奚不可邪古之人為一鄉一縣其德義惠愛尚足以薫蒸漸澤今大者專州豈當小其官而不事邪令其得吾説而思之人咸有久居之心又不小其官為越人滌其陋俗而敏於治居閩蜀上無不幸之歎其事出千餘年之表則其美之巨細可知也然非其才之頴然邁於衆人者不能也官於南者多矣予知其才之頴然邁於衆人能行吾説者李材叔而已材叔久與其兄公翊仕同年同用薦者為縣入秘書省為著作佐郎今材叔為栁州公翊為象州皆同時材又相若也則二州交相致其政其施之速勢之便可勝道也夫其越之人幸也夫其可賀也夫送趙宏序荆民與蠻合為寇潭旁數州被其害天子宰相以潭重鎭守臣不勝任為改用人又不勝復改之守至上書乞益兵詔與撫兵三百殿直天水趙君希道實䕶以往希道雅與予接間過予道潭之事予曰潭山川甲兵如何食幾何賊衆寡強弱如何予不能知能知書耳書之載若潭事多矣或合數道之兵以數萬絶山谷而進其勢非不衆且健也然而卒殱焉者多矣或單車獨行然而以克者相踵焉顧其義信如何耳致吾義信雖單車獨行寇可以為無事龔遂張綱祝良之類是也義信不足以致之雖合數道之兵以數萬卒殱焉適重寇耳况致平邪楊旻裴行立之類是也則兵不能致平致平者在太守身也明矣前之守者果能此天子宰相烏用易之必易之為前之守者不能此也今往者復曰乞益兵何其與書之云者異邪予憂潭民之重困也寇之益張也往時潭吏與旁近郡勒力勝賊者暴骸者戮降者有之今之往者將特不為是而已邪抑猶不免乎為是也天子宰相任之之意其然邪潭守近侍臣使撫覘潭者郎吏御史博士相望為我諗其賢者曰今之言古書往往曰迂然書之事乃已試者也師已試而施諸治與時人之自用孰為得失邪愚言倘可以平潭之患今雖細然大中咸通之間南方之憂常劇矣夫豈階於大哉為近臣郎吏御史博士者獨得而不思也希道固喜事者因其行遂次第其語以送之慶厯六年五月日曾鞏序送王希序字潛之鞏慶厯三年遇潛之於江西始其色接吾目已其言接吾耳久其行接吾心不見其非吾愛也從之游四年間鞏於江西三至焉與之上滕王閣泛東湖酌馬跑泉最數游而久乃去者大梵寺秋屏閣閣之下百步為龍沙沙之涯為漳水水之西涯横出為西山皆江西之勝概也江西之州中凡遊觀之可望者多西山之見見西山最正且盡者唯此閣而已使覽登之莫窮于此樂乎莫與為樂也况龍沙漳水水涯之陸陵人家園林之属于山者莫不見可見者不特西山而已其為樂可勝道邪故吾與潛之游其間雖數且久不厭也其計於心曰奚獨吾游之不厭也將奉吾親託吾家於是州而游於是以歡吾親之心而自慰焉未能自致也獨其情旦而作夜而息無頃焉忘也病不游者期月矣而潛之又遽去其能不憮然邪潛之之將去以書來曰子能不言於吾行耶使吾道潛之之美也豈潛之相望意也使以言相鐫切邪眎吾言不足進也眎可進者莫若道素與游之樂而惜其去亦情之所不克已也故云爾嗟乎潛之之去而之京師人知其將光顯也光顯者之心於山水或薄其異日肯尚從吾游於此乎其豈使吾獨也乎六年八月日序王無咎字序名字者人之所假借以自稱道亦使人假借以稱道已之辭也非若行然不可以假借云也何也問其名曰忠與義其字亦然則人無有求其信然者責其不然者知其假借云也問其行曰忠與義則人皆求其信然者責其不然者其可以假借云乎然而人無貴賤愚良一欲善其名字夫欲善其名字者非他亦曰愛其身而已愛其身而不善充之猶曰姑以聖賢之道假借其身而已不誠乎身莫大焉豈愛其身也不若於名字乎勿求勝焉於行乎汲汲爾以愛其身是以聖賢之道歸諸其身也以為愛其身非至夫然而人一皆善其名字未甞一皆善其行有愛其身之心而於其身反爾其薄也可嗟也已南城王無咎來請字余思夫字雖不必求勝也然古之人重冠於冠重字字則亦未可忽也今冠禮廢字亦非其時古禮之不行甚矣無咎之請也雖非時之當然庻幾存其禮予欲拒安得而拒也取易所謂無咎者善補過者也為之字曰補之夫勉焉而補其所不至顔子之所以為學者也補之明經術為古文辭其材卓然可畏也以顔子之所以為學者期乎已余之所望於補之也假借乎已而已矣豈予之所望於補之哉送蔡元振序古之州從事皆自辟士士亦擇所從故賔主相得也如不得其志去之可也今之州從事皆命於朝非為守不得擇士士亦不得擇所從賔主豈盡相得哉如不得其志未可以輒去也故守之治從事無為可也守之不治從事舉其政亦勢然也議者不原其勢以為州之政當一出於守從事舉其政則為立異為侵官噫從事可否其州事職也不惟其同守之同則舍已之是而求與之同可乎不可也州為不治矣守不自任其責已亦莫之任也可乎不可也則舉其政其孰為立異邪其孰為侵官邪議者未之思也雖然迹其所以然豈士之所喜然哉故曰亦勢然也今四方之從事惟其守之同者多矣幸而材從事眎其政之缺不過室於嘆途於議而已脫然莫以為已事反是焉則激激亦奚以為也求能自任其責者少矣為從事乃爾為公卿大夫仕於朝不爾者其幾邪臨川蔡君從事於汀始試其為政也汀誠為州治也蔡君可拱而坐也誠未治也人皆觀君也無激也無同也惟其義而已矣蔡君之任也其異日官於朝一於是而已矣亦蔡君之任也可不懋歟其行也來求吾文故序以送之送丁琰序守令之於民近且重易知矣予嘗論今之守令有道而聞四方者不過數人此數人者非特任守令也過此數人有千里者相接而無一賢守有百里者相環而無一賢令至天子大臣甞患其然則任奉法之吏嚴刺察之科以繩治之諸郡守縣令以罪不任職或黜或罷者相繼於外於是下詔書擇廷臣使各舉所知以任守令是天子大臣愛國與民而重守令之意可謂無不至矣而詔雖下舉者卒不聞惟令或以舊制舉不偕循歲月而授每舉者有姓名得而觀之推考其材行能堪其舉者卒亦未見焉舉者既然矣則以余之所見聞陰計其人之孰可舉者卒亦未見焉猶恐予之愚且賤聞與見焉者少不足以知天下之材也則求夫賢而有名位聞與見之博者而從之問其人之孰可舉者卒亦未見焉豈天下之人固可誣而天固不生才於今哉使天子大臣患天下之弊則數更法以禦之法日以愈密而弊日以愈多豈今之去古也逺治天下卒無術哉盖古人之有庠有序有師友之游有有司之論而賞罰之始於鄉属於天下為教之詳至此也士也有聖人之道則皆得行其教有可教之質則皆可為材且良故古之賢也多賢之多則自公卿大夫至于牛羊倉廪賤官之選咸宜焉獨千里百里之長哉其為道豈不約且明其為致天下之材豈不多哉亦豈有勞於求而不得人密於法而不勝其弊若今之患哉今也庠序師友賞罰之法非古也士也有聖人之道欲推而教於鄉於天下則無路焉人愚也則愚矣可教而賢者卒誰教之哉故今之賢也少賢之少則自公卿大夫至於牛羊倉廩賤官之選常不足其人焉獨守令哉是以其求之無不至其法日以愈密而不足以為治者其原皆此之出也已噫奚重而不更也姑蘇人丁君琰佐南城南城之政平予知其令令曰丁君之佐我又知其邑人邑人無不樂道之者予既患今之士而常慕古之人每觀良吏一傳則反復愛之如丁君之信於其邑予於旁近邑之所未見故愛之特深今為令於淮陰上之人知其材而舉用之也於令也得人矣使丁君一推是心以往信于此有不信于彼哉求予文者多矣拒而莫之與也獨丁君之行也不求予文而予樂道其所常論者以送之以示重丁君其勉之且勉天下之凡為吏者也謝司理字序君子之於德澤誼行大有為者也於為之也有明而易知者有不示其用者若乃數度號令因造損益淳雜出入則所謂明而易知者使人靡靡然化之不絶於動作趣舍之際耳無深闗複鍵穹墉奥屋為之掩覆也泊然莫能顯其所以發而至者則所謂不示其用者也易曰知微知彰彰顯之微不顯之謂也又曰幾事不密則害成退藏於密者皆不顯之謂也陳郡謝君名縝縝密也而取字乃本諸此而字曰通微以謝君之材其嚮道也苟為無畫無不至者也可以有為者也能見其事業者也能不表其迹者也亦在懋之而已元豐類藁卷十四
