body:
  text: 元豐類藳巻四十一宋曾鞏撰祭文秋賽嵗既順成時方揫斂神能施澤以及物人能備物以事神茲惟舊章夫豈敢怠庶其為福無斁於人諸廟祈雨今者盛秋已晚庶物將成矧兹麥苖實待雨澤而驕陽尚熾畏暑未消野有焦枯之憂人懷膏澤之望敢祈靈徳俯狥輿情蕩蘊隆之菑以升嚴氣濡滲漉之施以遂嘉生實賴神休允諧衆志凡道觀云道雖至寂感無不通人雖甚愚誠無不獲祭詞同前改靈徳作冲蔭改神休作真工凡佛寺云佛莫大於慈悲在於利物人莫艱於稼穡必也趨時是仰神休用康嵗事祭詞同改靈徳作覺蔭改神休作慧心諸廟謝雨文比籲衆情仰祈靈施果蒙薄雨小潤焦原已袪畏暑之煩遂適戒寒之漸敢忘祇報更俟餘休克終播澤之祥俾獲有年之望諸廟祈雨文時寒未若雨雪尚愆麥有立苖之艱人違墐户之適敢依靈徳瀝致勤誠惟順𨗳於大和俾霈施於膏澤克諧衆望實賴陰休諸廟謝雨文比苦愆陽再徼靈施䝉報如響得雨應時澤潤焦枯蕩除煩欝物有豐成之望人無疾癘之憂敢忘大恩尚覬終惠祭勾芒神宿官於木用事在春敢奉嵗祠庶為民福慈聖光獻皇后百日轉經疏至恩難稱欲報者惟盡於精誠大覺可依有禱者必蒙於善應敢緣慧力輙罄愚衷伏以大行太皇太后淑聖在躬聰明先物儀刑宫壼徳大而不矜鎮撫國家功崇而不伐未窮遐算奄背盛辰皇帝陛下務極孝思永懷慈蔭内遵䘮紀不緣易月而斷恩外異寢園特以因山而建號矧惟臣庶實自生成雖銜有慟之情未識論酬之所是資佛果少即人心伏愿克配坤元寧至神於不測寖昌天極介景徳於無疆實賴梵因允諧衆望諸廟祈雨文民之艱於稼穡賴嵗屢豐得以足衣食而償其力吏亦得以無所事於勤而偷祿本兹春仲麥苖滿野得雨而成則民得以繼其豐年之樂而吏亦得豫其幸神之食於此土為能澤於斯民也故敢以告尚其賜之以稱人望諸寺觀祈雨文春氣已中農功方急而膏澤未洽土脉尚乾敢恭致於精誠用仰祈於覺道改覺作真蔭尚其降雨俾獲有年諸廟春祈文神之於人能康嵗時而阜庶物故人得以嵗時備物以事神今兹春仲敢遵常典神可不懋以無廢其康阜之功則人敢不盡以無斁於事神之禮祭土祈雨文農勤甚矣嵗既暮春麥待雨而成菽粟待雨而種而旱暵為虐人用憂嗟今將為壇象龍以禱是用先事告爾土神尚其降休無咈人望祭五方龍祈雨文龍之變化無方而其有功於人者則在於能興雲雨嗚呼今旱甚矣是用稽古為爾某龍之象位于某方薰祓以禱爾尚圖厥職其亟以時肆為膏澤以大施于此土無愆厥應俾有後羞惟爾有神亦尚永有依歸太清明道宫祈雨文旱踰時矣麥既萎死而菽粟未種皇帝憂勞遣吏分禱尚其致雨無俾嵗害允兹東睠實在靈徳諸廟謝雨文維嵗大旱䝉賜甘雨窪邪之麥冀可以蘇菽粟之田有望自此實神之徳敢忘昭報尚其終惠俾獲有秋諸寺觀謝雨文氣之不若旱實為菑䝉在正陽畀之甘澤維靈休之所自豈昭報之敢忘俾獲有秋尚賴終惠太清明道宫謝雨文旱久未解詒上之憂得雨應祈曽不旋日焦萎可起種藝可施實惟靈休副此東睠尚其終賜俾獲有秋亳州明堂後祭廟文維季秋辛巳天子宗祀英宗皇帝於明堂以配上帝既成禮乃詔天下徧祭于羣神故州得以衆羞醪酒祗薦祠下神其誕降嘉福無有不暨以稱天子所以事神愛民之意哀詞蘇明允哀詞明允姓蘇氏諱洵眉州眉山人也始舉進士又舉茂才異等皆不中歸焚其所為文閉户讀書居五六年所有既富矣乃始復為文葢少或百字多或千言其指事析理引物託喻侈能盡之約遠能見之近大能使之微小能使之著煩能不亂肆能不流其雄壯俊偉若决江河而下也其輝光明白若引星辰而上也其畧如是以余之所言於余之所不言可推而知也明允每於其窮逹得䘮憂歎哀樂念有所屬必發之於此於古今治亂興壞是非可否之際意有所擇亦必發之於此於應接酬酢萬事之變者雖錯岀於外而用心於内者未嘗不在此也嘉祐初始與其二子軾轍復去蜀遊京師今叅知政事歐陽公修為翰林學士得其文而異之以獻於上既而歐陽公為禮部又得其二子之文擢之髙等於是三人之文章咸傳於世得而讀之者皆為之驚或歎不可及或慕而效之自京師至於海隅障徼學士大夫莫不人知其名家有其書既而明允召試舍人院不至特用為秘書省校書郎頃之以為覇州文安縣主簿編纂太常禮書而軾轍又以賢良方正策入等於是三人者表見於當時而其名益重於天下治平三年春明允上其禮書未報四月戊申以疾卒享年五十有八自天子輔臣至閭巷之士皆聞而哀之明允所為文集有二十卷行於世所集太常因革禮有一百巻更定諡法二巻藏於有司又為易傳未成讀其書者則其人之所存可知也明允為人聰明辨智遇人氣和而色溫而好為策謀務一岀已見不肯躡故迹頗喜言兵慨然有志於功名者也二子軾為殿中丞直史館轍為大名府推官其年以明允之䘮歸葬於蜀地既請歐陽公為其銘又請予為辭以哀之曰銘將納之於壙中而辭將刻之於冢上也余辭不得已乃為其文曰嗟明允兮邦之良氣甚夷兮志則彊閱今古兮辨興亡驚一世兮擅文章御六馬兮馳無疆决大河兮嚙扶桑粲星斗兮射精光衆伏玩兮雕肺腸自京師兮洎幽荒矧二子兮與翺翔唱律吕兮和宫商羽峩峩兮勢方颺孰云命兮變不常奄忽逝兮汴之陽維自著兮暐煌煌在後人兮慶彌長嗟明允兮庸何傷吳太初哀詞吳太初象先今為單州單父人父祐之從事廣州勤事死州瘴沴地象先以䘮至州下亦死年三十一嵗三試於禮部不中余與之善後七年其弟景初來視余於臨川慶歴六年也余思象先如初失之為之追考其為人為辭以哀之曰越山如鱗兮逹海而窮勢阻以偏兮毒潛其中子之自重兮卒與子逢我知子初兮其父之從為其子孤兮吾未之信孰神之苛兮又速子終嗟嗟乎然兮維戚吾衷維子之生兮順祥于宫父母之歡兮兄弟以雍岀與人遊有守有容其材甚良兮剖劂又工一日而棄兮卒偶蒿蓬云誰不死兮萬古一空吾辭傳子兮無有春冬子夭且屈兮猶夀而隆王君俞哀詞京師多尊官要人能引重後輩公卿家子有賔客親黨之助略識文書章句輙岀與寒士較重輕繇此名稱多歸之而主陞絀者因得與大位君俞在京兆門外不交人事讀書慕知聖人微言大法之歸趣孜孜忘晝夜寒暑之變其為辭章可道耻岀較重輕漠然自如繇此名與位未充也慶歴元年予入太學始相識館余於家居數月相與講學㑹余歸遂别常愛君俞氣貌端然雖燕休未嘗慢在衆中恂恂或不知其朝士也至相與言天下士白黒無所隠其方且勇亦少及也太夫人素嚴君俞怡怡奉子職退事寡嫂無間言畜妻子不驕為家不問田宅平居無䙝私流侈之好以某年某月疾遂不起始丞相冀文穆公無主祀拔君俞以託其後君俞亦盡誠奉之兹可以不墜矣今太夫人年髙而天奪君俞之命是於君俞之心不為大恨歟夫為人如前之云而不享於貴且夀曽未少施其所學又負其所承之心是於衆人之情不能冺哀也况重以相知其悲塞可勝乎作辭以泄其哀且系曰君俞姓王氏諱寅亮官至殿中丞年二十六云維相其初兮擇嗣于宗君褆而秀兮乃立于宫廟門有㦸兮祭祀以時相不失託兮君無墜恭庭闈樂康兮妻子不驕又事寡嫂兮端其服容衆人剪剪兮趨慕要津我躬處方兮不夸以從詩書百家兮其博而淆我講其疑兮往趨于中雖裕於心兮不耀其華惟友則信兮其位未充方期顯行兮羽儀于世孰尸變化兮亟畀之㓙沕穆無端兮莫敢貴辭維舊友知兮哀攪余胷老母無撫兮少婦失依頼有息子兮可望其隆嗚呼哀哉兮予悲曷勝託辭于牘兮恨與天終元豐類藁巻四十一
