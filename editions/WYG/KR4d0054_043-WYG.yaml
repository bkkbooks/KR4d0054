body:
  text: 元豐類藁巻四十三宋曾鞏撰誌銘都官員外郎胥君墓誌銘君姓胥氏諱元衡字平叔長沙人皇考諱某王考諱某考諱某王考贈尚書工部郎中考為翰林學士尚書工部郎中贈尚書吏部侍郎君少以䕃為將作監主簿六遷為殿中丞賜緋魚袋鎖㕔應進士舉得出身又三遷為尚書都官員外郎歴監在京染院内衣庫皮角庫簽書河南府判官公事通判湖州又通判海州治平三年四月壬寅以疾卒於泗州其年八月庚寅𦵏於許州陽翟縣三封原翰林君之塋初娶李氏太子少傅若谷之女再娶韓氏封成安縣君尚書刑部員外郎知制誥綜之女子男二人曰茂諶太廟室長次尚幼女二人長早夭君少孤能自奮厲力學問工為文章又謹畏廉潔慕善而不自放居官雖小法未嘗不慎而不為察察於人有所能容其大意如此故所至士大夫愛其脩而百姓歸其恕其在染院二庫雖尚少已有能名及為通判判官而能益顯蓋所試者大將豈可勝數哉始大臣薦其文章宜在館閣近臣又薦其脩潔宜任御史朝庭方嚮用之以為江西轉運判官命始下而君蓋已死矣死時年三十有九聞其喪者識與不識皆哀之蓋天聖之間翰林君方處顯好收奬天下之士而名能知人士之岀於其時有盛名於天下者多翰林君發之及其後君既壯大所與遊士大夫亦皆一時之雋然自天聖至於今纔四十年翰林君之門下士多至大官富貴尊寵君所與遊士大夫亦多重於時而翰林君弃賓客已久君又蚤世獨翰林君之夫人建康郡太君田氏年七十與君之孥羈旅於閭巷君之喪合衆人之賻乃克𦵏其盛衰之際如此固所謂命者非耶君之𦵏祕閣校理裴煜以茂諶之疏來請銘予與君皆嘉祐二年進士故不得辭銘曰維艱而勩以敏其繼維平而畏以篤其義考已無遺在人有賜我志之良孰曰非遂我材之尤孰曰非試不申其期不擴其施有命則然其又何悲尚告後世知者之辭劉伯聲墓誌銘慶厯之間余家撫州州掾張文叔與其内弟劉伯聲從予遊余與伯聲皆罕與人接得顓意以學問磨礲浸灌為事居三年迺别後數年余以貧而仕見伯聲於京師年益壯學日以益又數年余校書史館伯聲數過余飲酒談笑道舊故相樂也伯聲未老然以疾故亦衰矣既而余去京師而東更七州至于亳伯聲子之美來告曰伯聲死八年矣將死時命之美屬余銘其言曰葬而不得余銘如不葬也余惟伯聲始從余遊至今三十年見其少壯至於有疾而衰與之故最久於其死而托銘於余故不得而辭也伯聲諱震為人質厚沉深寡言笑恂恂蹈規矩與人遊見其一善若恐不能及見其一失若恐不能抜其篤於誼如此讀書有大志慨然欲有為者也少孤能自立尤貧然營疏屬之葬孤姪之嫁娶忘其力之不足也數以進士薦於鄉卒不合晩乃得試將作監主薄曾大父澤左補闕贈吏部尚書大父居仁單州單父縣主薄考紘濟州司理參軍其先清河人自吏部葬開封府之東明今為東明人伯聲卒於熈寧五年二月戊戌年五十有三葬於東明之陽山鄉曰駒里以元豐三年十一月某甲子妻賈氏尚書比部員外郎式之女子四人之美之純之竒之邵二女嫁倪良器李日新張文叔名彦博余為之叙其文者也銘曰敏於求已尚行寡言篤於求古廣見多聞有既畀之而施則屯維舊則信以諗後人尚書比部員外郎李君墓誌銘康定初先人寓南康與李君居並舍是時君年未及四十游余父子間相好也後十餘嵗君為臨安遇余於浙西道舊故喜甚乂十餘嵗君已退而家居復見之山陽又九嵗而君年七十有一以卒明年其孤仲熊自山陽扺京師拜且泣曰願得銘也余惟君游余父子間四十年矣銘其可辭君姓李氏諱丕字子京初名真卿曾大父諱某大父諱某考諱某贈光禄卿母丁氏仙源縣太君繼母王氏仁壽縣太君海州朐山人家故寒也學為士自君始出舉進士中其科得主楚之淮隂簿嵗凶轉運使調軍食用君主宿州糴他州皆强賦民猶不足君隨便開誘糶者悦趨糴最他州去為䖍州司法參軍能隨用見聲出衆上薦者十四人不用遷寧國軍節度掌書記轉運使屬君市翎毛擾致如主糴所市以赤數之至十萬復最他州又屬君主作院君考校程度所作兵器總一萬一千三百二十有四皆精且利他軍州事有不能決者多屬君君所決者二十有八事蓋復太平州囚管壽活之明通判歙州林瑀無罪釋之類如此於是能益白薦者十三人遷祕書著作佐郎用薦者監興元府稅急吏寛商課嬴十有七萬嵗中以嵗次遷祕書丞以課遷太常博士以覃恩遷尚書屯田員外郎知杭州臨安縣召為審刑院詳議官賜緋衣銀魚遷尚書都官員外郎通判蜀州蜀少事然他州訟有積嵗不能決者轉運使以屬君君所決八事民信服之遷尚書職方員外郎監在京内衣庫樞密使田況奏用君刪定馬軍司條貫既成詔加賞賚濱州有獄久不能決辭連大臣家子遣吏治之輒辭詔遣君乃決累遷尚書職方郎中以母老出通判杭州坐法免復為尚書比部郎中監沂州承縣鹽酒稅未逾月自罷歸又監陜州集津垜鹽務不行以本官致仕元豐三年九月己卯以疾卒山陽之私第十一月甲寅葬安樂鄉之楊興里君娶葛氏仙居縣君再娶喬氏壽安縣君子男七人曰仲熊衛州軍事推官曰仲謨以進士再試禮部曰仲將曰仲傑曰仲倩曰仲昌皆未仕也女六人嫁呉好禮于銳皆奉議郎馬察于鏜皆進士餘幼也君既自奮拔立其家蓋仕四方惟蜀去其親其事兄撫孤弟姪皆盡恩意其為吏不獨能自任其官蓋他吏之不能任其事者或屬君兼任之辦且裕也不幸一跌世無力振達之者故以坎壈終銘曰海區氏李有啟厥世富辭與能自約而侈曰父與子郎官卿士曰妻及母翟衣象揥謂勢方利孰轠以毁施不盡有故也則喟尚佑爾裔以追厥始司封員外郎蔡公墓誌銘公諱充字公度天聖二年進士及第為邵武軍之邵武尉又為應天府之下邑尉丁母夫人河間縣太君周氏憂服除為越州司理參軍天平軍節度掌書記遷祕書省著作佐郎知洪州奉新縣祕書丞知遂州小溪縣改通判戎州累遷太常博士尚書屯田度支司封員外郎歴監在京都進奏院羣牧判官知綘州又為提㸃荆湖北路刑獄公事至和三年七月二十三日以疾卒於灃州之官舍享年七十有一嘉祐二年十一月十三日葬於建昌軍南城縣太平鄉之西原公為人好自潔清平居衣冠容貌肅然及其臨事以沈黙慎靜為主故自起家至於其終凡三十餘年歴内外官任事無纎芥之失其與人遊始若淡然無足動其意者及其久人人皆退自喜謂公真長者也其為尉參軍掌書記人始以亷節知公及為奉新小溪綘州其政又以平恕不擾聞至其在羣牧荆湖數更置諸事人皆服其能其於越州屬將佐交惡府中多向背公獨挺立無所與後將又以貪坐法官屬多不能自全事亦卒無汙公者於戎州屬瀘州叛蠻攻淯井監轉運使用公調兵食禦之兵遂以濟於綘州州嵗市羊數萬供京師公奏減之至今賴其法於荆湖既周知官屬善惡於善人多薦籍成就之而於惡人無所貸其法公既能自將顯其材故薦公者尤多盖王沂公曾王鄧公詒永與今富丞相弼之居鄆也皆薦之而鄧公之為樞密使兼羣牧制置使也又奏公為判官其為當世之大臣所知如此初公年十三喪父家貧尤自克苦養其母及仕未嘗廣田宅喪歸借屋以居曾祖諱恭祖諱道隆父諱旦以公恩贈尚書屯田員外郎世家南城故為南城人娶鄭氏累封宋城縣君子八人曰冠卿祕書省著作佐郎曰端卿鄭州原武尉曰文卿曰徽卿曰宋卿曰喬卿曰子卿曰孺卿公歿詔官其一子盖公不獨能以其有施於身又能力以其餘教於家故公之歿也冠卿以材尤知名端卿而下皆謹嚴能世其家者也女二人嫁邵武尉陳涉進士陳之邵冠卿等將葬公以銘屬公故人子曾鞏銘曰司封抱能屈初齡秉旄懷紱晩始亨沙墟莽厓肆經營馬羊茁肥獄訟平凜然氣志潔以清自㣲訖隆用兢兢風流餘徽被家庭子多以才後方興贈職方員外郎蘇君墓誌銘熈寧元年春余之同年友趙郡蘇軾自蜀以書至京師謂余曰軾之大父行甚髙而不為世用故不能自見於天下然古之人亦不必皆能自見而卒有傳於後者以世有發明之者耳故軾之先人嘗疏其事盖將屬銘於子而不幸不得就其志軾何敢廢焉子其為我銘之余為之記其説曰君諱序字仲先眉州眉山人其先盖趙郡欒城人也曾大父釿大父祐父杲三世皆不仕而行義聞於鄉里祐生於唐季而卒於周顯徳之間嘗以事至成都遇道士異之屏人謂曰吾術能變化百物將以授子祐辭不願道士笑曰是果有以過人矣而杲始以好施顯名君讀書務知大義為詩務達其志而已詩多至千餘篇為人疎達自信持之以謙輕財好施急人之病孜孜若不及嵗凶賣田以賑其鄰里鄉黨至熟人將償之君辭不受以是至數破其業戹於飢寒然未嘗以為悔而好施益甚遇人無疎密一與之傾盖無疑礙或欺而侮之君亦不變人莫測其意也李順叛攻眉州君居圍中守禦㑹其父病沒君治喪執禮盡哀退慰安其母皆不失所宜慶厯初詔州縣立學取士爭欲執事學中君獨戒其子孫退避人皆服其行蜀自五代之亂學者衰少又安其鄉里皆不願出仕君獨教其子渙受學所以成就之者甚備至渙以進士起家蜀人榮之意始大變皆喜受學及其後眉之學者至千餘人盖自蘇氏始而君之季子洵壯猶不知書君亦不强之謂人曰是非憂其不學者也既而洵果奮發力學與其子軾轍皆以文學名天下為學者所宗盖雖不用於世而見於家稱於鄉里者如此是不可以無誌也已君始以子恩為大理評事後累贈尚書職方員外郎享年七十有五慶厯五年五月十一日終於家八年二月某日葬於眉山縣脩文鄉安道里先塋之側夫人史氏蓬萊縣太君二子曰渙尚書都官郎中提㸃利州路刑獄公事有能名曰洵覇州文安縣主簿編纂太常禮書贈光禄寺丞孫七人位佾不欺不疑不危軾轍軾殿中丞直史館轍商州軍事推官銘曰蘇氏徂西值蜀崩分三世髙逝以篤吾仁君始不羈勞躬以卑孝於父母施及窮黎維見之卓教其子孫終化鄉邦學者詵詵維子若孫同時三人擅名文章震動四方迺本厥初考祖之自刻詩墓石以畀厥裔庫部員外郎知臨江軍范君墓誌詔嘉祐五年六月辛巳尚書庫部員外郎知臨江軍事范君卒於位年五十有三其年十月辛酉葬於江州徳化縣之仁貴鄉萬家山前葬其孤屬君之故人李中考次君之官氏邑里與其功行之實為狀授使者使告於鞏曰先君葬既得日月宜有銘孤安期也敢請鞏曰君之行宜有述乃為之誌其墓而銘之其敘曰惟范氏傳敘受姓自劉累以來其後居江州者出於晉豫章太守寗之後君諱端字思道江州徳化人也祖祕書省著作佐郎贈太常少卿諱成象父尚書都官員外郎贈光禄卿諱應辰君始以父任為太廟齋郎累轉至尚書庫部員外郎歴徳化尉江寧主簿江都令知南昌飛烏彭山三縣通判通州徙泰州又為勾當開治畿内溝洫提舉陜西河北路便糴糧草至知臨江軍事而飛烏以乞養太夫人得監江寧府鹽稅彭山用薦者得監雲安軍鹽井二縣皆不至君聚書萬餘巻强力篤學為人恭遜質儉能自修飭門内之治肅如也及施於為政以謹法能持亷名於世而世之能觀其内者亦少也始為江都㑹嵗旱張若谷為揚州遣吏數人與君皆出視民田他吏還者白嵗善君還獨白田實旱若谷初不是之也君持旱苖力爭乃卒是君所白呉遵路蔣堂為淮南轉運使使君䕶河役君徃視之還言河不可為遂罷君用他吏䕶役而河果不可為三人者其初皆怒已乃感悟共薦之而當是之時天下之主財利者方務於急聚歛治民者以立聲威為賢交四方之賓客者又往往嚮意於卑辭貌煩饗燕贈送之禮以其故能傾士大夫以干天下之譽君乃獨推息民教化之意以簡易自守故為雲安主鹽利而議蠲鹽課以數萬為臨江以興學教人為先而㕑傳賓客之奉十去其七八四方之往來者或出語訕君君不為之動也其正行直道如此太夫人李氏贊皇縣太君父尚書工部侍郎虚已元配某父龍圖閣直學士向次配周氏清河縣君父尚書司封員外郎陵子男六人安期安仁安之安常安壽安禮女五人長適和州司户參軍鄭夷中次適都昌主簿周詠次適郊社齋郎周佺期餘尚幼孫男六人萃叟岩叟渭叟商叟䝉叟真叟太夫人之殁君哀感疾四年乃能起凡君之所既立可謂有士君子之行非耶自不遵先王養士用人之法而士在閭巷之間者用力於空文居朝廷者馳騁於虚名以譁世取寵士之能修其内潔身累行者非自好之篤莫能至而世亦罕能知之也故君之事予喜為之見於文使後之君子得覽焉君於文章尤長於詩有集三巻藏於家其銘曰君性温温好退持卑及其臨事擇義而為一世之棄君獨從之一世之慕君獨違之行已有常在官無疵曷以知之眎此銘詩張久中墓誌銘君姓張氏名持字久中初名伯虎慶厯三年來自曲江入太學當是時天子方詔學官嵗獻士二人學者以數百千人獨獻君㑹學散不報於是時予蓋未嘗識君也後二年過予之所居臨川始識之君為人深沈有大度喜氣節重交游一時所與之遊者甚衆而君所尤稱者廣漢張賁以為年少可進以學者莆陽陳惇蓋君之學多賁發之而於惇以師友自處也凡君之與人交喜窮盡其得失其義足以正之而其直未嘗苟止也至其與衆人接尤温以莊不妄與之言與之言必隨其材智所到不病以其所不為故君之友皆憚其嚴而喜其相與之盡衆人之得君遊者亦皆喜愛而未嘗有失其意者其語曰士生於今勢不足以持世而遊於其間當如此也於臨川出其文章因與予言古今治亂是非之理至於為心持身得失之際於其義余不能損益也後二年死於興國軍某月某日也明年其弟來江南以力之不能將獨負君之骨以歸是時陳惇方以進士得出身約君之弟曰吾忍不全歸吾友耶明年吾得補為吏力能以君之柩歸其弟乃止君年若干祖某考某君幼孤養於兄嫂嘗曰嫂之於吾猶母也婦能以姑之禮事吾嫂者可以為吾婦矣然卒亦無也君固難交然不易其好而陳惇者與君交尤深也予嘗眎惇與君之相從憂窮齟齬無不共之其中心豈有利然也世之交友道廢久矣其有之或非此也然則君之事其有取於世教非邪惇以某年某月某日歸君之葬地而屬予銘其辭曰嗚呼久中不如其志孔孟已然何獨於子生而不大天固為之其長在人於此觀之祕書丞知成都府雙流縣事周君墓誌銘君姓周氏諱旻字夢臣衢州江山人也曾祖漢規祖徳厚父幹君以進士及第歴南劒之將樂建昌軍之南城主簿監䖍州雩都銀場又為泰州司戸參軍用薦者為祕書省著作佐郎知宣州南陵縣事遷祕書丞知成都府雙流縣事嘉祐六年正月某甲子至江陵卒於舟中年五十有一母某氏先娶毛氏乂娶祝氏子男三人曰某曰某女四人君之卒某始七嵗清江李中為之具喪事所須某年某月某甲子君之弟暠葬君於某縣某鄉某所之原君少孤力學不問生業事母以孝稱在仕也嫁姊之貧者居常分月俸三之一以奉之餘以與諸弟君與妻子或止食館劵而已為人和平質簡其施於為政亦然及至有所必行人亦多所不能及也其為南城雩都取豪猾尤難治者三人皆繩以法君既見惡果於繩而去之故其餘皆歛跡不敢犯君法此君之行已居官已試者也所試者大將豈止於是歟銘曰婉婉為人嶷嶷為吏此有愛慕彼無怨議孰厚其有孰艱厥施維銘昭之以諗來裔元豐類藁巻四十三
