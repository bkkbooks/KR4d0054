body:
  text: 元豐類藁巻二十三宋曾鞏撰制誥擬詞册立皇太子制惟宋祖宗集大命開蹟垂統傳繼在予賴天之靈海内和洽獲薦珪幣以為祭主惟先哲王享國君民必有儲兩以相承翼所以奉天地嚴宗廟與民為依長慮萬世也厥惟故典予敢不率咨爾某生材之卓絶倫拔類覃訏岐嶷成於自然緝熈光明不繇外奬潜徳日茂敷聞下土將旄王組藩衞京師神祗所毗戎夏係屬宜執匕鬯位以時定今遣某某立爾為某夫天下之本在太子太子之所務求諸已而巳爾能明其心人不詔其孚爾能善其身人不戒其隨治亦多術矣要不易乎此也嗚呼匪得之難充之為難爾能服于訓辭以承我先后之流澤俾爾躬無疆惟休惟予及萬邦亦無疆惟慶豈不韙歟王制一昔大漢之興鑒孤秦之敝分土而開者九國當高祖之初同日而立者三王在孝武之世或支庶之踈屬或宗嫡之近親所以蕃輔京師承衞天子今朕按圖䂓地諏日定封推天性之厚恩本人倫之通誼以隆公室蓋率舊章某鍾氣至靈生材特異聰明先物不自於鐫磨孝愛絶人非繇於奬勵比服公圭之寵仍分將鉞之崇休有顯聞洽於時論是用疇其爵邑列以真王建爾國家保茲東夏視祲威於宰席增衍食於爰田用强磐石之基實重維城之勢嗚呼册之宗廟申戒因其土風式是大邦親臨定其名號爾尚無作匪徳以追配前人之休無從匪彛以答揚皇祖之訓俾人預懷榮之慶而身兼燕譽之祥王其勉之朕命惟允王制二昔周建親戚蓋五十三國以蕃輔京師漢封骨肉或連數十城以承衞天子所以强形勢固根本計慮深矣朕甚慕焉矧先帝之子朕之仲弟宜膺顯册進啓大邦茲惟典常夫豈敢廢某淵靜冲約孝友忠篤不挾其貴以從匪彛不恃朕恩以作匪徳奉法遵職夙夜小心王于雍邦滋乆彌卲惟營丘之野臨淄之中太師吕尚之所建國兼岱及海天下重地是用立爾保茲東土三公之儀上將之節爰田真食備物寵章大告于廷咸以屬爾於戲書稱帝堯之徳曰以親九族詩美文王之聖曰刑于兄弟蓋教自上行愛繇親始先王之道不易之理也今予命爾不違茲誼尚悉爾心其勵相朕使黎民百姓於變時雍繇家及國罔不作孚以屏予一人鎮拊方夏實諉在王時其勉之王制三天子支子若其母弟姬姓於周未有不侯劉氏於漢未有不王蓋親之欲寵其位愛之欲厚其財先王之法人事之理也某先帝少子朕之季弟聰明齊敏孝弟忠實冨而能約不縱以敗禮貴而能戒不恫以好逸畜學樂善厥徳日新王曹積年遵職無懈惟斗牛之野太伯所開三江五湖其陽大海鹽魚金􅂖天地之藏茲用命爾式是南郊儀視三公任兼上將真封衍食備致寵章於戲昔魯公於周大啓爾宇以輔王室康叔於衞實為孟侯以保乂民今朕順稽于古以屬爾某爾尚念茲以祗厥服常棣之澤配前聞人維城之休承我高后在爾勉矣往其欽哉皇子制朕受天命撫萬邦實承祖宗之盛徳丕烈永惟先王之典人君在位必蚤建太子所以重宗廟為天下萬世計也某粤初在母祥應先見誕始能言則岐則嶷王封將位蕃輔京邑孝愛日裕温恭自然神靈所開人望攸屬考刺六藝主器以長生民之道不易之理也其立為某於戲非朕私於子某惟宋高后之傳序垂統朕不敢忽惟四方上下之所注心朕不敢距嘉與海内同孚于休播告遐邇其諭朕意贈第八皇子制朕惟父子之親人道之極蓋父有天下而隆名重位建於其子此恩義之所始而先王之制不易之理也至於禮命未及奄遘淪亡申以哀榮朕何敢廢皇第八子某秀拔慧悟天質異甚不好戲豫安於靖恭謂及大成必為國器蕃輔王室朕有望焉而屬疾乆之醫禱備至不幸夭閼痛何可堪其於陳迹尚存音容如接永言傷悼莫愬朕懐今有司上聞揆于公議謂宜秩以三事今于中臺爵之真王諡以佳號厥惟舊典朕豈能抑是用追錫備茲異數嗚呼生而有特出之姿不得遂其美殁而有非常之寵所以厚其終服我命書尚其不昧王子制朕隆於親親非特私恩而已所以教天下厚人倫也爾家慶所鍾王室之出列於使領茲惟異寵往思報稱待爾成人韓琦制躬閎廓之材體純一之徳翊亮三后格於皇天惟初登庸合志皇祖仁民愛物日陳上前進賢退奸隂利天下側陋幽隠靖譛庸回削㓕無類及受末命戡濟艱難以已狥時坐定大議天望人事脗無間然市朝不驚按堵如素海内萬里外薄四夷率職駿奔無敢先後昔三代遭變繼世之初干戈警備陳及門廷書之史官以為後法以至兩漢嗣位則又閉城屯兵以為故事未有兵藏於庫士散於家而傳序繼統中外晏然如今日之成也是繇列聖功徳無窮之休亦惟廊廟之上逺畧大度身任社稷克濟登茲者也相制一天有保命集于朕躬惟用乂民罔以自逸敷求良弼作為憑依若圜就規若正識墨今朕得士諗于在廷某廣博靜淵密於世用推其計畫見於可行考其事功效於已試爾為爾守宜立輔朕茲用詔爾位于東臺嗚呼自周衰以來千有餘歲先王之道蔽而不明振壊扶微朕竊有志尚懋朕佐圖惟設施參諸經訓而不違質諸時宜而不謬無崇小慧以易大猷無伐已能以距衆善惟賞刑在上不可以僣惟聰明在下不可以咈俾厥后克濟其任則爾身永孚于休其往起哉以承我祖宗之丕烈相制二有為之君舉賢以自助有志之士遇主而後伸兩常相須而相濟者少兩常相求而相值者寡朕觀前代君臣之際聖賢相與之盛慨然忻慕願比迹焉今得其人詔于爾衆某行無緇磷學有本原材諝智謀淑問惟舊納忠左右匪懈夙宵蔽自朕心命爾予翼列予右相進貳西臺嗚呼自道術不明而世蔽滋乆法度多缺而紀綱浸微圖治者以古為迂錯事者以苟為得兵安於坐食而不合於農士習於空言而不知為吏禮義廉恥闕而不思朋黨比周靡然成俗任之以學斆而敗官以墨者方興起之以赴功而便文自營者滋出伊欲黜漢唐之淺陋追堯舜之高明尚懋相予予忱不貳使千載之墜振於一朝上下之間配于前烈以揚我先后之光訓亦纉爾舊服之顯庸相制三朕飭正三省綱理萬事號令所出本諸西臺閱審駁論屬之黄闥推而達之則在㑹府以其官之長貳皆為任政之臣鼎足居中各遵其職分守則異合謀惟一時予俊乂宜就茲列某身篤學行自幽而顯宣力中外績用彌劭惟文昌政本揆叙百度介于左省考慎朕命圖濟厥服爾其往哉朕訓迪治官順稽于古使其體至大而統之有要其事至衆而舉之有條不惟其文惟其實不惟其位惟其人爾允念茲以勤予翼蓋先代之法存於籍者既殘缺而難循當今之宜殊於昔者又舛違而易逺酌是彛憲成之甚艱尚迪庶工奉若惟新之則亦永來世預有無窮之聞節相制古者出軍之法始於一井之間遣將之常甫在六官之内師田共務文武同方蓋丁發召之期則士就戎行而卿行於外已征誅之事則衆遵農畔而帥旋於朝歴世雖殊茲致惟一逮後王之更造開阡陌以居民𨽻伍符者身不受於一㕓仗齊鉞者位不連於九棘其於荷戈抗隊為王之𤓰牙立纛設旄為國之屏翰上下之任古今則同予得異能詔于在列某性資强毅識慮精通束髪修身有恕已及人之志歴官行事有承流宣化之勤踐揚要極之司更閱歲時之乆嘉謀讜論簡在朕心廣譽善聲洽於輿論有國之典以爵詔功宜疇厥庸爰啓爾宇建大將之旗鼓尸我一方賜諸侯之土田保茲東夏以董齊於軍旅以撫和於士民參帝傅之寵名益户封之真食兼隆異數奬勵茂勲於戲昔吉甫典兵萬邦為憲申伯作邑四國于蕃宜悉意於壯猷庶俾忠於前烈答揚祖宗之訓予冀為衆得人夾輔邦家之基爾尚為時宣力侍中制舜用臯陶若股肱之承元首商咨傅說如舟楫之濟巨川蓋一體之相成或兩求而莫值肆朕纘極寤寐雋良果得異能屬之大任用揚孚號明論在廷某行蹈中和學通今古從容應物有適用之材慷慨立朝多據經之論比回翔於禁闥遂更踐於樞庭閲歲已深服勞惟舊朕惟紀官之敝久廢於正名分職之殊固難於覈實為司徒之定制俾位號之無虛乃眷宗工宜加異數東臺管轄之任爰處於弼諧南宫喉舌之司仍躋於端右體加隆之注意當益懋於壯猷於戲秉國之均天下之所取正熈帝之載朕心之所仰成使萬物各遂其生而一夫無失其所以輔予治往惟汝諧門下侍郎制朕於天下之事以禀承處决屬之中書審閲較正歸之門下而使尚書推而行之此三省所以異任而相成故長令僕射皆宰相之任而左右省侍郎所以貳之蓋謹其名者固將循之以稽其實也必使位無虛加人無虛受以修國家之務然後稱朕意焉某明允修潔學通今古以風力之敏見於績用以志行之篤重於朝廷擢自從臣預國機政多引大體沃于朕心維董正治官之初介東臺管轄之寄歴選在列汝往惟允夫堅一心以在王室康萬事以亮天功汝之任也其尚勉哉門下侍郎尚書左右丞制尚書萬事所出丞所以筦其要門下三省之首侍郎所以貳其長朕稽于古義以正官號故合是寵秩以命吾共政之臣非天下之材足以協朕之謀繫人之望者夫豈虛授某莊毅忠篤通於古今列於廟堂以義陪朕是用考擇以為選首使文昌左轄之任舉瑣闈叅議之效明六官紀綱上之所以齊下者無以撓四方奏列下之所以通上者無所壅以弼予一人而亮成庻績尚懋厥志無忘訓詞給事中制有事殿内之臣職在於平奏述詳命令駮其違者而正之覆其善者而行之至於决獄官人發驛遣使申寃滯察苛嬈莫不總焉其任可謂煩且重矣朕董治正官之始思得其人以稱厥位以爾具官某忠篤强毅明於理體勞閲甚茂朕惟汝嘉列之東臺公議所屬惟精敏不懈可以統治要劇惟剛方不苟可以辨白是非爾尚慎于厥修朕方觀汝之效左右常侍郎制左右之臣以騎從乘輿職在獻納可謂親且重矣非器識操行屬乎朕心夫豈輕授某老於文學練達治體舊惟其政勤烈在時某直諒多聞篤於自守先帝遺朕調護有勞皆以耆名列于秘殿是用考諮於衆寵以茲任朕惟爾之試用已效必能秉誼不渝惟爾之博通古今必能補朕之闕徃祗厥服豈煩訓辭左右諫議大夫制諫議大夫掌議論舊矣今列於從官實有言責事無大小皆得開陳當其可從則為之更命令易取舍固朕之所虛心而聽也朕方於天下之忠讜惟恐不聞則居是任者直已以事上夫何間哉某器識强敏明于今古俾職獻替僉曰汝宜夫能通上下之情而使朕立於無蔽之地治道之所繇出在汝能任其任可不勉歟二起居制孔子稱言動以禮天下歸仁焉矧託于王公之上言而為令動而為法故必有左右史從而記之所以昭得失明勸戒能稱茲任蓋難其人某文學優深操行修潔執簡簮筆有列於朝今朕順于古義以考定官儀是用正爾之名俾仍舊服其尚謹於書法以無曠于厥司左右正言制左右之臣以言為職事有得失關於理體利害繫於人情或方兆於幾微或已施於命令論皆可及誼無不從選用特殊寄屬惟重正官之始得士尤艱某綽有時材通於世用獻替之位宜服寵名夫上之求乎下者患乎難知下之求乎上者患乎難達使耳目之任無蔽藥石之規必聞尚惟汝能以助予治諫官制某純明廣博信古知今用爾之長俾有言責夫言人之所難言爾無不盡而聞之如恐不及朕豈敢忘其尚懋哉無或容而已矣中書令制虞氏之咨四岳惟亮天功周家之建六官以為民極朕叅于古義質以今宜以右省典正於鈞衡以中臺總持於綱紀兼是重任時惟宗臣播告在廷其聽新命某敏於學術優有時材以經逺之謀彌綸治具以察微之智練達事幾繇展采於禁林遂陞華於宰路協宣勞力積有歲時朕惟授職以量能宜循名而責實稽先王之作則以正百官起多士之赴功庶康萬務眷言舊徳申以異恩維化原實繫於内樞俾首弼諧之任維政本一歸於㑹府仍躋端揆之崇寵秩所加委成彌重豈獨儀刑於列位固將叙正於彛倫於戲咸一徳以格皇天輔予于治釐百工而熈庶績待汝有為其務迪於壯猷尚思齊於前哲體茲注意維往懋哉門下中書侍郎尚書左右丞制尚書中書門下三省本天下之務而侍中令僕射為宰相之任舊矣自唐政不綱而失其守今朕董正治官使三省之長皆復其任而於尚書左右丞左右省侍郎秩有升降使貳吾任政之臣夫綱轄之地與御史更相察舉所以警官邪明憲度而侍郎於左右省無不統理則其所繫於體尤重非傑出之材不在茲選某官端方篤實學有本源預于政機人望惟允某强毅忠厚通于古今謀謨廟堂休有令聞是用命爾以為選首其尚體余所以處爾之重勿苟勿隨使百工庶尹皆知爾之不私于法罔敢不正而政令之自上出者罔不得宜以稱朕所以作則埀法始今行後之意爾可勉矣予有望焉中書舎人制朕稽于古以正百官使循其名以效其實惟舎人中書之屬以典掌命令為任而况列於侍從則又職在論思方朕明紀綱定憲度以為民極之初非能見於文章何以究宣朕意非能通於世用何以彌綸庶務進在茲位不其重歟某官某忠正仁篤達于古今其文足以代王言其智足以謀治體斷自朕意以為選首其尚尊爾之學以善於訓詞奮爾之庸以禆于政理使爾能稱厥職而朕預於知人其惟勉哉以祗厥服知制誥制典掌書令之任為左右之臣非獨在於潤色斯文而已固當論思治體以輔朕之不逮朕博考天下之材然後有所拔用則於付授豈不慎哉某强識敏學通於理要砥節勵仁忠篤不回朕惟汝嘉使在茲選朕有兢兢業業一日二日萬幾之慮汝則思輔以謀猷忠於獻納朕有作則垂憲施命以告四方之志汝則思達以文辭見於號令使汝為稱任則朕為得士豈不休哉尚其勉矣以服厥官知制誥制二賛為名命之臣法當得一作侍從非獨在於討論翰墨發揮詔號而已必將講明治具思獻其可以弼予違故非其人夫豈虚授某敏有時材優於學術擢於不次俾典訓詞維能守其所聞可以輔予不逮維能明於體要可以見於文章其尚懋哉方觀汝效尚書左右丞制本天下之政者尚書也本尚書之紀綱者左右丞也蓋衆職之治亂萬事之廢舉糾而正之實其任焉今朕董正治官使尚書纉其舊服以僕射為任政之臣而六卿各遵其職至於綱轄之地所以儆官邪繩謬戾御史有不舉者得并而治之則其繫於體尤重是以進其位叙使得貳吾任政之臣非望臨一時朕豈虚授某明允忠篤通於古今列於廟堂以義陪朕是用考擇以為選首其尚體予所以處爾之重勿苟勿隨俾百工庶尹知爾之不私于法罔敢不正稱朕所以作則垂憲始今行後之意爾可勉矣朕有望焉左右司郎中制尚書天下政本左右司紀綱之地故郎選異於諸曹非器幹望實有聞於時莫稱其任某明敏强濟通於世用宜在此位故以命汝創制之初舉墜興壞所以彌綸庻務者待汝有為其尚懋哉以承厥叙元豐類藁巻二十三
