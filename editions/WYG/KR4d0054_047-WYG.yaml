body:
  text: 元豐類藁巻四十七宋曾鞏撰碑太子賔客致仕陳公神道碑銘太子賔客致仕陳公既葬其孤聃與其宗親屬人謀曰公歿所以原大追功既有大史之狀幽宅之銘維墓道有碑可以明著公之休徳遺澤章示萬世以假寵陳氏之子孫於無窮而其辭未立於誼謂何迺相與來請於余余辭不能既不獲迺論具公胄出位序行治之實以為碑辭而屬之以銘其辭曰惟陳氏其先虞舜之後封於陳春秋時陳滅入楚其子孫以國為氏世為顯姓見於記錄至公之先始家南康軍之星子至公又家江州之徳化曰知某職者公曾祖考也曰彦璩公祖考也曰累贈禮部尚書俊公考也公諱巽字公順祥符八年進士及第厯常州團練推官盜有棄財走者公以謂不應死通判不肯用公言是時公起家少年及遇事堅爭不可奪其守老吏皆驚盜卒不得死以尚書憂去位服除補武安軍節度推官侍御史李偕守武安事倚公决州賴以治轉運使陳從易以公為材獄有久不决者皆屬公治之凡治二十四獄人皆服其平以皇妣嘉興郡太君馮氏憂去位服除補岳州軍事判官舉監潭州茶米倉天聖初潭州茶課視景徳虧十之六公謹於繩吏而果於去民之所素不便者茶視舊課歳增九百萬斤用薦者改祕書省著作佐郎知吉州廬陵縣廬陵人喜鬭訟械繫常充縣庭公除其害政者人心大變月餘囹圄空虚而人自得田里之間樞密副使姜遵嘗為廬陵民便之至是有前姜後陳之諺移知資州資陽縣遷祕書丞用薦者通判戎州州將武人以州任屬公民夷悦附政以大和遷太常博士尚書屯田員外郎通判潭州溪洞諸蠻犯約知州事劉䕫劉沆繼出行邊公實總州任内修民事外奉師費凡輸粟帛金錢四十有八萬兵械稱之用足於軍而賦役不加於民沆及荆南王居曰岳州滕宗亮與湖南北部使凡十有二人請即用公為轉運判官㑹轉運判官廢故不行遷都官員外郎知撫州恩信行部中奸彊馴服貧細得其職遷職方員外郎明堂恩遷屯田郎中賜服金紫去知安州以寛靜順其俗教民通溝洫趨農桑遷都官郎中知蜀州大興學校遷職方郎中太常少卿知蘄州居半歳以目疾請老遷光祿卿致仕始家江州英宗即位遷祕書監今上即位遷太子賔客公少長閭巷能自感發彊志力學為進士一出遂收其科為吏明悟敏捷見義敢為不少屈以求合蓋從事於州郡久之不進而其志彌厲其治於惡人無所貸至其過失則無所不容而於善人惟恐失其所也遇人豁然不為畦疃於其所長未嘗不薦藉成就之於其急難與貧不能自存者未嘗不賑而助之公既好學至於聲音星厯之伎無所不知及退而自休日使家人誦書常數千言危坐聴之未嘗有倦色江於東南為水陸之衝賔客日湊公廣於招納與之釃酒髙㑹彈琴賦詩曰是足以佚吾老也及間而言天下之事於其是非得失之際慨然奮勵少者有所不能及聞其言莫不壯其意少客京師有欲教公化黄金者公辭不受教公以寡欲乃受而行之蓋出事天子四十有八年退老於家又十有五年年八十餘飲食倍人儀狀甚偉聲音滿堂進拜公於前者不知其已老也前終十餘年自為冢於南康軍星子縣白鹿原距尚書之兆千有八百步棺槨衣衾皆豫自製屬疾至終容止如常遺言里中親疎各盡其意享年八十有五歿於熙寧九年五月壬申葬以是年八月壬寅累階至朝散大夫勲至上柱國封至潁川郡開國侯食邑至一千二百户娶張氏尚書屯田員外郎詡之女封清河縣君再娶王氏尚書都官員外郎告之女封同安郡君子男二人曰耆太廟室長有易疾次即􅆅也守江州瑞昌縣主簿女五人嫁太常博士文勸進士呉隲光祿寺丞曾軫進士陶舜儀吉州廬陵縣主簿薛縫孫男一人曰瓌女三人聃承徳襲教能世其家者也銘曰允穆陳公學繇自力收科於少其髦維持于陪于貳懿其壯畫于附于顓焯其偉績驅之磔之于其蝥賊膏之嫗之于其黍稷彼疾而馳我徐不亟寧無爾諧不渝我則于郎于卿進皆以序疾集于微乃謝而去迺長書省迺賔宫朝寵則日躋身焉逍遥世狠而爭公裕有之世惴而持公恬處之公有賔事鼓瑟吹竽公退燕私左詩右書年則大耄氣盖坐人笑談待終曾不頻呻有歸墓隧豐碑螭首勒辭告休尚慰爾後祕書少監贈吏部尚書陳公神道碑銘祥符九年九月甲辰祕書少監知廣州陳公卒於位以聞天子官其二子以􅇺寵其家天聖中今天子修先帝功臣記之於史而太史考公之謀議勞烈於朝訪公之世族州里官次行治之本末於家以書於册已又有詔次其功著之令典布之天下曰維所以寵嘉陳氏之子孫者其世世無絶嘉祐三年公子三人謀曰吾先人之所既立記徳之史藏於有司褒公之詔傳於天下維墓有碑後嗣所以載吾先人之休聲美實而久廢不立懼無以飭其子孫於千萬世以為已羞則相與來乞銘文以刻於石其叙曰維陳氏其先逺出於舜至周武王之時陳為舜後媯滿之封國至春秋之際楚滅陳而子孫之散亡者因為氏姓其後居長葛者出於漢太邱令實之後唐之晩長葛之陳氏徙南劔州之沙縣公諱世卿字光逺南劔州沙縣人也曾太父㫤大父昂父文餘公貴贈其父尚書駕部員外郎公為兒時書木葉為詩其父見之大驚遂始學書以篤志聞於人中雍熙二年進士為衡州軍事推官改靜安軍節度推官王小波李順盜蜀州縣多不能保東圍靜安公應變為箭笴兵械城守之具百餘萬約其屬分城守之圍既久不解分城者疑懼意懈出語動公公以義譙數勉之而間謂州長張雍曰此屬留之則潰人心縱之使求外兵則兩全雍聴其言盜數萬人圍靜安八十日公奮勵距敵射其裨將一人應手死又射至數百人無不輙死盜以故不可迫而外兵來救乃卒解靜安之圍事聞即其軍以公為掌書記父喪不許去官自宋興小吏勢盜起往往轉掠數百千里吏輙棄城走及公之保靜安則若吏力皆可以有為者然公之於此時蓋亦以無為有以少勝衆此材智烈丈夫之所為小拘常見之人亦安能責其此出哉公在靜安七年還為祕書郎真宗即位召公欲以補御史而張鑑守廣州乞公自助乃以公與鑑累遷尚書度支員外郎賜緋衣銀魚厯河南府新安縣通判廣州知建州改福建路轉運使又改兩浙入判三司勾院復為荆湖北路轉運使澧州諸蠻奪澧旁地耕守數縱兵入盜積十餘歳莫能却公至諸蠻畏悦皆還就溪洞而歸故所掠地與人公因築武陵澧州二塞以備蠻詔書嘉奬公去久之而後吏不能善蠻蠻亦輙復入盜天子問公前所以服蠻者何為而今將治之者何出公具對而刋其稿世故莫知其何術也公在荆湖歳餘擢為祕書少監知廣州賜金紫服至則罷計口鬻鹽人以休息海外國來獻多人徒以食縣官而往往皆射利於中國也天子問公所以綱理之者公以謂以國之小大裁其使員授官之多少通其公獻而征其私貨可以息弊止煩從之居南海四年未及召而得疾享年六十有四某年某月某甲子葬於沙縣之龍山鄉崇仁里母夫人某氏某縣君繼母夫人蕭氏某縣君夫人羅氏某縣君子五人曰儼尚書比部員外郎曰侃福州古田縣尉曰佩衛尉寺丞曰偉同學究出身曰偁殿中丞佩偉皆早世而儼偁之進於朝累贈公吏部尚書公事繼母行純篤其進膳飲藥物必經手其執喪人恐其不勝哀也遺戒諸子皆人之大節好振人之窮樂奬人之善所薦士後多至大官宰相張士遜公所薦也公常以謂我之所以自著者在行事故不必見於文章所以事上者不求人知故其於謀議尤多而人罕得而知也噫其可謂自信特立也已其銘曰允淑陳公生知書學人就其華我居以樸盜驚西土公在圍城隣有破亡公守不傾往眎蠻荆其得孰窺蠻來受職若與為期翼翼蜀州士全純白茫茫楚野人復耕織原念累功進位南伯内治何為與人休息外治何為賔柔荒國允淑陳公文武之特聲載於人實告于册又慰爾後刻銘墓石刑部郎中張府君神道碑府君諱保雍字粹之景徳二年舉進士中甲科授山陰主簿有能名提㸃刑獄皇甫選上其狀拜大理評事監尉氏酒踰年知三泉用故事得假五品服專逹既至嘆曰吾常所欲為此幾可試也縣以治聞就改寺丞久之通判齊州李丞相迪鎮永興拔府君自贊遂通判其軍府李公去冦萊公代之詔易府君鳳翔萊公雅知其賢因奏留之事有利害未嘗不争聴乃止璽書奬之遷殿中丞錢思公惟演李三司士衡薦任佐益州避親嫌不拜授鄜州遷太常博士尋換晉州今上即位以屯田員外郎緋衣銀魚知漢川夜中四卒叩府告禁兵兩營變佐吏輩駭入府府君徐出獨械四卒掠之趨作誣狀徇兩營以安之至明鞠得乃實四卒與伍中謀幸授已甲捕兩營因自以為叛遂棄之市及謀者九人因奏言蜀戍兵久合往往叛可因使臣去來番代之行之至今擢拜都官還朝莊獻太后面嘉之聯拜職方度支判官契丹國信使荆湖北路轉運章服金紫有馮異以化黄金干太后得奉職監鄂州税知州歐陽穎事之曲恭武昌置場中市民炭常時吏先署入抄文為足而實尚留民家不入比漕發乃直取載之以為故穎暴又欲資異謀便案之坐盜死者十八人當論府君自荆南乘單船六日夜入鄂直之笞守吏數人而巳同時漢陽俚民販茶得知軍駱與京誣民忤巡檢應首死者二十人隨者百餘人與京暴甚穎人莫敢相曲直府君遂亂江往慮之二十人者得不死隨者皆貰漢陽距江為城潦至隄輙毁歳調薪石發民完之工四千人兩縣以病府君身省䕶作者工費半隄完至今遷祠部郎中滿歳更兩浙轉運使加刑部行部至婺州得其守罪留治之未既疾作遂不起明道二年九月五日也享年五十九歳以景祐二年八月壬申葬汝南宣猷鄉之先塋張氏世為顯姓府君先居齊之禹城及考諱制官至庫部員外郎贈吏部侍郎過蔡州樂之家焉府君娶彭城劉氏樞密直學士師道之姪封本縣君子定察彦博士有治聲最少彦輔未仕府君之喪朝廷以察為鄂州推官府君甚愛考城劉侍制劉亦厚結之子娶府君女慶厯三年彦博為撫州司法為予言府君平生端重不恡燕閒未嘗見其懈容為治威嚴不擿細事為漢州民趙昌以畫名府君迄代不問至劔門昌追獻畫二幅曰前太守舉從昌取又應朝貴人求汲汲昌以技嘗自苦徳公不擾敢獻府君彊受之而歸之直其使呉越呉越匠巧天下未嘗致一器一物歴問其治已雖小者如此立稱其官次施設狀如前而曰今史館修撰王質銘其徳於壙中校書郎王安石又序其詩惟所必顯章於墓道之左者其辭不立懼無以畀四方人視聴請予文張之於碑予不讓迺曰為天下之道本諸得人公卿内庸諸侯部使者外治其體兩重也易知矣今嘗患材難不足布此位故不能推其功惠及民豈世所謂賢天固嗇邪抑其求弗切耶蓋宜放而登當取而遺其施為繆然也如府君鍾材甚美而進也得其時自守及使緒行既卓矣使極其設修可勝言耶而止於斯其可嗟也已方今敝郡彫部相望如府君其又可思也已則凡蔡里之耋齔惡得不嚴其墓耶故朝散大夫尚書刑部郎中充天章閣待制兼侍讀上輕車都尉賜紫金魚袋孫公行狀曾祖恕皇任傅州堂邑縣主簿贈太子中舍祖賁皇任尚書庫部郎中父從革皇贈尚書職方員外郎公諱甫字之翰天聖五年同學究出身為蔡州汝陽縣主簿八年進士及第為華州觀察推官華州倉粟惡吏當負錢數百萬轉運使李紘以吏屬公公令取斗粟舂之可棄者十纔居一二又試之亦然吏遂得弛負錢數十萬而已紘以此多公薦之遷大理寺丞知絳州翼城縣樞密直學士杜公衍奏知永興軍司錄遷殿中丞樞密直學士張公逸奏監益州交子務遷太常博士慶厯二年杜公為樞密副使又薦之得試為祕閣校理三年改右正言知諫院因災異言應天所以譴告之意者在誠其行有其誠矣所以順天者在愛其民於是遂請斥浮費出宫女除别庫之私以寛賦歛初李元昊反河西契丹亦以兵近邊謀棄約任事者於西方益禁兵二十萬北方益土兵二十萬又益禁兵四十指揮及羣盜張海郭邈山等刼西京江淮之間皆驚是時已更用大臣矣又令天下益禁兵公言曰天下所以大困者在浮費而浮費之廣者兵為甚今不能損又何益之邪且兵已百萬矣不能止盜而但欲多兵豈可謂知先後哉不報於是極論古養兵多少之利害以聞語詆大臣尤切既而保州有兵變朝廷賞先言者公以謂有先言者而樞密院不以時下不可以無責天子曰某吾方倚以治也不可使去位公猶固請議其罰邊將劉滬謀立永洛城與部署狄青尹洙議不合滬違其節度遂立之青等械繫滬以聞公言曰城之所以蔽秦而通秦渭之援宜不廢其功而赦滬之輙遂從公議燕王薨大臣謂用不足欲緩葬公言曰燕王上之叔父葬不可以不如禮又言後宫事又言宰相罪當罷皆行其言上既罷宰相而用某為叅知政事又言某不可任以政天子難之因求為外官而是時朋黨之議亦已起大臣相次去位公上書論爭語尤切已而奉使契丹還遷右司諫知鄧州徙安州又徙江南東路轉運使又徙兩浙遷起居舍人尚書兵部員外郎改直史館知陜府簡厨傳之費陜人安之鄰州歳時以酒相慶問公命儲别藏備官用一不歸於已至今遂為法徙晉州近臣過晉夜半叩城欲入公曰城有法吾不得獨私終不為開門徙河東轉運使賜金紫服入為三司度支副使輸物非土有者公為變其法使之代輸至和三年遷刑部郎中入天章閤為待制遂為河北都轉運使疾不行又兼侍讀嘉祐二年正月二十一日卒於位公博學强記其氣温其貌如不能自持及與人言反覆經史上下千有餘年貫穿通洽不可窺其際而退眎其家初未嘗蓄書蓋既讀之終身多不忘也其居官於其大者既可知已於其小者亦皆盡其意云雖貴而衣食薄無妾媵不飭玩好不與酣樂泊如也時從當世處士講評以為遂其好而客或造其席者與之言終日不能以勢利及也其於人少合亦不求其詳所與之合亦不阿其意蓋公與河南尹洙相友善而尤為杜丞相所知慶厯之間二三大臣又與同心任事然至於論保州之變則所指者蓋杜公非益兵之議則所詆者蓋二三大臣至於城永洛也又絀尹洙而申劉滬其不偏於所好如此然已而朋黨之議起大臣多被逐公之爭論尤切亦不自以為疑也噫可謂自信獨立矣可以觀公之行也所著唐史記五十七篇以謂已之學治亂得失之説具於此可以觀公之志也公歿有詔求其書公享年六十其先開封扶溝人至公之祖徙許之陽翟今為陽翟人母李氏長安縣太君妻某氏某縣君子宜滑州觀察推官實寘皆將作監主簿宜等以狀來屬鞏謹序次其實可傳於後世者如右謹狀元豐類藁巻四十七
