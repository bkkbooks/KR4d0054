body:
  text: 元豐類藁巻二十宋曾鞏撰制誥試中書舍人制誥三道特進觀文殿大學士除節度使開府儀同三司制門下錫之列壤顓師寵於藩維申以榮名視官儀於宰路所以褒隆舊􅈒優異宗工維今古之通規實邦家之盛典宜兼禮秩属在耆英播告治朝用揚孚號具官某莊毅足以任重肅哲足以視身有能㫁大事之眀有克勤小物之慎以察㣲之智練逹人情以經逺之謀彌綸國體中外宣力左右納忠今方内靖嘉百揆攸叙助朕致此時廼之庸位特次於上公職仍通於秘殿閱時已久加命宜殊是用處以名城分建旄之寄属均于台衮極備物之恩榮於戱顯有功尊有徳朕於崇奨近輔之心可謂至矣親百姓撫四夷爾於将順朕志之義可不懋哉尚體眷懐往祗厥服中書舍人除翰林學士制左右侍從之官皆朕所訪問以獻納為職者也惟禁林任親地宻於夫經營庶務進退大臣未嘗不預咨詢非獨治翰墨典訓辭而已故特遇之寵不與他學士比其重如此非智能材諝㧞出一時豈稱公選某純明脩潔秉誼不回學有本原可以圖治體文有師法可以代予言是用擢於右垣使就兹位今寰内嘉靖朝廷燕閒朕方明紀綱考制度以行之當世傳之将來夫能恊爾衷以輔朕志論思政理以著之謀猷潤色斯文以見於號令待爾有當官之効以副予籲俊之心其往懋哉以承厥叙勅監司考覈州縣治迹詔朕惟天之所以視聽者在民故朕之所以承天者以吾民事為尤重夫能使吾民足於衣食安於作息無愁怨歎苦之聲有㢘恥自重之誼者在夫州縣之吏而巳朕既擇人付以兹任而尚憂夫方域之廣生齒之衆吏或不明不良不能究宣恩德使達於下開𨗳羣情使通於上是以置使分部属之刺督而考覈幽明甄别淑慝罕能務稱其職朕方憲於先王以正百官之任使處其名必效其實夫比羣吏之治而謹其勸創固朕之所孜孜而不敢怠也㢘按之臣其體朕意於凡治人之官審加察焉使純明脩潔慈祥仁篤之吏無壅於上聞而昏庸汙慢苛薄媮偽之人不能自匿庶夫事舉刑清和樂交於内外風移俗易忠厚格於神明方虛朕心以觀汝效賞罰有典誼無敢私其尚欽承朕言不食曾肇轉官除吏部郎中左選勅具官某尚書政本失其分職之日久矣朕紀官以實而歸其常守故郎選甚髙銓綜之司典領尤重爾以學行材諝列職史筵宜進文階往祗厥叙朕方審覈幽明而公於黜陟尚思勉勵以敏事功可劉奉世吏部貟外郎制右選勅具官某尚書政本失其分職之日久矣朕紀官以實而歸其常守郎於選部任属尤重以爾閱試惟舊為吏有方考擇於朝俾叅厥叙朕方審覈幽明而公於黜陟尚思勉勵以敏事功可黄好謙户部員外郎劉珵戶部郎中制左曹勅具官某田疇生齒之籍賦租課入之法郎於省闥典領尤重邦之雋茂俾服厥官爾能敏於事功朕豈稽於信賞可王陟臣馬􅦨戶部員外郎制右曹勅具官某耕歛補助之法溝防通塞之政郎於首闥典領尤重邦之雋茂俾服厥官爾能敏於事功朕豈稽於信賞可劉摯禮部郎中制勅具官某周書曰不惟其官惟其人則古今之正治官得人固為急也儀曹之於郎位考擇甚精爾以學行器能策名儒館宜升階等徃祗厥服朕方眀於賞勸以待羣吏之成爾尚懋于厥脩庶䏻康朕之事可王子韶禮部員外郎制勅具官某周書曰不惟其官惟其人則古今之正治官得其人固為急也儀曹之於郎位副貳所属考擇其精爾以愽學多聞册名儒館宜升階等往祗厥服朕方明於賞勸以待羣吏之成爾尚懋于厥脩庶能康朕之事潘良器兵部員外郎制勅具官某朕高郎吏之選以進天下之材七兵之曹名秩甚寵稽於有衆属爾之能其尚懋于厥功朕方明於賞勸可胡援杜紘刑部郎中勅具官某為郎居中時之妙選邦憲輕重典領惟艱朝之雋良俾佐吾事夫刑期于無刑此朕志也尚思眀慎以稱厥官可范子竒工部郎中髙遵恵員外郎制勅具官某宫室城堭程匠度材之事郎於隍部其選甚高詢求在廷爾材惟允朕方董百工而康庶務爾尚勤夙夜而能厥官可高遵惠改云副貳之選甚高王祖道司封員外郎制勅具官某封爵之恩施於内外所以親親尊賢國之典也緫領之任郎選甚髙明揚爾能俾踐厥位朕方正名以稽羣吏之治而議其勸懲爾尚欽哉以敏来効可穆珣司封郎中制勅具官某論功烈定勲級所以寵士大夫而勵其志也主以郎吏禮秩甚殊僉曰汝能冝正厥序夫正名者固将考其實也尚有信賞待汝計功可蔡京范珣考功員外郎制勅具官某計羣吏之課而議其誅賞郎於天臺任属尤重維時髦士宜服寵名使殿最允而功用興待汝能稱其職可不勉哉可陳向度支員外郎制勅具官某財用多寡之數物產豐約之宜司度之曹典貳為重爾惟幹敏冝服厥官夫能下寛齊民而上足經費朕方勵精庶政之日爾尚悉其猷為可晁端彦金部員外郎制勅具官某財用金寳有出納之政權衡度量有制作之法司珍之任實典治焉僉曰爾材宜在兹位國有陟明之典待爾善於其官可韓正彦倉部郎中制勅具官某倉庾賦入之政禄廪賙助之法臺郎典領列於右曹為官擇人爾徃惟允夫能善於其職固將圖爾之勞可趙令鑠祠部郎中制勅具官某禮莫大於祭蓋事神者人道之極也祠曹所領體莫重焉爾惟精明宜服厥位其思任職以稱予奉天地宗廟兢兢之意焉可徐禧御史中丞制勅朕正名以定羣臣之位辨位以責庶務之實矧風憲之官紀綱所属曷可以不明其任哉具官某强敏仁篤學通古今擢典訓辭遂持邦法宜専分職以應新書是用掇自右垣仍其階品俾爾納忠宣力得壹意於中司以董齊百工而肅正内外庶余之作則更制罔或不䖍在爾懋哉知其所守可何洵直文及甫太常博士制勅具官某奉常禮樂所出博士議論之官爾以藝文列於册府宜升階品往祗厥叙夫能據經之說適今之宜不為曲學之阿爾尚篤於所守可黄寔太常博士制勅具官某奉常禮樂所出博士議論之官爾以能聞朕用分命夫能據經之說適今之宜不為曲學之阿爾尚篤於所守可趙君錫宗正丞制勅具官某公室逺近之属譜録攷序之政主以列卿不用他族蓋自漢始迄今循行丞於厥官參賛為重爾辭學之敏列職書林宜進文階往祗厥服夫睦九族以刑萬邦此朕志也爾尚懋于厥守庶以承朕之仁可劉蒙御史臺主簿王子𤦺大常寺主簿制勅具官某吏之有属所以相成勾稽簿領之書交修官守之事往從憲府尚懋爾勞可王子琦改憲府作卿張鐸崇翟思邵剛太學博士制勅具官某博士列於成均以講教為任爾以經明選用往服厥官盖尊其所聞以誘率學者汝之守也其尚欽哉可林希著作佐郎制勅具官某麟臺著作之貳郎以詞學為之爾敏茂精眀久游書觀宜遷階品往服厥叙属爾以文章之選其體予奨遇之恩可邢恕校書郎制勅具官某典校秘藏之書旁求儒學之士尚思奨進之意無忘砥礪之勤可李常太常少卿制勅具官某禮樂精㣲之致所以格上下而諧人神奉常貳卿典領甚重爾聦明敏逹久列書林宜進文階往就兹位其務稱于厥職使節人心而和人聲者庶有得焉非獨在於俯仰鏗鏘而已兹為朕志爾尚欽承可錢暄光禄卿勅具官某酒醴膳羞之具以供宗廟朝廷之用典領之任位在列卿宜得其人俾服予采爾明習吏事勞閱有聞選於僉言俾踐厥職尚其祗飭無曠爾司可楊汲大理卿王衮韓晋卿少卿制勅具官某叅理折獄之事主以列卿其選甚重爾練習吏治閱試惟舊廷尉之選少卿改云廷尉之貳是用属汝尚思眀慎以稱朕恩可陳睦鴻臚卿勅具官某傳聲賛𨗳之官所以賔接四方之使客位在九列禮秩甚隆正名之初考擇惟慎爾以辭學材諝列職史筵宜進文階往承厥序尚其祗飭以服朕恩可㢘正臣董詵司農少卿制勅具官某田畆稼穡之政倉庾委積之事典領之任秩亞列卿官儀之新考擇惟慎爾明習吏治勞閱有聞徃貳大農是惟髙選尚其祗飭無曠厥司可賈青太府少卿制勅具官某九賦頒受之政百貨貿遷之法典領之任位次列卿肇正官儀考擇惟慎爾明習吏事閱試惟舊往共厥服汝惟克諧其體朕恩尚思祗飭可李立之范子淵都水使者制勅具官某川澤河渠之政津梁舟楫之事置使典領禮秩甚隆正名之初考擇惟慎爾明習吏治勞閱有聞選於在廷俾踐厥職尚其祗飭無忘訓辭可黄莘職方貟外郎制勅具官某四海九州之疆域山川風土之氣習載於圗籍典以郎曹擢爾之材俾副厥位夫能使方國逺近實利同而材用便在爾能知其守可不懋哉可杜純大理正制勅具官某折獄詳刑之事朕所慎也正於理官叅贊為重選於在列爾以材升聽察以情尚勤厥職可李義内殿崇班制勅具官某虞度營屯之事積累嵗月之勤序朝位於殿廷尚益思於奮勵可元豐類藁巻二十
