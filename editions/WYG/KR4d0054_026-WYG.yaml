body:
  text: 元豐類藁巻二十六宋曾鞏撰制誥知州制昔先王之法道民以徳齊之以禮而有恥且格後世不及然破觚以為圜斵雕以為樸禁罔踈闊而吏治蒸蒸不至於姦猶為近古朕甚慕之今能與吾共成此理者其唯循良之吏乎以爾為能與在茲選使刑罰清而風俗美爾能善於其職則明考察而公賞勸朕豈貳於必行其尚自强方觀爾効知河陽制盟津冀豫之域背河向洛成臯之間天下之重地也山川之固為國屏翰分土而治非文武之特曷可以當選授哉某以材進拔閱試已孚俾仍近班往祗厥服有生齒之衆屬爾撫和有連營之師待爾綏輯尚茂循良之效庶寛西顧之憂知軍制開建城壁本以輯治軍旅今四方既平而假守之臣實任民事列於有土之官矧朔北並邊寄屬尤慎爾以選擇往祗朕命夫能宣布恩威以拊循吾人而懷附異俗則為善於其職尚思爾守無替訓辭通判制州有治中以佽助其長綱紀衆務舊矣今列城之守皆有貳焉蓋亦其任也爾以考擇往祗厥叙尚思稱職以報朕恩罷館職加官制夫為官擇人處其名者必任其事而儒館之設有位號而無分職使學士大夫將何以效其實歟是用命爾進階一等而罷其虚稱其有異能朕將明試以功庶爾之材得施於用以成朕招俊乂康庻位之意焉其尚懋哉賞功制一王師西封爾能奮力行陣斬獻首馘稽諸賞典宣進官榮爾尚勉哉益圖來効賞功制二擐甲執兵人之重任賞信而速所以勸功爾爰整我師徂征西土大殱醜類來獻厥俘圖爾之勞進階一等尚思奮勵以佇異恩團練使駙馬都尉制大長公主吾姑也位號禮服褒崇光大國有彛章蓋其下嫁必得勲閥之門良能之士然後可以成先帝愛育之仁而稱朕隆崇之誼某貴舊家子内外行完是用選見於廷命之進尚團兵重任倅馬美名兼而授之蓋稽故事夫恭儉靖慎可以保令聞而綏寵禄茲惟朕訓汝尚勉哉磨勘轉官制一吏之在位者積歲月之勤應有司之格必有甄進以明勸奬此國家之典也今序爾之勞遷位一等往思祗服以稱朕恩磨勘轉官制二朕謹名分正官守以董齊百工至其有試用之勞無踐履之玷則皆稽其歲月法有甄進所以使吾勤事之吏知所勸也今有司比爾之課應於遷格宜升階品以允新書其朕恩往思來効軍功制一惟羌稔惡世盗西疆理將殄除内自生變致天之伐非朕敢私爾躬提偏師摧䧟醜類震動河外宣明國威破竹之功成在旦夕賞不逾月朕尚遲之用遷爾官以勵衆士能殱大憝當有異恩軍功制二河外之地我之舊服羌能靖綏則以畀之今其將亡自相戕害爰命討伐蓋將天威某沉勇有謀提兵以出獻俘斬馘屢奏厥功擢進使名以昭信賞能殱首惡尚有異恩軍功制三朕惟羌之猖狂内相賊殺致天之伐爰命六師止除罪人復吾故地而已爾握兵而出屢以㨗聞盖夫軍賞之行速則衆勸是用進爾之秩以激士心尚有不次之恩以待凱還之喜新及第授官制朕立學以養天下之材設科以進其造秀之士其於教𨗳推擇欲成美俗於四方得羣能於庶位者可謂盡其意矣爾以經行文學選自朕躬命以一官將觀汝效往祗厥叙思稱朕恩責將制汝始以微功進朕不次用汝而屬之守邊乃冒吾法出蠻夷之中發人採金無出入之籍有侵盗之刑朕惟不欲數使逺人煩於追逮繫獄也寧失汝罪不究窮之堂後官轉官制吾調兵于外而號令節制之繇中出者汝以宰屬與於治文書赴期會能辦吾事進秩一等以奬爾勞尚思恪勤無墜厥守詔勸學詔朕惟先王興庠序以風四方所以使學士大夫明其心也夫心無蔽故施之於已則身治而家齊推之於人則官修而政舉其流及逺則化民成俗常必繇之古之所以長人材厚人倫者本是而已朕甚慕之故設學校重學官之選而厚其禄凡欲以誘誨學者庶幾于古也而在位者無任職之心承業者無慕善之志至於師生相冐挾賂為姦嚚訟囂然駭于衆聽而况欲倡率訓𨗳洽于禮義磨礱陶冶積於人心使方聞修潔之士充於朝廷孝悌忠篤之風行於鄉邑其可得乎朕甚憫焉故更制博士而講求所以訓勵之方定著於令以為學制予樂育天下之材而庶幾先王之治者可謂至矣自今有敦行誼謹名節肅政教出入無悖明于經術者有司其以次升之使聞于朕將考擇而用之以勸于爾衆士有偷懦怠惰不循于教學不通明者博士吾所屬也其申之以誘𨗳使其能有易於志而卒歸於善固吾之所受也予既明立學之教具為科條其於學者有奬進退黜之格以昭勸戒至於學官其能明於教率而詳於考察有得人之稱則得以信賞若訓於無方而取舎失實亦將論其罰焉明以告爾朕言不欺尚其懋哉無詒爾悔勸農詔夫農衣食之所由出也生民之業莫重焉一夫之力所耕百畆養生送死與夫出賦稅給公上者皆取具焉不幸水旱螟螣之菑往往而有可謂勞且艱矣從政者知其如此故不違其時不奪其力以使之明時之因析以授之差地之腴瘠以處之春省耕秋省斂以助之詩曰饁彼南畆田畯至喜言上所以勞之也又曰駿發爾私終三十里言上所以勸之也其奬勵成就之者如此朕自承天序内重司農之官外遣勸農之使為之弛力役均地征修水利或一雨愆期則憂見於色或一糓不成則為加惻怛有復除之科有賑恤之令夙夜孜孜勞心焦思者凡以為農也今耕者衆矣而尚有未勉墾田廣矣而尚有未闢豈拊循勸率有所未備歟抑吏怠而忽不能宣究歟有司其於農桑之務益思所以除害興利詔令已具者無或雍閼所未盡者勿憚以聞要使縁南畆之民舉忻忻然樂職安業洽於富足稱朕意焉正長各舉屬官誥蓋聞堯之治曰百姓昭明舜之治曰四門穆穆然則當是之時在位皆君子其是非不惑可知也故堯欲釐百工舜欲熈帝載求可任者皆訪諸四岳因四岳以命禹又因禹以命稷契臯陶因羣臣之讓僉曰以命垂益伯夷因伯夷以命䕫龍其審官用賢不自任其聰明而稽之於衆如此然存於書二帝所命者羲和九官十二牧皆官之正長也至於屬官則未有二帝嘗命之者其遺法之可考則周穆王命伯景為太僕正戒之曰慎簡乃僚無以巧言令色便僻側媚其惟吉士則自擇其官之屬者官之正長之事此先王之成法也漢魏以來公府郡國亦皆自辟其屬而唐陸贄請使臺省長官自擇僚屬蓋上下之體相承如此以周天下之務此古今之通理也今朕董正治官始自三省至于百工皆正其名夫使在位皆君子而是非不惑此朕素所以勵士大夫也故凡官之長貳朕既考擇而任之尚書政本也自郎已下用吏甚衆其令僕射左右丞尚書侍郎各於其所部員有未備皆舉二人以聞朕將擇而用之其未用者亦識其名以待用朕稽於古以正百官稽於衆以求天下之士其勤可謂至矣惟官之長貳之臣皆朕所屬以共成天下之治其尚體朕意所舉惟公以應朕之求所陳惟實以嚴朕之詔其得材失士有司其各以等差具為賞罰之格朕將舉而行之賞吾不悋罰亦無捨非獨搜揚幽滯庶幾為官得人亦將以觀吾大臣之能使朕得與衆士大夫合志同心以進天下之材作則垂法行之於今以詒後世追于先王之成憲無令唐虞有周專美於古不其美歟咨爾庶位其諭朕意一作懷賜高麗詔蓋聞在昔夏后分天下為五服地有逺近故治有詳略而聲教之盛東漸于海朕甚慕之顧徳不明何以逮此而爾東國之君欽誠内附數遣使者乘不測之川獻其方貢惟爾之義朕實寵嘉宜有異恩以稱勤恪而爾比縁養痾以醫為請眷然東顧朕預憂之是用擇遣方技之官具舟以往爾惠彼一方神明相祚藥劑所補以時康寧達於予聞欣慶方屬而遽馳僚從來致謝章覽以慰懷奬勸良厚爾乃自祖以來保乂彼土其尚頥精神强飲食格于眉壽以均福于有衆使爾有世濟其美之功而朕預聲教及逺之休其始自今永孚于好䇿擬代廷試進士䇿問三首䇿問一朕有志於卑漢唐之治而欲比迹於唐虞三代之盛故於書無所不學而通其意於天下之事無所不講而極其本末於人之材長養成就之者甚厚求而用之者甚至於民之務憂勤思念者甚詳撫而綏之者甚力患風俗之敝也正已以先百姓而明於教示患政理之陋也稽古以定制度而謹於持循欲斥大疆土勞於經武欲懷附夷狄也廣於推恩人之所欲者不敢違人之所惡者不敢强賞不敢以喜而濫刑不敢以怒而淫羣臣之進對者夕請而朝見之四方之奏事者旦入而暮報之未嘗有聲色之娛未嘗有畋遊之好不營宫室不崇苑囿衣服飲食取具而已兢兢業業不敢暇逸日慎一日十有六年于茲矣惟先聖王之烈雖自視欿然察其用心如朕者亦可以無憾矣然古之大有為之君必有大效於天下至於小能小善亦各有小補焉奚獨至於朕也意彌篤而功未見於人行彌勵而徳未見於世豈所謂是者非歟所謂能者否歟抑所行者為可止歟所舎者為可用歟將在位者奉承法令苟為空文而不務究宣朕意歟意者今去古逺先王之政不可以復歟凡朕之所為繇前者其失安在宜於今者先後施設其要如何唐虞三代之所以成功徳者孰近於今可推而行之漢唐之卑者孰存於今可革而去之其悉心以對朕將自擇䇿問二夫有二南之化則有羔羊之大夫兎罝之士廣漢之女其成人之材則見於思齊其成物之性則見於行葦蓋王者之治繇近及逺其效如此何其風俗美而流澤深也今朕躬禮義以先天下恐其未諭也崇庠序以𨗳之縻一作靡爵賞以勸之患其未從也以政率之以威董之可謂盡心矣然朝廷之臣未能有素絲之節正直之行中林之士未能有慎獨之心女子之誼未能有翹翹之節况於有徳有造成人之材牛羊勿踐遂物之性可望其髣髴乎朕於士民憊精刻一作克意以待其善而天下靡靡便文苟偷而已何其習之難變也夫先王之教其本豈易於身先之其具豈易於崇庠序靡爵賞修政刑以將之與今之所務者同也然以今方古違從之效異何也豈今之所知者不明所尚者不審歟抑人散乆矣不可以復化歟子大夫待問于廷其以經對䇿問三朕獲承祖考懼徳不明故小大之事躬親省决以夜繼日不敢自暇而政未加善側身踐行兢兢業業不敢自逸為天下先而俗未加厚崇庠序之化信賞罰之法以開𨗳而士未加勵憫農惠商補其乏闕除其疾苦以勸助而民未加富礪器械教士卒所以經營之者甚具而武事未立也定制度正官號所以彌綸之者至備而文治未洽也至於百工未昭彛倫未叙四民未盡得其職萬物未盡遂其性中國之勢或詘於夷狄九州之地未一於舊服是皆戾於古豈朕之不敏所知者非其要所繇者失其統歟抑羣臣之在事者不稱其任不能輔佐歟將乖繆之習乆更革損益之始其功難見歟朕之待物者未甞不以誠而下之應上者皆文具而巳是何故也意朕之所為與古之所以致治者無異而其效之不同何也二帝三王秦漢以來迄於唐及五代雖功徳有間然其所以治且昌與夫所以衰亂失之者其跡可考其原必有在方其治且昌也所繇之路先後本末其一致歟抑有殊也其衰亂失之也浸漸積累所以致之一揆而已邪抑不然也知古今明治亂子大夫之職也其具著於篇朕將親覽元豐類藁巻二十六
