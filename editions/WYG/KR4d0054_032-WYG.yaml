body:
  text: 元豐類藁巻三十二宋曾鞏撰劄子論中書録黄畫黄舍人不書檢臣初掌書命中書吏以録黄畫黄并檢赴臣簽書其檢中書舍人稱臣書名而侍郎押字至録黄畫黄然後侍郎舍人皆稱臣書名臣曾巡㕔言檢草舍人稱臣書名而侍郎押字恐於理尚有未盡且録黄畫黄并檢一體相須而成當書之官未有可以一書一否也况録黄侍郎舍人皆稱臣書名者事君之體則然也其檢舍人不書欲以為别異執政乎則録黄畫黄并檢一體相須而成事君之體於例當一一書之間方其嚴上則未有可以復伸下也伏尋故事中書舍人分押尚書六曹天下衆務無不關决其各執所見謂之五花判事故唐太宗嘗謂侍臣曰中書門下機要之司詔勅有不便者皆須執論比來遂無一言駁論若惟書詔勅行文書而已人誰不堪今舍人不押六曹惟掌書命而事干書命者又不書檢竊尋故事未有可據而然也或謂事干書命者有除改行遣因依故舍人不當書檢然向來書檢巳連除改因依况除改因依參於典故即無舍人不得預聞之理臣詳本朝之制官司佐属盖有得書檢而不得書行移文字者未有得書行移文字而不得書檢者此又於理可疑臣固非敢書檢也顧縁職分不敢苟止伏乞校詳理體斷自聖裁令臣得以遵守取進止元豐五年七月請給中書舍人印及合與不合通簽中書外省事臣檢會中書外省昨准門下省遞到詳定官制所狀内事件有申明下項一檢會官制所元豐四年十月七日上殿劄子元擬門下省印給事中印奉聖㫖門下省印尚書省印門下給事中印中書舍人之印尚書列曹别具考定取旨餘兩省官并省務並用給舍印臣今看詳通進司文字既𨽻給事中合使門下給事中印一給事中㕔狀勘會請到門下外省印未委合於何處收掌臣今看詳上件印合係㪚騎常侍收掌如闕則以次官一給事中㕔狀四月二十九日准詳定官制所發到狀二件為分撥人吏并院子事各係申門下外省今來未審係是何官書判施行臣今看詳應申門下外文字合係本省㪚騎常侍以下通簽書一狀後門下外省批巳施行外五月六日送中書外省施行訖即却繳送合属去處臣今看詳逐項事件並只是指揮門下外省及給事中㕔其中書外省雖准批送施行即未有定制中書外省及舍人㕔事務明降指揮兼官制所狀内一項稱兩省官并省務並用給舍印又一項稱門下外省印合係㪚騎常侍收掌如闕即以次官是則中書舍人及中書外省各合有印今來巳有中書外省印其中書舍人之印即未給到未應得官制所狀内元定指揮及右省官除逐㕔各有分職外其外省事務見今中書舍人與起居舍人通簽若將來常侍以下至正言員足消與未消逐一通簽如不通簽即未審合係是何官書判施行如合通簽亦乞明降指揮右取進止貼黄今後因逐司申明立法有與别司事體相同者乞令便據逐司事務立條責免更有申請重煩聖聽兼免逐司事體相同施行不一如允臣所奏乞立此條令今後應干修條處並依此又舍人諫官舊各有印蓋縁本職文字慮有事干機密難就别官用印故事中書舍人判省雜務議邊防給賜士卒只支頭子臣伏見眞宗議封泰山問三司使丁謂隨駕兵士或遇泥雨支賜鞋錢動須五七萬貫如何有備謂奏隨駕之任披帶巳重若有支賜如何將行欲令殿前都指揮使曹璨先問軍士路中或有支賜直隨駕便錢一司各與頭子支便於兵士住營處或指定州軍各使骨肉請領一則便於兵士請領二則隨駕兵士骨肉在營得便到特支錢物甚安人心曹璨尋問皆曰隨駕請得何用兼難以將行若如此皆感聖恩遂定東封之計車駕往囬略無闕誤臣竊以謂邊防給賜士卒可推此行之在公可省輦運在私可無負致營護之勞而士卒之家又速得錢物濟用伏乞詳酌如有可采出自聖意施行取進止申明保甲巡警盗賊不曾上臣伏以周禮五家為比使之相保推之至於五州為鄉因其民以用之於田役追胥之事管仲於齊亦以五家為軌推之至於五鄉為軍以有三軍之制盖生民之業資於衣食則為農資於備禦則為兵其所恃之理然也後世言兵者以謂九夫為井此八陣之法所由出也五家為軌此師旅之法所出也以臣考之所以然者非三軍之政取法於鄉田盖古者生民之業兵農非異務也自經界既廢而兵農始殊秦漢之際大率十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫游徼三老掌教化嗇夫職聽獄訟收賦稅游徼循禁盗賊亦比閭族黨卒伍追胥之遺事也今保甲之制自五家為保推之至於有大小保長有都副保正職承文書督盗賊與比閭有長鄉亭有嗇夫游徼非異意也臣昨守亳州亳為多盗重法之地臣推行保甲之法以禁盗賊幸不至繆戾誠不自揆欲於保甲巡檢縣尉之法所以防慮盗賊者有所推廣以稱朝廷立法之意具下項一諸處自來盗賊並是外來浮浪行止不明之人或是本處素來無頼之人保甲之法使五家為保蓋欲察舉非違之事一保五家若有一家藏匿外來浮浪行止不明之人或一家有素來無頼之人即四家無由不知而法禁之中不責其顔情蓋芘則人於鄉里誰肯告言若為設禁防使不告官者因事發露則有相坐之刑人情自愛誰肯苟容此乃本立保伍察非違之意也所察舉者藏匿惡人之家所以為人除患固非開告訐之路傷隣里之義也若藏匿之家自不能揜則惡人何所容入盗賊不禁而自熄理之所可必也欲乞指揮外來浮浪行止不明之人保内不得舎止本處無頼之人須以姓名申官若有犯嚴斷同保不糾科不上之罪保内有本處無頼之人同保不以姓名申官及係籍之人出入不吿本保本保不紏亦並科不言上之罪犯人嚴斷所貴有所關防可以暗消盗賊况自來州縣亦往往有禁絶舍止浮浪及籍記惡人之處可以斷得盗賊别無擾煩兼保甲條諸保内有外來人如行止顯有不明即收領送官則是法意蓋巳及此今來所乞只是申明更欲詳備伏乞裁酌施行一伏見熈寧六年保甲條法保内如遇有賊盗畫時告報本保長巳下同保人戶即時前去救應追捕如入别保即遞相擊鼓應接襲逐元豐二年詳定上條節文諸保内賊盗畫時集本保追捕如入别保遞相告報襲逐舊有鋪屋及皷處依舊仍輪保丁守宿未有處愿置者聽臣竊以謂元條及詳定互有詳畧若合而用之則彌綸之意無所不備今欲乞指揮諸保内賊盗畫時集本保追捕如入别保即遞相擊皷接應襲逐並置鋪屋及皷仍輪保丁巡宿如此則保伍之内既不得容止惡人巡宿之法又備如有賊發則合力追捕措置無所不盡於本置保甲之意委曲備具亦古者井田守望相助後世置鄉亭徼循盗賊之遺法也一伏見熈寧勅節文諸巡檢常於地分内巡警廨宇所在州給與印厯逐季㸃檢臣欲乞相度指揮重法地分巡檢縣尉常於地分内巡警每旬具所到地分申州仍給與行程印厯每季本州將旬申與印厯委官㸃磨違者取勘施行州不督察監司按劾以聞如此則制置捕盗之官事體均一理在必行不容苟簡之人得以廢法使捕盗之官分巡不止保甲候望轉相承接盗賊所向輒遇譏察竊發之謀必自衰熄或有伺間不逞之人亦易敗獲右取進止存恤外國人請著為令不曾上臣昨任明州日有髙麗國界託羅國人崔舉等因風失船飄流至泉州界得捕魚船援救全渡從此隨捕魚船同力採捕得魚自給後於泉州自陳願來明州候有便船却歸本國泉州給與沿路口劵差人押來臣尋為置酒食犒設送在僧寺安泊逐日給與食物仍五日一次别設酒食具狀奏聞臣奏未到之間先據泉州奏到奉聖㫖令於係官屋舍安泊常切照管則臣存恤舉等頗合朝廷之意自後更與各置衣裝同天節日亦令冠帶得預宴設竊以海外蠻夷遭罹禍亂漂溺流轉遠失鄉土得自托於中國中國禮義所出宜厚加撫存令不失所泉州初但給與口劵差人徒歩押來恐朝廷矜恤之恩有所未稱檢皇佑一路編勅亦只有給與口食指揮今來聖㫖令於係官屋舍安泊常切照管事理不同縁今來所降聖㫖未有著令欲乞今後髙麗等國人船因風勢不便或有飄失到沿海諸州縣並令置酒食犒設送係官屋舍安泊逐日給與食物仍數日一次别設酒食闕衣服者官為置造道路隨水陸給借鞍馬舟船具析奏聞其欲歸本國者取禀朝㫖所貴遠人得知朝廷仁恩待遇之意取進止請減軍士營教臣伏見諸軍教閲之法並只合早教一次舊例有晩教者即更晩教向來教閲之法初行之時諸軍欲要訓練早得精熟是以早晩教外諸營更有營教今來訓練日久各以精熟甚有踏硬出格之人諸軍事藝見今分作三等欲乞相度其事藝在第三等者與免營教一日在第二等者與免營教二日在第一等與免營教三日所貴人情悦慕升進得事藝者多乞賜詳酌指揮取進止代曾侍中辭轉官劄子臣蒙恩轉官巳曾面陳及具劄子辭免懇誠雖切志願未諧夙夜省循不遑寧處是用再干旒扆伏望必賜允從臣以謭才當陛下即政之初勵精思治與在廟堂首當大任所宜佐陛下循守法度重惜名器使恩無誤施官不虚授四方觀聽知朝廷慶賞得宜則衆情必皆勸慕欲正其本當始於臣今若首玷寵榮不知固避使朝野竊議上虧政理則是欲清其流而先濁其源致弊之由乃自臣始豈陛下所以属任微臣之意愚情所以圖報萬一之心况祖宗以來進官之法或以歲月或以功勤今於斯二者實無其一又於執政之内不為以事當遷欲貪厚恩何義而可伏望特囬聖慈俯憐悃迫速賜德音遂其所乞至於國公戶邑則臣終不敢辭謹具劄子奏陳無任赤心懇激之至取進止代曾侍中乞退劄子臣近三上表及再進劄子以隂陽不調雨雪愆候乞欲免黜蒙面諭不允仍降批答令斷來章臣仰惟寵遇之厚恩㫖之嚴固欲强顔趣於順命然信宿以來旱氣轉甚臣夙夜震惕職思其憂所以不避冒煩至於五六敢祈仁聖必賜矜從此臣區區之愚義不得止者也盖宰相職調隂陽災異即當罷免行之巳久故事甚明今亢陽為沴經涉冬春隴畝之間焦枯日甚閭巷之内疾癘將興天戒丁寧咎自臣始陛下側身思變發於懇誠忘巳憂人見於顏色以至詢訪周於列位請禱徧於羣神聖心焦勞中外嗟仰豈臣之分尚得晏然雖陛下大恩欲終覆護而四方觀聽責當謂何且臣少壯之時尚虞不職今齒髮已暮理當乞身欲貪寵私何義而可伏望察臣素守體臣至誠早囬聖慈許從罷黜矧今舊德之老新進之賢求於朝廷所在森列取以代臣必致休徴使臣得避賢者路退守丘園豈惟上厭天心下塞人望亦所以全陛下始終之恩成老臣去就之義况應天人惟在誠實臣既知當退豈敢矯誣所望睿明審加詳擇臣無任血誠迫切之至取進止英宗實録院申請奉勅脩撰英宗皇帝一朝實録伏以先帝功德之美覆被天下宜載方策傳之無窮而未有日厯至於時政記起居注亦皆未備今此論次實憂疎略其於搜訪事迹以備撰述尤在廣博使無闕遺今取到脩撰仁宗皇帝實録院行迹案巻看詳彼處累次陳請乞搜探取借應干合要照證文字前後條件本院亦合如此施行參詳類次作一併申請具下項文臣少卿監以上武臣正刺史以上或雖官品未至而事業勲績可書及丘園之士曾經朝廷奬遇凡在先朝薨卒者例合於實録内立傳欲乞朝廷特降指揮下鈐轄諸道進奏院遍行指揮仍劄付御史臺開封府及審官院三班院流内銓入内内侍省閣門出榜曉示應係英宗朝亡殁臣僚合立傳者並令供納行狀神道碑墓誌等仰本家親属限日近脩寫疾速附遞繳納赴實録院一應先朝曽歴兩府兩制雜學士待制臺諫官及正在刺史閣門使巳上臣僚或因賜對親聞聖語或有司奏事特出宸斷可書簡冊者並乞付中書遍劄送巳上臣僚委令逐人速具實封供報務要詳悉乞指揮進奏院遍行指揮應曾在先朝任上件官位巳經亡殁臣僚之家亦許親族編録經所在官司繳進不得虚飾事節候到日並降付本院以慿看詳編脩所貴書成之日免致疏略一乞下中書樞密院自嘉祐八年四月至治平四年正月巳前應有臣僚進獻文字曽送史館或畱在中書剗刷各件及下史館盡底檢尋降付本院并宰臣與文武百僚凡有奏請稱賀上表所降批答亦乞檢尋降下一乞下兩省及司封兵部吏部甲庫學士舍人院據實録院所關宣勅及詔書除目告詞如移牒暫借使畫時檢尋報應不得稽緩一乞下禮賔院具自嘉祐八年四月至治平四年正月八日巳前凡外蕃朝貢所記本國風俗人物道里土產詳實供報一先朝臣僚有得罪譴謫者乞下御史臺審刑院刑部大理寺據實録院所要案櫝畫時供借一乞下司天監自嘉祐八年四月至治平四年逐年具厯日一本供報當院一乞下三司令自嘉祐八年四月至治平四年正月八日巳前應蟲蝗水旱災傷及德音赦書蠲放稅賦及蠲免欠負並具實數供報當院一乞下三司自嘉祐八年四月至治平四年正月八日巳前應有制置錢穀稅賦茶鹽及㩁酒等凡干臣僚章疏論議廢置事件具録供報當院一工部水監河渠水利凡有論議改更禮部但係郡國所申祥瑞貢院但干改更貢舉條制太常寺禮院但干禮樂制作事三司戶部每遇戸口陞降巳上官司自嘉祐八年四月至治平四年正月八日巳前令子細檢尋供報本院不得漏畧一天聖元年管勾脩眞宗皇帝寔録所奏修撰官李維等公文其間有事跡不圓處合係中書樞密院三司檢尋應副又縁事件不少竊慮差去手分不得到裏面檢尋是致逐時不檢到照證事件乞傳宣中書樞密院據李維等合要照證脩撰事蹟各件令合行手分等盡底檢尋應副免致有妨脩撰奉御寳批依奏治平元年脩仁宗皇帝寔録院亦奏合依中書樞密院檢尋合要照證事件乞依天聖初體例施行并乞差中書應奉國史文字堂後官魏孝先樞密修時政記主事劉孝先候見當院書庫官等將到合要檢尋事件立便收接檢尋應副又曾乞差中書樞密院編文字官及乞於三司審刑院大理寺属官内選差人員各令應副檢尋文字今來本院合要中書樞密院檢尋文字照證編修欲乞依天聖治平初體例施行一乞下管勾往來國信所契勘嘉祐八年四月至治平四年正月末以來所差入國接伴館伴官等正官借官簿等冊并語錄權借赴當院照證脩纂仍不妨彼所使用一乞下玉牒所取英宗皇帝玉牒一本照會一乞下中書編機房合要嘉祐八年四月至治平四年正月八日巳前改除麻制文字照會一本院但干脩寔録於諸處檢借文字並須當職官員封記往還疾速應付一乞下尚書司封疾速檢借嘉祐八年四月至治平四年正月八日巳前中書除改百官官位姓名勅黄照證修纂元豐類藁巻三十二
