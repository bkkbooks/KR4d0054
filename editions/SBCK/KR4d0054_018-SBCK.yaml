body:
  text: 記思政堂記尚書祠部員外郎集賢校理太原王君為池州之明年治其後堂北嚮而命之曰思政之堂謂其出政扵南嚮之堂而思之扵此也其冬予過客池而属予記之􅀄君之治此堂得公之餘錢以易其舊腐壊断既完以固不窘寒暑闢而即之則舊圃之勝涼䑓清池逰息之亭㣲歩之徑皆在其前平畦淺檻佳花羙木竹林香草之植皆在其左右君扵是退䖏其并心一意用其日夜之思者不敢忘其政則君之治民之意勤矣乎夫接扵人無竆而使人善惑者事也推移無常而不可以拘者時也其應無方而不可以易者理也知時之変而囙之見必然之理而循之則事者雖無窮而易應也雖善惑而易治也故所與由之必人之􅀁安也所與違之必人之􅀁厭也如此者未有不始於思然後得扵巳得扵巳故謂之徳正巳而治人故謂之政政者豈止扵治文書督賦歛断獄訟而已乎然及其巳得矣則無思也已化矣則亦豈止扵政㢤古君子之治未嘗有易此者也今君之學於書無􅀁不讀而􅀹深扵春秋其挺然獨見破去前惑人有􅀁不及也来為是􅀖施用素學以􅁱其政既得以休其暇日乃自為不是而思之于此雖今之吏不得以盡行其志然迹君之勤如此則池之人其不有蒙其澤者乎故予為之書嘉祐三年冬至日南豊曽鞏記兠率院記古者為治有常道生民有常業􅀂夫祝除髮毛禁棄冠環帶裘不撫耞来機盎至他器械水土之物其時莭經营皆不自踐君臣父子兄弟夫婦皆不為其􅀁當然而曰其法􅀎為人禍福者質之扵聖人無有也其始自漢魏傳挾其言者浸􅁋四出抵今為􅀹盛百里之縣為其徒者少㡬千人多至萬以上宫廬百十大氏穹墉奥屋文衣精食輿馬之華封君不如也古百里之國封君一人然而力殆不䡖得􅁕也今地方百里過封君者累百十飛竒鈎貨以病民民徃徃嚬伸而為途中􅇤者以此治教信譲奚而得行也而天下􅀂是者盖㡬宫㡬人乎有司常錮百貨之利細􅀂蓬芒一無􅀁漏失僕僕然其劳也而至扵浮圖人雖費如此皆置不問反傾府空蔵而棄與之豈不識其非古之制邪抑識不可然且固存之耶愚不􅀎釋也分寕縣郭内外名為宫者百八十餘所兠率院在治之西八十里其徒􅀹相率悉力以侈之者也其􅌟興端原有邑人黄庠􅀁為記其後院主僧某又治其故而大之殿舍中􅃊齋宫宿廬庖湢之房布列兩序廐圉囷倉以固以宻資􅀁以奉飬之物無一而外求䟽其事而来請記者其徒省懐也噫子之法四方人奔赱附集者衎衎施施未有止也予無力以拒之者獨介然扵心而掇其􅀹切者為是􅀃以與之其使子之徒知巳之享利也多而人蒙病巳甚且以告有司而諗其終何如焉飲歸亭記金溪尉汪君名遘為尉之三月斥其四垣為射亭既成教士扵其間而名之曰飲歸之亭以書赱臨川請記扵予請數反不止予之言何可取汪君徒深望予也既不得辭乃記之曰射之用事巳逺其先之以禮樂以辨徳記之􅀁謂賔燕郷飲大射之射是也其貴力而尚技以立武記之􅀁謂四時教士貫革之射是也古者海内治和則先禮射而弓矢以立武亦不􅆸扵有司及三代衰王政缺禮樂之事相属而盡壊楫譲之射滋亦熄至其後天下嘗集國家嘗問暇矣先王之禮其莭文皆在其行之不難然自秦漢以来千有餘􅀊衰徴絀塞空見扵六藝之文而莫有從事者由世之苟蕳者勝也争奪興而􅀾禽攻取之黨奮則疆弓疾矢巧技之出不得而廢其不以势㢤今尉之校射不北乎礼樂而貴乎技力其衆雖小然而旗旄鐲鼓五兵之􅄊便習之利與夫行止歩趋遲速之莭皆冝有法則其􅀁教亦非獨射也其幸而在乎無事之時則得以自休守境而填衞百姓其不幸殺越剽攻骸驚閭巷而並逐扵大山長谷之間則􅀅犯晨夜􅂪霧露蹈阨馳危不避矢石之患湯火之難出入千里而與之有事則士其可以不素教㢤今亭之作所以教士汪君又謂古者師還必飲至扵廟以紀軍實今庙􅆸不設亦欲士勝而歸則飲之扵此遂以名其亭汪君之志與其職可謂恊矣或謂汪君儒生尉文吏以禮義禁盗冝可止顧乃習􅃲而喜勝其是歟夫治固不可以不兼文武而施澤扵堂廡之上服冕搢笏使士民化奸䆒息者固亦在彼而不在此也然而天下之事􅀎大者固可以兼小未有小不治而􅀎大也故汪君之汲汲扵斯不忽乎任小而非􅀁謂有志者邪擬峴䑓記尚書司門員外郎晋國裴君治撫之二年因城之東隅作䑓以逰而命之曰擬峴䑓謂其山谿之形擬乎峴山也數與其属與州之􅀉客者遊而間獨求記扵予􅀄州之東其城因大丘其隍因大谿其隅因客􅁟以出谿上其外連山高陵野林荒墟逺近高下壮大閎廓怪竒可喜之􅀚環撫之東南者可坐而見也然而雨􅈥潦毀盖蔵棄委扵榛藂茀草之間未有即而爱之者也君得之而喜増甓與􅁟易其破缺去榛與草發其亢爽繚以横檻覆以高甍因而為䑓以脫埃氛絶煩􅅝出雲氣而臨風雨然後谿之平沙漫流微風逺響與夫浪波洶湧破山㧞木之奔放至扵髙㧪勁艣沙禽水獸下上而浮沉者出乎履舄之下山之蒼顔秀璧巔崖㧞出挾光景而薄星辰至扵平岡長陸虎豹踞而龍虵赱與夫荒蹊藂落􅀣隂晻暖逰人行旅隠見而継續者皆出乎祍席之内􅀂夫雪􅃄開歛日光出沒四時朝暮雨暘明晦変化不同則雖覽之不厭而雖有智者亦不􅀎窮其狀也或飲者淋漓􅁔者激烈或靚􅀚㣲叔旁皇徒􅀝則得扵耳目與淂之扵心者雖􅀁寓之樂有殊而亦各適其適也撫非通道故貴人畜賈之逰不至多良田故水旱螟􅭈之菑少其民樂扵耕桑以自􅁕故牛馬之牧扵山谷者不收五榖之積扵郊野者不垣而晏然不知袍鼓之驚發召之役也君既因其􅁟俗而治簡静故得以休其暇日而寓其樂扵此州人士女樂其安且治而又得逰􅀚之美亦􅀅同其樂也故予為之記其成之年月日嘉佐二年之九月九日也撫州顔魯公祠堂記贈司徒魯郡顔公諱真郷事唐為太子大師與其􅀙父兄杲卿皆有大莭以死至今雖小夫婦人皆知公之為烈也􅀄公以忤楊囯忠斥為平原太守䇿安禄山必反為之備禄山既舉兵與常山太守杲卿伐其後賊之不􅀎直闚潼関以公與杲卿撓其势也在肅宗時数正言宰相不恱斥去之又為御史唐旻􅀁􅌟連輙斥李輔囯遷太上皇居西宫公首率百官請問起居又輙斥代宗時與元載争論是非載欲有􅀁壅蔽公極論之又輙斥揚炎盧祀既相徳宗益悪公􅀁為逹斥之猶不滿意李希烈䧟汝州祀即以公使希烈希烈􅀄慙其言後卒縊公以死是時公年七十有七矣天寳之際乆不見兵禄山既反天下莫不震勤公以區區乎原遂祈其鋒四方聞之争奮而起唐卒以振者公為之唱也當公之開􅁟門同日歸公者十七郡得兵二十餘萬繇此􅀚之苟順且誠天下􅀙之矣自此至公殁垂三十年小人継續任政天下目入扵弊大盗継起天子輙出避之唐之在朝臣多畏怯􅀚望􅀎居其間一忤扵世失所而不自悔者寡矣至扵􅄪三忤扵世失􅀁而不自悔者盖未有也􅀂至扵起日仆以至扵七八遂死而不自悔者則天下一人而巳􅀂公是也公之學問文章徃徃雜扵神仚浮圖之􅀃不皆合扵理及其奮然自立􅀎至扵此者盖天性然也故公之􅀎䖏其死不足以􅀚公之大何則及至扵􅀔窮義有不得不死雖中人可勉焉况公之自信也欤維歴忤大奸顛跌撼頓至扵七八而終始不以死生禍福為秋毫顧慮非䔍扵道者不􅀎如此此􅁕以􅀚公之大也夫世之治亂不同而士之去就亦異􅀂伯夷之清伊尹之任孔子之時彼咎有義夫既自北扵古之任者矣乃欲睠頋回􅀮以市扵世其可乎故孔子􅁖鄙夫不可以事君而多殺身以成仁者􅀂公非孔子􅀁謂仁者欤今天子至和三年尚書都官郎中知撫州聶君某尚書屯田員外郎通判撫州林君某相與慕公之烈以公之嘗為此􅀖也遂為堂而祠之既成二君過予之家而告之曰願有述夫公之赫赫不可盖者固不繫扵祠之有無盖人之嚮徃之不足者非祠則無以致其至也聞其烈足以感人况拜其祠而親炙之者歟今州縣之政非法令􅀁及者世不復議二君獨􅀎追公之莭尊而事之以風示當世為法令之􅀁不及是可謂有志者也洪州新建縣􅈦壁記為後世之吏得行其志者少矣此仕之􅀁以難也而縣為最甚何㢤凢縣之政無小大令主簿皆獨任而民事委曲當有所操縦緩急不􅀎一断以法舉法而䋲之則其罪固易求也凢有􅀁為問可不可扵州執一而違之則其􅀔固易撓也其罪易求其势易撓故為之者有以得扵州然後其済可幾也不幸其一錙銖與之咈則大者求其罪小者撓其势􅀅不遺其力矣吏之不􅀎自安豈􅁕道㢤縣有不與其􅅰者乎方是時也而天下之􅀎忘其势而好惡不妄者鮮矣􅀎忘人之势而強立不苟者亦鮮矣州􅀒其強以取威縣􅁨其弱以求免其習巳乆其俗巳成之後而守正循理以求其得扵州其亦不可以必也則仕扵此者欲行其志豈非難也㢤君子者雖無所䖏而不安然其扵自䖏也未嘗不擇仕而得擇其自䖏則縣之事有不敢任者豈可謂過也㢤洪州新建自太平興國六年分南昌為縣至嘉佑三年凢若干年為令者凢三十有九人而秘書省著作佐郎黄巽公權来為其令抑豪縦惠下窮守正循理而淂済其志者也公權亦喜其職之行因考次凢為令者名氏􅀅伐石以書而列置于壁間故予為之載其行治而囙著其為縣之難使来者得覽焉清心亭記嘉祐六年尚書虞部員外郎梅君為徐之蕭縣改作其治􅀁之東亭以為燕息之􅀁而名之曰清心之亭是􅀊秋冬来請記扵京師屬余有亡妹薚女之悲不果為明年春又来請屬予有悼亡之悲又不果為而其請猶不止至冬為之記曰夫人之􅀁以神明其徳與天地同其変化夫豈逺㢤生扵心而巳矣􅀂夫極天下之知以窮天下之理扵夫性之在我者􅀎盡之命之在彼者􅀎安之則萬物自外至者安􅀎累我㢤此君子之所以虚其心也萬物不􅀎累我矣而應乎萬物與民同其􅁻㐫者亦未嘗廢也扵是有法誡之設邪僻之防此君子之􅀁以斉其心也虚其心者極乎精微􅀁以入神也斉其心者由乎中庸􅀁以致用也然則君子之􅁒􅁱其身治其國家天下者可知矣今梅君之為是亭曰不敢以為逰􅀚之羙盖􅀁以推本為治之意而且􅀅清心扵此其􅀁存者亦可謂􅀎知其要矣乃為之記而道予之􅀁聞者焉十一月五日南豊曽鞏記閬州張侯廟記事常蔽扵其智之不周而辨常過扵􅀁惑智􅁕以周扵事而辨至扵不惑則理之㣲玅皆􅁕以盡之今夫推䇿灼􅀛審扵夢􅄰其為事至淺世當尊而用之未之有改也坊庸道路馬􅅙貓虎之靈其為􅀋至細世常􅃊而事之未之有廢也水旱之灾日月之変與夫兵師疾癘昆虫鼠豕之害凢一慝之作世常有祈有報未之有止也金縢之書雲漢之詩其意可謂至而其辭可謂盡矣夫精神之極其叩之無端其測之甚難而尊而信之如此其備者皆聖人之法何也彼有接扵物者存乎自然世既不得而無則聖人固不得而􅆸之亦理之自然也聖人豈用其聦明㢤善因扵理之自然而巳其智􅁕以周扵事而其辨􅁕以不惑則理之㣲妙皆􅁕以盡之也故古之有為扵天下者盡巳之智而聴扵人盡人之智而聴扵神未有􅀎廢其一也書曰朕志先㝎詢謀僉同􅀑神其依􅀛筮恊􅀙所謂盡巳之智而聴扵人盡人之智而聴扵神也繇是􅀚之則荀卿之言以謂雩筮救日小人以為神者以疾夫世之不盡在乎巳者而聴扵人不盡在乎人者而聴扵神其可也謂神之為理者信然則過矣蔽生扵其智之不周而過生扵其􅀁感也閬州扵蜀為巴西郡蜀車􅀐􅀅軍領司􅀠校尉西郷張侯名飛字益徳嘗守是州州之東有張侯之冡至今千有餘年而廟祀不􅆸毎嵗大旱禱南輙應嘉佑中比數嵗連熟閬人以謂張侯之賜也乃相與率錢治其庙舍大而新之侯以智勇為􅀅號萬人敵當蜀之􅀄與魏􅀅張郃相距扵此􅀎破郃軍以安此土可謂功施扵人矣其役也又􅀎澤而賜之則其食扵閬人不得而廢也豈非冝㦲知州事尚書職方員外郎李君献卿字材叔以書来曰為我書之材􅅩好古君子也乃為之書而以予之􅀁聞扵古者告之歸老橋記武陵桞侯圖其青陵之居属予叙而以書曰武陵之西北有湖属于梁山者白馬湖也梁山之西南有田属于湖上者吾之先人青陵之田也吾築廬扵是而􅀅老焉青陵之西二百歩有泉出于两崖之間而東注于湖者曰采陵之澗吾為橋扵其上而為屋以覆之武陵之徃来有事扵吾廬者與吾異日得老而㱕皆出扵此也故題之曰歸老之橋維吾先人遺吾此􅁟者宅有桒麻田有秔稌而渚有蒲蓮弋于高而追鳬雁之下上緍于深而逐鱣鮪之潜泳吾􅀁以衣食其力而無愧扵心也息有喬木之繁隂藉有豊草之幽香登山而凌雲覧天地之竒変弄泉而乗月遺氛埃之溷濁此吾􅀁以䖏其怠倦而樂扵自遂也吾少而安焉及壮而􅀙事扵四方累乎萬物之自外至者未嘗不思休于此也今又􅀗位扵朝而榮扵寵禄以為􅀚逰扵此而吾亦􅀅老矣得無志扵㱕㢤又曰世之老扵官者或不樂扵歸幸而有樂之者􅂉無以為歸今吾有是以成吾樂也其為我記之使吾後之人有考以成吾志也余以謂先王之飬老者備矣士大夫之致其位者曰不敢煩以政盖尊之也而士亦皆明扵進退之莭無留禄之人可謂所得之也後世飬老之具既不備士大夫之老扵位者或擯而去之也然士猶有冐而不知止者可謂两失之也令柳侯年六十齒􅄠未衰方為天子致其材力以惠澤元元之時雖􅁒遺章綬之榮􅀙湖山之樂余知未􅀎遂其好也然其志扵退也如此聞其風者亦可以興起矣乃為之記尹公亭記君子之扵巳自淂而巳矣非有待於外也然而曰疾沒世而名不􅁛焉者􅀁以與人同其行也人之扵君子潜心而巳矣非有待於外也然而有表其閭名其郷􅁒其風聲氣烈􅁀扵世之耳目而無窮者所以與人同其好也内有以得諸巳外有以與人同其好此􅀁以為先王之道而異乎百家之􅀃也随為州去京師逺其地僻絶􅂟暦之間起居舍人直龍圖閤河南尹公洙以不為在势者􅀁容謫是州居扵城東五里開元佛寺之金燈院尹公有行義文學長扵辨論一時與之逰者皆世之聞人而人人自以為不􅀎及扵是時尹公之名震天下而其􅀁學盖不以貧冨貴賤死生動其心故其居扵随日考圖書通古今為事而不知其官之為謫也嘗扵其居之北阜竹栢之間結茅為亭以苃為嬉􅀊餘乃去既去而人不忍廢壊輙理之囙名之曰尹公之亭州􅀙事謝景平刻石記其事至治平四年司農少卿贊皇李公禹卿為是州始因其故基増庳益狹斬材以易之陶瓦以覆之既成而寛深亢爽環随之山皆在几席又以其舊亭峙之扵北扵是随人皆喜􅇺其思而又􅀗逰􅀚之羙其冬李公以圖赱京師属予記之盖尹公之行見扵事言見扵書者固巳赤然動人而李公扵是又侈而大之者豈獨􅇺随人之思扵一時而與之共其樂㢤亦􅀅使夫荒遐僻絶之境至扵後人見聞之􅀁不及而傳其名覧其跡者莫不低佪俯仰想尹公之風聲氣烈至扵愈逺而弥新是可謂與人同其好也則李公之傳扵世亦豈有巳乎故予為之書時熈寕元年正月日也筠州學記周衰先王之迹熄至漢六藝出扵秦火之餘士學扵百家之後言道徳者矜高逺而遺世用語政理者務卑近而非師古刑名兵家之術則狃扵􅁀詐惟知經者為善矣又爭為章句訓詁之學以其􅀻見妄穿鑿為􅀃故先王之道不明而學者靡然溺扵􅀁習當是時䏻明先王之道者揚䧺而巳而䧺之書世未知好也然士之出扵其時者皆勇扵自立無苟簡之心其取與進退去就又度扵礼義及其巳衰而搢紳之徒抗志扵強􅁀之間至扵􅆸錮殺戮而其操愈厲者相望扵先後故雖有不􅁤之臣猶低徊没世不敢遂其􅆲奪自此至扵魏晋以来其風俗之弊人材之乏乆矣以迄于今士乃有持起扵千載之外明先王之道以窹後之學者世雖不􅀎皆知其意而徃徃好之故習其􅀃者論道徳之㫖而知應務之非近議􅀙政之躰而知法古之非迂不亂扵百家不蔽扵傳䟽其􅀁知者􅀂此此漢之士所不􅀎及然􅀎尊而守之者則未必衆也故樂易惇朴之俗㣲而詭欺薄􅁖之習勝其扵貧冨貴賤之地則飬廉逺耻之意少而偷合苟得之行多此俗化之羙􅀁以未及扵漢也夫􅀁聞或淺而其義甚高與所知有餘而其守不􅁕者其故何㢤繇漢之士察舉扵鄊閭故不得不䔍扵自􅁱至扵漸磨之乆則果扵義者非強而􅀎也今之士選用扵文章故不得不䔍扵􅀁學至於循習之􅀷則得扵心者亦不自知其至也由是􅀚之則上􅀁好下必有甚者焉豈非信欤令漢與今有教化開導之方有庠序飬成之法則士於學行豈有彼此之偏先後之過乎夫大學之道􅀅􅁒誠意正心􅁱身以治其國家天下而必本扵先致其知則知者固善之端而人之􅀁難至也以今之事扵人􅀁難至者既㡬矣則上之施化莫易扵斯時頋所以􅋚之如何爾筠為州在大江之西其地僻絶當􅂟暦之􅀄詔天下立學而筠獨不􅀎應詔州之士以為病至治平三年盖二十有三年矣始告于知州事尚書都官郎中董君儀董君乃與通判州事國子􅀶士鄭君舊相州之東南得亢爽之地築宫扵其上齋􅀕之室誦講之堂休息之廬至扵庖湢庫廐各以序為經始扵其春而落成扵八月之望既而来學者常数十百人二君乃以書赱京師請記扵予予謂二君之扵政可謂知所務矣使筠之士相與升降乎其中講先王之遺文以致其知其賢者超然自信而獨立其中材勉焉以待上之教化則是宫之作非獨使夫来者玩思於空言以干世取禄而巳故為之著予之所聞者以為記而使㱕刻焉瀛州興造記熈寕元年七月甲申河北地大震壊城郭屋室瀛州為甚是日􅄪震民訛言大水且至驚􅁒出赱諌議大夫李公肅之為高陽関路都緫管安撫使知瀛州事使人分出慰曉訛言乃止是日大雨公􅀻􅁀露倉儲庫積無􅀁覆冐公開示便宜使有攸䖏遂行倉庫經营盖障雨止粟以石数之至一百三十萬兵噐他物􅁛是無壊者􅀄変作公命援兵警俻訖于既息人無争偷里巷安輯維北邉自通使契丹城壁樓櫓禦守之具􅆍弛不治習以為故公囙災変之後以興壊起􅆸為巳任知民之不可重明也廼請于朝力取扵旁路之羡卒費取扵備河之餘材又以錢千萬市木扵真定既集廼築新城方十五里高廣堅壮率加扵舊其上為敵楼􅀾屋凢四千六百間先時州之正門弊在狹陋及是始斥而犬之其餘九圯壊之屋莫不繕理復其故常周而覧之聴断有􅀁燕休有次食有高廪貨有深藏賔属士吏各有寕宇又以其餘力為南北角道若干里人去汙淖即于夷塗自七月庚子始事至十月己未落成其用人之力積若干萬若干千􅀂千百工其竹􅓗木瓦之用積􅀂干萬若干千若干百盖遭変之􅀄財匱民流此􅀖之人以謂役鉅用艱不累数稔城壘室屋未可以復也至扵始作踰時功以告具盖公經理􅂆督内盡其心外盡其力故􅀎易壌為成如是之敏事聞有詔嘉奨昔鄭火子産救灾􅀘敗得宜當理史實書之衞有狄人之難文公治其城市宫室合扵時制詩人歌之今􅌡地震之􅀁摧敗與鄭之火灾衞之㓂難無異公禦備􅌟築不失其方亦猶古也故􅌡之士大夫皆􅁒刻石著公之功而予之􅀙父兄適與軍政在公幕府廼以書来属予記之予不得辞故為之記尚俾来世知公之嘗勤扵是􅀖也廣徳軍重􅁱鼓角楼記熈寕元年冬廣徳軍作新門鼓角楼成太守合文武賓属以落之既而以書走京師属鞏曰為我記之鞏辭不􅀎書反復至五六辭不􅀗乃為其文曰盖廣徳居吴之西疆故障之墟境大壌沃食貨冨攘人力有餘而獄訟赴訴財貢輸入以縣附宣道路回阻衆不便利歴世乆之大宗皇帝在位四年乃按地圖因縣立軍使得奏事專决躰如大􅀖自是以来田里辨争􅀊時稅調始不勤逺人用宜之而門閎隘痺楼􅀚弗飾扵以納天子之命出令行化朝夕吏民交通四方覧示賔客弊在簡陋不中度程治平四年尚書兵部員外郎知制誥錢公輔守是􅀖始囙豊年聚材積􅁟􅀅改而新之㑹尚書駕部郎中朱公夀昌来継其任明年政成封内無事乃擇􅀎吏揆時庀徒以畚以築以䋲以削門阿是經􅀚闕是營不督不期役者自􅂆自冬十月甲子始事至十二月甲子卒功崇墉崛興􅃨宇相瞰壮不及僣麗不及奢憲度政理於是出納士吏賔客扵是馳赱尊施一􅀖不失宜􅁛至於伐鼓鳴角以警昏昕下漏数刻以莭晝夜則又新是四噐列而棲之􅀖人士女易其聴􅀚莫不恱喜推羙誦勤夫礼有必隆不得而殺政有必舉不得而廢二公扵是兼而得之冝刻金石以書美實使􅀖之人百世之下扵二公之徳尚有考也元豊􅀋藁卷第十八
