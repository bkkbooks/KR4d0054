body:
  text: 􅀋藁卷之三十二劄子論中書録黄晝黄舍人不書檢臣􅀄掌書命中書吏以録黄晝黄并檢赴臣簽書其檢中書舍人稱臣書名而侍郎押字至録黄晝黄然後侍郎舍人皆􅁛臣書名臣曽廵􅆹言檢草舎人􅁛臣書名而侍郎押字恐扵理尚有未盡且録黄晝黄并檢一躰相湏而成當書之官未有可以一書一否也况録黄侍即舎人皆􅁛臣書名者事君之體固然也其檢舍人不書欲以為别異執政乎則録黄晝黄并檢一體相湏而成事君之體扵例當一一書之間方其􅃊上則未有可以復伸下也伏㝷故事中書舍人分押尚書六曺天下衆務無不関决其各執􅀁見謂之五花判事故唐太宗嘗謂侍臣曰中書門下機要之司詺􅃙有不便者皆須執論比来遂無一言駮論􅀂准書詺􅃙行文書而巳人誰不堪今舍人不押六曺惟掌書命而事干書命者又不書檢􅀼㝷故事未有可㩀而然也或謂事干書命者有除改行遣因依故舍人不當書檢然向来書檢巳連除改因依况除改因依參扵典故即無舎人不得預聞之理臣詳本朝之制官司佐属盖有得書檢而不得書行移文字者未有得書行移文字而不得書檢者此又扵理可疑臣固非欲書檢也顧緑聀分不敢苟止伏乞攷詳理體断自聖裁令臣得以遵守取進止元豊五年七月請給中書舎人印及合與不合通簽中書外省事臣檢㑹中書外省昨准門下省連到詳㝎官制所状内事件有申明下項一檢㑹官制所元豊四年十月七日上殿劄子元擬門下省印給事中印奉聖㫖門下省印尚書省印門下給事中印中書舎人之印尚書列曺别具攷定取㫖餘兩省官并省務並用給舎印臣今看詳通進司文字旣􅀠給事中合使門下給事中印一給事中􅈦状勘㑹請到門下外省印未委合扵何處收掌臣今看詳上件印合係散􅀐常侍收掌如􅆣則以次官一給事中􅆹状四月二十九日准詳定官制所發到狀二件為分揆人吏并院子事各係申門下外省今来未審係是何官書判施行臣今看詳應申門下外文字合係本省散􅀐常侍以下通簽書一狀後門下外省批巳施行外五月六日送中書外省施行訖即􅁍繳送合属去䖏臣今看詳逐項事件並只是指揮門下外省及給事中􅈦其中書外省雖淮批送施行即未有㝎制中書外省及舍人􅈦事務明降指揮兼官制􅀁状内一項􅁛两省官并省務並用給舎印又一項􅁛門下外省印合係散􅀐常侍收掌如闕即以次官是則中書舎人及中書外省各合有印今来巳有中書外省印其中書舎人之印即未給到未應得官制所状内元定指揮及右省官除逐􅈦各有分職外其外省事務見今中書舍人與起居舎人通簽􅀂􅀅来常侍以下至正言員􅁕消與未消逐一通簽如不通簽即未審合係是何官書判施行如合通簽亦乞明降指揮右取進止貼黄今後因逐司申明立法有與别司事體相同者乞令便㩀逐司事務立條貴免更有申請重煩聖聴兼免逐司事躰相同施行不一如􅁢臣所奏乞立此條令今後應干修條䖏並依此又舎人諌官舊各有印盖縁本聀文字慮有事干機宻難就别官用印故事中書舎人判省雜務議邉防給賜士卒只支頭子臣伏見真宗議封㤗山問三司使丁謂随駕兵士或遇泥雨支賜鞋錢動湏五七萬貫如何有備謂奏随駕之士披帶巳重􅀂有支賜如何􅀅行􅁒令殿前都指揮使曹璨先問軍士路中或有支賜置随駕便錢一司各與頭子支便扵兵士住營䖏或指㝎州軍各使骨􅁏請領一則便扵兵士請領二則随駕兵士骨肉在營得便到特支錢物甚安人心曺璨㝷問皆曰随駕請得何用兼難以􅀅行􅀂如此皆感聖恩遂定東封之計車駕徃回略無闕誤臣􅀼以謂邉防給賜士卒可推此行之在公可省輦運在􅀻可無􅀒致营護之芳而士卒之家又速得錢物濟用伏乞詳酌如有可采出自聖意施行取進止申明保甲廵警盗賊不曽上在臣伏以周禮五家為比使之相保推之至扵五州為郷因其民以用之扵田役追胥之事管仲扵齊亦以五家為􅁤推之至扵五郷為軍以有三軍之制盖生民之業資扵衣食則為農資扵備禦則為兵其􅀁恃之理然也後世言兵者以謂九夫為井此入陣之法􅀁由出也立家為執此師旅之法所出也以臣考之所以然者非三軍之改取法法扵郷田盖古者生民之業兵農非異務也自經界既廢而兵農始殊秦漢之際大率十里一亭亭有長十亭一郷郷有三老有秩嗇夫㳺徼三者掌教化嗇夫職聴獄訟􅀵賦稅㳺徼循禁盗賊亦比閭族黨卒伍追胥之遺事也今保甲之制自五家為保推之至於有大小保長有都副保正聀承文書督盗賊與比閭有長郷亭有嗇夫㳺徼非異意也臣昨守亳州亳為多盗重法之地臣推行保甲之法以禁盗賊幸不至繆戾誠不自揆欲扵保甲廵檢縣尉之法所以防慮盗賊者有所推廣以􅁛朝廷立法之意具下項一諸䖏自来盗賊並是外来浮浪行止不明之人或是本䖏素耒無頼之人保甲之法使五家為保盖欲察舉非違之事一保五家􅀂有一家蔵匿外来浮浪行止不明之人或一家有素来無頼之人即四家無由不知而法禁之中不責其顔情盖芘則人扵郷里誰肯告言􅀂為設禁防使不告官者因事發露則有相坐之刑人情自爱誰肯苟容此乃本立保伍察非違之意也所察㪯者蔵匿􅁖人之家􅀁以為人除患固非関訐之路傷隣里之義也􅀂蔵匿之家自不􅀎捨同􅁖人何所容入盗賊不禁而自熄理之所可必也欲乞指揮外来浮浪行止不明之人保不得舎止本処素来無頼之人保内須以姓名申官官為籍記係籍之人凡有出入並湏告知本保􅀂保内舎止外求浮浪行止不明之人犯人􅃊㫁同保不紏科不言上之罪保内有本処素来無頼之人同保不以姓名申官及係籍之人出入不告本保本保不紏亦並科不言上之罪犯人嚴断􅀁貴有􅀁関防可以暗消盗賊况自来州縣亦徃徃有禁絶舎止浮浪及籍記􅁖人之䖏可以断得盗賊别無􅅰煩兼保甲條諸保内有外来人如行止􅂋有不明即收領送官則是法意盖巳及此今耒所乞只是申明更􅁒詳俻伏乞裁酌施行一伏見熈寕六年保甲條法保内如遇有賊盗畫時告報大保長巳下同保人户即時前去救應追捕如入别保即逓相繫鼓應接襲逐元豊二年詳定上條莭文諸保内賊盗畫時集本保追捕如入别保逓相告報襲逐舊有鋪屋及鼓䖏依舊仍輪保丁守宿未有䖏愿置者聴臣􅀼以謂元條及詳定互有詳略􅀂合而用之則彌綸之意無所不㫦今􅁒乞指揮諸保内賊盗畫時集本保追捕如入别保即遞相擊鼓報應􅊞逐並置鋪屋及鼓仍輪保丁廵宿如此則保伍之内旣不得容止􅁖人廵宿之法又備如有賊發則合力追鋪措置無所不盡扵本置保申之意委曲備具亦古者井田守望相助後世置郷亭徼循盗賊之遺法也一伏見熈寕􅃙莭文諸廵檢常扵地分内廵警􅇬宇所在州給與印暦逐季􅀧檢臣􅁒乞相度指揮重法地分廵檢縣尉常扵地分内廵警毎旬具所到地分申州仍給與行程印暦毎李本州􅀅旬申與印暦委官􅀧磨違者取勘施行州不督察監司按劾以聞如此則制置捕盗之官事躰均一理在又行不容苟簡之人得以廢法使捕盗之官分廵不止保甲候望轉相氶接盗賊􅀁向輙遇譏察􅀼發之謀必自衰熄或有伺間不逞之人亦易敗􅀗右取進止存恤外國人請著為令不曽上臣昨任明州日有高麗國界託羅國人崔舉䓁因風失船飄流至泉州界得捕魚船援救全度􅀙此随捕魚船同力採捕得食自給後扵泉州自陳􅂅来明州候有便船却歸本國泉州給與沿路口劵差人押来臣㝷為置酒食犒設送在僧寺安泊逐日給與食物仍五日一次别設酒食具状奏聞臣奏未到之間先㩀泉州奏到奉聖㫖令扵係官屋舎安泊常切照􅃹則臣存恤舉䓁頗合朝廷之意自後更與各置衣装同天莭日亦令冠帶得預宴設􅀼以海外蛮夷遭罹禍亂漂溺流輪逺失郷􅁟得自托扵中國中國禮義所出宜厚加撫存令不失所泉州􅀄但給與口劵差人徒歩押来恐朝廷矝恤之㤙有􅀁未稱檢皇祐一路編􅃙亦只有給與口食指揮今来聖㫖令扵係官屋舍安泊常切照􅃹事理不同縁今来所降聖㫖未有著令􅁒乞今後高麗䓁國人船因風􅀔不便或有飄失到沿海諸州縣並令置酒食犒設送係官屋舎安泊逐日給與食物仍数日一次别設酒食􅆣衣服者官為置造道路随水陸給借鞍馬舟船具析奏聞其􅁒㱕本國者取禀朝㫖􅀁貴逺人得知朝廷仁恩待遇之意取進止請减軍士營敎臣伏見諸軍教閱之法並只合平教一次舊例有晚教者即更晚教向来教閱之法􅀄行之時諸軍􅁒要訓練早得精熟是以早晚敎外諸營更有營教今来訓練日乆各以精熟甚有踏硬岀格之人諸軍事藝見今分作三䓁欲乞相度其事藝在第三䓁者與免營敎一日在第二䓁者與免营敎二日在第一䓁與免营敎三日􅀁貴人情恱慕升進得事藝者多乞賜詳酌指揮取進止代曽侍中辤轉官劄子臣􅂪㤙轉官巳曽靣陳及具劄子辤免懇誠雖切志願未諧夙夜省循不皇寕䖏是用再干梳扆伏望必賜􅁢從臣以謭才當陛下即政之􅀄勵精思治與在廟堂首當大任􅀁宜佐陛下循守法度重惜名噐使㤙無誤施官不虚授四方􅀚聴知朝廷慶賞得宜則衆情必皆􅂆慕欲正其本當始扵臣今􅀂首玷寵榮不知固避使朝野􅀼上議􅃜政理則是欲清其流而先濁其源致􅁦之由乃自臣始豈陛下􅀁以属任㣲臣之意愚情所以圖報萬一之心况祖宗以来進官之法或以􅀊月或以功勤今扵斯二者實無其一又扵執政之内不爲以事當遷欲貪厚㤙何義而可伏望特回聖慈俯憐悃迫速賜徳音遂其所乞至扵國公戸邑則臣更不敢辤謹具劄子奏陳無任赤心懇激之至取進止代曽侍中乞退劄子臣近三上表及􅄪進劄子以隂陽不調雨雪愆候乞欲免黜􅂪面諭不允仍降批荅令断来章臣仰惟寵遇之厚㤙㫖之􅃊固欲强顔趣扵順命然信宿以来早氣轉甚臣夙夜震􅅥職思其􅁨所以不避冐煩至扵五六敢祈仁聖必賜矝􅀙此臣區區之愚義不得止者也盖宰相職調隂陽災異即當罷免行之巳乆故事甚明今亢陽為沴經渉冬春隴畒之間焦枯日甚閭巷之内疾癘􅀅興天戒丁寜咎自臣始陛下側身思変發扵懇誠忘巳􅁨人見扵顔色以至詢訪周扵列位請禱徧扵群神聖心焦劳中外嗟仰豈臣之分當得晏然雖陛下大㤙􅁒終覆護而四方􅀚聴責當謂何且臣少壯之時尚虞不職今齒髪巳暮理當乞身欲貪寵私何義而可伏望􅀕臣素守體臣至誠早回聖慈許􅀙罷黜矧今舊徳之老新進之賢求於朝廷􅀁在森列取以代臣必致休證使臣得避賢者路退守丘園豈惟上厭天心下塞人望亦􅀁以全陛下始終之㤙成老臣去就之義况應天人惟在誠實臣既知當退豈敢矯誣􅀁望睿明審加詳擇臣無任恤誠迫切之至取進止英宗實録院申請奉􅃙脩􅁧英宗皇帝一朝實録伏以先帝功徳之美覆􅀍天下宜載方䇿傳之無窮而未有日暦至扵時政記起居注亦皆未備今此論次實􅁨踈畧其於搜訪事迹以傋􅁧述􅀹在廣愽使無􅆣遺今取到􅁱􅁧仁宗皇帝實録院行遣案卷看詳彼處累次陳請乞捜􅊥取借應于合要照證文字前後條件本院亦合如此施行參詳次作一併申請具下項文臣少卿以上武臣正刺史以上或雖官品未至而事業勲績可書及丘園之士曽經朝廷奨遇凢在先朝薨卒者例合扵實録内立傳􅁒乞朝廷特降指揮下鈴轄諸道進奏院遍行指揮仍劄付御史䑓開封府及審官院三班院流内銓入内内侍省閣門出榜曉示應係英宗朝亡殁臣僚合立傳者並令供納行状神道碑墓誌䓁仰本家親属限日近􅁱冩疾速附逓繳納赴實録院一應先朝曽歴兩府兩制雜學士侍制䑓諌官及正在刺史閣門使巳上臣僚或因賜對親聞聖誥或有司奏事特出宸断可書簡册者並乞付中書遍劄送巳上臣僚委令逐人速具實封供報務要詳仍乞指揮進奏院遍行指揮應曽在先朝任上件官位巳經亡殁臣僚之家亦許親族編録經􅀁在官司繳進不得虚飾事莭候到日並降付本院以憑㸔詳編􅁱所貴書成之日免致䟽畧一乞下中書樞宻院自嘉祐八年四月至治平四年正月巳前應有臣僚進献文字曽送史舘或留任中書剗刷名件及下史舘盡底檢㝷降付本院并宰臣與文武百僚凢有奏請􅁛賀上表􅀁降批荅亦乞檢㝷降下一乞下两省及司封兵部吏部甲庫學士舎人院拠實録院所関宣􅃙及詔書除目告詞如移牒暫借使畫時檢㝷報應不得稽緩一乞下禮賔院具自嘉祐八年四月至治平四年正月八日已前凡外蕃朝貢所記本國風俗人物道里􅁟産詳實供報一先朝臣僚有得罪譴謫者乞下御史䑓審刑院刑部大理寺㩀實録院􅀁要案櫝畫時供借一乞下司天監自嘉祐八年四月至治平四年逐年其暦日一本供報當院一乞下三司令自嘉祐八年四月至治平四年正月八日巳前應虫蝗水旱災傷及徳音赦書蠲放稅賦及蠲免欠􅀒並具實数供報當院一乞下三司自嘉祐八年四月至治平四年正月八日巳前應有制置錢􅂖稅賦茶鹽及搉酒等凡干臣僚章䟽論議廢置事件具録供報當院一部水監河渠水利凢有論議改更貢部但係郡國所申祥瑞貢院但干改更貢舉條制太常寺禮院但干禮樂制作事三司戸部每遇戸口陞降巳上官司自嘉祐八年四月至治平四年正月八日巳前令子細檢㝷供報本院不得一天聖元年管勾修真宗皇帝實録所奏修􅁧官李維䓁公文其間有事跡不圓䖏合係中書樞宻院三司檢㝷應副又縁事件不少􅀼慮差去分手不得到裏靣檢㝷是致逐時不檢到照證事件乞傳宣中書樞宻院㩀李維䓁合要照證􅁱􅁧事蹟名件令合行分手䓁盡底檢㝷應副免致有妨􅁱􅁧奉御寳批依奏治平元年􅁱仁宗皇帝實録院亦奏合依中書樞宻院檢㝷合要照證事件乞依天聖􅀄躰例施行并乞差中書應奉國史文字堂後官魏孝先樞宻修時政記生事劉孝先􅀱見當院書庫官䓁􅀅到合要檢㝷事件立便收接檢㝷應副又曽乞差中書樞宻院編文字官及乞扵三司審刑院太理寺属官内􅃟差人員各令應副檢文字今来本院合要中書樞宻院檢㝷文字照證編修欲乞依天聖治平􅀄躰例施行一乞下管勾往来國信所契勘嘉祐八年四月至治平四年正月末以来􅀁差入囯接伴舘伴官等正官借官簿䓁冊并語録􅁠借赴當院照證􅁱纂仍不妨彼所使用一乞下玉牒所取英宗皇帝玉牒一本照㑹一乞下中書編機房合要嘉祐八年四月至治平四年正月八日巳前改除麻制文字照㑹一本院但干脩實録於諸䖏檢借文字並湏當聀官貟封記徃還疾速應付一乞下尚書司封疾速檢借嘉祐八年四月至治平四年正月八日巳前中書除改百官官位姓名􅃙黄照證修纂元豊􅀋藁卷之三十二
