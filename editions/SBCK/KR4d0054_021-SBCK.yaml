front:
  text: 元豊􅀋藁卷第二十一
  hash: sha256:12c4089741bab45666ffdda8fa59b84880f1eee66cb2b5da8045aac685322cf5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_021-1a}
body:
  text: 制誥左僕射門下侍郎王珪追封三代并妻制曽祖永贈開府儀同三司􅃙禮取其稱故位益尊則事其先者世益逺今予良弼襃命其親得上至于三世求之扵礼豈非取其􅁛㢤具官某曽祖某仁䔍慈祥畜徳甚盛盖其為積也厚則其流澤也廣故􅀎開相厥裔為時宗臣百辟是師王室是輔推功原大肇基自爾􅂋􅀭崇寵兹惟舊章是用進爾之階秩在第一尚其不昧服此茂㤙可曽祖母尹氏追封燕國太夫人􅃙􅄖禮太臣厚其寵数􅀁以􅂆在位之功徳而共成天下之治也宰相之任重矣尊榮光大上施于其三世豈不即乎人情而􅁛其位序㢤具官某曽祖母某氏幽間静專躬蹈純徳嬪于盛族壷􅃔是稱啓佑後人任國幾政流澤􅀁自宜極褒崇追命㝎封列于大國光靈不泯尚服朕㤙可祖贄追封魏國公􅃙天下之忠乎上教有􅀁自故上之仁乎下㤙有􅀁延其躰相成治道􅀁出惟吾股肱之佐共任天下之重愍書寵秩施其祖廟􅀁以慰其􅂋親之心􅁛其事君之義具官其明􅁢純䔍徳業惟茂義訓不倦弥逺益彰維時聞孫實輔予治念功原始冝極襃嘉庸建爾于上公俾受國于全魏殁而尚有知也其服朕之厚㤙祖母丘氏追封魏國太夫人􅃙夫其先之畜徳也厚則其裔之􅂪澤也長故寵禄在其子務則襃榮施其祖禰奨功録善必揆所繇􅀁以􅂆天下之成其家也具官某祖母某氏身蹈純行嬪于令人教行閨門自􅀮而􅂋惟予哲輔實爾慈孫質厥所元宜有加命一作嘉全魏大國􅀙夫之尊服此寵章尚綏爾後可父凖追封漢國公􅃙朕敷求哲人以共大政隆名寵禄既俾集于厥躬襃大推崇則又施其禰庙􅀁以遂吾士臣􅁒􅂋其親之志而開示在位予一人尊奨近輔之心具官某父某材通世用行蹈天常徳畜不施澤流及逺惟時有子為國宗臣叅聽萬機人望惟􅁢􅂟􅀁自出朕惟汝嘉屏蔽四方漢為最大受兹封􅁟承􅁉爾家可母薛氏追封漢國太夫人􅃙位有貴賤升降之䓁故禮有隆殺損益之差今輔予聴断萬機之臣在師長百官之任盖列扵廊庙名秩既殊故追榮其親命数亦異兹惟故事其可易㢤具官某母某氏婦道以順母儀以慈言為壷􅃔動應圖法􅀎教其子為時宗工股肱朕躬王室是頼襃崇之典既啓名乂漢惟大􅀖改進封號尚宜寵渥永祚厥家可妻鄭氏追封楚國夫人􅃙詩人之義君之夫人有委蛇之行河山之徳然後在尊位備盛服􅀙其夫榮可以為􅁛施扵世教􅀁以始人倫而出治道也具官某妻某氏㳤茂柔明生于今族動静以禮恊于經言相予宗臣慎其内行曽不偕老永綏厥家湯沐之田既受方國有加迨寵宜易新封尚其光靈服我休命可中大夫尚書左丞蒲宗孟追封三代并進封妻制曽祖頴士贈太子少保􅃙朕稽于古以正百官惟尚書政本而左轄綱紀之司延登哲人俾祗厥叙愍有加寵逮其重祖􅀁以隆崇大臣國之典也具官某曽祖某潛徳西南在約弥勵流光錫祚集其後昆緫典中䑓實輔予治東朝二品是用命爾尚維幽漠服此茂㤙可曽祖母鮮于氏追封大寧郡太夫人􅃙宗廟之數諸侯以五盖任彌重者礼彌盛貴賤之莭然也今吾大臣追命及其三世與夫朝制豈異意㢤具官某曽祖母某氏作徳扵内以宜厥家啓相後人預蔽國論按圖考地俾㝎爾封其尚有知服兹寵號可祖伸贈太子少傅􅃙人本于祖故吾加㤙近輔褒荣其先至子累世豈不縁人之情而制為命数㢤具官某祖某内含純明外蹈䂓矩流澤也逺有孫而賢進于中䑓捴國綱轄善有􅀁自朕惟汝嘉東朝之孤傳位為寵用賁幽宅尚其欽承可祖母陳氏追封蜀郡太夫人􅃙世徳之積者乆則發扵其後者長故朕隆崇近輔而襃榮其先非一二世而止􅀁以􅂆天下之善豈非傳㢤具官某祖母某氏㳤慎恭儉化行閨門啓其元孫持國綱要蜀惟爾􅁟以㝎新封尚其如存膺此茂渥可継祖母朱氏封閬中郡太夫人􅃙夫位以徳升禮以位叙不失其􅁛兹為義榮今吾崇進大臣而圖其先烈内外命秩亦惟其宜􅀁以使上下之間公論惟􅁢具官某継祖母某氏婉嫕冲靜行孚于家祚爾之孫興以輔朕西南上郡愍有褒封垂聲賛書尚其不殁可父師道贈太子少師􅃙吾之大臣繇聦明材諝有以爵禄之榮予有命書愍贈賁其考庙所以􅁛其􅂋親之心慰其霜露之感位不次授厥惟故常具官某父某忠䔍純明徳􅂂惟茂壮謀循政聲列在人積厚慶隆及子而􅂋時予左轄司國紀綱惟流有原開跡自爾宫師之貳名寵秩尊以告幽扄尚其秪服可母陳氏追封頴川郡太夫人􅃙人子之扵其父母莫不有􅂋揚襃大之心惟任重秩尊得盡其志此隆名寵禄􅀁以􅂆天下也具官某母某氏經徳􅂂善冝其家室錫羡流祉在爾後人時予宗工任國綱轄陪京望郡俾㝎新封服我命書尚其不泯可妻陳氏封河東郡夫人􅃙朕援用天下之材以爲共政之臣就位之􅀄㤙数礼秩􅀁以尊荣光大之者上施其祖禰而旁及扵閨門盖任属之者重則襃隆之者其可以不異㢤具官某妻某氏言容功徳柔間懿恭嬪手令人休有華問惟時哲輔進秉國成相􅂇之勤爾効弥􅂋改擇加郡登崇號名尚宜厥家永綏寵禄可陸佃兼侍講蔡卞兼崇政殿􅀃書制􅃙朕扵書無􅀁不學扵天下之事無所不攷而不敢自以為足故設置講觧之官使以先王之六藝日陳于前朕扵求多聞以建事之心可謂勤矣具官某好古知經宜在此位夫尊其􅀁聞以懋厥職兹為爾守其尚起㢤可蔡卞改講觧作誦􅀃徐禧給事中制􅃙有殿内之臣職在扵平奏述詳命令紏其違者而止之覆其是者而行之至扵决獄官人條陳法式之事莫不當攷察焉其任可謂重矣具官某以財進㧞興執􅀖憲兹用推擇俾踐厥位惟精敏不􅈈可以周閲讀惟忠實不撓可以司論駮朕方􅀚爾之效爾尚慎扵厥􅁱可鍾浚􅀅作少監制􅃙具官某繕􅁱興造程工􅇂作之任不可不属之其人位視九卿礼秩甚寵正名之始考擇惟慎爾以材􅃟徃貳厥官尚其祗承以􅁢􅀵㧞可蔡燡河東運判制􅃙具官某分部而使雖以􅀅􅈇為名然實在扵捴庶務之予奪察群吏之􅀎否叅予任属􅃟授其艱以爾為􅀎俾承厥序夫均通貨食使物有羡羸審覈幽明使人知􅂆畏兹為爾守其徃懋㢤可供備庫副使董琰等十一人轉官制􅃙具官某䓁西南之蛮恃阻且逺跳踉溪谷􅀒􅁩于誅王師鼓行舉其巢穴斬􅀗摧䧟爾預奏功第賞有差尚惟祗服可待制王尭臣知單州制􅃙提􅀅之符顓制一道使紀律明扵士衆忠實紀扵朝廷然後為國藩垣􅀎􅁛其位具官某統治晋陽冝知其任而西伐之卒北有逋亡継形奏陳皆以疾苦無直䋲肅下之􅁩有浮言罔上之迹雖付之刺􅇂考驗甚明而既更詔㤙法當貸爾俾仍近職徃守偏州尚自省循兹為薄責可鄧忠臣母周氏封縣太君制􅃙具官某母某氏爾子忠臣有劳應賞願更寵典以啓爾封俾􅃬命書兹為異数尚惟祗服以􅁛茂㤙可杜常兵部郎中制􅃙具官某朕為保五之法寓􅀾陣之教􅁒使兵與農合庶㡬先王之迹夏官之属實叅典領以材擢爾徃祗厥序夫􅀎奨誘服田之人恱趨講武之政馴致有漸而彌綸不䟽惟無􅆸爾之勤可以承朕之志可李士京韓宗文大理寺主簿制􅃙具官李士京䓁察治犴獄之官勾稽簿領之事徃祗􅃟用無􅈈厥修可許懋两浙運副制􅃙具官某朕擇遣使者分部而治雖以􅀅􅈇為􅁛然寔緫民政之舉措察吏属之􅀎否盖連数十城之地舉而属之其􅃟豈不重㢤爾詳練敏明冝服予采盖爾之聀非止扵􅇂賦歛断獄訟而巳惟除苛熄􅅰可以使民遂其宜惟務實去華可以使吏馴其行宣㤙徳而美風俗待爾􅀎善其官可不勉欤以祗朕命可内殿承制段綽䓁知州制􅃙具官某州有兵民之􅀉而地在疆􅂣之間則常擇用材武之臣属之守禦之任爾以􅀎􅃟往祗厥服尚思綏靖以􅁛簡求可宗室承操新婦王氏進封國夫人制􅃙親爱之而欲其貴冨朕扵公族皆推是心寵数徽章施扵閨壷兹惟故事朕敢忘㢤具官某新婦某氏作合宗藩躬有乂徳啓兹全國用進爾封以致朕尊奨近属之㤙尚懋爾服承休􅂋之稱可宗室克懼復官制􅃙具官某属在近親享有榮禄以愆坐法亦既􅄪期稽于故常冝服位䓁勉思祗􅅚􅁛此茂㤙可李徳明遥郡團練使制􅃙具官某擐甲執兵人之重任賞信而速所以􅂆功爾忠力武材􅁛于種落往殱醜􅀋屡以捷聞啚爾之勞進位二䓁益思奮勵以待異㤙可陳景等尚書省主事令史􅃙某中䑓政本主曺事治文書亦不可不属之其人爾徃懋㢤皆仍舊秩可拆克行彭保轉官制􅃙具官某朕惟羗之猖狂内相賊虐致大之罰爰命六師開通道塗􅀵復城聚摧堅􅀗醜爾功居多盖夫軍賞之行速則衆􅂆是用進爾之秩以激士心尚有不次之㤙以待非常之効可程嗣恭祖無頗程愽文開封府推官制􅃙具官某開封天下之聚俗雜五方之民盖巧偽繁興獄訟滋出賛治之任攷擇維艱以爾爲􅀎俾祗厥服夫慈惠足以煦飬惸弱剛嚴足以帖伏姧強然導民之方尚有可識使風俗有以粹美而四方有以觀則徃助爾長其尚懋㢤可李憲武勝軍莭度􅀚察留後制􅃙王師西出士大夫皆奮力行陣有尺寸之功者朕無不録况議勞數實有大扵此者其扵信賞朕敢忘㢤具官某比自臨洮率衆躬􅀅摧殪醜虜恢復故疆鼓行羗中屡以捷告敀按閥閱朕用寵嘉秘殿榮名便藩留務兼是茂渥以奨爾庸其徃茂㢤益思来効可李靖臣王存趙彦若曽肇轉官制􅃙惟朕祖考成功盛德覆􅀍天下固非文字可得而名然史記冊書國家之典上以紀先帝言動之迹下以及群臣善惡之實傳之萬世宜有論次具官某以文學選用與成信書朕惟汝嘉是用襃進尚其祗服以􅁛朕㤙李舜舉䓁轉官制􅃙具官某朕惟先帝功德之殊宜見之方冊故詔擇儒臣属之論譔而爾扵其宮次與有祗事之勤亦既書成例當襃録進升位䓁其尚欽承可皇伯滕王第十六女封縣主制􅃙具官某第十六親在近属生而懿柔宜開縣甸之封以榮湯沐之號惟惇序爾尚欽承可元豊􅀋藁卷第二十一
