  text: 元豊􅀋藁卷第十六
  hash: sha256:5d22beffcc62c71ff2a2edf8ae764243b7227b34b0d21220e7cf3eea618d100d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_016-1a}
body:
  text: 書與杜相公書鞏啓鞏多難而貧且賤學與衆違而言行少合扵世公卿大臣之門無可藉以進而亦不敢輙有意扵求聞閤下致位天子而歸始獨得望舄履扵門下閤下以舊相之重元老之尊而猥自抑損加禮扵草􅈋之中􅀌㷀之際然去門下以来九嵗扵此􅀄不敢為書以進比至近嵗嵗不過得以一書之問薦扵左右以伺侍御者之作止又輙拜教之辱是以滋不敢有意以千省察以煩貺施而自以得不韙之誅頋未嘗一日而忘拜賜也伏以閤下朴厚清明讜直之行樂善好義逺大之心施扵朝廷而􅀶見扵天下銳扵强力而不􅈈扵耄期當今内自京師外至巖野宿師碩士傑立相望必􅀅憊精疲思冩之冊書磊磊明明宣布萬世固非淺陋小生􅀁􅀎道􅀃而有益毫髪也鞏年齒益長血氣益衰疾病人事不得以休然用心扵載籍之文以求古人之緒言餘􅈲以自樂扵環堵之内而不亂扵貧賤之中雖不􅁕希盛德之萬一亦庻㡬不􅀒其意非自以謂􅀎也懷區區之心扵数千里囙尺書之好而惟所以報大君子之誼不知􅀁以裁而恐欲知其趣故輙及之也春暄不審尊用如何伏惟以時善保尊重不勝鄙劣之至不宣鞏再拜答范資政書鞏啓王寺丞至􅀩賜手書及絹䓁伏以閣下賢德之盛而􅀁施為在扵天下鞏雖不熟扵門然扵閣下之事􅂉可以知􅀂鞏之鄙切伏草茅閣下扵覊旅之中一見而巳今鞏有􅀁自得者尚未可以致閣下之知况鞏斈不足以明先聖之意識古今之変材不足以任中人之事行不足以無媿悔於心而流落􅀉寓無田疇屋廬匹夫之業有奉飬嫁送百事之役非可責思慮之精詔道德之進也是皆無以致閣下之知者而拜别㫷年之間相去数千里之逺不意閣下猶記其人而不為年軰爵德之間有以存之此盖閣下樂得天下之英材異扵世俗之常見而如鞏者亦不欲棄之故以及此幸甚幸甚夫古之人以王公之􅀔而下貧賤之士者盖惟其常而今之布衣之交及其窮逹毫髪之殊然相棄者有之則士之愚且賤無積素之義而為當世有大賢德大名位君子先之以礼是豈不扵衰薄之中為有激扵天下㦲則其感服固宜如何仰望門下不任區區之至謝杜相公書伏念昔者方鞏之得禍罰扵河濱去其家四千里之逺南嚮而望迅河大淮埭堰湖江天下之險為其阻阨而以􅀌獨之身抱不測之疾㷀㷀路隅無攀縁之親一見之舊以為之託又無至行上之可以感人利􅀔下之可以動俗惟先人之醫薬與凢䘮之􅀁急不知􅀁以為頼而旅櫬之重大懼無以歸者明公獨扵此時閔閔勤勤營救護眎親屈車􅀐臨扵河上使其方先人之病得一意扵左右而醫薬之有與謀至其既􅀌無外事之奪其哀而毫􅄠之私無有不如其欲莫大之䘮得以卒致而南其為存全之㤙過越之義如此􅀼惟明公相天下之道吟訟推􅀃者窮萬世非如曲士汲汲一莭之善而位之極年之高天子不敢煩以改豈郷閭新斈危苦之情藂細之事宜以徹扵眎􅃪而􅀩省察然明公存先人之故而􅀁以盡扵鞏之德如此盖明公雖不可起而􅀉天下之政而爱育天下之人材不忍一夫失其􅀁之道扵自然推而行之不以進退而鞏獨幸遭明公扵此時也在䘮之日不敢以世俗淺意越禮進謝䘮除又惟大㤙之不可名空言之不足陳俳佪汔今一書之未進顧其慚生扵心無湏􅁷􅆸也伏惟明公終賜亮察夫明公存天下之義而無有􅀁􅀻則鞏之􅀁以報扵明公者亦惟天下之義而巳誓心則然未敢謂能也􅀉歐陽舎人書鞏頓首載拜舎人先生去秌人還􅂪賜書及􅀁譔先大父墓碑銘反復􅀚誦感與慚并夫銘誌之著于世義近扵史而亦有與史異者盖史之扵善惡無􅀁不書而銘者盖古之人有功德材行志義之羙者惧後世之不知則必銘而見之或納于廟􅂉存于墓一也苟其人之惡則扵銘乎何有此其􅀁以與史異也其辭之作􅀁使死者無有􅀁憾生者得致其􅃊而善人喜扵見傳則勇扵自立惡人無有所紀則以媿而懼至扵通材逹識義烈莭士嘉言善状皆見扵篇則􅁕為後法警􅂆之道非近乎史其􅀅安近及世之衰人之子孫者一欲褒揚其親而不本乎理故雖惡人皆務勒銘以誇後世立言者既莫之拒而不為又以其子孫之􅀁請也書其惡焉則人情之所不得扵是乎銘始不實後之作銘者常􅀚其人苟託之非人則書之非公與是則不足以行世而傳後故千百年耒公卿大夫至于里巷之士莫不有銘而傳者盖少其故非他託之非人書之非公與是故也然則孰為其人而􅀎盡公與是欤非畜道徳而􅀎文章者無以為也盖有道徳者之扵悪人則木受而銘之扵衆人則􅀎辨焉而人之行有情善而迹非有意奸而外淑有善悪相懸而不可以實指有實大扵名有名侈扵實猶之用人非畜道徳者惡􅀎辨之不惑議之不徇不惑不徇則公且是矣而其辞之不工則世猶不傳於是乂在其文章兼勝焉故曰非畜道徳而􅀎文章者無以為也豈非然㦲然畜道徳而􅀎文章者雖或並世而有亦或数十年或一二百秊而有之其傳之難如此其遇之難又如此􅀂先生之道德文章固􅀁謂数百年而有者也先祖之言行卓卓幸遇而得銘其公與是其傳世行後無疑也而世之學者毎􅀚傳記􅀁書古人之亊至其􅀁可感則徃徃盡然不知涕之流落也呪其子孫也㦲况鞏也哉其追晞祖德而思所以傳之之繇則知先生推一賜扵鞏而及其三卋其感與報冝􅀂何而圗之抑又思􅀂鞏之淺薄滯拙而先生進之先祖之屯蹷否塞以死而先生􅂋之則世之魁閎豪傑不世出之士其誰不願進扵門潜遁幽抑之士其誰不有望扵世善誰不為而悪誰不愧以懼為人之父祖者孰不欲教其子孫為人之子孫者孰不欲竉榮其父祖此数羙者一歸扵先生既拜賜之辱且敢進其􅀁以然􅀁諭世族之次敢不承敎而加詳焉愧甚不宣鞏􅄪拜與王介甫第一書鞏啓近託彦弼黄九各奉書當致矣鞏至金陵後自宣化渡江来滁上見歐陽先生住且二十日今􅀙泗上出及舟船侍􅀙以西歐公悉見􅁕下之文爱嘆誦寫不勝其勤間以王回王向文示之亦以書来言此人文字可驚世所無有盖古之斈者有或氣力不足動人使如此文字不先耀扵世吾徒可耻也其重之如此又嘗編文林者悉時人之文佳者此文與􅁕下文多編入矣至此論人事甚衆恨不與􅁕下共講評之其恨無量雖歐公亦然也歐公甚欲一見􅁕下􅀎作一来計否胷中亊萬萬非面不可道鞏此行至春方應得至京師也時乞寓書􅇺區區疾病尚如黄九見時未知竟何如也心中有與􅁕下論者相雖未相見􅁕下之心潜有同者矣歐公更欲􅁕下少開廓其文勿用造語及摸擬前人請相度示及歐云孟韓文雖高不必似之也取其自然耳餘侯到京作書去不宣鞏􅄪拜與王介甫第二書鞏頓首介父足下比辱書以謂時時小有案㪯而謗議巳紛然矣足下無恠其如此也夫我之得行其志而有為扵世則必先之以教化而待之以乆然後乃可以為治此不易之道也盖先之以教化則人不知其􅀁以然而至扵遷善而逺罪雖有不肖不􅀎違也待之以乆則人之功罪善悪之實自見雖有凼􅀮不􅀎掩也故有漸磨陶冶之易而無按致操切之難有愷悌忠篤之純而無偏聴摘抉之苛巳之用力也簡而人之従化也愽雖有不従而俟之以刑者固少矣古之人有行此者人皆恱而恐不得㱕之其政已熄而人皆思而恨不得見之而豈至扵謗且怒㢤今為吏扵此欲遵古人之治守不易之道先之以敎化而待之以乆誠有􅀁不得為也以吾之無􅀁扵歸而不得不有􅀒冐扵此則姡汲汲乎扵其厚者徐徐乎扵其薄者其亦庻幾乎其可也顧反不然不先之以敎化而􅃍欲責善扵人不待之於久而􅃍欲人之功罪善惡之必見故按致操切之法用而怨忿違倍之情生偏聴摘扶之􅀔行而譛訴告計之害集巳之用力也愈煩而人之違巳也愈甚况今之士非有素厲之行而為吏者又非素擇之材也一日卒然遂飲斉之以法豈非左右者之誤而不為無害也㦲則謗怒之耒誠有以召之故曰足下無恠其如此也雖然致此者豈有他㢤思之不審而巳矣顧吾之職而急扵奉法則志在扵去惡務扵逹人言而廣視聴以謂為治者當如此故事至扵巳察曽不思夫志扵去惡者俟之之道巳盡矣則為惡者不得不去也務扵逹人言而廣眡􅃪者已之治亂得失則吾将扵此而􅀚之人之短長之􅀻則吾所任意扵此也故曰思之不審而巳矣足下扵今最􅀎取扵人以爲善而比聞有相曉者足下皆不受之必其理未有以奪足下之見也鞏比􅂴作書既􅄐南康相見尚逺故因書及此足下以爲如何不宣鞏頓首與王介甫第三書鞏啓八月中承大夫人大祥扵郵中寓書奉􅇺十月梅厚秀才行又寓書不審皆到否昨日忽􅀍耒問良􅇺積日之思深父殂背痛毒同之前書巳具道矣示及誌銘反復不􅀎去手􅀁云令深父而有合乎彼則不􅀎同乎此矣是道也過千􅀊以來至扵吾徒其智始􅀎及之欲相與守之然今天下同志者不過三数人爾則扵深父之殁尤可為痛而介父扵此獨􅀎發明其志讀之滿􅁕人心可謂􅀎言人之􅀁不􅀎言者矣顧猶見使啇搉􅀁未安􅀚介甫此作大抵哀斯人之不壽不得成其材使或可以澤今􅂉可以覺後是介父之意也而其首則云深父書足以致其言是乃􅁛深父以未成之材而著書與夫本意違矣願更詳之孟子之書韓愈以謂非軻自作理恐當然則􅀁云􅀎幸著書者亦惟更詳之也如何幸復見諭所云讀禮因􅁒有􅀁論著恐嘗為介父言亦有此意顧不􅀎自強又無所考質故莫䏻就今介父既意及扵此願遂成之就令未可為書亦可因得啇搉矣相别數年鞏在此全純愚以静俟庻無大悔顧苟祿以弃時日為可悵惜未知何日得相從講學以勗其􅀁未及盡其􅀁可樂扵衰暮之􅀊乎此日夜惓惓徃來扵心也示諭溲血比良巳否即日不審􅆍食如何上奏當􅁛前某官十数日見劉琮言巳報去承見問故更此及之爾今介父果以何時此來乎不惜見諭子進弟奄䘮巳易三時矣悲苦何可以堪二姪年可敎者近已随親老到此二尤小者六舎弟尚且留在懐仁視此痛割何可以言承介父有女弟之悲亦巳屡更時序􅀼計哀戚何以自勝餘惟强食自憂不惜時以一二字見及不宣鞏啓上荅李㳂書鞏頓首李君足下辱示書及􅀁為文意嚮甚大且曰足下以文章名天下師其職也顧鞏也何以任此足下無乃盈其禮而不情乎不然不宜􅀂是云也足下自稱有憫時病俗之心信如是是足下之有志乎道而予之􅀁爱且畏者也末曰其發憤而為詞章則自謂淺俗而不明不􅀂其始思之銳也乃欲以是質扵予夫足下之書始􅀁云者􅁒至乎道也而􅀁質者則辭也無乃務其淺忘其深當􅇥者反徐之歟夫道之大歸非他欲其得諸心充諸身擴而􅀍之􅀦家天下而巳非汲汲乎辭也其􅀁以不巳乎辭者非得巳也孟子曰予豈好辨㢤予不得巳也此其所以為孟子也今足下其自謂巳得諸心充諸身歟擴而披之􅀦家天下而有不得巳歟不然何遽急扵辞也孔子曰古之學者爲巳今之學者爲人􅁕下其得無巳病乎雖然足下之有志乎道而予之􅀁愛且畏者不疑也姑思其本而勉充之則予􅀅後足下其奚師之敢不宣鞏􅄪拜謝章學士書鞏啓鞏不侫以身得察扵下執事明公過㤙召而見之􅀁以矜嗟奨寵開慰拊循之者甚俻雖至親䔍友之愛不隆扵此巳又收弟兄之不肖不謀賔客任而舉之明公之􅀁以畜幸鞏者可謂厚矣鞏􅀼自惟求所以堪明公之意者未知􅀁出也鞏愚無知不適扵世用不􅀎收身扵世俗之外力耕扵大山長谷之中以共饘粥之飬魚菽之􅀕以其餘日考先王之遺文􅀼六藝之㣲旨以求其志意之􅀁存而足其自樂扵巳者顧反去士君子之林而夷扵皁􅀠之間捨自肆之安而踐乎迫制之地欲比扵古之為貧為仕者可謂妄矣固有志者之􅀁嘆嗟天下之􅀁賤而至親䔍友之􅀁棄而違之也復安敢自通扵大人之門望知扵侍御者之側乎明公懐使者之印為福扵東南以地計其廣狹則数十百城之人待明公之畜飬以材計其多寡則文武之士以百千数待明公之推察而收拊之任而舉之者乃獨在扵鞏舉鞏之少弟此鞏之所以自唯求堪明公之意者而未知􅀁出也抑鞏聞之廣􅃪􅀶􅀚不遺汙賤戹辱之士者此􅀁以無棄士也兼收並采不遺偏材一曲之人者􅀁以無棄材也故明公之意儻在扵此而古之士出汙賤戹辱之中􅀎成功名以報知者亦不可勝数彼皆豪傑之人故有以自致也􅀂鞏之鄙則安敢望此乎故􅁨不䏻堪明公之意誤左右之知者此鞏之􅀁大懼也竭固陋之分庻㡬不愧扵偏材一曲之人者此鞏之􅀁可至也敢獻其情而以為進謝之資惟明公之垂察焉荅孫都官書提刑都官閤下伏氶賜書及示盛製六編凢三千首盛矣㢤文之多工之深且專以乆其扵君臣父子兄弟夫婦朋友天地三辰􅀑神山川地理四夷中國風俗萬物治亂善惡通塞􅄐合􅁨􅂬怨對無不畢載而其語則􅀶而精麗而不浮其歸要不離扵道視昔以文名扵天下者夫豈易至扵是耶鞏之愚且􅂴且為事物疾病􅀁侵以不專而且未乆扵學也使之􅀚􅀂扵海不見其涯涘扵深山長谷不見其形势之􅀁極而取議其大小高下邪而閣下不以􅀁深且專以乆者勵鞏􅀶而精麗而不浮其㱕本扵道者敎鞏乃告之曰其詳擇而去其非是者焉鞏誠恠閤下自䖏之過而為以賜鞏者乃􅀁以怠且蔽之也凢鞏之學盖将以學乎為身以至扵可以為人也方愚且􅂴且不專以乆之病也惟閤下之仁豈欲怠且蔽也其欲使知閤下之貴而長其業之富而成而猶不止如是􅀎下扵後軰如是是􅀁以教之也孟子曰吾不屑其敎誨是亦教誨之而巳矣敢不拜賜也盛編尚且借􅀚而先以此謝皇恐皇恐不宣鞏􅄪拜荅􅀽陟書鞏頓首世弼􅁕下辱書􅀃介甫事或有以為矯者而􅂬自信獨立之難因以教鞏以謂不仕未為非得計者非足下愛我之深䖏我之重不至扵此雖親戚之扵我未有過此者然介甫者彼其心固有􅀁自得世以為矯不矯彼必不頋之不足論也至扵仕進之􅀃則以鞏所考扵書常謂古之仕者皆道徳明備已有餘力而可以治人非苟以治人而不足扵巳故子使漆雕開仕對曰吾斯之未􅀎信子􅀃然世不講此乆矣故當孔子之時獨顔子者未嘗仕而孔子􅁛之曰好學其餘弟子見扵書者獨開之言如此􅀂鞏之愚固巳不足者方自勉扵學豈可以言仕不仕邪就使異日可仕之道而仕不仕固自有時古之君子法度備扵身而有仕不仕者是也豈為呶呶者邪然鞏不敢便自許不應㪯者鞏貧不得巳也亦不敢與古之􅀁謂為貧者比何則彼固所謂道德明備而不遇扵世者非􅀂鞏之鄙􅃍捨其學而欲謀食也此其心愧扵古人然鞏之家苟􅀎自足便可以䖏而一意扵學鞏非好進而不知止者此其心固無愧扵古人辱足下爱之深䖏之重不敢不報荅所示詩序及荅楊生書甚善甚善不宣鞏顃首謝曹秀才書鞏頓首曺君茂才足下嗟乎世之好惡不同也始足下試扵有司鞏爲封弥官得足下與方造孟起之辭而讀之以謂宜在高選及耒取號而三人者皆無姓名扵是憮然自悔許與之妄既而推之特世之好惡不同耳鞏之許與豈果爲妄㢤今得足下之書不以觧名失得置扵心而汲汲以相􅀙講學爲事其􅀶􅀚扵書而見於文字者又過扵鞏向時之所與甚盛足下家居無亊可以優㳺以進其業自力而不巳則其進孰􅀎禦㢤世之好惡之不同足下固已􅀎不置扵心頋鞏適自􅀍召不得與足下乆相􅀙學此情之􅀁睠睠也用此為謝不宣謝呉秀才書鞏啓承足下又以大􅀬之酷為可畏畏塗之阻為可惮徒歩之劳為可病候問之勤為可諱三及吾門見投以書及􅀁業五編發而􅀚之足下之學多矣見扵文辭者亦多矣其􅀃徃徃有非郷閭新斈所􅀎至者使􅀎充其言其得豈少㢤况其進之未巳耶頋不自足忘前之患而有求扵鄙闇推足下此志其進豈可量哉僕之􅀁可告扵足下者無易扵自勉也薄􅃍不宣與王深甫書鞏􅄪拜與深父别四年矣嚮徃之心固不可以書道而比得深甫書輙反復累􅁓示諭相存之勤相語之深無不盡者讀之累日不􅀎釋手故亦欲委曲自叙巳意以報而怠惰囙循經渉崴月遂使其意欲周而反畧其好欲宻而反踈以汔于今頋深父􅀁相與者誠不在扵書之䟽数然嚮徃之心非書則無以自觧而􅆾謬􅀂此不􅀎不欿然也不審幸見察否比得介甫書知数到京師比巳還亳即日不審動止如何計太夫人在穎子直代歸與諸令弟應書皆在京師各萬福鞏比侍親幸無恙宣和日得㪯四弟應舉今亦在京師去年第二妹嫁王􅀘之者不幸疾不起以二女甥之失其􅀁依而􅀘之欲継舊好遂以弟七妹㱕之此月􅀄巳亦或婣鞏質薄去朋友逺且乆其過失日積而思慮日昏其不免扵小人之歸者􅀅􅀂之何在官折莭扵奔赱悉力扵米塩之末務此固任小者之常無不自安之意顧􅀄至時遇在􅀔者横逆又議法数不合常恐不免扵􅌟䧟方其險阻艱難之時常欲求脫去而卒無由今在􅀔者已更幸自免扵悔咎而鞏至此亦巳二年矣比承諭及介父所作王令誌文以爲揚子不過恐不然也夫學者其心䔍扵仁其視聴言動由扵礼則無常産而有常心乃所履之一亊耳何則使其心䔍扵仁其視聴言動由扵礼然而無常産也則其扵親也生事之以礼故啜菽飲水之飬與以天下一也死􅁙之以礼故歛手足形旋􅁙之葬與葬以天下一也而况扵身乎况扵妻子乎然其心䔍扵仁其視聽言動由扵礼者非盡扵此也故曰乃􅀁􅂂之一事耳而孟子亦以謂無常産而有常心者唯士為然則為聖賢者不止扵然也介父又謂士誠有常心以操群聖人之􅀃而力行之此孔孟以下􅀁以有功扵世也夫學者苟不􅀎其心䔍扵仁其視聴言動由扵礼則必不􅀎不失其常心此後之學者之患也苟􅀎其心䔍扵仁其親聽言動由扵礼則必不失其常心且既巳皆中扵礼矣而􅂧操何􅀃而力行之哉此學者治心􅁱身本未先後自然之理也所以始乎為士而終乎為聖人也顔子三月不違仁盖謂此也人不堪其憂而不改其樂盖樂此也凢介父之所言似不與孔子之􅀁言者合故曰以為揚子不過恐不然也此吾徒􅀁學之要義以相去逺故略及之不審以為如何其他未及子細劇寒自重書至幸報荅不宣鞏􅄪拜荅王深甫論揚雄書􅂪䟽示鞏謂揚雄䖏王莾之際合扵箕子之明夷常夷甫以謂紂為継世箕子乃同姓之臣事與雄不同又謂美新之文恐箕子不為也又謂雄非有求扵莾特扵義命有􅀁未盡鞏思之恐皆不然方紂之亂徴子箕子比干三子者盖皆諌而不從則相與謀以謂去之可也任其難可也各以其􅀁守自獻于先王不必同也此見扵書三子之志也三子之志􅂉去或任其難乃人臣不易之大義非同姓獨然者也扵是微子去之比干諌而死箕子諌而不從至辱扵囚奴夫任其難者箕子之志也其諌而不從至辱扵囚奴盖盡其志矣不如北于之死所謂各以其􅀁守自獻于先王不必同也當其辱扵囚奴而就之乃所謂明夷也然而不去非懐禄也不死非畏死也辱扵囚奴而就之非無耻也在我者固彼之所不䏻易也故曰内難而􅀎正其志又曰箕子之正明不可息也此箕子之事見扵書易論語其􅀃不同而其終始可考者如此也雄遭王莾之際有􅀁不得去又不必死辱扵仕莾而就之固􅀁謂明夷也然雄之言著於書行著扵史者可得而考不去非懐禄也不死非畏死也辱於仕莾而就之非無耻也在我者亦彼之􅀁不䏻易也故吾以謂與箕子合吾之􅀁謂與箕子合者如此非謂合其事紂之􅀄也至扵美新之文則非可已而不巳者也􅀂可已而不巳則郷里自好者不為况􅀂雄者乎旦較其䡖重辱於仕莾為重矣雄不得巳而巳則扵其䡖者其得已㢤箕子者至辱扵囚奴而就之則扵美新安知其不為而為之亦豈有累㢤不曰堅乎磨而不磷不曰白乎湼而不緇顧在我者如何耳􅀂此者孔子所不􅀎免故扵南子非􅀁􅁒見也扵陽虎非所􅁒敬也見􅀁不見敬􅀁不敬此法言所謂詘身所以伸道者也然則非雄所以自見者欤孟子有言曰天下有道小德役大德小賢役大贒天下無道小役大弱役强二者皆天也順天者存逆天者亡而孔子之見南子亦曰予所否者天厭之天厭之則雄扵義命豈有不盡㢤又云介甫以謂雄之仕合扵孔子無不可之義夷甫以謂無不可者聖人㣲妙之䖏神而不可知者也雄德不逮聖人强學力行而扵義命有所未盡故扵仕莾之際不􅀎無差又謂以美新考之則投閤之事不可謂之無也夫孔子所謂無不可者則孟子所謂聖之時也而孟子歴叙伯夷以降終曰乃所願則學孔子雄以為太玄賦􅁛夷齊之徒而而曰我異扵是執太玄􅀆蕩然肆志不拘攣􅀆以二子之志􅁕以自知而任已者如此則無不可者非二子之所不可學也在我者不及二子則宜有可有不可以學孔子之無可無不可然後為善學孔子此言有以窹學者然不得施扵雄也前世之傳者以謂伊尹以割烹要湯孔子主癰疽瘠環孟子皆断以為非伊尹孔子之事盖以理考之知其不然也􅀚雄之􅀁既立故介甫以謂世傳其投閤者妄豈不猶孟子之意㦲鞏自度學毎有􅀁進則扵雄書毎有􅀁得介甫亦以為然則雄之言不㡬扵測之而愈深窮之而愈逺者乎故扵雄之事有􅀁不通必且求其意况􅀂雄䖏莾之際考之扵經而不繆質之扵聖人而無疑固不待議論而後明者也爲告夷甫或以爲盡願更䟽示與王向書鞏啓比得吕南公爱其文南公数􅁛吾子然恨未相見及至南豐又得黄曦復愛其文而吾子亦來以文見貺實可歎爱吾子與吕南公黄曦皆秀出吾郷一時之俊􅀻心喜􅇺何可勝言惟强扵自立使可愛者非特文詞而巳此鄙劣所望扵三君子也道中忽忽奉啓鞏啓上囬傅􅁠書鞏啓辱惠書及古律詩雜文指意􅀁出義甚高文辭甚美以鞏有郷人之好又扵聞道有一日之先使􅀗承重貺幸甚􅁕下論古今學者自守者少苟合者多則固然矣因以謂如鄙劣者􅀎知􅀁守則豈敢當抑足下欲勉之至此則豈敢怠足下之材可謂特出自强不巳則道德之㱕其孰可禦恨不相從不􅀎一二具道能㳂牒至此一相見否荒隅之中􅀌拙寡偶欽企欽企春睻餘保愛保愛不宣福州上執政書鞏頓首􅄪拜上書某官􅀼以先王之迹去今逺矣其可槩見者尚存扵詩詩存先王飬士之法所以撫循待遇之者㤙意可謂備矣故其長育天下之材使之成就則如蘿蒿之在大陵無有不遂其賔而接之出扵懇誠則如鹿鳴之相呼召其聲音非自外至也其燕之則有飲食之具樂之則有琴瑟之音􅀅其厚意則有幣帛箱篚之贈要其大㫖則未嘗不在扵得其懽心其人材既衆列于庻位則如棫檏之盛得而薪之其以為使臣則寵其徃也必以禮樂使其光華皇皇扵逺近勞其耒也則既知其功又本其情而叙其勤其以為􅀅率則扵其行也既送遣之又識薇蕨之姓生而恐其㱕時之晚及其還也既休息之又追念其悄悄之憂而及扵僕夫之瘁當此之時后妃之扵内助又知臣下之勤勞其􅁨思之深至扵山春石阻僕馬之間而志意之一至扵雖采卷耳而心不在焉盖先王之世待天下士其勤且詳如此故稱周之士也貴又稱周之士也肆而天保亦稱君能下下以成其政臣􅀎㱕美以報其上其君臣上下相與之際如此可謂至矣􅀁謂必本其情而叙其勤者在四牡之三章曰王事靡盬不遑􅀅父四章曰王事靡盬不遑􅀅母而其卒章則曰豈不懷歸是用作謌􅀅毋耒諗釋者以謂諗告也君勞使臣叙述其情曰豈不誠思㱕乎故作此詩之謌以飬父母之志來告其君也既休息之而又追叙其情如此繇是􅀚之上之􅀁以接下未嘗不恐失其飬父母之心下之􅀁以事上有飬父母之心未嘗不以告也其勞使臣之辭則然而推至扵成役之人亦勞之以王事靡監􅁨我父母則先王之政即人之心莫大扵此也及其後世或任使不均或苦扵征役而不得飬其父母則有北山之感鴇羽之嗟􅂉行役不巳而父母兄弟􅄐散則有陟岵之思詩人皆推其意見扵國風所謂發乎情止乎禮義者也伏惟吾君有出扵数千載之大志方興先王之治以上継三代吾相扵時昔同德合謀則􅀁以待天下之士者豈異扵古士之出扵是時者豈有不得盡其志邪鞏獨何人幸遇兹日鞏少之時尚不敢飾其固陋之質以干當世之用今齒髪日衰聦明日耗令其至愚固不敢有徼進之心况其少有知邪轉走五郡盖十年矣未嘗敢有半言片辞求去邪城之任而冀陪朝廷之儀此鞏之􅀁以自䖏藕計巳在聴察之日乆矣今輙以其區區之腹心敢布扵下執事者誠以鞏年六十老母年八十有八老母寓食京師而鞏守閩越仲弟守南越二越者天下之逺䖏也扵著令有一人仕扵此二􅀖者同居之親當逺仕者皆得不行鞏固不敢爲不肖之身求自比扵是也頋以道里之阻既不可御老母而南則非獨省晨昏承顔色不得効其犬馬之愚至扵書問徃還盖以萬里非累月踰時不通此白首之母子所以義不可以苟安㤙不可以苟止者也方去歳之春有此􅀖之命鞏敢以情告扵朝而詔報不許属閩有盗賊之事囙不敢継請及去秋到職閩之餘盗或数十百爲曺伍者徃徃蟻聚扵山谷桀􅀧䏻動衆為魁首者又以十数相望扵州縣閩之室閭莫䏻寕而逺近聞者亦莫不疑且駭也州属邑又有出扵饑旱之後鞏扵此時又不敢以􅀻計自陳其扵冦孽属前日之屡敗士氣既奪而吏亦無可属者其扵經营既不敢以輕動迫之又不敢以少縱玩之一則諭以挌納一則戒以前除既而其悔悟者自相執拘以㱕其不変者亦為士吏之􅀁係􅀗其魁首則或糜而致之或殱而去之自冬至春逺近皆㝎亭無抱鼓之警里有室家之樂士氣始􅁬而人和始洽至扵風雨時􅀂田出自倍今野行海渉不待朋儔市粟面米價减什七此皆吾君吾相至仁元澤覆冐􅀁及故㓂旱之餘曽未㫷􅀊既安且富至扵如此鞏與斯民與䝉其幸方地数千里既無一事繋官扵此又已彌年則可以􅀅母之心告扵吾君吾相未易扵此時也伙惟椎古之􅀁以待士之詳思劳㱕之詩本士大夫之情而及扵其親逮之以即乎人心之政或還之闕下或䖏以閑曺或引之近畿属以一郡使得諧其就飬之心慰其高年之母則仁治之行豈獨昏愚得蒙賜扵今日其流風餘法傳之永乆後世之士且􅀅頼此其無北山之怨鴇羽之譏陟岵之歎盖行之甚易為徳扵士䫋者甚廣惟留意而圖之不宣鞏頓首元豊􅀋藁卷第十六
