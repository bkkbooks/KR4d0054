front:
  text: 重刋南豐文集序南豐先生以文章名天下乆矣異時齒髪壮志氣銳其文章之慓鷙奔放雄渾瓌􅊆若三軍之朝氣猛獸之抉江湖之波濤煙雲之姿狀一何竒也方是時先生自􅀒要似劉向不知韓愈爲何如爾中間乆外徙世頗謂偃蹇不偶一時後生軰鋒出先生泊如也晚還朝廷天下望用其學而屬新官制遂掌書命扵是更置百官舊舎人無在者巳試即入院方除目填委占􅁓肆書􅀄􅀂不經意午漏盡授草院吏上馬去凡除郎御史數十人􅀁以本法意原職守而爲之訓敕者人人不同咸有新趣而衍􅁉雅重自成一家始予而為尚書郎掌付制吏部一日得盡觀始知先生之學雖老不衰而大手筆自有人也嗚呼先生用未極其學巳矣要之名與天壤相弊不可誣也王三槐序重刋南豐文集序畢南豐先生年譜序丹陽朱熹曰予讀曽氏書未嘗不掩卷􅆸書而嘆何卋之知公淺也盖公之攵高矣自孟韓子以来作者之盛未有至扵斯夫其􅀁以重扵世者豈苟而云㢤然卋或徒以是知之故知之淺也知之淺則扵公之事論之猶不􅀎無􅀁牴牾而况扵公之􅀁以為書者宜其未有知之也然則世之自以知公者非淺而望與其可嘆也巳公書或頗有􅀊月參以史氏記及他書舊聞次之著于篇年譜序畢南豐先生年譜後序丹陽朱熹曰世有著書􅁛公文章者予謂庻㡬知公求而讀之湫然卑鄙知公者不爲是言也然則世之自以知公者何如哉豈非徒以其名歟予之說於是信矣其􅀃又以謂公爲史官薦邢恕陳無巳爲英録檢討而二子者受學焉綜其實不然盖熈寜􅀄詔開實録院論次英宗時事以公與檢討一月免豈公於是時而能有以薦士或其不然一也恕治平四年始登進士第元豐中用公薦爲史舘檢討與修五朝國史其事見扵實録矣爲實録院檢討而與修英録於熈寜之􅀄則未有考焉其不然二也師道見公於江漢之間而受教焉然竟公時為布衣元祐中乃用薦起家為郡文學是公於史舘猶不得以薦之况熈寜時豈有撿討事㢤其不然三也一事而不然者三則公所以教恕者其在元豐史舘之時乎未可知也此予所謂牴牾者斯人為世所重又自以知公故予不得不考其實而辨其不然者其書世或頗有以故不論著其是非者焉南豐先生年譜後序畢南豊􅀋藁目錄卷之一
