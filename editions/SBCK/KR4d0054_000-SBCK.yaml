body:
  text: 古詩冬望一鶚宿尊勝院苦雨里社南源荘論交南軒兵間種園歎嗟􅀉孫之翰豪傑侯􅍮黃金楊顔橙子山檻小飲胡使上翁嶺雜詩四首􅁒求天下友冬暮感懐􅀉舎弟至荷湖二首詠雪送徐竑著作知康州寫懐二首茅亭閑坐靖安幽谷亭青雲亭閑㘴卷之二古詩􅀉子進弟喜寒詠史二首江湖遂書懐别詠雪荅裴煜二首􅀉王介卿上人􅀄夏有感之南豊道士􅀉介甫送人移知賀州謝章伯益惠硯送劉醫愽送陳啇學士雪詠送僧暁容送叔延判官山茶花丁亥三月十五日舎弟南源刈稻奉和滁州九詠九首并序瑯瑘泉石􅂐逰瑯瑘山㱕雲洞瑯瑘溪班春亭庻子亭石屏路慧􅁴方丈幽谷晚飲卷之三古詩逰麻姑山桃花源丹霞洞半山亭顔碑碧蓮池流杯池七星彩瀑布泉秋懐送歐陽員外㱕覲滁州舎人一晝千萬思送鄭秀才荅􅀁􅂆炙菊花荅石秀才月下冬暁書懐東津㱕催呉秀才􅀉酒送呉秀才和章友直城東春日簡如晦伯益高松青青間青青洪州詠史二首泝河尹師魯北風發松門􅀉介甫過彭澤江上懐介甫讀五代史庭木發彭澤菊花落葉舞鶴卷之四古詩降龍湘冠地動邉捋多雨秋日山水屏八月二十九日小飲食棃追租桐樹九月九日路中對月聴鵲􅀉家人讀書雜詩五首戯呈休文屯田與舎弟别舟岸間相望感嘆成詠送宣州社都官東軒小飲呈坐中麻姑山送南城尉羅君明妃曲二首喜二第侍親将至七月一日休假作秋夜李氏素風堂秋聲七月十四日韓持國直廬同􅀚山海經戯書李莭推亭子秋夜露坐偶作韓玉汝使㱕苦􅀬過介甫過介甫㱕偶成合醬作送章㜈州瞿祕枝新授官還南豊卷之五古詩送程公闢使江西遊金山寺作荅葛藴南湖行二首種牲丹西湖二月二十日北湖百花隄芙蓉亭秋懷二首送李撰赴舉送韓玉汝招隠寺壽丘山送豊稷不飲酒􅀄發㐮陽携家夜登現山置酒高陽池道鹿門不果漢廣亭聞喜亭劉景升祠隆中蔡州谷隠寺萬山題張伯常漢上茅屋漢陽泊舟移守江西先􅀉潘延之莭推鄖口促促為物役鴻鴈喜晴詶王正仲登嶽簏寺閣見􅀉暁出訪石僊岩杜法師和貢甫送元考不至京師􅀚音院新堂卷之六律詩郊祀慶成詩仁宗皇帝挽詞三首英宗皇帝挽詞二首詩慈聖光獻皇太后挽詞二首送英州蘇祕丞送陳􅀰中還京兼過九江新宅遣興楚澤西亭盆池羈遊南軒竹浮雲樓和趙嘏照影亭晚望書閣贈彈琴者􅀉孫正之簡翁都官秋日感事示介甫陳祁秀才園亭上柱相公胡大􅀓挽詞二首詶林叔江西道中作送􅀟漸之漢陽孔明閑行贈安禪懃上人贈護仁監院送斍祖明上人謁李白墓送撫州錢郎中送王汝使两浙簡景山侍邵丁元珍挽詞二首送李莘太傅逰天章寺送関彦逺送関逺江西西園席上送孫穎賢送鄭州邵資政看花送任逹度支監嵩山崇福宫㑹稽絶句三首送趙資政過高士坊餘杭乆旱趙恱道入境之夕四郊雨足二首錢塘上元夜祥符寺陪咨臣􅀰中文燕席送沈諌議詶王徽之汴中見贈􅀉鄆州邵資政和邵資政和孔教授喜雪二首孔教授北園晚歩郡齋即事二首憶赴中梅􅄪賦喜雪􅀉致士歐陽少師卷之七律詩冬夜即事詶介甫還自舅家書􅀁感西湖二首早起赴行香席上和陳􅀰中雪後舜泉閱武堂還波亭鵲山亭芍藥廰水香亭静化堂仁風􅈦凝香齋閱武堂下新渠北渚亭芙蓉橋百花䑓次道子中書問㱕期霧松正月六日雲齊􅀉顧子敦二月八日北城閑歩詠柳北園㑹客不飲西湖納凉喜雨次李秀才得魚字韻次綰得風字韻次維得禽字韻次維得花字韻到郡一年孔教授張法曺以曽論荐特示長牋酬强幾聖人情􅀉王樂道戯書贈張濟北渚亭雨中送趙資政趵突泉金線泉北池小㑹送韓延評鵲山􅀉孫莘老湖州墨妙亭華不注山靈岩寺兼簡重元長老二劉居士和孔仲平群樓鮑山鄆州新堂垓下􅄐齋州後五首􅀉齊州同官庭檜呈蒋頻叔甘露寺多景樓孫少􅄒示近詩兼仰高致金山寺卷之八律詩高郵逢人約㐮道之陽彭城道中送程殿丞還朝送扁衩丞雨中王駕部席上贈張伯常之郢見過囙話􅍮楚故事仍貺佳什伯常少留别業􅀉詩索酒因以奉報贈降降自宜城赴官許昌招澤甫竹亭閑話和鄭㣲之送陳世脩和張伯常自郢中将及敝境先􅀉長句和張伯常峴山亭晚起元韻峴山亭置酒韓魏公挽歌詞二首訓呉仲庻龍啚􅀊春感懐陳君式㳟軒贈正􅀝大師庵居詶江西運使蒋頴叔以白山茶􅀉呉仲庻見貺佳篇依韻和詶刀景純挽􅁔詞二章􅀉留交代元子發逰東山示容大乗寺聖泉寺昇山靈岩寺鳯池寺上元元沙院酉州柳􅀦傳旬休日遇仁王寺閠正月十一日㠯殿丞􅀉新茶亂山親舊書報京師盛聞治聲􅀉獻新茶方推官􅀉新茶嘗新茶厚卿子中使高麗出郊蹇磻翁􅀉新茶二首城南二首寒食夜出過利渉門夜出城南儔雨西楼荔枝四首北㱕三首和酬孫少述和孫少述侯職方同燕席􅀉趙宫保和訓趙宫保致政言懐二首和趙宫保别杭州過靈璧張氏園三首靈毫州送元厚之資政致仕㱕蘇壽聖院昌山主静軒鶴林寺送関彦逺赴河北正月十一日迎駕呈諸同舎和御製上元􅀚燈和史綰相公上元􅀚燈集英殿春燕呈諸同舎上巳日瑞聖園錫燕呈諸同舎池上即席送况之赴宣城題饒君茂才葆光庵朝退即事呈大尹正仲龍圖卷之九論唐論為人後議公族議講官議救灾議卷之十傳洪範傳進太祖皇帝総序状太祖皇帝総叙卷之十一序新序目録序梁書目録序列女傳目録序禮閣新儀目録序戰國䇿目録序陳書目録序唐令目録序南軒齋目録序徐幹中論目録序􅀃􅁐目録序鮑溶詩目録序卷之十二序李白詩後序先大夫集後序王深父文集序王子直文集序王容李文集序范貫之奏議集序王平甫文集序强㡬聖文集序思軒詩序卷之十三序越州鑑湖圗􅀋要序相國寺