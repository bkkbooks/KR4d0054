front:
  text: 元豐􅀋藁卷之六
  hash: sha256:26efaae07e33ed954905023edcbc80b9c9dca5f859a72b3a1b3c5ea28463f569
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_006-1a}
body:
  text: 律詩郊祀慶成詩進狀右臣伏以皇帝陛下嗣位之􅀄郊見上帝聖意重慎齋潔謹嚴始就惟宫則獨先群臣宵興待事及至壇塲則陟降陛級徹去䄄藉至於薦獻之際則又端立以湏不肯即安退就便㳄所以至誠兢兢如此故得天地祖宗飬顧臨饗華夷蠻貊􅀚聴欣喜惟􅀄積隂乆而未觧及輅車旣駕則天字湛然日光明閏可謂能得使之主􅀕而百神享之福合於天且不違之聖宜有歌頌􅀍於聲律臣與在舘閣以文字爲職不敢以菲薄自止謹作五言郊祀慶成詩一首凡一百二十字干冐宸嚴臣無任惶恐激切屏營之至謹隨狀上進以聞詩即作謳歌後欽柴禮數新盛容超曠代樂貢盡殊隣􅀫戒臨行殿宵興絶衆臣立湏空便次歩進却柔䄄外物雖多品天心在一純高靈終享徳群望亦依仁暗藹如無間遅延􅀂可親欲知精意荅預覩大和臻積曀沉遥甸浮陽上綺霱雲生斐亹愛景駐逡廵厚慶㱕清廟餘釐及兆人還宫動前蹕喜氣入韶鈞仁宗皇帝挽詞三首納諌終無梧知人乆更明恩波通四海夀域載群生異俗衣裳㑹諸儒雅頌聲威靈空想象盛徳詎能名日轉㱕人外天移入畫中冕旒餘澤在警蹕舊儀空卜宅三州繞方䘮萬里通􅀄寒石門路松檜䬃悲風滄海難囬日青雲如送春服䘮三月偏遏樂四夷均感格英靈在襃􅀭大號新依然社稷計王業付真人英宗皇帝挽詞二首巳應南陽氣猶遅代邸來範鎔歸獨化綱理付群材禹㑹方無外虞廵遂不回空驚栢城仗簫鼓送餘哀継文猶旦暮歸啓巳謳吟畫手􅀓英氣書筠見徳音鑄銅餘故鼎啄草付春禽試望橋山路蕭蕭翠栢深慈聖光獻皇太后挽詞二首井進狀右臣伏以大行皇太后在位四十有七年身䖏宮闈聦明慈恕㳟儉之徳見於天下洽於衆論在仁宗時有輔佐相成之道在先帝及陛下之日非特始終孝愛兩義俱隆實有援立鎮撫之大功在先帝之世􅀙􅁠當國既而還政以時明識獨見出䖏應理自二帝三代秦漢以來母后功徳未有巍巍如此奄盡大期群情痛怛陛下執䘮哀慕外雖易月内盡至性報復大恩誠禮備極盖從古所未聞今山陵有日臣愚淺薄無以自効謹撰成大行皇太后挽詞二首繕寫上進臣無任悲哀感咽之至謹具狀奏聞謹狀詩祖烈鷹􅀭終食冀家聲泉湧舊興譙人倫風化歸三世王室功勞屬兩朝長信深嚴餘羽衛閟宫崇大列宗祧衣冠藉藉談遺事不盡鴻名對永昭山河徳履孚潜顯江漢仁風􅀍邇遐巳輔乾坤成化育終符日月継光華和熹未窹還威柄明徳猶踈抑外家欲次微音難髣髴空餘流恨入哀笳送英州蘇祕丞逺民歌舞戴升平碧閣朱楼照眼明郷饌􅀨餘收白蕈客罇秋後對紅英瀧鳴真水遥通海路入南山不隔城材術如君有餘暇出遊應數擁􅀟旌送陳郎中還京兼過九江新宅艤舟金碧照溪沙㠶上風吹五兩斜罷郡紫泥催向闕過江紅斾引還家因將舊社人携酒應喜新林􅀣見花莫作山齋乆留意中䑓虗位有青華遣興安州十首青燈闘䑕窺寒硯落月啼烏送逈笳江漢置身貧作客溪山合眼夣還家百憂忽忽丹心破萬事悠悠兩􅁂華誰與建㠶先度鳥更無留滯向天涯楚澤楚澤方􅈵白霧根盈虚無䖏問乾坤虫虫旱氣連年有寂寂遺人㡬户存盗賊恐多從此始經綸空建與誰論諸公日議雲䑓上忍使憂民獨至尊西亭團扇頻揮到此亭他郷愁坐思􅁳􅁳空羞避俗無高節轉斍逢人􅁖獨醒􅀊月淹留随日老乾坤狼狽㡬時寕欲知事事今何似萬里波濤一􅀧萍盆池環環清泚旱猶深柄柄芙蓉近可㝷蒼壁巧藏天影入翠奩微帶蘚㾗侵能供水石三秋興不􅀒江湖萬里心照影獨憐身老去日添華髪巳盈簮羈遊麄飯寒虀且自如欲將吾道付樵漁羈遊事事情懐􅁖貧病年年故舊踈自古幸容元亮醉凡今誰喜子雲書何由得洗塵埃盡恣買滄洲結草廬南軒竹宻竹姢姢数十莖旱天蕭洒有高情風吹巳送煩心醒雨洗還供逺眼清新筍巧穿苔石去碎隂㣲破粉墻生應須萬物冰霜後來看琅玕色轉明浮雲楼和趙嘏萬里聊供逺眼開簷前不盡水聲哀朝雲尚拂陽䑓去羽獵曽圍夣澤來觧帶欲留長日坐傾壷難飲故人杯邅窮萬里飄萍内到此登臨更㡬回照影亭河流縈檻色輝輝無數幽禽入鏡飛巳映渚花紅四出更濁沙柳翠相圍不欺毫髪公雖有太盡妍􅃖道恐非自􅀏病容随歩見未衰華髪滿緇衣晚望蠻􅍮人事㡬推移舊國興亡欲問誰鄭䄂風流今巳盡屈原辭賦世空悲深山大澤成千古暮雨朝雲又一時落日西樓慿檻乆閑愁唯有此心知書閣自憐野性生来拙誰許交情晚最淸世路因仍憂檻穽他郷衰暮傍風塵惟􅀅菽藿還求志未有秋毫可爲人一畒蕭然須暫得欲偷閑日長精神贈彈琴者至音淡薄誰曽賞古意飄零自可憐不似秦筝能合意滿堂傾耳十三弦􅀉孫正之邈癯心苦氣飄飄長餓空林不可招能舉丘山惟筆力可磨雲日是風標詩篇綴緝應千首斈術窺㝷豈一朝耳冷髙談經嵗逺江南春動雪還消秋日感事示介甫秋日氣已盛隂蟲朝暮聲煙雲断溪􅀣風雨入山城沙磧有遺虜旌旗多逺行生民苦未息吾黨耻論兵簡翁都官倦遊公府曵長裙􅀏上扁舟指舊廬自有文章真􅂎􅎚不湏彫琢是璠璵浮蛆滿瓮甞春酒垂露臨窓理素書况得君賔同壯節一郷清問更誰如陳祁秀才園亭眼無塵􅁟境殊清一繞芳蹊病体輕煙􅀣疑􅀙古􅀞見水軒真在碧天行君能極巧安山勢我欲忘歸聴竹聲只恐主人難住此弟兄佳行滿郷評上杜相公水爲舟楫旱爲霖社稷生民注意深豈謂便辭貢閣議飜然求就紫芝吟始終好古儒林士進退憂時國老心只有功名随日逺不令功􅀍管絃音胡大􅀓挽詞二首讜言㽞簡􅉺㳟徳載閨門福履三朝盛官儀一品尊九原無復起萬事付誰論不必諸儒記清名乆自存逺略參基命雄文入典章輤車俄就路瑞節始還郷象物陳虚􅃦哀歌􅀉莫觴惟應九原上松檜日蒼蒼詶林叔江西道中作枉渚荒源百里間草根輕燒舊㾗乾入陂野水冬來淺對􅀣諸峯雪後寒塢笛最宜風外聴嶺梅􅀄得醉中看行㝷故友心無事不斍西遊道路難送􅀟漸之漢陽楚國封疆最上流夾江分命兩諸侯何年南狩東檣出六月西來雪浪浮夏口楼䑓供夕望秦州風物待春遊可能頻度漁陽曲不􅀒當年鸚鵡洲孔明稱呉稱魏已紛紛渭水西邉獨漢臣平日將軍不三顧㝷常田里帶經人閑行草軟沙匀野路睛竹技烏㡌稱閑行鳥啼緑􅀣穿花影風出青山送水聲轉斍所憂非巳事儘􅀙多難見人情閑中我樂人應􅀏忙䖏人争我不争贈安禅懃上人詎知蕭洒吾廬舊却有髙明此寺隣水竹迸生剛節老秋山過抱翠嵐新惟憐季子歸來困自􅀏原思乆更貧深識幽人風義厚掃軒開榻最相親贈護仁監院人貧㪯世今為甚僧事新年始更多食糲衣穿雖擾擾搆虚基險自峩峩誅茅改築君􅀄有繫馬長吟我暫過但斍滿山金碧澗不知誰到為煙蘿送斍祖明上人冠石新墻日月回豊堂􅅛殿起崔嵬鍾随秋􅀔金聲壯佛􅀮寒雲玉坐開流水逺奔􅀟澗去平林髙擁四山來麒麟細草東南路一望松門意自哀謁李白墓世間遺草三千首林下荒墳二百年信矣輝光争日月依然精爽動山川曽無近屬持門户空有郷人拂几筵顧我自慚才力薄欲將何物吊前賢送撫州錢郎中名郎元是足風流得郡東南地更幽翠幕管絃三市晚畫堂煙雨五峯秋黄柑巧綴星垂檻香稻匀翻雪滿甌應與謝公資徤筆􅀖人才薄詎能詶送玉汝使兩浙使傳東馳下九天此􅀖曽屈試鳴絃仁聲又向新年入惠澤猶爲故老傳翠巘煙雲生席上滄􅈚風雨到罇前經營智略多餘暇賞燕誰酬白雪篇丁元珍挽詞二首翰墨金聲逺神清玉氣温節㢘貧愈見風義老彌惇舊學資詳正新儀屬討論誰憐一麾出終不反􅁱門從軍王粲筆記禮后蒼篇謾有殘書在能令好事傳鵩來悲四月鶴去遂千年試想長橋路昏昏隴隧煙簡景山侍御長年心事最相親一􅀏相踈忽数旬栢府地嚴方許國芸䑓官冷但容身飢膓漫竊公厨膳病髪難堪客舎塵還有鹿門棲宿興想君他日肯爲隣送李莘太傅郪道鳴絃去容䑓抱蕝􅀄塵沙開祖帳氷雪缺征車乆待連城價誰騰一鶚書君王覧豪俊應復召嚴徐遊天章寺藍轝朝出踏䡖塵拂靣􅆴􅆴柳色新曲水豈能㽞徃事南湖空觧照人行最冝靈運登山屐不􅀒淵明漉酒巾老去飄零心未折暫湏同醉海邉春送関彦逺莫辭爲我百分飮從此送君千里行物情簮屨尚湏念人道交親那可䡖渚海江柳弄佳色林鳥野蜂吟好聲對之但醉餘可置明日此盃誰共傾送関逺赴江西食蘖飮冰廉士操敝衣穿履古人風溪堂興足登臨後滕閣今歸嘯傲中一榻髙懸賔閤峻二龍俱化縣池空因過勝境湏行樂驛召方當急詔東西園席上省閣名郎國羽儀瀛洲仙客衆蓍􅀛山蹊向日花開早海聚經寒酒熟遅下榻􅀏談紅斾􅅯引觴醒醉玉􅁫随唯慙别乘踈頑甚滿足塵埃更有詩送孫頴賢在秦州穣穰春州鐵馬群青衫吾子仕猶屯高談消長才驚世藐視公侯行出人古氣欲遵奔日月畏塗曽觸滯荆榛明夷夬决應斟酌自向窮通有屈伸送鄭州邵資政江夏無􅀟譽菑川第一才笑談成黼藻咳唾落瓊瑰紫氣降鋩露青􅄀羽翼開儁遊追幙府髙歩集蓬萊探討篇章洽研磨術業該九霄新漢邸萬目注梁䑓選擇真儒用招延急詔催衣冠驚角綺賔友重鄒枚每右横經席寕虚置醴杯八荒披日月萬里散雲雷始去東山榜俄參北斗魁廟堂竒計得􅆧虜鷙心摧帝念人求舊期須汝作梅避榮言屢切請外志難囬際海歸討略連呉入剸裁夕冰承命出晝錦過郷來許國風猷壯容民宇量恢節旄恩換鎮京室地稱陪賜覲親中扆通班接上台壼􅄴空度洧公位在三槐看花春來日日探花開紫陌看花始此囬欲賦妍華無徤筆擬酬芳景怕深盃但知抖藪紅塵去莫問鬅鬙白髮催更老風情轉應少且邀佳客試徘􅆦㑹稽絶句三首花開日日去看花遲日猶嫌影易斜莫問㑹稽山外事但將歌管醉流霞花開日日挿花歸酒盞歌喉䖏䖏随不是心閑無此樂莫教門外俗人知年年榖雨愁春晚况是江湖兩􅁂華欲載一鐏乗興去不知何䖏有殘花送任逹度支􅁥嵩山崇福宫漢陽門下士車􅀐幕中賔志節􅀄皆壯風流乆更新摳庭承逺泒即位襲清塵雅淡琴聲古温純玉性真詩書來射䇿慈惠起臨人淮海褰帷乆褎斜叱馭頻政平無横吏刑省絶􅁈民汴路揚旌出呉門擁節廵持􅁠心似水待物氣如春懋徳垂承詔遺榮遽乞身行髙寕繫俗道勝不憂貧地絶分琳舘西歸近紫宸鴻飛開羽翼􅂹逸露精神却理煙霞宅重㝷水石隣青嵩銷鶴怨碧落見鷗馴故友欣聮壁諸儒慕墊巾斈兼鴻寳異興與赤松親激􅂆留方􅉺驚傳動縉紳浮雲雖杭意反席正逢辰秪恐尊㢘退丁寧致軟輪送趙資政好問逢真主能言邁古風犯顔天意沃造􅂰衆情通弹治心忘􅀔澄清􅁩匪躬朝廷推􅃌佞都邑避乗騘白簡威方厲青規遇更隆析符霄漢上開幕斗牛中里聚追胥息階庭訟銗空紀綱官特峻帷幄地彌崇吏治連成肅倉儲絕塞充錦官清鎮俗玉壘静臨戎膏澤􅉼荒阻春陽煦滯窮鈞衡求雋望􅀛筮恊淵􅂨間出干齡合平居一徳同股肱康事力舟楫濟川功逺大經綸畧精㣲獻替忠夕冰分外閫晝錦過江東比户仁聲入提封喜氣融信深銷衆偽明盛破群􅂪正洽謳歌羙俄更節制雄保民追吕尚分􅁟継逢公淄水移幢碧牛山駐斾紅魚鹽方舸集綺綉萬箱叢少憇驅千􅀐行歸冠百工衮衣天下詠豈獨是倥侗過髙士坊一畆蕭然絶世喧抗懐􅄼肯就籠樊功名晚更為餘事菑異􅀄嘗出至言郡閣巳空徐孺榻里人猶識鄭公門斯文未䘮如繇我後代當知李仲元餘杭乆旱趙恱道入境之夕四郊雨足二首連章天上乞身閑􅀏入呉船擁莭還一夜風雷驅旱魃始知霖雨出人間旌旗東下路塵開六月風雲席上回正恐一方人暍死直􅀅霖雨過江來錢塘上元夜祥符寺陪咨臣郎中文燕席月明如晝露華濃錦帳名郎􅀏語同金地夜寒消羙酒玉人春困􅀝東風紅雲燈火浮滄海碧水楼䑓浸逺空白髪蹉跎􅂬意少強顔猶入少年叢送沈諌議東南經濟得時􅀏方底除書下漢庭􅀅幕鼓旗驚白晝諌垣冠劒動青㝠指撝甌越㱕談􅀏鎮壓江呉出醉醒金䁀塩梅湏大用九霄應已夢儀形詶王徽之汴中見贈黄流渾渾來沙際佳氣忩忩近日邊河漢槎雖通逺客蓬萊風未縦㱕船山城劇飲銷紅燭水驛高吟襞彩牋老去相逢情自宻不関清賞合留連􅀉鄆州邵資政􅂪問敝邑山之之景見索君詩重意之辱謹吟二百守上􅀉鈆筆讐書客朱􅙲守􅁟臣素餐方側席黄髪巳侵巾喜有山圍郭仍憐水滿津清華閑耳目蕭洒長精神秀色秋來重寒聲雨後新􅀫雲依户牖流月過松筠北圃分殊境西湖断俗塵渚花紅四出沙鳥翠相新芡老含珠實魚驚躍錦鱗飛梁凌窅􅆌虚榭壓奫淪嶺對横􅁱竹洲分抱白蘋靜宜人事拙閑覺道膄真器小難周物官㣲幸此身簿書偷暇日杖屦想幽人泝險飛逰艇探竒􅃞釣緍形縻甘鶴怨心泰得鷗馴督府恩容乆芳牋訊問頻門庭嚴衞㦸尊爼從華紳却起烟霧興還思水石鄰自􅅓田父樂郍可薦鴻鈞和邵資政拂衣乆欲求三徑􅀼食聊湏把一麾世路賤貧從所好老年􅅐臆固無竒樊籠偶得滄洲趣蕪累難醻白雪辭督府繇來恩禮厚毎容啇也與言詩和孔教授治煩方喜衆材同坐嘯南陽郡閣中几案有塵書檄簡里閭無事稻粮豐衣冠濟濟歸儒學爼豆詵詵得古風􅄑屈異能來助我敢􅀅顔色在鴻鴻喜雪二首欲休還舞任風吹断續繁雲作陣随巳塞茅蹊人起晚更迷沙渚鳥飛遅混同天地歸無跡潤色山川入有為太守不辭留客醉豊年佳兆可前知雜雨零􅀄急因風洒莫狂英華傾月窟光氣㵼天横宛轉花飛宻紆餘舞態長化財随大小成噐任園方秀色滋山國清􅀹􅂇水郷色嚴齊上下明盛析毫芒閏屋情誇誕埋輪興激昻收功歸澤物全徳在包荒預喜倉箱富潜知海嶽康蕭晨迎賀客歌吹趣傳觴雪後同徐祕丞皇甫節推孔教授北園晚歩沙草正黄瀕海意江梅還白故園情循除逺水春前急繞郭空山雪後明檄影易斜寒日短角聲吹去暮雲平最慙佳客忘形契肯伴哀翁着屐行郡齋即事二首􅀞㦸森門寵誤􅂪從來田舎一哀翁囷倉穣穰逢康􅀊閭里恂恂有古風􅗎氏宿奸投海外伏生新學始山東時大奸周高投海島而斈挍講說尚書依然自昔興王地長在南陽佳氣中滿軒山色長浮黛繞舎泉聲不受塵四境帶牛無事日两衙封印自繇身白羊酒熟􅀄看雪黄杏花開欲探春緫是濟南為郡樂更將詩興属何人憶赴中梅浣沙亭北小山梅蘭渚移來手自我今日舊林冰雪地泠香幽艶向誰開􅄪赴喜雪六花飛舞􅀔蹁躚􅀧綴寒林熊更妍山險龍蛇盤鳥道野平江海變畬田人狂奔月非関夜馬徤乘雲别有天况值白羊新酒熟可􅀎相就慶豐年􅀉致士歐陽少師四海文章伯三朝社稷臣功名垂竹帛風義動簮紳此道推先􅁴諸儒出後塵忘機心皎皎樂善意諄諄大畧才超古昌言勇絶人抗懐䡖紱冕􅄋懇謝陶鈞耕稼歸莘野畋漁返渭濵五年清興屬一日壮圖伸北􅊴恩知舊東宫命数新鸞凰開羽翼􅂹騄放精神曠逹林中趣高閑物外身揮金延故老置驛􅀱嘉賔主當西湖月勾留頴水春露寒消鶴怨沙静見鷗馴酒熟誇浮蟻書成感獲麟激昻踈受晚冲淡赤松親龍臥傾時望鴻􅄀聳士倫少休均逸豫獨徃異沉淪筞畫咨詢急儀刑矚想頻􅀿湏恊􅀛筮更起爲生民元豐􅀋藁卷之六
