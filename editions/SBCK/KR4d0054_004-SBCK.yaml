front:
  text: 元豐􅀋藁卷之四
  hash: sha256:5021a37620b335ab15c8fddb40b22de3e2e4b19fd956199db057e069a08958d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_004-1a}
body:
  text: 古詩降龍降龍左右施􅁭􅅂兩廊夾廟深渠渠禮下天子一等爾衣服君䖏何其殊文旛列㦸照􅀻第青紫苦􅀂官其孥先後熒煌首珠翠侍者百十顔温瑜凝寒堕指􅀬侵骨一宴百盞傾金壶窮民疾首望雨露太上欲􅀝攀姚虞君胡為乎日時病槖鍼襆艾恬以愉生前赫赫浪自重身後没没寧非愚湘冠衡湘有㓂未誅剪殺氣􅏮凛圍江潯北兵居南匪便習􅀂以大舶乗高岑傖人操兵快如鶻千里其旅巢深林超突溪崖出又伏􅀔變不易施戈鐔􅀎者張弓入城郭連邑累鎮遭驅侵群黨争誇殺吏士白骨棄野誰棺衾􅆛貅数萬􅀡何用月費空巳逾千金楚爲貧郷乃其素應此調彂寧􅀎禁捷如馬援不得志強曵两足登嶔崟烏蟻睢盱􅀝嵓險此虜難勝端非今較然大體著方冊唯用守長懐其心祝良張僑乃真選李瑑道古徒爲擒嗚呼廟堂不慎擇彼士齪齪何䏻任大中咸通乃啇鑒飬以􅀊月其憂深願書此語致太史獻之以􅀘丹扆箴地動居聞元氣判爲二升降相輔非相傷今者無端越疆畔隂氣熖熖侵於陽陽􅀵剛明避其􅀔隂􅀒捷勝􅀹倡佯地乗是氣抗於下震盪裂拆􅆾其常齊秦晋代及荆楚千百其堵崩連牆隆丘桀屋不自定翩􅀂猛吹揺旌幢生民洶洶避其所如寄厥命於湖江有聲四出嘻可怕誰擊萬鼓何雷硠隂為氣静乃如此天意昧宻寧􅀎詳或去蛮夷尚侵軼已事豈必垂灾祥意者邪臣有專恣氣象翕翕難為當㩀經􅀂此非臆决皎如秋日浮青霜祖宗威靈陛下聖安得􅀡語聞明堂朝廷肅穆法度治豈用懔懔憂胡􅆧邉將太祖太宗􅀎得人長壘横邉遮虜塵太傳李漢超侍中何継筠二子追接呉與孫鎮齊撫棣功業均卓㢤相宗信英特明如秋泉断如石一朝出節合二子口付心随断纎惑靡笄之旁郡城下酒利啇租若山積二子開庫㗖􅀾士以屋量今剰量帛洪濤入坐行酒杯牛胾羊蒸委􅀂􅁅􅀊費巨萬不計籍􅀾士歡酣氣皆百二子按轡行邉隅牙纛宛轉翻以舒汛掃沙磧無纎埃塞門千里常夜開壮耕老餔安且愉桑麻蔽野華芬敷濟南逺清書樂石百井夜出催窮廬神㦲祖宗知大体趙任李牧真如是漢文齷齪豈足􅁛郎吏致激靣汙騂當今􅏔夷乆偈蹶兵如疽癰理湏决堂堂諸公把旄􅃏碩䇿神韜困覊細祖宗憲度存諸書炉􅀂白日明天衢國容軍政不可亂薦此以爲陛下娯多雨嗟江之濵地多雨冬雷不收開蟄户隂氣濁晦化爲霧或雲於山水礎雜花萬株紅與紫臘吹風吹開不可数入春十日寒始至春氣欲歸客格住群山巉空雪相亘􅅦折草木何可禦霖傾潦洶那復止穹林大丘滅無渚及今孟夏理冝􅀬重䘮無温坐當午四時云然了安謂吁吾有愁誰可語秋日隂氣先嬴縱秋􅀬時莭有㡬相與奪情知赫日不可乆須聴西風生木末浮雲滿天明復暗天意自然如慘怛園林秀色已漸失次苐豈能無葉脫南山獨佳不可挫氣象更清連日月燕飛度海向何䖏今去昔來真可劣綉簾錦幕不筭重從此朱門戒霜雪誰憐丱角歌者哀􅀊􅀊苦貧思短􅄄山水屏呉縑落寒機舒卷光亂目秋刀剪新屏尺寸随折曲搜羅得􅎇匠徙􅀝思先屬經營頃刻内千里在一幅定眎乃漸通紀一作悉數難迫促山亂若無窮􅀒抱頗重複高稜最當中桀大􅀔􅀹獨囬環衆峯接趨向􅀂奔伏矜雄跨九州争險桂星􅀫􅀷疑雪霜積暗覺烟霧觸泉源出青􅄀漲潦兩崖束歴逺始紆徐􅂀别輸衆谷輕舟􅃞其間㳂泝無緩速微㝷得􅁱逕側起破蒼麓逺到無限極窮升犯雲族遊子定何之顧盻停馬足盤石長自閑空源偶誰築塵氛見荒林物色存古俗粲粲弄幽花蒼蒼䕃嘉木遺牛上巖顛驚鹿出槎腹鮮明極萬状指以才一粟雖從人力爲頗􅁼隂恠續深堂得欹眠高枕生逺矚餘光耀衾幬清意凝幔褥愚訶世幸畧慵卧􅄝􅀹酷因能助佳夢肯顧躋杲旭將相有時林溪嵓真我欲儒林耻未博俗穽思自續婚嫁累苟輕耕釣吾已十圖屏持自􅇺窹􅄰心思逐八月二十九日小飲隂陽在天地皷吹猶槖籥煩蒸翕已盡灝氣乃浮薄群山翠相抱塵靄如洗濯川源亦虚徹泒别歸衆壑囂音㓕蛙蚓勁意動雕鶚蠅蚊自不容雖有􅀋鉗縛驅之舊苦衆忽去寧匪樂俯仰自醒然意適忘體瘼天運雖巳晏生物固未剥薑芋圃可掘禾黍田始穫脫苞紫栗迸透葉紅梨渥幽花媚清景鮮藂耀新萼西風動孤格露曉愈脩擢能終犯寒泫詎可忽纎弱况當九日近家醸成巳昨温顔几杖適弱質衣冠恪閨門自可㑹非必千里約筝匏出人指邐迤奮宫角􅀄言小人獻終拜長者酢清言喜自洽細故憂可畧幸無職事顧况荷租賦薄讀休暇得醉且吟噱食棃今􅀊天旱甚百穀病已乆山棃㝡大􅀣属此亦乾朽當春花盛時雪滿山前後常期摘秋實穰穣落吾手忽驚冰玉敗不與膏澤偶清朝起周覧映葉才八九閖居問時物此說得溪叟貧齋分寂絶塵抱徒噎嘔寧知蕭條内把握忽先有食薪恐非稱分少覺已厚開苞日星動落刃冰雪剖煙潯擇新汲逺負盈素􅇲英茟两相發光彩生户牗􅀄甞宻經齒乆嚼泉垂口蠲煩慰諸親愈渴忻衆友肯視故畦􅀲寧論濁泥藕􅀊晚迫風霜人飢乏藜糗真味雖暫御未許置樽酒追租耕耨筋力苦收刈田野樂郷鄰約來徃樽酒追酬酢生涯給俯仰公歛忘厚薄胡爲此嵗暮老少顔色惡國用有緩急時議廢量度内外奔氣􅀔上下窮割剥今􅀊九夏旱赤日萬里灼陂湖蹙埃􅝙禾黍死燒确衆期必見省理在非可畧謂須倒廪賑詎止追租閣吾人巳迫切此望亦迂邈柰何呻吟訴卒受鞭捶却寧論救憔悴反與争合龠問胡應驅迫乆巳罹匱涸計須賣强壮􅀔不存尫弱去􅀊巳如此愁呼徧郊郭飢羸乞分寸斯須死笞縳法令尚􅁱明此理可驚愕公卿飽天禄耳目知民瘼忍令瘡痍內毎肆誅求虐但憂值空虚寧無挺犂钁􅁀吏体冝除浮費義可削吾卧避囂喧兹言偶斟酌試起望遺材霾風振墟落桐􅀣棄地瓦礫間兹桐偶誰􅀣憶見擁西牆俄成劃烟霧得時花葉鮮照影清泉􅂇當軒蔽赤日對卧醒百慮惜哉禀受弱妄使鸞鳯頋啇聲動猶微秀色觸巳沮泫摧亂繁條逼迫畏清露暄晴幸未闋飄落儻可拒噫號衝颷回激射隂霰聚此􅀔復可言瞪視空薄暮九月九日凄凄風露滋靡靡塵靄屏巳忻廬舎清未苦裘􅄄冷眠食味􅀹嘉起坐日尚永虚天照積水精鑑出幽礦石􅉷見山稜林踈覺牎囧黄花􅀫蕋破艷艶晨粧靚頻㝷逺逕香毎舜蒼池影爲誰佳色鮮慰我貧齋静寒醅出家法異果得他境甘􅃾饌新兎醜恠薦修蒲猛反幽閑重時節老大珎物景獻酬興未薄比諷思猶騁况同親戚􅂬詎匪田野􅄑俱醉任栖䳋燭炬尚可秉路中對月山川困遊人而不断歸夢其餘惟日月朝夕南北共日光驅人身擾擾逐群動郷思湏暫忘世事那止重豈如月可喜露坐惜倥偬清明入􅁭懐萬里絶纎霿愛之不􅀎飡但以目睛送想知吾在廬皎皎上􅁱棟慈親坐高堂切切兒女衆憐其到吾前不使降惟懞豈不映時節荏苒更季仲而我去方急其􅀎計歸鞚我非土木爲耳目異聾瞢念之􅂚由安腸胃百憂中何言月下喜喜意亦有用爲其同此時水木光可弄猶勝夢中事記之聊一誦聴鵲􅀉家人鵲聲喳喳寧有知家人聴鵲占歸期物情固不等人事爾意自驚思别􅄐秋風粲粲正可愛黄菊芙蓉開滿枝春風千􅀣變顔色逺水静照紅霞衣梧桐楊柳豈知数沙走露冷銀床欹新黄暗緑各自媚爛熳末减春風時誰言秋物不可賞人意自移随盛衰山田正冷酒味羙禾􅁰半收鷄鴈肥霜棃野栗處處有雪宻薦口清香随鄊園物物可想見我意柢随魂夢飛家人未用占鵲語應到婦時眷亦歸讀書亦云􅉝卯嵗讀書吾性雖嗜學年少不自強􅀁至未及門安􅀎望其堂在苒􅀊云暮家事已獨當經營食衆口四方走遑遑一身如飛雲遇風任飄揚山川浩無涯險恠靡不嘗落日號虎豹吾未停車箱波濤動蛟龍吾方進舟航所勤半天下所濟一毫芒最自憶徃􅀊病軀乆羸尫呻吟千里外蒼黄值親䘮母弟各在逺計歸恐驚惶㐫禍甘獨任危形載􅀌艎﨑驅護旅櫬􅃡邈投故郷至今驚未定生還乃非常憂慮心膽耗馳驅筋力傷况已近衰境而常犯風霜驅之乆如此􅀒痾固宜長朝脯暫一飽百回歩空廊未免廢坐卧其􅀎眎縑緗新知固云少舊學亦巳忘百家異㫖趣六經富文章其言既卓闊其義固荒茫古人至白首搜窮敗肝腸僅名通一藝著書欲煌煌瑕庇自掩覆後世更昭彰世乆無孔子指畫随其方後生以中才胷臆妄度量彼專猶未逹吾慵復何望端憂􅀋童稚習書倒偏傍况令議文物規摹詎􅀎詳輪轅孰曉直冠盖熟纁黄珪璋國之噐孰殺孰鋒鋩問十九未諭其一猶靣牆㡬㣲言性命萌兆審興亡兹􅀹覺浩浩吾詎免倀倀因思幸尚壮􅂚不自激昻前謀信已拙來效庶云臧漸有田数畆春秌可耕桑休問就醫藥疾病可消穣性本反澄澈情田去榛荒長編􅀝􅁱架大軸解深囊􅀵功畏奔景窺皇起幽房虚窓逹深􅉂明膏續飛光捜窮九雖憊磨礪志須償譬如勤種藝無憂匱囷倉又如導㳙㳙寧難致湯湯昔廢漸開闢新輸日收蔵經營但亹亹積累自穣穰既多又湏擇儲精棄其糠一正以孔孟其揮乃韓荘賓朋頋空館議論㩀方床試為出其有始如宫應啇紛絃遇叩擊律吕乃交相湏􅁷極萬変開闔争隂陽南山對塵按相摩露青蒼百鳥聴徘􅆦忽如來鳯凰乃知千載後坐可見虞唐施行雖未果貯蓄豈非良何殊廐中馬縱齕草滿􅂣形骸苟充實氣力易騰驤此求苦未晚此志在堅剛雜詩五首三季巳千載古道乆荒榛紛紛東漢士飛鳴不當辰經營救氛沴此志卒埃塵士生有進退何必棄其身其道雖􅄶迫其行絶緇磷公心不吾誑復求無此人貧仕任固小㑹計未可失方今備千品內外有卑秩孰當責在巳施設􅀎自必拘文巳難聘避世固多屈細去且可略於大復何實死就正如斯與古豈同術雖非萬鍾當苟冐歸一律焉􅀎示朋友學士空自咄韓公綴文辭筆力天乃授並驅六經中獨立千載後謂為學可及不覺驚縮手如天有日月厥耀無與偶當之萬象榮所照百恠走此其自然光萬物安得有其人雖巳殁其氣著星斗窮天破大惑更覺功業乆其餘施諸小未􅀒風義厚當身止自善所遇時則不致官九列齊此理嗟亦苟去就帷用捨士固無常守孔孟非其稱斗禄應未取惜㢤天下才甘受外物誘相去㡬年今與古睢陽㡬人朱與紫嗟㢤二子獨有名義烈乃􅀎長不死當時羙人􅂬未足一日蒼皇行萬里豈無公卿尊且寵急反與胡為眼耳丈夫感激世莫測二子引身高下起忠驅義激􅀑神動漠漠胡沙來此止少年百事銳其謂身力孱心􅀏古時士􅀣立􅀔苦難差池􅀊月邁自照失朱顔􅀄心不復道齟齬常未安紛紛憂與勞㡬不傷肺肝人自省巳分静黙固其端詩書可自喜施設諒漫漫與舎弟别舟岸間相望感嘆成詠涕淚昨辭親酸心今别子舟陸空相望摻􅃑即千里戯呈休文屯田陳侯雋㧞人所羡嵗晩江湖􅀄識靣巳聞清論至更僕更讀新詩欲焚硯天子無由熟姓名諸公固合思論薦烏鞾况已踏臺省黑綬未得辞州縣落落逢人愈難合欣欣顧我􅀎忘倦跬歩麄官别經嵗角巾廣坐今相見遶郭青山疊寒玉榮隄逺水鋪文練明紅靚白花千􅀣隔葉跳枝鸎百轉佳時苦雨巳蕭索落蕋随風還面旋縱無供帳出郊野尚有清樽就間燕脫遺拘撿任真率放恣嘲諧較豪徤東廊觧榻不共語明日離亭空春眷送宣州杜都夜聞陵陽峯上雨曉見宛溪春水平􅀞船不待􅀟櫓狹歸客喜成千里行牧之文采宜未泯夫子風流今有聲篇什高吟鳯凰下翰墨醉洒煙雲生撥置簿書有餘力放意樽罍無俗情志義非徒勸風俗愷悌固可交神明餘休比户得􅉼泳嚚訟累嵗皆澄清薦章交論付丞相士行如此宜名卿江湖一見十年舊談􅀏相逢肝膽傾鷦鷯一枝亦自得去矣黄鵠高飛鳴麻姑山送南城尉羅君麻如之路摩青天蒼笞白石松風寒峭壁􅀡上無攀援懸磴十歩九屈盤上有錦綉百頃之平田山中遺人耕紫􅃄又有白玉萬仭之飛泉噴崖􅀡潟蛟龍淵豐堂廣殿何言言階脚挿入斗牛間樛枝古木不記年空槎呺然卧道邉幽花自嬋姢林深為誰妍但見塵消境静翔白鶴吟清猿鶵禽乳鹿徃徃噑荒㒹却視來徑如縁絙千重萬疊竆巖峦下有荆吳粟粒之群山又有甌閩一髪之平川奕棊縦衡逺近布城郭魚鱗參差髙下分岡原千竒萬異可意得墨筆盡秃誰􅀎傳丈夫舒卷要宏逹世路俯仰多拘牽㒖耒到此醒心目便欲洗耳辭囂喧羅天子一日逺􅀘東南官愛此層崖峻􅊤之秀發開軒把酒可縦􅀚喜此披霄挿漢之夐起出門㪯足得徃還羅夫子一尉龍蛇方屈蟠此邦人人衣食足闔境年年枹鼓閑几桉剸裁得休暇山水登躡遺紛煩我行送之思故園引領南望心長懸東軒小飲呈坐中二年委質繫官次一日偷眼看青山念随薄禄困垂首似見故人羞滿顔及門􅄑得二三友把酒􅀎共頃刻閑海魚腥醎􅂓復進野果酸澁誰􅀎刪談􅇵清風生塵柄氣酣落日觧醉鐶瑰材仕志皆可喜白􅀏我拙何由攀髙情坐使鄙悋去病体頓斍神明還簡書皇皇奔走地筦庫碌碌塵埃間功名難合若捕影日月遽易如循環不如飲酒不知厭欲罷更起相牽板明妃曲二首明妃未出漢宫時秀色傾人人不知何况一身辭漢地驅令萬里嫁胡兒喧喧雜虜方滿眼皎皎丹心欲語誰延夀爾􅀎􅀻好惡令人不自保妍􅃖丹青有迹尚如此何况無形論是非窮通豈不各有命南北由耒非爾爲黄雲塞路郷國逺鴻雁在天音信稀㡬成新曲無人聴弹向東風空淚垂若道人情無感慨何故衛女苦思歸蛾眉絶世不可㝷􅀎使花羞在上林自信無由汙白玉向人不肯用黄金一辭椒屋風塵逺去託氊廬沙磧深漢􅁎尚自有妬色胡女豈􅀎無忌心直欲論情通漢地獨􅀎􅀅恨􅀉胡琴但取當時􅀎託意不論何代有知音長安美人誇富貴未央深殿競光隂豈知泯泯沈􅃄霧獨有明妃傳至今喜二第侍親􅀅至京師書多言六弟為縣之美嗟予懐抱徒蠢蠢二第􅅐中何落落政如魯衛各馳騪文似機雲飽磨􅅣坐曹風義動江淮為縣聲名到京洛鴻鴈峩峩並羽儀常棣韡韡聮跗鄂我扵两䖏抱饑渴恨􅀉一官如束􅅞周南留滯勿復論平陸可來無厭数慈親况不倦行役官長幸復寛期約似聞􅀏語巳髣髴想見追随先踴躍共眠布􅀍取温暖同舉菜􅃵甘淡薄山花得折随好醜村酒可醉無清濁屈伸有命更勿疑細故偶然皆可畧春風為子送㠶檣速放船頭來此泊七月一日休假作􅀄秋尚若暑歸沐乃君㤙地閑少耒客日晏猶閉門家乏念藜藿開顔無一樽况復辭貌拙敢随車馬奔盥濯何所事讀書坐前軒豈堪當世用空味古人言頗喜市朝内獨無塵􅁟喧終年但如此真􅀼太官餐秋夜秋露随莭至霄零在幽篁灝氣入我牗蕭然衾簞凉念徃不能􅄰枕書嗟漏長平生肺腑友一訣餘空床况有鵲巢德顧方共糟糠偕老遂不可輔賢真淼茫家事成􅇴落嬌児亦徬徨晤言豈可接虚貌在中堂清淚昏我眼沉􅁨回我膓誠知百無益㤙義故難忘七月十四日韓持國直廬同􅀚山海經髙閣在清禁長軒憑廣虚御幄閟啚象依然臨幸餘翠甓布天路黃簾分直廬一雨清景早稍凉秋興􅀄觧帶就君坐臨床闚素書山海所錯出飛潜􅀋紛如此語果虚實遺編空卷舒自􅀏正豕亥更微注䖝魚君材合逺用就此固巳踈如我乃斯幸地閑容誤居竹影散良席花香浮廣􅅂俯仰自足􅆘歸時更當徐李氏素風堂丞相事唐室獨馳三絶名家世在圖史詩書傳後生􅀰位逮流澤出令儕軰驚􅀊暮营燕坐髙居遺世情翠竹帶書幌青山臨酒觥巳使􅁭韻適况聞吟誦聲自可化郷里豈唯門戸荣果有過庭子頴然材思精抱璞巳三獻驚人當一鳴風義故常在兹堂非偶成秋聲喬柯與長谷秀色故未凂秋風耒吹之聲如振江海怒號無晨夕唱和􅀂有待翏翏徧􅉾窪豈獨縁􅐑嵬百川亦相投取閙不知悔竹籬更謞然吕律焉足采蜩螿豈知微切切如怨憝惟人亦吟哦沸若烹䁀鼐八荒同一鳴静裏安得在獨有虚空翁恬然故無改戯書家貧故不用筹筭官今又能無外􅁨交逰断絶正當尔眠飯安穏餘何求君不見黄金滿嬴要心計大印如斗爲身儲妻孥意氣賔客附徃徃主人先白頭李莭推亭子盱江敦東門江水湛虚碧東南望群峯連延􅀝天璧長林相蔽􅃜蒼翠浮日夕青􅄀窓戸寒居者非咫尺子􅀄得從誰有此煙霧宅燕坐逺世喧及門無塵客築亭更求深綏帶􅂓自適時花􅀏婀娜山鳥吟格家釀熟新樽􅂬言命良席故巳輕華簮寕論珍拱璧我亦有菑田相望在阡陌安得巾柴車過􅀙佇三益秋夜露坐偶作白雲飛尚低清露泫猶早風來亦依微濁暑焉得掃客堂虚四楹洒水悢枯槁喜茲宵漏􅀄露坐散􅁭抱河明帶飛􅀚月白通馳道顧眄塵慮銷瓶泉謝頻倒恨無同聲人詩義與探討踟躇拂方床歸卧夢亦好韓玉汝使歸顧命逮殊隣輶軒遵北道公府戒行期禁庭須重寳積雪正東流度河盛前導士勇踐胡塵馬驕嘶塞草玉莭所鎮臨氊廬先汛掃赫爾示威靈坦然布懐抱國􅀝材實優虜得聲名早慷慨服天驕􅀙容問遺老光華反原隰沆碭㸔西顥迎勞動都門旌旗風亦好苦􅀬憶􅀄中伏時怫欎炎氣升赫日已照灼赤雲助軒騰積水殆􅀅沸清風豈􅀎興草木恐焚燎窓扉似炊蒸冰窓氣巳奪蚊蠅􅀔相矜發狂憂不免暑飲詎復勝過介甫日暮驅馬去停鑣叩君門頗諳肺肝盡不聞可否言淡爾非外樂恬然忘世喧况值秋節應清風蕩歊煩徘􅆦至星漢更復坐前軒過介甫歸偶成結交謂無嫌忠告期有􅀘直道詎非難盡言竟多知者尚復然悠悠誰可語合醤作孺人捨我亡稚子未堪役家居拙經營生理見侵迫海鹽從􅀻求厨麵自官得揀豆連数晨汲泉候􅀅夕調撓遵古書煎熬需日力庶以具藜􅃵故􅀅供膾食豈有􅀉徑憂提瓶無􅀁適但慙著書非覆瓿固其職送章婺州方擁使君節駕言自東還又聞白氶相懐紱出九􅀜遂縱大船去欲追詎􅀎攀巳喜􅀁􅀉徑幽㝷足谿山仍誇越西部逈在雲林間屋瓦徧高下青蒼更回環穿路竹裊裊鳴沙水潺潺㑹有樽酒適毎需庭訟閒况席鼓琴􅃇政行故非艱嵗暮當趨召馳歸復玉班瞿祕校新授官還南豊㧕色映馳道水聲通御溝雖喜芳物盛未同故人遊叩門忽去我躍馬振輕裘佩印自兹始過家當少留中園何時到薇蕨亦已柔山翠入幽屐渚香浮逈舟阡陌有還徃壺觴時獻酬應􅀏天禄閣寂寥誰見求元豊􅀋藁卷之四
