front:
  text: 元豊􅀋藁卷之三十六
  hash: sha256:acfff9a6424515f1b4fbc6f26892a66fa583945a11d72cbaf47d7ca22762b5b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_036-1a}
body:
  text: 啓狀應舉啓右鞏啓伏念鞏材質淺陋藝學荒蕪讀聖人之經未知大義明當世之務多泥舊聞雖堅樹立之心豈適変通之用矧罹福釁屡抱􅁨哀是以三遇文闈一踰􅀊紀足跡不㳺扵􅂣屋姓名不署扵郷閭僕僕東南有衣食婚嫁之累拘拘蚤夜惟米鹽薪水之憂今者側听詔書講求士􅀋頋私㤙之可念迫生理之難周義不自皇势當強起盖以出而載質無他業之可為仕以為貧亦古人之􅀁䖏遇高明之見照殆否結之􅀅通伏以某官梁棟􅅛材琮璜茂器發文章之素藴當仁聖之盛期忠言加謀施之有効流風善治所至可傳喜奨士倫助成世教况親氶扵著令方序别扵群材藐是覉􅀌最為滯拙仰遵舊禮敢忘桑梓之㳟輙進曼辭庶當雞鶩之贄察其素學采以寸長盡繄及物之仁惟俟至公之賜謝杜相公啓伏念鞏志雖筞礪性實滯頑行不足比古之人材不足適時之用居常齟齬動輙困窮徃以􅀌生而􅂪􅀵接又遭大故而􅀍救存非常之㤙徳􅀁加空知感激無用之技䏻素定􅂚有報償至扵数千里之間三四年之後去冬之首方􅀎属思以為書積日之勤庻或因辝而見意不謂使者至門之日正值相君失子之􅀄逺瀆高明巳難期扵省覽况逢哀惻豈䏻必扵薦聞因此復憂懇悃之誠無由自逹視聴之側雖推心之逺大寕責礼扵賤微然義未􅁕以論酬而言又不得以叙謝其爲􅀻計豈敢自皇伏惟相公當世表儀本朝柱石許還私第聖意雖􅄖扵大臣召用安車人心素望扵元老伏祈上爲􅀖國善保􅆍興回傅侍講啓鞏啓伏審祗膺詔檢入奉經筵伏惟慶􅇺伏以某官秉徳粹冲受村閎廓遘盛辰而開迹席膴仕以陞華善政流風以推行扵民上高文大䇿乆聳動扵朝端果允僉言特膺迅用徔容帝幙方演暢扵㣲言宻勿禁林佇裁成扵明命自聆拜寵方念騰書辱見奨扵舊遊􅃍先流扵華問欣愉感幸交集悃誠代人謝余侍郎啓右某啓伏念某歸而閑䖏時所背馳分功名之無期嗟志意之空大言當世之事懼尚口而更窮求後人之知因著書而自見踈闊巳甚抵棄未䏻輙布听聞方虞訶譴属小兒之過拜辱餘論之見存指瑾掩疵大為之地憫窮悼屈勤出扵􅂨省枯槁之姿力乖報徳激哀殘之氣感􅁒忘身聸風采之夐遥役魂神而飛去尚當益壮以塞誤知與劉沆龍圖啓右鞏啓伏念鞏方抱􅁨哀且多疾病貧不得巳則俗事皆當自謀旅無所容則世人誰肯見恤今者伏遇知府龍圗給事愷悌成徳􅂆勉為懐忘後進之至㣲假温顔而與接知其􅀌立念其数竒謂其有詩書之勤則曲加扵奨待謂其有衣食之累則特甚扵矜憐且使受田之􅀗安實由為地之至大在甘㫖有毫髮之􅂇扵子弟乃丘山之㤙况此餘庥可圴敝族雖逺台坐常注愚心復得交㳺之傳愈知意爱之厚自非􅁟石豈不激昻粗知古今可勝感勵恨當迷塞􅂚用報償而方先人之􅁙送未成偏親之奉飬多乏四弟懐仰哺之託九妹有待年之期凡縻敝扵秋毫皆經營扵方寸頋惟􅀻計當議逺逰世俗險艱豈諳甞之不熟性靈踈拙寔齟齬之可􅁨未卜超承更增慕恋謝解啓伏覩解文首􅂪㪯􅃟伏念鞏才非卓越識匪該通素志慕乎古人故時情之所背虚名聞扵當世故衆忌之所排患難艱危流離頓挫孰有至􅀌之迹敢萌希進之心頋生理之難周迫􅀻􅂨之可念舉而干禄誠匪素懐仕以為貧􅀼􅀅自比是以聞詔之出􅀒笈以耒豈意片文首塵高選以至天倫之薄陋子黨之空踈皆自單平得􅂪收齒退惟㑹合亦有端原此盖伏遇某官崇奨士倫助成世教以虹蜺之光而􅀍飾以律呂之氣而吹嘘致此屯窮階扵振發敢不勉增素學益勵前修庻全必勝之名以荅至公之賜謹奉啓陳謝回李清臣范百禄謝中賢良啓右鞏啓􅀼以設科以求特起之材發䇿以訪可行之論是維髙選果得異􅀎伏以賢良某官志敏以強詞嚴而贍迹前世之事而􅀶極群書議當今之宜而常引大体及親氶扵聖問遂絶出扵時髦方喜聞風遽􅂪枉記仰惟謙抑之過第積感銘之深回人謝館職啓伏審試藝禁林陞華儒館伏惟􅂟􅇺伏以都官學士英材傑出玉􅒄混成遘時運之光華􅁬文章之温雅第荣科扵秘殿蚤邁䓁倫陞膴仕扵本朝荐騰譽望較雕龍之麗藻利架鼇之秘扁果彼明緍式符輿頌方展騰書之好􅃍􅂪削牘之􅀻仰服謙撝退􅀷感戢與北京韓侍中啓一右鞏啓伏念鞏頋以諸生守兹劇郡撫敝封之云始望仁境以非遥恨無羽翼之飛馳與操几杖􅁒以緘滕之託寓聊布腹心然而治獄訟之浩煩振紀綱之弛壊斍形勞之少暇信林短以難周致是懇誠稽扵進逹属高秋之在序惟坐鎮之多餘必有祺祥来寕動履伏以留守司徒太師侍中蓍亀四海柱石三朝有太平之功周公之􅀁以勤王室有純一之徳伊尹之􅀁以格皇天固巳書在宗􅃔蔵之盟府而乃以退為進䖏上用謙自避逺扵煩機乆淹回扵外服宜􅀙巖石之望趣正衮衣之㱕敢冀上為宗祊善綏􅃦餗二鞏啓伏念鞏習吏非長得州㝡劇耗神明扵簿領疲精思扵追胥尚恃餘庥幸無曠亊然而塞茅心而巳甚飾竿牘以未遑故魂爽雖騖扵門閎而候問不通扵幕府仰繄明恕終賜矜容今者北􅁟旦霜晏隂始粛伏惟順天時之常序飬浩氣之至和神民所依福禄来萃恭以司徒太師侍中股肱三世亀鑑四方勤劳著扵􅀖家功徳施扵社稷方且㰸嘉謀扵一靣欝群望者五年郭令之繫安危素形公論周公之為左右宜冠本朝華夏蛮貊之傾心昆蟲草木之望賜豈伊蕞質獨注㣲誠伏惟上為宗祊善調􅆍餗回許安世謝舘職啓右鞏伏審􅂋氶詔檢進踐書林伏惟􅂟慰國家聚四部之書蔵之祕近擇一時之俊任以校讐映朝序以甚清簡上心而滋厚恭以檢正學士學深而冨識大以明擢平津扵廷中蔚為首􅃟頼王祥扵海上休有治功天衢寢亨時望攸属遂膺給扎之召来賁登瀛之遊侍􅀙邇班庙堂大任自兹而徃計日可期氶逺貶扵􅎇函苐仰懐扵謙徳賀韓相公啓右鞏啓伏審入膺典册首秉鈞衡凢在生靈孰不􅂟幸仗以史舘相公言為蓍蔡行應凖䋲仔肩一徳之純弼亮三朝之盛君牙之纉舊服世濟忠劳吉甫之憲萬􅀖身兼文武果還柄用復冠中台茂惟㧞出之材素藴非常之略方且􅁩形王室盡邴魏之謀謨澤潤生民本蕭曺之清静遂長生扵百姓付衆聀扵群􅀎躋世太和與人休息使雨腸寒燠罔不􅀙時草木虫魚皆當􅂪恵聲敎可加扵異俗功名必紀扵無窮鞏一去朝行六更􅀊序頋兹舊物自慚簮屦之微保是􅀌生方頼陶鈞之賜其為忻抃實倍䓁倫㐮州與交代孫頎啓右鞏伏念講聞譽望積有􅀊時歴下分符巳岀吏部之後漢南守􅁟又居仁政之前惟事契之稠重實愚􅄀之幸㑹比扵道路始接光儀􅂪特異扵眷存仍曲加於燕劳論情至厚曽何謝扵古人䖏義甚高固可敦扵薄俗違􅄐未􅁢感恋交深諒惟得日之良甫及下車之始頒條多預納福甚隆伏惟知府少卿積學内充懐材間岀乆更當世之用自結明主之知高冠两梁入綴班扵九列䡖車駟馬出按部扵百城方圖間燕之宜自請蕃宣之便佇膺􅇉召不待􅀊成更惟上為庙朝善綏􅆍餗禱頌之至序述寕殫洪州到任謝兩府啓伏念鞏天與朴愚衆知凡近材不堪於施設動輙乖冝斈多失扵変通理難應用乆與逰扵儒舘仍有列扵朝紳適當千載之期曽乏一毫之祚既不䏻明國家逺大之躰為上建言又未知䆒郷閭委曲之情與民興利七移􅀊序四易外官坐尸禄廪之􅄖寂無􅁛効幸属章程之備得以詩循兹􅂪􅀘郡之㤙碑遂便親之請望故郷而接壌與仲弟以連城及是忝踰出扵假借此盖伏遇某官心存愽爱量極兼容簮􅂂之㣲未忘扵舊物陶鈞之大不間扵􅀌生曲致公言俾諧􅀻計惟盡承流之分庻禆造物之仁過此巳還未知所措賀東府啓右鞏啓伏覩十月二十三日麻制伏審史舘相公登庸天下幸甚伏惟史舘相公言為蓍蔡行應凖䋲兼文武之閎材冨天人之奥學神祗幽賛遭聖賢相得之時夷夏聳􅀚備君臣咸有之徳果繇樞軸首秉鈞衡􅀼惟不世之姿深逹當今之務必且開公平之路以序進群䏻銷壅蔽之萌以廣延衆論以寛大為拯救瘡痍之要以安静為休息疲瘵之端絀聚歛之無名偃甲兵而不用果推此道以澤吾民食味别聲之倫㪯皆受賜殊隣絶黨之俗孰不嚮風福禄可䓁扵丘山功名必求扵金石鞏蚤㳺墻屏幸遇陶鎔齟齬餘生始免㨈排之患零丁滯跡漸期亨泰之来想望門䦨以欣以躍賀蹇周輔授舘職右鞏啓􅀼審奉􅀍詔函進登史􅀚伏惟慶慰􅀼以安撫運使斈士材資秀特識度淹冲冨華國之懿文抱據經之宿斈一人嗟異欲相如之同時多士推先服桓荣之稽古果繇時望特􅀍朝㤙流焉木牛方佐中都之費金匱石室遂窺廣内之書􅀼惟寵数之行兹實要塗之漸佇躋法􅀙用恊僉言鞏􅀗在下風側聞成命分符海徼幸依徳庇之餘寓􅀡書林更託雋逰之末其為欣􅂟􅂚可􅈁陳回泉州陳都官啓右鞏啓􅀼審祗奉茂㤙進陞寵秩伏惟􅂟慰􅀼以知府都官周材經務令徳鎮浮席膴仕以彌優簡清􅂨而有素循良之政巳洽扵民謡恬退之風􅁕敦扵世教果膺異数進陟名曺側聆成命之行方􅀼同声之喜豈期厚眷特枉長牋載規謙抑之辭但切感銘之懇明州到任謝两府啓右鞏啓伏奉􅃙命授前件差遣巳扵正月二十五日到任上訖伏念鞏才無逺用斈殆小知誤􅂪假器之㤙愧之當官之効属時泰䂊遇上休明􅁒治之心夐追扵三代非常之旦恃起扵千齡顧是􅀌生最為逺迹雖逢辰之難得獨揣巳之無堪故群村衒鬻之􅀄未始自陳扵薄枝而衆論聘馳之際何嘗􅂺預扵半辤錙銖動謹扵成䂓毫髮敢萌扵􅀻晃以兹循分庻􅀗寡􅀹然而一去本朝六祗外服十年荏苒未諧拱極之誠萬里周流尚􅀒循陔之念當至仁之平施亦微物之可衰兹者方抵詔以在塗復析符而假守惟四明之窮裔䖏百奥之東偏浮海之航䁀耒扵逺國踐山之築益起扵堅城猥出選掄冐膺􅀉属此盖伏遇某官輔成世教楽育士倫隂推覆護之􅀻每借吹嘘之力致兹頑鈍與在甄收然而察無他􅁖之膓方頼兼容之度草􅈋之質使遂扵向陽菽水之􅂬許伸扵反哺盡待曲成之賜俯厭難止之情誓在糜捐用酬鈞播賀趙大資致政啓右鞏啓􅀼審進秩宫朝㱕榮里閈伏惟􅂟慰恭以致政宫保大資言為蓍蔡行􅀿凖䋲肩一徳以在躬歴三朝而遇主讜言大論著在朝堂善政流風􅀍干藩服引年求謝抗䟽彌堅屡降徳音方􅀝老成之重難回壯莭閔有官職之劳躐陞儲宷之華退遂家居之樂門開祖帳衆嘆大夫之賢庭列賜車自知稽古之力惟䏻諧扵素志實何愧扵昔人鞏蚤荷陶鈞與㳺門舘􅀚大賢出䖏之迹􅁕􅂆士倫知儒者進退之宜敢忘師慕其為忻躍倍萬䓁儔亳州到任謝两府啓右鞏啓􅂪㤙授上件差遣巳扵今月十六日到任上訖伏念鞏少雖好斈長乏異䏻燭理甚踈盖聦明之難強受材素薄顧齒髪之巳衰誤􅀼寵靈叨塵噐使兹者縁避親之著令􅂪易地之推㤙距畿甸以非遥就庭闈而甚便夫何蕞質廼爾冐居此盖伏遇某官以廣爱之心而輔成世教以并容之度而奨育士倫致是顓愚及扵推齒慰􅀝門之望巳出扵埏鎔謝推轂之言敢忘扵䇿勵庻􅀵薄效仰荅誤知過此以還未知􅀁措到亳州與南京張宣徽啓右鞏啓􅂪易近藩􅀗隣樂境雖未得就諸生之列請益扵詩書然足以聞長者之風仰高扵道􅁩始敢通牋記參候之禮庻幾􅀅心誠饑渇之勤載省􅀌􅂪實為幸㑹今者抄秋伊始嚴氣􅀅􅂛仰惟􅄍納之宜無爽燕閒之喜伏惟某官言為蓍蔡行應凖䋲茂勤烈扵三朝聳儀刑扵四海仲山之明且哲宜保令名魯公之壽而􅆇永膺全福更冀上為􅀖囯善保􅆍興禱頌之誠叙陳罔既元豊􅀋藁卷之三十六
