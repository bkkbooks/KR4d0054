front:
  text: 元豐􅀋藁卷之五
  hash: sha256:50c06094026c00bd14fb5b0534e5764cbfeb759788ef3e3f81605dfd091b0982
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_005-1a}
body:
  text: 古詩送程公闢使江西程侯昔使西山下金印出懐光滿把坐馳雷電破姦伏力送春陽煦鰥寡袴􅃭優足徧里巷禾黍豐穣罄郊野訟庭終日自虚曠徳宇平生本蕭洒龍淵决水漲清沼鳥背株林開廣厦蒼顔擁檻四山出翠色横櫩大江瀉掌平百里露州郭髪宻千甍􅋦屋瓦雲裘数曲秀蘭蕙鳯盖相摩擢梧榎客來尚喜井投轄主禮寧論燭飛灺三吳月出照金㦸百越風來吹玉􅕸羽釵絶艶舞回雪寳劒諸儒談灸輠一尊放意受天􅄜萬累回頭真土苴我思飛歩綴登躡又欲生綃乞圖寫身縻東觀願雖阻目注漳門心豈捨過臨有幸破氛霧奮厲方欣入陶冶航又自日邊去信節􅀄從天上假􅃇􅀖徃靖􅀉揮塵新榖來輸付流馬遥知素譽在民口巳有􅂬聲騰里社却㝷泉石引幽士想憶沙塵􅀏勞者何當一解豫章榻强賦􅁟風令中雅遊金山寺作􅀱潮動鳴艣出浦縦方舟舉箔見兹山巋然峙中流朱堂出烟霧縹􅄅􅀂瀛洲十年入夢想一日恣㝷遊屐履上層閣披􅁭當九秌地􅀔巳瀟洒風颷更颼飀逺挹蜀浪來旁臨滄海浮壷觴對京口􅀏語落楊州乆聞神龍伏况覩鷙鳥投行縁石徑盡却􅀝巖房幽頗諧雲林思頓豁塵􅁟憂昏鍾滿江路歸榜尚夷猶自楊子渡以兩小舟夾引所乘舟故云方舟荅􅁑藴我􅀄未識子巳知子䏻文春風吹我衣暮召入九閽衆中得子辭黙許非他人方􅀅引飛黄使出萬馬群差之在湏􅁷氣沮不復論大明臨萬物我亦傍車塵相逢扶桑測一揖意自親屈子果由我相示以無言同行千歩廊􅄃轡金馬門歸來客舎中未及還徃頻東舟載子去千里不逡廵今者坐甌越相望􅀂三辰忽有海上使問我及牆藩得子百篇作讀之為欣忻大章巳逸發小章更新清逺去筆墨畦徒識斧鑿㾗想當經宮􅀄落􅁓有如神勉哉不自止直可闚靈均我老未厭此持誇希代􅎇朝吟忘日􅉴暮吟忘日曛發聲欲薦子自􅀏不足云南湖行二首二月南湖春雨多春風蕩􅃞吹湖波著紅少年里中出百金市上裁䡖羅挿花歩歩行看影手中掉旗唱呉歌放舩縱櫂鼔聲促蛟龍擘水争馳逐倐親忽逺誰可追朝在西城暮南溪奪標得儁唯恐遅雷轟電激使人迷紅簾彩舫􅀚者多羙人坐上􅀭􅀟蛾断瓶取酒飲如水盤中白筍兼青螺生長江湖樂卑􅊜不信中州天氣和東南溪水來何長若耶清明宜靚粧南湖一吸三百里古人巳疑行鏡裏春風來吹不生波秀壁如奩四邉起满芽荇蔓自相依躑躅夭姚開滿枝求群白鳥映沙去接翼黄鸝穿􅀣飛我坐荒城苦卑隰春至花開曽未人蕩􅄴如從武陵入千花百草使人迷山回水轉不知逺手中紅螺豈湏􅂆䡖舟短楫此溪人相要水上亦湔裙家住横塘散時晚分明􅀏語隔溪聞種牡丹經冬種牡丹明年待看花春條始秀出蠧巳病其芽柯枯葉亦落重㝷但空搓朱欄猶照耀所待已泥沙本不固其根今朝謾咨嗟西湖一月二十日平生拙人事出走臨東藩紛此獄訟地欣乗力筆閑漾舟明湖上清鏡照衰顔春風随我來掃盡氷雪頑花開滿北渚水渌到南山魚鳥自翔泳白雲時徃還吾亦樂吾樂放懐天地間願視彼誇者錙銖何足言北湖常時泛西湖已覺烟水永北隄復誰開䘮􅉼一川靜乆幽繇地偏跬歩人跡屏我􅀄得之喜指顧闢棒梗種花延妙香揷柳待清影飛梁通两涯結宇臨四境包羅盡高卑開柘極壬丙洒然塵滓消恍爾心目醒與物振滯淹如人出竒隸日携二三子杖屦屢􅀚省念時方有為衆智各馳騁獨此得逍遥固知拙者幸百花隄如玉水中沙誰為北湖路乆翳荒草根木承青霞歩我為彂其枉􅁱營極幽趣髪􅀡而砥平驊騮可馳鶩周以百花林繁香泫清露間以緑楊隂芳風轉朝暮飛梁慿太虚嶢榭躡煙霧􅀡通高城顛海岱歸指顧為州乏長村幸嵗足秔稌與衆飽而嬉陶然無外慕芙蓉臺芙蓉花開秋水冷水靣無風見花影飄香上下两婵姢雲在巫山月在天清瀾素礫為庭户羽盖霓裳不知数䑓上遊人下流水柱脚亭亭挿花裏欄邉飮酒擢女歌䑓北䑓南花正多莫􅀏來時常著屐緑柳墻連使君宅秋懐二首流水寒更澹虚􅑵深自明褰帷逺鍾断擁􅄄晨香清油然素心適􅃡􅀍外物䡖因時固有應在理復何營􅀮凡公事退卷書坐南榮以兹逺塵垢何異山中情為州詎非沗即事亮何成幸兹桑麻熟復示倉箱盈閭里㐫黨聀堦除嚚訟淸日携二三子飽食中園行念非形􅀔迫免有彈戈驚幽閑固可樂勿慕高逺名送李撰赴舉湖水碧槐花黄山川揺落􅑵户凉􅀫雲星稀日東出青􅁳風高䧹南翔華堂昨夜讀書客匹馬今朝遊大梁風鋩拂塵見飛影把握驚人持夜光康衢四闢通為里天駟得地方騰􅋮我留東山意頗卓屏棄外慮無毫芒子䏻相􅀙味冲漠捉箠勿暫遅歸装送韓玉汝春日城東送韓玉汝赴两浙轉運以此塘生春草園桞変鳴禽為韻得生字野岸漲流水名園分雜英旭景冠盖集清談樽酒傾重此䑓省秀駕言江海行已喜懐抱粹况推材實精衆許極高逺時方藉經營詎止富中廪固􅀅澤東氓還當本朝用不待芳嵗更功名自兹始勿嘆華髮生招􅀮寺一徑入松下两峯横馬前攀縁緑羅磴飛歩蒼崖巔昔人此嘉遯手弄朱絲絃想當林間月獨寫山中泉此樂非外得肯受世網牽我亦本蕭散至此更怡然偏憐最幽䖏流水鳴濺濺延慶寺㑹景純正仲希道介天明叟納凉同􅀚建鄴宫中􅀞象翰林墨跡延慶寺者劉􅁉故宅中有夀丘山禪方夀丘山平昔宋公宅好風吹雨來暑氣一蕩滌我與二三友􅂬言同几席神清軼埃壒趣合盡肝鬲嶺竹翠尚新水花紅可摘以此侑罇酒隤然岸巾幘建鄴舊丹青金鑾餘翰墨綽約桃李顔超遥龍虎跡􅛻矣覇王業信哉文章伯感古已躊躇慕竒復嘆息泊無􅀔利心自􅁴衿慮適起坐相扳牽遅留日􅀅夕送豐稷􅊝華染破南山青漢江此時春水生客舟相語人夜起勁艣亂江群鴈聲之君飄泊動歸思告我舉装千里行閎材壮思風雨發緑􅁂少年氷雪清讀書􅀂見若經誦下筆千言􅀎立成精微自得有天質操行秀出存郷評嗟從薄禄困流滯􅀎誘鄙俗銷紛争絃􅁔躬􅂆士强學田里堵安人力耕嗟予㨿按但畫諾遇事縮手方􅂪成雖知璞玉難强獻欲挂塵榻空含情􅀊寒不變廼知􅃀物理先否終當亨維舟且盡今夕語明日㠶随白鳥輕不飲酒不飲酒不善諧少年醒眼看花開况從多病乆衰耗自頋白髮垂毰毸縱遇花時少情思經春不曽􅋦酒盃布榖但憂天雨少提壷謾聞山鳥催且坐蒲團􅁓窓暖兩衙退後睡敦敦􅀄發㐮陽携家夜登現山置酒維舟􅃆南岸置酒峴山堂入坐松雨濕吹衣水風凉烟嶺火明㓕秋湍聲激􅀭乍釋塵垢累况餘燈燭光羊公昔宴客為樂未􅃍央而我獨今夕携家對壷觴頗適麋鹿􅰯頓驚清興長歸去任酩酊詎期誇阿强高陽池山公昔在郡日醉高陽池歸時誇酩酊更問并州兒我亦愛池上眼明見淸漪二年始􅄪徃一杯未嘗持念豈公事衆又非筋力衰局束避世網低回紲塵羈獨慚曠逹意􅀼禄誠巳卑遊鹿門不果方舟下秋瀬巳逺漢南城念昔在郡日苦為塵網嬰仾心就薄禄實􅀒山水情鹿門㝡秀發十里行松檉􅀫幌白雲影入窓流水聲龐公昔抱道遯世此躬耕風雨塞天地伺晨獨先鳴故巖但聞說巳􅁴醒朝酲及兹道途出謂諧猿鶴迎顧值深濘阻獨憐幽思并不踏蘇嶺石虚作襄陽行漢廣亭悠悠漢水長剡剡楚山客若與心目期争從窓户出太守朴鄙人迂無適時術治民務不煩得意偷暇日北城最頻高局促皆曠逸雲根辨毫芒鳥背臨嵂崒亦以樂賔遊豈惟慰衰疾欲􅀉别後情嗟無少文筆聞喜亭聞喜名自昔廣亭臨漢津飛甍出萬屋地絶無纎塵盤道城堞古逺林墟曲新静斍耕釣勝幽宜鷗鷺馴頼此荒僻郡幸容朴愚人閣鈴晝常寂齋醸寒更醇一罇且勤設勿􅀒頭上巾劉景升祠景升得二蒯坐諭勝㐫殘正當䘮亂時􅀎使憔悴寛􅌭紛多士至肅穆萬里安􅀎收衆材助圖大信不難諸公龍鳯姿有待乆盤桓得一固足興致之豈無端廼獨采樗櫟不知取椅檀盖云噐有極在理良足歎隆中志士固有待顯黙非苟然孔明方微時息駕隆中田出身感三顧魚水相後先開迹在庸蜀欲正九􅂦遷垂成中興業復漢臨秦川平生許與際獨北管樂賢人材品目異自得豈虚傳蔡州蔡州昔人居遺堵不可㝷青石乆埋沒荒烟起空林昔人依劉表意氣傳至今廣路競朱轂深蔵閟黄金􅌟難􅄾琮間咎責積巳深終貽覆宗累苟得非所欽為惡理當尓足懲誇者心谷􅀮寺峴南衆峯外窅然空谷深丹楼􅀝碧殿夐出道安林習池抱鄰曲虚窓漱淸音竹静幽鳥語果熟􅀌猿吟故多物外趣足慰倦客心但恨紲塵覊無繇數追㝷萬山萬山臨漢臯峯嶺頗秀發王繁舊居䖏荒草乆埋沒觧佩盖巳迷沉碑終自伐最宜北城望正值氛藹歇縹緲出煙雲清明動毛髪留連至歸時長見西林月題張伯常漢上茅屋逺出清漢上􅀮然一隄長槐柳􅀂雲布連隂入虚堂架險注鳴溜分畦殖群芳豈惟富桑柘蓋亦餘囷倉主人事幽屏不願尚書郎即此徇髙志風騷恣徜徉强起迫義重還歸直明光清風凛然在素壁盈文章故栖勿回眄黄鵠本高翔移守江西先􅀉潘延之莭推憶昔江西别子時我􅀄先腰五斗粟南北相望十八年俯仰飛光如轉燭子遺萬事遂恬曠我繫一官常局促早衰膽氣自然薄多病顛毛那更緑人情畦畛阻肝膈世路風波悸心目毎嗟太守两朱輪寕及田家一黄犢幸逢懐紱入斗牛喜得披山收寳玉薄材頑鈍待磨􅅣舊學搶攘期反覆雲鴻可近眼先明野鹿尚縻顔自忸長􅂡幸未阻誨存下榻應容拜臨辱漢陽泊舟暫泊漢陽岸不登黄鶴楼江含峩岷氣萬里正東流驚風孤雁起蔽目寒雲浮祗役雖逺道放懐成薄游興随滄洲發事等魚樵幽􅃄波一罇酒盡室載扁舟鄖口昔與宜興君同過此我行去此二十年鄖水不改流潺湲風光满眼宛如昨故人乗鸞獨騰騫今人随我不知昔我記昔逰何䖏言涙向幽􅁭落如瀉况聞江漢断膓猿促促為物役促促為物役區區追世情但嗟束縳急未斍章綬荣柰此两􅁂白頋無一㕓耕所求亦云㡬脫粟與藜􅃵鴻鴈江南岸邉江水平水荇青青渚蒲緑鴻雁此時儔侣多亂下沙汀恣棲􅀫群依青荇唼且鳴暖浴蒲根戯相逐長無矰繳意自閑不飽稻粱心亦足性殊凡鳥自知時飛不亂行聊漸陸豈同白鷺空㓗白俛啄腥汙期滿腹喜晴天晴萬里無纎風江平水靣磨青銅光華逸發萬物上精氣夐與扶桑通我行江漢道苦惡十歩九折遺西東况遭積雨駕高浪沙翻石走相撞舂操舟衆工立噤岸􅊜櫓鑚火磨星紅荒蹊成瀦尺寸礙永日四望無人蹤一時得意数蛙黽鳴躍振踞泥塗中隂消陽勝有先兆宇宙丹翠含冲融今晨霾曀一掃蕩羲和徐行驅六龍眼明意豁萬事快預喜來年麰麥豊詶王正仲登嶽麓寺閣見􅀉聞君東南使􅄃轡雲松間皇華照楚甸􅁻玉投衡山幽㝷得臨􅀚意豁窮躋攀頋我客牛斗三年踈徃還低心念弱志引領望衰顔未共罇酒樂良嗟人事艱叱馭犯氷雪廻鑣馳九関何足慰􅄐思徳音鏘佩環訪石僊巖杜法師杜君䄂􅋦丹砂書一頋訶斥百恠除聲如飜河落天衢四方争迎走高車方曈秀貌垂白髮買船東南㝷舊居石巖天開立精廬四山波瀾􅀔争趣君琴一張酒一壷􅀏談衮衮樂有餘我今歸來尚踟蹰羡君决發真丈夫曉出曉出城南羅卒乘皇纛朱旗宻相映􅆛貅距躍良家子鵝􅔏彌縫司馬令奪摽一一飛歩疾槃槊兩兩飜身勁覇上今朝且兒戯衛青異日須天􅄑和貢甫送元考不至蓬山有行客欲上北城舟學問本閎􅀶言談悲謬悠常陳帝王畧得試紫雲樓一時驚豪㨗况復富春秋朋逰所欣附争欲致綢繆承明動郷思􅀊乆道苦􅁱忽懐淄川組夙昔願始酬出餞集儔侣青􅂬期少留酒䦨竟不至睠睠乆臨流微我獨有咎此詩聊可求京師􅀚音院新堂九衢言語亂人耳三市塵沙眯人目猿狙未慣褁章綬魚鳥寧忘慕谿谷悵無棲􅀫在清曠欲弄潺湲愈煩燠道人誰氏斥隹境决漢披霄敞華屋駢羅嶷嶷三秀石藂迸姢姢两􅁱竹雲蒸雨泄􅀍巖􅊤海倒河垂動林麓頓驚俯仰逺􅅝濁豈􅀡形骸擺羈束觧衣堅坐暝忘返飲水淸談心亦足丈夫壮志須坦蕩曲士隂機謾飜覆青鞋赤舄偶然爾安用區區巧追逐元豐􅀋藁卷之五
