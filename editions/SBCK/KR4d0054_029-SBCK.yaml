front:
  text: 元豊􅀋藁卷之二十九
  hash: sha256:2ad55b265814dfe03fc709ff71ef3b94eb35977d67cb24306add126d3d444217
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_029-1a}
body:
  text: 䟽熈寕轉對䟽准御史䑓告報臣寮朝辤日具轉對臣愚淺薄恐言不采然臣􅀼􅀚唐太宗即位之初延群臣與圖天下之事而􅀎絀封倫用魏鄭公之􅀃􅀁以成正􅀚之治周世宗􅀄即位亦延羣臣使陳當世之務而􅀎知王朴之可用故􅂋徳之政亦獨􅀎変五代之因循夫當衆􅀃之馳騁而以獨見之言陳未形之得失此聽者之所難也然二君􅀎辨之於羣衆之中而用之以收一時之效此後世之士􅀁以常感知言之少而頌二君之明也今陛下始承天序亦詔群臣使以次對然且􅀅􅀊餘未聞取一人得一言豈當世固乏人不􅁕以當陛下之意與抑所以延問者特用累世之故事而不必求其實欤臣愚􅀼計殆進言者未有以當陛下之意也陛下明智大畧固􅀅比跡扵唐虞三代之盛如太宗世宗之􅀁至恐不􅁕以望陛下故臣之􅀁言亦不敢効二臣之卑近伏惟陛下超然獨􅀚扵丗俗之表詳思臣言而擇其中則二君之明豈􅁕道扵後世而士之懐抱忠義者豈復感知言之少乎臣􅀁言如左臣伏以陛下恭儉慈仁有􅀎承祖宗一作宗庙之徳聦明􅌖知有􅀎任天下之材即位以来早朝晏罷廣問兼聽有更制変俗比迹唐虞之志此非群臣之所􅀎及也然而所遇之時在天則有日食皇変之異在地則震動䧟裂水泉湧溢之災在人則有饑饉流亡訛言相驚之患三者皆非常之変也及一作又從而察今之天下則風俗日以薄􅁖紀綱日以弛壊百司庻務一切文具而已内外之任則不􅁕於人材公恐之計則不􅁕扵食貨近則不􅀎不以盗賊為慮逺則不􅀎不以夷狄為􅁨海内智謀之士常恐天下之􅀔不得以乆安也以陛下之明而所遇之時如此陛下有更制変俗比迹唐虞之志則亦在正其本而已矣易曰正其本萬事理臣以謂正其本者在陛下得之於心而已臣􅀚洪範所以和同天人之際使之無間而要其􅀁以為始一作本者思也大學􅀁以誠意正心􅁱身治其囯家天下而要其􅀁以為始者致其知也故臣以謂正其本者在得之扵心而已得之扵心者其術非他學焉而巳矣此致其知所以為大學之道也古之聖人舜禹成湯文武未有不由學而成而􅀓􅀃周公之輔其君未嘗不勉之以學故孟子以謂學焉而後有為則湯以王齊桓公以覇皆不劳而􅀎也盖學所以成人主之功徳如此誠􅀎磨礱長飬至扵有以自得則天下之事在扵理者未有不􅀎盡也􅀎盡天下之理則天下之事物接扵我者無以累其内天下之以言語接扵我者無以蔽其外夫然則循理而已矣邪情之所不􅀎入也􅀙善而巳矣邪􅀃之􅀁不􅀎亂也如是而用之以持乆資之以不息則積其小者必至扵大積其㣲者必至扵􅂋古之人自可􅁒之善而充之至於不可知之神自十五之學而積之至於從心之不踰矩豈他道㢤由是而巳矣故曰念終始典于學又曰學然後知不􅁕孔子亦曰吾學不厭盖如此者孔子之􅀁不􅀎巳也夫􅀎使事物之接扵我者不䏻累其内所以治内也言語之接扵我者不􅀎蔽其外所以應外也有以治内此所以成徳化也有以應外此所以成法度也徳化法度旣成􅀁以彂育萬物而和同天人之際也自周衰以耒道術不明為人君者莫知學先王之道以明其心為人臣者莫知引其君以及先王之道也一切苟簡溺扵流俗末丗之卑淺以先王之道為迂逺而難遵人主雖有聦明敏逹之質而無磨礱長飬之具至於不􅀎有以自得則天下之事在扵理者有􅀁不􅀎盡也不􅀎盡天下之理則天下之以事物接於我者􅁕以累其内天下之以言語接扵我者􅁕以蔽其外夫然故欲循理而邪情􅁕以害之欲從善而邪􅀃􅁕以亂之如是而用之以持乆則愈甚無􅀘行之以不息則不能見效其弊則至扵邪情勝而正理㓕邪􅀃長而正論消天下之所以不治而有至扵亂者以是而巳矣比周衰以来人主之􅀁以可􅀓扵後世者少也可傳於後卋者􅀂漢之文帝宣帝唐之太宗皆可謂有美質矣由其斈不􅀎逺而􅀁知者陋故􅁕以賢於近世之庸主矣􅀂夫議唐虞三代之盛徳則彼烏足以云乎由其如此故自周衰以来千有餘年天下之言理者亦皆卑近淺陋以超世主之􅀁便而言先王之道者皆絀而不省故以孔子之聖孟子之賢而猶不遇也今去孔孟之時又逺矣臣之􅀁言乃周衰以来千有餘年所謂䢊逺而難遵者也然臣敢献之扵陛下者臣􅀚先王之所巳試其言最近而非逺其用最要而非迂故不敢不以告者此臣所以事陛下區區之志也伏惟陛下有自然之聖質而漸清扵道義之日又不為不乆然臣以一作所謂陛下有更制変俗比迹唐虞之志則在得之扵心得之於心則在學焉而巳者臣愚以謂陛下宜􅀚洪範大學之􅀁陳知治道之所本不在扵他􅀚傅􅀃周公之所戒一作勉知學者非明主之所宜巳也陛下有更制変俗比迹唐虞之志則當懇誠惻懼以講明舊學而推廣之務當扵道徳之體要不取乎口耳之小知不急乎朝夕之近効復之熟之使聖心之􅀁存從容扵自得之地則萬事之在扵理者未有不䏻盡也䏻盡萬事之理則内不累扵天下之物外不累一作蔽扵天下之言然後明先王之道而行之邪情之所不􅀎入也合天下之正論而用之邪􅀃之所不􅀎亂也如是而用之以持乆資之以不息則雖細必鉅雖㣲必􅂋以陛下之聦明而充之以至扵不可知之神以陛下之睿知而積之以至扵􅀙心作心之不踰矩夫豈逺㢤顧勉強如何耳夫然故内成徳化以成法度以發育萬物而和同天人之際甚易也􅀂夫移風俗之薄悪振綱紀之他壊変百司庶務之文具厲天下之士使􅁛其位理天下之財使贍其用近者使之親附逺者使之服從海内之􅀔使之常安則惟陛下之所欲何求而不得何為而不成乎未有若是而福應不臻而変異不消者也如聖心之所存未及扵此内未􅀎無秋毫之累外未􅀎無纎芥之蔽則臣恐􅁒法先王之政而智慮有所未審欲用天下之智謀林諝之士而議論有􅀁未一扵國家天下愈甚無􅀘而風俗綱紀愈以衰壊也非獨如此自古􅀁以安危治亂之幾未嘗不出扵此臣幸􅂪降問言天下之細務而無益扵得夫之数者非臣所以事陛下區區之志也輙不自知其固陋而敢言國家之大體惟陛下審察而擇其宜天下幸甚劄子自福州召判太常寺上殿改明州不果上伏以陛下聦明睿知天性自然可謂有不世出之姿自在藩邸入承顔色出奉朝請怡怡翼翼不自暇豫至㳟極孝聞扵天下及踐大位内事两宮外􅃊七庙仁􅀍公族徳形閨門嬪御備官不滛扵色音楽備数不溺扵声食菲衣綈務遵莭儉䑓卑囿小無所増莭近習無便嬖左右無􅀻謁未嘗出逰幸未嘗􅀙畋魚其扵􅁨憫元元勤勞庻政則念慮先於兆朕祗慎盖扵纎芥昼而訪問至日昃夕而省者覧至扵夜分毎群臣進見接之禮䔍而情通凡四方奏事莫不朝入而暮報雖大禹之勤于􅀖文王之不暇食無以加此其淵謀逺略必中事㡬善訓嘉謨可為世則者傳聞下􅁟雖僅得其一二巳􅁕以度越衆慮非可闚測可謂有君人之大徳其高深宏逺則憫自晚周秦漢以来世主不􅀎獨見扵衆人之表其政治􅀁出大氐踵襲卑陋因扵世俗而已扵是慨然以上追唐虞三代荒絶之迹修列先王法度之政為其任在已可謂有出扵数千載之大志変革因循號令必信使海内􅀚聴莫不震動群下遵職惟恐在後可謂有􅀎行之効盖刻意尚行不差毫髪縉紳之士有􅀁不􅀎及􅁨勞􅅥勵無􅈈湏􅁷又非羣臣之􅀁能望可謂持起扵三代之後非常之主也愚臣􅀌陋熈寕二年出通判越州因轉對幸得論事敢㩀經之􅀃以誠意正心􅁱身治國家天下之道必本扵學為献逮今十有一年始得望穆穆之清光敢别白前􅀃而終之臣以謂陛下有不世岀之姿有君人之大徳與岀扵数千載之大志又有􅀎行之效特起扵三代之後然顧以治囯家天下之道必本扵學為献扵陛下何也盖古之聖人雖出平其􅀋㧞乎其萃然至其成徳莫不由學故堯舜性之也而見扵傳記則皆有師其史官識其行事則皆曰􅀂稽古至扵湯武身之也則湯學扵伊尹武王學扵太公見扵詩礼孟子在商高宗得傅􅀃作相其命􅀃之辭曰予小子舊學于甘盤而傅􅀃告之則曰學于古訓乃有􅀗又曰惟學遜志務時敏厥􅁱乃来又曰惟斆學半念終始典于學盖髙宗既巳學于甘盤矣及傅􅀃相之乃更丁寕反復勉之以學其要㱕則以謂當終始常念于學明學盖不可一日而廢也至扵孔子之自叙則自有十五而志于學至于七十而􅀙心所欲不踰矩天以孔子之聖必志于學其學之漸每十年而一進至于七十矣其從心也盖不踰矩則􅀓􅀃所􅁛當終始常念于學者雖孔子之聖不􅀎易也故揚子曰學之為王者事乆矣堯舜禹湯文武汲汲仲尼皇皇其巳乆矣聖賢之䔍扵學至扵如此者盖楽而不亂復而不厭者道也測之而益深窮之而益逺者聖人之言也知不􅁕與困者學也方其始也求之貴􅀓畜之貴多及其得之則扵言也在知其要扵徳也在知其奥􅀎至扵是矣則求之愽畜之多者乃筌蹄而巳􅀁謂多間則守之以約多見則守之以卓也如求之不􅀶畜之不多則未有扵言也􅀎知其要未有於徳也􅀎知其奥􅀁謂寡聞則無約寡見則無卓也子貢􅁛孔子之學識其逺者大者則扵言也􅀎知其要扵徳也􅀎知其奥然後􅀎當扵孔子之􅀁謂學也審􅀎是則存扵心者有以為主扵内天下之事雖其変無窮而吾􅀁以待之者其應無方古之大有為扵天下者未有不出扵此也堯舜湯武所以為盛徳之至孔子􅀁以􅀙心而不踰矩或得其行者未得其􅀁以行得其言者未得其􅀁以言孟子之所謂聖而不可知之謂神在是而巳矣陛下萬㡬之餘日引天下之士推原道徳而講明其意陳六藝載籍之文而紬繹其􅀃􅀶者深思無有觧倦其折􅂨是非獨見之明老師宿儒所不能到此臣之􅀁聞也有不世岀之姿與君人之大徳又有岀扵数千載之大志持起扵三代之後此臣之所知也則陛下之學巳可謂至矣然臣區區敢誦經之陳言以進扵左右者誠􅀅順陛下之聖志采􅀓􅀃始終典學之言􅀚孔子少長進學之漸以陛下之明智知言之要知徳之奥皆陛下之􅀁素畜誠以陛下之樂道而􅁇之以不倦以陛下之稽古而加之以不巳使天性之睿智􅀁造者益深所積益厚日日新又日新其扵自得之者非徒足以待萬事無窮之變而應之以無方天下之人必􅀅得陛下之行者不得其􅀁以行得陛下之言者不得其􅀁以言堯舜湯武所以為盛徳之至孔子􅀁以從心而不踰矩孟子􅀁謂聖而不可知之謂神不在扵陛下而孰在㢤繇是歛五福之􅂟以大賚庻民享萬年之休以永綏方夏徳厚扵天地名昭扵日月惟聖意之􅀁在而巳臣愚不敏􅂪㤙賜對不敢毛舉藂細之常務而扵國家之體冐言其逺且大者此臣􅀁以愛君區區之分也伏惟留神省察元豊􅀋藁卷之二十九
