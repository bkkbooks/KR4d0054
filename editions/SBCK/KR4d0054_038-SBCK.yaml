front:
  text: 元豊􅀋藁卷之三十八
  hash: sha256:d526ff08b10a5dd6d389682863d045b494a86f11bbdab95b3d7f5dda074745ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_038-1a}
body:
  text: 􅀕文祭歐陽少師文惟公學為儒宗材不世出文章逸發醇深炳蔚體備韓馬思兼荘屈垂光簡編焯􅀂星日絶去刀尺渾然天質辭窮卷盡含意未卒讀者心醒開􅂪愈疾當代一人顧無儔匹諌垣抗議氣震回遹鼓行無前跋㚄非恤世偽難勝􅀌堅竟窒􅂵微玉堂獨當大筆二典三謨生明蔵室頓挫彌厲誠純志一斟酌損益論思得失經軆慮萌沃心造膝帝曰汝賢引登輔弼公在廟堂尊明道術清静簡易仁民爱物歛不煩苛令無迫猝棲置木索里安户逸櫝歛兵革天清地謐日進昌言從容密勿開建國本情忠力悉卯未之􅀊龍駕颷欻􅄪極大艱垂紳秉笏乾坤正位上下有秩功􅀍社稷䒭夷召畢公在廟堂緫持紀律一用公直兩忘猜狔不狹朋比不虞訕嫉獨立不回其剛仡仡愛飬人材奨成誘掖甄㧞寒素振興滯屈以為巳任無有廢咈維公平生愷悌忠實内外洞徹􅀄終若一年始六十懇辭冕黻連章累􅀊乃愈所乞放意丘樊脫遺覊􅎗沉浸圖史左右琴瑟氣志浩然不陋蓬蓽意謂百齡重休累吉還斡􅂦軸賛㣲計宻云胡傾殂憗遺則弗聞訃失聲皆淚横溢戅􅄀不敏早􅂪振祓言繇公誨行繇公率戴徳不酬懐情獨欎西望轜車莫持紖紼維公犖犖德義譔述為後世法終天不没託辭叙心􅂚䆒髣髴􅀕王達龍圖文惟公有獨立之志不覊之材揚旌閩楚按莭江淮止如山淵動􅀂風雷衆皆異其施設曽孰測其津涯􅀂夫拯急難扵水火下雋傑扵蒿莱越拘挛而不惑豈淺狭之䏻偕至扵稱物引􅀋興言寓懐逺叅騷雅近雜嘲諧麗兼組藻美軼􅌦瑰皆􅁕以聲駕多士望隆九陔然而位不過郎中名不過直閣流落白頭委蛇一壑豈人事之當然信命存扵冥漠昏愚不肖早辱公知拊循爱勉施及其􅀻聞公之逝惻楚歔欷戴徳莫酬寓薦以辤􅀕張唐公文熈寕六年六月一日維公作徳于躬實方實厚實夷實訐實堅寔茂彼嗜而争我有不惑彼嫵為朋我肆而特我抗其辭維彼之黙始燁其華儒林礼官廼碩其實侍􅀙之班維帝時咨維士時附尚其昌言式乆在序告疾于朝廼長南服里無嘆聲士女輯穆以老得謝俶其歸装車御未驅計聞四方維余先人公同年友公子我姪又託婚媾實殽于豆實酒于觴馳辭告誠維以永傷􅀕孔長源文嗚呼長源拔迹􅀌艱刻志勵力升徳自幽廼不家食燕其壽母歸飬以色興其士友跂我淳則㣲獨考古載辭于䇿亦􅀙爾知有婉軍畫為長以舒為􅀅不亟迺使荆粤銓材著職㓕熄苛嬈蘇僵􅀶瘠㑹稽之治里無猝迫􅀄以詆去民實戴徳卒還省部廷論之直維曰􅀅歸東符之析孰云不幸奄與生隔有親九十丗為楚側維其䔍行匪矜匪飾其彪為文其霈為澤天與厥後賢䏻交蹠有實有華光長譽白善豈無􅂆􅂟馬兹得維我與公綢繆平昔詩書討論相求以益我試于郷自公考擇弥乆彌親情隆意􅀗聞公之訃泫然心䀌馳奠千里寓陳悃愊􅀕王平甫文熈寕十年十月二十一日嗚呼平甫决江河不􅁕以為子之高談雄辯吞雲夢不􅁕以為子之􅀶聞強記至􅀂操􅁓為文落筆千字徜徉恣肆如不可窮祕恠恍惚亦莫之係皆􅁕以高視古今桀出倫􅀋而况好斈不倦垂老愈專自信獨立在約彌厲而志屈扵不申材窮扵不試人皆待子以􅀅昌神胡速子扵長逝嗚呼平甫念昔相逢我壮子稚間託婚􅊚相期道義毎心腹扵超軼亦情親扵樂易何堂堂而山立忽泯泯而颷駛訃皎皎而猶疑淚汍汍而莫制聊寓薦扵一觴纂斯言而見意􅀕宋龍圖文嗟乎次道公之一無之字扵古今典章沿革得之扵心山蔵海積又扵舊聞􅀮􅂋纎悉析之以口天髙日白公在朝廷群公百司解惑􅇚疑公為蓍􅀛公在太史維僚與属正繆辨訛公為耳目今公亡矣廷有大議問故事者衆夫其㱕國有大典考前載者人失其師况公行不絶俗而動有常度言不忤物而辭可疪靖退之風愈而弥邵方直之操自信而不回至扵䔍友尚舊比義親仁追徃烈而競逐豈庸態之􅀎隣然而蚤蹈厲扵儒舘晚委蛇扵􅀙臣曽未得歴禁之任廊庙之彌綸何鵉儀而鵠峙忽颷逝而皇淪哭公之䘮者客不絶扵門庭弔公之家者使相望扵道路維昏鈍之少與獨綢繆而有素淚淋浪而莫收情忉怛而奚愬嗚呼唐季五君史曠其録公蒐亡而集霣盖旁羅而逺属至扵帝宅神州祖功宗徳咸在筆削具存方冊争日月之光輝與天地而終極則公位雖屈而未盡名益乆而逾章彼冨貴而磨㓕豈得公之亳芒纂佘衰而以此聊寓薦扵一觴􅀕亡妻晁氏文治平元年五月三十日子有仁孝之行勤儉之徳宏􅁉端荘聦明静黙窮逹䏻安死生不惑可以齊古淑人為丗常則歸我之昔明年始笄言無疵悔動應衡規親踈恱慕雅艾嗟咨事姑之礼左右無違服難体順惟日孜孜諧我属人又䔍以􅀻有犯不校有劳不施人隆巳約乃以為宜衣有穿􅁦珥無光輝曰順吾性餘復何為紛綸丗務偪仄群疑子陳得失効􅀂蓍􅀛及其既退婉婉其儀不矜以色不伐以辭幽間􅀷謐度量誰窺吾貧口衆智不継資脫粟藜藿具無塩醯人不堪􅁨子獨怡怡綰綜雖爱不偏以慈訓誨惟謹曰宜矣時我扶我翼共䖏窮覉鋤荒􅀘漏細大無遺嗚呼天禍我家降集㐫厲始来京師辛丑之􅀊子之方壮疾􅐄中傷孰云此日一女先亡子雖自逹病豈冝然自秌至春有益無痊迎醫市薬我力為殫術寕非善不勝于天􅀅逝之夕逆知其期語論自􅀂精神不衰徧召室人告以長歸嗚呼哀㢤父失賢女姑亡孝婦子丧嚴師吾􅃜益友時􅀊雖徃悲酸則新禫月之終奠此一樽敎飬二子期􅀗子心時良返子託葬先林言如不復誰為我人長號叙哀寓以斯文􅀕􅄯少卿文鞏蚤以􅀌蒙與託嘉好自始迄今踰二十載繾綣相與義厚情親㑹合乖闊則有書問開􅁓披辭猶􅀂際遇不意今者公遽淪亡得訃歔欷涕随声發海濵獨哭心與誰言仍聞歸旐旅次餘杭隔此濤江寓陳薄奠公乎知否巳矣柰何舘中􅀕丁元􅎇文嗟乎元珍别子幾時孰謂子徃無復来期子之爲人渾厚平夷不阻爲崖不巧爲機朋僚恱附族黨懐依其動恂恂必應䋲䂓其語諄諄不見瑕疵􅀙亊之畫吾無妄随長人之政彼有遺思其蓄鈞石其出銖錙惟夫斈問冨有書詩濡墨操􅁓冩之文辭春陽滿野萬物荣滋匪營匪飾疊異并竒既精衆作扵詩復􅀹清新俊逸與古為儔讀之􅎈然可破百􅁨哀鳥之秩天禄之逰謂淹巳乆既晚方􅀵孰云未幾斥置南州書猶未復訃巳来投衆為哀傷况扵吾属初疑終駭失涙滿目莫矧子棺莫禭子服礼多不及情豈䏻忘寓辭千里侑此一觴朝中􅀕錢純老文嗚呼公乎窮經及史旁兼百氏廢寝與食不虚寸晷䔍好無倦華顛愈勵強記多識箱輸屋偫闊議崇論河垂海委詩賦講􅀃射䇿三科金馬玉堂經帷三軄寒􅀂自至無馮與翼銓綜􅄪試士曰予歸尹正三􅀊衆曰予依公扵􅀁聞維斈之力公於􅀁知則維自得利害之際人鮮䏻安彼為惴惴公獨􅁪􅁪爱􅁖之情人鮮自克彼有贅􅃜公為衡石世􅀁並逐公有不求彼囂我静則莫我􅀹曽不三事位云未䆒曽不百年数云非壽殱國之良在列嗟咨貴民之望耋艾歔欷天子聞䘮馳使臨視劳恤煢􅀌賙憐乏匱凢我同朝矧曰同志哀由感觸孰知失涕寓焉在庭薦羞在机公乎来哉􅀉誠兹誄􅀕李太尉文公先種徳碩大于乆母宋仁祖維荘懿后公維后姪考異姓王入長六師外垣大􅀖不以貴盈遜悌慈良昭陵未逺公奄云亡輤車之東致薦一觴􅀕致仕湛郎中文維公早以郎潜安扵飬志晚而家食曽不待年治績紀扵朝廷行實椎扵郷里掄亡未逺窀穸有期􅀼仰高風敢陳薄奠又􅀕亡妻晁氏文鞏無状遭禍早失賢妻徘徊京師零丁􅀌宦廼致旅櫬未就先塋夙夜思惟心顔愧怍今􅂪恩􅀘外道出東南敢啓菆宮進登舟御間関回阻􅀅致郷園而鞏比至淮瀕􅁁趨官守其扵奉承靈轝經渉大江方復假人經营護視永惟見亮尚頼有靈􅀂夫觸冐川途㡬数千里使保清謐則惟餘休至扵推擇吉辰脩嚴􅁙礼俟得時日敢不躬親惟其鍳之故以情告代人􅀕李白文子之文章傑立人上地闢天開雲蒸雨降播産萬物瑋麗瑰竒大巧自然人力何施又如長河浩浩奔放萬里一瀉末势猶壮大騁厥辭至扵如此意氣飄然發楊儔偉飛黄駃騠軼群絶􅀋擺弃羈􅎗脫遺轍􅁤捷出横歩志狹四裔側睨駑駘與無物比始来玉堂旋去江湖麒麟鳯凰世豈􅀎拘古今僻儒鉤章摛字下里之斈辤卑義鄙士有一曲拘牽泥􅆡亦或狡巧争馳势利子之可異豈獨兹文䡖世肆志有激斯人姑熟之野予耒長民舉觴墓下感嘆餘芬􅀕王都官文維公材敏而宏志眎萬里高辝大篇出仕天子主簿于閩聲駕其長清江之謀矯矯逾壮于韶于昇條教岀巳伺公􅀁為萬目齊眎奪奸于幽耋吏丧膽悍黨睢睢根柢卒斬里謳戸􅁔惟惸寡獨在右惟監在下惟属在側惟僚相講戴服􅀅起􅀅昌俞考以難􅂚赴􅂚㱕忽殞無還公扵先人實􅂬實厚至公諸子鞏辱親友於公家行表裏洞知扵黨不校於尊不違出升公堂不撓毫髪退􅀙其􅀻婉婉曲折鍾山峥嵘下惟江水昔公此臨委蛇舄履今子六人􅁙公于此銘鞏之為辭貧事􅊆千里􅀉誠以兹一簋􅀕􅀽大監文於乎越蜀荆呉三方萬里公馬騑騑幞印而使蛮墟海聚獄無濫辭峨峩卭􅈎貨走京師東南之粟風䑺手筰􅀊鎮太倉萬艘尾錯遂副㑹府肆其心畫出屏于宣以我偃側九卿之行得謝以歸冕弁入里昔時布衣進退則然當世所嗟不貴以驕不冨以奢翼翼其行坦坦其衷隤然順退長者之風白髪雖多几杖未随􅀏言在耳巳哭于帷眷然撫我孰如公􅀹先人不幸託載公舟我生方屯戴徳莫疇羞醪則㣲以陳我悲􅀕関職方文嗚呼関公以文中科以材為吏艱于厥􅀄四十始仕終領兩州其治大肆告老于朝􅀰官以㱕卿士大失􅀚望嗟咨孰為公居竹水之寰孰為公園正據湖山公出公休八子侍側仕者太半同時共籍其聲􅂋揚其習順慈萬石之風百世相差有後如斯世誰􅀎及而况公年躋于八十或如公壽莫如公安􅂂勞撫少其意桓桓拜公以晚見託以姻書猶在机訃巳及門福禄之全在公奚憾念昔思耒族親之感吊廬在東逺不及㑹泣叙斯文千里之外繾綣之情巳扵一酹􅀕黄君文嗚呼宋且百年號令萬里姦臣黜除􅀹者擯死巖材里秀驅駕而使蓋君之生有時如此當世之官有㣲有盛盛者廟堂斟酌王命千􅀠百司進竢退聴出長四方玉斧金乗􅀖侯衆􅀅傳牒而令㣲者紛紛或陪或正千品萬名各有操柄人皆敏手捷取䏻併君獨扵求以死終病同時之人勤營善蓄萬籯儲金萬襲蔵玉遺餘野積不䏻匱櫝君獨一身衣食常蹙兹非其命􅂚以至兹君䏻自逹可以無悲親戚念君􅀎不歔欷我之老姑歸君為婦與君歴年顛沛同有今對其孀寕匪我傷来問来吊屢至其堂􅁙君南山冬氣巳烈薄醪時羞觴豆肅設侑以兹文與君一訣元豊􅀋藁卷之三十八
