front:
  text: 南豐先生元豐􅀋藳卷之二
  hash: sha256:fd782fc1b1b14cd111b08c42e5e3d033586991c0e31025d9d55d1af609e51542
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_002-1a}
body:
  text: 古詩􅀉子進弟憶子去家日南風始吹衣今來日未㡬蝇蚊已群飛思子兼晝夜何啻如渴飢喜聞逺客至手自排荆扉客送書一􅁓翰墨子􅀁揮上言山居悪夢􅄰接庭闈次言服畎畆禾􅁰膴已肥其餘業文字頗側􅀮與微題詩在紙尾語老意不非我喜何􅀁似大似客得歸我與子事親未飽藿與薇常􅀂去左右辛勤治鞍鞿子行何時反我眼日已晞應湏畢秋刈相見􅇺依依喜寒純一作沌陽四時行無復氣節勁日火相􅄍吞乾離力還併玄􅄀失所安恇怯擅操柄我行東南野憒憒􅀂酣醟喜逢青林長葉蔓可韜映正嗟天之高玉色萬里净忽驚西山雲毫末生一鏡湏更油然合㸃滴飛雨迸颼颼漸相扶霶霈一何盛積隂􅀋潛師形􅀔乆已偵乗時出幽墟奮發精爽競亘天逐炎官顓面修火令威加乾坤􅀙冽冽氣貌正人無焦煩憂氷釋天下病豈湏雪包林已壓朱鳥横南方天精兵瘴􅊜灾可屏争難奪刀殳發巧搜壍穽收功當在今殺伐順天正況云麰麦祥已斍閭里慶高歌叩吾轅上頌天子聖詠史二首京室天下歸飛薨無餘地囯士憂社稷􅂗人飬聲利貴賤競一時峩冠各鱗次子龍獨幽逺聘召漠無意子雲無由歸俛首天禄閣君乎獨西南抗顔􅀚廖廓無猜到沉􅄀有故驚寂寞用心豈必殊拘肆事終各江湖江湖俗畏逺幽好自相宜論迹異驚衆辞囂如避時優游可以斈􅅔蕨易為􅀻胡然弃回櫂霜雪有驅馳將之江淛延祖子山師柔㑹别飲散獨宿􅀌亭遂書懐别蜀客向何䖏欲􅀚浙江潮擬舟呉門栅况㑹故人招置酒呉亭上無人吹紫簫浩􅀚萬物変䬃尔生凉颷遂恐時節晚芳蘭從此凋功名竟安在冨貴空寥寥鴻鵠舉千里鸞鳯翔九霄胡為蓬蒿下日夜悲鷦鷯車馬夕巳還行人亦飄颻浩然滄海志􅄫寞守空霄詠雪􅃊􅃊層氷塞川澤洶洶北風鳴木石黃雲半夜滿千里大雪平明深一尺两儀混合去纎間萬􅀋韜藏絶塵迹蛟龍岌起抱崗峦江海横奔控阡陌野林縹􅄅苦難狀庭樹鮮妍疑可摘開門更覺山市静散帙偏宜􅁓窓白精光蕩射徧巖谷氣象峥嶸見松栢少年登望就䑓􅀚壮士衡凌向沙磧飢鼯嘷卧伏牙􅀲獵隼飛挐矜羽翮茆簷客聚滿幽􅇲桑徑人行没􅀟屐高堂暖􅀬厭羅綺環堵蕭條尚絺綌何當仰見白日照坐看先􅀙沙際釋漸􅆂溝畎兆豐富洗濯閭閻消瘴疫便乖東北生氣起自駕疲牛理燒塉荅裴煜二首拙者羞強合因成杜門居豈知公相尊一室􅀂有餘愛子冨文行顧為已不如所以子之黨頻見我僕車􅂬誠激􅀌緒合􅀂水縦魚新詩八十言筆端産璠璵屑屑委地蓬清風為吹嘘相期在規誨庶以輔頑踈􅋁􅋁今非古感激事真妄曽誰省􅀌心祗以餌群謗參差勢巳甚决起意猶強親朋為憂危議語数鐫蕩乆之等聾眊兀矣坐閭巷長嗟貧累心更苦病摧壮微誠豈天與今晨子來貺頋慙小人愚未出衆夫上狂言屈子吟浩歌仍子唱相􅂬匪貌濟所得實心尚時節雖已晏梅柳幸欲放過􅀙勿厭倦相持非欝盎􅀉王介卿憶昨走京塵衡門始相識踈簾掛秋日客庖留共食紛紛􅀃古今洞不置藩城有司甄棟􅆬度量弃樗櫟振轡行尚早分首斈壖北􅀄冬憇海昏夜坐探書䇿始得讀君文大匠謝刀尺周孔日已逺遺經竄墻壁倡佯百􅏜起冠􅅂稔回慝君材信魁崛議論恣排闢如川流渾渾東海為委積如躋極高望萬物著春色􅋁􅋁孟韓後斯文大難得嗟予見之晚反覆不能釋胡然藴環堵不收謀者惑明朝渡江還念念非可柳如醖冐炎暑毎進意愈塞維時南風薫木葉晃繁碧頽雲走石瀬逆坂上文艗欣聞􅀍檄來窮閻駐鑣軾促榻叩其言咸池播純繹行身抗淵損及物窺龍稷綢繆指疪病攻砭甚鍼石淺沚有停沙亦可洗珠璧論憂或共嚬遇愜毎同蟄正值祝融横金隅未提職高楼豁可望命載屡攀陟一不羅俗嬉怡然治紈墨露注尚忘疲更得蟾蜍昊雅愛張與余挽之置茵席群兒困不酬吽嚬聚譏摘仁義殊齟齬昧者尊􅁖音石一作烏石跖霧草変哀黃吟蛩閙朝夕君子畏簡書薄言返行役啇􅁔孺子别失淚染衣襋自􅀙促擢去㑹此隆冬逼何神鼓隂韛萬竅動謞儌城顛晲江浪蛟恠助掀射仁賢保無恙所想桂驚惕燁燁多吏􅀙良巳饋藜齸迨兹尺書至疑念始氷析蘭滫沓慈祥筠梧肆諧􅃴􅌭紛衆胥土署壘各嬉息其餘書牘背栗宻􅈁機織卷書勞來翰寸懐良士懌野泊轉平緑梅梢弄繁白金縮引柳荑芳氣滿原澤出門無所抵歸卧四楹寂術學頗思講人事多可惻含意不得發百憤注微臆揺揺詠顔色企足関途隔自慚兒女情宛轉抱妻戚吾念非吾􅀻何當託雲翼竒偶轉如輪終期援焦溺上人金節横光馬珂閙瑞鶻宫􅂁腰玉繞烟沙轣轆髙軒過路上千人瞻羽纛瑶魁精彩浮蒼龍江城四靣生春風城中壊屋書籖碧有客苦吟連旦夕麻衣塵暗抱書泣􅀊暮黄梁不供食白日瞳矓望龍坂坐上一言寒口暖西入天関洒霖雨須惜窮鱗在泥􅁟􅀄夏有感我從得病臥閭巷三見夏物争滋榮紅英紫蕚逐風盡高幹宻葉還隂成山亭水舘䖏䖏好朱碧萬實相駢擎林烏梁燕各生子翅羽已足争飛騰雉鷄五色繡新翮鷕鷕慕匹相随鳴穴蜂露蝶亦有􅀋歘徃復聚何翾輕箔蚕滿室事方盛繭綴下上如連星麥芒秧頴錯雜出高壠大澤填黄青物從草木及虫鳥無一不自盈其情嗟我獨病不如彼胷氣卧立常怦怦筋酸骨楚頭目眩強食豈得飢膚盈我身今雖落衆後我志素欲希軻卿十年萬事常坎􅇄奔走未足供藜羮愁勤未老􅂡先白多學只自爲身兵自然感疾憊形躰後日雖復應伶俜非同世俗頋顔色􅀁慕少壮成功名但令命在尚可勉屑細詎足傷吾平送人移知賀州溪石膠船秋瀬微南山巉空􅀔峩巍風露氣嚴花草緋天色㵳㵳􅀄鴈飛君子徃守東南圻旟旝綵錯如翔暈象西照地榮笏衣先後􅀠􅀙何頎頎􅀄君治縣參徳威吾人􅉼濡樂以肥念今奪去失􅀁依出者遮行居者希我思群公坐天圍心與星斗争光輝薦賢縮否言無違􅌺􅀂發石乘高機何此茂器時􅀁稀噤無一語為發揮敢作此什傳王畿旦暮璽書來勑歸之南豐道上􅀉介甫應逮冐煩暑驅馳山水間泥泉沃渴肺沙風吹汗顔疲􅆖喘沬白殆僕貟肩殷仰嗟早雲高俯愛芳陂潺空郵降塵榻净舘排霞関城隍壮形􅀔岡谷來回環紅芰姹相照翠􅀣欝可攀野苗雜青黃雨露施上慳巫覡謁群望簫鼓鳴空山憂農非吾職望􅀊􅀼􅀁歎憇當午日烈行瞻月􅀄彎星斗弄光彩羅絡亀火班跂􅂂雖云倦桑􅎚得暫還林僧授館舎田客扳鞍吾心本皎皎彼詬徒㘖㘖方投定鑑照即使征馬班相期木蘭楫蕩􅃞窮湾川謝章伯益惠硯人生對門東西陌口耳一間心誰傳况乃天地相去逺一在南海一在燕古今萬世復萬世彼亦居下此在前是非得失錯且繁以情相語何由縁造化豈不大且淵到此縮縮智且慳聖人智出造化先始獨俯仰吾坤乾一人詰曲意百千以文寫意意乃宣簡書軸載道相聮馳夷走貊通百蠻羲皇向今谷屢遷言語應接旦暮問聖人不死一作能術以此人與其􅀋殊蚑蠕外之君臣内父子仁義禮樂定筆端硯與筆墨乃舟船論功次第誰􅀎攀伯益於文敏且顓字向􅁓上生戈鋌與硯出入宜不􅂢胡乃贄我璧弃泉作詩知硯功小大報不充賜心焦然送劉醫愽小人乆病如愁感毎嘆地僻無良醫窮居索寞俗事少對坐荏苒風光移深冬山城萬木落隂氣蕩射生寒颸東方􅄍日光入户素璧閃閃含清輝臨汀劉君落落者六伎絶􅊆如天資潜心宻與造化㑹布指夐有精靈随馬蹄所至病歴屈我於此時忻得之一來握手與我話委曲衰旺肺與脾囊中珎丸撮星斗俾我咀嚼心顔怡洒然沉痾一日解始免未老為枯骸越人湔膓術已緩仲景納餅術可卑劉君與我徳至大拱璧巨􅂦非酬禆我嗟劉君乃士􅀋進退婉婉無瑕玭况又新承太守薦羈鞅日背東門馳禁林侍􅀙務周慎君挾所有直相宜貴人四難真可患去此足以爲時規送陳啇學士柳黄半出年將破溪溜浸苔強萬箇溪頭蒲葦各萌芽山梅最繁花已堕物色撩人思易狂况躋别館清何那城東日晚公將去纛影未離愁四座公於萬事不彫鐫心意恢恢無坎坷來從奎壁光鋩下􅀏􅀝樽筵成郡課嗟予齪齪才性下弃置合守丘樊餓公持姓名動人主袚飾寜嫌筆端挫從今清夜思江路夢送公船先北過送錢生天下斈校廢師生無所依子來滿槖書璨璨璧與璣一字未得讀叩言忽言歸怜子甚有志事時與子違吾無一畆宫留子爲發揮去矣善自立母使嗣音稀雪詠雲花好㓗白不待詠􅀃知區區耴相似今古同一辭薩􅀎比衆作小去筆墨畦誰能出千載為雪立傳碑四座且勿􅁔听我白雪詩天地於降雪其功大艱難去年暖風日冬在春已還山屏盡􅀷碧危溜聲亦潺草萌各已動梅花開㝡繁鑪火殆可謝衣絮誰復言推排臈已過一変天更寒飄風動木石激射難出関􅀷房擁髙燎領肘曽不温仰視雲壓疊垂欲藉屋山元氣不復呵飛鳥折羽翰誰排河漢流欲墯莾蒼間道為黒風遮凝凍無住著紛紛成片􅈁六出非刻削􅀄時漏餘滴雜雨猶可惡迤邐縦飛洒態状不可名或稀􅀂有待或宻似相萦或溺乆宛轉或狂自軒騰群來信汗漫􅀌飄亦零丁屋角􅀄漸班瓦溝忽皆平圽窪一巳滿茅茨壓將傾􅀣木遍封裏岡山􅂇峥嶸堦除断纎􅁾池臺有餘清流塵寂巳掩物象窅皆明厨煙或中鑱里表仍􅀌擎長街􅀮缺甃荒城混􅀌稜沙水􅆌相合扁舟在啚屏啄草鳥雀蹤篆字遺蹤横頓驚宇宙内侈麗皆天成引望誰􅀝楼秀色亂自睛永懐衡門士辛苦守六經山藜不充腹笔硯乆已冰柔茵坐中堂誰問公與卿世事汨無意燭換猶飛觥文犀􅎹朱箔陽春謝􅌙筝所䖏殊䖏所苦樂固異情誰致此不齊上天意何營蒼蒼不可問奕奕洒未停明晨起相䖏寒日已满窓井甃破圎素砌苔還故蒼萬物去復冐顔色皆復常融爲大田水其流日滂滂方塘接深甽澄徹碧玉光豈惟癘疫消庻驗百榖祥願彼守經士幸可継糗粮􅁨民既非職空致新詩章送僧晚容飛光無停芳􅀊䦨群陽不行寒氣動踈篂有韻窓含雪重幕無温筆捿凍蕭條山草葉始枯綽約江梅蕋先弄無人為我取酒斟有客來前乞詩送多情為客不􅀎已捲􅁓連書筆鋒縦七言百字拙且卑俗眼方憎汝休重送叔延判官北風吹空雪花冷平鋪雲濤冐峯頂江長水闊飛鳥絶沙􅀣參差動波影君子􅀙戎碧油下緑髪清瞳笏􅂁整大馬髙車府中罷一船沿流背丁丙魴魚勝銀罇酒羙物物當前􅀂圖屏危帆徤櫓醉中去千里奔過猶一頃明年随春到京國紅紫燒空折桃杏獻書又謁蓬萊宫新􅓯豪曹試鋒頴况遇朝廷方急材驥騄騤騤足當騁山荼花山茶花開春未歸春歸正值花盛時蒼然老􅀣昔誰種照耀萬朶紅相圍蜂蔵鳥伏不得見東風用力先吹嘘追思前者葉盖地萬木􅃤􅃤攅空枝寒梅数綻小顔色霰雪滿眼常相迷豈如此花開此日綘艶獨出凌朝曦為憐勁意似松栢欲攀更惜長依依山榴淺薄豈足比五月霧雨空芳霏丁亥三月十五日茫茫月色如溪沙萬里不有纎雲遮今年寒氣争春來雪大如掌随驚雷臨川城中三月雨城東大丘汨為渚天地慘慘無開時常恐蟄死和與羲此時謂月水中沒溺入蛙膓那復出豈知今夜月光圓照徹萬物無遺偏人間有人司重輕安得知汝有時明舎弟南源刈稻買田南山下禾􅁰忽巳秋糟床待此注豈止衣食謀窮隂迫霜霰不可遅揫收吾黨二三子晨行巳寒裘乆苦城中囂至山諒優㳺况已除險􅁾新堂置嵓幽窓軒衆峯出階墀水淙流良材未成種草􅀣亦巳稠寒花開照耀谷鳥樂啾啁心與珍境接佳興固已遒而况饋朝夕甘羙日可搜黄鷄肥落爼清酤湛盈甌時鮮鱠氷鯽餘滋折丹㨨此味何以侑文辭頗賡酬晝務誠遺滯夜工督春諭因􅀚稼穡勞始覺奉養優此樂詎非幸人生復何求送子固自起徃意不可留奉和滁州九詠九首并序先生貶守滁滁小州先生為之殆無事環州多佳山水最有名瑯瑘山近得之曰幽谷先生数逰其間又賦詩以樂之鞏得而賡之者凡九章瑯瑘泉石􅂐陽氷絶藝天下􅁛瑯瑘石􅂐新有名􅀄留泉涯俗誰頋一日貴重繇先生古今書法不可数猶有字本存於經我於八体未曽學雖得此字寧能評高文老筆又􅀁愛欲叙髣髴辞非精筆端應驅􅀑神聚筆妙夐與隂陽争刻雕萬象出㝠昧不見刀斧曽經營竒形挻􅀂聳崖巘險􅀔直恐生風霆雨來莾蒼龍蛟起秋入􅋁沉星斗明先生七言載其側爲地自與丘山平先生抱材置荒郡有􅀂此字存嵓扄當還先生坐廊廟悉引萬事歸䋲衡遂收此字入秘府不使日灼毒苔縈高材重寳不失一唐舜湯禹寧非朋遊瑯瑘山飛光洗積雪南山露崔嵬長淮水未緑深塢花已開逺聞山中泉􅀮􅀂氷谷摧􅀄誰愛蒼翠排空結楼䑓䡾䡾架梁棟輝輝刻瓊瑰先生鵉鳯姿未免燕雀猜飛鳴失其所徘􅆦此山隈萬事於人身九州一浮埃􅀁要挾道徳不愧丘與回先生逐二子誰􅀎計垠崖􅀁懐雖未寫所適在􅌚咍為語幕下士殷勤羞甕醅歸雲洞洞逺人言接滄海洞幽晴始見莓苔天下顒顒望霖雨豈知雲入此中來瑯瑘溪野草山花夾亂流橋􅁁旌斾影悠悠即應要地無人見可忍閧時不出遊班春亭山亭嘗自絶浮埃山路輝光五馬來春滿人間不知主誰言鑪冶此中開庶子亭瑯瑘石泉清照人裏無泥沙表無塵風翻日炙夏潦盡古練一匹常奫淪石屏路石屏不見刀斧㾗石下􅀄誰得行徑千􅀐來時停管絃月明更覺山中静慧覺方丈七言老意蒼松蟠百金古字青霞鐫儒林孟子先生是墨者夷之後代傳幽谷晚飲先生卓難攀材真帝王佐皎皎衆􅀁病蜿蜿龍方卧卷彼天下惠赴此一郡課幕府既多暇山水乃屡過旌旗拂蒙宻車馬驚坎坷􅋢此谷中泉聲響逺巳播槎横􅀔逾急雨􅀧緑新破旁生竹相圍竦竦碧千箇遥源窅難窺盤古坦如磋遊鱗戢可数飛鳥嚶相和援琴薫風後結宇寒嵓左觥筵巳得月金紈尚圍坐心如含逍遥語不綴招些一時聳􅀓􅀚千載激柔懦甘棠詩之懐峴首淚嘗墯况此盛徳下􅃭袴人所荷不假碑刻垂棟牖敢􅈥挫當今甲兵後天地合坎坷先生席上珎豈􅃘溝中餓母徐黒􅙲石當馳四方賀南豐先生元豐􅀋藁卷之二
