front:
  text: 元豐􅀋藳卷之三
  hash: sha256:896c2aec3cc9899b0634f5f77b62e17c6aeb1a5fba430ff5716d134fd5701e2b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_003-1a}
body:
  text: 古詩游麻姑山軍南古原行数里忽見峻嶺横千尋誰開一徑破蒼翠對植松栢何森森危根自迸古崖出老色不畏莓苔侵􅁱竹整整儼朝士下䕃石齒明如金遂登半嶺望城郭但見積靄縈江潯岡陵稍轉露楼閣沙莾忽盡横園林秋光已逼花草歇寒氣况乗嵓谷深我馳輕輿豈知倦倐忽遂覺窮嶔崟龍門誰來此中鑿玉蕳不記何年沉泉聲可聽真衆􅄜泉意欲瀉無瑶琴斗廻地􅀔平如削䆉稏百頃黄差參横開三門两出路却立两殿當崖隂􅀷廊千歩抵嵓腹桀木萬本摩天心碑文磊嵬氣不俗筆畫縹緲工非今世傳僊人家此地天風冷冷吹我􅁭今人豈觧不老術可恠緑髪常盈簮根源分明我􅀎􅀃一室傾里輸瑯琳相高既不擁耒耜方壮又不持戈鐔我丁轗軻豈暇議直喜虚曠開煩􅁭清謡出口􅀂先搆白酒到手無停斟山人執􅃑與我語留我饋我山中禽玲瓏當窓急雨洒窈窕隔溪􅀌笛吟未昏已移就明燭病骨夜宿添重衾神醒氣玉目無睡到曉獨愛流泉音起來身去接塵事片心未省忘登臨桃花源來時秋不見桃花空􅀣寒泉瀉石涯争得時人見鵉鳯不見身去憶烟霞丹霞洞麻姑石壇起雲霧常意巳極高峯巔豈知造化有神䖏别聳翠嶺參青天長松桀栢枝嵬砢中畫一道如流泉林風颼飀满丘壑山鳥嘲哳凌飛烟山腰古亭豁可望下見秋色清無邉忽驚隂崖􅀔回合中抱幽谷何平圜􅀄誰鑿險搆楼􅀚更使遶舎開芝田令人到此毛骨醒欲搆老筆丹青傳􅆧夷干戈合未解天地瘡痏誰䏻痊大厦棟梁置沙莽肯復顧眄桷與椽吾徒於時􅀡何用欲徃未得心茫然半山亭􅀣杪蒼崖路屈盤半崖亭榭牛猶寒平時舉眼㸔山䖏到此慿欄􅀡下㸔顔碑碑文老􅀔信可愛碑意少缺誰􅀎鐫已推心膽破姦䆒安用筆墨傳神仙碧蓮池神仙恍惚不可明空有池蓮變紅碧清香冷落秋風前似􅀍麻姑妬顔色流杯池行盡壇前石崖路忽見一曲清泠泉酒行到我不辞醉安用了了分愚賢七星彩古杉蒼蒼横斗文其􅆬十圍隂蔽野應到夜深山月來林色天光迷上下瀑布泉飛泉一支天上來寒影沉沉瀉龍穴山靈欲以恠動人山路先冬積霜雪秋懐天地四時誰主張縱使群隂入風日日光在天已蒼凉風氣吹人更憀慄􅀣木慘􅃤顔色衰鷰雀啾啾群似失我有愁輪行我觴顛倒回環不􅀎律我本孜孜學詩書詩書與今豈同術智慮過人祗自讐聞見於時未禆一片心皎皎事乖背衆醉􅄀􅄀􅀔凌突出門榛􅁄不可行終􅀊蒿藜尚誰䘏逺夢頻迷憶故人客􅀍􅀄寒卧沉疾􅀅相公卿雖不為消長窮通豈須詰聖賢穰穣力可攀安􅀎俯心為苟屈送歐陽貟外歸覲滁州舎人病卧不出門非関避塵􅁟深秋影雖清􅀌懐共誰語辱子問吾廬煇如就賔廡足音固可喜况乆捉松麈子生何其祥家庭坐軻愈顧我齒諸生漸磨苦頑魯如有仰天潢􅀔豈識津渚又若馬牛然安能望㷱虎穴揺在門心常若風中羽羡子筋骨輕歸飛得其所從今夢無南隨子渡江艣一晝千萬思一晝千萬思一夜千萬愁晝思復夜愁晝夜千萬秋故人逺爲縣海邉句踐州故人道何如不間孔與周我如道􅁁塵安􅀎望高丘又􅀂澗與溪敢比滄海流景山與學海汲汲強自謀愁思雖爾勤故人得知否送鄭秀才鄭生雙瞳光欲溢我意海月蔵其中齒清髪紺心獨老秋崖􅀡聳千年松來超學宮業文字進退珮玉何玲瓏一朝束書别我去馬蹄脫􅀂風中蓬當今文人宻如􅌨子勿浪漫西與東䖏身不可不擇䖏一跌萬里無還蹤荅􅀁􅂆炙炙灼君􅀁􅂆感君書上辭勿難火艾痛要使功名垂我道世􅀁背君知餘有誰筋骸倘且徤學行肯教􅈥菊花菊花秋開只一種意逺不随桃與梅遊人有㡬愛􅀌淡零落野水空嵓隈層層露蕚問枝葉金靨萬箇圍蒼苔􅀡從陶令酷愛尚始有我見心眼開為憐清香與正色欲搴更惜常徘􅆦當携玉枕就花醉一飲不辭三百杯荅石秀才月下今宵月色明千里秋水與天無表裏􅀣木矯矯蛟龍蟠屋瓦鱗鱗雪霜洗林下病人毛骨醒目愛清光不知巳秋風自作竽􅄜聲更送城笳夜深起客衾初寒睡未􅀎忍得子詩哦以喜子求我和何勤劬我知苦踈少知已子真愛我常存心安用蕪辞煩􅁓筆冬曉書懐群鷄啁哳天始明東方􅄍日霜上冰長簾高褰掃落葉短杋背立吹殘燈昔時氣銳過奔浪今日病减真無蝇南箕翻翻世􅀁效白璧皎皎誰非憎屠龍破産習巳妄􅀞蛇著足棄未能不容當時孔何病更譽衆列顔非朋坐知天下書最樂心縱塵􅁟酒可慿莫過二事賢且聖胡不學外常騰騰代書􅀉趙宏憶承昨嵗致書召遂入江城同一􅀏羸奴小馬君􅀁借出犯朝寒鞅頻掉􅀙來萬事固巳拙况乃病敦顔不少去随衆後巳自枉更苦世情非可料一心耿耿浪誠直百口幡幡競訶誚獨君踴躍於我顧譬於真玉火空燒别來未㡬􅀊云換楊柳得春還窈窕東溪㝡好水巳渌桃李萬株紅白照當時病卧不䏻出日􅀝東風愁同調逡巡紅白委地休新葉可書隂可釣君持使傳入南師忽領􅆛貅過蓬藋僧堂取酒就君飲不覺乗懽盞頻釂屋西明月過簾白簾角有時飛熠燿明聞鉦鼓催軍發共上高楼㸔旗旐日高行忽又别君從此閉門誰可嘯秋風巳盡始得書喜聴車輪返窮徼身欲追随病未􅀎目断􅃢瑚遮海嶠是時肺氣壮更惡日以沉􅈚憂不療豈其艱苦天所憫晚節幸值巫彭妙放心已保性命在握手猶驚骨骸峭今年霜霰雖未重室冷尚無新可燎一畆酸寒豈易言局促不殊魚在􅇁勞君書劄数問訊深愧薄材無象肖君心卓犖衆未識安得辨口聞廊廟東津歸催吳秀才􅀉酒荒城􅂴出門常掩春氣欲歸寒不歛東隣咫尺猶不到况乃傍溪潭石險風光得暖才㡬日不覺溪山碧於染欣然與客到西岸衣幘不避塵泥􅀧谷花洲草各萌芽高下迸生如刻剡梅花開早今巳滿􅀂洗新粧竟妖臉柳條前日尚憔悴時節與催還荏苒沙禽翅羽亦巳好争趂午暄浮翠㶑從今物物巳可愛有酒便醉情何慊君厨山杏舊􅀁識速致百壷湏灔灔心知萬事難刻畫惟有醉眠知不忝預愁酩酊苦太􅀬巳令洒屋鋪風簟送呉秀才一年過臘巳十日餘日到春􅀎有㡬春來逺近不可問冷碧先歸在流水梅花向今獨巳繁玉艶都占春風間草萌出􅁟亦過寸衆芳次第掛清寒虚堂盡日對風影我獨此守青瑯玕故人逺來未一醉車鞅欲去今誰攀憐君滿腹冨文綵倦尾赤色無波瀾連年禮部試多士白羽捨置操榛菅君今忽忽􅀒壮節我亦春色差衰顔况逢􅄐别可柰何憶人日老情日多和章友直城東春日東流抱􅀌城雨洗見春色風吹百草根道路千里碧莫盡溪漫漫去波瀾散無跡遥林缺見山冉冉蒼藹積沙禽有遺蹤文字不可識青松對桃李桃紅李花白􅀔方競青青守嵓側君意無不諧研談欲俱得賦詩多􅀁陳炳􅀂􅀚亀拆城東不待到衆物巳歴歴簡如晦伯益一年孟春月巳晦思去去臈如須􅁷春事競在二月間急景豈與正月殊今看桃李花未出不知花開􅀎㡬日日尋桃李不暫停恐未十回花巳失筋骸縱病心尚壮酒醴雖無隣可乞城東欲與君試行莫嫌冷落逐書生高松高松高千雲衆木安可到湯湯鳴寒溪􅟠􅟠􅀝翠纛側聴心神醒仰視目晴眊風雨天地動一葉不欹倒豈同澗中萍上下逐流潦豈同墻根槐卷卷秋可掃鳯凰引衆禽此木隂可夀君求百常柱星日此可造般匠世有無方鍾野人好青青間青青青青間青青盡望宻如鏬風柔聲自和草蓐隂可籍逰蜂不暫去啼鳥時獨下繚牆隔深園髙枝出虚榭貴人無餘事􅂬言持玉􅕸茅屋亦自好吾廬四如􅀞故人儻可遅倒屣不辭迓洪州洪州城中荒且逺毎到弱馬常驅馳交朋顧我亦巳厚謝詞有禮寜當違人生有累乃汲汲萬事敦迫如􅋦覉山中無塵水青白安得去吟梁甫辭詠史二首仲尼一旅人呉楚㩀南靣不知千載下䆒竟誰貴賤賜也相國尊子思終不慕乃知古今士輕重復内顧沂河客舟泝河西北行日夜似與河流争不知洶洶竟何為怒意彼此何時平但疑天地送秋至悪雨疾風相觸聲我病入寒饒睡思歸夢正羙還遭驚東南水郷我所住楊花散時春水生湖江􅄅邈不見岸汩汩自流無可憎石泉百丈落山觜此縱有聲清可聴莫如此水極㐫驁􅁟木暫觸還轟轟吁嗟造化何厚薄悪物受禀無由更尹師魯衆人生死如塵泥一賢廢死千載悲漢􅀄董生不大用厥政自此慙隆􅁎至今董生􅃿雖乆語者爲漢常嗟欷尹公素志任天下衆亦共望齊皐伊文章氣節盖當世尚在功德如毛釐安知蔓草蔽原野雪霰先折青松枝百身可贖世豈惜計告四至人猶疑悲公尚至千載後况復悲者同其時非公生平舊相識跽向北極陳斯詩發松門􅀉介甫南風夜彂吹􅀌舟起視北極星辰稠曉開在㠶破長浪挾以兩艣當中流松門東靣見廬阜其上少日煙氣浮舟人指我極四望黑䖏無底蛟龍湫櫧溪在蠡信浩蕩两涘􅀂粒分岡丘落星囷囷孰可狀清漢夜獨垂牽牛故人曽期此同載捨䊮直抵雲山游念今五載􅀒斯語心獨動蕩風中斿况開肥遯須山在早時事力胡􅀎謀所嗟親老食未足安得一畆操鋤耰此言此􅀏吾此取非子世孰吾相投今諧與子脫然去亦有文字歌唐周北風北風動地江翻天我坐極浦維空船浮雲溟溟下無日老􅀣自擺相樛纒薰琴空聞不可見應已乆絶朱絲絃遂令隂颷自回幹安得􅀊物無疪愆江頭酒賤且就醉勿復著口問陶甄過彭澤淵明昔抱道為貧仕兹邑幡然復謝去肯受一官縶予􅀚長者憂慷􅁣在遺集豈同􅀌􅀩人剪剪慕原隰遭時乃肥遯兹理固可執獨有田廬歸嗟我未􅀎及江上懐介甫江上信清華月風亦蕭洒故入在千里樽酒難獨把由來􅂴拙甚豈免交㳺寡朱絃任塵埃誰是知音者讀五代史唐衰匪一日逺自開元中尚傳十四帝始告暦数竆由來根本強暴戾豈易攻嗟㢤梁周間卒莫相始終㒷無累世徳㓕􅀂燭向風當時積薪上曽寧廢歌鍾庭木庭中有佳􅀣清影四靣垂徃徃風雨夜蛟龍此投依留之待鵉鳯未許燕雀窺誰謂烏鳥惡安巢㝡高枝不顧白日照直傍隂虹飛自恃棲託穏豈憂彈射危三春獨翶翔百鳥歛羽儀鳯凰不􅀎争况乃鳬鴈微既務志意得都為世可欺白晝㩴鼎肉從容􅇚牷犧近人不肯避一怒終夜啼遭其瞰牆屋禍患豈可移聴之欲占赦婦人固巳癡忿害乃其􅀁何肯報福􅁵行路指之嘆童稚争罵譏鸚鵡獻至尊言語固可竒翡翠輸太府􅄊服􅀁取資鴙鷄羙文章贄贈理亦宜鷹鸇逐惡鳥天威得施爲関雎於周室耿絜配后妃莫如此鳥頑飽食無􅀁禆一善不􅀎有醜聲日交馳但知擇嘉䖏巍然治其栖衆怒未易忽徼幸亦有斯安知無刀斧崩分弃毛皮且勿引蠧蟲使􅀣心本披亦有愛愽擊鉤連梟與鴟亦勿樂順已窟穴蔵狐狸凢􅀎致大患尠不自毫釐未知引避去此語足自規惜哉種􅀣意長與事乖違古來亦如此壮士徒嗟悲發彭澤卧聞擄聲知雨來起見江流與天合山回風吹霧不盡㠶徤船衝浪相呇歸雲難乗望空断落日乍掩涼可納去家今夜一千里誰見愁來坐方榻菊花東籬菊花今巳開萬物各自相驅催却尋桃杏􅄼復有舊􅀣􅃤慘空牆隈年光日日巳非昔人世可䏻無盛衰朱顔白髪相去㡬􅀔利聲名相抑排三公未􅀎送餓死九鼎竟亦為塵埃乃知萬事皆自枉有便只宜持酒杯落葉秋雨與風相噴薄􅀣木可􅀎無葉落琅玕散漫不可􅀵野歩滿船誰掃掠垂楊千􅀣舊􅀁惜顔色易衰由力弱空條尚舞不自休物意豈􅀎知索寞菊花雖開䏻㡬許新酒縦酸猶可酌朱顔乆巳􅂸銷減豈有功名堪冩皃衣冠塵􅁟欲更洗其柰滿隄河水濁花開葉落湏强醉壮士豈憂常落魄舞鶴蓬􅌡歸未得偃翼清溪隂忽聞瑶琴奏遂舞玉山岑舞罷復嘹唳誰知天外心元豐􅀋藁卷之三
