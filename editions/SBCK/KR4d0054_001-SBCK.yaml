front:
  text: 南豐先生元豐􅀋藁卷之一古詩
  hash: sha256:254dd97c161f56087b387fe0bfa94f18f8efb25daa56424de8ec035e7051a1c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_001-1a}
body:
  text: 冬望霜餘荆呉􅀝天山鐡色萬􅌇光鋩開麻姑最秀揷東極一峯挺立高嵬嵬我生智出豪俊下逺跡乆此安蒿萊譬如驊騮􅂿天路六轡豈議收駑駘巔崖􅀄冬未冰雪蘚花入履思莫裁長松夾樹盖十里蒼顔毅氣不可廽浮雲柳絮誰汝礙欲徃自尼誠愚哉南窓聖賢有遺文滿簡字字傾琪瑰旁搜逺探得户牖入見奥作何雄魁日令我意失枯槁水之灌養源源來千年大􅀃沒荒冗義路寸􅁟誰能培嗟予計真不自料欲挽白日之西頽嘗聞古者禹􅁛智過門不暇慈其孩况今虺人冐狀任力蹶豈更餘纎埃龍潭瀑布入胷臆歎息但謝宗與雷者書豈即􅃍有􅀘天下自古無能才一鶚北風萬里開蓬蒿山木洶洶鳴波濤甞聞一鶚今始見眼駿骨緊精神豪天昏雪宻飛轉疾暮略東海朝臨洮社中神狐倐閃内腦尾分磔垂弓櫜巧兎獰雞失草本勇鷙一下崩其毛窟穴􅊯􅊯􅂘九子帳前活送􅀟青猱啁啾燕雀誰爾数駭散亦自亡其曺􅀔疑空山竭丸澤殺氣巳應太白髙歸來磥嵬載爼豆快飲百瓮行春醪洒酣始聞壯士嘆丈夫試用何時遭宿尊勝院朝寒陟山砠宵雨集僧堂蔽衣盖苦短客卧夢不長鳴風木間起枯槁欲僵向來雪雲端葉下百􅌇隍起攀蒼崖望正受萬慮戕􅀊運忽當爾我顔安得芳傳聞羡門僊飛身憇蒼蒼誰能乞其靈相與超八方苦雨霧圍南山欝􅄀􅄀狹谷荒風驅水聲秪疑日失黃道去又見雨含滄海生如催病骨疼寒入似送客心衰思驚楊州青銅不在照應有白􅁂添数莖里社郊天社地君􅀁重翦秸刲匏㣲得供秦皇漢帝陋古初桀畤殊壇傾力奉年年属車九重出羽衞千人萬人從黄金日搜盡崖窟飛檣走箠華夷動馬蹄一作鳥啼路南村有社里老邀神迎且送荒林破屋風雨入野䑕山狐狼籍共何言茅箸古瓦甌稻飯豚蹄人得用南源莊床上不廢看青山門前便踏南澗路繞牆頓失車馬喧岸幘日得滄州趣嘗嗟秋蓬轉未有茆屋㩀對此耳目新始覺精爽聚滄溟未可泛舟入鴈蕩誰能胝足去醫閭在夷蠻羅浮苦煙霧子真自愛谷口家孔丘老亦洙泗住吾能放意遊八極此興乆與前賢附悄然恠我思慮深已欲槯倒聞猿􅀣眼前了了破青坂屈椽小㨂随晴具野柔川深春事來筍鞵􅉂戛青雲歩秫田試犢耕早風茗圃分籃摘霄露竹林掃月散絺􅁑雪艇搜溪出魴鱮㡌塵便可臨水濯里闘何妨閉門拒介推母厭俗乆思顛崖住不顧梁鴻妻亦高能快穿衣與蔾茹成家儻已嫁諸妺有立不憂吾弟孺攘攘天地間萬􅀋殊好惡􅂬合無一非暌窮有百牾吾獨安能逐毛髪飲泉食力從所慕論交徳操龐公林下時入門豈復知客主夷吾鮑叔貧賤間分財亦不辞多取相傾頓使形迹空素定巳各肝膽許世間未信亦論交得失秋毫有乖忤南軒木端青崖軒􅃤淡寒日暮鳴鳩巳安巢飛鵲尚求􅀣物情限與奪兹理奚以㩀諒知巧者勞豈得違所賦乆無胷中憂頗識書上趣聖賢雖山丘相望心或庶兵間大義缺絶乆未圖小人輕險何不至世上固自有百爲兵間乃獨求一試趙括敢將亦巳危李平請守那復議吁嗟忍易萬人生冀幸將徼一身利種園於陵爲人灌園􅂼我今園地不自種惰慵苟恃郷井助緩急孰與朋友共支􅄐有疾上雖恕陳平不事家焉用著書儻得一言利長者或許醻内訟歎嗟夜嘆不爲絺綌單晝嗟不爲􅅔蕨少天弓不肯射胡星搀搶乆已􅄤朱鳥徐􅀭復憂羽蟲孽㐮漢正病昭回杳力能懐畏未足憂憂在此極群隂繞􅀉孫之翰孫侯腹載天下書崔嵬豈啻重百車伏羲以來可悉数孰􅀂自作何有餘更能議論恣傾倒萬里一瀉崑崙渠誰爲胷中斡太極元氣浩浩隨卷舒昔來諌官對天子何􅁾不欲親芟鋤不容乃獨見磊落出走並海飄長􅅂孫侯風節何所似雪洗八荒看水虚親如囯忠眼不顧舊􅀂張禹手所除歸來已絶褒貶筆進用祗調敖倉儲合持詩書白虎論更護日月金華居萬世根深固社稷百年舊􅅱休田閭素識􅀌生愛茆屋乆將老母求山砠秋歸願事九江穫夜出未捲安豊漁孔明苟欲性命遂孟子豈病王公踈塵埃未得見此樂太息一付西江魚豪傑老哺􅅔蕨西山翁樂傾瓢水陋巷士不頋無復問周公可歸乃獨知孔子自期動即重丘山􅀁去何啻輕糠粃耴合悠悠冨貴兒豈知豪傑心之耻侯荆侯嬴夷門白髪翁荆軻易水竒節士偶邀禮数車上足暫飽腥羶館中侈師廻㧞劒不頋生酒酣拂衣亦送死磊落高賢勿􅀏今豢養傾人乆如此黃金陳侯坐收百戰楚呂氏行取萬乘秦田生立頋開兩國陸公微辞交二臣道旁白日忽􅄪去囊中黃金如有神何湏首陽二夫子不是丸􅂦輸西鄰楊顔楊雄纂言准仲尼顔氏爲身慕虞舜千里常憂及門止爲山更欲一簣進小人君子在所蹈烈士貪夫不同徇安得蠢蠢尚自恕百年過眼猶一瞬橙子家林香橙有兩􅀣根纒鐡鈕凌坡陀鮮明百数見秋實錯綴衆葉傾霜抲翠羽流蘇出天仗黃金戯毬相蕩摩入苞豈数橘柚賤芼䁀始足塩梅和江湖苦遭俗眼慢禁蘌尚覺凢木多誰能出口獻天子一致大􅀣凌滄波山檻小飲變秋長雲豪洒雨北風壯餘熇尚争威積晦頗異状山囬攢楓顛屋立懸狖上飲檻聚石爲謌筵注溪當􅂬言乆諠譁罷興一怊悵旅人正飄颻豈得諧放蕩胡使南粟鱗鱗多送北北兵林林長僃胡胡使一來太梁下塞頭弯弓士如無折衝素恃􅀅與相大策合副艱難須還來里閭索窮下斗食尺衣皆北輸中厚相􅀚歎失色馬􅀐日肥妖氣麄九州四海盡帝有何不用胡藩北隅上翁領放車秋崖望􅀁得過舊聞􅀄疑古軸􅀞山水秋毫分時見崖下雨多從衣上雲濯足行上側心憂踏天文八荒正摇落獨餘草木薫但覺耳目勝未知筋力勤顛毛巳種種世患方紛紛何當嘯呤此日與樵蘇群雜詩四首張陳貧時交干戈忽相逐范蔡憎嫌人卒自歸鼎軸害奪怨爲欣利歐愛成戮世間不可料人事常反覆日磾断内討坐享七世榮霍光徇所愛兩亡家與名卓闊俱抗志纎微獨紆情得失萬世視長令壮夫驚皇皇謁荆人伈伈遵陽虎及覺一禮亡翩然遂違魯全身有遜接直道無苟䖏故􅁛聖如龍屈伸兹可覩揮挾謝幽側騰身集崔嵬心胎太極氣手􅀭斗間魁荒荆忽成挂蟄鱗冬有雷君看九州寳自入朱門來欲求天下友􅁒求天下友試爲滄海行風來㝠㝠内擺觸怪浪生突兀萬里怒􅀔疑九州傾鯨鵬不自保况此一舟輕我徒幸來即可留石根耕日將書上客共須天地清冬暮感懐荒山未有雪野水不見氷一臘今已半浮陽壮猶矜柰此一􅀊除未有嚴氣升坐思空峒間􅀒雪山千層雖受凛冽僵愈此􅁾濁蒸感激崑崙祗一氣吹丘陵炎埃㓕無遺古色萬里興我病一洗濯懐抱失所憎因思大羽獵属車上崚嶒六軍􅀐皆駿争先雪中登天時傾人意踴躍士氣増大義雖不殺四方懾兵􅏢今此效安在東南塞猶乗􅀅帥色淍槁蚍蜉􅀔趫騰􅃤錯天運内止戈信誰􅀎􅀉舎弟新霖洗窮臘東南始知寒驚我千里意覺汝征途難空江桂風席扁舟與誰安羇旅費亦乆橐衣豈無單念汝西北去壮心始桓桓竟逄有司惑斥走懐琅玕士固有大意秋毫豈􅀎干所憂道里困乆無一罇􅂬我意生惻惻爲之却朝餐人生飄零内何䖏懐抱寛已期採芝藥握手青霞端無令及門喜淹留雪霜殘至荷湖二首鐡色對我馬林林路南山草根巳変緑氷雪尚滿顔解鑣蒼煙脚我栖就柴関乖時遭飄躓豈免生事艱夙意待周孔此士豈可還濁醪且斟酌收心一缾間悲風我眼澁酸狖我耳愁我顛水沒馬我起雪滿裘百里不逢人豈有烟火投却􅀝青璧望白霧滿九州蒼蒼運乃尔何地寛我憂夜卧夢成魘猶疑㧞山秋送徐竑著作知康州溪蠻昔􅀒命殺氣凌南州城郭漲烟火堂皇啸蜉蝣􅀍髪盡冠巾吾人反縲囚行剽至抄忽歸載越山丘駈攘事雖定􅀵合信瘡疣不有異澤霑何令餘患瘳寒風在林鳴君馬不􅀎留􅀄佩太守章慨然任人憂問俗􅁅燼餘咄唶令人謀士材爲世用因難乃知􅀹煩苛一蕩滌幽逺偏懐柔四封鳴雞犬五榖􅀍原疇里閭多娯宴歌鼔震溟陬明義毎所希古人不難侔日月有常運志士無安輈山川自兹始努力千里遊詠雪北風蕭蕭鳴且歇短日悠悠生復㓕朝含滄海滿天雲暮断行人千里雪􅀄通壑谷氣先冷漸蔽郊原路疑絶併包華夷徳豈薄改造乾坤事􅀹譎驅除巳與塵滓隔濯溉終令枯槁恱相持始信竹栢勁易敗可嗟萑葦折條垂巧綴如自愛眢井随形呀且缺飛擔䡾䡾駕長浪巨璧林林􅀝精鐡􅁦衣或有骭猶凍荒宴誰􅀎耳偏􅀬壮夫撫劒生銳氣志士扄門養高節已開􅁭胷絶煩憒更足溝塍慰空竭雖無酒醴發嘲􅀏亦有詩謡恣搜抉新陽髣髴送鑱鑿舊徑參差分曲折留當􅄚齒印崖石徙􅀝長松看􅩩泬寫懐二首群生各有趣營慮自纒結名網智巳羅利械愚所紲古今􅉍主客真贗两興㓕洗然大人意杳與􅀎者别不必條蔓榮中自老根節曽非故饒培獨得較霜雪蛟龍無安舟虎兕有危轍􅀅􅀎此人追得匪合明哲荒城絶所之􅀊暮浩多思病眼對山湖􅀌吟􅀉天地用心長者間巳與兒女異况排千年非獨抱六經意終非常情度豈􅀘當世治幽懐但自信盛事皆空議氣昏繁霜多節老寒日駛局促去朋友咄唶牽夢􅄰􅀅論道精簏豈必在文字茅亭閑坐荆門常書掩不必雲山深豈敢尚􅀌絶自能收寸心草萌􅀍逺徑鳥語遍喬林散帙味新趣鳴絃嘆餘音脫粟幸可飽一瓢方獨斟顔徒􅃡雖卓非此誰爲尋盛服􅆞紫艾重印鑄黄金信使憂惴息詎無勤苦侵埃塵緇冠盖霜露泫衣衿脅肩巳自昔俛首微獨今豈誰智􅀁拙曽是力難任為樂聊在此焉知玉山岑靖安幽谷亭横江捨輕楫對靣見青山行盡車馬塵豁見水石寰地氣方以㓗崖聲落潺潺誰為千家縣正在清華間風煙凛人心世慮自可刪况無訟訴囂得有觴詠閑常疑此中吏白首豈思還人情貴公卿燁燁就玉班光華雖一時憂悸或滿顔雞鳴巳争馳驊騮振鑣鐶豈如此中吏日高未開関一不謹所守名聲别妖姧豈如此中吏一官老無癏愔愔謀謨消泪泪氣象孱豈如此中吏明心懾弦頑况云此中居一亭衆峯環崖聲夢猶聞谷秀坐可攀􅀝天巉巖姿青蒼露媥斕對之精神恬一作帖可謝世網艱人生慕虚榮歛收意常慳誠思此憂愉自應喜榛菅青雲亭閑坐一登此亭高夐脫藩廡擁開顔廣軒闢吹面驚飈動城回石崖抱山亂寒湖湧谷草晚更芳沙泉細猶洶峥嶸四封壮縹􅄅加氣捧連天廣衢走拂日長簷聳區區射聲利浩浩奔蹄踵趍榮衆所便冐渉吾乆恐緬想山水宅環􅀚松檜拱属耳天􅄜樂脫身人事穴幽閑味雖薄放蕩愚所勇窮㐫􅀔猶競殺伐聲更詾揚􅀭歛臣貴燁燁官兵寵諒知草茅微無􅀘社稷重牧放手幽鞭耕鋤躬瘦隴尚或此心諧豈云吾道壅南豐先生元豐􅀋藁卷之一
