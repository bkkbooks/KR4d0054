front:
  text: 元豊􅀋藁卷之四十六
  hash: sha256:28067b7522756052201e663eeb6fa1f7255d95a114380e5a9e719f5a5aded726
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_046-1a}
body:
  text: 誌銘亡兄墓誌銘君姓曽氏諱曅字叔茂有智䇿䏻辨􅀃其貫穿反復人莫有􅀎屈之者身窮為生事或毛密應之無留而讀書理筆墨交賓客又思事未至當何如亦不廢也􅂬愉􅁨悲疾病行徒􅆍食之間書未嘗去目故自上古以来至今聖賢百氏騷人材士之作訓敎警戒辨議識述下至浮夸詭異之文章莫不皆熟而扵治亂興亡得失是非之際莫不䏻議焉其文章􅀹宏贍環麗可喜三代逺矣漢以来世有成事就功名之時則賢臣謀士材技之人同世並出常􅀂有餘至時或無所用之則士雖徃徃有紀而亦不俱見於丗盖陻窮頓委扵巗播閭巷之中者豈少㦲如君之材知辯􅀶又其學如此使得用其意扵乎其施設必有異焉然卒不克見扵世盖亦豈非其命也夫君年四十有五皇祐五年以進士試扵廷不中得疾歸卒江州祖諱某尚書户部郎中贈右諌議大夫考諱某故太常博士娶李氏子曰斍曰黌女二人卒之歳十二月某日􅁙建昌軍南豊縣之某郷某原某里也弟鞏爲某銘曰丗或湏人中士爲材有非其應聖不􅀎諧故君之學扵已爲足而材與丗爲乖刻銘幽石維以告哀故髙郵主簿朱君墓誌銘君諱某字齊卿姓朱氏其先家于彭城五代之亂徙于淮南今為淮南人曽祖某不仕祖某贈刑部尚書父某贈殿中丞君嘗試于祕書省校書郎蘇州之長洲尉髙郵軍之髙郵主簿以卒卒時乾興元年六月十九日也後卒之若于年其子象之東之升之延之奉君之䘮􅁙天長縣之秦蘭里扵是時象之某官東之某官以材名餘皆為士某官以書命鞏曰子其為我銘之而以状言公之為人有智計喜施與少􅀙師學問巳而捨學業其家家之食口数百仰扵君君䏻資之皆出乎衣食嫁娶皆有餘法殿中之弟工部侍郎巽􅀄舉進士数困􅁒不復徃君􅂆之曰第行無以廢為念故侍郎得曲就其志至為逹官大其家後卒官君既居官以材称其為身務扵㢘臨獄訟務為恕毋某氏旌德縣太君娶耿氏又娶賈氏女㱕太常愽士吳祥栁州馬平知縣陳許池州推官李樞其季㱕于曽氏某之先君愽士也舅氏實命鞏銘其敢辞銘曰推心扵家其爱巳孚用力扵官盖以其餘得官扵晚夀五十四故不大􅂋以極其志江都縣主簿王君夫人曽氏墓誌銘試校書郎揚州江都縣主簿王無咎妻曽氏建昌南豊人先君愽士苐二女也孝爱聡明能讀書言古今知婦人法度之事巧鍼縷刀尺經手皆絶倫先君選其婿扵里中以歸王氏王氏家故貧曽氏爲􅃁婦而其姑蚤世獨任家政䏻精力躬勞苦理細微随先後緩急爲撙節各有條序有事扵時節朝夕共賓􅀕奉飬撫其門内皆不失所時􅀅以㳟嚴誠順䏻得其屬人其舅喜曰吾不以家爲䘏矣其夫歎曰我䏻一意自肆扵官學不以私累其志曽氏助我也生二女年三十有三嘉祐四年五月三日以疾卒十二月􅁙建昌南城曹大考尚書水部貟外郎諱仁旺大考右諌議大夫諱致尭先君太常博士諱易占􅀅􅁙江都告其兄鞏使誌其墓天乎吾哭伯姊姑踰朞又哭吾妹而誌之其可哀也巳其可哀也巳鄆州平隂縣主簿関君妻曽氏墓表鄆州平隂縣主簿関君景暉娶姓曽氏建昌南豊人尚書水部貟外郎諱某之曽孫尚書戸部郎中直史舘贈右諌議大夫諱某之孫太常愽士諱某之女而鞏之長妹也始吾妹為兒時育扵祖夫人巳不好戯弄及長喜讀書扵女工之事不敎而自䏻為人進退容止皆有法度人罕見其喜愠之色内外屬皆嚴重之性儉素扵紛華盛麗之際無所好其在父毋及夫之家或􅂼食不給處之晏然其推之扵人雖資身之物不為秋毫頋惜計也其治女事􅀹勤雖勞不厭治家人之業雖煩細皆有條理飬父母姑舅皆至孝姑乆疾晝夜候省未嘗湏􅁷去其側藥食非親調不以進其扵内外屬親䟽皆盡㤙意人皆以謂宜富貴夀考而卒不得至其所宜有嗚呼其豈非命也歟嘉祐二年鞏與二弟得進士第南歸而吾妹􅀙景暉視余扵淮南至真州得疾七月某日卒扵余之舟中年三十有二矣有女一人曰某始五􅀊景暉以其䘮歸六年十月丁酉􅁙扵杭州錢塘縣􅂂泰郷龍井原景暉之王考諱某考諱某皆尚書職方貟外郎而越之山隂人也吾妹旣殁之六年景暉得進士第扵是時􅀍命余校史舘書籍皆㑹京師而余扵其間􅄪哭妹又哭女與哭妻􅁨患之接扵余者可謂多矣景暉之始葬吾妹也来請銘不及余與之皆恨焉而其㑹京師以歸也乃為之書吾妹之事以遺之而使表之於其墓上故太常􅀶士吳君墓碣君諱祥字某始吳氏事宋為太常愽士年六十二某年某月某日以官卒于家卒之􅀂干日葬眞州楊子縣之某郷某原􅀄君從進士試屢不中年四十餘始中第為吉州軍事推官歸以選為開封府開封縣丞大臣稱其材遂為祕書省著作佐郎知考城縣又知河中府之龍門縣再􅁶為愽士知蘄州之蘄水縣父䘮隂朝京師疾作遂求歸真州真州君家也􅀄君之屢斥扵進士也旣自力學問充其業又率其弟務刻苦養其親入其門内尊安其卑卑慕其尊一時皆稱之及􅀙事扵吉州弟已死君夫婦痛自節衣食遂􅀎嫁其􅀌女􅀂干人皆不失所時其在開封衣食常不自足而親戚舊故之至京師者多以君為歸其䘮父也以家之有無葬故葬不緩親戚或憂其貧􅁒出錢為基扯謂君一強可以取其贏君歟曰吾不敏旣位扵朝貧吾素也䘮乃􅁒為利乎平居恂恂不與犯者校及其自守人亦不䏻移也官歸常僦屋以居旣卒㡬不䏻葬曽大父某大父某父某以君之恩為大理評事妣某氏某縣太君太君之䘮君致其哀有過人者妻朱氏某縣君余姨也有􅂇扵君子曰某女嫁毫州􅀚察推官張天經旣葬某為碣扵墓而與天經来乞銘扵鞏天經以材名人皆曰其尚䏻存君之家者銘曰維吾先君太王之嫡禪聖圖民扵東竄跡其後孔蕃以國為氏君紹厥宗其徳則􅀋儉著于家勤著于身不苟其贏卒死扵貧維時之人命士大夫縞􅃣素盖爭利扵塗曽不君慕顧或􅀏之非彼可議維世足欷較于銘章君有則多以遺其孥非厚如何知處州青田縣朱君夫人戴氏墓誌銘知處州青田縣事天長朱君諱某之夫人曰髙郵戴氏年七十有七治平元年九月庚午以疾卒于楚州監倉之官舍某年某月某甲子葬于天長之某郷某原夫人之考諱奎娶徐氏女夫婦皆有善行聞扵其郷夫人受敎扵始笄􅀙事扵既嫁小而行修於身老而敎行扵家故父母曰不遺吾􅁨舅姑曰䏻順吾志夫受其助子賴以成其平居深静有儀法不忘􅀏言就之色荘而氣仁居貧自薄衣食而厚扵施與属人之􅀌女爲􅀵嫁者盖二人云旣老矣女事不廢而婦容益恭雖少者有不及也有子四人曰某曰某曰某早卒某某州錄事叅軍監楚州装缷米倉某衢州西安縣令皆及進士苐好古而有文夫人扵某外叔祖母也故舅氏属以銘銘曰淑哉戴氏青田之助允直且仁蓄徳于身爲下肅祗爲上惠慈安意處貧薄已􅁉人其承有子以文起仕委髪垂領享有多慶卜壤之良乃兆新堂刻此幽文羙實長存亡姪韶州軍事判官墓誌銘用石本校􅁴姓曽氏吾兄之子也吾先人六子吾兄諱曄爲􅆟長有材而不試以死􅁴自少則勵志力學問知道理善扵属文及長慨然慕有爲扵世不肯碌碌爲人恭謹循循寡言治平二年及進士苐爲吉州司法叅軍有䏻吏名用薦者爲韶州軍事判官行至䖍州得疾卒扵驛舍熈寕三年十一月巳丑日也年三十有七􅁴字道濟建昌軍南豊人皇考諱致堯太常􅀶士曽皇考諱易占尚書户部郎中直史舘贈右諌議大夫􅁴毋李氏妻鄧氏􅁨氏范氏有子修偃熈寜四年八月壬申葬于南豊龍池郷之源頭吾哀其若􅀅有成也而止扵斯故為銘其墓曰徳累則厚方濟而隕材引則逹未試而泯志氣不獲誰云非閔墓石有文尚永来信光禄少卿􅄯公墓誌銘公姓晁氏其家先濟州之鉅野今為開封祥符人皇考諱遘尚書駕部貟外郎贈開府儀同三司吏部尚書皇祖佺贈太傅皇曽祖諱憲贈某官公諱宗格字丗恭少以丗父太子少保贈某官謚文元諱逈㤙􅀘􅀅作監簿十四遷至光禄少卿歴監單州應天府酒稅知蘇州之常熟婺州之蘭溪縣事通判安州杭州事知通州䖍州提􅀧廣南東路刑獄公事又知信州泉州享年六十有三熈寜二年某月某甲子卒于官四年某月某甲子與其夫人某縣君閭丘氏合葬于杭州江都縣之廣陵郷公為人樂易慈恕寡言􅀏人不見其喜怒遇事果扵有為人亦罕䏻及者其為常熟修學校理溝防人頼其利為蘭溪繩姦字窮境内和洽通判安州安州政待公而決通判杭州州􅀅矜已自肆上下莫䏻変公徐與之論可否語平而氣和􅀅畏且􅀙也繇是上下􅀝公以治至今杭人稱之其為䖍州州近塩多盗與訟公至修弛廢督姦疆威信盛行盗不敢發而獄無繫囚及在廣南其用法常寛而􅁒人自避曰治有先後緩急者謂此也其視部吏孜孜恐失一善而惡人亦莫敢犯公法其為通判如廣南為信州泉州如度州所至人皆安公之政而去常思之盖公之行已居官而見於事者如此而其大抵則扵仁厚最隆也母張氐夀安縣太君子男二人曰仲景海州司理叅軍曰仲孺試􅀅作監主簿孫男三人曰端復曰端嚴皆太廟齋郎曰某未仕也女六人長適太常愽士集賢校理曽鞏銘公墓者也次適某官劉某某官高元振某官燕􅀂濟今存惟燕氏婦餘早世閭丘夫人為身治家皆應儀度卒扵公殁之明年某月某甲子公殁家無餘財而仲景仲孺皆謹厚自刻勵䏻世其先人扵是又知公之敎行扵其家也銘曰􅄯世来西大有文元有卿有公継属綿綿曰卿謂誰時維光禄作其徳音先于外服其光伊何有善自身匪飾匪雕璞玉之純治有㤙威時其張弛彼畏此懐吾寜一理于䖍于泉于領之南里安户􅅰罔有不咸宜夀而昌胡不百齡尚兹介祉維後之成夫人曽氏墓誌銘夫人吾從女兄也姓曽氏沈静謹約不妄􅀏言遇人一以恕扵其内外屬之間孝友慈順無不當扵理故與之處者皆爱哭其死者皆哀嗚呼爲女如是足以知其賢又足以知吾之祖考以来教行扵其家也夫人考諱某皇考諱某尚書户部􅀰中直史舘贈右諌議大夫曽王考謀某尚書水部貟外郎建昌軍南豊人夫人嫁為同縣朱君某之妻有子曰某曰某軾以文行稱扵郷有孫曰京曰彦京為真州司法叅軍亳州教授夫人享年􅀂于某年某月某甲子卒于寝某年某月某甲子葬于南豊之某郷某原􅀅葬軾以書来請鉻余曰銘莫如余宜為廼為其辭曰女徳在幽而始人倫詩有􅂋􅀭以立生民尚􅀋于古淑為夫人壷有彛則仔齊以身曽不蕃寵􅂌其子孫曽不遐年善則長存維仲薦美列辭墓門天長朱君墓誌銘君姓朱氏諱延之字某其先彭城人今家扵揚州之天長縣曽祖某贈尚書右㒒射祖某贈尚書工部侍郎考某贈太子中舍母賈氏某縣太君君年􅀂干卒于熈寕六年六月之丙申葬扵某年某月之某甲子其墓在天長之同人郷秦蘭里君聦明敏悟少力學問為文章数就進士試不合乃嘆曰與其屈扵人孰􅀂肆吾志哉因不復言仕方是時朱氏丗以仕宦􅂋扵淮南君居其家􅀹孝謹慈良然與人非其意不肯苟合旣果扵自為而其治見扵家者䂓畫纎悉俻具推之知其可任以事然卒扵無所遇君亦未嘗不自得也君少􅀌飬母母之父死歳乆其䘮寓扵逺貧不䏻歸也君居窮經營卒䏻使之返葬及晚而饒財又䏻樂賑施人以此多君之君娶沈氏諌議大夫立之女早卒再娶王氏殿中丞鼎臣之女子男四人寅萬廣寓皆有學行女五人許嫁進士滿希逺太廟齋郎馬某餘尚㓜君余舅也故為之銘其墓其辝曰􅀔不云泰志則非屯彼轂之丹豈易吾仁廪有餘粟及里與隣蔵有圖書遺其子孫已則無憾尚􅂌後人識美幽堂日逺弥新祕書省著作佐郎致仕曽君墓誌銘君姓曽氏諱庠字明􅅩建昌軍南豊縣人曽祖諱某尚書水部貟外郎祖諱某尚書戸部郎中直史舘贈右諌議大夫考諱某舒州軍事推官君進士及苐㦄邵州司理叅軍用薦者為衡州常寕縣令福州福清縣丞以疾自陳遷祕書省著作佐郎致仕卒於熈寜九年十月某甲子年五十有九以其年十一月某甲子葬南豊龍池郷之源頭母吳氏妻黄氏朱氏有子曰擴曰某曰某女四人君少􅀌自感勵好學能文章為人聡明敏逹喜事有大志不肯少屈為吏以材稱治獄䏻盡其情為令丞易敝興壞綱紀具修吏不敢犯而民安之也有聲􅂋聞薦者自許得人不幸不夀不克盡其用􅀅葬擴來告曰願有紀也廼為其銘曰發其華見扵文􅀵其實見扵事于其小綽有聞于其卓屈不試尚不没􅇺後昆矢以辭列幽隧亡妻宜興縣君文柔晁氏墓誌銘文柔姓􅄯氏諱徳儀字文柔年十有八嫁令人時苦貧良口衆文柔食菲衣敝自若也事姑遇内外属人無長少逺近各盡其意仁孝慈恕人有所不􅀎及於􅌨珥衣服親属人所無輙推與之不待巳足扵燕私未嘗見其惰容扵與人居未嘗見其喜愠折意降色約巳以法度學士大夫有所不䏻也為人聦明扵事迎見立觧無不盡其理其槩可見者如此盖天􅂌之徳而天其年遺以相余而李之蚤余不知其所以而又不自知其哭之之慟也文柔以嘉祐七年二月甲子卒于京師年二十有六余時校史舘書熈寕四年追封宜興縣君十年二月庚申葬于建昌軍南豊縣龍池郷之源頭余時為洪州文柔有子男曰綰太廟齋郎曰綜未仕也女慶老三􅀊而死􅄯氏世家澶州清豊縣今為開封府祥符縣人文柔曽祖佺贈太師中書令祖遘尚書駕部貟外郎贈開府儀同三司吏部尚書考宗恪光祿少卿余南豊曽鞏子固也銘曰人孰不貴子逢其窮丗誰不夀子惟其㐫維徳日躋生不見其止維聲日逺殁不見其終子䏻自得懟者在人遺以輔余曽不逡巡􅀊云其逝予悲孔新其孰昭之瑑此幽珉亡弟湘潭縣主簿子翊墓誌銘熈寜十年春予􅂪㤙予告葬其弟子翊扵南豊維子翊姓曽氏諱宰字子翊世魯人今家建昌軍之南豊子翊少力學六藝百子史氏記鍾律地理􅀓注箋䟽史篇文字目覧口誦乎抄日常数千言乎抄書連榻累笥不䏻容扵其是非治亂之意既巳通至扵法制度数造物立噐觧名釋象聲音訓詁纎息委曲貫穿旁羅無不極其􅀃且老未嘗易意其為文馳騁反復䏻傳其學為人質直孝弟抑畏小心少年飲酒歌呼饒樂放縱之事未甞一接焉其學行如此扵丗用冝如何也然位不過主簿夀止扵四十七其非可哀也夫子翊嘉祐六年進士及第歴舒州司戸參軍潭州湘潭縣主簿所居官理其去人思之其學扵古者盖未嘗試也有子經綬純約女適饒州軍事判官曺唐弼次尚㓜也曽祖諱某尚書水部員外郎祖諱某尚書户部郎中直史舘贈右諌議大夫考諱某太常愽士贈尚書都官員外郎先大夫人吴氏吳興郡太君今太夫人朱氏南昌郡太君妻張氏子翊熈寕元年四月乙巳卒扵湘潭十年三月庚申葬扵南豊龍池郷之源頭銘曰好學不倦以及其詳力行不巳亦蹈其常見扵遺文華衮之章含其淳徳璞玉之良于舒于潭非試其有方疆而盡又奪其夀畜而不施則既巳矣潜而益明尚監于此曽氏女墓誌銘先君太常􅀶士贈尚書都官員外郎曽公之第八女諱徳耀字淑明生而慧淑扵女工不學而䏻扵孝愛天成也生二十歳許嫁大理寺丞王㡬行有日矣嘉祐六年九月戊寅以疾卒于京師熈寕十年三月壬申葬南豊之源頭其兄鞏爲銘曰孰訛爾質而伐其成尚千萬年爾室之寕二女墓誌銘南豊曽氏葬其二女其父鞏爲誌曰予校書史舘凡九年丧女弟丧妻􅄯氏及二女余窮居京師無上下之交而悲哀之数如此二女曰慶老吾妻􅄯氏出也生三􅀊而夭實嘉祐六年十一月壬申方是時吾妻􅄯氏病巳革慶老疾未作之夕省其母勉􅇺如成人中夕而疾作遂不救盖􅀂與其母訣也曰興老吾継室李氏出也卒時始二􅀊實治平三年九月甲寅是時余方鎖宿景徳寺試國子監進士不得視其疾臨其死也二女生而值予之窮多故其不幸又夭以死所謂命非邪熈寜十年予為洪州始以三月庚申􅄟二女扵南豊之源頭同穴慶老在右興老在左是為誌仙源縣君曽氏墓誌銘吾姝十人其一蚤夭吾既􅀌而貧有妹九人皆未嫁大懼失其時又懼不得其所㱕頼先人遺休嫁之皆以時所嫁之者皆良士謂宜皆夀而昌以延光荣于父母家也而十餘年間死者四人先人之盛徳也吾妹之懿也曽不章􅂋扵世而夭吾故不知夫哭之之慟也諱徳操字淑文者吾之苐九妹也嫁江都王氏為殿中丞贈尚書屯田貟外郎諱某之子婦殿中丞㡬之妻封仙源縣君為人柔嫕静顓動止以儀度平居温温一言􅀏不妄也與人群居自䖏者常取其後與人共衣食自與者常取其薄王氏故貧垢衣菲食未嘗以為歉恭大慈小輔其夫以義無不得其宜者不幸年三十有一以死有子男二人曰某曰某女二人皆㓜也曽氏其先魯人今家建昌軍之南豊吾妹為尚書户部郎中􅀡史舘贈右諌議大夫諱某之孫女太常愽士贈尚書都官郎中諱某之女卒扵熈寕七年三月庚子􅁙扵揚州江都縣東興郷元豊四年某月某甲子也銘曰既艱其生又不介之夀維䔍于仁尚克臧厥後元豊􅀋藁卷之四十六
