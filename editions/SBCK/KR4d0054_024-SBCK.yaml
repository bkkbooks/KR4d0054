front:
  text: 元豊􅀋藁卷之二十四
  hash: sha256:7ff1dcaacc825c6e76ec35bd3c2eaa70a1c38007438ac8d4d858aafb03cd534e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_024-1a}
body:
  text: 制誥吏部尚書制尚書政本而吏部天官􅀁以考擇人材以成天下之務近世既失其職但受成事而已今朕既正官名且􅀅㱕其屬任之法之始推行在人其扵程􅀎議功㝎勲頒爵當率厥属謹循科條非得周材􅂚􅁛兹位其忠厚仁䔍秉義守正列于侍從休有令名是用􅃟而授之其務􅀅明使朕􅀁以作則垂憲不獨扵今可行方當施之後世盖汝有稱職之美則朕有知人之明尚其懋㢤無朁厥服吏部侍郎制尚書本天下之務而吏部典掌選舉至扵􅀁属之曹有行封爵議勲庸稽功課之事咸以咨焉近世以来職分扵他司而位為虚噐今朕董正治官使㱕其名分豈虚為㢤固􅀅循之以求其實盖明紀綱㝎制度以􅁵百工熈庻績此朕志也侍郎實二其長非獨當􅁱其官且􅀅推明新制以行今而傳後則其選授豈不重㢤某文學行義有聞扵時列于從官献納惟􅁢是用命爾實首兹􅃟其躰予􅀁以擇而使爾之意務祗厥服使政舉法行􅁛朕之意惟爾亦永有􅁛扵後世可不勉歟戸部尚書制户部之扵中䑓為周官司徒之職掌財賦之調度金榖之出入以待􅀖國之用厯唐五代征歛煩興而使名雜出地官之職盖存虚號而巳今朕正名以㝎群臣之位辨位以責庻務之實尚書政本典領經費之司所属􅀹重􅀶求天下之士以宜其官某誠篤強敏智慮精宻董煩治􅇵材力有餘民曺上卿無以易汝理材之術待汝有為今􅀊入意廣而􅀊費所餘者無㡬使官用复莭而餘蓄可致公蔵贍足而民賦可䡖在爾􅀎知其方庻㡬承朕之志尚懋爾守以承厥叙戸部侍郎制田疇生齒之籍榖帛貨泉之計下以制民之産上以經國之用地官之貳實叅総焉朕方因􅀎以用人正名以授職俾服予事必惟其材某頃以通敏之姿乆更要􅇵之任徃副民部孰如汝宜夫知農之艱艱而有以􅂆助視財之豊匱而有以均節使公蔵贍􅁕而􅀻蓄羡􅄹服􅀅􅀚爾之􅀎爾其無􅈈于位禮部尚書制昔舜命伯夷典禮后䕫典樂至周并為宗伯之官今禮部尚書盖其任也威儀度数之詳聲音律吕之别莫不属焉精微之至所以統和天人順遂萬物其躰可謂大矣矧今典領實又考擇天下之材夫􅀎無曠其官以充吾􅀁以􅀉属之意歴􅃟在位今得其人某明􅁢直清知經信道制作之事舊惟討論春官古卿是用授汝朕承百工之敝方欲作則垂憲以成一代之典使五禮之節同扵天地八音之和格扵祖考天下智謀材諝之士得而用之待汝􅀎􅁛其官庻㡬輔于于治無􅈈于位以副朕知禮部侍郎制夫禮之莭文樂之和聲所以成三材而育萬物典掌之任秩亞春官朕方考正百工之名而大脩法度之政其扵􅀉属必惟其人某材出士倫學通經術宗伯之貳爾徃欽㢤其思先王制作之方而務知治民易俗之要其扵理軆非在扵鍾鼓玉帛而巳尚􅁛厥職以副矛作則垂憲之心可兵部尚書制中䑓政事所出兵部司馬之任所以典捴師徒􅀭國威武至扵按圖辨地駕乗庫兵司存之事莫不咨焉今朕考古以正官儀􅀅使䖏其名者必効其實由是以推朕之志明紀綱成法度焉八座之貴夫豈􅁿以属人某明逹事㡬好謀􅀎断列于侍􅀙忠益居多夏官古卿是用􅂋授朕患今之兵不與農合故因保伍之法修閱試之令庻夫使民知兵近扵古義夫䆒宣朕意使吏􅀎奉承而民皆嚮􅂆以共武之服時汝􅁛識可不勉歟兵部侍郎制夫兵天下之備誰􅀎去之自士不出扵井地而􅀅非六事之人厯世以求皆知古之宜而患夫􅀔之難行朕獨慨然有志扵是故修保位之令明􅀾陣之教先王之跡庻或可幾經營之勤心亦至矣惟是夏卿之亞實參典領之司方正官儀􅀹慎推擇某材敏忠䔍明習治躰折父之貳徃徃惟汝諧夫䏻奨誘務農之民恱超講武之政馴致有漸而弥綸不踈惟無􅆸爾之勤可以輔朕之志尚思自勉以服訓詞刑部尚書制昔舜命臯陶曰汝作士明于五刑以弼五教盖刑者所以助治而非致治之本也其縦入􅁿重得失之際人之舒􅃤繫焉此古之聖王􅀁以未有不先慎罰也今朕悉心以正庻官之任而中䑓八座典司􅀖禁􅃟用之躰得人惟艱某明􅁢通􅀶資以術學服采于位厥聲􅂋聞秘官古卿是用命汝盖前世之治斵雕為樸破觚為圜而憲網踈風俗美朕甚慕焉爾尚躰朕之心折民以恕使辨訟白息而王政寖明可不勉欤以輔台徳刑部侍郎制刑者􅀁以禁人為非而聖王之􅀁􅀹慎中䑓捴領之任秩貳秋官之崇朕方正名以稽群吏之治而大􅁱制度之文必惟其人俾服予采某慈恕忠䔍明習法令叅執􅀖典莫如汝冝夫􅀎使民無􅁈亦巳善矣惟之可以至扵使民無訟爾尚勉㢤以承予網紀四方之志工部尚書制昔舜咨于衆疇若予工群臣薦垂徃祗厥序盖繕修興造程衆藝􅅚五材國家之務不可以不属之其人今中䑓起曺實踐其任矧屯田虞衡平水之職莫不􅀠焉正名之􅀄其􅃟􅀹重某材力強敏周于計畫更閱内外時􅁛汝􅀎俾服冬官蔽自朕志夫詳明品式以訓匠建事使費省扵國力寛扵人至扵墾地山林溝洫之政莫不畢舉皆汝守也其尚懋㢤以率厥属工部侍郎制夫􅅚五材程匠事國家之務所不可巳也故共工之事任属非􅁿朕方若稽舊章財正官號思得智􅀎之士以副采擇之詳某開逹敏強明習典故冬官寵列俾介厥司考䆒制度之文紀綱脩繕之政在爾􅀎㪯其職以􅁛吾􅀴理萬事之心其尚懋㢤往祗厥服禮部制朕正群司之名而責其實㱕天下之務而本之尚書故郎選甚高維春官之属禮楽􅀁出宜得智謀材諝之士以脩厥官某業履望實見扵世用考擇扵衆莫如汝諧其尚躰予董正治官之意扵夫創制之􅀄明紀綱興曠廢惟知其要乃􅀎圖其詳惟悉心以祗厥服主客制朕甚重郎吏之􅃟欲以歛群材責功實典客之任列扵門曺維時右人宜服兹寵囯家之有賞典所以待汝有為膳部制牲豆酒膳辨其儀数而修其政春官之属郎秩甚寵詢求材實爾􅁢僉言尚思欽承以􅁛推擇駕部制輿馬輦乗之奉郵驛圉牧之治中䑓要務主以郎曺敷求得人俾任吾事夫駉之頌飬馬之詩也盖其大㫖曰思無邪然則為政之方斯可知矣䏻識扵是夫何逺㢤庫部甲盾弓矢之器乗輿鹵簿之式武蔵之任郎􅃟甚髙得士扵朝属任惟􅁢夫稽功實以􅂆賞朕方必行悉忠力扵事為爾尚無􅈈都官制係累舂饎之人恤其廪給而申其訴競主以郎吏國之舊章爾惟惠兹宜蒞厥職尚思􅁬勵以􅁛東求比部制内外經費之事緫扵句考之司郎實主之位重省闥爾惟明敏宜􅀎厥官惟時懋㢤以服予訓司門制門関筦鍵之事啓閉出入之莭總其籍賦而審其禁郎官之任爾􅁢詢求尚敏勞􅀎朕􅀅考察屯田制率屯戍之兵服􅅵畆之事􅀁以益邉省饋佐國􅁉民郎扵中䑓捴其政令用爾之敏宜􅀎厥官往服寵名無忘􅁬勵虞部制蒐田有時而澤梁有禁虞衡之守所以遂群生而参化育中䑓典領咸属汝材其思順鳥獸草木之宜以􅁛朕爱人及物之意水部制川瀆隄防宣其利而備其害四方萬里之逺郎實緫領秩甚寵馬爾以周材朕用選授夫知水之不以障而導之使行此成法也推而見之扵事待爾􅀎􅁛其官御史中丞制御史府持吾􅀖法􅀁以紏官邪䋲不恪輔予于治非秉義純䔍望實敷于上下不􅁛其任某強毅肅括以禔其身􅀶學精識通于世用是以考擇于衆寵以兹位夫有守正向公之志又有䏻辨是非之明抗論扵朝使賢不肖忠邪不失其實此法之􅀁以爲治具而􅀎佐吾以善飬人之意使汝􅀎宜其官則朕爲得其所属尚躰予訓其惟懋㢤知制誥授中司制典掌明命緫持憲綱非􅀶斈有文強毅忠䔍􅂚可以兼斯任㢤某志行清夷材資敏逹更踐内外試用惟􅁢論思禁掖肅正朝端蔽自朕知㧞扵不次惟明扵躰要可以見扵訓辞推公扵是非可以施扵刺督尚懋厥守方􅀚爾􅀎中司授太中大夫制朕正名以定百官之位辨位以責庻務之實矧風憲之臣紀網所属􅂚可以不明其任㢤某強敏開逺一作仁䔍學通古今擢典訓辞遂持􅀖法宜專分職以應新書是用進爾之階品在第四俾爾納忠宣力得壹意扵中司以董斉衆工肅正内外庻余之作則更制罔或不䖍在爾懋㢤知其所守責御史制中執法􅀁以紏官邪䋲不恪也其可以自為欺旦怠欤某㧞扵䟽逺之中服在此位宜殫忠力以􅁛􅀁蒙而按劾大臣既非其實稽其分職則自餒焉朕為之􅄖容俾從薄責而進對之際公肆誕謾属吏推窮獄辞明具論其情則懐詐比其治則􅘃官夫身任紀綱之司而抵冐􅀂此雖朕􅁒貸汝而如公議何片守偏州尚仍階品徃新厥志庻盖前愆御史遷郎官制御史董攝紀綱肅正朝廷扵政之有不當于理扵臣之有不恊于極皆得言之故吾甚重其選爾有列于此􅀎勤厥職雖􅀊月未乆而風望甚髙今有司奏爾之課扵法當遷吾不得留易之郎位使爾知自効􅀎不擇官則吾扵報功亦有異賞爾其勉矣無忘訓言衘史知􅄂制䑓無大夫中丞則御史之首當專决庻務實緫􅀖憲朕選扵衆然後属之其人豈不重㢤某敏茂直清通于學問輟自右史往踐厥司夫振舉紀綱以闡明法度紏䋲衺慝以肅正臣工朕方虚心志在扵與人為善爾􅀎苦口無患扵不得其言其尚自強以􅁢公論監察御史制御史持國紀綱所以紏官邪斉内外􅃟衆而授厥惟艱㢤爾好古知方強扵自立刺察之任往其欽㢤惟不回
