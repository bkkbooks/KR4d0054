front:
  text: 南豊先生元豊􅀋藁卷苐二十制詩
  hash: sha256:aad2c2e4952c13f33ce5ec5350ebb67746a9744930d3252df8bb8c90efeaca3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_020-1a}
body:
  text: 試中書舍人制誥三道特進􅀚文殿大學士除莭度使開府儀同三司制門下錫之列壌顓師寵扵藩維申以榮名視官儀扵宰路所以襃隆舊哲􅄖異宗工維今古之通䂓實􅀖家之盛典宜兼禮秩属在􅂄英播告治朝用􅀭孚􅃅具官某荘毅􅁕以任重肅括足以視身有􅀎断大事之明有克勤小物之慎以察微之智練逹人情以經逺之謀弥綸國躰中外宣力左右納忠今方内靖嘉百揆攸叙助朕致此時廼之庸位特次扵上公職仍通扵秘殿閱時巳乆加命宜殊是用䖏以名城分建旄之􅀉属均于台衮極備物之恩榮於戯􅂋有功尊有徳朕扵崇奨近輔之心可謂至矣親百姓撫四夷爾扵􅀅順朕志之義可不懋㢤尚躰眷懐往祗厥服中書舍人除翰林學士制左右侍從之官皆朕􅀁訪問以献納為軄者也惟禁林任親地宻於夫經營庶務進退大臣未嘗不預咨詢非獨治翰墨典訓辭而巳故待遇之寵不與他學士比其重如此非智􅀎材諝㧞出一時豈􅁛公選某純明􅁱㓗秉􅁩不回學有本原可以圖治躰文有師法可以代子言是用擢扵右垣使就兹位今寓内嘉靖朝廷燕間朕方明紀綱考制度以行之當世傳之􅀅来夫􅀎恊爾􅂨以輔朕志論思政理以著之謀猷潤色斯文以見扵號令待爾有當官之効以副予􅈼俊之心其徃懋㢤以承厥叙敕監司考覈州縣治迹詔朕惟天之􅀁以視聽者在民故朕之􅀁以承天者以夫民事為􅀹重夫􅀎使吾民足扵衣食安扵作息無愁怨嘆苦之聲有廉耻自重之誼者在夫州縣之吏而巳朕既擇人付以兹任而尚􅁨夫方域之廣生齒之衆吏或不明不良不􅀎䆒宣恩徳使逹于下開導群情使通于上是以置使分部属之刺督而考覈幽明甄别淑慝罕􅀎務􅁛其職朕方憲于先王以正百官之任使䖏其名必效其實夫比群吏之治而謹其􅂆創固朕之􅀁孜孜而不敢怠也㢘按之臣其躰朕意於夫治人之官審加察焉使純明􅁱㓗兹祥仁䔍之吏無壅扵上聞而昏庸汙慢苛薄媮偽之人不􅀎自匿庻夫事舉刑清和樂交扵内外風移俗易忠厚格扵神明方虚朕心以􅀚汝效賞罰有典􅁩無敢私其尚欽承朕言不食曽肇轉官除吏部郎中左選􅃙具官某尚書政本失其分職之日乆矣朕紀官以實而帰具常守故郎選甚高銓綜之司典領􅀹重尔以斈行諝列職史筵冝進文階徃祗厥叙朕方審覈幽明而公於黜陟尚思勉勵以敏事功可劉奉丗吏部貟外郎制右選􅃙具官某尚書政本失其分職之日乆矣朕紀官以實而歸其常守郎扵選部任属􅀹重以爾閱試惟舊為吏有方考擇扵朝俾叅厥叙朕方審覈幽明而公扵黜陟尚思勉勵以敏事功可黄好謙户部員外郎劉珵户部郎中制左曺􅃙具官某田疇生齒之籍賦租課入之法郎扵省闥典領􅀹重􅀖之雋茂俾服厥官爾􅀎敏扵事功朕豈稽於信賞可王陟臣馬􅦨户部員外郎制右曺􅃙具官某耕歛􅀘助之法溝防通塞之政即扵首闥典領􅀹重􅀖之雋茂俾服厥爾官􅀎敏扵事功朕豈稽扵信賞可劉摯禮部郎中制􅃙具官某周書曰不惟其官惟其人則古今之正治官得人固為急也儀曺之扵郎位考擇甚精爾以學行噐􅀎策名儒館冝升階等往祗厥服朕方明扵賞􅂆以待群吏之成爾尚懋于厥􅁱庻􅀎康朕之事可王子韶禮部員外郎制􅃙具官某周書曰不惟其官惟其人則古今之正治官得其人固為急也儀曺之扵郎位副貳所属考擇其精爾以􅀶學多聞冊名儒館冝升階䓁往祗厥服朕方明扵賞􅂆以待群吏之成爾尚懋于厥􅁱庻􅀎康朕之事潘良噐兵部員外郎制􅃙具官某朕高郎吏之選以進天下之材七兵之曹名秩甚寵稽于有衆属爾之􅀎其尚懋于厥功朕方明扵賞􅂆可胡援社紘刑部􅀰中􅃙具官某為郎居中時之妙選􅀖憲輕重典領惟艱朝之雋良俾在吾事夫刑期于無刑此朕志也尚思明慎以􅁛厥官可范于竒工部􅀰中髙遵惠員外郎制􅃙具官某宮室城堭程匠度材之事郎扵起部其選甚高詢求在廷爾材惟􅁢朕方董百工而康庻務爾尚勤夙夜而􅀎厥官可高遵惠改云副貳之選甚高王祖道司封員外郎制􅃙具官某封爵之㤙施扵内外􅀁以親親尊賢國之典也緫領之任郎選甚高明揚爾􅀎俾踐厥位朕方正名以稽郡吏之治而議其􅂆懲爾尚起㢤以敏来効可穆珣司封郎中制􅃙具官某論功烈㝎勲級􅀁以寵士大夫而勵其志也主以郎吏禮秩甚殊僉曰汝􅀎宜正厥序夫正名者固將考其實也尚有信賞待汝計功可蔡京范珣考功員外郎制􅃙具官某計群吏之課而議其諌賞郎扵天䑓任属􅀹重維時髦士宜服寵名使殿最􅁢而功用興待汝􅀎稱其職可不勉㢤可陳向度攴貟外郎制􅃙具官某財用多寡之教物産豊約之冝司度之曹典貳為重爾惟幹敏冝服厥官夫􅀎下寛齊民而上􅁕經費朕方勵精庻政之日爾尚悉其猷為可晁端彦金部員外郎制􅃙具官某財用金寳有出納之政􅁠衡度量有制作之法司􅎇之任實典治焉僉曰爾材宜在兹位國有陟明之典待爾善扵其官可韓正彦倉部郎中制􅃙具官某倉􅁃賦入之政禄廪賙助之法䑓郎典領列扵右曺為官擇人爾徃惟􅁢夫􅀎善扵其職固􅀅勞圖爾之勞可趙令鑠祠部郎中制􅃙具官某禮莫大扵􅀕盖事神者人道之極也祠曺􅀁領躰莫重焉爾惟精明宜服厥位其思任職以􅁛予奉天地宗庙兢兢之意焉可徐禧御史中丞制􅃙朕正名以㝎群臣之位辨位以責庻務之實矧風憲之官紀綱􅀁属􅂚可以不明其任㦲具官其強敏仁䔍學通古今擢典訓辞遂持􅀖法冝專分職以應新書是用棳自右垣仍其階品俾爾納忠宣力得壹意扵中司以董齊百工而肅正内外庶余之作則更制罔或不䖍在爾懋㢤知其􅀁守可何洵􅀡文及甫大常􅀶士制􅃙具官某奉常礼樂􅀁出􅀶士議論之官爾以藝文列扵冊府宜升階品徃祗􅍏叙夫􅀎㩀經之􅀃適今之宜不為曲學之阿爾尚䔍扵所守可黄寔太常􅀶上制􅃙具官某奉常禮樂􅀁出􅀶士議論之官爾以􅀎聞朕用分命夫􅀎㩀經之說適令之宜不為曲學之阿爾尚䔍扵􅀁守可趙君錫宗正丞制􅃙具官某公室逺近之属譜録攷序之政主以列卿不用他族盖自漢始迄今循行丞扵厥官參賛為重爾辭學之敏列職書林宜進文階往祗厥服夫睦九族以刑萬􅀖此朕志也爾尚懋于厥守庻以承朕之仁可劉􅂪御史䑓主簿王子􅄾太常寺主簿制􅃙具官某吏之有属􅀁以相成勾稽簿領之書交修官守之事徃從憲府尚懋爾勞可王子􅄾改憲府作卿鐸張崇翟思邵剛太學􅀶士制􅃙具官某􅀶士列扵成均以講教為任爾以經明選用徃服厥官盖尊其􅀁聞以誘率學者汝之守也其尚起㢤可林希著作佐郎制􅃙具官其麟䑓著作之貳郎以詞學為之爾敏茂精明乆㳺書􅀚宜遷階品徃服厥叙属爾以文章之選其躰不奨遇之㤙可邢恕校書郎制􅃙具官某典校秘蔵之書旁求儒學之士尚思奨進之意無忘砥礪之勤可李常太常少卿制􅃙具官某礼楽精㣲之致所以格上下而諧人神奉常貳卿典領甚重爾聦明敏逹乆列書林宜進文階往就兹位其務􅁛于厥職使莭人心而和人聲者庻有得焉非獨在扵俯仰鏗鏘而巳兹爲朕志爾尚欽承可錢暄光禄卿􅃙具官某酒醴膳羞之具以供宗廟朝廷之用典領之任位在列卿冝得其人俾服予采爾明習吏事勞閱有聞選扵僉言俾踐厥職尚其祗􅅚無曠爾司可楊汲大理卿王衮韓晋卿少卿制􅃙具官某叅理折獄之事主以列卿其選甚重爾練習吏治閱試惟舊廷尉之選少卿改云廷尉云貳是用属汝尚思明慎以􅁛朕㤙可陳睦鴻臚卿􅃙具官某傳聲賛􅋚之官􅀁以賔接四方之使客位在九列禮秩甚隆正名之􅀄考擇惟慎爾以辭學材諝列職史筵冝進文階往承厥序尚其祗􅅚以服朕㤙可㢘正臣董詵司農少卿制􅃙具官某田畒稼穡之政倉􅁃委積之事典領之任秩亞列卿官儀之新考擇惟慎爾明習吏治勞閱有聞徃貳大農是惟高選尚其祗􅅚無曠厥司可賈青太府少卿制􅃙具官某九賦頒受之政百貨貿遷之法典領之任位次列卿肇正官儀考擇惟慎爾明習吏事閱試惟舊徃共厥服汝惟克諧其躰朕㤙尚㤙祗􅅚可李立之范子淵都水使者制􅃙具官某川澤河渠之政津梁舟楫之事置使典領禮秩甚隆正名之􅀄考擇惟慎爾明習吏治勞閱有聞選扵在廷俾踐厥職尚其祗􅅚無忘訓辭可黄莘職方貟外郎制􅃙具官某四海九州之疆域山川風􅁟之氣習載扵圖籍典以郎曺擢爾之材俾副厥位夫􅀎使方國逺近貫利同而材用便在爾􅀎知其守可不懋㦲可杜純大理正制􅃙具官某折獄詳刑之事朕􅀁慎也正扵理官叅賛為重選於在列爾以材升􅃪察以情尚勤厥職可李義内殿崇班制􅃙具官某虞度營屯之事積累􅀊月之勤序朝位於殿廷尚益思扵奮勵可元豊􅀋藁卷第二十
