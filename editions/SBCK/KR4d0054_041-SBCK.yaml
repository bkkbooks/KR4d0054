front:
  text: 元豊􅀋藁卷之四十一
  hash: sha256:593af788f574ede121bdd1dec1f97d280568547cb531ac8e3083bf93696039ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_041-1a}
body:
  text: 􅀕文秋賽􅀊既順成時方揫歛神􅀎施澤以及物人􅀎備物以事神兹惟舊章夫豈敢怠庻其爲福無斁扵人諸廟祈雨今者盛秋巳晚庶物􅀅成矧兹麥苗實待雨澤而驕陽尚熾畏暑未消野有焦枯之􅁨人懐膏澤之望敢祈靈徳甫徇輿情蕩藴隆之菑以升嚴氣濡滲漉之施以遂嘉生實頼神休􅁢諧衆志道觀道雖至寂感無不通人雖甚愚誠無不􅀗􅀕詞同前改靈德作冲䕃改神休作真工佛寺佛莫大扵慈悲在扵利物人莫艱扵稼穡又也趨時是仰神休用康􅀊事􅀕詞同改靈徳作斍䕃改神休作慧心諸廟謝雨文比􅈼衆情仰祈靈施果􅂪薄雨小潤焦原巳祛畏暑之煩遂適戒寒之漸敢忘祗報更俟餘休克終播澤之祥俾􅀗有年之望諸廟祈雨文時寒未􅀂雨雪尚愆麥有立苗之艱人違墐戸之適敢依靈徳􅄋致勤誠惟順導扵大和俾霈施扵膏澤克諧衆望實頼隂休諸廟謝雨文比苦愆陽􅄪徼靈施􅂪報如響得雨應時澤潤焦枯蕩除煩欝物有豊成之望人無疾癘之􅁨敢忘大㤙尚覬終恵􅀕勾芒神宿官扵木用事在春敢奉􅀊祠庶爲民福慈聖光献皇后百日轉經䟽至㤙難􅁛􅁒報者惟盡扵精誠大􅁴可依有禱者必􅂪扵善應敢縁慧力輙罄愚􅂨伏以大行太皇太后淑聖在躬聡明先物儀刑宫壷徳大而不矜鎮撫國家功崇而不宰未窮遐􅄸奄背盛辰皇帝陛下務極孝思永懐慈䕃内遵䘮紀不縁易月而断㤙外異􅆍園特以因山而建號矧惟臣庶實自生成雖銜有慟之情未識論酬之所是資佛果少即人心伏愿克配坤元寕至神扵不測䆮昌天極介景徳扵無􅆠實頼􅆊因允諧衆望諸廟祈雨文民之艱扵稼穑頼􅀊屢豊得以􅁕衣食而償其力吏亦得以無所事扵勤而偷禄今兹春仲麥苗滿野得雨而成則民得以継其豊年之樂而吏亦得預其幸神之食於此􅁟為􅀎澤扵斯民也故敢以告尚其賜之以称人望諸寺􅀚祈雨文春氣巳中農功方急而膏澤未洽􅁟脉尚乾敢恭致扵精誠用仰祈扵􅁴道改斍作真䕃尚其降雨俾􅀗有年諸廟春祈文神之扵人䏻康􅀊時而阜庶物故人得以􅀊時備物以事神今兹春仲敢遵常典神可不懋以無廢其康阜之功則人敢不盡以無斁扵事神之禮􅀕􅁟祈雨文農勤甚矣􅀊既暮春麥待雨而成菽粟待雨而種而旱䁧為虐人用􅁨嗟今􅀅為壇象龍以禱是用先事告爾􅁟神尚其降休無咈人望􅀕五方龍祈雨文龍之變化無方而其有功扵人者則在扵䏻興雲雨嗚呼今旱甚矣是用稽古為爾某龍之象位于某方薫祓以禱爾尚圖厥聀其亟以時肆為膏澤以大施于此􅁟無愆厥應俾有後羞惟爾有神亦尚永有依歸太清明道宮祈雨文旱踰時矣麥既萎死而菽粟未種皇帝􅁨劳遣吏分禱尚其致雨無俾􅀊害乆兹東睠實在靈徳諸廟謝雨文維􅀊大旱􅂪賜甘雨窪邪之麥冀可以蘇菽粟之田有望自此實神之徳敢忘昭報尚其終恵俾􅀗有秋諸寺􅀚謝雨文氣之不􅀂旱實為菑􅂪在正陽界之甘澤維靈休之所自豈昭報之敢忘俾􅀗有秋尚頼終恵太清明道宫謝雨文旱乆未觧詒上之􅁨得雨應祈曽不旋日焦萎可起種藝可施實惟靈休副此柬睠尚其終賜俾􅀗有秋亳州明堂後􅀕廟文維季秋辛巳天子宗祀英宗皇帝扵明堂以配上帝既成禮乃詔天下徧􅀕于群神故州得以衆羞醪酒祗薦祠下神其誕降嘉福無有不暨以􅁛天子所以事神爱民之意哀詞蘇明􅁢哀詞明􅁢姓蘇氏諱洵眉州眉山人也始舉進士又舉茂才異䒭皆不中歸焚其所爲文閉户讀書居五六年所有既冨矣乃始復爲文盖少或百字多或千言其指事析理引物託諭侈䏻盡之約逺􅀎見之近大䏻使之㣲小􅀎使之著煩􅀎不亂肆􅀎不流其雄壮俊􅊆􅀂决江河而下也其輝光明白􅀂引星辰而上也其畧如是以余之所言扵余之􅀁不言可推而知也明􅁢毎扵其窮逹得䘮􅁨歎哀樂念有所属必發之扵此扵古今治亂興壞是非可否之際意有􅀁擇亦必發之扵此扵應接酬酢萬事之変者雖錯出扵外而用心於内者未嘗不在此也嘉祐初始與其二子軾轍復去蜀逰京師今參知政事歐陽公脩爲翰林學士得其文而異之以献扵上既而歐陽公爲禮部又得其二子之文擢之高䒭扵是三人之文章成傳扵世淂而讀之者皆為之驚或歎不可及或慕而效之自京師至扵海隅障徼學士大夫莫不人知其名家有其書既而明允召試舍人院不至特用為秘書省校書􅀰頃之以為覇州文安縣主簿編纂太常禮書而軾轍又以賢良方正䇿入䓁扵是三人者􅀹見扵當時而其名益重扵天下治平三年春明允上其禮書未報四月戊申以疾卒享年五十有八自天子輔臣至閭巷之士皆聞而哀之明允􅀁為文集有二十卷行扵世所集太常因革禮者一百卷更㝎謚法二卷藏扵有司又為易傳未成讀其書者則其人之􅀁存可知也明允為人聦明辨智遇人氣和而色温而好為䇿謀務一出巳見不肯躡故迹頗喜言兵慨然有志扵功名者也二子軾為殿中丞直史館轍為大名府推官其年以明允之䘮㱕􅁙扵蜀地既請歐陽公為其銘又請予為辭以哀之曰銘􅀅納之扵壙中而辝􅀅刻之扵冢上也余辝不得巳乃為其文曰嗟明允􅀆􅀖之良氣甚夷􅀆志則疆閱今古􅀆辨興亡驚一世􅀆擅文章御六馬􅀆馳無疆决大河􅀆嚙浮桑􅙾星斗􅀆射精光衆伏玩􅀆彫肺腸自京師􅀆洎幽荒矧二子􅀆與翶翔唱律呂􅀆和宮啇羽峩峨􅀆势方颺孰云命兮変不常奄忽逝􅀆汴之陽維自著􅀆暐煌煌在後人􅀆慶彌長嗟明允􅀆庸何傷吴太􅀄哀詞呉太􅀄象先今為單州單父人父祐之從事廣州勤事死州瘴沴地􅁚先以䘮至州下亦死年三十一􅍲三試於禮部不中余與之善後七年其弟景􅀄来視余扵臨川慶暦六年也余思象先如􅀄失之為之追考其為人為辭以哀之曰越山如鱗􅀆逹海而窮􅀔阻以偏􅀆毒潜其中子之自重􅀆卒與子逢我知子􅀄􅀆其父之從為其子􅀌􅀆吾未之信孰神之苛􅀆又速子終嗟嗟乎然􅀆維戚吾哀維子之生􅀆順祥于宫父母之􅂬􅀆兄弟以雍出與人遊有守有容其材其良􅀆剖劂又工一日而棄􅀆卒偶蒿逢云誰不死􅀆萬古一空吾辤傳子􅀆無有春冬子天且屈􅀆猶夀而隆京王君俞哀詞京師多尊官要人䏻引重後軰公卿家子有賔客親黨之􅂇略識文書章句輙出與寒士較重䡖繇此名􅁛多㱕之而主陞絀者因得與大位君俞在京北門外不交人事讀書慕知聖人㣲言大法之歸趣孜孜忘晝夜寒暑之変其爲辤章可道耻出較重䡖漠然自如繇此名與位未充也慶暦元年予入太學始相識舘余於家居数月相與講學㑹余㱕遂别常爱君俞氣貌端然雖燕休未嘗慢在衆中恂恂或不知其朝士也至相與言天下士白黒無所隱其方且勇亦少及也太夫人素嚴君俞怡怡奉子職退事寡嫂無間言畜妻子不驕為家不問田宅平居無䙝私流侈之好以某年某月疾遂不起始丞相兾文穆公無主祀拔君俞以託其後君俞亦盡誠奉之兹可以不墜矣今太夫人年高而天奪君俞之命是扵君俞之心不為大恨欤夫為人如前之云而不卒扵貴且夀曽未少施其所學又􅀒其所氶之心是扵衆人之情不􅀎泯哀也况重以相知其悲塞可勝乎作辝以泄其哀且系曰君俞姓王氏諱寅亮官至殿中丞年二十六云維相其初􅀆擇嗣于宗君提而秀􅀆乃立于宫庙門有㦸􅀆􅀕祀以時相不失記􅀆君無墜恭庭闈楽康􅀆妻子不驕又亊寡嫂􅀆端其服容衆人剪剪􅀆趨慕要津我躬䖏方􅀆不夸以􅀙詩書百家􅀆其愽而殽我講其疑􅀆徃趨于中雖裕扵心􅀆不耀其華維友則信􅀆其位未充方期􅂋行􅀆羽儀于世孰尸変化􅀆亟卑之㐫沕穆無端􅀆莫敢貴辝維舊及知􅀆哀攪余􅎍老母無撫􅀆少婦失依頼有息子􅀆可望其隆嗚呼哀㦲􅀆予悲􅂚勝託辝于牘􅀆恨與天終元豊􅀋藁卷之四十一
