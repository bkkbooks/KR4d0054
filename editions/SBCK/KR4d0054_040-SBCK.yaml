front:
  text: 元豊􅀋藁卷之四十
  hash: sha256:da9e563c24f83580c5bfb29cd6770c7a7a7edb7d6412709ac628cbf9462c43a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_040-1a}
body:
  text: 􅀕文五龍堂祈雨文廼四月以旱禱于邪溪薤山應時得雨麥以豊成稻可播種獨異扵他境寔維其賜今稲田又乾矣此􅀖之人皆謂龍虎之河五龍之神禱雨輙應余敢不告神其降鑒大施澤于斯民使􅀗有年則人扵報神亦維無斁無俾薤山邪溪専美于此􅀖以作神羞靈溪洞祈雨文吏不勝任荐致旱菑禱于山川為黷已甚然稻田日瘁民命􅀁託夙夜􅁨懼不知所為維爾有神世載靈徳是用靦顔有請忘其慙羞尚其降祥時賜甘雨俾􅀊無害維神之休又大悲祈雨文盛夏在辰常暘為沴稻􅀅蒌瘁人用嗟􅁨繇吏治之不明致奸和氣維佛乗之無礙善濟群生是敢同祓精誠䖍祈斍䕃覬滂沱扵膏澤俾浹洽扵原田用救焦枯實依慈惠大悲謝雨文民無常心惟安扵􅁕食佛有慧力善救扵含生比縁盛夏之辰乆苦驕陽之沴懼傷稼穡􅀅致㐫饑故仗莭之雋良暨守藩之􅀌陋俱陳精懇䖍對晬容果􅂪感荅之慈立致霶􅑛之澤滌除害氣勃起良苗変瘁為荣物遂更生之理易􅁨以喜人諧望􅀊之心維是鴻私敢忘昭報尚期降鑒常􅂌有秋諸廟謝雨文吏之罪大矣一切􅀙亊扵謹䋲墨督賦役而巳民之所􅁒不䏻與所惡不􅀎去自恕以􅀼食不知其可愧安䏻使隂陽和風雨時乎故若鞏者任職扵外六年于兹而無􅀊不勤扵請雨頼天之仁􅀑神之靈閔人之窮輙賜甘澤以救大旱吏知其幸而巳其為酒醴牲饔以報神之賜􅂚敢不䖍維神尚終惠之使永有年則神亦無窮有依于人諸廟謝雨文積是驕陽莫救稻苗之悴獲兹加霔尚兹秋物之榮是荷靈休敢忘祗報諸寺院謝雨文比以常暘仰祈真䕃果獲滂沱之澤大蘇焦旱之田敢擇佳辰特申嚴謝尚期降祐常􅂌有秋諸􅁑武侯廟祈雨文天子以􅀊乆旱所􅀍者廣分命守臣禱其境内􅀑神之有靈徳在于人者維靈有志于民舊矣故敢以告尚其降鑒大施澤于四方以称天子􅁨人閔雨之意諸廟祈晴文曰渉􅀊以来自春徂夏乆隂不解積雨旦多今特燥而成粟待暘而種而雲屯尚宻土潤方升民皆􅀼􅁨吏用深懼百姓之困甚矣惟神得無念乎尚其開除山川相導出日俾􅀊無害為民之休謝晴文比苦雨􅁋懼為􅀊害􅂪神之徳賜以時暘今􅅙麥雨成里閭相慶敢不嚴報尚祈終恵諸廟祇雨文諸寺改作敢干真斍仲布䖍誠惟佛至慈与人為㱕今􅀊之􅀄未愆雨澤然而麥􅂊薄稔􅅙不甚冝則民之窮盖可知矣今兹農望惟在秋成而温風方騰旱氣弥盛是用側身以懼有禱干神尚其降􅂨時賜甘霔俾􅀊無害亦神有依薤山祇雨文誌言衆山雲起此山無雲終不降雨衆山無雲此山雲起必降大雨是􅀎為雨䏻為不雨在神而巳今􅀊数不登而旱氣又作吏之不良無所迯罪民貧可憫神䏻為雨而不為是何情哉神其為民出膚寸之雲致数尺之雨使㐫為穣以救民之急則此􅀖之人所以報亊神者子子孫孫其孰敢怠尚其念之無作神羞諸廟謝雨文比苦亢陽具陳致禱寔䝉甘澤敢不昭報洪州謁諸廟文惟神播澤在人廟食兹􅁟鞏守藩之始敢􅁱禱謁尚其靈德常庇斯民神扵無窮亦永有頼洪州謁夫子廟文惟神播澤在人廟食兹􅁟鞏守潘之始敢􅁱禮謁永惟聖徳覆􅀍無窮尚其聖德學者洪州諸寺􅀚祈晴文爲有大慈速扵善􅀿人無常産理則難安惟穡事之􅀅成而雨􅁋之不止晪腼省懼豈敢皇寕盖兹疲癃之民已出旱菑之後室家淍􅁦閭里愁嗟如復荐饑􅀅焉託命今蚤稼甫畢晚苗方興窪下之田己傷稼穑亢爽之地實懼浸􅁋是敢䖍對睟容仰陳净懇伏望廊山川之曀􅆡回日月之光華諧此順成湛然澄霽寔其慧􅄻感慰輿情諸覩云道實無方物来斯應民惟難保食􅁕為先䖍對上靈寔繄真䕃謹詞諸廟云神實無方物来斯應民惟難保食􅁕為先䖍對至靈繄妙䕃謹告諸寺􅀚廟謝晴文比虞水溢􅀅敗􅀊功不自皇寕敢陳懇迫果􅂪隂施即俾時暘田里􅂬呼粢盛有望惟神靈所以賜于人者豈愚􅁕以當之尚冀餘休終成多稼民􅀎自保神則有依􅀕西山玉隆􅀚許真君隂功及物靈徳在天􅒺惟真馭之升實以中秋之序人承餘烈􅀊即遺祠故兹守􅁟之㣲敢躰爱民之素俾往陳扵薄具尚永庇扵羣生仲秋告􅀕諸廟文􅀊在仲秋祀有常典維神邁徳實庇此􅀖敢率舊章用陳明薦諸寺􅀚祈雪文窮臘未雪方冬尚温人有疾癘之􅁨地無膏澤之潤職在綏撫心焉震慚敢祈膚寸之雲播為􅄹尺之瑞盪除隂氣順致時寒使閭巷消薦瘥之菑田疇成多稼之利實依孚位俯徇㣲誠諸寺􅀚謝雪文比縁窮臘之期乆苦亢陽之沴敢徼靈施仰布愚誠􅂪膏澤之應時致祈寒之恊序人無疵癘之患物有豊成之祥實頼洪休敢忘昭報更祈宻雪尚及餘冬􅀕順濟王文維爾有神克相王師章示見象皇帝侈神之徳俾錫號位秩尊禮盛非以序升今州遣􅀙事即神之祠致皇帝命尚其欽㦲以對休寵福州謁夫子廟文惟夫子之徳仰之彌高夫子之言窮之益逺學者潜心庶㡬髪髴某守􅀖之始躬即學宫敢􅁱禮謁尚其降鑒福州謁諸廟文維神作徳自幽信于兹􅁟人用報事秩􅀕有常鞏甫此守􅀖敢修禮謁尚其降福終賚斯民福州鱔溪禱雨文曰嗟乎旱也誰則為之芃芃之稼􅀅福而萎嗷嗷之衆􅂚望而依維閩属者㓂賊之罹逮其既附我士巳疲餘醜成群百十睢睢跳踉出没􅀒力乗􅇖亦有為渠諸偷所推相望棊布未受􅎗羈室家莫寕逺近並疑我畜以柔亦震以威􅀙有法賞不􅀙係纍或􅅰而序或就纒徽逮歳朔易盪㝎無遺山林夜行􅀏語追随吾人即安含糗而嬉士馬亦􅁬􅁊桓騤騤天子聖徳海􅀖是綏維此海􅀖􅀄亦難一作艱饑今寕宇矣師征始㱕今食􅁕矣廪實尚㣲若􅀊大熟如梁如茨如京如抵自公及􅀻獄無訟繫里無盗闚式于永世方始在兹今此大田既碩而齊俾不卒成孰忍為斯神有靈蹟國人所祗神有􅂋號天子所躋萎䏻起之槁􅀎澤之胡寕有餘歛而不施我用卜日蚤駕以馳即告潭側尚其听之攘除驕陽騰雲彍霓播為甘液霈洒淋漓俾農有秋百物具冝熄偷與争長置刑笞人扵報事豈有斁思諸廟禱雨文常賜為沴􅀅害農功夙夜懐􅁨不皇啓䖏敢徼靈貺時賜膏澤俾人􅀗濟惟神亦永有依謝雨文維閩之人前􅀊苦饑云􅀊苦盗􅁕食而安期自今始而方夏旱暎懼害穑事兹余用稽于衆盖可以徼福扵民者罔不馳告不敢爱力不敢寕居頼神之仁􅂌以膏澤自未至酉逺近周浹維􅀊大熟可立而需敢飭豆􅁁報用典禮吏無明徳而但知告其困急扵神神既賜之其尚終惠題禱雨文後福州元豊元年戊午自四月甲子至五月辛巳凡十有八日不雨田巳􅁨旱太守率屬吏士分禱諸佛祠迎像能致雨者陳之通路用浮圖法為道􅂣率属吏士羅拜以請丁亥夜五鼓岀禱鱔溪属吏士分禱群望己丑率属吏士􅂼食夜四鼓就城南近水􅀕告后􅁟􅀅為壇􅀕龍庚寅􅂼食如己丑夜三鼓就壇壝刲鵝􅀕龍辛夘夜五鼓就視牲血以法推之當得雨壬辰就紫極宮壇用青童二十有八人更呪􅔼蝪如古法癸巳分禱諸祠未徧者取黄蘖山龍潭水置道場率属吏士徃請甲午又徃乙未夜二更得雨連三日夜逺近皆有餘盖自辛巳至丙申凡十有六日無日不致禱自丙戌至甲午四境多得雨至丁酉乃皆有餘是日罷道􅂣還所迎佛及水􅔼蜴南澗之濱庚子遍􅀕謝欲知閩粤之問兼旬不雨則巳􅁨旱而請禱之爲不誣也故刻其祝辤扵石而并識之明州脩城􅀕􅁟神文州有帝命繕治城墉得日之良肅工始事斯人允頼維爾􅁟神尚其降休敢不以告亳州謁諸廟文維此譙都年􅀊順而風􅁉厚者雖人之力實神之助鞏􅀗守此􅁟敢薦罇爵與人為楅實待神休亳州謁夫子廟文維人之生尊卑長㓜知有其序悖于理者知有所畏何以致然實自夫子鞏長人扵此敢不嚴事是用寅薦罇爵式遵典禮元豊􅀋藁卷之四十
