body:
  text: 制誥擬詞􅁽惟宋祖宗集大命開蹟垂統傳継在予頼天之靈海内和洽􅀗薦珪幣以為􅀕主惟先哲王享國君民必有儲兩以相承翼􅀁以奉天地􅃊宗廟與民為依長慮萬世也厥惟故典予敢不率咨爾某生材之卓絶倫㧞􅀋覃訏岐嶷成扵自然緝熈光明不繇外奨潛徳日茂敷聞下土􅀅旄王組藩衞京師神示􅀁毘戒夏係属冝執匕鬯位以時㝎今遣某某立爾為某夫天下之本在太子太子之􅀁務求諸巳而巳爾􅀎明其心人不詔其孚爾􅀎善其身人不戒其随治亦多術矣要不易乎此也嗚呼匪得之難充之為難爾􅀎服于訓辞以承我先后之流澤俾爾躬無疆惟休惟予及萬􅀖亦無􅆠惟􅂟豈不韙歟王制一昔大漢之興鑒􅀌秦之敝分土而開者九國當高祖之􅀄同日而立者三王在孝武之世或支庶之踈属或宗嫡之近親􅀁以蕃輔京師承衞天子今朕按圖䂓地諏日定封推天性之厚㤙本人倫之通􅁩以隆公室盖率舊章某鍾氣至靈生材特異聦明先物不自扵鐫磨孝愛絶人非繇扵奨勵比服公圭之寵仍分􅀅􅃏之崇林有􅂋聞洽扵時論是用疇其爵邑列以真王建爾國家保兹東夏視祲威扵宰席増衍食扵爰田用強盤石之基實重維城之􅀔嗚呼冊之宗廟申戒囙其土風式是大􅀖親臨㝎其名􅃅爾尚無作匪徳以追配前人之休無􅀙匪􅃔以荅􅀭皇祖之訓俾人預懐荣之􅂟而身兼燕譽是祥王其勉之朕命惟􅁢王制二昔周建親戚盖五十三國以蕃輔京師漢封骨􅁏或連数十城以承衞天子􅀁以強形􅀔固根本計慮深矣朕甚慕焉矧先帝之子朕之仲弟宜膺􅂋冊進啓大􅀖兹惟典常夫豈敢􅆸某淵静冲約孝友忠䔍不挾其貴以􅀙匪􅃔不恃朕㤙以作匪徳奉法遵聀夙夜小心王子雍􅀖滋乆弥邵惟营丘之野臨淄之中太師吕尚之所建國兼岱及海天下重地是用立爾保兹東􅁟二公之儀上􅀅之莭爰田真食俻物寵章大告于廷咸以属爾於戯書􅁛帝堯之徳曰以親九族詩美文王之聖曰刑于兄弟盖教自上行愛繇親始先王之道不易之理也今予命爾不違兹誼尚悉爾心其勵相朕使􅀺民百姓扵変時雍繇家及國罔不作孚以屏予一人慎拊方夏實諉在王時其勉之王制二天子攴子􅀂其毋弟􅁎姓扵周未有不侯劉氏扵漢未有不王盖親之欲寵其位愛之欲厚其財先王之法人事之理也某先帝少子朕之季弟聡明齊敏孝弟忠實冨而􅀎約不從以敗禮貴而􅀎戒不恫以好逸畜學楽善厥徳日新王曺積年遵職無􅈈惟斗牛之野太伯􅀁開三江五湖其陽大海塩魚金􅂖天地之蔵兹用命爾式是南郊儀視三公任兼上􅀅真封􅄛食備致寵章扵戯昔魯公扵周大啓爾宇以輔王室康叔扵衞實為益侯以保又民今朕順稽于古以屬爾某爾尚念兹以祗厥服常􅀠之澤配前聞人維城之休承我高后在爾勉矣徃其欽㢤皇子制朕受天命撫萬􅀖實承祖宗之盛徳丕烈永惟先王之典人君在位必蚤建太子所以重宗庙為天下萬世計也某粤􅀄在毋祥應光見誕始􅀎言則􅄮則嶷王封􅀅位蕃輔京邑孝爱日􅁉温恭自然神靈􅀁開人望攸属攷刺六藝主器以長生民之道不易之理也其立為某扵戯非朕私于子某惟宋高后之傳序垂統朕不敢忽惟四方上下之所注心朕不敢距嘉與海内同孚于休播告遐邇其諭朕意贈第八皇子制朕惟父子之親人道之極盖父有天下而隆名重位逮扵其子此㤙義之􅀁始而先王之制不易之理也至扵禮命未及奄遘淪亡申以哀榮朕何敢廢皇第八子某秀㧞慧悟天質異甚不好戯豫安扵靖恭謂及大成必為國噐蕃輔王室朕有望焉而屬疾乆之醫禱備至不幸夭閼痛何可堪其扵陳迹尚存音容如接永言傷悼莫愬朕懐今有司上聞揆于公議謂宜秩以三事今于中䑓爵之真王謚以佳號厥惟舊典朕豈􅀎抑是用追􅃬備兹異数嗚呼生而有特出之姿不得遂其美殁而有非常之寵所以厚其終服我命書尚其不昧王子制朕隆扵親親非特􅀻㤙而巳􅀁以教天下厚人倫也爾家􅂟􅀁鍾王室之出列扵使領兹惟異寵徃思報􅁛待爾成人韓􅄾制躬閎廓之材躰純一之徳翊亮三后格于皇天惟􅀄登庸合志皇祖仁民爱物日陳上前進賢退奸隂利天下側陋幽􅀮靖譛庸回削㓕無􅀋及受末命戡濟艱難以巳徇時坐定大議天望人事脗無間然市朝不驚按堵如素海内萬里外薄四夷率職駿奔無敢先後昔三代遭変継世之􅀄干戈驚俻陳及門廷書之史官以為後法以至兩漢嗣位則又閉城屯兵以為故事未有兵蔵扵庫士散扵家而傳序継統中外晏然如今日之盛也是繇列聖功徳無窮之休亦惟廊庙之上逺畧大度身任社稷克濟登兹者也相制一夫有保命集于朕躬惟用乂民罔以自逸敷求良弼作為憑依􅀂圜就規􅀂正識墨今朕得士諗于在廷某廣􅀶静淵宻於世用推其計畫見扵可行攷其事功効扵已試爾為爾守宜立輔朕兹用詔爾位于東䑓嗚呼自周衰以来千有餘􅀊先王之道蔽而不明振壊扶微朕竊有志尚懋朕佐圖惟設施叅諸經訓而不違質諸時宜而不謬無崇小慧以易大猷無伐巳􅀎以距衆善惟賞刑在上不可以僣惟聡明在下不可以咈俾厥后克濟其任則爾身永孚于休其徃起㢤以承我祖宗之丕烈相制二有為之君舉賢以自助有志之士遇主而後伸两常相湏而相濟者少兩常相求而相值者寡朕􅀚前代君臣之際聖賢相與之盛慨然忻慕願比迹焉今得其人詔于爾衆某行無緇磷學有本原材諝智謀淑問惟舊納忠左右匪􅈈夙宵蔽自朕心命爾予翼列予右相進貳西䑓嗚呼自道術不明而世蔽滋乆法度多缺而紀綱浸微圖治者以古為迂錯事者以苟為得兵安扵坐食而不合扵農士習扵空言而不知為吏禮義㢘耻闕而不思朋黨比周靡然成俗任之以學斆而敗官以墨者方興起之以赴功而便文自營者滋出伊􅁒黜漢唐之淺陋追尭舜之髙明尚懋相予予忱不貳使千載之墜振扵一朝上下之間配于前烈以􅀭我先后之光訓亦纉爾舊服之􅂋庸相制三朕􅅚正三省綱理萬事號令􅀁出本諸西䑓閱審駮論属之黄闥推而逹之則在㑹府以其官之長貳皆為任政之臣􅂦􅁕居中各遵其職分守則異合謀惟一時予俊乂宜就兹列其身䔍學行自幽而􅂋宣力中外績用彌邵惟文昌政本揆叙百度介于左省考慎朕命圖済厥服爾其徃㢤朕訓迪治官順稽于古使其躰至大而統之有要其事至衆而舉之有條不惟其文惟其實不惟其位惟其人爾􅁢念兹以勤予翼盖先代之法存扵籍者既殘缺而難循當今之宜殊扵昔者又舛違而易逺酌是􅃔憲成之甚艱尚迪庶工奉􅀂惟新之則亦永来世預有無窮之聞節相制古者出軍之法始扵一井之間遣􅀅之常甫在六官之内師田共務文武同方盖丁發召之期則士就戎行而卿行扵外已征誅之事則衆遵農畔而帥旋扵朝􅊗世雖殊兹致惟一逮後王之更造開阡陌以居民􅀠伍符者身不受扵一㕓仗齊􅃏者位不連扵九􅁄其扵荷戈抗隊為王之􅀲牙立纛設旄為國之屏翰上下之任古今則同予得異􅀎詔于在列某性資強毅識慮精通束􅄠脩身有恕巳及人之志歴官行事有氶流宣化之勤踐􅀭要極之司更閱􅀊時之乆嘉謀黨論簡在朕心廣譽善聲洽扵輿論有國之典以爵詔功宜疇厥庸爰啓爾宇建大􅀅之旗鼓尸我一方賜諸侯之士田保兹東夏以董齊扵軍旅以撫和扵士民􅄁帝傅之寵名益户封之真食兼隆異数奨勵茂勲扵戯昔􅁻甫典兵萬􅀖為憲申伯作邑四國于蕃宜悉意扵壮猷庶俾忠扵前列荅􅀭祖宗之訓予冀為衆得人夾輔􅀖家之基爾尚為時宣力侍中制舜用臯陶􅀂股肱之承元苜啇咨傅􅀃如舟楫之済巨川盖一躰之相成或兩求而莫值肆朕讃極窹􅄰雋良果得異􅀎属之大任用揚孚號明論在廷某行蹈中和學通古今從容應物有適用之材慷慨立朝多㩀經之論比回􅃋扵禁闥遂更踐扵樞庭閱􅀊已深服勞惟舊朕惟紀官之敝乆廢扵正名分職之殊固難扵覆實為司徒之㝎制俾位號之無虚乃眷宗工宜加異数東䑓管轄之任爰䖏扵弼諧南官喉舌之司仍躋扵端右躰加􅂭之注意當益懋扵壮猷於戯秉國之均夫下之所取正熈帝之載朕心之􅀁仰成使萬物各遂其生而一夫無失其所以輔予治徃惟汝諧門下侍郎制朕扵天下之事以禀承䖏决属之中書審閱駮正㱕之門下而使尚書推而行之此三省􅀁以異任而相成故長令僕射皆宰相之任而左右省侍郎􅀁以貳之盖謹其名者固􅀅循之以稽其實也必使位無虚加人無虚受以脩國家之務然後􅁛朕意焉某明􅁢修㓗學通今古以風力之敏見扵續用以志行之䔍重於朝廷擢自􅀙臣預國機政多引大体沃于朕心維董正治官之􅀄介東䑓􅃹轄之􅀉歴選在列汝徃惟􅁢夫堅一心以在王室康萬事以亮天功汝之任也其尚勉㢤門下侍郎尚書左右丞制尚書萬事􅀁出丞􅀁以筦其要門下三省之首侍郎所以貳其長朕稽于古義以正官􅃅故合是寵秩以命吾共政之臣非天下之材􅁕以恊朕之謀繫人之望者夫豈虚授某荘毅忠䔍通于古今列扵庙堂以義陪朕是用考擇以為􅃟首使文昌左轄之任舉􅃈闈􅂙議之効明六官紀綱上之􅀁以齊下者無所撓四方奏列下之所以通上者無所壅以弼予一人而亮成庶績尚懋厥志無忘訓詞給事中制有事殿内之臣職在扵平奏述詳命令駮其違者而正之覆其善者而行之至扵决獄官人發驛遣使申滯察苛嬈莫不緫焉其任可謂煩且重矣朕董治正官之始思得其人以􅁛厥位以爾具官忠某䔍強毅明扵理躰勞閱甚茂朕惟汝嘉列之東䑓公議􅀁属惟精敏不􅈈可以統治要􅇵惟剛方不苟可以辨白是非爾尚慎于厥脩朕方􅀚汝之效左右常傅郎制左右之臣以􅀐從乗輿職在献納可謂親且重矣非噐識操行属乎朕心夫豈􅁿受某老于文學練逹洽躰舊惟共政勤烈在時某直諒多聞䔍扵自守先帝遺朕調護有勞皆以耆名列于秘殿是用考擇扵衆寵以兹任朕惟爾之試用巳效必􅀎秉誼不渝惟尔之􅀶通古今必􅀎􅀘朕之闕徃祗厥服豈煩訓詞左右諌議大夫制諌議大夫掌議論舊矣今列于從官實有官責事無大小皆得開陳當其可􅀙則為之更命令易取舍固朕之所虚心而聴也朕方扵天下之忠讜惟恐不聞則居是任者直巳以事上夫何間㢤某􅄊識強敏明于今古俾職献替僉曰汝宜夫􅀎通上下之情而使朕立扵無蔽之地治道之所繇出在汝􅀎任其任可不勉歟二起居制孔子􅁛言動以禮天下㱕仁焉矧託于王公之上言而為令動而為法故必有左右史􅀙而記之所以照得失明􅂆戒􅀎􅁛兹任盖難其人某丈學優􅀷操行􅁱㓗執簡簮筆有列扵朝今朕順于古義以考㝎官儀是用正爾之名俾仍舊服其尚謹于書法以無曠于厥司左右正言制左右之臣以言為職事有得失関扵理躰利害繫扵人情或方兆扵㡬微或巳施扵命令論皆可及􅁩無不從􅃟用特殊􅀉属惟重正官之始得士􅀹艱某綽有時材通扵卋用献替之位宜服􅃂名夫上之求乎下者患乎難知下之求乎上者患乎難逹使耳目之任無蔽藥石之䂓必聞尚惟汝􅀎以助予治諌官制某純明廣愽信古知今周爾之長禆有言責夫言人之所難言爾無不盡而聞之如恐不及朕豈敢忘其尚懋㢤無或容而巳矣中書令制虞氏之咨四岳惟亮天功周家之建六官以為民極朕叅于古義質以今宜以右省典正扵鈞衡以中䑓捴持扵綱紀兼是重任時惟宗臣播告在廷其徳新命某敏于學術􅄖有時材以經逺之謀彌綸治具以察㣲之智練逹事㡬繇展采扵禁林遂陞華扵宰路恊宣勞力積有歳時朕惟授職以量􅀎宜循名而責實稽先王之作則以正百官起多士之赴功庶康萬務眷言舊徳申以異㤙惟化原實繫扵内樞俾首弼諧之任維政本一歸扵㑹府仍躋端揆之崇寵秩􅀁加委成彌重豈獨儀刑扵列位固􅀅叙正扵􅃔倫扵戯咸一徳以格皇天輔予于治􅁵百工而熈庻績待汝有為其務迪扵壮猷尚思齊扵前哲體兹注意維往懋㢤門下中書侍郎尚書左右丞制尚書中書門下三省本天下之務而侍中令僕射為宰相之任舊矣自唐政不綱而失其守今朕董正治官使三省之長皆復其任而扵尚書左右丞左右省侍郎秩有升降使貳吾任政之臣夫綱轄之地與衘史更相察舉􅀁以驚官邪明憲度而侍郎扵左右省無不統理則其􅀁繫扵躰􅀹重非傑出之材不在兹選某官端方䔍實學有本源預于政機人望惟􅁢某強毅忠厚通于古令謀謨廟堂休有令聞是用命爾以為選首其尚體余所以䖏爾之重勿苟勿随使百工庻尹皆知爾之不􅀻于法罔敢不正而政令之自上出者罔不得宜以􅁛朕所以作則垂法始今行後之意爾可勉矣子有望焉中書舍人制朕稽于古以正百官使循其名以效其實惟舍人中書之属以典掌命令為任而况列扵侍􅀙則又職在論思方朕明紀綱㝎憲度以為民極之􅀄非􅀎見扵文章何以究宣朕意非􅀎通扵世用何以弥綸庻務進在兹位不其重歟某官某思正仁䔍逹于古今其文足以代王言其智􅁕以謀治體㫁自朕意以為􅃟首其尚尊爾之學以善于訓詞􅁬爾之庸以禆于政理使爾􅀎􅁛厥職而朕預扵知人其惟勉㢤以祗厥服知制誥制一典掌書令之任為左右之臣非獨在扵潤色斯文而巳固當論思治體以輔朕之不逮朕􅀶考天下之材然後有􅀁㧞用則扵付授豈不慎㢤某強識敏學通于理要祗節勵行忠䔍不回朕惟汝嘉使在兹選朕有兢兢業業一日二日萬㡬之慮汝則思輔以謀猷忠扵獻納朕有作則聖憲施命以告四方之志汝則思逹以文辭見扵號令使汝為􅁛任則朕為得士豈不休㢤尚其勉矣以服厥官知制誥制二賛為名命之臣法當得一作待從非獨在扵討論翰墨發揮詔􅃅而巳必􅀅講明治具思献其可以弼予違故非其人夫豈虚授某敏有時材優扵學術擢扵不次俾典訓詞維􅀎守其所聞可以輔予不逮維䏻明扵躰要可以見扵文章其尚懋㢤方􅀚汝効尚書左右丞制本天下之政者尚書也本尚書之紀綱者左右丞也盖衆職之治乱萬事之廢舉紏而正之實其任焉今朕董正治官使尚書纉其舊服以㒒射為任政之臣而六卿各遵其職至扵綱轄之地所以驚官邪䋲謬戾御史有不舉者得并而治之則其繫扵躰􅀹重是以進其位叙使得貳吾任政之臣非望臨一時朕豈虚授某明􅁢忠䔍通于古今列于廟堂以義陪朕是用考擇以為􅃟首其尚躰予所以䖏爾之重勿苟勿随俾百工庻尹知爾之不私于法罔敢不正􅁛朕􅀁以作則垂憲始今行後之意爾可勉矣朕有望焉左右司郎中制尚書天下政本左右司紀綱之地故郎􅃟異扵諸曺非噐幹望實有聞扵時莫􅁛其任某明敏强濟通扵世用宜在此位故以命汝創制之􅀄舉墜興壞所以弥綸庻務者待汝有為其尚懋㢤以承厥叙元豐􅀋藁卷之二十三
