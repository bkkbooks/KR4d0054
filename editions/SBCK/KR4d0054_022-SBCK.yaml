front:
  text: 元豊􅀋藁卷第二十二
  hash: sha256:ce1417a893a7647b0169b16e83891f2f1c4c38560d7269386705179caeed8719
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_022-1a}
body:
  text: 制誥呉居厚京東轉運副使吕孝㢘轉運判官制􅃙具官某朕進㧞􅀎吏以􅇂視一路盖州縣政令之舉措公私貨食之歛散莫不任焉得人之難攷擇惟慎以爾幹敏閱試惟舊用是分兹東部属以使事夫施扵民者厚而􅆿罰清求扵民者約而財用贍使徳流澤通而風化輯穆以􅁛朕􅁨憫元元而勵精庻務之意爾其勉矣徃服訓辭可西頭供奉官武遂等轉官制􅃙具官某王師西出以討不庭爾􅀎殱擊兇殘恢復州聚録功増位不以次迁勉服朕㤙益思􅁬勵可曲珍四廂都指揮使綘州防禦使制􅃙具官某􅆧之獸心内相危害王師簿伐盖􅀅天威爾􅀎躬􅀅士􅀙摧堅殪敵斬捕甚衆鼓行無前周衞典軍之官名城禦侮之􅀉兼是寵数以疇爾庸尚有異㤙待爾来效可文思使張俊䓁遷官制􅃙具官某朕爰命六師奉辭西伐爾􅀎効其忠勇深入􅆧中􅀗醜摧堅以捷奉上躐陞位䓁以懋爾勞其􅀎継扵前功朕豈穡扵信賞可文及甫吏部員外郎制􅃙具官某朕正百工之名而􅀅責其實効其官吏考擇􅀹慎天官之属僉曰汝􅀎其往欽㢤無忘勉勵可許安世都官員外郎制􅃙具官某徒􅀠傭役之人典其􅆸置而時其迁序主以郎吏其選甚高爾蚤以敏明升華儒館冝増階䓁徃涖厥職尚思勉懋以􅁛東求可皇伯宗諤贈太尉韓王制􅃙王者之扵天属覆之以光榮而恤其死䘮之戚􅀁以本人倫教天下也具官某以徳則循理小心始終無悔以功則受命仁祖趣㝎儲極以位則渠門赤寫任兼相􅀅以爵則躐扵五䓁列為真王以親則先帝之􅀙父兄而余曰伯父􅂋名羙實福禄之全可謂盛矣奄遘癘疾至扵不起余聞震悼臨奠致哀􅄪不御朝以伸情礼是用追加書賛進秩上公啓此火􅀖隆崇號􅁛余扵親親之㤙可謂俻矣尚惟不昧服此寵章可齊宗夀三班惜職制􅃙某有司言爾滿􅀊當迁而奨進爾劳又當躐䓁是用加兹寵渥列扵命秩往惟祗服以􅁛甄收可交州進奉使副梁用律洛菀副使阮倍太常愽士制􅃙具官某䇿名蕃服納貢王庭􅀅事之勤朕用甄録進其位䓁兹惟舊章往􅁛茂㤙母忘祗恪可皇伯宗恵新婦郭氏進封郡夫人制􅃙具官某新婦某氏司宗扵属為近扵位為重王扵爵為貴盖禮秩之見扵外者既寵則施扵内者宜殊爾徳性淑均􅁛其家室爰加象服之盛以大鵲巢之榮其尚欽承兹為異数可賈昌衡知鄧州制􅃙記舊俗者􅁛南陽之民夸奢上氣力難制御今其餘習殆尚有存者故有􅀖之任朕不輕以属人具官某中外踐更令聞惟舊兹用攷擇往分彼􅁟盖穣淯間雖俗雜難治然教民敦本興扵好善召信臣杜詩之遺跡在焉使農桑􅂆而風俗厚爾尚思継于前人其徃懋㢤無替朕命可李良輔知廬州張竚陜州崔度蔡州王􅀃徐州制􅃙具官某朕董正治官自朝廷始至扵六服群吏莫不考循其名以督課其實夫宣㤙德以逮下厚風俗以承上其選為重者非長民之任乎爾惟其人属以兹位盖奉職遵礼以有循良之􅁛苟􅀎自勉則寵勞録最以明國家之典朕敢忘㢤往欽厥司方稽爾效可知泉州陳偁梓州呉㡬復湖州唐淑問並任制􅃙具官某吏之奉職循理􅀎附其民使之乆扵其官則上下相安而治化易洽今爾之材宜扵既試俾仍舊服以懋厥庸尚躰朕㤙益思逺効可呉安持太㒒少卿制􅃙具官某車府廐馬牧監之政典以卿士其選甚高念非得人􅂚賛其治爾材質明茂嘗更噐使以􅁨去位既終䘮紀宜更階等往貳厥官其勤夙宵以敏功實可菊􅇮二右班殿直制􅃙具官某夷獠背㤙賊殺命吏爾􅀎擊刺醜􅀋献其首級宜陞位序以奨爾勞尚勵壮圖益思来効可馮正符借職制􅃙某西南夷背徳獸心敢闚邉􅂩爾􅀎通宣兩誼恊助軍謀宜進官榮属之守謢勉思􅁬勵無替前功可奉議郎景思􅁩授東上閣門使鄜延第一副􅀅制􅃙具官某西討之兵有陳戰之功者朕無不録爾􅀎致其材武􅁬擊􅃛羗克敵摧鋒屡以捷報疇庸較實冝有異㤙介上閣之使名貳連營之􅀅領兹為奨㧞盖匪常科尚勵壮謀益思来効可皇太后親姪高公繪通州刺史高公紀逹州刺史制􅃙具官某䓁朕有􅂋親之心􅁒形扵天下故加㤙母黨􅀁以本人情隆世教也爾等皆扵外家實在近属持身恭慎朕所識察刺臨州郡典視祠宫秩寵地􅄖並膺㧞用尚勵爾欽承之志以􅁛余廣爱之仁可梅福封夀春真人制􅃙某在漢之際数以孤逺極言天下之事其志壮哉晚而家居讀書飬性卒遺俗高蹈世傳爲仙今大江之西實存庙像禱祠輙應􅀎澤吾民有司上聞是用􅃬兹􅂋號光靈不泯其服朕㤙可卓順之直翰林醫官局䓁制􅃙某稽其醫事而制其食先王之典也属以愛主之疾爾􅀎調治有瘳是用寵以官榮進其服品徃遵厥職無替恪恭可成卓閣門祗候制􅃙具官某長川廣谷之間與蛮夷壌接爾䖏徼廵之任􅀎練逹人情輯寕疆候守邉之臣􅁛爾之材謂難代易是用進爾職扵上閣而俾恭其舊服朕扵念勞奨善之心可謂至矣其思綏靖以􅁛朕㤙可溪氊本族副都軍主䓁制􅃙某守邉之臣属爾奉其方物来献闕庭朕惟爾嘉是用命爾還其種落典治一軍徃勵忠勤益思来効可景青冝党令攴團練使阿星刺史制􅃙某爾有摧鋒克敵之功而又奉其方貢来見闕廷實勇且忠法當甄進兵團之任以寵爾勞往其祗服益忠来効可論氊巴柯族軍主結厮雞柯族副軍主制􅃙某爾父有嚮慕中囯之心殁而不遂其志属爾于朕願備一官朕甚憐之是用加命爾秩往其祗服益勵忠勤可阿憐官捉厮雞並本族副軍主制􅃙某爾父效貢来庭因得進見以爾為請願備一官朕嘉其尊嚮中囯之勤是用錫爾命秩徃思忠恪以􅁛朕恩可内一段作爾父因其種人入脩貢聀以爾為請温暠知欽州制􅃙某州有兵民之􅀉而地在疆􅂣之間則常擇用林武之臣属之守禦之任爾以􅀎進往祗厥服尚思綏靖以􅁛簡求可劉安䓁中書省主事令史制􅃙具官某䓁右省詔命之􅀁出也吏治文書非習法令熟成事不􅀎􅁛其任爾䓁皆以命秩往祗乃服無忘恭恪以慎厥司可知頴昌府韓維􅄪任制􅃙朕待天下之士未嘗不䔍扵㤙況扵故舊之臣朕􅀁加厚則扵順遂其意夫何愛㢤具官某昔在宫朝事朕左右今列職秘殿位寵且親而便其故郷属以州任雖􅀊既􅄪滿然重奪其志是用仍其舊服俾祗厥官以致朕求舊之仁尚勵爾在公之義可米贇䓁轉官制􅃙具官某爾以衆西出討擊羗虜斬􅀗首級有司以聞是用甄録爾功躐陞位䓁往其勉矣益勵壮圖可雍王顥乳母宋氏贈郡君制􅃙某氏惟雍王顥於囯属之親且愛而爾有乳飬之勤故其生也􅃬之爵邑其殁也飾以㤙荣是用追命爾封進扵列郡以光幽穸尚服寵章可豊稷吏部員外郎制􅃙具官某尚書正本而吏部天官􅀁以綜叙群材以成天下之治郎扵典領其􅃟甚高是用擢爾之􅀎俾􅂙厥服朕方勵精政理而務在得人爾惟懋扵其官庶㡬承朕之志可吕和卿考功員外郎制􅃙具官某計群吏之治而明黜陟之法䑓郎典領列扵左曹㧞用爾􅀎俾叅厥位夫􅀎善扵其職固将圖爾之勞可韓晋卿莫君陳刑部􅀰中制􅃙具官某刑者􅀁以助治而聖人之􅀁􅀹慎中䑓叅綜郎選甚高爾曉逹吏方宜在兹任夫惟䔍扵明恕可以副朕欽恤之心其往懋㢤以祗厥叙可范諤知宻州范子諒濮州劉士彦泗州制􅃙且官某守􅁟之官民事􅀁属朕方勵精庻政之日􅀹務在扵得人攷擇扵朝爾往惟􅁢夫􅀎宣布㤙徳以拊循吾民而綱理風俗則為􅀎称其任爾其可不勉欤陳端翰林醫官制􅃙某爾父易簡以醫入侍䖏剤湯液有勞可旌進遷爾官用申奨寵徃惟祗恪以􅁛朕恩可沈士安西綾錦副使制􅃙具官某明習禁方以醫入侍䖏剤湯液有勞可旌進貳使名以申奨寵徃承厥叙無替爾勤可王瑛楊宗三班借職制􅃙某爾䓁俻吏属治文書勤亦乆矣是用􅀙爾之請􅃬之命秩徃惟祗飾以􅁛朕恩可王從伾知岢嵐軍制􅃙具官某崇築壘培本以輯治軍旅及四方既平而假守之臣實任民事列扵有􅁟之官矧嵐谷並邉􅀉属􅀹慎爾以選擇徃祗朕命夫􅀎開示㤙威以惠飬吾人而懐附異俗則為善扵其職尚思爾守無替訓辭可吕升卿館閣校勘通判鄆州制􅃙具官某鄆有提封之廣生齒之衆扵東為極郡賛貳政理選授惟艱爾蚤以藝文列於辭館宜更階品徃承厥叙無忘祗慎以服朕㤙可陳康民管勾永興䓁路常平張太寕提舉秦鳯䓁路常平制􅃙具官某䓁朕為保伍之法寓耕􅀾之政典農之官属以兼領盖分路而治隃制或難固當􅀙宜使之易地是用命爾換部而使夫􅀎利力田之民􅁱講武之令各􅁬爾庸不失其職則為􅀎體朕意其尚懋㢤徃遵廼服可早行知無為軍制御史有言責之臣朕之所取信也言而欲遂其忿䦧之私乃至扵失是非之當豈獨朕扵取信失其所属盖汝之以言為職誼豈當然俾去憲䑓兼榮職秩徃臨軍壁冝躰朕心駙馬都尉王師約轉􅀚察使制朕扵婣戚之臣未嘗不䔍扵㤙意然其積勤累善不罹罪悔而七􅀊一遷其官則必循用舊章盖爵賞者天下之至公朕不敢以私撓法也具官某出于景族選上貴主有㳤慎之行無怠肆之失第其閥閱冝得叙陞㢘按一州以為爾寵盖爾自􅀄仕迄􅄪増厥位皆以歳滿應扵遷格則朕之謹于信賞爾之安其常守上下之際豈不兩義俱得㢤無忘勉勵以永保扵榮名可崔象先䓁帶御噐械制􅃙具官某乗輿􅀁在供御之物無一不備具者故鎧甲􅃓矢属之以􅀙者亦不去扵側非左右親信悪􅁕以任此㢤爾給事惟舊冝就兹列益思祗恪以􅁛厥官蔡京起居郎制􅃙具官某王者言動必書豈獨思為後嗣法㢤施之扵已固欲擇語黙慎行止也執簡肆筆必也属之其人爾之苐卞既巳列扵右史今復不次用汝使記予事位扵左省士之在此選者希矣而爾之叔李並直同升其扵榮遇世罕及者朕㤙􅀂此則汝之自効冝如何㢤其懋厥修以報􅀁受可王中正种諤降官制朕大興士衆属爾䓁以伐羗固􅀅舉其巢穴非徒郤虜收並塞之地而巳兵西出則近而爾䓁東繇綏徳回逺之路以疲士馬費芻粟致功用不集中正議既不審又約有分地當攷其左而不􅀎奪擊以殱除醜􅀋夫軍賞吾必信而罰亦安得巳㢤是用按爾之罪降秩有差其躰寛恩尚思報稱可封曺諭母制曹氏國之外属而諭實爾之出諭既有列扵朝亦有追榮及爾是以封之列郡秩以寵名兹為異㤙以光幽窆張知均州制嶺之西南桂為􅇵部外有溪居海聚之民壌錯内属拊廵填守詎可属非其人爾比選于朝往備兹任而内不􅀎統齊士吏外不􅀎綏靖華夷致兹繹騷自于􅀖憲奪其羙職䖏爾偏州茲惟朕㤙無忘思省可元豊􅀋藁卷第二十二
