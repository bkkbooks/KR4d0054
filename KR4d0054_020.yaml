front:
  text: 南豊先生元豊類藁卷苐二十制詩
  hash: sha256:9ed389cc8825db10f815eca55708c2237695ad5b74e261ae0f27248d0995dd62
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_020-1a}
body:
  text: 試中書舍人制誥三道特進觀文殿大學士除莭度使開府儀同三司制門下錫之列壌顓師寵扵藩維申以榮名視官儀扵宰路所以襃隆舊哲優異宗工維今古之通䂓實邦家之盛典宜兼禮秩属在耆英播告治朝用揚孚號具官某荘毅足以任重肅括足以視身有能断大事之明有克勤小物之慎以察微之智練逹人情以經逺之謀弥綸國躰中外宣力左右納忠今方内靖嘉百揆攸叙助朕致此時廼之庸位特次扵上公職仍通扵秘殿閱時巳乆加命宜殊是用䖏以名城分建旄之寄属均于台衮極備物之恩榮於戯顯有功尊有徳朕扵崇奨近輔之心可謂至矣親百姓撫四夷爾扵将順朕志之義可不懋㢤尚躰眷懐往祗厥服中書舍人除翰林學士制左右侍從之官皆朕所訪問以献納為軄者也惟禁林任親地宻於夫經營庶務進退大臣未嘗不預咨詢非獨治翰墨典訓辭而巳故待遇之寵不與他學士比其重如此非智能材諝㧞出一時豈稱公選某純明脩㓗秉誼不回學有本原可以圖治躰文有師法可以代子言是用擢扵右垣使就兹位今寓内嘉靖朝廷燕間朕方明紀綱考制度以行之當世傳之将来夫能恊爾衷以輔朕志論思政理以著之謀猷潤色斯文以見扵號令待爾有當官之効以副予籲俊之心其徃懋㢤以承厥叙敕監司考覈州縣治迹詔朕惟天之所以視聽者在民故朕之所以承天者以夫民事為尤重夫能使吾民足扵衣食安扵作息無愁怨嘆苦之聲有廉耻自重之誼者在夫州縣之吏而巳朕既擇人付以兹任而尚憂夫方域之廣生齒之衆吏或不明不良不能䆒宣恩徳使逹于下開導群情使通于上是以置使分部属之刺督而考覈幽明甄别淑慝罕能務稱其職朕方憲于先王以正百官之任使䖏其名必效其實夫比群吏之治而謹其勸創固朕之所孜孜而不敢怠也㢘按之臣其躰朕意於夫治人之官審加察焉使純明脩㓗兹祥仁䔍之吏無壅扵上聞而昏庸汙慢苛薄媮偽之人不能自匿庻夫事舉刑清和樂交扵内外風移俗易忠厚格扵神明方虚朕心以觀汝效賞罰有典誼無敢私其尚欽承朕言不食曽肇轉官除吏部郎中左選敕具官某尚書政本失其分職之日乆矣朕紀官以實而帰具常守故郎選甚高銓綜之司典領尤重尔以斈行諝列職史筵冝進文階徃祗厥叙朕方審覈幽明而公於黜陟尚思勉勵以敏事功可劉奉丗吏部貟外郎制右選敕具官某尚書政本失其分職之日乆矣朕紀官以實而歸其常守郎扵選部任属尤重以爾閱試惟舊為吏有方考擇扵朝俾叅厥叙朕方審覈幽明而公扵黜陟尚思勉勵以敏事功可黄好謙户部員外郎劉珵户部郎中制左曺敕具官某田疇生齒之籍賦租課入之法郎扵省闥典領尤重邦之雋茂俾服厥官爾能敏扵事功朕豈稽於信賞可王陟臣馬􅦨户部員外郎制右曺敕具官某耕歛𥙷助之法溝防通塞之政即扵首闥典領尤重邦之雋茂俾服厥爾官能敏扵事功朕豈稽扵信賞可劉摯禮部郎中制敕具官某周書曰不惟其官惟其人則古今之正治官得人固為急也儀曺之扵郎位考擇甚精爾以學行噐能策名儒館冝升階等往祗厥服朕方明扵賞勸以待群吏之成爾尚懋于厥脩庻能康朕之事可王子韶禮部員外郎制敕具官某周書曰不惟其官惟其人則古今之正治官得其人固為急也儀曺之扵郎位副貳所属考擇其精爾以博學多聞冊名儒館冝升階䓁往祗厥服朕方明扵賞勸以待群吏之成爾尚懋于厥脩庻能康朕之事潘良噐兵部員外郎制敕具官某朕高郎吏之選以進天下之材七兵之曹名秩甚寵稽于有衆属爾之能其尚懋于厥功朕方明扵賞勸可胡援社紘刑部郎中敕具官某為郎居中時之妙選邦憲輕重典領惟艱朝之雋良俾在吾事夫刑期于無刑此朕志也尚思明慎以稱厥官可范于竒工部郎中髙遵惠員外郎制敕具官某宮室城堭程匠度材之事郎扵起部其選甚高詢求在廷爾材惟允朕方董百工而康庻務爾尚勤夙夜而能厥官可高遵惠改云副貳之選甚高王祖道司封員外郎制敕具官某封爵之㤙施扵内外所以親親尊賢國之典也緫領之任郎選甚高明揚爾能俾踐厥位朕方正名以稽郡吏之治而議其勸懲爾尚起㢤以敏来効可穆珣司封郎中制敕具官某論功烈㝎勲級所以寵士大夫而勵其志也主以郎吏禮秩甚殊僉曰汝能宜正厥序夫正名者固將考其實也尚有信賞待汝計功可蔡京范珣考功員外郎制敕具官某計群吏之課而議其諌賞郎扵天䑓任属尤重維時髦士宜服寵名使殿最允而功用興待汝能稱其職可不勉㢤可陳向度攴貟外郎制敕具官某財用多寡之教物産豊約之冝司度之曹典貳為重爾惟幹敏冝服厥官夫能下寛齊民而上足經費朕方勵精庻政之日爾尚悉其猷為可晁端彦金部員外郎制敕具官某財用金寳有出納之政權衡度量有制作之法司􅎇之任實典治焉僉曰爾材宜在兹位國有陟明之典待爾善扵其官可韓正彦倉部郎中制敕具官某倉庾賦入之政禄廪賙助之法䑓郎典領列扵右曺為官擇人爾徃惟允夫能善扵其職固将勞圖爾之勞可趙令鑠祠部郎中制敕具官某禮莫大扵祭盖事神者人道之極也祠曺所領躰莫重焉爾惟精明宜服厥位其思任職以稱予奉天地宗庙兢兢之意焉可徐禧御史中丞制敕朕正名以㝎群臣之位辨位以責庻務之實矧風憲之官紀綱所属曷可以不明其任㦲具官其強敏仁䔍學通古今擢典訓辞遂持邦法冝專分職以應新書是用棳自右垣仍其階品俾爾納忠宣力得壹意扵中司以董齊百工而肅正内外庶余之作則更制罔或不䖍在爾懋㢤知其所守可何洵直文及甫大常博士制敕具官某奉常礼樂所出博士議論之官爾以藝文列扵冊府宜升階品徃祗􅍏叙夫能㩀經之說適今之宜不為曲學之阿爾尚䔍扵所守可黄寔太常博上制敕具官某奉常禮樂所出博士議論之官爾以能聞朕用分命夫能㩀經之說適令之宜不為曲學之阿爾尚䔍扵所守可趙君錫宗正丞制敕具官某公室逺近之属譜録攷序之政主以列卿不用他族盖自漢始迄今循行丞扵厥官參賛為重爾辭學之敏列職書林宜進文階往祗厥服夫睦九族以刑萬邦此朕志也爾尚懋于厥守庻以承朕之仁可劉蒙御史䑓主簿王子琦太常寺主簿制敕具官某吏之有属所以相成勾稽簿領之書交修官守之事徃從憲府尚懋爾勞可王子琦改憲府作卿鐸張崇翟思邵剛太學博士制敕具官某博士列扵成均以講教為任爾以經明選用徃服厥官盖尊其所聞以誘率學者汝之守也其尚起㢤可林希著作佐郎制敕具官其麟䑓著作之貳郎以詞學為之爾敏茂精明乆㳺書觀宜遷階品徃服厥叙属爾以文章之選其躰不奨遇之㤙可邢恕校書郎制敕具官某典校秘蔵之書旁求儒學之士尚思奨進之意無忘砥礪之勤可李常太常少卿制敕具官某礼楽精㣲之致所以格上下而諧人神奉常貳卿典領甚重爾聦明敏逹乆列書林宜進文階往就兹位其務稱于厥職使莭人心而和人聲者庻有得焉非獨在扵俯仰鏗鏘而巳兹爲朕志爾尚欽承可錢暄光禄卿敕具官某酒醴膳羞之具以供宗廟朝廷之用典領之任位在列卿冝得其人俾服予采爾明習吏事勞閱有聞選扵僉言俾踐厥職尚其祗飾無曠爾司可楊汲大理卿王衮韓晋卿少卿制敕具官某叅理折獄之事主以列卿其選甚重爾練習吏治閱試惟舊廷尉之選少卿改云廷尉云貳是用属汝尚思明慎以稱朕㤙可陳睦鴻臚卿敕具官某傳聲賛導之官所以賔接四方之使客位在九列禮秩甚隆正名之𥘉考擇惟慎爾以辭學材諝列職史筵冝進文階往承厥序尚其祗飾以服朕㤙可㢘正臣董詵司農少卿制敕具官某田畒稼穡之政倉庾委積之事典領之任秩亞列卿官儀之新考擇惟慎爾明習吏治勞閱有聞徃貳大農是惟高選尚其祗飾無曠厥司可賈青太府少卿制敕具官某九賦頒受之政百貨貿遷之法典領之任位次列卿肇正官儀考擇惟慎爾明習吏事閱試惟舊徃共厥服汝惟克諧其躰朕㤙尚㤙祗飾可李立之范子淵都水使者制敕具官某川澤河渠之政津梁舟楫之事置使典領禮秩甚隆正名之𥘉考擇惟慎爾明習吏治勞閱有聞選扵在廷俾踐厥職尚其祗飾無忘訓辭可黄莘職方貟外郎制敕具官某四海九州之疆域山川風土之氣習載扵圖籍典以郎曺擢爾之材俾副厥位夫能使方國逺近貫利同而材用便在爾能知其守可不懋㦲可杜純大理正制敕具官某折獄詳刑之事朕所慎也正扵理官叅賛為重選於在列爾以材升聽察以情尚勤厥職可李義内殿崇班制敕具官某虞度營屯之事積累歲月之勤序朝位於殿廷尚益思扵奮勵可元豊類藁卷第二十
