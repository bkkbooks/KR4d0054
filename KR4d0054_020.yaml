front:
  text: 南豐先生元豐類藁卷苐二十制詩
  hash: sha256:ed4471ae0daec0f0c31914e7641b80c60402304ccd5fdbd575f49d52e31b4a0f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_020-1a}
body:
  text: 試中書舍人制誥三道特進觀文殿大學士除莭度使開府儀同三司制門下錫之列壤顓師寵于藩維申以榮名視官儀于宰路所以褒隆舊哲優異宗工維今古之通規實邦家之盛典宜兼禮秩屬在耆英播告治朝用揚孚號具官某莊毅足以任重肅括足以視身有能斷大事之明有克勤小物之慎以察微之智練逹人情以經逺之謀彌綸國躰中外宣力左右納忠今方內靖嘉百揆攸敘助朕致此時乃之庸位特次于上公職仍通于祕殿閲時巳久加命宜殊是用處以名城分建旄之寄屬均于台衮極備物之恩榮於戲顯有功尊有德朕于崇奬近輔之心可謂至矣親百姓撫四夷爾于將順朕志之義可不懋哉尚躰眷懷往祗厥服中書舍人除翰林學士制左右侍從之官皆朕所訪問以獻納為職者也惟禁林任親地密於夫經營庶務進退大臣未嘗不預咨詢非獨治翰墨典訓辭而巳故待遇之寵不與他學士比其重如此非智能材諝拔出一時豈稱公選某純明修潔秉誼不回學有本原可以圖治躰文有師法可以代子言是用擢于右垣使就兹位今寓內嘉靖朝廷燕間朕方明紀綱考制度以行之當世傳之將來夫能協爾衷以輔朕志論思政理以著之謀猷潤色斯文以見于號令待爾有當官之效以副豫籲俊之心其往懋哉以承厥敘敕監司考核州縣治迹詔朕惟天之所以視聽者在民故朕之所以承天者以夫民事為尤重夫能使吾民足于衣食安于作息無愁怨嘆苦之聲有廉耻自重之誼者在夫州縣之吏而巳朕既擇人付以兹任而尚憂夫方域之廣生齒之衆吏或不明不良不能究宣恩德使逹于下開導群情使通于上是以置使分部屬之刺督而考核幽明甄别淑慝罕能務稱其職朕方憲于先王以正百官之任使處其名必效其實夫比群吏之治而謹其勸創固朕之所孜孜而不敢怠也廉按之臣其躰朕意於夫治人之官審加察焉使純明修潔兹祥仁篤之吏無壅于上聞而昏庸汙慢苛薄偷偽之人不能自匿庶夫事舉刑清和樂交于內外風移俗易忠厚格于神明方虛朕心以觀汝效賞罰有典誼無敢私其尚欽承朕言不食曽肇轉官除吏部郎中左選敕具官某尚書政本失其分職之日久矣朕紀官以實而歸具常守故郎選甚高銓綜之司典領尤重爾以學行諝列職史筵冝進文階往祗厥敘朕方審核幽明而公於黜陟尚思勉勵以敏事功可劉奉丗吏部貟外郎制右選敕具官某尚書政本失其分職之日久矣朕紀官以實而歸其常守郎于選部任屬尤重以爾閲試惟舊為吏有方考擇于朝俾參厥敘朕方審核幽明而公于黜陟尚思勉勵以敏事功可黃好謙户部員外郎劉珵户部郎中制左曺敕具官某田疇生齒之籍賦租課入之法郎于省闥典領尤重邦之雋茂俾服厥官爾能敏于事功朕豈稽於信賞可王陟臣馬􅦨户部員外郎制右曺敕具官某耕斂輔助之法溝防通塞之政即于首闥典領尤重邦之雋茂俾服厥爾官能敏于事功朕豈稽于信賞可劉摯禮部郎中制敕具官某周書曰不惟其官惟其人則古今之正治官得人固為急也儀曺之于郎位考擇甚精爾以學行器能策名儒館冝升階等往祗厥服朕方明于賞勸以待群吏之成爾尚懋于厥修庶能康朕之事可王子韶禮部員外郎制敕具官某周書曰不惟其官惟其人則古今之正治官得其人固為急也儀曺之于郎位副二所屬考擇其精爾以博學多聞册名儒館冝升階等往祗厥服朕方明于賞勸以待群吏之成爾尚懋于厥修庶能康朕之事潘良器兵部員外郎制敕具官某朕高郎吏之選以進天下之材七兵之曹名秩甚寵稽于有衆屬爾之能其尚懋于厥功朕方明于賞勸可胡援社紘刑部郎中敕具官某為郎居中時之妙選邦憲輕重典領惟艱朝之雋良俾在吾事夫刑期于無刑此朕志也尚思明慎以稱厥官可范于竒工部郎中髙遵惠員外郎制敕具官某宮室城隍程匠度材之事郎于起部其選甚高詢求在廷爾材惟允朕方董百工而康庶務爾尚勤夙夜而能厥官可高遵惠改云副二之選甚高王祖道司封員外郎制敕具官某封爵之恩施于內外所以親親尊賢國之典也總領之任郎選甚高明揚爾能俾踐厥位朕方正名以稽郡吏之治而議其勸懲爾尚起哉以敏來效可穆珣司封郎中制敕具官某論功烈㝎勳級所以寵士大夫而勵其志也主以郎吏禮秩甚殊僉曰汝能宜正厥序夫正名者固將考其實也尚有信賞待汝計功可蔡京范珣考功員外郎制敕具官某計群吏之課而議其諌賞郎于天臺任屬尤重維時髦士宜服寵名使殿最允而功用興待汝能稱其職可不勉哉可陳向度攴貟外郎制敕具官某財用多寡之教物産豐約之冝司度之曹典二為重爾惟幹敏冝服厥官夫能下寬齊民而上足經費朕方勵精庶政之日爾尚悉其猷為可朝端彥金部員外郎制敕具官某財用金寶有出納之政權衡度量有制作之法司􅎇之任實典治焉僉曰爾材宜在兹位國有陟明之典待爾善于其官可韓正彥倉部郎中制敕具官某倉庾賦入之政祿廪賙助之法臺郎典領列于右曺為官擇人爾往惟允夫能善于其職固將勞圖爾之勞可趙令鑠祠部郎中制敕具官某禮莫大于祭蓋事神者人道之極也祠曺所領躰莫重焉爾惟精明宜服厥位其思任職以稱豫奉天地宗廟兢兢之意焉可徐禧御史中丞制敕朕正名以㝎群臣之位辨位以責庶務之實矧風憲之官紀綱所屬曷可以不明其任哉具官其強敏仁篤學通古今擢典訓辭遂持邦法冝專分職以應新書是用棳自右垣仍其階品俾爾納忠宣力得一意于中司以董齊百工而肅正內外庶余之作則更制罔或不虔在爾懋哉知其所守可何洵直文及甫大常博士制敕具官某奉常禮樂所出博士議論之官爾以藝文列于册府宜升階品往祗􅍏敘夫能據經之説適今之宜不為曲學之阿爾尚篤于所守可黃實太常博上制敕具官某奉常禮樂所出博士議論之官爾以能聞朕用分命夫能據經之説適令之宜不為曲學之阿爾尚篤于所守可趙君錫宗正丞制敕具官某公室逺近之屬譜録考序之政主以列卿不用他族蓋自漢始迄今循行丞于厥官參贊為重爾辭學之敏列職書林宜進文階往祗厥服夫睦九族以刑萬邦此朕志也爾尚懋于厥守庶以承朕之仁可劉蒙御史臺主簿王子琦太常寺主簿制敕具官某吏之有屬所以相成勾稽簿領之書交修官守之事往從憲府尚懋爾勞可王子琦改憲府作卿鐸張崇翟思邵剛太學博士制敕具官某博士列于成均以講教為任爾以經明選用往服厥官蓋尊其所聞以誘率學者汝之守也其尚起哉可林希著作佐郎制敕具官其麟臺著作之二郎以詞學為之爾敏茂精明久遊書觀宜遷階品往服厥敘屬爾以文章之選其躰不奬遇之恩可邢恕校書郎制敕具官某典校祕藏之書旁求儒學之士尚思奬進之意無忘砥礪之勤可李常太常少卿制敕具官某禮樂精微之致所以格上下而諧人神奉常二卿典領甚重爾聰明敏逹久列書林宜進文階往就兹位其務稱于厥職使莭人心而和人聲者庶有得焉非獨在于俯仰鏗鏘而巳兹為朕志爾尚欽承可錢暄光祿卿敕具官某酒醴膳羞之具以供宗廟朝廷之用典領之任位在列卿冝得其人俾服豫采爾明習吏事勞閲有聞選于僉言俾踐厥職尚其祗飾無曠爾司可楊汲大理卿王衮韓晉卿少卿制敕具官某參理折獄之事主以列卿其選甚重爾練習吏治閲試惟舊廷尉之選少卿改云廷尉云二是用屬汝尚思明慎以稱朕恩可陳睦鴻臚卿敕具官某傳聲贊導之官所以賔接四方之使客位在九列禮秩甚隆正名之𥘉考擇惟慎爾以辭學材諝列職史筵冝進文階往承厥序尚其祗飾以服朕恩可廉正臣董詵司農少卿制敕具官某田畒稼穡之政倉庾委積之事典領之任秩亞列卿官儀之新考擇惟慎爾明習吏治勞閲有聞往二大農是惟高選尚其祗飾無曠厥司可賈青太府少卿制敕具官某九賦頒受之政百貨貿遷之法典領之任位次列卿肇正官儀考擇惟慎爾明習吏事閲試惟舊往共厥服汝惟克諧其躰朕恩尚恩祗飾可李立之范子淵都水使者制敕具官某川澤河渠之政津梁舟楫之事置使典領禮秩甚隆正名之𥘉考擇惟慎爾明習吏治勞閲有聞選于在廷俾踐厥職尚其祗飾無忘訓辭可黃莘職方貟外郎制敕具官某四海九州之疆域山川風土之氣習載于圖籍典以郎曺擢爾之材俾副厥位夫能使方國逺近貫利同而材用便在爾能知其守可不懋哉可杜純大理正制敕具官某折獄詳刑之事朕所慎也正于理官參贊為重選於在列爾以材升聽察以情尚勤厥職可李義內殿崇班制敕具官某虞度營屯之事積纍歲月之勤序朝位於殿廷尚益思于奮勵可元豐類藁卷第二十
