body:
  text: 記廣德湖記鄞縣張侯圖其縣之廣德湖而以書并古刻石之文遺豫曰願有紀蓋湖之大五十里而在鄞之西十二里其源出于四明山而引其北為漕渠泄其東北入江凡鄞之鄉十有四其東七鄉之田錢湖溉之其西七鄉之田水注之者則此湖也舟之通越者皆繇此湖而湖之産有鳬雁魚鱉苃蒲葭菼葵蓴蓮茨之饒其舊名曰鶯脰湖而今名大曆八年令儲仙舟之所更也貞元元年刺史任侗又治而大之大中元年民或上書請廢湖為田任事者左右之為出御史李後素驗視後素不為撓民以得罪而湖卒不廢刺史李敬方與後素皆賦詩刻石以見其事其説以謂當是時湖成三百年矣則湖之興其在梁齊之際歟宋興淳化二年民始與州縣疆吏盜湖為田久不能正至道二年知州事丘崇元躬按治之而湖始復轉運使言其事詔禁民敢田者至其後遂著之于一州敕咸平中賜官吏職田取湖之西山足之地百頃為之既而務益取湖以自廣天繥二年知州事李夷庚始正湖界起隄十有八里以限之湖之濵有地曰林村砂末曰高橋臘臺而其中有山曰白鶴曰望春自大平興國以來民冒取之夷庚又命禁絶而湖始復天聖景佑之間民復相率請湖為田州從事張大有案行止之而知州事李照又言其事報如至道詔書照以刻之石自此言請湖為田者始息而康㝎某年縣主簿曽公望又益治湖至張侯之為鄞則湖久不治而七鄉之農以旱告張侯為出營度民田湖旁者皆喜願致其力張侯計工賦材擇民之為人信服有知計者使督役而自主之一不以屬吏人以不優而咸勤趍于是築環湖之隄凡九千一百三十四丈其廣一丈八尺而其高八尺廣倍於舊而高倍于舊三之二鄞人纍石堙水闕其間而扄以木視水之小大而間縱之謂之碶于是又為之益舊捴為碶九為埭二十隄之上植榆桞益舊揔為三萬一百又因其餘材為二亭于隄上以休而與望春白鶴之山相直因以其山名之上為廟一以祠神之主此湖者一以祠吏之有功于此湖者以熙寧元年十一月始役而以明年二月卒事其用民之力八萬二千七百九十有二工而其材出于工之餘既成而田不病旱舟不病痼魚雁茭葦果𬞞水産之良皆復其舊而其餘及于比縣旁州張侯于是可謂有勞矣是年豫通判越州事越之南湖久廢不治蓋出于吏之因循而至于不知所以為力豫方患之觀廣德之興以數百年危于廢者數矣繇屢有人故益以治蓋大曆之間溉田四百頃大中八百頃而今二千頃矣則人之存亡政之廢舉為民之幸不幸其豈細也歟故為之書尚俾來有知母廢前人之功以永為此邦之利而又將與越之人圖其廢也張侯名峋字子堅以材聞去而為提舉兩浙路常平廣惠倉兼𬋩句農田差役水利事方且用于時云齊州二堂記齊濵濼水而𥘉無使客之館使客至則常發民調材木為舍以寓去則徹之既費且陋乃為徙官之廢屋為二堂于濼水之上以舍客因考其山川而名之蓋史記五帝紀謂舜耕歷山漁雷澤陶河濵作什器于夀丘就時于負夏鄭康成釋歷山在河東雷澤在濟隂負夏衛地皇甫謐釋夀丘在魯東門之北河濵濟隂定陶西南陶丘亭是也以豫考之耕稼陶漁皆舜之𥘉宜同時則其地不宜相逺二家所釋雷澤河濵夀丘負夏皆在魯衛之間地相望則歷山不宜獨在河東也孟子又謂舜東夷之人則陶漁在濟隂作什器在魯東門就時在衛耕歷山在齊皆東方之地合于孟子按圖記皆謂禹貢所稱雷首山在河東媯水出焉而此山有九號歷山其一號也豫觀虞書及五帝紀蓋舜娶堯之二女乃居媯汭則耕歷山蓋不同時而地亦當異世之好事者乃因媯水出于雷首遷就附益謂歷山為雷首之别號不考其實矣由是言之則圖記皆謂齊之南山為歷山舜所耕處故其城名歷城為信然也今樂上之北堂其南則歷山也故名之曰歷山之堂按圖泰山之北與齊之東南諸谷之水西北匯于黑水之灣又西北匯于柏崖之灣而至于渴馬之崖蓋水之來也衆其北析而西也悍疾尤甚及至于崖下則泊然而止而自崖以北至于歷城之西蓋五十里而有泉湧出高或致數尺其旁之人名之曰趵突之泉齊人皆謂嘗有棄粳于黑水之灣者而見之于此蓋泉自渴馬之崖濳流地中而至此復出也趵突之泉冬溫泉旁之𬞞甲經冬常榮故又謂之溫泉其注而北則謂之濼水逹于清河以入于海舟之通于濟者皆于是乎出也齊多井泉冠于天下其顯名者以十數而色味皆同以豫驗之蓋皆濼水之旁出者也濼水嘗見于春秋魯桓公十有八年公及齊侯會于濼社預釋在歷城西北入濟水自王莾時不能𬒳河南而濼水之所入者清河也預蓋失之今濼上之南堂其西南則濼水之所出也故名之曰濼源之堂夫理使客之館而辨其山川者皆太守之事也故為之識使此邦之人尚有考也熙寧六年二月巳丑記齊州北水門記濟南多甘泉名聞者以十數其釃而為渠布道路民廬官寺無所不至潏潏分流如深山長谷之間其匯而為渠環城之西北故北城之下疏為門以泄之若嵗水溢城之外流潦暴集則常取荆葦為蔽納土于門以防外水之入既弗堅完又勞且費至是始以庫錢買石僦民為工因其故門絫石為兩涯其深八十尺廣三十尺中置石揵柝為二門扄皆用木視水之高下而閉縱之于是外內之水禁障宣通皆得其莭人無後虞勞費以熄其用工始于二月庚午而成于三月丙戌董役者供備庫副使駐泊都監張如綸右侍禁兵馬監押伸懷德二人者欲後之人知作之自吾三人者始也來請書故為之書是時熙寧五年壬子也太常博士充集賢校理知齊州軍事曽鞏記襄州宜城縣長渠記荆及康狼楚之西山也水出二山之間東南而流春秋之世曰􅋣水左丘明傅魯桓公十有三年楚屈瑕伐羅及􅋣亂次以濟是也其後曰夷水水經所謂漢水又南過宜城縣東夷水注之是也又其後曰蠻水􅐱道元所謂夷水避桓溫父名改曰蠻水是也秦昭王三十八年使白起將攻楚去􅋣百里立碣壅是水為渠以灌􅋣􅋣楚都也遂拔之秦既得􅋣以為縣漢惠帝三年改曰冝城宋孝武帝永𥘉元年築宜城之大隄為城令縣治是也而更謂􅋣曰故城􅋣入秦而白起所為渠因不廢引􅋣水以灌田田皆為沃壤今長渠是也長渠至宋至和二年久墮不治而田數苦旱朕飲者無所取令孫永曼叔率民田渠下者理渠之壞塞而去其淺隘遂完故揭使還渠中自二月丙午始作至三月癸未而畢田之受渠水者皆復其舊曼叔又與民為約束時其蓄泄而止其侵爭民皆以冝也蓋􅋣水之出西山𥘉棄於無用及白起資以禍楚而後世顧賴其利􅐱道元以謂溉田三千餘頃至今千有餘年而曼叔又舉衆力而復之使並渠之民足食而甘飲其餘粟散於四方蓋水出於西山諸谷者其源廣而流於東南者其勢下至今千有餘年而山川高下之形勢無改故曼叔得因其故迹興于既廢使之源流與地之高下一有易于古則曼叔雖力亦莫能復也夫水莫大于四瀆而河蓋數徙失禹之故道至於濟水又王莾時而絶況于衆流之細其通塞豈得而常而後世欲行水溉田者往往務躡古人之遺迹不考夫山川形勢古今之同異用力多而收功少是亦其不思也歟𥘉曼叔之復此渠白其事于知襄州事張瓌唐公公聽之不疑沮止者不用故曼叔能以有成則渠之復自夫二人者也方二人者之有為蓋將任其職非有求於世也及其後言渠堨者蜂出然其心蓋或有求故多詭而少實獨長渠之利較然而二人者之志愈明也熙寧六年余為襄州過京師曼叔時為開封訪余于東門為余道長渠之事而諉余以考其約束之廢舉子至而問焉民皆以謂賢君之約束相與守之傳數十年如其𥘉也豫為之㝎著令上司農八年曼叔去開封為汝隂始以書告之而是秋大旱獨長渠之田無害也夫宜知其山川與民之利害者皆為州者之任故豫不得不盡以告後之人而又使之知夫作之所以始也曼叔今為尚書兵部郎中龍圖閣直學士八月丁丑記徐孺子祠堂記漢元興以後政出宦者小人挾其威福相煽為惡中材顧望不知所為漢既失其操柄紀綱大壞然在位公卿大夫多豪傑特起之士相與發憤同心直道正言分别是非白黑不少屈其意至于不容而織羅鉤黨之獄起其執彌堅而其行彌勵志雖不就而忠有餘故及其既殁而漢亦以亡當是之時天下聞其風慕其義者人人感慨奮激至于解印綬棄家族骨肉相勉趍死而不避百餘年間擅疆大覬非望者相屬皆逡巡而不敢發漢能以亡為存蓋其力也孺子於時豫章太守陳蕃太尉黃瓊辟皆不就舉有道拜太原太守安車備禮召皆不至蓋忘巳以為人與獨善于隱約其操雖殊其志于人一也在位士大夫抗其莭於亂世不以死生動其心異於懷祿之臣逺矣然而不屑去者義在于濟物故也孺子嘗謂郭林宗曰大木將顛非一繩所維何為栖栖不皇寧處此其意亦非自足于丘壑遺世而不顧者也孔子稱顔回用之則行舍之則藏惟我與爾有是大孟子亦稱孔子可以進則進可以止則止乃所願則學孔子而易于君子小人消長進擇所冝處未嘗不惟其時則見其不可而止此孺子之所以未能以此而易彼也孺子姓徐名稚孺子其字也豫章南昌人按圖記章水北遙南昌城西歷白社其西有孺子墓又北歷南塘其東為東湖湖南小洲上有孺子宅號孺子臺吳嘉禾中太守徐熙于孺子墓隧種松太守謝景於墓側立碑晉永安中太守夏侯嵩于碑旁立思賢亭世世修治至拓跋魏時謂之聘君亭令亭尚存而湖南小湖世不知其嘗為孺子宅又嘗為臺也豫為太守之明年始即其處結苑為堂圖孺子像祠以中牢率州之賔屬拜焉漢至今且千歲冨貴堙滅者不可稱數孺子不出閭巷獨稱思至今則世之𣣔以智力取勝者非惑歟孺子墓失其地而臺幸可考而知祠之所以視邦人以尚德故并采其出處之意為記焉江州景德寺新戒壇記江州景德寺戒壇作于熙寧九年某月某甲子成于十年某月某甲子其費出于太子賔客陳公諱巽其主而成之出于寺之僧智暹壇成是嵗同天莭度僧若干人𥘉景德寺屋壞幾廢知暹慨然以經營為己任不舍其晝夜之勤凡二十年為佛殿三門兩廊鍾樓與戒壇捴為屋若干區捴費錢二十餘萬知暹食淡衣粗所居屋壞不自治所得于人惟資治其寺以其故人皆信服凡所欲為無不如志今年六十有七矣其經營寺事不懈如𥘉而其強力蓋有餘也余嘉其意故為之記云熙寧十年五月乙亥記洪州東門記南昌于禹貢為楊州之野于地志為吳分其部所領八州其境屬于荆閩南粵方數千里其田宜粳稌其賦粟輸于京師為天下最在江湖之間東南一都會也其城之西為大江江之外為西山州治所因城之靣勢為門東西出其西門既新而東門獨故弊熙寧九年余為是州將易而新之明年會移福州又明季自福州𬒳召還京師過南昌視其東門則今守元侯既徹而易之元侯以余為有舊于是州來請曰願有識余辭謝不能而其請不懈蓋天子諸侯之門制見于經者不明學禮者以謂諸侯之制有皋應路門天子之門加庫雉然見于春秋者魯有庫門有雉門見于孟子家語者衛有庫門或以謂褒周公康叔非諸侯常制其果然歟蓋莫得而考也在雅之綿古公亶父徙宅于𡵨作為宫室門墉得宜應禮後世原大推功述而歌之其辭曰乃立皋門皋門有伉釋者曰伉言其高也又曰乃立應門應門將將釋者曰將將言其嚴正也則諸侯之門維高且嚴固詩人之所善聖人定詩取而列之所以為後世法也今元侯于其東門革陋興壞不違于禮是可書也將求豫之識會豫未至京師易守明州元侯則使人于途于明州速豫文不巳按南昌之東門作于淳化五年識于其棟間者曰皇第六子鎮南莭度洪州𬋩內觀察處置等使徐國公元偓尚書戶部郎中知洪州軍州事陳象輿以籍考之徐國公後封密王太宗第六子受命保茲南土實留京師則作門者蓋象輿也至門之改作凡八十有九年元侯之于是役其木取于地之不在民者其工取于役卒之羡者其瓦甓金石髹􅊮􅉳堊之費取于庫錢之常入者自七月戊子始事至十月壬子而畢既成而南北之廣十尋東西之深半之而高妙其廣于以出政令謹禁限時啓閉通往來稱其于東南為一都會者而役蓋不及民也元侯名積中云又明年實元豐二年尚書度攴員外郎直龍圖閣曽鞏記道山亭記閩故隸周者七至秦開其地列于中國始并為閩中郡自粵之太末與吳之豫章為其通路其路在閩者陸出則厄于兩山之間山相屬無間斷纍數驛乃一得平地小為縣大為州然其四顧亦山也其途或逆坂如緣絙或垂崖如一髮或側徑鈎出于不側之溪上皆石芒峭發擇然後可投步負戴者雖其出人猶側足然後能進非其土人罕不躓也其溪行則水皆自髙㵼下石錯出其間如林立如士騎滿野千里下上不見首尾水行其隙間或衡縮蟉糅或逆赱旁射其狀若蚓結若蟲􅍢其旋若輪其激若矢舟泝沿者投便利失毫分輒破溺雖其土長川居之人非生而習水事者不敢以舟楫自任也其水陸之險如此漢嘗處其衆江淮之間而虛其地蓋以其狹多阻豈虛也哉福州治候官于閩為土中所謂閩中也其地于閩為最平以廣四出之山皆逺而長江在其南大海在其東其城之內外皆塗旁有溝溝通潮汐舟載者晝夜屬于門庭麓多桀木而匠多良能人以屋室巨麗相矝雖下貧必豐其居而佛老子之徒其宫又特盛城之中三山西曰閩山東曰九仙山北曰粵王山三山者鼎趾立其附山蓋佛老子之宫以𢾗十百其壞詭殊絶之狀蓋巳盡人力光祿卿直昭文館程公為是州得閩山嶔崟之際為亭于其處其山川之勝城邑之大宫室之榮不下簞席而盡于四矚程公以謂在江海之上為登覽之觀可比於道家所謂蓬萊方丈瀛州之山故名之曰道山之亭閩以險且逺故仕者常憚往程公能因其地之善以寓其耳目之樂非獨忘其逺且險又將杭其思于埃壒之外其志壯哉程公于是州以治行聞既新其城又新其學而其餘功又及于此蓋其歲滿就更廣州拜諌議大夫又拜給事中集賢殿修撰今為越州字公闢名師孟云越州趙公救災熙寧八年夏吳越大旱九月資政殿大學士右諌議大夫知越州趙公前民之未飢為書問屬縣災所𬒳者幾鄉民能自食者有幾當廪於官者幾人溝防􅌟築可僦民使治之者幾所庫錢倉粟可發者幾何富人可募出粟者幾家僧道士食之羡粟書于籍者其幾具存使各書以對而謹其備州縣吏録民之孤老疾弱不能自食者二萬一千九百餘人以告故事歲廪窮人當給粟三千石而止公斂冨人所輸及僧道士食之羡者得粟四萬八千餘石佐其費使自十月朔人受粟日一升幼小半之憂其衆相躁也使受粟者男女異日而人受二日之食憂其且流亡也于城市郊野為給粟之所凡五十有七使各以便受之而告以去其家者勿給計官為不足用也取吏之不在職而寓于境者給其食而任以事不能自食者有是具也能自食者為之告冨人無得閉糶又為之出官粟得五萬二千餘石平其價豫民為糶粟之所凡十有八使糴者自便如受粟又僦民完城四千一百丈為工三萬八千計其傭與錢又與粟再倍之民取息錢者告冨人縱豫之而待熟官為責其償棄男女者使人得收飬之明年春大疫為病坊處疾病之無歸者募僧二人屬以視醫藥飲食令無失所時九死者使在處隨收瘞之法廪窮人盡三月當止是嵗盡五月止事有非便文者公一以自任不以纍其屬有上請者或便宜多輒行公于此時蚤夜憊心力不少懈事細巨必躬親給病者藥食多出私錢民不幸罹旱疫得免于轉死雖死得無失斂埋皆公力也是時旱疫𬒳吳越民飢饉疾厲死者殆半災未有巨于此也天子東向憂勞州縣推布上恩人人盡其力公所柎循民尤以為得其依歸所以經營綏輯先後終始之際委曲纎悉無不備者其施雖在越其仁足以示天下其事雖行于一時其法足以傳後蓋災沴之行治世不能使之無而能為之備民病而後圖之與夫先事而為計者則有間矣不習而有為與夫素得之者則有間矣豫故采于越得公所推行樂為之識其詳豈獨以慰越人之思將使吏之有志于民者不幸而遇歲之災推公之所巳試其科條可不待頃而具則公之澤豈小且近乎公元豐二年以大學士如太子少保致仕家于衢其直道正行在于朝廷豈弟之實在于身者此不著著其荒政可師者以為越州趙公救災記云元豐類藁卷第十九
