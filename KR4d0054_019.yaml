body:
  text: 記廣徳湖記鄞縣張侯圖其縣之廣徳湖而以書并古刻石之文遺予曰願有紀盖湖之大五十里而在鄞之西十二里其源出扵四明山而引其北爲漕渠泄其東北入江凡鄞之郷十有四其東七郷之田錢湖溉之其西七郷之田水注之者則此湖也舟之通越者皆繇此湖而湖之産有鳬雁魚鱉苃蒲葭菼葵蓴蓮茨之饒其舊名曰鸎脰湖而今名大暦八年令儲僊舟之所更也貞元元年刺史任侗又治而大之大中元年民或上書請廢湖爲田任事者左右之為出御史李後素驗視後素不為撓民以得罪而湖卒不廢刺史李敬方與後素皆賦詩刻石以見其事其說以謂當是時湖成三百年矣則湖之興其在梁齊之際欤宋興淳化二年民始與州縣疆吏盗湖為田乆不能正至道二年知州事丘崇元躬按治之而湖始復轉運使言其事詔禁民敢田者至其後遂著之扵一州敕咸平中賜官吏職田取湖之西山足之地百頃為之既而務益取湖以自廣天繥二年知州事李夷庚始正湖界起隄十有八里以限之湖之濵有地曰林村砂末曰高橋臘䑓而其中有山曰白鶴曰望春自大平興國以来民冐取之夷庚又命禁絶而湖始復天聖景佑之間民復相率請湖為田州從事張大有案行止之而知州事李照又言其事報如至道詔書照以刻之石自此言請湖為田者始息而康㝎某年縣主簿曽公望又益治湖至張侯之為鄞則湖乆不治而七郷之農以旱告張侯為出营度民田湖旁者皆喜願致其力張侯計工賦材擇民之為人信服有知計者使督役而自主之一不以属吏人以不優而咸勤趍扵是築環湖之隄凢九千一百三十四丈其廣一丈八尺而其高八尺廣倍於舊而高倍扵舊三之二鄞人累石陻水闕其間而扄以木視水之小大而閑縦之謂之碶扵是又為之益舊捴為碶九為埭二十隄之上植榆桞益舊揔為三萬一百又囙其餘材為二亭扵隄上以休而與望春白鶴之山相直因以其山名之上為庙一以祠神之主此湖者一以祠吏之有功扵此湖者以熈寕元年十一月始役而以明年二月卒事其用民之力八萬二千七百九十有二工而其材出扵工之餘既成而田不病旱舟不病痼魚雁茭葦果𬞞水産之良皆復其舊而其餘及扵比縣旁州張侯扵是可謂有劳矣是年予通判越州事越之南湖乆廢不治盖出扵吏之因循而至扵不知所以為力予方患之觀廣徳之興以数百年危扵廢者数矣繇屡有人故益以治盖大暦之間溉田四百頃大中八百頃而今二千頃矣則人之存亡政之廢舉爲民之幸不幸其豈細也欤故爲之書尚俾来有知母廢前人之功以永爲此邦之利而又将與越之人圖其廢也張侯名峋字子堅以材聞去而爲提舉兩浙路常平廣惠倉兼𬋩句農田差役水利事方且用扵時云齊州二堂記齊濵濼水而𥘉無使客之舘使客至則常發民調材木爲舍以寓去則徹之既費且陋乃爲徙官之廢屋爲二堂扵濼水之上以舍客因考其山川而名之盖史記五帝紀謂舜耕歴山漁雷澤陶河濵作什噐扵夀丘就時扵負夏鄭康成釋歴山在河東雷澤在濟隂負夏衛地皇甫謐釋夀丘在魯東門之北河濵濟隂定陶西南陶丘亭是也以予考之耕稼陶漁皆舜之𥘉宜同時則其地不宜相逺二家所釋雷澤河濵夀丘負夏皆在魯衞之間地相望則歴山不宜獨在河東也孟子又謂舜東夷之人則陶漁在濟隂作什噐在魯東門就時在衞耕歴山在齊皆東方之地合扵孟子按圖記皆謂禹貢所稱雷首山在河東媯水出焉而此山有九號歴山其一號也予觀虞書及五帝紀盖舜娶堯之二女廼居媯汭則耕歴山盖不同時而地亦當異世之好事者廼因媯水出扵雷首遷就附益謂歴山為雷首之别號不考其實矣由是言之則圖記皆謂齊之南山為歴山舜所耕處故其城名歴城為信然也今樂上之北堂其南則歴山也故名之曰歴山之堂按圖泰山之北與齊之東南諸谷之水西北匯于黑水之湾又西北匯于栢崖之湾而至于渴馬之崖盖水之来也衆其北析而西也悍疾尤甚及至于崖下則泊然而止而自崖以北至于歴城之西盖五十里而有泉湧出高或致数尺其旁之人名之曰趵突之泉齊人皆謂嘗有棄糠扵黒水之湾者而見之扵此盖泉自渇馬之崖濳流地中而至此復出也趵突之泉冬温泉旁之𬞞甲經冬常荣故又謂之温泉其注而北則謂之濼水逹于清河以入于海舟之通于濟者皆扵是乎出也齊多丼泉冠扵天下其顯名者以十数而色味皆同以予驗之盖皆濼水之旁出者也濼水嘗見扵春秋魯桓公十有八年公及齊侯㑹于濼社預釋在歴城西北入濟水自王莾時不能𬒳河南而濼水之所入者清河也預盖失之今濼上之南堂其西南則濼水之所出也故名之曰濼源之堂夫理使客之館而辨其山川者皆太守之事也故為之識使此邦之人尚有考也熈寕六年二月巳丑記齊州北水門記濟南多甘泉名聞者以十数其釃而為渠布道路民庐官寺無所不至潏潏分流如深山長谷之間其匯而為渠環城之西北故北城之下䟽為門以洩之若嵗水溢城之外流潦暴集則常取荆葦為蔽納土扵門以防外水之入既弗堅完又勞且費至是始以庫錢買石僦民為工因其故門絫石為兩涯其深八十尺廣三十尺中置石揵柝為二門扄皆用木視水之高下而閉縦之扵是外内之水禁障宣通皆得其莭人無後虞劳費以熄其用工始扵二月庚午而成扵三月丙戌董役者供俻庫副使駐泊都監張如綸右侍禁兵馬監押伸懐徳二人者欲後之人知作之自吾三人者始也来請書故為之書是時熈寧五年壬子也太常博士充集賢校理知齊州軍事曽鞏記㐮州宜城縣長渠記荆及康狼楚之西山也水出二山之間東南而流春秋之世曰􅋣水左丘明傅魯桓公十有三年楚屈瑕伐羅及􅋣亂次以濟是也其後曰夷水水經所謂漢水又南過宜城縣東夷水注之是也又其後曰蠻水􅐱道元所謂夷水避桓温父名改曰蠻水是也秦昭王三十八年使白起将攻楚去􅋣百里立碣壅是水爲渠以灌􅋣􅋣楚都也遂㧞之秦既得􅋣以爲縣漢惠帝三年改曰冝城宋孝武帝永𥘉元年築宜城之大隄爲城令縣治是也而更謂􅋣曰故城􅋣入秦而白起所爲渠因不廢引􅋣水以灌田田皆爲沃壌今長渠是也長渠至宋至和二年乆墮不治而田数苦旱朕飲者無所取令孫永曼叔率民田渠下者理渠之壊塞而去其淺隘遂完故掲使還渠中自二月丙午始作至三月癸未而畢田之受渠水者皆復其舊曼叔又與民爲約束時其蓄泄而止其侵争民皆以冝也盖􅋣水之出西山𥘉棄於無用及白起資以禍楚而後世頋頼其利􅐱道元以謂溉田三千餘頃至今千有餘年而曼叔又舉衆力而復之使並渠之民足食而甘飲其餘粟㪚於四方盖水出於西山諸谷者其源廣而流於東南者其势下至今千有餘年而山川高下之形势無改故曼叔得因其故迹興扵既廢使之源流與地之高下一有易扵古則曼叔雖力亦莫能復也夫水莫大扵四瀆而河盖数徙失禹之故道至於濟水又王莾時而絶況扵衆流之細其通塞豈得而常而後世欲行水溉田者往往務躡古人之遺跡不考夫山川形勢古今之同異用力多而收功少是亦其不思也欤𥘉曼叔之復此渠白其事扵知㐮州事張瓌唐公公聴之不疑沮止者不用故曼叔能以有成則渠之復自夫二人者也方二人者之有為盖将任其職非有求於世也及其後言渠堨者蠭出然其心盖或有求故多詭而少實獨長渠之利較然而二人者之志愈明也熈寕六年余為㐮州過京師曼叔時為開封訪余扵東門為余道長渠之事而諉余以考其約束之廢舉子至而問焉民皆以謂賢君之約束相與守之傳数十年如其𥘉也予爲之㝎著令上司農八年曼叔去開封爲汝隂始以書告之而是秋大旱獨長渠之田無害也夫宜知其山川與民之利害者皆爲州者之任故予不得不盡以告後之人而又使之知夫作之所以始也曼叔今爲尚書兵部郎中龍圖閣直學士八月丁丑記徐孺子祠堂記漢元興以後政出宦者小人挟其威福相煽爲惡中材顧望不知所爲漢既失其操柄紀綱大壊然在位公卿大夫多豪傑特起之士相與發憤同心直道正言分别是非白黒不少屈其意至扵不容而織羅鉤黨之獄起其執彌堅而其行弥勵志雖不就而忠有餘故及其既殁而漢亦以亡當是之時天下聞其風慕其義者人人感慨奮激至扵觧印綬棄家族骨肉相勉趍死而不避百餘年間擅疆大覬非望者相属皆逡廵而不敢發漢能以亡爲存盖其力也孺子於時豫章太守陳蕃太尉黄瓊辟皆不就舉有道拜太原太守安車備禮召皆不至盖忘巳以爲人與獨善扵隱約其操雖殊其志扵人一也在位士大夫抗其莭於亂世不以死生動其心異於懐禄之臣逺矣然而不屑去者義在扵濟物故也孺子嘗謂郭林宗曰大木将顛非一䋲所維何爲栖栖不皇寕䖏此其意亦非自足扵丘壑遺世而不頋者也孔子稱顔回用之則行舍之則蔵惟我與爾有是大孟子亦稱孔子可以進則進可以止則止乃所願則學孔子而易扵君子小人消長進擇所冝䖏未嘗不惟其時則見其不可而止此孺子之所以未能以此而易彼也孺子姓徐名穉孺子其字也豫章南昌人按圖記章水北遥南昌城西歴白社其西有孺子墓又北歴南塘其東為東湖湖南小洲上有孺子宅號孺子䑓吴嘉禾中太守徐熈扵孺子墓隧種松太守謝景於墓側立碑晋永安中太守夏侯嵩扵碑旁立思賢亭世世脩治至拓䟦魏時謂之聘君亭令亭尚存而湖南小湖世不知其嘗為孺子宅又嘗為䑓也予為太守之明年始即其䖏結苑為堂圖孺子像祠以中牢率州之賔属拜焉漢至今且千歲冨貴堙㓕者不可稱数孺子不出閭巷獨稱思至今則世之𣣔以智力取勝者非惑欤孺子墓失其地而䑓幸可考而知祠之所以視邦人以尚徳故并采其出䖏之意為記焉江州景徳寺新戒壇記江州景徳寺戒壇作扵熈寕九年某月某甲子成扵十年某月某甲子其費出扵太子賔客陳公諱巽其主而成之出扵寺之僧智暹壇成是嵗同天莭度僧若干人𥘉景徳寺屋壊㡬廢知暹慨然以經营為己任不舍其晝夜之勤凢二十年為佛殿三門两廊鍾楼與戒壇捴為屋若干區捴費錢二十餘萬知暹食淡衣粗所居屋壊不自治所得扵人惟資治其寺以其故人皆信服凡所欲為無不如志今年六十有七矣其經营寺事不懈如𥘉而其彊力盖有餘也余嘉其意故為之記云熈寕十年五月乙亥記洪州東門記南昌扵禹貢為楊州之野扵地志為吳分其部所領八州其境属扵荆閩南粤方数千里其田宜秔稌其賦粟輸于京師為天下最在江湖之間東南一都㑹也其城之西為大江江之外為西山州治所囙城之靣势為門東西出其西門既新而東門獨故弊熈寕九年余為是州将易而新之明年㑹移福州又明季自福州𬒳召還京師過南昌視其東門則今守元侯既徹而易之元侯以余為有舊扵是州来請曰願有識余辞謝不能而其請不懈盖天子諸侯之門制見扵經者不明學礼者以謂諸侯之制有皐應路門天子之門加庫雉然見扵春秋者魯有庫門有雉門見扵孟子家語者衞有庫門或以謂褒周公康叔非諸侯常制其果然欤盖莫得而考也在雅之綿古公亶父徙宅于𡵨作為宫室門墉得宜應礼後世原大推功述而歌之其辭曰乃立皐門皐門有伉釋者曰伉言其高也又曰迺立應門應門将将釋者曰将将言其嚴正也則諸侯之門維高且嚴固詩人之所善聖人定詩取而列之所以為後世法也今元侯扵其東門革陋興壊不違扵禮是可書也将求予之識㑹予未至京師易守明州元侯則使人扵途扵明州速予文不巳按南昌之東門作扵淳化五年識扵其棟間者曰皇第六子鎮南莭度洪州𬋩内觀察䖏置等使徐國公元偓尚書戸部郎中知洪州軍州事陳象輿以籍考之徐國公後封宻王太宗第六子受命保茲南土實留京師則作門者盖象輿也至門之改作凢八十有九年元侯之扵是役其木取扵地之不在民者其工取扵役卒之羡者其瓦甓金石髹􅊮􅉳堊之費取扵庫錢之常入者自七月戊子始事至十月壬子而畢既成而南北之廣十㝷東西之深半之而高妙其廣扵以出政令謹禁限時啓閉通往来稱其扵東南為一都㑹者而役盖不及民也元侯名積中云又明年實元豊二年尚書度攴員外郎直龍圖閣曽鞏記道山亭記閩故隷周者七至秦開其地列扵中國始并為閩中郡自粤之太末與吴之豫章為其通路其路在閩者陸出則阸扵兩山之間山相屬無間断累数驛廼一得平地小為縣大為州然其四頋亦山也其途或逆坂如縁絙或垂崖如一髪或側徑鈎出扵不側之谿上皆石芒峭發擇然後可投歩負戴者雖其出人猶側足然後能進非其土人罕不躓也其谿行則水皆自髙㵼下石錯出其間如林立如士騎滿野千里下上不見首尾水行其隙間或衡縮蟉糅或逆赱旁射其状若蚓結若蟲􅍢其旋若輪其激若矢舟泝㳂者投便利失毫分輙破溺雖其土長川居之人非生而習水事者不敢以舟楫自任也其水陸之險如此漢嘗䖏其衆江淮之間而虚其地盖以其陿多阻豈虚也㦲福州治候官扵閩為土中所謂閩中也其地扵閩為㝡平以廣四出之山皆逺而長江在其南大海在其東其城之內外皆涂旁有溝溝通潮汐舟載者晝夜属于門庭麓多桀木而匠多良能人以屋室鉅麗相矝雖下貧必豊其居而佛老子之徒其宫又特盛城之中三山西曰閩山東曰九僊山北曰粤王山三山者鼎趾立其附山盖佛老子之宫以𢾗十百其壊詭殊絕之状盖巳盡人力光禄卿直昭文館程公為是州得閩山嶔崟之際為亭扵其䖏其山川之勝城邑之大宫室之荣不下簞席而盡扵四瞩程公以謂在江海之上為登覧之觀可比於道家所謂蓬莱方丈瀛州之山故名之曰道山之亭閩以險且逺故仕者常憚往程公能因其地之善以寓其耳目之楽非獨忘其逺且險又将杭其思扵埃壒之外其志壮㦲程公扵是州以治行聞既新其城又新其學而其餘功又及扵此盖其歲滿就更廣州拜諌議大夫又拜給事中集賢殿脩撰今為越州字公闢名師孟云越州趙公救菑熈寕八年夏呉越大旱九月資政殿大學士右諌議大夫知越州趙公前民之未饑為書問属縣菑所𬒳者㡬郷民能自食者有㡬當廪於官者㡬人溝防􅌟築可僦民使治之者㡬所庫錢倉粟可發者㡬何富人可募出粟者㡬家僧道士食之羡粟書扵籍者其㡬具存使各書以對而謹其備州縣吏録民之孤老疾弱不能自食者二萬一千九百餘人以告故事歲廪窮人當給粟三千石而止公歛冨人所輸及僧道士食之羡者得粟四萬八千餘石佐其費使自十月朔人受粟日一升㓜小半之憂其衆相躁也使受粟者男女異日而人受二日之食憂其且流亡也扵城市郊野爲給粟之所凡五十有七使各以便受之而告以去其家者勿給計官爲不足用也取吏之不在職而寓扵境者給其食而任以事不能自食者有是具也能自食者爲之告冨人無得閉糶又爲之出官粟得五萬二千餘石平其價予民爲糶粟之所凡十有八使糴者自便如受粟又僦民完城四千一百丈爲工三萬八千計其傭與錢又與粟再倍之民取息錢者告冨人縦予之而待熟官爲責其償棄男女者使人得收飬之明年春大疫爲病坊䖏疾病之無㱕者募僧二人属以視醫薬飲食令無失所時九死者使在䖏随收瘞之法廪窮人盡三月當止是嵗盡五月止事有非便文者公一以自任不以累其属有上請者或便宜多輙行公扵此時蚤夜憊心力不少懈事細鉅必躬親給病者藥食多出私錢民不幸罹旱疫得免扵轉死雖死得無失歛埋皆公力也是時旱疫𬒳吳越民饑饉疾厲死者殆半菑未有鉅扵此也天子東向憂勞州縣推布上㤙人人盡其力公所柎循民尤以為得其依㱕所以經营綏輯先後終始之際委曲纎悉無不備者其施雖在越其仁足以示天下其事雖行扵一時其法足以傳後盖菑沴之行治世不能使之無而能為之備民病而後圖之與夫先事而為計者則有間矣不習而有為與夫素得之者則有間矣予故采扵越得公所推行樂為之識其詳豈獨以慰越人之思将使吏之有志扵民者不幸而遇歲之菑推公之所巳試其科條可不待頃而具則公之澤豈小且近乎公元豊二年以大學士如太子少保致仕家于衢其直道正行在扵朝廷豈弟之實在扵身者此不著著其荒政可師者以為越州趙公救菑記云元豊類藁卷第十九
