front:
  text: 元豐類藁卷之六
  hash: sha256:40bdbf310d4f9ed48eb88ac2e14376e31ece556b3f518ad7bcbabd304f7d3b69
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_006-1a}
body:
  text: 律詩郊祀慶成詩進狀右臣伏以皇帝陛下嗣位之𥘉郊見上帝聖意重慎齋潔謹嚴始就惟宫則獨先群臣宵興待事及至壇場則陟降陛級徹去禋藉至於薦獻之際則又端立以須不肯即安退就便涎所以至誠兢兢如此故得天地祖宗飬顧臨饗華夷蠻貊觀聽欣喜惟𥘉積隂久而未解及輅車既駕則天字湛然日光明閏可謂能得使之主祭而百神享之福合於天且不違之聖宜有歌頌𬒳於聲律臣與在館閣以文字為職不敢以菲薄自止謹作五言郊祀慶成詩一首凡一百二十字干冒宸嚴臣無任惶恐激切屏營之至謹隨狀上進以聞詩即作謳歌後欽柴禮數新盛容超曠代樂貢盡殊鄰宿戒臨行殿宵興絶衆臣立須空便次步進却柔禋外物雖多品天心在一純高靈終享德群望亦依仁暗藹如無間遲延若可親欲知精意答預覩大和臻積曀沉遙甸浮陽上綺霱雲生斐亹愛景駐逡巡厚慶歸清廟餘釐及兆人還宫動前蹕喜氣入韶鈞仁宗皇帝挽詞三首納諌終無梧知人久更明恩波通四海夀域載群生異俗衣裳會諸儒雅頌聲威靈空想象盛德詎能名日轉歸人外天移入畫中冕旒餘澤在警蹕舊儀空卜宅三州繞方喪萬里通𥘉寒石門路松檜颯悲風滄海難回日青雲如送春服喪三月偏遏樂四夷均感格英靈在褒揚大號新依然社稷計王業付真人英宗皇帝挽詞二首巳應南陽氣猶遲代邸來範鎔歸獨化綱理付群材禹會方無外虞巡遂不回空驚柏城仗簫鼓送餘哀繼文猶旦暮歸啓巳謳吟畫手傳英氣書筠見德音鑄銅餘故鼎啄草付春禽試望橋山路蕭蕭翠柏深慈聖光獻皇太后挽詞二首井進狀右臣伏以大行皇太后在位四十有七年身處宮闈聰明慈恕恭儉之德見於天下洽於衆論在仁宗時有輔佐相成之道在先帝及陛下之日非特始終孝愛兩義俱隆實有援立鎮撫之大功在先帝之世從權當國既而還政以時明識獨見出處應理自二帝三代秦漢以來母后功德未有巍巍如此奄盡大期群情痛怛陛下執喪哀慕外雖易月內盡至性報復大恩誠禮備極蓋從古所未聞今山陵有日臣愚淺薄無以自效謹撰成大行皇太后挽詞二首繕寫上進臣無任悲哀感咽之至謹具狀奏聞謹狀詩祖烈鷹揚終食冀家聲泉湧舊興譙人倫風化歸三世王室功勞屬兩朝長信深嚴餘羽衛閟宫崇大列宗祧衣冠藉藉談遺事不盡鴻名對永昭山河德履孚潛顯江漢仁風𬒳邇遐巳輔乾坤成化育終符日月繼光華和熹未窹還威柄明德猶踈抑外家欲次微音難髣佛空餘流恨入哀笳送英州蘇祕丞逺民歌舞戴升平碧閣朱樓照眼明鄉饌雨餘收白菌客樽秋後對紅英瀧鳴真水遙通海路入南山不隔城材術如君有餘暇出遊應數擁雙旌送陳郎中還京兼過九江新宅艤舟金碧照溪沙帆上風吹五兩斜罷郡紫泥催向闕過江紅斾引還家因將舊社人携酒應喜新林樹見花莫作山齋久留意中臺虗位有青華遣興安州十首青燈鬪鼠窺寒硯落月啼烏送逈笳江漢置身貧作客溪山合眼夢還家百憂忽忽丹心破萬事悠悠兩鬢華誰與建帆先度鳥更無留滯向天涯楚澤楚澤方涼白霧根盈虛無處問乾坤蟲蟲旱氣連年有寂寂遺人幾户存盜賊恐多從此始經綸空建與誰論諸公日議雲臺上忍使憂民獨至尊西亭團扇頻揮到此亭他鄉愁坐思冥冥空羞避俗無高節轉覺逢人惡獨醒歲月淹留隨日老乾坤狼狽幾時寧欲知事事今何似萬里波濤一點萍盆池環環清泚旱猶深柄柄芙蓉近可尋蒼壁巧藏天影入翠奩微帶蘚䀶侵能供水石三秋興不負江湖萬里心照影獨憐身老去日添華髮巳盈簮羈遊粗飯寒虀且自如欲將吾道付樵漁羈遊事事情懷惡貧病年年故舊踈自古幸容元亮醉凡今誰喜子雲書何由得洗塵埃盡恣買滄洲結草廬南軒竹密竹姢姢數十莖旱天蕭灑有高情風吹巳送煩心醒雨洗還供逺眼清新筍巧穿苔石去碎隂微破粉墻生應須萬物冰霜後來看琅玕色轉明浮雲樓和趙嘏萬里聊供逺眼開簷前不盡水聲哀朝雲尚拂陽臺去羽獵曽圍夢澤來解帶欲留長日坐傾壷難飲故人杯邅窮萬里飄萍內到此登臨更幾回照影亭河流縈檻色輝輝無數幽禽入鏡飛巳映渚花紅四出更濁沙柳翠相圍不欺毫髮公雖有太盡妍蚩道恐非自笑病容隨步見未衰華髮滿緇衣晚望蠻􅍮人事幾推移舊國興亡欲問誰鄭袖風流今巳盡屈原辭賦世空悲深山大澤成千古暮雨朝雲又一時落日西樓慿檻久間愁唯有此心知書閣自憐野性生來拙誰許交情晚最淸世路因仍憂檻穽他鄉衰暮傍風塵惟將菽藿還求志未有秋毫可為人一畒蕭然須暫得欲偷間日長精神贈彈琴者至音淡薄誰曽賞古意飄零自可憐不似秦筝能合意滿堂傾耳十三弦寄孫正之邈癯心苦氣飄飄長餓空林不可招能舉丘山惟筆力可磨雲日是風標詩篇綴緝應千首學術窺尋豈一朝耳冷髙談經嵗逺江南春動雪還消秋日感事示介甫秋日氣已盛隂蟲朝暮聲煙雲斷溪樹風雨入山城沙磧有遺虜旌旗多逺行生民苦未息吾黨耻論兵簡翁都官倦遊公府曵長裙笑上扁舟指舊廬自有文章真𣏌􅎚不須雕琢是璠璵浮蛆滿甕嘗春酒垂露臨窗理素書况得君賔同壯節一鄉清問更誰如陳祁秀才園亭眼無塵土境殊清一繞芳蹊病體輕煙樹疑從古畫見水軒真在碧天行君能極巧安山勢我欲忘歸聽竹聲只恐主人難住此弟兄佳行滿鄉評上杜相公水為舟楫旱為霖社稷生民注意深豈謂便辭貢閣議翻然求就紫芝吟始終好古儒林士進退憂時國老心只有功名隨日逺不令功𬒳管絃音胡大傳挽詞二首讜言留簡册恭德載閨門福履三朝盛官儀一品尊九原無復起萬事付誰論不必諸儒記清名久自存逺略參基命雄文入典章輤車俄就路瑞節始還鄉象物陳虛寢哀歌寄莫觴惟應九原上松檜日蒼蒼酬林叔江西道中作枉渚荒源百里間草根輕燒舊䀶乾入陂野水冬來淺對樹諸峯雪後寒塢笛最宜風外聽嶺梅𥘉得醉中看行尋故友心無事不覺西遊道路難送雙漸之漢陽楚國封疆最上流夾江分命兩諸侯何年南狩東檣出六月西來雪浪浮夏口樓臺供夕望秦州風物待春遊可能頻度漁陽曲不負當年鸚鵡洲孔明稱吳稱魏已紛紛渭水西邉獨漢臣平日將軍不三顧尋常田里帶經人間行草軟沙勻野路睛竹技烏帽稱間行鳥啼緑樹穿花影風出青山送水聲轉覺所憂非巳事儘從多難見人情間中我樂人應笑忙處人爭我不爭贈安禪勤上人詎知蕭灑吾廬舊却有髙明此寺鄰水竹迸生剛節老秋山過抱翠嵐新惟憐季子歸來困自笑原思久更貧深識幽人風義厚掃軒開榻最相親贈護仁監院人貧舉世今為甚僧事新年始更多食糲衣穿雖擾擾搆虛基險自峩峩誅茅改築君𥘉有繫馬長吟我暫過但覺滿山金碧澗不知誰到為煙蘿送覺祖明上人冠石新墻日月回豐堂瓌殿起崔嵬鍾隨秋勢金聲壯佛隱寒雲玉坐開流水逺奔雙澗去平林髙擁四山來麒麟細草東南路一望松門意自哀謁李白墓世間遺草三千首林下荒墳二百年信矣輝光爭日月依然精爽動山川曽無近屬持門户空有鄉人拂几筵顧我自慚才力薄欲將何物吊前賢送撫州錢郎中名郎元是足風流得郡東南地更幽翠幕管絃三市晚畫堂煙雨五峯秋黃柑巧綴星垂檻香稻勻翻雪滿甌應與謝公資健筆邦人才薄詎能酬送玉汝使兩浙使傳東馳下九天此邦曽屈試鳴絃仁聲又向新年入惠澤猶為故老傳翠巘煙雲生席上滄𬈑風雨到樽前經營智略多餘暇賞燕誰酬白雪篇丁元珍挽詞二首翰墨金聲逺神清玉氣溫節廉貧愈見風義老彌惇舊學資詳正新儀屬討論誰憐一麾出終不反修門從軍王粲筆記禮后蒼篇謾有殘書在能令好事傳鵩來悲四月鶴去遂千年試想長橋路昏昏隴隧煙簡景山侍御長年心事最相親一笑相踈忽數旬柏府地嚴方許國藝臺官冷但容身飢腸漫竊公厨膳病髮難堪客舍塵還有鹿門棲宿興想君他日肯為鄰送李莘太傅郪道鳴絃去容臺抱蕝𥘉塵沙開祖帳氷雪缺征車久待連城價誰騰一鶚書君王覽豪俊應復召嚴徐遊天章寺藍輿朝出踏輕塵拂靣毶毶柳色新曲水豈能留往事南湖空解照人行最冝靈運登山屐不負淵明漉酒巾老去飄零心未折暫須同醉海邉春送關彥逺莫辭為我百分飮從此送君千里行物情簮屨尚須念人道交親那可輕渚海江柳弄佳色林鳥野蜂吟好聲對之但醉餘可置明日此杯誰共傾送關逺赴江西食蘖飮冰廉士操敝衣穿履古人風溪堂興足登臨後滕閣今歸嘯傲中一榻髙懸賔閣峻二龍俱化縣池空因過勝境須行樂驛召方當急詔東西園席上省閣名郎國羽儀瀛洲仙客衆蓍龜山蹊向日花開早海聚經寒酒熟遲下榻笑談紅斾偃引觴醒醉玉叉隨唯慙别乘踈頑甚滿足塵埃更有詩送孫頴賢在秦州穰穰春州鐵馬群青衫吾子仕猶屯高談消長才驚世藐視公侯行出人古氣欲遵奔日月畏塗曽觸滯荆榛明夷夬決應斟酌自向窮通有屈伸送鄭州邵資政江夏無雙譽災川第一才笑談成黼藻咳唾落瓊瑰紫氣降鋩露青冥羽翼開俊遊追幕府髙步集蓬萊探討篇章洽研磨術業該九霄新漢邸萬目注梁臺選擇真儒用招延急詔催衣冠驚角綺賔友重鄒枚每右橫經席寧虛置醴杯八荒披日月萬里散雲雷始去東山榜俄參北斗魁廟堂竒計得羌虜鷙心摧帝念人求舊期須汝作梅避榮言屢切請外志難回際海歸討略連吳入剸裁夕冰承命出晝錦過鄉來許國風猷壯容民宇量恢節旄恩換鎮京室地稱陪賜覲親中扆通班接上台壼漿空度洧公位在三槐看花春來日日探花開紫陌看花始此回欲賦妍華無健筆擬酬芳景怕深杯但知抖藪紅塵去莫問鬅鬙白髮催更老風情轉應少且邀佳客試徘徊會稽絶句三首花開日日去看花遲日猶嫌影易斜莫問會稽山外事但將歌管醉流霞花開日日插花歸酒盞歌喉處處隨不是心間無此樂莫教門外俗人知年年榖雨愁春晚况是江湖兩鬢華欲載一鐏乘興去不知何處有殘花送任逹度支監嵩山崇福宫漢陽門下士車騎幕中賔志節𥘉皆壯風流久更新摳庭承逺泒即位襲清塵雅淡琴聲古溫純玉性真詩書來射䇿慈惠起臨人淮海褰帷久褎斜叱馭頻政平無橫吏刑省絶冤民汴路揚旌出吳門擁節巡持權心似水待物氣如春懋德垂承詔遺榮遽乞身行髙寧繫俗道勝不憂貧地絶分琳館西歸近紫宸鴻飛開羽翼驥逸露精神却理煙霞宅重尋水石鄰青嵩銷鶴怨碧落見鷗馴故友欣聮壁諸儒慕墊巾學兼鴻寶異興與赤松親激勸留方册驚傳動縉紳浮雲雖杭意反席正逢辰秪恐尊廉退丁寧致軟輪送趙資政好問逢真主能言邁古風犯顔天意沃造膝衆情通彈治心忘勢澄清誼匪躬朝廷推指佞都邑避乘驄白簡威方厲青規遇更隆析符霄漢上開幕斗牛中里聚追胥息階庭訟銗空紀綱官特峻帷幄地彌崇吏治連成肅倉儲絶塞充錦官清鎮俗玉壘靜臨戎膏澤􅉼荒阻春陽煦滯窮鈞衡求雋望龜筮協淵衷間出干齡合平居一德同股肱康事力舟楫濟川功逺大經綸略精微獻替忠夕冰分外閫晝錦過江東比户仁聲入提封喜氣融信深銷衆偽明盛破群蒙正洽謳歌美俄更節制雄保民追吕尚分土繼逢公淄水移幢碧牛山駐斾紅魚鹽方舸集綺繡萬箱叢少憩驅千騎行歸冠百工衮衣天下詠豈獨是倥侗過髙士坊一畝蕭然絶世喧抗懷那肯就籠樊功名晚更為餘事災異𥘉嘗出至言郡閣巳空徐孺榻里人猶識鄭公門斯文未喪如繇我後代當知李仲元餘杭久旱趙恱道入境之夕四郊雨足二首連章天上乞身間笑入吳船擁莭還一夜風雷驅旱魃始知霖雨出人間旌旗東下路塵開六月風雲席上回正恐一方人暍死直將霖雨過江來錢塘上元夜祥符寺陪咨臣郎中文燕席月明如晝露華濃錦帳名郎笑語同金地夜寒消美酒玉人春困倚東風紅雲燈火浮滄海碧水樓臺浸逺空白髮蹉跎歡意少強顔猶入少年叢送沈諌議東南經濟得時笑方底除書下漢庭將幕鼓旗驚白晝諌垣冠劒動青冥指撝甌越歸談笑鎮壓江吳出醉醒金䁀鹽梅須大用九霄應已夢儀形酬王徽之汴中見贈黃流渾渾來沙際佳氣忩忩近日邊河漢槎雖通逺客蓬萊風未縱歸船山城劇飲銷紅燭水驛高吟襞彩箋老去相逢情自密不關清賞合留連寄鄆州邵資政蒙問敝邑山之之景見索君詩重意之辱謹吟二百守上寄鉛筆讐書客朱􅙲守土臣素餐方側席黃髮巳侵巾喜有山圍郭仍憐水滿津清華間耳目蕭灑長精神秀色秋來重寒聲雨後新宿雲依户牖流月過松筠北圃分殊境西湖斷俗塵渚花紅四出沙鳥翠相新芡老含珠實魚驚躍錦鱗飛梁凌窅眇虛榭壓奫淪嶺對橫修竹洲分抱白蘋靜宜人事拙間覺道膄真器小難周物官微幸此身簿書偷暇日杖屨想幽人泝險飛逰艇探竒漾釣緍形縻甘鶴怨心泰得鷗馴督府恩容久芳箋訊問頻門庭嚴衛戟尊爼從華紳却起煙霧興還思水石鄰自嗤田父樂郍可薦鴻鈞和邵資政拂衣久欲求三徑竊食聊須把一麾世路賤貧從所好老年胸臆固無竒樊籠偶得滄洲趣蕪纍難酬白雪辭督府繇來恩禮厚每容啇也與言詩和孔教授治煩方喜衆材同坐嘯南陽郡閣中几案有塵書檄簡里閭無事稻糧豐衣冠濟濟歸儒學爼豆詵詵得古風幸屈異能來助我敢將顔色在鴻鴻喜雪二首欲休還舞任風吹斷續繁雲作陳隨巳塞茅蹊人起晚更迷沙渚鳥飛遲混同天地歸無迹潤色山川入有為太守不辭留客醉豐年佳兆可前知雜雨零𥘉急因風灑莫狂英華傾月窟光氣㵼天橫宛轉花飛密紆餘舞態長化財隨大小成器任園方秀色滋山國清尤助水鄉色嚴齊上下明盛析毫芒閏屋情誇誕埋輪興激昻收功歸澤物全德在包荒預喜倉箱富潛知海嶽康蕭晨迎賀客歌吹趣傳觴雪後同徐祕丞皇甫節推孔教授北園晚步沙草正黃瀕海意江梅還白故園情循除逺水春前急繞郭空山雪後明檄影易斜寒日短角聲吹去暮雲平最慙佳客忘形契肯伴哀翁著屐行郡齋即事二首畫戟森門寵誤蒙從來田舍一哀翁囷倉穰穰逢康歲閭里恂恂有古風􅗎氏宿姦投海外伏生新學始山東時大姦周高投海島而學挍講説尚書依然自昔興王地長在南陽佳氣中滿軒山色長浮黛繞舍泉聲不受塵四境帶牛無事日兩衙封印自繇身白羊酒熟𥘉看雪黃杏花開欲探春總是濟南為郡樂更將詩興屬何人憶赴中梅浣沙亭北小山梅蘭渚移來手自我今日舊林冰雪地泠香幽艷向誰開再赴喜雪六花飛舞勢蹁躚點綴寒林熊更妍山險龍蛇盤鳥道野平江海變畬田人狂奔月非關夜馬健乘雲别有天况值白羊新酒熟可能相就慶豐年寄致士歐陽少師四海文章伯三朝社稷臣功名垂竹帛風義動簮紳此道推先覺諸儒出後塵忘機心皎皎樂善意諄諄大略才超古昌言勇絶人抗懷輕紱冕瀝懇謝陶鈞耕稼歸莘野畋漁返渭濵五年清興屬一日壯圖伸北闕恩知舊東宫命數新鸞凰開羽翼驥騄放精神曠逹林中趣高間物外身揮金延故老置驛候嘉賔主當西湖月勾留頴水春露寒消鶴怨沙靜見鷗馴酒熟誇浮蟻書成感獲麟激昻踈受晚沖淡赤松親龍臥傾時望鴻冥聳士倫少休均逸豫獨往異沉淪策畫咨詢急儀刑矚想頻應須協龜筮更起為生民元豐類藁卷之六
