  text: 元豐類藁卷第二十三
  hash: sha256:b99a163be1dd0c52a7c1f58eb796a76671626947591cce191358db0a0e54ebd1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_023-1a}
body:
  text: 制誥擬詞册惟宋祖宗集大命開迹垂統傳繼在豫賴天之靈海內和洽獲薦圭幣以為祭主惟先哲王享國君民必有儲兩以相承翼所以奉天地嚴宗廟與民為依長慮萬世也厥惟故典豫敢不率咨爾某生材之卓絶倫拔類覃訏岐嶷成于自然緝熙光明不繇外奬潛德日茂敷聞下土將旄王組藩衛京師神示所毗戒夏係屬冝執匕鬯位以時㝎今遣某某立爾為某夫天下之本在太子太子之所務求諸巳而巳爾能明其心人不詔其孚爾能善其身人不戒其隨治亦多術矣要不易乎此也嗚呼匪得之難充之為難爾能服于訓辭以承我先后之流澤俾爾躬無疆惟休惟豫及萬邦亦無疆惟慶豈不韙歟王制一昔大漢之興鑒孤秦之敝分土而開者九國當高祖之𥘉同日而立者三王在孝武之世或支庶之踈屬或宗嫡之近親所以蕃輔京師承衛天子今朕按圖規地諏日定封推天性之厚恩本人倫之通誼以隆公室蓋率舊章某鍾氣至靈生材特異聰明先物不自于鐫磨孝愛絶人非繇于奬勵比服公圭之寵仍分將鉞之崇林有顯聞洽于時論是用疇其爵邑列以真王建爾國家保兹東夏視祲威于宰席增衍食于爰田用強盤石之基實重維城之勢嗚呼册之宗廟申戒因其土風式是大邦親臨㝎其名號爾尚無作匪德以追配前人之休無從匪彛以答揚皇祖之訓俾人預懷榮之慶而身兼燕譽是祥王其勉之朕命惟允王制二昔周建親戚蓋五十三國以蕃輔京師漢封骨肉或連數十城以承衛天子所以強形勢固根本計慮深矣朕甚慕焉矧先帝之子朕之仲弟宜膺顯册進啓大邦兹惟典常夫豈敢廢某淵靜沖約孝友忠篤不挾其貴以從匪彛不恃朕恩以作匪德奉法遵聀夙夜小心王子雍邦滋久彌邵惟營丘之野臨淄之中太師吕尚之所建國兼岱及海天下重地是用立爾保兹東土二公之儀上將之莭爰田真食備物寵章大告于廷咸以屬爾於戲書稱帝堯之德曰以親九族詩美文王之聖曰刑于兄弟蓋教自上行愛繇親始先王之道不易之理也今豫命爾不違兹誼尚悉爾心其勵相朕使黎民百姓于變時雍繇家及國罔不作孚以屏豫一人慎拊方夏實諉在王時其勉之王制二天子攴子若其毋弟姬姓于周未有不侯劉氏于漢未有不王蓋親之欲寵其位愛之欲厚其財先王之法人事之理也某先帝少子朕之季弟聰明齊敏孝弟忠實冨而能約不從以敗禮貴而能戒不恫以好逸畜學樂善厥德日新王曺積年遵職無懈惟斗牛之野太伯所開三江五湖其陽大海鹽魚金穀天地之藏兹用命爾式是南郊儀視三公任兼上將真封衍食備致寵章于戲昔魯公于周大啓爾宇以輔王室康叔于衛實為益侯以保又民今朕順稽于古以屬爾某爾尚念兹以祗厥服常隸之澤配前聞人維城之休承我高后在爾勉矣往其欽哉皇子制朕受天命撫萬邦實承祖宗之盛德丕烈永惟先王之典人君在位必蚤建太子所以重宗廟為天下萬世計也某粵𥘉在毋祥應光見誕始能言則𡵨則嶷王封將位蕃輔京邑孝愛日𥙿溫恭自然神靈所開人望攸屬考刺六藝主器以長生民之道不易之理也其立為某于戲非朕私于子某惟宋高后之傳序垂統朕不敢忽惟四方上下之所注心朕不敢距嘉與海內同孚于休播告遐邇其諭朕意贈第八皇子制朕惟父子之親人道之極蓋父有天下而隆名重位逮于其子此恩義之所始而先王之制不易之理也至于禮命未及奄遘淪亡申以哀榮朕何敢廢皇第八子某秀拔慧悟天質異甚不好戲豫安于靖恭謂及大成必為國器蕃輔王室朕有望焉而屬疾久之醫禱備至不幸夭閼痛何可堪其于陳迹尚存音容如接永言傷悼莫訴朕懷今有司上聞揆于公議謂宜秩以三事今于中臺爵之真王諡以佳號厥惟舊典朕豈能抑是用追錫備兹異數嗚呼生而有特出之姿不得遂其美殁而有非常之寵所以厚其終服我命書尚其不昧王子制朕隆于親親非特私恩而巳所以教天下厚人倫也爾家慶所鍾王室之出列于使領兹惟異寵往思報稱待爾成人韓琦制躬閎廓之材躰純一之德翊亮三后格于皇天惟𥘉登庸合志皇祖仁民愛物日陳上前進賢退姦隂利天下側陋幽隱靖譛庸回削滅無類及受末命戡濟艱難以巳徇時坐定大議天望人事吻無間然市朝不驚按堵如素海內萬里外薄四夷率職駿奔無敢先後昔三代遭變繼世之𥘉干戈驚備陳及門廷書之史官以為後法以至兩漢嗣位則又閉城屯兵以為故事未有兵藏于庫士散于家而傳序繼統中外晏然如今日之盛也是繇列聖功德無窮之休亦惟廊廟之上逺略大度身任社稷克濟登兹者也相制一夫有保命集于朕躬惟用乂民罔以自逸敷求良弼作為憑依若圜就規若正識墨今朕得士諗于在廷某廣博靜淵密於世用推其計畫見于可行考其事功效于已試爾為爾守宜立輔朕兹用詔爾位于東臺嗚呼自周衰以來千有餘歲先王之道蔽而不明振壞扶微朕竊有志尚懋朕佐圖惟設施參諸經訓而不違質諸時宜而不謬無崇小慧以易大猷無伐巳能以距衆善惟賞刑在上不可以僣惟聰明在下不可以咈俾厥后克濟其任則爾身永孚于休其往起哉以承我祖宗之丕烈相制二有為之君舉賢以自助有志之士遇主而後伸兩常相須而相濟者少兩常相求而相值者寡朕觀前代君臣之際聖賢相與之盛慨然欣慕願比迹焉今得其人詔于爾衆某行無緇磷學有本原材諝智謀淑問惟舊納忠左右匪懈夙宵蔽自朕心命爾豫翼列豫右相進二西臺嗚呼自道術不明而世蔽滋久法度多缺而紀綱浸微圖治者以古為迂錯事者以苟為得兵安于坐食而不合于農士習于空言而不知為吏禮義廉耻闕而不思朋黨比周靡然成俗任之以學斆而敗官以墨者方興起之以赴功而便文自營者滋出伊𣣔黜漢唐之淺陋追堯舜之髙明尚懋相豫豫忱不二使千載之墜振于一朝上下之間配于前烈以揚我先后之光訓亦纘爾舊服之顯庸相制三朕飾正三省綱理萬事號令所出本諸西臺閲審駮論屬之黃闥推而逹之則在會府以其官之長二皆為任政之臣鼎足居中各遵其職分守則異合謀惟一時豫俊乂宜就兹列其身篤學行自幽而顯宣力中外績用彌邵惟文昌政本揆敘百度介于左省考慎朕命圖濟厥服爾其往哉朕訓迪治官順稽于古使其躰至大而統之有要其事至衆而舉之有條不惟其文惟其實不惟其位惟其人爾允念兹以勤豫翼蓋先代之法存于籍者既殘缺而難循當今之宜殊于昔者又舛違而易逺酌是彛憲成之甚艱尚迪庶工奉若惟新之則亦永來世預有無窮之聞節相制古者出軍之法始于一井之間遣將之常甫在六官之內師田共務文武同方蓋丁發召之期則士就戎行而卿行于外已征誅之事則衆遵農畔而帥旋于朝歷世雖殊兹致惟一逮後王之更造開阡陌以居民隸伍符者身不受于一㕓仗齊鉞者位不連于九棘其于荷戈抗隊為王之瓜牙立纛設旄為國之屏翰上下之任古今則同豫得異能詔于在列某性資強毅識慮精通束髮修身有恕巳及人之志歷官行事有氶流宣化之勤踐揚要極之司更閲歲時之久嘉謀黨論簡在朕心廣譽善聲洽于輿論有國之典以爵詔功宜疇厥庸爰啓爾宇建大將之旗鼓尸我一方賜諸侯之士田保兹東夏以董齊于軍旅以撫和于士民𠫭帝傅之寵名益户封之真食兼隆異數奬勵茂勳于戲昔吉甫典兵萬邦為憲申伯作邑四國于蕃宜悉意于壯猷庶俾忠于前列答揚祖宗之訓豫冀為衆得人夾輔邦家之基爾尚為時宣力侍中制舜用臯陶若股肱之承元苜啇咨傅説如舟楫之濟巨川蓋一躰之相成或兩求而莫值肆朕讃極窹寐雋良果得異能屬之大任用揚孚號明論在廷某行蹈中和學通古今從容應物有適用之材慷慨立朝多據經之論比回朔于禁闥遂更踐于樞庭閲歲已深服勞惟舊朕惟紀官之敝久廢于正名分職之殊固難于覆實為司徒之㝎制俾位號之無虛乃眷宗工宜加異數東臺管轄之任爰處于弼諧南官喉舌之司仍躋于端右躰加隆之注意當益懋于壯猷於戲秉國之均夫下之所取正熙帝之載朕心之所仰成使萬物各遂其生而一夫無失其所以輔豫治往惟汝諧門下侍郎制朕于天下之事以稟承處決屬之中書審閲駮正歸之門下而使尚書推而行之此三省所以異任而相成故長令僕射皆宰相之任而左右省侍郎所以二之蓋謹其名者固將循之以稽其實也必使位無虛加人無虛受以修國家之務然後稱朕意焉某明允修潔學通今古以風力之敏見于續用以志行之篤重於朝廷擢自從臣預國機政多引大體沃于朕心維董正治官之𥘉介東臺𬋩轄之寄歷選在列汝往惟允夫堅一心以在王室康萬事以亮天功汝之任也其尚勉哉門下侍郎尚書左右丞制尚書萬事所出丞所以管其要門下三省之首侍郎所以二其長朕稽于古義以正官號故合是寵秩以命吾共政之臣非天下之材足以協朕之謀繫人之望者夫豈虛授某莊毅忠篤通于古今列于廟堂以義陪朕是用考擇以為選首使文昌左轄之任舉瑣闈參議之效明六官紀綱上之所以齊下者無所撓四方奏列下之所以通上者無所壅以弼豫一人而亮成庶績尚懋厥志無忘訓詞給事中制有事殿內之臣職在于平奏述詳命令駮其違者而正之覆其善者而行之至于決獄官人發驛遣使申滯察苛嬈莫不總焉其任可謂煩且重矣朕董治正官之始思得其人以稱厥位以爾具官忠某篤強毅明于理躰勞閲甚茂朕惟汝嘉列之東臺公議所屬惟精敏不懈可以統治要劇惟剛方不苟可以辨白是非爾尚慎于厥修朕方觀汝之效左右常傅郎制左右之臣以騎從乘輿職在獻納可謂親且重矣非器識操行屬乎朕心夫豈輕受某老于文學練逹洽躰舊惟共政勤烈在時某直諒多聞篤于自守先帝遺朕調護有勞皆以耆名列于祕殿是用考擇于衆寵以兹任朕惟爾之試用巳效必能秉誼不渝惟爾之博通古今必能輔朕之闕往祗厥服豈煩訓詞左右諌議大夫制諌議大夫掌議論舊矣今列于從官實有官責事無大小皆得開陳當其可從則為之更命令易取舍固朕之所虛心而聽也朕方于天下之忠讜惟恐不聞則居是任者直巳以事上夫何間哉某器識強敏明于今古俾職獻替僉曰汝宜夫能通上下之情而使朕立于無蔽之地治道之所繇出在汝能任其任可不勉歟二起居制孔子稱言動以禮天下歸仁焉矧託于王公之上言而為令動而為法故必有左右史從而記之所以照得失明勸戒能稱兹任蓋難其人某丈學優深操行修潔執簡簮筆有列于朝今朕順于古義以考㝎官儀是用正爾之名俾仍舊服其尚謹于書法以無曠于厥司左右正言制左右之臣以言為職事有得失關于理躰利害繫于人情或方兆于幾微或巳施于命令論皆可及誼無不從選用特殊寄屬惟重正官之始得士尤艱某綽有時材通于卋用獻替之位宜服寵名夫上之求乎下者患乎難知下之求乎上者患乎難逹使耳目之任無蔽藥石之規必聞尚惟汝能以助豫治諌官制某純明廣博信古知今周爾之長禆有言責夫言人之所難言爾無不盡而聞之如恐不及朕豈敢忘其尚懋哉無或容而巳矣中書令制虞氏之咨四嶽惟亮天功周家之建六官以為民極朕參于古義質以今宜以右省典正于鈞衡以中臺捴持于綱紀兼是重任時惟宗臣播告在廷其德新命某敏于學術優有時材以經逺之謀彌綸治具以察微之智練逹事幾繇展采于禁林遂升華于宰路協宣勞力積有歲時朕惟授職以量能宜循名而責實稽先王之作則以正百官起多士之赴功庶康萬務眷言舊德申以異恩惟化原實繫于內樞俾首弼諧之任維政本一歸于會府仍躋端揆之崇寵秩所加委成彌重豈獨儀刑于列位固將敘正于彛倫于戲咸一德以格皇天輔豫于治釐百工而熙庶績待汝有為其務迪于壯猷尚思齊于前哲體兹注意維往懋哉門下中書侍郎尚書左右丞制尚書中書門下三省本天下之務而侍中令僕射為宰相之任舊矣自唐政不綱而失其守今朕董正治官使三省之長皆復其任而于尚書左右丞左右省侍郎秩有升降使二吾任政之臣夫綱轄之地與銜史更相察舉所以驚官邪明憲度而侍郎于左右省無不統理則其所繫于躰尤重非傑出之材不在兹選某官端方篤實學有本源預于政機人望惟允某強毅忠厚通于古令謀謨廟堂休有令聞是用命爾以為選首其尚體余所以處爾之重勿苟勿隨使百工庶尹皆知爾之不私于法罔敢不正而政令之自上出者罔不得宜以稱朕所以作則垂法始今行後之意爾可勉矣子有望焉中書舍人制朕稽于古以正百官使循其名以效其實惟舍人中書之屬以典掌命令為任而况列于侍從則又職在論思方朕明紀綱㝎憲度以為民極之𥘉非能見于文章何以究宣朕意非能通于世用何以彌綸庶務進在兹位不其重歟某官某思正仁篤逹于古今其文足以代王言其智足以謀治體斷自朕意以為選首其尚尊爾之學以善于訓詞奮爾之庸以禆于政理使爾能稱厥職而朕預于知人其惟勉哉以祗厥服知制誥制一典掌書令之任為左右之臣非獨在于潤色斯文而巳固當論思治體以輔朕之不逮朕博考天下之材然後有所拔用則于付授豈不慎哉某強識敏學通于理要祗節勵行忠篤不回朕惟汝嘉使在兹選朕有兢兢業業一日二日萬幾之慮汝則思輔以謀猷忠于獻納朕有作則聖憲施命以告四方之志汝則思逹以文辭見于號令使汝為稱任則朕為得士豈不休哉尚其勉矣以服厥官知制誥制二贊為名命之臣法當得一作待從非獨在于討論翰墨發揮詔號而巳必將講明治具思獻其可以弼豫違故非其人夫豈虛授某敏有時材優于學術擢于不次俾典訓詞維能守其所聞可以輔豫不逮維能明于躰要可以見于文章其尚懋哉方觀汝效尚書左右丞制本天下之政者尚書也本尚書之紀綱者左右丞也蓋衆職之治亂萬事之廢舉紏而正之實其任焉今朕董正治官使尚書纘其舊服以㒒射為任政之臣而六卿各遵其職至于綱轄之地所以驚官邪繩謬戾御史有不舉者得并而治之則其繫于躰尤重是以進其位敘使得二吾任政之臣非望臨一時朕豈虛授某明允忠篤通于古今列于廟堂以義陪朕是用考擇以為選首其尚躰豫所以處爾之重勿苟勿隨俾百工庶尹知爾之不私于法罔敢不正稱朕所以作則垂憲始今行後之意爾可勉矣朕有望焉左右司郎中制尚書天下政本左右司紀綱之地故郎選異于諸曺非器幹望實有聞于時莫稱其任某明敏強濟通于世用宜在此位故以命汝創制之𥘉舉墜興壞所以彌綸庶務者待汝有為其尚懋哉以承厥敘元豐類藁卷之二十三
