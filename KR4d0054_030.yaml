front:
  text: 元豊類藁卷之三十
  hash: sha256:7002fe6cd09df8574102f5641c713766b7ca8f40d610991bf841c0c093273b3c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_030-1a}
body:
  text: 劄子移滄洲過闕上殿臣聞基厚者势崇力大者任重故功徳之殊垂光錫祚舄奕繁衍乆而彌昌者盖天人之理必至之符然生民以耒能濟登兹者未有如大宋之隆也夫禹之績大矣而其孫太康乃墜厥緒湯之烈盛矣而其孫太甲既立不明周自后稷十有五世至于文王而大統未集武王成王始收太平之功而康王之子昭王難扵南狩昭王之于穆王殆於荒服暨于幽厲陵夷盡矣及秦以累世之智并天下然二世而亡漢㝎其亂而諸吕七國之禍相㝷以起建武中興然沖質以後世故多矣魏之患天下為三晋宋之患天下為南北隨文始一海内然傳子而失唐之治在扵正觀開元之際而女禍世出天寳以還綱紀微矣至于五代盖五十有六年而更八姓十有四君其廢興之故甚矣宋興太祖皇帝為民去大殘致更生兵不再試而粤蜀呉楚五國之君生致闕下九州耒同復禹之跡内輯師旅而齊以莭制外卑藩服而納以䋲墨所以安百姓禦四夷綱理萬事之具雖創始經管而彌綸巳悉莫貴扵為天子莫冨扵有天下而舍子傳弟為萬世䇿造邦受命之勤為帝太祖功未有高焉者也太宗皇帝遹求厥寕既㝎晋疆錢俶自歸作則垂憲克紹克類保卋靖民丕丕之烈為帝太宗未有高焉者也真宗皇帝継統遵業以􅉼煦生飬蕃息齊民以井容徧覆優服異類盖自天寳之末宇内板蕩及真人出天下平而西北之虜猶間入闚邉至于京徳二百五十餘年契丹始講和好徳明亦受約束而天下銷鋒灌燧無雞鳴犬吠之驚一作警以迄于今故扵是時遂封泰山禅社首薦吿功徳以明示萬世不桃之廟所以為帝者仁宗皇帝寛仁慈恕虚心納諌慎注措謹䂓矩早朝晏退無一日之懈在位日乆明扵群臣之賢不肖忠邪選用政事之臣委任責成然公聴並觀以周知其情偽其用舍之際一稽扵衆故任事者亦皆警懼否輙罷免世以謂得馭臣之體春秋未高援立有徳傳付惟允故傳天下之日不陳一兵不宿一士以戒非常而上下晏然始古所未有其豈弟之行足以附衆者非家施而人恱之也積之以誠心民皆有父之尊有母之親故棄群臣之日天下聞之路祭巷哭人人感動歔欷其得人之深未有知其所繇然者故皇祖之廟為宋仁宗英宗皇帝聦明􅌖智言動以禮上帝眷相大命所集而稱疾遜避至于累月自踐東朝淵黙㳟慎無所言議施為而天下傳頌稱說徳號彰聞及正南靣勤勞庶政每延見三事省决萬機必咨詢舊章考求古義聞者惕然皆知其志在有為雖早遺天下成功盛烈未及宣䆒而明識大畧足以克配前人之休故皇考之廟為宋英宗陛下神聖文武可謂有不世出之姿仁孝㳟儉可謂有君人之大徳憫自晚周秦漢以耒世主不能獨見扵衆人之表其政治所出大氐踵襲卑近因扵世俗而巳於是慨然以上追唐虞三代荒絶之跡修列先王法度之政為其任在巳可謂有岀扵数千載之大志変易因循號令必信使海内觀聴莫不奮起群下遵職以後為羞可謂有能行之效今斟酌損益革敝興壊制作法度之事日以大備非因陋就寡拘牽常見之世所能及也繼一祖四宗之緒推而大之可謂至矣盖前世或不能附其民者刑與賦役之政暴也宋興以来所用者鞭朴之刑然猶詳審反復至扵緩固縦之誅重誤入之辟盖未嘗用一暴刑也田或二十而稅一然嵗時省察数議寛减之宜下蠲除之令盖未嘗加一暴賦也民或老死不知力政然猶憂憐惻怛常謹復除之科急擅興之禁盖未嘗興一暴役也所以附民者如此前世或失其操柄者天下之势或在扵外戚或在扵近習或在於大臣宋興以来戚里宦臣曰將曰相未嘗得以擅事也所以謹其操柄者如此而况輯師旅於内天下不得私尺兵一卒之用卑藩服扵外天下不得專尺土一民之力其自䖏之势如此至扵畏天事神仁民爱物之際未嘗有湏臾懈也其憂勞者又如此盖不能附其民而至扵失其操柄又怠且忽此前世之所以危且亂也民附扵下操柄謹扵上䖏勢甚便而加之以憂勞此今之所以治安也故人主之尊意論色授而六服震動言傳號渙而萬里奔走山巖窟穴之垊不待期㑹而時輸嵗送以供其職者惟恐在後航浮索引之國非有發召而籝齎槖負以致其摯者惟恐不及西北之戎投弓縦馬相與祗服而戯豫東南之夷正冠束祍相與挾冊而吟誦至於六府順叙百嘉鬯遂凢在天地之内含氣之属皆𥙿如也盖逺莫懿於三代近莫盛於漢唐然或四三年或一二世而天下之變不可勝道也豈有若今五世六聖百有二十餘年自通邑大都至扵荒陬海聚無変容動色之慮萌於其心無援枹擊析之戒接扵耳目臣故曰生民以来未有如大宋之隆也竊觀扵詩其在風雅陳太王王季文王致王迹之所由與武王之所由與武王之所以繼代而成王之興則美有假樂鳬鷖戒有公劉洞酌其所言者盖農夫女工築室治田師旅祭祀飲尸受福委曲之常務至扵兎罝之武夫行脩扵隱牛羊之牧人受及㣲物無不稱紀所以論功徳者由小以及大其詳如此後嗣所以昭先人之功當世之臣子所以㱕美其上非徒薦告鬼神覺窹黎庻而巳也書稱勸之以九謌俾勿壊盖歌其善者所以興其嚮慕興起之意防其怠廢難乆之情飬之扵聴而成之扵心其於勸帝者之功美昭法戒扵将来聖人之所以列於經垂為世教也今大宋祖宗興造功業猶太王王季文王陛下承之以徳猶武王成王而羣臣之於考次論撰列之簡册𬒳之金石以通神明昭法烕者闕而不圖此學士大夫之過也盖周之徳盛扵文武而雅頌之作皆在成王之世今以時考之則祖宗神靈固有待扵陛下臣誠不自揆輙冐言其大體至扵㝷類取稱本隱以之顯使莫䆒悉則今文學之臣充於列位惟陛下之所使至若周之積仁累善至成王周公為最盛之時而洄酌言皇天親有徳饗有道所以為成王之戒盖履極盛之势而動之以戒懼者明之至智之盡也如此者非周獨然唐虞至治之極也其君臣相飾曰競競業業一日二日萬機則䖏至治之極而保之以祗慎唐虞之所同也今陛下履祖宗之基廣太平之祚而卋世治安三代所不及則宋興以来全盛之時實在今日陛下仰探皇天所以親有徳饗有道之意而奉之寅畏俯念一日二日萬機之不可以不察而䖏之以競競使休光美實日新歲益閎逺崇侈循之無窮至千萬世永有法則此陛下之素所蓄積臣愚區區爱君之心誠不自揆𣣔以庻幾詩人之義也惟陛下之所擇請令長貳自舉属官劄子臣伏以陛下本原周禮參之以有唐六典之書考諸當世之宜裁以聖慮更㝎官制以幸天下臣誠不自揆𣣔少助萬一令無足取者亦足以致區區爱君之心竊觀扵書其在堯舜稱堯之徳曰平章百姓百姓昭明則平其賢不肖功罪之分而章之以爵賞使百官莫不昭明者此人主之事也其在說命曰惟說式克欽承旁招俊乂列于庻位則氶人主之志廣引人林進諸朝廷者此宰相之事也其在囧命穆王命伯囧為周大僕正其戒之曰慎簡乃僚無以巧言令色使僻側媚其惟吉士則使得自簡屬僚以共成其任者此諸司長官之事也其上下之體相承如此所以周天下之務盖先王之成法也故陸贄相唐陳致理之具以謂百司之長至扵副貳之官與夫兩省供奉之職請委宰臣叙擬以聞其餘䑓省属僚請委長官選擇指陳材實終身保任其以舉授之繇各載除書之内得賢則有進考増秩襃升之賞失實則有奪俸贖金黜免之罰非特搜揚下位而巳亦以閱試大官其所取之士既責行能亦計資望此贄之大指也贄扵絰畫之林近世未見其比其在相位所陳先務如此質之扵古實應先王之法施之後世可以推行誠古今之通議也陛下隆至道開大明配天地立人極循名㝎位以董正治官千載以耒盛徳之事也創制之始新命之官任之以彌綸衆職所繫尤重其所更革著扵甲令或差若毫髮四方受其敝或誤扵湏臾累嵗不能救則扵選用之軆尤不可假非其人且䑓省長官僕射尚書左右丞侍郎御史中丞皆囯之重任陛下所選擇而授今尚書既領天下之事郎員外郎凢二十四司用吏㡬百貟其餘属佐尚不在数中若使本司長貳之官自郎以下貟有未備皆㪯二人以開以陛下之明甚扵群臣材分無不周知取其所㪯擇用其一其餘書之扵籍以為内外之官選用之備庻㡬為官得人足以上副陛下作則垂憲非常之大志且本朝著例御史中丞知雜至扵省府之長固得自舉其属而舘閣監司牧守之官亦嘗屡詔近位皆得薦用所知名臣偉人徃徃由此而岀則推而廣之求扵故事實有巳試之効其所薦之士采用其一其餘書之扵籍以備選擇猶旧闕御史一員聴舉二人其一不中選者亦以次甄進則稽諸累朝亦故事也伏惟陛下本周命太僕慎簡乃僚之意采陸贄䑓省長官舉吏懇懇之論推本朝巳試之法使先王之迹自陛下追而踐之如此則任衆之道隆進賢之路廣踈逺之士懐材者皆得彚征要近之臣奨善者皆得自逹以陛下之臨照誰敢不應之以公以陛下之考覈誰敢不赴之以實旣得其人授之以位然後陛下以公聴並觀分别淑慝以執中主要信行其賞罰如此則允釐百工庻績咸熈可無為而致尭之平章百姓百姓昭明如是而巳如臣之說為可采者其推行之法陸贄所陳惟陛下察其踈宻詳加損益取進止元豊六年十一月二十一日垂拱殿進呈請令州縣特舉士臣聞三代之道郷里有學士之秀者自郷升諸司徒自司徒升諸學大楽正論其秀者升諸司馬司馬論其賢者以告于王論㝎然後官之任官然後爵之位㝎然後禄之論㝎然後官之者鄭康成云謂使試守任官然後爵之者盖試守而能任其官然後命之以位也其取士詳如此然此特扵王畿之内論其郷之秀士耳故在周礼則稱郷老献賢能之書于王也至扵諸侯貢士則有一適再適三適之賞黜爵削地之罰而其法之詳莫得而考此三代之事也漢興采董生之議始令郡囯舉孝㢘一人其後又以口為率口百二十萬至不滿十萬自一嵗至三歳自六人至一人察舉各有差至用丞相公孫洪太常孔臧議則又置太常博士弟子員郡囯縣官有好文學孝悌謹順出入無悖者所聞令相長丞上属所二千石二千石謹察可者令詣太常受業如弟子一嵗皆課試通一藝以上𥙷文學掌固跌其高弟其可為郎中者太常藉奏即有秀才異䓁輙以名聞又請以治礼掌固比二百石及百石吏選擇為左右内史大行不郡太守卒史皆各二人邊郡一人不足擇掌固以𥙷中二千石属文斈掌固𥙷郡属備員其郡囯貢士太常試選之法詳矣比漢之事也今陛下隆至徳昭大道参天地本人倫興學崇化以凨天下唐虞用心何以加此然患今之學校非先王敎飬之法今之科舉非先王選士之制聖意卓然自三代以後當塗之君未有能及此者也臣以謂三代學校勸敎之具漢氏郡國太常察舉之目揆今之宜理可參用今州郡京師有學同扵三代而敎飬選舉非先王之法者豈不以其遺素厲之實行課無用之空文非陛下隆世教育人林之本意欤誠今州縣有好文學厲名莭孝悌謹順出入無悖者所聞今佐升諸州學州謹察其可者上太學以州大小為嵗及人数之差太學一歲謹察其可者上禮部禮部謹察其可者籍奏自州學至禮部皆取課試通一藝以上御試與否取自聖裁今既正三省諸寺之任其都事主事掌固之屬舊品不卑冝清其選更用士人以應古義遂取禮部所選之士中第或高第者以次使試守滿再歲或三歲選擇以為州属及縣令丞即有秀寸異等皆以名聞不拘此制如此者謂之特舉其課試不用糊名謄録之法使之通一藝以上者非獨采用漢制而巳周禮犬司徒以郷三物教萬民而賓興之亦以禮楽射御書数也如臣之議為可取者其敎飬選用之意願降明詔以諭之得人失士之效當信賞罰以厲之以陛下之所嚮孰敢不䖍於奉承以陛下之至明孰敢不公扵考擇行之以漸循之以乆如是而俗化不美人林不盛官守不脩政事不㪯者未之聞也其舊制科舉以習者既乆難一日廢之請且如故事惟貢舉踈数一以特舉為凖而入官試守選用之叙皆出特舉之中至夫教化已洽風俗既成之後則一切罷之如聖意以謂可行其立法彌綸之詳願詔有司而㝎議焉取進上元豊三年十一月二十一日垂拱殿進呈請西北擇将東南益兵臣聞古者兵出於農故三時耕稼一時閱武其扵四時蒐田則又率之從事然則農之用力扵兵以少言之嵗當兩月計其大㮣則今之專力之兵一當古之兼農之兵六先王之制天子六軍大國三軍次國二軍小國一軍軍萬二千五百人其餘夫以為羡卒周有天下諸侯之國千有八百以中数之通有兵二萬五千為兵四千五百萬而羡卒未在其数以今之兵一當其六今有兵百萬為八十倍少扵古以跡言之其専力兼農之人固異以多少言之其用人之力費人之財今可謂省矣古者兵出扵農故干戈車乗馬牛亦皆取具而國無預焉今兵出於國故干戈車乗馬牛亦皆取具而民預焉此今之兵又扵民為便者也秦既開阡陌而亦兵出扵民其干戈屢動則至扵發閭左之成漢魏而下亦皆以民為兵其轉徙殺戮之禍嘗甚矣至于後周陏唐脩列府衛而兵復近古天寳以後彍騎立而募兵之法行自是之後綱紀大失序天子之勢屈扵方鎮之兵方鎮之勢屈扵所部之兵至其其也将之廢置出扵兵至千五代而國之廢直出於兵兵之禍天下未有甚扵此也宋興撥亂世反之正太祖外削藩服而㱕之軌道内操師旅而東以法制天下之悪子非鰌之以刑而自列扵行伍非敺之以暴而自就扵䋲墨以鎮城邑以戍疆埸非獨為朝廷之用其於天下之良民得以樂職而安業者實頼其力況又其費少於古其便多扵民近世以来制兵之善未有及此者也陛下出衆慮之表起百職之廢其於常武尤属聖心今連營之士訓練精銳武庫之兵繕治工巧治古所未有臣誠不自揆計今之事竊以謂西北之宜當擇將率東南之備當益戍兵庶幾上副陛下威夷狄守四方不世出之大志何以言之昔太祖之世其捍北狄則用李漢超於関南馬仁瑀扵瀛州韓令坤於常山賀惟忠於易州何継筠扵棣州其禦太原則用郭進扵西山李謙溥於隰州李継勲扵昭義其備西戍則用姚内斌扵慶州董遵誨扵壊州王彦昇於原州馮繼業於靈州大抵如内斌遵誨之兵率不過五六千人皆責之以自守其地今士之精銳兵之工巧無以復加矣在乎得人屬之統督之寄而巳故臣以謂西北之宜當擇将率付之一州一路任之以戦守之責陛下明考覆信賞罰以馭之而巳以此制勝則何求而不得也臣又竊以古者百里之地為千乘之國有兵三萬七千五百人今州卜者非將百里而巳士徒之衆雖不必盡如古制然今東南之偶地方萬里有山海江湖險絶之勢溪洞林麓深僻之虞而此諸路之兵不過数千人而巳其扵防邏常患不足萬一有追胥討捕之事理必乏人向者邕州之不守盖患扵救援之不繼至於廖㤙之䑕竊而能稽誅扵時月者盖由追討之兵不足恩巳自㱕而所遣北兵猶在道路則東南之寡弱盖可知也以陛下之明綱理天下無所不備其扵東南之兵計今之宜雖不必如古者千乗之法然稍増兵屯使緩急足用以銷奸萌除患於未然亦治體之所宜及臣故以謂東南之備當益戍兵區區憂國之心惟陛下之所裁擇取進止元豊三年十一月二十一日垂拱殿進呈議經費臣聞古者以三十年之通制國用使有九年之蓄而制國用者必扵歲杪盖量入而爲出國之所不可儉者祭祀也然不過用数之仂則先王飬財之意可知矣盖用之有莭則天下雖貧其冨易致也漢唐之始天下之用嘗屈矣文帝太宗䏻用財有莭故公私有餘所謂天下雖貧其冨易致也用之無莭則天下雖冨其貧亦易致也漢唐之盛時天下之用常𥙿矣武帝明皇不能節以制度故公私耗竭所謂天下雖冨其貧亦易致也宋興承五代之敝六聖相繼與民休息故生齒既庻而財用有餘且以景徳皇祐治平校之景徳户七百三十萬墾田一百七十萬頃皇祐户一千九十萬墾田二百二十五萬頃治平戸一千二百九十萬墾田四百三十萬頃天下歲入皇祐治平皆一億萬以上嵗費亦一億萬以上景徳官一萬餘員皇祐二萬餘貟治平并幕職州縣官三千三百餘員緫二萬四于員景徳郊費六百萬皇祐一千二百萬治平一千三百萬以二者校之官之衆一倍扵景徳郊之費亦一倍扵景徳官之数不同如此則皇祐治平入官之門多扵景徳也則皇祐治平用財之端多扵景徳也誠詔有司按尋載籍而講求其故使官之数入者之多門可考而知郊之費用財之多端可考而知然後各議其可罷者罷之可損者損之使天下之入如皇祐治平之盛而天下之用官之数郊之費皆同扵景徳二者所省者盖半矣則又以類而推之天下之費有約扵舊而浮扵今者有約扵今而浮扵舊者其浮者必求其所以浮之自而杜之其約者必本其所以約之由而從之如是而力行以歲入一億萬以上計之所省者十之一則歲有餘財一萬萬馴致不巳至扵所省者十之三則歲有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄自古囯家之冨未有及此也古者言九年之蓄者計毎歲之人存十之三耳盖約而言之也今臣之所陳亦約而言之今其数不能盡同然要其大致必不逺也前世扵彫敝之時猶能易貧而為冨今吾以全盛之勢用財有莭其所省者一則吾之一也其所省者二則吾之二也前世之所難吾之所易可不論而知也伏惟階下冲静質約天性自然乘輿器服尚方所造未嘗用一寄巧嬪嬙左右掖廷之間位號多闕躬履節儉為天下先所以憂憫元元更張庶事之意誠至惻怛格于上下其扵明法度以飬天下之財又非陛下之所難也臣誠不自揆敢献其區區之愚惟陛下裁擇取進止元豊三年十一月二十一日垂拱殿進呈請减五路城堡臣嘗議今之兵以謂西北之宜在擇将帥東南之備在益戍兵臣之妄意謂西北之兵巳多東南之兵不足也待罪三班脩定陜西河東城堡之賞法因得考扵載籍盖秦鳯鄜延涇原環慶并代五路嘉祐之間城堡一百一十有二熈寕二百一十有二元豊二年七十有四熈寕較扵嘉祐為一倍元豊較扵嘉祐為再倍而熈河城堡又三十有一雖故有之城始籍在扵三班者或在此数然以再倍言之新立之城固多矣夫将之扵兵猶奕之於棊善奕者置棊雖踈取数必多得其要而已故敵雖萬変塗雖百出而形势足以相援攻守足以相赴所保者必其地也非特如此所應者又合其変故用力少面得筭多也不善変者置棊雖宻取数必寡不得其要而巳故敵有他変塗有他出而形势不得相援攻守不能相赴所保者非必其地也非特如此所應者又不能合其変故用力多而得筭少也守邉之臣知其要者所保者必其地故立城不多則兵不分兵不分則用士少所應者又能合其変故用力少而得筭多猶之善奕也不得其要者所保非必其地故立城必多立城多則兵分兵分則用士衆所應者又不能合其変故用力多而得筭少猶之不善奕也昔張仁愿度河築三受降城相去各四百餘里首尾相應繇是朔方以安减鎮兵数萬此則能得其要立城雖踈所保者必其地也仁愿之建三城皆不爲守備曰㓂至當併力出戦回顧望城猶湏斬之何用守備自是突厥遂不敢度山可謂所應者合其変也今五路新立之城十数歲中至扵再倍則兵安得不分士安得不衆殆強場之吏謀利害者不得其要也以奕棊况之則城不必多臣言不為無據也以他路况之則北邉之備故以遵藝約之故数十年間不増一城一堡而不患戍守之不足則立城不必多又巳事之明驗也臣以此竊意城多則兵分故謂西北之兵巳多而殆恐守邉之臣未有稱其任者守邉之臣遇陛下之明常受成筭以從事又不敢不奉法令幸可備驅䇿然出萬全之畫常諉扵上人臣之於職苟簡而巳固非躰理之所當然况繇其所保者未得其要所應者未合其変顧使西北之兵獨多而東南不足在陛下之時方𣣔事無不當其理官無不稱其任則因其舊而不変必非聖意之所取也夫公選天下之材而属之以三軍之任以陛下之明聖慮之緒餘足以周此臣歴觀世主知人善任使未有如宋興太祖之用将英偉特出者也故能撥唐季五代数百年之亂使天下大定四夷軌道可謂千歲巳来不世出之盛美非常材之君拘牽常見者之所能及也以陛下之聦明叡聖有非常之大畧同符太祖則能任天下之材以定亂莫如太祖能継太祖之志以經武莫如陛下臣誠不自揆得太祖任将之一二竊嘗見扵斯文敢繕寫以献萬分之一或有以上當天心使西北守邉之臣用衆少而得筭多不益兵而東南之備足有助聖慮之纎芥以終臣前日之議惟陛下之所裁擇任将篇見本朝政要䇿貼黄五路城堡㩀逐次降下三班院窠名数目如此竊恐係舊来城堡自来属樞密院差遣後来逐度方降到窠名係三班院差人所以逐度数目加多惹雖是舊来城堡即五路二百七十餘城亦是立城太多元豊類藁卷之三十
