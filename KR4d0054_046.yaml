front:
  text: 元豐類藁卷之四十六
  hash: sha256:7327a010bb3506485e5593c4f1d6e77b772b15be808c91d977e34dc87da88bff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_046-1a}
body:
  text: 志銘亡兄墓志銘君姓曽氏諱曅字叔茂有智䇿能辨説其貫穿反復人莫有能屈之者身窮為生事或毛密應之無留而讀書理筆墨交賓客又思事未至當何如亦不廢也歡愈憂悲疾病行徒寢食之間書未嘗去目故自上古以來至今聖賢百氏騷人材士之作訓教警戒辨議識述下至浮夸詭異之文章莫不皆熟而于治亂興亡得失是非之際莫不能議焉其文章尤宏贍環麗可喜三代逺矣漢以來世有成事就功名之時則賢臣謀士材技之人同世並出常若有餘至時或無所用之則士雖往往有紀而亦不俱見於丗蓋堙窮頓委于巗播閭巷之中者豈少哉如君之材知辨博又其學如此使得用其意于乎其施設必有異焉然卒不克見于世蓋亦豈非其命也夫君年四十有五皇祐五年以進士試于廷不中得疾歸卒江州祖諱某尚書户部郎中贈右諌議大夫考諱某故太常博士娶李氏子曰覺曰黌女二人卒之歲十二月某日葬建昌軍南豐縣之某鄉某原某里也弟鞏為某銘曰丗或須人中士為材有非其應聖不能諧故君之學于已為足而材與丗為乖刻銘幽石維以告哀故髙郵主簿朱君墓志銘君諱某字齊卿姓朱氏其先家于彭城五代之亂徙于淮南今為淮南人曽祖某不仕祖某贈刑部尚書父某贈殿中丞君嘗試于祕書省校書郎蘇州之長洲尉髙郵軍之髙郵主簿以卒卒時乾興元年六月十九日也後卒之若于年其子象之東之升之延之奉君之喪葬天長縣之秦蘭里于是時象之某官東之某官以材名餘皆為士某官以書命鞏曰子其為我銘之而以狀言公之為人有智計喜施與少從師學問巳而捨學業其家家之食口數百仰于君君能資之皆出乎衣食嫁娶皆有餘法殿中之弟工部侍郎巽𥘉舉進士數困𣣔不復往君勸之曰第行無以廢為念故侍郎得曲就其志至為逹官大其家後卒官君既居官以材稱其為身務于廉臨獄訟務為恕毋某氏旌德縣太君娶耿氏又娶賈氏女歸太常博士吳祥栁州馬平知縣陳許池州推官李樞其季歸于曽氏某之先君博士也舅氏實命鞏銘其敢辭銘曰推心于家其愛巳孚用力于官蓋以其餘得官于晚夀五十四故不大顯以極其志江都縣主簿王君夫人曽氏墓志銘試校書郎揚州江都縣主簿王無咎妻曽氏建昌南豐人先君博士苐二女也孝愛聰明能讀書言古今知婦人法度之事巧針縷刀尺經手皆絶倫先君選其壻于里中以歸王氏王氏家故貧曽氏為冡婦而其姑蚤世獨任家政能精力躬勞苦理細微隨先後緩急為撙節各有條序有事于時節朝夕共賓祭奉飬撫其門內皆不失所時將以恭嚴誠順能得其屬人其舅喜曰吾不以家為恤矣其夫歎曰我能一意自肆于官學不以私纍其志曽氏助我也生二女年三十有三嘉祐四年五月三日以疾卒十二月葬建昌南城曹大考尚書水部貟外郎諱仁旺大考右諌議大夫諱致堯先君太常博士諱易占將葬江都告其兄鞏使志其墓天乎吾哭伯姊姑踰期又哭吾妹而志之其可哀也巳其可哀也巳鄆州平隂縣主簿關君妻曽氏墓表鄆州平隂縣主簿關君景暉娶姓曽氏建昌南豐人尚書水部貟外郎諱某之曽孫尚書戶部郎中直史館贈右諌議大夫諱某之孫太常博士諱某之女而鞏之長妹也始吾妹為兒時育于祖夫人巳不好戲弄及長喜讀書于女工之事不教而自能為人進退容止皆有法度人罕見其喜愠之色內外屬皆嚴重之性儉素于紛華盛麗之際無所好其在父毋及夫之家或𬞞食不給處之晏然其推之于人雖資身之物不為秋毫顧惜計也其治女事尤勤雖勞不厭治家人之業雖煩細皆有條理飬父母姑舅皆至孝姑久疾晝夜候省未嘗須臾去其側藥食非親調不以進其于內外屬親疏皆盡恩意人皆以謂宜富貴夀考而卒不得至其所宜有嗚呼其豈非命也歟嘉祐二年鞏與二弟得進士第南歸而吾妹從景暉視余于淮南至真州得疾七月某日卒于余之舟中年三十有二矣有女一人曰某始五歲景暉以其喪歸六年十月丁酉葬于杭州錢塘縣履泰鄉龍井原景暉之王考諱某考諱某皆尚書職方貟外郎而越之山隂人也吾妹既殁之六年景暉得進士第于是時𬒳命余校史館書籍皆會京師而余于其間再哭妹又哭女與哭妻憂患之接于余者可謂多矣景暉之始葬吾妹也來請銘不及余與之皆恨焉而其會京師以歸也乃為之書吾妹之事以遺之而使表之於其墓上故太常博士吳君墓碣君諱祥字某始吳氏事宋為太常博士年六十二某年某月某日以官卒于家卒之若干日葬真州楊子縣之某鄉某原𥘉君從進士試屢不中年四十餘始中第為吉州軍事推官歸以選為開封府開封縣丞大臣稱其材遂為祕書省著作佐郎知考城縣又知河中府之龍門縣再遷為博士知蘄州之蘄水縣父喪隂朝京師疾作遂求歸真州真州君家也𥘉君之屢斥于進士也既自力學問充其業又率其弟務刻苦養其親入其門內尊安其卑卑慕其尊一時皆稱之及從事于吉州弟已死君夫婦痛自節衣食遂能嫁其孤女若干人皆不失所時其在開封衣食常不自足而親戚舊故之至京師者多以君為歸其喪父也以家之有無葬故葬不緩親戚或憂其貧𣣔出錢為基扯謂君一強可以取其贏君歟曰吾不敏既位于朝貧吾素也喪乃𣣔為利乎平居恂恂不與犯者校及其自守人亦不能移也官歸常僦屋以居既卒幾不能葬曽大父某大父某父某以君之恩為大理評事妣某氏某縣太君太君之喪君致其哀有過人者妻朱氏某縣君余姨也有助于君子曰某女嫁毫州觀察推官張天經既葬某為碣于墓而與天經來乞銘于鞏天經以材名人皆曰其尚能存君之家者銘曰維吾先君太王之嫡禪聖圖民于東竄迹其後孔蕃以國為氏君紹厥宗其德則類儉著于家勤著于身不苟其贏卒死于貧維時之人命士大夫縞冠素蓋爭利于塗曽不君慕顧或笑之非彼可議維世足欷較于銘章君有則多以遺其孥非厚如何知處州青田縣朱君夫人戴氏墓志銘知處州青田縣事天長朱君諱某之夫人曰髙郵戴氏年七十有七治平元年九月庚午以疾卒于楚州監倉之官舍某年某月某甲子葬于天長之某鄉某原夫人之考諱奎娶徐氏女夫婦皆有善行聞于其鄉夫人受教于始笄從事于既嫁小而行修於身老而教行于家故父母曰不遺吾憂舅姑曰能順吾志夫受其助子賴以成其平居深靜有儀法不忘笑言就之色莊而氣仁居貧自薄衣食而厚于施與屬人之孤女為收嫁者蓋二人云既老矣女事不廢而婦容益恭雖少者有不及也有子四人曰某曰某曰某早卒某某州録事參軍監楚州裝缷米倉某衢州西安縣令皆及進士苐好古而有文夫人于某外叔祖母也故舅氏屬以銘銘曰淑哉戴氏青田之助允直且仁蓄德于身為下肅祗為上惠慈安意處貧薄已𥙿人其承有子以文起仕委髮垂領享有多慶卜壤之良乃兆新堂刻此幽文美實長存亡姪韶州軍事判官墓志銘用石本校覺姓曽氏吾兄之子也吾先人六子吾兄諱曄為最長有材而不試以死覺自少則勵志力學問知道理善于屬文及長慨然慕有為于世不肯碌碌為人恭謹循循寡言治平二年及進士苐為吉州司法參軍有能吏名用薦者為韶州軍事判官行至虔州得疾卒于驛舍熙寧三年十一月巳丑日也年三十有七覺字道濟建昌軍南豐人皇考諱致堯太常博士曽皇考諱易占尚書户部郎中直史館贈右諌議大夫覺毋李氏妻鄧氏憂氏范氏有子修偃熙寧四年八月壬申葬于南豐龍池鄉之源頭吾哀其若將有成也而止于斯故為銘其墓曰德纍則厚方濟而隕材引則逹未試而泯志氣不獲誰云非閔墓石有文尚永來信光祿少卿眺公墓志銘公姓朝氏其家先濟州之巨野今為開封祥符人皇考諱遘尚書駕部貟外郎贈開府儀同三司吏部尚書皇祖佺贈太傅皇曽祖諱憲贈某官公諱宗格字丗恭少以丗父太子少保贈某官諡文元諱逈恩輔將作監簿十四遷至光祿少卿歷監單州應天府酒稅知蘇州之常熟婺州之蘭溪縣事通判安州杭州事知通州虔州提點廣南東路刑獄公事又知信州泉州享年六十有三熙寧二年某月某甲子卒于官四年某月某甲子與其夫人某縣君閭丘氏合葬于杭州江都縣之廣陵鄉公為人樂易慈恕寡言笑人不見其喜怒遇事果于有為人亦罕能及者其為常熟修學校理溝防人賴其利為蘭溪繩姦字窮境內和洽通判安州安州政待公而決通判杭州州將矜已自肆上下莫能變公徐與之論可否語平而氣和將畏且從也繇是上下倚公以治至今杭人稱之其為虔州州近鹽多盜與訟公至修弛廢督姦疆威信盛行盜不敢發而獄無繫囚及在廣南其用法常寬而𣣔人自避曰治有先後緩急者謂此也其視部吏孜孜恐失一善而惡人亦莫敢犯公法其為通判如廣南為信州泉州如度州所至人皆安公之政而去常思之蓋公之行已居官而見於事者如此而其大抵則于仁厚最隆也母張氐夀安縣太君子男二人曰仲景海州司理參軍曰仲孺試將作監主簿孫男三人曰端復曰端嚴皆太廟齋郎曰某未仕也女六人長適太常博士集賢校理曽鞏銘公墓者也次適某官劉某某官高元振某官燕若濟今存惟燕氏婦餘早世閭丘夫人為身治家皆應儀度卒于公殁之明年某月某甲子公殁家無餘財而仲景仲孺皆謹厚自刻勵能世其先人于是又知公之教行于其家也銘曰眺世來西大有文元有卿有公繼屬綿綿曰卿謂誰時維光祿作其德音先于外服其光伊何有善自身匪飾匪雕璞玉之純治有恩威時其張弛彼畏此懷吾寧一理于虔于泉于領之南里安户優罔有不咸宜夀而昌胡不百齡尚兹介祉維後之成夫人曽氏墓志銘夫人吾從女兄也姓曽氏沈靜謹約不妄笑言遇人一以恕于其內外屬之間孝友慈順無不當于理故與之處者皆愛哭其死者皆哀嗚呼為女如是足以知其賢又足以知吾之祖考以來教行于其家也夫人考諱某皇考諱某尚書户部郎中直史館贈右諌議大夫曽王考謀某尚書水部貟外郎建昌軍南豐人夫人嫁為同縣朱君某之妻有子曰某曰某軾以文行稱于鄉有孫曰京曰彥京為真州司法參軍亳州教授夫人享年若于某年某月某甲子卒于寢某年某月某甲子葬于南豐之某鄉某原將葬軾以書來請鉻余曰銘莫如余宜為乃為其辭曰女德在幽而始人倫詩有顯揚以立生民尚類于古淑為夫人壷有彛則仔齊以身曽不蕃寵卑其子孫曽不遐年善則長存維仲薦美列辭墓門天長朱君墓志銘君姓朱氏諱延之字某其先彭城人今家于揚州之天長縣曽祖某贈尚書右㒒射祖某贈尚書工部侍郎考某贈太子中舍母賈氏某縣太君君年若干卒于熙寧六年六月之丙申葬于某年某月之某甲子其墓在天長之同人鄉秦蘭里君聰明敏悟少力學問為文章數就進士試不合乃嘆曰與其屈于人孰若肆吾志哉因不復言仕方是時朱氏丗以仕宦顯于淮南君居其家尤孝謹慈良然與人非其意不肯苟合既果于自為而其治見于家者規畫纎悉備具推之知其可任以事然卒于無所遇君亦未嘗不自得也君少孤飬母母之父死歲久其喪寓于逺貧不能歸也君居窮經營卒能使之返葬及晚而饒財又能樂賑施人以此多君之君娶沈氏諌議大夫立之女早卒再娶王氏殿中丞鼎臣之女子男四人寅萬廣寓皆有學行女五人許嫁進士滿希逺太廟齋郎馬某餘尚幼君余舅也故為之銘其墓其辝曰勢不云泰志則非屯彼轂之丹豈易吾仁廪有餘粟及里與鄰藏有圖書遺其子孫已則無憾尚卑後人識美幽堂日逺彌新祕書省著作佐郎致仕曽君墓志銘君姓曽氏諱庠字明叔建昌軍南豐縣人曽祖諱某尚書水部貟外郎祖諱某尚書戶部郎中直史館贈右諌議大夫考諱某舒州軍事推官君進士及苐𩔶邵州司理參軍用薦者為衡州常寧縣令福州福清縣丞以疾自陳遷祕書省著作佐郎致仕卒於熙寧九年十月某甲子年五十有九以其年十一月某甲子葬南豐龍池鄉之源頭母吳氏妻黃氏朱氏有子曰擴曰某曰某女四人君少孤自感勵好學能文章為人聰明敏逹喜事有大志不肯少屈為吏以材稱治獄能盡其情為令丞易敝興壞綱紀具修吏不敢犯而民安之也有聲顯聞薦者自許得人不幸不夀不克盡其用將葬擴來告曰願有紀也乃為其銘曰發其華見于文收其實見于事于其小綽有聞于其卓屈不試尚不沒慰後昆矢以辭列幽隧亡妻宜興縣君文柔朝氏墓志銘文柔姓眺氏諱德儀字文柔年十有八嫁令人時苦貧良口衆文柔食菲衣敝自若也事姑遇內外屬人無長少逺近各盡其意仁孝慈恕人有所不能及於􅌨珥衣服親屬人所無輒推與之不待巳足于燕私未嘗見其惰容于與人居未嘗見其喜愠折意降色約巳以法度學士大夫有所不能也為人聰明于事迎見立解無不盡其理其槩可見者如此蓋天卑之德而天其年遺以相余而李之蚤余不知其所以而又不自知其哭之之慟也文柔以嘉祐七年二月甲子卒于京師年二十有六余時校史館書熙寧四年追封宜興縣君十年二月庚申葬于建昌軍南豐縣龍池鄉之源頭余時為洪州文柔有子男曰綰太廟齋郎曰綜未仕也女慶老三歲而死眺氏世家澶州清豐縣今為開封府祥符縣人文柔曽祖佺贈太師中書令祖遘尚書駕部貟外郎贈開府儀同三司吏部尚書考宗恪光祿少卿余南豐曽鞏子固也銘曰人孰不貴子逢其窮丗誰不夀子惟其凶維德日躋生不見其止維聲日逺殁不見其終子能自得懟者在人遺以輔余曽不逡巡歲云其逝豫悲孔新其孰昭之瑑此幽珉亡弟湘潭縣主簿子翊墓志銘熙寧十年春豫蒙恩豫告葬其弟子翊于南豐維子翊姓曽氏諱宰字子翊世魯人今家建昌軍之南豐子翊少力學六藝百子史氏記鍾律地理傳注箋疏史篇文字目覽口誦乎抄日常數千言乎抄書連榻纍笥不能容于其是非治亂之意既巳通至于法制度數造物立器解名釋象聲音訓詁纎息委曲貫穿旁羅無不極其説且老未嘗易意其為文馳騁反復能傳其學為人質直孝弟抑畏小心少年飲酒歌呼饒樂放縱之事未嘗一接焉其學行如此于丗用冝如何也然位不過主簿夀止于四十七其非可哀也夫子翊嘉祐六年進士及第歷舒州司戶參軍潭州湘潭縣主簿所居官理其去人思之其學于古者蓋未嘗試也有子經綬純約女適饒州軍事判官曺唐弼次尚幼也曽祖諱某尚書水部員外郎祖諱某尚書户部郎中直史館贈右諌議大夫考諱某太常博士贈尚書都官員外郎先大夫人吳氏吳興郡太君今太夫人朱氏南昌郡太君妻張氏子翊熙寧元年四月乙巳卒于湘潭十年三月庚申葬于南豐龍池鄉之源頭銘曰好學不倦以及其詳力行不巳亦蹈其常見于遺文華衮之章含其淳德璞玉之良于舒于潭非試其有方疆而盡又奪其夀畜而不施則既巳矣潛而益明尚監于此曽氏女墓志銘先君太常博士贈尚書都官員外郎曽公之第八女諱德耀字淑明生而慧淑于女工不學而能于孝愛天成也生二十歲許嫁大理寺丞王幾行有日矣嘉祐六年九月戊寅以疾卒于京師熙寧十年三月壬申葬南豐之源頭其兄鞏為銘曰孰訛爾質而伐其成尚千萬年爾室之寧二女墓志銘南豐曽氏葬其二女其父鞏為志曰豫校書史館凡九年喪女弟喪妻眺氏及二女余窮居京師無上下之交而悲哀之數如此二女曰慶老吾妻眺氏出也生三歲而夭實嘉祐六年十一月壬申方是時吾妻眺氏病巳革慶老疾未作之夕省其母勉慰如成人中夕而疾作遂不救蓋若與其母訣也曰興老吾繼室李氏出也卒時始二歲實治平三年九月甲寅是時余方鎖宿景德寺試國子監進士不得視其疾臨其死也二女生而值豫之窮多故其不幸又夭以死所謂命非邪熙寧十年豫為洪州始以三月庚申瘞二女于南豐之源頭同穴慶老在右興老在左是為志仙源縣君曽氏墓志銘吾姝十人其一蚤夭吾既孤而貧有妹九人皆未嫁大懼失其時又懼不得其所歸賴先人遺休嫁之皆以時所嫁之者皆良士謂宜皆夀而昌以延光榮于父母家也而十餘年間死者四人先人之盛德也吾妹之懿也曽不章顯于世而夭吾故不知夫哭之之慟也諱德操字淑文者吾之苐九妹也嫁江都王氏為殿中丞贈尚書屯田貟外郎諱某之子婦殿中丞幾之妻封仙源縣君為人柔嫕靜顓動止以儀度平居溫溫一言笑不妄也與人群居自處者常取其後與人共衣食自與者常取其薄王氏故貧垢衣菲食未嘗以為歉恭大慈小輔其夫以義無不得其宜者不幸年三十有一以死有子男二人曰某曰某女二人皆幼也曽氏其先魯人今家建昌軍之南豐吾妹為尚書户部郎中直史館贈右諌議大夫諱某之孫女太常博士贈尚書都官郎中諱某之女卒于熙寧七年三月庚子葬于揚州江都縣東興鄉元豐四年某月某甲子也銘曰既艱其生又不介之夀維篤于仁尚克臧厥後元豐類藁卷之四十六
