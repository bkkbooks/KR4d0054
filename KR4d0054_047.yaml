front:
  text: 元豊類藁卷之四十七
  hash: sha256:3d4208e19c13c2b8fb959bbdece493770e61f89fd3ca02b8e58ddfd5d644b115
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_047-1a}
body:
  text: 碑太子賔客致仕陳公神道碑銘太子賔客致仕陳公既葬其孤𥅆與其宗親属人謀曰公殁所以原大追功既有大史之狀幽宅之銘維墓道有碑可以明者公之休徳遺澤章眎萬世以假寵陳氏之子孫扵無窮而其辭未立扵誼謂何廼相與来請扵余余辞不能既不獲廼論具公胄出位序行治之實以為碑辭而屬之以銘其辭曰惟陳氏其先虞舜之後封扵陳春秋時陳㓕入楚其子孫以國為氏世為顯姓見扵記錄至公之先始家南康軍之星子至公又家江州之徳化曰知公曽相考也曰旁璩公祖考也曰累贈礼部尚書俊公考也公諱㢲字公順祥符八年進士及第歴常州團練推官盗有棄財走者公以謂不應死通判不肯用公言是時公起家少年及遇事堅爭不可奪其守老吏皆驚盗卒不得死以尚晝憂去位服除𥙷武安軍節度推官侍御史李偕守武安事倚公决州頼以治轉運使陳從易以公爲材獄有乆不决者皆属公治之凢治二十四獄人皆服其平以皇妣嘉興郡太君馮氏憂去位服除𥙷岳州軍事判官舉監潭州茶米倉天聖𥘉潭州筡課視景徳虧十之六公謹扵䋲吏而果扵去民之所素不便者茶視舊課嵗増九百萬斤用薦者改祕書省者作佐郎知言州廬陵縣廬陵人喜闘訟械繫常充縣庭公除其害政者人心大変月餘囹圄空虚而人自得田里之間樞宻副使姜遵嘗為廬陵民便之至是有前姜後陳之諺移知資州資陽縣遷秘書氶用薦者通判戎州州将武人以州任屬公民夷恱附政以大和遷太常愽士尚書屯田員外郎通判潭州溪洞諸蠻犯約知州事劉夔劉沆繼出行邊公實捴州任内脩民事外奉師費凢輸粟帛金錢四十有八萬兵械稱之用足扵軍而賦役不加扵民沆及荆南士居白岳州滕宗亮與湖南北部使凢十有二人請即用公為轉運判官㑹轉運判官廢故不行遷都官員外郎知撫州㤙信行部中奸疆優服貧細得其職遷職方員外郎明堂㤙遷屯田郎中賜服金紫去知安州以寛静順其俗教民通溝洫趨農桑遷都官郎中知蜀州大興學校遷職方郎中太常少卿知蘄州居半歳以目疾請老遷光禄郷致仕始家江州英宗即位遷秘書監今上即位遷太子賔客公少長閭巷䏻自感彂疆志力學為進士一出遂收其科為吏明悟敏捷見義敢為不少屈以求合盖從事扵州郡乆之不進而其志彌厲其治扵惡人無所貸至其過失則無所不容而扵善人惟恐失其所也遇人豁然不為畦疃扵其所長未嘗不薦藉成就之扵其急難與貧不䏻自存者未甞不賑而助之公既好斈至扵聲音星暦之伎無所不知及退而自休日有脕長書省廼賔宫朝寵則日躋身焉逍遥世狠而争公𥙿有之世惴而持公恬處之公有賔事鼓瑟吹竽公退燕私左詩右書年則大耄氣盖坐人笑談待終曽不頻呻有歸墓隧豊啤螭首勤辭告休尚慰爾後祕書少監贈吏部尚書陳公神道碑銘祥符九年九月甲辰祕書少監知廣州陳公卒于位以聞天子官其二子以慰寵其家天聖中今天子修先帝功臣記之于史而太史考公之謀議勞烈扵朝訪公之世族州里官次行治之本末於家以書于冊巳又有詔次其功著之令典布之天下曰維所以寵嘉陳氏之子孫者其世世無絶嘉祐三年公子三人謀曰吾先人之所既立記徳之史蔵于有司喪公之䛇傳于天下維墓有碑後嗣所以載吾先人之休聲美實而乆廢不立懼無以飾其子孫于千萬世以為巳羞則相與来乞銘文以刻扵石其叙曰維陳氏其先逺岀扵舜至周武王之時陳為舜後媯滿之封國至春秌之際楚㓕陳而子孫之散亡者因為氏姓其後居長葛者岀扵漢太丘令寔之後唐之晚長葛之陳氏徙南劒州之沙縣公諱世卿字光逺南劒州沙縣人也曽太父㫤大父昻父文餘公貴贈其父尚書駕部員外郎公為兒時書木葉為詩其父見之大驚遂始學書以篤志聞扵人中雍熈二年進士為衡州軍事推官改静安軍莭度推官王小波李順盗蜀州縣多不䏻保東圍静安公應変為箭笴兵械城守之具百餘萬約其属分城守之圍既乆不解分城者疑懼意懈岀語動公公以義譙数勉之而間謂州長張雍日此属留之則潰人心縱之使求外兵則兩全雍聴其言盗数萬人圍静安八十日公奮勵距敵射其禆将一人應手死又射至数百人無不輙死盗以故不敢迫而外兵来救乃卒觧静安之圍事聞即其軍以公為掌書記父䘮不許去官自宋興小吏勢盗起徃徃轉棕数百千里吏輙棄城走及公之保静安則若吏力皆可以有為者然公之扵此時盖亦以無為有以少勝衆此材智烈丈夫之所為小拘常見之人亦安能責其此出哉公在静安七年還為秘書郎真宗即位召公𣣔以𥙷御史而張鑑守廣州乞公自助乃以公與鑑累遷尚書度攴員外郎賜緋衣銀魚歴河南府新安縣通判廣州知建州改福建路轉運使又改兩淅入判三司勾院復為荆湖北路轉運使澧州諸蠻奪澧旁地耕守数縦兵入盗積十餘歲莫䏻却公至諸蠻畏恱皆還就溪洞而㱕故所掠地與人公因築武陵澧川三塞以備蛮䛇書嘉奨公去乆之而後吏不能善蛮蛮亦輙復入盗天子問公前所以服蛮者何為而今将治之者何出公具對而刋其藁世故莫知其何術也公在荆湖歲餘擢為秘書少監知廣州賜金𬗋服至則罷計口鬻塩人以休息海外國来献多人徒以食縣官而徃徃皆射利扵中國也天子問公所以綱理之者公以謂以國之小大裁其使員授官之多少通其公献而征其私貨可以息弊止煩從之居南海四年未及召而得疾享年六十有四某年某月某甲子葬于沙縣之龍山郷崇仁里母夫人某氏某縣君継母夫人蕭氏某縣君夫人羅氏某縣君子五人曰儼尚書比部員外郎曰侃福州古田縣尉曰佩衛尉寺丞曰偉同學究出身曰偁殿中丞佩偉皆早世而儼偁之進于朝累贈公吏部尚書公事継母行純䔍其進饍飲薬物必經手其執丧人恐其不勝哀也遺戒諸子皆人之大莭好振人之窮楽奨人之善所薦士後多至大官宰相張士遜公所薦也公常以謂我之所以自著者在行事故不必見扵文章所以事上者不求人知故其扵謀議尤多而人罕得而知也噫其可謂自信特立也巳其銘曰允淑陳公生知書學人就其華我居以樸盗驚西土公在圍城隣有破亡公守不傾徃眎蛮荆其得孰窺蛮耒受職若與爲期翼翼蜀州士全純白茫茫楚野人復耕織原念累功進位南伯内治何爲與人休息外治何爲賔柔荒國允淑陳公文武之特聲載于人實告于冊又慰爾後刻銘墓石刑部郎中張府君神道碑府君諱保雍字粹之景徳二年舉進士中甲科授山隂主簿有䏻名提㸃刑獄皇甫選上其状拜大理評事監尉氏酒踰年知三泉用故事得假五品服專逹既至嘆曰吾常所𣣔為此㡬可試也縣以治聞就改寺丞乆之通判齊州李丞相迪鎮永興扳府君自賛遂通判其軍府李公去㓂菜公代之詔易府君鳯翔菜公雅知其賢因奏留之事有利害未嘗不争听乃止壐書奨之迁殿中丞錢思公惟演李三司士衡薦任佐益州避親嫌不拜授鄜州迁大常博士尋換晋州今上即位以屯田貟外郎緋衣銀魚知漢州夜中四卒叩府告禁兵兩营変佐吏駭軰入府府君徐出獨械四卒掠之趨作誣状徇两营以安之至明鞠得乃實四卒與伍中謀幸受巳甲捕两营囙自以為叛遂棄之市及謀者九人因奏言蜀戍兵乆合徃徃叛可因使臣去来畨代之行之至今擢拜都官還朝荘獻太后靣嘉之聮拜職方度攴判官契丹囯信使荆湖北路轉運章服金紫有馮異以化黄金干太后得奉職監鄂州稅知州歐陽頴事之曲恭武昌置埸中市民炭常時吏先署入抄文為足而實尚留民家不入比漕發乃直取載之以為故頴暴又𣣔資異謀使按之坐盗死者十八人當論府君自荆南乗單舡六日夜入鄂直之笞守吏数人而已同時漢陽俚民販茶得知軍駱與京誣民忤廵檢應首死者二十人随者百餘人與京暴甚頴人莫敢相曲直府君遂乱江徃慮之二十人者得不死随者皆貫漢陽距江為城潦至隄輙毁歲調薪石發民完之工四千人两縣以病府君身省護作者工費半隄完至今遷祠部郎中滿歲更两浙轉運使加刑部行部至婺刺得其守罪留治之未既疾作遂不起明道二年九月五日也享年五十九歲以景祐二年八月壬申葬汝南宣猷郷之先塋張氏世為顯姓府君先居齊之禹城及考諱制官至庫部員外郎贈吏部侍郎過蔡州樂之家焉府君娶彭城劉氏樞宻直斈士師道之姪封本縣君子㝎察彦博仕有治聲最少彦輔未仕府君之䘮朝廷以察為鄂州推官府君甚爱考城劉侍制劉亦厚結之子娶府君女慶暦三年彦愽為撫州司法為予言府君平生端重不忲燕間未嘗見其懈容為治威嚴不擿細事為漢州民趙昌以畫名府君迄代不問至劒門昌追献畫二幅曰前太守舉從昌取又應朝貴人求汲汲昌以技嘗自苦徳公不優敢献府君彊受之而㱕之直其使呉越呉越匠巧天下未嘗致一器一物歴問其治已雖小者如此立称其官次施設状如前而曰今史舘脩撰王質銘其徳扵壙中校書郎王安石又序其詩惟所必顯章扵墓道之左者其辭不立懼無以卑四方人視听請于文張之扵碑予不譲銘曰爲天下之道本諸得人公卿内膺諸侯部使者外治其體兩重也易知矣今常患材難不足布此位故不能推其功惠及民豈世所謂賢天固嗇邪抑其求弗切耶盖宜放而登當取而遺其施爲繆然也如府君鍾材甚美而進也得其時自守及使緒行既卓矣使極其設修可勝言耶而止扵斯其可嗟也巳方今敝郡彫部相望如府君其又可思也已則凢蔡里之耊齔惡得不嚴其墓耶故朝散大夫尚書刑部郎中充天章閣待制兼侍讀上輕車都尉賜紫金魚袋孫公行状曽祖恕皇任愽州堂邑縣主簿贈太子中舍祖賁皇任尚書庫部郎中父從革皇贈尚書職方員外郎公諱甫字之翰天聖五年同學究岀身為蔡州汝陽縣主簿八年進士及第為華州觀察推官華州倉粟悪吏當負錢数百萬轉運使李紘以吏属公公令取斗粟舂之可棄者十纔居一二又試之亦然吏遂得弛負錢数十萬而巳紌以此多公薦之遷大理寺丞知綘州翼城縣樞宻直學士杜公衍奏知永興軍司録遷殿中丞樞密直學士張公逸奏監益州交子務遷太常博士慶暦二年杜公為樞密副使又薦之得試為秘閣校理三年改右正言知諌院因災異言應天所以譴告之意者在誠其行有其誠矣所以順天者在爱其民扵是遂請斥浮費岀宫女除别庫之私以寛賦歛𥘉李元旻反河西契丹亦以兵近邊謀棄約任事者扵西方益禁兵二十萬北方益土兵二十萬又益禁兵四十指揮及群盗張海郭邈山等劫京西江淮之間皆警是時巳更用大臣矣又令天下益禁兵公言曰天下所以大因者在浮費而浮費之廣者兵為甚今不能損又可益之邪且兵巳百萬矣不能止盜而但𣣔多兵豈可謂知先後㦲不報扵是極論古飬兵多少之利害以聞語詆大臣尤切既而保州有兵変朝廷賞先言者公以謂有先言者而樞密院不以時下不可以無責天子曰某吾方倚以治也不可使去位公猶固請議其罰邊将刘滬謀立水洛城與部署狄青尹洙議不合滬違其莭度遂立之青䓁械繋滬以聞公言曰城之所以蔽秦而通秦渭之援宜不廢其功而赦滬之輙遂從公議燕王薨大臣謂用不足𣣔緩葬公言曰燕王上之叔父葬不可以不如礼又言後宮事又言宰相罪當罷皆行其言上既罷宰相而用某為參知政事又言某不可任以政天子難之因求為外官而是時朋黨之議亦巳起大臣相次去位公上書論争語尤切巳而奉使契丹還迁右司諌知鄧州徙安州又徙江南東路轉運使又徙兩浙迁起居舍人尚書兵部員外郎改直史舘知陕府簡厨傳之費陕人安之鄰州歲時以酒相慶問公命儲别蔵備官用一不㱕扵巳至今遂為法徙晋州近臣過晋夜半叩城𣣔入公曰城有法吾不得獨私終不為開門徙河東轉運使賜金紫服入為三司度友副使輸物非土有者公為変其法使之代輸至和三年遷刑部郎中入天章閣為待制遂為河北都轉運使疾不行又兼侍讀嘉祐二年正月二十一日卒扵位公愽斈强記其氣温其貌如不䏻自持及與人言反覆經史上下千有餘年貫穿通治不可窺其際而退眎其家𥘉未嘗蓄書盖既讀之終身多不忘也其居官扵其大者既可知巳扵其小者亦皆盡其意云雖貴而衣食薄無妾媵不飾玩好不與酣樂治如也時從當世䖏士講評以為遂其好而客或造其席者與之言終日不能以勢利及也其扵人少合亦不求其詳所與之合亦不阿其意盖公與河南尹洙相友善而尤為杜丞相所知慶暦之間二三大臣又與同心任事然至扵論保州之変則所指者盖杜公非益兵之議則所詆者盖二三大臣至扵城水洛也又絀尹洙而申劉滬其不偏扵所好如此然巳而朋黨之議起大臣多𬒳逐公之争論尤切亦不自以為疑也噫可謂自信獨立矣可以觀公之行也所著唐史記五十七篇以謂巳之斈治亂得失之說具扵此可以觀公之志也公殁有䛇求其書公享年六十其先開封扶溝人至公之祖徙許之陽翟今為陽翟人毋李氏長安縣太君妻某氏某縣君子宜滑州觀察推官寔寘皆将作監主簿宜等以状耒属鞏謹序次其實可傳扵後世者如右謹狀元豊類藁卷之四十七
