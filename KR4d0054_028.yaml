front:
  text: 元豊類藁卷之二十八
  hash: sha256:fff57e7127f5a5dcb236fba4ca0fb7718f65b592f0575fac072418772d70583e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_028-1a}
body:
  text: 表謝熈寕五年暦日表進奏院遞到宣頭一道伏蒙聖㤙賜臣熈寕五年暦日壹卷者竊以振舉舊章推明新暦欲謹天時之正俾諧人事之宜藐是孤生與均寵錫中謝伏惟皇帝陛下力行大道惇叙彛倫贊天地而平四時理隂陽而成萬物爰兹頒朔咸暨有邦臣敢不深䆒土風詳求氣序躬勸耕桑之業輔成坯冶之仁仰望闕庭臣無任謝熈寕六年暦日表進奏院逓到宣頭一道熈寕六年暦日一卷賜臣收𬋩者一與外符之寄再蒙班暦之㤙乆矣去朝幸兹拜賜中謝竊以天地隂陽之動不得違時虫魚草木之生必皆有政故兹告朔宜布有邦伏惟皇帝陛下兢慎萬㡬恊諧五紀式謹王正之授俾知民事之常臣敢不動静詳觀夙宵祗奉庶召和平之氣用禆化育之仁臣不任謝熈寕七年暦曰表進奏院遞到宣頭一道賜臣熈寕七年暦日一本者顧慚孤拙與𬒳寵靈中謝竊以陶唐之定四時稽于暦象虞氏之齊七政審以璣衡盖求於天道者能盡其宜則施於人事者不違其序伏惟皇帝陛下聡明好古仁厚爱民深原制作之方務恊生成之理在於垂憲尤重頒正臣乆去闕庭逺臨藩服惟竭遵承之力庶符欽順之心臣不任謝熈寕八年暦日表進奏院逓到宣頭一道賜臣熈寕八年暦日一本者竊以治暦于中所以察天時之運動班正于外所以一王度之推行舉是彛章施于有土中謝伏惟皇帝陛下至仁不世盛徳無名恊五紀以遂群生合二儀而成萬化廼明告朔咸俾守藩臣敢不悉意䆒詳勵精遵奉庶盡承流之効俾無作亊之違仰望闕庭臣無任謝熈寕十年暦日表進奏院遞到宣一道熈寕十年暦日一卷賜臣者竊以推行歲時天道所以化育考正暦度人事所以財成故頒朔之舊章為守邦之先務伏惟皇帝陛下徳兼載燾仁及昆蟲軆履中和叙九疇而開物欽明象数齊七政以導民臣獲奉正正親承聖詔念闕庭之方逺藐然江上之身感星晷之屡新尚嘆周南之滯仰望旒扆臣不任謝元豊元年暦日表進奏院逓到宣一道賜臣元豊元年暦日一卷者一逺闕庭十移星暦顧凋零扵齒髮無報𥙷扵毫分中謝伏惟皇帝陛下叙大禹之九疇齊有虞之七政隂陽寒暑􆄧不若時草木昆虫舉皆遂性循用頒正之典寵詒分土之官臣幸備守藩預聞告朔去親方逺巳驚嵗月之新許國雖堅更嘆功名之晚惟軆在民之意庻禆及物之仁仰望冕旒臣不任謝元豊三年暦日表進奏院逓到宣一道賜臣元豊三年暦日一本者竊以脩人事者又也正時明天道者在於治厝爰從頒布俾一奉承中謝伏惟皇帝陛下則大居尊躰元凝命成六府三事之叙合志於虞遂八政五紀之宜同方扵禹是遵人統用謹王政獲以守邦預扵受朔勸豳土耕桑之業方務承流采尭民作息之歌庶知戴徳仰望旒扆臣不任進奉熈寕八年同天莭功徳䟽表伏遇皇帝同天莭臣預於本州天慶觀鷲嶺興化禅院大殿上建置道場一月日及設齊功徳䟽各一軸金鍍銀軸頭紅羅複封全上祝皇帝聖夀者竊以績禹撫期盖自天而開迹生啇肇祚實與世以為㱕故預託扵坏鎔皆永思扵戴燾中賀伏惟皇帝陛下性由仁義徳俻聖神維候紀於長贏属祥開扵震夙是敢致嚴道妙嚮意佛乗庶将不轉之心用献無疆之壽臣無任英宗實録院謝賜御筵表伏蒙聖慈以臣等編脩英宗皇帝實録令月十四日開局賜臣䓁御筵者方次舊聞巳叨優禮省循非稱慚負失容中謝伏以先帝功徳之殊将傳後世儒者文章之用正在此時猥以空踈誤當属任甫磨鉛而就職遽置醴以均㤙寵異群司幸踰素望此盖伏遇皇帝陛下永懐先烈務廣孝思故因始扵信書俾特封扵燕豆所懼不能名乾坤之至徳摹日月之大明上以副陛下顯親之心下以盡愚臣㱕美之志惟粗明扵書法庻少𥙷扵素餐臣䓁無任代皇太子免延安郡王第一表伏奉制命蒙㤙特授臣撿校太尉開府儀同三司充彰武軍莭度使進封延安郡王者寵踰扵徳愧甚扵荣輙露危誠仰干􅌖聴臣某誠惶誠恐頓首頓首竊以衮衣備物禮均土宰之崇土宇分封位列真王之貴非智能足以謀國勞烈足以及人属在休明詎容玷冐若臣者侗然固陋眇爾穉蒙雖甫逮勝衣習為容扵超拜而方思就傳頼齒學之漸磨庶㡬識古今之通方知國家之大躰施於為巳可以持循必也當官覬無違曠已叨分扵将鉞復誤假扵公圭虚冒鴻私未伸薄効敢圖奨渥荐及謭微視儀数扵三台超爵名扵五䓁既加真食仍益爰田固非録善而量䏻又異校劳而数最将安稱此自頋缺然而况皇帝陛下䖏父子之間常先義訓君臣之際每狥公言伏望察臣精懇之由衷不顧小嫌之反汗許還新命俯遂㣲情使臣得奉㝎省扵晨昏稍安㓜志報生成扵天地更待壮年臣無任代皇子免延安郡王第二表伏蒙聖慈以臣所上表陳乞蒙㤙授臣檢校太尉開府儀同三司充彰武軍莭度使進封延安郡王特賜批荅不允者輙布愚衷未回宸聴仰闚誨諭弥集兢慚臣某誠惶誠恐頓首頓首竊以明徳懿親在天功而有助隆名重噐爲國論之所歸然後材位不浮望實相稱若臣者夙依煦育生䖏深嚴雖無好弄之心甫逮垂髫之齒方圖講學知臣子之大方庶得周旋奉君親之素敎敢意靡縁績用荐𬒳寵靈遂兼将相之荣仍極王公之貴雖參諸邦典或故事之可循而質以人情實煩言之可畏頋兹冲昧尤積震惶伏况皇帝陛下新一代之㝷章草千年之流弊方循名而責課以官方而任人其扵明信賞之科必先扵近然則推至公之誼宜始扵臣惟特寝扵誤㤙可曲全扵拙分使乾坤之施不累扵私親則塵露之微庶㡬於報上臣不任代皇子延安郡王謝表伏奉制命除授臣檢校太尉開府儀同三司充彰武軍節度使進封延安郡王再奉表陳乞蒙賜批荅不允仍継来章者祗膺詔版弥積􅌤顔盖崇大扵宗藩以盛强扵帝室豈伊奨渥可假㓜冲中謝伏念臣噐匪夙成材無特異徒㱕依於鞠育毎親炙扵高明𣣔善在身忘髧髦之至弱知書可學慕佔畢之相從庶繇受敎扵童䝉覬獲成能扵壮大敢意攬攸司之宻啓循歴世之彛章寵以官儀軆均於丞弼殊其爵列秩右於公侯揣稱何堪踰涯巳其知隆名之難冒迫大號之旣行控避莫從震惶滋集此盖伏遇皇帝陛下心潜高厚智極精微推廣愛之仁以隆扵父子盖大公之義以䔍扵君臣故舊典之當行雖至親而莫間致兹異数猥及譾能臣敢不仰躰聖懐勤遵慈訓省躬擇術庻不蹈扵匪彛臨事知方或可收扵近用臣無任代皇子延安郡王謝皇太后表伏奉制命除授臣檢校大尉開府儀同三司充彰武軍莭度使進封延安郡王再奉表陳免蒙賜批荅不允仍断来章者竊以盛威儀扵宰路以重朝廷強形势扵宗藩用臨方夏宜兼奨渥属在親賢誤及㓜沖倍深兢㥏中謝伏念臣蒙休宸極託䕃慈闈未闚六甲之書甫在两髦之嵗揆材至薄曽無特異之資知善可選竊有自強之志巳塵高位愧乏㣲勞詎意仁㤙更崇命秩抗䓁威扵元宰躋爵列扵真王自頋空踈将安報稱此盖伏遇皇太后殿下輔成世敎隂厚人倫均至愛扵諸孫假餘光扵穉齒致兹異数猥被謭能敢不自勵童蒙嚮慕日新之益庶㡬壮大仰酬坤育之私臣不任代皇太子延安郡王謝皇后賤伏奉制命除授臣檢校太尉開府儀同三司充彰武軍節度使進封延安郡王再奉表陳免蒙賜批荅不允仍断来彰者異其㤙數兼将相之殊榮尊以爵名極王公之寵列雖優隆扵天属必攷察於人材假是㓜沖懼非宜稱臣某以感以懼叩頭伏念臣性非蚤悟學未少成徒依均飬之私甫及垂髫之始巳蒙休扵帝所獲備位於宗藩豈意慈憐更加襃進夫位崇者徳厚禄重者功高而臣無可録之劳能冒非常之禮秩此盖伏遇皇后殿下彌綸内治則象坤元惇鞠育之至仁推奨成之素志致兹渥澤誤及童䝉敢不盡子職之㣲勤無忘砥礪荅母儀之大賜庶𥙷毫分謹奉稱謝以聞臣以感以懼叩頭謹牋代宋敏求知綘州謝到任表伏奉敕命差知綘州軍州事巳扵某月某日到任上訖備官無効竊寵過優尚聮清近之班仍獲安間之幸中謝伏念臣噐非閎逺性不敏明徒嗜好扵文章䆮推移扵嵗月濫名儒館接武朝紳與釐􅿞牧之蕃參莅神州之劇進聞邦計出假使符㑹仁祖之升遐圖信書之示後起於衰病寄以討論旋躋右史之華遂冐西垣之選惟兹典禮属在奉常猥用滯蒙首當揔領悉心謀慮雖務竭於愚忠妄意変通遂自乖扵素論寔干昭憲奚逭嚴科荷屈法以申㤙止奪官而𥙷外罪浮扵罰慙溢扵顔何僥冐之使然寔矜全之有自此盖伏遇皇帝陛下乾剛独断坤厚兼容躬親庻政而炤之以明付用群材而飬之以恕故俾兼榮扵近侍尚容竊食扵外邦仰戴生成将安補報敢不服勤夙夜期練逹扵政經延見吏民一作祗順簡書以一作誓布宣扵上徳庻收耒效少荅鴻私仰望闕庭臣無任代翰林侍讀學士錢藻遺表犬馬之質難駐於頽齡日月之光尚攀扵爱景臣藻誠悲誠哽頓首頓首伏念臣岀於悴族進以謏材文辭講說制䇿之科衆稱華選儒舘掖垣經帷之職世謂清塗獨徧竊扵美名盖親逢扵亨運至扵緫銓衡之要劇領京邑之浩煩蔑有勞能可論報稱冐寵靈而過厚致災疚以交攻迫霜露之所侵且将澌盡幸髪膚之無毀得以全歸方去闕庭長投泉壤輒陳遺志猶及能言伏頋皇帝陛下御六氣之和慎調興止享萬年之祚永庇華夷再念臣偷殘息之僅存覬餘㤙之可丐敢祈仁睿終賜矜憐臣有男進士皞孫男某親堂弟茂共岀寒郷稍親薄技葑菲不棄儻㣲禄之獲霑魚一作水菽可供庶㳺䰟之未餒伏望聖慈並扵文資内安排妄兹工澤愧在忘廉保存殁之孤縦託始終之大賜生而無益曽莫及於㘅環死或有知猶庻㡬於結草仰望旒戾臣不任代太平州知州謝到任表伏奉敕命差知太平州軍州事巳扵某月某日到任上訖惟此方彫瘵之舊属比歲凶飢之餘任在拊循懼無稱效中謝竊念臣受村不敏託势甚㣲竊郎位之寵名濫憲䑓之優選因蒙中詔獲備外邦方喜便於庭闈遽巳罹扵家禍苟全生理復齒班榮用乆次而得州以親嫌而易地低回積曰黽勉至官忽𬒳新㤙復還舊印江湖孤蹇之跡道路奔馳之劳甫兹即安敢忘盡瘁自惟蕞爾何以及兹兹盖伏遇尊號皇帝陛下日月之光旁照萬物天地之徳平施四方猥致妄庸誤蒙器使當力行扵寛恵上副至仁惟少假扵寵靈庶成薄効臣不任代太平州知州謝賜欽恤刑獄敕書表進奏院逓到敕一道賜臣欽恤刑獄者属在煩暑聖躬無倦扵焦勞言念繫囚㤙㫖遂加扵惻憫中謝伏惟尊號皇帝陛下繼祖宗之功徳體天地之生成發政施仁恐遺扵一物勝殘去殺思厝扵五刑謙不自專動遵故事眷幅貟之至廣軫囹圄之未空申明詔以丁寕飾守臣之撫視豈止奉行於時令固足感召扵人和臣與𬒳徳音當宣上意惟盡哀矜之理庻符欽恤之心臣無任元豊類藁卷之二十八
