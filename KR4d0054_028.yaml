front:
  text: 元豐類藁卷之二十八
  hash: sha256:ca5562c3c511e46f77acf728c16c8d60c8d3a69ede0784aef346e6f7b9f639fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_028-1a}
body:
  text: 表謝熙寧五年曆日表進奏院遞到宣頭一道伏蒙聖恩賜臣熙寧五年曆日一卷者竊以振舉舊章推明新曆欲謹天時之正俾諧人事之宜藐是孤生與均寵錫中謝伏惟皇帝陛下力行大道惇敘彛倫贊天地而平四時理隂陽而成萬物爰兹頒朔咸暨有邦臣敢不深究土風詳求氣序躬勸耕桑之業輔成坯冶之仁仰望闕庭臣無任謝熙寧六年曆日表進奏院遞到宣頭一道熙寧六年曆日一卷賜臣收𬋩者一與外符之寄再蒙班曆之恩久矣去朝幸兹拜賜中謝竊以天地隂陽之動不得違時蟲魚草木之生必皆有政故兹告朔宜布有邦伏惟皇帝陛下兢慎萬幾協諧五紀式謹王正之授俾知民事之常臣敢不動靜詳觀夙宵祗奉庶召和平之氣用禆化育之仁臣不任謝熙寧七年曆曰表進奏院遞到宣頭一道賜臣熙寧七年曆日一本者顧慚孤拙與𬒳寵靈中謝竊以陶唐之定四時稽于曆象虞氏之齊七政審以璣衡蓋求於天道者能盡其宜則施於人事者不違其序伏惟皇帝陛下聰明好古仁厚愛民深原制作之方務協生成之理在於垂憲尤重頒正臣久去闕庭逺臨藩服惟竭遵承之力庶符欽順之心臣不任謝熙寧八年曆日表進奏院遞到宣頭一道賜臣熙寧八年曆日一本者竊以治曆于中所以察天時之運動班正于外所以一王度之推行舉是彛章施于有土中謝伏惟皇帝陛下至仁不世盛德無名協五紀以遂群生合二儀而成萬化乃明告朔咸俾守藩臣敢不悉意究詳勵精遵奉庶盡承流之效俾無作事之違仰望闕庭臣無任謝熙寧十年曆日表進奏院遞到宣一道熙寧十年曆日一卷賜臣者竊以推行歲時天道所以化育考正曆度人事所以財成故頒朔之舊章為守邦之先務伏惟皇帝陛下德兼載燾仁及昆蟲體履中和敘九疇而開物欽明象數齊七政以導民臣獲奉正正親承聖詔念闕庭之方逺藐然江上之身感星晷之屢新尚嘆周南之滯仰望旒扆臣不任謝元豐元年曆日表進奏院遞到宣一道賜臣元豐元年曆日一卷者一逺闕庭十移星曆顧凋零于齒髮無報輔于毫分中謝伏惟皇帝陛下敘大禹之九疇齊有虞之七政隂陽寒暑􆄧不若時草木昆蟲舉皆遂性循用頒正之典寵詒分土之官臣幸備守藩預聞告朔去親方逺巳驚嵗月之新許國雖堅更嘆功名之晚惟體在民之意庶禆及物之仁仰望冕旒臣不任謝元豐三年曆日表進奏院遞到宣一道賜臣元豐三年曆日一本者竊以修人事者又也正時明天道者在於治厝爰從頒布俾一奉承中謝伏惟皇帝陛下則大居尊躰元凝命成六府三事之敘合志於虞遂八政五紀之宜同方于禹是遵人統用謹王政獲以守邦預于受朔勸豳土耕桑之業方務承流采堯民作息之歌庶知戴德仰望旒扆臣不任進奉熙寧八年同天莭功德疏表伏遇皇帝同天莭臣預於本州天慶觀鷲嶺興化禪院大殿上建置道場一月日及設齊功德疏各一軸金鍍銀軸頭紅羅復封全上祝皇帝聖夀者竊以績禹撫期蓋自天而開迹生啇肇祚實與世以為歸故預託于壞鎔皆永思于戴燾中賀伏惟皇帝陛下性由仁義德備聖神維候紀於長贏屬祥開于震夙是敢致嚴道妙嚮意佛乘庶將不轉之心用獻無疆之壽臣無任英宗實録院謝賜御筵表伏蒙聖慈以臣等編修英宗皇帝實録令月十四日開局賜臣等御筵者方次舊聞巳叨優禮省循非稱慚負失容中謝伏以先帝功德之殊將傳後世儒者文章之用正在此時猥以空踈誤當屬任甫磨鉛而就職遽置醴以均恩寵異群司幸踰素望此蓋伏遇皇帝陛下永懷先烈務廣孝思故因始于信書俾特封于燕豆所懼不能名乾坤之至德摹日月之大明上以副陛下顯親之心下以盡愚臣歸美之志惟粗明于書法庶少輔于素餐臣等無任代皇太子免延安郡王第一表伏奉制命蒙恩特授臣撿校太尉開府儀同三司充彰武軍莭度使進封延安郡王者寵踰于德愧甚于榮輒露危誠仰干􅌖聽臣某誠惶誠恐頓首頓首竊以衮衣備物禮均土宰之崇土宇分封位列真王之貴非智能足以謀國勞烈足以及人屬在休明詎容玷冒若臣者侗然固陋眇爾稚蒙雖甫逮勝衣習為容于超拜而方思就傳賴齒學之漸磨庶幾識古今之通方知國家之大躰施於為巳可以持循必也當官覬無違曠已叨分于將鉞復誤假于公圭虛冒鴻私未伸薄效敢圖奬渥荐及謭微視儀數于三台超爵名于五等既加真食仍益爰田固非録善而量能又異校勞而數最將安稱此自顧缺然而况皇帝陛下處父子之間常先義訓君臣之際每徇公言伏望察臣精懇之由衷不顧小嫌之反汗許還新命俯遂微情使臣得奉㝎省于晨昏稍安幼志報生成于天地更待壯年臣無任代皇子免延安郡王第二表伏蒙聖慈以臣所上表陳乞蒙恩授臣檢校太尉開府儀同三司充彰武軍莭度使進封延安郡王特賜批答不允者輒布愚衷未回宸聽仰窺誨諭彌集兢慚臣某誠惶誠恐頓首頓首竊以明德懿親在天功而有助隆名重器為國論之所歸然後材位不浮望實相稱若臣者夙依煦育生處深嚴雖無好弄之心甫逮垂髫之齒方圖講學知臣子之大方庶得周旋奉君親之素教敢意靡緣績用荐𬒳寵靈遂兼將相之榮仍極王公之貴雖參諸邦典或故事之可循而質以人情實煩言之可畏顧兹沖昧尤積震惶伏况皇帝陛下新一代之尋章草千年之流弊方循名而責課以官方而任人其于明信賞之科必先于近然則推至公之誼宜始于臣惟特寢于誤恩可曲全于拙分使乾坤之施不纍于私親則塵露之微庶幾於報上臣不任代皇子延安郡王謝表伏奉制命除授臣檢校太尉開府儀同三司充彰武軍節度使進封延安郡王再奉表陳乞蒙賜批答不允仍繼來章者祗膺詔版彌積􅌤顔蓋崇大于宗藩以盛強于帝室豈伊奬渥可假幼沖中謝伏念臣器匪夙成材無特異徒歸依於鞠育每親炙于高明𣣔善在身忘髧髦之至弱知書可學慕占畢之相從庶繇受教于童蒙覬獲成能于壯大敢意攬攸司之密啓循歷世之彛章寵以官儀體均於丞弼殊其爵列秩右於公侯揣稱何堪踰涯巳其知隆名之難冒迫大號之既行控避莫從震惶滋集此蓋伏遇皇帝陛下心潛高厚智極精微推廣愛之仁以隆于父子蓋大公之義以篤于君臣故舊典之當行雖至親而莫間致兹異數猥及譾能臣敢不仰躰聖懷勤遵慈訓省躬擇術庶不蹈于匪彛臨事知方或可收于近用臣無任代皇子延安郡王謝皇太后表伏奉制命除授臣檢校大尉開府儀同三司充彰武軍莭度使進封延安郡王再奉表陳免蒙賜批答不允仍斷來章者竊以盛威儀于宰路以重朝廷強形勢于宗藩用臨方夏宜兼奬渥屬在親賢誤及幼沖倍深兢㥏中謝伏念臣蒙休宸極託蔭慈闈未窺六甲之書甫在兩髦之嵗揆材至薄曽無特異之資知善可選竊有自強之志巳塵高位愧乏微勞詎意仁恩更崇命秩抗等威于元宰躋爵列于真王自顧空踈將安報稱此蓋伏遇皇太后殿下輔成世教隂厚人倫均至愛于諸孫假餘光于稚齒致兹異數猥被謭能敢不自勵童蒙嚮慕日新之益庶幾壯大仰酬坤育之私臣不任代皇太子延安郡王謝皇后賤伏奉制命除授臣檢校太尉開府儀同三司充彰武軍節度使進封延安郡王再奉表陳免蒙賜批答不允仍斷來彰者異其恩數兼將相之殊榮尊以爵名極王公之寵列雖優隆于天屬必考察於人材假是幼沖懼非宜稱臣某以感以懼叩頭伏念臣性非蚤悟學未少成徒依均飬之私甫及垂髫之始巳蒙休于帝所獲備位於宗藩豈意慈憐更加褒進夫位崇者德厚祿重者功高而臣無可録之勞能冒非常之禮秩此蓋伏遇皇后殿下彌綸內治則象坤元惇鞠育之至仁推奬成之素志致兹渥澤誤及童蒙敢不盡子職之微勤無忘砥礪答母儀之大賜庶輔毫分謹奉稱謝以聞臣以感以懼叩頭謹箋代宋敏求知綘州謝到任表伏奉敕命差知綘州軍州事巳于某月某日到任上訖備官無效竊寵過優尚聮清近之班仍獲安間之幸中謝伏念臣器非閎逺性不敏明徒嗜好于文章䆮推移于嵗月濫名儒館接武朝紳與釐􅿞牧之蕃參蒞神州之劇進聞邦計出假使符會仁祖之升遐圖信書之示後起於衰病寄以討論旋躋右史之華遂冒西垣之選惟兹典禮屬在奉常猥用滯蒙首當揔領悉心謀慮雖務竭於愚忠妄意變通遂自乖于素論實干昭憲奚逭嚴科荷屈法以申恩止奪官而輔外罪浮于罰慙溢于顔何僥冒之使然實矜全之有自此蓋伏遇皇帝陛下乾剛獨斷坤厚兼容躬親庶政而照之以明付用群材而飬之以恕故俾兼榮于近侍尚容竊食于外邦仰戴生成將安補報敢不服勤夙夜期練逹于政經延見吏民一作祗順簡書以一作誓布宣于上德庶收耒效少答鴻私仰望闕庭臣無任代翰林侍讀學士錢藻遺表犬馬之質難駐於頽齡日月之光尚攀于愛景臣藻誠悲誠哽頓首頓首伏念臣出於悴族進以謏材文辭講説制䇿之科衆稱華選儒館掖垣經帷之職世謂清塗獨遍竊于美名蓋親逢于亨運至于總銓衡之要劇領京邑之浩煩蔑有勞能可論報稱冒寵靈而過厚致災疚以交攻迫霜露之所侵且將澌盡幸髮膚之無毀得以全歸方去闕庭長投泉壤輒陳遺志猶及能言伏顧皇帝陛下御六氣之和慎調興止享萬年之祚永庇華夷再念臣偷殘息之僅存覬餘恩之可丐敢祈仁睿終賜矜憐臣有男進士皞孫男某親堂弟茂共出寒鄉稍親薄技葑菲不棄儻微祿之獲霑魚一作水菽可供庶遊魂之未餒伏望聖慈並于文資內安排妄兹工澤愧在忘廉保存殁之孤縱託始終之大賜生而無益曽莫及於銜環死或有知猶庶幾於結草仰望旒戾臣不任代太平州知州謝到任表伏奉敕命差知太平州軍州事巳于某月某日到任上訖惟此方雕瘵之舊屬比歲凶飢之餘任在拊循懼無稱效中謝竊念臣受村不敏託勢甚微竊郎位之寵名濫憲臺之優選因蒙中詔獲備外邦方喜便於庭闈遽巳罹于家禍苟全生理復齒班榮用久次而得州以親嫌而易地低回積曰黽勉至官忽𬒳新恩復還舊印江湖孤蹇之迹道路奔馳之勞甫兹即安敢忘盡瘁自惟蕞爾何以及兹兹蓋伏遇尊號皇帝陛下日月之光旁照萬物天地之德平施四方猥致妄庸誤蒙器使當力行于寬惠上副至仁惟少假于寵靈庶成薄效臣不任代太平州知州謝賜欽恤刑獄敕書表進奏院遞到敕一道賜臣欽恤刑獄者屬在煩暑聖躬無倦于焦勞言念繫囚恩旨遂加于惻憫中謝伏惟尊號皇帝陛下繼祖宗之功德體天地之生成發政施仁恐遺于一物勝殘去殺思厝于五刑謙不自專動遵故事眷幅貟之至廣軫囹圄之未空申明詔以丁寧飾守臣之撫視豈止奉行於時令固足感召于人和臣與𬒳德音當宣上意惟盡哀矜之理庶符欽恤之心臣無任元豐類藁卷之二十八
