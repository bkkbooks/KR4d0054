body:
  text: 序序越州鑑湖圖鑑湖一曰南湖南並山北屬州城漕渠東西距江漢順帝永和五年會稽太守馬臻之所為也至今九百七十有五年矣其周三百五十有八里凡水之出于東南者皆委之州之東自城至于東江其北隄石撻二隂溝十有九通民田田之南屬漕渠北東面屬江者皆溉之州之東六十里自東城至子東江其南隄隂溝十有四通民田田之北扺漕渠南並山西並隄東屬江者皆溉之州之西三十里曰柯山斗門通民田田之東並城南並隄北濵漕渠西屬江者皆溉之揔之溉山隂會稽兩縣十四鄉之田九千頃非湖能溉田九千頃而巳蓋田之至江者盡于九千頃也其東曰曹娥斗門曰藁口斗門水之循南隄而東者由之以入于東江其西曰廣陵斗門曰新徑斗門水之循北隄而西者由之以入于西江其北曰朱儲斗門去湖最逺蓋因三江之上兩山之間疏為二門而以時視田中之水小溢則縱其一大溢則盡縱之使入于三江之口所謂湖高于田丈餘田又高海丈餘水少則泄湖溉田水多則泄田中水入海故無荒廢之田水旱之歲者也繇漢以來幾千載其利未嘗廢也宋興民始有盜湖為田者祥符之間二十七戶慶曆之問二戶為田田頃當是時三司轉運司猶下書切貴州縣使復田為湖然自此吏益慢法而姦民浸起至于治平之間盜湖為田者凡八千餘户為田七百餘頃而湖廢幾盡矣其僅存者東為漕渠自州至于東城六六里南通若耶溪自樵風涇至于桐嗚十里皆水廣不能十餘丈每歲少雨田未病而湖蓋已先涸矣自此以來人爭為計説蔣堂則謂宜有罰以禁侵耕有賞以開告者杜𣏌則謂盜湖為田者利在縱湖水一雨則放聲以動州縣而斗門輒彂故為之立石則水一在五雲橋水深八尺有五寸會稽主之一在跨湖橋橋水深四尺有五寸山隂主之而斗門之鑰使皆納于州水溢則遣官視則而謹其閉縱又以謂宜益理防隄斗門其敢田者拔其苗責其力以復湖而重其罰猶以為未也又以謂宜加兩縣之長以提舉之名課其督察而為之殿實吳奎則謂每歲農隙當僦人濬湖積其泥塗以為丘阜使縣主役而州與輒運使提點刑獄督挕賞罰之張次山則謂湖廢僅有存者難卒復宜益廣漕路及他便利處使可漕及住民田里置石柱以識之柱之內禁敢田者刀約則謂宜斥湖三之一與民為田而溢隄使高一丈則湖可不開而其利自復范師道施元長則謂重侵耕之禁猶不能使民無犯而斥湖與民則侵者孰禦又以湖水較之髙于城中之水或三尺有六寸或二尺有六寸而益隄壅水使高明水之敗城郭廬舍可必也張伯玉則謂日役五千人濬湖使至五尺當十五歲畢至三尺當九歲畢然恐工起之日浮議外搖役夫內漬則雖有智者猶不能畢其成若日役五千人益隄使髙八尺當一歲畢其竹木費凡九十二萬有三千計越之戶二十萬有六千賦之而復其租其勢易足如此則利可坐收而人不煩弊陳宗言趙誠復以水勢高下難之又以謂宜修吳奎之議以歲月復湖當是時都水善其言又以謂宜增賞罰之令其為説如此可謂博矣朝廷未嘗不聽用著于法故罰有自錢三百至于千有至于五萬刑有杖百至于徒二年其文可謂密矣然而田者不止而日愈多湖不加濬而日愈廢其故何哉法令不行而苟且之俗勝也昔謝靈運從宋文帝求會稽回踵湖為田太守孟顗不聽又求休崲湖為田顗又不聼靈運至以語詆之則利于請湖為田越之風俗舊矣然南湖繇漢歷吳晉以來椄于唐又接于錢鏐父子之有此州其利未嘗廢者彼或以區區之地當天下或以數州為鎮或以一國自王內有供養祿凛之須外有貢輸問遺之奉非得晏然而巳也故強水土之政以力本利農亦皆有數而錢鏐之法最詳至今尚多傳于人者則其利之不廢有以也近世則不然天下為一而安于承平之故在位者重舉事而樂因循而請湖為田者其語言氣力往往足以動人至于修水土之利則又費材動衆從古所難故鄭國之役以謂足以疲秦而西門豹之治鄴渠人亦以為煩若其故如此則吾之吏孰肯任難當之怨來易至之責以待未然之功乎故説雖傳而未嘗行法雖密而未嘗舉田者之所以日多湖之所以日廢繇是而巳故以為法令不行而苟且之俗勝者豈非然哉夫千歲之湖廢興利害較然易見然自慶曆以來三十餘年遭吏治之因循至于既廢而世猶莫窹其所以然况于事之隱微難得而考者繇苟簡之故而弛壞于冥冥之中又可知其所以然乎今謂湖不必復者曰湖田之入既饒矣此遊談之士為利于侵耕者言之也夫湖未盡廢則湖下之田旱此方今之害而衆人之所覩也使湖盡廢則湖之為田亦旱矣此將來之害而衆人之所未覩者故曰此遊誒之士為利于侵耕者言之而非實知利害者也謂湖不必濬者曰益隄壅水而巳此好辨之士為樂聞苟簡者言之者夫以地勢較之壅水使高必敗城郭此護者之所巳言也以地勢較之濬湖使下然後不失其舊不失其舊然後不失其宜此議者之所未言也又山隂之石則為四尺有五寸會稽之石則幾俉之壅水使高則會稽得尺山隂得半地之窪隆不並則益隄未為有輔也故曰此好辨之士為樂聞苟簡者言之而又非實知利害者也二者既不可用而𣣔禁侵耕開告者則有賞罰之法矣欲謹水之畜泄則有閉縱之法矣欲痛絶敢田者則投其苗責其力以復湖而重其罰又有法矣或欲任其責于州縣與轉運使提點刑獄或欲以每歲農隙濬湖或欲禁田石柱之內者又皆有法矣欲知濬湖之淺深用工若干為日幾何欲知增隄竹木之費幾何使之安出欲知濬湖之泥塗積之何所又巳計之矣欲知工起之日或浮議外搖役夫內潰則不可以必其成又巳論之矣誠能枚衆説而考其可否用其可者而以在我者潤澤之今言必行法必舉則何功之不可成何利之不可復哉鞏𥘉蒙恩通判此州問湖之廢興于人求有能言利害之實者及到官然後問啚于兩縣問書于州與何渠司至于參核之而圗成孰究之而書具然後利害之實明故為論次庶夫計議者有洘焉熙寧二年冬卧龍齋類要序晏元獻公出東南起童子入秋閣讀書遂贊各命入翰林為學士真宗特竉待之每進見勞問及所以任屬之者群臣莫能及皇太子就書學公以選入侍太子即皇帝位是為仁宗公遂管國樞要任政事位宰相其在朝廷五十餘年常以文學謀議為任所為賦頌銘碑制詔册命書奏議論之文傳天下尤長于詩天下皆呤誦之當真宗之卋天下無事方輯福應推功德修封禪及右土山川老子諸祠以報禮上下左右前後之臣非工儒學妙于語言能討論古今潤色太平之業者不能稱其位公于是時為學者宗天下慕其聲名人見公應于外者之不窮而不知公之得于內者何也及得公所為類要上中下秩揔七十四篇凡若于門皆公所乎抄乃知公于六藝太史百象之言騷人墨客之文章至于地志族譜佛老方伎之衆説旁及九州之外蠻夷荒忽詭變竒迹之序録皆披尋細繹而細于三萬物變化情偽是非興瓌之理顯隱細巨之委曲莫不究盡公之得于內者在此也公之所以光顯于世者有以哉觀公之所自致者如此則知士不素學而處從官大臣之列備文儒道德之任其能不餒且病乎此公之書所以為可傳也公之子知止能守其家者也以書屬余序余與公仕不並時然皆臨川人故為之論次以為公書其首相國寺維摩院聽琴序右者學士之于六藝射能弧矢之事矣又當善其揖讓之莭御能車馬之事矣入當善其驅馳之莭書非能肆筆而巳又當辨其體而皆通其意數非能布䇿而巳又當知其用而各盡其法而五禮之威儀至于三千六樂之莭文可謂微且多矣噫何其煩且勞如是然古之學者必能此亦可謂難矣然習其射御于禮習其于戈于樂則少于學長于朝其于武備固修矣其于家有孰於黨有庠于鄉有序于國有學于教有師于視聽言動有其容于衣冠飲食有其度几杖有鉻盤扞有戒在與有和鵉之聲行步有珮玉之音燕處有雅頌之樂而非其故琴瑟未嘗去于前也蓋其出入進退俯仰左右接于耳目動于四體逹于其心者所以飬之至如此其詳且密也雖然此尚為有侍于外者爾若夫三才萬物之理性命之際力學以求之深思以索之使知其要識其微齋戒以守之以書其才成其德至合于天地而后巳者又當得之于心夫豈非難哉噫古之學者其役之于內外以持其心飬其性者至于如此此君子所以愛日而自強不息以求至乎極也然其習之有素間之有具如此則求其放心伐其邪氣而成文武之材就道德之實者可謂易矣孔子曰興于詩立于禮成于樂蓋樂者所以感人之心而使之化故曰成于樂昔舜命夔典樂教胄子曰直而溫寬而栗剛而無雪簡而無傲則樂者非獨去邪又所以救其性之偏而納之中也故和鵉佩玉雅頌琴瑟之音非其故不去于前豈虛也哉今學士大夫之于持其身飬其性凡有待于外者皆不能具得之于內者又皆略其事可謂簡且易矣然所以求其放心伐其邪氣而成文武之材就道德之實者豈不難哉此豫所以懼不至于君子而入于小人也夫有待于外者余既力不足而于琴竊有志焉久矣然患其莫余授也治平三年夏得洪君于京師始合同舍之士聽其琴于相國寺之維摩院洪君之于琴非特能其音又能其意者也豫將就學焉故道豫之所慕古人者庶乎其有以自彂也同舍之士丁寶臣元珍鄭穆閎中孫覺莘老林希子中而豫曽鞏子固也洪君名規字方叔以文與吏事稱于世云張文叔文集序文叔姓張氏諱彥博蔡州汝陽人慶曆三年為撫州司法參軍余為之銘其父碑文叔又治其寢得嬰兒秃秃之遺骸葬之余為之志其事是時文叔年未三十喜從余問道理學為文章因與之遊至其為司法代去其後又三遇焉至今二十有六年矣文叔為袁州判官巳死其子仲偉集其遺文為四十卷自蘄春赱京師屬余序之余讀其書知文叔雖久窮而講道益明屬文益工其辭精深雅贍有過人者而比三遇之蓋未嘗為余出也又知文叔自進為甚強自待為甚重皆可喜也雖其遇于命者不至于富貴然比于富貴而功德不足以堪之姑為説以自恕者則文叔雖久窮亦何佷哉仲偉居撫時八九歲未丱始讀書就筆硯今儀觀甚偉文辭甚工有子復能讀書就筆硯矣則余其能不老乎既為之評其文而序之又辱道其父子事反復如此者所以致余情于故舊而又以見余之老也熙寧元年十二月十七日序館閣送錢純老知㜈州詩序熙寧三年三月尚書司封員外郎祕閣校理錢君純老出為㜈州三館祕閣同舍之士相與飲餞于城東佛舍之觀音院會者凡二十人純老亦重僚友之好而欲慰處者之思也乃為詩二十言以示坐者于是在席人各取其一言為韻賦詩以送之純老至州將刻之石而以書耒曰為我序之蓋朝廷常引天下儒學之士聚之館閣所以長飬其材而待上之用有出使于外者則其僚必相告語擇都城之中廣宇豐堂遊觀之勝約日皆會飲酒賦詩以敘去處之情而致綢繆之意歷世寢久以為故常其從路道義之樂蓋他司所無而其賦詩之所稱引况諭莫不道去者之義祝其歸仕于王朝而𣣔其久于外所以見士君子之風流習尚篤于相先非世俗之所能及又將待上之考信于此而以其彚進非空文而巳也純老以明經進士制䇿入等歷教國子生入館閣為編挍書籍校理撿討其文章學問有過人者宜在天子左右與訪問任獻納而顧請一州欲自試于川窮山阻僻絶之地其志莭之高又非凡才所及此賦詩者所以推其賢惜其志殷勤反復而不能巳余故為之序其大旨以發明士大夫之公論而與同舍視之使知純老之非父于外也十月日序齊州雜詩序齊故為文學之國然亦以朋比誇詐見于皆俗今其地富饒而介于河岱之間故又多獄訟而豪猾群黨亦往往喜相攻剽賊殺于時號難治余之疲駑束為是州除其姦強而振其弛壞去其疾苦而撫其善良未期囹圄多空而抱鼓幾熄歲又連熟州以無事故得與其士太天及四方之賔客以其暇日時遊後園或長軒繞榭登覽之觀屬思千里或美芰荷湖波渺然從舟上下雖病不飲酒而間為小詩以娛情寫物亦拙者之適也通儒大人或與余有舊欲取而視之亦不能隱而青鄆二學士又從而和之士之喜文辭者亦繼為此作總之九若于篇豈得以余文之陋而使夫宗工秀人雄放魂絶可喜之辭不大傳千此邦也故刻之石而并序之使覽者得詳鳥熙寧六年二月巳丑序順濟王敕書祝文刻石序臣鞏言世稱麟鳯龜龍王者之嘉瑞則蓋不常出而德有不能致者又稱麟鳯龜龍四靈以為畜則至治之卋蓋可狎而擾也故官有豢龍而劉纍以善其職事至夏之衰乃不能馴而或漦于庭至周卒為女禍蓋龍之為祥通千治亂如此伏惟陛下仁聖之德逹于淵泉故龍實來慕者何擾也其自今以往盛德日躋則必有遊子宮沼或負圖出河而且將領在有司群于羞物故臣敢刻敕書祝辭于石以俟臣鞏謹序敘盜盜三十人凡十五發繇孫仙而下盜吳慶船者殺人皆應斬盜朱縞船者贓重皆應絞九應死者十有八人繇湯慶而下或贓輕或竊盜或常自言凡應徒者十有二人此有司之法也今圖之所見者其名氏稅等械器與其發之日月所盜之家所取之財至于人各别其九若干發皆旁行以見之人各别其凡若干發者又别之以朱欲覽者之易曉也吳慶之船贓分為三與吳慶吳道之屬有親踈居有異同至于孫仙湯慶之族屬以及十二人之所以得不死者皆别見于圖之上下而故之輕重詳矣其創作兵仗合衆以轉劫數百里之間至於賊殺良民此情狀之尤可嫉者也方五六月之時水之害甚矣田疇既以蕩溺矣屋廬既以漂流矣城郭之內糶官粟以賑民而猶有不得食者窮鄉僻壤大川長谷之間自中家以上日昊持錢無告糴之所况于躡所素困之人乎方且結草葦以自託于壞毀捍之上士有飢餓之迫無樂生之情其屢發而為盜亦情狀之可哀者也康誥曰殺越人于貨暋不畏死九民罔不憝孟子以謂不待教而誅者也是則殺人之盜不待教而誅皆百王之所同而未有知其所始者也然而孔子曰天下有道盜其先變乎此謂飬之既足導之既明則為盜者知耻而自新則非殺人之盜有待教而誅此亦百王之所同而未有知其所始者也不待教而誅者天下之所不得容也待教而誅者俟之之道既盡矣然後可以責之備也苟為飬之既有不足導之既有不明俟之之道既有不盡矣故凶年人食不足而有起為盜賊者天子嘗密下寬大之令許降其罪而此非有司之法也至殺人與贓重者亦不降有司之法存焉亦康誥之意也余當閲是獄故具列其本末情狀以覽觀焉以明余之于是盡心矣贈黎安二生序趙郡蘇軾余之同年友也自蜀以書至京師遺余稱蜀之士曰黎生安生者既而黎生携其文數十萬言安生携其文亦數千言辱以顧余讀其文誠閎狀雋偉善友復馳騁窮盡事理而其材力之放縱若不可極者也二生固可謂魁竒特起之士而蘇君固可謂善知人者也頃之黎生輔江陵府司法參軍將行請豫言以為贈余曰余之知生既得之于心矣乃將以言相求于外邪黎生曰生與安生之學于斯文里之人皆笑以為迂闊今求子之言蓋將解惑于里人余聞之自顧而笑夫世之迂闊孰有甚于豫乎知信乎古而不知合乎世知志乎道而不知同乎俗此余所以因于今而不自知也卋之迂闊孰有甚于豫乎今生之迂特以文不近俗迂之小者耳患為笑于里之人若余之迂大矣使生持吾言而且重得罪庸詎止于笑乎然則若余之于生將何言哉謂余之迂為善則其患若此謂為不善則有以合乎世必違乎古有以同乎俗必離乎道矣生其無急于解里人之惑則于是焉必能擇而取之遂書以贈二生并示蘇君以為何如也元豐類藁卷第十三
