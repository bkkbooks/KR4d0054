body:
  text: 序序越州鑑湖圖鑑湖一曰南湖南並山北属州城漕渠東西距江漢順帝永和五年㑹稽太守馬臻之所為也至今九百七十有五年矣其周三百五十有八里凢水之出扵東南者皆委之州之東自城至于東江其北隄石撻二隂溝十有九通民田田之南属漕渠北東面属江者皆溉之州之東六十里自東城至子東江其南隄隂溝十有四通民田田之北扺漕渠南並山西並隄東属江者皆溉之州之西三十里曰柯山斗門通民田田之東並城南並隄北濵漕渠西属江者皆溉之揔之溉山隂㑹稽两縣十四郷之田九千頃非湖能溉田九千頃而巳盖田之至江者盡扵九千頃也其東曰曹娥斗門曰藁口斗門水之循南隄而東者由之以入于東江其西曰廣陵斗門曰新逕斗門水之循北隄而西者由之以入于西江其北曰朱儲斗門去湖最逺盖因三江之上兩山之間䟽爲二門而以時視田中之水小溢則縦其一大溢則盡縦之使入于三江之口所謂湖高扵田丈餘田又高海丈餘水少則泄湖溉田水多則泄田中水入海故無荒廢之田水旱之歲者也繇漢以来㡬千載其利未嘗廢也宋興民始有盗湖爲田者祥符之間二十七戸慶暦之問二戸為田田頃當是時三司轉運司猶下書切貴州縣使復田為湖然自此吏益慢法而奸民浸起至于治平之間盗湖為田者凢八千餘户為田七百餘頃而湖廢㡬盡矣其僅存者東為漕渠自州至于東城六六里南通若耶溪自樵風涇至于桐嗚十里皆水廣不能十餘丈毎歲少雨田未病而湖盖已先涸矣自此以来人争為計說蔣堂則謂宜有罰以禁侵耕有賞以開告者杜𣏌則謂盗湖為田者利在縦湖水一雨則放聲以動州縣而斗門輙彂故為之立石則水一在五雲橋水深八尺有五寸㑹稽主之一在跨湖橋橋水深四尺有五寸山隂主之而斗門之鑰使皆納于州水溢則遣官視則而謹其閉縦又以謂宜益理防隄斗門其敢田者㧞其苗責其力以復湖而重其罰猶以為未也又以謂宜加兩縣之長以提舉之名課其督察而為之殿實呉奎則謂毎歲農隙當僦人濬湖積其泥塗以為丘阜使縣主役而州與輒運使提點刑獄督挕賞罰之張次山則謂湖廢僅有存者難卒復宜益廣漕路及他便利䖏使可漕及住民田里置石柱以識之柱之内禁敢田者刀約則謂宜斥湖三之一與民為田而溢隄使高一丈則湖可不開而其利自復范師道施元長則謂重侵耕之禁猶不能使民無犯而斥湖與民則侵者孰禦又以湖水較之髙扵城中之水或三尺有六寸或二尺有六寸而益隄壅水使高明水之敗城郭廬舎可必也張伯玉則謂日役五千人濬湖使至五尺當十五歲畢至三尺當九歲畢然恐工起之日浮議外摇役夫内漬則雖有智者猶不能畢其成若日役五千人益隄使髙八尺當一歲畢其竹木費凢九十二萬有三千計越之戸二十萬有六千賦之而復其租其勢易足如此則利可坐收而人不煩弊陳宗言趙誠復以水勢高下難之又以謂宜修呉奎之議以歲月復湖當是時都水善其言又以謂宜増賞罰之令其為說如此可謂愽矣朝廷未嘗不聽用著扵法故罰有自錢三百至于千有至于五萬刑有杖百至于徒二年其文可謂宻矣然而田者不止而日愈多湖不加濬而日愈廢其故何㢤法令不行而苟且之俗勝也昔謝靈運從宋文帝求㑹稽回踵湖為田太守孟顗不聽又求休崲湖為田顗又不聼靈運至以語詆之則利扵請湖為田越之風俗舊矣然南湖繇漢歴呉晋以来椄于唐又接于錢鏐父子之有此州其利未嘗廢者彼或以區區之地當天下或以数州為鎮或以一國自王内有供養禄凛之湏外有貢輸問遺之奉非得晏然而巳也故強水土之政以力本利農亦皆有数而錢鏐之法最詳至今尚多傳扵人者則其利之不廢有以也近世則不然天下為一而安扵承平之故在位者重舉事而樂因循而請湖為田者其語言氣力徃徃足以動人至扵修水土之利則又費材動衆從古所難故鄭國之役以謂足以疲秦而西門豹之治鄴渠人亦以為煩若其故如此則吾之吏孰肯任難當之怨来易至之責以待未然之功乎故說雖傳而未嘗行法雖宻而未嘗舉田者之所以日多湖之所以日廢繇是而巳故以為法令不行而苟且之俗勝者豈非然㢤夫千歲之湖廢興利害較然易見然自慶暦以來三十餘年遭吏治之因循至扵既廢而世猶莫窹其所以然况扵事之隠微難得而考者繇苟簡之故而㢮壊扵冥冥之中又可知其所以然乎今謂湖不必復者曰湖田之入既饒矣此游談之士為利扵侵耕者言之也夫湖未盡廢則湖下之田旱此方今之害而衆人之所覩也使湖盡廢則湖之為田亦旱矣此将来之害而衆人之所未覩者故曰此游誒之士為利扵侵耕者言之而非實知利害者也謂湖不必濬者曰益隄壅水而巳此好辨之士為樂聞苟簡者言之者夫以地勢較之壅水使高必敗城郭此護者之所巳言也以地勢較之濬湖使下然後不失其舊不失其舊然後不失其宜此議者之所未言也又山隂之石則為四尺有五寸㑹稽之石則㡬俉之壅水使高則㑹稽得尺山隂得半地之窪隆不並則益隄未為有𥙷也故曰此好辨之士為樂聞苟簡者言之而又非實知利害者也二者既不可用而𣣔禁侵耕開告者則有賞罰之法矣欲謹水之畜泄則有閉縱之法矣欲痛絶敢田者則投其苗責其力以復湖而重其罰又有法矣或欲任其責扵州縣與轉運使提點刑獄或欲以毎歲農隙濬湖或欲禁田石柱之内者又皆有法矣欲知濬湖之淺深用工若干爲日㡬何欲知増隄竹木之費㡬何使之安出欲知濬湖之泥塗積之何所又巳計之矣欲知工起之日或浮議外揺役夫内潰則不可以必其成又巳論之矣誠能枚衆說而考其可否用其可者而以在我者潤澤之今言必行法必舉則何功之不可成何利之不可復㦲鞏𥘉蒙恩通判此州問湖之廢興扵人求有能言利害之實者及到官然後問啚扵兩縣問書扵州與何渠司至扵參覈之而圗成孰䆒之而書具然後利害之實明故爲論次庻夫計議者有洘焉熈寜二年冬卧龍齋類要序晏元獻公出東南起童子入秋閣讀書遂賛各命入翰林爲學士真宗特竉待之毎進見勞問及所以任属之者群臣莫能及皇太子就書學公以選入侍太子即皇帝位是爲仁宗公遂筦國樞要任政事位宰相其在朝廷五十餘年常以文學謀議爲任所爲賦頌銘碑制詔冊命書奏議論之文傳天下尤長扵詩天下皆呤誦之當真宗之卋天下無事方輯福應推功徳脩封禅及右土山川老子諸祠以報礼上下左右前後之臣非工儒學妙扵語言能討論古今潤色太平之業者不能稱其位公扵是時為學者宗天下慕其聲名人見公應扵外者之不窮而不知公之得扵内者何也及得公所為類要上中下秩揔七十四篇凢若于門皆公所乎抄迺知公扵六藝太史百象之言騷人墨客之文章至扵地志族譜佛老方伎之衆說旁及九州之外蠻夷荒忽詭変竒跡之序録皆披尋細繹而細扵三萬物變化情僞是非興瓌之理顯隱細鉅之委曲莫不究盡公之得扵内者在此也公之所以光顯扵世者有以㢤觀公之所自致者如此則知士不素學而䖏從官大臣之列備文儒道德之任其能不餒且病乎此公之書所以為可傳也公之子知止能守其家者也以書属余序余與公仕不並時然皆臨川人故為之論次以為公書其首相國寺維摩院聽琹序右者學士之扵六藝射能弧矢之事矣又當善其揖譲之莭御䏻車馬之事矣入當善其驅馳之莭書非能肆筆而巳又當辨其體而皆通其意数非能布䇿而巳又當知其用而各盡其法而五禮之威儀至扵三千六樂之莭文可謂微且多矣噫何其煩且勞如是然古之學者必能此亦可謂難矣然習其射御扵礼習其于戈扵樂則少扵學長扵朝其扵武俻固脩矣其扵家有塾於黨有庠扵郷有序扵國有學扵教有師扵視聽言動有其容扵衣冠飲食有其度几杖有鉻盤扞有戒在與有和鵉之聲行歩有珮玉之音燕䖏有雅頌之樂而非其故琴瑟未甞去扵前也盖其出入進退俯仰左右接扵耳目動扵四體逹扵其心者所以飬之至如此其詳且宻也雖然此尚為有侍扵外者尔若夫三才萬物之理性命之際力學以求之深思以索之使知其要識其微齋戒以守之以書其才成其徳至合扵天地而后巳者又當得之扵心夫豈非難㢤噫古之學者其役之扵内外以持其心飬其性者至扵如此此君子所以愛日而自強不息以求至乎極也然其習之有素閑之有具如此則求其放心伐其邪氣而成文武之材就道徳之實者可謂易矣孔子曰興扵詩立扵礼成扵樂盖樂者所以感人之心而使之化故曰成扵樂昔舜命䕫典樂教胄子曰直而温寛而栗剛而無雪簡而無傲則樂者非獨去邪又所以救其性之偏而納之中也故和鵉佩玉雅頌琴瑟之音非其故不去扵前豈虚也㢤今學士大夫之扵持其身飬其性凢有待扵外者皆不䏻具得之扵内者又皆略其事可謂簡且易矣然所以求其放心伐其邪氣而成文武之材就道德之實者豈不難㢤此予所以惧不至扵君子而入扵小人也夫有待扵外者余既力不足而扵琹竊有志焉乆矣然患其莫余授也治平三年夏得洪君扵京師始合同舎之士聴其琴扵相國寺之維摩院洪君之扵琴非特能其音又能其意者也予将就學焉故道予之所慕古人者庻乎其有以自彂也同舎之士丁寳臣元珎鄭穆閎中孫覺莘老林希子中而予曽鞏子固也洪君名規字方叔以文與吏事稱扵世云張文叔文集序文叔姓張氏諱彦愽蔡州汝陽人慶暦三年爲撫州司法參軍余爲之銘其父碑文叔又治其寝得嬰児秃秃之遺骸葬之余爲之誌其事是時文叔年未三十喜從余問道理學爲文章因與之㳺至其爲司法代去其後又三遇焉至今二十有六年矣文叔為袁州判官巳死其子仲偉集其遺文為四十卷自蘄春赱京師属余序之余讀其書知文叔雖乆窮而講道益明属文益工其辭精深雅贍有過人者而比三遇之盖未嘗為余出也又知文叔自進為甚强自待為甚重皆可喜也雖其遇扵命者不至扵富貴然比扵富貴而功德不足以堪之姑為說以自恕者則文叔雖乆窮亦何佷㢤仲偉居撫時八九歲未丱始讀書就筆硯今儀觀甚偉文辞甚工有子復能讀書就筆硯矣則余其能不老乎既為之評其文而序之又辱道其父子事反復如此者所以致余情扵故舊而又以見余之老也熈寜元年十二月十七日序館閣送錢純老知㜈州詩序熈寕三年三月尚書司封員外郎秘閣校理錢君純老出為㜈州三館祕閣同舎之士相與飲餞于城東佛舎之觀音院㑹者凢二十人純老亦重僚友之好而欲慰䖏者之思也乃為詩二十言以示坐者扵是在席人各取其一言為韻賦詩以送之純老至州将刻之石而以書耒曰為我序之盖朝廷常引天下儒學之士聚之館閣所以長飬其材而待上之用有出使于外者則其僚必相告語擇都城之中廣宇豊堂游觀之勝約日皆㑹飲酒賦詩以叙去䖏之情而致綢繆之意歴世寝乆以為故常其從路道義之樂盖他司所無而其賦詩之所稱引况諭莫不道去者之義祝其㱕仕扵王朝而𣣔其乆扵外所以見士君子之風流習尚䔍扵相先非世俗之所能及又将待上之考信扵此而以其彚進非空文而巳也純老以明經進士制䇿入等歴敎國子生入館閣為編挍書籍校理撿討其文章學問有過人者宜在天子左右與訪問任獻納而顧請一州欲自試扵川穷山阻僻絶之地其志莭之高又非凢才所及此賦詩者所以推其賢惜其志殷勤反復而不能巳余故為之序其大㫖以發明士大夫之公論而與同舎視之使知純老之非父扵外也十月日序齊州雜詩序齊故為文學之國然亦以朋比誇詐見扵皆俗今其地富饒而介扵河岱之間故又多獄訟而豪猾群黨亦徃徃喜相攻剽賊殺扵時號難治余之疲駑束為是州除其姦强而振其㢮壊去其疾苦而撫其善良未期囹圄多空而抱鼓㡬熄歲又連熟州以無事故得與其士太天及四方之賔客以其暇日時遊後園或長軒遶榭登覽之觀属思千里或美芰荷湖波渺然從舟上下雖病不飲酒而間為小詩以娱情冩物亦拙者之適也通儒大人或與余有舊欲取而視之亦不䏻隱而青鄆二學士又從而和之士之喜文辞者亦継為此作緫之九若于篇豈得以余文之陋而使夫宗工秀人雄放魂絶可喜之辞不大傳千此邦也故刻之石而并序之使覧者得詳鳥熈寕六年二月巳丑序順濟王敕書祝文刻石序臣鞏言世稱麟鳯龜龍王者之嘉瑞則盖不常出而德有不能致者又稱麟鳯亀龍四靈以為畜則至治之卋盖可狎而擾也故官有豢龍而劉累以善其職事至夏之衰乃不能馴而或漦于庭至周卒為女禍盖龍之為祥通千治亂如此伏惟陛下仁聖之德逹于渊泉故龍實来慕者何擾也其自今以徃盛德日躋則必有遊子宮沼或負圖出河而且将領在有司群扵羞物故臣敢刻敕書祝辞于石以俟臣鞏謹序叙盗盗三十人凢十五發繇孫僊而下盗呉慶船者殺人皆應斬盗朱縞船者贓重皆應絞九應死者十有八人繇湯慶而下或贓輕或竊盗或常自言凡應徒者十有二人此有司之法也今圖之所見者其名氏稅䓁械器與其發之日月所盗之家所取之財至扵人各别其九若干發皆旁行以見之人各别其凢若干發者又别之以朱欲覧者之易暁也呉慶之船贓分為三與呉慶呉道之属有親踈居有異同至扵孫仙湯慶之族属以及十二人之所以得不死者皆别見扵圖之上下而故之䡖重詳矣其創作兵仗合衆以轉刼数百里之間至於賊殺良民此情状之尤可嫉者也方五六月之時水之害甚矣田疇既以蕩溺矣屋廬既以漂流矣城郭之内糶官粟以賑民而猶有不得食者窮郷僻壤大川長谷之間自中家以上日昊持錢無告糴之所况扵躡所素困之人乎方且結草葦以自託扵壞毀捍之上士有饑餓之迫無樂生之情其屡發而為盗亦情状之可哀者也康誥曰殺越人于貨暋不畏死九民罔不憝孟子以謂不待教而誅者也是則殺人之盗不待教而誅皆百王之所同而未有知其所始者也然而孔子曰天下有道盗其先變乎此謂飬之既足導之既明則為盗者知耻而自新則非殺人之盗有待敎而誅此亦百王之所同而未有知其所始者也不待教而誅者天下之所不得容也待敎而誅者俟之之道既盡矣然後可以責之備也苟為飬之既有不足導之既有不明俟之之道既有不盡矣故㐫年人食不足而有起為盗賊者天子嘗宻下寛大之令許降其罪而此非有司之法也至殺人與贓重者亦不降有司之法存焉亦康誥之意也余當閱是獄故具列其本末情状以覧觀焉以明余之扵是盡心矣贈黎安二生序趙郡蘇軾余之同年友也自蜀以書至京師遺余稱蜀之士曰黎生安生者既而黎生携其文数十萬言安生携其文亦数千言辱以顧余讀其文誠閎状雋偉善友復馳騁窮盡事理而其材力之放縦若不可極者也二生固可謂魁竒特起之士而蘇君固可謂善知人者也頃之黎生𥙷江陵府司法叅軍将行請予言以為贈余曰余之知生既得之扵心矣迺将以言相求扵外邪黎生曰生與安生之學扵斯文里之人皆笑以為迂闊今求子之言盖将觧惑扵里人余聞之自顧而笑夫世之迂闊孰有甚扵予乎知信乎古而不知合乎世知志乎道而不知同乎俗此余所以因扵今而不自知也卋之迂闊孰有甚扵予乎今生之迂特以文不近俗迂之小者耳患為笑扵里之人若余之迂大矣使生持吾言而且重得罪庸詎止扵笑乎然則若余之扵生将何言㢤謂余之迂為善則其患若此謂為不善則有以合乎世必違乎古有以同乎俗必離乎道矣生其無急扵觧里人之惑則扵是焉必能擇而取之遂書以贈二生并示蘇君以為何如也元豊類藁卷第十三
