front:
  text: 元豐類藁卷第十六
  hash: sha256:84bf75a7fd5332580160462344298852e75b3405ad8d440f7adc8a6a073fa7f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_016-1a}
body:
  text: 書與杜相公書鞏啓鞏多難而貧且賤學與衆違而言行少合于世公卿大臣之門無可藉以進而亦不敢輒有意于求聞閣下致位天子而歸始獨得望舄履于門下閣下以舊相之重元老之尊而猥自抑損加禮于草苑之中孤煢之際然去門下以來九嵗于此𥘉不敢為書以進比至近嵗嵗不過得以一書之問薦于左右以伺侍御者之作止又輒拜教之辱是以滋不敢有意以千省察以煩貺施而自以得不韙之誅顧未嘗一日而忘拜賜也伏以閣下朴厚清明讜直之行樂善好義逺大之心施于朝廷而博見于天下鋭于強力而不懈于耄期當今內自京師外至巖野宿師碩士傑立相望必將憊精疲思寫之册書磊磊明明宣布萬世固非淺陋小生所能道説而有益毫髮也鞏年齒益長血氣益衰疾病人事不得以休然用心于載籍之文以求古人之緒言餘旨以自樂于環堵之內而不亂于貧賤之中雖不足希盛德之萬一亦庶幾不負其意非自以謂能也懷區區之心于數千里因尺書之好而惟所以報大君子之誼不知所以裁而恐欲知其趣故輒及之也春暄不審尊用如何伏惟以時善保尊重不勝鄙劣之至不宣鞏再拜答范資政書鞏啓王寺丞至蒙賜手書及絹等伏以閣下賢德之盛而所施為在于天下鞏雖不熟于門然于閣下之事或可以知若鞏之鄙切伏草茅閣下于羈旅之中一見而巳今鞏有所自得者尚未可以致閣下之知况鞏學不足以明先聖之意識古今之變材不足以任中人之事行不足以無愧悔於心而流落寄寓無田疇屋廬匹夫之業有奉飬嫁送百事之役非可責思慮之精詔道德之進也是皆無以致閣下之知者而拜别期年之間相去數千里之逺不意閣下猶記其人而不為年輩爵德之間有以存之此蓋閣下樂得天下之英材異于世俗之常見而如鞏者亦不欲棄之故以及此幸甚幸甚夫古之人以王公之勢而下貧賤之士者蓋惟其常而今之布衣之交及其窮逹毫髮之殊然相棄者有之則士之愚且賤無積素之義而為當世有大賢德大名位君子先之以禮是豈不于衰薄之中為有激于天下哉則其感服固宜如何仰望門下不任區區之至謝杜相公書伏念昔者方鞏之得禍罰于河濱去其家四千里之逺南嚮而望迅河大淮埭堰湖江天下之險為其阻厄而以孤獨之身抱不測之疾煢煢路隅無攀緣之親一見之舊以為之託又無至行上之可以感人利勢下之可以動俗惟先人之醫藥與凡喪之所急不知所以為賴而旅櫬之重大懼無以歸者明公獨于此時閔閔勤勤營救護視親屈車騎臨于河上使其方先人之病得一意于左右而醫藥之有與謀至其既孤無外事之奪其哀而毫髮之私無有不如其欲莫大之喪得以卒致而南其為存全之恩過越之義如此竊惟明公相天下之道吟訟推説者窮萬世非如曲士汲汲一莭之善而位之極年之高天子不敢煩以改豈鄉閭新學危苦之情藂細之事宜以徹于視聽而蒙省察然明公存先人之故而所以盡于鞏之德如此蓋明公雖不可起而寄天下之政而愛育天下之人材不忍一夫失其所之道于自然推而行之不以進退而鞏獨幸遭明公于此時也在喪之日不敢以世俗淺意越禮進謝喪除又惟大恩之不可名空言之不足陳俳佪汔今一書之未進顧其慚生于心無須臾廢也伏惟明公終賜亮察夫明公存天下之義而無有所私則鞏之所以報于明公者亦惟天下之義而巳誓心則然未敢謂能也寄歐陽舍人書鞏頓首載拜舍人先生去秋人還蒙賜書及所撰先大父墓碑銘反復觀誦感與慚并夫銘志之著于世義近于史而亦有與史異者蓋史之于善惡無所不書而銘者蓋古之人有功德材行志義之美者懼後世之不知則必銘而見之或納于廟或存于墓一也苟其人之惡則于銘乎何有此其所以與史異也其辭之作所使死者無有所憾生者得致其嚴而善人喜于見傳則勇于自立惡人無有所紀則以愧而懼至于通材逹識義烈莭士嘉言善狀皆見于篇則足為後法警勸之道非近乎史其將安近及世之衰人之子孫者一欲褒揚其親而不本乎理故雖惡人皆務勒銘以誇後世立言者既莫之拒而不為又以其子孫之所請也書其惡焉則人情之所不得于是乎銘始不實後之作銘者常觀其人苟託之非人則書之非公與是則不足以行世而傳後故千百年耒公卿大夫至于里巷之士莫不有銘而傳者蓋少其故非他託之非人書之非公與是故也然則孰為其人而能盡公與是歟非畜道德而能文章者無以為也蓋有道德者之于惡人則木受而銘之于衆人則能辨焉而人之行有情善而迹非有意姦而外淑有善惡相懸而不可以實指有實大于名有名侈于實猶之用人非畜道德者惡能辨之不惑議之不徇不惑不徇則公且是矣而其辭之不工則世猶不傳於是乂在其文章兼勝焉故曰非畜道德而能文章者無以為也豈非然哉然畜道德而能文章者雖或並世而有亦或數十年或一二百年而有之其傳之難如此其遇之難又如此若先生之道德文章固所謂數百年而有者也先祖之言行卓卓幸遇而得銘其公與是其傳世行後無疑也而世之學者每觀傳記所書古人之事至其所可感則往往盡然不知涕之流落也呪其子孫也哉况鞏也哉其追晞祖德而思所以傳之之繇則知先生推一賜于鞏而及其三卋其感與報冝若何而圗之抑又思若鞏之淺薄滯拙而先生進之先祖之屯蹶否塞以死而先生顯之則世之魁閎豪傑不世出之士其誰不願進于門潛遁幽抑之士其誰不有望于世善誰不為而惡誰不愧以懼為人之父祖者孰不欲教其子孫為人之子孫者孰不欲竉榮其父祖此數美者一歸于先生既拜賜之辱且敢進其所以然所諭世族之次敢不承教而加詳焉愧甚不宣鞏再拜與王介甫第一書鞏啓近託彥弼黃九各奉書當致矣鞏至金陵後自宣化渡江來滁上見歐陽先生住且二十日今從泗上出及舟船侍從以西歐公悉見足下之文愛嘆誦寫不勝其勤間以王回王向文示之亦以書來言此人文字可驚世所無有蓋古之學者有或氣力不足動人使如此文字不先耀于世吾徒可耻也其重之如此又嘗編文林者悉時人之文佳者此文與足下文多編入矣至此論人事甚衆恨不與足下共講評之其恨無量雖歐公亦然也歐公甚欲一見足下能作一來計否胸中事萬萬非面不可道鞏此行至春方應得至京師也時乞寓書慰區區疾病尚如黃九見時未知竟何如也心中有與足下論者相雖未相見足下之心潛有同者矣歐公更欲足下少開廓其文勿用造語及摸擬前人請相度示及歐云孟韓文雖高不必似之也取其自然耳餘侯到京作書去不宣鞏再拜與王介甫第二書鞏頓首介父足下比辱書以謂時時小有案舉而謗議巳紛然矣足下無怪其如此也夫我之得行其志而有為于世則必先之以教化而待之以久然後乃可以為治此不易之道也蓋先之以教化則人不知其所以然而至于遷善而逺罪雖有不肖不能違也待之以久則人之功罪善惡之實自見雖有凼隱不能掩也故有漸磨陶冶之易而無按致操切之難有愷悌忠篤之純而無偏聽摘抉之苛巳之用力也簡而人之從化也博雖有不從而俟之以刑者固少矣古之人有行此者人皆恱而恐不得歸之其政已熄而人皆思而恨不得見之而豈至于謗且怒哉今為吏于此欲遵古人之治守不易之道先之以教化而待之以久誠有所不得為也以吾之無所于歸而不得不有負冒于此則姡汲汲乎于其厚者徐徐乎于其薄者其亦庶幾乎其可也顧反不然不先之以教化而遽欲責善于人不待之於久而遽欲人之功罪善惡之必見故按致操切之法用而怨忿違倍之情生偏聽摘扶之勢行而譛訴告計之害集巳之用力也愈煩而人之違巳也愈甚况今之士非有素厲之行而為吏者又非素擇之材也一日卒然遂飲齊之以法豈非左右者之誤而不為無害也哉則謗怒之耒誠有以召之故曰足下無怪其如此也雖然致此者豈有他哉思之不審而巳矣顧吾之職而急于奉法則志在于去惡務于逹人言而廣視聽以謂為治者當如此故事至于巳察曽不思夫志于去惡者俟之之道巳盡矣則為惡者不得不去也務于逹人言而廣視聽者已之治亂得失則吾將于此而觀之人之短長之私則吾所任意于此也故曰思之不審而巳矣足下于今最能取于人以為善而比聞有相曉者足下皆不受之必其理未有以奪足下之見也鞏比懶作書既離南康相見尚逺故因書及此足下以為如何不宣鞏頓首與王介甫第三書鞏啓八月中承大夫人大祥于郵中寓書奉慰十月梅厚秀才行又寓書不審皆到否昨日忽𬒳耒問良慰積日之思深父殂背痛毒同之前書巳具道矣示及志銘反復不能去手所云令深父而有合乎彼則不能同乎此矣是道也過千歲以來至于吾徒其智始能及之欲相與守之然今天下同志者不過三數人爾則于深父之殁尤可為痛而介父于此獨能發明其志讀之滿足人心可謂能言人之所不能言者矣顧猶見使啇榷所未安觀介甫此作大抵哀斯人之不壽不得成其材使或可以澤今或可以覺後是介父之意也而其首則云深父書足以致其言是乃稱深父以未成之材而著書與夫本意違矣願更詳之孟子之書韓愈以謂非軻自作理恐當然則所云能幸著書者亦惟更詳之也如何幸復見諭所云讀禮因𣣔有所論著恐嘗為介父言亦有此意顧不能自強又無所考質故莫能就今介父既意及于此願遂成之就令未可為書亦可因得啇榷矣相别數年鞏在此全純愚以靜俟庶無大悔顧苟祿以棄時日為可悵惜未知何日得相從講學以勗其所未及盡其所可樂于衰暮之歲乎此日夜惓惓往來于心也示諭溲血比良巳否即日不審寢食如何上奏當稱前某官十數日見劉琮言巳報去承見問故更此及之爾今介父果以何時此來乎不惜見諭子進弟奄喪巳易三時矣悲苦何可以堪二姪年可教者近已隨親老到此二尤小者六舍弟尚且留在懷仁視此痛割何可以言承介父有女弟之悲亦巳屢更時序竊計哀戚何以自勝餘惟強食自憂不惜時以一二字見及不宣鞏啓上答李沿書鞏頓首李君足下辱示書及所為文意嚮甚大且曰足下以文章名天下師其職也顧鞏也何以任此足下無乃盈其禮而不情乎不然不宜若是云也足下自稱有憫時病俗之心信如是是足下之有志乎道而豫之所愛且畏者也末曰其發憤而為詞章則自謂淺俗而不明不若其始思之鋭也乃欲以是質于豫夫足下之書始所云者𣣔至乎道也而所質者則辭也無乃務其淺忘其深當急者反徐之歟夫道之大歸非他欲其得諸心充諸身擴而𬒳之國家天下而巳非汲汲乎辭也其所以不巳乎辭者非得巳也孟子曰豫豈好辨哉豫不得巳也此其所以為孟子也今足下其自謂巳得諸心充諸身歟擴而披之國家天下而有不得巳歟不然何遽急于辭也孔子曰古之學者為巳今之學者為人足下其得無巳病乎雖然足下之有志乎道而豫之所愛且畏者不疑也姑思其本而勉充之則豫將後足下其奚師之敢不宣鞏再拜謝章學士書鞏啓鞏不侫以身得察于下執事明公過恩召而見之所以矜嗟奬寵開慰拊循之者甚備雖至親篤友之愛不隆于此巳又收弟兄之不肖不謀賔客任而舉之明公之所以畜幸鞏者可謂厚矣鞏竊自惟求所以堪明公之意者未知所出也鞏愚無知不適于世用不能收身于世俗之外力耕于大山長谷之中以共饘粥之飬魚菽之祭以其餘日考先王之遺文竊六藝之微旨以求其志意之所存而足其自樂于巳者顧反去士君子之林而夷于皂隸之間捨自肆之安而踐乎迫制之地欲比于古之為貧為仕者可謂妄矣固有志者之所嘆嗟天下之所賤而至親篤友之所棄而違之也復安敢自通于大人之門望知于侍御者之側乎明公懷使者之印為福于東南以地計其廣狹則數十百城之人待明公之畜飬以材計其多寡則文武之士以百千數待明公之推察而收拊之任而舉之者乃獨在于鞏舉鞏之少弟此鞏之所以自唯求堪明公之意者而未知所出也抑鞏聞之廣聽博觀不遺汙賤厄辱之士者此所以無棄士也兼收並采不遺偏材一曲之人者所以無棄材也故明公之意儻在于此而古之士出汙賤厄辱之中能成功名以報知者亦不可勝數彼皆豪傑之人故有以自致也若鞏之鄙則安敢望此乎故憂不能堪明公之意誤左右之知者此鞏之所大懼也竭固陋之分庶幾不愧于偏材一曲之人者此鞏之所可至也敢獻其情而以為進謝之資惟明公之垂察焉答孫都官書提刑都官閣下伏氶賜書及示盛製六編凡三千首盛矣哉文之多工之深且專以久其于君臣父子兄弟夫婦朋友天地三辰鬼神山川地理四夷中國風俗萬物治亂善惡通塞離合憂歡怨對無不畢載而其語則博而精麗而不浮其歸要不離于道視昔以文名于天下者夫豈易至于是耶鞏之愚且懶且為事物疾病所侵以不專而且未久于學也使之觀若于海不見其涯涘于深山長谷不見其形勢之所極而取議其大小高下邪而閣下不以所深且專以久者勵鞏博而精麗而不浮其歸本于道者教鞏乃告之曰其詳擇而去其非是者焉鞏誠怪閣下自處之過而為以賜鞏者乃所以怠且蔽之也凡鞏之學蓋將以學乎為身以至于可以為人也方愚且懶且不專以久之病也惟閣下之仁豈欲怠且蔽也其欲使知閣下之貴而長其業之富而成而猶不止如是能下于後輩如是是所以教之也孟子曰吾不屑其教誨是亦教誨之而巳矣敢不拜賜也盛編尚且借觀而先以此謝皇恐皇恐不宣鞏再拜答袁陟書鞏頓首世弼足下辱書説介甫事或有以為矯者而歡自信獨立之難因以教鞏以謂不仕未為非得計者非足下愛我之深處我之重不至于此雖親戚之于我未有過此者然介甫者彼其心固有所自得世以為矯不矯彼必不顧之不足論也至于仕進之説則以鞏所考于書常謂古之仕者皆道德明備已有餘力而可以治人非苟以治人而不足于巳故子使漆雕開仕對曰吾斯之未能信子説然世不講此久矣故當孔子之時獨顔子者未嘗仕而孔子稱之曰好學其餘弟子見于書者獨開之言如此若鞏之愚固巳不足者方自勉于學豈可以言仕不仕邪就使異日可仕之道而仕不仕固自有時古之君子法度備于身而有仕不仕者是也豈為呶呶者邪然鞏不敢便自許不應舉者鞏貧不得巳也亦不敢與古之所謂為貧者比何則彼固所謂道德明備而不遇于世者非若鞏之鄙遽捨其學而欲謀食也此其心愧于古人然鞏之家苟能自足便可以處而一意于學鞏非好進而不知止者此其心固無愧于古人辱足下愛之深處之重不敢不報答所示詩序及答楊生書甚善甚善不宣鞏顃首謝曹秀才書鞏頓首曺君茂才足下嗟乎世之好惡不同也始足下試于有司鞏為封彌官得足下與方造孟起之辭而讀之以謂宜在高選及耒取號而三人者皆無姓名于是憮然自悔許與之妄既而推之特世之好惡不同耳鞏之許與豈果為妄哉今得足下之書不以解名失得置于心而汲汲以相從講學為事其博觀于書而見於文字者又過于鞏向時之所與甚盛足下家居無事可以優遊以進其業自力而不巳則其進孰能禦哉世之好惡之不同足下固已能不置于心顧鞏適自𬒳召不得與足下久相從學此情之所眷眷也用此為謝不宣謝吳秀才書鞏啓承足下又以大熱之酷為可畏畏塗之阻為可憚徒步之勞為可病候問之勤為可諱三及吾門見投以書及所業五編發而觀之足下之學多矣見于文辭者亦多矣其説往往有非鄉閭新學所能至者使能充其言其得豈少哉况其進之未巳耶顧不自足忘前之患而有求于鄙暗推足下此志其進豈可量哉僕之所可告于足下者無易于自勉也薄遽不宣與王深甫書鞏再拜與深父别四年矣嚮往之心固不可以書道而比得深甫書輒反復纍𥿄示諭相存之勤相語之深無不盡者讀之纍日不能釋手故亦欲委曲自敘巳意以報而怠惰因循經涉崴月遂使其意欲周而反略其好欲密而反踈以汔于今顧深父所相與者誠不在于書之疏數然嚮往之心非書則無以自解而乖謬若此不能不欿然也不審幸見察否比得介甫書知數到京師比巳還亳即日不審動止如何計太夫人在穎子直代歸與諸令弟應書皆在京師各萬福鞏比侍親幸無恙宣和日得舉四弟應舉今亦在京師去年第二妹嫁王輔之者不幸疾不起以二女甥之失其所依而輔之欲繼舊好遂以弟七妹歸之此月𥘉巳亦或姻鞏質薄去朋友逺且久其過失日積而思慮日昏其不免于小人之歸者將若之何在官折莭于奔赱悉力于米鹽之末務此固任小者之常無不自安之意顧𥘉至時遇在勢者橫逆又議法數不合常恐不免于􅌟陷方其險阻艱難之時常欲求脫去而卒無由今在勢者已更幸自免于悔咎而鞏至此亦巳二年矣比承諭及介父所作王令志文以為揚子不過恐不然也夫學者其心篤于仁其視聽言動由于禮則無常産而有常心乃所履之一事耳何則使其心篤于仁其視聽言動由于禮然而無常産也則其于親也生事之以禮故啜菽飲水之飬與以天下一也死葬之以禮故斂手足形旋葬之葬與葬以天下一也而况于身乎况于妻子乎然其心篤于仁其視聽言動由于禮者非盡于此也故曰乃所履之一事耳而孟子亦以謂無常産而有常心者唯士為然則為聖賢者不止于然也介父又謂士誠有常心以操群聖人之説而力行之此孔孟以下所以有功于世也夫學者苟不能其心篤于仁其視聽言動由于禮則必不能不失其常心此後之學者之患也苟能其心篤于仁其親聽言動由于禮則必不失其常心且既巳皆中于禮矣而𣸪操何説而力行之哉此學者治心修身本未先後自然之理也所以始乎為士而終乎為聖人也顔子三月不違仁蓋謂此也人不堪其憂而不改其樂蓋樂此也凡介父之所言似不與孔子之所言者合故曰以為揚子不過恐不然也此吾徒所學之要義以相去逺故略及之不審以為如何其他未及子細劇寒自重書至幸報答不宣鞏再拜答王深甫論揚雄書蒙疏示鞏謂揚雄處王莾之際合于箕子之明夷常夷甫以謂紂為繼世箕子乃同姓之臣事與雄不同又謂美新之文恐箕子不為也又謂雄非有求于莾特于義命有所未盡鞏思之恐皆不然方紂之亂徴子箕子比干三子者蓋皆諌而不從則相與謀以謂去之可也任其難可也各以其所守自獻于先王不必同也此見于書三子之志也三子之志或去或任其難乃人臣不易之大義非同姓獨然者也于是微子去之比干諌而死箕子諌而不從至辱于囚奴夫任其難者箕子之志也其諌而不從至辱于囚奴蓋盡其志矣不如北于之死所謂各以其所守自獻于先王不必同也當其辱于囚奴而就之乃所謂明夷也然而不去非懷祿也不死非畏死也辱于囚奴而就之非無耻也在我者固彼之所不能易也故曰內難而能正其志又曰箕子之正明不可息也此箕子之事見于書易論語其説不同而其終始可考者如此也雄遭王莾之際有所不得去又不必死辱于仕莾而就之固所謂明夷也然雄之言著於書行著于史者可得而考不去非懷祿也不死非畏死也辱於仕莾而就之非無耻也在我者亦彼之所不能易也故吾以謂與箕子合吾之所謂與箕子合者如此非謂合其事紂之𥘉也至于美新之文則非可已而不巳者也若可已而不巳則鄉里自好者不為况若雄者乎旦較其輕重辱於仕莾為重矣雄不得巳而巳則于其輕者其得已哉箕子者至辱于囚奴而就之則于美新安知其不為而為之亦豈有纍哉不曰堅乎磨而不磷不曰白乎涅而不緇顧在我者如何耳若此者孔子所不能免故于南子非所𣣔見也于陽虎非所𣣔敬也見所不見敬所不敬此法言所謂詘身所以伸道者也然則非雄所以自見者歟孟子有言曰天下有道小德役大德小賢役大賢天下無道小役大弱役強二者皆天也順天者存逆天者亡而孔子之見南子亦曰豫所否者天厭之天厭之則雄于義命豈有不盡哉又云介甫以謂雄之仕合于孔子無不可之義夷甫以謂無不可者聖人微妙之處神而不可知者也雄德不逮聖人強學力行而于義命有所未盡故于仕莾之際不能無差又謂以美新考之則投閣之事不可謂之無也夫孔子所謂無不可者則孟子所謂聖之時也而孟子歷敘伯夷以降終曰乃所願則學孔子雄以為太玄賦稱夷齊之徒而而曰我異于是執太玄兮蕩然肆志不拘攣兮以二子之志足以自知而任已者如此則無不可者非二子之所不可學也在我者不及二子則宜有可有不可以學孔子之無可無不可然後為善學孔子此言有以窹學者然不得施于雄也前世之傳者以謂伊尹以割烹要湯孔子主癰疽瘠環孟子皆斷以為非伊尹孔子之事蓋以理考之知其不然也觀雄之所既立故介甫以謂世傳其投閣者妄豈不猶孟子之意哉鞏自度學每有所進則于雄書每有所得介甫亦以為然則雄之言不幾于測之而愈深窮之而愈逺者乎故于雄之事有所不通必且求其意况若雄處莾之際考之于經而不繆質之于聖人而無疑固不待議論而後明者也為告夷甫或以為盡願更疏示與王向書鞏啓比得吕南公愛其文南公數稱吾子然恨未相見及至南豐又得黃曦復愛其文而吾子亦來以文見貺實可歎愛吾子與吕南公黃曦皆秀出吾鄉一時之俊私心喜慰何可勝言惟強于自立使可愛者非特文詞而巳此鄙劣所望于三君子也道中忽忽奉啓鞏啓上回傅權書鞏啓辱惠書及古律詩雜文指意所出義甚高文辭甚美以鞏有鄉人之好又于聞道有一日之先使獲承重貺幸甚足下論古今學者自守者少苟合者多則固然矣因以謂如鄙劣者能知所守則豈敢當抑足下欲勉之至此則豈敢怠足下之材可謂特出自強不巳則道德之歸其孰可禦恨不相從不能一二具道能沿牒至此一相見否荒隅之中孤拙寡偶欽企欽企春睻餘保愛保愛不宣福州上執政書鞏頓首再拜上書某官竊以先王之迹去今逺矣其可槩見者尚存于詩詩存先王飬士之法所以撫循待遇之者恩意可謂備矣故其長育天下之材使之成就則如蘿蒿之在大陵無有不遂其賔而接之出于懇誠則如鹿鳴之相呼召其聲音非自外至也其燕之則有飲食之具樂之則有琴瑟之音將其厚意則有幣帛箱篚之贈要其大旨則未嘗不在于得其歡心其人材既衆列于庶位則如棫檏之盛得而薪之其以為使臣則寵其往也必以禮樂使其光華皇皇于逺近勞其耒也則既知其功又本其情而敘其勤其以為將率則于其行也既送遣之又識薇蕨之姓生而恐其歸時之晚及其還也既休息之又追念其悄悄之憂而及于僕夫之瘁當此之時后妃之于內助又知臣下之勤勞其憂思之深至于山春石阻僕馬之間而志意之一至于雖采卷耳而心不在焉蓋先王之世待天下士其勤且詳如此故稱周之士也貴又稱周之士也肆而天保亦稱君能下下以成其政臣能歸美以報其上其君臣上下相與之際如此可謂至矣所謂必本其情而敘其勤者在四牡之三章曰王事靡盬不遑將父四章曰王事靡盬不遑將母而其卒章則曰豈不懷歸是用作歌將毋耒諗釋者以謂諗告也君勞使臣敘述其情曰豈不誠思歸乎故作此詩之歌以飬父母之志來告其君也既休息之而又追敘其情如此繇是觀之上之所以接下未嘗不恐失其飬父母之心下之所以事上有飬父母之心未嘗不以告也其勞使臣之辭則然而推至于成役之人亦勞之以王事靡監憂我父母則先王之政即人之心莫大于此也及其後世或任使不均或苦于征役而不得飬其父母則有北山之感鴇羽之嗟或行役不巳而父母兄弟離散則有陟岵之思詩人皆推其意見于國風所謂發乎情止乎禮義者也伏惟吾君有出于數千載之大志方興先王之治以上繼三代吾相于時昔同德合謀則所以待天下之士者豈異于古士之出于是時者豈有不得盡其志邪鞏獨何人幸遇兹日鞏少之時尚不敢飾其固陋之質以干當世之用今齒髮日衰聰明日耗令其至愚固不敢有徼進之心况其少有知邪轉走五郡蓋十年矣未嘗敢有半言片辭求去邪城之任而冀陪朝廷之儀此鞏之所以自處藕計巳在聽察之日久矣今輒以其區區之腹心敢布于下執事者誠以鞏年六十老母年八十有八老母寓食京師而鞏守閩越仲弟守南越二越者天下之逺處也于著令有一人仕于此二邦者同居之親當逺仕者皆得不行鞏固不敢為不肖之身求自比于是也顧以道里之阻既不可御老母而南則非獨省晨昏承顔色不得效其犬馬之愚至于書問往還蓋以萬里非纍月踰時不通此白首之母子所以義不可以苟安恩不可以苟止者也方去歲之春有此邦之命鞏敢以情告于朝而詔報不許屬閩有盜賊之事因不敢繼請及去秋到職閩之餘盜或數十百為曺伍者往往蟻聚于山谷桀點能動衆為魁首者又以十數相望于州縣閩之室閭莫能寧而逺近聞者亦莫不疑且駭也州屬邑又有出于飢旱之後鞏于此時又不敢以私計自陳其于冦孽屬前日之屢敗士氣既奪而吏亦無可屬者其于經營既不敢以輕動迫之又不敢以少縱玩之一則諭以挌納一則戒以前除既而其悔悟者自相執拘以歸其不變者亦為士吏之所係獲其魁首則或糜而致之或殱而去之自冬至春逺近皆㝎亭無抱鼓之警里有室家之樂士氣始奮而人和始洽至于風雨時若田出自倍今野行海涉不待朋儔市粟面米價減什七此皆吾君吾相至仁元澤覆冒所及故寇旱之餘曽未期歲既安且富至于如此鞏與斯民與蒙其幸方地數千里既無一事繫官于此又已彌年則可以將母之心告于吾君吾相未易于此時也伙惟椎古之所以待士之詳思勞歸之詩本士大夫之情而及于其親逮之以即乎人心之政或還之闕下或處以間曺或引之近畿屬以一郡使得諧其就飬之心慰其高年之母則仁治之行豈獨昏愚得蒙賜于今日其流風餘法傳之永久後世之士且將賴此其無北山之怨鴇羽之譏陟岵之歎蓋行之甚易為德于士䫋者甚廣惟留意而圖之不宣鞏頓首元豐類藁卷第十六
