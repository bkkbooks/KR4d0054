body:
  text: 記思政堂記尚書祠部員外郎集賢校理太原王君為池州之明年治其後堂北嚮而命之曰思政之堂謂其出政于南嚮之堂而思之于此也其冬豫過客池而屬豫記之𥘉君之治此堂得公之餘錢以易其舊腐壞斷既完以固不窘寒暑闢而即之則舊圃之勝涼臺清池逰息之亭微步之徑皆在其前平畦淺檻佳花美木竹林香草之植皆在其左右君于是退處其并心一意用其日夜之思者不敢忘其政則君之治民之意勤矣乎夫接于人無窮而使人善惑者事也推移無常而不可以拘者時也其應無方而不可以易者理也知時之變而因之見必然之理而循之則事者雖無窮而易應也雖善惑而易治也故所與由之必人之所安也所與違之必人之所厭也如此者未有不始於思然後得于巳得于巳故謂之德正巳而治人故謂之政政者豈止于治文書督賦斂斷獄訟而已乎然及其巳得矣則無思也已化矣則亦豈止于政哉古君子之治未嘗有易此者也今君之學於書無所不讀而尤深于春秋其挺然獨見破去前惑人有所不及也來為是邦施用素學以修其政既得以休其暇日乃自為不是而思之于此雖今之吏不得以盡行其志然迹君之勤如此則池之人其不有蒙其澤者乎故豫為之書嘉祐三年冬至日南豐曽鞏記兜率院記古者為治有常道生民有常業若夫祝除髮毛禁棄冠環帶裘不撫耞來機盎至他器械水土之物其時莭經營皆不自踐君臣父子兄弟夫婦皆不為其所當然而曰其法能為人禍福者質之于聖人無有也其始自漢魏傳挾其言者浸淫四出抵今為尤盛百里之縣為其徒者少幾千人多至萬以上宫廬百十大氏穹墉奧屋文衣精食輿馬之華封君不如也古百里之國封君一人然而力殆不輕得足也今地方百里過封君者纍百十飛竒鈎貨以病民民往往嚬伸而為途中瘠者以此治教信讓奚而得行也而天下若是者蓋幾宫幾人乎有司常錮百貨之利細若蓬芒一無所漏失僕僕然其勞也而至于浮圖人雖費如此皆置不問反傾府空藏而棄與之豈不識其非古之制邪抑識不可然且固存之耶愚不能釋也分寧縣郭內外名為宫者百八十餘所兜率院在治之西八十里其徒尤相率悉力以侈之者也其􅌟興端原有邑人黃庠所為記其後院主僧某又治其故而大之殿舍中嚴齋宫宿廬庖湢之房布列兩序廄圉囷倉以固以密資所以奉飬之物無一而外求疏其事而來請記者其徒省懷也噫子之法四方人奔赱附集者衎衎施施未有止也豫無力以拒之者獨介然于心而掇其尤切者為是説以與之其使子之徒知巳之享利也多而人蒙病巳甚且以告有司而諗其終何如焉飲歸亭記金溪尉汪君名遘為尉之三月斥其四垣為射亭既成教士于其間而名之曰飲歸之亭以書赱臨川請記于豫請數反不止豫之言何可取汪君徒深望豫也既不得辭乃記之曰射之用事巳逺其先之以禮樂以辨德記之所謂賔燕鄉飲大射之射是也其貴力而尚技以立武記之所謂四時教士貫革之射是也古者海內治和則先禮射而弓矢以立武亦不廢于有司及三代衰王政缺禮樂之事相屬而盡壞楫讓之射滋亦熄至其後天下嘗集國家嘗問暇矣先王之禮其莭文皆在其行之不難然自秦漢以來千有餘歲衰徴絀塞空見于六藝之文而莫有從事者由世之苟蕳者勝也爭奪興而戰禽攻取之黨奮則疆弓疾矢巧技之出不得而廢其不以勢哉今尉之校射不北乎禮樂而貴乎技力其衆雖小然而旗旄鐲鼓五兵之器便習之利與夫行止步趨遲速之莭皆冝有法則其所教亦非獨射也其幸而在乎無事之時則得以自休守境而填衛百姓其不幸殺越剽攻骸驚閭巷而並逐于大山長谷之間則將犯晨夜蒙霧露蹈厄馳危不避矢石之患湯火之難出入千里而與之有事則士其可以不素教哉今亭之作所以教士汪君又謂古者師還必飲至于廟以紀軍實今廟廢不設亦欲士勝而歸則飲之于此遂以名其亭汪君之志與其職可謂協矣或謂汪君儒生尉文吏以禮義禁盜冝可止顧乃習鬪而喜勝其是歟夫治固不可以不兼文武而施澤于堂廡之上服冕搢笏使士民化姦究息者固亦在彼而不在此也然而天下之事能大者固可以兼小未有小不治而能大也故汪君之汲汲于斯不忽乎任小而非所謂有志者邪擬峴臺記尚書司門員外郎晉國裴君治撫之二年因城之東隅作臺以逰而命之曰擬峴臺謂其山溪之形擬乎峴山也數與其屬與州之寄客者遊而間獨求記于豫𥘉州之東其城因大丘其隍因大溪其隅因客土以出溪上其外連山高陵野林荒墟逺近高下壯大閎廓怪竒可喜之觀環撫之東南者可坐而見也然而雨墮潦毀蓋藏棄委于榛藂茀草之間未有即而愛之者也君得之而喜增甓與土易其破缺去榛與草發其亢爽繚以橫檻覆以高甍因而為臺以脫埃氛絶煩囂出雲氣而臨風雨然後溪之平沙漫流微風逺響與夫浪波洶湧破山拔木之奔放至于髙㧪徑櫓沙禽水獸下上而浮沉者出乎履舄之下山之蒼顔秀璧巔崖拔出挾光景而薄星辰至于平岡長陸虎豹踞而龍蛇赱與夫荒蹊藂落樹隂暗暖逰人行旅隱見而繼續者皆出乎祍席之內若夫雪煙開斂日光出沒四時朝暮雨暘明晦變化不同則雖覽之不厭而雖有智者亦不能窮其狀也或飲者淋漓歌者激烈或靚觀微叔旁皇徒倚則得于耳目與淂之于心者雖所寓之樂有殊而亦各適其適也撫非通道故貴人畜賈之逰不至多良田故水旱螟􅭈之災少其民樂于耕桑以自足故牛馬之牧于山谷者不收五榖之積于郊野者不垣而晏然不知袍鼓之驚發召之役也君既因其土俗而治簡靜故得以休其暇日而寓其樂于此州人士女樂其安且治而又得逰觀之美亦將同其樂也故豫為之記其成之年月日嘉佐二年之九月九日也撫州顔魯公祠堂記贈司徒魯郡顔公諱真鄉事唐為太子大師與其從父兄杲卿皆有大莭以死至今雖小夫婦人皆知公之為烈也𥘉公以忤楊國忠斥為平原太守䇿安祿山必反為之備祿山既舉兵與常山太守杲卿伐其後賊之不能直窺潼關以公與杲卿撓其勢也在肅宗時數正言宰相不恱斥去之又為御史唐旻所􅌟連輒斥李輔國遷太上皇居西宫公首率百官請問起居又輒斥代宗時與元載爭論是非載欲有所壅蔽公極論之又輒斥揚炎盧祀既相德宗益惡公所為逹斥之猶不滿意李希烈陷汝州祀即以公使希烈希烈𥘉慙其言後卒縊公以死是時公年七十有七矣天寶之際久不見兵祿山既反天下莫不震勤公以區區乎原遂祈其鋒四方聞之爭奮而起唐卒以振者公為之唱也當公之開土門同日歸公者十七郡得兵二十餘萬繇此觀之苟順且誠天下從之矣自此至公殁垂三十年小人繼續任政天下目入于弊大盜繼起天子輒出避之唐之在朝臣多畏怯觀望能居其間一忤于世失所而不自悔者寡矣至于再三忤于世失所而不自悔者蓋未有也若至于起日仆以至于七八遂死而不自悔者則天下一人而巳若公是也公之學問文章往往雜于神仚浮圖之説不皆合于理及其奮然自立能至于此者蓋天性然也故公之能處其死不足以觀公之大何則及至于勢窮義有不得不死雖中人可勉焉况公之自信也歟維歷忤大姦顛跌撼頓至于七八而終始不以死生禍福為秋毫顧慮非篤于道者不能如此此足以觀公之大也夫世之治亂不同而士之去就亦異若伯夷之清伊尹之任孔子之時彼咎有義夫既自北于古之任者矣乃欲眷顧回隱以市于世其可乎故孔子惡鄙夫不可以事君而多殺身以成仁者若公非孔子所謂仁者歟今天子至和三年尚書都官郎中知撫州聶君某尚書屯田員外郎通判撫州林君某相與慕公之烈以公之嘗為此邦也遂為堂而祠之既成二君過豫之家而告之曰願有述夫公之赫赫不可蓋者固不繫于祠之有無蓋人之嚮往之不足者非祠則無以致其至也聞其烈足以感人况拜其祠而親炙之者歟今州縣之政非法令所及者世不復議二君獨能追公之莭尊而事之以風示當世為法令之所不及是可謂有志者也洪州新建縣􅈦壁記為後世之吏得行其志者少矣此仕之所以難也而縣為最甚何哉凡縣之政無小大令主簿皆獨任而民事委曲當有所操縱緩急不能一斷以法舉法而繩之則其罪固易求也凡有所為問可不可于州執一而違之則其勢固易撓也其罪易求其勢易撓故為之者有以得于州然後其濟可幾也不幸其一錙銖與之咈則大者求其罪小者撓其勢將不遺其力矣吏之不能自安豈足道哉縣有不與其優者乎方是時也而天下之能忘其勢而好惡不妄者鮮矣能忘人之勢而強立不苟者亦鮮矣州負其強以取威縣憂其弱以求免其習巳久其俗巳成之後而守正循理以求其得于州其亦不可以必也則仕于此者欲行其志豈非難也哉君子者雖無所處而不安然其于自處也未嘗不擇仕而得擇其自處則縣之事有不敢任者豈可謂過也哉洪州新建自太平興國六年分南昌為縣至嘉佑三年凡若干年為令者凡三十有九人而祕書省著作佐郎黃巽公權來為其令抑豪縱惠下窮守正循理而淂濟其志者也公權亦喜其職之行因考次凡為令者名氏將伐石以書而列置于壁間故豫為之載其行治而因著其為縣之難使來者得覽焉清心亭記嘉祐六年尚書虞部員外郎梅君為徐之蕭縣改作其治所之東亭以為燕息之所而名之曰清心之亭是歲秋冬來請記于京師屬余有亡妹薚女之悲不果為明年春又來請屬豫有悼亡之悲又不果為而其請猶不止至冬為之記曰夫人之所以神明其德與天地同其變化夫豈逺哉生于心而巳矣若夫極天下之知以窮天下之理于夫性之在我者能盡之命之在彼者能安之則萬物自外至者安能纍我哉此君子之所以虛其心也萬物不能纍我矣而應乎萬物與民同其吉凶者亦未嘗廢也于是有法誡之設邪僻之防此君子之所以齊其心也虛其心者極乎精微所以入神也齊其心者由乎中庸所以致用也然則君子之𣣔修其身治其國家天下者可知矣今梅君之為是亭曰不敢以為逰觀之美蓋所以推本為治之意而且將清心于此其所存者亦可謂能知其要矣乃為之記而道豫之所聞者焉十一月五日南豐曽鞏記閬州張侯廟記事常蔽于其智之不周而辨常過于所惑智足以周于事而辨至于不惑則理之微妙皆足以盡之今夫推䇿灼龜審于夢寐其為事至淺世當尊而用之未之有改也坊庸道路馬蠶貓虎之靈其為類至細世常嚴而事之未之有廢也水旱之災日月之變與夫兵師疾癘昆蟲鼠豕之害凡一慝之作世常有祈有報未之有止也金縢之書雲漢之詩其意可謂至而其辭可謂盡矣夫精神之極其叩之無端其測之甚難而尊而信之如此其備者皆聖人之法何也彼有接于物者存乎自然世既不得而無則聖人固不得而廢之亦理之自然也聖人豈用其聰明哉善因于理之自然而巳其智足以周于事而其辨足以不惑則理之微妙皆足以盡之也故古之有為于天下者盡巳之智而聽于人盡人之智而聽于神未有能廢其一也書曰朕志先㝎詢謀僉同鬼神其依龜筮協從所謂盡巳之智而聽于人盡人之智而聽于神也繇是觀之則荀卿之言以謂雩筮救日小人以為神者以疾夫世之不盡在乎巳者而聽于人不盡在乎人者而聽于神其可也謂神之為理者信然則過矣蔽生于其智之不周而過生于其所感也閬州于蜀為巴西郡蜀車騎將軍領司隸校尉西鄉張侯名飛字益德嘗守是州州之東有張侯之冡至今千有餘年而廟祀不廢每嵗大旱禱南輒應嘉佑中比數嵗連熟閬人以謂張侯之賜也乃相與率錢治其廟舍大而新之侯以智勇為將號萬人敵當蜀之𥘉與魏將張郃相距于此能破郃軍以安此土可謂功施于人矣其役也又能澤而賜之則其食于閬人不得而廢也豈非冝哉知州事尚書職方員外郎李君獻卿字材叔以書來曰為我書之材叔好古君子也乃為之書而以豫之所聞于古者告之歸老橋記武陵桞侯圖其青陵之居屬豫敘而以書曰武陵之西北有湖屬于梁山者白馬湖也梁山之西南有田屬于湖上者吾之先人青陵之田也吾築廬于是而將老焉青陵之西二百步有泉出于兩崖之間而東注于湖者曰采陵之澗吾為橋于其上而為屋以覆之武陵之往來有事于吾廬者與吾異日得老而歸皆出于此也故題之曰歸老之橋維吾先人遺吾此土者宅有桑麻田有粳稌而渚有蒲蓮弋于高而追鳬雁之下上緍于深而逐鱣鮪之潛泳吾所以衣食其力而無愧于心也息有喬木之繁隂藉有豐草之幽香登山而凌雲覽天地之竒變弄泉而乘月遺氛埃之溷濁此吾所以處其怠倦而樂于自遂也吾少而安焉及壯而從事于四方纍乎萬物之自外至者未嘗不思休于此也今又獲位于朝而榮于寵祿以為觀逰于此而吾亦將老矣得無志于歸哉又曰世之老于官者或不樂于歸幸而有樂之者或無以為歸今吾有是以成吾樂也其為我記之使吾後之人有考以成吾志也余以謂先王之飬老者備矣士大夫之致其位者曰不敢煩以政蓋尊之也而士亦皆明于進退之莭無留祿之人可謂所得之也後世飬老之具既不備士大夫之老于位者或擯而去之也然士猶有冒而不知止者可謂兩失之也令柳侯年六十齒髮未衰方為天子致其材力以惠澤元元之時雖𣣔遺章綬之榮從湖山之樂余知未能遂其好也然其志于退也如此聞其風者亦可以興起矣乃為之記尹公亭記君子之于巳自淂而巳矣非有待於外也然而曰疾沒世而名不稱焉者所以與人同其行也人之于君子潛心而巳矣非有待於外也然而有表其閭名其鄉𣣔其風聲氣烈暴于世之耳目而無窮者所以與人同其好也內有以得諸巳外有以與人同其好此所以為先王之道而異乎百家之説也隨為州去京師逺其地僻絶慶曆之間起居舍人直龍圖閣河南尹公洙以不為在勢者所容謫是州居于城東五里開元佛寺之金燈院尹公有行義文學長于辨論一時與之逰者皆世之聞人而人人自以為不能及于是時尹公之名震天下而其所學蓋不以貧冨貴賤死生動其心故其居于隨日考圖書通古今為事而不知其官之為謫也嘗于其居之北阜竹柏之間結茅為亭以苃為嬉歲餘乃去既去而人不忍廢壞輒理之因名之曰尹公之亭州從事謝景平刻石記其事至治平四年司農少卿贊皇李公禹卿為是州始因其故基增庳益狹斬材以易之陶瓦以覆之既成而寬深亢爽環隨之山皆在几席又以其舊亭峙之于北于是隨人皆喜慰其思而又獲逰觀之美其冬李公以圖赱京師屬豫記之蓋尹公之行見于事言見于書者固巳赤然動人而李公于是又侈而大之者豈獨慰隨人之思于一時而與之共其樂哉亦將使夫荒遐僻絶之境至于後人見聞之所不及而傳其名覽其迹者莫不低佪俯仰想尹公之風聲氣烈至于愈逺而彌新是可謂與人同其好也則李公之傳于世亦豈有巳乎故豫為之書時熙寧元年正月日也筠州學記周衰先王之迹熄至漢六藝出于秦火之餘士學于百家之後言道德者矜高逺而遺世用語政理者務卑近而非師古刑名兵家之術則狃于暴詐惟知經者為善矣又爭為章句訓詁之學以其私見妄穿鑿為説故先王之道不明而學者靡然溺于所習當是時能明先王之道者揚雄而巳而雄之書世未知好也然士之出于其時者皆勇于自立無苟簡之心其取與進退去就又度于禮義及其巳衰而搢紳之徒抗志于強暴之間至于廢錮殺戮而其操愈厲者相望于先後故雖有不軌之臣猶低徊沒世不敢遂其篡奪自此至于魏晉以來其風俗之弊人材之乏久矣以迄于今士乃有持起于千載之外明先王之道以窹後之學者世雖不能皆知其意而往往好之故習其説者論道德之旨而知應務之非近議從政之躰而知法古之非迂不亂于百家不蔽于傳疏其所知者若此此漢之士所不能及然能尊而守之者則未必衆也故樂易惇朴之俗微而詭欺薄惡之習勝其于貧冨貴賤之地則飬廉逺耻之意少而偷合苟得之行多此俗化之美所以未及于漢也夫所聞或淺而其義甚高與所知有餘而其守不足者其故何哉繇漢之士察舉于鄊閭故不得不篤于自修至于漸磨之久則果于義者非強而能也今之士選用于文章故不得不篤于所學至於循習之深則得于心者亦不自知其至也由是觀之則上所好下必有甚者焉豈非信歟令漢與今有教化開導之方有庠序飬成之法則士於學行豈有彼此之偏先後之過乎夫大學之道將𣣔誠意正心修身以治其國家天下而必本于先致其知則知者固善之端而人之所難至也以今之事于人所難至者既幾矣則上之施化莫易于斯時顧所以導之如何爾筠為州在大江之西其地僻絶當慶曆之𥘉詔天下立學而筠獨不能應詔州之士以為病至治平三年蓋二十有三年矣始告于知州事尚書都官郎中董君儀董君乃與通判州事國子博士鄭君舊相州之東南得亢爽之地築宫于其上齋祭之室誦講之堂休息之廬至于庖湢庫廄各以序為經始于其春而落成于八月之望既而來學者常數十百人二君乃以書赱京師請記于豫豫謂二君之于政可謂知所務矣使筠之士相與升降乎其中講先王之遺文以致其知其賢者超然自信而獨立其中材勉焉以待上之教化則是宫之作非獨使夫來者玩思於空言以干世取祿而巳故為之著豫之所聞者以為記而使歸刻焉瀛州興造記熙寧元年七月甲申河北地大震壞城郭屋室瀛州為甚是日再震民訛言大水且至驚𣣔出赱諌議大夫李公肅之為高陽關路都總管安撫使知瀛州事使人分出慰曉訛言乃止是日大雨公私暴露倉儲庫積無所覆冒公開示便宜使有攸處遂行倉庫經營蓋障雨止粟以石數之至一百三十萬兵器他物稱是無壞者𥘉變作公命援兵警備訖于既息人無爭偷里巷安輯維北邉自通使契丹城壁樓櫓禦守之具寢弛不治習以為故公因災變之後以興壞起廢為巳任知民之不可重明也乃請于朝力取于旁路之羡卒費取于備河之餘材又以錢千萬市木于真定既集乃築新城方十五里高廣堅壯率加于舊其上為敵樓戰屋凡四千六百間先時州之正門弊在狹陋及是始斥而犬之其餘九圯壞之屋莫不繕理復其故常周而覽之聽斷有所燕休有次食有高廪貨有深藏賔屬士吏各有寧宇又以其餘力為南北角道若干里人去汙淖即于夷塗自七月庚子始事至十月己未落成其用人之力積若干萬若干千若千百工其竹􅓗木瓦之用積若干萬若干千若干百蓋遭變之𥘉財匱民流此邦之人以謂役巨用艱不纍數稔城壘室屋未可以復也至于始作踰時功以告具蓋公經理勸督內盡其心外盡其力故能易壤為成如是之敏事聞有詔嘉奬昔鄭火子産救災輔敗得宜當理史實書之衛有狄人之難文公治其城市宫室合于時制詩人歌之今􅌡地震之所摧敗與鄭之火災衛之寇難無異公禦備􅌟築不失其方亦猶古也故􅌡之士大夫皆𣣔刻石著公之功而豫之從父兄適與軍政在公幕府乃以書來屬豫記之豫不得辭故為之記尚俾來世知公之嘗勤于是邦也廣德軍重修鼓角樓記熙寧元年冬廣德軍作新門鼓角樓成太守合文武賓屬以落之既而以書走京師屬鞏曰為我記之鞏辭不能書反復至五六辭不獲乃為其文曰蓋廣德居吳之西疆故障之墟境大壤沃食貨冨攘人力有餘而獄訟赴訴財貢輸入以縣附宣道路回阻衆不便利歷世久之大宗皇帝在位四年乃按地圖因縣立軍使得奏事專決躰如大邦自是以來田里辨爭歲時稅調始不勤逺人用宜之而門閎隘痺樓觀弗飾于以納天子之命出令行化朝夕吏民交通四方覽示賔客弊在簡陋不中度程治平四年尚書兵部員外郎知制誥錢公輔守是邦始因豐年聚材積土將改而新之會尚書駕部郎中朱公夀昌來繼其任明年政成封內無事乃擇能吏揆時庀徒以畚以築以繩以削門阿是經觀闕是營不督不期役者自勸自冬十月甲子始事至十二月甲子卒功崇墉崛興復宇相瞰壯不及僣麗不及奢憲度政理於是出納士吏賔客于是馳赱尊施一邦不失宜稱至於伐鼓鳴角以警昏昕下漏數刻以莭晝夜則又新是四器列而棲之邦人士女易其聽觀莫不恱喜推美誦勤夫禮有必隆不得而殺政有必舉不得而廢二公于是兼而得之冝刻金石以書美實使邦之人百世之下于二公之德尚有考也元豐類藁卷第十八
