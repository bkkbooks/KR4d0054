front:
  text: 元豐類藁卷之二十六
  hash: sha256:e23cc10a7ddb009409c46de6662c843669db8559f42f11b6751c65003fafe664
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_026-1a}
body:
  text: 制誥知州制昔先王之法導民以德齊之以禮而有耻旦格後世不及然破觚以為圜斫雕以為朴禁罔踈闊而吏治蒸蒸不至于姦猶為近古朕甚慕之今能與吾共成此理者其唯循良之吏乎以爾為能與在兹選使刑罰清而風俗美爾能善于其職則明考察而公賞勸朕豈二于必行其尚自強方觀爾效知河陽制盟津冀豫之域背河向洛成皋之間天下之重地也山川之固為國屏翰分土而治非文武之特曷可以當選授哉某以材進拔閲試已孚俾仍近班往祗厥服有生齒之衆屬爾撫和有連營之師待爾綏輯尚茂循良之效庶寬西顧之憂知軍制開建城壁本以輯治軍旅今四方既平而假守之臣實任民事列于有土之官矧朔北並邉寄屬尤慎爾以選擇往祗朕命夫能宣布恩威以拊循吾人而懷附異俗則為善于其職尚思爾守無替訓辭通判制州有治中以佽助其長綱紀衆務舊矣今列城之守皆有二焉蓋亦其任也爾以考擇往祗厥敘尚思稱職以報朕恩罷館職加官制夫為官擇人處其名者必任其事而儒館之設有位號而無分職使學士大夫將何以效其實歟是用命爾進階一等而罷其虛稱其有異能朕將明試以功庶爾之材得施于用以成朕招俊乂康庶位之意焉其尚懋哉賞功制一王師西封爾能奮力行陳斬獻首馘稽諸賞典宜進官榮爾尚勉哉益圖來效賞功制二擐甲執兵人之重任賞信而速所以勸功爾爰整我師徂征西土大殱醜類來獻厥浮圖爾之勞進階一等尚思奮勵以佇異恩團練使駙馬都尉制大長公主吾姑也位號禮服褒崇光大國有彛章蓋其下嫁必得勳閥之門良能之士然後可以成先帝愛育之仁而稱朕隆崇之誼某貴舊家子內外行完是用選見于廷命之進尚團兵重任倅馬美名兼而授之蓋稽故事夫恭儉靖慎可以保令問而綏寵祿兹惟朕訓汝尚勉哉磨勘轉官制一吏之在位者積歲月之勤應有司之格必有甄進以明勸奬此國家之典也今序爾之勞遷位一等往思祗服以稱朕恩磨勘轉官制一朕謹名分正官守以董齊百工至其有試用之勞無踐履之珆則皆稽其歲月法有甄進所以使吾勤事之吏知所勸也今有司比爾之課應于遷格宜升階品以允新書其服朕恩往思來效軍功制一惟羌稔惡世盜西疆理將殄除內自生變致天之伐非朕敢私爾躬提偏師摧陷醜類震動河外宣明國威破竹之功成在旦夕賞不逾月朕尚遲之用遷爾官以勵衆士能殱大憝當有異恩軍功制二河外之地我之舊服羌能靖縱則以卑之今其將亡自相戕害爰命討伐蓋將天威某況勇有謀提兵以出獻俘斬馘屢奏厥功擢進使名以昭信賞能殱首惡尚有異恩軍功制三朕惟羌之猖狂內相賊殺致天之伐爰命六師止除罪人復吾故地而巳爾握兵而出屢以捷聞蓋夫軍賞之行速則衆勸是用進爾之秩以激亡心尚有不次之恩以待凱還之喜新及第授官制朕立學以飬天下之材設科以進其造秀之士其于教導推擇欲成美俗于四方得詳能于庶位者可謂盡其意矣爾以經行文學選自朕躬命以一官將觀汝效往祗厥敘思稱朕恩責將制汝始以微功進朕不次用汝而屬之守邉乃冒吾法出蠻夷之中發人採金無出入之籍有侵盜之形朕惟不𣣔數使逺人煩于追逮繫獄也寧失汝罪不究窮之堂後官轉官制吾調兵于外而號令莭制之繇中出者汝以宰屬與于治文書赴期會能辦吾事進秩一等以奬爾勞尚思恪勤無墜厥守詔勸學詔朕惟先王興庠序以風四方所以使學士大夫明其心也夫心無蔽故施之于巳則身治而家齊推之于人則官修而政舉其流及逺則化民成俗常必繇之古之所以長人材厚人倫者本是而巳朕甚慕之故設學校重學官之選而厚其祿凡欲以誘誨學者庶幾于古也而在位者無任職之心承業者無慕善之志至于師生相冒挾賂為姦嚚訟囂然駭于衆聽而况欲倡率訓導洽于禮義磨礱陶治積于人心使方聞修潔之士充于朝廷孝悌忠篤之風行于鄉邑其可得乎朕甚憫焉故更制博士而講求所以訓厲之方定著于令以為學制豫樂育天下之材而庶幾先王之治者可謂至矣自今有敦行誼謹名莭肅政教出入無悖明于經術者有司其以次升之使聞于朕將考擇而用之以勸于爾衆士有偷懦怠惰不循于教學不通明者博士吾所屬也其申之以誘導使其能有易于志而卒歸于善固吾之所受也豫既明立學之教具為科條其于學者有奬進退黜之格以昭勸戒至于學官其能明于教率而詳于考察有得人之稱則待以信賞若訓授無方而取舍失實亦將論其罰焉明以告爾朕言不欺尚其懋哉無詒爾悔勸農詔夫農衣食之所由出也生民之業莫重焉一夫之力所耕百畝飬生送死與夫出賦稅給公上者皆取具焉不幸水旱螟螣之災往往而有可謂勞且艱矣從政者知其如此故不違其時不奪其力以使之明時之因析以授之差地之腴瘠以處之春省耕秋省斂以助之詩曰饁𬒳南畝田畯至喜言上所以勞之也又曰駿發爾私終三十里言上所以勸之也其奬厲成就之者如此朕自承天序內重司農之官外遣劭農之使為之弛力役均地征修水利或一雨愆期則憂見于色或一穀不成則為加惻怛有復除之科有賑恤之令夙夜孜孜焦心勞思者凡以為農也今耕者衆矣而尚有未勉墾田廣矣而尚有未闢豈拊循勸率有所未備歟抑吏怠而忽不能宣究歟有司其于農桑之務益思所以除害興利詔令巳具者無或雍閼所未盡者勿憚以聞要使緣南畒之民舉欣欣然樂職安業洽于富足稱朕意焉正長各舉屬官誥蓋聞堯之治曰百姓昭明舜之治曰四門穆穆然則當是之時在位皆君子其是非不惑可知也故堯欲釐百工舜欲熙帝載求可任者皆訪諸四嶽因四嶽以命禹又因禹以命稷契臯陶因羣臣之臣僉曰以命垂益伯夷因伯夷以命夔龍其審官用賢不自任其聰明而稽之于衆如此然存于書二帝所命者羲和九官十二牧皆官之正長也至于屬官則未有二帝嘗命之者其遺法之可考則周穆王命伯景為太僕正戒之曰慎簡乃僚無以巧言令色便辟側媚其惟吉士則自擇其官之屬者官之正長之事此先王之成法也漢魏以來公府郡國亦皆自辟其屬而唐陸贄請使臺省長官自擇僚屬蓋上下之體相承如此以周天下之務此古今之通理也今朕董正治官始自三省至于百工皆正其名夫使在位皆君子而是非不惑此朕素所以厲士大夫也故凡官之長二朕既考檡而任之尚書政本也自郎已下用吏甚衆其令僕射左右丞尚書侍郎各于其所部貟有未備皆舉二人以聞朕將擇而用之其未用者亦識其名以待用朕稽于古以正百官稽于衆以求天下之士其勤可謂至矣惟官之長二之臣皆朕所屬以共成天下之治其尚體朕意所舉惟公以應朕之求所陳惟實以嚴朕之詔其得材失士有司其各以等差具為賞罰之格朕將舉而行之賞吾不吝罰亦無捨非獨搜楊幽滯庶幾為官得人亦將以觀吾大臣之能使朕得與衆士大夫合志同心以進天下之材作則垂法行之于今以詒後世追于先王之成憲無令唐虞有周專美于古不其美歟咨爾庶位其諭朕意一作懷賜高麗詔蓋聞在昔夏后分天下為五服地有逺近故治有詳略而聲教之盛東漸于海朕甚慕之顧德不明何以逮此而爾東國之君欵誠內附數遣使者乘不測之川獻其方貢惟爾之義朕實寵加宜有異恩以稱勤恪而爾比緣飬痾以醫為請眷然東顧朕預憂之是用擇遣方技之官具舟以往爾惠彼一方神明相祚藥劑所輔以時康寧逹于豫聞欣慶方屬而遽馳僚從來致謝章覽以慰懷奬勸良厚爾乃自祖以來保乂彼土其尚頥精神強飲食格于眉夀以均福于有衆使爾有世濟其美之功而朕預聲教及逺之休其始自今永孚于好䇿擬代廷試進士䇿問三首䇿問一朕有志于卑漢唐之治而欲比迹于唐虞三代之盛故于書無所不學而通其意于天下之事無所不講而極其本末于人之材長飬成就之者甚厚求而用之者甚至于民之務憂勤思念者甚詳撫而綏之者甚力患風俗之敝也正已以先百姓而明于教示患政理之陋也稽古以㝎制度而謹于持循欲斥大疆土勞于經武𣣔懷附夷狄也廣于推恩人之所𣣔者不敢違人之所惡者不敢強賞不敢以喜而濫刑不敢以怒而淫群臣之進對者夕請而朝見之四方之奏事者旦入而暮報之未嘗有聲色之娛未嘗有畋逰之好不營宫室不崇苑囿衣服飲食取具而已兢兢業業不敢暇逸日慎一日十有六年于兹矣惟先聖王之烈雖自視欿然察其用心如朕者亦可以無憾矣然古之大有為之君必有大效于天下至于小能小善亦各有小輔焉奚獨至于朕也意彌篤而功未見于人行彌勵而德未見于世豈所謂是者非歟所謂能者否歟抑所行者為可止歟所舍者為可用歟將在位者奉承法令苟為空文而不務究宣朕意歟意者今去古逺先王之政不可以復歟凡朕之所為繇前者其失安在宜於今者先後施設其要如何唐虞三代之所以成功德者孰近於今可推而行之漢唐之卑者孰存于今可革而去之其悉心以對朕將自擇䇿問二夫有二南之化則有羔羊之大夫兔罝之士漢廣之女其成人之材則見于思齊其成物之性則見于行葦蓋王者之治繇近及逺其效如此何其風俗美而流澤深也今朕躬禮義以先天下恐其未諭也崇庠序以導之縻一作靡爵賞以勸之患其未從也以政率之以威董之可謂盡心矣然朝廷之臣未能有素絲之莭正直之行中林之士未能有慎獨之心女子之誼未能有翹翹之絶况於有德有造成人之材牛羊勿踐遂物之性可望其髣佛乎朕于士民憊精刻一作克意以待其善而天下靡靡便文苟偷而巳何其習之難變也夫先王之教其本豈易于身先之其具豈易于崇庠序縻爵賞修政刑以將之與今之所務者同也然以今方古違從之效異何也豈今之所知者不明所尚者不審歟抑人散久矣不可以復化歟子大夫待問于廷其以經對䇿問三朕獲承祖考懼德不明故小大之事躬親省決以夜繼日不敢自暇而政未加善側身踐行兢兢業業不敢自逸為天下先而俗未加厚崇庠序之化信賞罰之法以開導而士未加勵憫農惠商輔其乏闕除其疾苦以勸助而民未加富礪器械教士卒所以經營之者甚具而武事未立也㝎制度正官號所以彌綸之者至備而文治未治也至于百工未昭彛倫未敘四民未盡得其職萬物未盡遂其性中國之勢或詘于夷狄九州之地未一于舊服是一皆戾古豈朕之不敏所知者非其要所繇者失其統歟抑群臣之在事者不稱其任不能輔任歟將乖繆之習久更革損益之始其功難見歟朕之待物者未嘗不以誠而下之應上者皆文具而已是何故也意朕之所為與古之所以致治者無異而其效之不同何也二帝三王秦漢以來迄于唐及五代雖功德有間然其所以治且昌與夫所以衰亂失之者其迹可考其原必有在方其治且昌也所繇之路本末先後其一致歟抑有殊也其衰亂失之也浸漸積纍所以致之一揆而巳邪抑不然也知古今明治亂子大夫之職也其具著于篇朕將親覽元豐類藁卷之二十六
