front:
  text: 元豊類藁卷之二十六
  hash: sha256:b0a2a891fc3aa30afee754a7c166e55babf4521e5f3c8abc1c351fe743a5b7e3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_026-1a}
body:
  text: 制誥知州制昔先王之法導民以徳齊之以禮而有耻旦格後世不及然破觚以為圜斵雕以為樸禁罔踈闊而吏治蒸蒸不至扵姦猶為近古朕甚慕之今能與吾共成此理者其唯循良之吏乎以爾為能與在兹選使刑罰清而風俗美爾能善扵其職則明考察而公賞勸朕豈貳扵必行其尚自強方觀爾効知河陽制盟津冀豫之域背河向洛成皐之間天下之重地也山川之固為國屏翰分土而治非文武之特曷可以當選授㢤某以材進㧞閱試已孚俾仍近班往祗厥服有生齒之衆属爾撫和有連营之師待爾綏輯尚茂循良之效庶寛西顧之憂知軍制開建城壁本以輯治軍旅今四方既平而假守之臣實任民事列扵有土之官矧朔北並邉寄属尤慎爾以選擇往祗朕命夫能宣布㤙威以拊循吾人而懐附異俗則為善扵其職尚思爾守無替訓辭通判制州有治中以佽助其長綱紀衆務舊矣今列城之守皆有貳焉盖亦其任也爾以考擇往祗厥叙尚思稱職以報朕㤙罷館職加官制夫為官擇人䖏其名者必任其事而儒館之設有位號而無分職使學士大夫將何以效其實歟是用命爾進階一䓁而罷其虚稱其有異能朕将明試以功庶爾之材得施扵用以成朕招俊乂康庶位之意焉其尚懋㢤賞功制一王師西封爾能奮力行陣斬献首馘稽諸賞典宜進官荣爾尚勉㢤益圖来効賞功制二擐甲執兵人之重任賞信而速所以勸功爾爰整我師徂征西土大殱醜類来献厥浮圖爾之劳進階一䓁尚思奮勵以佇異㤙團練使駙馬都尉制大長公主吾姑也位號禮服褒崇光大國有彛章盖其下嫁必得勲閥之門良能之士然後可以成先帝爱育之仁而稱朕隆崇之誼某貴舊家子内外行完是用選見于廷命之進尚團兵重任倅馬美名兼而授之盖稽故事夫恭儉靖慎可以保令問而綏寵祿兹惟朕訓汝尚勉㢤磨勘轉官制一吏之在位者積歲月之勤應有司之格必有甄進以明勸奨此國家之典也今序爾之劳遷位一䓁徃思祗服以稱朕㤙磨勘轉官制一朕謹名分正官守以董齊百工至其有試用之勞無踐履之珆則皆稽其歲月法有甄進所以使吾勤事之吏知所勸也今有司比爾之課應扵遷格宜升階品以允新書其服朕㤙徃思来効軍功制一惟羗稔惡世盗西疆理将殄除内自生変致天之伐非朕敢私爾躬提偏師摧䧟醜類震動河外宣明國威破竹之功成在旦夕賞不逾月朕尚遅之用遷爾官以勵衆士能殱大憝當有異㤙軍功制二河外之地我之舊服羗能靖縱則以卑之今其将亡自相戕害爰命討伐盖将天威某況勇有謀提兵以出献俘斬馘屡奏厥功擢進使名以昭信賞能殱首惡尚有異㤙軍功制三朕惟羗之猖狂内相賊殺致天之伐爰命六師止除罪人復吾故地而巳爾握兵而出屡以捷聞盖夫軍賞之行速則衆勸是用進爾之秩以激亡心尚有不次之㤙以待凱還之喜新及第授官制朕立學以飬天下之材設科以進其造秀之士其扵敎導推擇欲成美俗扵四方得詳能扵庻位者可謂盡其意矣爾以經行文學選自朕躬命以一官将觀汝效徃祗厥叙思稱朕㤙責将制汝始以㣲功進朕不次用汝而属之守邉乃冐吾法出蠻夷之中發人採金無出入之籍有侵盗之形朕惟不𣣔数使逺人煩扵追逮繫獄也寕失汝罪不䆒竆之堂後官轉官制吾調兵于外而號令莭制之繇中出者汝以宰属與扵治文書赴期㑹能辦吾事進秩一等以奨爾勞尚思恪勤無墜厥守詔勸學詔朕惟先王興庠序以風四方所以使學士大夫明其心也夫心無蔽故施之扵巳則身治而家齊推之扵人則官脩而政舉其流及逺則化民成俗常必繇之古之所以長人材厚人倫者本是而巳朕甚慕之故設學校重學官之選而厚其禄凡欲以誘誨學者庶㡬于古也而在位者無任職之心承業者無慕善之志至扵師生相冐挾賂為姦嚚訟囂然駭于衆听而况欲倡率訓導洽于禮義磨礱陶治積扵人心使方聞修㓗之士充扵朝廷孝悌忠䔍之風行扵郷邑其可得乎朕甚憫焉故更制愽士而講求所以訓厲之方定著扵令以為學制予樂育天下之材而庶㡬先王之治者可謂至矣自今有敦行誼謹名莭肅政敎出入無悖明于經術者有司其以次升之使聞于朕将考擇而用之以勸于爾衆士有偷懦怠惰不循于敎學不通明者博士吾所属也其申之以誘導使其能有易扵志而卒歸扵善固吾之所受也予既明立學之敎具為科條其扵學者有奨進退黜之格以昭勸戒至扵斈官其能明扵敎率而詳扵考察有得人之稱則待以信賞若訓授無方而取舍失實亦将論其罰焉明以告爾朕言不欺尚其懋㢤無詒爾悔勸農詔夫農衣食之所由出也生民之業莫重焉一夫之力所耕百畆飬生送死與夫出賦稅給公上者皆取具焉不幸水旱螟螣之菑徃徃而有可謂劳且艱矣從政者知其如此故不違其時不奪其力以使之明時之因析以授之差地之腴瘠以䖏之春省耕秋省歛以助之詩曰饁𬒳南畆田畯至喜言上所以劳之也又曰駿發爾私終三十里言上所以勸之也其奨厲成就之者如此朕自承天序内重司農之官外遣劭農之使為之弛力役均地征修水利或一雨愆期則憂見扵色或一糓不成則為加惻怛有復除之科有賑恤之令夙夜孜孜焦心劳思者凢以為農也今耕者衆矣而尚有未勉墾田廣矣而尚有未闢豈拊循勸率有所未備欤抑吏怠而忽不能宣䆒欤有司其扵農桑之務益思所以除害興利詔令巳具者無或雍閼所未盡者勿憚以聞要使縁南畒之民舉忻忻然樂職安業洽扵富足稱朕意焉正長各舉属官誥蓋聞堯之治曰百姓昭明舜之治曰四門穆穆然則當是之時在位皆君子其是非不惑可知也故尭欲釐百工舜欲熈帝載求可任者皆訪諸四岳因四岳以命禹又因禹以命稷契臯陶因羣臣之臣僉曰以命垂益伯夷因伯夷以命䕫龍其審官用賢不自任其聦明而稽之于衆如此然存扵書二帝所命者羲和九官十二牧皆官之正長也至扵属官則未有二帝嘗命之者其遺法之可考則周穆王命伯景為太僕正戒之曰慎簡乃僚無以巧言令色便辟側媚其惟吉士則自擇其官之属者官之正長之事此先王之成法也漢魏以来公府郡國亦皆自辟其属而唐陸贄請使䑓省長官自擇僚属盖上下之体相承如此以周天下之務此古今之通理也今朕董正治官始自三省至于百工皆正其名夫使在位皆君子而是非不惑此朕素所以厲士大夫也故凡官之長貳朕既考檡而任之尚書政本也自郎已下用吏甚衆其令僕射左右丞尚書侍郎各扵其所部貟有未備皆舉二人以聞朕将擇而用之其未用者亦識其名以待用朕稽于古以正百官稽于衆以求天下之士其勤可謂至矣惟官之長貳之臣皆朕所属以共成天下之治其尚体朕意所舉惟公以應朕之求所陳惟實以嚴朕之詔其得材失士有司其各以䓁差具為賞罰之格朕将㪯而行之賞吾不悋罰亦無捨非獨捜楊幽滯庶㡬為官得人亦将以觀吾大臣之䏻使朕得與衆士大夫合志同心以進天下之材作則垂法行之于今以詒後世追于先王之成憲無令唐虞有周專美于古不其美欤咨爾庶位其諭朕意一作懐賜高䴡詔盖聞在昔夏后分天下爲五服地有逺近故治有詳略而聲敎之盛東漸于海朕甚慕之頋徳不明何以逮此而爾東國之君欵誠内附数遣使者乗不測之川献其方貢惟爾之義朕實寵加宜有異㤙以稱勤恪而爾比縁飬痾以醫爲請眷然東頋朕預憂之是用擇遣方技之官具舟以徃爾惠彼一方神明相祚薬劑所𥙷以時康寕逹于予聞欣慶方属而遽馳僚從来致謝章覽以慰懐奨勸良厚爾乃自祖以来保乂彼土其尚頥精神強飲食格于眉夀以均福于有衆使爾有世濟其美之功而朕預聲敎及逺之休其始自今永孚于好䇿擬代廷試進士䇿問三首䇿問一朕有志扵卑漢唐之治而欲比迹扵唐虞三代之盛故扵書無所不學而通其意扵天下之事無所不講而極其本末扵人之材長飬成就之者甚厚求而用之者甚至扵民之務憂勤思念者甚詳撫而綏之者甚力患風俗之敝也正已以先百姓而明扵敎示患政理之陋也稽古以㝎制度而謹扵持循欲斥大疆土劳扵經武𣣔懐附夷狄也廣扵推㤙人之所𣣔者不敢違人之所悪者不敢強賞不敢以喜而濫刑不敢以怒而淫群臣之進對者夕請而朝見之四方之奏事者旦入而暮報之未嘗有聲色之娯未嘗有畋逰之好不营宫室不崇苑囿衣服飲食取具而已兢兢業業不敢暇逸日慎一日十有六年于兹矣惟先聖王之烈雖自視欿然察其用心如朕者亦可以無憾矣然古之大有為之君必有大效扵天下至扵小能小善亦各有小𥙷焉奚獨至扵朕也意弥䔍而功未見扵人行弥勵而徳未見扵世豈所謂是者非欤所謂能者否欤抑所行者為可止欤所舎者為可用欤将在位者奉承法令苟為空文而不務䆒宣朕意欤意者今去古逺先王之政不可以復欤凢朕之所為繇前者其失安在宜於今者先後施設其要如何唐虞三代之所以成功徳者孰近於今可推而行之漢唐之卑者孰存扵今可革而去之其悉心以對朕将自擇䇿問二夫有二南之化則有羔羊之大夫兔罝之士漢廣之女其成人之材則見扵思齊其成物之性則見扵行葦盖王者之治繇近及逺其效如此何其風俗美而流澤深也今朕躬禮義以先天下恐其未諭也崇庠序以導之縻一作靡爵賞以勸之患其未從也以政率之以威董之可謂盡心矣然朝廷之臣未能有素絲之莭正直之行中林之士未能有慎獨之心女子之誼未能有翹翹之絕况於有徳有造成人之材牛羊勿踐遂物之性可望其髣髴乎朕扵士民憊精刻一作克意以待其善而天下靡靡便文苟偷而巳何其習之難変也夫先王之敎其本豈易扵身先之其具豈易扵崇庠序縻爵賞脩政刑以将之與今之所務者同也然以今方古違從之效異何也豈今之所知者不明所尚者不審欤抑人散乆矣不可以復化欤子大夫待問于廷其以經對䇿問三朕獲承祖考懼徳不明故小大之事躬親省決以夜継日不敢自暇而政未加善側身踐行兢兢業業不敢自逸為天下先而俗未加厚崇庠序之化信賞罰之法以開導而士未加勵憫農惠商𥙷其乏闕除其疾苦以勸助而民未加富礪器械敎士卒所以經營之者甚具而武事未立也㝎制度正官號所以弥綸之者至備而文治未治也至扵百工未昭彛倫未叙四民未盡得其職萬物未盡遂其性中國之勢或詘扵夷狄九州之地未一扵舊服是一皆戾古豈朕之不敏所知者非其要所繇者失其統欤抑群臣之在事者不稱其任不能輔任欤将乖繆之習乆更革損益之始其功難見欤朕之待物者未嘗不以誠而下之應上者皆文具而已是何故也意朕之所為與古之所以致治者無異而其效之不同何也二帝三王秦漢以来迄于唐及五代雖功徳有間然其所以治且昌與夫所以衰亂失之者其跡可考其原必有在方其治且昌也所繇之路本末先後其一致欤抑有殊也其衰亂失之也浸漸積累所以致之一揆而巳邪抑不然也知古今明治亂子大夫之職也其具著于篇朕将親覽元豊類藁卷之二十六
