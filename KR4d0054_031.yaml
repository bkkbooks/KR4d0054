front:
  text: 元豊類藁卷之三十一
  hash: sha256:289a26220c3d6e92b51b6989e323874a975f369f85ff3d95de211477ade1711c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_031-1a}
body:
  text: 劄子再議經費臣嘗言皇祐治平歲入皆一億萬以上而嵗費亦略盡之景徳官一萬餘員皇祐治平皆三二作二萬餘員景徳郊費六百萬皇祐治平皆一千萬以上是二者費皆倍扵景徳使皇祐治平入官之門多於景徳者可考而知皇祐治平郊費之端多扵景徳者可考而知然後議其可罷者罷之可損者損之使嵗入如皇祐治平而禄吏奉郊之費同扵景徳則二者所省盖半矣則又以類推而省之以歲入一億萬計之所省者十之一則歲有餘財一萬萬所省者十之三則嵗有餘財三萬萬以三十年之通計之當有餘財九億萬可以爲十五年之蓄自古國家之富未有及此也陛下謂臣所言以節用爲理財之要世之言理財者未有及此也令一作今付之中書臣待罪三班按國𥘉承舊以供奉官左右班殿直爲三班立都知行首領之又前殿前氶㫖班院别立行首領之端拱以後分東西供奉又置左右侍禁及氶旨借職皆領于三班三班之稱亦不改𥘉三班吏員止扵三百或不及之至天禧之間廼緫四千二百有餘至于今廼揔一萬一千六百九十宗室又八百七十盖景徳員数巳十倍扵𥘉而以今考之殆三倍扵景徳畧以三年出入之籍較一作校之熈寧八年入籍者四百八十有七九年五百四十有四十年六百九十而死亡退免出籍者歲或過二百人或不及之則是嵗嵗有増未見其止也臣又畧考其入官之繇條扵别記以聞議其可罷者罷之可損者損之惟陛下之所擇臣之所知者三班也吏部東西審官與天下他費尚必有近扵此者惟陛下武加考察以類求之盖有約扵舊而浮扵今者有約扵今而浮扵舊者其浮者必求其所以俘之自而杜之其約者必本其所以約之由而從之如是而力行使天下嵗入億萬而所省者什三計三十年之通當有十五年之蓄夫財用天下之本也使國家冨盛如此則何求而不得何為而不成以陛下之聖質而加之勵精以変因循苟簡之敝方大脩法度之政以幸天下詒萬世故臣敢因官守以講求其損益之数而終前日之說以献惟陛下財擇請改官制前預選官習行逐司事務臣伏以陛下稽古正名脩定官制今百工庻務類别以明其扵講求經畫皆出聖慮彌綸之躰固巳詳盡然推行之始去故取新竊恐百執事之人素未諭扵其心習扵其耳目一日之間或未盡知其任群吏萬民聴治扵上者或未盡知所趋待夫問而後辨推而後通則必有煩阻之患留滯之虞若圖之扵早定之扵素則一日之間官號法制一新扵上而彛倫庻政叙行扵下内外逺近雖易視改聴而持循安習無異扵常此臣所以區區之愚庶有𥙷扵萬一也今百司庻務既巳類别若以所分之職所緫之務因今日之有司擇可属以事者使之區䖏自立叙名分憲令版圖文移案牘訟訴期㑹総領循行舉明鈎考有革有因有損有益有舉諸此而施諸彼有捨諸彼而受諸此有當警扵官有當布扵衆者自一事巳上本末次第使更制之前習勒巳㝎則命出之日但在奉行而巳盖吏部扵尚書爲六官之首試即而言之其所緫者選事也流内銓三班東西審官之任皆常歸之誠因令日之有司擇可属以事者使之區處自令僕射尚書侍郎郎員外郎以其位之升降爲其任之煩簡使省書審决某當属郎員外郎其當属尚書侍郎其當属令僕射各以其所属預爲科别如此則新命之官不煩而知其任矣曺局吏員如三班諸房十有六諸吏六十有四其所别之司所隷之人不必盡易惟當合者合之當析者析之當損者損之當益者益之使諸曺所主因其舊習如此則新𥙷之吏不諭而知其守矣憲令版圖文移案牘訟訴期㑹緫領循行舉明鈎考其因革損益之不同與有舉諸此而施諸彼有捨諸彼而受諸此有當警扵官布扵衆者皆前事之期莫不考定如此則新出之政不戒而知其叙矣夫新命之官不煩而知其任新𥙷之吏不諭而知其守新出之政不戒而知其叙則推行之始去故取新所以待之者備矣其扵選事如此旁至扵司封司勲考功當隷之者内服外服庻工萬事當㱕之者皆推此以通彼則吏部之任一作仕不待政出之日問而後辨推而後通也推吏部之事以通扵百工庻職如此則體雖至大而操之有要事雖一變而䖏之有素一日之間官號法制鼎新扵上而彛倫庻政叙行於下内外逺近雖改視易聴而持循安習無異扵常區區之愚庻有𥙷扵萬一者在此而臣愚淺薄不知治躰貪扵傾盡而不知其言之妄採掇増損實待聖㫁惟陛下之所財幸取進止請改官制前預令諸司次比整齊架閣版籍䓁事臣伏以陛下發徳音正官號法制度数皆易以新書太平之原實在扵此今論次已定宣布有期四方顒顒跂足而望臣切恐施行之際新舊代易之𥘉庶工之間或吏屬因循或簿書縁絶其扵督察漏畧檢防散逸弥綸之體不可不早有飾戒欲乞明諭有司架閣有未備者備之版籍有未正者正之凢憲令圖牒簿書案牘皆當次比整齊㰸蔵識别以至扵官寺什器凢物之属公上者亦皆當鈎考詳於簿録庻扵新舊更易之間得無漏畧㪚逸之敝非獨儆當令典領之懈且以絶異時追䆒之煩耴進止請以近更官制如周官六典為書臣竊以周制六卿各率其属皆有分職見扵禮經至唐自三省而下分命庻官亦各以其職事見扵六典今陛下講求化原更㝎官制盖作憲垂法繇古以來其扵大體有不可易者雖唐虞三代未嘗易也至扵縁人情因世故斟酌損益有不可不易者故雖唐虞之際極盛之時凡廵守四方則皆脩五禮而周人治象之法亦嵗有更革况扵時異事殊而可以膠扵一方之說泥扵一偏之跡㢤故陛下更制改作其彌綸大意則逺躰周官而近因唐制此所謂扵其大體有不可易者也至扵從宜應變則解縱拘攣獨出聖謀不牽常筭此謂斟酌損益有不可不易者也夫能審其不可易者而因之断其不可不易者而更之惟當而巳然後可謂明制作之躰惟陛下聖性之卓故能䖏之無疑此非群臣之所能望也今更㝎官制其所先者在扵使群臣庻位皆明知其職分聀分既明然後在事者得各因其名以効其實而攷察者𣣔覈其實則必推其名此作法之大要所謂不可易者也今庻尹百工分位旣㝎宜有新書如周官六典明白之文使内外上下曉然䆒悉以熈庻績而康萬事臣適典明命亦得各以百執事所分之職載扵訓詞以飾戒在列以稱陛下董正治官循名責實之意其書冝以時頒布以幸天下如體重事鉅其不可不易者文字論次尚有未周則百司所守小大之務亦宜先有條具委曲章明施扵列位使人人皆知其任勸扵赴功而臣亦得討論演暢見扵王者之訓以副聖君勵精求治為世作則之心取進止史館申請三臣脩定國史止依司馬遷以下編年體式至扵書事随便今畧具條目進呈其餘文義曲折難預為之例者湏候著撰之際徐更随宜候書成日為逐篇述傳繫扵未卷以見論次之意盖若預為定例恐扵文義湏至拘牽就例或有所妨其書事随便今畧具條且如左一群臣拜罷見扵百官表一刑法食貨五行天文災祥之類各見扵逐志巳士更不扵本紀載述之類一名位雖崇而事迹無可紀者更不立傳或善惡有可見者則附見之一善惡可勸戒是非後世當考者書之其細故常行更不備書右取進止臣脩定五朝國史有合申請事具下項一自宋興以来名臣良士或増有名位或素在丘園其有嘉言善行歴官行事軍國勲勞或有貢獻封章或有著撰文字或本家有碑誌行状紀述之文或他人為作傳記之類今来所脩國史湏合收採載述恐慮舊書訪㝷之𥘉有所未盡至今嵗月巳逺耳目所及者少或至漏畧𣣔乞京畿委開封知府及畿縣知縣在外委逐路監司州縣長吏博加求訪有子孫者延致詢問諭以朝廷之意𣣔使名臣良士言行功實傳之不杇為人子孫者亦宜知父祖善狀合要顯揚使得見扵國史以稱為人後嗣之義各令以其所有事迹或文字盡因郡府納扵史局以備論次或文字稍多其家無力繕冩即官為委官以官用傭冩字人書冩校正其曽任两府两制䑓諌之家湏逐家一一詢訪無令漏畧各限自指揮到日一月内取到文字發送史局其逐路監司州府逐縣長吏各具無漏略文状連申申中書向来編集累朝文字本局不見得從𥘉名目及樞宻院有編集機要文字并兩䖏有録得累朝御扎手詔副本文字𣣔乞令檢送本局以備討論取進止臣脩㝎五朝國史㩀舊書及更加採摭以俻紀録外竊慮五聖臨御之日徳音行事外廷有所未聞及自来更有紀述發明文字蔵在宫禁者𣣔乞特賜頒示以憑論次所貴祖宗功徳傳布方册得以周盡右取進止請訪問高驪世次臣竊考舊史高句驪自朱蒙得紇升骨城居焉號曰高句驪因以高為氏歴漢至唐高宗時其王高蔵失國内徙聖暦中蔵子徳武得為安東都督其後稍自為國元和之未嘗献樂工自此不復見扵中國五代同光天成之際高驪王高氏復来貢而失其名長興三年乃稱推知國事王建遣使奉貢因以建為王建子武武子昭昭子伷伷弟治治弟誦誦弟詢相継立盖自朱蒙至蔵可考者一姓九百年傳二十一君而失國其後復自爲國而各及世次興廢之本末與夫王建之所以始皆不可考王氏自建至伷四王皆傳子自治至詢三王皆傳弟詢自天聖八年來貢至熈寕三年今王徽来貢其不見扵中國者盖四十有三年今陛下仁聖文武聲教之盛東漸海外徽所遣使方集闕下盖高句驪文字之國也其使者宜知其國之君長興壊本末名及世次𣣔乞詔諭典客之臣問自徳武之東也其後何以能復其國何以復失之嘗傳㡬君其名及世次可数否王建之所以興者何繇其興也自建始欤抑建之先巳有興者欤自天聖至熈寕四十三年之間而徽復見扵中國其継詢而立者欤豈其中間復自有継詢者歟徽扵詢為何属如其言可論次足以𥙷舊史之闕明陛下徳及萬里殊方絶域前世有不能致者慕義来庭故能䆒知四夷之事非聲敎之所𬒳者逺不能及此取進止貼黄𣣔乞諭畢仲衍因話從容訪問或来使未能盡對即諭以候歸本國討㝷記録因向後别使人附來高􅌐世次髙句􅌐其先出夫餘王得河伯女因閉於室感日而孕生朱蒙及長夫餘之臣謀殺之朱蒙走得免至紇外骨城居焉號高句􅌐因以高為氏朱蒙死子如栗立如栗死子莫来立漢武帝元豊四年减朝鮮置元莵郡以高句䴡為縣属七騶立史失其世次王莾時發高䴡兵伐胡不𣣔行遂皆出塞為冠歸咎扵句騶嚴尤誘而斬之莾乃大悅更名高句䴡王為下勾䴡侯光武建武八年高句驪遣使朝貢復其王號史不著其名莫来裔孫宫立殤安之間冠遼東宫死子遂成立安帝建光元年也遂成死子伯固立北史云宫死子伯固立伯固死子伊夷模立伊夷模死子位宫立位宫死元孫乙弗利立類冠遼東弗利死子釗立安立史失其世次西云以高䴡王安為平州牧晋孝武大元十年也釗曽孫璉立晋太武時始遣使者詣安東奉表璉死孫雲立後魏孝文太和五年也南史云璉死子雲立雲死子安立後魏宣武神亀中安死子延立延死子成立成死子湯立湯死子元立隋開皇大業中皆伐之元死弟建武立建武之立隋未也唐高祖武徳中拜遼東郡王建武死弟之子蔵立建武為盖蘇文所死更立建武弟之子蔵為王自為莫離支専囯猶唐兵部尚書中書令之聀正觀十八年遣李勣伐之十九年太宗親征髙宗龍朔元年遣任雅相以三十六軍水陸分途觀髙䴡之釁乾豊三年李勣㧞扶餘城捴章元年李勣㧞平壤城執蔵牧其地盖朱蒙至蔵有囯九百年矣蔵子徳武為安東都督武后聖暦二年也後稍自為囯至元和末遣使獻楽工同光天成間高驪國王高氏累遣使朝貢唐末中原多事其囯遂自立君長同光後唐莊宗時天成明宗時天德元年至長㒷二年二百六十四年通上九百年計一千一百六十四年髙麗國王王建立明宗長興三年權知囯事王建遣使朝貢明宗拜為主建死子武立武死子昭立建隆三年四年開寳五年来貢昭死子伷立開寳元年太平㒷囯二年三年五年六年来貢伷死弟治立太平㒷囯七年九月遣使来貢制以治為王九年端拱元年来貢淳化二年遣使来印經詔賜之四年又来貢五年来乞師優詔荅之治死弟誦立誦𥘉立遣兵校徐逺来候朝廷徳音逺乆不至咸平三年其臣吏部侍郎趙之遴命牙將朱仁紹至登州訪之州將以聞召見仁紹回因賜誦鈿亟詔六年来貢乞師優詔荅之誦死弟詢立大中祥符七年天禧元年五年天聖八年来貢元豊類藁卷之三十一
