front:
  text: 元豐類藁卷之三十一
  hash: sha256:429470b5a9a43cee4d9af8a38f056cd9e634bda021bec6b9994ec329a5cbcfc6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_031-1a}
body:
  text: 劄子再議經費臣嘗言皇祐治平歲入皆一億萬以上而嵗費亦略盡之景德官一萬餘員皇祐治平皆三二作二萬餘員景德郊費六百萬皇祐治平皆一千萬以上是二者費皆倍于景德使皇祐治平入官之門多於景德者可考而知皇祐治平郊費之端多于景德者可考而知然後議其可罷者罷之可損者損之使嵗入如皇祐治平而祿吏奉郊之費同于景德則二者所省蓋半矣則又以類推而省之以歲入一億萬計之所省者十之一則歲有餘財一萬萬所省者十之三則嵗有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄自古國家之富未有及此也陛下謂臣所言以節用為理財之要世之言理財者未有及此也令一作今付之中書臣待罪三班按國𥘉承舊以供奉官左右班殿直為三班立都知行首領之又前殿前氶旨班院别立行首領之端拱以後分東西供奉又置左右侍禁及氶旨借職皆領于三班三班之稱亦不改𥘉三班吏員止于三百或不及之至天禧之間乃總四千二百有餘至于今乃揔一萬一千六百九十宗室又八百七十蓋景德員數巳十倍于𥘉而以今考之殆三倍于景德略以三年出入之籍較一作校之熙寧八年入籍者四百八十有七九年五百四十有四十年六百九十而死亡退免出籍者歲或過二百人或不及之則是嵗嵗有增未見其止也臣又略考其入官之繇條于别記以聞議其可罷者罷之可損者損之惟陛下之所擇臣之所知者三班也吏部東西審官與天下他費尚必有近于此者惟陛下武加考察以類求之蓋有約于舊而浮于今者有約于今而浮于舊者其浮者必求其所以俘之自而杜之其約者必本其所以約之由而從之如是而力行使天下嵗入億萬而所省者什三計三十年之通當有十五年之蓄夫財用天下之本也使國家冨盛如此則何求而不得何為而不成以陛下之聖質而加之勵精以變因循苟簡之敝方大修法度之政以幸天下詒萬世故臣敢因官守以講求其損益之數而終前日之説以獻惟陛下財擇請改官制前預選官習行逐司事務臣伏以陛下稽古正名修定官制今百工庶務類别以明其于講求經畫皆出聖慮彌綸之躰固巳詳盡然推行之始去故取新竊恐百執事之人素未諭于其心習于其耳目一日之間或未盡知其任群吏萬民聽治于上者或未盡知所趨待夫問而後辨推而後通則必有煩阻之患留滯之虞若圖之于早定之于素則一日之間官號法制一新于上而彛倫庶政敘行于下內外逺近雖易視改聽而持循安習無異于常此臣所以區區之愚庶有輔于萬一也今百司庶務既巳類别若以所分之職所總之務因今日之有司擇可屬以事者使之區處自立敘名分憲令版圖文移案牘訟訴期會總領循行舉明鈎考有革有因有損有益有舉諸此而施諸彼有捨諸彼而受諸此有當警于官有當布于衆者自一事巳上本末次第使更制之前習勒巳㝎則命出之日但在奉行而巳蓋吏部于尚書為六官之首試即而言之其所總者選事也流內銓三班東西審官之任皆常歸之誠因令日之有司擇可屬以事者使之區處自令僕射尚書侍郎郎員外郎以其位之升降為其任之煩簡使省書審決某當屬郎員外郎其當屬尚書侍郎其當屬令僕射各以其所屬預為科别如此則新命之官不煩而知其任矣曺局吏員如三班諸房十有六諸吏六十有四其所别之司所隸之人不必盡易惟當合者合之當析者析之當損者損之當益者益之使諸曺所主因其舊習如此則新輔之吏不諭而知其守矣憲令版圖文移案牘訟訴期會總領循行舉明鈎考其因革損益之不同與有舉諸此而施諸彼有捨諸彼而受諸此有當警于官布于衆者皆前事之期莫不考定如此則新出之政不戒而知其敘矣夫新命之官不煩而知其任新輔之吏不諭而知其守新出之政不戒而知其敘則推行之始去故取新所以待之者備矣其于選事如此旁至于司封司勳考功當隸之者內服外服庶工萬事當歸之者皆推此以通彼則吏部之任一作仕不待政出之日問而後辨推而後通也推吏部之事以通于百工庶職如此則體雖至大而操之有要事雖一變而處之有素一日之間官號法制鼎新于上而彛倫庶政敘行於下內外逺近雖改視易聽而持循安習無異于常區區之愚庶有輔于萬一者在此而臣愚淺薄不知治躰貪于傾盡而不知其言之妄採掇增損實待聖斷惟陛下之所財幸取進止請改官制前預令諸司次比整齊架閣版籍等事臣伏以陛下發德音正官號法制度數皆易以新書太平之原實在于此今論次已定宣布有期四方顒顒跂足而望臣切恐施行之際新舊代易之𥘉庶工之間或吏屬因循或簿書緣絶其于督察漏略檢防散逸彌綸之體不可不早有飾戒欲乞明諭有司架閣有未備者備之版籍有未正者正之凡憲令圖牒簿書案牘皆當次比整齊㰸藏識别以至于官寺什器凡物之屬公上者亦皆當鈎考詳於簿録庶于新舊更易之間得無漏略散逸之敝非獨警當令典領之懈且以絶異時追究之煩耴進止請以近更官制如周官六典為書臣竊以周制六卿各率其屬皆有分職見于禮經至唐自三省而下分命庶官亦各以其職事見于六典今陛下講求化原更㝎官制蓋作憲垂法繇古以來其于大體有不可易者雖唐虞三代未嘗易也至于緣人情因世故斟酌損益有不可不易者故雖唐虞之際極盛之時凡巡守四方則皆修五禮而周人治象之法亦嵗有更革况于時異事殊而可以膠于一方之説泥于一偏之迹哉故陛下更制改作其彌綸大意則逺躰周官而近因唐制此所謂于其大體有不可易者也至于從宜應變則解縱拘攣獨出聖謀不牽常算此謂斟酌損益有不可不易者也夫能審其不可易者而因之斷其不可不易者而更之惟當而巳然後可謂明制作之躰惟陛下聖性之卓故能處之無疑此非群臣之所能望也今更㝎官制其所先者在于使群臣庶位皆明知其職分聀分既明然後在事者得各因其名以效其實而考察者𣣔核其實則必推其名此作法之大要所謂不可易者也今庶尹百工分位既㝎宜有新書如周官六典明白之文使內外上下曉然究悉以熙庶績而康萬事臣適典明命亦得各以百執事所分之職載于訓詞以飾戒在列以稱陛下董正治官循名責實之意其書冝以時頒布以幸天下如體重事巨其不可不易者文字論次尚有未周則百司所守小大之務亦宜先有條具委曲章明施于列位使人人皆知其任勸于赴功而臣亦得討論演暢見于王者之訓以副聖君勵精求治為世作則之心取進止史館申請三臣修定國史止依司馬遷以下編年體式至于書事隨便今略具條目進呈其餘文義曲折難預為之例者須候著撰之際徐更隨宜候書成日為逐篇述傳繫于未卷以見論次之意蓋若預為定例恐于文義須至拘牽就例或有所妨其書事隨便今略具條且如左一群臣拜罷見于百官表一刑法食貨五行天文災祥之類各見于逐志巳士更不于本紀載述之類一名位雖崇而事迹無可紀者更不立傳或善惡有可見者則附見之一善惡可勸戒是非後世當考者書之其細故常行更不備書右取進止臣修定五朝國史有合申請事具下項一自宋興以來名臣良士或增有名位或素在丘園其有嘉言善行歷官行事軍國勳勞或有貢獻封章或有著撰文字或本家有碑志行狀紀述之文或他人為作傳記之類今來所修國史須合收採載述恐慮舊書訪尋之𥘉有所未盡至今嵗月巳逺耳目所及者少或至漏略𣣔乞京畿委開封知府及畿縣知縣在外委逐路監司州縣長吏博加求訪有子孫者延致詢問諭以朝廷之意𣣔使名臣良士言行功實傳之不杇為人子孫者亦宜知父祖善狀合要顯揚使得見于國史以稱為人後嗣之義各令以其所有事迹或文字盡因郡府納于史局以備論次或文字稍多其家無力繕寫即官為委官以官用傭寫字人書寫校正其曽任兩府兩制臺諌之家須逐家一一詢訪無令漏略各限自指揮到日一月內取到文字發送史局其逐路監司州府逐縣長吏各具無漏略文狀連申申中書向來編集纍朝文字本局不見得從𥘉名目及樞密院有編集機要文字并兩處有録得纍朝御扎手詔副本文字𣣔乞令檢送本局以備討論取進止臣修㝎五朝國史據舊書及更加採托以備紀録外竊慮五聖臨御之日德音行事外廷有所未聞及自來更有紀述發明文字藏在宫禁者𣣔乞特賜頒示以憑論次所貴祖宗功德傳布方册得以周盡右取進止請訪問高驪世次臣竊考舊史高句驪自朱蒙得紇升骨城居焉號曰高句驪因以高為氏歷漢至唐高宗時其王高藏失國內徙聖曆中藏子德武得為安東都督其後稍自為國元和之未嘗獻樂工自此不復見于中國五代同光天成之際高驪王高氏復來貢而失其名長興三年乃稱推知國事王建遣使奉貢因以建為王建子武武子昭昭子胄胄弟治治弟誦誦弟詢相繼立蓋自朱蒙至藏可考者一姓九百年傳二十一君而失國其後復自為國而各及世次興廢之本末與夫王建之所以始皆不可考王氏自建至胄四王皆傳子自治至詢三王皆傳弟詢自天聖八年來貢至熙寧三年今王徽來貢其不見于中國者蓋四十有三年今陛下仁聖文武聲教之盛東漸海外徽所遣使方集闕下蓋高句驪文字之國也其使者宜知其國之君長興壞本末名及世次𣣔乞詔諭典客之臣問自德武之東也其後何以能復其國何以復失之嘗傳幾君其名及世次可數否王建之所以興者何繇其興也自建始歟抑建之先巳有興者歟自天聖至熙寧四十三年之間而徽復見于中國其繼詢而立者歟豈其中間復自有繼詢者歟徽于詢為何屬如其言可論次足以輔舊史之闕明陛下德及萬里殊方絶域前世有不能致者慕義來庭故能究知四夷之事非聲教之所𬒳者逺不能及此取進止貼黃𣣔乞諭畢仲衍因話從容訪問或來使未能盡對即諭以候歸本國討尋記録因向後别使人附來高􅌐世次髙句􅌐其先出夫餘王得河伯女因閉於室感日而孕生朱蒙及長夫餘之臣謀殺之朱蒙走得免至紇外骨城居焉號高句􅌐因以高為氏朱蒙死子如栗立如栗死子莫來立漢武帝元豐四年減朝鮮置元莵郡以高句麗為縣屬七騶立史失其世次王莾時發高麗兵伐胡不𣣔行遂皆出塞為冠歸咎于句騶嚴尤誘而斬之莾乃大悅更名高句麗王為下勾麗侯光武建武八年高句驪遣使朝貢復其王號史不著其名莫來裔孫宫立殤安之間冠遼東宫死子遂成立安帝建光元年也遂成死子伯固立北史云宫死子伯固立伯固死子伊夷模立伊夷模死子位宫立位宫死元孫乙弗利立類冠遼東弗利死子釗立安立史失其世次西云以高麗王安為平州牧晉孝武大元十年也釗曽孫璉立晉太武時始遣使者詣安東奉表璉死孫雲立後魏孝文太和五年也南史云璉死子雲立雲死子安立後魏宣武神龜中安死子延立延死子成立成死子湯立湯死子元立隋開皇大業中皆伐之元死弟建武立建武之立隋未也唐高祖武德中拜遼東郡王建武死弟之子藏立建武為蓋蘇文所死更立建武弟之子藏為王自為莫離支専國猶唐兵部尚書中書令之聀正觀十八年遣李績伐之十九年太宗親征髙宗龍朔元年遣任雅相以三十六軍水陸分途觀髙麗之釁乾豐三年李績拔扶餘城捴章元年李績拔平壤城執藏牧其地蓋朱蒙至藏有國九百年矣藏子德武為安東都督武后聖曆二年也後稍自為國至元和末遣使獻樂工同光天成間高驪國王高氏纍遣使朝貢唐末中原多事其國遂自立君長同光後唐莊宗時天成明宗時天德元年至長興二年二百六十四年通上九百年計一千一百六十四年髙麗國王王建立明宗長興三年權知國事王建遣使朝貢明宗拜為主建死子武立武死子昭立建隆三年四年開寶五年來貢昭死子胄立開寶元年太平興國二年三年五年六年來貢胄死弟治立太平興國七年九月遣使來貢制以治為王九年端拱元年來貢淳化二年遣使來印經詔賜之四年又來貢五年來乞師優詔答之治死弟誦立誦𥘉立遣兵校徐逺來候朝廷德音逺久不至咸平三年其臣吏部侍郎趙之遴命牙將朱仁紹至登州訪之州將以聞召見仁紹回因賜誦鈿亟詔六年來貢乞師優詔答之誦死弟詢立大中祥符七年天禧元年五年天聖八年來貢元豐類藁卷之三十一
