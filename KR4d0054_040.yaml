front:
  text: 元豐類藁卷之四十
  hash: sha256:e096af4aadc5877657f69ebddaa5dab2fcd62d19e13f6b38111523fb8ca7a3b3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_040-1a}
body:
  text: 祭文五龍堂祈雨文乃四月以旱禱于邪溪薤山應時得雨麥以豐成稻可播種獨異于他境實維其賜今稻田又乾矣此邦之人皆謂龍虎之河五龍之神禱雨輒應余敢不告神其降鑒大施澤于斯民使獲有年則人于報神亦維無斁無俾薤山邪溪専美于此邦以作神羞靈溪洞祈雨文吏不勝任荐致旱災禱于山川為黷已甚然稻田日瘁民命所託夙夜憂懼不知所為維爾有神世載靈德是用靦顔有請忘其慙羞尚其降祥時賜甘雨俾歲無害維神之休又大悲祈雨文盛夏在辰常暘為沴稻將蔞瘁人用嗟憂繇吏治之不明致姦和氣維佛乘之無礙善濟群生是敢同祓精誠虔祈覺蔭覬滂沱于膏澤俾浹洽于原田用救焦枯實依慈惠大悲謝雨文民無常心惟安于足食佛有慧力善救于含生比緣盛夏之辰久苦驕陽之沴懼傷稼穡將致凶飢故仗莭之雋良暨守藩之孤陋俱陳精懇虔對晬容果蒙感答之慈立致雱𩃱之澤滌除害氣勃起良苗變瘁為榮物遂更生之理易憂以喜人諧望歲之心維是鴻私敢忘昭報尚期降鑒常卑有秋諸廟謝雨文吏之罪大矣一切從事于謹繩墨督賦役而巳民之所𣣔不能與所惡不能去自恕以竊食不知其可愧安能使隂陽和風雨時乎故若鞏者任職于外六年于兹而無歲不勤于請雨賴天之仁鬼神之靈閔人之窮輒賜甘澤以救大旱吏知其幸而巳其為酒醴牲饔以報神之賜曷敢不虔維神尚終惠之使永有年則神亦無窮有依于人諸廟謝雨文積是驕陽莫救稻苗之悴獲兹加霔尚兹秋物之榮是荷靈休敢忘祗報諸寺院謝雨文比以常暘仰祈真蔭果獲滂沱之澤大蘇焦旱之田敢擇佳辰特申嚴謝尚期降祐常卑有秋諸葛武侯廟祈雨文天子以歲久旱所𬒳者廣分命守臣禱其境內鬼神之有靈德在于人者維靈有志于民舊矣故敢以告尚其降鑒大施澤于四方以稱天子憂人閔雨之意諸廟祈晴文曰涉歲以來自春徂夏久隂不解積雨旦多今特燥而成粟待暘而種而雲屯尚密土潤方升民皆竊憂吏用深懼百姓之困甚矣惟神得無念乎尚其開除山川相導出日俾歲無害為民之休謝晴文比苦雨淫懼為歲害蒙神之德賜以時暘今蠶麥雨成里閭相慶敢不嚴報尚祈終惠諸廟祇雨文諸寺改作敢干真覺仲布虔誠惟佛至慈與人為歸今歲之𥘉未愆雨澤然而麥才薄稔蠶不甚冝則民之窮蓋可知矣今兹農望惟在秋成而溫風方騰旱氣彌盛是用側身以懼有禱干神尚其降衷時賜甘霔俾歲無害亦神有依薤山祇雨文志言衆山雲起此山無雲終不降雨衆山無雲此山雲起必降大雨是能為雨能為不雨在神而巳今歲數不登而旱氣又作吏之不良無所逃罪民貧可憫神能為雨而不為是何情哉神其為民出膚寸之雲致數尺之雨使凶為穰以救民之急則此邦之人所以報事神者子子孫孫其孰敢怠尚其念之無作神羞諸廟謝雨文比苦亢陽具陳致禱實蒙甘澤敢不昭報洪州謁諸廟文惟神播澤在人廟食兹土鞏守藩之始敢修禱謁尚其靈德常庇斯民神于無窮亦永有賴洪州謁夫子廟文惟神播澤在人廟食兹土鞏守潘之始敢修禮謁永惟聖德覆𬒳無窮尚其聖德學者洪州諸寺觀祈晴文為有大慈速于善應人無常産理則難安惟穡事之將成而雨淫之不止晪腼省懼豈敢皇寧蓋兹疲癃之民已出旱災之後室家淍弊閭里愁嗟如復荐飢將焉託命今蚤稼甫畢晚苗方興窪下之田己傷稼穡亢爽之地實懼浸淫是敢虔對睟容仰陳淨懇伏望廊山川之曀滯回日月之光華諧此順成湛然澄霽實其慧廕感慰輿情諸覩云道實無方物來斯應民惟難保食足為先虔對上靈實繄真蔭謹詞諸廟云神實無方物來斯應民惟難保食足為先虔對至靈繄妙蔭謹告諸寺觀廟謝晴文比虞水溢將敗歲功不自皇寧敢陳懇迫果蒙隂施即俾時暘田里歡呼粢盛有望惟神靈所以賜于人者豈愚足以當之尚冀餘休終成多稼民能自保神則有依祭西山玉隆觀許真君隂功及物靈德在天􅒺惟真馭之升實以中秋之序人承餘烈歲即遺祠故兹守土之微敢躰愛民之素俾往陳于薄具尚永庇于羣生仲秋告祭諸廟文歲在仲秋祀有常典維神邁德實庇此邦敢率舊章用陳明薦諸寺觀祈雪文窮臘未雪方冬尚溫人有疾癘之憂地無膏澤之潤職在綏撫心焉震慚敢祈膚寸之雲播為盈尺之瑞蕩除隂氣順致時寒使閭巷消薦瘥之災田疇成多稼之利實依孚位俯徇微誠諸寺觀謝雪文比緣窮臘之期久苦亢陽之沴敢徼靈施仰布愚誠蒙膏澤之應時致祈寒之協序人無疵癘之患物有豐成之祥實賴洪休敢忘昭報更祈密雪尚及餘冬祭順濟王文維爾有神克相王師章示見象皇帝侈神之德俾錫號位秩尊禮盛非以序升今州遣從事即神之祠致皇帝命尚其欽哉以對休寵福州謁夫子廟文惟夫子之德仰之彌高夫子之言窮之益逺學者潛心庶幾髮佛某守邦之始躬即學宫敢修禮謁尚其降鑒福州謁諸廟文維神作德自幽信于兹土人用報事秩祭有常鞏甫此守邦敢修禮謁尚其降福終賚斯民福州鱔溪禱雨文曰嗟乎旱也誰則為之芃芃之稼將福而萎嗷嗷之衆曷望而依維閩屬者寇賊之罹逮其既附我士巳疲餘醜成群百十睢睢跳踉出沒負力乘巇亦有為渠諸偷所推相望棊布未受􅎗羈室家莫寧逺近並疑我畜以柔亦震以威從有法賞不從係纍或優而序或就纒徽逮歲朔易蕩㝎無遺山林夜行笑語追隨吾人即安含糗而嬉士馬亦奮桓桓騤騤天子聖德海邦是綏維此海邦𥘉亦難一作艱飢今寧宇矣師征始歸今食足矣廪實尚微若歲大熟如梁如茨如京如抵自公及私獄無訟繫里無盜窺式于永世方始在兹今此大田既碩而齊俾不卒成孰忍為斯神有靈迹國人所祗神有顯號天子所躋萎能起之稿能澤之胡寧有餘斂而不施我用卜日蚤駕以馳即告潭側尚其聽之攘除驕陽騰雲彍霓播為甘液霈灑淋漓俾農有秋百物具冝熄偷與爭長置刑笞人于報事豈有斁思諸廟禱雨文常賜為沴將害農功夙夜懷憂不皇啓處敢徼靈貺時賜膏澤俾人獲濟惟神亦永有依謝雨文維閩之人前歲苦飢云歲苦盜足食而安期自今始而方夏旱映懼害穡事兹余用稽于衆蓋可以徼福于民者罔不馳告不敢愛力不敢寧居賴神之仁卑以膏澤自未至酉逺近周浹維歲大熟可立而需敢飭豆邊報用典禮吏無明德而但知告其困急于神神既賜之其尚終惠題禱雨文後福州元豐元年戊午自四月甲子至五月辛巳凡十有八日不雨田巳憂旱太守率屬吏士分禱諸佛祠迎像能致雨者陳之通路用浮圖法為道埸率屬吏士羅拜以請丁亥夜五鼓出禱鱔溪屬吏士分禱群望己丑率屬吏士𬞞食夜四鼓就城南近水祭告后土將為壇祭龍庚寅𬞞食如己丑夜三鼓就壇壝刲鵝祭龍辛卯夜五鼓就視牲血以法推之當得雨壬辰就紫極宮壇用青童二十有八人更呪􅔼蝪如古法癸巳分禱諸祠未遍者取黃蘖山龍潭水置道場率屬吏士往請甲午又往乙未夜二更得雨連三日夜逺近皆有餘蓋自辛巳至丙申凡十有六日無日不致禱自丙戌至甲午四境多得雨至丁酉乃皆有餘是日罷道埸還所迎佛及水􅔼蜴南澗之濱庚子遍祭謝欲知閩粵之問兼旬不雨則巳憂旱而請禱之為不誣也故刻其祝辭于石而并識之明州修城祭土神文州有帝命繕治城墉得日之良肅工始事斯人允賴維爾土神尚其降休敢不以告亳州謁諸廟文維此譙都年歲順而風𥙿厚者雖人之力實神之助鞏獲守此土敢薦樽爵與人為楅實待神休亳州謁夫子廟文維人之生尊卑長幼知有其序悖于理者知有所畏何以致然實自夫子鞏長人于此敢不嚴事是用寅薦樽爵式遵典禮元豐類藁卷之四十
