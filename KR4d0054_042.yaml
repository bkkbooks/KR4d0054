front:
  text: 南豊先生元豊類藁卷之四十二
  hash: sha256:15848df4391b6629c1f7deea0a8863eb3d34b40283fe82170fbfd8567942383c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_042-1a}
body:
  text: 誌銘虞部郎中戚公墓誌鉻余觀三王所以教天下之士而至扵節文之者知士之出於其時者皆世其道徳盖有以然也去三王千数百年之間教法既巳壞士之學行世其家若漢之袁氏楊氏陳氏唐之栁氏其操義風㮣有以厲天下矯異世否耶以予所聞若宋之戚氏其事可以次叙焉公其家子也叙曰公宋之楚丘人大父諱同文唐天祐元年生歴五代入宋皆不仕以文學義行為學者師殁其徒相與號為正素先生後以子貴贈兵部侍郎考諱綸事大宗真宗以賢䏻爲樞宻直學士與其兄職方郎中維以友愛聞祥符天禧之間學士以論天書出而郎中亦舉賢良不就以爲曹國公翊善不合去盖自父子兄弟之出䖏如此學士後以子貴贈司徒公諱舜臣字世佐司徒之士子也恭謹恂恂㪯措必以禮擇然後出言與其兄某官舜賔某官舜舉復以友愛䏻師其家有先人之法度聞自天祐至今百有五十餘年天下六易士之名一能守一善或身不終或至子孫而失者多矣而戚氏之世徳獨乆如此何其盛㦲然世之談者方多人之囂子憸孫隆名極位世世苟徳者以爲䏻守其業是本何理㦲公少以䕃𥙷将作監主簿然三十猶在司徒之側司徒終而貧乃出監雍州稅又監衢州酒遷知舒州太湖縣兼提舉茶塲治有恵愛民乞留詺從之復三年乃得代献詩言賦茶之荷歲用萬数願棄勿採以感動當世歸監在京塩院言塩之利宜通啇聽之出通判泗州能使轉運使不䏻以暴歛侵其民而民之飬其父者得以其義貰死又通判濮州當王則反扵具濮民相驚其亂公斬一人揺濮中者驚乃止巳而提點刑獄以為功得改官公不自言轉知撫州其治大方務除苛去煩州之詭祠有六帝號者祠至百餘所公悉除之民大化服徙知南安軍至未及有所施為而公盖巳病矣以皇祐四年六月七日卒扵官年五十有七自主簿凢十一遷其官至尚書虞部郎中公濮州之歸也以其属與公之配陳氏凢十三䘮葬宋之北原皇祐六年正月八日公之子師道遂以公從陳氏葬戚氏者衛之大夫孫文子食於河上之邑曰戚為姬姓之後至後世失其所食邑而更自别曰戚氏漢有以郎從髙祖封臨轅侯者曰戚鰓鰓侯四世而失梁有以三禮為愽士入陳卒者曰戚衮衮稱吳郡塩官人侍郎之曽祖曰逺祖曰琮父曰主其譜曰琮自長豊之戚孫徙居楚丘故今為楚丘人此戚氏之先後可見者也觀公之守其業者可以知其恭觀公之施於事者可以知其厚矣然人亦少有能愛之者盖丗之為聦明立聲威者荒諼悖冐無不遇扵世至㳟譲質直不能馳驟而遇困蹷者獨不可稱数余甚異焉夫赴時趍務則材者固亦重矣而立人成俗則㓗身積行豈可䡖也㦲然時之取捨若北亦其不幸不遇䖏之各適其理也銘曰隆隆戚宗自姬出臨轅塩官孟名實博郎家梁自祖琮違世恬幽樹儒術司徒郎中㙯且賢詆符繩公事魁􅔒恂恂南安得家䂓荘容毖辭若遵律盛㦲丗徽後冝聞刻銘方珉告幽室戚元魯墓誌銘戚氏宋人爲宋之世家當五代之際有杭志不仕以徳行化其郷里近逺學者皆歸之者曰同文號正素先生贈尚書兵部侍郎有子當太宗真宗時為名臣以論事激切至今傳之者曰綸爲樞宻直學士贈太尉有子恭謹恂恂不妄言動能守其家法葬宋之北原余為之誌其墓者曰舜臣為尚書虞部郎中元魯其子也名師道字元魯為人孝友忠信質厚而氣和好學不倦能似其先人者也盖自五代至今百有六十餘年矣戚氏傳緒䆮逺雖其位不大而行應禮義世世不絶如此故余以謂宋之世家也元魯自少有大志聦明敏逹好論當世事䏻通其得泆其好惡有異於流俗故一時與之㳺者多天下聞人皆以謂先魯之於學行進而未止意其且夀必䏻成其材不有見扵當世必有見扵後孰謂不幸而今死矣故其死也無逺近親踈凡知其為人者皆為之悲而至今言者尚為之慨然也元魯𥘉以父任於建州崇安縣尉不至以進士中其科為亳州未成縣主簿以親嫌為楚州山陽縣主簿嘉祐六年三月二十九日以疾卒于官年三十有五聚陳氏内殿承制習之女再娶王氏參知政事文憲公堯臣之女有子一人皆先元魯死而元魯盖無兄弟嗚呼天之報施扵斯人如此何也元魯且死時属其僚趙師陟乞銘於余師陟以書來告余悲元魯不得就其志而𣣔因余文以見扵後故不得辞也以熈寜元年某月某甲子葬元魯於其父之墓側以其配陳氏王氏祔將葬其從兄遵道以状来速銘銘曰行足以象其先人材足以施扵世用而於元魯未見其止也生既不得就其志死又無以傳其緒曷以告哀納銘于墓尚書都官員外郎陳君墓誌銘尚書都官員外郎權知泉州事陳君諱樞卒於位其孤毅以君之䘮歸葬於湖州長興縣尚吴郷雉山原前葬其弟𣏌以書之亳州乞銘於南豊曽鞏盖元豊元年鞏爲福州充福建路兵馬鈐轄奏䟽曰臣所領内知泉州事尚書屯田貟外郎陳樞質性純篤治民爲循吏積十有五年不上其課故為郎乆不遷方朝廷抑浮兢尚兼素之時冝䝉特詔有司奏樞課優進其官以奨恬退於是天子特遷君尚書都官貟外郎誥曰吾寵樞也所以戒奔竸明年六月甲子君以疾卒享年若干又明年八月甲寅廼葬君事親以孝聞爲人恂恂蹈䂓矩有善不自伐於勢與利無秋毫顧計心於義所在侃然自任人莫能及也爲吏去觚角絀雕琢以平易敦樸爲務於刑寜失有罪惟恐傷人於賦役度所不可蠲除者然後調發與民爲期㑹未嘗耴疾争先其爲民去害興利若疾痛嗜𣣔在已所至必興斈校以教化爲先𥘉尉鄱陽令得盗五人属尉使爲功君辭不受及令冝黄冝黄在窮絕山谷之間舊令無顯者至君爲之名常出衆上令旌徳亦然旌徳之民歲輸米於太平州蕪湖縣倉路回逺費甚君請輸錢以便民譙縣民輸麥於鄼陽倉以供漕輸豆於㑹亭倉以給驛行者君復請輸錢以籴供漕以直給驛行者各得其所便罷縣民絶橋閉門留君以問乃得去泉州歲㓙君築室止窮民饑者給食病者給醫人忘其窮使者蒐兵於閩以益戍廣西君建言兵當蒐者父母老或疾至無他子皆可聴免詔定著於令余嘗聞繁昌有大姓䝘人州縣不䏻正其罪君時令旌徳或徙其獄属君君驗治僮客盡得其隱伏殺人者論死人以爲盡其情又聞君之令旌徳也州有所賦調他縣皆奉行至旌徳令獨計曰非吾土之所有也非吾人之所堪也不敢以賦民争或至十反守恚出語詆君君益争州聴然後止最後聞泉州旱君圖所以賑民者𣣔預為具或譏君近名君不為動此君之事余得之於耳目者也昔司馬遷記前世循吏下上数千載所列叙者五人詳者人数事略者一二事而已今余所論次君事與前所記五人者相似否必有能識之者君之事多矣然猶為所記所試者小也令所試者大則其事可勝傳邪君字慎之湖州長興人曽祖彦䕫祖文倚考迪贈尚書屯田貟外郎君進士及第𥘉尉饒之鄱陽用薦者令撫之宜黄避親嫌令宣之旌徳用薦者遷祕書省著作佐郎知亳之譙縣英宗即位恩遷祕書丞徙簽書資州判官􅈦公事遷太常博士今上即位恩遷尚書屯田貟外郎用薦者知越州司録未至丁父憂服除授三司塩鉄判官未至丁母憂服除驛召對崇政殿以為提點淮西刑獄公事願得治一州徙權發遣明州事未至又徙泉州留再任以疾請仕未報而卒母某氏某縣太君娶石氏某縣君又娶劉氏吏部貟外郎述之女某縣君又娶氏氏某縣君一子敎也君既行治高丗皆以謂宜不次用而任事者亦意嚮君為尤甚然卒不得至中壽而用止扵此其非命也夫余與君好為最乆故不辭而銘君墓辭曰人孰冝之以夷易也物孰誠之以撲質也所䖏而安絀外累也所守而固篤自強也古有循吏其尚似也詩以之其常存也故翰林侍讀學士錢公墓誌銘公錢氏也故為王家有吴越之地五卋祖鏐號武肅王高祖元瓘文穆王曽祖􅌂昭化軍莭度使祖昭慈贈左衛将軍考順之左侍禁閣門祗候贈尚書刑部侍郎公應說書進士賢良方正䏻直言極諌皆中其科歴宣州旌徳縣尉大理寺丞殿中丞大常愽士尚書司部度攴司封員外郎工部郎中換朝奉大夫充國子監直講編校集賢院書籍遷祕閣校理選為脩英宗實録院檢討官直舍人院同脩起居注遂知制誥直學士院遷樞宻直學士翰林侍讀學士嘗通判秀州知㜈州入判尚書考功改開封府判官出知鄧州入判尚書吏部流内銓兼判集賢院之兼判禮部權知開封府数請去得知審官束院兼判軍器監兼提㪯司天監公亊公㓜孤家貧毋嫁既長還依其族之大人刻勵就學并日夜忘寝食於書無所不治巳通其大㫖至於分章别句類数辨名叢細委曲無不䆒盡具見於文辝閎放雋偉故出而與天下之士狹其所有較扵有司常出衆上以其故名動一時其為尉及為秀婺鄧州皆有治行秀州繫奸仆強果扵力行㜈鄧更鞏施理具設張為直請以能教誘學者歸之為校理属英宗之𥘉慈聖光献皇后聴政公三上書請還政天子為吏部謹䋲墨選者稱其乎為開封以慈恕簡重爲体不求智名以投世取顯爲公属者有不與公合然公遇之未嘗有厚薄意士以此多公而爲属者後卒恋服也公於衆不矯矯爲異亦不翕翕爲同以其故人莫能親踈至扵利势之際人所競逐公方隤然跡與衆逺故雖有夸者亦不以公爲可忌也公之爲判官也府嘗有獄或探大臣意謂欲有所附致公不爲動徐論其意而巳公平居樂易無崖崖及至有所特立人固有所不能及者類如此也公爲人謹畏清約與人交淡然乆而後知其䔍也公之先既籍彊土㱕天子其後至照化守和州十有八年以卒詔葬和州子孫因家焉至公始葬其毋於蘇州吴縣龍岡村之天平山故今义為蘇州人公諱字純老封仁和縣開國伯賜服金紫年六十有一元豊五年正月庚寅卒于位某年某月某甲子葬天平山從其毋永嘉郡太君丁氏之兆公妻孫氏泰興縣君男曰某曰某蚤世曰㟸某官孫曰某某官公卒上馳使臨視其家知其貧特賜錢五十萬而官其弟若子孫凢三人公與余嘗為僚相善其且殁以遺事属余而其字因来乞銘銘曰錢姓武王五世之孫開迹東南以學以文學則知經文則能賦矧曰方間揚聲天路廼校中書廼掌帝制廼列禁林從容調議治巳伊何維直而清治人伊何維簡而平人以怒遷公䏻自克人以利囬公能不惑士夫所望天子所器胡不百年胡不三事龍岡之宅考卜維新公安于此尚利後人刑部郎中致仕王公墓誌銘君諱逵字仲逹家晉陽其譜云隋文中子通之後唐季辟亂家濮陽故今為濮陽人曽祖考温祖考名犯濮王諱考翰贈尚書工部侍郎君㓜學于毋史氏聦警絶人及長學于侍御史髙弁天禧三年及進士第為廣濟軍司理參軍毋䘮去姜遵知永興軍府事取君主萬年薄萬年令免官君行令事大去舊弊王文康公代遵與安撫使王㳂轉運使李綺皆薦君宜令萬年詔特以為試祕書省校書郎知縣事後不得為例晏殊為三司使奏召為三司檢法官李諮代殊㑹天聖十年掖庭火諮任公具材治宫室五日而用足仁宗聞而嘉之遷祕書著作佐郎王駿知益州取君簽書節度判官廳公事遷祕書丞通判益州事遷太常博士新都里胥捕罪人殺之獄具當死君求得其情為奏讞里胥得不死蜀人以為徳入為開封府推官賜緋衣銀魚府史馮士元家冨善隂謀廣市邸舎女妓以㗖諸貴人一時多與之親㑹士元有罪繫獄君治之竟其事及諸貴人以其故多得罪去者或謂君禍自此始也君笑曰吾知去悪人耳出為湖南路轉運使蛮人㱕附遷尚書祠部貟外郎坐小法知處州池州福州楊州江南西路轉運按察使遷尚書刑部員外郎按知洪州卞咸抵其罪改􅍮湖北路轉運使𥘉諌官李京嘗奏君某事及是京以言事斥監鄂州稅聞君至移病不出君要諭之曰前事君職也於人何負㦲卒與之歡甚京死又力賙京家而奏官其子改河東轉運使賜𬗋衣金魚坐小法知光州逾日遷尚書兵部員外郎徐州知州是時山東大飢君所活数萬人收遺骸為十二家葬之亦数萬是時冨丞相為京東東路安撫使自為文祭其冡明年遷尚書工部郎中淮南轉運使嵗飢又多所全活就加直昭文舘知越州浙東兵馬鈴轄遷尚書刑部郎中判刑部加直龍圖閣知荆南府􅍮湖是路兵馬鈴轄濬渠水利文開新河通漕公私便之請知衮州坐法免起知金州提㪯衮州景靈宫知莱州遷尚書兵部郎中知西京留守御史䑓提㪯崇福宫皆不赴遂乞致仕居鄆州熈寜五年四月癸亥終于鄲州昭慶坊之私第享年八十有二有文集五十卷君娶朱氏賈氏高氏高氏封長安縣君其父弁君所從學者也皆先卒有子五人子駿衛校寺丞子淵鄆州夀張主簿子建河南伊闕尉子臯子英未仕也女七人適蘄州黄梅令李綱尚書聀方員外郎馬淵右班殿直侍其珪進士程行大理寺丞劉士邵鄧州穣縣主簿李毅進士張伉君為人志意廣博好智謀竒計欲以功名自顯不肯碌碌所至威令大行逺近皆震然當是時天下乆平世方謹䋲墨蹈規矩故其材不得盡見扵事而以其故亦多齡齬至老益窮然君在撼頓顛㚄之中志氣彌厲未嘗有憂戚不堪之色盖人有所不能及者也君尤䔍扵好善平時與之逰者皆當世豪傑知名之士若予者亦君之所厚故君之葬其子来属以銘而予不得辤也君葬扵某卒之歳某月某甲子而墓在鄆州之某郷某原銘曰維特材志横出卋拘牽困覊􅎗見事為萬之一形則潜名不没司封郎中孔君墓誌銘君姓孔氏諱延之字長源㓜孤自感厲晝耕讀書壠上夜燃松明継之學势大成郷舉進士第一遂中其科授欽州軍事推官杜祀之使南方誅歐希範蒙趕君䇿書居多其書奏謀議皆君為属草藁監杭州龍山稅知洪州新建縣又知筠州新昌縣還朝㑹開封界中治孟陽河中作而開封奏可罷御史與開封争不决詔君按視君言費巳鉅成之猶小利遂從君言知封州即用為廣南西路相度寛恤民力所更置五十五事㢮役二千人使者𣣔城封州君争以謂無益乃不果城遷為廣南西路轉運判官辭母老不許廣西人稀耕者少而賦糴於民歲有至六百萬石程督與稅䓁然不過䏻致数十萬石而止君計歲糴二十萬石而足高其估以募啇販不賦糴扵民𥘉儂智高下推㤙南方𥙷虚名之官者八百人多中户以上皆施役役㱕下窮君使復其故欽㢘雷二州蜑户以採珠為冨人所役属君奪使自為業者六百家皆㝎著今交阯使來桂州隂齎貨為市湏負重三千人君止不與使由此不数至雷州並海守方倪為不善官属共告之倪要奪其書悉使官属并拏繋獄晝夜榜笞軍事推官吕潜以瘦死君馳至取倪属吏縦繋逮者七百餘人倪坐法當斬亦以瘦死人讙呌感泣聲動海上改荆湖北路提點刑獄即本路為轉運使罷鼎州六歲寒戍土丁千餘人提點刑獄言溪洞南江宜麻稻有黄金丹砂之産遣人諭禍福以兵势随之可坐而取也君奏以為不可乃止之召為開封府判官以母老辝知越州移知泉州以母老辝改知宣州未至言者奏越州塩法不行故課負坐罷宣州而課法以滿歲為卒歲終越之塩課應法乃以君為權管勾三司都理欠憑由司出知潤州未行暴得疾卒京師熈寕七年二月癸未也年六十有一自欽州九遷至尚書司封郎中賜服緋魚君之得見於用掇其大者如此君氣仁色温寡笑言言若不䏻出口及見義慷慨辯且強也方㣲時巳数劘切上官無顧避及老益自強守所聞扵古不肯苟随以故齡齬二不以易意君事母孝持以約與人交盡其義其於恩尤至也治人居官一以忠厚不矜智餙名噫可謂䔍行君子矣其家食不足而俸錢常以聚書至老讀書未嘗日廢也工扵為文諸子皆自教以學子多而賢天下以為盛云君臨江軍新淦縣人孔子之後四十七世孫曽大父令倩大父文質考中正母刘氏君登朝考贈光禄卿母封仁夀縣太君娶楊氏封仁和縣君有子七人文仲台州軍事推官􅑯仲江州軍事推官平仲衢州軍事判官和仲進士羲仲太廟齋郎餘早卒女三人嫁襲慶軍莭度推官曽凖吉州吉水縣主簿應昭式進上蔡公彦孫男女八人𥘉君樂江州之佳山水買宅将居之故其子以八年九月乙酉葬君扵江州之徳化縣仁貴郷龍泉原以楊氏祔君有文集二十卷其子以余與若為㝡舊来乞銘銘曰有綽厥政流播在民有蔚斯文舊美扵身孰委于外不源于内于内曷以以其豈弟其立桓桓不回不倚施不盡有于則多賢曷乆厥問閟辤幽阡都官員外郎曽君墓誌銘君曽氏諱誼字子常建昌軍南城人曽祖暹祖士宗考充贈殿中丞君進士及第𥙷洪州新建縣主簿循州龍川令知筠州之上高臨江軍之新淦舒州之桐城三縣提舉江南東路常平倉兼農田水利差役事權知楚州歴秘書省著作佐郎至尚書都官員外郎君生而好學其家學者自君始愽聞強記明扵大體善属文一時名出衆右其家故貧然君為人莭㢘自重罷吏㱕常闔門居不與人事或日􅉴不得食晏如也為吏平恕質慤務在爱人不為刻察所歴縣稱治江東同職𣣔增賦役錢扵君争不䏻得自請罷去遂知楚州楚饑四方之船粟至至者市易吏定取價賤予價貴計其於民而粟未嘗出納也販者為不行人以乏食又取民之食其伎者錮於官禁不得私粥市井騷然君𥘉止之不変則按致之法朝廷他吏覆視不䏻易君言市易吏得罪免君益不合卒他法罷既去而楚人思之既死楚之人迎哭其䘮甚慟至今言治楚者以君為不可及也君平㞐恂恂持卑及遇事不奪其守如此君熈寕九年四月癸已卒扵開封府咸平之驛舎年五十有一明年某月某甲子葬於南城之某郷某原子景𥘉景倩景融景裔景融景𥘉蚤世女嫁袁州萬載令董沂進士夏時中陳卞母鄭氏崇徳縣大君妻傳氏仁夀縣君銘曰江東之議不俛而随山陽之治逹世所馳有扶之強以弱犯之有醜之正以獨守之彼不我與我不爾欺尚告厥志作此銘詩王容季墓誌銘容季王氏諱同其先太原人中徙河南其後自光州之固始徙福州之候官徙候官者五丗矣曽太父諱廷金仕閩王爲逺安軍使太父諱居正贈祕書丞考諱平爲侍御史葬頴州之汝隂故今爲汝隂人容季嘉祐六年進士及第主蔡州之新蔡縣簿治干某年某月某甲子卒扵家年三十有二熈寕某年某月某甲子葬汝隂旌義郷衆人管侍御府君之兆母曽氏金華縣君尚書刑部郎中集賢殿脩撰贈太師中書令兼尚書令某公某之女妻賈氏尚書司門郎中昌期之女男女二人男曰某始若干歲容季孝悌純篤尤能刻意學問自少巳䏻為文章尤長扵叙事其所為文出輙驚人為人自重不馳騪衒鬻亦不子子為名日與其兄講唐虞孔子之道以求其内言行出處常擇義而動其磨礱􅉼飬而不止者吾未能量其所至也不幸其志未就其材未試而短命死矣𥘉容季之伯兄回深甫以道義文學退而家居學者所崇而仲兄向子直亦以文學器識名聞當世容季又所立如此學士大夫以謂此三人者皆世不常有籍今有之或出於燕或出於越又不可得之一郷一國也未有同時並出扵一家如此之盛若将使之有為也而不幸輙死皆不得至於壽考以盡其材是有命矣而命之至如此何也𥘉子直之遺文深甫属予序之数年又叙深甫之文復数年耳容季葬有日其仲兄固子堅又属予銘其墓而且将叙其文嗚呼非其可哀也夫銘曰學足以求其内辭足以逹其外守之用剛飬之用晦如泉之進如木之升奄焉以止不䆒其成維友作詩以永厥聲南豊先生元豊類藁卷之四十二
