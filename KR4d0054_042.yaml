front:
  text: 南豐先生元豐類藁卷之四十二
  hash: sha256:e0c343ec344faefbbbc9ad4a7b9f60479266ebe7e2215a5bac2306bad1de4178
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_042-1a}
body:
  text: 志銘虞部郎中戚公墓志鉻余觀三王所以教天下之士而至于節文之者知士之出於其時者皆世其道德蓋有以然也去三王千數百年之間教法既巳壞士之學行世其家若漢之袁氏楊氏陳氏唐之栁氏其操義風概有以厲天下矯異世否耶以豫所聞若宋之戚氏其事可以次敘焉公其家子也敘曰公宋之楚丘人大父諱同文唐天祐元年生歷五代入宋皆不仕以文學義行為學者師殁其徒相與號為正素先生後以子貴贈兵部侍郎考諱綸事大宗真宗以賢能為樞密直學士與其兄職方郎中維以友愛聞祥符天禧之間學士以論天書出而郎中亦舉賢良不就以為曹國公翊善不合去蓋自父子兄弟之出處如此學士後以子貴贈司徒公諱舜臣字世佐司徒之士子也恭謹恂恂舉措必以禮擇然後出言與其兄某官舜賔某官舜舉復以友愛能師其家有先人之法度聞自天祐至今百有五十餘年天下六易士之名一能守一善或身不終或至子孫而失者多矣而戚氏之世德獨久如此何其盛哉然世之談者方多人之囂子憸孫隆名極位世世苟德者以為能守其業是本何理哉公少以蔭輔將作監主簿然三十猶在司徒之側司徒終而貧乃出監雍州稅又監衢州酒遷知舒州太湖縣兼提舉茶場治有惠愛民乞留詺從之復三年乃得代獻詩言賦茶之荷歲用萬數願棄勿採以感動當世歸監在京鹽院言鹽之利宜通啇聽之出通判泗州能使轉運使不能以暴斂侵其民而民之飬其父者得以其義貰死又通判濮州當王則反于具濮民相驚其亂公斬一人搖濮中者驚乃止巳而提點刑獄以為功得改官公不自言轉知撫州其治大方務除苛去煩州之詭祠有六帝號者祠至百餘所公悉除之民大化服徙知南安軍至未及有所施為而公蓋巳病矣以皇祐四年六月七日卒于官年五十有七自主簿凡十一遷其官至尚書虞部郎中公濮州之歸也以其屬與公之配陳氏凡十三喪葬宋之北原皇祐六年正月八日公之子師道遂以公從陳氏葬戚氏者衛之大夫孫文子食於河上之邑曰戚為姬姓之後至後世失其所食邑而更自别曰戚氏漢有以郎從髙祖封臨轅侯者曰戚鰓鰓侯四世而失梁有以三禮為博士入陳卒者曰戚衮衮稱吳郡鹽官人侍郎之曽祖曰逺祖曰琮父曰主其譜曰琮自長豐之戚孫徙居楚丘故今為楚丘人此戚氏之先後可見者也觀公之守其業者可以知其恭觀公之施於事者可以知其厚矣然人亦少有能愛之者蓋丗之為聰明立聲威者荒諼悖冒無不遇于世至恭讓質直不能馳驟而遇困蹶者獨不可稱數余甚異焉夫赴時趍務則材者固亦重矣而立人成俗則潔身積行豈可輕也哉然時之取捨若北亦其不幸不遇處之各適其理也銘曰隆隆戚宗自姬出臨轅鹽官孟名實博郎家梁自祖琮違世恬幽樹儒術司徒郎中㙯且賢詆符繩公事魁􅔒恂恂南安得家規莊容毖辭若遵律盛哉丗徽後冝聞刻銘方珉告幽室戚元魯墓志銘戚氏宋人為宋之世家當五代之際有杭志不仕以德行化其鄉里近逺學者皆歸之者曰同文號正素先生贈尚書兵部侍郎有子當太宗真宗時為名臣以論事激切至今傳之者曰綸為樞密直學士贈太尉有子恭謹恂恂不妄言動能守其家法葬宋之北原余為之志其墓者曰舜臣為尚書虞部郎中元魯其子也名師道字元魯為人孝友忠信質厚而氣和好學不倦能似其先人者也蓋自五代至今百有六十餘年矣戚氏傳緒䆮逺雖其位不大而行應禮義世世不絶如此故余以謂宋之世家也元魯自少有大志聰明敏逹好論當世事能通其得泆其好惡有異於流俗故一時與之遊者多天下聞人皆以謂先魯之於學行進而未止意其且夀必能成其材不有見于當世必有見于後孰謂不幸而今死矣故其死也無逺近親踈凡知其為人者皆為之悲而至今言者尚為之慨然也元魯𥘉以父任於建州崇安縣尉不至以進士中其科為亳州未成縣主簿以親嫌為楚州山陽縣主簿嘉祐六年三月二十九日以疾卒于官年三十有五聚陳氏內殿承制習之女再娶王氏參知政事文憲公堯臣之女有子一人皆先元魯死而元魯蓋無兄弟嗚呼天之報施于斯人如此何也元魯且死時屬其僚趙師陟乞銘於余師陟以書來告余悲元魯不得就其志而𣣔因余文以見于後故不得辭也以熙寧元年某月某甲子葬元魯於其父之墓側以其配陳氏王氏祔將葬其從兄遵道以狀來速銘銘曰行足以象其先人材足以施于世用而於元魯未見其止也生既不得就其志死又無以傳其緒曷以告哀納銘于墓尚書都官員外郎陳君墓志銘尚書都官員外郎權知泉州事陳君諱樞卒於位其孤毅以君之喪歸葬於湖州長興縣尚吳鄉雉山原前葬其弟𣏌以書之亳州乞銘於南豐曽鞏蓋元豐元年鞏為福州充福建路兵馬鈐轄奏疏曰臣所領內知泉州事尚書屯田貟外郎陳樞質性純篤治民為循吏積十有五年不上其課故為郎久不遷方朝廷抑浮兢尚兼素之時冝蒙特詔有司奏樞課優進其官以奬恬退於是天子特遷君尚書都官貟外郎誥曰吾寵樞也所以戒奔竸明年六月甲子君以疾卒享年若干又明年八月甲寅乃葬君事親以孝聞為人恂恂蹈規矩有善不自伐於勢與利無秋毫顧計心於義所在侃然自任人莫能及也為吏去觚角絀雕琢以平易敦朴為務於刑寧失有罪惟恐傷人於賦役度所不可蠲除者然後調發與民為期會未嘗耴疾爭先其為民去害興利若疾痛嗜𣣔在已所至必興學校以教化為先𥘉尉鄱陽令得盜五人屬尉使為功君辭不受及令冝黃冝黃在窮絶山谷之間舊令無顯者至君為之名常出衆上令旌德亦然旌德之民歲輸米於太平州蕪湖縣倉路回逺費甚君請輸錢以便民譙縣民輸麥於鄼陽倉以供漕輸豆於會亭倉以給驛行者君復請輸錢以糴供漕以直給驛行者各得其所便罷縣民絶橋閉門留君以問乃得去泉州歲凶君築室止窮民飢者給食病者給醫人忘其窮使者搜兵於閩以益戍廣西君建言兵當搜者父母老或疾至無他子皆可聽免詔定著於令余嘗聞繁昌有大姓毅人州縣不能正其罪君時令旌德或徙其獄屬君君驗治僮客盡得其隱伏殺人者論死人以為盡其情又聞君之令旌德也州有所賦調他縣皆奉行至旌德令獨計曰非吾土之所有也非吾人之所堪也不敢以賦民爭或至十反守恚出語詆君君益爭州聽然後止最後聞泉州旱君圖所以賑民者𣣔預為具或譏君近名君不為動此君之事余得之於耳目者也昔司馬遷記前世循吏下上數千載所列敘者五人詳者人數事略者一二事而已今余所論次君事與前所記五人者相似否必有能識之者君之事多矣然猶為所記所試者小也令所試者大則其事可勝傳邪君字慎之湖州長興人曽祖彥夔祖文倚考迪贈尚書屯田貟外郎君進士及第𥘉尉饒之鄱陽用薦者令撫之宜黃避親嫌令宣之旌德用薦者遷祕書省著作佐郎知亳之譙縣英宗即位恩遷祕書丞徙簽書資州判官􅈦公事遷太常博士今上即位恩遷尚書屯田貟外郎用薦者知越州司録未至丁父憂服除授三司鹽鐵判官未至丁母憂服除驛召對崇政殿以為提點淮西刑獄公事願得治一州徙權發遣明州事未至又徙泉州留再任以疾請仕未報而卒母某氏某縣太君娶石氏某縣君又娶劉氏吏部貟外郎述之女某縣君又娶氏氏某縣君一子教也君既行治高丗皆以謂宜不次用而任事者亦意嚮君為尤甚然卒不得至中壽而用止于此其非命也夫余與君好為最久故不辭而銘君墓辭曰人孰冝之以夷易也物孰誠之以撲質也所處而安絀外纍也所守而固篤自強也古有循吏其尚似也詩以之其常存也故翰林侍讀學士錢公墓志銘公錢氏也故為王家有吳越之地五卋祖鏐號武肅王高祖元瓘文穆王曽祖􅌂昭化軍莭度使祖昭慈贈左衛將軍考順之左侍禁閣門祗候贈尚書刑部侍郎公應説書進士賢良方正能直言極諌皆中其科歷宣州旌德縣尉大理寺丞殿中丞大常博士尚書司部度攴司封員外郎工部郎中換朝奉大夫充國子監直講編校集賢院書籍遷祕閣校理選為修英宗實録院檢討官直舍人院同修起居注遂知制誥直學士院遷樞密直學士翰林侍讀學士嘗通判秀州知㜈州入判尚書考功改開封府判官出知鄧州入判尚書吏部流內銓兼判集賢院之兼判禮部權知開封府數請去得知審官束院兼判軍器監兼提舉司天監公事公幼孤家貧毋嫁既長還依其族之大人刻勵就學并日夜忘寢食於書無所不治巳通其大旨至於分章别句類數辨名叢細委曲無不究盡具見於文辝閎放雋偉故出而與天下之士狹其所有較于有司常出衆上以其故名動一時其為尉及為秀婺鄧州皆有治行秀州繫姦仆強果于力行㜈鄧更鞏施理具設張為直請以能教誘學者歸之為校理屬英宗之𥘉慈聖光獻皇后聽政公三上書請還政天子為吏部謹繩墨選者稱其乎為開封以慈恕簡重為體不求智名以投世取顯為公屬者有不與公合然公遇之未嘗有厚薄意士以此多公而為屬者後卒戀服也公於衆不矯矯為異亦不翕翕為同以其故人莫能親踈至于利勢之際人所競逐公方隤然迹與衆逺故雖有夸者亦不以公為可忌也公之為判官也府嘗有獄或探大臣意謂欲有所附致公不為動徐論其意而巳公平居樂易無崖崖及至有所特立人固有所不能及者類如此也公為人謹畏清約與人交淡然久而後知其篤也公之先既籍強土歸天子其後至照化守和州十有八年以卒詔葬和州子孫因家焉至公始葬其毋於蘇州吳縣龍岡村之天平山故今義為蘇州人公諱字純老封仁和縣開國伯賜服金紫年六十有一元豐五年正月庚寅卒于位某年某月某甲子葬天平山從其毋永嘉郡太君丁氏之兆公妻孫氏泰興縣君男曰某曰某蚤世曰㟸某官孫曰某某官公卒上馳使臨視其家知其貧特賜錢五十萬而官其弟若子孫凡三人公與余嘗為僚相善其且殁以遺事屬余而其字因來乞銘銘曰錢姓武王五世之孫開迹東南以學以文學則知經文則能賦矧曰方間揚聲天路乃校中書乃掌帝制乃列禁林從容調議治巳伊何維直而清治人伊何維簡而平人以怒遷公能自克人以利回公能不惑士夫所望天子所器胡不百年胡不三事龍岡之宅考卜維新公安于此尚利後人刑部郎中致仕王公墓志銘君諱逵字仲逹家晉陽其譜云隋文中子通之後唐季辟亂家濮陽故今為濮陽人曽祖考溫祖考名犯濮王諱考翰贈尚書工部侍郎君幼學于毋史氏聰警絶人及長學于侍御史髙辨天禧三年及進士第為廣濟軍司理參軍毋喪去薑遵知永興軍府事取君主萬年薄萬年令免官君行令事大去舊弊王文康公代遵與安撫使王沿轉運使李綺皆薦君宜令萬年詔特以為試祕書省校書郎知縣事後不得為例晏殊為三司使奏召為三司檢法官李咨代殊會天聖十年掖庭火咨任公具材治宫室五日而用足仁宗聞而嘉之遷祕書著作佐郎王駿知益州取君簽書節度判官廳公事遷祕書丞通判益州事遷太常博士新都里胥捕罪人殺之獄具當死君求得其情為奏讞里胥得不死蜀人以為德入為開封府推官賜緋衣銀魚府史馮士元家冨善隂謀廣市邸舍女妓以啖諸貴人一時多與之親會士元有罪繫獄君治之竟其事及諸貴人以其故多得罪去者或謂君禍自此始也君笑曰吾知去惡人耳出為湖南路轉運使蠻人歸附遷尚書祠部貟外郎坐小法知處州池州福州楊州江南西路轉運按察使遷尚書刑部員外郎按知洪州卞咸抵其罪改􅍮湖北路轉運使𥘉諌官李京嘗奏君某事及是京以言事斥監鄂州稅聞君至移病不出君要諭之曰前事君職也於人何負哉卒與之歡甚京死又力賙京家而奏官其子改河東轉運使賜𬗋衣金魚坐小法知光州逾日遷尚書兵部員外郎徐州知州是時山東大飢君所活數萬人收遺骸為十二家葬之亦數萬是時冨丞相為京東東路安撫使自為文祭其冡明年遷尚書工部郎中淮南轉運使嵗飢又多所全活就加直昭文館知越州浙東兵馬鈴轄遷尚書刑部郎中判刑部加直龍圖閣知荆南府􅍮湖是路兵馬鈴轄濬渠水利文開新河通漕公私便之請知衮州坐法免起知金州提舉衮州景靈宫知萊州遷尚書兵部郎中知西京留守御史臺提舉崇福宫皆不赴遂乞致仕居鄆州熙寧五年四月癸亥終于鄲州昭慶坊之私第享年八十有二有文集五十卷君娶朱氏賈氏高氏高氏封長安縣君其父辨君所從學者也皆先卒有子五人子駿衛校寺丞子淵鄆州夀張主簿子建河南伊闕尉子臯子英未仕也女七人適蘄州黃梅令李綱尚書聀方員外郎馬淵右班殿直侍其圭進士程行大理寺丞劉士邵鄧州穰縣主簿李毅進士張伉君為人志意廣博好智謀竒計欲以功名自顯不肯碌碌所至威令大行逺近皆震然當是時天下久平世方謹繩墨蹈規矩故其材不得盡見于事而以其故亦多齡齬至老益窮然君在撼頓顛疐之中志氣彌厲未嘗有憂戚不堪之色蓋人有所不能及者也君尤篤于好善平時與之逰者皆當世豪傑知名之士若豫者亦君之所厚故君之葬其子來屬以銘而豫不得辭也君葬于某卒之歲某月某甲子而墓在鄆州之某鄉某原銘曰維特材志橫出卋拘牽困羈􅎗見事為萬之一形則潛名不沒司封郎中孔君墓志銘君姓孔氏諱延之字長源幼孤自感厲晝耕讀書壠上夜燃松明繼之學勢大成鄉舉進士第一遂中其科授欽州軍事推官杜祀之使南方誅歐希範蒙趕君䇿書居多其書奏謀議皆君為屬草藁監杭州龍山稅知洪州新建縣又知筠州新昌縣還朝會開封界中治孟陽河中作而開封奏可罷御史與開封爭不決詔君按視君言費巳巨成之猶小利遂從君言知封州即用為廣南西路相度寬恤民力所更置五十五事弛役二千人使者𣣔城封州君爭以謂無益乃不果城遷為廣南西路轉運判官辭母老不許廣西人稀耕者少而賦糴於民歲有至六百萬石程督與稅等然不過能致數十萬石而止君計歲糴二十萬石而足高其估以募啇販不賦糴于民𥘉儂智高下推恩南方輔虛名之官者八百人多中户以上皆施役役歸下窮君使復其故欽廉雷二州蛋户以採珠為冨人所役屬君奪使自為業者六百家皆㝎著今交址使來桂州隂齎貨為市須負重三千人君止不與使由此不數至雷州並海守方倪為不善官屬共告之倪要奪其書悉使官屬并拏繫獄晝夜榜笞軍事推官吕潛以瘦死君馳至取倪屬吏縱繫逮者七百餘人倪坐法當斬亦以瘦死人歡呌感泣聲動海上改荆湖北路提點刑獄即本路為轉運使罷鼎州六歲寒戍土丁千餘人提點刑獄言溪洞南江宜麻稻有黃金丹砂之産遣人諭禍福以兵勢隨之可坐而取也君奏以為不可乃止之召為開封府判官以母老辝知越州移知泉州以母老辝改知宣州未至言者奏越州鹽法不行故課負坐罷宣州而課法以滿歲為卒歲終越之鹽課應法乃以君為權管勾三司都理欠憑由司出知潤州未行暴得疾卒京師熙寧七年二月癸未也年六十有一自欽州九遷至尚書司封郎中賜服緋魚君之得見於用掇其大者如此君氣仁色溫寡笑言言若不能出口及見義慷慨辨且強也方微時巳數劘切上官無顧避及老益自強守所聞于古不肯苟隨以故齡齬二不以易意君事母孝持以約與人交盡其義其於恩尤至也治人居官一以忠厚不矜智飾名噫可謂篤行君子矣其家食不足而俸錢常以聚書至老讀書未嘗日廢也工于為文諸子皆自教以學子多而賢天下以為盛云君臨江軍新淦縣人孔子之後四十七世孫曽大父令倩大父文質考中正母劉氏君登朝考贈光祿卿母封仁夀縣太君娶楊氏封仁和縣君有子七人文仲台州軍事推官􅑯仲江州軍事推官平仲衢州軍事判官和仲進士羲仲太廟齋郎餘早卒女三人嫁襲慶軍莭度推官曽凖吉州吉水縣主簿應昭式進上蔡公彥孫男女八人𥘉君樂江州之佳山水買宅將居之故其子以八年九月乙酉葬君于江州之德化縣仁貴鄉龍泉原以楊氏祔君有文集二十卷其子以余與若為最舊來乞銘銘曰有綽厥政流播在民有蔚斯文舊美于身孰委于外不源于內于內曷以以其豈弟其立桓桓不回不倚施不盡有于則多賢曷久厥問閟辭幽阡都官員外郎曽君墓志銘君曽氏諱誼字子常建昌軍南城人曽祖暹祖士宗考充贈殿中丞君進士及第輔洪州新建縣主簿循州龍川令知筠州之上高臨江軍之新淦舒州之桐城三縣提舉江南東路常平倉兼農田水利差役事權知楚州歷祕書省著作佐郎至尚書都官員外郎君生而好學其家學者自君始博聞強記明于大體善屬文一時名出衆右其家故貧然君為人莭廉自重罷吏歸常闔門居不與人事或日􅉴不得食晏如也為吏平恕質慤務在愛人不為刻察所歷縣稱治江東同職𣣔增賦役錢于君爭不能得自請罷去遂知楚州楚飢四方之船粟至至者市易吏定取價賤豫價貴計其於民而粟未嘗出納也販者為不行人以乏食又取民之食其伎者錮於官禁不得私粥市井騷然君𥘉止之不變則按致之法朝廷他吏覆視不能易君言市易吏得罪免君益不合卒他法罷既去而楚人思之既死楚之人迎哭其喪甚慟至今言治楚者以君為不可及也君平居恂恂持卑及遇事不奪其守如此君熙寧九年四月癸已卒于開封府咸平之驛舍年五十有一明年某月某甲子葬於南城之某鄉某原子景𥘉景倩景融景裔景融景𥘉蚤世女嫁袁州萬載令董沂進士夏時中陳卞母鄭氏崇德縣大君妻傳氏仁夀縣君銘曰江東之議不俯而隨山陽之治逹世所馳有扶之強以弱犯之有醜之正以獨守之彼不我與我不爾欺尚告厥志作此銘詩王容季墓志銘容季王氏諱同其先太原人中徙河南其後自光州之固始徙福州之候官徙候官者五丗矣曽太父諱廷金仕閩王為逺安軍使太父諱居正贈祕書丞考諱平為侍御史葬頴州之汝隂故今為汝隂人容季嘉祐六年進士及第主蔡州之新蔡縣簿治干某年某月某甲子卒于家年三十有二熙寧某年某月某甲子葬汝隂旌義鄉衆人管侍御府君之兆母曽氏金華縣君尚書刑部郎中集賢殿修撰贈太師中書令兼尚書令某公某之女妻賈氏尚書司門郎中昌期之女男女二人男曰某始若干歲容季孝悌純篤尤能刻意學問自少巳能為文章尤長于敘事其所為文出輒驚人為人自重不馳騪衒鬻亦不子子為名日與其兄講唐虞孔子之道以求其內言行出處常擇義而動其磨礱􅉼飬而不止者吾未能量其所至也不幸其志未就其材未試而短命死矣𥘉容季之伯兄回深甫以道義文學退而家居學者所崇而仲兄向子直亦以文學器識名聞當世容季又所立如此學士大夫以謂此三人者皆世不常有籍今有之或出於燕或出於越又不可得之一鄉一國也未有同時並出于一家如此之盛若將使之有為也而不幸輒死皆不得至於壽考以盡其材是有命矣而命之至如此何也𥘉子直之遺文深甫屬豫序之數年又敘深甫之文復數年耳容季葬有日其仲兄固子堅又屬豫銘其墓而且將敘其文嗚呼非其可哀也夫銘曰學足以求其內辭足以逹其外守之用剛飬之用晦如泉之進如木之升奄焉以止不究其成維友作詩以永厥聲南豐先生元豐類藁卷之四十二
