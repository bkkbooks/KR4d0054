front:
  text: 南豐先生元豐類藁卷之九
  hash: sha256:5e882ac8b56dd8cb458ef47f00fa06fe02902acf4102348940a6af6049804072
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_009-1a}
body:
  text: 論唐論成康殁而民生不見先王之治日入於亂以至扵秦盡除前聖数千載之法天下既攻秦而士之以歸扵漢漢之爲漢更二十四君東西再有天下垂四百年然大扺多用秦法其改更秦事亦多附已意非放先王之法而有天下之志也有天下之志者文帝而巳然而天下之材不足故仁聞雖羙矣而當世之法度亦不能放扵三代漢之亡而强者遂分天下之地晉與隋雖能合天下扵一然而合之未乆而已亡其爲不足議也代隋者唐更十八君垂三百年而其治莫盛扵太宗之爲君也詘巳從諌仁心愛人可謂有天下之志以租庸任民以府衞任兵以職事任官以材能任職以興義任俗以尊本任衆賦役有定制兵農有定業官無虚名職無廢事人習於善行離於末作使之操扵上者要而不煩取扵下者寡而易供民有農之實而兵之備存有兵之名而農之利在事之分有歸而禄之出不浮材之品不遺而治之体相承其㢘耻日以䔍其田野日以闢以其法修則安目治廢則危且亂可謂有天下之材行之数歲粟米之賤斗至数錢居者有餘蓄行者有餘資人人自厚㡬致刑措可謂有治天下之效夫有天下之志有天下之材又有治天下之效然而不得與先王並者法度之行擬之先王未備也礼樂之具田疇之制庠序之教擬之先王未備也躬親行陣之間戦必勝攻必克天下莫不以為武而非先王之所尚也四夷萬里古所未及以政者莫不服從天下莫不以為盛而非先王之所務也太宗之為政扵天下者得失如此由唐虞之治五百餘年而有湯之治由湯之治五百餘年而有文武之治由文武之治千有餘年而始有太宗之為君有天下之志有天下之材又有治天下之效然而又以其未備也不得與先王並而偁極治之時是則人生扵文武之前者率五百餘年而一遇治世生於文武之後者千有餘年而未遇極治之時也非獨民之生扵是時者之不幸也士之生扵文武之前者如舜禹之扵唐八元八凱之扵舜伊尹之於湯太公之扵文武率五百餘年而一遇生扵文武之後千有餘年雖孔子之聖孟軻之賢而不遇雖太宗之為君而未可以必得志扵其時也是亦士民之生扵是時者之不幸也故述其是非得失之迹非獨為人君者可以考焉士之有志扵道而欲仕扵上者可以鍳矣為人後議禮大宗無子則族人以支子為之後為之後者為所後服斬䘮三年而降其父母期禮之所以如此者何也以謂人之所知者近則知親愛其父母而已所知者逺則知有嚴父之義知有嚴父之義則知尊祖知尊祖則知大宗者上以継祖下以收族不可以絶故有以支子為之後者為之後者以受重扵斯人故不得不以尊服服之以尊服服之而不為之降巳親之服則猶恐未足以明所後者之重也以尊服服之又為之降巳親之服然後以謂可以明所後者之重而継祖之道盡此聖人制禮之意也夫所謂收族者記称與族人合食序以昭穆别以禮義之類是特諸侯别子之大宗而嚴之如此况如礼所稱天子及其始祖之所自出者此天子之大宗是為天地宗廟百神祭祀之主族人萬世之所依㱕而可以不明其至尊至重㢤故前世人主有以支子継立而崇其本親加以號位立廟奉祀者皆見非於古今誠由所知者近不能割棄私愛莭之以禮故失所以奉承正統尊無二上之意也若扵所後者以尊服服之又為之降已親之服而退扵巳親號位不敢以非禮有加也廟祀不敢以非礼有奉也則為至恩大義固巳備矣而或謂又當易其父母之名從所後者為屬是未知考扵礼也礼為人後者為所後者之祖父母父母妻之父母昆弟昆弟之子若子者此其服為所後者而非其為巳也為其父母期為其昆弟大功為其姊妹適人者小功皆降本服一等者此其服為巳而非為所後者也使其為父母服則為巳名為所後者是則名與實相違服與恩相戾矣聖人制禮不如是之舛也且自古為人後者不必皆親昆弟之子族人之同宗者皆可為之則有以大功小功昆弟之子而為之者矣有以緦麻袒免無服昆弟之子而為之者矣若當從所後者為属則亦當從所後者為服従所後者為服則扵其父母有冝為大功為小功為緦麻為袒免為無服者矣而聖人制禮皆為其父母期使足以明所後者重而已非遂以謂當變其親也親非變則名固不得而易矣戴徳王肅䘮記曰為人後者為其父母降一等服齊衰期其服之節居倚廬言語飲食與父在為母同其異者不祥不禫雖除服心䘮三年故至扵今著扵服令未之有改也豈有製服之重如此而其名遂可以絶乎又崔凱䘮服駮曰本親有自然之恩降一等則足以明所後者為重無縁廼絶之矣夫未嘗以謂可以絶其親而輙謂可以絶其名是亦感矣且支子所以後太宗者為推其嚴父之心以尊祖也顧以尊祖之故而不父其父豈本其恩之所由生而先王教天下之意㢤又禮適子不可為人後者以其傳重也支子可以為人後者以非傳重也使傳重者後已宗非傳重者後大宗其意可謂即乎人心而使之两義俱安也今若使為人後者以降其父母之服一等而遂變革其名不以為父母則非使之两義俱安而不即乎人心莫大乎如是也夫人道之於大宗至尊至重不可以絶尊尊也人子之扵父母亦至尊至重不可以絶親親也尊尊親親其義一也未有可廢其一者故爲人後者爲之降其父母之服禮則有之矣爲之絶其父母之名則禮未之有也或以謂欲絶其名者盖惡其爲二而使欲之爲一所以使爲人後者之道盡也夫迹其實則有謂之所後有謂之所生制其服則有爲已而非爲所後者有爲所後而非爲已者皆知不可以惡其爲二而強使之爲一也至扵名者盖生扵實也廼不知其不可以惡其爲二而欲强使之爲一是亦過矣藉使其名可以強使之爲一而迹其實之非一制其服之非一者終不可以易在乎欲絶其名也故古之聖人知不可以惡其爲二而强使之爲一而能使其屬之踈者相與爲重親之厚者相與爲輕則以禮義而已矣何則使爲人後者扵其所後非己親也而爲之服斬衰三年爲其祭主是以義引之也扵其所生實巳親也而降服齊衰期不得與其祭是以禮厭之也以義引之則屬之䟽者相與爲重以禮厭之則親之後者相與爲輕而爲人後之道盡矣然則欲爲人後之道盡者在以禮義明其内而不在扵惡其爲二而强易其名扵外也故禮䘮服齊衰不杖期章曰爲人後者爲其父母報此見扵經爲人後者扵其本親稱父母之明文也漢祭義以謂宣帝親謚宜曰卓魏相以謂宜稱尊號曰皇考立廟後世議者皆以其稱皇立廟爲非至扵稱親称考則未嘗有以為非者也其後魏明帝尤惡為人後者厚其本親故非漢宣加悼考以皇號又謂後嗣有由諸侯入継正統者皆不得謂考為皇稱妣為后盖亦但禁其猥加非正之號而未嘗廢其考妣之称此見扵前世議論為人後者扵其本親稱考妣之明文也又晋王坦之䘮服議曰罔極之重非制教之所裁昔日之名非一朝之所去此出後之身所以有服本親也又曰情不可奪名不可廢崇本叙恩所以為降則知為人後者未有去其所出父母之名此古人之常理故坦之引以為制服之證此又見扵前世議論為人後者扵其本親穪父母之明文也是則為人後者之親見扵經見扵前世議論謂之父母謂之考妣者其大義如此明文如此至見扵他書及史官之記亦謂之父母謂之考妣謂之私考妣謂之本親謂之親者則不可一二数而以為世父叔父者則不特礼未之有載籍已來固未之有也今欲使從所後者為属而革變其父母之名此非常異義也不從經文於前世数千載之議論亦非常異義也而無所考㨿以持其說將何以示天下乎且中囯之所以為貴者以有父子之道又有六經與前世数千載之議論以治之故也今忽欲棄之而伸其無所考㨿之說豈非誤哉或謂為人後者扵其本親称父母則為两統二父其可乎夫两統二父者謂加考以皇號立廟奉祀是不一扵正統懐二扵所後所以著其非而非謂不變革其父母之名也然則加考以皇號與禮及古之稱皇考者有異乎曰皇考一名而為說有三禮曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟是則以皇考為曽祖之廟號也魏相謂漢宣帝父宜称尊號曰皇考既非禮之曽祖之稱又有尊號之文故魏明帝非其加悼考以皇號至扵光武亦扵南頓君稱皇考廟義出扵此是以加皇號為事考之尊稱也屈原稱朕皇考曰伯庸又晉司馬機為燕王告称庙文稱敢昭告于皇考清惠亭侯是又逹扵群下以皇考為父殁之通称也以為曽祖之廟號者扵古用之以為事考之尊称者扵漢用之以為父殁之通稱者至今用之然則稱之亦有可有不可者乎曰以加皇號為事考之尊称者施於為人後之義是干正統此求之扵禮而不可者也逹於群下以皇考為父殁之通稱者施扵為人後之義非于正統此求之扵禮而可者也然則以為父殁之通稱者其不可如何曰若漢哀帝之親稱尊號曰㳟皇安帝之親稱尊號曰孝徳皇是又求之扵禮而不可者也且禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也前世失禮之右崇本親以位號者豈獨失為人後奉祀正統尊無二上之意哉是以子爵父以卑命尊亦非所以尊厚其親也前世崇飾非正之號者其失如此而後世又謂宜如期親故事増官廣國者亦可謂皆不合扵禮矣夫考者父殁之稱然施扵禮者有朝廷典冊之文有宗廟祀祭之辞而巳若不加位號則無典冊之文不立廟奉祀則無祝祭之辭則雖正其名豈有施扵事者顧言之不可不順而巳此前世未嘗以爲可疑者以禮甚明也今世議者紛紛至扵曠日累時不知所决者盖由不考扵禮而率其私見也故采扵經列其㫖意庶得以啇㩁焉公族議天子之適子継世以爲天子其别子皆爲諸侯諸侯之適子継世以爲諸侯其别子各爲其國之卿大夫皆有采地别子之適子継世以食其采地其族人百世宗之此之謂大宗其别子亦各仕於其國為卿大夫其適子兄弟宗之五世而止此之謂小宗盖天子之適子継世以為天子其别子世為諸侯諸侯之適子継世以為諸侯其别子各為其國之卿大夫世世食采地皆傳扵無窮夫豈有服盡而絶其禄位衣食嫁娶使之自謀者乎非特如此也昔周公兼制天下立七十一國姬姓居五十三人盖兄弟之國者十有五人姬姓之國者四十人其可見者則管蔡郕霍魯衛毛聃郜雍曹滕畢原鄷郇邘晉應韓凡蒋邢茅胙祭之屬是也其稱兄弟之國者十有五人則周之近属其稱姬姓之國者四十人則周之同姓而巳其爵命之使傳國至扵無窮夫豈以服為断乎至扵宗廟之数天子七諸侯五而祭法虞夏商周禘郊祖宗逺或至扵数十世之上亦皆未嘗以服為断也其推而上之報本扵祖宗至不可為数推而下之廣骨肉之恩至扵無窮盖其積厚者其流澤逺有天下之功者受天下之報其理勢次序固然也是豈可拘扵常見議扵錙銖之内乎故服盡而戚單者所以節人之常情而為大宗小宗之数安可以論帝者之功徳而為廣親親之法乎昔武王克商未及下車而封黄帝唐虞之後下車而封夏啇之後其在異代尚特顯之其急如此况受重扵祖宗推原功徳之所自出其可以天下之大而儉扵骨肉之恩以不滿足海内之望乎孟子曰仁人之扵兄弟也親愛之而巳矣親之欲其貴也愛之欲其富也先王推是心以及扵同姓之間故有土分之有民分之有寳玉分之有寳噐分之成王康王之言曰吾無專享文武之功是皆無所不盡其厚未有從夫略者也盖詩裳裳者華刺時棄賢者之類絶功臣之世而傳栾卻胥原狐續慶伯陪臣之俗耳其降在皁隷叔向亦以為晋國之憂况扵帝者之公德與天地等而可使七八世之子孫夷扵閭巷之凡民乎後世公族無封國采地之制而有列扵朝有賜扵府是亦親而貴之愛而富之之意也其名書扵宗籍者繁衍盛大實國家慶有司雖費非多扵天下之國七十有一而姬姓獨居者五十三人其亦求中以節之而巳矣頋令袒免以外母與官衣食嫁娶使之自謀是亦不不考扵古矣何其野扵礼也以世莫能辨故作公族議使好學者得詳焉講官議孔子之語教人曰不憤悱不啓發舉一隅不以三隅反則不告也孟子之語教人曰有荅問者荀子之語敎人曰不問而告謂之傲問一而告二謂之噆傲非也費非也君子如響故礼無徃教而有待問則師之道有問而告之者尔世之挾書而謂者終日言而非有問之者也廼不自知其强聒而欲以師自任何其妄也古之教世子之法大傳審父子君臣之道以示之少傅奉世子以觀太傅之德行而審喻之則示之以道者以審喻之為淺故不為也況扵師者何為也哉正已而使觀之者化尔故得其行者或不得其所以行得其言者或不得其所以言也仰之而彌高鑚之而弥堅徳如是然後師之道盡故天子不得而召也諸侯不得而友也又况得而臣之乎此伊尹太公子思孟子之徒所以忘人之勢而唐虞三代大有為之君所以忘其勢也世之挾書而講扵禁中者官以侍為名則其任故可知矣廼自以謂吾師道也冝坐而講以為請扵上其為說曰必如是然後合扵古之所謂坐而論道者也夫坐而論道謂之王公作而行之謂之卿大夫語其任之無為與有為非以是為尊師之道也且礼扵朝王及群臣皆立無獨坐者扵燕皆坐無獨立者故坐未嘗以為尊師之礼也昔晋平公之扵亥唐坐云則坐曽子之侍仲尼子曰參復坐則坐云者盖師之所以命斈者未果有師道也顧僕㒒然以坐自請者也則世之為此者非妄歟故為此議以觧其惑救灾議河北地震水灾墮城郭壊廬舎百姓暴露乏食主上憂憫下緩刑之令遣拊循之使恩甚厚也然百姓患扵暴露非錢不可以立屋廬患扵乏食非粟不可以飽二者不易之理也非得此二者雖主上憂勞扵上使者勞午扵下無以救其患塞其求也有司建言請發倉廩與之粟壮者人日二升􅏊者人日一升主上不旋日而許之賜之可謂大矣然有司之所言特常行之法非審計終始見扵衆人之所未見也今河北地震水灾所毁敗者甚衆可謂非常之変也遭非常之変者亦必有非常之㤙然後可以振之今百姓暴露乏食巳廢其業矣使之相率日待二升之凛扵上則其势必不暇乎他焉是農不復得脩其畎畆啇不得得治其貨賄工不復得利其噐用間民不復得轉移執事一切棄百事而專意扵待升合之食以偷為性命之計是直以餓殍之養養之而已非深思逺慮為百姓長計也以中戸計之户為十人壮者六人月當受粟三石六斗㓜者四人月當受粟一石二斗率一户月當受粟五石難可以乆行也則百姓何以贍其後乆行之則𬒳水之地既無秋成之望非至來歲麥熟賑之未可以罷自今至扵來歲麥熟凢十月一户當受粟五十石今𬒳灾者十餘州州以二萬户計之中戸以上及非灾害所𬒳不仰食縣官者去其半則仰食縣官者為十萬戸食之不遍則為施不均而民猶有無告者也食之偏則當用粟五百萬石而足何以此又非深思逺慮為公家長計也至扵給授之際有淹速有均否有真偽有㑹集之擾有辨察之煩厝置一差皆足致弊又群而䖏之氣乆蒸薄必生疾癘此皆必至扵害也且此不過能使之得旦暮之食耳其扵屋廬構築之費将安取哉屋廬構築之費既無所取而就食扵州縣必相率而去其故居雖有頽牆壊屋之尚可完者故材舊瓦之尚可因者什噐衆物之尚可頼者必棄之而不暇顧甚則殺牛馬而去者有之伐桑棗而去者有之其害又可謂甚也今秋氣已半霜露方始而民露䖏不知所蔽盖流亡者亦已衆矣如是不可止則将空近塞之地空近塞之地夫戦闘之民此衆士大夫之所慮而不可謂無患者也近空塞之地失耕桑之民此衆士大夫所未慮而患之尤甚者也何則失戦闘之民異時有警邊戍不可以不増爾失耕桑之民異時無事邊糴不可以不貴乎二者皆可不深念歟萬一或出扵無俚之計有窺倉庫盗一囊之粟一束之帛者彼知巳負有司之禁則必鳥駭䑕竄竊弄鋤挺扵草茅之中以扞游徼之吏强者既囂而動則弱者必随而聚矣不幸或連一二城之地有抱鼓之警國家胡能晏然而巳乎况夫外有夷狄之可慮内有郊祀之将行安得不妨之扵未然銷之扵未萌也然則為今之策下方𥿄之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則令𬒳災之州為十萬户如一户得粟十石得錢五千下户常産之貲平日未及有此者也彼得錢以完其居得粟以給其食則農得脩其畎畆啇得治其貨賄工得利其噐用間民得轉移執事一切得復其業而不失其常生之計與專意以待二升之廩扵上而勢不暇乎他為豈不逺哉此可謂深思逺慮為百姓長計者也由有司之說則用十月之費為粟五百萬石由今之說則用两月之費為粟一百萬石况貸之扵今而收之扵後足以振其艱乏而終無損扵儲偫之實所實費者錢五鉅萬貫而巳此可謂深思逺慮為公家長計者也又無給授之弊疾癘之憂民不必去其故居苟有頽牆壊屋之尚可完者故材舊瓦之尚可囙者什噐衆物之尚可頼者皆得而不失况扵全牛馬保桑棗其利又可謂甚也雖寒氣方始而無暴露之患民安居足食則有樂生自重之心各復其業則势不暇乎他為雖驅之不去誘之不為盗矣夫飢歲聚餓殍之民而與之升合之食無益扵救災𥙷敗之数此常行之弊法也今破去常行之弊法以錢與粟一舉而賑之足以救其患復其業河北之民聞詔令之出必皆喜上之足頼而自安扵畎畆之中負錢與粟而歸與其父母妻子脫扵流亡轉死之禍則戴上之施而懐欲報之心豈有巳哉天下之民聞國家厝置如此㤙澤之厚其孰不震動感激恱主上之義扵無窮乎如是而人和不可致天意不可恱者未之有也人和洽扵下天意恱扵上然後玉輅徐動就陽而郊荒夷殊陬奉幣來享疆内安輯里無囂聲豈不適変扵可為之時消患扵無形之内乎此所謂審計終始見扵衆人之所未見也不早出此或至扵一有枹鼓之警則雖欲為之将不及矣或謂方今錢粟恐不足以辦此夫王者之冨蔵之扵民有餘則耴不足則與此理之不易者也故曰百姓足君孰與不足百姓不足君孰與足盖百姓冨實而國獨貧與百姓餓殍而上獨䏻保其冨者自古及今未之有也故有曰不患貧而患不安此古今之至戒也是故古者二十七年耕有九年之畜足以備水旱之灾然後謂之王政之成唐水湯旱而民無捐瘠者以是故也今國家倉庫之積固不獨爲公家之費而巳凢以爲民也雖倉無餘粟庫無餘財至扵救灾𥙷敗尚不可以巳況今倉庫之積尚可以用獨安可以過憂将來之不足而立視天民之死乎古人有曰剪瓜宜及膚割髪冝及体先王之扵救灾髪膚尚無所愛况外物乎且今河北州軍凢三十七灾害所𬒳十餘州軍而巳他州之田秋稼足望今有司扵糴粟常價斗増一二十錢非獨人以利農其扵増糴一百萬石易矣斗増一二十錢吾槯一時之事有以為之耳以實錢給其常價以茶荈香藥之類佐其虚估不過捐荼荈香藥之類為錢数鉅萬貫而其費巳足荼荈香藥之類與百姓之命孰為可惜不待議而可知者也夫費錢五鉅萬貫又捐荼荈香藥之類為錢数鉅萬貫而足以救一時之患為天下之計利害輕重又非難明者也顧吾之有司能越拘孪之見破常行之法與否而已此事時之急也故述斯議焉元豐類藁卷之九
