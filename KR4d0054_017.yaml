body:
  text: 記分寧縣雲峯院記分寧人勤生而嗇施薄義而喜爭其然也自府耒抵其縣伍百里在山谷窮處其人修農業之務率數口之家留一人守舍行饁其外盡在田田高下磽膄隨所宜雜殖五穀無廢壤女婦蠶杼無懈人茶鹽蜜𥿄竹箭材葦之貨無纎巨治咸盡其身力其勤如此富者兼田千畒廪實藏錢至纍嵗不發然視捐一錢可以昜死寧死無所損其于施何如也其間利害不能以祶米父子兄弟夫婦相去若奕碁然于其親固然于義厚薄可知也長少族坐里閭相講語以法律意嚮小戾則相告訐結黨詐張事關莭以動視聽甚者書刻金木為章印摹文書以貽吏立縣庭下變偽一日千出雖笞䃼徒死交迹不以屬心其喜爭訟豈比他州縣哉民雖勤而習如是漸􅉼入骨髓故賢令長佐吏比肩常病其未昜治教始移也雲峯院在縣極西界無籍圗不知自何時立景德三年邑僧道常治其院而侈之門闥靚深殿寢言言棲客之廬齋庖庫庾序列兩傍浮啚所用鐃鼓魚螺鍾磬之編百器備完吾聞道常氣質偉然雖索其學其歸未能當于義然治生事不廢其勤亦稱其土俗至有餘輒斥散之不為黍纍計惜樂淡泊無纍則又苦能勝其嗇施喜爭之心可言也或曰使其人氶泊溺其所學其歸一當于義則桀視邑人者必道常乎未敢必也慶曆三年九月與其徒謀曰吾排蓬藋治是院不自意成就如此今老矣恐泯泯無聲卑來人相與圖文字買石刻之使永永與是院俱傳可不可也咸曰然推其徒子思來請記遂來豫不讓為申其可言者寵加之使刻示邑人其有激也二十八日南豐曽鞏記仙都觀三門記門之作取備豫而巳然天子諸侯大夫各有制度加于度則譏之見于昜禮記春㶬其旁三門門三塗惟王城為然老子之教行天下其宫視天子或過焉其門亦三之其備豫之意蓋本于昜其加于度則知禮者所不能損知春秋者所太息而巳甚矣其法之蕃昌也建昌軍南城縣麻姑山仙都觀世傳麻姑于此仙去故立祠在焉距城六七里由絶嶺而上至其處地反平寬衍沃可宫可田其獲之多與他壤倍水旱之所不能災豫嘗視而歎曰豈天遺此以安且食其衆使世之衎衎施施超之者不巳歟不然安有是邪則其法之蕃昌人力固如之何哉其田入既饒則其宫從而侈也直慶曆六年觀主道士凌齊曅相其室無不修而門獨􅋻曰是不足以稱吾法與吾力遂大之既成託豫記豫與齊曅里人也不能辭噫為里人而與之記人之情也以禮春秋之義告之天下之公也不以人之情昜天下之公齊曅之取子文豈不得所欲也夫豈以豫言為厲巳也夫八月日記秃秃記秃秃高密孫齊兒也齊明法得嘉州司法先娶杜氏留高密更給娶周氏與抵蜀罷歸周氏恚齊給告縣齊資謝得釋授歙州休寧縣尉與杜氏俱迎之官再期得告歸周氏復恚求絶齊急曰為若出社氏祝髮以誓周氏可以齊獨之休寧得倡陳氏又納之代受撫州司法歸間周氏不復見使人竊取其所産子合社氏陳氏載之撫州明道二年正月至是月周氏亦與其弟耒𣣔入據其著吏遮以告齊齊在寶應佛寺受租米趍歸捽挽至庶下出偽劵曰若傭也何敢爾辨于州不直周氏訴于江西轉運使不聽久之以布衣書里姓聮訴事行道上乞食蕭貫守饒州馳告貫饒州江東也不當受訴貫受不拒轉運使始遣吏祝應言為覆周氏引産子為據齊懼子見事得即送匿旁方政舍又懼則收以歸扼其咽下不死陳氏從旁引兒足倒持之抑其首甕水中乃死秃秃也召役者鄧旺穿寢後垣下為坎深四尺瘞其中生五歲云獄上更赦猶停齊官徙濠州八月也慶曆三年十月二十二日司法張彥博改作寢廬治地得坎中死兒驗問知狀者小吏熊簡對如此又召鄧旺詰之合獄辭留州者皆是惟殺秃秃狀蓋不見與豫言而悲之遂以棺服斂之設酒脯奠焉以錢與浮圖人升倫買磚為壙城南五里張氏林下瘞之治地後十日也嗚呼人固擇于禽獸夷狄也禽獸夷狄于其配合孕飬知不相禍也相禍則其類絶也久矣如齊何議焉買石刻其事納之壙中以慰秃秃且有警也事始未惟杜氏一無忌言二十九日南豐曽鞏作醒心亭記滁州之西南泉水之涯歐陽公作州之二年􅌟亭曰豐樂自為記以見其名之意既又直豐樂之東幾百步得山之高􅌟亭曰醒心使鞏記之凡公與州賔客者逰焉則必即豐樂以飲或醉且勞矣則必即醒心而望以見夫群山之相環雲煙之相滋曠野之無窮草樹衆而泉石嘉使目新乎其所覩耳新乎其所聞則其心灑然而醒更欲久而忘歸也故即其所以然而為名取韓子退之北湖之詩云噫其可謂善取樂于山泉之間而名之以見其實又善者矣雖然公之樂吾能言之吾君優遊而無為于上吾民給足而無憾于下天下學者皆為才且良夷狄鳥獸草木之生者皆得其宜公樂也一山之隅一泉之旁豈公樂哉乃公所以寄意于此也若公之賢韓子殁數百年而始有之今同逰之賔客尚未知公之難遇也後百千年有慕公之為人而覽公之迹思𣣔見之有不可及之嘆然後知公之難遇也則凡同逰于此者其可不喜且幸歟而鞏也又得以文詞託名于公文之次其又不喜且幸歟慶曆七年八月十五日記繁昌縣興造記太宗二年取宣之三縣為太平州而繁昌在籍中繁昌者故南陵地唐昭宗始以為縣縣百四十餘年無城垣而濵大江常編竹為障以自固嵗輒更之用材與力一取于民出入無門關賔至無舍館今治所雖有屋而痺逼破露至聽訟于廡下案牘簿書棲列無所往往散亂不可省而獄訟賦役失其平歷七代為令者不知幾人恬不知改革日入于壞故卋指繁昌為陋縣而仕者不肯耒行旅者不肯逰政事愈以庛市區愈以索寞為鄉老吏民者羞且憾之事之窮必變故今有能令出因民之所欲為悉破去竹障而垣其故基為門以通道往來而屋以取固即門之東北􅌟亭瞰江以納四方之賔客既又自大其治所為重門步廊門之上為樓斂敕書置其中廊之兩旁為群吏之舍視事之廳便坐之齋寢廬庖湢各以序為􅈦之東西隅凡案牘簿書室而藏之于是乎在自門至于寢廬總為屋凡若干區自計材至于用工總為日凡二十三又九十六日而落成焉夏希道太𥘉此令之姓名字也慶曆七年十月二十三日此成之年月日也始繁昌為縣止三千戶九十年間四聖之德澤覆露生飬今幾至萬家田利之入倍他壤有餘魚蝦竹􅓗柿栗之貨足以自資而無貧民其江山又天下之勝處可樂也今復得能令為樹立如此使得無嵗費而有巨防賔至不惟得以休而耳目尚得以為之觀令居不惟得以安而民吏之出入仰望者益知尊且畏之獄訟賦役之書悉完則是非倚而可定也豫知縣之去陋名而仕者爭欲來行旅者爭欲逰昔之疵者日以減去而索寞者日以富蕃稱其縣之名其必自此始夏令用薦者為是縣至二十七日而計材以至于落成不惟興利除蔽可法也而其變因循就功效獨何其果且速歟昔孟子譏子産惠而不知為政于戲如夏令者庶幾所謂知政者歟于是過子産矣凡縣之得令為難幸而得能令而興事尤難幸而事興而得後人不廢壞之人難也今繁昌民既幸得其所難得而令又幸無不便巳者得卒興其所無難皆可喜無憾也惟其欲後人不廢壞之未可必也故屬子記其不特以著其成其亦有以警也某月日南豐曽鞏記墨池記臨川之城東有地隱然而高以臨于溪曰新城新城之上有池窪然而方以長曰王羲之之墨池者苟仙子臨川記云也羲之嘗慕張芝臨池學書池水盡黑此為具故迹豈信然邪方羲之之不可強以仕而嘗極東方出滄海以娛其意于山水之間豈有禍徉肆恣而又嘗自休于此邪羲之之書晚乃善則其所能蓋亦以精力自致者非天成也然後世未有能及者豈其學不如彼邪則學固豈可以少哉况𣣔深造道德者邪墨池之上今為州學舍教授王君盛恐其不章也書晉王右軍墨池之六字于㨕間以揭之又告于鞏曰願有記惟王君之心豈愛人之善雖一能不以廢而因以及乎其迹邪其亦欲推其事以勉其學者邪夫人之有一能而使後人尚之如此况人仁莊士之遺風餘思𬒳於來世者如何哉慶曆八年九月十二日曽鞏記菜園院佛殿記慶曆八年四月撫州菜園僧可栖得州之人高慶王明饒傑相與率民錢為殿于其院成以佛之像置其中而來乞豫文以為記𥘉菜園有籍于尚書有地于城南五里而草木生之牛羊踐之求屋室居人焉無有也可栖至則喜曰是天下之廢地也人不爭吾得之以老斯足矣遂以醫取資于人而即其處立寢廬講堂重門齊庖之房棲客之舍而合其徒入而居之獨殿之役最大自度其力不能為乃使慶明傑持簿乞民間有得輒記之微細無不受浸漸積纍期月而用以足役以既自可栖之耒居至于此蓋十䄵矣吾觀佛之徒九有所興作其人皆用力也勤刻意也專不肯茍成不求速效故善以小致大以難致昜而其所為無一不如其志者豈獨其説足以動人哉其中亦有智然也若可栖之披攘經營攟托纎悉忘十年之久以及其志之成其所以自致者豈不近是哉噫佛之法固方重于天下而其學者又善殖之如此至于世儒習聖人之道既自以為至矣及其任天下之事則未嘗有勤行之意堅持之操少長相與語曰苟一時之利耳安能必世百年為教他之漸而待遲久之功哉相薰以此再塺千餘載雖有賢者作未可以得志于其間也由是觀之反不及佛之學者逺矣則𬒳之所以盛不由此之所自守者衰歟與之記不獨以著其能亦愧吾道之不行也巳曽鞏記宜黃縣縣學記古之人自家至于天子之國皆有學自幼至于長未嘗去於學之中學有詩書六藝弦歌洗爵俯仰之容升降之莭以習其心體耳目手足之舉措又有祭祀鄉射飬老之禮以習恭讓進材論獄出兵授捷之法以習其從事師友以解其惑勸懲以勉其進戒其不率其所為具如此而其大要則務使人人學其性不獨防其邪僻放肆也雖有剛柔緩急之異皆可以進之中而無過不及使其識之明氣之充於其心則用之於進退語默之際而無不得其宜臨之以禍福死生之故無足動其意者為天下之士為所以飬其身之備如此則又使知天地事物之變古今治亂之理至于損益廢置先後始終之要無所不知其在堂戶之上而四海九州之業萬世之䇿皆得及出而履天下之任列百官之中則隨所施為無不可者何則其素所學問然也蓋九人之起居飲食動作之小事至于修身為國家天下之大體皆自學出而無斯須去于教也其動于視聽四支者必使其洽于內其謹于𥘉者必始其要于終馴之以自然而待之以積夕噫何其至也故其俗之成則刑罰措其材之成則三公百官得其士其為法之永則中材可以守其入人之深則雖更衰世而不亂為教之極至此鼓舞天下而人不知其從之豈用力也哉及三代衰聖人之制作盡壞千餘年之間學有存者亦非古法人之體性之舉動唯其所自肆而臨政治人之方固不素講士有聰明朴茂之質而無教飬之漸則其材之不成夫然蓋以不學未成之材而為天下之吏又承衰弊之後而治不教之民嗚呼仁政之所以不行賊盜刑罰之所以積其不以此也歟宋興幾百年矣慶曆三年天子圖當世之務而以學為先于是天下之學乃得立而方此之時撫州之宜黃猶不能有學士之學者皆相率而寓于州以群聚講習其明年天下之學復廢士亦皆散去而春秋釋奠之事以著於令則常以廟祀孔氏廟又不復理皇祐元年會令李君詳至始議立學而縣之士某某與其徒皆自以謂得發憤于此莫不相勵而趍為文故其材不賦而羡匠不彂而多其成也積屋之區若干而門序正位講藝之堂棲士之舍皆足積器之數若干而祀飲寢食之用皆具其像孔氏而下從祭之士皆備其書經史百氏翰林子墨之文章無外求者其相基會作之本末總為日若干而巳何其周且速也當四方學廢之𥘉有司之議固以謂學者人情之所不樂及觀此學之作在其廢學數年之後唯其令之一唱而四境之內嚮應而圗之如恐不及則夫言人之情不樂于學者其果然也歟宜黃之學者固多良士而李君之為令威行愛立訟清事舉其政又良也夫及良令之時而順其慕學發憤之俗作為宫室教肄之所以圗書器用之須莫不皆有以飬其良材之士雖古之去今逺矣然聖人之典籍皆在其言可考其法可求使其相與學而明之禮樂莭文之詳固有所不得為者若夫正心修身為國家天下之大務則在其進之巳使一人之行修移之于一家一家之行修移之于鄉鄰族黨則一縣之風俗成人材出矣教化之行道德之歸非逺人也可不勉歟縣之士耒請曰願有記其記之十二月某日也學舍記豫幼則從先生受書然是時方樂與家人童子嬉戲上下未知好也十六七時窺六經之言與古今文章有過人者知好之則于是鋭意𣣔與之並而是時家事亦滋出自斯以來西北則行陳蔡譙苦睢汴淮泗出于京師東方則絶江舟漕河之渠踰五湖並封禹會稽之山出于東海上南方則載大江臨夏口而望洞庭轉彭蠡上吏嶺繇真陽之瀧至南海上此子之所涉世而奔走也蛟魚洶湧湍口之川嶺崖莾林軀虺之聚與夫雨暘寒燠風波霧毒不測之危此豫之所單逰逺寓而冒犯以勤也衣食藥物廬舍器用箕筥碎細之間此豫之所經營以飬也天傾地壞殊州獨哭數千里之逺抱喪而南積時之勞乃畢大事此豫之所遘禍而憂艱也太夫人所志與夫弟婚妹嫁四時之祠屬人外親之問王事之輸此豫之所皇皇而不足也豫于是力疲意耗而又多疾言之所序蓋其一二之也得其間時挾書以學于夫為身治人世用之損益考觀講解有不能至者故不得専力盡思琢雕文章以載私心難見之情而追古今之作者為並以足豫之所好慕此豫之自視而嗟也今天子至和之𥘉豫之侵優多事故益甚豫之力無以為乃休于家而即其旁之草舍以學或疾其卑議其隘者豫顧而笑曰是豫之宜也豫之勞心困形以役于事者有以為之矣豫之卑巷窮廬穴衣礱飯芭莧之美隱約而安者固豫之所以遂其志而有待也豫之疾則有之可以進于道者學之有不至至于文平生所好慕為之有不暇也若夫土堅木好高大之觀固世之聰明豪雋挾長而有恃者所得為若豫之拙豈能昜而志彼哉遂歷道其少長出處與夫好慕之心以為學舍記南軒記得鄰之茀地燔之尌竹木灌𬞞于其間結茅以自休囂然而樂世固有處廊廟之貴抗萬乘之富吾不願昜也人之性不同于是知伏間隱隩吾性所最冝驅之就煩非其器所長况使之爭于勢利愛惡毀譽之間邪然吾親之飬無以修吾之昆弟飯菽藿美之無以繼吾之役于物或田于食或野于宿不得常此處也其能無欿然于心邪少而思凡吾之佛性苦形而役于物者有以為之矣士固有所勤有所肆識其皆受之于天而順之則吾亦無處而非其樂獨何必休于是邪顧吾之所好者逺無與處于是也然而六藝百家史氏之籍箋疏之書與夫論美刺非感微記逺山鑱冡刻浮誇詭異之文章下至兵權曆法皇官藥工山農野圃方言地記佛老所傳吾悉得于此皆伏義巳來下更秦漢至今聖人賢者魁傑之材殫歲月憊精思日夜各推所長分辨萬事之説其于天地萬物小大之際修身理人國家天下治亂安危存亡之致罕不畢載處與吾俱可當所謂益者之友非邪吾窺聖人指意所出以去疑解蔽賢人智者所稱事引類始終之概以自廣飬吾心以忠約守而恕行之其過也改超之以勇而至之以不止此吾之所以求于內者得其時則行守深山長谷而不出者非也不得其時則止僕㒒然求行其道者亦非也吾之不足于義或愛而譽之者過也吾之足於義或惡而毀之者亦過也彼何與于我哉此吾之所任平天與人者然則吾之所學者雖慱而所守者可謂間所言雖近而易知而所任者可謂重也書之南軒之壁間蚤夜覽觀焉以自進也南豐曽鞏記金山寺水陸堂記慶曆八年潤之金山寺大明年寺之僧瑞新耒治寺事某月擇山之陽亢爽之地勸州之人某氏為水陸堂積錢之數百三十萬積日之數若干而成夫金山之以觀逰之美取勝于天下非獨據江瞰海並楚之衡而濱吳之要也蓋其浮江之檻負崖之屋椽摩棟揭環山而四出亦有以夸天下者則天下之東馳而莫不顧慕者豈特一山之好哉而其作之完蓋非一人一日之力及火余固嗟夫未嘗得與時之君子者遊而縱夫余心之所樂焉至于今未久也則聞夫山之穹堂奧殿環傑之觀滋起矣此非佛之法足以動天下蓋新者余嘗與之從容彼其林且辨有以動人者故成此不難也夫廢于一時而後人不能更興者天下之事多如此至于更千百年委棄鬱塞而下得振行於天下者吾之道是也豈獨牽于勢哉蓋學者之難得而天下之材不足也使如此寺之壞而有新之材一日之作軼于百年纍世之迹則事廢者豈足憂而世之治可勝道哉新方以書吉某氏之世善而其子某又業為士因以求子記堂之始故為之歷道其興壞之端而并子之所感者寓焉鵝湖院佛殿記慶曆某年某月日信州鉛山縣鵝湖院佛殿成僧紹元來請記遂為之記曰自西方用兵天子宰相與士大夫勞于議謀材武之士勞於力農工啇之民勞于賦斂而天子嘗減乘輿掖庭諸費大臣亦往往辭賜錢士大夫或暴露其身材武之士或秉義而死農工啇之民或失其業惟學佛之人不勞于謀議不用其力不出賦斂食
