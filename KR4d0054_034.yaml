front:
  text: 元豐類藁卷之三十四
  hash: sha256:78c98e74d2b0981c41dadd8e4edbb36169e8f7c8313057a9ec6a8a9a26e8873b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_034-1a}
body:
  text: 奏狀乞賜唐六典狀右臣伏見聖恩以新雕印唐六典頒賜近臣以及館閣竊以唐𥘉以尚書中書門下三省參領天下之事以今僕射侍中為宰相之任然選士用人出兵授田刑罰禮樂至于工官所主則一本于尚書尚書侍郎分為六官郎員外郎各有攸司又分二十有四所以彌綸庶務至微至密其大則以永業口分之田制民之産以租庸調制民之賦以諸府十二衛制民之兵三代以來其政最為近古太宗所以致治者蓋出于此其事至衆而舉之有條其體至大而統之有要可謂得建官制理之方明皇之世乃考尋舊章著之簡册以六卿所總領則象周官名其書曰六典而開元十四年張説罷中書令為尚書右丞相不知政事自此政事歸中書而尚書但受成事而巳亦其書之所記也則當是之時尚書巳不得其職其所著者蓋先代之遺法也其本原設官因革之詳上及唐虞以至開元其文不煩其實甚備信可謂善于述作者也臣向在館閣嘗見此書其前有序明皇自撰意而其篇首皆曰御撰李林甫注及近得此書不全本其前所載序同然其篇首不曰御撰其第四一篇則曰集賢院學士知院事中書令修國史上柱國始興縣開國子臣張等奉敕撰蓋開元二十二年張九齡實任此官然則此書或九齡等所為歟不敢以疑説定也伏惟皇帝陛下神智聖性夙成自天方革敝興壞以修太平之業繼唐虞之迹而稽古不倦旁及此書乃自禁中􅍢版傳之以賜在位豈不以其官儀品式去今未逺而行于今者尚多將使學士大夫得而求之其于就列皆知其任其于治體開益至多非聖慮所存規模宏逺則何以訓勵群臣委曲至此臣備數內閣以文學為職冝略知典故不可以衰退駑鈍怠惰苟止故敢昧冒以請伏望聖慈依例賜臣一部使得伏玩思索萬一得奉清間尚可牽強以備訪問不勝犬馬區區之誠貪冀恩私不知僣越其于罪戾所不敢逃干冒宸嚴臣不任授滄州乞朝見狀右臣伏奉敕命就差知滄州巳起離前來竊念臣逺違班列十有二年伏遇陛下神聖文武當天受命制作法度以集太平之功群情顒顒孰不自願為能以托名于萬世而臣曽未得須史之間進望清光竊不自揆願奉德音犬馬之情固非一日之積今將至京師伏望聖慈許臣朝見臣不任乞登對狀右臣于十月二十六日伏蒙聖恩賜對延和殿陛下假之以玉色奬之以德音訪之以治天下之道而及于當世之事其敝安在臣昏愚不肖不足以稱聖意遽言國家之大體則懼非臣之任毛舉天下之細務則又非臣之志是以不敢率然以對夫智之不明辭之不敏此臣之罪也計臣之材與臣之位不敢以言高亦臣之分也退而伏念臣材質淺薄偶有好古之勤嚮道之志遇陛下高明光大方修先王之政以集太平之功而臣藐在外服十有二年無衒鬻之一言無左右之素譽地窮勢絶不敢期于自通分以孤愚老于踈逺屬陛下聰明􅐶智洞照群情公􅈦並觀不遺小善赤然獨斷察臣之本末超然逺御收臣于滯涸至于撫慰之私顧問之寵雖世之抱道德堪重任之士恐不能當豈臣之微所可輒得雖滅身碎首未足以報非常之賜其于傾竭肝膽以自效其愚忠有出位之責猶不敢辭况親氶聖問實臣吐盡誠素之時其不敢自默此臣愛君事國之義也竊以先王之治天下必有典籍以為當卋之法傳之後嗣使永有持循故在夏書稱政典曰先時者殺無赦不及時者殺無赦則夏之治天下之書曰政典也其在啇書稱制官刑警于有位曰惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡則啇之治天下之書曰官刑也其在周書稱成王還歸在豐作周官蓋以董正治官之意訓告群臣今書周官之篇是也于是之時事為之制曲為之防故經禮三百威儀三千所謂經禮三百者周禮六卿屬皆六十蓋舉其全數則周之治天下之書曰周禮也三代以後時君所為務在苟簡紀綱憲度闕而不圖蓋逺莫盛于漢而孝文之世賈誼欲定官名議寢不用中莫懿于後周雖分六府之位以儀刑經禮而典籍無所傳聞近莫美于唐𥘉以尚書六職本天下之治而不能修列其法論著于書開元之際始追次舊章以為六典而尚書巳失其職然三代之後治天下之書有此而巳今陛下以法制度數宜有所自故上稽周禮以官儀注措宜參近事故旁求六典則又質諸當世之宜裁以聖慮始自三省至于百工皆正其名夫名正然後位㝎位㝎然後事舉名正位㝎事舉則設官正理之方盡矣使萬官千品各循其分彛倫庶績皆得其任然後陛下程其能等其實以章别幽明信其賞必其罰以推行愆勸庶務雖衆其目而無不周四海雖廣正其本而無不治况推尋采掇雖付在有司而是正凖裁實由聖斷至夫大法既具然後條分類别以陛下之所指授勒成一代之典明示四方使知出自聖作豈獨以之彌綸當今之務固當藏之金匱為萬世法臣愚固陋竊不自揆于夫經營之體損益之方所謂位定而事舉者𣣔進其妄意之滯見庶有毛髮之輔然心之委曲難以書盡伏望特垂聖慈許臣上殿敷奏使臣得披腹心以稱前日之聖問萬分之一有足以上當天心臣死生幸甚俯伏待命臣不任乞出知頴州狀右臣愚不自揆懷犬馬之情敢昧萬死以聞不敏之誅所不敢逭伏念臣性行迂拙立朝無所阿附有見嫉之積毀無借譽之私援在外十有二年更歷七郡雖有愛君嚮國之心託勢踈逺無路自通期于抱志沒齒而巳陛下居法宫之深臨萬官之衆而臣以單外之迹一介之微陛下廓四聰之廣出獨見之卓不繇臣之衒鬻不因人之黨助收憐附慰勞問褒嘉語重意殊可謂非常之遇士之有大過人之材者殆未足以致此豈臣之鄙所當冒得日夜思念臣以庸下之器在隱約之中而獨為聖主所知如此螻蟻之軀知死不足以圖報今還朝以來甫及數月未有絲忽自效之勤而輒以私誠上陳臣之妄庸雖受誅絶之刑不足以塞責惟陛下察而哀之臣母年七十有一比嬰疾疹舉動步履日更艱難陛下處臣京師臣幸得侍庭闈以便醫藥聖澤至厚常恐不能克堪今臣弟布得守陳州臣母憐其久别𣣔與俱行顧臣之宜惟得旁郡庶可奉親往來以共子職而抱疾之親陸行非便今與陳比境許蔡亳州及南京皆不通水路顧頴可以沿流臣誠不自揆不諱萬死之責敢昧冒以請伏望聖慈差臣知頴州一任竊恐顧臨到任未久無例為臣移易緣若候顧臨滿問則臣弟布陳州却巳滿任𣣔望特出聖恩許臣不候顧臨任滿交割臣蠢冥寒陋蒙陛下特異之知未有鎦銖之稱而顧子母之恩規私擇便仰煩聖聰當伏斧鎖以須罪戾惟陛下哀憐聽察干犯天威臣不任再乞登對狀右臣去冬再蒙聖恩賜對臣愚淺薄無軼倫之行絶衆之材徒于輩流粗識文字至于講求天下之務非敢謂能蓋嘗有志遇陛下紹天開迹大修治具一言片善人人得以自效而臣流離漂泊藐在外服有深忌積毁之莫測無遊談私黨之可因轉徙八州推移一紀無測行之一迹得參于御隸之間無嘗試之半詞得徹于巖一之上心思消縮齒髮凋耗常恐卒填溝􅊤獨遺恨于無窮也陛下躰生知之質起日新之政揆之以道以易漢唐五代之卑本之于身以追堯舜三代之盛臣雖欲奮駑鈍願備驅馳而處踈賤之中無可致之一伏遇陛下明無不照察臣滯迹之不容聖無不通采臣孤學之有得出自􅐶斷接之便朝所以詢謀撫納勉慰稱一之殊皆非素望所及臣雖草苑之漏顧非水石之頑蓋士躬且老身孤立于天下而獨為聖主所知如此燔軀沈族豈足論報其于剖心析肝以效其區區之忠固臣之所不敢不盡也是以竊不自揆冒言當世之士陛下寬其不敏之誅而收其臆出之見謂有可以當聖意者臣愚蹇鈍分豈稱此蓋繇陛下神聖文武度越千載而虛心納下無伐善之意徇巳之情故兼聽廣覽小能薄技無所不録而臣愚連遇得以及此今臣備數轂下雖日得造朝而身不邇法坐之凝嚴且不接德音之溫厚涉四時矣其畢忠願知之心惓惓之義豈須臾廢哉伏念臣嘗言天下之經費以謂皇祐治平庶官之員倍于景德議今之兵以謂西北之宜在擇將帥待罪三班獲因職事考于載籍蓋官日益衆而守塞之臣有未稱其任者得以推其事實審其源流其于裁處之宜亦嘗略窺其要竊𣣔飾其所聞敢終前日之説以獻陛下方日孜孜大有為于天下內則更張庶事外則經營四方如臣之説有可采者庶幾制天下之用以飬財御天下之材以經武有助聖政之萬一臣于受恩非敢謂報庶以明臣犬馬之志未嘗不響上之所為也臣又嘗言陛下方上稽周禮旁參六典以更定官制臣于經營之躰損益之數願有毛髮之輔伏聞百度巳成萬務巳㝎而臣曽不能吐一言陳一䇿庶得因國大典託名不泯今條分類别宣布有期臣誠不自揆以謂更制之日新舊革易之𥘉彌綸之術固不可不有所素具竊𣣔自效少禆聖晝之緒餘臣于三者或萬有一得然事有本末理之詳悉宜得口陳伏望特出聖慈許臣上殿敖奏干冒宸嚴臣不任申中書乞不看詳會要狀右伏以自來修撰國史皆妙選衆材共當寄任今通修五朝大典屬鞏專領巳是一人而冒衆材之任顧鞏衰搖懼不克堪其今來所修會要計三百卷修纂以來經涉十有餘年編修等官巳更六人限至秋季末成書即今巳是八月中旬某若依限修進不惟須合考求首尾參詳得失仍更並須檢尋文字照據其間恐合更有更改損益不獨于鞏以旬月而求就十有餘年之功又復于纍巳于國史是以一人而冒衆材之任懼不克堪而更益以會要一人而兼數人之任縱使容鞏添展期限緣朝典章本末閎大不同小小文字自顧材力實不能兼况今來進本裝寫並巳了畢伏乞更賜敷奏取自朝廷酌别賜指揮辭中書舍人狀閣門告報有旨更不得辭免不曽上右臣凖閣門告報蒙恩授臣中書舍人者竊以唐虞三代之君興造政事爵德官能之際所以播告天下訓齊百工必有詔號令命之文逹其施為建立之意皆擇當卋聰明雋又工于言語文學之臣使之敷揚演暢𬒳于簡册以行之四方垂之萬世理化所出其具在此至其巳久而謀謨訪問三盤五誥誓命之書刻之為經後世學者得而宗之師生相傳為載籍首吟誦尋繹以求其掃一有發明皆為世教蓋其大體所繫如此逮至漢興雖不能比迹三代致治之隆而誥令下者典正謹嚴尚為近古自斯巳後豈獨彛倫粃斁其推而行之載于明命亦皆文字淺陋無可觀采唐之文章嘗盛矣當時之士若常衮楊炎元禎之屬號能為訓辭今其文尚存亦未有逺過人者然則號令文來自漢而降未有及古理化之具不其闕歟伏惟陛下以天縱之聖闡明道術所以作則垂憲紀官正名皆上追三王下陋唐漢至于出口肆筆發為德音固巳獨造精微不可窮測則于代言之任豈易屬人臣淺薄暗瞀學朽材下誤蒙陛下知之于擯排忌嫉之中收之于棄捐流落之地屬之史事巳懼􅘃官至于推度聖意討論潤色以次為謨訓彰示海內兹事至大豈臣所堪况侍從之官實備顧問而臣齒髮巳衰心志昏塞豈獨施于翰墨懼非其任至于謀猷獻納尤不逮人伏望博選于朝旁及踈逺必有殊絶特出之材能副聖神奬拔之用所有授臣恩命乞賜寢罷授中書舍人舉劉攽自代㧋蒙恩授前件官凖編敕莭文知雜御史巳上授訖許舉官自代者右謹具如前臣伏見朝奉大夫充集賢校理知毫州劉攽廣覽載籍強記治聞求之輩流罕有倫比臣竊以謂引拔衆材彌綸丗務至于博學之士固宜用在朝廷况今聖質高明究極今古凡在左古當備顧問之臣尤須多識前載然後能稱其職如攽所長實允兹選况攽纍歷州郡治行可稱至于文辭亦足觀采兼此衆美臣實不如今舉自代謹具狀奏聞伏候敕旨元豐類藁卷之三十四
