front:
  text: 元豐類藁卷之十四
  hash: sha256:c64e51e26601691b7304d122d15ca0cc83a3626c006d913bf5bc876520a92f24
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_014-1a}
body:
  text: 序送傳向老令瑞安序向老傳氏山隂人與其兄元老讀書知道理其所為文辭可喜太夫人春秋高而其家故貧然向老昆弟尤自守不苟取而妄交太夫人亦志其貧余得之山隂愛其自處之重而見其進而未止也特心與之向老用舉者令溫之瑞安將奉其太夫人以往豫謂向老學古其為令當知所先後然古之道蓋無所用于今則向老之所守亦難合矣故為之言庶夫有知豫為不妄者能以此而易也送周屯田序士大夫登朝廷年七十上書去其位天子官其一子而聽之亦可謂榮矣然而有若不釋然者余為之言曰古之士大夫倦而歸者安居几杖膳羞𬒳服百物之珍好自若天子養以燕饗飲食鄉射之禮自比子弟祖韝鞠􅛏以薦其物咨其辭説不于庠序于朝廷時莭之賜與縉紳之禮於其家者不以朝則以夕上之聽其休為不敢勤以事下之自老為無為而尊榮也今一日辭事還其廬徒御散矣賔客去矣百物之順其𣣔者不足人之群嬉屬好之交不與約居而獨逰散棄乎山墟林莾陋巷窮閭之間如此其于長者薄也亦曷能使其不欿然于心邪雖然不及乎尊事可以委蛇其身而益間不享乎珍好可以窒煩除薄而益安不去乎深山長谷豈不足以易有庠序之位不居其榮豈有患乎其辱哉然則古之所以殷勤奉老者皆世之任事者所自為於士之倦而歸者顧為煩且勞也今之置古事者顧有司為艾耳士之老于其家者獨得其自肆也然則何為動其意邪余為之言者尚書屯田員外郎周君中復周君與先人俱大聖二年進士與余舊且好也既為之不釋然者又𣣔其有以處而樂也讀余言者可無異周君而病今之失矣南豐曽鞏序送江任序均之為吏或中州之人用于荒邊側境山區海聚之間蠻夷異域之處或燕􅍮越蜀海外萬里之人用于中州以至四遐之鄉相易而往其山行水涉汝莾之馳往注則風霜氷雪瘴霧之毒之所侵加蛟龍虺蜴虎豹之群之所抵觸衝波急洑隤崖落石之所覆壓其進也莫不籝糧舉藥選舟易馬力兵曺伍而浚動戒朝奔夜變更寒暑而後至至則宫廬器械𬒳服飲食之具圡風氣候之宜與夫人民謡俗語言習尚之務其變難遵而其情難得也則多愁居惕處嘆息而思歸及其久也所習巳安所蔽巳解則歲月有期可引而去矣故不得專一精思修治具以宣布天子及下之仁而為後世可守之法也或九州之人各用于其圡不在西封在東境土不必勤舟車輿馬不必力而巳傳其邑都坐其堂異道逺所次升降之倦凌冒之虞無有接于其形動于其慮至則耳目口鼻百體之所飬如不出乎其家父兄六親故舊之人朝夕相見如不出乎其里山川之形圡田市井風謡習俗辭説之變利害得失善惡之條貫非其童子之所聞則其少長之所逰覽非其自得則其鄉之先生老者之所告也所居巳安所有事向之宜皆巳習熟如此能專慮致勞職事以宣上恩而修百姓之急其施為先後不待旁咨久察而與奪損益之幾巳斷於胸中矣豈纍夫孤客逺寓之憂而以苟且殃事哉臨川江君任為洪之豐城此兩縣者牛羊之牧相交樹木果𬞞五榖之壟相入也所謂九州之人各用于其圡者孰近於此既巳得其所處之樂而厭聞飫聽其人民之事而江君又有聰明敏急之材廉潔之行以行其政吾知其不去圗書議論之適賔客之好而所為有餘矣蓋縣之冶則民自得于太山深谷之中而州以無為於上吾將見江西之幕府無南嚮而慮者矣于其行遂書以送之南豐曽鞏敘送劉希聲序東明劉希聲來臨川見之其貌勉于禮其言勉于義其行亦然其久亦堅其讀書為辭章日盛從豫遊三年豫愛之今年慶曆五年還其鄉過豫别與之言曰東明汴邑也子之行問道之所嚮者以告子子也一趨馬而不息至乎爾也苟為一從馬一違馬雖不息決不至也子也好聞聖人之道亦如是而已矣五月四日序送李林叔知柳州談者謂南越偏且逺其風氣與中州異故官者皆不𣣔久居往往車船未行輒以屈指計歸日又減小其官以為不足事其逆自慮如此故其至皆傾搖解弛無憂且勤之心其習俗從古而爾不然何自越與中國通已千餘年而名能撫循其名者不過數人邪故越與閩蜀始俱為夷閩蜀皆巳變而越獨尚陋豈其俗不可更與蓋吏者莫致其冶教之意也意亦其民之不幸也已彼不知繇京師而之越水陸之道皆安行非若閩溪峽江蜀棧之不測則均之吏于逺此非獨優歟其風氣吾所諳之與中州亦不甚異起居不違其莭未嘗有疾苟違莭雖中州寧能不生疾邪其物産之美果有荔子龍眼蕉柑橄攬花有素馨山丹含笑之屬食有海之百物纍歲之酒醋皆絶于天下人少鬪訟喜嬉樂吏者唯其無久居之心故謂之不可如其有久居之心奚不可邪古之人為一鄉一縣其德義惠憂尚足以薰蒸漸澤今大者專州豈當小其官而不事邪令其得吾説而思之人咸有久居之心又不小其官為越人滌其陋俗而歐于冶居閩蜀上無不幸之歎其事出千餘年之表則其美之巨細可知也然非其材之頴然邁于衆人者不能也官于南者多矣豫知其材之頴然邁于衆人能行吾説者李材叔而已材叔久與其兄公翊仕同年同用薦者為縣入祕書省為著作佐郎令材叔為柳州公翊為象州皆同時材又相若也則二州交相致其政其施之速勢之便可勝道也夫其越之人幸也夫其可賀也夫送趙宏序􅍮民與蠻合為寇潭旁數州彼其害天子宰相以潭重鎮守臣不勝任為改用人又不勝復改之守至上書乞益兵詔與撫兵三百殿直天水趙君希道實護以往希道雅與豫接間過豫道潭之事豫曰潭山川甲兵如何食幾何賊衆寡強弱如何豫不能知能知書書之載若潭事多矣或合數道之兵以數萬絶山谷而進其勢非不衆且健也然而卒殱焉者多矣或單車獨行然而以克者相重焉顧其義信如何耳致吾義信雖單車獨行寇可以為無事龔遂張綱祝良之類是也義信不足以致之雖合數道之兵以數萬卒纎焉邊重寇耳况致平雅楊旻裴行立之類是也則兵不能致平致平者在太守身耳明也前之守者果能此天子宰相烏用易之必易之為前之守者不能此也今往者復曰乞益兵何其與書之云者異邪豫憂潭民之重困也寇之益張也泩時潭吏與旁近郡靳力勝賊者暴􅦡者戮降者有之今之往者將特不為是而已邪抑猶不免乎為是也天子宰相任之之意其然雅潭守近侍臣使撫覘潭者郎吏御史博士相望為我稔其賢者曰今之言古書往往曰迓然書之事乃已試者也師已試而施諸治與時人之自用孰為得失耶愚言倘可以平潭之患今雖細然太中咸通之間南方之憂常劇矣夫豈階于大哉為近臣郎吏御吏博士者獨得而不思也希道固喜事者因其行遂次第其語以送之慶曆六年五月日曽鞏序送王希序字潛鞏慶曆三年遇潛之於江西始其色接吾目已其言接吾耳久其行接吾心不見其非吾愛也從之遊四年間鞏于江西三至焉與之上滕王閣泛東湖酌馬跑泉最數遊而久乃去者大梵寺秋屏閣閣之下百步為龍沙沙之涯為漳水水之西涯橫出為西山皆江西之勝處也江西之州中凡遊觀之可望者多西山之見見西山最正有盡者唯此閣而已使覽登之美窮于此樂乎莫與為樂也况龍沙漳水水涯之陸陵人家園林之屬子山者莫不見可見者不特西山而巳其為樂可勝道邪故吾與潛之遊其間雖數且久不厭也其計于心曰奚獨吾遊之不厭也將奉吾親託吾家于是州而遊于是以歡吾親之心而自慰焉未能自致也獨其情旦而作夜而息無頃焉忘也病不遊者期月矣而潛之又遽去其能不撫然邪潛之之將去以書表曰子能不言于吾行耶使吾道潛之之美也豈潛之相望意也使以言相鐫切邪視吾言不足進也視可進也莫若道素與遊之樂而惜其去亦情之所不克已也故云爾唴乎潛之之去而之京師人知其將光顯也光顯者之心于山水或薄其異日肯尚從吾遊于此乎其豈使吾獨也乎六年八月日序王無咎字序名字者人之所假借以自稱道亦使人假借以稱道已之辭也非若行然不可以假借云也何也問其名曰忠與義其字亦然則人無有求其信然者責其不然者知其假借云也問其行曰忠與義則人皆求其信然者責其不然者其可以假借云乎然而人無貴賤愚良一𣣔善其名字夫𣣔善其名字者非他亦曰愛其身而已愛其身而不善充之猶曰姑以聖賢之道假借其身而已不誠乎身莫大焉豈愛其身也不若于名冥乎勿求勝焉于行乎汲汲爾以愛其身是以聖賢之道歸諸其身也以為愛其身非至夫然而人一皆善其名字未嘗一皆善其行有愛其身之心而于其身反爾其薄也可嗟也已南城王無咎來請字余思夫字雖不必求勝也然古之人重冠于冠重字字則亦未可忽也今冠禮廢字亦非其時古禮之不行甚矣無咎之請也雖非時之當然庶幾存其禮豫欲拒安得而拒也取昜所謂無咎者善輔過者也為之字曰輔之夫勉焉而輔其所不至顔子之所以為學者也輔之明經術為古文辭其材卓然可畏也以顔子之所以為學者期乎已余之所望于輔之也假借乎已而已矣豈豫之所望于輔之哉送蔡元振序古之州從事皆自辟士士亦擇所從故賓主相得也如不得其志去之可也今之州從事皆命于朝非惟守不得擇士士亦不得擇所從賔主豈盡相得哉如不得其志未可以輒去也故守之治從事無為可也守之不治從事舉其政亦勢然也議者不原其勢以為州之政當一出于守從事舉其政則為立異為侵官噫從事可否其州事職也不惟其同守之同則舍已之是而求與之同可乎不可也州為不治矣守不自任其責已亦莫之任也可乎不可也則舉其政其孰為立異邪其孰為侵官邪議者未之思也雖然迹其所以然豈士之所喜然哉故曰亦勢然也今四方之從事惟其守之同者多矣幸而材從事視其政之缺不過室于嘆途于議而已脫然莫以為已事反是為則激激亦奚以為也求能自任其責者少矣為從事乃爾為公卿大夫士于朝不爾者其幾邪臨川蔡君從事于汀始試其為政也汀誠為州治也蔡君可拱而坐也誠未治也人皆觀君也無激也無同也惟其義而已矣蔡君之任也其異日官于朝一于是而巳矣亦蔡君之任也可不茂歟其行也來求吾文故序而送之送丁琰序守令之于民近且重易知矣豫嘗論今之守令有道而聞四方者不過數人此數人者非特任守令也過此數人有千里者相接而無一賢守有百里者相環而無一賢令至天子大臣嘗患其然則任奉法之吏嚴刺察之科以繩治之諸郡守縣令以罪不任職或黜或罷者相繼于外于是下詔書擇廷臣使各學所知以任守令是天子大臣愛國與民而重守令之意可謂無不至矣而詔雖不舉者卒不聞惟令或以舊制舉不偕循歲月而授每舉者有姓名得而視之推考其材行能堪其舉者卒亦未見焉舉者既然矣則以豫之所見聞隂計其人之孰可舉者卒亦未見焉猶恐豫之愚且賤聞舉見焉者少不足以知天下之材也則求夫賢而有名位聞與見之博者而從之問其人之孰可舉者卒亦未見焉豈天下之人固可誣而天固不生才于今哉使天子大臣患天下之弊則數更法以禦之法日以愈密而弊日以愈多豈今之去古也逺治天下卒無術哉蓋古人之有庠有序有師友之遊有有司之論而賞罰之始于鄉屬于天下為教之詳至此也士也有聖人之道則皆得行其教有可教之質則皆可為材且良故古之賢也多賢之多則自公卿大夫至于牛羊倉廪賤官之選咸宜焉獨千里百里之長哉其為道豈不約且明其為致天下之材豈不多哉其豈有勞于求而不得人密于法而不勝其弊若今之患哉今也庠序師友賞罰之法非古也士也有聖人之道𣣔推而教于鄉于天下則無路焉人愚也則愚矣可教而賢者卒誰教之哉故今之賢也少賢之少則自公卿大夫至于牛羊倉􅮇賤官之選常不足其人焉獨守令哉是以其求之無不至其法日以愈密而不足以為治者其原皆此之出也巳噫奚重而不更也姑蘇人丁君琰佐南城南城之政平子知其令令曰丁君之佐我又知其邑人邑人無不樂道之者豫既患今之士而常慕古之人每觀良吏一傳則反覆愛之如丁君之信于其邑豫于旁近邑之所未見故愛之特深今為令于淮隂上之人知其材而舉用之也于令也得人矣使丁君一推是心以往信于此有不信于彼哉求豫文者多矣拒而莫之與也獨丁君之行也不求豫文而豫樂道其所常論者以送之以示重丁君且勉之且勉天下之凡為吏者也謝司理寺序君子之于德澤誼行大有為者也于為之也有明而易知者有不示其用者若乃數度號令因造損益淳雜出入則所謂明而易知者使人靡靡然化之不絶於動作趣舍之際耳無深關復鍵穹鏞奧屋為之掩覆也泊然莫能知其所以發而至者則所謂不示其用者也易曰知微知章章顯之微不顯之謂也又曰幾事不密則害成退藏于密者皆不顯之謂也陳郡謝君名續續密也而取字乃本諸此而字曰通微以謝君之材其嚮道也苟為無畫無不至者也可以有為者也能見其事業者也能不表其迹者也亦在㮊之而巳元豐類藁卷之十四
