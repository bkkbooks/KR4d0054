front:
  text: 元豊類藁卷之四十五
  hash: sha256:03832fdb23d9f465a1ef6bf8b79371f1651669e96a2aa2767721c83321f434dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_045-1a}
body:
  text: 誌銘金華縣君曽氏墓誌銘夫人嫁王氏為侍御史諱平妻姓曽氏泉州晉江人祖諱穆殿中丞追封魏國公考諱㑹尚書刑部郎中集賢殿脩撰追封楚國公皆累贈太師中書令兼尚書令妣黄氏楚國太夫人未嫁承順父毋盡子道既嫁夫家貧飬姑盡婦道輔其夫盡妻道夫死寓食扵頴以勤儉積日大其家以誘教不倦成其子又可謂盡毋道也盖其子五人回向固同冏皆有學行回有道為儒宗向冏尤有文三人皆身在隱約而聲震天下扵是時夫人兄魯公公亮實爲宰相當國然夫人處里舍彌約未嘗以爲泰及其後回向同冏皆蚤世人以爲難處夫人䏻自廣以理未嘗亂其志教飬其孫至男有立女有歸熈寕之間魯公告老以太傅侍中就第夫人少魯公一歲食其子禄皆居京師二人白首相頋怡然元豊元年春魯公薨四月丁卯夫人亦以疾終春秋七十有九夫人以夫恩封金華縣君以魯公㤙賜冠帔子回忠武軍莭度推官知陳州南頻縣事向峽州硖石縣主簿固大名府軍廵判官國子監主簿同陳州宛丘縣令冏蔡州新蔡縣主簿女嫁太子右賛善大夫陳臻古孫五人泌汾汶沂澺汾郊社齋郎汶試将作監主簿夫人既卒之明年某月某甲子葬頴之汝隂縣懐音郷南高村附御史之兆其将葬也固以狀耒乞銘惟夫人為子若婦若為妻毋皆盡其道扵囏阨流寄之中能立其家成就其子所以自䖏扵通塞之際者無不當扵理是其智術徳性過人逺甚宜得銘且余實與其子逰最舊乃不辭而為銘曰曽禹之苗氏自鄫子或言厥志有稱闕里或以孝顯扵經實紀或守所聞羞踐覇軌遥遥千載歴世有聞自荆祖粤篤生夫人楚公之子魏公之孫魯公維伯御史是嬪廼立厥家自墜而興廼教厥子自㓜而成卷服貂冠伯也在廷子也在幽碩實洪聲莫親巳宗莫重夫氏兩有其盛卋誰與婉維䏻既試維徳寔孚尚寵爾從列銘隂墟夀安縣君錢氏墓誌銘劉凝之仕既齟齬退䖏廬山之陽𥘉無一畆之宅一㕓之田而凝之囂囂然樂若有餘者豈獨凝之能以義自勝哉亦其妻䏻安扵理不戚戚扵貧賤有以相之也凝之晚有宅扵彭蠡之上有田扵西澗之濵子進扵朝廷薦扵郷閭凝之夫婦康寕夀考自肆扵山川之間白髪蟠然躰不知駕乗之勞心不知機擭之畏世人之所慕者無慊焉聖人之有所不䏻及者獨得也其夫婦如此可不謂賢㦲熈寕九年凝之年七十有七哭其妻之䘮自為状次其妻之丗出行事来乞銘予為之因其言而識之曰夫人姓錢氏考内殿崇班穆祖考内園使昭晟曽祖考宣徳軍莭度使同中書門平平章事湛高祖士越文穆王元瓘夫人色荘氣仁言動不失䋲墨居族人長㓜親踈間盡其宜事夫䏻成其忠教子䏻成其孝是皆可傳者也夫人年七十有三卒扵四月之庚子而葬於其歲某月某甲子墓在南康軍西城之某原𥘉以凝之恩封夀光縣君再以子恕㤙封夀安縣君有子曰恕祕書屯曰格郷貢進士皆以文學顯扵世女嫁進士徐彦伯又子中允黄㢘孫某某凝之名渙筠州某人今為尚書屯田員外郎致仕銘曰士不苟合安扵賤貧其難其豫繇嫓有人維不終窶又夀以康有續孔辰既庻而臧女迫而求獨優以取世一以處獨肆而有士也則然女實作十考則錢嫒尚配于古天長縣君黄氏墓誌銘夫人姓黄氏福州福清縣人祖諱某考諱倫皆仕閩越夫人嫁同縣林氏為殿中丞諱某之䖏婦尚書屯田員外郎諱某之妻有子曰槩為太常愽士集賢校理有孫八人曰希宣州涇縣主簿編校集賢院書籍曰旦明州象山縣令曰邵杭州南新縣令曰顔許州臨川縣令曰稽曰雄未仕也其二人早卒有曽孫士有二人曰睿慮虞虡䖍膚據處其三人亦早字夫人年七十有七治平四年正月癸丑卒扵京師之昭化坊累封嘉興天長二縣君始殿中府君與其配福清縣太君鄭氏皆春秌高安其郷里不肯出屯田府君乃從事漳州泉州興化軍踰二十年終飬而後去夫人能盡其力治飲食衣服以進及䘮能盡其哀皆如其夫之志其子既就學夫人常夜治絲枲居其旁以勉之至其後其子遂以文學名天下既而其子不克夀屯田府君亦卒于官諸孫皆㓜夫人巳老矣乃栖吾郡斥賣替珥以經理其家絲蓄粒聚至有田以食有宅以君平㞐日夜課諸孫以斈有不中程輙朴之及長遂多知名連以進士中其科泾縣復校書集賢丗其父􅕄夫人乃頋諸孫謂曰吾始得事祖姑今得弄曽孫遂保有汝家起于既墜吾老且夗不恨矣泾縣既服夫人之䘮以其柩㱕吴郡寳華山某年某月某日附屯田府君之兆而属余銘銘曰女職在宫行止于柔扶㣲捄阨則匪我謀势有孔棘義不得寕任重于巳振壊為興我儲我積乃續烝嘗我字我飾乃襲印章蒼顛秀眉燕其作止其燕伊何維終受祉菒仁且智疇濟登兹播告無極視此銘辭仁夀縣太君吳氏墓誌銘仁夀縣太君撫州金谿吳氏尚書都官貟外郎贈尚書刑部侍郎撫州臨川王公諱益之夫人衛尉寺丞諱用之之婦年六十有大嘉祐八年八月辛巳卒于京師十月乙酉葬于江寜府之蔣山夫人好學強記老而不倦其取舍是非有人所不䏻及者然好問自下扵事未嘗有所專也其平生飬舅姑甚孝盖侍郎七子而少子五人吳氏出也然夫人之爱其長子甚扵少子曰吾爱之甚扵吾子然後家人爱之䏻不異扵吾子也故其子孫巳壮大有不知為異母者居乆之二長子前死夫人巳老矣每遇其嫠婦異甚而身為字其孤兒忘其力之憊也其處内外親踈之際一主扵㤙有讒訕踞罵巳者数困苦常置之不以動聲色亦未嘗有所含怒扵後也有以窮㱕巳者急或分衣食不為秋毫計惜以其故至不能自給然亦未嘗不自若也其嫁三從之孤女如巳女而待長子之母族如巳族盖䔍行如此而天性之所有也其自奉飬未嘗擇衣食其視世俗之好無足累心者方其隱約窮匱之時朝廷嘗選用其子堅譲至扵数十或謂可強起之夫人曰此非吾所以教子也卒不強之及䖏顯矣其子嘗有㱕志而以不足於飬為憂夫人曰吾豈不安扵命㦲安扵命者非有待於外也其子為知制誥故事其母得封郡太君夫人不許言故卒不及封此夫人之徳見扵行事之迹而余以通家故熟扵耳目者也夫人之考諱畋畋之配黄氏兩人者皆有善行郷里称之而黄氏兼喜隂陽数術學故夫人亦通扵其說七者曰安仁安道安石安國安世安礼安上安仁宣州司户參軍安石尚書工部郎中知制誥安世太平州當塗縣主簿安禮大名府莘縣主簿餘未仕也女三人長適尚書虞部員外郎沙縣張奎次適前衢州西安縣令天長朱明之次適楊州沈季長孫男九人曰雱旉旁瓬􅣆防斿旂放孫女九人長適觧州安邑縣主簿徐公翊次許嫁太廟齋郎吳安持餘尚㓜銘曰嗟若人兮洵好善兮始終一徳仁七子兮遺棄細故䔍九族兮說珥推食光惠施兮以義易利能無累兮縦心委命志彌邵兮謂宜百歲奄忽逝兮風有采蘋經所首兮原念美實輯此辭兮庻㡬徳音與古對兮夀昌縣太君許氏墓誌銘夫人許氏蘇州吳縣人考仲容太子洗馬兄洞名䏻文見國史夫人讀書知大意其兄所為文輙能成誦父毋衣食服御待之而後安既嫁惇行孝謹宜于其家其夫為吏有名稱夫人實相之及春秋高扵内外属為高曽行而慈㓜字微愈乆彌䔍故親踈懐附無有惡斁昔先王之治必本之家逹扵天下而女子言動有史以昭勸戒後世以古為迂為政者治吏事而巳女子之善既非世教所奨成其事實亦罕發聞扵後其苟如此其衰㣲所以益甚則夫人之事其可使無傳也㦲夫人嫁沈氏其夫諱周太常少卿贈尚書刑部侍郎其舅諱某贈兵部尚書杭州錢塘人夫人封六安縣君夀昌縣太君年八十有三熈寜元年八月丁巳卒扵京師三年八月某甲子合葬杭州銘塘縣龍車原子曰披國子愽士有吏材曰括楊州司理參軍舘閣校勘有文學其㓜皆夫人所自教也女二人蚤卒銘曰生民之治必本于身教行于家餘以為人世弊俗偷恕于在巳内替常度外彊于理淑惟夀昌斈與心成䔍于孝慈匪勸而能有翼于夫有迪于子尚類古人其傳以此徳清縣君周氏墓誌銘夫人姓周氏湖州長興人曽大父諱某大父諱某父諱某嫁同縣陳氏為秘書省著作佐郎諱某之妻為人柔嫕静荘在父母家至㱕于夫氏本扵自脩而卒扵能孚于属人陳氏有似婦寡居當家事夫人常曲意下之扵事常退避不敢與似婦以其故頋夫人甚􅌚而親踈觀者莫不恱著作有田数千畆而爱士好施夫人常悉力助之以其故至不能自給而夫人處之自若遇子之非已出者與巳子無毫髪厚薄意人以為過人而夫人若有所不及也享年三十有五封徳清縣君子曰樞為尚書屯田呉外郎曰楷曰權未仕也卒扵慶暦五年之二月辛丑葬扵熈寕三年之三月庚申其墓在長興縣永昌郷卞山之陽銘曰嗟淑人体明徳外惟均内自克不永年隕嬪則兆親宫蔵石刻夫人周氏墓誌銘夫人諱琬字東玉姓周氏父兄皆舉明經夫人獨喜圖史好為文章日夜不倦如學士大夫徔其舅邢起學為詩既嫁無舅姑順夫慈子嚴饋礼諧属人行其素學皆應儀矩有詩七百篇其文静而正柔而不屈約扵言而謹扵禮者也昔先王之敎非獨行扵士夫夫也盖亦有婦教焉故女子必有師傳言動必以禮飬其徳必以樂歌其行勸其志與夫使之可以託㣲而見意必以詩此非學不能故教成扵内外而其俗易美其治易洽也兹道廢若夫人之學出扵天性而言行不失法度是可賢也已其夫来乞銘予與之親且舊故為之序而銘之盖夫人之王父諱恊為尚書刑部郎中父約今為尚書虞部員外郎青州益都人也夫人嫁関氏為徐州豊縣令景仁之妻為尚書職方員外郎贈尚書都官郎中諱魯之子婦生一男二女年二十有六卒扵治平二年之九月某甲子葬扵杭州錢塘縣履㤗郷葛松原實某年某月某甲子関氏錢塘人也銘曰女有圖史傳于師氏其勸以樂其康以禮䏻此非他繇學而巳王政之興盖自此始今孰登兹維周之媛學繇自好終之不倦言循于矩行循于典尚配古人輝光日逺永安縣君謝氏墓誌銘宋故衛尉寺丞王公諱用之之夫人尚書都官員外郎贈尚書工部郎中諱益之毋妵謝氏累封永安縣君其卒皇祐五年之六月十四日其葬扵撫州金谿縣某郷某原既卒之百有五十一日也其子曰益曰某皆巳卒曰某曰某曰孟楚州司理參軍亦巳卒其孫曰安仁宣州司戸參軍曰安道皆已卒曰安石殿中丞通判舒州曰沆荆南府建寜縣令曰安囯曰安禮其曽孫曰某曰某曰某其墓工部故人之子曽鞏誌之曰王氏由工部之叔父尚書主客郎中贈太常少卿諱觀之始起家為䏻吏遂追榮其父諱某為尚書職方員外郎至于工部父子遂皆進于朝為聞人其世浸大夫人及拜其舅與夫之榮其享其子與孫之禄其夀至于九十其卒扵撫州之臨川安扵其寝余既與夫人之諸孫逰而嘗得拜於堂上見其色和其容謹聞其言儉而勤退而聞其爲婦順爲母慈知其所以享其福禄者其宜也已余觀詩人之歌其后妃至于諸侯大夫之妻内脩法度輔佐其夫而其効之見則兎罝之人至于江漢汝墳之婦女皆氶其化而䔍扵禮余固歎其當是之時上下之間内外相飾何其至也如夫人之資而使出扵其時則必有歌扵風而𬒳之于無窮之事若余之鄙其亦曷䏻知其所至也哉謝氏之祖曰某考曰某銘曰士顯其施其行易知女處于私其有孰窺嚴嚴秀目不見缺虧曷以長之眎此銘辭永安縣君李氏墓誌銘夫人姓李氏其先燕人而今家許州之長葛贈太子太傅諱譚之曽孫贈禮部尚書諱運之孫贈刑部尚書諱昌言之女而毋晋平縣君聶氏也夫人嫁駱氏駱氏亦家許州之長葛其夫諱與京為某官檢校某官知某州享年七十有九封永安縣君有子男四人長吉逢吉元吉皆三班奉職早卒嘉福今為右班殿直女三人亦早卒夫人以嘉祐八年十一月丙辰卒于其家之正寢而以熈寕二年十月葬扵許州長社之舞鵉郷白兎里祔駱侯之瑩夫人仁孝慈恕言動必擇義理事父毋不違其教事舅姑不違其志事夫順而有以相其善遇子至于内外属人一以恩而不違扵禮𥘉刑部之兄昌齡當太宗真宗時輔朝政李氏族大而貴然刑部嫁女常擇寒士而至其後多為名臣范文正公仲淹鄭文肅公戬與駱侯是也夫人之弟光禄少卿禹卿余妻父也實葬夫人故属余銘銘曰性有能否行有失得一當扵理士有不克淑哉夫人秉是壷彛周旋大小無過無虧貴不稱徳夀則謂遐維蔵在許永𥙿厥家試秘書省校書郎李君墓誌銘君諱迂字明逺姓李氏為人孝友慈怒讀書務大㫖生五代之際再試明經不合退居楚丘有田百餘頃皆推與其族人獨留五頃而巳曰無令子孫以財自累也宋𥘉秘書監彭君薦其行義詔以為試祕書省校書郎而君終不肯強起淳化三年壬辰九月二十一日以疾卒于家享年八十有四維李氏逺出扵臯陶而其後李耳之孫曇為秦司徒曇子璣璣子牧事趙始家趙郡牧子汨汨子左車扵趙號廣武君廣武君子遐涿郡太守遐子岳諌議大夫岳子秉頴川太守又徙家頴川秉七卋子膺河南尹膺子瑾復家趙瑾曽孫楷晉治書侍御史有子五人曰輯晃芬勁叡以所居巷東西自别故勁稱西祖勁子隆後魏阜城令隆後九卋捿筠唐御史大夫賛皇文献公文献公子吉甫相憲宗吉甫子徳脩楚州刺史徳𥙿相文宗武宗楚州子煴宋州宋城令君曽祖也又徙家宋之楚丘故今爲楚丘人宋城子確菜州膠水令君祖也膠水子譚磁州邯鄲令君考也邯郸之少子運爲太常少卿有子曰昌齡太宗真宗時爲尚書户部侍郎參知政事故膠水贈太子少保邯郸贈太子少傅君娶丁氏王氏王氏有子曰昌震爲建州松溪令贈尚書駕部郎中駕部有子曰漢卿今爲諸王府侍講尚書虞部員外郎虞部有子曰彦龍彦龍復有子四人矣君卒後七十四年治平三年丙午四月某甲子虞部葬君扵開封府開封縣保安卿永寜里之原以王夫人從銘曰不累扵物全吾質兮不覊扵世遂吾志兮作宅新原維孝孫兮納銘幽扄永淑聲兮試秘書省校書郎李君妻太原王氏墓誌銘夫人姓王氏太原人嫁趙郡李氏為磁州邯郸令贈太子少傅諱譚之冡婦試秘書省校書郎諱迂之妻為人明識強記博覧圖籍子孫受學皆自為先生其行仁孝慈恕始扵為女中扵為婦終扵為毋無不盡其道享年八十大中祥符三年庚戌十二月己巳卒扵􅉑州盧氏縣其子之官舎子曰昌震建州松溪令贈尚書駕部郎中駕部子曰漢卿令為諸王府侍講尚書虞部員外郎虞部嘗為李氏九卋譜其博而許多夫人之所為言也治平三年丙午四月丁酉虞部以夫人之䘮校書君葬扵開封府開封縣保安郷永寕里之原銘曰嗚呼夫人既有其質又賜爾力古有遺辤罔不采獲克踐以躬亦卑爾息維瘞有銘尚以載徳池州貴池縣主簿沈君夫人元氏墓誌銘夫人姓元氏錢塘人祖諱徳昭事吴越國王錢氏宋興贈太保考諱好文尚書比部員外郎贈某官嫁吳興沈氏其舅為尚書屯田郎中諱某一作王其夫為池州貴池縣主簿諱播夫人在父母家内外上下親踈長㓜皆宜之年十有七而嫁既嫁如在父母家時貴池君早卋無兄弟大夫人春秋高諸子尚㓜夫人年三十餘扵覉旅單獨之中闔門事姑䏻盡其孝教飬諸子至其後皆為成材能世其先人方其憂戚囏阨之時人恐其不能堪夫人旣奮厲經理以保有其家又退能自安不亂其志是人之所難而其後丗之不可以無述者也夫人年七十以治平二年某月某日卒卒之若干日葬真州楊子縣甘泉郷三城里北山之原子男四人皆進士曰伯荘未仕曰季長越州司法參軍曰叔通祕書省著作佐郎曰次通試将作監主簿貴池君扵先人為同年友而諸子又與余遊故為銘銘曰元出扵危於東得姓有保有郎重世之盛允淑夫人集享家慶来嬪沈宗作徳維令䖏平不盈在險能正姑曰㣲婦余老誰據子曰㣲毋余㓜誰怙自振單弱卒持艱急老肆而安㓜強以立實保沈宗自替而昌有烈如此何愧丞嘗後世原美孰可無述刻辤幽宫庻㡬不没雙君夫人邢氏墓誌銘夫人邢氏無為軍巢人也嫁為贈大理寺丞姓雙氏諱華之妻封萬年縣太君子男三人曰漸為尚書屯田員外郎通判吉州軍州事餘未名皆早天夫人年八十有六嘉祐四年九月二十七日卒為宣州之官舍六年十二月二十七日葬于無為軍巢縣無為郷惲良里之原方大理府君之在隱約屯田始就書學夫人能經理其家使無内憂以卒就其志及屯田有列扵朝夫人食其禄飬就封大縣實受成報天之施與善人豈非信㢤夫人之在疾也屯田之配長夀縣君陳氏共飬营救有過人之行州上其事天子聞而嘉之勑州使致粟帛賜其家扵是人知夫人之善不獨䏻成其子又能化其家也銘曰允淑夫人秉是壷彛有韡車服維寵嘉之葬有卜壞其吉在斯推求美實眎此銘辭旌徳縣太君薛氏墓誌銘夫人姓薛氏累封旌徳縣太君為故太子右清道率府副率致仕贈右監門衞将軍姓段氏諱某之妻今提點江南東路刑獄公事礼賔副使名某之毋某州某縣人也大父諱某當呉越錢忠懿王時娶王女爲主國官父諱某祥符𥘉爲東頭供奉官供奉常将屯宫門而監門之父右班殿直諱某者屯三陽二人者以意氣喜相得也遂以夫人歸段氏夫人性柔淑䏻和其属人自珮服􅌨珥凡資巳者常出於儉而有餘好施雖盡費不以爲侈也生男一人禮賔也女二人長適開封黄思問次適呉郡潘孝孫皆進士夫人年四十有三大中祥符七年五月某甲子以疾卒扵京師之敦教坊某年某月某甲子祔其夫人柩葬於某州之某縣某郷某所之原前葬礼賔称夫人之行與其世序封號之詳託銘扵南豊曽鞏爲述而銘之曰約平巳原乎人發其積在子孫韡兮翟列封君硈兮石瑑銘文永興尉章佑妻夫人張氏墓誌銘夫人姓張氏建安人父諱士龍舉進士嫁同郡章氏為永興尉佑之妻所出三男四女曰造适𫐠皆舉進士造及第為清海軍莭度掌書記女嫁俞瑾徐立之陳震亦皆舉進士其一蚤死𥘉永興府君起家二十年止扵為尉及死三男尚㓜造既起又蚤死巳而适亦死夫人維能忘其貧所以使其夫能屈扵小官而說維䏻務其生所以使其子能安扵㓜斈而成維能順其性所以居流離顛頓之間而不為悲哀愁憂乱其志也其為人卑極扵順其為人尊極扵慈推於其䟽宗逺属之間極扵爱男之有不䏻葬者為葬之女之有不能嫁者為嫁之忘其力之匱而為之也此皆古今學士儒者所難而女子之善能如此此非可銘者欤嘉祐二年十一月三十日卒扵洪州之私第即以其年十二月十八日葬于洪州某州之某郷其原銘曰彼以吾窮我以吾仁二者皆天吾樂而因壽止七十豈不得年維其有之愈逺弥傳福昌縣君傅氏墓誌銘福昌縣君姓傅氏㑹稽人尚書職方員外郎霖之女同郡尚書職方員外郎関公魯之妻後関公五年至和三年二月丙申卒于家年六十有四子男八人景棻景元景仁希聲祀景山景宣景良女一人景華嫁著作佐郎史叔軻福昌君在家爲父母圻噐異既嫁而夫属無退言布衣悪食身治細㣲故関公之禄及其䟽昆弟姊妹之孤其事関公正以從其教子慈以肅関公起進士爲郎爲池台兩州年八十以歸日吾少得盡力于官而老得自休于家不以家事累吾志者以有夫人也八子學行脩立景芬希聲杞同時皆中進士夫人之卒景芬爲江隂尉希聲寳應尉𣏌和州判官景元亦以父㤙爲廣徳尉皆䏻其官景仁而下皆有聞扵人實受教扵夫人也始開公既貧而孤其仕與婚又皆後至其終有百口爲大家福昌君維厚勤薄飬所以經理其微維可否以明行止以公善訓能使誠恕爱人所以使其家有莭法以有其成也某月甲子從葬錢塘之某源其子来属以銘景宣予妹婿也宜為銘其辤曰関氏爰昔始如萌芽台州奮抜垂實敷華進勤退佚不䘏其家繇嫓有人作其内治孰致其休不懈于勩孰致其隆不蕳于細髙明純約坦坦其夷無恕無疵小大化之有容有則婦子順之公為朝老子宦以成象衣華軼我止我行巍冠文笏我翼我承公曰微子誰據誰依子白微毋莫濟登兹云誰無母其孰無妻為妻為母如我誰亢生雖有止存也其長鴻鴻號声垂此銘章沈氏夫人墓誌銘夫人姓沈氏其先家于越之㑹稽曽祖仁諒令海州之朐山徙家于和州歴陽故今為歴陽人祖平贈尚書刑部侍郎父立今為右諌議大夫判都水監母馮氏濮陽縣君董氏仁壽郡君夫人年二十有二嫁楊州進士朱延之有子三人寅萬廣女五人尚􅏊夫人年四十有五卒扵熈寕元年十一月之庚辰葬扵某年某月之某甲子其墓在楊州天長之秦蘭里夫人為人柔閏静専事父毋盡子道事姑長興縣太君賈氏盡婦道事夫盡妻道為母及與内外属人接一皆盡其道故其䖏也愛扵其家其嫁也夫之属人上下逺近皆愛之而其殁也哭之者皆哀是不宜無銘而朱君余舅也属余銘銘曰媛維沈女經徳以身柔嫕静簡一作問孚于属人維祉在後有子詵詵瑑詩告羙愈逺彌新夀安縣太君張氏墓誌銘夫人姓張氏濟州鉅野人嫁為同郡尚書駕部員外郎贈開府儀同三司吏部尚書晁公諱遘之夫人而為贈太傅諱佺之子婦有子男四人曰宗曜進士曰宗恪光禄少卿曰宗愿真州軍事推官曰宗懿尚書司門員外郎女一人嫁進士桑况夫人𥘉封清河縣君累封清河夀安縣太君年八十有七卒扵熈寕二年之十一月某甲子葬扵某年之某月某甲子其墓在開封府祥符縣旌孝郷合儀同之兆卒時子宗曜宗愿皆已死既而光禄居䘮以疾亦死而諸孫男女凡三十人男多以仕女多已嫁矣夫人為人仁厚荘静自為女及既嫁處内外親尊卑長㓜祭無不當扵禮而㤙稱之其長者皆以為善事我而平居為䓁夷及少者莫不願以為㱕也雖老未嘗懈而雖疾未嘗有堕容維其𥘉終受飬收封旣夀而康實俻成福可謂盛矣余之亡妻扵夫人之孫女為第三而光禄之長女也知夫人之行為尤詳故為之銘曰女婉張氏䖏躬以厚來嬪眺宗太傅維舅儀同維夫卿士維子有孫詵詵亦紹厥美累封備飬維康以夀徳則既成福亦多有納詩新蔵尚告爾後元豊類藁卷之四十五
