  - {type: variant, offset: 2178, length: 0, content: '', WYG: 禮閣新儀三十篇韋公肅撰記開元以後至元和之變禮史館秘閣及臣書皆三十篇集賢院書二十篇以㕘相校讐史館秘閣及臣書多複重其篇少者八集賢院書獨具然臣書有目録一篇以考其次序盖此書本三十篇則集賢院書雖具然其篇次亦亂既正其脫謬因定著從目録而禮閣新儀三十篇復完夫禮者其本在於養人之性而其用在於言動視聽之間使人之言動視聽一於禮則安有放其邪心而窮於外物哉不放其邪心不窮於外物則禍亂可息而財用可充其立意微其為法逺矣故設其器制其物為其數立其文以待其有事者皆人之起居出入吉凶哀樂之具所謂其用在乎言}
