  - {type: variant, offset: 124, length: 462, content: 命扵是更置百官舊舎人無在者巳試即入院方除目填委占𥿄肆書𥘉若不經意午漏盡授草院吏上馬去凡除郎御史數十人所以本法意原職守而爲之訓敕者人人不同咸有新趣而衍𥙿雅重自成一家始予而為尚書郎掌付制吏部一日得盡觀始知先生之學雖老不衰而大手筆自有人也嗚呼先生用未極其學巳矣要之名與天壤相弊不可誣也王三槐序重刋南豐文集序畢南豐先生年譜序丹陽朱熹曰予讀曽氏書未嘗不掩卷廢書而嘆何卋之知公淺也盖公之攵高矣自孟韓子以来作者之盛未有至扵斯夫其所以重扵世者豈苟而云㢤然卋或徒以是知之故知之淺也知之淺則扵公之事論之猶不能無所牴牾而况扵公之所以為書者宜其未有知之也然則世之自以知公者非淺而望與其可嘆也巳公書或頗有歲月參以史氏記及他書舊聞次之著于篇年譜序畢南豐先生年譜後序丹陽朱熹曰世有著書稱公文章者予謂庻㡬知公求而讀之湫然卑鄙知公者不爲是言也然則世之自以知公者何如哉豈非徒以其名歟予之說於是信矣其說又以謂公爲史官薦邢恕陳無巳爲英録檢討而二子者受學焉綜其實不然盖熈寜𥘉詔開實録院論次英宗時事以公與檢討一月免豈公於是時而能有以薦士或其不然一也恕治平四年始登進士第, WYG: ''}
