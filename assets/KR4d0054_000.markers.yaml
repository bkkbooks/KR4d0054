  - {type: variant, offset: 695, length: 703, content: 事而不然者三則公所以教恕者其在元豐史舘之時乎未可知也此予所謂牴牾者斯人為世所重又自以知公故予不得不考其實而辨其不然者其書世或頗有以故不論著其是非者焉南豐先生年譜後序畢南豊類藁目錄卷之一古詩冬望一鶚宿尊勝院苦雨里社南源荘論交南軒兵間種園歎嗟寄孫之翰豪傑侯􅍮黃金楊顔橙子山檻小飲胡使上翁嶺雜詩四首𣣔求天下友冬暮感懐寄舎弟至荷湖二首詠雪送徐竑著作知康州寫懐二首茅亭閑坐靖安幽谷亭青雲亭閑㘴卷之二古詩寄子進弟喜寒詠史二首江湖遂書懐别詠雪荅裴煜二首寄王介卿上人𥘉夏有感之南豊道士寄介甫送人移知賀州謝章伯益惠硯送劉醫愽送陳啇學士雪詠送僧暁容送叔延判官山茶花丁亥三月十五日舎弟南源刈稻奉和滁州九詠九首并序瑯瑘泉石篆逰瑯瑘山㱕雲洞瑯瑘溪班春亭庻子亭石屏路慧覺方丈幽谷晚飲卷之三古詩逰麻姑山桃花源丹霞洞半山亭顔碑碧蓮池流杯池七星彩瀑布泉秋懐送歐陽員外㱕覲滁州舎人一晝千萬思送鄭秀才荅所勸炙菊花荅石秀才月下冬暁書懐東津㱕催呉秀才寄酒送呉秀才和章友直城東春日簡如晦伯益高松青青間青青洪州詠史二首泝河尹師魯北風發松門寄介甫過彭澤江上懐介甫讀五代史庭木發彭澤菊花落葉舞鶴卷之四古詩降龍湘冠地動邉捋多雨秋日山水屏八月二十九日小飲食棃追租桐樹九月九日路中對月聴鵲寄家人讀書雜詩五首戯呈休文屯田與舎弟别舟岸間相望感嘆成詠送宣州社都官東軒小飲呈坐中麻姑山送南城尉羅君明妃曲二首喜二第侍親将至七月一日休假作秋夜李氏素風堂秋聲七月十四日韓持國直廬同觀山海經戯書李莭推亭子秋夜露坐偶作韓玉汝使㱕苦熱過介甫過介甫㱕偶成合醬作送章㜈州瞿祕枝新授官還南豊卷之五古詩送程公闢使江西遊金山寺作荅葛藴南湖行二首種牲丹西湖二月二十日北湖百花隄芙蓉亭秋懷二首送李, WYG: 宋曾鞏}
