  - {type: variant, offset: 7116, length: 487, content: 契丹契丹既勝晋歴漢周為中國之患宋興太祖明經綸之體専擇用将帥以折衝一方之難自山西關南所属任皆天下之材委材専而聴㫁明豪傑之士得盡其智力以赴功故飬士少而形勢強當此之時彊境㤗然無北顧之憂間有窺塞之謀虜騎六萬太祖命田欽祚以三千人破之當世以為諺虜既屈服扵是叩關請吏修書幣之使天子見群臣謙譲不自以為徳也其後向之宿将稍死而天子伐晉晉虜連兵既破虜而平昔遂用事扵燕不克而還自此虜復爲中國之患雍熈中曹彬以十萬之衆不䏻舉燕而退有祁溝之敗既而揚業敗扵陳家谷劉廷譲扵君子舘又敗士多失亡乗塞瘡痍之兵至不滿萬趙魏大震虜遂深入䧟郡縣殺官吏執士民将吏依壁自固虜輙掠坰野收子女之俘掊金帛之積而去自鄴而北千里簫然天子下哀痛之詔而邊吏屡請益兵始科河内之民以戍邊不足則又科河南之民猶不足則取役兵爲振武之軍以自助然猶不能以爲足也咸平之間命傳潜爲大将虜既入塞塞上皆飛檄請救潜按兵不出将卒人人𣣔戦不許天子屡使人督戦又為益發兵使進而濳終不敢出虜乗其隙也連破州邑遂越魏犯澶百姓騷然天子為我衣濟河而虜之謀臣射死兵遂觧去楊延以為乗其敝痛殺幽冀可收天子抑其言而講和之䇿遂㝎焉自此邊境去矢石之憂天下無事百姓和樂至今餘四十年先帝之功徳博矣, WYG: ''}
