front:
  text: 元豐類藁卷之八
  hash: sha256:45fd30f398fc5624f7e3b2733174a9d54b0f2adf2ea18adeb37c1371d4c1eced
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_008-1a}
body:
  text: 律詩高郵逢人約襄道之陽一川風月高郵夜玉塵清談畫鷁舟未把迂踈笑山簡更須同上習池遊彭城道中百步洪聲潦退𥘉白沙新岸湊舟車一時屠釣英雄盡千載河山戰伐餘楚漢舊歌流俚耳韓彭遺璧冠荒墟可憐馬上縱橫略只在邳橋一卷書送程殿丞還朝如雲青髮擁朝簮佳譽喧喧動士林自重肯悲三獻玉不欺常慎四知金芝蘭秀出清門盛鴻鷺翻飛紫殿深别後齋中挂塵榻更將梁甫向誰吟送高祕丞簿書擁處精神健風俗澆時質性淳公退種花常滿縣政成春雉不驚人指麾細柳通河外歌詠甘棠付漢濵惆悵不能留自助謾將樽酒駐車輪康定軍使高祕丞自襄陽司農寺勾業寺丞自光化相繼遷拜簽判程殿丞受代還朝預有惜别之意輒書長句奉呈千里分符漢上城為僚方喜得時英已無楚澤行吟意更有南陽坐嘯名驥力用來精爽緊鵷行歸去羽翰輕須知别後狂山簡夢寐清談鄙吝生雨中王駕部席上鳩鳴連日始成隂簿雨聊寬望歲心浴雁野塘新浪細藏鴉宫柳嫩條深春寒巧放花遲彂人老嗟辭酒滿斟英雋並逰知最幸名園偷暇更追尋贈張伯常之郢見過因話荆楚故事仍貺佳什一見心親十載前相望南北久茫然喜傾白髮論文酒重訪清江下瀨船志大肯同悲抱璞識高寧許笑求田巳窺品藻傳荆楚更味陽春白雪篇伯常少留别業寄詩索酒因以奉報未擁雙騶謁漢庭暫留車馬憩林坰多情置驛邀佳客好事磨鉛勘舊經芳草連門三徑逺朝雲臨幌數峯青春醪有禁無繇寄誰為江潭訪獨醒贈黃降自宜城赴官許昌所學從誰得最完豫章新出已難攀不搖聲利心能定欲正哇淫手自刪頴水珠璣來席上鄢城桃李任人間高齋挂榻驪歌後坐守塵編少往還招澤甫竹亭間話偶歸塞馬應何定粒食鷦鷯頗自安雲壓楚山春後雪風吹襄水坐來寒詩豪已分材難強酒聖還諳量未寬賴有佳賔堪下榻且將清話對檀欒和鄭微之故人容下榻清宴得傳杯地秀偏宜竹天寒未見梅雲林千嶂出煙艇一帆開且醉休言别歸期信召催送陳世修沙渚鴻飛入楚雲逺林樵㸑宿煙昏姢姢野菊經秋淡漠漠滄江帶雨渾歸路賞心應駐莭客亭離思暫開樽莫嗟問俗淹翔久從此頻繁不次恩和張伯常自郢中將及敝境先寄長句拔薤威名高外服握蘭風力冠中臺好音忽有雙魚至喜氣遙知五馬來梨顆玉腴含雨重菊房金粉傍寒開池邉且欲留同醉思拙難酬白雪才和張伯常峴山亭晚起元韻揮手紅塵意浩然夙興招客與扳聮煙雲秀發春前地草木清含雪後天已卜耕桑臨富水暫拋魚烏去伊川更追羊杜經行樂况有風騷是謫仙峴山亭置酒石磴縈回入杳冥筠松高下簇虛亭春歸野路梅𥘉白雪盡沙田麥正青馬窟飛雲臨畫棟鳯林斜日照踈櫺長年酒量殊山簡却上藍輿恨獨醒韓魏公挽歌詞二首堂堂風骨氣如春衮服貂冠社稷臣天上立談迎白日握中隨物轉洪鈞忽騎箕尾精靈逺長誓山河寵數新萬里耕桑無一事三朝功德在生民錙銖赤舄無驕志咳唾黃金有古風覆冒荒遐知大度委蛇艱急見孤忠謀謨邴魏丹青力擁立昭宣柱石功御筆新詩在新隴哀榮誰得似𥘉終訓吳仲庶龍啚歲春感懷瑣闈延閣腹心臣籍甚聲華動縉紳藥石言行天下雨袴𥜗恩逹國中春召南去後餘思在綸氏歸來壯志新莫為流年嗟白髮濟世須仗老成人陳君式恭軒不要墻頭俗眼看故開蒼蘚種檀欒虛心得處從天性徑莭知來在歲寒葉飬風煙誇酒美枝留氷雪送歌殘名郎感慕同桑􅎚手植依然一畝寬僧正倚大師庵居蘭械方𫀆振錫回結茅蕭寺逺塵埃五峯日破朝雲出三谷花浮澗水來風散異香禪禢靜鳥窺清唄法筵開因過舊國枌榆地松麈高談喜暫陪以白山茶寄吳仲庶見貺佳篇依韻和酬山茶純白是天真筠籠封題摘尚新秀色未饒三谷雪清香先得五峯春瓊花散漫情終蕩玉蕊蕭條迹更塵逺寄一枝隨驛使欲分芳種更無因初惟此花與揚州后土廟瓊花天下一枝近年瓊花可接遂散漫而此花為獨出也酬江西運使蔣頴叔收科同日曵華𥚑􅒂劃驚聞刃有餘驄馬已騰雙闕路木牛還實太倉儲多岐易感千名别置袖空榮一𥿄書欲佩左符甌越去更從南斗望單車刀景純挽歌詞二章史觀郎闈得謝歸桓桓筋力未全衰園林笑傲笙歌擁山水追尋凡杖隨尺牘百封虛有意文章十秩更傳誰餘花自出藏春塢一點青燈照繐帷陳遵善書與人尺牘莫不藏以為榮又云遵日作書數百封視陳各有意義白樂天無子其詩云文章十秩官三品身位傳誰與廕誰景純善作書亦無子故云藏春塢景純自名其所居也八十登高步更輕殷勤愛客是平生能臨緩急敦風誼不向炎涼逐世情北嶽雲煙思抗志東門冠蓋羡遺榮可憐昨日壷觴地嗚咽唯聞薤露聲寄留交代元子發青雲寶構雖同直白髮魚符各未歸倚玉詎應公論許續貂還恐邑人非莫辭海畔留連久須惜天涯故舊稀預恐明年雙莭召九霄鵬翼看橫飛逰東山示客虞寄庵餘蘚徑通滿山臺殿出青紅難逢推案文書少偶見憑欄笑語同梅粉巧含溪上雪柳黃微破日邉風從今準擬頻行樂日伴樽前白髮翁大乘寺行春門外是東山藍輿寧辭數往還溪上鹿隨人去逺洞中花照水長間樓臺勢出塵埃外鍾磬聲來縹眇間自笑粗官偷暇日暫携萋子一開顔聖泉寺笑問并兒一舉鞭亦逢佳景暫留連清冥日抱山腰閣碧野雲含石眼泉躡屐路通林比寺落帆門繫海東船閩王舊事今何在惟有前村供佛田升山靈巖寺修竹長松十里隂任敦燒藥洞門深獨窺金版驚人語能到青霞出世心雞犬亦隨雲外去蓬瀛何必海中尋丹樓碧閣唐朝寺鍾唄香花滿舊林鳯池寺經年聞説鳯池山蠟屐方偷半日間笑語客隨朱閣上醉醒方在白雲間溪橋野水清猶急海岸轉寒去却還為郡天涯亦瀟灑莫差流落鬢毛班上元金鞍馳䀻屬兒曺夜半喧闐意氣豪明月滿街流水逺華燈入望衆星高風吹玉漏穿花急人近朱闌送目勞自笑玄心逐年少秪尋前事撚霜毛元沙院元字壁聖相諱升山南下一峯高上盡層軒未厭勞際海煙雲常慘淡大寒松竹更蕭騷經臺日永銷香篆談席風生落麈毛我亦有心從自得琉璃瓶水照秋毫酬柳國博行止恂恂衆所褒東南佳譽映時髦洞無畦畛心常坦􅏮若冰霜莭最高朱紱少留居客左白頭難敵是詩家須知别後山城寺悵望歸艎送目勞閠正月十一日以殿丞寄新茶新最早者生處地向陽也遍得朝陽借力催千金一跨過溪來曽坑貢後春猶早海上先嘗第一杯旬休日過仁王寺雜花飛盡緑隂成處處黃鸝百囀聲隨分笙歌與樽酒且偷間日試間行亂山亂山深處轉山多此地棲身奈逺何莫問吾親在何處舉頭東岸是新羅福州際海東海即新羅諸國啚經亦云長溪與外國接界親舊書報京師盛聞治聲自知孤宦無材術誰道京師有政聲默坐海邉何計是白頭親在鳯凰城寄獻新茶種處地靈偏得日摘時春早末聞雷京師萬里爭先到應得慈親手自開方推官寄新茶採摘東溪最上春􅊤源諸葉品尤新龍團貢罷爭先得肯寄人涯主諾人嘗新茶丁晉公比苑新茶詩序云茶芽採時如牟麥之大者麥粒收來品絶倫葵花製出樣爭新一杯永日醒雙眼草木英華信有神厚卿子中使高麗並使時推出衆材異方迎拜六城開宣封直到東西部仗莭遙臨大小梅滄海路從三島去玉山人待二星回黃金白㲲饒君用銅器應餘寄我來出郊葛葉催耕二月時斜橋曲岸馬行遲家家賣酒淸明近紅白花開一兩枝蹇磻翁寄新茶二首龍焙嘗茶第一人最憐溪岸兩旗新肯分方跨醒衷思應恐墉眠過一春貢時天上雙龍去鬪處人間一水爭分得餘甘慰憔悴碾嘗終夜骨毛清城南二首雨過橫塘水滿堤亂山高下路東西一畨桃李花開盡惟有青青草色齊水滿撗塘雨過時一畨紅影雜花飛送春無限情惆悵身在天涯未得歸寒食一麾飄泊在天涯寒食園林不見花唯有市亭酤酒客俚歌聲到日西斜夜出過利涉門紅紗籠竹過斜橋復觀翬飛入斗杓人在畫船猶未睡滿提明月一溪潮夜出城南禱雨海天重疊四山雲半出星辰亦半昏上得藍輿是中夜雨街燈照九重門西樓海浪如雲去却回北風吹起數聲雷朱樓四靣鈎踈箔卧看千山急雨來荔枝四首剖見隋珠醉眼開丹砂緣手落塵埃誰能有力如黃犢摘盡繁星始下來玉潤氷淸不受塵仙衣裁剪絳紗新千門萬戶誰曽得只有昭陽第一人綘縠囊收白露團未曽封植向長安昭陽殿裏才聞得巳道佳人不奈寒金叉雙棒玉纎纎星宿光芒動寶奩解笑詩人誇博物秪知紅顆味酸甜白藥天語荔枝詩云津液甘酸如醴酪杜二部詩云紅顆酣秪自知北皆巴蜀荔枝而已不知閩越荔枝酸也玉虞部惠佳篇敘述昔與相潭亡第逰從仍以亡第舊詩見示溥宦紅塵常拂面早衰黃髮已盈顛棣華零落曽誰語鴻羽蕭條秪自憐巳矣空聞懷舊賦泫然猶獲濟江篇殷勤愛我如君少更悟之他友最賢北歸三首召判太常終日思歸今日歸著鞭鞭馬尚嫌遲曲臺殿裏官雖冷須勝天涯海角時拜捧恩書喜滿顔馬蹄遙望斗杓還從今步步行平地出得千山與萬山江海多年似轉蓬白頭歸拜未夾宫㨋墻學士驚相問何處塵埃瘦老翁和酬孫少述自信簞瓢樂寧羞猿鶴驚論高知峻莭交淡見純誠自昔心無間相逢眼更明何當薦有道坐想軟輪迎和孫少述侯職方同燕席兩翁頭白喜追陪好事鈴齋燕席開臘在未消盈尺雪春歸先放一枝梅况無庭下書投缿更盡筵中酒滿杯周召二南皆絶唱抑揚賡和愧非材寄趙宮保銅扉得謝從今日王鉉辭榮巳十年素莭讜言留簡册高情清興入林泉海邊愛日疲人戀劒外仁風故老傳門外最應瀟灑客喜公平地作神仙和酬趙宫保致政言懷二首讜論危言望素隆獨于聲利性偏慵龍樓調護官雖寵鳩杖躋攀興巳濃不變松篁心轉徑無邉江海量兼容磻溪寧會為蒼生起更重愛國憂民有古風米鹽親省尚嫌慵衮衣天上歸何晚霖雨人間望正濃三少官儀雖赫赫五湖心事肯容容角巾藜杖經行處知在雲山第幾重和趙宫保别杭州紞鼓留公豈是催公詩云湖過魚船疊鼓催湖山得意且徘徊更應準擬須乘興范蠡扁舟去却來過靈璧張氏園三首梨棗纍纍正熟時粟田鶉兔亦爭肥園亭盡日追尋遍只欠厭厭醉始歸汴水容容帶雨流黃花艷艷亦迎秋看花引水園林主應笑行人易白頭􅐕地成耒多釀酒杏林熟後亦留錢不須置驛迎賔客直到門前繫畫船雪亳州欲下蒼涼日全低黯霮天飄颻投夜急瑣琗得風儇穢壤彌縫遍枯亥點綴妍繁英飛靣旋艷舞起翩躚巳壓穿林竹還冰落澗泉抵巇輕自肆乘隙巧爭先壅隔書郵斷侵凌客履穿恐傾貧巷屋覺重泝溪船唶有顔空姣洵無質可鐫包藏兼海嶽蒙蔽匝坤乾枚叟招何晚袁安卧正堅會須逢見晛萬里豁晴川送元厚之資政致仕歸蘇笑指家園是五湖畫船東下載圖書收功玉鉉丹青後得老銅樓羽翼𥘉醒醉放懷從野服登臨乘興屬安車一作與公既謝事即田野服安與優遊從適都門飲餞光華盛不獨當年有二䟣夀聖院昌山主靜軒一峯蕭灑背成隂碧瓦新堂地布金花落禪衣松砌冷日臨經秩𥿄窗深幽棲鳥得林中樂燕坐人存世外心應似白蓮香火社不妨籃輿客追尋鶴林寺李步所謂因過竹院逢僧話又得浮生半日間即此寺也音人春盡強登山只肯逢僧半日間何似一樽乘興去醉中騎馬月中還送關彥逺赴河北子明高誼衆人知苗裔清材世所推詩作士林誇刻燭賦成天路喜同時豈當白首淹風力自合青雲縱羽儀北部經營應不久玉階朝夕是歸期正月十一日迎駕呈諸同舍錦𫀆周衛一畨新警蹕朝嚴下𬗋宸俗眼望來猶眩日天顔回處自生春行齊鵷鷺常隨仗步穩驊騮不起塵歸路青雲喧鼓吹樂逰從此屬都人是時上服慈聖光獻皇后三年喪畢始聽樂及詳然燈和御製上元觀燈翠幰霓旌夾露臺夜涼宫扇月中開龍􅋦燭抱金門出鰲負山超玉座來碭極戲添夷客喜漢嚮四夷之客作海中之盛柏梁篇較從臣材共知天意同民樂願奏君王萬壽杯和史館相公上元觀燈九衢仙仗豫遊歸寶燭皇繁換夕暉傳盞未斜淸禁月散花還拂侍臣衣天香暗度金虬暖宫扇雙開彩鳯飛法尚世人聽未足却迎朱輦下端闈集賢殿春燕呈諸同舍御爐風細麝煙浮法樂聲和酒味柔冠劔九重霄漢路鶯花三月帝王恨重廊四合盤龍幕當殿雙高彩鳯棲歸去人人誇四露揔合歡意躍驊騮上巳日瑞聖園錫燕呈諸同舍北上郊原一據鞭華林淸集綴儒冠方塘淹淹春先渌密竹姢姢午更寒流渚酒浮金鑿落照庭花並玉欄干君恩倍覺丘山重長日從容笑語歡池上即席送况之赴宣城池上紅深緑淺時春風蕩漾水逶迤南州鼓舞歸慈惠東觀壼觴惜别離逺岫煙雲供醉眼雙溪魚鳥付新詩陵陽豈是遲留地趣駕追鎽自有期寄題饒君茂才葆光庵適意藜羹與布裘結廬人境地還幽淸談汝水孤猿夜爽氣麻源一葉秋應有風騷歸健筆可無樽酒付扁舟因君更起家園興夢寐思從几杖逰朝退即事呈大尹正仲龍圖六街塵斷早涼生細葛含風體更清官府吏間時樂易市㕓人喜政和平揮金䔩䔩宫槐蕊鳴玉淙淙御水聲觀闕漸迎𥘉日上馬頭還傍緑隂行元豐類藁卷之八
