front:
  text: 元豊類藁卷之三十七
  hash: sha256:44ec04458bc24cb1b4d94c1be801c760dcd1678345a5bdc85e093c4b3b9a266b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_037-1a}
body:
  text: 啓狀回陸佃謝館職啓右鞏啓伏審祗膺䛇檢入踐書林伏惟慶慰伏惟侍講學士敏識兼人英辞華國翰林子墨之賦蚤擅貴名玉杯繁露之篇多名大義豈獨坐收扵士望固䏻自結於主知特啓書筵宻隣禁户凢将急就之字巳賴發明廣内石室之蔵更資是正兹惟異選奚測逺塗方喜托扵餘光遽先承扵華問燁如黼藻實駭扵彌文沛若江河更欽扵善下其為感幸曷罄敷陳與㝎州韓相公啓右鞏啓伏念鞏轉赱江湖推移歲月望門墙而既逺通書問無以縁兹者蒙易近藩匪遥台席雖未得就諸生之列請益詩書猶足以聞長者之風仰髙扵道誼始敢脩牋記叅候之禮庻㡬将心誠飢渇之勤載省孤蒙實為幸㑹属晏隂之在序當嚴氣之方升仰惟吐納之宜無爽燕間之喜伏惟判府相公言為蓍蔡行應凖䋲茂劳烈扵三朝聳儀刑扵四海韓侯之鞗革金厄暫殿方維周公之衮衣綉裳佇還鈞軸更冀上為邦國善保寝興禱頌之誠叙陳罔既賀韓相公赴許州啓右鞏啓伏審逺持信瑞入奉清閑假㤗筮以諏辰命倌人而飭駕百靈奔衛宜無陟降之劳六氣莭宣當遂神明之適伏以判府相公材為人傑行備天常出尭舜之盛時紹韋平之慶閥忠純之操簡注扵三朝愷悌之風儀刑扵四海比較廟堂之任少留藩輔之雄力抗至言屡辤扵榮禄眷求舊徳方属扵上心用均邊閫之勤便易郷邦之便鞗革金厄巳嚴入覲之装衮衣繡裳行允公歸之望佇膺典册首秉鈞衡鞏䖏势多竒誤知最乆持心素厚未忘墜屦之微引脰永懐巳動掃門之喜更冀上為宗社善保寝興授中書舍人謝啓右鞏伏蒙制命授前件官者竊以賛為明命資討論潤色之工服在從官備諏度詢謀之用属非常之興運經不世之大猷方追三代之風以建一王之法其扵講求體要財正典章出獨断之淵深號積年之希闊所以訓齊群下播告四方非䆒極扵人文曷宣明於上意矧參献納尤慎選掄如鞏者識慮少通襟靈多蔽徒恐墮扵先緒頗䏻味扵經言有顓愚好古之心自知迃散無廣博為人之學分甘棄捐顧一作嘆齒髮之巳衰困風波而且乆晚逢真主獨賜誤知取扵寡與之中假以踰涯之寵俾專史法非薄質之䏻堪遂掌訓詞豈䛕䏻之可稱况䇿名扵近要預責實扵論思揣巳以慚􅘃官可畏何縁致此固有繇然兹盖伏遇某官翼亮天功弥綸務仁仁接扵物毎樂育扵時村誼在丞君故旁招扵衆俊致兹頑鈍獲備甄收惟殫許國之誠彌堅素志庻荅知人之遇不在他門賀提刑狀右伏審祗奉詔恩揔持使務伏惟慶慰伏以提刑屯田躬高明之徳席熈盛之期起收科榮光映朝序發明吾道則有文章之深淳推行當時是為治行之尤異果膺迅用以允僉言自江之東握莭而使固将粹羙扵風俗豈特是正扵刑書不次之陞為端扵此鞏獲分郡寄得與公庥幸喜之深叙陳罔既太平州回轉運右鞏伏念鞏夙惟孤質最荷誤知属仗莭以耒思得通名而覯止辱爲殊礼尤出過恩委曲柎循丁寕頋訪軫艱難扵即路則許之假寵扵舟艎憫匱乏扵騰装則期以致憐扵教墨側思寒陋何用克堪聚集感慚豈勝指数去違再宿懐嚮兼年伏惟通乆禱扵萬靈亨洪休扵百順竊以運使郎中受村閎廓經徳粹冲布盛府之䛇條樹外䑓之風績洽扵人望簡在天心行𬒳命書即膺逺用伏惟順遵氣莭安飬寢興太平州與本路轉運狀右鞏啓伏念更移歲序阻越道途音塵莫及扵賔階書問不通扵記室飛馳精思徯仰風威伏惟順履川流安行舟御亭神明之恊相具福禄之来成伏以運使郎中徳紹家聲村周世用雋望傾乎天下壯猷藹扵朝端建使者之莭旄宣揚恵澤佐大農之計䇿蕃長貨財拊劳烈以甚隆席寵靈而宜厚竚膺䛇召以恊輿言伏惟上爲朝廷善綏寢餗越州賀提刑夏倚状右鞏伏審祗奉䛇封荣分使莭伏惟慶愜伏以提刑屯田抱材精敏涵徳粹温文章爲國之光華治行迺時之表則輟扵朝著䖏以使䑓士望藹然時名籍甚官用視年之豊耗巳實倉儲邦刑以世而重䡖竚清獄繋使仁聲之既洽則嚚訟之可無然後入奉命書進升法從在扵公議寔允輿情鞏扵此備官云𥘉託庇喜趨風之甚邇諒考履之惟和更冀副上倚毗順時調護其為禱頌曷究敷陳賀轉運状伏審祗奉詔封就更使莭伏惟慶慰伏以運使司封受村閎逺植性粹冲風猷為世之表儀治行迺時之軌則果用祥刑之最来分将漕之權威名巳動扵連城恵術行周扵比户豈止調盈虚扵歲計内足邦儲方且知緩急扵人情下流主澤然後進陪侍從入奉詢謀在公論以猶稽實輿誠之所係鞏備官扵此託庇云𥘉将承望扵餘光但忻愉扵懦思属祁寒之在序諒福履之保和敢冀上為朝廷善調興寝禱頌之至叙述奚周賀杭州趙資政冬状右鞏竊以布律而候氣萌動扵黄宫立表以須景長至扵南極伏惟知府資政受材閎廓含徳粹純壮京國之大猷儕格天之盛業履兹令序荿集林祺典册衮衣竚履一作復三公之位旂常鼎鼐當傳萬世之功鞏祗服冠箴逺違門著素積依㱕之望弥深禱頌之勤賀北亰留守韓侍中正旦状右鞏伏以歲起扵東茂對三陽之盛物生扵震聿開萬化之端伏惟某官行應中和道含純粹属四方之係望簡三后之眷懐徳為民彛故称宗庙之噐功在王室是為社稷之臣順履昌期具膺繁祉佇奉氶扵典冊復登翊扵巖廊鞏限守印章阻趨墻屏仰望威重不任禱頌之至賀鄆州邵資政改侍郎右鞏竊審祇𬒳明緍進陞寵秩伏惟慶慰伏以安撫資政侍郎材經世務文擅國華攀日月之高衢踐機衡之要地方兼荣扵祕殿用均逸扵价藩属時靖加維上䂊動訪昔逰扵博望懐舊斈扵甘盤廼陞宗伯之聮居貳卿曺之重惟隆名異数之錫巳絶當時固元勲盛徳之殊豈稽圖任佇還柄用式允輿情馳慶未繇依歸滋劇㐮州回相州韓侍中状右鞏僻守陋邦逺違嚴屏永言嚮慕但傾茅塞之心自便退蔵莫馳竿牘之問敢期賜教出自過㤙形意爱之拊循枉題評之奨引譬如寒俗幸蒙六律之吹有若秋毫遂借千鈞之重秘蔵巾衍銘鏤肺肝惟偃息扵便藩素充盈扵浩氣百神所相萬福来綏伏以司徒侍中行應凖䋲言爲蓍蔡肩一心之忠誼弼三后之謀謨安社稷之元功傳扵竹帛𬒳華夷之盛徳布在管絃方且辤鈞軸扵廟堂擁旌憧扵郷國然而人詠方叔克壯元老之猷時思謝安出慰蒼生之望宜就賛書之拜佇諧華衮之歸回樞宻侍郎狀右鞏啓伏念鞏乆兹外𥙷利在退蔵一㓛不為京師之書以此亦踈左右之問分當棄置理絶收憐豈期尚記扵姓名特賜親紆扵翰墨䖏大寒而不変乃知松栢之堅兼庻類而並容則維江漢之廣孤懐易感重誼難志但注仰扵門䦨實􅍢銘扵肺腑今者景風扇物畏日御躔伏惟㐮賛萬機順膺百福敢覬上為邦國善保寝興禱頌之誠指陳難既回亳州知府諫議状右鞏伏念自違墻屏浸易歲時比潜伏扵外邦乆棄捐扵人亊雖嚮徃之意不暫弭忘而參動之勤至扵曠絶敢謂曲敦雅舊尚記庸虚賜劳問於華牋致㤙勤扵親筆文如黼藻加一字以為榮橾若松筠貫四時而不改以慙且感𣣔報矣言今者竊審固避機衡出臨屏翰始敢瀝茅心之至懇且竿牘之常儀少贖曠踈覬蒙開察盖天時之迭運属春今之方行伏惟開閤之𥘉偃藩甚樂休有神明之助茂臻福履之宜鎮撫名城暫屈承流之寄旋歸宰路竚膺圖舊之求更惟上為宗祊善調寝餗禱頌之至但切下情回運使郎中狀右鞏啓伏念鞏仰髙所至馳思為深戀势之殊属書以進枉過㤙之特厚流革問以見存文辭爛然意氣勤甚雖徳心之大遺名秩以自謙而士品之㣲顧村資而安稱其為佩服曷罄指陳急景云𥘉祁寒将盛伏惟遵道塗之易詢采扵風謡察閭里之勤布行扵徳惠神靈所護福禄攸宜恭以運使郎中材足兼人志存及物出高明之慶族接熈洽之盛期通班扵朝揭莭而使自簿書期㑹之纎悉莫不注心至山巖窟穴之幽深㪯皆受賜足以救一時之敝故能得萬事之宜休聲所㱕逺用行及伏惟遵時之順飬氣以恬庻允與人之情不違拙者之望到任謝職司諸官員状右鞏比者祗命守邦㳙辰視亊維是孤蒙之質幸依庇冒之餘竊鞏才不逮人斈多泥古乆備官扵冊府徒竊食扵累朝兹假便灌實縁私請伏遇某官本仁為任充美在躬素自結扵主知方出宣扵使指歛時利澤播在東南籍甚休聲洽扵中外頋忝属城之任實諧徳宇之依尚阻參承但深欣抃福州回曽侍中状右鞏伏念自逺門䦨荐更時序顧兹艱拙利在退蔵雖有心誠嚮徃之勤而無書記候問之礼敢期眷與特賜誨存獲氶黼藻之褒彌見松筠之操其為感激但切銘藏属凝沍之在辰惟燕間之均福伏以致政太傅侍中素推仁傑蚤代天工意誠心正而家齊巳儀刑扵王室功成名遂而身退遂表則扵士倫聊曼衍以窮年坐優㳺而進道矧臧孫之有後継周公之拜前阿衡之格于天書載君臣之徳司徒之善其職詩称父子之功方頼牡猷隂禆至治更冀上爲邦國善保寝興禱頌之誠不勝懇悃移亳州回人賀状右鞏比縁懇請得假善藩既諧竊禄之私實獲事親之便慙無善政可稱厚㤙豈謂某人特枉緘封曲垂奨舊言爲黼藻飾陋質以爲荣操若松筠䖏大寒而不変其爲感愧曷盡指陳惟溽暑之方隆諒燕居之多適祈保攝用竚迂陞東府賀冬狀右鞏伏以氣動扵㣲升一陽而方長物資其始萌萬寳扵将亨伏惟某官行蹈中庸業存乆大爲生民之蓍蔡任王室之股肱四岳之亮天功其凝庻績百揆之熈帝載攸叙彛倫茂對休辰具膺繁祉鞏方祗宫次阻詣門䦨西府賀冬状右鞏伏以物資其始萌萬寳扵将亨氣動扵徴升一陽扵方長伏惟某官業存乆大行蹈中庸爲蓍蔡扵生民任股肱扵王室共武之服乆專綐扵樞機秉國之均佇首當扵衡軸對休辰而茂恊膺繁祉以具宣鞏限此守邦未縁爲壽回人賀授史館修撰状右鞏誤被上㤙進専史事頋慙孤陋曷称選掄伏念鞏齒髪蚤衰材資素薄差池一紀乆流落扵風波推徙七州寖沉迷扵簿領詎期皓首獲奉清光拔扵多士之中寵以非常之遇惟累朝之盛典垂列聖之洪名冝得異能使之實録豈伊鄙鈍可盡形容惧莫副扵簡求方内懐扵兢愧敢意眷私之厚特迂慶問之勤矧奨飾之踰涯俾寅縁而借重其為感幸難既敷陳回人賀授舍人状右鞏啓叨奉制㤙進登詞掖誤蒙任属私積兢慙鞏器識少通性資多蔽非有為人之斈徒堅好古之心矧齒髪之巳衰困風波而且乆晚逢真主獨賜重知取扵寡與之中假以踰涯之寵甫専史筆遂掌訓辭惟清切之近班實論思之要地方驚冐䖏良用㥏顔未遑削牘之勤遽辱騰書之貺其爲感佩曷罄敷陳元豊類藁卷之三十七
