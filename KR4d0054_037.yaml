front:
  text: 元豐類藁卷之三十七
  hash: sha256:35650baa75cee53465969a16dbc23c988b3c5811c556a1b7af1f999d2580714f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_037-1a}
body:
  text: 啓狀回陸佃謝館職啓右鞏啓伏審祗膺䛇檢入踐書林伏惟慶慰伏惟侍講學士敏識兼人英辭華國翰林子墨之賦蚤擅貴名玉杯繁露之篇多名大義豈獨坐收于士望固能自結於主知特啓書筵密鄰禁户凡將急就之字巳賴發明廣內石室之藏更資是正兹惟異選奚測逺塗方喜托于餘光遽先承于華問燁如黼藻實駭于彌文沛若江河更欽于善下其為感幸曷罄敷陳與㝎州韓相公啓右鞏啓伏念鞏轉赱江湖推移歲月望門墻而既逺通書問無以緣兹者蒙易近藩匪遙台席雖未得就諸生之列請益詩書猶足以聞長者之風仰髙于道誼始敢修箋記參候之禮庶幾將心誠飢渴之勤載省孤蒙實為幸會屬晏隂之在序當嚴氣之方升仰惟吐納之宜無爽燕間之喜伏惟判府相公言為蓍蔡行應凖繩茂勞烈于三朝聳儀刑于四海韓侯之鞗革金厄暫殿方維周公之衮衣繡裳佇還鈞軸更冀上為邦國善保寢興禱頌之誠敘陳罔既賀韓相公赴許州啓右鞏啓伏審逺持信瑞入奉清間假泰筮以諏辰命倌人而飭駕百靈奔衛宜無陟降之勞六氣莭宣當遂神明之適伏以判府相公材為人傑行備天常出堯舜之盛時紹韋平之慶閥忠純之操簡注于三朝愷悌之風儀刑于四海比較廟堂之任少留藩輔之雄力抗至言屢辭于榮祿眷求舊德方屬于上心用均邊閫之勤便易鄉邦之便鞗革金厄巳嚴入覲之裝衮衣繡裳行允公歸之望佇膺典册首秉鈞衡鞏處勢多竒誤知最久持心素厚未忘墜屨之微引脰永懷巳動掃門之喜更冀上為宗社善保寢興授中書舍人謝啓右鞏伏蒙制命授前件官者竊以贊為明命資討論潤色之工服在從官備諏度詢謀之用屬非常之興運經不世之大猷方追三代之風以建一王之法其于講求體要財正典章出獨斷之淵深號積年之希闊所以訓齊群下播告四方非究極于人文曷宣明於上意矧參獻納尤慎選掄如鞏者識慮少通襟靈多蔽徒恐墮于先緒頗能味于經言有顓愚好古之心自知迃散無廣博為人之學分甘棄捐顧一作嘆齒髮之巳衰困風波而且久晚逢真主獨賜誤知取于寡與之中假以踰涯之寵俾專史法非薄質之能堪遂掌訓詞豈諛能之可稱况䇿名于近要預責實于論思揣巳以慚􅘃官可畏何緣致此固有繇然兹蓋伏遇某官翼亮天功彌綸務仁仁接于物每樂育于時村誼在丞君故旁招于衆俊致兹頑鈍獲備甄收惟殫許國之誠彌堅素志庶答知人之遇不在他門賀提刑狀右伏審祗奉詔恩揔持使務伏惟慶慰伏以提刑屯田躬高明之德席熙盛之期起收科榮光映朝序發明吾道則有文章之深淳推行當時是為治行之尤異果膺迅用以允僉言自江之東握莭而使固將粹美于風俗豈特是正于刑書不次之升為端于此鞏獲分郡寄得與公庥幸喜之深敘陳罔既太平州回轉運右鞏伏念鞏夙惟孤質最荷誤知屬仗莭以耒思得通名而覯止辱為殊禮尤出過恩委曲柎循丁寧顧訪軫艱難于即路則許之假寵于舟艎憫匱乏于騰裝則期以致憐于教墨側思寒陋何用克堪聚集感慚豈勝指數去違再宿懷嚮兼年伏惟通久禱于萬靈亨洪休于百順竊以運使郎中受村閎廓經德粹沖布盛府之䛇條樹外臺之風績洽于人望簡在天心行𬒳命書即膺逺用伏惟順遵氣莭安飬寢興太平州與本路轉運狀右鞏啓伏念更移歲序阻越道途音塵莫及于賔階書問不通于記室飛馳精思徯仰風威伏惟順履川流安行舟御亭神明之協相具福祿之來成伏以運使郎中德紹家聲村周世用雋望傾乎天下壯猷藹于朝端建使者之莭旄宣揚惠澤佐大農之計䇿蕃長貨財拊勞烈以甚隆席寵靈而宜厚佇膺䛇召以協輿言伏惟上為朝廷善綏寢餗越州賀提刑夏倚狀右鞏伏審祗奉䛇封榮分使莭伏惟慶愜伏以提刑屯田抱材精敏涵德粹溫文章為國之光華治行乃時之表則輟于朝著處以使臺士望藹然時名籍甚官用視年之豐耗巳實倉儲邦刑以世而重輕佇清獄繫使仁聲之既洽則嚚訟之可無然後入奉命書進升法從在于公議實允輿情鞏于此備官云𥘉託庇喜趨風之甚邇諒考履之惟和更冀副上倚毗順時調護其為禱頌曷究敷陳賀轉運狀伏審祗奉詔封就更使莭伏惟慶慰伏以運使司封受村閎逺植性粹沖風猷為世之表儀治行乃時之軌則果用祥刑之最來分將漕之權威名巳動于連城惠術行周于比户豈止調盈虛于歲計內足邦儲方且知緩急于人情下流主澤然後進陪侍從入奉詢謀在公論以猶稽實輿誠之所係鞏備官于此託庇云𥘉將承望于餘光但欣愈于懦思屬祁寒之在序諒福履之保和敢冀上為朝廷善調興寢禱頌之至敘述奚周賀杭州趙資政冬狀右鞏竊以布律而候氣萌動于黃宫立表以須景長至于南極伏惟知府資政受材閎廓含德粹純壯京國之大猷儕格天之盛業履兹令序荿集林祺典册衮衣佇履一作復三公之位旗常鼎鼐當傳萬世之功鞏祗服冠針逺違門著素積依歸之望彌深禱頌之勤賀北亰留守韓侍中正旦狀右鞏伏以歲起于東茂對三陽之盛物生于震聿開萬化之端伏惟某官行應中和道含純粹屬四方之係望簡三后之眷懷德為民彛故稱宗廟之器功在王室是為社稷之臣順履昌期具膺繁祉佇奉氶于典册復登翊于巖廊鞏限守印章阻趨墻屏仰望威重不任禱頌之至賀鄆州邵資政改侍郎右鞏竊審祇𬒳明緍進升寵秩伏惟慶慰伏以安撫資政侍郎材經世務文擅國華攀日月之高衢踐機衡之要地方兼榮于祕殿用均逸于價藩屬時靖加維上豫動訪昔逰于博望懷舊學于甘盤乃升宗伯之聮居二卿曺之重惟隆名異數之錫巳絶當時固元勳盛德之殊豈稽圖任佇還柄用式允輿情馳慶未繇依歸滋劇襄州回相州韓侍中狀右鞏僻守陋邦逺違嚴屏永言嚮慕但傾茅塞之心自便退藏莫馳竿牘之問敢期賜教出自過恩形意愛之拊循枉題評之奬引譬如寒俗幸蒙六律之吹有若秋毫遂借千鈞之重祕藏巾衍銘鏤肺肝惟偃息于便藩素充盈于浩氣百神所相萬福來綏伏以司徒侍中行應凖繩言為蓍蔡肩一心之忠誼弼三后之謀謨安社稷之元功傳于竹帛𬒳華夷之盛德布在管絃方且辭鈞軸于廟堂擁旌憧于鄉國然而人詠方叔克壯元老之猷時思謝安出慰蒼生之望宜就贊書之拜佇諧華衮之歸回樞密侍郎狀右鞏啓伏念鞏久兹外輔利在退藏一㓛不為京師之書以此亦踈左右之問分當棄置理絶收憐豈期尚記于姓名特賜親紆于翰墨處大寒而不變乃知松柏之堅兼庶類而並容則維江漢之廣孤懷易感重誼難志但注仰于門闌實􅍢銘于肺腑今者景風扇物畏日御躔伏惟襄贊萬機順膺百福敢覬上為邦國善保寢興禱頌之誠指陳難既回亳州知府諫議狀右鞏伏念自違墻屏浸易歲時比潛伏于外邦久棄捐于人事雖嚮往之意不暫弭忘而參動之勤至于曠絶敢謂曲敦雅舊尚記庸虛賜勞問於華箋致恩勤于親筆文如黼藻加一字以為榮橾若松筠貫四時而不改以慙且感𣣔報矣言今者竊審固避機衡出臨屏翰始敢瀝茅心之至懇且竿牘之常儀少贖曠踈覬蒙開察蓋天時之迭運屬春今之方行伏惟開閣之𥘉偃藩甚樂休有神明之助茂臻福履之宜鎮撫名城暫屈承流之寄旋歸宰路佇膺圖舊之求更惟上為宗祊善調寢餗禱頌之至但切下情回運使郎中狀右鞏啓伏念鞏仰髙所至馳思為深戀勢之殊屬書以進枉過恩之特厚流革問以見存文辭爛然意氣勤甚雖德心之大遺名秩以自謙而士品之微顧村資而安稱其為佩服曷罄指陳急景云𥘉祁寒將盛伏惟遵道塗之易詢采于風謡察閭里之勤布行于德惠神靈所護福祿攸宜恭以運使郎中材足兼人志存及物出高明之慶族接熙洽之盛期通班于朝揭莭而使自簿書期會之纎悉莫不注心至山巖窟穴之幽深舉皆受賜足以救一時之敝故能得萬事之宜休聲所歸逺用行及伏惟遵時之順飬氣以恬庶允與人之情不違拙者之望到任謝職司諸官員狀右鞏比者祗命守邦涓辰視事維是孤蒙之質幸依庇冒之餘竊鞏才不逮人學多泥古久備官于册府徒竊食于纍朝兹假便灌實緣私請伏遇某官本仁為任充美在躬素自結于主知方出宣于使指斂時利澤播在東南籍甚休聲洽于中外顧忝屬城之任實諧德宇之依尚阻參承但深欣抃福州回曽侍中狀右鞏伏念自逺門闌荐更時序顧兹艱拙利在退藏雖有心誠嚮往之勤而無書記候問之禮敢期眷與特賜誨存獲氶黼藻之褒彌見松筠之操其為感激但切銘藏屬凝沍之在辰惟燕間之均福伏以致政太傅侍中素推仁傑蚤代天工意誠心正而家齊巳儀刑于王室功成名遂而身退遂表則于士倫聊曼衍以窮年坐優遊而進道矧臧孫之有後繼周公之拜前阿衡之格于天書載君臣之德司徒之善其職詩稱父子之功方賴牡猷隂禆至治更冀上為邦國善保寢興禱頌之誠不勝懇悃移亳州回人賀狀右鞏比緣懇請得假善藩既諧竊祿之私實獲事親之便慙無善政可稱厚恩豈謂某人特枉緘封曲垂奬舊言為黼藻飾陋質以為榮操若松筠處大寒而不變其為感愧曷盡指陳惟溽暑之方隆諒燕居之多適祈保攝用佇迂升東府賀冬狀右鞏伏以氣動于微升一陽而方長物資其始萌萬寶于將亨伏惟某官行蹈中庸業存久大為生民之蓍蔡任王室之股肱四嶽之亮天功其凝庶績百揆之熙帝載攸敘彛倫茂對休辰具膺繁祉鞏方祗宫次阻詣門闌西府賀冬狀右鞏伏以物資其始萌萬寶于將亨氣動于徴升一陽于方長伏惟某官業存久大行蹈中庸為蓍蔡于生民任股肱于王室共武之服久專綐于樞機秉國之均佇首當于衡軸對休辰而茂協膺繁祉以具宣鞏限此守邦未緣為壽回人賀授史館修撰狀右鞏誤被上恩進専史事顧慙孤陋曷稱選掄伏念鞏齒髮蚤衰材資素薄差池一紀久流落于風波推徙七州寖沉迷于簿領詎期皓首獲奉清光拔于多士之中寵以非常之遇惟纍朝之盛典垂列聖之洪名冝得異能使之實録豈伊鄙鈍可盡形容懼莫副于簡求方內懷于兢愧敢意眷私之厚特迂慶問之勤矧奬飾之踰涯俾寅緣而借重其為感幸難既敷陳回人賀授舍人狀右鞏啓叨奉制恩進登詞掖誤蒙任屬私積兢慙鞏器識少通性資多蔽非有為人之學徒堅好古之心矧齒髮之巳衰困風波而且久晚逢真主獨賜重知取于寡與之中假以踰涯之寵甫専史筆遂掌訓辭惟清切之近班實論思之要地方驚冒處良用㥏顔未遑削牘之勤遽辱騰書之貺其為感佩曷罄敷陳元豐類藁卷之三十七
