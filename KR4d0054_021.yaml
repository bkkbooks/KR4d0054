front:
  text: 元豐類藁卷第二十一
  hash: sha256:ce19e4c28dc33dad77db3325447dc882429197c57fe468625b479be297f221ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_021-1a}
body:
  text: 制誥左僕射門下侍郎王圭追封三代并妻制曽祖永贈開府儀同三司敕禮取其稱故位益尊則事其先者世益逺今豫良弼褒命其親得上至于三世求之于禮豈非取其稱哉具官某曽祖某仁篤慈祥畜德甚盛蓋其為積也厚則其流澤也廣故能開相厥裔為時宗臣百辟是師王室是輔推功原大肇基自爾顯揚崇寵兹惟舊章是用進爾之階秩在第一尚其不昧服此茂恩可曽祖母尹氏追封燕國太夫人敕優禮太臣厚其寵數所以勸在位之功德而共成天下之治也宰相之任重矣尊榮光大上施于其三世豈不即乎人情而稱其位序哉具官某曽祖母某氏幽間靜專躬蹈純德嬪于盛族壷彛是稱啓佑後人任國幾政流澤所自宜極褒崇追命㝎封列于大國光靈不泯尚服朕恩可祖贄追封魏國公敕天下之忠乎上教有所自故上之仁乎下恩有所延其躰相成治道所出惟吾股肱之佐共任天下之重愍書寵秩施其祖廟所以慰其顯親之心稱其事君之義具官其明允純篤德業惟茂義訓不倦彌逺益彰維時聞孫實輔豫治念功原始冝極褒嘉庸建爾于上公俾受國于全魏殁而尚有知也其服朕之厚恩祖母丘氏追封魏國太夫人敕夫其先之畜德也厚則其裔之蒙澤也長故寵祿在其子務則褒榮施其祖禰奬功録善必揆所繇所以勸天下之成其家也具官某祖母某氏身蹈純行嬪于令人教行閨門自隱而顯惟豫哲輔實爾慈孫質厥所元宜有加命一作嘉全魏大國從夫之尊服此寵章尚綏爾後可父凖追封漢國公敕朕敷求哲人以共大政隆名寵祿既俾集于厥躬褒大推崇則又施其禰廟所以遂吾士臣𣣔顯其親之志而開示在位豫一人尊奬近輔之心具官某父某材通世用行蹈天常德畜不施澤流及逺惟時有子為國宗臣參聽萬機人望惟允慶所自出朕惟汝嘉屏蔽四方漢為最大受兹封土承𥙿爾家可母薛氏追封漢國太夫人敕位有貴賤升降之等故禮有隆殺損益之差今輔豫聽斷萬機之臣在師長百官之任蓋列于廊廟名秩既殊故追榮其親命數亦異兹惟故事其可易哉具官某母某氏婦道以順母儀以慈言為壷彛動應圖法能教其子為時宗工股肱朕躬王室是賴褒崇之典既啓名乂漢惟大邦改進封號尚宜寵渥永祚厥家可妻鄭氏追封楚國夫人敕詩人之義君之夫人有委蛇之行河山之德然後在尊位備盛服從其夫榮可以為稱施于世教所以始人倫而出治道也具官某妻某氏淑茂柔明生于今族動靜以禮協于經言相豫宗臣慎其內行曽不偕老永綏厥家湯沐之田既受方國有加逮寵宜易新封尚其光靈服我休命可中大夫尚書左丞蒲宗孟追封三代并進封妻制曽祖頴士贈太子少保敕朕稽于古以正百官惟尚書政本而左轄綱紀之司延登哲人俾祗厥敘愍有加寵逮其重祖所以隆崇大臣國之典也具官某曽祖某潛德西南在約彌勵流光錫祚集其後昆總典中臺實輔豫治東朝二品是用命爾尚維幽漠服此茂恩可曽祖母鮮于氏追封大寧郡太夫人敕宗廟之數諸侯以五蓋任彌重者禮彌盛貴賤之莭然也今吾大臣追命及其三世與夫朝制豈異意哉具官某曽祖母某氏作德于內以宜厥家啓相後人預蔽國論按圖考地俾㝎爾封其尚有知服兹寵號可祖伸贈太子少傅敕人本于祖故吾加恩近輔褒榮其先至子纍世豈不緣人之情而制為命數哉具官某祖某內含純明外蹈規矩流澤也逺有孫而賢進于中臺捴國綱轄善有所自朕惟汝嘉東朝之孤傳位為寵用賁幽宅尚其欽承可祖母陳氏追封蜀郡太夫人敕世德之積者久則發于其後者長故朕隆崇近輔而褒榮其先非一二世而止所以勸天下之善豈非傳哉具官某祖母某氏淑慎恭儉化行閨門啓其元孫持國綱要蜀惟爾土以㝎新封尚其如存膺此茂渥可繼祖母朱氏封閬中郡太夫人敕夫位以德升禮以位敘不失其稱兹為義榮今吾崇進大臣而圖其先烈內外命秩亦惟其宜所以使上下之間公論惟允具官某繼祖母某氏婉嫕沖靜行孚于家祚爾之孫興以輔朕西南上郡愍有褒封垂聲贊書尚其不殁可父師道贈太子少師敕吾之大臣繇聰明材諝有以爵祿之榮豫有命書愍贈賁其考廟所以稱其顯親之心慰其霜露之感位不次授厥惟故常具官某父某忠篤純明德履惟茂壯謀循政聲列在人積厚慶隆及子而顯時豫左轄司國紀綱惟流有原開迹自爾宫師之二名寵秩尊以告幽扄尚其秪服可母陳氏追封頴川郡太夫人敕人子之于其父母莫不有顯揚褒大之心惟任重秩尊得盡其志此隆名寵祿所以勸天下也具官某母某氏經德履善冝其家室錫羡流祉在爾後人時豫宗工任國綱轄陪京望郡俾㝎新封服我命書尚其不泯可妻陳氏封河東郡夫人敕朕援用天下之材以為共政之臣就位之𥘉恩數禮秩所以尊榮光大之者上施其祖禰而旁及于閨門蓋任屬之者重則褒隆之者其可以不異哉具官某妻某氏言容功德柔間懿恭嬪手令人休有華問惟時哲輔進秉國成相助之勤爾效彌顯改擇加郡登崇號名尚宜厥家永綏寵祿可陸佃兼侍講蔡卞兼崇政殿説書制敕朕于書無所不學于天下之事無所不考而不敢自以為足故設置講解之官使以先王之六藝日陳于前朕于求多聞以建事之心可謂勤矣具官某好古知經宜在此位夫尊其所聞以懋厥職兹為爾守其尚起哉可蔡卞改講解作誦説徐禧給事中制敕有殿內之臣職在于平奏述詳命令紏其違者而止之覆其是者而行之至于決獄官人條陳法式之事莫不當考察焉其任可謂重矣具官某以財進拔興執邦憲兹用推擇俾踐厥位惟精敏不懈可以周閲讀惟忠實不撓可以司論駮朕方觀爾之效爾尚慎于厥修可鍾浚將作少監制敕具官某繕修興造程工督作之任不可不屬之其人位視九卿禮秩甚寵正名之始考擇惟慎爾以材選往二厥官尚其祗承以允收拔可蔡燡河東運判制敕具官某分部而使雖以將漕為名然實在于捴庶務之豫奪察群吏之能否參豫任屬選授其艱以爾為能俾承厥序夫均通貨食使物有羡羸審核幽明使人知勸畏兹為爾守其往懋哉可供備庫副使董琰等十一人轉官制敕具官某等西南之蠻恃阻且逺跳踉溪谷負誼于誅王師鼓行舉其巢穴斬獲摧陷爾預奏功第賞有差尚惟祗服可待制王堯臣知單州制敕提將之符顓制一道使紀律明于士衆忠實紀于朝廷然後為國藩垣能稱其位具官某統治晉陽冝知其任而西伐之卒北有逋亡繼形奏陳皆以疾苦無直繩肅下之誼有浮言罔上之迹雖付之刺督考驗甚明而既更詔恩法當貸爾俾仍近職往守偏州尚自省循兹為薄責可鄧忠臣母周氏封縣太君制敕具官某母某氏爾子忠臣有勞應賞願更寵典以啓爾封俾錫命書兹為異數尚惟祗服以稱茂恩可杜常兵部郎中制敕具官某朕為保五之法寓戰陳之教𣣔使兵與農合庶幾先王之迹夏官之屬實參典領以材擢爾往祗厥序夫能奬誘服田之人恱趨講武之政馴致有漸而彌綸不疏惟無廢爾之勤可以承朕之志可李士京韓宗文大理寺主簿制敕具官李士京等察治犴獄之官勾稽簿領之事往祗選用無懈厥修可許懋兩浙運副制敕具官某朕擇遣使者分部而治雖以將漕為稱然實總民政之舉措察吏屬之能否蓋連數十城之地舉而屬之其選豈不重哉爾詳練敏明冝服豫采蓋爾之聀非止于督賦斂斷獄訟而巳惟除苛熄優可以使民遂其宜惟務實去華可以使吏馴其行宣恩德而美風俗待爾能善其官可不勉歟以祗朕命可內殿承制段綽等知州制敕具官某州有兵民之寄而地在疆埸之間則常擇用材武之臣屬之守禦之任爾以能選往祗厥服尚思綏靖以稱簡求可宗室承操新婦王氏進封國夫人制敕親愛之而欲其貴冨朕于公族皆推是心寵數徽章施于閨壷兹惟故事朕敢忘哉具官某新婦某氏作合宗藩躬有乂德啓兹全國用進爾封以致朕尊奬近屬之恩尚懋爾服承休顯之稱可宗室克懼復官制敕具官某屬在近親享有榮祿以愆坐法亦既再期稽于故常冝服位等勉思祗飾稱此茂恩可李德明遙郡團練使制敕具官某擐甲執兵人之重任賞信而速所以勸功爾忠力武材稱于種落往殱醜類屢以捷聞啚爾之勞進位二等益思奮勵以待異恩可陳景等尚書省主事令史敕某中臺政本主曺事治文書亦不可不屬之其人爾往懋哉皆仍舊秩可拆克行彭保轉官制敕具官某朕惟羌之猖狂內相賊虐致大之罰爰命六師開通道塗收復城聚摧堅獲醜爾功居多蓋夫軍賞之行速則衆勸是用進爾之秩以激士心尚有不次之恩以待非常之效可程嗣恭祖無頗程博文開封府推官制敕具官某開封天下之聚俗雜五方之民蓋巧偽繁興獄訟滋出贊治之任考擇維艱以爾為能俾祗厥服夫慈惠足以煦飬惸弱剛嚴足以帖伏姧強然導民之方尚有可識使風俗有以粹美而四方有以觀則往助爾長其尚懋哉可李憲武勝軍莭度觀察留後制敕王師西出士大夫皆奮力行陳有尺寸之功者朕無不録况議勞數實有大于此者其于信賞朕敢忘哉具官某比自臨洮率衆躬將摧殪醜虜恢復故疆鼓行羌中屢以捷告敀按閥閲朕用寵嘉祕殿榮名便藩留務兼是茂渥以奬爾庸其往茂哉益思來效可李靖臣王存趙彥若曽肇轉官制敕惟朕祖考成功盛德覆𬒳天下固非文字可得而名然史記册書國家之典上以紀先帝言動之迹下以及群臣善惡之實傳之萬世宜有論次具官某以文學選用與成信書朕惟汝嘉是用褒進尚其祗服以稱朕恩李舜舉等轉官制敕具官某朕惟先帝功德之殊宜見之方册故詔擇儒臣屬之論撰而爾于其宮次與有祗事之勤亦既書成例當褒録進升位等其尚欽承可皇伯滕王第十六女封縣主制敕具官某第十六親在近屬生而懿柔宜開縣甸之封以榮湯沐之號惟惇序爾尚欽承可元豐類藁卷第二十一
