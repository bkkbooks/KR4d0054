body:
  text: 書上歐陽學士第一書學士執事夫世之所謂大賢者何哉以其明聖人之心于百世之上明聖人之心于百世之下其口講之身行之以其餘者又書存之三者必相表裏其仁與義磊磊然橫天地冠古今不窮也其聞與實卓卓然軒士林猶雷霆震其風颷馳不浮也則其謂之大賢與穹壤等高大與詩書所稱無間冝矣夫道之難全也周公之政不可見而仲尼生于干戈之間無時無位存帝王之法于天下俾學者有所依歸仲尼既沒析辨詭詞驪駕塞路觀聖人之道者冝莫如于孟荀楊韓四君子之書也舍是醨矣退之既沒驟登其域廣開其辭使聖人之道復明于世亦難矣哉近世學士飾藻繢以誇詡增刑法以趨嚮析財利以拘曲者則有聞矣仁義禮樂之道則為民之師表者尚不識其所為而况百姓之蚩蚩乎聖人之道泯泯沒沒其不絶若一髮之係干鈞也耗矣哀哉非命世大賢以仁義為巳任者嚋能救而振之乎鞏自成童聞執事之名及長得執事之文章口誦而心記之觀其根極理要撥正邪僻掎挈當世張皇大中其深純溫厚與孟子韓吏部之書為相唱和無半言片辭踳駮于其間真六經之羽翼道義之師祖也既有志于學于時事萬亦識其一焉則又聞執事之行事不顧流俗之熊卓然以豐道扶教為巳務往者推吐赤心敷建大論不與高明獨授摧縮俾蹈正者有所稟法懷疑者有所問執義益堅而德亦高出乎外者合乎內推于人者誠于巳信所謂能言之能行之既有德而且有言也韓退之汝觀聖人之道者固在執事之門矣天下學士有志于聖人者莫不攘𬒮引領願受指教聽誨諭宜矣竊計將明聖人之心于百世之下者亦不以語言退託而拒學者也鞏性朴陋無所能似家世為儒故不業他自幼逮長努力文字間其心之所得庶不凡近嘗自謂于聖人之道有絲髮之見焉周逰當丗常斐然有扶哀救缺之心非徒嗜皮膚隨波流搴枝葉而已也惟其寡與俗人合也于公卿之門未嘗有姓名亦無逹者之車回願其踈賤抱道而無所與論心常憤憤悱悱恨不發也今者乃敢因簡墨布腹心于執事苟得望執事之門而入則聖人之堂奧室家鞏自知亦可以少分萬一于其間也執事將推仁義之道橫天地冠古今則宣取竒偉閎通之士使趨理不避榮辱利害以共爭先王之教于衰滅之中謂執事無意焉則鞏不信也若鞏者亦粗可以為多士先矣執事其亦受之而不拒乎伏惟不以巳長退人察愚言而矜憐之知鞏非苟慕執事者慕觀聖人之道于執事者也是其存心亦不凡近矣若其以庸衆待之尋常拒之則鞏之望于世者愈狹而執事之循誘亦未廣矣竊料有心于聖人者固不如是也覬少垂意而圖之謹獻雜文時務䇿兩編其傳繕不謹其簡秩大小不均齊鞏貧故也觀其內而略其外可也干凂清重悚仄悚仄不宣鞏再拜歐陽學士第二書學士先生執事伏以執事好賢樂善孜孜于道德以輔時及物為事方今海內未有倫凡有文章智謀材力之雄偉挺特信韓文公巳耒一人而巳某之獲幸于左右非有一日之素賔客之談率然自進于門下而執事不以衆人待之坐而與之言未嘗不以前古聖人之至德要道可行于當今之世者使鞏薰蒸漸漬忽不自知其益而及于中庸之門户受賜甚大且感且喜重念鞏無似見棄于有司環視其中所有頗識涯分故執罷之𥘉釋然不自動豈好大哉誠其材資召取之如此故也道中來見行有操瓢囊負任晚車挈携老弱而東者曰某土之名避旱䁧飢饉與征賦徭役之事將徙占他郡覬得水漿藜糗竊若旦暮行且戚戚懼不克如願書則奔走在道夜則無所答寄焉若是者所見殆不減百千人因竊自感幸生長四方無事時與此民均𬒳朝廷德澤􅉼飬靣獨不識撥襫耞耒辛若之事旦暮有衣食之給及一日有文移發召之警則又承籍世德不蒙矢石備戰守馭車㒒焉數千里饋餉自少至于長業乃以詩書文史其蚤暮思念皆道德之事前世當今之得失誠不能盡辭亦庶幾識其一二逺者太者焉今雖群進于有司與衆人偕下名字不列于薦書不得比數于下士以望主上之休光而尚獲收齒于大賢之門道中來又有鞍馬㒒使代其勞以執事于道路至則可力求簞食瓢飲以攴旦暮之飢餓比此民綽綽有餘𥙿是亦足以自慰矣此事屑屑不足為長者言然辱愛幸之際不敢自外于門下故復陳説覬執事知鞏居之何如所深念者執事每日過吾門者百千人獨于得生為喜及行之日又贈序引不以規而以賞識其愚又嘆嗟其去此鞏得之于衆人尚宜感知已之深懇惻不忘况大賢長者海內所師表其言一出四方以卜其人之輕重某乃得是是宜感戴欣幸信萬于尋常可知也然此實皆聖賢之志業非自知其材能與力能當之者不宜受此此鞏既蔩緣幸知少之所學有分寸合于聖賢之道既而又敢不自力于進修哉日夜克若不敢有愧于古人之道是亦為報之心也然恨資性短缺學出巳意無有師法覬南方之行李時枉筆墨特賜教誨不惟增踈賤之光明抑實得以刻心思銘飢骨而佩服矝式焉想惟循誘之力無所不至曲借恩力使終人材無所愛惜窮陋之迹故不敢望于衆人而獨注心于大賢也徒恨身奉甘旨不得旦夕于几杖之側稟教誨俟講畫不勝馳戀㥪之至不宣鞏再拜上歐陽舍人書舍人先生當世之急有三一曰急聽賢之為事二曰急𥙿民之為事三曰急力行之為事一曰急聽賢之為事夫主之于賢知之未可以已也進之未可以巳也聽其言行其道于天下然後可以已也能聽其言行其道于天下在其心之通且杲也不得其通且杲未可以有為也苟有為猶膏肓之不洽譬癃痺之老也以古今治亂成敗之理入告之不解則極論之其心既通也以事之利害是非請試擇之能擇之試請行之其心既杲也然後可以有為也其為計雖遲其成大效于天下必速𣣔其如此莫若朝夕出入在左右而不使邪人庸人近之也朝夕出入在左右侍臣之任也議復之其可也一不聽則再進而議之再猶未也則日進而議之待其聽而後已可也置此雖有他事未可以議也昔漢殺蕭望之是亦有罪焉宣帝使之傳太子其不以聖人之道導之也則何賢乎望之也其導之而未信而止也則望之不得無罪焉為太子責備于師傳不任其責也則責備于侍臣而已矣雖艱而勤其可以已也歟今世賢士上以知而進之矣然未免于庸人邪人雜然而處也于事之益損張弛有戾焉不辨之則道不明肆力而與之辨未必全也不全則人之望已矣是未易可忽也就其所能而為之則如勿為而已矣如是者非主心通且果則言未可望聽道未可望行于天下也尋其本不如愚人之云爾不可以有成也二曰急𥙿民之為事夫古以來可質也未有民富且安而亂者也其亂者率常民貧而且不安也天下為一殆八九十年矣靡靡然食民之食兵者佛老也或曰削之則怨且戾是以執事望風殫言所以救之之䇿今募民之集而為兵者擇矌土而使之耕暇而肄武遞入而為衛因弛舊兵佛老也止今之為者舊徒之盡也不日矣是不召怨與戾而易行者也則又量上之用而去其浮是大費可從而減也推而行之則末利可弛本務可興富且安可幾而待也不然恐今之民一二歲而為盜者莫之能禦也可不為大憂乎他議紛紛非救民之務也求救民之務莫大于此也不謀此能致富且安乎否也三曰急力行之為事夫臣民父子兄弟夫婦朋友皆不為其所宜亂之道今之士悖理甚矣故官之不治不易而使能則國家雖有善制不行也𣣔易而使能則一之士以士之如此而况民之沒沒與一有駭而動之者𣣔其效死而不為非不得也今者更貢舉法數十百年弊可謂盛矣書下之日戾夫懼怠夫自勵近丗未有也然此尚不過強之于耳目而巳未能心化也不心化賞罰一不振焉必解矣欲治之于其心則顧上與大臣之所力行如何爾不求之本斯巳矣求之本斯不可不急也或曰適時而巳耳是不然今時謂之耻且格焉不急其本可也不如是未見適于時也九此三務是其最急又有號令之不一任責之不明當亦速變者也至于學者䇿之經義當矣然九經言數十萬餘注義纍倍之旁又貫聮他書學而記之乎雖明者不能盡也今𣣔通䇿之責人之所必不能也苟然則學者必不精而得人必濫𣣔反之則莫若使之人占一經一也夫經于天地人事無不備者也患不能通豈患通之而少邪况詩賦論兼出于他經丗務待子史而後明是學者亦無所不習也此數者近皆為蔡學士道之蔡君深信望先生共成之孟子稱鄉鄰鬪𬒳髮纓冠而往救之則惑然觀孟子周行天下𣣔以其道及人至其不從而去猶曰王庶幾改之則必居豫此其心汲汲何如也何獨孟子然孔子亦然也而云云者蓋以謂顔子既不得位不可以不任天下之事責之耳故曰禹稷顔子易地則皆然是也不得位則止乎不止也其止者蓋止于極也非謂士者固若徂猿然無意于物也况鞏于光生師仰巳久不宜有間是以忘其賤而言也顛賜之宋擇以其意少施焉鞏間居江南所為文無愧于四年時所𣣔施于事者亦有待矣然親在憂患中祖母日愈老細弟妹少無以資衣食恐不能就其學况欲行其他也今者𣣔奉親數千里而歸先生會須就州學𣣔入太學則日巳迫遂棄而不顧則望以充父母飬者無所勉從此豈得巳哉韓吏部云誠使屈原孟軻楊雄司馬遷相如進于是選僕知其懷慚乃不自進而巳爾此言可念也失賢師長之鐫切而與衆人處其不陷于小人也其幾矣早而興夜而息欲須臾愜然于心不能也先生方用于主上日入謀議天下日夜待為相其無意于鞏乎故附所作通論雜文一編先祖述文一卷以獻先祖困以殁其行事非先生傳之不顯願假辭刻之神道碑敢自撫州傭僕夫往伺于門下伏惟不罪其愚而許之以永賚其子孫則幸甚幸甚鞏之友王安石文甚古行甚稱文雖巳得科名居今知安石者尚少也彼誠自重不願知其人嘗與鞏言非先生無足知我也如此人古今不常有如今時所急雖無常人千萬不害也顧如安石不可失也先生儻言馬進之于朝廷其有輔於天下亦書其所為文一編進左右幸觀之庶知鞏之非妄也鄙心惓惓其大氐雖如此其詳可得而具邪不宣鞏再拜上蔡學士書慶曆四年五月日南豐曽鞏謹再拜上書諌院學士執事朝廷自更兩府諌官來言事者皆為天下賀得人而巳賀之誠當也顧不賀則不可乎鞏嘗靜思天下之事矣以天下而行聖賢之道不古聖賢然者否也然而古今難之者豈無異焉邪人以不巳利也則怨庸人以已不及也則忌怨且忌則造飾以行其間人主不窹其然則賢者必疏而殆矣故聖賢之道往往而不行也東漢之末是已今主上至聖雖有庸人邪人將不入其間然今日兩府諌官之所陳上巳盡白而信邪抑未然邪其已盡白而信也尚懼其造之未深臨事而差也其未盡白而信也則當屢進而陳之待其盡白而信造之深臨事而不差而後已也成此美者其不在于諌官乎古之制善矣夫天子所尊而聽者宰相也然接之有時不得數且父矣惟諌官隨宰相入奏事奏已宰相退歸中書蓋常然矣至于諌官出入言動相綴接蚤暮相親未聞其當退也如此則事之夫得蚤思之不待暮而以言可也暮思之不待越宿而以言可也不諭則極辨之可也屢進而陳之宜莫若此之詳且實也雖有邪人庸人不得而間焉故曰成此美者其不在于諌官乎仐諌官之見也有間矣其不能朝夕上下議亦明矣禁中之與居女婦而已爾捨是則寺人而已爾庸者邪者而巳爾其于冥冥之間議論之際豈不易行其間哉如此則鞏見今日兩府諌官之危而未見國家天下之安也度執事亦巳念之矣苟念之則在使諌官侍臣復其聀而巳安有不得其聀而在其位者歟噫自漢降戾後丗士之盛未有若唐也自唐太宗降戾後世士之盛亦未有若今也唐太宗有士之盛而能成功洽今有士之盛能行其道則前數百年之弊毋不除也否則後數百年之患將又興也可不為深念乎鞏生于逺厄于無衣食以事親仐又將集于鄉學當聖賢之時不得祗京師而一言故敢布于執事并書所作通論雜文一編以獻伏惟執事莊士也不拒人之言者也願賜觀覽以其意少施焉鞏之友王安石者文甚古行稱其文雖巳得科名然居今知安石者尚少也彼誠自重不願知于人然如此人古今不常有如今時所急雖無常人千萬不害也顧如安石此不可失也執事儻進于朝廷其有輔于天下亦書其所為文一編進左右庶知鞏之非妄也上杜相公書慶曆七年九月日南豐曽鞏再拜上書致政相公閣下鞏聞夫宰相者以已之材為天下用則用天下而不足以天下之材為天下用則用天下而有餘古之稱良宰相者無異焉知此而巳矣舜嘗為宰相矣稱其功則曰舉八元八凱稱其德則曰無為者其舜也與卒之為宰相者無與舜為比也則宰相之體其亦可知也巳或曰舜大聖人也或曰舜逺矣不可尚也請言近近可言者莫若漢與唐漢之相曰陳平對文帝曰陛下即問決獄責廷尉問錢榖責洽栗內史對周勃曰且陛下問長安盜賊數又可強對邪問平之所以為宰相者則曰使卿大夫各得在其職也觀平之所自任者如此而漢之治莫盛于平為相時則其所守者可謂當矣降而至于唐唐之相曰房杜當房杜之時所與共事則長孫無忌岑文本主諌諍則魏鄭公王圭振綱維則戴胄劉洎持憲法則張元素孫伏伽用兵征伐則李績李靖長民守土則李大亮其餘為卿大夫各任其事則馬周溫彥博杜正倫張行成李綱虞丗南禇遂良之徒不可勝數夫諌諍其君與正綱維持憲法用兵征伐長民守土皆天下之大務也而盡付之人又與人共宰相之任又有他卿大夫各任其事則房杜者何為者邪考于其傳不過曰聞人有善若巳有之不以求備取人不以巳長格物隨能收敘不隔卑賤而巳卒之稱良宰相者必先此二人然則著于近者宰相之體其亦可知也巳唐以降天下未嘗無宰相也稱良相者不過其一二大莭可道語而巳能以天下之材為天下用真知宰相體者其誰哉數歲之前閣下為宰相當是時方人主急于致天下治而當世之士豪傑魁礨者相繼而進雜遝于朝雖然邪者惡之庸者忌之亦甚矣獨閣下奮然自信樂海內之善人用于卋爭出其力以唱而助之惟恐失其所自立使豪傑者皆若素繇門下以出于是與之佐人主立州縣學為果日之格以勵學者課農桑以損益之數為吏升黜之法重名教以矯衰弊之俗奕苟且以起百官衆聀之墜革任子之濫明賞罰之信一切𣣔整齊法度以立天下之本而庶幾三代之事雖然紛而疑且排其議者亦衆矣閣下復毅然堅金石之斷周旋上下扶持樹植𣣔使其有成也及不合矣則引身而退與之俱否嗚呼能以天下之材為天下用真知宰相體者非閣下其誰哉使克其所樹立功德可勝道哉雖不克其志豈愧于二帝三代漢唐之為宰相者哉若鞏者誠鄙且賤然常從事于書而得聞古聖賢之道每觀今賢傑之士角立並出與三代漢唐相侔則未嘗不嘆其盛也觀閣下與之反復議而更張庶事之意知後有聖人作救萬事之弊不易此矣則未嘗不愛其明也觀其不合而散逐洧藏則未嘗不恨其道之難行也以嘆其盛愛其明恨其道之難行之心豈須臾忘其人哉地之相去也千里世之相後也千載尚慕而𣣔見之况同其時過其門墻之下也歟今也過閣下之門又當閣下釋衮冕而歸非干名蹈利者所超走之日故敢道其所以然而并書雜文一編以為進拜之資蒙賜之一覽焉則其願得矣噫賢閣下之心非繫于見否也而復汲汲如是者蓋其欣慕之志而巳耳伏惟幸察不宣鞏再拜上范資政書資政給事夫學者之于遁非處其大要之難也至其晦明消長弛張用捨之際而事之有委曲幾微𣣔其取之於心而無疑發之于行而無擇推而通之則萬變而不窮合而言之則一致而巳是難也難如是故古之人有斷其志雖各合于義極其分以謂備聖人之道則未可者自伊尹伯夷展禽之徒所不免如此而孔子之稱其門人曰德行文學政事言語亦各殊科彼其材于天下之選可謂盛矣然獨至于顔氏之子乃曰用之則行舍之則藏唯我與爾有是夫是所謂難者久矣故聖人之所教人者其晦明消長弛張用舍之際極大之為無窮極小之為至隱雖他經靡不同其意然尤委曲其變于易而重復顯著其義于卦爻彖象繫辭之文欲人之可得諸心而惟所用之也然有易以耒自孔子之時以至于今得此者顔氏而巳爾孟氏而巳爾二氏而下孰為得之者歟甚矣其難也若鞏之鄙有志于學常懼乎其明之不逺其力之不強而事之有不得者既自求之又𣣔交天下之賢以輔而進繇其磨礱灌溉以持其忘飬其氣者有矣其臨事而忘其自返者豈得巳哉又懼乎陷溺其心以至于老而無所庶幾也嘗聞而論天下之士豪傑不世出之材數百年之間未有盛于斯時也而造于道尤可謂宏且深更天下之事尤可謂詳且博者未有過閣下也故閣下嘗履天下之任矣事之有天下非之君子非之而閣下獨曰是者天下是之君子是之而閣下獨曰非者及其既也君子皆自以為不及天下亦曰范公之守是也則閣下之于道何如哉當其至於事之幾微而講之以易之變化其豈有不盡者邪夫賢乎天下者天下之所慕也况若鞏者哉故願聞議論之詳而觀所以應于萬事者之無窮庶幾自寤以得其所難得者此鞏之心也然閣下之位可謂貴矣士之願附者可謂衆矣使鞏也不自别于其間豈獨非鞏之志哉亦閣下之所賤也故鞏不敢為之不意閣下𣣔收之而教焉而辱召之鞏雖自守豈敢固于一邪故進于門下而因自敘其所願與所志以獻左右伏惟賜省察焉上齊工部書鞏嘗謂縣比而聽于州州比而􅈦于部使者以大較言之縣之民以萬家州數倍于縣部使者之所治十倍于州則部使者數十萬家之命也豈輕也哉部使者之門授天子之令者之焉凡民之乎曲直者之焉辨利害者之焉為吏者相與就而質其為吏之事也為士者相與就而質其為士之事也三省鄰部之政相聞書相移者又未嘗聞焉其亦煩矣執事為部使者于江西鞏也幸齒于執事之所部其飾容而進謁也敢質其為士之事也鞏世家南豐及大人謫官以還無屋廬田園于南豐也祖母年九十餘諸姑之歸人者多在臨川故祖母樂居臨川也居臨川者久矣遇學之制凡入學者不三百日則不得舉于有司而鞏也與諸弟循僑居之文𣣔學于臨川雖巳疏于州而見許矣然不得執事一言轉牒而明之有司或有所疑學者或有所緣以相嫉私心未敢安也耒此者數日矣欲請於門下未敢進也有同進章適耒言曰進也執事禮以俟士明以伸法令之疑適也寓籍于此既往而受賜矣尚自思曰鞏材鄙而性野其敢進也歟又自解曰執事之所以然伸法令之疑也伸法令之疑者不為一人行不為一人廢為天下公也雖愚且野可進也是以敢具書而布其心焉伏惟不罪以其為煩而察之賜之一言而進之則幸甚幸甚與撫州知州書士有與一時之士相參錯而居其衣服食飲語默止作之莭無異也及其心有所獨得者放之天地而有餘斂之秋毫之端而不遺望之不見其前躡之不見其後巋乎其高浩乎其深燁乎其光明非四時而信非風雨雷電霜雪而吹噓澤潤聲鳴嚴威烈之乎公卿徹官而不為泰無匹夫之勢而不為不足天下吾賴萬世吾師而不為大天下吾違萬世吾異而不為貶也其然也豈翦翦然而為潔婞婞然而為諒哉豈沾沾者所能動其意哉其與一時之士相參錯而居豈惟衣服飲食語默止作之莭無異也凡與人相追接相恩愛之道一而巳矣若夫食于知人之境而出入于其里進焉而見其邦之大人亦人之所同也安得而不同哉不然則立異矣翦翦然而巳矣婞婞然而巳矣豈其所汲汲為哉鞏方慎此以自得也於執事之至而始也自疑于其進焉既而釋然故具道其本末而為進見之資伏惟少賜省察不宣鞏再拜與孫司封書運使司封閣下竊聞儂智高未反時巳奪雍邑地有之為更者不能禦因不以告皇祐三年雍有白氣起廷中江水撗溢司户孔宗旦以為兵象䇿智高必反以書告其將陳拱拱不聽宗旦言不巳拱怒詆之曰司户狂邪四年智髙出橫山略其寨人因其倉庫而大賑之宗旦又告曰事急矣不可以不戒拱又不從凡宗旦之于拱以書告者七以口告者多至不可數度拱終不可得意即載其家走桂州曰吾有官守不得去吾親母為與死此既行之二日智高果反城中皆應之宗旦猶力守南門為書召鄰兵𣣔拒之城亡智高得宗旦喜用之宗旦怒曰賊汝今立死吾豈可汙邪罵不絶口智高度終不可下乃殺之當其𥘉使宗旦言不廢則雍之禍必不發發而吾有以待之則必無事使獨有此一善固不可不旌况其死莭堂堂如是而其事未白于天下比見朝廷所寵贈南兵以耒仗莭死難之臣宗旦乃獨不與此非所謂曲突徙薪無恩澤蕉頭爛額為上客邪使宗旦𥘉無一言但賊至而能死不去固不可以無賞蓋先事以為備全城而保民者冝責之陳拱非宗旦事也仐猥令與陳拱同戮既遺其言又負其莭為天下者賞善而罰惡為君子者樂道人之善樂成人之美豈當如是耶凡南方之事卒至于破十餘州覆軍殺捋喪元元之命竭山海之財者非其變發于隱伏而起于倉卒也內外上下有聀事者𥘉莫不知或隱而不言或忽而不備苟且偷託以至于不可禦耳有一人先能言者又為世所侵蔽令與罪人同罰則天下之事其誰復言耶聞宗旦非獨以書告陳拱當時為使者于廣東西者宗旦皆歷告之今彼既不能用懼重為巳纍必不肯復言宗旦嘗告我也為天下者使萬事已理天下已安猶須力開言者之路以防未至之患况天下之事其可憂者甚衆而當世之患莫大于人不能言與不肯言而甚者或不敢言也則宗旦之事豈可不汲汲載之天下視聽發揚褒大其人以驚動當世耶宗旦喜學易所為注有可采者家不能有書而人或質問以易則貫穿馳騁至數十家皆能言其意事祖母盡心貧幾不能自存好議論喜功名鞏嘗與之接故頗知之則其所立亦非一時偶然發也世多非其在京東時不能自重至為世所指目此固一眚今其所立亦可贖矣鞏𥘉聞其死之事未敢決然信也前後得言者甚衆又得其弟自言而聞祖袁州在廣東亦為之言然後知其事使雖有小差要其大槩不誣也况陳拱以下皆覆其家而宗旦獨先以其親遁則其有先知之效可知也以其信之喜事則其有先言之效亦可知也以閣下好古力學志樂天下之善又方使南方以賞罰善惡為職故敢以告其亦何惜須臾之聽尺紙之議博問而極陳之使其事白固有輔于天下不獨一時為宗旦發也伏惟少留意焉如有未合願賜還答不宣鞏頓首再與歐陽舍人書鞏頃嘗以王安石之文進左右而以書論之其略曰鞏之友有王安石者文甚古行稱其文雖巳得科名然居今知安石者尚少也彼誠自重不願知于人然如此人古今不常有如今時所急雖無常人千萬不害也顧如安石此不可失也書既逹而先生使河北不復得報然心未嘗忘也近復有王回者王向者父平為御史居京師安石于京師得而友之稱之曰有道君子也以書來言者三四猶恨鞏之不即見之矣則寓其文以耒鞏與安石友相信甚至自謂無愧負于古之人覽二子之文而思安石之所稱于是知二子者又魁閎絶特之人不待見而信之已至懷不能隱輒復聞於執事三子者卓卓如此樹立自有法度其心非苟求聞于人也而鞏汲汲言者非為三子者計也蓋喜得天下之材而任聖人之道與世之務復思若鞏之淺狹滯拙而先生遇甚厚懼巳之不稱則𣣔得天下之材盡出于先生之門以為報之一端耳伏惟垂意而察之還以一言使之是非有㝎焉回向文三篇如别録不宣鞏再拜元豐類藁卷之十五
