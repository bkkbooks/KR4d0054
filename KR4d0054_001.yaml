front:
  text: 南豐先生元豐類藁卷之一古詩
  hash: sha256:a201cc438ae10c799709a11fade7315a5036e93a221d8401d4fdd55c222c954e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_001-1a}
body:
  text: 冬望霜餘荆吳倚天山鐡色萬仞光鋩開麻姑最秀插東極一峯挺立高嵬嵬我生智出豪俊下逺迹久此安蒿萊譬如驊騮踏天路六轡豈議收駑駘巔崖𥘉冬未冰雪蘚花入履思莫裁長松夾樹蓋十里蒼顔毅氣不可廽浮雲柳絮誰汝礙欲往自尼誠愚哉南窗聖賢有遺文滿簡字字傾琪瑰旁搜逺探得户牖入見奧作何雄魁日令我意失枯稿水之灌養源源來千年大説沒荒冗義路寸土誰能培嗟豫計真不自料欲挽白日之西頽嘗聞古者禹稱智過門不暇慈其孩况今虺人冒狀任力蹶豈更餘纎埃龍潭瀑布入胸臆歎息但謝宗與雷者書豈即遽有輔天下自古無能才一鶚北風萬里開蓬蒿山木洶洶鳴波濤嘗聞一鶚今始見眼駿骨緊精神豪天昏雪密飛轉疾暮略東海朝臨洮社中神狐倐閃內腦尾分磔垂弓櫜巧兔獰雞失草本勇鷙一下崩其毛窟穴􅊯􅊯哭九子帳前活送雙青猱啁啾燕雀誰爾數駭散亦自亡其曺勢疑空山竭丸澤殺氣巳應太白髙歸來磊嵬載爼豆快飲百甕行春醪灑酣始聞壯士嘆丈夫試用何時遭宿尊勝院朝寒陟山砠宵雨集僧堂蔽衣蓋苦短客卧夢不長鳴風木間起枯稿欲僵向來雪雲端葉下百仞隍起攀蒼崖望正受萬慮戕歲運忽當爾我顔安得芳傳聞羡門仙飛身憩蒼蒼誰能乞其靈相與超八方苦雨霧圍南山鬱冥冥狹谷荒風驅水聲秪疑日失黃道去又見雨含滄海生如催病骨疼寒入似送客心衰思驚楊州青銅不在照應有白鬢添數莖里社郊天社地君所重翦秸刲匏微得供秦皇漢帝陋古初桀畤殊壇傾力奉年年屬車九重出羽衛千人萬人從黃金日搜盡崖窟飛檣走箠華夷動馬蹄一作鳥啼路南村有社里老邀神迎且送荒林破屋風雨入野鼠山狐狼籍共何言茅箸古瓦甌稻飯豚蹄人得用南源莊床上不廢看青山門前便踏南澗路繞牆頓失車馬喧岸幘日得滄州趣嘗嗟秋蓬轉未有茆屋據對此耳目新始覺精爽聚滄溟未可泛舟入鴈蕩誰能胝足去醫閭在夷蠻羅浮苦煙霧子真自愛谷口家孔丘老亦洙泗住吾能放意遊八極此興久與前賢附悄然怪我思慮深已欲槯倒聞猿樹眼前了了破青坂屈椽小㨂隨晴具野柔川深春事來筍鞋瞑戛青雲步秫田試犢耕早風茗圃分籃摘霄露竹林掃月散絺葛雪艇搜溪出魴鱮帽塵便可臨水濯里鬪何妨閉門拒介推母厭俗久思顛崖住不顧梁鴻妻亦高能快穿衣與藜茹成家儻已嫁諸妹有立不憂吾弟孺攘攘天地間萬類殊好惡歡合無一非暌窮有百牾吾獨安能逐毛髮飲泉食力從所慕論交德操龐公林下時入門豈復知客主夷吾鮑叔貧賤間分財亦不辭多取相傾頓使形迹空素定巳各肝膽許世間未信亦論交得失秋毫有乖忤南軒木端青崖軒慘淡寒日暮鳴鳩巳安巢飛鵲尚求樹物情限與奪兹理奚以據諒知巧者勞豈得違所賦久無胸中憂頗識書上趣聖賢雖山丘相望心或庶兵間大義缺絶久未圖小人輕險何不至世上固自有百為兵間乃獨求一試趙括敢將亦巳危李平請守那復議吁嗟忍易萬人生冀幸將徼一身利種園於陵為人灌園𬞞我今園地不自種惰慵苟恃鄉井助緩急孰與朋友共支離有疾上雖恕陳平不事家焉用著書儻得一言利長者或許酬內訟歎嗟夜嘆不為絺綌單晝嗟不為薇蕨少天弓不肯射胡星攙搶久已躔朱鳥徐揚復憂羽蟲孽襄漢正病昭回杳力能懷畏未足憂憂在此極群隂繞寄孫之翰孫侯腹載天下書崔嵬豈啻重百車伏羲以來可悉數孰若自作何有餘更能議論恣傾倒萬里一瀉崑崙渠誰為胸中斡太極元氣浩浩隨卷舒昔來諌官對天子何穢不欲親芟鋤不容乃獨見磊落出走並海飄長𥚑孫侯風節何所似雪洗八荒看水虛親如國忠眼不顧舊若張禹手所除歸來已絶褒貶筆進用祗調敖倉儲合持詩書白虎論更護日月金華居萬世根深固社稷百年舊叟休田閭素識孤生愛茆屋久將老母求山砠秋歸願事九江穫夜出未捲安豐漁孔明苟欲性命遂孟子豈病王公踈塵埃未得見此樂太息一付西江魚豪傑老哺薇蕨西山翁樂傾瓢水陋巷士不顧無復問周公可歸乃獨知孔子自期動即重丘山所去何啻輕粳粃耴合悠悠冨貴兒豈知豪傑心之耻侯荆侯嬴夷門白髮翁荆軻易水竒節士偶邀禮數車上足暫飽腥羶館中侈師回拔劒不顧生酒酣拂衣亦送死磊落高賢勿笑今豢養傾人久如此黃金陳侯坐收百戰楚呂氏行取萬乘秦田生立顧開兩國陸公微辭交二臣道旁白日忽再去囊中黃金如有神何須首陽二夫子不是丸鼎輸西鄰楊顔楊雄纂言準仲尼顔氏為身慕虞舜千里常憂及門止為山更欲一簣進小人君子在所蹈烈士貪夫不同徇安得蠢蠢尚自恕百年過眼猶一瞬橙子家林香橙有兩樹根纒鐡鈕凌坡陀鮮明百數見秋實錯綴衆葉傾霜抲翠羽流蘇出天仗黃金戲毬相蕩摩入苞豈數橘柚賤芼䁀始足鹽梅和江湖苦遭俗眼慢禁蘌尚覺凡木多誰能出口獻天子一致大樹凌滄波山檻小飲變秋長雲豪灑雨北風壯餘熇尚爭威積晦頗異狀山回攢楓顛屋立懸狖上飲檻聚石為歌筵注溪當歡言久喧譁罷興一怊悵旅人正飄颻豈得諧放蕩胡使南粟鱗鱗多送北北兵林林長僃胡胡使一來太梁下塞頭彎弓士如無折衝素恃將與相大策合副艱難須還來里閭索窮下斗食尺衣皆北輸中厚相觀歎失色馬騎日肥妖氣粗九州四海盡帝有何不用胡藩北隅上翁領放車秋崖望所得過舊聞𥘉疑古軸畫山水秋毫分時見崖下雨多從衣上雲濯足行上側心憂踏天文八荒正搖落獨餘草木薰但覺耳目勝未知筋力勤顛毛巳種種世患方紛紛何當嘯呤此日與樵蘇群雜詩四首張陳貧時交干戈忽相逐范蔡憎嫌人卒自歸鼎軸害奪怨為欣利歐愛成戮世間不可料人事常反覆日磾斷內討坐享七世榮霍光徇所愛兩亡家與名卓闊俱抗志纎微獨紆情得失萬世視長令壯夫驚皇皇謁荆人伈伈遵陽虎及覺一禮亡翩然遂違魯全身有遜接直道無苟處故稱聖如龍屈伸兹可覩揮挾謝幽側騰身集崔嵬心胎太極氣手揚斗間魁荒荆忽成挂蟄鱗冬有雷君看九州寶自入朱門來欲求天下友𣣔求天下友試為滄海行風來冥冥內擺觸怪浪生突兀萬里怒勢疑九州傾鯨鵬不自保况此一舟輕我徒幸來即可留石根耕日將書上客共須天地清冬暮感懷荒山未有雪野水不見氷一臘今已半浮陽壯猶矜奈此一歲除未有嚴氣升坐思空洞間負雪山千層雖受凛冽僵愈此穢濁蒸感激崑崙祗一氣吹丘陵炎埃滅無遺古色萬里興我病一洗濯懷抱失所憎因思大羽獵屬車上崚嶒六軍騎皆駿爭先雪中登天時傾人意踴躍士氣增大義雖不殺四方懾兵􅏢今此效安在東南塞猶乘將帥色淍稿蚍蜉勢趫騰慘錯天運內止戈信誰能寄舍弟新霖洗窮臘東南始知寒驚我千里意覺汝征途難空江桂風席扁舟與誰安羇旅費亦久橐衣豈無單念汝西北去壯心始桓桓竟逄有司惑斥走懷琅玕士固有大意秋毫豈能干所憂道里困久無一樽歡我意生惻惻為之却朝餐人生飄零內何處懷抱寬已期採芝藥握手青霞端無令及門喜淹留雪霜殘至荷湖二首鐡色對我馬林林路南山草根巳變緑氷雪尚滿顔解鑣蒼煙腳我栖就柴關乖時遭飄躓豈免生事艱夙意待周孔此士豈可還濁醪且斟酌收心一瓶間悲風我眼澀酸狖我耳愁我顛水沒馬我起雪滿裘百里不逢人豈有煙火投却倚青璧望白霧滿九州蒼蒼運乃爾何地寬我憂夜卧夢成魘猶疑拔山秋送徐竑著作知康州溪蠻昔負命殺氣凌南州城郭漲煙火堂皇嘯蜉蝣𬒳髮盡冠巾吾人反縲囚行剽至抄忽歸載越山丘驅攘事雖定收合信瘡疣不有異澤霑何令餘患瘳寒風在林鳴君馬不能留𥘉佩太守章慨然任人憂問俗灰燼餘咄唶令人謀士材為世用因難乃知尤煩苛一蕩滌幽逺偏懷柔四封鳴雞犬五榖𬒳原疇里閭多娛宴歌鼓震溟陬明義每所希古人不難侔日月有常運志士無安輈山川自兹始努力千里遊詠雪北風蕭蕭鳴且歇短日悠悠生復滅朝含滄海滿天雲暮斷行人千里雪𥘉通壑谷氣先冷漸蔽郊原路疑絶併包華夷德豈薄改造乾坤事尤譎驅除巳與塵滓隔濯溉終令枯稿恱相持始信竹柏徑易敗可嗟萑葦折條垂巧綴如自愛眢井隨形呀且缺飛擔䡾䡾駕長浪巨璧林林倚精鐡弊衣或有骭猶凍荒宴誰能耳偏熱壯夫撫劒生鋭氣志士扄門養高節已開襟胸絶煩憒更足溝塍慰空竭雖無酒醴發嘲笑亦有詩謡恣搜抉新陽髣佛送鑱鑿舊徑參差分曲折留當屐齒印崖石徙倚長松看􅩩泬寫懷二首群生各有趣營慮自纒結名網智巳羅利械愚所紲古今遞主客真贋兩興滅洗然大人意杳與能者别不必條蔓榮中自老根節曽非故饒培獨得較霜雪蛟龍無安舟虎兕有危轍將能此人追得匪合明哲荒城絶所之歲暮浩多思病眼對山湖孤吟寄天地用心長者間巳與兒女異况排千年非獨抱六經意終非常情度豈輔當世治幽懷但自信盛事皆空議氣昏繁霜多節老寒日駛局促去朋友咄唶牽夢寐將論道精簏豈必在文字茅亭間坐荆門常書掩不必雲山深豈敢尚孤絶自能收寸心草萌𬒳逺徑鳥語遍喬林散帙味新趣鳴絃嘆餘音脫粟幸可飽一瓢方獨斟顔徒𬗟雖卓非此誰為尋盛服纏紫艾重印鑄黃金信使憂惴息詎無勤苦侵埃塵緇冠蓋霜露泫衣襟脅肩巳自昔俯首微獨今豈誰智所拙曽是力難任為樂聊在此焉知玉山岑靖安幽谷亭橫江捨輕楫對靣見青山行盡車馬塵豁見水石寰地氣方以潔崖聲落潺潺誰為千家縣正在清華間風煙凛人心世慮自可刪况無訟訴囂得有觴詠間常疑此中吏白首豈思還人情貴公卿燁燁就玉班光華雖一時憂悸或滿顔雞鳴巳爭馳驊騮振鑣鐶豈如此中吏日高未開關一不謹所守名聲别妖姧豈如此中吏一官老無癏愔愔謀謨消泪泪氣象孱豈如此中吏明心懾弦頑况云此中居一亭衆峯環崖聲夢猶聞谷秀坐可攀倚天巉巖姿青蒼露媥斕對之精神恬一作帖可謝世網艱人生慕虛榮斂收意常慳誠思此憂愈自應喜榛菅青雲亭間坐一登此亭高敻脫藩廡擁開顔廣軒闢吹面驚飈動城回石崖抱山亂寒湖湧谷草晚更芳沙泉細猶洶峥嶸四封壯縹渺加氣捧連天廣衢走拂日長簷聳區區射聲利浩浩奔蹄踵趍榮衆所便冒涉吾久恐緬想山水宅環觀松檜拱屬耳天籟樂脫身人事穴幽間味雖薄放蕩愚所勇窮凶勢猶競殺伐聲更訩揚揚斂臣貴燁燁官兵寵諒知草茅微無輔社稷重牧放手幽鞭耕鋤躬瘦隴尚或此心諧豈云吾道壅南豐先生元豐類藁卷之一
