front:
  text: 重刋南豐文集序南豐先生以文章名天下久矣異時齒髮壯志氣鋭其文章之慓鷙奔放雄渾瓌偉若三軍之朝氣猛獸之抉江湖之波濤煙雲之姿狀一何竒也方是時先生自負要似劉向不知韓愈為何如爾中間久外徙世頗謂偃蹇不偶一時後生輩鋒出先生泊如也晚還朝廷天下望用其學而屬新官制遂掌書命于是更置百官舊舍人無在者巳試即入院方除目填委占𥿄肆書𥘉若不經意午漏盡授草院吏上馬去凡除郎御史數十人所以本法意原職守而為之訓敕者人人不同咸有新趣而衍𥙿雅重自成一家始豫而為尚書郎掌付制吏部一日得盡觀始知先生之學雖老不衰而大手筆自有人也嗚呼先生用未極其學巳矣要之名與天壤相弊不可誣也王三槐序重刋南豐文集序畢南豐先生年譜序丹陽朱熹曰豫讀曽氏書未嘗不掩卷廢書而嘆何卋之知公淺也蓋公之攴高矣自孟韓子以來作者之盛未有至于斯夫其所以重于世者豈苟而云哉然卋或徒以是知之故知之淺也知之淺則于公之事論之猶不能無所抵牾而况于公之所以為書者宜其未有知之也然則世之自以知公者非淺而望與其可嘆也巳公書或頗有歲月參以史氏記及他書舊聞次之著于篇年譜序畢南豐先生年譜後序丹陽朱熹曰世有著書稱公文章者豫謂庶幾知公求而讀之湫然卑鄙知公者不為是言也然則世之自以知公者何如哉豈非徒以其名歟豫之説於是信矣其説又以謂公為史官薦邢恕陳無巳為英録檢討而二子者受學焉綜其實不然蓋熙寧𥘉詔開實録院論次英宗時事以公與檢討一月免豈公於是時而能有以薦士或其不然一也恕治平四年始登進士第元豐中用公薦為史館檢討與修五朝國史其事見于實録矣為實録院檢討而與修英録於熙寧之𥘉則未有考焉其不然二也師道見公於江漢之間而受教焉然竟公時為布衣元祐中乃用薦起家為郡文學是公於史館猶不得以薦之况熙寧時豈有撿討事哉其不然三也一事而不然者三則公所以教恕者其在元豐史館之時乎未可知也此豫所謂抵牾者斯人為世所重又自以知公故豫不得不考其實而辨其不然者其書世或頗有以故不論著其是非者焉南豐先生年譜後序畢南豐類藁目録卷之一
