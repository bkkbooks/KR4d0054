body:
  text: 古詩冬望一鶚宿尊勝院苦雨里社南源莊論交南軒兵間種園歎嗟寄孫之翰豪傑侯􅍮黃金楊顔橙子山檻小飲胡使上翁嶺雜詩四首𣣔求天下友冬暮感懷寄舍弟至荷湖二首詠雪送徐竑著作知康州寫懷二首茅亭間坐靖安幽谷亭青雲亭間坐卷之二古詩寄子進弟喜寒詠史二首江湖遂書懷别詠雪答裴煜二首寄王介卿上人𥘉夏有感之南豐道士寄介甫送人移知賀州謝章伯益惠硯送劉醫博送陳啇學士雪詠送僧曉容送叔延判官山茶花丁亥三月十五日舍弟南源刈稻奉和滁州九詠九首并序琅瑘泉石篆逰琅瑘山歸雲洞琅瑘溪班春亭庶子亭石屏路慧覺方丈幽谷晚飲卷之三古詩逰麻姑山桃花源丹霞洞半山亭顔碑碧蓮池流杯池七星彩瀑布泉秋懷送歐陽員外歸覲滁州舍人一晝千萬思送鄭秀才答所勸炙菊花答石秀才月下冬曉書懷東津歸催吳秀才寄酒送吳秀才和章友直城東春日簡如晦伯益高松青青間青青洪州詠史二首泝河尹師魯北風發松門寄介甫過彭澤江上懷介甫讀五代史庭木發彭澤菊花落葉舞鶴卷之四古詩降龍湘冠地動邉捋多雨秋日山水屏八月二十九日小飲食梨追租桐樹九月九日路中對月聽鵲寄家人讀書雜詩五首戲呈休文屯田與舍弟别舟岸間相望感嘆成詠送宣州社都官東軒小飲呈坐中麻姑山送南城尉羅君明妃曲二首喜二第侍親將至七月一日休假作秋夜李氏素風堂秋聲七月十四日韓持國直廬同觀山海經戲書李莭推亭子秋夜露坐偶作韓玉汝使歸苦熱過介甫過介甫歸偶成合醬作送章㜈州瞿祕枝新授官還南豐卷之五古詩送程公闢使江西遊金山寺作答葛藴南湖行二首種牲丹西湖二月二十日北湖百花隄芙蓉亭秋懷二首送李撰赴舉送韓玉汝招隱寺壽丘山送豐稷不飲酒𥘉發襄陽携家夜登現山置酒高陽池道鹿門不果漢廣亭聞喜亭劉景升祠隆中蔡州谷隱寺萬山題張伯常漢上茅屋漢陽泊舟移守江西先寄潘延之莭推鄖口促促為物役鴻鴈喜晴酬王正仲登嶽簏寺閣見寄曉出訪石仙岩杜法師和貢甫送元考不至京師觀音院新堂卷之六律詩郊祀慶成詩仁宗皇帝挽詞三首英宗皇帝挽詞二首詩慈聖光獻皇太后挽詞二首送英州蘇祕丞送陳郎中還京兼過九江新宅遣興楚澤西亭盆池羈遊南軒竹浮雲樓和趙嘏照影亭晚望書閣贈彈琴者寄孫正之簡翁都官秋日感事示介甫陳祁秀才園亭上柱相公胡大傳挽詞二首酬林叔江西道中作送雙漸之漢陽孔明間行贈安禪勤上人贈護仁監院送覺祖明上人謁李白墓送撫州錢郎中送王汝使兩浙簡景山侍邵丁元珍挽詞二首送李莘太傅逰天章寺送關彥逺送關逺江西西園席上送孫穎賢送鄭州邵資政看花送任逹度支監嵩山崇福宫會稽絶句三首送趙資政過高士坊餘杭久旱趙恱道入境之夕四郊雨足二首錢塘上元夜祥符寺陪咨臣郎中文燕席送沈諌議酬王徽之汴中見贈寄鄆州邵資政和邵資政和孔教授喜雪二首孔教授北園晚步郡齋即事二首憶赴中梅再賦喜雪寄致士歐陽少師卷之七律詩冬夜即事酬介甫還自舅家書所感西湖二首早起赴行香席上和陳郎中雪後舜泉閲武堂還波亭鵲山亭芍藥廰水香亭靜化堂仁風􅈦凝香齋閲武堂下新渠北渚亭芙蓉橋百花臺次道子中書問歸期霧松正月六日雲齊寄顧子敦二月八日北城間步詠柳北園會客不飲西湖納涼喜雨次李秀才得魚字韻次綰得風字韻次維得禽字韻次維得花字韻到郡一年孔教授張法曺以曽論荐特示長箋酬強幾聖人情寄王樂道戲書贈張濟北渚亭雨中送趙資政趵突泉金線泉北池小會送韓延評鵲山寄孫莘老湖州墨妙亭華不注山靈岩寺兼簡重元長老二劉居士和孔仲平群樓鮑山鄆州新堂垓下離齋州後五首寄齊州同官庭檜呈蔣頻叔甘露寺多景樓孫少𫐠示近詩兼仰高致金山寺卷之八律詩高郵逢人約襄道之陽彭城道中送程殿丞還朝送扁衩丞雨中王駕部席上贈張伯常之郢見過因話􅍮楚故事仍貺佳什伯常少留别業寄詩索酒因以奉報贈降降自宜城赴官許昌招澤甫竹亭間話和鄭微之送陳世修和張伯常自郢中將及敝境先寄長句和張伯常峴山亭晚起元韻峴山亭置酒韓魏公挽歌詞二首訓吳仲庶龍啚歲春感懷陳君式恭軒贈正倚大師庵居酬江西運使蔣頴叔以白山茶寄吳仲庶見貺佳篇依韻和酬刀景純挽歌詞二章寄留交代元子發逰東山示容大乘寺聖泉寺升山靈岩寺鳯池寺上元元沙院酉州柳國傳旬休日遇仁王寺閠正月十一日以殿丞寄新茶亂山親舊書報京師盛聞治聲寄獻新茶方推官寄新茶嘗新茶厚卿子中使高麗出郊蹇磻翁寄新茶二首城南二首寒食夜出過利涉門夜出城南儔雨西樓荔枝四首北歸三首和酬孫少述和孫少述侯職方同燕席寄趙宫保和訓趙宫保致政言懷二首和趙宫保别杭州過靈璧張氏園三首靈毫州送元厚之資政致仕歸蘇壽聖院昌山主靜軒鶴林寺送關彥逺赴河北正月十一日迎駕呈諸同舍和御製上元觀燈和史綰相公上元觀燈集英殿春燕呈諸同舍上巳日瑞聖園錫燕呈諸同舍池上即席送况之赴宣城題饒君茂才葆光庵朝退即事呈大尹正仲龍圖卷之九論唐論為人後議公族議講官議救災議卷之十傳洪範傳進太祖皇帝總序狀太祖皇帝總敘卷之十一序新序目録序梁書目録序列女傳目録序禮閣新儀目録序戰國䇿目録序陳書目録序唐令目録序南軒齋目録序徐幹中論目録序説苑目録序鮑溶詩目録序卷之十二序李白詩後序先大夫集後序王深父文集序王子直文集序王容李文集序范貫之奏議集序王平甫文集序強幾聖文集序思軒詩序卷之十三序越州鑑湖圗類要序相國寺