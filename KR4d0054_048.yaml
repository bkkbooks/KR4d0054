front:
  text: 元豐類藁卷之四十八
  hash: sha256:c0a330c225d06884136bd4017bd2d56802b115256b58bf77d5a7459dbfed516f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_048-1a}
body:
  text: 傳徐復傳徐復字希顔興化軍莆田人嘗舉進士不中去不復就博學校書無所不讀尤通星曆五行術數之説世罕有能及者為人倜儻有大志內自飾勵不求當世之譽樂其所自得謂富貴不足慕也貧賤不足憂也故窮間漏屋敝衣糲食或至于不能自給未嘗動其意也遇人無少長貴賤皆盡恭謹其言前卋因革興懷是非之理人少能及然其家禾嘗畜書蓋其強記如此也康㝎中李元昊叛䛇求有文武材可用者參知政事宋綬天章閣侍讀林瑀皆薦復䛇賜裝錢州郡迫趣上道既至仁宗見復于崇政殿訪以世務復所以為上言者世莫得聞也仁宗因命講易乾坤既濟未濟又問今歲直何卦西兵𣣔出如何復對歲直小過而太一守中宫兵宜內不宜外仁宗善其言復又獻所為邊防䇿太一主客立成曆洪範論上曰卿所獻書為卿留中必𣣔官之復固辭乃官其子晞留復登聞鼓院與林瑀同修周易會元紀歲餘固求東歸仁宗高其行禮以束帛賜號沖晦處士復久逰吳因家杭州州牧每至必先加禮然復未嘗肯至公門范仲淹知杭州數就復訪問甚禮重之仲淹嘗言西兵既起復預言罷兵歲月又斗牛間嘗有星變復言吳當大疫死者數十萬人後皆如其言復平居以周易太玄授學者人或勸復著書復曰古聖賢書巳具顧學者不能求吾復何為以徼名後世哉晚取其所為文章盡焚之今其家有書十餘篇皆出于門人故舊之家復卒時年七十餘既病故人王稷居睦州𣣔往省之復報曰來以五六月之交尚及見子稷未及往至期復果已死其終事皆預自處子晞年五十餘亦致仕官至國子博士復贈尚書虞部貟外郎復死十餘年而沈遘知枕州榜其居曰高士坊云贊曰復之文章存者有慎習贊困蒙飬等篇歸于退求諸巳不矜世取寵余論次復事頗采其意云若復自拔汙濁之中隱約于閭巷久而不改其操可謂樂之者矣洪渥傳洪渥撫州臨川人為人和平與人遊𥘉不甚歡久而有味家貧以進士從鄉舉有能賦名𥘉進于有司連輒出久之乃得官官不自馳騁又久不進卒監黃州麻城之茶埸以死死不能歸葬亦不能返其孥里中人聞渥死無賢愚皆恨失之豫少與渥相識而不深知其為人渥死乃聞有兄年七十餘渥得官而况已老不可與俱行渥至官量口用俸掇其餘以歸買田百畝屋其兄復去而之官則必安焉渥既死兄無子數使人至麻城撫其孥𣣔返之而居以其田其孥蓋弱力不能自致其兄益巳老矣無可奈何則念輒悲之其經營之猶不已忘其老也渥兄弟如此無愧矣渥平居若不可任以事及至赴人之急早夜不少懈其與人真有恩者也豫觀古今豪傑士傳論人行義不列于史者往往務托竒以動俗亦或事高而不可為繼或伸一人之善而誣天下以不及雖歸之輔教驚世然考之中庸或過矣如渥所存蓋人人所易到故載之云元豐類藁卷之四十八
