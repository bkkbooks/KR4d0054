front:
  text: 元豊類藁卷之四十八
  hash: sha256:837ed3db735379a530fc4d2b8a831197207af5558b79eb5faaeebf1cbaea7ad3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_048-1a}
body:
  text: 傳徐復傳徐復字希顔興化軍莆田人嘗舉進士不中去不復就博學校書無所不讀尤通星暦五行術数之說世罕有䏻及者為人倜儻有大志内自飾勵不求當世之譽樂其所自得謂富貴不足慕也貧賤不足憂也故窮間漏屋敝衣糲食或至扵不䏻自給未嘗動其意也遇人無少長貴賤皆盡恭謹其言前卋因革興懐是非之理人少䏻及然其家禾嘗畜書蓋其強記如此也康㝎中李元昊叛䛇求有文武材可用者叅知政事宋綬天章閣侍讀林瑀皆薦復䛇賜装錢州郡迫趣上道既至仁宗見復扵崇政殿訪以世務復所以為上言者世莫得聞也仁宗因命講易乾坤既濟未濟又問今歲直何卦西兵𣣔出如何復對歲直小過而太一守中宫兵宜内不宜外仁宗善其言復又獻所為邊防䇿太一主客立成暦洪範論上曰卿所献書為卿留中必𣣔官之復固辭廼官其子晞留復登聞鼓院與林瑀同脩周易㑹元紀歲餘固求東㱕仁宗高其行禮以束帛賜號冲晦䖏士復乆逰吳因家杭州州牧每至必先加禮然復未嘗肯至公門范仲淹知杭州数就復訪問甚禮重之仲淹嘗言西兵既起復預言罷兵歲月又斗牛間嘗有星変復言吳當大疫死者数十萬人後皆如其言復平居以周易太玄授學者人或勸復著書復曰古聖賢書巳具顧學者不能求吾復何為以徼名後世哉晚取其所為文章盡焚之今其家有書十餘篇皆出扵門人故舊之家復卒時年七十餘既病故人王稷居睦州𣣔徃省之復報曰来以五六月之交尚及見子稷未及徃至期復果已死其終事皆預自䖏子晞年五十餘亦致仕官至國子愽士復贈尚書虞部貟外郎復死十餘年而沈遘知枕州牓其居曰高士坊云賛曰復之文章存者有慎習賛困蒙飬䓁篇歸扵退求諸巳不矜世取寵余論次復事頗采其意云若復自㧞汙濁之中隱約扵閭巷乆而不改其操可謂樂之者矣洪渥傳洪渥撫州臨川人為人和平與人㳺𥘉不甚歡乆而有味家貧以進士從郷舉有䏻賦名𥘉進扵有司連輙出乆之乃得官官不自馳騁又乆不進卒監黄州麻城之茶埸以死死不能㱕葬亦不䏻返其孥里中人聞渥死無賢愚皆恨失之予少與渥相識而不深知其為人渥死廼聞有兄年七十餘渥得官而况已老不可與俱行渥至官量口用俸掇其餘以㱕買田百畆屋其兄復去而之官則必安焉渥既死兄無子数使人至麻城撫其孥𣣔返之而居以其田其孥盖弱力不能自致其兄益巳老矣無可奈何則念輙悲之其經營之猶不已忘其老也渥兄弟如此無愧矣渥平居若不可任以事及至赴人之急早夜不少懈其與人真有恩者也予觀古今豪傑士傳論人行義不列扵史者徃徃務摭竒以動俗亦或事高而不可為継或伸一人之善而誣天下以不及雖㱕之輔教驚世然考之中庸或過矣如渥所存盖人人所易到故載之云元豊類藁卷之四十八
