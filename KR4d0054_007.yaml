front:
  text: 元豐類藁卷之七
  hash: sha256:ff4e2258d42861c99ff57c02ac2c606ddaf0eb478f0f6de604524c517e7ed2d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_007-1a}
body:
  text: 律詩冬夜即事印奩封罷閤鈴閑喜有秋毫免素餐市粟易求倉廪實邑擺無警里閭安香消一榻氍毹暖月澹千門霧淞寒聞說豊年從此始更回籠燭卷簾看齊寒甚夜氣如霧凝於木上旦起視之如雪日出飄滿堦庭尤為可愛齊人謂之霜滋諺日霜凇重霜凇窮漢置飯甕以為豊年之也詶介甫還自舅家書所感旱氣滿原野子行歸舊廬籲天高未動望歲了何如荒土欲生火涸溪容過車民期得霖雨吾豈灌園𬞞西湖二首左符千里走東方喜有西湖六月涼塞上馬歸終反覆泰山鴟飽正飛揚懶宜魚鳥心常静老覺詩書味更長行到平橋𥘉見日滿川風露紫荷香湖面平随葦岸長碧天垂影入清光一川風露荷花曉六月蓬瀛燕坐凉滄海桴浮成曠蕩明河槎上更㣲芒何須辛苦求人外自有仙郷在水郷早起赴行香枕前聴盡小梅花起見中庭月未斜㣲破宿雲猶度鴈欲深烟桞已蔵鴉井轤聲急推寒玉籠燭光繁秉絳紗行到市橋人語宻馬頭依約對朝霞席上市井蕭條烟火㣲两衙散雪後深時若無一曲傳金盞争柰衰翁两鬢絲和陳郎中材薄安時甘寂寞身閑乘興喜登臨每㝷香草率狂思曾向幽蘭費苦吟明月㡬人非按劒高山從古少知音數篇淸絶賡歌意黙見馮唐異俗心雪後雪景鮮妍猶弄色柳條䓗蒨巳抽萌風光苒苒流雙轂人事悠悠寄一抨射羿未應今獨有嘲雄何必史能評且将畫諾供談笑更選名園載酒行舜泉山麓舊耕迷故壟井幹餘汲見飛泉清涵廣陌能成雨冷浸平湖别有天南狩一時成往事重華千古似當年更應此水無休歇餘澤人間世世傳閱武堂五朝坏冶歸皇極萬里車書共太平胡馬不闚光禄塞漢家常隷羽林兵柳間自詫投壷樂桑下方安佩犢行高枕四封無一事腐儒何幸偶專城環波亭水心還有拂雲堆日日應湏把酒杯楊柳巧含烟景合芙蓉争帶露華開城頭山色相圍出簷底波聲四面來誰信瀛州未㱕去两州俱得小蓬萊鵲山亭大亭孤起壓城顛屋角峨峨挿紫烟濼木飛綃來野岸鵲山浮黛入晴天少陵騷雅今誰和東海風流世謾傳太守自唫還自笑歸時乗月尚留連芍藥廰小碧䦨干四月天露紅烟紫不勝妍肯為雲住陽䑓女恐逐風飛飾室仙洧外送㱕情放蕩省中畨直勢拘挛何如蕭洒山城守淺酌清吟濟水邉水香亭臨池飛􅌟欎岧嶤櫺檻無風影自揺群玉過林抽翠竹雙虹垂岸跨平橋煩依羙藻魚争餌淸見寒沙水滿撓莫問荷花開㡬曲但知行䖏異香飄静花堂脩簷䡾䡾背成隂行盡松皇一徑深好鳥自飛還自下白雲無事亦無心客來但飲平陽酒衙退常擕靖莭琹世路人情方擾擾一逰湏抵萬黄金仁風㕔凛凛風生寄此堂塵埃消盡興何長朱絲鼓舞逢千載白羽吹揚慰一方巳散浮雲滄海上更飛霖雨泰山傍誰知萬物心焦日獨對松筠四座涼閱武堂下新渠方渠新鑿北林開流水遥經畫閣來洗耳厭聞誇勢利濯纓羞去旁塵埃不憂待月供詩筆已欲㸔華泛酒杯却憶虎谿橋上過夜涼臨砌尚徘徊凝香齋毎覺西齋景最幽不知官是古諸侯一尊風月身無事千里耕桑嵗有秋雲水醒心鳴好鳥玉沙清耳漱寒流沉烟細細臨黄卷疑在香爐最上頭北渚亭四楹虚徹地無鄰断送孤高與使君午夜坐臨滄海日半天唫看泰山雲青徐氣接川原秀常碣風連草木薰莫笑一樽留恋乆下堦塵土便紛紛芙蓉橋鴈翅横連杜若州碧欄干影在中流蓬萊日日遊人到誰道僊風解引州百花䑓煙波與客同尊酒風月全家上采州莫問䑓前花逺近試看何似武陵遊次道子中書問歸期竊食東州歲未朞蓬萊人問㡬時歸凭闌到䖏臨清泚開閤終朝對翠㣲雨印毎閑軍市静雙旌多偃送迎稀一枝数粒身安穏不羡雲鵬九萬飛霧淞園林𥘉日静無風霿淞花開䖏䖏同記得集英深殿裏舞人齊挿玉籠􅷔正月六日雲齊雪消山水見精神滿眼東風送早春明日杏園應爛熳便湏期約看花人寄顧子敦清曠亭邉䧹𣣔回南湖分浪入城來空山過臘猶蔵雪野岸先春巳放梅三徑未帰聊自適一尊㝷勝毎同開如今試想長松下玉塵高談豈易倍二月八日北城閑歩土膏𥘉動麥苗青飽食城頭信意行便起高亭臨北渚欲乗長日勸春耕詠柳亂條猶未変𥘉黄倚得東風勢便狂解把飛花蒙日月不知天地有清霜北園㑹客不飲畫橋南北水西東高下花枝緑間紅殢得春風人盡醉猶醒誰似白頭翁西湖納凉問吾何䖏避炎蒸十頃西湖照眼明魚戯一蒿新浪滿鳥啼千歩緑隂成虹腰隱隱松橋出鷁首峩峩盡舫行最喜晚涼風月好紫荷香裏聴泉聲喜雨偶徇一官偷禄計便懐千里長人憂桑間舉萡蠶𥘉繭隴上揮鎌麥巳秋更喜風雷生北極頓敺雲雨出靈湫從今菽粟非虚禱㑹見甌寠果滿篝雨後环波亭次韻四首次李秀才得魚字韻候月巳知星好雨卜年方喜夢維魚從今撥置庭中事取意西軒睡枕書次綰得風字韻荷芰東西魚映葉樵舟朝暮客乗風清泉雨後分毛髪何必南湖是鏡中次維得禽字韻黃蜀葵開收宿雨𬗋桑椹熟轉新禽㸔花弄水非無事猶勝紛紛别用心次維得花字韻丹杏一畨收羙實緑荷無数放新花西湖雨後清心目坐到城頭泊暝鵶去年乆旱六月十三日入境得雨今年復旱得雨亦六月十三日也去年六月焦原雨入得東州弟一朝今日看雲旧時莭又來農畔聴蕭蕭到郡一年薄材何幸擁朱軒竊食東風巳一年隴上雨餘看麥秀桑間日永問蠶眠官民雖冗身無累心事長閑地自侕秪恐再朞官滿去毎來湖岸合留連孔教授張法曺以曽論薦特示長牋緑髪朱顔两少年出倫清譽毎相先壁中字為時人考北上書從老父傳泮水笑談邀法飲高䑓閑燕属佳篇哀翁厚幸懐雙壁更起狂心慕薦賢酬强㡬聖俯仰林泉繞舎清經年閑卧濟南城山田雨足心無事水榭蕐開眼更明新霽烟雲飛觀出晚涼歌吹畫橋横寄聲裴令樽前客秪欠高談一座傾人情人情當面蔽山立誰可論心向白頭天禄閣飛真學士玉麟符是假諸侯詩書落落成孤論耕釣依依憶舊遊早晚抽簮江海去笑将風月上扁舟寄王樂道荆州南走困塵埃應喜文章意自開明世正逢多事日要塗湏用出倫材不回霜雪天應惜未得風雲衆忍摧若向沙頭吊杜甫近詩懸望自書來戯書集賢自笑文章少為郡誰言樂事多報荅書題親筆硯逢迎使客聴笙謌一心了了無人語兩鬢蕭蕭柰老何還有不随流俗䖏秋毫無累損天和贈張濟憶𥘉蘭渚訪沉淪一畆蕭然里舎貧節行乆窮彌好古文章垂老更驚人詩書就我論新意冠劒投誰拂舊塵小驛荒涼煩枉道一觴相属莫嫌頻北渚亭雨中振衣已出塵土外卷箔更當風雨間泉聲漸落石溝澗雲氣逈壓金與山寒沙漠漠鳥飛去野路悠悠人自還耕桑千里正無事况有罇酒聊開顔送趙資政鎮撫西南衆望傾玉書天上輟持衡春風不覺岷山逺和氣還從錦水生學舍却㝷餘教在棠郊應喜舊隂成歸來促召調鑪冶莫爲兒童竹馬迎趵突泉一派遥從玉水分暗來都洒歴山塵滋榮冬茹温常早潤澤春茶味更真已覺路傍行似鑑最憐沙際涌如輪曽城齊魯封疆㑹况託娥英詫世人金線泉玉甃常浮灝氣鮮金絲不定路南泉雲依羙藻争成縷月照靈漪巧上弦已繞渚花紅灼灼更縈沙竹翠姢姢無風到底塵埃盡界破水消一片天北池小㑹笑語從容酒慢廵笙謌随賞北池春波間􅍢檻花迷眼沙際朱橋柳拂人金縷暗移泉溜急銀簧相合鳥聲新幸時無事湏行樂物外乾坤一點塵送韓廷評謝庭冠盖舊追㝷僻郡相從喜更深進道由來輕拱璧傳經知不羡籝金騏騮要試風沙逺竹栢湏忘霰雪侵别後壮懐應努力白頭傾耳聴徽音寄孫莘老湖州墨妙亭隆名盛位知難乆壮字豐碑亦易忘棗木巳非真篆刻色絲空喜好文章峴山漢水成虚擲大厦深簷且秘蔵好事今推霅溪守故開新舘集琳瑯鵲山一峯孤起勢崔嵬秀色挼籃入酒盃靈藥已從清露得平湖長泛宿雲回翰林明月舟中過司馬虚亭竹外開我亦退公思蠟屐㑹㸔歸路送人來華不注山水經華不注山虎牙桀立孤峯特起青峯青峯嶺望點黛輿地志又云亦名金輿山虎牙千仭立儳儳峻㧞遥臨濟水南翠嶺嫰嵐晴可掇金輿陳迹乆誰探高摽特起青雲近壮士三周戦氣酣丑父遺忠無䖏問空餘一掬野泉丼靈巖寺兼簡重元長老二劉居士法定禅房臨峭谷辟支靈塔冠層峦軒窓勢聳雲林合鍾磬聲高鳥道盤白鶴已飛泉自湧青龍無迹洞常寒更聞雷逺相從樂卋道囂塵豈可于和孔仲平園池方喜共追㝷正是槐榆夾路隂雙燭縱談樽酒渌一枰銷日𥿄窓深波濤萬字驚人筆塵土千鍾異俗心佳句從來知寡和愧将沙礫報一作兼黄金群楼滿眼青山更上楼偶携閑容此閑遊飛花不盡随風起野水無邊帶雨流懐舊有情惟社燕忘機相得更沙鷗黃金駟馬皆塵土莫訴當歡酒百甌鮑山雲中一點鮑山青東望䏻令两眼明若道人心是矛㦸山中那得叔牙城鄆州新堂百尺豐堂汶水濵魯侯清燕此逡廵谿寒素礫偏宜月璧瑩黄金不受塵引客笙歌行䖏是賞心花木四時新未應乆作林泉主天子今思舊學臣垓下三傑同㱕漢道興㧞山餘力爾徒矜泫然垓下真男女不悟當從一范増離齊州後五首雲㠶十幅順風行卧聴随船白浪聲好在西湖波上月酒醒還對𥿄窓明畫船終日扒沙行已去齊州一月程千里相随是明月水西亭上一般明文犀剡剡穿林筍翠上田田出水荷正是西亭銷暑日却将離恨寄煙波将家湏向習池㳺難放西湖十頃秋從此七橋風與月夢魂長到木蘭舟荷氣夜涼生枕席氷聲秋醉入簾幃一㠶千里空回首寂寞船窓秪自知寄齊州同官西湖一曲舞霓裳勸客花前白玉觴誰對七橋今夜月有情千里不相忘庭檜呈蔣頴叔樛枝高下秀森森曽寄名卿一作莭異俗心草舎一時成徃事松身千尺見新隂聲清不受笙竽雜氣勁䏻遺霰雪侵漢莭從來縱真賞謝庭蘭玉載芳音甘露寺多景楼欲收嘉景此楼中徙倚欄干四望通雲亂水光浮紫翠天含山氣入青紅一川鍾唄淮南月萬里㠶檣海外風老去衣衿塵土在秪将心目羡冥鴻孫少述示近詩兼仰高致大句閎篇乆擅埸一凾𥘉得勝琳瑯少陵推徤材孤出彭澤淸閑興㝡長世外麒麟誰可係雲中鴻鴈本高翔白頭多病㐮陽守展卷臨風欲自强金山寺塵外岧嶤鷲嶺宫架虛排險岀青紅林光巧轉滄波上海色遥涵白日東夜静神龍聴呪食秋深蒼鶻起搏風連荆控蜀長江水盡在囬廊顧盻中元豐類藁卷之七
