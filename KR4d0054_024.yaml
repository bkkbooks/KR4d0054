front:
  text: 元豊類藁卷之二十四
  hash: sha256:1b0756e4c72e2f64507013d460f12ed53e95db0ef0c0355513b9d9ab03477582
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_024-1a}
body:
  text: 制誥吏部尚書制尚書政本而吏部天官所以考擇人材以成天下之務近世既失其職但受成事而已今朕既正官名且将㱕其屬任之法之始推行在人其扵程能議功㝎勲頒爵當率厥属謹循科條非得周材曷稱兹位其忠厚仁䔍秉義守正列于侍從休有令名是用選而授之其務将明使朕所以作則垂憲不獨扵今可行方當施之後世盖汝有稱職之美則朕有知人之明尚其懋㢤無朁厥服吏部侍郎制尚書本天下之務而吏部典掌選舉至扵所属之曹有行封爵議勲庸稽功課之事咸以咨焉近世以来職分扵他司而位為虚噐今朕董正治官使㱕其名分豈虚為㢤固将循之以求其實盖明紀綱㝎制度以釐百工熈庻績此朕志也侍郎實二其長非獨當脩其官且将推明新制以行今而傳後則其選授豈不重㢤某文學行義有聞扵時列于從官献納惟允是用命爾實首兹選其躰予所以擇而使爾之意務祗厥服使政舉法行稱朕之意惟爾亦永有稱扵後世可不勉歟戸部尚書制户部之扵中䑓為周官司徒之職掌財賦之調度金榖之出入以待邦國之用厯唐五代征歛煩興而使名雜出地官之職盖存虚號而巳今朕正名以㝎群臣之位辨位以責庻務之實尚書政本典領經費之司所属尤重博求天下之士以宜其官某誠篤強敏智慮精宻董煩治劇材力有餘民曺上卿無以易汝理材之術待汝有為今歲入意廣而歲費所餘者無㡬使官用复莭而餘蓄可致公蔵贍足而民賦可䡖在爾能知其方庻㡬承朕之志尚懋爾守以承厥叙戸部侍郎制田疇生齒之籍榖帛貨泉之計下以制民之産上以經國之用地官之貳實叅総焉朕方因能以用人正名以授職俾服予事必惟其材某頃以通敏之姿乆更要劇之任徃副民部孰如汝宜夫知農之艱艱而有以勸助視財之豊匱而有以均節使公蔵贍足而私蓄羡盈服将觀爾之能爾其無懈于位禮部尚書制昔舜命伯夷典禮后䕫典樂至周并為宗伯之官今禮部尚書盖其任也威儀度数之詳聲音律吕之别莫不属焉精微之至所以統和天人順遂萬物其躰可謂大矣矧今典領實又考擇天下之材夫能無曠其官以充吾所以寄属之意歴選在位今得其人某明允直清知經信道制作之事舊惟討論春官古卿是用授汝朕承百工之敝方欲作則垂憲以成一代之典使五禮之節同扵天地八音之和格扵祖考天下智謀材諝之士得而用之待汝能稱其官庻㡬輔于于治無懈于位以副朕知禮部侍郎制夫禮之莭文樂之和聲所以成三材而育萬物典掌之任秩亞春官朕方考正百工之名而大脩法度之政其扵寄属必惟其人某材出士倫學通經術宗伯之貳爾徃欽㢤其思先王制作之方而務知治民易俗之要其扵理軆非在扵鍾鼓玉帛而巳尚稱厥職以副矛作則垂憲之心可兵部尚書制中䑓政事所出兵部司馬之任所以典捴師徒揚國威武至扵按圖辨地駕乗庫兵司存之事莫不咨焉今朕考古以正官儀将使䖏其名者必効其實由是以推朕之志明紀綱成法度焉八座之貴夫豈輕以属人某明逹事㡬好謀能断列于侍從忠益居多夏官古卿是用顯授朕患今之兵不與農合故因保伍之法修閱試之令庻夫使民知兵近扵古義夫䆒宣朕意使吏能奉承而民皆嚮勸以共武之服時汝稱識可不勉歟兵部侍郎制夫兵天下之備誰能去之自士不出扵井地而将非六事之人厯世以求皆知古之宜而患夫勢之難行朕獨慨然有志扵是故修保位之令明戦陣之教先王之跡庻或可幾經營之勤心亦至矣惟是夏卿之亞實參典領之司方正官儀尤慎推擇某材敏忠䔍明習治躰折父之貳徃徃惟汝諧夫䏻奨誘務農之民恱超講武之政馴致有漸而弥綸不踈惟無廢爾之勤可以輔朕之志尚思自勉以服訓詞刑部尚書制昔舜命臯陶曰汝作士明于五刑以弼五教盖刑者所以助治而非致治之本也其縦入輕重得失之際人之舒慘繫焉此古之聖王所以未有不先慎罰也今朕悉心以正庻官之任而中䑓八座典司邦禁選用之躰得人惟艱某明允通博資以術學服采于位厥聲顯聞秘官古卿是用命汝盖前世之治斵雕為樸破觚為圜而憲網踈風俗美朕甚慕焉爾尚躰朕之心折民以恕使辨訟白息而王政寖明可不勉欤以輔台徳刑部侍郎制刑者所以禁人為非而聖王之所尤慎中䑓捴領之任秩貳秋官之崇朕方正名以稽群吏之治而大脩制度之文必惟其人俾服予采某慈恕忠䔍明習法令叅執邦典莫如汝冝夫能使民無冤亦巳善矣惟之可以至扵使民無訟爾尚勉㢤以承予網紀四方之志工部尚書制昔舜咨于衆疇若予工群臣薦垂徃祗厥序盖繕修興造程衆藝飾五材國家之務不可以不属之其人今中䑓起曺實踐其任矧屯田虞衡平水之職莫不隷焉正名之𥘉其選尤重某材力強敏周于計畫更閱内外時稱汝能俾服冬官蔽自朕志夫詳明品式以訓匠建事使費省扵國力寛扵人至扵墾地山林溝洫之政莫不畢舉皆汝守也其尚懋㢤以率厥属工部侍郎制夫飾五材程匠事國家之務所不可巳也故共工之事任属非輕朕方若稽舊章財正官號思得智能之士以副采擇之詳某開逹敏強明習典故冬官寵列俾介厥司考䆒制度之文紀綱脩繕之政在爾能㪯其職以稱吾經理萬事之心其尚懋㢤往祗厥服禮部制朕正群司之名而責其實㱕天下之務而本之尚書故郎選甚高維春官之属禮楽所出宜得智謀材諝之士以脩厥官某業履望實見扵世用考擇扵衆莫如汝諧其尚躰予董正治官之意扵夫創制之𥘉明紀綱興曠廢惟知其要乃能圖其詳惟悉心以祗厥服主客制朕甚重郎吏之選欲以歛群材責功實典客之任列扵門曺維時右人宜服兹寵囯家之有賞典所以待汝有為膳部制牲豆酒膳辨其儀数而修其政春官之属郎秩甚寵詢求材實爾允僉言尚思欽承以稱推擇駕部制輿馬輦乗之奉郵驛圉牧之治中䑓要務主以郎曺敷求得人俾任吾事夫駉之頌飬馬之詩也盖其大㫖曰思無邪然則為政之方斯可知矣䏻識扵是夫何逺㢤庫部甲盾弓矢之器乗輿鹵簿之式武蔵之任郎選甚髙得士扵朝属任惟允夫稽功實以勸賞朕方必行悉忠力扵事為爾尚無懈都官制係累舂饎之人恤其廪給而申其訴競主以郎吏國之舊章爾惟惠兹宜蒞厥職尚思奮勵以稱東求比部制内外經費之事緫扵句考之司郎實主之位重省闥爾惟明敏宜能厥官惟時懋㢤以服予訓司門制門関筦鍵之事啓閉出入之莭總其籍賦而審其禁郎官之任爾允詢求尚敏勞能朕将考察屯田制率屯戍之兵服畎畆之事所以益邉省饋佐國𥙿民郎扵中䑓捴其政令用爾之敏宜能厥官往服寵名無忘奮勵虞部制蒐田有時而澤梁有禁虞衡之守所以遂群生而参化育中䑓典領咸属汝材其思順鳥獸草木之宜以稱朕爱人及物之意水部制川瀆隄防宣其利而備其害四方萬里之逺郎實緫領秩甚寵馬爾以周材朕用選授夫知水之不以障而導之使行此成法也推而見之扵事待爾能稱其官御史中丞制御史府持吾邦法所以紏官邪䋲不恪輔予于治非秉義純䔍望實敷于上下不稱其任某強毅肅括以禔其身博學精識通于世用是以考擇于衆寵以兹位夫有守正向公之志又有䏻辨是非之明抗論扵朝使賢不肖忠邪不失其實此法之所以爲治具而能佐吾以善飬人之意使汝能宜其官則朕爲得其所属尚躰予訓其惟懋㢤知制誥授中司制典掌明命緫持憲綱非博斈有文強毅忠䔍曷可以兼斯任㢤某志行清夷材資敏逹更踐内外試用惟允論思禁掖肅正朝端蔽自朕知㧞扵不次惟明扵躰要可以見扵訓辞推公扵是非可以施扵刺督尚懋厥守方觀爾能中司授太中大夫制朕正名以定百官之位辨位以責庻務之實矧風憲之臣紀網所属曷可以不明其任㢤某強敏開逺一作仁䔍學通古今擢典訓辞遂持邦法宜專分職以應新書是用進爾之階品在第四俾爾納忠宣力得壹意扵中司以董斉衆工肅正内外庻余之作則更制罔或不䖍在爾懋㢤知其所守責御史制中執法所以紏官邪䋲不恪也其可以自為欺旦怠欤某㧞扵䟽逺之中服在此位宜殫忠力以稱所蒙而按劾大臣既非其實稽其分職則自餒焉朕為之優容俾從薄責而進對之際公肆誕謾属吏推窮獄辞明具論其情則懐詐比其治則􅘃官夫身任紀綱之司而抵冐若此雖朕𣣔貸汝而如公議何片守偏州尚仍階品徃新厥志庻盖前愆御史遷郎官制御史董攝紀綱肅正朝廷扵政之有不當于理扵臣之有不恊于極皆得言之故吾甚重其選爾有列于此能勤厥職雖歲月未乆而風望甚髙今有司奏爾之課扵法當遷吾不得留易之郎位使爾知自効能不擇官則吾扵報功亦有異賞爾其勉矣無忘訓言衘史知雜制䑓無大夫中丞則御史之首當專决庻務實緫邦憲朕選扵衆然後属之其人豈不重㢤某敏茂直清通于學問輟自右史往踐厥司夫振舉紀綱以闡明法度紏䋲衺慝以肅正臣工朕方虚心志在扵與人為善爾能苦口無患扵不得其言其尚自強以允公論監察御史制御史持國紀綱所以紏官邪斉内外選衆而授厥惟艱㢤爾好古知方強扵自立刺察之任往其欽㢤惟不回
