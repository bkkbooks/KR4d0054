front:
  text: 元豐類藁卷之二十四
  hash: sha256:c80f94fdda83b26641005be44c0e22d3055e351ba43a17da4a4c19e135ca9625
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_024-1a}
body:
  text: 制誥吏部尚書制尚書政本而吏部天官所以考擇人材以成天下之務近世既失其職但受成事而已今朕既正官名且將歸其屬任之法之始推行在人其于程能議功㝎勳頒爵當率厥屬謹循科條非得周材曷稱兹位其忠厚仁篤秉義守正列于侍從休有令名是用選而授之其務將明使朕所以作則垂憲不獨于今可行方當施之後世蓋汝有稱職之美則朕有知人之明尚其懋哉無朁厥服吏部侍郎制尚書本天下之務而吏部典掌選舉至于所屬之曹有行封爵議勳庸稽功課之事咸以咨焉近世以來職分于他司而位為虛器今朕董正治官使歸其名分豈虛為哉固將循之以求其實蓋明紀綱㝎制度以釐百工熙庶績此朕志也侍郎實二其長非獨當修其官且將推明新制以行今而傳後則其選授豈不重哉某文學行義有聞于時列于從官獻納惟允是用命爾實首兹選其躰豫所以擇而使爾之意務祗厥服使政舉法行稱朕之意惟爾亦永有稱于後世可不勉歟戶部尚書制户部之于中臺為周官司徒之職掌財賦之調度金榖之出入以待邦國之用厯唐五代征斂煩興而使名雜出地官之職蓋存虛號而巳今朕正名以㝎群臣之位辨位以責庶務之實尚書政本典領經費之司所屬尤重博求天下之士以宜其官某誠篤強敏智慮精密董煩治劇材力有餘民曺上卿無以易汝理材之術待汝有為今歲入意廣而歲費所餘者無幾使官用復莭而餘蓄可致公藏贍足而民賦可輕在爾能知其方庶幾承朕之志尚懋爾守以承厥敘戶部侍郎制田疇生齒之籍榖帛貨泉之計下以制民之産上以經國之用地官之二實參總焉朕方因能以用人正名以授職俾服豫事必惟其材某頃以通敏之姿久更要劇之任往副民部孰如汝宜夫知農之艱艱而有以勸助視財之豐匱而有以均節使公藏贍足而私蓄羡盈服將觀爾之能爾其無懈于位禮部尚書制昔舜命伯夷典禮后夔典樂至周并為宗伯之官今禮部尚書蓋其任也威儀度數之詳聲音律吕之别莫不屬焉精微之至所以統和天人順遂萬物其躰可謂大矣矧今典領實又考擇天下之材夫能無曠其官以充吾所以寄屬之意歷選在位今得其人某明允直清知經信道制作之事舊惟討論春官古卿是用授汝朕承百工之敝方欲作則垂憲以成一代之典使五禮之節同于天地八音之和格于祖考天下智謀材諝之士得而用之待汝能稱其官庶幾輔于于治無懈于位以副朕知禮部侍郎制夫禮之莭文樂之和聲所以成三材而育萬物典掌之任秩亞春官朕方考正百工之名而大修法度之政其于寄屬必惟其人某材出士倫學通經術宗伯之二爾往欽哉其思先王制作之方而務知治民易俗之要其于理體非在于鍾鼓玉帛而巳尚稱厥職以副矛作則垂憲之心可兵部尚書制中臺政事所出兵部司馬之任所以典捴師徒揚國威武至于按圖辨地駕乘庫兵司存之事莫不咨焉今朕考古以正官儀將使處其名者必效其實由是以推朕之志明紀綱成法度焉八座之貴夫豈輕以屬人某明逹事幾好謀能斷列于侍從忠益居多夏官古卿是用顯授朕患今之兵不與農合故因保伍之法修閲試之令庶夫使民知兵近于古義夫究宣朕意使吏能奉承而民皆嚮勸以共武之服時汝稱識可不勉歟兵部侍郎制夫兵天下之備誰能去之自士不出于井地而將非六事之人厯世以求皆知古之宜而患夫勢之難行朕獨慨然有志于是故修保位之令明戰陳之教先王之迹庶或可幾經營之勤心亦至矣惟是夏卿之亞實參典領之司方正官儀尤慎推擇某材敏忠篤明習治躰折父之二往往惟汝諧夫能奬誘務農之民恱超講武之政馴致有漸而彌綸不踈惟無廢爾之勤可以輔朕之志尚思自勉以服訓詞刑部尚書制昔舜命臯陶曰汝作士明于五刑以弼五教蓋刑者所以助治而非致治之本也其縱入輕重得失之際人之舒慘繫焉此古之聖王所以未有不先慎罰也今朕悉心以正庶官之任而中臺八座典司邦禁選用之躰得人惟艱某明允通博資以術學服采于位厥聲顯聞祕官古卿是用命汝蓋前世之治斫雕為朴破觚為圜而憲網踈風俗美朕甚慕焉爾尚躰朕之心折民以恕使辨訟白息而王政寖明可不勉歟以輔台德刑部侍郎制刑者所以禁人為非而聖王之所尤慎中臺捴領之任秩二秋官之崇朕方正名以稽群吏之治而大修制度之文必惟其人俾服豫采某慈恕忠篤明習法令參執邦典莫如汝冝夫能使民無冤亦巳善矣惟之可以至于使民無訟爾尚勉哉以承豫網紀四方之志工部尚書制昔舜咨于衆疇若豫工群臣薦垂往祗厥序蓋繕修興造程衆藝飾五材國家之務不可以不屬之其人今中臺起曺實踐其任矧屯田虞衡平水之職莫不隸焉正名之𥘉其選尤重某材力強敏周于計畫更閲內外時稱汝能俾服冬官蔽自朕志夫詳明品式以訓匠建事使費省于國力寬于人至于墾地山林溝洫之政莫不畢舉皆汝守也其尚懋哉以率厥屬工部侍郎制夫飾五材程匠事國家之務所不可巳也故共工之事任屬非輕朕方若稽舊章財正官號思得智能之士以副采擇之詳某開逹敏強明習典故冬官寵列俾介厥司考究制度之文紀綱修繕之政在爾能舉其職以稱吾經理萬事之心其尚懋哉往祗厥服禮部制朕正群司之名而責其實歸天下之務而本之尚書故郎選甚高維春官之屬禮樂所出宜得智謀材諝之士以修厥官某業履望實見于世用考擇于衆莫如汝諧其尚躰豫董正治官之意于夫創制之𥘉明紀綱興曠廢惟知其要乃能圖其詳惟悉心以祗厥服主客制朕甚重郎吏之選欲以斂群材責功實典客之任列于門曺維時右人宜服兹寵國家之有賞典所以待汝有為膳部制牲豆酒膳辨其儀數而修其政春官之屬郎秩甚寵詢求材實爾允僉言尚思欽承以稱推擇駕部制輿馬輦乘之奉郵驛圉牧之治中臺要務主以郎曺敷求得人俾任吾事夫駉之頌飬馬之詩也蓋其大旨曰思無邪然則為政之方斯可知矣能識于是夫何逺哉庫部甲盾弓矢之器乘輿鹵簿之式武藏之任郎選甚髙得士于朝屬任惟允夫稽功實以勸賞朕方必行悉忠力于事為爾尚無懈都官制係纍舂饎之人恤其廪給而申其訴競主以郎吏國之舊章爾惟惠兹宜蒞厥職尚思奮勵以稱東求比部制內外經費之事總于句考之司郎實主之位重省闥爾惟明敏宜能厥官惟時懋哉以服豫訓司門制門關管鍵之事啓閉出入之莭總其籍賦而審其禁郎官之任爾允詢求尚敏勞能朕將考察屯田制率屯戍之兵服畎畝之事所以益邉省饋佐國𥙿民郎于中臺捴其政令用爾之敏宜能厥官往服寵名無忘奮勵虞部制搜田有時而澤梁有禁虞衡之守所以遂群生而參化育中臺典領咸屬汝材其思順鳥獸草木之宜以稱朕愛人及物之意水部制川瀆隄防宣其利而備其害四方萬里之逺郎實總領秩甚寵馬爾以周材朕用選授夫知水之不以障而導之使行此成法也推而見之于事待爾能稱其官御史中丞制御史府持吾邦法所以紏官邪繩不恪輔豫于治非秉義純篤望實敷于上下不稱其任某強毅肅括以禔其身博學精識通于世用是以考擇于衆寵以兹位夫有守正向公之志又有能辨是非之明抗論于朝使賢不肖忠邪不失其實此法之所以為治具而能佐吾以善飬人之意使汝能宜其官則朕為得其所屬尚躰豫訓其惟懋哉知制誥授中司制典掌明命總持憲綱非博學有文強毅忠篤曷可以兼斯任哉某志行清夷材資敏逹更踐內外試用惟允論思禁掖肅正朝端蔽自朕知拔于不次惟明于躰要可以見于訓辭推公于是非可以施于刺督尚懋厥守方觀爾能中司授太中大夫制朕正名以定百官之位辨位以責庶務之實矧風憲之臣紀網所屬曷可以不明其任哉某強敏開逺一作仁篤學通古今擢典訓辭遂持邦法宜專分職以應新書是用進爾之階品在第四俾爾納忠宣力得一意于中司以董齊衆工肅正內外庶余之作則更制罔或不虔在爾懋哉知其所守責御史制中執法所以紏官邪繩不恪也其可以自為欺旦怠歟某拔于疏逺之中服在此位宜殫忠力以稱所蒙而按劾大臣既非其實稽其分職則自餒焉朕為之優容俾從薄責而進對之際公肆誕謾屬吏推窮獄辭明具論其情則懷詐比其治則􅘃官夫身任紀綱之司而抵冒若此雖朕𣣔貸汝而如公議何片守偏州尚仍階品往新厥志庶蓋前愆御史遷郎官制御史董攝紀綱肅正朝廷于政之有不當于理于臣之有不協于極皆得言之故吾甚重其選爾有列于此能勤厥職雖歲月未久而風望甚髙今有司奏爾之課于法當遷吾不得留易之郎位使爾知自效能不擇官則吾于報功亦有異賞爾其勉矣無忘訓言銜史知雜制臺無大夫中丞則御史之首當專決庶務實總邦憲朕選于衆然後屬之其人豈不重哉某敏茂直清通于學問輟自右史往踐厥司夫振舉紀綱以闡明法度紏繩邪慝以肅正臣工朕方虛心志在于與人為善爾能苦口無患于不得其言其尚自強以允公論監察御史制御史持國紀綱所以紏官邪齊內外選衆而授厥惟艱哉爾好古知方強于自立刺察之任往其欽哉惟不回
