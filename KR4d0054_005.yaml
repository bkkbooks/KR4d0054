front:
  text: 元豐類藁卷之五
  hash: sha256:24d48fd2e406dce4eeeb4d2dd88ec91d68253d85628885a9e009a2384ec10a31
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_005-1a}
body:
  text: 古詩送程公闢使江西程侯昔使西山下金印出懷光滿把坐馳雷電破姦伏力送春陽煦鰥寡袴𥜗優足遍里巷禾黍豐穰罄郊野訟庭終日自虛曠德宇平生本蕭灑龍淵決水漲清沼鳥背株林開廣厦蒼顔擁檻四山出翠色橫櫩大江瀉掌平百里露州郭髮密千甍􅋦屋瓦雲裘數曲秀蘭蕙鳯蓋相摩擢梧檟客來尚喜井投轄主禮寧論燭飛灺三吳月出照金戟百越風來吹玉犖羽叉絶艷舞回雪寶劒諸儒談灸輠一尊放意受天籟萬纍回頭真土苴我思飛步綴登躡又欲生綃乞圖寫身縻東觀願雖阻目注漳門心豈捨過臨有幸破氛霧奮厲方欣入陶冶航又自日邊去信節𥘉從天上假舊邦往靖寄揮塵新榖來輸付流馬遙知素譽在民口巳有歡聲騰里社却尋泉石引幽士想憶沙塵笑勞者何當一解豫章榻強賦土風令中雅遊金山寺作候潮動鳴櫓出浦縱方舟舉箔見兹山巋然峙中流朱堂出煙霧縹渺若瀛洲十年入夢想一日恣尋遊屐履上層閣披襟當九秋地勢巳瀟灑風颷更颼飀逺挹蜀浪來旁臨滄海浮壷觴對京口笑語落楊州久聞神龍伏况覩鷙鳥投行緣石徑盡却倚巖房幽頗諧雲林思頓豁塵土憂昏鍾滿江路歸榜尚夷猶自楊子渡以兩小舟夾引所乘舟故云方舟答葛藴我𥘉未識子巳知子能文春風吹我衣暮召入九閽衆中得子辭默許非他人方將引飛黃使出萬馬群差之在須臾氣沮不復論大明臨萬物我亦傍車塵相逢扶桑測一揖意自親屈子果由我相示以無言同行千步廊攬轡金馬門歸來客舍中未及還往頻東舟載子去千里不逡巡今者坐甌越相望若三辰忽有海上使問我及牆藩得子百篇作讀之為欣欣大章巳逸發小章更新清逺去筆墨畦徒識斧鑿䀶想當經宮𥘉落𥿄有如神勉哉不自止直可窺靈均我老未厭此持誇希代􅎇朝吟忘日􅉴暮吟忘日曛發聲欲薦子自笑不足云南湖行二首二月南湖春雨多春風蕩漾吹湖波著紅少年里中出百金市上裁輕羅插花步步行看影手中掉旗唱吳歌放船縱棹鼓聲促蛟龍擘水爭馳逐倐親忽逺誰可追朝在西城暮南溪奪標得俊唯恐遲雷轟電激使人迷紅簾彩舫觀者多美人坐上揚雙蛾斷瓶取酒飲如水盤中白筍兼青螺生長江湖樂卑􅊜不信中州天氣和東南溪水來何長若耶清明宜靚粧南湖一吸三百里古人巳疑行鏡裏春風來吹不生波秀壁如奩四邉起滿芽荇蔓自相依躑躅夭姚開滿枝求群白鳥映沙去接翼黃鸝穿樹飛我坐荒城苦卑隰春至花開曽未人蕩漿如從武陵入千花百草使人迷山回水轉不知逺手中紅螺豈須勸輕舟短楫此溪人相要水上亦湔裙家住橫塘散時晚分明笑語隔溪聞種牡丹經冬種牡丹明年待看花春條始秀出蠧巳病其芽柯枯葉亦落重尋但空搓朱欄猶照耀所待已泥沙本不固其根今朝謾咨嗟西湖一月二十日平生拙人事出走臨東藩紛此獄訟地欣乘力筆間漾舟明湖上清鏡照衰顔春風隨我來掃盡氷雪頑花開滿北渚水渌到南山魚鳥自翔泳白雲時往還吾亦樂吾樂放懷天地間願視彼誇者錙銖何足言北湖常時泛西湖已覺煙水永北隄復誰開喪􅉼一川靜久幽繇地偏跬步人迹屏我𥘉得之喜指顧闢棒梗種花延妙香插柳待清影飛梁通兩涯結宇臨四境包羅盡高卑開柘極壬丙灑然塵滓消恍爾心目醒與物振滯淹如人出竒隸日携二三子杖屨屢觀省念時方有為衆智各馳騁獨此得逍遙固知拙者幸百花隄如玉水中沙誰為北湖路久翳荒草根木承青霞步我為彂其枉修營極幽趣髮直而砥平驊騮可馳鶩周以百花林繁香泫清露間以緑楊隂芳風轉朝暮飛梁慿太虛嶢榭躡煙霧直通高城顛海岱歸指顧為州乏長村幸嵗足粳稌與衆飽而嬉陶然無外慕芙蓉臺芙蓉花開秋水冷水靣無風見花影飄香上下兩嬋姢雲在巫山月在天清瀾素礫為庭户羽蓋霓裳不知數臺上遊人下流水柱腳亭亭插花裏欄邉飮酒擢女歌臺北臺南花正多莫笑來時常著屐緑柳墻連使君宅秋懷二首流水寒更淡虛􅑵深自明褰帷逺鍾斷擁褐晨香清油然素心適𬗟𬒳外物輕因時固有應在理復何營隱凡公事退卷書坐南榮以兹逺塵垢何異山中情為州詎非沗即事亮何成幸兹桑麻熟復示倉箱盈閭里凶黨聀階除嚚訟淸日携二三子飽食中園行念非形勢迫免有彈戈驚幽間固可樂勿慕高逺名送李撰赴舉湖水碧槐花黃山川搖落􅑵户涼宿雲星稀日東出青冥風高鷹南翔華堂昨夜讀書客匹馬今朝遊大梁風鋩拂塵見飛影把握驚人持夜光康衢四闢通為里天駟得地方騰􅋮我留東山意頗卓屏棄外慮無毫芒子能相從味沖漠捉箠勿暫遲歸裝送韓玉汝春日城東送韓玉汝赴兩浙轉運以此塘生春草園桞變鳴禽為韻得生字野岸漲流水名園分雜英旭景冠蓋集清談樽酒傾重此臺省秀駕言江海行已喜懷抱粹况推材實精衆許極高逺時方藉經營詎止富中廪固將澤東氓還當本朝用不待芳嵗更功名自兹始勿嘆華髮生招隱寺一徑入松下兩峯橫馬前攀緣緑羅磴飛步蒼崖巔昔人此嘉遁手弄朱絲絃想當林間月獨寫山中泉此樂非外得肯受世網牽我亦本蕭散至此更怡然偏憐最幽處流水鳴濺濺延慶寺會景純正仲希道介天明叟納涼同觀建鄴宫中畫象翰林墨迹延慶寺者劉𥙿故宅中有夀丘山禪方夀丘山平昔宋公宅好風吹雨來暑氣一蕩滌我與二三友歡言同几席神清軼埃壒趣合盡肝鬲嶺竹翠尚新水花紅可摘以此侑樽酒隤然岸巾幘建鄴舊丹青金鑾餘翰墨綽約桃李顔超遙龍虎迹緬矣霸王業信哉文章伯感古已躊躇慕竒復嘆息泊無勢利心自覺襟慮適起坐相扳牽遲留日將夕送豐稷桃華染破南山青漢江此時春水生客舟相語人夜起徑櫓亂江群鴈聲之君飄泊動歸思告我舉裝千里行閎材壯思風雨發緑鬢少年氷雪清讀書若見若經誦下筆千言能立成精微自得有天質操行秀出存鄉評嗟從薄祿困流滯能誘鄙俗銷紛爭絃歌躬勸士強學田里堵安人力耕嗟豫據按但畫諾遇事縮手方蒙成雖知璞玉難強獻欲挂塵榻空含情歲寒不變乃知確物理先否終當亨維舟且盡今夕語明日帆隨白鳥輕不飲酒不飲酒不善諧少年醒眼看花開况從多病久衰耗自顧白髮垂毰毸縱遇花時少情思經春不曽􅋦酒杯布榖但憂天雨少提壷謾聞山鳥催且坐蒲團𥿄窗暖兩衙退後睡敦敦𥘉發襄陽携家夜登現山置酒維舟沔南岸置酒峴山堂入坐松雨濕吹衣水風涼煙嶺火明滅秋湍聲激揚乍釋塵垢纍况餘燈燭光羊公昔宴客為樂未遽央而我獨今夕携家對壷觴頗適麋鹿􅰯頓驚清興長歸去任酩酊詎期誇阿強高陽池山公昔在郡日醉高陽池歸時誇酩酊更問并州兒我亦愛池上眼明見淸漪二年始再往一杯未嘗持念豈公事衆又非筋力衰局束避世網低回紲塵羈獨慚曠逹意竊祿誠巳卑遊鹿門不果方舟下秋瀨巳逺漢南城念昔在郡日苦為塵網嬰低心就薄祿實負山水情鹿門最秀發十里行松柳宿幌白雲影入窗流水聲龐公昔抱道遁世此躬耕風雨塞天地伺晨獨先鳴故巖但聞説巳覺醒朝酲及兹道途出謂諧猿鶴迎顧值深濘阻獨憐幽思并不踏蘇嶺石虛作襄陽行漢廣亭悠悠漢水長剡剡楚山客若與心目期爭從窗户出太守朴鄙人迂無適時術治民務不煩得意偷暇日北城最頻高局促皆曠逸雲根辨毫芒鳥背臨嵂崒亦以樂賔遊豈惟慰衰疾欲寄别後情嗟無少文筆聞喜亭聞喜名自昔廣亭臨漢津飛甍出萬屋地絶無纎塵盤道城堞古逺林墟曲新靜覺耕釣勝幽宜鷗鷺馴賴此荒僻郡幸容朴愚人閣鈴晝常寂齋釀寒更醇一樽且勤設勿負頭上巾劉景升祠景升得二蒯坐諭勝凶殘正當喪亂時能使憔悴寬􅌭紛多士至肅穆萬里安能收衆材助圖大信不難諸公龍鳯姿有待久盤桓得一固足興致之豈無端乃獨采樗櫟不知取椅檀蓋云器有極在理良足歎隆中志士固有待顯默非苟然孔明方微時息駕隆中田出身感三顧魚水相後先開迹在庸蜀欲正九鼎遷垂成中興業復漢臨秦川平生許與際獨北管樂賢人材品目異自得豈虛傳蔡州蔡州昔人居遺堵不可尋青石久埋沒荒煙起空林昔人依劉表意氣傳至今廣路競朱轂深藏閟黃金􅌟難琦琮間咎責積巳深終貽覆宗纍苟得非所欽為惡理當尓足懲誇者心谷隱寺峴南衆峯外窅然空谷深丹樓倚碧殿敻出道安林習池抱鄰曲虛窗漱淸音竹靜幽鳥語果熟孤猿吟故多物外趣足慰倦客心但恨紲塵羈無繇數追尋萬山萬山臨漢臯峯嶺頗秀發王繁舊居處荒草久埋沒解佩蓋巳迷沉碑終自伐最宜北城望正值氛藹歇縹眇出煙雲清明動毛髮留連至歸時長見西林月題張伯常漢上茅屋逺出清漢上隱然一隄長槐柳若雲布連隂入虛堂架險注鳴溜分畦殖群芳豈惟富桑柘蓋亦餘囷倉主人事幽屏不願尚書郎即此徇髙志風騷恣徜徉強起迫義重還歸直明光清風凛然在素壁盈文章故栖勿回眄黃鵠本高翔移守江西先寄潘延之莭推憶昔江西别子時我𥘉先腰五斗粟南北相望十八年俯仰飛光如轉燭子遺萬事遂恬曠我繫一官常局促早衰膽氣自然薄多病顛毛那更緑人情畦畛阻肝膈世路風波悸心目每嗟太守兩朱輪寧及田家一黃犢幸逢懷紱入斗牛喜得披山收寶玉薄材頑鈍待磨琢舊學搶攘期反覆雲鴻可近眼先明野鹿尚縻顔自忸長鬚幸未阻誨存下榻應容拜臨辱漢陽泊舟暫泊漢陽岸不登黃鶴樓江含峩岷氣萬里正東流驚風孤雁起蔽目寒雲浮祗役雖逺道放懷成薄遊興隨滄洲發事等魚樵幽煙波一樽酒盡室載扁舟鄖口昔與宜興君同過此我行去此二十年鄖水不改流潺湲風光滿眼宛如昨故人乘鸞獨騰騫今人隨我不知昔我記昔逰何處言淚向幽襟落如瀉况聞江漢斷腸猿促促為物役促促為物役區區追世情但嗟束縳急未覺章綬榮奈此兩鬢白顧無一㕓耕所求亦云幾脫粟與藜羹鴻鴈江南岸邉江水平水荇青青渚蒲緑鴻雁此時儔侣多亂下沙汀恣棲宿群依青荇唼且鳴暖浴蒲根戲相逐長無矰繳意自間不飽稻粱心亦足性殊凡鳥自知時飛不亂行聊漸陸豈同白鷺空潔白俯啄腥汙期滿腹喜晴天晴萬里無纎風江平水靣磨青銅光華逸發萬物上精氣敻與扶桑通我行江漢道苦惡十步九折遺西東况遭積雨駕高浪沙翻石走相撞舂操舟衆工立噤岸􅊜櫓鑽火磨星紅荒蹊成瀦尺寸礙永日四望無人蹤一時得意數蛙黽鳴躍振踞泥塗中隂消陽勝有先兆宇宙丹翠含沖融今晨霾曀一掃蕩羲和徐行驅六龍眼明意豁萬事快預喜來年牟麥豐酬王正仲登嶽麓寺閣見寄聞君東南使攬轡雲松間皇華照楚甸吉玉投衡山幽尋得臨觀意豁窮躋攀顧我客牛斗三年踈往還低心念弱志引領望衰顔未共樽酒樂良嗟人事艱叱馭犯氷雪回鑣馳九關何足慰離思德音鏘佩環訪石仙巖杜法師杜君袖􅋦丹砂書一顧訶斥百怪除聲如翻河落天衢四方爭迎走高車方曈秀貌垂白髮買船東南尋舊居石巖天開立精廬四山波瀾勢爭趣君琴一張酒一壷笑談衮衮樂有餘我今歸來尚踟蹰羡君決發真丈夫曉出曉出城南羅卒乘皇纛朱旗密相映貔貅距躍良家子鵝􅔏彌縫司馬令奪摽一一飛步疾槃槊兩兩翻身徑霸上今朝且兒戲衛青異日須天幸和貢甫送元考不至蓬山有行客欲上北城舟學問本閎博言談悲謬悠常陳帝王略得試紫雲樓一時驚豪捷况復富春秋朋逰所欣附爭欲致綢繆承明動鄉思歲久道苦修忽懷淄川組夙昔願始酬出餞集儔侣青歡期少留酒闌竟不至眷眷久臨流微我獨有咎此詩聊可求京師觀音院新堂九衢言語亂人耳三市塵沙眯人目猿狙未慣褁章綬魚鳥寧忘慕溪谷悵無棲宿在清曠欲弄潺湲愈煩燠道人誰氏斥隹境決漢披霄敞華屋駢羅嶷嶷三秀石藂迸姢姢兩修竹雲蒸雨泄𬒳巖􅊤海倒河垂動林麓頓驚俯仰逺囂濁豈直形骸擺羈束解衣堅坐暝忘返飲水淸談心亦足丈夫壯志須坦蕩曲士隂機謾翻覆青鞋赤舄偶然爾安用區區巧追逐元豐類藁卷之五
