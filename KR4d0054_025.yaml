front:
  text: 元豐類藁卷之二十五
  hash: sha256:3dc2b9d7858ba163bb3b7cb918371827309cc5cb61f2b448cf099517933b43a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_025-1a}
body:
  text: 制誥祕書監制帝王之治必有圖籍之蔵又擇當世聦明㧞出之士聚於其間使得漸磨文學之益奨成其材以待國家之用故書省之設吾不計近功而要於廣畜徳所以厚其禮秩而艱於用人庻以明朕好古樂善之勤而勵學士大夫之行也某多識慱聞操守純䔍諸儒所尚令問惟舊延䖏兹位蔽自朕知夫尊其所聞而行之不倦使輔於世教而其効可言非獨優㳺册府而巳在爾自強以承朕志著作郎制麟䑓著作之任郎以詞學為之必惟其人爾以材選惟能明扵理要乃可見於文章其尚敏於厥脩朕方觀汝之効秘書郎制秘蔵四部之圖籍郎所守也職清秩羙必也属之其人爾以材稱俾服兹選尚惟敏於畜徳朕方觀汝之能正字制是正文字之官實為儒學之選宜躰育材之意勉思畜徳之勤殿中監制分職殿内參侍左右監緫六尚之官以供服御之事位視九列禮秩甚優正名之𥘉考擇惟慎某明習吏治勞閱有聞選於在廷俾踐厥任往其祗飾無忘訓詞殿中丞制丞扵殿内參緫六尚之官而察其稽失出於公選首以材升尚務欽承方觀汝効太常丞制丞於奉常叅揔禮樂之事祠祝之義惟學古知方乃能不失其守尚務秪飾以服官箴衞尉卿制典領宿衞之官地親責重位在九列禮秩甚隆考擇其人属任惟慎某忠䔍謹信濟以材敏周廬屯候之士武庫弓鎧之噐往顓楤治僉曰汝諧其尚懋㢤以祗朕命太僕卿制書曰僕臣正厥后克正盖親近左右有輔導之義矧車府廐馬牧監之政莫不咨焉非得其人曷稱厥位某材質敏明乆更器使司馭之選汝惟克諧其祗厥官以服朕命大理卿制折獄詳刑之事朕所重也典領之官位在九列正名之始選用非輕某明習吏治通於法今廷尉之任僉曰汝諧往其欽㢤以率厥属國子祭酒司業制學校之法雖使之通經術治文字然要其犬致則在於明上之敎以導民飬人之材以成俗故師氏之位必惟其能某質性粹冲術業通愽訓誨之任宜正寵名夫行其所知以先游學之士使風化之出自京師始侍爾稱職可不懋㢤太學博士制愽士以文學為官往者列於成均其秩未正朕登之朝序所以尊庠序之教而勵士大夫也爾以經行選用往服厥官盖尊其所聞以誘率學者汝之守也惟是懋㢤少府監制百工伎巧之事展采俻物之政典領之任位視列卿正名之𥘉考擇惟慎某明習吏治勞閱有聞選扵僉言俾踐厥職尚其祗飾以服訓詞軍噐監制繕治戎械訓工程作之任置監典領禮秩甚隆正名之𥘉考擇惟慎某明習吏事勞閱有聞選扵在廷俾踐厥位聞其祗飾以服訓詞太宗正丞制司宗之於國族門内之治也然合逺近之属而齊之有不得專扵爱者其扵斟酌緩急㤙義之際信難䖏㢤故其属有丞以參聴其事而交脩其官考擇爾能俾在兹夫親九族以刑萬邦此有國之先務也其躰朕心徃從而長服兹是訓以欽厥司諸丞制丞扵有司參其政事而察其稽失以材選用尚懋爾勤知開封府制開封府朕建國焉天下所並湊衆大而俗雜尹正之寄非仁䔍公勇材任煩劇不䏻稱其職今朕脩㝎官儀正其名號固将考求其實使効見扵事則用人之際豈輕也㢤某爽邁開逹練習治軆閱試惟舊功用顯白處以兹任莫如汝諧夫慈惠足以煦飬惸弱剛嚴足以帖伏奸強然導民之方尚有可識使四方有以觀則而朕有以仰成在汝勉㢤以稱朕命開府儀同三司制開府之扵榮名重矣矧優其禮命視于三事故其品為第一所以隆崇大臣古今之通制也朕順于舊典考正官儀惟是首扵文階是用制其禄入秩莫厚焉非時宗工夫豈虚授某材資桀異識慮閱深莊重足以鎮浮精明足以成務熈帝之載有賛元經軆之庸提将之符有折衝綏逺之效今百揆攸叙方内靖嘉時乃之功助朕致此是用峻其名秩申此寵章夫襃有功顯有徳朕於尊奨近輔之心可謂至矣親百姓撫四夷爾於将順朕志之義可不懋㢤尚軆至懐徃承厥叙開封府獄空轉官制京師天下之聚俗雜五方之民至扵智或侵愚強或陵弱巧偽滋出獄訟繁興統理之難爲日巳乆某明敏開逹曉習吏事輟自禁近属之尹正以公扵奉上之志絶阿以附下之私摘發姦欺動而必中弹治豪右勇扵敢爲使縲絏無非罪之嗟囹圄有空虚之效求之近歲罕能及此聞于朕徳時惟汝加夫賞所以襃善而勸衆也進官一䓁疇爾之庸其尚懋㢤以永来譽樞宻遷官加殿學士知州制典國樞要之臣恊相帷幄之謀弥綸疆之事夙夜不懈風力施扵省决精明用扵思慮盖勤且煩如是而厯時且乆豈朕優礼耆舊之意欤某忠加恵和徳操惟邵先帝所遺以輔朕躬當國本兵庶言惟允而屡辭㡬政毎請弥確志不可易朕所重違是用改進文階延升祕殿乃眷東夏䖏以近藩衍食真封併加寵数朕扵隆崇近輔時其劳逸使得自檡出入之宜可以爲有㤙矣尔扵迺心王室罔以内外無忘益勵始終之節其可以不勉㢤侍讀制盖用儒學之臣入閤侍讀所以考質疑義非專誦習而巳其列扵分職始自開元而朕尤意嚮之某博通今古服在從官兹選甚高属爾惟允朕以未聞扵史者䆒觀前世之変而至夫理亂興壊之際未嘗不反復焉其悉所知以輔朕志是為爾守其徃欽㢤殿前都指揮使制朕擇材勇之士備宫屯之兵以宿衞京師填附方夏置帥殿陛属之董齊非強毅忠劳閱試惟舊不在兹選豈非重欤某䔍實沉雄明扵䇿慮護邉制敵身有顯庸兹用命爾就列大廷典綏王旅建旄立纛為囯藩翰爰田真食並錫寵㤙夫兵有擊刺射馭之能有坐作進退之法敎習可以程其技莭制可以閑其侮然能使之合心一力則在知所以附之能使之取威决勝則在知所以用之審如是焉厥惟難矣盖熟之扵易所以圖其難得之扵素所以應其変非造刑而後㝎計非合戦而後屈人故師飽扵逸而朝廷尊馬肥扵休而夷狄叙惟予之武以無敵扵四方則爾之良亦有聞扵来世徃遵辭訓以服厥官使相制在昔大雅所歌成周之盛吕侯申伯並為國藩休父太師實将王旅出入踐更之雖異中外屏毗而則均時予宗臣分保近服盖循斯義以告在廷某精慮造微翹材絶衆崇論閎議富于文辭強識慱聞飽扵術學繇禁林之献納任廊廟之弼諧浸更歲時休有功烈而屡形懇請願避煩㡬雖敦譬之甚勤願壮懐之難奪是用錫之土宇寵以莭旄視宰路之䓁威益爰田之㤙数徃釐東夏外倡庻邦予有式群辟之典彛爾其底迪予有覃四方之徳澤尔其布宣以夾輔扵本朝以阜康扵生齒配于前哲属在老成其代天工矧乆聞扵大政迺心王室尚思告扵嘉猷莭度使制有地千里治兵與民内衞京師外拊疆埸非文武器幹望臨一時朕所寵嘉不在兹選某温良能断沉静善謀直道著扵當官周材見扵經務承流宣化善政有聞雖逺折衝壮猷彌顯是用錫之土宇授以莭旄生齒寔繁属爾以安輯師屯甚衆諉爾以訓齊以作股肱之良以為國藩輔之重無忘忠力庻訖外庸惟亮天功待汝守四方之効無輕民事副于安百姓之心尚軆眷懐豈煩多訓莭度加宣徽制維昔牧伯長師之官有土與民共于外服所以為國藩輔仐方鎮之任連数十城之地籍兵與衆而授之建旄立纛殿于大邦以作衞王室亦惟用稽于古非文武之特才擅一時孰能稱兹選哉厥有顯庸冝加寵命迺揚孚號以告庶位某荘毅足以任重肅括足以提身有能断大事之明有克勤小物之慎考于僉議付以成師宣化承流實禆治躰折衝綏逺克暢武經故能紓朕之憂副人之望夫徳茂者其賞異功隆者其報殊是疇其底績之勤錫以宣猷之號揆于常典非朕爾私盖位重者其憂深禄富者其責厚名数禮秩朕既無忘爾劳功實事為爾尚恊朕之志矧夫填臨塞路總領兵防班籍聮于輔臣謀畫參于國論其思勉勵以副眷懐軍帥制爪牙之臣典領周衞非特強主威以鎮内外也盖禮弥盛者備彌飾上下之莭然也則任吾事者豈可以非其人㢤某沉勇忠實勞閱有聞蔽自朕心俾供厥服仍遷位䓁其尚叙承将軍制朕有連營列校之衆以宿衞京師鎮撫諸夏能使士齊而奮其惟統督之臣求之在廷其選甚重某忠勇仁厚将以致謀使治吾軍必能副朕所属今閱士之藝朕皆親臨㧞其異能而汰其疲軟其於撫循訓勵之方可謂至矣爾於典領惟公賞罰可以服其心惟䔍恩信可以致其力使䖏則有以飬朕之威出則有以揚朕之武待爾任職稱朕意焉都虞候制士之以材武宿衞左右者其選甚精而虞度候視扵軍中者其任甚寵某忠勇有勞宜在此位進遷使號其徃欽承都知制門闈房闥之間朝夕給事非謹信忠䔍烏可䖏斯任㢤某服勞左右閱歲巳深淑慎厥躬朕所考察俾率厥属徃惟汝宜其思永于厥脩尚終綏于榮禄内臣制給事長秋服勤惟舊仐其老矣思就便安禄爾之勞宜進位䓁尚思祗服以稱朕㤙責帥制朕拊士於間暇之時盖将責其効也至扵臨敵逋亡朕雖假之以㤙而将帥之臣則當濟之以肅使紀律章明然後威可勵而士可用也爾握兵之要宜知其職而潰卒之入煦煦受之勞問餉給如勞歸師使夫三軍之衆将何視焉有苟簡姑息之心無守正奉公之誼閫外之事朕孰頼㢤議罪正刑有國之典奪其近職䖏以偏州尚自省循兹為薄責監司制分部而使連数十城事之與奪吏之絀陟係馬古方伯之任也其選甚重固無假人爾脩㓗純明治行強敏刺督之寄往共厥服夫能使政舉刑清和樂交扵上下人足家給富饒洽扵公私皆汝守也可不念㢤廣西轉運制自既開百粤而地盡南海提封萬里莫不内属本朝之制始分桂林以為西部非獨鎮撫吾民亦以綏馭山居谷聚並海之蠻夷故将命而使其選常重爾嘗試而可用是用任属進柔逺則能邇其務宣布上㤙輯寕異土無失朕指往欽厥司蜀轉運判官制西南之地延袤萬餘里外臨殊俗内雜谿谷諸蠻列州成縣以保安吾民境大人衆故属部為四而利居其一最逺且險參扵使事其選甚高求扵在廷是用属爾夫保民以仁而懐逺以徳兹朕所嚮其徃欽㢤轉運使制國家歲漕東南之粟以實京師故命使部之臣推擇能吏使度材具舟以濟其役爾應其選歲課甚優是用遷秩京司以爲爾寵朕於臣下之勤勞雖㣲且逺無所遺矣則爾之自効可不勉㢤陜西轉運使制分部而使兼地数千里治兵與民與夫征賦之出入自陜以右則又與疆埸之事具扵寄属必惟其人察于在廷無以易爾夫使督課明而政事舉經畫當而財用足吏與士皆恱而勸兵與民皆贍而靖爾之任也其尚起㢤提舉常平制一朕憫農之不易故擇材諝之臣分部四出以平其政令而佐其衣食之業爾以能聞當是任属其務知朕之意在扵惠民徃慎厥司慰彼黎庶提舉常平制二朕憫夫農之艱且勤故詳為勸助之政又擇能吏分部四出使椎而行之爾以材聞預在兹選其思宣布朕㤙使敦本業之民安其田里而足於衣食則爾為能稱其職可不勉㢤元豊類藁卷之二十五
