front:
  text: 元豐類藁卷之二十五
  hash: sha256:3dc2b9d7858ba163bb3b7cb918371827309cc5cb61f2b448cf099517933b43a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_025-1a}
body:
  text: 制誥祕書監制帝王之治必有圖籍之藏又擇當世聰明拔出之士聚於其間使得漸磨文學之益奬成其材以待國家之用故書省之設吾不計近功而要於廣畜德所以厚其禮秩而艱於用人庶以明朕好古樂善之勤而勵學士大夫之行也某多識慱聞操守純篤諸儒所尚令問惟舊延處兹位蔽自朕知夫尊其所聞而行之不倦使輔於世教而其效可言非獨優遊册府而巳在爾自強以承朕志著作郎制麟臺著作之任郎以詞學為之必惟其人爾以材選惟能明于理要乃可見於文章其尚敏於厥修朕方觀汝之效祕書郎制祕藏四部之圖籍郎所守也職清秩美必也屬之其人爾以材稱俾服兹選尚惟敏於畜德朕方觀汝之能正字制是正文字之官實為儒學之選宜躰育材之意勉思畜德之勤殿中監制分職殿內參侍左右監總六尚之官以供服御之事位視九列禮秩甚優正名之𥘉考擇惟慎某明習吏治勞閲有聞選於在廷俾踐厥任往其祗飾無忘訓詞殿中丞制丞于殿內參總六尚之官而察其稽失出於公選首以材升尚務欽承方觀汝效太常丞制丞於奉常參揔禮樂之事祠祝之義惟學古知方乃能不失其守尚務秪飾以服官針衛尉卿制典領宿衛之官地親責重位在九列禮秩甚隆考擇其人屬任惟慎某忠篤謹信濟以材敏周廬屯候之士武庫弓鎧之器往顓楤治僉曰汝諧其尚懋哉以祗朕命太僕卿制書曰僕臣正厥后克正蓋親近左右有輔導之義矧車府廄馬牧監之政莫不咨焉非得其人曷稱厥位某材質敏明久更器使司馭之選汝惟克諧其祗厥官以服朕命大理卿制折獄詳刑之事朕所重也典領之官位在九列正名之始選用非輕某明習吏治通於法今廷尉之任僉曰汝諧往其欽哉以率厥屬國子祭酒司業制學校之法雖使之通經術治文字然要其犬致則在於明上之教以導民飬人之材以成俗故師氏之位必惟其能某質性粹沖術業通博訓誨之任宜正寵名夫行其所知以先遊學之士使風化之出自京師始侍爾稱職可不懋哉太學博士制博士以文學為官往者列於成均其秩未正朕登之朝序所以尊庠序之教而勵士大夫也爾以經行選用往服厥官蓋尊其所聞以誘率學者汝之守也惟是懋哉少府監制百工伎巧之事展采備物之政典領之任位視列卿正名之𥘉考擇惟慎某明習吏治勞閲有聞選于僉言俾踐厥職尚其祗飾以服訓詞軍器監制繕治戎械訓工程作之任置監典領禮秩甚隆正名之𥘉考擇惟慎某明習吏事勞閲有聞選于在廷俾踐厥位聞其祗飾以服訓詞太宗正丞制司宗之於國族門內之治也然合逺近之屬而齊之有不得專于愛者其于斟酌緩急恩義之際信難處哉故其屬有丞以參聽其事而交修其官考擇爾能俾在兹夫親九族以刑萬邦此有國之先務也其躰朕心往從而長服兹是訓以欽厥司諸丞制丞于有司參其政事而察其稽失以材選用尚懋爾勤知開封府制開封府朕建國焉天下所並湊衆大而俗雜尹正之寄非仁篤公勇材任煩劇不能稱其職今朕修㝎官儀正其名號固將考求其實使效見于事則用人之際豈輕也哉某爽邁開逹練習治體閲試惟舊功用顯白處以兹任莫如汝諧夫慈惠足以煦飬惸弱剛嚴足以帖伏姦強然導民之方尚有可識使四方有以觀則而朕有以仰成在汝勉哉以稱朕命開府儀同三司制開府之于榮名重矣矧優其禮命視于三事故其品為第一所以隆崇大臣古今之通制也朕順于舊典考正官儀惟是首于文階是用制其祿入秩莫厚焉非時宗工夫豈虛授某材資桀異識慮閲深莊重足以鎮浮精明足以成務熙帝之載有贊元經體之庸提將之符有折衝綏逺之效今百揆攸敘方內靖嘉時乃之功助朕致此是用峻其名秩申此寵章夫褒有功顯有德朕於尊奬近輔之心可謂至矣親百姓撫四夷爾於將順朕志之義可不懋哉尚體至懷往承厥敘開封府獄空轉官制京師天下之聚俗雜五方之民至于智或侵愚強或陵弱巧偽滋出獄訟繁興統理之難為日巳久某明敏開逹曉習吏事輟自禁近屬之尹正以公于奉上之志絶阿以附下之私摘發姦欺動而必中彈治豪右勇于敢為使縲絏無非罪之嗟囹圄有空虛之效求之近歲罕能及此聞于朕德時惟汝加夫賞所以褒善而勸衆也進官一等疇爾之庸其尚懋哉以永來譽樞密遷官加殿學士知州制典國樞要之臣協相帷幄之謀彌綸疆之事夙夜不懈風力施于省決精明用于思慮蓋勤且煩如是而厯時且久豈朕優禮耆舊之意歟某忠加惠和德操惟邵先帝所遺以輔朕躬當國本兵庶言惟允而屢辭幾政每請彌確志不可易朕所重違是用改進文階延升祕殿乃眷東夏處以近藩衍食真封併加寵數朕于隆崇近輔時其勞逸使得自檡出入之宜可以為有恩矣爾于乃心王室罔以內外無忘益勵始終之節其可以不勉哉侍讀制蓋用儒學之臣入閣侍讀所以考質疑義非專誦習而巳其列于分職始自開元而朕尤意嚮之某博通今古服在從官兹選甚高屬爾惟允朕以未聞于史者究觀前世之變而至夫理亂興壞之際未嘗不反復焉其悉所知以輔朕志是為爾守其往欽哉殿前都指揮使制朕擇材勇之士備宫屯之兵以宿衛京師填附方夏置帥殿陛屬之董齊非強毅忠勞閲試惟舊不在兹選豈非重歟某篤實沉雄明于䇿慮護邉制敵身有顯庸兹用命爾就列大廷典綏王旅建旄立纛為國藩翰爰田真食並錫寵恩夫兵有擊刺射馭之能有坐作進退之法教習可以程其技莭制可以間其侮然能使之合心一力則在知所以附之能使之取威決勝則在知所以用之審如是焉厥惟難矣蓋熟之于易所以圖其難得之于素所以應其變非造刑而後㝎計非合戰而後屈人故師飽于逸而朝廷尊馬肥于休而夷狄敘惟豫之武以無敵于四方則爾之良亦有聞于來世往遵辭訓以服厥官使相制在昔大雅所歌成周之盛吕侯申伯並為國藩休父太師實將王旅出入踐更之雖異中外屏毗而則均時豫宗臣分保近服蓋循斯義以告在廷某精慮造微翹材絶衆崇論閎議富于文辭強識慱聞飽于術學繇禁林之獻納任廊廟之弼諧浸更歲時休有功烈而屢形懇請願避煩幾雖敦譬之甚勤願壯懷之難奪是用錫之土宇寵以莭旄視宰路之等威益爰田之恩數往釐東夏外倡庶邦豫有式群辟之典彛爾其底迪豫有覃四方之德澤爾其布宣以夾輔于本朝以阜康于生齒配于前哲屬在老成其代天工矧久聞于大政乃心王室尚思告于嘉猷莭度使制有地千里治兵與民內衛京師外拊疆埸非文武器幹望臨一時朕所寵嘉不在兹選某溫良能斷沉靜善謀直道著于當官周材見于經務承流宣化善政有聞雖逺折衝壯猷彌顯是用錫之土宇授以莭旄生齒實繁屬爾以安輯師屯甚衆諉爾以訓齊以作股肱之良以為國藩輔之重無忘忠力庶訖外庸惟亮天功待汝守四方之效無輕民事副于安百姓之心尚體眷懷豈煩多訓莭度加宣徽制維昔牧伯長師之官有土與民共于外服所以為國藩輔仐方鎮之任連數十城之地籍兵與衆而授之建旄立纛殿于大邦以作衛王室亦惟用稽于古非文武之特才擅一時孰能稱兹選哉厥有顯庸冝加寵命乃揚孚號以告庶位某莊毅足以任重肅括足以提身有能斷大事之明有克勤小物之慎考于僉議付以成師宣化承流實禆治躰折衝綏逺克暢武經故能紓朕之憂副人之望夫德茂者其賞異功隆者其報殊是疇其底績之勤錫以宣猷之號揆于常典非朕爾私蓋位重者其憂深祿富者其責厚名數禮秩朕既無忘爾勞功實事為爾尚協朕之志矧夫填臨塞路總領兵防班籍聮于輔臣謀畫參于國論其思勉勵以副眷懷軍帥制爪牙之臣典領周衛非特強主威以鎮內外也蓋禮彌盛者備彌飾上下之莭然也則任吾事者豈可以非其人哉某沉勇忠實勞閲有聞蔽自朕心俾供厥服仍遷位等其尚敘承將軍制朕有連營列校之衆以宿衛京師鎮撫諸夏能使士齊而奮其惟統督之臣求之在廷其選甚重某忠勇仁厚將以致謀使治吾軍必能副朕所屬今閲士之藝朕皆親臨拔其異能而汰其疲軟其於撫循訓勵之方可謂至矣爾於典領惟公賞罰可以服其心惟篤恩信可以致其力使處則有以飬朕之威出則有以揚朕之武待爾任職稱朕意焉都虞候制士之以材武宿衛左右者其選甚精而虞度候視于軍中者其任甚寵某忠勇有勞宜在此位進遷使號其往欽承都知制門闈房闥之間朝夕給事非謹信忠篤烏可處斯任哉某服勞左右閲歲巳深淑慎厥躬朕所考察俾率厥屬往惟汝宜其思永于厥修尚終綏于榮祿內臣制給事長秋服勤惟舊仐其老矣思就便安祿爾之勞宜進位等尚思祗服以稱朕恩責帥制朕拊士於間暇之時蓋將責其效也至于臨敵逋亡朕雖假之以恩而將帥之臣則當濟之以肅使紀律章明然後威可勵而士可用也爾握兵之要宜知其職而潰卒之入煦煦受之勞問餉給如勞歸師使夫三軍之衆將何視焉有苟簡姑息之心無守正奉公之誼閫外之事朕孰賴哉議罪正刑有國之典奪其近職處以偏州尚自省循兹為薄責監司制分部而使連數十城事之與奪吏之絀陟係馬古方伯之任也其選甚重固無假人爾修潔純明治行強敏刺督之寄往共厥服夫能使政舉刑清和樂交于上下人足家給富饒洽于公私皆汝守也可不念哉廣西轉運制自既開百粵而地盡南海提封萬里莫不內屬本朝之制始分桂林以為西部非獨鎮撫吾民亦以綏馭山居谷聚並海之蠻夷故將命而使其選常重爾嘗試而可用是用任屬進柔逺則能邇其務宣布上恩輯寧異土無失朕指往欽厥司蜀轉運判官制西南之地延袤萬餘里外臨殊俗內雜溪谷諸蠻列州成縣以保安吾民境大人衆故屬部為四而利居其一最逺且險參于使事其選甚高求于在廷是用屬爾夫保民以仁而懷逺以德兹朕所嚮其往欽哉轉運使制國家歲漕東南之粟以實京師故命使部之臣推擇能吏使度材具舟以濟其役爾應其選歲課甚優是用遷秩京司以為爾寵朕於臣下之勤勞雖微且逺無所遺矣則爾之自效可不勉哉陜西轉運使制分部而使兼地數千里治兵與民與夫征賦之出入自陜以右則又與疆埸之事具于寄屬必惟其人察于在廷無以易爾夫使督課明而政事舉經畫當而財用足吏與士皆恱而勸兵與民皆贍而靖爾之任也其尚起哉提舉常平制一朕憫農之不易故擇材諝之臣分部四出以平其政令而佐其衣食之業爾以能聞當是任屬其務知朕之意在于惠民往慎厥司慰彼黎庶提舉常平制二朕憫夫農之艱且勤故詳為勸助之政又擇能吏分部四出使椎而行之爾以材聞預在兹選其思宣布朕恩使敦本業之民安其田里而足於衣食則爾為能稱其職可不勉哉元豐類藁卷之二十五
