body:
  text: 序李白詩集後序李白詩集二十卷舊七百若干篇今九百若干篇者知制誥常山宋敏求字次道之所廣也次道既以類廣白詩自為序而未考次其作之先後余得其書乃考其先後而次第之蓋白蜀郡人𥘉隱岷山出居襄漢之間南遊江淮至楚觀雲夢雲夢許氏者高宗時宰相圉師之家也以女妻白因留雲夢者三年去之齊魯居徂耒山竹溪入吳至長安明皇聞其名召見以為翰林供奉頃之不合去北拞趙魏燕晉西涉岐祁歷商于至洛陽遊梁最久復之齊魯南浮淮泗再入吳轉徙金陵上秋浦潯陽天寶十四載安祿山反明年明皇在蜀永王璘莭度東南白時卧廬山璘迫致之璘軍敗丹陽白奔亡至宿松坐繫尋陽獄宣撫大使崔渙與御史中丞宋若思驗治白以為罪薄冝貰而若思軍赴河南遂釋白囚使謀其軍事上書肅宗薦白材可用不報是時白年五十有七矣乾元元年終以汚璘事長流夜郎遂泛洞庭上峽江至巫山以赦得釋憩嶽陽江夏久之復如尋陽過金陵徘徊于歷陽宣城二郡其族人陽氷為當塗令白過之以病卒年六十有四是時寶應元年也其始終所更涉如此此白之詩書所自敘可考者也范傳正為白墓志稱白偶乘艑一日千里或遇勝景終年不移則見于白之自敘者蓋亦其略也舊史稱白山東人為翰林待詔又稱永王璘莭度楊州白在宣城謁見遂辟為從事而新書又稱白流夜郎還尋陽坐事下獄宋若思釋之者皆不合白之自敘蓋史誤也白之詩連類引義雖中于法度者寡然其辭朋肆雋偉殆騷人所不及近世所未有也薦史稱白有逸才志氣宏逺飄然有超世之心余以為實録而新書不著其語故録之使覽者得詳焉先大夫集後序公所為書號仙鳬羽翼者三十卷西陲要紀者十卷清邊前要五十卷廣中台志八十卷為臣要紀三卷四聲韻五卷總一百七十八卷皆刋行于世今類次詩賦書奏一百二十三篇又自為十卷藏于家方五代之際儒學既擯焉後生小子治術業于閭巷文多淺近是時公雖少所學巳皆知治亂得失興壞之理其為文閎深雋美而長于諷諭今類次樂府已下是也宋既平天下公始出仕當此之時太祖太宗巳綱紀大法矣公于是勇言當世之得失其在朝廷疾當事者不忠故凡言天下之要必本天子憂憐百姓勞心萬事之意而推大臣從官執事之人觀望懷姦不稱天子屬任之心故治未久洽至其難言則人有所不敢言者雖屢不合而出而所言益切不以利害禍福動其意也始公尤見竒于太宗自光祿寺丞越州監酒稅召見以為直史館遂為兩浙轉運使未久而真宗即位益以材見知𥘉試以知制誥及西兵起又以為自陜以西經略判官而公常且方論大臣當時皆不恱故不果用然真宗終感其言故為泉州未盡一歲拜蘇州五日又為楊州將復召之也而公于是時又上書語斥大臣尤切故卒以齟齬終公之言其大者以自唐之衰民窮久矣海內既集天子方修法度而用事者尚多煩碎治財利之臣又益急公獨以謂冝遵簡易罷管榷以與民休息塞天下望祥符𥘉四方爭言符應天子因之遂用事泰山祠汾隂而道家之説亦滋甚自京師至四方皆大治宮觀公益諍以謂天命不可専任冝絀姦臣修人事反復至數百千言鳴呼公之盡忠天子之受盡言何必古人此非傳之所謂主聖臣直者乎何其盛也何其盛也公在兩浙奏罷苛稅二百三十餘條在京西又與三司爭論免民租釋逋負之在民者蓋公之所試如此所試者大其庶幾矣公所嘗言其衆其在前及書亡者蓋不得而集其或從或否而後常可思者與歷官行事盧陵歐陽修公巳銘公之碑持詳焉此故不論論其不盡載者公卒以齟齬終其功行或不得在史氏記藉令記之當時好公者少史其果可信歟後有君子欲推而考之讀公之碑與其書及余小子之序其意者具見其表裏其於虛實之論可核矣公卒乃贈諌議大夫姓曽氏諱某南豐人序其書者公之孫葦也至和元年十二月日謹序王深父文集序深甫吾友也姓王氏諱回當先王之迹熄六藝殘缺道術衰微天下學者無所折衷深甫于是奮然獨起因先王之遺文以求其意得之于心行之于巳其動止語默必考于法度而窮逹得喪不易其志也文集二十卷其辭反復辨逹有所開闡其卒蓋將歸于簡也其破去百家傳注惟散缺不全之經以明聖人之道于千載之後所以振斯文于將墜回學者于既溺可謂道德之要言非世之别集而已也後之潛心于聖人者將必由是而有得則其于世教豈小輔之而已哉鳴呼深甫其志方強其德方進而不幸死矣故其澤不加于天下而其言止于此然觀其所考者豈非孟子所謂名卋者歟其文有片言半簡非大義所有皆附而不去者所以明深甫之于其細行皆可傳于世也深甫福州侯官縣人今家于頴嘗舉進士中其科為毫州衛真縣主簿未一歲棄去遂不復仕卒于治平二年之七月二十八日年四十有三天子嘗以某軍莭度推官知陳州南頓縣事就其家命之而深甫既卒矣王子直文集矣至平之極教化既成道德同而風俗一言理者雖異人殊世未嘗不同其指何則理當無二也是以詩書之文自唐虞以耒至秦魯之際其相去千餘載其作者非一人至于其間嘗更衰亂然學者尚蒙餘澤雖其文數萬而其所彂明更相表裏如一人之説不知時世之逺作者之衆也鳴呼上下之間漸磨陶治至于如此豐非盛哉自三代教養之法廢先王之澤熄學者人之異見而諸子各自為家豈其固相反哉不當于理故不能一也由漢以來益逺于治故學者雖有魁竒拔出之材而其文能馳騁上下偉麗可喜者甚衆然是非取舍不當于聖人之意者亦巳多矣故其説未嘗一而聖人之道未嘗明也士之生于是時其言能當于理者玄可謂難矣由是觀之則文章之得失豈不繫于治亂哉長樂王向字子直少已著文數萬言與其兄弟俱名聞天臣下可謂魁竒拔出之材而其文能馳騁上下偉麗可喜者也讀其書知其歟漢以來名能文者俱列於作者之林未知其孰先孰後考其意不當于理亦少矣然子直晚自以為不足而悔其少作更砍窮探力取極聖人之指要盛行則𣣔發而見之事業窮居則𣣔推而托之于文章將與詩書之作者並而又未知孰先孰後也然不幸蚤世故雖有難得之材獨立之志而不得及其成就此吾徒與子直之兄回字深甫所以深恨于斯人也子冥官世行治深父巳為之銘而書其數萬言者屬豫為敘豫觀子直之所自見者巳足暴于丗矣故特為之序其志云王容季文集序敘事莫如書其在堯典述命羲和宅圡測日咎星候氣揆民綏急兼蠻夷鳥獸其財成輔相備三才萬物之理以治百官授萬民興衆功可謂博矣然其言不過數一其于舜典則曰在璿璣玉衡以齊西政蓋堯之時觀天以曆象至舜又察之璣衡聖人之法至後世益備也曰宅者則日月五星曰政者則羲和之所治無不任焉其體至大蓋一言而盡可謂微矣其言徾故學者所不得不盡心能盡心然後能自得之此所以為經而歷千餘年蓋能得之者少也易詩禮春秋論語皆然其曰測之而益深窮之而益逺信也世既衰能言者益少承孔子者孟子而巳承孟子者楊子而已楊子之稱孟子曰知言之要知德之奧若楊子則亦足以幾乎此矣其次能敘事使可行于逺者若子夏左丘明司馬遷韓愈亦可謂拔出之材其言庶乎有益者也吾友王氏兄弟曰回深父曰向子直曰冏容季皆善屬文長于敘事深父尤深而子直容季益能稱其兄者也皆可謂拔出之材令其克壽得就其志則將紹六藝之遺言其可禦哉豫嘗敘深父子直之文銘容季之墓而容季之兄固子堅又集容季之遺藁屬豫序之豫憫俗之朋友故舊道缺不自知其不能強次是説以為容季文集序熙寧九年冬南昌群齊范貫之奏議集序尚書户部郎中直龍圗閣范公貫之之議奏凡若干篇其子世京集為十卷而屬豫序之蓋自至和巳後十餘年間公常以言事任職自天子大臣至于群下自掖庭至于四方幽隱一有得失善惡關于政理公無不極意反復為上力言或矯拂情𣣔或功劘計慮或辨别忠侫而處其進退章有一再或至于十餘上事有隂爭獨陳或悉引諌官御史合議肆言仁宗常虛心采納為之變命令更廢舉近或立從逺或越月踰時或至于其後卒從聽用蓋當是時仁宗在位歲久熟于人事之情偽與群臣之能否方以仁厚清靜休養元元至于是非與奪則一歸是公議而不自用也其所引拔以言為職者如公皆一時之選而公與同時之士亦皆樂得其言不曲從苟止故天下之情因得畢聞于上而事之害理者常不果行至于竒邪次睢有為之者亦輒敗悔故當此之時常委事七八大臣而朝政無大闕失群臣奉法遵職海內乂安夫因人而不自用者天也仁宗之所以其仁如天至於享國四十餘年能承太平之業者繇是而已後世得公之遺文而論其世見其上下之際相成如此必將抵回感慕有不可及之嘆然後知其時之難得則公言之不沒豈獨見其志所以明先帝之盛德于無窮也公為人溫良慈恕其從政寬易愛人及在朝廷危言正色人有所不能及也凡同時與公有言責者後多至大官而公獨早卒公諱師道其世次州里歷官行事有今資政殿學士趙公忭為公之墓銘云王平甫文集序王平甫既殁其家集其遺文為百卷屬豫序平甫自少巳傑然以材高見于世為文思若決河語出驚人一時爭傳誦之其學問尤敏而資之以不倦至晚愈薦博覽強記于書無所不通其明于是非得失之理為尤詳其文閎富典重其詩博而深矣自周衰先王之遺文既喪漢興文學猶為近古及其衰而陵夷盡矣至唐久之而能言之士始幾于漢及其衰而遂泯泯矣宋受命百有餘年天下文意復侔于漢唐之盛蓋自周衰至今千有餘歲斯文濵于磨滅能自拔起以追于古者此三卋而巳各于其盛時士之能以特見于世者率常不過三數人其也文其人之不婁之難得如此平甫之文能時見于世者也世皆謂平甫之詩冝為樂歌薦之郊廟其文宜為典册施諸朝廷而不得用於世然推其實千歲之日不為不多焦心思于翰墨之間者不為不衆在富貴之位者未嘗一日而無其人彼皆洇滅而無傳或播其醜於後平甫乃躬難得之姿負特見之能自立于不朽雖不得其志然其文之可貴人亦莫得而掩也則平甫之求于內亦奚憾乎古今作者或能文不必工于詩或長于詩不必有文平甫獨兼得之其于詩尤自喜其憂喜哀樂感激怨懟之情一于詩見之古詩尤多也平甫居家孝友為人質直簡易遇人豁然推腹心不為毫髮疑礙與人交于恩意尤篤也其死之日天下識與不識皆聞而哀之其州里世次歷官行事將有待于識平甫之葬者故不著于此云元豐元年強幾聖文集序幾聖諱至姓強氏錢塘人幾聖字也為三司戶部判官尚書祠部郎中既殁其子浚明集其遺文為二十卷囑豫序幾聖少貧能自謀學為進士材拔出輩類出輒收其科其文詞大傳于時及為吏未嘗不以其間益讀書為文尤工于詩句出驚人世皆推其能然最為相國韓魏公所知魏公既罷政事鎮京兆及徙鎮相魏常引幾聖自助魏公喜為詩每合屬士大夫賔客與遊多賦詩以自見其屬而和之者幾聖獨思致逸發若不可追躡魏公未嘗不嘆得之晚也其在幕府魏公每上奏天子以歲時慶賀候問及為書記通四方之好幾聖為屬藁草必聲比字屬曲當繩墨然氣質渾渾不見刻晝逺近多稱誦之及為他文若志銘序記䇿問學士大夫則簡古典則不少貶以就俗其所長兼人如此魏公數薦之朝廷以謂宜在館閣然未及用魏公既薨之明年幾聖亦以疾卒幾聖之遺文在魏公幕府者最為多故序亦反復見之覽者可推而考之也其行治官丗已著于志幾聖之葬者故此不著思軒詩序今天子至和之𥘉尚書屯田員外郎林君慥通判撫州協于上下以修其職于是時蝗起京東轉入江淮之間秋又皆旱撫獨無害災故君得以其間益疏其寢北之地厚池之北涯立屋其上入而燕焉名其軒曰思軒士之能詩者皆為君賦之觀君之蚤夜于其治既有餘日乃自以為不足而深思于此得士大夫之作讀而推之以察君之志無大小言動萬事之作止一擇其冝則思之盡豈獨一時寄此軒之內哉君之大父水部君當太宗時實通判是州今六十余年而君來世其官衆于是考于州人以求水部之餘思遺德又榮君之能業其家而謂君之勢且益顯以大其宗門將豈止于此後有君子低回此軒而迹君之思見于事者不遺于理不墜其先則詩之信天下其可蔽也哉九月日序元豐類藁卷之十二
