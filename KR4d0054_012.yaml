body:
  text: 序李白詩集後序李白詩集二十卷舊七百若干篇今九百若干篇者知制誥常山宋敏求字次道之所廣也次道既以類廣白詩自為序而未考次其作之先後余得其書乃考其先後而次第之盖白蜀郡人𥘉隠岷山出居襄漢之間南㳺江淮至楚觀雲夢雲夢許氏者高宗時宰相圉師之家也以女妻白因留雲夢者三年去之齊魯居徂耒山竹溪入呉至長安明皇聞其名召見以為翰林供奉頃之不合去北拞趙魏燕晋西渉岐祁歴商扵至洛陽㳺梁㝡乆復之齊魯南浮淮泗再入呉轉徙金陵上秋浦潯陽天寳十四載安禄山反明年明皇在蜀永王璘莭度東南白時卧廬山璘迫致之璘軍敗丹陽白奔亡至宿松坐繋尋陽獄宣撫大使崔渙與御史中丞宋若思驗治白以爲罪薄冝貰而若思軍赴河南遂釋白囚使謀其軍事上書粛宗薦白材可用不報是時白年五十有七矣乾元元年終以汚璘亊長流夜郎遂泛洞庭上峽江至巫山以赦得釋憇岳陽江夏乆之復如尋陽過金陵徘徊扵歴陽宣城二郡其族人陽氷爲當塗令白過之以病卒年六十有四是時寳應元年也其始終所更渉如此此白之詩書所自叙可考者也范傳正爲白墓誌稱白偶乘艑一日千里或遇勝景終年不移則見扵白之自叙者盖亦其略也舊史稱白山東人為翰林待詔又稱永王璘莭度楊州白在宣城謁見遂辟為從事而新書又稱白流夜郎還尋陽坐事下獄宋若思釋之者皆不合白之自叙盖史誤也白之詩連類引義雖中扵法度者寡然其辭朋肆雋偉殆騷人所不及近世所未有也薦史稱白有逸才志氣宏逺飄然有超世之心余以為實録而新書不著其語故録之使覧者得詳焉先大夫集後序公所為書號仙鳬羽翼者三十卷西陲要紀者十卷清邊前要五十卷廣中台志八十卷為臣要紀三卷四聲韻五卷緫一百七十八卷皆刋行扵世今類次詩賦書奏一百二十三篇又自為十卷蔵扵家方五代之際儒學既擯焉後生小子治術業扵閭巷文多淺近是時公雖少所學巳皆知治亂得失興壊之理其為文閎深雋羙而長扵諷諭今類次樂府已下是也宋既平天下公始出仕當此之時太祖太宗巳綱紀大法矣公扵是勇言當世之得失其在朝廷疾當事者不忠故凢言天下之要必本天子憂憐百姓劳心萬事之意而推大臣從官執事之人觀望懐奸不稱天子属任之心故治未乆洽至其難言則人有所不敢言者雖屡不合而出而所言益切不以利害禍福動其意也始公尤見竒扵太宗自光禄寺丞越州監酒稅召見以爲直史舘遂爲兩浙轉運使未乆而真宗即位益以材見知𥘉試以知制誥及西兵起又以爲自陜以西經略判官而公常且方論大臣當時皆不恱故不果用然真宗終感其言故爲泉州未盡一歲拜蘇州五日又爲楊州将復召之也而公扵是時又上書語斥大臣尤切故卒以齟齬終公之言其大者以自唐之衰民窮乆矣海内既集天子方脩法度而用事者尚多煩碎治財利之臣又益急公獨以謂冝遵簡易罷筦榷以與民休息塞天下望祥符𥘉四方争言符應天子因之遂用事泰山祠汾隂而道家之說亦滋甚自京師至四方皆大治宮觀公益諍以謂天命不可専任冝絀姦臣修人事反復至数百千言鳴呼公之盡忠天子之受盡言何必古人此非傳之所謂主聖臣直者乎何其盛也何其盛也公在两浙奏罷苛稅二百三十餘條在京西又與三司争論免民租釋逋負之在民者盖公之所試如此所試者大其庻㡬矣公所嘗言其衆其在前及書亡者盖不得而集其或從或否而後常可思者與歴官行事盧陵歐陽修公巳銘公之碑持詳焉此故不論論其不盡載者公卒以齟齬終其功行或不得在史氏記藉令記之當時好公者少史其果可信欤後有君子欲推而考之讀公之碑與其書及余小子之序其意者具見其表裏其於虚實之論可覈矣公卒乃贈諌議大夫姓曽氏諱某南豊人序其書者公之孫葦也至和元年十二月日謹序王深父文集序深甫吾友也姓王氏諱回當先王之迹熄六藝殘缺道術衰微天下學者無所折衷深甫扵是奮然獨起囙先王之遺文以求其意得之扵心行之扵巳其動止語黙必考扵法度而窮逹得䘮不易其志也文集二十卷其辭反復辨逹有所開闡其卒盖將㱕扵簡也其破去百家傳注惟散缺不全之經以明聖人之道扵千載之後所以振斯文扵将墜囘學者扵既溺可謂道徳之要言非世之别集而已也後之潜心扵聖人者将必由是而有得則其扵世教豈小𥙷之而已㢤鳴呼深甫其志方强其德方進而不幸死矣故其澤不加扵天下而其言止扵此然觀其所考者豈非孟子所謂名卋者欤其文有片言半簡非大義所有皆附而不去者所以明深甫之扵其細行皆可傳扵世也深甫福州侯官縣人今家扵頴嘗舉進士中其科為毫州衞真縣主簿未一歲弃去遂不復仕卒扵治平二年之七月二十八日年四十有三天子嘗以某軍莭度推官知陳州南頓縣事就其家命之而深甫既卒矣王子直文集矣至平之極教化既成道徳同而風俗一言理者雖異人殊世未嘗不同其指何則理當無二也是以詩書之文自唐虞以耒至秦魯之際其相去千餘載其作者非一人至扵其間嘗更衰亂然學者尚蒙餘澤雖其文数萬而其所彂明更相表裏如一人之說不知時世之逺作者之衆也鳴呼上下之間漸磨陶治至扵如此豐非盛㢤自三代教養之法廢先王之澤熄學者人之異見而諸子各自為家豈其固相反哉不當扵理故不能一也由漢以来益逺扵治故學者雖有魁竒㧞出之材而其文能馳騁上下偉麗可喜者甚衆然是非取舎不當扵聖人之意者亦巳多矣故其說未嘗一而聖人之道未嘗明也士之生扵是時其言能當扵理者玄可謂難矣由是觀之則文章之得失豈不繫扵治亂㢤長樂王向字子直少已著文数萬言與其兄弟俱名聞天臣下可謂魁竒㧞出之材而其文能馳騁上下偉麗可喜者也讀其書知其欤漢以來名能文者俱列於作者之林未知其孰先孰後考其意不當扵理亦少矣然子直晚自以為不足而悔其少作更砍窮探力取極聖人之指要盛行則𣣔發而見之事業穷居則𣣔推而托之扵文章将與詩書之作者並而又未知孰先孰後也然不幸蚤世故雖有難得之材獨立之志而不得及其成就此吾徒與子直之兄回字深甫所以深恨扵斯人也子冥官世行治深父巳為之銘而書其数萬言者属予為叙予觀子直之所自見者巳足暴扵丗矣故特為之序其志云王容季文集序叙事莫如書其在尭典述命羲和宅圡測日咎星候氣揆民綏急兼蠻夷鳥獸其財成輔相備三才萬物之理以治百官授萬民興衆功可謂博矣然其言不過数一其扵舜典則曰在璿璣玉衡以齊西政盖尭之時觀天以暦象至舜又察之璣衡聖人之法至後世益俻也曰宅者則日月五星曰政者則羲和之所治無不任焉其體至大盖一言而盡可謂微矣其言徾故學者所不得不盡心能盡心然後能自得之此所以為經而歴千餘年盖能得之者少也易詩礼春秋論語皆然其曰測之而益深窮之而益逺信也世既衰能言者益少承孔子者孟子而巳承孟子者楊子而已楊子之稱孟子曰知言之要知徳之奥若楊子則亦足以㡬乎此矣其次能叙事使可行扵逺者若子夏左丘明司馬遷韓愈亦可謂㧞出之材其言庻乎有益者也吾友王氏兄弟曰回深父曰向子直曰冏容季皆善属文長扵叙事深父尤深而子直容季益能稱其兄者也皆可謂㧞出之材令其克壽得就其志則将紹六藝之遺言其可禦㢤予嘗叙深父子直之文銘容季之墓而容季之兄固子堅又集容季之遺藁属予序之予憫俗之朋友故舊道缺不自知其不能强次是說以為容季文集序熈寜九年冬南昌群齊范貫之奏議集序尚書户部郎中直龍圗閣范公貫之之議奏凡若干篇其子世京集為十卷而属予序之盖自至和巳後十餘年間公常以言事任職自天子大臣至于群下自掖庭至于四方幽隠一有得失善惡関扵政理公無不極意反復為上力言或矯拂情𣣔或功劘計慮或辨别忠侫而䖏其進退章有一再或至扵十餘上事有隂争獨陳或悉引諌官御史合議肆言仁宗常虚心采納為之変命令更廢舉近或立從逺或越月踰時或至扵其後卒從聴用盖當是時仁宗在位歲乆熟扵人事之情偽與群臣之能否方以仁厚清静休養元元至扵是非與奪則一㱕是公議而不自用也其所引㧞以言為職者如公皆一時之選而公與同時之士亦皆楽得其言不曲從苟止故天下之情因得畢聞扵上而事之害理者常不果行至扵竒衺次睢有為之者亦輙敗悔故當此之時常委事七八大臣而朝政無大闕失群臣奉法遵職海内乂安夫因人而不自用者天也仁宗之所以其仁如天至於享國四十餘年能承太平之業者繇是而已後世得公之遺文而論其世見其上下之際相成如此必将抵回感慕有不可及之嘆然後知其時之難得則公言之不沒豈獨見其志所以明先帝之盛徳扵無窮也公爲人温良慈恕其從政寛易愛人及在朝廷危言正色人有所不能及也凡同時與公有言責者後多至大官而公獨早卒公諱師道其世次州里歴官行事有今資政殿學士趙公忭爲公之墓銘云王平甫文集序王平甫旣殁其家集其遺文爲百卷属予序平甫自少巳傑然以材高見扵世爲文思若决河語出驚人一時争傳誦之其學問尤敏而資之以不倦至晚愈薦愽覧强記扵書無所不通其明扵是非得失之理爲尤詳其文閎富典重其詩愽而深矣自周衰先王之遺文旣䘮漢興文學猶爲近古及其衰而陵夷盡矣至唐乆之而能言之士始㡬扵漢及其衰而遂泯泯矣宋受命百有餘年天下文意復侔扵漢唐之盛盖自周衰至今千有餘歲斯文濵扵磨㓕能自㧞起以追扵古者此三卋而巳各扵其盛時士之能以特見扵世者率常不過三数人其也文其人之不娄之難得如此平甫之文能時見扵世者也世皆謂平甫之詩冝爲樂謌薦之郊庙其文宜爲典冊施諸朝廷而不得用於世然推其實千歲之日不爲不多焦心思扵翰墨之間者不爲不衆在富貴之位者未嘗一日而無其人彼皆洇㓕而無傳或播其醜於後平甫乃躬難得之姿負特見之能自立扵不朽雖不得其志然其文之可貴人亦莫得而揜也則平甫之求扵内亦奚憾乎古今作者或能文不必工扵詩或長扵詩不必有文平甫獨兼得之其扵詩尤自喜其憂喜哀樂感激怨懟之情一扵詩見之古詩尤多也平甫居家孝友爲人質直簡易遇人豁然推腹心不爲毫髮疑礙與人交扵㤙意尤䔍也其死之日天下識與不識皆聞而哀之其州里世次歴官行事将有待扵識平甫之葬者故不著扵此云元豊元年強㡬聖文集序㡬聖諱至姓強氏錢塘人㡬聖字也爲三司戸部判官尚書祠部郎中既殁其子浚明集其遺文爲二十卷囑予序㡬聖少貧能自謀學爲進士材㧞出輩類出輙收其科其文詞大傳扵時及為吏未嘗不以其間益讀書為文尤工扵詩句出驚人世皆推其能然最為相國韓魏公所知魏公既罷政事鎮京兆及徙鎮相魏常引㡬聖自助魏公喜為詩毎合属士大夫賔客與㳺多賦詩以自見其属而和之者㡬聖獨思致逸發若不可追躡魏公未嘗不嘆得之晚也其在幕府魏公毎上奏天子以歲時慶賀候問及為書記通四方之好㡬聖為属藁草必聲比字属曲當䋲墨然氣質渾渾不見刻晝逺近多稱誦之及為他文若誌銘序記䇿問學士大夫則簡古典則不少貶以就俗其所長兼人如此魏公数薦之朝廷以謂宜在舘閣然未及用魏公既薨之明年㡬聖亦以疾卒㡬聖之遺文在魏公幕府者㝡為多故序亦反復見之覧者可推而考之也其行治官丗已著扵誌㡬聖之葬者故此不著思軒詩序今天子至和之𥘉尚書屯田員外郎林君慥通判撫州恊于上下以修其職扵是時蝗起京東轉入江淮之間秋又皆旱撫獨無害灾故君得以其間益䟽其寝北之地厚池之北涯立屋其上入而燕焉名其軒曰思軒士之能詩者皆為君賦之觀君之蚤夜扵其治既有餘日乃自以為不足而深思扵此得士大夫之作讀而推之以察君之志無大小言動萬事之作止一擇其冝則思之盡豈獨一時寄此軒之内㢤君之大父水部君當太宗時實通判是州今六十余年而君來世其官衆扵是考扵州人以求水部之餘思遺德又榮君之能業其家而謂君之勢且益顕以大其宗門将豈止扵此後有君子低回此軒而迹君之思見扵事者不遺扵理不墜其先則詩之信天下其可蔽也㢤九月日序元豊類藁卷之十二
