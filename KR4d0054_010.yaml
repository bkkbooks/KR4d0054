body:
  text: 洪範傳惟十有三祀王訪于箕子王乃言曰鳴呼箕子惟天隂隲下民相協厥居我不知其彛倫攸敘箕子乃言曰我聞在昔鯀堙洪水汩陳其五行帝乃震怒不卑洪範九疇彛倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彛倫攸敘何也武王嘆而謂箕子天不言而默定下民相助協順其所居居謂所以安者也而我不知其常理所次序箕子乃言我聞在昔鯀之治水也至于五行皆亂其陳列故上帝震怒不與之以洪範九疇而常理所以敗鯀則殛死及禹繼而起天乃與之以洪範九疇而常理所以敘蓋水之性潤下而其為利害也尤甚故鯀之治水也堙之則失其性而至于五行皆亂其陳列及禹之治水也導之則得其性而至于常倫所以敘常倫之敘者則舜稱禹地乎天成六府三事允治萬世永賴時乃功也其曰天乃錫禹洪範九疇蓋易亦曰洛出書然而世或以為不然原其説之所以如此者以非其耳目之所習見也天地之大萬物之衆不待非常之智而知其變之不可盡也人之耳目之所及亦不待非常之智而知其不能逺也彼以非其所習見則果于以為不然是以天地萬物之變為可盡于耳目之所及亦可謂過矣為是説者不獨蔽于洪範之錫禹至鳯凰麒麟玄鳥生民之見于經者亦且以為不然執小而量大用一而齊萬信臆決而疑經不知其不可亦可謂惑矣五行五者行乎三材萬物之間故𥘉一曰五行其在人為五事故次二曰敬用五事五事敬則身修矣身修然後可以出政故次三曰農用八政政必協天時故次四曰協用五紀修身出政協天時不可以不有常也常者大中而已矣故次五曰建用皇極立中以為常而未能適變則猶之執一也故次六曰乂用三德三德所以適變而人治極矣極人治而不敢絶天下之疑故次七曰明用稽疑稽疑者盡之于人神也人治而通于神明者盡然猶未敢以自信也必考巳之得失于天故次八曰念用庶徴徴有休咎則得失之應于天者可知矣猶以為未盡也故次九曰嚮用五福威用六極福極之在民者皆吾所以致之故又以考巳之得失于民也敬本諸心而見諸外故五事曰敬用用其厚者固治人之道也故八政曰農用農厚也天時協則人事得故五紀曰協用謹其常則中不可不立也故皇極曰建用建立也乂者所以救其過持其常也故三德曰乂用明則疑釋故稽疑曰明用庶徴之見于天不可以不念故庶徴曰念用福之在于民則宜嚮之故五福曰嚮用極之在于民則宜畏之故六極曰威用威畏也凡此者皆人君之道其信不可雜而其序不可亂也推其為類則有九要其始終則猶之一言而巳也學者知此則可以知洪範矣一五行曰水曰火曰木曰金曰圡水曰潤下火曰炎上木曰曲直金曰從革圡爰稼穡潤下作醎炎上作苦曲直作酸從革作辛稼穡作甘何也蓋爰者于也潤下炎上者言其所性之成于天者也曲直從革者言其所化之因于人者也於之稼穡而不及其他者于之稼穡亦言其所化之因于人者也不及其他者莫大乎於之稼穡也夫潤下炎上言其所性之成於天者然水導之則行潴之則聚火燃之則熾宿之則壯則其所化亦未嘗不因之于人也或曲直之或從革之或稼穡之言其所化之因于人者然可以曲直可以從革可以稼穡則其所性亦未嘗不成之于天也所謂天不人不因人不天不成者也其文所以不同者非固相反所以互相明而𣣔學者之自得之也潤下者水也故水曰潤下炎上者火也故火曰炎上木金亦然惟稼穡則非圡也故言其於之稼穡而巳者辭不得不然也又言潤下所以起鹹炎上所以起苦曲直所以起酸從革所以起辛稼穡所以起甘者凡為味五或言其性或言其化或言其用或言其味者皆養人之所最大者則不言此所以為要言也虞書禹告舜曰政在養民而陳養民之事則曰水火金木圡穀惟修與此意同也二五事曰貌曰言曰視曰聽曰思貌曰恭言曰從視曰明聽曰聰思曰􅌖恭作肅從作乂明作哲聰作謀􅌖作聖何也蓋自外而言之則貌外于言自內言之則聽內于視自貌言視聽而言之則思所以為主于內故曰貌曰言曰視曰聽曰思彌逺者彌外彌近者彌內此其所以為次序也五者思所以為主于內而用四事于外者也至于四者則皆自為用而不相因故貌不恭者不害于言從視不明者不害于聽聰非貌恭言從然後能哲能哲然後能謀能謀然後能思而至于聖也曰思曰􅌖􅌖作聖者蓋思者所以充人之材以至于其極聖者人之極也孟子曰人之性或相倍蓗而無算者不能盡其材不能盡其材者弗思耳矣蓋思之于人也如此然而或曰不思而得何也蓋人有自誠明者不思而得堯舜性之是也所謂誠者天之道也有自明誠者思之弗得弗措也湯武身之是也所謂思誠者人之道也然而堯舜湯武之德其至皆足以動容周旋中禮則身之者終亦不思而得之也堯舜性之矣然堯之德曰聰明文思蓋堯之所以與人同者法也則性之者亦未嘗不思故曰誠則明矣明則誠矣而性之身之者及其成孟子皆以謂盛德之至也箕子言思所以作聖孟子言弗思故相倍蓗而無算其所言者皆法也曰視曰明明作哲聽作聰聰作謀者視之明無所不照所以作哲聽之聰無所不聞所以作謀也人之于視聽有能察于閭巷之間米鹽之細而不知蔽于堂阼之上治亂之幾者用其聰明于小且近故不能無蔽于大且逺也古之人知其如此故前旒蔽明黈纊塞聰又以作聰明為戒夫如是者非塗其耳目也亦不用之于小且近而巳矣所以養其聰也養其聰明者故將用之于大且逺夫天下至廣不可以家至戶察而能用其聰眀于大且逺者蓋得其要也昔舜治天下以諸侯百官而總之以四嶽舜于視聽欲無蔽于諸侯百官則詢于四嶽欲無蔽于四嶽則闢四門欲無蔽于四門則明四目逹四聰夫然故舜在士民之上非家至戶察而能立於無蔽之地得其要而已矣其曰明四目逹四聰者舜不自任其視聽而因人之視聽以為聰明也不自任其聰明而因之于人者固君道也非君道獨然也不自任其聰明而因之為人者固天道也故曰天聰明自我民聰明又曰惟天聰眀惟聖時憲舜于聰明下盡人上參天斯其所以為舜也舜之時至治之極也人豈有欺舜者哉舜于待人亦豈疑其欺巳也然而訪問反復相參以考察又推之于四靣若唯恐不能無所蔽者蓋君天下之體固不得不立于無蔽之地也立于無蔽之地者其于視聽如此亦不用之于小且近矣夫然故蔽明塞聰而天下之情可坐而盡也言曰從從作乂者易曰出其言善則千里之外應之出其言不善則千里之外違之則言之要為可從而巳也言為可從也則其施于用治道之所由出也古之君人者知其如此故其戒曰慎乃出令令出惟行弗惟反又曰其惟不言言乃雍而舜以命龍亦曰夙夜出納朕命惟允言之不可違如此貌曰恭恭作肅者孟子曰今夫蹶者趨者是氣也而反動其心故曰持其志無暴其氣蓋威儀動作見于外者無不恭則生于心者無不肅也傳曰人受天地之中以生所謂命也禮義威儀之則所以㝎命也故顔淵問仁孔子告之以視聽言動以禮而衛之君子所以稱仁者亦曰威儀捸棣不可選也貌之不可慢如此也存其思養其聰明而不失之于言貌故堯之德曰欽明文思言貌者蓋堯之所謂文則雖堯之聖未有不先于謹五事也三八政曰食曰貨曰祀曰司空曰司徒曰司寇曰賓曰師曰食曰貨曰祀曰賔曰師稱其事者逹乎下也曰司空曰司徒曰司寇稱其官者任乎上也人道莫急于養生莫大于事死莫重于安土故曰食曰貨曰祀曰司空孟子以使民養生送死無憾為王道始此四者所以不得不先也使民足于飬生送死之具然後教之教之不率然後刑之故曰司徒曰司寇此彛倫之序也其教之也固又有敘可得而考者古之欲明明德于天下者必始于知至意誠心正然後身修身修然後國家天下治以是為大學之道百王莫不同然而見于經者莫詳于堯蓋欽明文思堯之得於心者也克明俊德有諸心故能求諸身也以親九族九族既睦有諸身故能求諸家也平章百姓百姓昭明有諸家故能求諸國也協和萬邦黎民於變時雍有諸國故能求諸天下也積于其心以至于身修此堯之所以先覺非求之于外也積於其家以至于天下治此堯之所以覺斯民非強之于耳目也夫然故堯之治何為也哉民之從之也豈識其所以從之者哉此先王之化也然以是為無法立司徒之官以教之者法也教之者導之以效上之所為而巳也養之于學所以使之講明文之以禮樂所以使之服習皆教之之具也使之講明者所以逹上之所為使之服習者所以順上之所為所謂效之也上之所有故下得而效之未之所無下得而效之也當堯之時萬邦黎民之所效者堯之百官百官之所效者堯之九族九族之所效者堯之身而導之以效上之所為者舜為司徒也舜于其官則又慎徽五典身先之也然後至于五典克從民效之也及舜之時舜之導民者固有素矣然水害之後其命契為司徒則猶曰百姓不親五品不遜敬敷五教在寬蓋憂民之不親而念其不順上之化命之以謹布其教而終戒之以在寬豈迫就之也哉其上下之際導民者如此此先王之教也為之命令為之典章為之官守以致于民此先王之政也蓋化者所以覺之也教者所以導之也政者所以率之也覺之無可言未有可以導之者也導之無可言未有可以率之者也而况于率之無可言而欲一斷之以刑乎孟子曰徒善不足以為政徒法不能以自行其所謂善覺之者也其所謂法導之者也其所謂政率之者也其相須以成未有去其一而可以言王道之備者也先王之養民而迪之以教化如此其詳且盡矣而民猶有不率者故不得不加之以刑加之以刑者非可巳而不已也然先王之刑固又有敘矣民之有罪也必察焉青也過也非終也雖厥罪大未加之以刑也民之有罪也必察焉非青也非過也終也其養之有所不足其教之有所不至則必責己而恕人故湯誥曰惟爾萬方有罪在豫一人豫一人有罪無以爾萬方如是故以民之罪為自我致之未加之以刑也民之有罪必察焉其養之無所不足教之無所不至不于我政人之有罪矣民之罪自作也然猶有漸於惡者久而蒙化之日淺者則有曰勿庸殺之姑惟教之未加之以刑也民之有罪非青也非過也終也自作也教之而猶不典式我也則是其終無悛心衆之所棄而天之所討也然後加之以刑多方之所謂至于再至于三者也故有雖厥罪小乃不可以不殺用刑如此其詳且慎故先王之刑刑也其飬民之具教民之方不如先王之詳且盡未有可以先王之刑刑民者也矧曰其以非先王之刑刑民也昔唐虞之際相繼百年天下之人四罪而已及至於周成康之世刑之不用亦四十餘年則先王之民加之以刑者殆亦無矣先王之治使百姓足于衣食遷善而逺罪矣人之所以相交接者不可以廢故曰賔賓者非獨施于耒諸侯通四夷也人之所以相保聚者不可以廢故曰師師者非獨施于征不庭伐不悛也八政之所先後如此所謂彛倫之敘也不然則彛倫之斁而巳矣四五紀曰歲曰月曰日曰星辰曰曆數蓋協之以歲協之以月協之以日者所以正時而協之以星辰者所以考其驗于顯也協之以曆數者所以考其驗於微也正時然後萬事得其敘所謂曆象日月星辰期三百六旬有六日以閏月定四時成嵗也五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比德惟皇作極何也言大建其有中故能聚是五福以布與衆民而惟時厥衆民皆于汝中與汝保中蓋中者民所受以生而保中者不失其性也凡厥衆民無有以淫為朋人無有以比為德蓋淫者有所過也比者有所附也無所過無所附故能惟大作中也人謂學士大夫别于民者也九厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則之之而康而色曰豫攸好德汝則錫之福時人斯其惟則之極無虐煢獨而畏髙明人之有能有為使羞其行而邦其昌何也言厥庶民有猷有為有守者汝則念其中不中其不協于中不罹于咎若狂也肆矜也廉愚也直之類大則受之言大者非小者之所能受也而安汝顔色而謂之曰豫攸好德所以教之使協于中也有猷有為有守而不罹于咎者民之有志而無惡者也不協于極者不能無所過而巳教之則其從可知也如是而汝則與之以福冨之以祿貴之以位所以示天下之人而使之勸也如此則是人斯其惟大之中矣夫剛不中者至于虐煢獨柔不中者至則於畏高明今也惟大之中故剛無虐煢獨柔無及高明所謂剛而無虐柔而立也蓋剛至于虐煢獨則六極惡之事也柔至于高明則六極弱之事也惟皇六極則五福攸好德之事所以言之者不同至其可以推而明之也則猶一言而巳也洪範於皇極於三德于五福六極言人之性或剛柔之中或剛柔有過與不及故或得或失而其要未嘗不欲去其偏與夔之教胄子皋陶之陳九德者無以異蓋人性之得失不易乎此而所以教與所以察之者亦不易乎此也教之福之而民之協于中者如此又使有能有為者進其行而不巳則久而後能積積而後能大大而後能著人材之盛如此而國其有不興者乎故曰人之有能有為使羞其行而邦其昌也凡厥正人既冨方穀汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎何也言凡正人之道既冨之然後可以責善責善者必始於汝家使無所好于汝家則是人斯其若辜矣既言不能正家以率之則陷人于罪又言不好德之人而汝與之福其起汝為咎而已故曰于其無好德汝雖錫之福其作汝用咎也自皇建其有極至使羞其行皆所以教也而于此乃曰凡厥正人既富方榖又曰使無好于而家時人斯其辜者明教之必本於富行之又始於家其先後次序然也無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正真會其有極歸其有極何也無偏無陂遵王之義者無過與不及無偏也無不平無陂也所循者惟其宣而無適莫遵王之義也無有作好遵王之道無有作惡遵王之路者作好作惡偏于巳之所好惡者也好惡以理不偏于已之所好惡無作好作惡也所循者通道大路而不由徑遵王之道路也道路云者異辭也無偏無黨王道蕩蕩者存于已者無偏則施于人者無黨無偏無黨也其為道也廣大而不狹吝王道蕩蕩也無黨無偏王道平平者施于人者無黨則存于巳者無偏無黨無偏也其為道也夷易而無阻艱王道平平也無反無側王道正直者無所背無所反也非在左而不得乎右在右而不得乎左無側也其為道也所止者不邪所由者不曲王道正直也如是所以為王之義為王之道為王之路明王天下者未有不知是而可也會于有極者來而赴乎中也歸于有極者往而反乎中也由無偏以至無側所知者非一曲所守者非一方推天下之理逹天下之故能大而不遺小能逺而不遺近能顯而不遺微所謂天下之通道也來者之所赴歸者之所反中者居其要而宗之者如此所應者彌廣所操者彌約所謂天下之大本也君人者未有不由此而國家天下可為者也其可考于經則易之智周乎萬物道濟乎天下故不過其可考于行事則舜之執其兩端而用中于民湯之執中立賢無方能推其無偏陂無作好惡無偏黨無反側之理而用其無適莫無由徑無狹吝無阻艱無所背無在左而不得乎左在右而不得乎左者以通天下之故而不泥執其所會所歸之中以為本故能定也夫然故易之道為聖人之要道非窮技曲學之謂也舜之治民為皇建其有極用敷錫厥庶民非偏政逸德之謂也湯之用賢為翕受敷施九德咸事非私好獨惡之謂也洪範之為類雖九然充人之材以至于其極者則在于思通天下之故而能定者則在于中其要未有易此也曰皇極之敷言是彛是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之完曰天子作民父母為天下王何也曰者其辭也其辭以謂人君之于大中既成之以德又布之以言是以為常是以為順于帝其順而巳人君之為言順天而致之于民故凡其衆民亦于極之布言是順是行以親附天子之輝光而曰天子作民父母為天下王曰父母者親之辭也曰王者往之辭也上之人于遵王之義至王道正直能繇前之説則下之人于順上之所行所言而相與附之其愛之曰父母而戴之曰天下王必繇後之説經所以始其義于彼而終其效于此者以明上之所以王者如是則下之所以王之者如是非虛致也六三德一曰正直二曰剛克三曰柔克平康正直強弗友剛克燮友柔克何也正直者常德也剛克者剛勝也柔克者柔勝也平康正直疆弗友剛克燮友柔克者所遇之妾殊故所又之德異也凡此者所以治人也高明柔克沉潛剛克何也人之為德高抗明爽者本于剛而柔有不足也故濟之以柔克所以救其偏沉深潛晦者本于柔而剛有不足也故濟之以剛克所以救其偏正直則無所偏故無所救九此者以治已與人也惟辟作福作威玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僣􅑯何也作福者柔克之所有也作威者剛克之所有也惟辟作福作威玉食臣無有作福作威玉食者正直之所有也以其卒曰臣之有作福作威玉食則人用側頗僻民用僣􅑯是以知惟辟作福作威玉食臣無有作福作威玉食者正直之所有也明矣箕子之言者皆九疇之所有九疇之所無者箕子蓋不得而言也知此則知九疇之為九矣人君于五事思無所不通聰明無所不逹言之出納無所不允于皇極所遵者正直所不可入者偏陂反側作好作惡淫朋比德之事臣人雖有小人之桀者未有能蔽其上而作福作威玉食者也人臣雖作福作威玉食者必窺其間緣其有可蔽之端故雖小人之庸者猶得以無忌憚而放其邪心也洪範以作福柔克之所有作威剛克之所有惟辟作福作威玉食正直之所有臣而作福則僭君之柔克臣而作威則僣君之剛克臣而作福作威玉食則為側頗僻無所不僭矣故于三德詳言之至若杜其間使無可蔽之端雖有邪臣不得萌其僣者則在于五事修皇極建而巳也七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔凡七卜五占用二衍􅑯立時人作卜筮三人占則從二人之言何也言選擇知卜筮之人而建立之乃命之以其職曰雨霽蒙驛克之五兆所以卜所謂五者也曰貞曰悔之二卦所以筮所謂凡七者也已命之以其職矣乃立是人使作筮之事三人占則從二人之言卜不同則從多也汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮何也謀及乃心揆諸巳也謀及卿士謀及庶人質諸人也謀及龜筮參謀鬼神也舜典曰朕志先定詢謀僉同鬼神其依龜筮協從謂此也汝則從龜從筮從卿士從庶民從是之謂大同身其康強子孫其逢吉何也從于心而人神之所共與也故謂之大同則身其康強子孫其逢吉也汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則􅊇庶民逆吉庶民從龜從筮從汝則逆卿士逆吉何也所從者多則吉可知也汝則從龜從筮從卿士逆庶民逆作內吉作外凶龜筮共違于人用靜吉用作凶何也心與龜之所從則作內吉而已龜筮之所共違則不可以有作矣凡謀先人者盡人事也從逆先卜筮者欽鬼神也吉有三有卿士逆庶民逆者矣有汝則逆庶民逆者矣有汝則逆卿士逆者矣若龜從筮從則皆不害其為吉又至于龜從筮逆則可以作內而巳龜筮共違則皆不可以有作也蓋疑故卜筮卜筮者吾以謂通諸神明神明之所從則吾必其吉神明之所違則吾必其凶誠之至謹之盡也八庶徴曰雨曰暘曰燠曰寒曰風曰時五者來備各以其序庶草繁廡一極備凶一極無凶曰休徴曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徴曰狂恆雨若曰僣恆暘若曰豫恆燠若曰急恆寒若曰蒙恆風若何也曰雨曰暘曰燠曰寒曰風所謂五者也曰時則五者之時也五者無不至則所謂五者耒備也無不時所謂各以其序也五者無不至無不時則至于庶草莫不蕃蕪言隂陽和則萬物莫不茂盛也五者有所甚則為沴所謂一極備凶也有所不至亦為沴所謂一極無凶也于五事貌足以作肅則時雨順之其咎狂則常雨順之言足以作乂則時暘順之其咎僭則常暘順之視足以作哲則時燠順之其咎豫則常燠順之聽足以作謀則時寒順之其咎急則常寒順之思足以作聖則時風順之其咎蒙則常風順之凡言時者皆休之證凡言常者皆咎之證也五事之當否在于此而五證之休咎應于彼為人君者所以不敢不念而考巳之得大于天也曰王省惟歲卿士惟月師尹惟日歲月日時無易百榖用成乂用明俊明用章家用平康日月歲時既易百穀用不成乂用昏不明俊民用微家用不寧何也此章之所言者皆念用庶證也休咎之證各象其事任其事者王也與王共其任者卿士師尹也則庶證之耒王與卿士師尹之所當省其所以致之者所謂念用庶證也王計一歲之證而省之卿士計一月之證而省之師尹計一日之證而省之所省多者其任責重所省少者其任責輕其所處之分然也王與卿士師尹之所省歲日月三者之時無易言各順其任則百穀用成又用明俊民用章家用平康王與卿士師尹之所省日月歲三者之時既易言各違其任則百穀用不成乂用昏不明俊民用微家用不寧也庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨何也言星之所好不同而日月之行則有常度有常度者不妄從則星不得作其好如矛之好不同而王與卿士師尹之動則有常理有常理者不妄從則民不能作其好故月行失其道而從星之所好則以風雨猶王政失其常而從民之所好則以非僻言此者以庶證之來王與卿士師尹則能自省而民則不能自省者也民不能自省則王與卿士師尹當省民之得失而知巳之所以致之者也巳之所致者民得其性則休證之所集也巳之所致者民失其性則咎證之所集也故省民者乃所以自省也其反復如此者所以畏天變盡人事也知王與卿士師尹之所省者如此則知此章之所言非念用庶證則不言也不知王與卿士師尹之所省者如此則于念用庶證無所當而于言為贅矣是不知九疇之為九也九五福一曰夀二曰富三曰康寧四曰攸好德五曰考終命六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱何也民能保極則不為外物戕其生理故壽食貨足故富無疾憂故康寧于汝極故攸好德無不得其死者故考終命人君之道失則有不得其死者有戕其生理者故凶短折不康故疾不寧故憂食貨不足故貧不能使之于汝極則剛者至于暴故惡柔者不能立故弱此人君所以考巳之得失于民者也或曰福之言如此而不及貴賤何也曰九疇者皆人君之道也福極者人君所以考巳之得失于民福之在于民則人君之所當嚮極之在于民則人君之所當畏福言攸好德則致民於善可知也極言惡弱則致民于不善可知也視此以嚮畏者人君之事也末有攸好德而非可貴者也未有惡弱而非可賤者也故攸好德則錫之福謂貴之所以勸天下之人使協于中固巳見之皇極矣於皇極言之者固所以勉人于福極不言之者攸好德與惡弱之在乎民則考吾之得失者盡矣貴賤非考吾之得失者也人君之于五行始之以五事修其性于巳次之以八政推其用于人次之以五紀協其時于事次之以皇極謹其常以應天下之故而率天下之民次之以三德治其中不中以適天下之變次之以稽疑以審其吉凶于人神次之以庶證以考其得失于天終之以福極以考其得失於民其始終先後與夫粗精小大之際可謂盡矣自五事至于六極皆言用而五行不言用者自五事至于六極皆以順五行則五行之用可知也虞書于六府言修則箕子于五行言其所化之因于人者是也虞書于六府次之以三事則箕子于五行次之以五事而下是也虞書于九功言戒之用休董之用威則箕子于九疇言庶證之與福極是也則知二帝三王之治天下其道未嘗不同者萬世之所不能易此九疇之所以為大法也進太祖皇帝總序狀右臣誤𬒳聖恩付以史事今月三日延和殿伏蒙靣諭所以任屬臣者臣愚不肖不知所處是以蚤夜一心極慮惟祖宗積纍功德非可形容矧臣之鄙豈能擬議髣佛將無以使列聖巍巍之偉迹焜耀昭徹布在方册此臣之所以惴惴也竊惟前世原大推功必始于受命之君以明王迹之所自故啇頌所紀繇湯上至于契周詩生民清廟本于后稷文王宋興太祖開建鴻業更立三材為帝者首陛下所以命臣顯楊褒大之意固以謂太祖雄材大略千載以耒特起之主國家所繇興無前之烈宜明白暴見以覺窹万世傳之無窮臣竊考舊聞伏念旬月次輯太祖行事揆其指意所出終始之際論著于篇敢繕寫上塵臣內自省大懼智不足以窺測髙逺文不足以推闡精微使先帝成功盛德晦昧不章不能滿足陛下仁孝繼述之心仰負恩待無以自贖伏惟陛下聰明睿智不卋之姿非群臣所能望如賜裁㝎使臣獲受成法更去粃繆存其可采繫于太祖本紀篇未以為國史書首以稱明詔萬分之一臣不勝大願惟陛下留意財幸臣未敢請對謹具狀以所論著隨狀上進以聞伏侯勑旨太祖皇帝總敘孟唐之敝自天寶巳後紀綱䆮壞不能自振以至于失天下五代興起五十餘年之間更八姓十有四君危亡之變數矣其尤甚也契丹遂入中國擅立名號當是時天地五行人事之理反易繆亂不同夷狄者亡幾耳太祖為天下所戴踐尊位以生民為任故勸農桑薄賦斂緩刑罰除舊政之不便民者詔令勉核相屬推其心無一日不在百姓也知方鎮之病民也故設通判之貟使斂以繩墨憂吏民之不良也故數使在位舉其所知患吏或受賕或不奉法也故罪至死徒一無所貸原其意蓋以謂遭世大衰不如是吏不知禁不能救民于焚溺之中也征伐既下諸國必先以逋欠滌煩苛賙乏絶雪冤滯惠農民拔人才申命郡邑反復不倦或遇水旱輒𬞞食請禱欲移災于已其于群臣有恩舊有勞能待之各盡其分以位貴之以財冨之有男使尚主有女使嫁宗室其豫人之周也如此即材可用雖讎不廢不可用雖光顯矣不處以勢其有罪多縱貸之或賜之使自愧及至堅明約束以整齊天下者亦使之不能踰也強僣之國皆接以恩禮啇賈往耒不禁有出境犯其令者乃為之置市邊邑使兩利有所乏少常振助之征伐所加必其罪暴者師出未嘗不以義也其君長已降及就俘執道路勞問迎致使者相望既至罪不數辱之優假秩祿及其宗親吏屬賜以田宅使子孫世守擁護保全皆得以夀考終自晉既覆滅契丹寖大中國惴畏不敢當太祖拔用材武護西北邊寵以非常之恩任屬專聽信明常遣戍卒戒之曰我猶赦汝郭進殺汝矣有訟進者謂曰進軍政嚴此必犯進法送進使殺之關市租賦諸將得恣用不問出入以其故士附鬪者盡力諜者盡情邊臣可諉者皆十餘年不易其任然位不過巡檢使衆不過三五千人蓋任專則勢便位不極則士勵兵少則用約御將亦多術矣總其所長能兼用之故能省費息民振新集之衆屈慿陵之虜也蓋太祖篤于孝友有天下之行聰明智勇有天下之材仁必愛人有天下之志包含遍覆有天下之量守之以勤儉恭慎虛心納諫鑒于奧蜀以奢侈為戒思天下之重不復遊畋封拜諸子務自約損不盡循故典收納學士大夫用之不求其備或守難進之莭亦不奪也晚喜讀書勸諸將以學曰欲使之知治道也兼覆夷夏從容以德江南平覽捷書而位曰師征不義而顧令吾民死兵彼何負哉秦州巳入尚波于之地却而不受錢俶耒朝復歸之越契丹願聽盟約逡巡退抑不自矜伐天下大勢連數十城之鎮割其故地以小其力易動勤畜之兵斂置懷服以消其難至于舉賢良崇孝弟綴禮樂明考課雖宇內𥘉輯然庶政大體彌綸備具遺文故事施于後世皆可為法民于是時從死更生室家相保士農工賈各還其職鳥獸草木亦莫不遂前世舊臣備將相處腹心瓜牙之任者一旦回心奉令北鄉如素委質天下廣都通邑兼地千里德懷二三之臣負衆自用令之不從召之不至者尚數十皆束袵來庭代易奔走如水湊下粵蜀吳楚歐閩之君分天下為八九曰帝與王傳子及孫更數十歲者編名因虜並聚闕下四海之內混齊為一海東之國高麗極南交址西戎吐蕃回紇北狄契丹皆請吏奉貢天地所養通途之屬莫不內附當是時更立天下與民為始天地五行人事之理亂而復正蓋太祖之于受命非如前世之君圖衆以智啚柄以力其處心積慮非一夕一日在于取天下也其在天者曆數在人者群臣萬民三軍之士不歸周歸太祖未有知其所以然者所謂天也及其傳天下也舍子屬弟是則太祖之受天下與舜受之堯禹受之舜其揆一也其傳天下與堯傳之舜舜傳之禹其揆一也受天下及傳天下視天與人而巳非其心未嘗有天下豈能如是哉世以謂太祖不世出之主與漢高祖同蓋太祖為人有大度意豁如也知人善任使與漢高祖同固然也太祖承自天寶以後更五代二百餘年極敝之天下漢祖承全盛之秦二世之末天下始亂所因之勢既殊太祖開建帝業作則垂憲後常可行漢祖粗㝎海內而巳不及一太祖立折杖法脫民榜笞死禍㝎著常刑一本寬太漢祖雖約法三章然肉刑三族之誅至孝文始去不及二太祖功臣皆故等夷及位㝎上下相安始終一意漢祖疑間諸將夷滅其家不及三太祖削大弱疆藩臣遵職漢祖封國過制友者更起纍世乃定不及四太祖征伐必克漢祖數戰輒北不及五太祖文武自出群臣莫及漢祖非得三傑之助不得無失不及六開寶之𥘉南海先下趙他分越而帝漢祖不能禁不及七太祖不用兵契丹自附漢祖折厄白登身僅免禍不及八太祖後宫二百問願歸者復去四之一漢祖溷於祍席女禍及宗不及九太祖明于太計以屬天下漢祖擇嗣不審幾墜厥世不及十也漢祖所不能及其大者如此是自三代巳耒撥亂之主未有及太祖也三代盛矣然禹之孫太康失國湯之孫太甲放廢文武之後三世傳昭王不返于楚繇漢以下變故之密蓋不可勝道也太祖經始大基流風遺澤所𬒳者逺五聖遵業至今百有二十餘年上下和樂無變容動色之慮接于耳目治安久長自三代以耒所未有也維太祖創始傳後比迹堯舜綱理天下軼于漢祖太平之業施于無窮三代所不及成功盛德其至矣哉蓋唐天寶十四年天下戶八百九十一萬太祖元年戶九十六萬末年天下既㝎户三百九萬今上元豐二年戶一千三百九十一萬六聖之德澤覆露生飬斯其所以盛也本原事實其所繇致此有自也哉元豐類藁卷第十
