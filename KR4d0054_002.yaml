front:
  text: 南豐先生元豐類藳卷之二
  hash: sha256:0a591b435c86639c1267e169cbc4dc85750d2ccce43b0408e642d1aeefd63062
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_002-1a}
body:
  text: 古詩寄子進弟憶子去家日南風始吹衣今來日未幾蠅蚊已群飛思子兼晝夜何啻如渴飢喜聞逺客至手自排荆扉客送書一𥿄翰墨子所揮上言山居惡夢寐接庭闈次言服畎畝禾黍膴已肥其餘業文字頗側隱與微題詩在紙尾語老意不非我喜何所似大似客得歸我與子事親未飽藿與薇常若去左右辛勤治鞍鞿子行何時反我眼日已晞應須畢秋刈相見慰依依喜寒純一作沌陽四時行無復氣節徑日火相吐吞乾離力還併玄冥失所安恇怯擅操柄我行東南野憒憒若酣醟喜逢青林長葉蔓可韜映正嗟天之高玉色萬里淨忽驚西山雲毫末生一鏡須更油然合點滴飛雨迸颼颼漸相扶雱霈一何盛積隂類潛師形勢久已偵乘時出幽墟奮發精爽競亘天逐炎官顓面修火令威加乾坤從冽冽氣貌正人無焦煩憂氷釋天下病豈須雪包林已壓朱鳥橫南方天精兵瘴􅊜災可屏爭難奪刀殳發巧搜塹穽收功當在今殺伐順天正況云牟麥祥已覺閭里慶高歌叩吾轅上頌天子聖詠史二首京室天下歸飛薨無餘地國士憂社稷塗人飬聲利貴賤競一時峩冠各鱗次子龍獨幽逺聘召漠無意子雲無由歸俯首天祿閣君乎獨西南抗顔觀廖廓無猜到沉冥有故驚寂寞用心豈必殊拘肆事終各江湖江湖俗畏逺幽好自相宜論迹異驚衆辭囂如避時優遊可以學薇蕨易為私胡然棄回棹霜雪有驅馳將之江浙延祖子山師柔會别飲散獨宿孤亭遂書懷别蜀客向何處欲觀浙江潮擬舟吳門柵况會故人招置酒吳亭上無人吹紫簫浩觀萬物變颯爾生涼颷遂恐時節晚芳蘭從此凋功名竟安在冨貴空寥寥鴻鵠舉千里鸞鳯翔九霄胡為蓬蒿下日夜悲鷦鷯車馬夕巳還行人亦飄颻浩然滄海志寂寞守空霄詠雪嚴嚴層氷塞川澤洶洶北風鳴木石黃雲半夜滿千里大雪平明深一尺兩儀混合去纎間萬類韜藏絶塵迹蛟龍岌起抱岡巒江海橫奔控阡陌野林縹渺苦難狀庭樹鮮妍疑可摘開門更覺山市靜散帙偏宜𥿄窗白精光蕩射遍巖谷氣象峥嶸見松柏少年登望就臺觀壯士衡凌向沙磧飢鼯嘷卧伏牙瓜獵隼飛拿矜羽翮茆簷客聚滿幽缶桑徑人行沒雙屐高堂暖熱厭羅綺環堵蕭條尚絺綌何當仰見白日照坐看先從沙際釋漸涵溝畎兆豐富洗濯閭閻消瘴疫便乖東北生氣起自駕疲牛理燒塉答裴煜二首拙者羞強合因成杜門居豈知公相尊一室若有餘愛子冨文行顧為已不如所以子之黨頻見我僕車歡誠激孤緒合若水縱魚新詩八十言筆端産璠璵屑屑委地蓬清風為吹噓相期在規誨庶以輔頑踈寥寥今非古感激事真妄曽誰省孤心祗以餌群謗參差勢巳甚決起意猶強親朋為憂危議語數鐫蕩久之等聾眊兀矣坐閭巷長嗟貧纍心更苦病摧壯微誠豈天與今晨子來貺顧慙小人愚未出衆夫上狂言屈子吟浩歌仍子唱相歡匪貌濟所得實心尚時節雖已晏梅柳幸欲放過從勿厭倦相持非鬱盎寄王介卿憶昨走京塵衡門始相識踈簾挂秋日客庖留共食紛紛説古今洞不置藩城有司甄棟幹度量棄樗櫟振轡行尚早分首學壖北𥘉冬憩海昏夜坐探書䇿始得讀君文大匠謝刀尺周孔日已逺遺經竄墻壁倡佯百􅏜起冠𥚑稔回慝君材信魁崛議論恣排闢如川流渾渾東海為委積如躋極高望萬物著春色寥寥孟韓後斯文大難得嗟豫見之晚反覆不能釋胡然藴環堵不收謀者惑明朝渡江還念念非可柳如醖冒炎暑每進意愈塞維時南風薰木葉晃繁碧頽雲走石瀨逆坂上文艗欣聞𬒳檄來窮閻駐鑣軾促榻叩其言咸池播純繹行身抗淵損及物窺龍稷綢繆指疪病攻砭甚針石淺沚有停沙亦可洗珠璧論憂或共嚬遇愜每同蟄正值祝融橫金隅未提職高樓豁可望命載屢攀陟一不羅俗嬉怡然治紈墨露注尚忘疲更得蟾蜍昊雅愛張與余挽之置茵席群兒困不酬吽嚬聚譏摘仁義殊齟齬昧者尊惡音石一作烏石跖霧草變哀黃吟蛩閙朝夕君子畏簡書薄言返行役啇歌孺子别失淚染衣襋自從促擢去會此隆冬逼何神鼓隂韛萬竅動謞僥城顛晲江浪蛟怪助掀射仁賢保無恙所想桂驚惕燁燁多吏從良巳饋藜齸逮兹尺書至疑念始氷析蘭滫沓慈祥筠梧肆諧適􅌭紛衆胥土署壘各嬉息其餘書牘背栗密縷機織卷書勞來翰寸懷良士懌野泊轉平緑梅梢弄繁白金縮引柳荑芳氣滿原澤出門無所抵歸卧四楹寂術學頗思講人事多可惻含意不得發百憤注微臆搖搖詠顔色企足關途隔自慚兒女情宛轉抱妻戚吾念非吾私何當託雲翼竒偶轉如輪終期援焦溺上人金節橫光馬珂閙瑞鶻宫𫀆腰玉繞煙沙轣轆髙軒過路上千人瞻羽纛瑶魁精彩浮蒼龍江城四靣生春風城中壞屋書籖碧有客苦吟連旦夕麻衣塵暗抱書泣歲暮黃梁不供食白日瞳朧望龍坂坐上一言寒口暖西入天關灑霖雨須惜窮鱗在泥土𥘉夏有感我從得病臥閭巷三見夏物爭滋榮紅英紫蕚逐風盡高幹密葉還隂成山亭水館處處好朱碧萬實相駢擎林烏梁燕各生子翅羽已足爭飛騰雉雞五色繡新翮鷕鷕慕匹相隨鳴穴蜂露蝶亦有類歘往復聚何翾輕箔蠶滿室事方盛繭綴下上如連星麥芒秧頴錯雜出高壠大澤填黃青物從草木及蟲鳥無一不自盈其情嗟我獨病不如彼胸氣卧立常怦怦筋酸骨楚頭目眩強食豈得飢膚盈我身今雖落衆後我志素欲希軻卿十年萬事常坎壈奔走未足供藜羮愁勤未老鬚先白多學只自為身兵自然感疾憊形躰後日雖復應伶俜非同世俗顧顔色所慕少壯成功名但令命在尚可勉屑細詎足傷吾平送人移知賀州溪石膠船秋瀨微南山巉空勢峩巍風露氣嚴花草緋天色漻漻𥘉鴈飛君子往守東南圻旟旝綵錯如翔暈象西照地榮笏衣先後隸從何頎頎𥘉君治縣參德威吾人􅉼濡樂以肥念今奪去失所依出者遮行居者希我思群公坐天圍心與星斗爭光輝薦賢縮否言無違迅若發石乘高機何此茂器時所稀噤無一語為發揮敢作此什傳王畿旦暮璽書來勑歸之南豐道上寄介甫應逮冒煩暑驅馳山水間泥泉沃渴肺沙風吹汗顔疲驂喘沫白殆僕貟肩殷仰嗟早雲高俯愛芳陂潺空郵降塵榻淨館排霞關城隍壯形勢岡谷來回環紅芰姹相照翠樹鬱可攀野苗雜青黃雨露施上慳巫覡謁群望簫鼓鳴空山憂農非吾職望歲竊所歎憩當午日烈行瞻月𥘉彎星斗弄光彩羅絡龜火班跂履雖云倦桑􅎚得暫還林僧授館舍田客扳鞍吾心本皎皎彼詬徒㘖㘖方投定鑑照即使征馬班相期木蘭楫蕩漾窮灣川謝章伯益惠硯人生對門東西陌口耳一間心誰傳况乃天地相去逺一在南海一在燕古今萬世復萬世彼亦居下此在前是非得失錯且繁以情相語何由緣造化豈不大且淵到此縮縮智且慳聖人智出造化先始獨俯仰吾坤乾一人詰曲意百千以文寫意意乃宣簡書軸載道相聮馳夷走貊通百蠻羲皇向今谷屢遷言語應接旦暮問聖人不死一作能術以此人與其類殊蚑蠕外之君臣內父子仁義禮樂定筆端硯與筆墨乃舟船論功次第誰能攀伯益於文敏且顓字向𥿄上生戈鋌與硯出入宜不捐胡乃贄我璧棄泉作詩知硯功小大報不充賜心焦然送劉醫博小人久病如愁感每嘆地僻無良醫窮居索寞俗事少對坐荏苒風光移深冬山城萬木落隂氣蕩射生寒颸東方吐日光入户素璧閃閃含清輝臨汀劉君落落者六伎絶偉如天資潛心密與造化會布指敻有精靈隨馬蹄所至病歷屈我於此時欣得之一來握手與我話委曲衰旺肺與脾囊中珍丸撮星斗俾我咀嚼心顔怡灑然沉痾一日解始免未老為枯骸越人湔腸術已緩仲景納餅術可卑劉君與我德至大拱璧巨鼎非酬禆我嗟劉君乃士類進退婉婉無瑕玭况又新承太守薦羈鞅日背東門馳禁林侍從務周慎君挾所有直相宜貴人四難真可患去此足以為時規送陳啇學士柳黃半出年將破溪溜浸苔強萬箇溪頭蒲葦各萌芽山梅最繁花已墮物色撩人思易狂况躋别館清何那城東日晚公將去纛影未離愁四座公於萬事不雕鐫心意恢恢無坎坷來從奎壁光鋩下笑倚樽筵成郡課嗟豫齪齪才性下棄置合守丘樊餓公持姓名動人主袚飾寧嫌筆端挫從今清夜思江路夢送公船先北過送錢生天下學校廢師生無所依子來滿槖書璨璨璧與璣一字未得讀叩言忽言歸憐子甚有志事時與子違吾無一畝宫留子為發揮去矣善自立母使嗣音稀雪詠雲花好潔白不待詠説知區區耴相似今古同一辭薩能比衆作小去筆墨畦誰能出千載為雪立傳碑四座且勿歌聽我白雪詩天地於降雪其功大艱難去年暖風日冬在春已還山屏盡深碧危溜聲亦潺草萌各已動梅花開最繁爐火殆可謝衣絮誰復言推排臘已過一變天更寒飄風動木石激射難出關深房擁髙燎領肘曽不溫仰視雲壓疊垂欲藉屋山元氣不復呵飛鳥折羽翰誰排河漢流欲墯莾蒼間道為黑風遮凝凍無住著紛紛成片縷六出非刻削𥘉時漏餘滴雜雨猶可惡迤邐縱飛灑態狀不可名或稀若有待或密似相縈或溺久宛轉或狂自軒騰群來信汗漫孤飄亦零丁屋角𥘉漸班瓦溝忽皆平圽窪一巳滿茅茨壓將傾樹木遍封裏岡山助峥嶸階除斷纎穢池臺有餘清流塵寂巳掩物象窅皆明厨煙或中鑱里表仍孤擎長街隱缺甃荒城混孤稜沙水眇相合扁舟在啚屏啄草鳥雀蹤篆字遺蹤橫頓驚宇宙內侈麗皆天成引望誰倚樓秀色亂自睛永懷衡門士辛苦守六經山藜不充腹筆硯久已冰柔茵坐中堂誰問公與卿世事汨無意燭換猶飛觥文犀壓朱箔陽春謝􅌙筝所處殊處所苦樂固異情誰致此不齊上天意何營蒼蒼不可問奕奕灑未停明晨起相處寒日已滿窗井甃破圎素砌苔還故蒼萬物去復冒顔色皆復常融為大田水其流日滂滂方塘接深甽澄徹碧玉光豈惟癘疫消庶驗百榖祥願彼守經士幸可繼糗糧憂民既非職空致新詩章送僧晚容飛光無停芳歲闌群陽不行寒氣動踈篂有韻窗含雪重幕無溫筆捿凍蕭條山草葉始枯綽約江梅蕊先弄無人為我取酒斟有客來前乞詩送多情為客不能已捲𥿄連書筆鋒縱七言百字拙且卑俗眼方憎汝休重送叔延判官北風吹空雪花冷平鋪雲濤冒峯頂江長水闊飛鳥絶沙樹參差動波影君子從戎碧油下緑髮清瞳笏𫀆整大馬髙車府中罷一船沿流背丁丙魴魚勝銀樽酒美物物當前若圖屏危帆健櫓醉中去千里奔過猶一頃明年隨春到京國紅紫燒空折桃杏獻書又謁蓬萊宫新􅓯豪曹試鋒頴况遇朝廷方急材驥騄騤騤足當騁山荼花山茶花開春未歸春歸正值花盛時蒼然老樹昔誰種照耀萬朵紅相圍蜂藏鳥伏不得見東風用力先吹噓追思前者葉蓋地萬木慘慘攢空枝寒梅數綻小顔色霰雪滿眼常相迷豈如此花開此日綘艷獨出凌朝曦為憐徑意似松柏欲攀更惜長依依山榴淺薄豈足比五月霧雨空芳霏丁亥三月十五日茫茫月色如溪沙萬里不有纎雲遮今年寒氣爭春來雪大如掌隨驚雷臨川城中三月雨城東大丘汨為渚天地慘慘無開時常恐蟄死和與羲此時謂月水中沒溺入蛙腸那復出豈知今夜月光圓照徹萬物無遺偏人間有人司重輕安得知汝有時明舍弟南源刈稻買田南山下禾黍忽巳秋糟床待此注豈止衣食謀窮隂迫霜霰不可遲揫收吾黨二三子晨行巳寒裘久苦城中囂至山諒優遊况已除險穢新堂置嵓幽窗軒衆峯出階墀水淙流良材未成種草樹亦巳稠寒花開照耀谷鳥樂啾啁心與珍境接佳興固已遒而况饋朝夕甘美日可搜黃雞肥落爼清酤湛盈甌時鮮鱠氷鯽餘滋折丹抽此味何以侑文辭頗賡酬晝務誠遺滯夜工督春諭因觀稼穡勞始覺奉養優此樂詎非幸人生復何求送子固自起往意不可留奉和滁州九詠九首并序先生貶守滁滁小州先生為之殆無事環州多佳山水最有名琅瑘山近得之曰幽谷先生數逰其間又賦詩以樂之鞏得而賡之者凡九章琅瑘泉石篆陽氷絶藝天下稱琅瑘石篆新有名𥘉留泉涯俗誰顧一日貴重繇先生古今書法不可數猶有字本存於經我於八體未曽學雖得此字寧能評高文老筆又所愛欲敘髣佛辭非精筆端應驅鬼神聚筆妙敻與隂陽爭刻雕萬象出冥昧不見刀斧曽經營竒形挻若聳崖巘險勢直恐生風霆雨來莾蒼龍蛟起秋入寥沉星斗明先生七言載其側為地自與丘山平先生抱材置荒郡有若此字存嵓扄當還先生坐廊廟悉引萬事歸繩衡遂收此字入祕府不使日灼毒苔縈高材重寶不失一唐舜湯禹寧非朋遊琅瑘山飛光洗積雪南山露崔嵬長淮水未緑深塢花已開逺聞山中泉隱若氷谷摧𥘉誰愛蒼翠排空結樓臺䡾䡾架梁棟輝輝刻瓊瑰先生鵉鳯姿未免燕雀猜飛鳴失其所徘徊此山隈萬事於人身九州一浮埃所要挾道德不愧丘與回先生逐二子誰能計垠崖所懷雖未寫所適在􅌚咍為語幕下士殷勤羞甕醅歸雲洞洞逺人言接滄海洞幽晴始見莓苔天下顒顒望霖雨豈知雲入此中來琅瑘溪野草山花夾亂流橋邊旌斾影悠悠即應要地無人見可忍閧時不出遊班春亭山亭嘗自絶浮埃山路輝光五馬來春滿人間不知主誰言爐冶此中開庶子亭琅瑘石泉清照人裏無泥沙表無塵風翻日炙夏潦盡古練一匹常奫淪石屏路石屏不見刀斧䀶石下𥘉誰得行徑千騎來時停管絃月明更覺山中靜慧覺方丈七言老意蒼松蟠百金古字青霞鐫儒林孟子先生是墨者夷之後代傳幽谷晚飲先生卓難攀材真帝王佐皎皎衆所病蜿蜿龍方卧卷彼天下惠赴此一郡課幕府既多暇山水乃屢過旌旗拂蒙密車馬驚坎坷􅋢此谷中泉聲響逺巳播槎橫勢逾急雨點緑新破旁生竹相圍竦竦碧千箇遙源窅難窺盤古坦如磋遊鱗戢可數飛鳥嚶相和援琴薰風後結宇寒嵓左觥筵巳得月金紈尚圍坐心如含逍遙語不綴招些一時聳傳觀千載激柔懦甘棠詩之懷峴首淚嘗墯况此盛德下𥜗袴人所荷不假碑刻垂棟牖敢墮挫當今甲兵後天地合坎坷先生席上珍豈忍溝中餓母徐黑􅙲石當馳四方賀南豐先生元豐類藁卷之二
