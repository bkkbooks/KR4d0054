body:
  text: 類藁卷之三十二劄子論中書録黃晝黃舍人不書檢臣𥘉掌書命中書吏以録黃晝黃并檢赴臣簽書其檢中書舍人稱臣書名而侍郎押字至録黃晝黃然後侍郎舍人皆稱臣書名臣曽巡廳言檢草舍人稱臣書名而侍郎押字恐于理尚有未盡且録黃晝黃并檢一躰相須而成當書之官未有可以一書一否也况録黃侍即舍人皆稱臣書名者事君之體固然也其檢舍人不書欲以為别異執政乎則録黃晝黃并檢一體相須而成事君之體于例當一一書之間方其嚴上則未有可以復伸下也伏尋故事中書舍人分押尚書六曺天下衆務無不關決其各執所見謂之五花判事故唐太宗嘗謂侍臣曰中書門下機要之司詺敕有不便者皆須執論比來遂無一言駮論若準書詺敕行文書而巳人誰不堪今舍人不押六曺惟掌書命而事干書命者又不書檢竊尋故事未有可據而然也或謂事干書命者有除改行遣因依故舍人不當書檢然向來書檢巳連除改因依况除改因依參于典故即無舍人不得預聞之理臣詳本朝之制官司佐屬蓋有得書檢而不得書行移文字者未有得書行移文字而不得書檢者此又于理可疑臣固非欲書檢也顧緑聀分不敢苟止伏乞考詳理體斷自聖裁令臣得以遵守取進止元豐五年七月請給中書舍人印及合與不合通簽中書外省事臣檢會中書外省昨準門下省連到詳㝎官制所狀內事件有申明下項一檢會官制所元豐四年十月七日上殿劄子元擬門下省印給事中印奉聖旨門下省印尚書省印門下給事中印中書舍人之印尚書列曺别具考定取旨餘兩省官并省務並用給舍印臣今看詳通進司文字既隸給事中合使門下給事中印一給事中􅈦狀勘會請到門下外省印未委合于何處收掌臣今看詳上件印合係散騎常侍收掌如闕則以次官一給事中廳狀四月二十九日準詳定官制所發到狀二件為分揆人吏并院子事各係申門下外省今來未審係是何官書判施行臣今看詳應申門下外文字合係本省散騎常侍以下通簽書一狀後門下外省批巳施行外五月六日送中書外省施行訖即却繳送合屬去處臣今看詳逐項事件並只是指揮門下外省及給事中􅈦其中書外省雖淮批送施行即未有㝎制中書外省及舍人􅈦事務明降指揮兼官制所狀內一項稱兩省官并省務並用給舍印又一項稱門下外省印合係散騎常侍收掌如闕即以次官是則中書舍人及中書外省各合有印今來巳有中書外省印其中書舍人之印即未給到未應得官制所狀內元定指揮及右省官除逐􅈦各有分職外其外省事務見今中書舍人與起居舍人通簽若將來常侍以下至正言員足消與未消逐一通簽如不通簽即未審合係是何官書判施行如合通簽亦乞明降指揮右取進止貼黃今後因逐司申明立法有與别司事體相同者乞令便據逐司事務立條貴免更有申請重煩聖聽兼免逐司事躰相同施行不一如允臣所奏乞立此條令今後應干修條處並依此又舍人諌官舊各有印蓋緣本聀文字慮有事干機密難就别官用印故事中書舍人判省雜務議邉防給賜士卒只支頭子臣伏見真宗議封泰山問三司使丁謂隨駕兵士或遇泥雨支賜鞋錢動須五七萬貫如何有備謂奏隨駕之士披帶巳重若有支賜如何將行𣣔令殿前都指揮使曹璨先問軍士路中或有支賜置隨駕便錢一司各與頭子支便于兵士住營處或指㝎州軍各使骨肉請領一則便于兵士請領二則隨駕兵士骨肉在營得便到特支錢物甚安人心曺璨尋問皆曰隨駕請得何用兼難以將行若如此皆感聖恩遂定東封之計車駕往回略無闕誤臣竊以謂邉防給賜士卒可推此行之在公可省輦運在私可無負致營護之芳而士卒之家又速得錢物濟用伏乞詳酌如有可采出自聖意施行取進止申明保甲巡警盜賊不曽上在臣伏以周禮五家為比使之相保推之至于五州為鄉因其民以用之于田役追胥之事管仲于齊亦以五家為軌推之至于五鄉為軍以有三軍之制蓋生民之業資于衣食則為農資于備禦則為兵其所恃之理然也後世言兵者以謂九夫為井此入陳之法所由出也立家為執此師旅之法所出也以臣考之所以然者非三軍之改取法法于鄉田蓋古者生民之業兵農非異務也自經界既廢而兵農始殊秦漢之際大率十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫遊徼三者掌教化嗇夫職聽獄訟收賦稅遊徼循禁盜賊亦比閭族黨卒伍追胥之遺事也今保甲之制自五家為保推之至於有大小保長有都副保正聀承文書督盜賊與比閭有長鄉亭有嗇夫遊徼非異意也臣昨守亳州亳為多盜重法之地臣推行保甲之法以禁盜賊幸不至繆戾誠不自揆欲于保甲巡檢縣尉之法所以防慮盜賊者有所推廣以稱朝廷立法之意具下項一諸處自來盜賊並是外來浮浪行止不明之人或是本處素耒無賴之人保甲之法使五家為保蓋欲察舉非違之事一保五家若有一家藏匿外來浮浪行止不明之人或一家有素來無賴之人即四家無由不知而法禁之中不責其顔情蓋芘則人于鄉里誰肯告言若為設禁防使不告官者因事發露則有相坐之刑人情自愛誰肯苟容此乃本立保伍察非違之意也所察舉者藏匿惡人之家所以為人除患固非關訐之路傷鄰里之義也若藏匿之家自不能捨同惡人何所容入盜賊不禁而自熄理之所可必也欲乞指揮外來浮浪行止不明之人保不得舍止本處素來無賴之人保內須以姓名申官官為籍記係籍之人凡有出入並須告知本保若保內舍止外求浮浪行止不明之人犯人嚴斷同保不紏科不言上之罪保內有本處素來無賴之人同保不以姓名申官及係籍之人出入不告本保本保不紏亦並科不言上之罪犯人嚴斷所貴有所關防可以暗消盜賊况自來州縣亦往往有禁絶舍止浮浪及籍記惡人之處可以斷得盜賊别無優煩兼保甲條諸保內有外來人如行止顯有不明即收領送官則是法意蓋巳及此今耒所乞只是申明更𣣔詳備伏乞裁酌施行一伏見熙寧六年保甲條法保內如遇有賊盜畫時告報大保長巳下同保人户即時前去救應追捕如入别保即遞相繫鼓應接襲逐元豐二年詳定上條莭文諸保內賊盜畫時集本保追捕如入别保遞相告報襲逐舊有鋪屋及鼓處依舊仍輪保丁守宿未有處願置者聽臣竊以謂元條及詳定互有詳略若合而用之則彌綸之意無所不㫞今𣣔乞指揮諸保內賊盜畫時集本保追捕如入别保即遞相擊鼓報應􅊞逐並置鋪屋及鼓仍輪保丁巡宿如此則保伍之內既不得容止惡人巡宿之法又備如有賊發則合力追鋪措置無所不盡于本置保申之意委曲備具亦古者井田守望相助後世置鄉亭徼循盜賊之遺法也一伏見熙寧敕莭文諸巡檢常于地分內巡警𪠘宇所在州給與印曆逐季點檢臣𣣔乞相度指揮重法地分巡檢縣尉常于地分內巡警每旬具所到地分申州仍給與行程印曆每李本州將旬申與印曆委官點磨違者取勘施行州不督察監司按劾以聞如此則制置捕盜之官事躰均一理在又行不容苟簡之人得以廢法使捕盜之官分巡不止保甲候望轉相氶接盜賊所向輒遇譏察竊發之謀必自衰熄或有伺間不逞之人亦易敗獲右取進止存恤外國人請著為令不曽上臣昨任明州日有高麗國界託羅國人崔舉等因風失船飄流至泉州界得捕魚船援救全度從此隨捕魚船同力採捕得食自給後于泉州自陳碩來明州候有便船却歸本國泉州給與沿路口劵差人押來臣尋為置酒食犒設送在僧寺安泊逐日給與食物仍五日一次别設酒食具狀奏聞臣奏未到之間先據泉州奏到奉聖旨令于係官屋舍安泊常切照𬋩則臣存恤舉等頗合朝廷之意自後更與各置衣裝同天莭日亦令冠帶得預宴設竊以海外蠻夷遭罹禍亂漂溺流輪逺失鄉土得自托于中國中國禮義所出宜厚加撫存令不失所泉州𥘉但給與口劵差人徒步押來恐朝廷矝恤之恩有所未稱檢皇祐一路編敕亦只有給與口食指揮今來聖旨令于係官屋舍安泊常切照𬋩事理不同緣今來所降聖旨未有著令𣣔乞今後高麗等國人船因風勢不便或有飄失到沿海諸州縣並令置酒食犒設送係官屋舍安泊逐日給與食物仍數日一次别設酒食闕衣服者官為置造道路隨水陸給借鞍馬舟船具析奏聞其𣣔歸本國者取稟朝旨所貴逺人得知朝廷仁恩待遇之意取進止請減軍士營教臣伏見諸軍教閲之法並只合平教一次舊例有晚教者即更晚教向來教閲之法𥘉行之時諸軍𣣔要訓練早得精熟是以早晚教外諸營更有營教今來訓練日久各以精熟甚有踏硬出格之人諸軍事藝見今分作三等欲乞相度其事藝在第三等者與免營教一日在第二等者與免營教二日在第一等與免營教三日所貴人情恱慕升進得事藝者多乞賜詳酌指揮取進止代曽侍中辭轉官劄子臣蒙恩轉官巳曽靣陳及具劄子辭免懇誠雖切志願未諧夙夜省循不皇寧處是用再干梳扆伏望必賜允從臣以謭才當陛下即政之𥘉勵精思治與在廟堂首當大任所宜佐陛下循守法度重惜名器使恩無誤施官不虛授四方觀聽知朝廷慶賞得宜則衆情必皆勸慕欲正其本當始于臣今若首玷寵榮不知固避使朝野竊上議虧政理則是欲清其流而先濁其源致弊之由乃自臣始豈陛下所以屬任微臣之意愚情所以圖報萬一之心况祖宗以來進官之法或以歲月或以功勤今于斯二者實無其一又于執政之內不為以事當遷欲貪厚恩何義而可伏望特回聖慈俯憐悃迫速賜德音遂其所乞至于國公戶邑則臣更不敢辭謹具劄子奏陳無任赤心懇激之至取進止代曽侍中乞退劄子臣近三上表及再進劄子以隂陽不調雨雪愆候乞欲免黜蒙面諭不允仍降批答令斷來章臣仰惟寵遇之厚恩旨之嚴固欲強顔趣于順命然信宿以來早氣轉甚臣夙夜震惕職思其憂所以不避冒煩至于五六敢祈仁聖必賜矝從此臣區區之愚義不得止者也蓋宰相職調隂陽災異即當罷免行之巳久故事甚明今亢陽為沴經涉冬春隴畒之間焦枯日甚閭巷之內疾癘將興天戒丁寧咎自臣始陛下側身思變發于懇誠忘巳憂人見于顔色以至詢訪周于列位請禱遍于群神聖心焦勞中外嗟仰豈臣之分當得晏然雖陛下大恩𣣔終覆護而四方觀聽責當謂何且臣少壯之時尚虞不職今齒髮巳暮理當乞身欲貪寵私何義而可伏望祭臣素守體臣至誠早回聖慈許從罷黜矧今舊德之老新進之賢求於朝廷所在森列取以代臣必致休證使臣得避賢者路退守丘園豈惟上厭天心下塞人望亦所以全陛下始終之恩成老臣去就之義况應天人惟在誠實臣既知當退豈敢矯誣所望睿明審加詳擇臣無任恤誠迫切之至取進止英宗實録院申請奉敕修撰英宗皇帝一朝實録伏以先帝功德之美覆𬒳天下宜載方䇿傳之無窮而未有日曆至于時政記起居注亦皆未備今此論次實憂踈略其於搜訪事迹以傋撰述尤在廣博使無闕遺今取到修撰仁宗皇帝實録院行遣案卷看詳彼處纍次陳請乞搜探取借應于合要照證文字前後條件本院亦合如此施行參詳次作一併申請具下項文臣少卿以上武臣正刺史以上或雖官品未至而事業勳績可書及丘園之士曽經朝廷奬遇凡在先朝薨卒者例合于實録內立傳𣣔乞朝廷特降指揮下鈴轄諸道進奏院遍行指揮仍劄付御史臺開封府及審官院三班院流內銓入內內侍省閣門出榜曉示應係英宗朝亡殁臣僚合立傳者並令供納行狀神道碑墓志等仰本家親屬限日近修寫疾速附遞繳納赴實録院一應先朝曽歷兩府兩制雜學士侍制臺諌官及正在刺史閣門使巳上臣僚或因賜對親聞聖誥或有司奏事特出宸斷可書簡册者並乞付中書遍劄送巳上臣僚委令逐人速具實封供報務要詳仍乞指揮進奏院遍行指揮應曽在先朝任上件官位巳經亡殁臣僚之家亦許親族編録經所在官司繳進不得虛飾事莭候到日並降付本院以憑看詳編修所貴書成之日免致疏略一乞下中書樞密院自嘉祐八年四月至治平四年正月巳前應有臣僚進獻文字曽送史館或留任中書剗刷名件及下史館盡底檢尋降付本院并宰臣與文武百僚凡有奏請稱賀上表所降批答亦乞檢尋降下一乞下兩省及司封兵部吏部甲庫學士舍人院據實録院所關宣敕及詔書除目告詞如移牒暫借使畫時檢尋報應不得稽緩一乞下禮賔院具自嘉祐八年四月至治平四年正月八日已前凡外蕃朝貢所記本國風俗人物道里土産詳實供報一先朝臣僚有得罪譴謫者乞下御史臺審刑院刑部大理寺據實録院所要案櫝畫時供借一乞下司天監自嘉祐八年四月至治平四年逐年其曆日一本供報當院一乞下三司令自嘉祐八年四月至治平四年正月八日巳前應蟲蝗水旱災傷及德音赦書蠲放稅賦及蠲免欠負並具實數供報當院一乞下三司自嘉祐八年四月至治平四年正月八日巳前應有制置錢穀稅賦茶鹽及榷酒等凡干臣僚章疏論議廢置事件具録供報當院一部水監河渠水利凡有論議改更貢部但係郡國所申祥瑞貢院但干改更貢舉條制太常寺禮院但干禮樂制作事三司戶部每遇戶口升降巳上官司自嘉祐八年四月至治平四年正月八日巳前令子細檢尋供報本院不得一天聖元年管勾修真宗皇帝實録所奏修撰官李維等公文其間有事迹不圓處合係中書樞密院三司檢尋應副又緣事件不少竊慮差去分手不得到裏靣檢尋是致逐時不檢到照證事件乞傳宣中書樞密院據李維等合要照證修撰事迹名件令合行分手等盡底檢尋應副免致有妨修撰奉御寶批依奏治平元年修仁宗皇帝實録院亦奏合依中書樞密院檢尋合要照證事件乞依天聖𥘉躰例施行并乞差中書應奉國史文字堂後官魏孝先樞密修時政記生事劉孝先候見當院書庫官等將到合要檢尋事件立便收接檢尋應副又曽乞差中書樞密院編文字官及乞于三司審刑院太理寺屬官內選差人員各令應副檢文字今來本院合要中書樞密院檢尋文字照證編修欲乞依天聖治平𥘉躰例施行一乞下管勾往來國信所契勘嘉祐八年四月至治平四年正月末以來所差入國接伴館伴官等正官借官簿等册并語録權借赴當院照證修纂仍不妨彼所使用一乞下玉牒所取英宗皇帝玉牒一本照會一乞下中書編機房合要嘉祐八年四月至治平四年正月八日巳前改除麻制文字照會一本院但干修實録於諸處檢借文字並須當聀官貟封記往還疾速應付一乞下尚書司封疾速檢借嘉祐八年四月至治平四年正月八日巳前中書除改百官官位姓名敕黃照證修纂元豐類藁卷之三十二
