body:
  text: 類藁卷之三十二劄子論中書録黄晝黄舍人不書檢臣𥘉掌書命中書吏以録黄晝黄并檢赴臣簽書其檢中書舍人稱臣書名而侍郎押字至録黄晝黄然後侍郎舍人皆稱臣書名臣曽廵廳言檢草舎人稱臣書名而侍郎押字恐扵理尚有未盡且録黄晝黄并檢一躰相湏而成當書之官未有可以一書一否也况録黄侍即舎人皆稱臣書名者事君之體固然也其檢舍人不書欲以為别異執政乎則録黄晝黄并檢一體相湏而成事君之體扵例當一一書之間方其嚴上則未有可以復伸下也伏㝷故事中書舍人分押尚書六曺天下衆務無不関决其各執所見謂之五花判事故唐太宗嘗謂侍臣曰中書門下機要之司詺敕有不便者皆須執論比来遂無一言駮論若准書詺敕行文書而巳人誰不堪今舍人不押六曺惟掌書命而事干書命者又不書檢竊㝷故事未有可㩀而然也或謂事干書命者有除改行遣因依故舍人不當書檢然向来書檢巳連除改因依况除改因依參扵典故即無舎人不得預聞之理臣詳本朝之制官司佐属盖有得書檢而不得書行移文字者未有得書行移文字而不得書檢者此又扵理可疑臣固非欲書檢也顧緑聀分不敢苟止伏乞攷詳理體断自聖裁令臣得以遵守取進止元豊五年七月請給中書舎人印及合與不合通簽中書外省事臣檢㑹中書外省昨准門下省連到詳㝎官制所状内事件有申明下項一檢㑹官制所元豊四年十月七日上殿劄子元擬門下省印給事中印奉聖㫖門下省印尚書省印門下給事中印中書舎人之印尚書列曺别具攷定取㫖餘兩省官并省務並用給舎印臣今看詳通進司文字旣隷給事中合使門下給事中印一給事中􅈦状勘㑹請到門下外省印未委合扵何處收掌臣今看詳上件印合係散騎常侍收掌如闕則以次官一給事中廳状四月二十九日准詳定官制所發到狀二件為分揆人吏并院子事各係申門下外省今来未審係是何官書判施行臣今看詳應申門下外文字合係本省散騎常侍以下通簽書一狀後門下外省批巳施行外五月六日送中書外省施行訖即却繳送合属去䖏臣今看詳逐項事件並只是指揮門下外省及給事中􅈦其中書外省雖淮批送施行即未有㝎制中書外省及舍人􅈦事務明降指揮兼官制所状内一項稱两省官并省務並用給舎印又一項稱門下外省印合係散騎常侍收掌如闕即以次官是則中書舎人及中書外省各合有印今来巳有中書外省印其中書舎人之印即未給到未應得官制所状内元定指揮及右省官除逐􅈦各有分職外其外省事務見今中書舍人與起居舎人通簽若将来常侍以下至正言員足消與未消逐一通簽如不通簽即未審合係是何官書判施行如合通簽亦乞明降指揮右取進止貼黄今後因逐司申明立法有與别司事體相同者乞令便㩀逐司事務立條貴免更有申請重煩聖聴兼免逐司事躰相同施行不一如允臣所奏乞立此條令今後應干修條䖏並依此又舎人諌官舊各有印盖縁本聀文字慮有事干機宻難就别官用印故事中書舎人判省雜務議邉防給賜士卒只支頭子臣伏見真宗議封㤗山問三司使丁謂随駕兵士或遇泥雨支賜鞋錢動湏五七萬貫如何有備謂奏随駕之士披帶巳重若有支賜如何将行𣣔令殿前都指揮使曹璨先問軍士路中或有支賜置随駕便錢一司各與頭子支便扵兵士住營䖏或指㝎州軍各使骨肉請領一則便扵兵士請領二則随駕兵士骨肉在營得便到特支錢物甚安人心曺璨㝷問皆曰随駕請得何用兼難以将行若如此皆感聖恩遂定東封之計車駕徃回略無闕誤臣竊以謂邉防給賜士卒可推此行之在公可省輦運在私可無負致营護之芳而士卒之家又速得錢物濟用伏乞詳酌如有可采出自聖意施行取進止申明保甲廵警盗賊不曽上在臣伏以周禮五家為比使之相保推之至扵五州為郷因其民以用之扵田役追胥之事管仲扵齊亦以五家為軌推之至扵五郷為軍以有三軍之制盖生民之業資扵衣食則為農資扵備禦則為兵其所恃之理然也後世言兵者以謂九夫為井此入陣之法所由出也立家為執此師旅之法所出也以臣考之所以然者非三軍之改取法法扵郷田盖古者生民之業兵農非異務也自經界既廢而兵農始殊秦漢之際大率十里一亭亭有長十亭一郷郷有三老有秩嗇夫㳺徼三者掌教化嗇夫職聴獄訟收賦稅㳺徼循禁盗賊亦比閭族黨卒伍追胥之遺事也今保甲之制自五家為保推之至於有大小保長有都副保正聀承文書督盗賊與比閭有長郷亭有嗇夫㳺徼非異意也臣昨守亳州亳為多盗重法之地臣推行保甲之法以禁盗賊幸不至繆戾誠不自揆欲扵保甲廵檢縣尉之法所以防慮盗賊者有所推廣以稱朝廷立法之意具下項一諸䖏自来盗賊並是外来浮浪行止不明之人或是本䖏素耒無頼之人保甲之法使五家為保盖欲察舉非違之事一保五家若有一家蔵匿外来浮浪行止不明之人或一家有素来無頼之人即四家無由不知而法禁之中不責其顔情盖芘則人扵郷里誰肯告言若為設禁防使不告官者因事發露則有相坐之刑人情自爱誰肯苟容此乃本立保伍察非違之意也所察㪯者蔵匿悪人之家所以為人除患固非関訐之路傷隣里之義也若蔵匿之家自不能捨同悪人何所容入盗賊不禁而自熄理之所可必也欲乞指揮外来浮浪行止不明之人保不得舎止本処素来無頼之人保内須以姓名申官官為籍記係籍之人凡有出入並湏告知本保若保内舎止外求浮浪行止不明之人犯人嚴㫁同保不紏科不言上之罪保内有本処素来無頼之人同保不以姓名申官及係籍之人出入不告本保本保不紏亦並科不言上之罪犯人嚴断所貴有所関防可以暗消盗賊况自来州縣亦徃徃有禁絶舎止浮浪及籍記悪人之䖏可以断得盗賊别無優煩兼保甲條諸保内有外来人如行止顯有不明即收領送官則是法意盖巳及此今耒所乞只是申明更𣣔詳俻伏乞裁酌施行一伏見熈寕六年保甲條法保内如遇有賊盗畫時告報大保長巳下同保人户即時前去救應追捕如入别保即逓相繫鼓應接襲逐元豊二年詳定上條莭文諸保内賊盗畫時集本保追捕如入别保逓相告報襲逐舊有鋪屋及鼓䖏依舊仍輪保丁守宿未有䖏愿置者聴臣竊以謂元條及詳定互有詳略若合而用之則彌綸之意無所不㫦今𣣔乞指揮諸保内賊盗畫時集本保追捕如入别保即遞相擊鼓報應􅊞逐並置鋪屋及鼓仍輪保丁廵宿如此則保伍之内旣不得容止悪人廵宿之法又備如有賊發則合力追鋪措置無所不盡扵本置保申之意委曲備具亦古者井田守望相助後世置郷亭徼循盗賊之遺法也一伏見熈寕敕莭文諸廵檢常扵地分内廵警𪠘宇所在州給與印暦逐季點檢臣𣣔乞相度指揮重法地分廵檢縣尉常扵地分内廵警毎旬具所到地分申州仍給與行程印暦毎李本州将旬申與印暦委官點磨違者取勘施行州不督察監司按劾以聞如此則制置捕盗之官事躰均一理在又行不容苟簡之人得以廢法使捕盗之官分廵不止保甲候望轉相氶接盗賊所向輙遇譏察竊發之謀必自衰熄或有伺間不逞之人亦易敗獲右取進止存恤外國人請著為令不曽上臣昨任明州日有高麗國界託羅國人崔舉䓁因風失船飄流至泉州界得捕魚船援救全度從此随捕魚船同力採捕得食自給後扵泉州自陳碩来明州候有便船却歸本國泉州給與沿路口劵差人押来臣㝷為置酒食犒設送在僧寺安泊逐日給與食物仍五日一次别設酒食具状奏聞臣奏未到之間先㩀泉州奏到奉聖㫖令扵係官屋舎安泊常切照𬋩則臣存恤舉䓁頗合朝廷之意自後更與各置衣装同天莭日亦令冠帶得預宴設竊以海外蛮夷遭罹禍亂漂溺流輪逺失郷土得自托扵中國中國禮義所出宜厚加撫存令不失所泉州𥘉但給與口劵差人徒歩押来恐朝廷矝恤之㤙有所未稱檢皇祐一路編敕亦只有給與口食指揮今来聖㫖令扵係官屋舍安泊常切照𬋩事理不同縁今来所降聖㫖未有著令𣣔乞今後高麗䓁國人船因風勢不便或有飄失到沿海諸州縣並令置酒食犒設送係官屋舎安泊逐日給與食物仍数日一次别設酒食闕衣服者官為置造道路随水陸給借鞍馬舟船具析奏聞其𣣔㱕本國者取禀朝㫖所貴逺人得知朝廷仁恩待遇之意取進止請减軍士營敎臣伏見諸軍教閱之法並只合平教一次舊例有晚教者即更晚教向来教閱之法𥘉行之時諸軍𣣔要訓練早得精熟是以早晚敎外諸營更有營教今来訓練日乆各以精熟甚有踏硬岀格之人諸軍事藝見今分作三䓁欲乞相度其事藝在第三䓁者與免營敎一日在第二䓁者與免营敎二日在第一䓁與免营敎三日所貴人情恱慕升進得事藝者多乞賜詳酌指揮取進止代曽侍中辤轉官劄子臣蒙㤙轉官巳曽靣陳及具劄子辤免懇誠雖切志願未諧夙夜省循不皇寕䖏是用再干梳扆伏望必賜允從臣以謭才當陛下即政之𥘉勵精思治與在廟堂首當大任所宜佐陛下循守法度重惜名噐使㤙無誤施官不虚授四方觀聴知朝廷慶賞得宜則衆情必皆勸慕欲正其本當始扵臣今若首玷寵榮不知固避使朝野竊上議虧政理則是欲清其流而先濁其源致弊之由乃自臣始豈陛下所以属任㣲臣之意愚情所以圖報萬一之心况祖宗以来進官之法或以歲月或以功勤今扵斯二者實無其一又扵執政之内不爲以事當遷欲貪厚㤙何義而可伏望特回聖慈俯憐悃迫速賜徳音遂其所乞至扵國公戸邑則臣更不敢辤謹具劄子奏陳無任赤心懇激之至取進止代曽侍中乞退劄子臣近三上表及再進劄子以隂陽不調雨雪愆候乞欲免黜蒙面諭不允仍降批荅令断来章臣仰惟寵遇之厚㤙㫖之嚴固欲强顔趣扵順命然信宿以来早氣轉甚臣夙夜震惕職思其憂所以不避冐煩至扵五六敢祈仁聖必賜矝從此臣區區之愚義不得止者也盖宰相職調隂陽災異即當罷免行之巳乆故事甚明今亢陽為沴經渉冬春隴畒之間焦枯日甚閭巷之内疾癘将興天戒丁寜咎自臣始陛下側身思変發扵懇誠忘巳憂人見扵顔色以至詢訪周扵列位請禱徧扵群神聖心焦劳中外嗟仰豈臣之分當得晏然雖陛下大㤙𣣔終覆護而四方觀聴責當謂何且臣少壯之時尚虞不職今齒髪巳暮理當乞身欲貪寵私何義而可伏望祭臣素守體臣至誠早回聖慈許從罷黜矧今舊徳之老新進之賢求於朝廷所在森列取以代臣必致休證使臣得避賢者路退守丘園豈惟上厭天心下塞人望亦所以全陛下始終之㤙成老臣去就之義况應天人惟在誠實臣既知當退豈敢矯誣所望睿明審加詳擇臣無任恤誠迫切之至取進止英宗實録院申請奉敕脩撰英宗皇帝一朝實録伏以先帝功徳之美覆𬒳天下宜載方䇿傳之無窮而未有日暦至扵時政記起居注亦皆未備今此論次實憂踈畧其於搜訪事迹以傋撰述尤在廣愽使無闕遺今取到脩撰仁宗皇帝實録院行遣案卷看詳彼處累次陳請乞捜探取借應于合要照證文字前後條件本院亦合如此施行參詳次作一併申請具下項文臣少卿以上武臣正刺史以上或雖官品未至而事業勲績可書及丘園之士曽經朝廷奨遇凢在先朝薨卒者例合扵實録内立傳𣣔乞朝廷特降指揮下鈴轄諸道進奏院遍行指揮仍劄付御史䑓開封府及審官院三班院流内銓入内内侍省閣門出榜曉示應係英宗朝亡殁臣僚合立傳者並令供納行状神道碑墓誌䓁仰本家親属限日近脩冩疾速附逓繳納赴實録院一應先朝曽歴兩府兩制雜學士侍制䑓諌官及正在刺史閣門使巳上臣僚或因賜對親聞聖誥或有司奏事特出宸断可書簡册者並乞付中書遍劄送巳上臣僚委令逐人速具實封供報務要詳仍乞指揮進奏院遍行指揮應曽在先朝任上件官位巳經亡殁臣僚之家亦許親族編録經所在官司繳進不得虚飾事莭候到日並降付本院以憑㸔詳編脩所貴書成之日免致䟽畧一乞下中書樞宻院自嘉祐八年四月至治平四年正月巳前應有臣僚進献文字曽送史舘或留任中書剗刷名件及下史舘盡底檢㝷降付本院并宰臣與文武百僚凢有奏請稱賀上表所降批荅亦乞檢㝷降下一乞下两省及司封兵部吏部甲庫學士舎人院拠實録院所関宣敕及詔書除目告詞如移牒暫借使畫時檢㝷報應不得稽緩一乞下禮賔院具自嘉祐八年四月至治平四年正月八日已前凡外蕃朝貢所記本國風俗人物道里土産詳實供報一先朝臣僚有得罪譴謫者乞下御史䑓審刑院刑部大理寺㩀實録院所要案櫝畫時供借一乞下司天監自嘉祐八年四月至治平四年逐年其暦日一本供報當院一乞下三司令自嘉祐八年四月至治平四年正月八日巳前應虫蝗水旱災傷及徳音赦書蠲放稅賦及蠲免欠負並具實数供報當院一乞下三司自嘉祐八年四月至治平四年正月八日巳前應有制置錢糓稅賦茶鹽及搉酒等凡干臣僚章䟽論議廢置事件具録供報當院一部水監河渠水利凢有論議改更貢部但係郡國所申祥瑞貢院但干改更貢舉條制太常寺禮院但干禮樂制作事三司戸部每遇戸口陞降巳上官司自嘉祐八年四月至治平四年正月八日巳前令子細檢㝷供報本院不得一天聖元年管勾修真宗皇帝實録所奏修撰官李維䓁公文其間有事跡不圓䖏合係中書樞宻院三司檢㝷應副又縁事件不少竊慮差去分手不得到裏靣檢㝷是致逐時不檢到照證事件乞傳宣中書樞宻院㩀李維䓁合要照證脩撰事蹟名件令合行分手䓁盡底檢㝷應副免致有妨脩撰奉御寳批依奏治平元年脩仁宗皇帝實録院亦奏合依中書樞宻院檢㝷合要照證事件乞依天聖𥘉躰例施行并乞差中書應奉國史文字堂後官魏孝先樞宻修時政記生事劉孝先候見當院書庫官䓁将到合要檢㝷事件立便收接檢㝷應副又曽乞差中書樞宻院編文字官及乞扵三司審刑院太理寺属官内選差人員各令應副檢文字今来本院合要中書樞宻院檢㝷文字照證編修欲乞依天聖治平𥘉躰例施行一乞下管勾往来國信所契勘嘉祐八年四月至治平四年正月末以来所差入囯接伴舘伴官等正官借官簿䓁冊并語録權借赴當院照證脩纂仍不妨彼所使用一乞下玉牒所取英宗皇帝玉牒一本照㑹一乞下中書編機房合要嘉祐八年四月至治平四年正月八日巳前改除麻制文字照㑹一本院但干脩實録於諸䖏檢借文字並湏當聀官貟封記徃還疾速應付一乞下尚書司封疾速檢借嘉祐八年四月至治平四年正月八日巳前中書除改百官官位姓名敕黄照證修纂元豊類藁卷之三十二
