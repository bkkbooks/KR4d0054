front:
  text: 元豐類藁卷之三十五
  hash: sha256:a3abcc520fdc8db11c1f36315ed47102b2e091c8d078e6d261224a8968c7fead
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_035-1a}
body:
  text: 奏狀福州擬貢荔枝狀并荔枝録右臣竊以禹貢楊州厥包橘柚錫貢則百果之實列于土貢所徔來巳久二帝三王所未嘗易也荔枝于百果為殊絶産閩粵者比巴屬南海又為殊絶閩粵官舍民廬與僧道士所居自階庭埸圃至于山谷無不列植歲取其實不可勝計故閩粵荔枝食天下其餘𬒳于四夷而其尤殊絶者閩人者其名至三十餘種然生荔枝留五七日輒壞故雖歲貢皆乾而致之然貢蓋為常品相沿巳久其尤殊絶者未嘗以獻蓋東漢交址七郡貢生荔枝十里一置五里一候晝夜馳赱有毒蠱猛獸之害而唐天寶之間亦自巴蜀䁺致實開侈心當陛下之時方以恭儉寡欲為天下先固不可得而議及于此也至于歲貢既乾而致之然顧以常品其尤殊絶者則抑于下土使田夫野叟往往屬厭而太官不得獻之于陛下陛下不得獻之於宗廟兩宫使勞人費財如此可也蓋荔枝尤殊絶者固不可多致若每種歲貢數百或至千數每州不過用三五步卒使之日行兩驛固不為勤且煩非有勞人費財之患而修貢者不知及此此臣之所未諭也又荔枝成實在六七月間雖乾而致之然新者于其甘滋猶未盡失至于經歲則所存者特其滓苴而已而每歲貢入常至冬春夫蠻夷異類贄其方物皆知用其土産之良而不敢慢今邦域之內守藩之臣效其貢職而曽不知出此此臣之所以敢安也故臣常欲至荔枝成實約旁近州各擇其尤殊絶列于名品者差其多少以時上進其領于有司備燕賜之用者自如故事蓋建安貢茶自蔡襄易以小團而茶之絶特者始得獻之天子今荔枝復得貢其尤者則閩粵之産選擇而充庭實者始備所以致臣之恭于其貢職此臣之官守也荔技録陳紫出興化軍祕書省著作佐郎陳琦家于品為第一江緑出福州類陳𬗋差大而香味蓋為次也方紅徑可二寸色味俱美荔枝之大無出此者歲生二一作一二百顆而巳出興化軍尚書屯田郎中方蓁家紫種自陳𬗋實大過之出興化軍小陳𬗋實差小出興化軍宋公荔枝實如陳𬗋而小甘美亦如之出興化軍宋氏世傳其木巳三百歲藍家紅泉州第一出尚書都官員外郎藍丞家周家紅𥘉于興化軍為第一及陳𬗋方紅出而周家紅為次何家紅出漳州何氏法石白出泉州法石院色青白其大次于藍家紅緑核出福州荔枝核𬗋而此㒔核緑圓丁香丁香荔枝皆旁蒂大西下鋭此獨圓而味尤勝右十四種皆以次第著于録虎皮色紅而有青斑類虎皮出福州牛心以狀名之長二寸餘皮厚肉澀出福州惟一本玳瑁紅色紅而又有黑點類玳瑁出福州城東琉黃以色類琉黃朱柿色朱如柿出福州蒲桃荔枝穗生一穗之實至三一作一二百然其品殊下蚶殼以狀名之龍牙長可三四寸彎曲如瓜牙而無瓤核出興化軍然不常有水荔枝漿多而淡出興化軍蜜荔枝以甘為名然過于甘丁香荔枝核小如丁香大丁香殼厚色紫味微澀出福州天慶觀雙髻小荔枝每朵數十皆並蒂雙實真珠荔枝團白如珠無核荔枝之最小者十八娘荔枝色深紅而細長閩王王氏有女第十八好食此因而得名女家在福州城東報國院冡旁猶有此木或云謂物之美少者為十八娘閩人語將軍荔枝五代時有此官者種之因以得名出福州叉頭顆荔枝顆紅而小可施叉頭粉紅荔枝荔枝多深紅而此以色淺為異中元紅實時最晚因以得名火山荔枝本出南越四月熟穗生味甘酸肉薄閩中近年有之右二十種無次苐荔枝三十四種或言姓氏或言州郡或皆識其所出或不言姓氏州郡則福泉漳州興化軍蓋皆有也一品紅言于荔枝為極品也出近歲在福州州宅堂前狀元紅言于荔枝為苐一出近歲在福州報國寺明州擬辭高麗送遺狀竊見接送高麗使副儀內一項高麗國進奉使副經過州軍送知州通判土物並無答謝書候進奉使回日依例估價以係官生帛就整類量加回答檢會熙寧六年高麗國進奉有使副送明州知州通判土物共估錢二百貫以上九十九陌熙寧五年及九年有進奉使無副使送明州知州通判土物共估計價錢一百貫以上九十九陌其土物奉聖旨並依例令收估價回答臣今有愚見合具奏聞者右謹如前竊以高麗為蠻夷中為通于文學頗有知識可以德懷難以力服也故以隋之全盛焬帝之丗大兵三出天下騷然而不能朝其君及至唐室以太宗之英武李績之善將至于君臣皆東嚮以身督戰而不能拔其一城此臣之所謂難以力服也宋興自建隆以來其王王昭以降六王繼修貢職使者相望其中間厭于強虜自天勝以後始不能目通于中國陛下即阼聲教四塞其國聞風不敢寧息不忌強胡之難不虞大海之阻效其土實五歲三至如東西州唯恐在後其所以致之者不以兵威此臣之所謂可以德懷也陛下亦憐其萬里惓惓歸心有德收而撫之恩禮其厚州郡當其道途所出迎勞燕餞所以宣逹陛下寵錫待遇之意此守臣之職分也其使者所歷之州贄其所有以為好于邦域之臣陛下加恩皆許受之而資以官用為其酬幣其使一再至之間許其如此不為常制可也今其使數來邦域之臣受其贄遺著于科條以為常制則臣竊有疑焉蓋古者相聘贄有圭璋及其卒事則皆還之以明輕財重禮之義今蠻夷使來邦域之臣與之相接示之以輕財重禮之義使知中國之所以為貴此人事之所宜先則當還其贄如古之聘禮還其圭璋此誼之所不可巳也又古之以贄見君者國君于其臣則受之非其臣則還之今蠻夷嚮化來獻其方物以致其為臣之義天子受之以明天下一尊有臣而畜之之義此不易之制也邦域之臣與其使接以非其臣之義還其贄以明守禮而不敢踰亦不易之制也以此相厲以明天子之尊中國之貴所重者禮義所輕者貨財其于待遇蠻夷之道未有當先于此者也且彼贄其所有以明州一州計之知州通判所受為錢三一作一二十萬受之者既于義未安其使自明而西以逹京師歷者尚十餘州當皆有贄以彼之力度之蠻夷小國其于貨財恐未必有餘也使其有親附中國之心而或憂于貨財之不足臣竊恐有傷中國之義而非陛下所以畜之幸之之意也臣愚竊𣣔自今高麗使來贄其所有以為好于邦域之臣者許皆以詔旨還之其資于官用以為酬幣巳有故事者許皆以詔旨與之如故惟陛下詳擇之如可推行願更著于令蓋復其贄以及于恐其力之不足厚其與以及于察其耒之不易所謂尚之以義綏之以仁中國之所以待蠻夷未有可以易此者也其國粗為有知歸相告語必皆心服誠恱慕義于無窮此不論而可知也臣愚非敢以是為廉誠以拊接蠻夷示之以輕財重禮之義不可不先庶幾萬分之一無纍于陛下以德懷逺人之體是以不敢不言惟陛下裁擇謹具狀奏聞伏候敕旨擬辭免修五朝國史狀右臣去年八月伏奉敕命充史館修撰又奉聖旨專典史事且將三朝國史先加考詳候兩朝史了日一處修定又于延和殿伏蒙面諭所以任屬臣之意臣是以祗服聖恩不敢辭避天下皆知臣居此職出自主知以為榮遇况臣以至孤至逺之迹出深忌積毀之餘獨蒙明主知而用之且自古以來天下之士不遇者多矣如臣遭遇者無幾則臣捐草茅之軀以報天地之德固其分也至于效其區區之愚豈足為陛下道哉况以文字薄技得因聖宋之大典託名萬世學士大夫莫不願備其任而獨臣之愚幸預采擇此臣所以窮日夜憊精思不敢忘須臾志在于斯文惟恐不稱其任以負陛下任屬之意也自到局以來仰尊聖訓且將三朝國史先加考詳伏見祖宗以來神功聖德巍巍之烈至于歷世將相文武士吏言行聲實殊尤之迹至高至大巳非愚臣所能究盡况兩朝國史臣所未見竊惟五世百有餘年聖賢事業本末閎大臣之淺薄加以齒髮衰晚誠恐不能發明論次以稱陛下顯揚褒大之心虛食大官汗青無日以負陛下任屬之意此臣之所大懼也况五朝舊史皆纍世公相卿士道德文學朝廷宗工所共凖裁既巳勒成為國大典臣以至孤至逺之迹出深忌積毀之餘材質駑下豈宜輒議損益使臣仰恃日月之照不知自任之妄貪慕恩待趣之以就事誠恐黑白不當律吕失次方于舊史有失無得以負陛下任屬之意此又臣之大懼也若不早具上陳自求罷退至于歲月寖久不聀之罪巳不可逃雖欲乞身已無可及是以不避萬死之責敢千聖聽伏望出自聖慈察臣悃愊罷臣史事别與臣一差遣臣之昏愚不肖固巳盡在陛下聽察之中如蒙終賜收憐别加驅䇿顧臣之鄙奉令承詔可幸無罪則碎首捐軀固臣之所以此明臣之志在于量能知分非敢苟且避事也伏惟陛下天地父母哀而憐之元豐類藁卷之三十五
