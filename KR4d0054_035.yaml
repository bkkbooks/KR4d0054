front:
  text: 元豊類藁卷之三十五
  hash: sha256:8427e581496aa34b46c69275e7f972a6e35e2a71657e6c5c9b97a5b63835a307
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_035-1a}
body:
  text: 奏狀福州擬貢荔枝状并荔枝録右臣竊以禹貢楊州厥包橘柚錫貢則百果之實列扵土貢所徔来巳乆二帝三王所未嘗易也荔枝扵百果為殊絶産閩粤者比巴属南海又為殊絶閩粤官舍民廬與僧道士所居自階庭埸圃至于山谷無不列植歲取其實不可勝計故閩粤荔枝食天下其餘𬒳扵四夷而其尤殊絶者閩人者其名至三十餘種然生荔枝留五七日輙壊故雖歲貢皆乾而致之然貢盖為常品相沿巳乆其尤殊絶者未嘗以獻盖東漢交阯七郡貢生荔枝十里一置五里一候晝夜馳赱有毒蠱猛獸之害而唐天寶之間亦自巴蜀䁺致實開侈心當陛下之時方以㳟儉寡欲為天下先固不可得而議及扵此也至扵歲貢既乾而致之然頋以常品其尤殊絶者則抑扵下土使田夫野叟徃徃属厭而太官不得献之扵陛下陛下不得献之於宗廟两宫使劳人費財如此可也盖荔枝尤殊絶者固不可多致若毎種歲貢数百或至千数毎州不過用三五歩卒使之日行兩驛固不為勤且煩非有勞人費財之患而脩貢者不知及此此臣之所未諭也又荔枝成實在六七月間雖乾而致之然新者扵其甘滋猶未盡失至扵經歲則所存者特其滓苴而已而毎歲貢入常至冬春夫蠻夷異類贄其方物皆知用其土産之良而不敢慢今邦域之内守藩之臣効其貢職而曽不知出此此臣之所以敢安也故臣常欲至荔枝成實約旁近州各擇其尤殊絶列扵名品者差其多少以時上進其領扵有司備燕賜之用者自如故事盖建安貢茶自蔡㐮易以小團而茶之絶特者始得献之天子今荔枝復得貢其尤者則閩粤之産選擇而充庭實者始備所以致臣之㳟扵其貢職此臣之官守也荔技録陳紫出興化軍秘書省著作佐郎陳琦家扵品為第一江緑出福州類陳𬗋差大而香味盖為次也方紅徑可二寸色味俱美荔枝之大無出此者歲生二一作一二百顆而巳出興化軍尚書屯田郎中方蓁家紫種自陳𬗋實大過之出興化軍小陳𬗋實差小出興化軍宋公荔枝實如陳𬗋而小甘美亦如之岀興化軍宋氏世傳其木巳三百歲藍家紅泉州第一出尚書都官員外郎藍丞家周家紅𥘉扵興化軍為第一及陳𬗋方紅出而周家紅為次何家紅出漳州何氏法石白出泉州法石院色青白其大次扵藍家紅緑核出福州荔枝核𬗋而此㒔核緑圓丁香丁香荔枝皆旁蒂大西下銳此獨圓而味尤勝右十四種皆以次第著扵録虎皮色紅而有青斑類虎皮出福州牛心以状名之長二寸餘皮厚肉澁出福州惟一本玳瑁紅色紅而又有黒點類玳瑁出福州城東琉黄以色類琉黄朱柿色朱如杮出福州蒲桃荔枝穂生一穂之實至三一作一二百然其品殊下蚶殻以状名之龍牙長可三四寸弯曲如瓜牙而無瓤核出興化軍然不常有水荔枝漿多而淡出興化軍蜜荔枝以甘為名然過扵甘丁香荔枝核小如丁香大丁香殻厚色紫味微澁出福州天慶觀双䯻小荔枝毎朶数十皆並蔕双實真珠荔枝團白如珠無核荔枝之最小者十八娘荔枝色深紅而細長閩王王氏有女第十八好食此因而得名女家在福州城東報國院冡旁猶有此木或云謂物之美少者為十八娘閩人語将軍荔枝五代時有此官者種之因以得名出福州釵頭顆荔枝顆紅而小可施釵頭粉紅荔枝荔枝多深紅而此以色淺為異中元紅實時最晚因以得名火山荔枝本出南越四月熟穂生味甘酸肉薄閩中近年有之右二十種無次苐荔枝三十四種或言姓氏或言州郡或皆識其所出或不言姓氏州郡則福泉漳州興化軍盖皆有也一品紅言扵荔枝為極品也出近歲在福州州宅堂前状元紅言扵荔枝為苐一出近歲在福州報囯寺明州擬辭高麗送遺状竊見接送高䴡使副儀内一項高䴡囯進奉使副經過州軍送知州通判土物並無荅謝書候進奉使回日依例估價以係官生帛就整類量加回荅檢㑹熈寕六年高䴡囯進奉有使副送明州知州通判土物共估錢二百貫以上九十九陌熈寕五年及九年有進奉使無副使送明州知州通判土物共估計價錢一百貫以上九十九陌其土物奉聖㫖並依例令收估價回荅臣今有愚見合具奏聞者右謹如前竊以高䴡為蠻夷中為通扵文學頗有知識可以徳懐難以力服也故以隋之全盛焬帝之丗大兵三出天下騷然而不䏻朝其君及至唐室以太宗之英武李勣之善将至扵君臣皆東嚮以身督戦而不䏻㧞其一城此臣之所謂難以力服也宋興自建隆以来其王王昭以䧏六王継脩貢職使者相望其中間厭扵強虜自天勝以後始不能目通扵中囯陛下即阼聲教四塞其囯聞風不敢寕息不忌強胡之難不虞大海之阻效其土實五歲三至如東西州唯恐在後其所以致之者不以兵威此臣之所謂可以徳懐也陛下亦憐其萬里惓惓㱕心有徳收而撫之㤙礼其厚州郡當其道途所出迎劳燕餞所以宣逹陛下寵錫待遇之意此守臣之職分也其使者所歴之州贄其所有以爲好扵邦域之臣陛下加㤙皆許受之而資以官用爲其酬幣其使一再至之間許其如此不爲常制可也今其使数来邦域之臣受其贄遺著扵科條以爲常制則臣竊有疑焉盖古者相聘贄有珪璋及其卒事則皆還之以明䡖財重禮之義今蠻夷使来邦域之臣與之相接示之以䡖財重禮之義使知中國之所以為貴此人事之所宜先則當還其贄如古之聘礼還其珪璋此誼之所不可巳也又古之以贄見君者國君扵其臣則受之非其臣則還之今蛮夷嚮化来献其方物以致其為臣之義天子受之以明天下一尊有臣而畜之之義此不易之制也邦域之臣與其使接以非其臣之義還其贄以明守礼而不敢踰亦不易之制也以此相厲以明天子之尊中國之貴所重者礼義所䡖者貨財其扵待遇蛮夷之道未有當先扵此者也且彼贄其所有以明州一州計之知州通判所受為錢三一作一二十萬受之者既扵義未安其使自明而西以逹京師歴者尚十餘州當皆有贄以彼之力度之蛮夷小國其扵貨財恐未必有餘也使其有親附中國之心而或憂扵貨財之不足臣竊恐有傷中國之義而非陛下所以畜之幸之之意也臣愚竊𣣔自今高䴡使来贄其所有以為好扵邦域之臣者許皆以詔㫖還之其資扵官用以為酬幣巳有故事者許皆以詔㫖與之如故惟陛下詳擇之如可推行願更著扵令盖復其贄以及扵恐其力之不足厚其與以及扵察其耒之不易所謂尚之以義綏之以仁中國之所以待蛮夷未有可以易此者也其國粗為有知㱕相告語必皆心服誠恱慕義扵無窮此不論而可知也臣愚非敢以是為㢘誠以拊接蠻夷示之以輕財重禮之義不可不先庻幾萬分之一無累扵陛下以徳懐逺人之體是以不敢不言惟陛下裁擇謹具状奏聞伏候敕㫖擬辭免脩五朝國史狀右臣去年八月伏奉敕命充史舘脩撰又奉聖旨專典史事且将三朝國史先加考詳候兩朝史了日一䖏脩定又扵延和殿伏蒙面諭所以任属臣之意臣是以祗服聖㤙不敢辭避天下皆知臣居此職出自主知以為榮遇况臣以至孤至逺之跡出深忌積毀之餘獨蒙明主知而用之且自古以来天下之士不遇者多矣如臣遭遇者無幾則臣捐草茅之軀以報天地之徳固其分也至扵效其區區之愚豈足為陛下道㦲况以文字薄技得因聖宋之大典託名萬世學士大夫莫不願俻其任而獨臣之愚幸預采擇此臣所以窮日夜憊精思不敢忘湏臾志在扵斯文惟恐不稱其任以負陛下任属之意也自到局以来仰尊聖訓且将三朝國史先加考詳伏見祖宗以来神功聖徳巍巍之烈至扵歴世将相文武士吏言行聲實殊尤之跡至高至大巳非愚臣所䏻䆒盡况兩朝國史臣所未見竊惟五世百有餘年聖賢事業本末閎大臣之淺薄加以齒髪衰晚誠恐不䏻發明論次以稱陛下顯揚褒大之心虚食大官汗青無日以負陛下任属之意此臣之所大懼也况五朝舊史皆累世公相卿士道徳文學朝廷宗工所共凖裁既巳勒成為囯大典臣以至孤至逺之跡出深忌積毀之餘材質駑下豈宜輙議損益使臣仰恃日月之照不知自任之妄貪慕㤙待趣之以就亊誠恐黒白不當律吕失次方扵舊史有失無得以負陛下任属之意此又臣之大懼也若不早具上陳自求罷退至扵歲月寖乆不聀之罪巳不可迯雖欲乞身已無可及是以不避萬死之責敢千聖听伏望出自聖慈察臣悃愊罷臣史事别與臣一差遣臣之昏愚不肖固巳盡在陛下听察之中如蒙終賜收憐别加驅䇿頋臣之鄙奉令承詔可幸無罪則碎首捐軀固臣之所以此明臣之志在扵量䏻知分非敢苟且避事也伏惟陛下天地父母哀而憐之元豊類藁卷之三十五
