front:
  text: 元豊類藁卷之三十三
  hash: sha256:d5140124f45e538ef03c35e5cdaa411bd2394226efdec25bce730d284079cf2a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_033-1a}
body:
  text: 奏狀進奉熈寕四年明堂絹状祀而嚴配王國之上儀助者駿奔人臣之常奉前件物實之用篚旅以造庭阻就列以陪祠庻将心扵拱極載循僣冐伏積震惶進奉熈寕七年南郊銀絹状天休不宰故大報扵親郊上徳難名唯駿奔扵助祭兹為邦禮以合人情物輙用土毛敢叅庭實第從臣之嘉頌獨逺清光得萬囯之歡心庶将薄意干冐宸扆臣不任進奉熈寧七年同天莭銀絹状自天生徳與世為㱕属當載育之期敢薦無疆之祚前件物輙備土毛之末用叅篚貢之餘逺守蠻荆莫預造庭之㑹仰懐象魏但祈難老之詳進奉熈寕八年同天節銀絹状元命在躬方啓龍興之運鴻圖集祉爰開鳦降之祥前件物敢薦服官用叅庭實縁易供之薄献祝難老之殊祥㐮州乞宣洪二郡状右臣今任至今年九月成資巳蒙差太常少卿孫頎替臣成資闕今臣去替秪有数月竊念臣為有私便𣣔乞就移洪州或宣州一任情願守待逺闕謹具状奏聞伏候敕㫖奏乞回避吕升卿右臣伏奉敕命就差權知洪州軍州事充江南西路兵馬都鈐轄巳發来赴任次今覩吕升卿授江西轉運副使伏縁臣先任齊州得替後吕升卿為京東路察訪扵齊州多端非理求臣過失頼臣無可捃拾兼臣弟布與吕恵卿又有嫌隙二事皆中外共知今升卿任江西監司洪州在其統属湏至陳乞回避伏乞指揮檢㑹臣先奏乞移洪州或宣州或東南一般州郡臣為母親見在饒州迤邐前去饒州伺候朝㫖奏乞與潘興嗣子推㤙状右臣伏覩本州人試将作監主簿潘興嗣五歲以父任得官二十二歲授江州徳化縣尉不行熈寕二年朝廷察其高以為日州軍事推官不就今年五十六嵗安扵静退三十餘年臣竊以康㝎中徐復以䖏士收用辤不就得官其一子近王回孫侔皆以幽潜見録命下而回已死亦得官其一子李覯以國子直講退㱕死十年亦得祿其後則國家之扵激奨㢘退既肆其所守又㤙及其世盖有故事今與王回同時見録之人有孫侔而後又有興嗣䖏幽不改其操皆巳白首然未有為上聞者故其子獨未蒙㤙竊以康㝎至今㡬四十年士之抗志扵隠約而為朝廷所知者止此数人盖枯槁沉溺其守至難故其人至少為國家者取而顯之使天下皆知士之特立無求扵世者不為上之所遺則自重者孰不勉浮競者孰不悔可謂施約而勸博寵録之所以勵世其實在此臣故敢以聞伏惟陛下幸察侔及興嗣躬難進之莭遭遇聖時用王回徐復李覯為比加㤙其子使斯人不卒窮扵閭巷足以明示天下興嗣有子群年二十六嵗孫侔令家真州謹状奏聞伏候敕㫖奏乞復呉中復差遣状右臣復見提點本州玉隆觀龍圖閣直學士給事中吳中復年六十六嵗精力未衰志意甚壮歴事累朝嘗任諌官御史以直道正言能稱其職又任邦伯理兵治民皆有可紀孔子曰如有所譽者其有所試矣如中復之林有巳試之效可謂明白方今中外任使嘗患乏人如中復者豈可遂其閑逸𣣔乞召至左右使典司献納或委以藩鎮使剸治煩劇又能上副憂勤不負寄任况中復年未當退又無疾病䖏之散地衆謂非宜伏望早賜收用以稱朝廷尚賢求舊之意臣忝任州長不敢不言謹具狀奏聞伏候敕旨辤直龍圖閣知福州狀右臣凖洪州送到敕牒一道授臣直龍圖閣就差權知福州交割本職公事以次官員發赴本任者孤逺之臣幸蒙收擢聖恩深厚誼豈敢辤伏念臣老母年高近歲多病臣弟布巳移知廣州見赴本任臣若更適閩越則兄弟並就逺官犬馬之志不勝徬徨伏望聖慈矜憫特寝新命與臣一便地差遣所有敕牒臣未敢祗受巳牒洪州寄軍資庫收𬋩臣巳交割本聀公事與以次官員不敢扵舊任䖏乆住見迤邐前来听候指揮謹具状奏聞伏候敕旨福州舉知泉州陳樞乆不磨勘特與轉官状右臣體訪得轄下知泉州尚書屯田貟外郎陳樞不下磨勘文字巳十五年中間曽遇覃恩改官其扵綿歴嵗月積累勞能則考課常法盖未及之列於郎曺為日巳乆方當朝廷崇尚㢘素誡抑浮競之時樞獨安扵冲静所守如此况樞操履純篤出自天資治行循良見扵衆論自歴州縣及任淮南提點刑獄與今来再任泉州所至風績皆可稱記伏乞特降指揮下審官東院檢㑹樞合該磨勘月日采其乆不自陳特與優轉名曺以奨恬退臣忝備寄任不敢不言謹具状奏聞伏候勑㫖福州奏乞在京主判閑慢曺局或近京一便郡状右臣輙露悃愊仰干旈扆臣母老多病見居京師臣任福州臣弟布任廣州相去皆数千里臣犬馬之志實不遑寕臣昨移福州之日曽乞哀憐改授近地㝷奉聖㫖不允不敢再請臣既到任属所部之内㓂孽遺類徃徃尚聚山谷居人未寜逺近疑駭而州之属邑又有出扵早饑之後臣扵此時正當竭其駑鈍復不敢以私計自陳自去冬及今春以来上賴朝廷威徳蟻聚餘㓂悉又殄除田疇之間連獲登稔今山海清謐千里宴然里閭相安粟米豊羡臣扵所部乃無一事可以自効况臣到任今年八月巳及一年逺去庭闈爲日巳乆晨昏之恋誼難苟止則臣可以乞恩實在今日伏見朝廷至仁比来群臣之中有𣣔便扵飬親者並蒙聴許况臣母子各巳白頭兄弟二人皆任逺地今臣扵官守又無可以驅馳之事伏望聖慈憫惻以臣老母見在京師與臣一在京主判間慢曺局差遣或就移近京一便郡庶便親飬臣雖糜殞曷報聖㤙臣不任惶懼戦汗激切屏营之至移明州乞至京迎侍赴任状右臣昨以老母在京而臣知福州臣弟布知廣州相去各数千里幸臣所部之内盗賊殄除年糓豊稔臣扵守官既無驅馳之事而臣到任巳及一年逺去􅒉闈為日巳乆奏乞聖慈哀憐以臣老母見在京師與臣一在京主判閑慢曺局差遣或移臣近京一便郡庶便親飬㝷准中書劄子巳降敕命差臣權判太常寺兼禮儀事奉聖旨仰臣交割聀分公事訖發来赴闕臣遂起離前来至洪州覩進奏院報巳差臣知明州伏念臣巳奔馳在路屈指計日望至親側竊計臣老母之心聞臣而来倚門之望固巳深切今母子垂欲相見而臣忽他改差遣晨昏之戀既未得伸迫急之誠惟知涕泗且臣母子各巳白首臣母近嵗多病臣弟布又知桂州私門之内長子二人皆違左右而臣扵兄弟之内又㝡居長犬馬之志豈敢苟安况今所得明州足可迎侍臣不敢别有陳乞𣣔望出自聖㤙特賜矜憫許臣徑馬暫至京師迎侍老母赴任不敢别有佳滯伏惟天地之徳哀而憐之臣欲候授敕後陳此懇誠臣見在道路恐慮敕命附逓前来或致遅延湏至便具奏請所貴早得指揮不致别有留滯臣見水路前去所有朝㫖乞降至真州以来付臣謹具状奏聞伏候敕㫖明州奏乞回避朱明之状伏為本路提點刑獄朱明之是臣母之親堂弟牒明州檢到敕條竊慮合該回避湏至奏聞者右謹具如前乞賜檢㑹如合該回避𣣔望聖慈念臣在外十有一年巳更六任幸遇非常之主聀與内朝而自陛下即祚以来未得一親玉色人臣爱君惓惓希慕之心未能自棄為日巳乆兼臣昨任福州巳係逺地迎侍不得即今老母多病見在京師人子之義晨昏之恋固難苟止二者於臣之心實為迫切如臣合當避親臣不敢陳乞在京差遣只乞對移陳蔡一郡許臣暫至京師迎侍老母赴任使臣仰得就日月之光俯得伸犬馬之飬臣至孤至逺之迹抱此㣲誠如不自言誰當為臣言者伏惟陛下天地父母哀而憐之出自聖慈特賜矜許臣不任子區區激切之情謹具状奏聞伏候敕㫖進奉元豊元年同天莭功徳䟽状彌月開祥本周家之極盛千秌紀莭繇唐室之寖昌矧属熈朝寔標華旦是敢䖏遵象教恭啓法筵傾率土之歡心祝後天之遐筭庶偕動植永頼生成進奉元豊元年同天莭銀状鳦鳥之詩本啇入之所自出生民之什原周室之所繇興矧属休辰寔開令莭生成之造雖難稱於大㤙爱戴之心庶可将扵薄物用祝乾坤之乆永為夷夏之依進奉元豊二年同天莭銀絹状人神祐助是開彌月之祥夷夏歸依方祝後天之筭前件物旅於庭實出自土毛仰晞北極之尊用将㣲意願固南山之壽永庇群生移知亳州乞至京迎侍赴任状右臣五月三十日伏奉敕命就差知亳州旣近輦轂又便庭闈仰荷天㤙俯從人欲非臣淺薄所能報稱伏念臣前奏中具陳在外十有一年巳更六任幸遇非常之主職與内朝而自陛下即祚以来未得一親玉色人臣爱君惓惓希慕之心未能自棄為日巳乆兼臣昨任福州巳係逺地迎侍不得即今老母多病見在京師人子之誼晨昏之恋固難苟止二者扵臣之分實為迫切如臣合當避親臣不敢陳乞在京差遣只乞對移陳蔡一郡許臣暫至京師迎侍老母赴任使臣仰得日月之光俯得伸犬馬之飬今臣幸蒙㤙詔移守亳州如臣所請况亳州去京不逺𣣔乞許臣暫至京師迎侍老母赴任臣見巳交割訖發離前来所有回降朝㫖乞隆至泗州付臣謹具狀奏聞候敕㫖元豊類藁卷之三十三
