front:
  text: 元豐類藁卷之三十三
  hash: sha256:efb0f610f73e03837f5ba64c3dfdc2e31f15087cd1dae77f5a3b83e970f9ddaa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_033-1a}
body:
  text: 奏狀進奉熙寧四年明堂絹狀祀而嚴配王國之上儀助者駿奔人臣之常奉前件物實之用篚旅以造庭阻就列以陪祠庶將心于拱極載循僣冒伏積震惶進奉熙寧七年南郊銀絹狀天休不宰故大報于親郊上德難名唯駿奔于助祭兹為邦禮以合人情物輒用土毛敢參庭實第從臣之嘉頌獨逺清光得萬國之歡心庶將薄意干冒宸扆臣不任進奉熙寧七年同天莭銀絹狀自天生德與世為歸屬當載育之期敢薦無疆之祚前件物輒備土毛之末用參篚貢之餘逺守蠻荆莫預造庭之會仰懷象魏但祈難老之詳進奉熙寧八年同天節銀絹狀元命在躬方啓龍興之運鴻圖集祉爰開鳦降之祥前件物敢薦服官用參庭實緣易供之薄獻祝難老之殊祥襄州乞宣洪二郡狀右臣今任至今年九月成資巳蒙差太常少卿孫頎替臣成資闕今臣去替秪有數月竊念臣為有私便𣣔乞就移洪州或宣州一任情願守待逺闕謹具狀奏聞伏候敕旨奏乞回避吕升卿右臣伏奉敕命就差權知洪州軍州事充江南西路兵馬都鈐轄巳發來赴任次今覩吕升卿授江西轉運副使伏緣臣先任齊州得替後吕升卿為京東路察訪于齊州多端非理求臣過失賴臣無可捃拾兼臣弟布與吕惠卿又有嫌隙二事皆中外共知今升卿任江西監司洪州在其統屬須至陳乞回避伏乞指揮檢會臣先奏乞移洪州或宣州或東南一般州郡臣為母親見在饒州迤邐前去饒州伺候朝旨奏乞與潘興嗣子推恩狀右臣伏覩本州人試將作監主簿潘興嗣五歲以父任得官二十二歲授江州德化縣尉不行熙寧二年朝廷察其高以為日州軍事推官不就今年五十六嵗安于靜退三十餘年臣竊以康㝎中徐復以處士收用辭不就得官其一子近王回孫侔皆以幽潛見録命下而回已死亦得官其一子李覯以國子直講退歸死十年亦得祿其後則國家之于激奬廉退既肆其所守又恩及其世蓋有故事今與王回同時見録之人有孫侔而後又有興嗣處幽不改其操皆巳白首然未有為上聞者故其子獨未蒙恩竊以康㝎至今幾四十年士之抗志于隱約而為朝廷所知者止此數人蓋枯稿沉溺其守至難故其人至少為國家者取而顯之使天下皆知士之特立無求于世者不為上之所遺則自重者孰不勉浮競者孰不悔可謂施約而勸博寵録之所以勵世其實在此臣故敢以聞伏惟陛下幸察侔及興嗣躬難進之莭遭遇聖時用王回徐復李覯為比加恩其子使斯人不卒窮于閭巷足以明示天下興嗣有子群年二十六嵗孫侔令家真州謹狀奏聞伏候敕旨奏乞復吳中復差遣狀右臣復見提點本州玉隆觀龍圖閣直學士給事中吳中復年六十六嵗精力未衰志意甚壯歷事纍朝嘗任諌官御史以直道正言能稱其職又任邦伯理兵治民皆有可紀孔子曰如有所譽者其有所試矣如中復之林有巳試之效可謂明白方今中外任使嘗患乏人如中復者豈可遂其間逸𣣔乞召至左右使典司獻納或委以藩鎮使剸治煩劇又能上副憂勤不負寄任况中復年未當退又無疾病處之散地衆謂非宜伏望早賜收用以稱朝廷尚賢求舊之意臣忝任州長不敢不言謹具狀奏聞伏候敕旨辭直龍圖閣知福州狀右臣凖洪州送到敕牒一道授臣直龍圖閣就差權知福州交割本職公事以次官員發赴本任者孤逺之臣幸蒙收擢聖恩深厚誼豈敢辭伏念臣老母年高近歲多病臣弟布巳移知廣州見赴本任臣若更適閩越則兄弟並就逺官犬馬之志不勝倣徨伏望聖慈矜憫特寢新命與臣一便地差遣所有敕牒臣未敢祗受巳牒洪州寄軍資庫收𬋩臣巳交割本聀公事與以次官員不敢于舊任處久住見迤邐前來聽候指揮謹具狀奏聞伏候敕旨福州舉知泉州陳樞久不磨勘特與轉官狀右臣體訪得轄下知泉州尚書屯田貟外郎陳樞不下磨勘文字巳十五年中間曽遇覃恩改官其于綿歷嵗月積纍勞能則考課常法蓋未及之列於郎曺為日巳久方當朝廷崇尚廉素誡抑浮競之時樞獨安于沖靜所守如此况樞操履純篤出自天資治行循良見于衆論自歷州縣及任淮南提點刑獄與今來再任泉州所至風績皆可稱記伏乞特降指揮下審官東院檢會樞合該磨勘月日采其久不自陳特與優轉名曺以奬恬退臣忝備寄任不敢不言謹具狀奏聞伏候勑旨福州奏乞在京主判間慢曺局或近京一便郡狀右臣輒露悃愊仰干旒扆臣母老多病見居京師臣任福州臣弟布任廣州相去皆數千里臣犬馬之志實不遑寧臣昨移福州之日曽乞哀憐改授近地尋奉聖旨不允不敢再請臣既到任屬所部之內寇孽遺類往往尚聚山谷居人未寧逺近疑駭而州之屬邑又有出于早飢之後臣于此時正當竭其駑鈍復不敢以私計自陳自去冬及今春以來上賴朝廷威德蟻聚餘寇悉又殄除田疇之間連獲登稔今山海清謐千里宴然里閭相安粟米豐羡臣于所部乃無一事可以自效况臣到任今年八月巳及一年逺去庭闈為日巳久晨昏之戀誼難苟止則臣可以乞恩實在今日伏見朝廷至仁比來群臣之中有𣣔便于飬親者並蒙聽許况臣母子各巳白頭兄弟二人皆任逺地今臣于官守又無可以驅馳之事伏望聖慈憫惻以臣老母見在京師與臣一在京主判間慢曺局差遣或就移近京一便郡庶便親飬臣雖糜殞曷報聖恩臣不任惶懼戰汗激切屏營之至移明州乞至京迎侍赴任狀右臣昨以老母在京而臣知福州臣弟布知廣州相去各數千里幸臣所部之內盜賊殄除年穀豐稔臣于守官既無驅馳之事而臣到任巳及一年逺去􅒉闈為日巳久奏乞聖慈哀憐以臣老母見在京師與臣一在京主判間慢曺局差遣或移臣近京一便郡庶便親飬尋準中書劄子巳降敕命差臣權判太常寺兼禮儀事奉聖旨仰臣交割聀分公事訖發來赴闕臣遂起離前來至洪州覩進奏院報巳差臣知明州伏念臣巳奔馳在路屈指計日望至親側竊計臣老母之心聞臣而來倚門之望固巳深切今母子垂欲相見而臣忽他改差遣晨昏之戀既未得伸迫急之誠惟知涕泗且臣母子各巳白首臣母近嵗多病臣弟布又知桂州私門之內長子二人皆違左右而臣于兄弟之內又最居長犬馬之志豈敢苟安况今所得明州足可迎侍臣不敢别有陳乞𣣔望出自聖恩特賜矜憫許臣徑馬暫至京師迎侍老母赴任不敢别有佳滯伏惟天地之德哀而憐之臣欲候授敕後陳此懇誠臣見在道路恐慮敕命附遞前來或致遲延須至便具奏請所貴早得指揮不致别有留滯臣見水路前去所有朝旨乞降至真州以來付臣謹具狀奏聞伏候敕旨明州奏乞回避朱明之狀伏為本路提點刑獄朱明之是臣母之親堂弟牒明州檢到敕條竊慮合該回避須至奏聞者右謹具如前乞賜檢會如合該回避𣣔望聖慈念臣在外十有一年巳更六任幸遇非常之主聀與內朝而自陛下即祚以來未得一親玉色人臣愛君惓惓希慕之心未能自棄為日巳久兼臣昨任福州巳係逺地迎侍不得即今老母多病見在京師人子之義晨昏之戀固難苟止二者於臣之心實為迫切如臣合當避親臣不敢陳乞在京差遣只乞對移陳蔡一郡許臣暫至京師迎侍老母赴任使臣仰得就日月之光俯得伸犬馬之飬臣至孤至逺之迹抱此微誠如不自言誰當為臣言者伏惟陛下天地父母哀而憐之出自聖慈特賜矜許臣不任子區區激切之情謹具狀奏聞伏候敕旨進奉元豐元年同天莭功德疏狀彌月開祥本周家之極盛千秋紀莭繇唐室之寖昌矧屬熙朝實標華旦是敢處遵象教恭啓法筵傾率土之歡心祝後天之遐算庶偕動植永賴生成進奉元豐元年同天莭銀狀鳦鳥之詩本啇入之所自出生民之什原周室之所繇興矧屬休辰實開令莭生成之造雖難稱於大恩愛戴之心庶可將于薄物用祝乾坤之久永為夷夏之依進奉元豐二年同天莭銀絹狀人神祐助是開彌月之祥夷夏歸依方祝後天之算前件物旅於庭實出自土毛仰晞北極之尊用將微意願固南山之壽永庇群生移知亳州乞至京迎侍赴任狀右臣五月三十日伏奉敕命就差知亳州既近輦轂又便庭闈仰荷天恩俯從人欲非臣淺薄所能報稱伏念臣前奏中具陳在外十有一年巳更六任幸遇非常之主職與內朝而自陛下即祚以來未得一親玉色人臣愛君惓惓希慕之心未能自棄為日巳久兼臣昨任福州巳係逺地迎侍不得即今老母多病見在京師人子之誼晨昏之戀固難苟止二者于臣之分實為迫切如臣合當避親臣不敢陳乞在京差遣只乞對移陳蔡一郡許臣暫至京師迎侍老母赴任使臣仰得日月之光俯得伸犬馬之飬今臣幸蒙恩詔移守亳州如臣所請况亳州去京不逺𣣔乞許臣暫至京師迎侍老母赴任臣見巳交割訖發離前來所有回降朝旨乞隆至泗州付臣謹具狀奏聞候敕旨元豐類藁卷之三十三
