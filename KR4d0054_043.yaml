front:
  text: 南豐先生元豊類藁卷之四十三
  hash: sha256:20a9fb35878ee2a471e0a51161681e223a87982b79415df528be41209ee92d95
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_043-1a}
body:
  text: 誌銘都官貟外郎胥君墓誌銘君姓胥氏諱元衡字平叔長沙人皇考諱某王考諱某考諱某王考贈尚書工部郎中考為翰林學士尚書工部郎中贈尚書吏部侍郎君少以䕃為将作監主簿六遷為殿中丞賜緋魚袋鎻㕔應進士舉得出身又三為尚書都官貟外郎歴監在京染院内衣庫皮角庫簽書河南府判官公事通判湖州又通判海州治平三年四月壬寅以疾卒於泗州其年八月庚寅葬於許州陽翟縣三封原翰林君之塋𥘉娶李氏太子少傅若谷之女再娶韓氏封成安縣君尚書刑部貟外郎知制誥綜之女子男二人曰茂諶太廟室長次尚㓜女二人長早夭君少孤能自奮厲力學問工為文章又謹畏㢘㓗慕善而不自放居官雖小法未嘗不愼而不為察察扵人有所䏻容其大意如此故所至士大夫爱其脩而百姓歸其恕其在染院二庫雖尚少巳有䏻名及為通判判官而䏻益顯盖所試者大将豈可勝数哉始大臣薦其文章宜在舘閣近臣又薦其脩㓗冝任御史朝庭方嚮用之以為江西轉運判官命始下而君盖已死矣死時年三十有九聞其䘮者識與不識皆哀之盖天聖之間翰林君方䖏顯好收奨天下之士而名䏻知人士之出於其時有盛名於天下者多翰林君發之及其後君既壮大所與逰士大夫亦皆一時之雋然自天聖至于今纔四十年翰林君之門下士多至大官富貴尊寵君所與遊士大夫亦多重於時而翰林君弃賔客巳乆君又蚤世獨翰林君之夫人建康郡太君田氏年七十與君之孥覊旅於閭巷君之䘮合衆人之賻乃克葬其盛衰之際如此固所謂命者非耶君之葬祕閣校理裴煜以茂諶之䟽来請銘予與君皆嘉祐二年進士故不得辭銘曰維艱而勩以敏其継維平而畏以篤其義考以無遺在人有賜我志之良孰曰非遂我材之尤孰曰非試不申其期不擴其施有命則然其又何悲尚告後世知者之辭劉伯聲草誌銘慶暦之間余家撫州州椽張文叔與其内弟劉伯聲從予遊余與伯聲皆罕與人接得顓意以學問磨礲浸灌爲事居三年廼别後数年余以貧而仕見伯聲於京師年益壮學日以益又数年余校書史舘伯聲数過余飲酒談笑道舊故相樂也伯聲未老然以疾故亦衰矣旣而余去京師而東更七州至于亳伯聲子之羙来告曰伯聲死八年矣将死時命之羙屬余銘其言曰葬而不得余銘如不葬也余惟伯聲始從余逰至今三十年見其少壮至於有疾而衰與之故最乆於其死而托銘於余故不得而辞也伯聲諱震為人質厚沉深寡言笑恂恂蹈規矩與人逰見其一善若恐不能及見其一失若恐不能㧞其䔍於誼如此讀書有大志慨然𣣔有為者也少孤能自立尤貪然营䟽属之葬孤姪之嫁娶忘其力之不足也数以進士薦於郷卒不合㫛乃得試将作監主薄曽大父澤左𥙷闕贈吏部尚書太父居仁單州單父縣主簿考絃濟州司理參軍其先清河人自吏部葬開封府之東明今為東明人伯聲卒於熈寕五年二月戊戌年五十有三葬於東明之陽山郷白駒里以元豊三年十一月某甲子妻賈氏尚書比部貟外郎式之女子四人之羙之純之竒之邵二女嫁倪良器李日新張文叔名彦博余為之叙其文者也銘曰敏於求巳尚行寡言䔍於求古廣見多聞有就卑之而施則屯維舊則信以諗後人尚書北部貟外郎李君墓誌銘康定𥘉先人寓南康與李君居並舎是時君年未四十㳺余父子間相好也後十餘歲君為臨安遇余於浙西道舊故喜甚又十餘歲君巳退而家居復見之山陽又九歲而君年七十有一以卒明年其孤仲熊自山陽抵京師拜且泣曰願得銘也余惟君㳺余父子間四十年矣銘其可辭君姓李氏諱丕字子京𥘉名真卿曽大父諱某大父諱某考諱某贈光禄卿母丁氏仙源縣太君継母王氏仁壽縣太君海州朐山人家故寒也學爲士自君始出舉進士中其科得主楚之淮隂簿歲凶轉運使調軍食用君主宿州糴他州皆強賦民猶不足君随便開誘糶者恱趍糴最他州去爲䖍州司法參軍䏻随用見聲出衆上薦者十四人不用遷寜國軍節度掌書記轉運使属君市翎毛優致如主糴所市以赤数之至十萬復最他州又属君主作院君考校程度所作兵噐総一萬一千三百二十有四皆精且利他軍州事有不能决者多属君君所决者三十有八事盖復太平州囚𬋩壽活之明通判歙州林瑀無罪釋之類如此於是䏻益白薦者三十人遷祕書着作佐郎用薦者監興元府稅急吏寛商課嬴十有七萬歲中以歲次遷祕書丞以課遷太常博士以覃㤙遷尚書屯田貟外郎知杭州臨安縣召為審刑院詳議官賜緋衣銀魚遷尚書郎官貟外郎通判蜀州蜀少事然他州訟有積歲不能决者轉運使以属君君所决八事民信服之遷尚書職方貟外郎監在京内衣庫樞宻使田况奏用君刪定馬軍司條貫既成詺加賞賚濵州有獄乆不䏻决辞連大臣冡子遣吏治之輙辞詺遣君乃决累遷尚書􅕄方郎中以母老出通判杭州坐法免復為尚書比部郎中監沂州承縣塩酒稅未逾月自罷歸又監陜州集津垜塩務不行以本官致仕元豊三年九月巳夘以疾卒山陽之私第十一月甲寅葬安樂郡之揚興里君娶葛氏仙居縣君再娶喬氏夀安縣君子男七人曰仲熊衞州軍事推官曰仲謨以進士再試禮部曰仲将曰仲傑曰仲倩曰仲昌皆未仕也女六人嫁吴好禮于銳皆奉議郎馬察于鏜皆進士餘㓜也君既自奮拔立其家盖仕四方惟蜀去其親其事兄撫孤弟姓皆盡㤙意其為吏不獨䏻自仕其官盖他吏之不能任其事者或属君兼任之辨其𥙿也不幸一跌世無力桭逹之者故以坎壈終銘曰海區氏李有啓厥世富辭與䏻自約而侈曰父與子郎官卿士曰妻及母翟衣象揥謂势方利孰轠以毀施不盡有故也則喟尚佑爾裔以追厥始司封貟外郎蔡公墓誌銘公諱充字公度天聖二年進士及第為邵武軍之邵武尉又為應天府之下邑尉丁母夫人河間縣太君周氏憂服除為越州司理參軍天平軍節度掌書記遷祕書省著作佐郎知洪州奉新縣祕書丞知遂州小溪縣改通判戎州累遷太常慱士尚書屯田度攴司封貟外郎歴監在京都進奏院群牧判官知綘州又為提點􅍮湖北路刑獄公事至和三年七月二十三日以疾卒於澧州之官舎享年七十有一嘉祐二年十一月十三日葬于建昌軍南城縣太平鄉之西原公為人好自㓗清平居衣冠容貌肅然及其臨事以沉黙慎静為主故自起家至於其終凢三十餘年歴内外官任事無纎芥之失其與人逰始若淡然無足動其意者及其乆人人皆退自喜謂公真長者也其為尉參軍掌書記人始以㢘節知公及為奉新小溪絳州其政又以平恕不優聞至其在群牧􅍮湖数更宜諸事人皆服其䏻其扵越州属将佐交惡府中多向背公獨挺立無所與後将又以貪坐法官属多不能自全事亦卒無汙公者扵戎州属瀘州叛㳙井監轉運使用公調兵食禦之兵遂以濟於絳州州歲市羊数萬供京師公奏减之至今頼其法扵􅍮湖既周知官属善惡於善人多薦籍成就之而扵悪人無所貸其法公既䏻自将顯其材故薦公者尤多盖王沂公曽王鄧公詒永與今冨丞相粥之居鄆也皆薦之而鄧公之為樞宻使兼群牧制置使也又奏公為判官其為當丗之大臣所知如此𥘉公年十三䘮父家貪尤自克苦飬其母及仕未甞廣田宅䘮歸借屋以居曽祖諱㳟祖諱道隆父諱旦以公㤙贈尚書屯田貟外郎丗家南城故為南城人娶鄭氏累封宋城縣君子八人曰冠卿祕書省著作佐郎曰端卿鄭州原武尉曰文卿曰徽卿曰宋卿曰喬卿曰子卿曰孺卿公殁詔官其一子盖公不獨能以其有施於身又䏻力以其餘教扵家故公之殁也冠卿以材尤知名端卿而下皆謹嚴䏻丗其家者也女二人嫁邵武尉陳渉進士陳之邵冠卿䓁将葬公以銘属公故人子曽鞏銘曰司封抱能屈𥘉齡秉旄懐􅌧晚始亨沙墟莾崖肆經营馬羊茁肥獄訟平凛然氣志㓗以清自㣲託隆用兢兢風流餘徽𬒳家庭子多以才後方興贈職方貟外郎蘇君墓誌銘熈寕元年春余之同年友趙郡蘇軾自蜀以書至京師謂余曰軾之大父行甚髙而不為世用故不䏻自見於天下然古之人亦不必皆䏻自見而卒有傳於後者以丗有發明之者耳故軾之先人甞䟽其事盖将属銘於子而不幸不得就其志軾何敢廢焉子其為我銘之余為之記其說曰君諱序字仲先眉州眉山人其先盖趙郡栾城人也曽太父釿大父祐父杲三丗皆不仕而行義聞於郷里祐生扵唐季而卒於周顯徳之間甞以事至成都遇道士異之屏人謂曰吾術䏻変化百物将以授子祐辭不願道士笑曰是果有以過人矣而杲始以好施顯名君讀書務知大義為詩務逹其志而巳詩多至千餘篇為人踈逹自信持之以謙輕財好施急之人病孜孜若不及歲凶賣田以賑其隣里郷黨至孰人将償之君辭不受以是至数破其業厄於飢寒然未甞以為悔而好施益甚遇人無踈宻一與之傾盡無疑礙或欺而侮之君亦不変人莫測其意也李順叛攻眉州君居圍中守禦㑹其父病沒君治䘮執禮盡哀退慰安其毋皆不失所冝慶暦𥘉詔州縣立斈取士争欲執亊斈中君獨戒其子孫退避人皆服其行蜀自五代之亂斈者哀少又安其郷里皆不願出仕君獨教其子渙受斈所以成就之者甚俻至渙以進士起家蜀人榮之意始大変皆喜受斈及其後眉之斈者至千餘人盖自蘇氏始而君之季子洵壮猶不知書君亦不強之謂人曰是非憂其不斈者也旣而洵果奮發力斈與其子軾轍皆以文斈名天下為斈者所宗盖雖不用於世而見於家稱於郷里者如此是不可以無傳也已君始以子㤙為大理評事後累贈尚書職方貟外郎享年七十有五慶暦五年五月十一日終於家八年二月某日葬扵眉山縣脩文郷安道里先瑩之則夫人史氏蓬莱縣大君二子曰渙尚書都官郎中提點利州路刑獄公事有䏻名曰洵覇州文安縣主簿編纂太常禮書贈光禄寺丞孫七人位佾不欺不疑不危軾轍軾殿中丞直史舘轍啇州軍事推官銘曰蘇氏徂西值蜀崩分三世高逝以篤吾仁君始不覊勞躬以卑孝于父母施及窮釐維見之卓教其子孫終化郷邦斈者詵詵維子若孫同時三人擅名文章震動四方廼本厥𥘉考祖之自刻詩墓石以卑厥裔庫部貟外郎知臨江軍范君墓誌詺嘉祐五年六月辛巳尚庫部貟外郎知臨江軍事范君卒于位年五十有三其年十月􅉝酉葬于江州徳化縣之仁貴郷萬家山前葬其孤属君之故人李中考次君之官氏邑里與其功行之實為状授使者使告於鞏曰先君葬旣得日月冝有銘孤安期也敢請鞏曰君之行宜有述乃為之誌其墓而銘之其叙曰惟范氏傳叙受姓自劉累以来其後居江州者出於晉豫章太守寗之後君諱端字思道江州徳化人也祖祕書省著作佐郎贈太常少卿諱成象父尚書都官貟外郎贈光禄卿諱應辰君始以父任為太廟齋郎累轉至尚書庫部貟外郎歴徳化尉江寕主簿江都令知南昌飛鳥彭山三縣通判通州徙泰州又為匈當開治畿内溝泣提㪯陜西河北路便糴糧草至知臨江軍事而飛鳥以乞飬太夫人得監江寕府塩稅彭山用薦者得監雲安軍塩井二縣皆不至君聚書萬餘卷強力篤斈為人恭遜質儉䏻自脩飾門内之治肅如也及施於為政以謹法䏻持㢘名於世而世之䏻觀其内者亦少也始為江都㑹歲旱張若谷為楊州遣吏数人與君皆出視民田他吏還者白歲善君還獨白田實旱若谷𥘉不是之也君持旱苗力争乃卒是君所白吴遵路蒋堂為淮南轉運使使君護河役君徃視之還言河不可為遂罷君用他吏護役而河果不可為三人者其𥘉皆怒已乃感寤共薦之而當是之時天下之主財利者方務於急聚歛治民者以立聲威為賢交四方之賔客者又徃徃嚮意於卑辞貌煩饗燕贈送之禮以其故䏻傾士大夫以千天下之譽君乃獨推息民教化之意以簡易自守故為雲安主塩利而議蠲塩課以数萬為臨江以興學教人為先而厨傳賔客之奉十去其七八四方之徃来者或出語訕君君不為之動也其正行直道如此太夫人李氏賛皇縣太君父尚書工部侍郎虚已元配氏父龍圖閣直斈士向次配周氏清河縣君父尚書司封貟外郎陵子男六人安期安仁安之安世安夀安禮女五人長適和州司戸參軍鄭夷中次適都曷主簿周詠次適郊社齋郎周佺期餘尚㓜孫男六人萃叟岩叟渭叟商叟䝉叟真叟太夫人之䘮君哀感疾四年乃䏻起凢君之所既立可謂有士君子之行非耶自不遵先王飬士用人之法而士在閭巷之間者用力扵空文居朝廷者馳騁扵虚名以譁世取寵士之䏻脩其内㓗身累行者非自好之莫䏻至而世亦罕䏻知之也故君之事予喜為之見於文使後之君子得覧焉君扵文章尤長於詩有集三卷蔵於家其銘曰君性温温好退特卑及其臨事擇義而為一世之棄君獨從之一世之慕君獨違之行已有常在官無疪曷以知之眎此銘詩張乆中墓誌銘君姓張氏名持字乆中𥘉名伯虎慶暦三年耒自曲江入太學當是時天子方詔學官歲献士二人學者以数百千人獨献君㑹學散不報於是時予盖未甞識君也後二年過予之所居臨川始識之君為人深沉有太度喜氣莭重交㳺一時所與之逰者甚衆而君所尤稱者廣漢張賁以為年少可進以學者莆陽陳惇盖君之學多賁發之而扵惇以師友自處也凢君之與人交喜窮盡其得失其義足以正之而其直未嘗苟止也至其與衆人接尤温以莊不妄與之言與之言必随其材智所到不病以其所不為故君之友皆惮其嚴而喜其相與之盡衆人之得君逰者亦皆喜爱而未嘗有失其意者其語曰士生扵今势不足以持卋而逰扵其間當如此也扵臨川出其文章因學予言古令治亂是非之理至扵為心持身得失之際扵其義余不能損益也後二年死扵興國軍某月某日也明年其弟来江南以力之不能将獨負君之骨以歸是時陳惇方以進士得出身約君之弟曰吾忍不全㱕吾友耶明年吾得𥙷為吏力䏻以君之㱕其弟乃止君年若干祖某考某君㓜孤養扵兄嫂嘗曰嫂之扵吾猶母也婦䏻以姑之礼事吾嫂者可以為吾婦矣然卒亦無也君固難交然不易其好而陳惇者與君交尤深也予嘗眎惇與君之相從憂窮齟齬無不共之其中心豈有利然也丗之交友道廢乆矣其有之或非此也然則君之事其有取扵卋教非邪惇以某年某月某日㱕君之葬地而属予銘其辭曰嗚呼乆中不如其志孔孟巳然何獨扵子生而不大夫固為之其長在人扵此觀之祕書丞知成都府雙流縣事周君墓誌銘君姓周氏諱旻字夢臣衢州江山人也曽祖漢規祖徳厚父幹君以進士及第歴南劒之将樂建昌軍之南城主簿監䖍州雩都銀埸又為泰州司户參軍用薦者為祕書省著作佐郎知宣州南陵縣事迁祕書丞知成都府雙流縣事嘉祐六年正月某甲子至江陵卒扵舟中年五十有一母某氏先娶毛氏又娶祝氏子男三人曰某曰某女四人君之卒某始七歲清江李中為之具䘮事所須某年某月某甲子君之弟暠葬君扵某縣某郷某所之原君少孤力學不問生業事母以孝稱在仕也嫁姊之貪者居常分月俸三之一以奉之餘以與諸弟君與妻子或止食舘劵而已為人和平質簡其施扵為政亦然及至有所必行人亦多所不䏻及也其為南城雩都取豪猾尤難治者三人皆䋲以法君既見悪果扵䋲而去之故其餘皆歛跡不敢犯君法此君之行已居官已試者也所試者大将豈止扵是欤銘曰婉婉為人嶷嶷為吏此有爱慕彼無怨議孰厚其有孰艱厥施維銘㫥之以論耒裔元豊類藁卷之四十三
