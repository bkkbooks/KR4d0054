front:
  text: 南豐先生元豐類藁卷之四十三
  hash: sha256:914d86186311e5905b13768dddec471ce42186b1066700bd45c31e8a2edad28c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_043-1a}
body:
  text: 志銘都官貟外郎胥君墓志銘君姓胥氏諱元衡字平叔長沙人皇考諱某王考諱某考諱某王考贈尚書工部郎中考為翰林學士尚書工部郎中贈尚書吏部侍郎君少以蔭為將作監主簿六遷為殿中丞賜緋魚袋鎖廳應進士舉得出身又三為尚書都官貟外郎歷監在京染院內衣庫皮角庫簽書河南府判官公事通判湖州又通判海州治平三年四月壬寅以疾卒於泗州其年八月庚寅葬於許州陽翟縣三封原翰林君之塋𥘉娶李氏太子少傅若谷之女再娶韓氏封成安縣君尚書刑部貟外郎知制誥綜之女子男二人曰茂諶太廟室長次尚幼女二人長早夭君少孤能自奮厲力學問工為文章又謹畏廉潔慕善而不自放居官雖小法未嘗不愼而不為察察于人有所能容其大意如此故所至士大夫愛其修而百姓歸其恕其在染院二庫雖尚少巳有能名及為通判判官而能益顯蓋所試者大將豈可勝數哉始大臣薦其文章宜在館閣近臣又薦其修潔冝任御史朝庭方嚮用之以為江西轉運判官命始下而君蓋已死矣死時年三十有九聞其喪者識與不識皆哀之蓋天聖之間翰林君方處顯好收奬天下之士而名能知人士之出於其時有盛名於天下者多翰林君發之及其後君既壯大所與逰士大夫亦皆一時之雋然自天聖至于今才四十年翰林君之門下士多至大官富貴尊寵君所與遊士大夫亦多重於時而翰林君棄賔客巳久君又蚤世獨翰林君之夫人建康郡太君田氏年七十與君之孥羈旅於閭巷君之喪合衆人之賻乃克葬其盛衰之際如此固所謂命者非耶君之葬祕閣校理裴煜以茂諶之疏來請銘豫與君皆嘉祐二年進士故不得辭銘曰維艱而勩以敏其繼維平而畏以篤其義考以無遺在人有賜我志之良孰曰非遂我材之尤孰曰非試不申其期不擴其施有命則然其又何悲尚告後世知者之辭劉伯聲草志銘慶曆之間余家撫州州椽張文叔與其內弟劉伯聲從豫遊余與伯聲皆罕與人接得顓意以學問磨礲浸灌為事居三年乃别後數年余以貧而仕見伯聲於京師年益壯學日以益又數年余校書史館伯聲數過余飲酒談笑道舊故相樂也伯聲未老然以疾故亦衰矣既而余去京師而東更七州至于亳伯聲子之美來告曰伯聲死八年矣將死時命之美屬余銘其言曰葬而不得余銘如不葬也余惟伯聲始從余逰至今三十年見其少壯至於有疾而衰與之故最久於其死而托銘於余故不得而辭也伯聲諱震為人質厚沉深寡言笑恂恂蹈規矩與人逰見其一善若恐不能及見其一失若恐不能拔其篤於誼如此讀書有大志慨然𣣔有為者也少孤能自立尤貪然營疏屬之葬孤姪之嫁娶忘其力之不足也數以進士薦於鄉卒不合㫛乃得試將作監主薄曽大父澤左輔闕贈吏部尚書太父居仁單州單父縣主簿考絃濟州司理參軍其先清河人自吏部葬開封府之東明今為東明人伯聲卒於熙寧五年二月戊戌年五十有三葬於東明之陽山鄉白駒里以元豐三年十一月某甲子妻賈氏尚書比部貟外郎式之女子四人之美之純之竒之邵二女嫁倪良器李日新張文叔名彥博余為之敘其文者也銘曰敏於求巳尚行寡言篤於求古廣見多聞有就卑之而施則屯維舊則信以諗後人尚書北部貟外郎李君墓志銘康定𥘉先人寓南康與李君居並舍是時君年未四十遊余父子間相好也後十餘歲君為臨安遇余於浙西道舊故喜甚又十餘歲君巳退而家居復見之山陽又九歲而君年七十有一以卒明年其孤仲熊自山陽抵京師拜且泣曰願得銘也余惟君遊余父子間四十年矣銘其可辭君姓李氏諱丕字子京𥘉名真卿曽大父諱某大父諱某考諱某贈光祿卿母丁氏仙源縣太君繼母王氏仁壽縣太君海州朐山人家故寒也學為士自君始出舉進士中其科得主楚之淮隂簿歲凶轉運使調軍食用君主宿州糴他州皆強賦民猶不足君隨便開誘糶者恱趍糴最他州去為虔州司法參軍能隨用見聲出衆上薦者十四人不用遷寧國軍節度掌書記轉運使屬君市翎毛優致如主糴所市以赤數之至十萬復最他州又屬君主作院君考校程度所作兵器總一萬一千三百二十有四皆精且利他軍州事有不能決者多屬君君所決者三十有八事蓋復太平州囚𬋩壽活之明通判歙州林瑀無罪釋之類如此於是能益白薦者三十人遷祕書著作佐郎用薦者監興元府稅急吏寬商課嬴十有七萬歲中以歲次遷祕書丞以課遷太常博士以覃恩遷尚書屯田貟外郎知杭州臨安縣召為審刑院詳議官賜緋衣銀魚遷尚書郎官貟外郎通判蜀州蜀少事然他州訟有積歲不能決者轉運使以屬君君所決八事民信服之遷尚書職方貟外郎監在京內衣庫樞密使田况奏用君刪定馬軍司條貫既成詺加賞賚濵州有獄久不能決辭連大臣冡子遣吏治之輒辭詺遣君乃決纍遷尚書􅕄方郎中以母老出通判杭州坐法免復為尚書比部郎中監沂州承縣鹽酒稅未逾月自罷歸又監陜州集津垜鹽務不行以本官致仕元豐三年九月巳卯以疾卒山陽之私第十一月甲寅葬安樂郡之揚興里君娶葛氏仙居縣君再娶喬氏夀安縣君子男七人曰仲熊衛州軍事推官曰仲謨以進士再試禮部曰仲將曰仲傑曰仲倩曰仲昌皆未仕也女六人嫁吳好禮于鋭皆奉議郎馬察于鏜皆進士餘幼也君既自奮拔立其家蓋仕四方惟蜀去其親其事兄撫孤弟姓皆盡恩意其為吏不獨能自仕其官蓋他吏之不能任其事者或屬君兼任之辨其𥙿也不幸一跌世無力桭逹之者故以坎壈終銘曰海區氏李有啓厥世富辭與能自約而侈曰父與子郎官卿士曰妻及母翟衣象揥謂勢方利孰轠以毀施不盡有故也則喟尚佑爾裔以追厥始司封貟外郎蔡公墓志銘公諱充字公度天聖二年進士及第為邵武軍之邵武尉又為應天府之下邑尉丁母夫人河間縣太君周氏憂服除為越州司理參軍天平軍節度掌書記遷祕書省著作佐郎知洪州奉新縣祕書丞知遂州小溪縣改通判戎州纍遷太常慱士尚書屯田度攴司封貟外郎歷監在京都進奏院群牧判官知綘州又為提點􅍮湖北路刑獄公事至和三年七月二十三日以疾卒於澧州之官舍享年七十有一嘉祐二年十一月十三日葬于建昌軍南城縣太平鄉之西原公為人好自潔清平居衣冠容貌肅然及其臨事以沉默慎靜為主故自起家至於其終凡三十餘年歷內外官任事無纎芥之失其與人逰始若淡然無足動其意者及其久人人皆退自喜謂公真長者也其為尉參軍掌書記人始以廉節知公及為奉新小溪絳州其政又以平恕不優聞至其在群牧􅍮湖數更宜諸事人皆服其能其于越州屬將佐交惡府中多向背公獨挺立無所與後將又以貪坐法官屬多不能自全事亦卒無汙公者于戎州屬瀘州叛涓井監轉運使用公調兵食禦之兵遂以濟於絳州州歲市羊數萬供京師公奏減之至今賴其法于􅍮湖既周知官屬善惡於善人多薦籍成就之而于惡人無所貸其法公既能自將顯其材故薦公者尤多蓋王沂公曽王鄧公詒永與今冨丞相粥之居鄆也皆薦之而鄧公之為樞密使兼群牧制置使也又奏公為判官其為當丗之大臣所知如此𥘉公年十三喪父家貪尤自克苦飬其母及仕未嘗廣田宅喪歸借屋以居曽祖諱恭祖諱道隆父諱旦以公恩贈尚書屯田貟外郎丗家南城故為南城人娶鄭氏纍封宋城縣君子八人曰冠卿祕書省著作佐郎曰端卿鄭州原武尉曰文卿曰徽卿曰宋卿曰喬卿曰子卿曰孺卿公殁詔官其一子蓋公不獨能以其有施於身又能力以其餘教于家故公之殁也冠卿以材尤知名端卿而下皆謹嚴能丗其家者也女二人嫁邵武尉陳涉進士陳之邵冠卿等將葬公以銘屬公故人子曽鞏銘曰司封抱能屈𥘉齡秉旄懷􅌧晚始亨沙墟莾崖肆經營馬羊茁肥獄訟平凛然氣志潔以清自微託隆用兢兢風流餘徽𬒳家庭子多以才後方興贈職方貟外郎蘇君墓志銘熙寧元年春余之同年友趙郡蘇軾自蜀以書至京師謂余曰軾之大父行甚髙而不為世用故不能自見於天下然古之人亦不必皆能自見而卒有傳於後者以丗有發明之者耳故軾之先人嘗疏其事蓋將屬銘於子而不幸不得就其志軾何敢廢焉子其為我銘之余為之記其説曰君諱序字仲先眉州眉山人其先蓋趙郡欒城人也曽太父釿大父祐父杲三丗皆不仕而行義聞於鄉里祐生于唐季而卒於周顯德之間嘗以事至成都遇道士異之屏人謂曰吾術能變化百物將以授子祐辭不願道士笑曰是果有以過人矣而杲始以好施顯名君讀書務知大義為詩務逹其志而巳詩多至千餘篇為人踈逹自信持之以謙輕財好施急之人病孜孜若不及歲凶賣田以賑其鄰里鄉黨至孰人將償之君辭不受以是至數破其業厄於飢寒然未嘗以為悔而好施益甚遇人無踈密一與之傾盡無疑礙或欺而侮之君亦不變人莫測其意也李順叛攻眉州君居圍中守禦會其父病沒君治喪執禮盡哀退慰安其毋皆不失所冝慶曆𥘉詔州縣立學取士爭欲執事學中君獨戒其子孫退避人皆服其行蜀自五代之亂學者哀少又安其鄉里皆不願出仕君獨教其子渙受學所以成就之者甚備至渙以進士起家蜀人榮之意始大變皆喜受學及其後眉之學者至千餘人蓋自蘇氏始而君之季子洵壯猶不知書君亦不強之謂人曰是非憂其不學者也既而洵果奮發力學與其子軾轍皆以文學名天下為學者所宗蓋雖不用於世而見於家稱於鄉里者如此是不可以無傳也已君始以子恩為大理評事後纍贈尚書職方貟外郎享年七十有五慶曆五年五月十一日終於家八年二月某日葬于眉山縣修文鄉安道里先瑩之則夫人史氏蓬萊縣大君二子曰渙尚書都官郎中提點利州路刑獄公事有能名曰洵霸州文安縣主簿編纂太常禮書贈光祿寺丞孫七人位佾不欺不疑不危軾轍軾殿中丞直史館轍啇州軍事推官銘曰蘇氏徂西值蜀崩分三世高逝以篤吾仁君始不羈勞躬以卑孝于父母施及窮釐維見之卓教其子孫終化鄉邦學者詵詵維子若孫同時三人擅名文章震動四方乃本厥𥘉考祖之自刻詩墓石以卑厥裔庫部貟外郎知臨江軍范君墓志詺嘉祐五年六月辛巳尚庫部貟外郎知臨江軍事范君卒于位年五十有三其年十月􅉝酉葬于江州德化縣之仁貴鄉萬家山前葬其孤屬君之故人李中考次君之官氏邑里與其功行之實為狀授使者使告於鞏曰先君葬既得日月冝有銘孤安期也敢請鞏曰君之行宜有述乃為之志其墓而銘之其敘曰惟范氏傳敘受姓自劉纍以來其後居江州者出於晉豫章太守寧之後君諱端字思道江州德化人也祖祕書省著作佐郎贈太常少卿諱成象父尚書都官貟外郎贈光祿卿諱應辰君始以父任為太廟齋郎纍轉至尚書庫部貟外郎歷德化尉江寧主簿江都令知南昌飛鳥彭山三縣通判通州徙泰州又為胸當開治畿內溝泣提舉陜西河北路便糴糧草至知臨江軍事而飛鳥以乞飬太夫人得監江寧府鹽稅彭山用薦者得監雲安軍鹽井二縣皆不至君聚書萬餘卷強力篤學為人恭遜質儉能自修飾門內之治肅如也及施於為政以謹法能持廉名於世而世之能觀其內者亦少也始為江都會歲旱張若谷為楊州遣吏數人與君皆出視民田他吏還者白歲善君還獨白田實旱若谷𥘉不是之也君持旱苗力爭乃卒是君所白吳遵路蔣堂為淮南轉運使使君護河役君往視之還言河不可為遂罷君用他吏護役而河果不可為三人者其𥘉皆怒已乃感寤共薦之而當是之時天下之主財利者方務於急聚斂治民者以立聲威為賢交四方之賔客者又往往嚮意於卑辭貌煩饗燕贈送之禮以其故能傾士大夫以千天下之譽君乃獨推息民教化之意以簡易自守故為雲安主鹽利而議蠲鹽課以數萬為臨江以興學教人為先而厨傳賔客之奉十去其七八四方之往來者或出語訕君君不為之動也其正行直道如此太夫人李氏贊皇縣太君父尚書工部侍郎虛已元配氏父龍圖閣直學士向次配周氏清河縣君父尚書司封貟外郎陵子男六人安期安仁安之安世安夀安禮女五人長適和州司戶參軍鄭夷中次適都曷主簿周詠次適郊社齋郎周佺期餘尚幼孫男六人萃叟岩叟渭叟商叟蒙叟真叟太夫人之喪君哀感疾四年乃能起凡君之所既立可謂有士君子之行非耶自不遵先王飬士用人之法而士在閭巷之間者用力于空文居朝廷者馳騁于虛名以譁世取寵士之能修其內潔身纍行者非自好之莫能至而世亦罕能知之也故君之事豫喜為之見於文使後之君子得覽焉君于文章尤長於詩有集三卷藏於家其銘曰君性溫溫好退特卑及其臨事擇義而為一世之棄君獨從之一世之慕君獨違之行已有常在官無疪曷以知之視此銘詩張久中墓志銘君姓張氏名持字久中𥘉名伯虎慶曆三年耒自曲江入太學當是時天子方詔學官歲獻士二人學者以數百千人獨獻君會學散不報於是時豫蓋未嘗識君也後二年過豫之所居臨川始識之君為人深沉有太度喜氣莭重交遊一時所與之逰者甚衆而君所尤稱者廣漢張賁以為年少可進以學者莆陽陳惇蓋君之學多賁發之而于惇以師友自處也凡君之與人交喜窮盡其得失其義足以正之而其直未嘗苟止也至其與衆人接尤溫以莊不妄與之言與之言必隨其材智所到不病以其所不為故君之友皆憚其嚴而喜其相與之盡衆人之得君逰者亦皆喜愛而未嘗有失其意者其語曰士生于今勢不足以持卋而逰于其間當如此也于臨川出其文章因學豫言古令治亂是非之理至于為心持身得失之際于其義余不能損益也後二年死于興國軍某月某日也明年其弟來江南以力之不能將獨負君之骨以歸是時陳惇方以進士得出身約君之弟曰吾忍不全歸吾友耶明年吾得輔為吏力能以君之歸其弟乃止君年若干祖某考某君幼孤養于兄嫂嘗曰嫂之于吾猶母也婦能以姑之禮事吾嫂者可以為吾婦矣然卒亦無也君固難交然不易其好而陳惇者與君交尤深也豫嘗視惇與君之相從憂窮齟齬無不共之其中心豈有利然也丗之交友道廢久矣其有之或非此也然則君之事其有取于卋教非邪惇以某年某月某日歸君之葬地而屬豫銘其辭曰嗚呼久中不如其志孔孟巳然何獨于子生而不大夫固為之其長在人于此觀之祕書丞知成都府雙流縣事周君墓志銘君姓周氏諱旻字夢臣衢州江山人也曽祖漢規祖德厚父幹君以進士及第歷南劒之將樂建昌軍之南城主簿監虔州雩都銀埸又為泰州司户參軍用薦者為祕書省著作佐郎知宣州南陵縣事遷祕書丞知成都府雙流縣事嘉祐六年正月某甲子至江陵卒于舟中年五十有一母某氏先娶毛氏又娶祝氏子男三人曰某曰某女四人君之卒某始七歲清江李中為之具喪事所須某年某月某甲子君之弟皓葬君于某縣某鄉某所之原君少孤力學不問生業事母以孝稱在仕也嫁姊之貪者居常分月俸三之一以奉之餘以與諸弟君與妻子或止食館劵而已為人和平質簡其施于為政亦然及至有所必行人亦多所不能及也其為南城雩都取豪猾尤難治者三人皆繩以法君既見惡果于繩而去之故其餘皆斂迹不敢犯君法此君之行已居官已試者也所試者大將豈止于是歟銘曰婉婉為人嶷嶷為吏此有愛慕彼無怨議孰厚其有孰艱厥施維銘㫥之以論耒裔元豐類藁卷之四十三
