front:
  text: 元豊類藁卷之三十九
  hash: sha256:3bc44c020a297a2f6a25735eb2363457f70823fa366d029332b8f2c9fdd2cb32
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_039-1a}
body:
  text: 祭文先君焚告文鞏蒙昏不肖不䏻稱先君教誨飬育之意頼遺徳所及嗣有官禄以世其家今天子始見郊廟加㤙朝臣以及其先而先君先夫人咸有官封追荣之賜鞏繫官京師謹遣弟布肇奉告第至墓次以告皇妣仙源縣太君周氏焚黄文鞏薄陋獲守緒業常懼失墜頼先君先夫人餘澤有列位于朝今天子始郊加㤙群臣皆得追荣其先故先君先夫人咸𬒳命書贈官封邑鞏伏念厥繇不任感慕隷職京師遣弟布肇奉告第黄詣墓次以告謹焚皇妣昌福縣太君吳氏焚告文維先君先夫人積徳累善鞏獲蒙餘澤備位于朝今天子始郊加㤙羣臣皆許追荣其先故先君先夫人咸𬒳賛書命官封邑而鞏方羈扵職事不得躬至墓下謹遣弟布肇奉告第以告戊午十月展墓文二首鞏去春在江西蒙㤙予告得省視松楸今自福州𬒳召還朝又得便道展拜墓下敢陳薄薦用申感慕仰惟降鑒俾蒙福於無疆鞏自福州被召還朝得便道展墓敢陳薄薦以下同上代太平州知州謁廟文天子不以某不敏使有兹土凡境之内鬼神䏻福于人敢不㳟事今得日之吉始兹薦見惟神之賜使民冝其家及其歲事則某敢不継自今具酒醴牲牷以報于神神其鍳之太平州祈晴去歲之水其為害大矣民之免扵死亡而不為盗賊亦幸而巳矣水之既去民扵完隄防脩疆隴以從事扵田其艱且劳亦甚矣使今歲大穣恐未足以復其力今苗始蒔而雨不止若将又病之民有轉死之憂吏之不䏻亊神治民以降兹沴不敢迯其責然沴之既降非吏之所䏻扜而止也惟神舊依吾民而食于此士扜患除菑固神之職敢不以告使雨速止而歳有成亦惟神扵此土永有依㱕惟神其圗之泰山祈雨文維㤗山歴古至今有天下者巡狩封禅勒成告代莫不之焉或企足動容卒莫䏻至實卓瑋殊尤神明之地故天下宗焉二典所記其光靈威烈焯示萬世夫豈他山可得而視維齊與魯獲仰而事粒食縷衣莫匪隂施今二邦不雨自四月巳訖于兹積水之澤塵起㝠㝠粟将槁死蝗亦滋生雖政或不良足以致此而百姓何罪冝家哀矜彼撮土之山勺水之川尚䏻與民為福錫之有年豈如㤗山朝出一雲墓澤天下其勢之易易扵轉圜而比近託䴡顧不䏻憐殆莫之或告告或不䖍夭民之生蓋亦艱矣無儲與蔵重歛煩使歲一不登多濵扵死奸強無知或起乗時聚為盗攘以取誅夷循理安業田間之民亦與俱亡奚可不傷鞏受命天子守藩于東敢齋以嚴告于靈宫惟神閔人之病助歲之功霈然下雨変沴為豊尚俾斯民以牛羊黍稷得承事于無竆㤗山謝雨文臣愚行為時之所背言為時之所䡖寡儔少和眇眇䑕煢竒扵人而如此敢望信扵㝠㝠屬東轅而進謁託斯文而薦誠眷齊魯之舊邦依大鎮之峥嶸苦旱魃之方驕憂歲事之不登民且瘠扵溝􅊤或椎埋而死兵冀聦明之響荅霈膏雨之宵零言丁寕而上訴心􅞕恍而潜驚頋不䏻以諧世将何動夫威靈乃不知夫神與道而為徒雖窅黙而難明其虚心也物有耒而必應其公聴也無憎爱之常情彼大雖自大小雖謂小吾與善而巳矣常一視而持平故㣲衷得以上徹利澤為之旁行或噫為風或震為霆隱然雷出靄然雲蒸洒甘霔以兼夕威害氣扵無形盖西極于甸服東属乎滄𬈑人盈其望物遂其生黍芃芃而擢秀粟薿薿而敷荣使時沴遂熄年功可成人食豊乎鍾鬴神祀衍乎粢盛民相安扵田里吏無用扵威刑信大㤙之莫報而至徳之難名愚所以意激而感深者方渉丗之零丁荷降鑒之不昧知忠信之可慿敢因辤以進謝愧抽思之非精齊州到任謁舜廟文嶽廟云維神以豊功成徳作鎮此方宜有以稱民望維帝側㣲之𥘉躬耕此土歴数千載盛徳彌新傳于無窮享有廟食鞏受命出守敢陳薄薦維帝常垂隂施惠此困窮庻使遺民永有依頼齊州謁夫子廟文惟夫子言行之所以一作及盖不可得而學者師仰各以其一無其字材之所及而巳鞏潜心乆矣兹者受命撫封進謁廟下敢陳薄薦式遵典禮齊州謁諸廟文維神以功徳之美列于祀典受命守土敢陳薄薦惟神常垂隂施以惠此邦泰山祈雨文惟神含徳體仁鎮兹東夏興雲致雨澤施八紘今此齊邦近在山趾方夏乆旱麥苗將萎吏思其繇奔走群望而人㣲言賤不䏻上動頻隂復散忽巳兼旬念此疲民弊扵征歛方歲之富食常不足一遇烖害必捐溝壑惟神威烈覆𬒳群生頋此比州冝先蒙賜豈伊靈眷獨忍遺今是用飭遺士民布誠祠下情窮詞急冀獲哀矜使一雨霈然則倒懸可觧尚其降鑒無作神羞嶽廟祈雨文去歲之旱有請于神蒙卑嘉澤田則大稔今春河役發民二萬更迭齎送衆又倍之盖此齊人出者幾半迨其反室維夏之功勞費既深又違穑事夫民数歲乃遇一稔敝之如此其㡬尚完今二麥方包而亢陽為雪吏任其咎所不敢迯惟民何辜頼神終惠䏻致雲雨則實在神尚其念之故敢以告襄州謁文宣王廟文鞏獲承餘教列職書林来守此邦敢遵常禮躬謁祠下尚其臨之襄州謁諸廟文惟靈功徳在人廟食兹土鞏到官之始敢脩禮謁尚期降惠以佑吾民襄州諸廟祈雨文今麥苗方出而時澤尚愆冬令乆行而寒氣未應嗟吏治之不善以奸隂陽惟神理之無方䏻興雲雨是用兢慚以任咎蠲祓以乞靈尚期降休以荅人望大悲祈雨文維歲孟冬盛陽猶亢旱䁧滋乆隂寒未興吏非循良敢不任咎佛有慈惠則宜降祥是敢躬瀝􅈤誠䖍祈斍䕃俾風雲之奮作致雨雪之漸􅉼田畆順成里閭安輯仰期真理俯徇輿情㐮州嶽廟祈雨文自秋不雨方冬尚温麥田苦扵旱乾民室憂扵病癘永惟責任内集兢慙惟神作鎮岱宗著靈南夏敢瀝由衰之􅈤冀回降鑒之仁遂碑膏澤以時祈寒式序甽畮克諧於豊冨里閭皆保扵靖康尚其垂訓副此群望又諸廟祈雨文去歲今冬時雪不厚今兹春晚膏澤尚微農扵稲田待水而種苦兹旱涸人用焦然吏不䏻有惠扵民而惟歲之善則刑清事簡尚有望焉是用瀝懇有禱于神惟神依人尚其降鑒使霈然下雨以大濟于此邦則人扵事神亦曷不盡薤山祈雨文自去秋之始至于今春之暮雨不霶霈今麥苗将病稻種未布農事急矣而禱請未効惟神靈應在人是用奔告尚其降鑒大施澤于此邦使民獲善歲而不罹于艱不則人扵報神之賜亦曷敢不䖍邪溪祈雨文自去秋至今雨常不足今麥苗将槁稻種未布而春既盡矣若人不雨至扵十日則麥必盡死稻不可種民将安所寄命平吏知其急而不知其所以爲神知其急而力能爲雨者也其亦何惜数尺之澤救民扵無所寄命之急平故敢以請神其鑒之諸寺觀謝雨文何者以大田之稼雖多而西郊之雲方宻輙伸度禱盖以為民甫及夏𥘉霈然蒙潤兹展至誠之謝式遵舊典之傳欽惟明神鑒此精意邪溪謝雨文吏䏻奉法令治獄訟督賦歛而巳導和氣致豊年則力不䏻徳不及也故一有水旱則犇禱於鬼神幸蒙降荅則自恕以竊食此鞏之所不敢不自訟也今兹請雨不䏻異此獲神之賜敢不䖍報惟神之靈徳既足以驚動澤施于此民尚終卑之有年則神之依人亦有永頼薤山謝雨文廼故秋至今雨不霑足麥苗将槁稻不可種民将無以為命吏不知其所為維神䏻出雲致雨記扵古經信扵百姓之耳目是用犇告果蒙降荅廼戊辰雲起西北至夕大雨逹扵甲戌四境告足麥則滋荣稻可播種民得以託命吏得以竊食維神之威靈大顯于此土澤施大及扵斯民敢不嚴報尚其終惠俾歲大穣則人扵爭神永永其不敢怠諸廟謝雨文吏治不䏻順隂陽時風雨而以歲之旱犇告于神頼神之靈時賜甘雨敢不嚴報尚其鑒之元豊類藁卷之三十九
