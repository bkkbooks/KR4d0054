front:
  text: 元豐類藁卷之三十九
  hash: sha256:55832141b04a947e469634b653d28a30cc22f462479daf5050eacfaf22c59276
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_039-1a}
body:
  text: 祭文先君焚告文鞏蒙昏不肖不能稱先君教誨飬育之意賴遺德所及嗣有官祿以世其家今天子始見郊廟加恩朝臣以及其先而先君先夫人咸有官封追榮之賜鞏繫官京師謹遣弟布肇奉告第至墓次以告皇妣仙源縣太君周氏焚黃文鞏薄陋獲守緒業常懼失墜賴先君先夫人餘澤有列位于朝今天子始郊加恩群臣皆得追榮其先故先君先夫人咸𬒳命書贈官封邑鞏伏念厥繇不任感慕隸職京師遣弟布肇奉告第黃詣墓次以告謹焚皇妣昌福縣太君吳氏焚告文維先君先夫人積德纍善鞏獲蒙餘澤備位于朝今天子始郊加恩羣臣皆許追榮其先故先君先夫人咸𬒳贊書命官封邑而鞏方羈于職事不得躬至墓下謹遣弟布肇奉告第以告戊午十月展墓文二首鞏去春在江西蒙恩豫告得省視松楸今自福州𬒳召還朝又得便道展拜墓下敢陳薄薦用申感慕仰惟降鑒俾蒙福於無疆鞏自福州被召還朝得便道展墓敢陳薄薦以下同上代太平州知州謁廟文天子不以某不敏使有兹土凡境之內鬼神能福于人敢不恭事今得日之吉始兹薦見惟神之賜使民冝其家及其歲事則某敢不繼自今具酒醴牲牷以報于神神其鑒之太平州祈晴去歲之水其為害大矣民之免于死亡而不為盜賊亦幸而巳矣水之既去民于完隄防修疆隴以從事于田其艱且勞亦甚矣使今歲大穰恐未足以復其力今苗始蒔而雨不止若將又病之民有轉死之憂吏之不能事神治民以降兹沴不敢逃其責然沴之既降非吏之所能扜而止也惟神舊依吾民而食于此士扜患除災固神之職敢不以告使雨速止而歲有成亦惟神于此土永有依歸惟神其圗之泰山祈雨文維泰山歷古至今有天下者巡狩封禪勒成告代莫不之焉或企足動容卒莫能至實卓瑋殊尤神明之地故天下宗焉二典所記其光靈威烈焯示萬世夫豈他山可得而視維齊與魯獲仰而事粒食縷衣莫匪隂施今二邦不雨自四月巳訖于兹積水之澤塵起冥冥粟將稿死蝗亦滋生雖政或不良足以致此而百姓何罪冝家哀矜彼撮土之山勺水之川尚能與民為福錫之有年豈如泰山朝出一雲墓澤天下其勢之易易于轉圜而比近託麗顧不能憐殆莫之或告告或不虔夭民之生蓋亦艱矣無儲與藏重斂煩使歲一不登多濵于死姦強無知或起乘時聚為盜攘以取誅夷循理安業田間之民亦與俱亡奚可不傷鞏受命天子守藩于東敢齋以嚴告于靈宫惟神閔人之病助歲之功霈然下雨變沴為豐尚俾斯民以牛羊黍稷得承事于無窮泰山謝雨文臣愚行為時之所背言為時之所輕寡儔少和眇眇鼠煢竒于人而如此敢望信于冥冥屬東轅而進謁託斯文而薦誠眷齊魯之舊邦依大鎮之峥嶸苦旱魃之方驕憂歲事之不登民且瘠于溝􅊤或椎埋而死兵冀聰明之響答霈膏雨之宵零言丁寧而上訴心􅞕恍而潛驚顧不能以諧世將何動夫威靈乃不知夫神與道而為徒雖窅默而難明其虛心也物有耒而必應其公聽也無憎愛之常情彼大雖自大小雖謂小吾與善而巳矣常一視而持平故微衷得以上徹利澤為之旁行或噫為風或震為霆隱然雷出靄然雲蒸灑甘霔以兼夕威害氣于無形蓋西極于甸服東屬乎滄𬈑人盈其望物遂其生黍芃芃而擢秀粟薿薿而敷榮使時沴遂熄年功可成人食豐乎鍾釜神祀衍乎粢盛民相安于田里吏無用于威刑信大恩之莫報而至德之難名愚所以意激而感深者方涉丗之零丁荷降鑒之不昧知忠信之可慿敢因辭以進謝愧抽思之非精齊州到任謁舜廟文嶽廟云維神以豐功成德作鎮此方宜有以稱民望維帝側微之𥘉躬耕此土歷數千載盛德彌新傳于無窮享有廟食鞏受命出守敢陳薄薦維帝常垂隂施惠此困窮庶使遺民永有依賴齊州謁夫子廟文惟夫子言行之所以一作及蓋不可得而學者師仰各以其一無其字材之所及而巳鞏潛心久矣兹者受命撫封進謁廟下敢陳薄薦式遵典禮齊州謁諸廟文維神以功德之美列于祀典受命守土敢陳薄薦惟神常垂隂施以惠此邦泰山祈雨文惟神含德體仁鎮兹東夏興雲致雨澤施八紘今此齊邦近在山趾方夏久旱麥苗將萎吏思其繇奔走群望而人微言賤不能上動頻隂復散忽巳兼旬念此疲民弊于征斂方歲之富食常不足一遇災害必捐溝壑惟神威烈覆𬒳群生顧此比州冝先蒙賜豈伊靈眷獨忍遺今是用飭遺士民布誠祠下情窮詞急冀獲哀矜使一雨霈然則倒懸可解尚其降鑒無作神羞嶽廟祈雨文去歲之旱有請于神蒙卑嘉澤田則大稔今春河役發民二萬更迭齎送衆又倍之蓋此齊人出者幾半逮其反室維夏之功勞費既深又違穡事夫民數歲乃遇一稔敝之如此其幾尚完今二麥方包而亢陽為雪吏任其咎所不敢逃惟民何辜賴神終惠能致雲雨則實在神尚其念之故敢以告襄州謁文宣王廟文鞏獲承餘教列職書林來守此邦敢遵常禮躬謁祠下尚其臨之襄州謁諸廟文惟靈功德在人廟食兹土鞏到官之始敢修禮謁尚期降惠以佑吾民襄州諸廟祈雨文今麥苗方出而時澤尚愆冬令久行而寒氣未應嗟吏治之不善以姦隂陽惟神理之無方能興雲雨是用兢慚以任咎蠲祓以乞靈尚期降休以答人望大悲祈雨文維歲孟冬盛陽猶亢旱䁧滋久隂寒未興吏非循良敢不任咎佛有慈惠則宜降祥是敢躬瀝􅈤誠虔祈覺蔭俾風雲之奮作致雨雪之漸􅉼田畝順成里閭安輯仰期真理俯徇輿情襄州嶽廟祈雨文自秋不雨方冬尚溫麥田苦于旱乾民室憂于病癘永惟責任內集兢慙惟神作鎮岱宗著靈南夏敢瀝由衰之􅈤冀回降鑒之仁遂碑膏澤以時祈寒式序甽畝克諧於豐冨里閭皆保于靖康尚其垂訓副此群望又諸廟祈雨文去歲今冬時雪不厚今兹春晚膏澤尚微農于稻田待水而種苦兹旱涸人用焦然吏不能有惠于民而惟歲之善則刑清事簡尚有望焉是用瀝懇有禱于神惟神依人尚其降鑒使霈然下雨以大濟于此邦則人于事神亦曷不盡薤山祈雨文自去秋之始至于今春之暮雨不雱霈今麥苗將病稻種未布農事急矣而禱請未效惟神靈應在人是用奔告尚其降鑒大施澤于此邦使民獲善歲而不罹于艱不則人于報神之賜亦曷敢不虔邪溪祈雨文自去秋至今雨常不足今麥苗將稿稻種未布而春既盡矣若人不雨至于十日則麥必盡死稻不可種民將安所寄命平吏知其急而不知其所以為神知其急而力能為雨者也其亦何惜數尺之澤救民于無所寄命之急平故敢以請神其鑒之諸寺觀謝雨文何者以大田之稼雖多而西郊之雲方密輒伸度禱蓋以為民甫及夏𥘉霈然蒙潤兹展至誠之謝式遵舊典之傳欽惟明神鑒此精意邪溪謝雨文吏能奉法令治獄訟督賦斂而巳導和氣致豐年則力不能德不及也故一有水旱則奔禱於鬼神幸蒙降答則自恕以竊食此鞏之所不敢不自訟也今兹請雨不能異此獲神之賜敢不虔報惟神之靈德既足以驚動澤施于此民尚終卑之有年則神之依人亦有永賴薤山謝雨文乃故秋至今雨不霑足麥苗將稿稻不可種民將無以為命吏不知其所為維神能出雲致雨記于古經信于百姓之耳目是用奔告果蒙降答乃戊辰雲起西北至夕大雨逹于甲戌四境告足麥則滋榮稻可播種民得以託命吏得以竊食維神之威靈大顯于此土澤施大及于斯民敢不嚴報尚其終惠俾歲大穰則人于爭神永永其不敢怠諸廟謝雨文吏治不能順隂陽時風雨而以歲之旱奔告于神賴神之靈時賜甘雨敢不嚴報尚其鑒之元豐類藁卷之三十九
