front:
  text: 元豊類藁卷之四十四
  hash: sha256:be1490ee5f34dae315dc2d356e85e896c54ba7503ab5a7fd057ba424a93fdd79
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_044-1a}
body:
  text: 誌銘殿中丞致王王君墓誌銘君諱某字某其先琅邪人嘗徙家于蜀王君之考又徙家于揚故今為揚之江都人曽祖諱錫祖諱得中為直定府獲鹿縣今贈尚書刑部侍郎考諱汝能為尚書都官郎中贈尚書工部侍郎君少以父仕為太廟齋郎養其父不忍一日去左右至卒䘮年巳四十餘始出為南劒州司户參軍歴監劒州銀銅場和州司户參軍用薦者監頴峒梲去為越州山隂縣尉滑峒録事參軍随州唐城縣令其為銀銅埸冶者復業而歲課大溢為尉能發奸偷為録事能治獄不撓為令能有惠爱扵人其試扵事者如此其為人居家孝友遇人和易質厚不為聦明機巧以華世動俗故知之者少而君亦自若也至年七十遂上書還政遷太子中舍今上即位恩遷殿中丞賜緋衣銀魚卒為熈寕五年之五月甲辰年七十有七以其年十月乙酉葬于江都之東興寕郷馬坊里以其配永嘉縣君周氏祔有子二人曰㡬大理寺丞曰深潤州丹徒縣主簿皆有文行能卋其家有女一人嫁陸氏有孫男二人孫女二人尚㓜也寺丞娶余之仲妹以書来乞君之墓銘余不能辭也銘曰養心以和動巳以直不為世巧安於自得顯不在躬寔詒爾于𣣔鴻厥聲勒銘于此贈大理寺丞致仕杜君墓誌銘君姓杜氏澶州濮陽人卒扵皇祐元年十月庚申葬扵熈寕八年十月丁酉其墓在濮陽縣桂枝里之欒村以夫人僊居縣太君潘氏祔君曽王考佑王考延嗣考珣子男三人曰言曰宗諌皆蚤丗曰宗誨殿中丞女二人嫁馬氏欒氏孫男二人曰良輔餘未名也君諱瑩宇徳温贈大理評事又贈大理寺丞為人孝友温良以清静為學而以淡泊自足行脩扵家而譽聞扵郷其自得者夀考見扵身其有餘者流澤見扵後故其年至扵八十而有子能大其門言理之士以此多君也宗誨為人質厚恬夷世俗之所爲有不爲者余爲㐮陽宗誨實僉書莭度判官公事爱其所守而知其有所受也其以君之銘乞扵余故不辭銘曰有以飬其内克遐者夀有以行扵逺克昌者後帝原厥𥘉追錫命書余與此銘賁于幽墟胡君墓誌銘君名敏生扵天僖之戊午卒時皇祐之􅉝夘也既卒之明年葬扵其所家撫州金谿縣之東某里某原字某姓胡氏父名晏教君學巳爲之求師又爲之求四方善人君子與之接致其力不敢懈至扵老以死不敢變君亦能奉其意故君之爲進士其強學其廣記其博問其䏻文辭扵其業可以謂之修其事親其居家與人逰不見其缺虧其約其質其不苟其寡言扵其行可以謂之脩夫積其勤以至扵業之修而止薦扵郷積其謹以至扵行之修而不克顯扵丗此卋之所以哀君也然君有可以慰其親而不疚扵其内比扵得其欲冨貴扵一時而有愧扵其心者其得失何如固易知也母某氏妻某氏子某弟某君嘗學扵余也故銘之銘曰慰其親學也勤短而屯塞不伸震無垠瑑斯珉光禄寺丞通判太平州吳君墓誌銘龍圖閣直學士給事中吳仲庻具書載其子業官丗行治屬余曰吾于某不克夀不得見其志幸得名信後卋則某其不泯泯尚足以慰吾忍也余爲之述曰維吳氏以文學直道繼有顯人其家于晚出並茂亦多以材䏻見扵世君居其間孝友䔍學有大志未見其止其不幸蚤死故君既自重無所試而其家盖識君之事亦畧也君以父任守将作監主簿今上即位㤙遷大常寺奉禮郎是歲進士及第僉書廣濟軍判官公事上書言時事有人之所難言者部多盗君請取酒埸羡錢益賞購轉運使難其言君以岡詔用君議盗以衰息君以母濟陽郡君蔡氏憂去官服除遷光禄寺丞通判太平州州頼以治行部中視河還不入其家将行廣濟圩度姑熟溪橋壞以水死年三十有三熈寜八年四月某甲子也朝廷聞而官其一子君娶陳氏尚書職方員外莭亢乏女前君一年死子曰塤郊社齋郎曰圻未仕女一人始五歲君𥘉名秉禮字子鈞其先興國軍某人曽祖考某祖考某贈戸部尚書仲庻名中復以君卒之二年正月某甲子葬君南康軍都昌縣沐浴保之龍回山以陳氏祔銘曰家紀其行官紀其能收科于少是紹是承維曰未試方勃而起云胡不遐一跌而逝命則維為昧不可稽卑爾萬年式諗以辭殿中丞監楊州稅徐君墓誌銘唐之亡疆者分其地為囯以十数楊行宻有淮南稱吳海州人徐温為吳将有功行宻死三子相次立温用亊貴顯温死其飬子知誥遂代楊氏盡有江淮之地稱唐去温所與為姓名者姓李氏名昪温巳子知諌事昇為将死昪追以為中書令臨淄王知諌子遜事昪子璟為中書侍郎上饒郡公遜子徐君事璟子煜為其秘書郎賜緋魚袋宋既受命平天下停李氏以歸徐君亦随之京師得為太常寺太祝不楽棄官歸江南乆之為殿中丞監楊州稅以死子天錫為祕書丞亦死女四人其第二父與李皆嫁吕氏徐君死祥符間後四十餘年嫁吕氏女有子倚始葬徐君與徐君之母李氏妻陸氏扵楊州之某原方徐氏之先與楊氏俱起東南收其土地而有之遭行宻子弱徐氏實任其國至昪遂代吳而徐氏子孫亦皆㩀士民之上有王公之勢扵其一時富貴之際豈非盛㦲百年之後其世凌遲至扵徐君遂死而無以葬葬扵異姓之孫盛衰之變何其速也然自前丗無不皆若此冨貴之不可以乆恃亦何必異也而卋之不安其命者方枉義挈挈以覬幸其偶得之者又惴惴恐失之是真可以常處也㦲𥘉東南之地既入於有司天子憐士民許皆復田其故所有地徐君之地爲尤多多不取有冐徐君之地以賣之者亦不問是以其貧甚而徐君獨自得徐君諱元榆字僊材好學善属文吏部賈黄中嘗試其書判曰元白不足多也尤䏻詩詩数百篇號南歸集大抵多慨其不得志徐君之所以自見也嫁吕氏女之夫名某僯徐君之死無以葬死以属其子倚倚貧甚能自力卒葬徐君而就其父志銘曰富吾不爭可謂既好之貧吾不懟可謂又安之諧㱕此丘女子之為永昭厥聲維此銘詩永州軍事推官孫君墓誌銘黟縣之孫氏有起進士為尚書工部郎中廣南西路轉運使以卒者諱抗以文學見扵丗其葬在黟之上林有子亦起進士為永州推官以卒卒時年二十有八者諱適亦以文學見稱葬在其父之左将葬其弟邈以告而乞銘扵南豊曽鞏其序曰孫氏丗家冨春唐有徙歙之黟縣者諱師睦始自别為黟縣之孫氏師睦生延緒延緒生旦旦生遂良以子㤙為尚書職方員外郎職方生工部工部實生君君年十有四辞親學問江東巳有聞扵人徃徔臨川王安石受學安石稱之後主越州上虞簿去以父㤙得永州父卒萬里致䘮疾不忍廢事既葬携扶㓜老将就食淮南疾益革遂卒扵池州大安鎮實至和二年始工部為御史不合而出及使南方什且起遽卒君尤自力學行謂藴必發其在君又止此君扵學問好其治亂得失之說不狃近卑扵為文次古為歸不夸以浮雖素羸不廢書雖進不怠以止既肆而通矣而不得極其至其銘曰孫世来黟拔身艱故為世聞家始自工部工部孰有有書百篇永州之學自其父傳其果以力其敏以明内有其質外以華英再以不就其後當侈君不有子君多兄弟尚書都官貟外郎王公墓誌銘王氏其先太原人世乆遷徙而今家撫州之臨川公諱益字舜良曽祖諱某不仕祖諱某以子故贈尚書職方員外郎考諱某以公故即其家拜衛尉寺丞公祥符八年舉進士及弟𥘉為建安主簿時尚少縣人頗易之及觀公所為乃皆大畏服其督賦稅未嘗急貧民或有所笞罰唯豪劇吏而以故建安人尤爱之嘗病闔縣為祠禱改臨江軍判官軍多諸豪大姓之家以財力自肆而二千石亦有所挾為不法吏乗其然乾沒無所忌公至以義折正二千石使不䏻有所縦以明惮吏使不敢動揺居頃之部中粛然諸豪大吏見公皆側目而視至以鄙言目公曰是不可欺也卒不得已以他計出公領新淦縣縣以治聞去改大理寺丞知廬陵縣又改殿中丞知新繁縣縣有宿奸数人公既䋲以法其餘一以㤙信遇之嘗踰月不笞一人知韶州改太常博士尚書屯田員外郎嶺以南素習扵夷無男女之别日浸月滋為吏者師耳目謂俗止如此凢姦事雖得有可已者皆不䆒公曰夫所謂囙其俗豈謂是耶居郡求姦事最急苟有萌孽一切擿發窮治之属縣翁源多虎公教捕之令𣣔媚公言虎自死者五與之致州為頌以献公使㱕之曰政在徳不在異州有屯兵五百人代者乆不至𣣔謀爲変事覺一郡皆駭公不爲動獨取其首五人即日断流之或請以付獄公不聴既而聞其徒曰若五人者繋獄當夜刼之然後衆乃服詔居南方雖小州然獄訟最多號難治公既以才能治之有餘遂以無事又因民之暇時爲之理营驛表坊市道巷使皆可以乆逺爲後利歸丁衛尉府君憂服除通判江寕府改都官員外郎二千石常以事倚公公亦爲之盡寳元元年二月二十三日以疾卒扵官享年四十六母謝氏封永安縣君娶徐氏又娶吳氏封長夀縣君子男七人曰安仁曰安道曰安石曰安國曰安世曰安礼曰安上女一人嫁張氏處者三人安石今爲大理評事知鄞縣慶暦七年十一月上書乞告葬公明年某月䛇曰可遂以某月某日與其昆弟奉公之䘮葬江寕府之某縣某處吾嘗聞郷里長老言公爲人倜儻有大志在外當事輙可否矯矯不可撓及退歸其家歛色下氣致孝扵父母致爱扵族人之間娄曲順承一以㤙自克位不滿其意故在外之所施用者見扵小而已今吾所書是也其大可知則家行最䔍已先人嘗從公逰其言亦然而吾又與安石友故得知公事㝡詳其将葬也使者以安石之述與書耒請銘遂爲之銘其尤可哀者也公堂有母老不覺哀公庭有子仁孝而才世所可喜公两棄之莫不皆死公有餘悲衛尉寺丞致仕金君墓誌銘今上皇祐二年祀明堂推㤙群臣祕書丞金君得以其父為大理評事致仕五年郊金君為太常博士又得以其父為衛尉寺丞惟衛尉府君諱某字温叟浮梁人𥘉君之考贈大理評事諱某有三子伯曰鼎臣為某軍莭度掌書記仲曰汝臣為太常博士季即君兄弟俱舉進士書記與仲既起家君因不復肯就舉曰吾兄弟不可俱去吾親也後三十餘年卒以有子為丞云君有四子曰君著曰君佐曰君卿博士也曰君佑兄弟又皆舉進士愽士既有名秩于朝三子皆復飬扵家盖其父子兄兄弟之出䖏如此何其相似也當是時宋興巳百年博士方以林自起扵賤貧𣣔以其所爲爲天下慨然有志者也君獨自得扵大山長谷之間日從子孫来四方之客與夫郷人之老詩書樽席之側嘯歌息偃以忘其年隤然遂其志者也遭天子既宗祀明堂頋朝士大夫皆褒崇其親𣣔以風示天下命書寵章降于其家顯荣一時夀考康寜有孫有曽以承以翼何其祥也君爲人簡易無町畦能事父兄衣食奉飬自與者嘗取其簿嘗有盗其牛羊已又盗其所乗馬者君知之皆不校盗卒自悔以伏盖君之質與其恕又有足多者如是也生扵淳化之庚寅卒扵嘉祐之丁酉遺命三月而葬從薄遂以其年十二月四日葬于饒州浮梁縣萬户山之前夫人徐氏累贈夀安縣君君之殁也有子四人女六人孫男九人女十二人曽孫男三人女二人金氏或曰出少昊金天氏或曰出漢侍中秺候傳至孫則亡至曽孫復侯而秺侯有弟倫倫子若孫四丗六人皆侍中以忠孝名尊顯扵世卋稱金氏云至君之先皆家京兆唐僖宗時有令浮梁者遭黄巢亂徙人築險自保所活人以数萬因留治之凢十有七年遂家浮梁以功至檢校尚書右僕射昭信軍莭度使諱某君曽祖也子諱某君祖也博士以君之外孫尚書屯田員外郎臧論道之狀耒属曰子爲我銘吾親吾死足矣鞏不敢辭銘曰卑少㳟老惟物之常即強棄父廼理之亡帝用慨然尊祀明堂頋襃耋夀風示九有君勢之亨與享其荣擁笏魏巾扵家以息有子有孫嚴嚴我側志無不得君子之詳銘以發之君子之光撫州金谿縣主簿徐洪墓誌銘嘉祐元年䖍州安逺闕縣令建安徐洪以撫州金谿主簿攝安逺事明年八月十一日死安逺十二月其父尚書屯田郎中舉以書告君之故人南豊曽鞏曰子為我銘洪之墓遂考次君世序行巳歴官卒葬之終始銘扵其墓曰君曽大父某某官大父某某官君字孺興為人有大志讀書好其治亂得失之大㫖為文長扵辨說其奔放馳騁上下反复之際有足壯也未冠聲號聞四方𥘉中進士除洪州司户參軍不就退居大江之南好倜儻非常之竒莭不肯少屈於人居八年以父命始強出為主簿非其好也君居家遇人無親踈豁如也樂赴人之急為主簿不以非其好故怠其意其治能有爱於人金谿富人錮山林之利数十年君始奪之而縣之貧人頼其利盖君之所試者小其為日又近而其所既立如是也享年三十有二死之若干日葬饒州鄱陽東門外母某氏某縣君妻凌氏黄氏男一人曰還孫始二歲女四人尚幼也銘曰嗚呼儒興志果而大不勝于柔以窒其外不隕其剛以享于内胡短其施而多其與父老天子兒嬰失父維銘告哀以納于墓太子右司禦率府副率致仕沈君墓誌銘君諱某字某姓沈氏沈氏自齊太子家令約家扵吳興故世為吳興人至君之大父諱某考諱某始自吳興之東林徙家扵錢塘故今為錢塘人君以宗室宻州觀察使宗旦㤙即其家得為太子右清道率府副率致仕又以祀明堂㤙迁太子右司禦率府副率兼官檢校國子祭酒兼監察御史階銀青光禄大夫勲武騎尉蓋宻州觀察使宗旦者今天子之姪潞王之孫而其母夫人盖君之姪也君為人質朴無外飾其居郷閭寛然長者也其事父兄䏻力以嚴眎族人䏻爱以均雖饒財為大家而衣服飲食自與尤寡約至人有急歸我則推財赴之無錙銖頋惜意憐里歲饑輙發倉以救人有欺其財者皆不校既老治其家事不肯懈曰吾先人之所以付我也處其子孫不以逸曰所以使汝守吾先人之法也嘉祐二年三月一日以疾辛于家享年七十有六其年十一月十五日葬錢塘之西城𥘉娶吳氏再娶車氏某縣君其葬也吳氏實從子三人曰瞱曰睕曰時孫八人曰沔曰溱曰沂曰淑曰灌曰湜曰漸曰渥曽孫三人曰師楊曰師荀曰師軻時沔沂皆舉進士餘亦皆有學行盖君之教也銘曰赤赫宗子保藩于密天子曰嘻汝惟沈出子假汝寵錫其外親東宫之屬有長衛軍命君于家俾休其老以偃以側服章華好天子命我匪我有求隤然順退媚于林丘不藴為機不阻為畦曰逺無仇曰近無疵里巷之依惟此令人流聞餘澤化其子孫惟身之祥既夀而康惟後之祥宜熾而昌惟墓有域其蔵有石刻此銘詩昭示無極寳月大師塔銘君名脩廣字叔微杭州錢塘人姓王氏九歲出家學佛居州之明慶院十一歲落髮為僧景祐二年詔賜紫衣五年又賜號寳月大師治平某年州選為管内僧正熈寜元年十月感疾癸丑㑹門人與常所徃来學佛之人告以将終其夕沭浴易衣正坐而卒享年六十有一門人曰慈化大師了性曰崇照大師了然曰賜紫衣了藴以明年某月某甲子為塔葬君扵某縣某郷某原君為人樂易慈祥有智識度量人不見其喜怒讀五經略知大義頗喜為詩少羸多病始學為醫既成而有疾者多㱕之無貴賤貧冨皆為之盡其術未嘗有所厚薄尤貧者或資之衣食以其故自京師至于四方自公卿至于學士大夫多知其名既見皆樂從之㳺而郷邑之人至于覊旅㳺客其㱕之者無不厭其意君扵接之雖劳未嘗有觧卷不𣣔之色扵資之藥物衣食雖窮無未嘗有所計惜其應外者如此及退而處夫貧冨死生之際又有所不累其心故至扵不䏻自給而未嘗動意至扵且死而未嘗改容変色噫是非可銘也欤銘曰不以貧故累其心此學士大夫所難至扵遭死生之変而不驚又難也君之學不同而自得者則然固不可以無傳况扵名聞扵世行信扵人故為之書尚使長存元豊類藁卷之四十四
