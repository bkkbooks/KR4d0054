front:
  text: 元豐類藁卷之二十七
  hash: sha256:2c36505263aca5536029d4cde86b44f6a3b95a265d92436fe8b14ca64fc5c9c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_027-1a}
body:
  text: 表上謝中書舍人表伏承制命授臣試中書舍人者甫上程篇遽塵寵任載惟遭遇倍集兢慙中謝蓋聖君難諭之情將𣣔施于號令得當世能言之士然後逹於文辭矧仐綱理四方彌綸庶政肇惟新之王度備久簡之官儀計謀常越于拘攣注錯舉為於希闊豈伊凡庶可測高深方當覺悟邇遐使遍知于上意訓齊內外用丕變于群心尤資演暢之林曲盡丁寧之旨布為邦典兹謂人文顧在臣愚豈堪此選伏况皇帝陛下超逾千載特起一時躬堯帝之聰明而不忘講學集成湯之勇智而無勸咨詢惟左右前後之臣有耳目腹心之寄尤非淺識所可叨居如臣性實滯蒙器非廣博知自強于名莭耻隂附于貴權無因緣毫髮之扳援有積纍丘山之忌嫉晚逢睿聖獨賜收憐褒加特異于常倫進用每從于中出猥以五朝之大典屬于一介之孤生巳愧缺然將安稱此敢期誤寵仍置近班敷導訓辭懼空踈之難強追參諷議憂蹇淺之易窮于風波流落之餘以蒲栁衰殘之質自循涯分曷副恩榮雖日月之光何加于潤色而天地之德無待于論思然臣索堅好古之誠粗識愛君之義既抗顔而就列敢恕巳以懷私謹當尋繹舊聞用闡揚于名命激昻懦志庶輔助于謀猷仰答主知誓彈臣莭臣無任齊州謝到任表伏奉敕命就差知齊州軍州事巳仐月十六日到任上訖顧以諸生備兹煩使據非其所懼不克堪中謝伏念臣素乏他長偶知好學議先王之制作嘗究本原論夫子之文章頗探閫奧歷事聖君于三卋與遊儒館者十年不知苟曲以取容但信撲愚而自守比緣私計請二外藩嗟疾病之餘生困米鹽之細務方指期于滿歲將垂翼于故棲遽此外遷處之劇郡維般陽之列壤實季崱之遺區習詐而夸著流風于在昔多盜與訟號難治于當仐比試用于此邦必咨求于強吏蓋同能而任官者不違其分則量力而受位者得竭其林豈伊儒儒之資可副浩煩之用恐殫精思無輔毫分然而繇積纍以冒恩實飬成之有自此蓋伏遇皇帝陛下智周萬物明照四方在踈逺迂賤之中而察其所守無左右遊談之助而知其所長故今覆露之仁及此滯蒙之質敢不無忘夙夜勉盡疲駑行歸于周久自安于直道老當益壯誓無易于𥘉心仰望闕庭臣無任襄州到任表伏奉敕命就差權知襄州巳于今月二十七日到任上訖緣同氣之私恩陳便親之微志就更善郡得侍安輿中謝伏念臣素堅向學之心幸遇好文之主備名儒館十有三年然而三易外邦五回星歲比亦再過于雙闕未嘗一對于清光常存傾藿之誠雖知向日居有戴盆之勢何以望天而臣昨治濟南最為煩劇野有群行之盜里多武斷之豪馴致肅清始熄凶殘之害自強柔懦頗殫竭蹙之勞仐者或就安間少休疲鈍出觀美俗尤多漢廣之高入奉慈顔不憫汝墳之瘁兹為竊冒厥有端原此蓋伏遇皇帝陛下奬引士倫推崇世教小藝片言之善偏長一曲之材皆欲飬成未嘗棄廢故令優佚俯及孤蒙敢不附慰此民宣明上德永念沉碑之舊自顧何功未忘投博之勤庶幾小輔臣無任洪州謝到任表伏承敕命就差臣權知洪州軍州事充江南西路兵馬都鈴轄巳于仐月二十四日到任上訖撫臨便郡獲奉于親闈總制屬城實兼于故里中謝伏念臣志雖擇善材不過人玩思詩書無出倫之異見逰心翰墨多涉俗之塵言竊食纍朝備官儒館智非早悟曽不習于人情學匪兼通固難堪于世用兹緣私請得假善藩惟八換于歲期巳四臨于外服幸遇非常之主未奉燕間實當難得之時獨無稱效儻獲伸于肝膈冀少益于毫分伏惟皇帝陛下恭儉愛人聰明好古卑漢唐之近事慕堯舜之逺圖臣敢不上體聖心勤修民政奉行寬大方盡瘁于兹時輔助高深庶納忠于來日仰望旒扆臣無任福州謝到任表伏奉敕命授臣守本官直龍圖閣就差權知福州巳于今月初九日到任上訖列職內朝分符督府荷收憐之俯及省孤陋以何堪中謝伏念臣蹇薄多艱戅愚少與遇繼承于興運未進望于清光至于九換歲暮常從外徙四臨州部曽未代還兹者備延閣之美名假東甌之劇郡顧惟同氣亦預改藩但虞人品之輕莫稱主恩之厚然臣最為寒族實奉偏親臣弟既適于遐陬臣愚固難于逺役理當懇請輒奉冒聞雖未賜于矜從亦終寬于僣黷頗識事君之義敢忘奔命之恭惟皓首之慈闈抱纍年之宿疹牽衣辭訣泣涕分馳計音信之往來殆將萬里阻晨昏之㝎省各在一涯足感動于人情况親逢于孝治草苑弱質素依及物之仁犬馬微誠終冀因心之恕再念臣撫臨城邑勞問士民皆狎處于太寧但遵行于明詔則臣實慚尸于廪食曷輔報于寵靈皆出誤知致思冒處伏惟皇帝陛下多能天縱盛德日新躬神聖之姿而兼容小善履富貴之極而深逹下情在于隱恤之心豈間么微之迹敢不誓殫勤瘁匪懈夙宵慰海徼之幽荒布德音之寬大承流寵寄方自效于驅馳反哺愚情冀尚蒙于憫惻仰望旒扆臣不任明州謝到任表敕臣于去年十二月于江寧府準福州公文送到敕牒一道就差臣權知明州當月十八日于真州據進奏官伏準中書孔目房帖子臣乞迎侍老母赴任不行巳於今年正月二十五日到任上訖預于分土愧在假人竊自省循懼無報稱中謝伏惟皇帝陛下有聰明睿智固天縱之高姿有恭儉慈仁不世出之琦行上嘉堯舜之際下悼漢唐之間以超曠之迹為可追以苟簡之治為無取甚盛德之事敏于絶倫大有為之君審于在巳所以更張庶政憂憫百姓之心至于推廣大恩鎮撫四夷之略無忘夙夜匪懈斯須其志之所存則有孔之卓其行之以力則有禹之勤若夫甄序群村搜揚衆論偏一作寸長一曲之善半辭片説之工逺自巖穴之幽深旁暨草萊之踈賤莫不從容賜對以盡其情委曲因能以收其用可謂三代以後特起之盛時千載以來幾希之加會而臣濫中臺之優秩玷內閣之美名然而荏苒十年周流六郡當陛下闢四門以延天下之士而臣未得一望于清光遇陛下開數路以來天下之言而臣未得少陪於末議蓋兹逺迹最為多竒故雖抱于愚忠每自安于靜晦竊恃皇明之必照終期素蓄之獲伸昨者爰自江吳就更閩粵唶有畏塗之阻藐無將母之因賴上威靈致冦攘之熄滅屬時休慶獲稼穡之豐登既此蒙城且將滿歲輒露由衷之謂果紓及逺之仁召自天涯還之闕下巳慰循陔之念更諧拱極之誠方攬轡以在行復分符而輔外維鄞江之列壤實浙右之名邦素號寬間可容尸素尋敷陳于奏牘冀迎奉于輕輿􅒺是微情未回洪造已宵行而祗命甫夕惕以當官眷是遐陬遘此昭旦來廷之國實為出入之途表海之城方始經營之緒仰荷選掄之寄敢忘策勵之勤矧皆稟于成規庶可圖于薄效再念臣比更逺守久去偏親出自推恩幸兹易地環走巳臨于新部相望猶邇于舊封仰晞天日之光未親户牗俯計晨昏之戀尚隔庭闈眇是羇單了無黨助每益堅于巳志獨有待于主知自效驅馳敢廢資忠之義庶依長育未愆致飬之私傾葵藿之一心極蓬苑之丹懇論酬者在之死無渝仰望冕旒臣不任亳州謝到任表伏奉敕命就差權知亳州軍州事巳于仐月十六日到任上訖比從閩粵中易句章益起堅城以強表海之勢閎開列館以待來廷之賓皆承規畫之餘方始經營之緒程工省費俾無靡敝之􅫉計力與庸俾無發召之役以至屬材能而董事分什伍以庀從已略具于科條可粗施于士吏身方督作匪懈于服勞法有避親遽蒙于易地竊陪京之寵寄申將母之微情輒冒恩榮何堪報稱中謝臣竊觀前籍所載千載以來大道鬱而未彰莫承于古王者疏而不作無甚兹時在理可推久衰必復去五代八姓寖微之弊肇自宋興承一祖四宗丕顯之謨實在陛下蓋繇體粹精之睿質執剛健之純誠運獨斷之明則天清水止昭不殺之武則雷厲風行故能並起百工越熙庶績追二帝三代之甚盛行兩漢有唐之所難使天地人神莫不順序雨暘寒燠罔或違時厥戴德者田耕井飲之倫蓋遊泳于遐邇之內其蒙澤者蟄潛嫗伏之類無殰殈于胎卵之中寶鼎靈芝聲流于樂府來牟加穀實牣于太倉至于武庫斂藏之兵羽林閲習之伎匠盡其巧而工妙擅于一時士盡其材而精鋭軼于近代威靈所覆夷貉允懷是以扶桑戴斗之區度索尋橦之國來于四海之外曽無一歲之虛蓋令不待期而萬里奔走治非有迹而九域阜安可謂不世之宏休難名之盛烈夫應之福者既極其厚則報其貺者必盡其隆方當祕盛禮大樂之文薦諸清廟采增封廣禪之義類乎名山于以較著日新拔出之顯庸闡布天錫永昌之大業臣性姿固塞人品眇微獨于輩流素嗜文學如得􅍢諸金玉述陛下赫赫之功播在管絃紀陛下巍巍之德措之六藝而無愧告諸百世而無疑庶幾不後古人可以昭示來者存于肺腑積有歲時然臣籍雖預于內朝身屢更于外服巳雕零于齒髮久轉走于東南曽未得厠望塵于清蹕之間參第頌于從官之後惟堅悃愊欲效毫分今者獲便飬于親闈預分憂于輔郡上體焦勞之意敢忘夙夜之勤宣化承流方盡駑駘之力望雲就日但傾葵藿之心注傾冕旒臣無賀熙寧四年明堂禮畢大赦表今月十三日樞密院遞到赦書一道以宗祀明堂禮畢大赦天下臣巳即時集軍州官吏將校等宣布訖代以奉承聖考升配上天秩盛禮于法宫推大恩於率土中賀伏惟皇帝陛下有聰明好古之質有恭儉愛人之成兢畏萬機仔肩一德燔柴展報既昭告于元功嚴父致隆又推明于極孝越成釐事均布鴻休草木昆蟲皆令受賜華夏蠻貊莫不歸仁臣心係北辰身縻東土永懷故事難求汶上之圖獨逺清塵方嘆周南之滯想望旒扆臣無任賀熙寧十年南郊禮畢大赦表仐月初七日遞到赦書一道以十一月二十七日南郊禮畢大赦天下者臣巳集軍府官吏將校軍民等宣讀訖伏以人之所歸者莫如德天之所享者在于誠其惟聖王克有全美中賀伏惟皇帝陛下聰明稽古承繼祖宗慈惠愛人撫臨邦國有遍覆并容之大度有防微慎獨之小心不從逰畋不近聲色無紛華盛麗之好無便僻側媚之私歲時吉蠲以承七廟左右順適以奉兩宫其功施于人效見于事則宅仁由義搢紳之徒成材于學校超距踏鞠熊羆之旅飬勇于營屯甌窶汚邪之收充于倉廩關通和鈞之利阜于市㕓家有豫樂之聲人無愁怨之色協氣所召休應自殊鈎陳太微星緯咸若崑崙渤澥波濤不驚近則金石之聲一作音鳥獸欣蹈逺則干羽之舞蠻夷駿奔象齒旅于闕廷龍媒納于間廄是謂六府三事皆可以歌四海九州罔不率俾蓋巍巍而特起非瑣瑣之能窺前世議泰山之封謀梁甫之禪者度崇比大疇克登兹陛下抑而不圖謙以自牧以謂先後一作王創業垂統其功莫得而名上帝隤祉發祥其德無可以稱思所以報一本于心故寅畏嚴恭積之有素而齊明薰祓進而益虔在于物者不取其煩盡諸巳者必求其實是以蕭光之烈奏于宗祊柴燎之蒸焜于郊兆幽隱昭答神靈顧懷無疆惟休方寖昌于萬世不敢專享故敷錫于群元稽參典彛定著赦令弛張從理同異稱情蠲罪青而棄瑕疪録勞能而縱逋負顯晦咸暨洪纎不遺萬國之歡既交於沖漠一人之慶遂及于蚑蠕孚于上下之間極乎帝王之盛臣𬒳學最舊蒙息寖深莫侍甘泉之祠獨嘆周南之滯第從臣之加頌未效薄材望屬車之清塵但馳逺思想仰宸扆臣無任賀元豐三年明堂禮畢大赦表今月二十日樞密院遞到赦書一道以明堂禮畢大赦天下者巳即時集軍州官吏軍民宣讀訖竊以昊天無聲之載人莫能名先帝罔極之恩物何以稱維總章之王位秩宗祀之鴻儀可薦至誠用伸昭報中賀伏惟皇帝陛下躬夙夜之聖質而博古多聞經特起之大猷而虛心廣覽振千齡之墜緒紹三代之遐蹤霈澤之所所􅉼濡太和之所煦嫗華夏蠻貊無一夫不獲其宜草木蟲魚無一物不遂其性爰求祭典用告王功蓋諸儒之説為不經則折衷于孔子而近世之事為非古則取法於周公罷黜異端推明極孝以尊莫大於祖故郊于吉土以配天以本莫重于親故享于合宫以配帝恩義兩得其當情文皆盡其詳徹爼云𥘉均釐甚廣君哉皇矣實難偶之昌期巍乎煥焉信非常之盛禮臣幸逢熙洽未奉燕間一違前蹕之音四遇親祠之慶青雲多士皆預橋門之聽觀黃髮孤生獨歎周南之留滯仰望旒宸臣不任賀克伏交址表伏覩進奏院報安南招討司巳克伏交址其首領李乾德具表乞降者螻蟻之微自投必死乾坤之大終許更生惟德及于幽遐實均慶于中外中賀伏惟皇帝陛下順稽古憲敘正民彛鬯聲教于四方一書文于萬國喑海隅之昧俗肆井底之征謀聖恩所懷凶氣自失雕題交址心服于威靈大賂南金歲遵于貢職允出止戈之武是稱無敵之仁臣逺守藩維獲聞捷奏永懷竊抃實倍常情臣伏恨職守所抣不獲稱慶闕庭臣不任慰慈聖光獻皇太后上仙表今月二十日太皇太后遺誥奄棄宫闈者承問震驚失容號慟臣某誠悲誠感頓首頓首伏以太皇太后表儀三世德首于人倫保佑兩朝功存于王室遽違孝飬未究遐齡無間近踈實均歉慕伏惟皇帝陛下痛貫宸極聖情難居臣伏恨方守印章不獲躬詣關庭臣無任謝賜唐六典表伏蒙聖慈賜臣唐六典一部者冒貢微誠敢徼寵賚獲盈私望特出異恩中謝竊以繼正觀之造邦繼開元之稱治財成唐典本庶務于尚書則象周官綴舊聞于經禮行之當世垂及方耒伏遇皇帝陛下接五聖之休期振千齡之絶業號令風采卑秦漢而不言綱紀文章體唐虞特起爰因廣覽俯逮遺編俾加􅍢板之傳賜及在廷之士顧最踈之庸下忘輒請之妾逾猥荷并容預均蕃錫敢不自強衰退悉意窺尋竊典故之緒餘少俾寡陋審官儀之委曲益勵疲駑臣不任元豐類藁卷之二十七
