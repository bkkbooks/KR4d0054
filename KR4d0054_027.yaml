front:
  text: 元豊類藁卷之二十七
  hash: sha256:16527b305d2e853ad178e24a6a54683877a47d6f2ca9212ee4c1e8b1b30177c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_027-1a}
body:
  text: 表上謝中書舍人表伏承制命授臣試中書舍人者甫上程篇遽塵寵任載惟遭遇倍集兢慙中謝盖聖君難諭之情将𣣔施扵號令得當世能言之士然後逹於文辭矧仐綱理四方弥綸庻政肇惟新之王度備乆簡之官儀計謀常越扵拘挛注錯舉為於希闊豈伊凡庻可測高深方當斍悟邇遐使徧知扵上意訓齊内外用丕変扵群心尤資演暢之林曲盡丁寕之㫖布為邦典兹謂人文頋在臣愚豈堪此選伏况皇帝陛下超逾千載特起一時躬堯帝之聦明而不忘講斈集成湯之勇智而無勸咨詢惟左右前後之臣有耳目腹心之寄尤非淺識所可叨居如臣性實滯蒙器非廣博知自強扵名莭耻隂附扵貴權無因縁毫髮之扳援有積累丘山之忌嫉晩逢睿聖獨賜收憐襃加特異扵常倫進用每從扵中出猥以五朝之大典属扵一介之孤生巳愧缺然将安稱此敢期誤寵仍寘近班敷導訓辭懼空踈之難強追參諷議憂蹇淺之易窮扵風波流落之餘以蒲栁衰殘之質自循涯分曷副㤙荣雖日月之光何加扵潤色而天地之徳無待扵論思然臣索堅好古之誠粗識爱君之義既抗顔而就列敢恕巳以懐私謹當㝷繹舊聞用闡揚扵名命激昻懦志庶𥙷助扵謀猷仰荅主知誓弹臣莭臣無任齊州謝到任表伏奉敕命就差知齊州軍州事巳仐月十六日到任上訖顧以諸生備兹煩使㩀非其所懼不克堪中謝伏念臣素乏他長偶知好學議先王之制作嘗䆒本原論夫子之文章頗探閫奥歴事聖君扵三卋與㳺儒館者十年不知苟曲以取容但信扑愚而自守比縁私計請貳外藩嗟疾病之餘生困米塩之細務方指期扵滿歲将垂翼扵故棲遽此外遷䖏之劇郡維般陽之列壌實季崱之遺區習詐而夸著流風扵在昔多盗與訟號難治扵當仐比試用扵此邦必咨求扵強吏蓋同能而任官者不違其分則量力而受位者得竭其林豈伊儒儒之資可副浩煩之用恐殚精思無𥙷毫分然而繇積累以冐㤙實飬成之有自此盖伏遇皇帝陛下智周萬物明照四方在踈逺迂賤之中而察其所守無左右遊談之助而知其所長故今覆露之仁及此滯蒙之質敢不無忘夙夜勉尽疲駑行歸于周乆自安扵直道老當益壮誓無易扵𥘉心仰望闕庭臣無任㐮州到任表伏奉敕命就差權知㐮州巳扵今月二十七日到任上訖縁同氣之私㤙陳便親之微志就更善郡得侍安輿中謝伏念臣素堅向斈之心幸遇好文之主備名儒舘十有三年然而三易外邦五回星歳比亦再過扵雙闕未嘗一對扵清光常存傾藿之誠雖知向日居有戴盆之势何以望天而臣昨治濟南最為煩劇野有群行之盗里多武断之豪馴致肅清始熄㐫殘之害自強柔懦頗殚竭蹙之劳仐者或就安閑少休疲鈍出觀美俗尤多漢廣之高入奉慈顔不憫汝墳之瘁兹為竊冐厥有端原此盖伏遇皇帝陛下奨引士倫推崇世敎小藝片言之善偏長一曲之材皆欲飬成未嘗棄廢故令優佚俯及孤蒙敢不附慰此民宣明上徳永念沉碑之舊自頋何功未忘投博之勤庻㡬小𥙷臣無任洪州謝到任表伏承敕命就差臣權知洪州軍州事充江南西路兵馬都鈴轄巳扵仐月二十四日到任上訖撫臨便郡獲奉扵親闈総制属城寔兼扵故里中謝伏念臣志雖擇善材不過人玩思詩書無出倫之異見逰心翰墨多渉俗之塵言竊食累朝備官儒館智非早悟曽不習扵人情學匪兼通固難堪扵世用兹縁私請得假善藩惟八換扵歲㫷巳四臨扵外服幸遇非常之主未奉燕閒實當難得之時獨無稱效儻獲伸扵肝膈冀少益扵毫分伏惟皇帝陛下恭儉爱人聦明好古卑漢唐之近事慕堯舜之逺圖臣敢不上体聖心勤脩民政奉行寛大方盡瘁扵兹時𥙷助高深庶納忠扵来日仰望旒扆臣無任福州謝到任表伏奉敕命授臣守本官直龍圖閣就差權知福州巳扵今月初九日到任上訖列軄内朝分符督府荷收憐之俯及省孤陋以何堪中謝伏念臣蹇薄多艱戅愚少與遇継承扵興運未進望扵清光至扵九換歲暮常從外徙四臨州部曽未代還兹者備延閣之美名假東甌之劇郡頋惟同氣亦預改藩但虞人品之輕莫稱主㤙之厚然臣最爲寒族實奉偏親臣弟既適扵遐陬臣愚固難扵逺役理當懇請輙奉冐聞雖未賜扵矜從亦終寛扵僣黷頗識事君之義敢忘奔命之恭惟皓首之慈闈抱累年之宿疹牽衣辭訣泣涕分馳計音信之徃来殆将萬里阻晨昏之㝎省各在一涯足感動扵人情况親逢扵孝治草苑弱質素依及物之仁犬馬㣲誠終冀因心之恕再念臣撫臨城邑劳問士民皆狎䖏扵太寕但遵行扵明詔則臣實慚尸扵廪食曷𥙷報扵寵靈皆出誤知致思冐䖏伏惟皇帝陛下多能天縦盛徳日新躬神聖之姿而兼容小善履富貴之極而深逹下情在扵隱恤之心豈間么㣲之跡敢不誓殚勤瘁匪懈夙宵慰海徼之幽荒布徳音之寛大承流寵寄方自效扵驅馳反哺愚情冀尚蒙扵憫惻仰望旒扆臣不任明州謝到任表敕臣扵去年十二月扵江寕府准福州公文送到敕牒一道就差臣權知明州當月十八日扵真州㩀進奏官伏准中書孔目房帖子臣乞迎侍老母赴任不行巳於今年正月二十五日到任上訖預扵分土愧在假人竊自省循懼無報稱中謝伏惟皇帝陛下有聦明睿智固天縱之高姿有恭儉慈仁不世出之琦行上嘉尭舜之際下悼漢唐之間以超曠之迹為可追以苟簡之治為無取甚盛徳之事敏扵絶倫大有為之君審扵在巳所以更張庻政憂憫百姓之心至扵推廣大㤙鎮撫四夷之略無忘夙夜匪懈斯湏其志之所存則有孔之卓其行之以力則有禹之勤若夫甄序群村蒐揚衆論偏一作寸長一曲之善半辭片說之工逺自巖穴之幽深旁暨草莱之踈賤莫不從容賜對以盡其情委曲因能以收其用可謂三代以後特起之盛時千載以来㡬希之加㑹而臣濫中䑓之優秩玷内閣之羙名然而荏苒十年周流六郡當陛下闢四門以延天下之士而臣未得一望扵清光遇陛下開数路以来天下之言而臣未得少陪於末議盖兹逺跡最為多竒故雖抱扵愚忠每自安扵静晦竊恃皇明之必照終期素蓄之獲伸昨者爰自江呉就更閩粤唶有畏塗之阻藐無将母之因頼上威靈致冦攘之熄㓕属時休慶獲稼穡之豊登既此蒙城且将滿歲輙露由衷之謂果紓及逺之仁召自天涯還之闕下巳慰循陔之念更諧拱極之誠方攬轡以在行復分符而𥙷外維鄞江之列壌寔浙右之名邦素號寛間可容尸素㝷敷陳扵奏牘冀迎奉扵輕輿􅒺是微情未回洪造已宵行而祗命甫夕惕以當官眷是遐陬遘此昭旦来廷之國實為出入之途表海之城方始經营之緒仰荷選掄之寄敢忘筞勵之勤矧皆禀扵成䂓庶可圖扵薄効再念臣比更逺守乆去偏親出自推㤙幸兹易地環走巳臨扵新部相望猶邇扵舊封仰晞天日之光未親户牗俯計晨昏之恋尚隔庭闈眇是覉单了無黨助毎益堅扵巳志獨有待扵主知自効駆馳敢廢資忠之義庶依長育未愆致飬之私傾葵藿之一心極蓬苑之丹懇論醻者在之死無渝仰望冕旒臣不任亳州謝到任表伏奉敕命就差權知亳州軍州事巳扵仐月十六日到任上訖比從閩粤中易句章益起堅城以強表海之勢閎開列舘以待來廷之賓皆承䂓畫之餘方始經营之緒程工省費俾無靡敝之􅫉計力與庸俾無發召之役以至屬材能而董事分什伍以庀從已略具扵科條可粗施扵士吏身方督作匪懈扵服劳法有避親遽蒙扵易地竊陪京之寵寄申将母之微情輙冐㤙荣何堪報稱中謝臣竊觀前籍所載千載以来大道鬱而未彰莫承于古王者䟽而不作無甚兹時在理可推乆衰必復去五代八姓寖㣲之弊肇自宋興承一祖四宗丕顯之謨實在陛下盖繇体粹精之睿質執剛徤之純誠運獨断之明則天清水止昭不殺之武則雷厲風行故能並起百工越熈庶績追二帝三代之甚盛行两漢有唐之所難使天地人神莫不順序雨暘寒燠罔或違時厥戴徳者田耕井飲之倫盖㳺泳扵遐迩之内其蒙澤者蛰潜嫗伏之類無殰殈扵胎卵之中寳鼎靈芝聲流扵樂府来麰加糓實牣扵太倉至扵武庫歛蔵之兵羽林閱習之伎匠盡其巧而工妙擅扵一時士盡其材而精銳軼扵近代威靈所覆夷貉允懐是以扶桑戴斗之區度索㝷橦之國来扵四海之外曽無一歳之虚盖令不待期而萬里奔走治非有跡而九域阜安可謂不世之宏休難名之盛烈夫應之福者既極其厚則報其貺者必盡其隆方當秘盛禮大樂之文薦諸清廟采増封廣禅之義類乎名山扵以較著日新㧞出之顯庸闡布天錫永昌之大業臣性姿固塞人品眇微獨扵軰流素嗜文學如得􅍢諸金玉述陛下赫赫之功播在筦絃紀陛下巍巍之徳措之六藝而無愧告諸百世而無疑庶㡬不後古人可以昭示来者存扵肺腑積有歲時然臣籍雖預扵内朝身屡更扵外服巳彫零扵齒髮乆轉走扵東南曽未得厠望塵扵清蹕之間參第頌扵從官之後惟堅悃愊欲効毫分今者獲便飬扵親闈預分憂扵輔郡上体焦劳之意敢忘夙夜之勤宣化承流方盡駑駘之力望雲就日但傾葵藿之心注傾冕旒臣無賀熈寕四年明堂禮畢大赦表今月十三日樞密院遞到赦書一道以宗祀明堂礼畢大赦天下臣巳即時集軍州官吏将校等宣布訖代以奉承聖考升配上天秩盛禮扵法宫推大㤙於率土中賀伏惟皇帝陛下有聦明好古之質有恭儉愛人之成兢畏萬機仔肩一徳燔柴展報既昭告扵元功嚴父致隆又推明扵極孝越成釐事均布鴻休草木昆蟲皆令受賜華夏蛮貊莫不㱕仁臣心係北辰身縻東土永懐故事難求汶上之圖獨逺清塵方嘆周南之滯想望旒扆臣無任賀熈寕十年南郊禮畢大赦表仐月初七日遞到赦書一道以十一月二十七日南郊禮畢大赦天下者臣巳集軍府官吏将校軍民䓁宣讀訖伏以人之所歸者莫如徳天之所享者在扵誠其惟聖王克有全美中賀伏惟皇帝陛下聦明稽古承継祖宗慈恵爱人撫臨邦國有徧覆并容之大度有防微慎獨之小心不從逰畋不近聲色無紛華盛麗之好無便僻側媚之私歲時吉蠲以承七廟左右順適以奉两宫其功施扵人効見扵事則宅仁由義搢紳之徒成材扵學校超距蹋鞠熊羆之旅飬勇扵营屯甌窭汚邪之收充扵倉廩関通和鈞之利阜扵市㕓家有豫樂之聲人無愁㤪之色恊氣所召休應自殊鈎陳太微星緯咸若崑崙渤澥波濤不驚近則金石之聲一作音鳥獸忻蹈逺則干羽之舞蛮夷駿奔象齒旅扵闕廷龍媒納扵閒廐是謂六府三事皆可以謌四海九州罔不率俾盖巍巍而特起非瑣瑣之能闚前世議㤗山之封謀梁甫之禪者度崇比大疇克登兹陛下抑而不圖謙以自牧以謂先後一作王創業垂統其功莫得而名上帝隤祉發祥其徳無可以稱思所以報一本扵心故寅畏嚴恭積之有素而齊明薫祓進而益䖍在扵物者不取其煩盡諸巳者必求其實是以蕭光之烈奏扵宗祊柴燎之蒸焜扵郊兆幽隱昭荅神靈顧懐無疆惟休方寖昌扵萬世不敢專享故敷錫扵群元稽參典彛定著赦令弛張從理同異稱情蠲罪青而棄瑕疪録劳能而縦逋負顯晦咸暨洪纎不遺萬國之歡既交於冲漠一人之慶遂及扵蚑蠕孚于上下之間極乎帝王之盛臣𬒳學最舊蒙息寖深莫侍甘泉之祠獨嘆周南之滯第從臣之加頌未効薄材望属車之清塵但馳逺思想仰宸扆臣無任賀元豊三年明堂禮畢大赦表今月二十日樞宻院逓到赦書一道以明堂礼畢大赦天下者巳即時集軍州官吏軍民宣讀訖竊以昊天無聲之載人莫能名先帝罔極之㤙物何以稱維緫章之王位秩宗祀之鴻儀可薦至誠用伸昭報中賀伏惟皇帝陛下躬夙夜之聖質而博古多聞經特起之大猷而虚心廣覽振千齡之墜緒紹三代之遐蹤霈澤之所所􅉼濡太和之所煦嫗華夏蛮貊無一夫不獲其宜草木蟲魚無一物不遂其性爰求祭典用告王功盖諸儒之說爲不經則折衷扵孔子而近世之事爲非古則取法於周公罷黜異端推明極孝以尊莫大於祖故郊扵吉土以配天以本莫重扵親故享扵合宫以配帝㤙義两得其當情文皆盡其詳徹爼云𥘉均釐甚廣君㦲皇矣實難偶之昌期巍乎煥焉信非常之盛禮臣幸逢熈洽未奉燕間一違前蹕之音四遇親祠之慶青雲多士皆預橋門之聴觀黄髮孤生獨歎周南之留滯仰望旒宸臣不任賀克伏交阯表伏覩進奏院報安南招討司巳克伏交阯其首領李乾徳具表乞降者蝼蟻之㣲自投必死乾坤之大終許更生惟徳及扵幽遐實均慶扵中外中賀伏惟皇帝陛下順稽古憲叙正民彛鬯聲敎扵四方壹書文扵萬國喑海隅之昧俗肆井底之征謀聖㤙所懐㐫氣自失雕題交阯心服扵威靈大賂南金歲遵扵貢職允出止戈之武是称無敵之仁臣逺守藩維獲聞捷奏永懷竊抃實倍常情臣伏恨職守所抣不獲称慶闕庭臣不任慰慈聖光献皇太后上仙表今月二十日太皇太后遺誥奄棄宫闈者承問震驚失容號慟臣某誠悲誠感頓首頓首伏以太皇太后表儀三世徳首扵人倫保佑两朝功存扵王室遽違孝飬未䆒遐齡無間近踈實均歉慕伏惟皇帝陛下痛貫宸極聖情難居臣伏恨方守印章不獲躬詣關庭臣無任謝賜唐六典表伏蒙聖慈賜臣唐六典一部者冐貢㣲誠敢徼寵賚獲盈私望特出異㤙中謝竊以継正觀之造邦継開元之稱治財成唐典本庻務扵尚書則象周官綴舊聞扵經礼行之當世垂及方耒伏遇皇帝陛下接五聖之休期振千齡之絶業號令風采卑秦漢而不言綱紀文章体唐虞特起爰囙廣覧俯逮遺編俾加􅍢板之傳賜及在廷之士顧最踈之庸下忘輙請之妾逾猥荷并容預均蕃錫敢不自強衰退悉意闚㝷竊典故之緒餘少俾寡陋審官儀之委曲益勵疲駑臣不任元豐類藁卷之二十七
