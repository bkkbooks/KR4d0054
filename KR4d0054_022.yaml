front:
  text: 元豐類藁卷第二十二
  hash: sha256:c90a787293b0b8faf5805c2cbede037c9a46f61193d6ed585aba316fde24770c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_022-1a}
body:
  text: 制誥吳居厚京東轉運副使吕孝廉轉運判官制敕具官某朕進拔能吏以督視一路蓋州縣政令之舉措公私貨食之斂散莫不任焉得人之難考擇惟慎以爾幹敏閲試惟舊用是分兹東部屬以使事夫施于民者厚而刑罰清求于民者約而財用贍使德流澤通而風化輯穆以稱朕憂憫元元而勵精庶務之意爾其勉矣往服訓辭可西頭供奉官武遂等轉官制敕具官某王師西出以討不庭爾能殱擊凶殘恢復州聚録功增位不以次遷勉服朕恩益思奮勵可曲珍四廂都指揮使綘州防禦使制敕具官某羌之獸心內相危害王師簿伐蓋將天威爾能躬將士從摧堅殪敵斬捕甚衆鼓行無前周衛典軍之官名城禦侮之寄兼是寵數以疇爾庸尚有異恩待爾來效可文思使張俊等遷官制敕具官某朕爰命六師奉辭西伐爾能效其忠勇深入羌中獲醜摧堅以捷奉上躐升位等以懋爾勞其能繼于前功朕豈穡于信賞可文及甫吏部員外郎制敕具官某朕正百工之名而將責其實效其官吏考擇尤慎天官之屬僉曰汝能其往欽哉無忘勉勵可許安世都官員外郎制敕具官某徒隸傭役之人典其廢置而時其遷序主以郎吏其選甚高爾蚤以敏明升華儒館冝增階等往涖厥職尚思勉懋以稱東求可皇伯宗諤贈太尉韓王制敕王者之于天屬覆之以光榮而恤其死喪之戚所以本人倫教天下也具官某以德則循理小心始終無悔以功則受命仁祖趣㝎儲極以位則渠門赤寫任兼相將以爵則躐于五等列為真王以親則先帝之從父兄而余曰伯父顯名美實福祿之全可謂盛矣奄遘癘疾至于不起余聞震悼臨奠致哀再不御朝以伸情禮是用追加書贊進秩上公啓此火邦隆崇號稱余于親親之恩可謂備矣尚惟不昧服此寵章可齊宗夀三班惜職制敕某有司言爾滿歲當遷而奬進爾勞又當躐等是用加兹寵渥列于命秩往惟祗服以稱甄收可交州進奉使副梁用律洛菀副使阮倍太常博士制敕具官某䇿名蕃服納貢王庭將事之勤朕用甄録進其位等兹惟舊章往稱茂恩母忘祗恪可皇伯宗惠新婦郭氏進封郡夫人制敕具官某新婦某氏司宗于屬為近于位為重王于爵為貴蓋禮秩之見于外者既寵則施于內者宜殊爾德性淑均稱其家室爰加象服之盛以大鵲巢之榮其尚欽承兹為異數可賈昌衡知鄧州制敕記舊俗者稱南陽之民夸奢上氣力難制御今其餘習殆尚有存者故有邦之任朕不輕以屬人具官某中外踐更令聞惟舊兹用考擇往分彼土蓋穰淯間雖俗雜難治然教民敦本興于好善召信臣杜詩之遺迹在焉使農桑勸而風俗厚爾尚思繼于前人其往懋哉無替朕命可李良輔知廬州張佇陜州崔度蔡州王説徐州制敕具官某朕董正治官自朝廷始至于六服群吏莫不考循其名以督課其實夫宣恩德以逮下厚風俗以承上其選為重者非長民之任乎爾惟其人屬以兹位蓋奉職遵禮以有循良之稱苟能自勉則寵勞録最以明國家之典朕敢忘哉往欽厥司方稽爾效可知泉州陳稱梓州吳幾復湖州唐淑問並任制敕具官某吏之奉職循理能附其民使之久于其官則上下相安而治化易洽今爾之材宜于既試俾仍舊服以懋厥庸尚躰朕恩益思逺效可吳安持太㒒少卿制敕具官某車府廄馬牧監之政典以卿士其選甚高念非得人曷贊其治爾材質明茂嘗更器使以憂去位既終喪紀宜更階等往二厥官其勤夙宵以敏功實可菊曩二右班殿直制敕具官某夷獠背恩賊殺命吏爾能擊刺醜類獻其首級宜升位序以奬爾勞尚勵壯圖益思來效可馮正符借職制敕某西南夷背德獸心敢窺邉隙爾能通宣兩誼協助軍謀宜進官榮屬之守謢勉思奮勵無替前功可奉議郎景思誼授東上閣門使鄜延第一副將制敕具官某西討之兵有陳戰之功者朕無不録爾能致其材武奮擊黠羌克敵摧鋒屢以捷報疇庸較實冝有異恩介上閣之使名二連營之將領兹為奬拔蓋匪常科尚勵壯謀益思來效可皇太后親姪高公繪通州刺史高公紀逹州刺史制敕具官某等朕有顯親之心𣣔形于天下故加恩母黨所以本人情隆世教也爾等皆于外家實在近屬持身恭慎朕所識察刺臨州郡典視祠宫秩寵地優並膺拔用尚勵爾欽承之志以稱余廣愛之仁可梅福封夀春真人制敕某在漢之際數以孤逺極言天下之事其志壯哉晚而家居讀書飬性卒遺俗高蹈世傳為仙今大江之西實存廟像禱祠輒應能澤吾民有司上聞是用錫兹顯號光靈不泯其服朕恩可卓順之直翰林醫官局等制敕某稽其醫事而制其食先王之典也屬以愛主之疾爾能調治有瘳是用寵以官榮進其服品往遵厥職無替恪恭可成卓閣門祗候制敕具官某長川廣谷之間與蠻夷壤接爾處徼巡之任能練逹人情輯寧疆候守邉之臣稱爾之材謂難代易是用進爾職于上閣而俾恭其舊服朕于念勞奬善之心可謂至矣其思綏靖以稱朕恩可溪氊本族副都軍主等制敕某守邉之臣屬爾奉其方物來獻闕庭朕惟爾嘉是用命爾還其種落典治一軍往勵忠勤益思來效可景青冝黨令攴團練使阿星刺史制敕某爾有摧鋒克敵之功而又奉其方貢來見闕廷實勇且忠法當甄進兵團之任以寵爾勞往其祗服益忠來效可論氊巴柯族軍主結厮雞柯族副軍主制敕某爾父有嚮慕中國之心殁而不遂其志屬爾于朕願備一官朕甚憐之是用加命爾秩往其祗服益勵忠勤可阿憐官捉厮雞並本族副軍主制敕某爾父效貢來庭因得進見以爾為請願備一官朕嘉其尊嚮中國之勤是用錫爾命秩往思忠恪以稱朕恩可內一段作爾父因其種人入修貢聀以爾為請溫皓知欽州制敕某州有兵民之寄而地在疆埸之間則常擇用林武之臣屬之守禦之任爾以能進往祗厥服尚思綏靖以稱簡求可劉安等中書省主事令史制敕具官某等右省詔命之所出也吏治文書非習法令熟成事不能稱其任爾等皆以命秩往祗乃服無忘恭恪以慎厥司可知頴昌府韓維再任制敕朕待天下之士未嘗不篤于恩況于故舊之臣朕所加厚則于順遂其意夫何愛哉具官某昔在宫朝事朕左右今列職祕殿位寵且親而便其故鄉屬以州任雖歲既再滿然重奪其志是用仍其舊服俾祗厥官以致朕求舊之仁尚勵爾在公之義可米贇等轉官制敕具官某爾以衆西出討擊羌虜斬獲首級有司以聞是用甄録爾功躐升位等往其勉矣益勵壯圖可雍王皓乳母宋氏贈郡君制敕某氏惟雍王皓於國屬之親且愛而爾有乳飬之勤故其生也錫之爵邑其殁也飾以恩榮是用追命爾封進于列郡以光幽穸尚服寵章可豐稷吏部員外郎制敕具官某尚書正本而吏部天官所以綜敘群材以成天下之治郎于典領其選甚高是用擢爾之能俾參厥服朕方勵精政理而務在得人爾惟懋于其官庶幾承朕之志可吕和卿考功員外郎制敕具官某計群吏之治而明黜陟之法臺郎典領列于左曹拔用爾能俾參厥位夫能善于其職固將圖爾之勞可韓晉卿莫君陳刑部郎中制敕具官某刑者所以助治而聖人之所尤慎中臺參綜郎選甚高爾曉逹吏方宜在兹任夫惟篤于明恕可以副朕欽恤之心其往懋哉以祗厥敘可范諤知密州范子諒濮州劉士彥泗州制敕且官某守土之官民事所屬朕方勵精庶政之日尤務在于得人考擇于朝爾往惟允夫能宣布恩德以拊循吾民而綱理風俗則為能稱其任爾其可不勉歟陳端翰林醫官制敕某爾父易簡以醫入侍處劑湯液有勞可旌進遷爾官用申奬寵往惟祗恪以稱朕恩可沈士安西綾錦副使制敕具官某明習禁方以醫入侍處劑湯液有勞可旌進二使名以申奬寵往承厥敘無替爾勤可王瑛楊宗三班借職制敕某爾等備吏屬治文書勤亦久矣是用從爾之請錫之命秩往惟祗飾以稱朕恩可王從伾知岢嵐軍制敕具官某崇築壘培本以輯治軍旅及四方既平而假守之臣實任民事列于有土之官矧嵐谷並邉寄屬尤慎爾以選擇往祗朕命夫能開示恩威以惠飬吾人而懷附異俗則為善于其職尚思爾守無替訓辭可吕升卿館閣校勘通判鄆州制敕具官某鄆有提封之廣生齒之衆于東為極郡贊二政理選授惟艱爾蚤以藝文列於辭館宜更階品往承厥敘無忘祗慎以服朕恩可陳康民管勾永興等路常平張太寧提舉秦鳯等路常平制敕具官某等朕為保伍之法寓耕戰之政典農之官屬以兼領蓋分路而治隃制或難固當從宜使之易地是用命爾換部而使夫能利力田之民修講武之令各奮爾庸不失其職則為能體朕意其尚懋哉往遵乃服可早行知無為軍制御史有言責之臣朕之所取信也言而欲遂其忿鬩之私乃至于失是非之當豈獨朕于取信失其所屬蓋汝之以言為職誼豈當然俾去憲臺兼榮職秩往臨軍壁冝躰朕心駙馬都尉王師約轉觀察使制朕于姻戚之臣未嘗不篤于恩意然其積勤纍善不罹罪悔而七歲一遷其官則必循用舊章蓋爵賞者天下之至公朕不敢以私撓法也具官某出于景族選上貴主有淑慎之行無怠肆之失第其閥閲冝得敘升廉按一州以為爾寵蓋爾自𥘉仕迄再增厥位皆以歲滿應于遷格則朕之謹于信賞爾之安其常守上下之際豈不兩義俱得哉無忘勉勵以永保于榮名可崔象先等帶御器械制敕具官某乘輿所在供御之物無一不備具者故鎧甲弓矢屬之以從者亦不去于側非左右親信惡足以任此哉爾給事惟舊冝就兹列益思祗恪以稱厥官蔡京起居郎制敕具官某王者言動必書豈獨思為後嗣法哉施之于已固欲擇語默慎行止也執簡肆筆必也屬之其人爾之苐卞既巳列于右史今復不次用汝使記豫事位于左省士之在此選者希矣而爾之叔李並直同升其于榮遇世罕及者朕恩若此則汝之自效冝如何哉其懋厥修以報所受可王中正种諤降官制朕大興士衆屬爾等以伐羌固將舉其巢穴非徒郤虜收並塞之地而巳兵西出則近而爾等東繇綏德回逺之路以疲士馬費芻粟致功用不集中正議既不審又約有分地當考其左而不能奪擊以殱除醜類夫軍賞吾必信而罰亦安得巳哉是用按爾之罪降秩有差其躰寬恩尚思報稱可封曺諭母制曹氏國之外屬而諭實爾之出諭既有列于朝亦有追榮及爾是以封之列郡秩以寵名兹為異恩以光幽窆張知均州制嶺之西南桂為劇部外有溪居海聚之民壤錯內屬拊巡填守詎可屬非其人爾比選于朝往備兹任而內不能統齊士吏外不能綏靖華夷致兹繹騷自于邦憲奪其美職處爾偏州茲惟朕恩無忘思省可元豐類藁卷第二十二
