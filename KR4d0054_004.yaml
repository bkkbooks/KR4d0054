front:
  text: 元豐類藁卷之四
  hash: sha256:8a155ab96cef34347b2e6dac76239ad96c9fe3a0ec8aa8150dc97ec81cf6b561
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0054_SBCK_004-1a}
body:
  text: 古詩降龍降龍左右施襟𥚑兩廊夾廟深渠渠禮下天子一等爾衣服君處何其殊文幡列戟照私第青紫苦若官其孥先後熒煌首珠翠侍者百十顔溫瑜凝寒墮指熱侵骨一宴百盞傾金壺窮民疾首望雨露太上欲倚攀姚虞君胡為乎日時病槖針襆艾恬以愈生前赫赫浪自重身後沒沒寧非愚湘冠衡湘有寇未誅剪殺氣􅏮凛圍江潯北兵居南匪便習若以大舶乘高岑傖人操兵快如鶻千里其旅巢深林超突溪崖出又伏勢變不易施戈鐔能者張弓入城郭連邑纍鎮遭驅侵群黨爭誇殺吏士白骨棄野誰棺衾貔貅數萬直何用月費空巳逾千金楚為貧鄉乃其素應此調彂寧能禁捷如馬援不得志強曵兩足登嶔崟烏蟻睢盱倚嵓險此虜難勝端非今較然大體著方册唯用守長懷其心祝良張僑乃真選李瑑道古徒為擒嗚呼廟堂不慎擇彼士齪齪何能任大中咸通乃啇鑒飬以歲月其憂深願書此語致太史獻之以輔丹扆針地動居聞元氣判為二升降相輔非相傷今者無端越疆畔隂氣熖熖侵於陽陽收剛明避其勢隂負捷勝尤倡佯地乘是氣抗於下震蕩裂拆乖其常齊秦晉代及荆楚千百其堵崩連牆隆丘桀屋不自定翩若猛吹搖旌幢生民洶洶避其所如寄厥命於湖江有聲四出嘻可怕誰擊萬鼓何雷硠隂為氣靜乃如此天意昧密寧能詳或去蠻夷尚侵軼已事豈必垂災祥意者邪臣有專恣氣象翕翕難為當據經若此非臆決皎如秋日浮青霜祖宗威靈陛下聖安得直語聞明堂朝廷肅穆法度治豈用凛凛憂胡羌邉將太祖太宗能得人長壘橫邉遮虜塵太傳李漢超侍中何繼筠二子追接吳與孫鎮齊撫棣功業均卓哉相宗信英特明如秋泉斷如石一朝出節合二子口付心隨斷纎惑靡笄之旁郡城下酒利啇租若山積二子開庫啖戰士以屋量今剩量帛洪濤入坐行酒杯牛胾羊蒸委若灰歲費巨萬不計籍戰士歡酣氣皆百二子按轡行邉隅牙纛宛轉翻以舒汛掃沙磧無纎埃塞門千里常夜開壯耕老餔安且愈桑麻蔽野華芬敷濟南逺清書樂石百井夜出催窮廬神哉祖宗知大體趙任李牧真如是漢文齷齪豈足稱郎吏致激靣汙騂當今差夷久偈蹶兵如疽癰理須決堂堂諸公把旄鉞碩䇿神韜困羈細祖宗憲度存諸書爐若白日明天衢國容軍政不可亂薦此以為陛下娛多雨嗟江之濵地多雨冬雷不收開蟄户隂氣濁晦化為霧或雲於山水礎雜花萬株紅與紫臘吹風吹開不可數入春十日寒始至春氣欲歸客格住群山巉空雪相亘榷折草木何可禦霖傾潦洶那復止穹林大丘滅無渚及今孟夏理冝熱重喪無溫坐當午四時云然了安謂吁吾有愁誰可語秋日隂氣先嬴縱秋熱時莭有幾相與奪情知赫日不可久須聽西風生木末浮雲滿天明復暗天意自然如慘怛園林秀色已漸失次苐豈能無葉脫南山獨佳不可挫氣象更清連日月燕飛度海向何處今去昔來真可劣繡簾錦幕不算重從此朱門戒霜雪誰憐丱角歌者哀歲歲苦貧思短褐山水屏吳縑落寒機舒卷光亂目秋刀剪新屏尺寸隨折曲搜羅得􅎇匠徙倚思先屬經營頃刻內千里在一幅定視乃漸通紀一作悉數難迫促山亂若無窮負抱頗重復高稜最當中桀大勢尤獨回環衆峯接趨向若奔伏矜雄跨九州爭險桂星宿深疑雪霜積暗覺煙霧觸泉源出青冥漲潦兩崖束歷逺始紆徐派别輸衆谷輕舟漾其間沿泝無緩速微尋得修徑側起破蒼麓逺到無限極窮升犯雲族遊子定何之顧盻停馬足盤石長自間空源偶誰築塵氛見荒林物色存古俗粲粲弄幽花蒼蒼蔭嘉木遺牛上巖顛驚鹿出槎腹鮮明極萬狀指以才一粟雖從人力為頗類隂怪續深堂得欹眠高枕生逺矚餘光耀衾幬清意凝幔褥愚訶世幸略慵卧嗜尤酷因能助佳夢肯顧躋杲旭將相有時林溪嵓真我欲儒林耻未博俗穽思自續婚嫁纍苟輕耕釣吾已十圖屏持自慰窹寐心思逐八月二十九日小飲隂陽在天地鼓吹猶槖籥煩蒸翕已盡灝氣乃浮薄群山翠相抱塵靄如洗濯川源亦虛徹泒别歸衆壑囂音滅蛙蚓徑意動雕鶚蠅蚊自不容雖有類鉗縛驅之舊苦衆忽去寧匪樂俯仰自醒然意適忘體瘼天運雖巳晏生物固未剝薑芋圃可掘禾黍田始穫脫苞紫栗迸透葉紅梨渥幽花媚清景鮮藂耀新萼西風動孤格露曉愈修擢能終犯寒泫詎可忽纎弱况當九日近家釀成巳昨溫顔几杖適弱質衣冠恪閨門自可會非必千里約筝匏出人指邐迤奮宫角𥘉言小人獻終拜長者酢清言喜自洽細故憂可略幸無職事顧况荷租賦薄讀休暇得醉且吟噱食梨今歲天旱甚百穀病已久山梨最大樹屬此亦乾朽當春花盛時雪滿山前後常期摘秋實穰穰落吾手忽驚冰玉敗不與膏澤偶清朝起周覽映葉才八九閖居問時物此説得溪叟貧齋分寂絶塵抱徒噎嘔寧知蕭條內把握忽先有食薪恐非稱分少覺已厚開苞日星動落刃冰雪剖煙潯擇新汲逺負盈素缶英茟兩相發光彩生户牗𥘉嘗密經齒久嚼泉垂口蠲煩慰諸親愈渴欣衆友肯視故畦瓜寧論濁泥藕歲晚迫風霜人飢乏藜糗真味雖暫御未許置樽酒追租耕耨筋力苦收刈田野樂鄉鄰約來往樽酒追酬酢生涯給俯仰公斂忘厚薄胡為此嵗暮老少顔色惡國用有緩急時議廢量度內外奔氣勢上下窮割剝今歲九夏旱赤日萬里灼陂湖蹙埃􅝙禾黍死燒確衆期必見省理在非可略謂須倒廪賑詎止追租閣吾人巳迫切此望亦迂邈奈何呻吟訴卒受鞭捶却寧論救憔悴反與爭合籥問胡應驅迫久巳罹匱涸計須賣強壯勢不存尫弱去歲巳如此愁呼遍郊郭飢羸乞分寸斯須死笞縳法令尚修明此理可驚愕公卿飽天祿耳目知民瘼忍令瘡痍內每肆誅求虐但憂值空虛寧無挺犂钁暴吏體冝除浮費義可削吾卧避囂喧兹言偶斟酌試起望遺材霾風振墟落桐樹棄地瓦礫間兹桐偶誰樹憶見擁西牆俄成劃煙霧得時花葉鮮照影清泉助當軒蔽赤日對卧醒百慮惜哉稟受弱妄使鸞鳯顧啇聲動猶微秀色觸巳沮泫摧亂繁條逼迫畏清露暄晴幸未闋飄落儻可拒噫號衝颷回激射隂霰聚此勢復可言瞪視空薄暮九月九日凄凄風露滋靡靡塵靄屏巳欣廬舍清未苦裘褐冷眠食味尤嘉起坐日尚永虛天照積水精鑑出幽礦石瑩見山稜林踈覺窗囧黃花宿蕊破艷艷晨粧靚頻尋逺徑香每舜蒼池影為誰佳色鮮慰我貧齋靜寒醅出家法異果得他境甘腴饌新兔醜怪薦修蒲猛反幽間重時節老大珍物景獻酬興未薄比諷思猶騁况同親戚歡詎匪田野幸俱醉任栖蟂燭炬尚可秉路中對月山川困遊人而不斷歸夢其餘惟日月朝夕南北共日光驅人身擾擾逐群動鄉思須暫忘世事那止重豈如月可喜露坐惜倥偬清明入襟懷萬里絶纎霿愛之不能餐但以目睛送想知吾在廬皎皎上修棟慈親坐高堂切切兒女衆憐其到吾前不使降惟懞豈不映時節荏苒更季仲而我去方急其能計歸鞚我非土木為耳目異聾瞢念之曷由安腸胃百憂中何言月下喜喜意亦有用為其同此時水木光可弄猶勝夢中事記之聊一誦聽鵲寄家人鵲聲喳喳寧有知家人聽鵲占歸期物情固不等人事爾意自驚思别離秋風粲粲正可愛黃菊芙蓉開滿枝春風千樹變顔色逺水靜照紅霞衣梧桐楊柳豈知數沙走露冷銀床欹新黃暗緑各自媚爛熳末減春風時誰言秋物不可賞人意自移隨盛衰山田正冷酒味美禾黍半收雞鴈肥霜梨野栗處處有雪密薦口清香隨鄊園物物可想見我意柢隨魂夢飛家人未用占鵲語應到婦時眷亦歸讀書亦云􅉝卯嵗讀書吾性雖嗜學年少不自強所至未及門安能望其堂在苒歲云暮家事已獨當經營食衆口四方走遑遑一身如飛雲遇風任飄揚山川浩無涯險怪靡不嘗落日號虎豹吾未停車箱波濤動蛟龍吾方進舟航所勤半天下所濟一毫芒最自憶往歲病軀久羸尫呻吟千里外蒼黃值親喪母弟各在逺計歸恐驚惶凶禍甘獨任危形載孤艎﨑驅護旅櫬𬗟邈投故鄉至今驚未定生還乃非常憂慮心膽耗馳驅筋力傷况已近衰境而常犯風霜驅之久如此負痾固宜長朝脯暫一飽百回步空廊未免廢坐卧其能視縑緗新知固云少舊學亦巳忘百家異旨趣六經富文章其言既卓闊其義固荒茫古人至白首搜窮敗肝腸僅名通一藝著書欲煌煌瑕庇自掩覆後世更昭彰世久無孔子指畫隨其方後生以中才胸臆妄度量彼專猶未逹吾慵復何望端憂類童稚習書倒偏傍况令議文物規摹詎能詳輪轅孰曉直冠蓋熟纁黃圭璋國之器孰殺孰鋒鋩問十九未諭其一猶靣牆幾微言性命萌兆審興亡兹尤覺浩浩吾詎免倀倀因思幸尚壯曷不自激昻前謀信已拙來效庶云臧漸有田數畝春秋可耕桑休問就醫藥疾病可消穰性本反澄徹情田去榛荒長編倚修架大軸解深囊收功畏奔景窺皇起幽房虛窗逹深瞑明膏續飛光搜窮九雖憊磨礪志須償譬如勤種藝無憂匱囷倉又如導涓涓寧難致湯湯昔廢漸開闢新輸日收藏經營但亹亹積纍自穰穰既多又須擇儲精棄其粳一正以孔孟其揮乃韓莊賓朋顧空館議論據方床試為出其有始如宫應啇紛絃遇叩擊律吕乃交相須臾極萬變開闔爭隂陽南山對塵按相摩露青蒼百鳥聽徘徊忽如來鳯凰乃知千載後坐可見虞唐施行雖未果貯蓄豈非良何殊廄中馬縱齕草滿埸形骸苟充實氣力易騰驤此求苦未晚此志在堅剛雜詩五首三季巳千載古道久荒榛紛紛東漢士飛鳴不當辰經營救氛沴此志卒埃塵士生有進退何必棄其身其道雖𥚹迫其行絶緇磷公心不吾誑復求無此人貧仕任固小會計未可失方今備千品內外有卑秩孰當責在巳施設能自必拘文巳難聘避世固多屈細去且可略於大復何實死就正如斯與古豈同術雖非萬鍾當苟冒歸一律焉能示朋友學士空自咄韓公綴文辭筆力天乃授並驅六經中獨立千載後謂為學可及不覺驚縮手如天有日月厥耀無與偶當之萬象榮所照百怪走此其自然光萬物安得有其人雖巳殁其氣著星斗窮天破大惑更覺功業久其餘施諸小未負風義厚當身止自善所遇時則不致官九列齊此理嗟亦苟去就帷用捨士固無常守孔孟非其稱斗祿應未取惜哉天下才甘受外物誘相去幾年今與古睢陽幾人朱與紫嗟哉二子獨有名義烈乃能長不死當時美人歡未足一日蒼皇行萬里豈無公卿尊且寵急反與胡為眼耳丈夫感激世莫測二子引身高下起忠驅義激鬼神動漠漠胡沙來此止少年百事鋭其謂身力孱心笑古時士樹立勢苦難差池歲月邁自照失朱顔𥘉心不復道齟齬常未安紛紛憂與勞幾不傷肺肝人自省巳分靜默固其端詩書可自喜施設諒漫漫與舍弟别舟岸間相望感嘆成詠涕淚昨辭親酸心今别子舟陸空相望摻𬒮即千里戲呈休文屯田陳侯雋拔人所羡嵗晚江湖𥘉識靣巳聞清論至更僕更讀新詩欲焚硯天子無由熟姓名諸公固合思論薦烏鞾况已踏臺省黑綬未得辭州縣落落逢人愈難合欣欣顧我能忘倦跬步粗官别經嵗角巾廣坐今相見繞郭青山疊寒玉榮隄逺水鋪文練明紅靚白花千樹隔葉跳枝鶯百轉佳時苦雨巳蕭索落蕊隨風還面旋縱無供帳出郊野尚有清樽就間燕脫遺拘撿任真率放恣嘲諧較豪健東廊解榻不共語明日離亭空春眷送宣州杜都夜聞陵陽峯上雨曉見宛溪春水平畫船不待雙櫓狹歸客喜成千里行牧之文采宜未泯夫子風流今有聲篇什高吟鳯凰下翰墨醉灑煙雲生撥置簿書有餘力放意樽罍無俗情志義非徒勸風俗愷悌固可交神明餘休比户得􅉼泳嚚訟纍嵗皆澄清薦章交論付丞相士行如此宜名卿江湖一見十年舊談笑相逢肝膽傾鷦鷯一枝亦自得去矣黃鵠高飛鳴麻姑山送南城尉羅君麻如之路摩青天蒼笞白石松風寒峭壁直上無攀援懸磴十步九屈盤上有錦繡百頃之平田山中遺人耕紫煙又有白玉萬仭之飛泉噴崖直潟蛟龍淵豐堂廣殿何言言階腳插入斗牛間樛枝古木不記年空槎呺然卧道邉幽花自嬋姢林深為誰妍但見塵消境靜翔白鶴吟清猿雛禽乳鹿往往嗥荒顛却視來徑如緣絙千重萬疊窮巖巒下有荆吳粟粒之群山又有甌閩一髮之平川奕棊縱衡逺近布城郭魚鱗參差髙下分岡原千竒萬異可意得墨筆盡秃誰能傳丈夫舒卷要宏逹世路俯仰多拘牽藕耒到此醒心目便欲洗耳辭囂喧羅天子一日逺輔東南官愛此層崖峻􅊤之秀發開軒把酒可縱觀喜此披霄插漢之敻起出門舉足得往還羅夫子一尉龍蛇方屈蟠此邦人人衣食足闔境年年枹鼓間几桉剸裁得休暇山水登躡遺紛煩我行送之思故園引領南望心長懸東軒小飲呈坐中二年委質繫官次一日偷眼看青山念隨薄祿困垂首似見故人羞滿顔及門幸得二三友把酒能共頃刻間海魚腥醎聊復進野果酸澀誰能刪談劇清風生塵柄氣酣落日解醉鐶瑰材仕志皆可喜白笑我拙何由攀髙情坐使鄙吝去病體頓覺神明還簡書皇皇奔走地管庫碌碌塵埃間功名難合若捕影日月遽易如循環不如飲酒不知厭欲罷更起相牽板明妃曲二首明妃未出漢宫時秀色傾人人不知何况一身辭漢地驅令萬里嫁胡兒喧喧雜虜方滿眼皎皎丹心欲語誰延夀爾能私好惡令人不自保妍蚩丹青有迹尚如此何况無形論是非窮通豈不各有命南北由耒非爾為黃雲塞路鄉國逺鴻雁在天音信稀幾成新曲無人聽彈向東風空淚垂若道人情無感慨何故衛女苦思歸蛾眉絶世不可尋能使花羞在上林自信無由汙白玉向人不肯用黃金一辭椒屋風塵逺去託氊廬沙磧深漢姬尚自有妬色胡女豈能無忌心直欲論情通漢地獨能將恨寄胡琴但取當時能託意不論何代有知音長安美人誇富貴未央深殿競光隂豈知泯泯沈煙霧獨有明妃傳至今喜二第侍親將至京師書多言六弟為縣之美嗟豫懷抱徒蠢蠢二第胸中何落落政如魯衛各馳騪文似機雲飽磨琢坐曹風義動江淮為縣聲名到京洛鴻鴈峩峩並羽儀常棣韡韡聮跗鄂我于兩處抱飢渴恨寄一官如束縛周南留滯勿復論平陸可來無厭數慈親况不倦行役官長幸復寬期約似聞笑語巳髣佛想見追隨先踴躍共眠布𬒳取溫暖同舉菜羹甘淡薄山花得折隨好醜村酒可醉無清濁屈伸有命更勿疑細故偶然皆可略春風為子送帆檣速放船頭來此泊七月一日休假作𥘉秋尚若暑歸沐乃君恩地間少耒客日晏猶閉門家乏念藜藿開顔無一樽况復辭貌拙敢隨車馬奔盥濯何所事讀書坐前軒豈堪當世用空味古人言頗喜市朝內獨無塵土喧終年但如此真竊太官餐秋夜秋露隨莭至霄零在幽篁灝氣入我牗蕭然衾簞涼念往不能寐枕書嗟漏長平生肺腑友一訣餘空床况有鵲巢德顧方共糟粳偕老遂不可輔賢真渺茫家事成濩落嬌兒亦倣徨晤言豈可接虛貌在中堂清淚昏我眼沉憂回我腸誠知百無益恩義故難忘七月十四日韓持國直廬同觀山海經髙閣在清禁長軒憑廣虛御幄閟啚象依然臨幸餘翠甓布天路黃簾分直廬一雨清景早稍涼秋興𥘉解帶就君坐臨床窺素書山海所錯出飛潛類紛如此語果虛實遺編空卷舒自笑正豕亥更微注蟲魚君材合逺用就此固巳踈如我乃斯幸地間容誤居竹影散良席花香浮廣𥚑俯仰自足適歸時更當徐李氏素風堂丞相事唐室獨馳三絶名家世在圖史詩書傳後生郎位逮流澤出令儕輩驚歲暮營燕坐髙居遺世情翠竹帶書幌青山臨酒觥巳使襟韻適况聞吟誦聲自可化鄉里豈唯門戶榮果有過庭子頴然材思精抱璞巳三獻驚人當一鳴風義故常在兹堂非偶成秋聲喬柯與長谷秀色故未凂秋風耒吹之聲如振江海怒號無晨夕唱和若有待翏翏遍拗窪豈獨緣􅐑嵬百川亦相投取閙不知悔竹籬更謞然吕律焉足采蜩螿豈知微切切如怨憝惟人亦吟哦沸若烹䁀鼐八荒同一鳴靜裏安得在獨有虛空翁恬然故無改戲書家貧故不用籌算官今又能無外憂交逰斷絶正當爾眠飯安穩餘何求君不見黃金滿嬴要心計大印如斗為身儲妻孥意氣賔客附往往主人先白頭李莭推亭子盱江敦東門江水湛虛碧東南望群峯連延倚天璧長林相蔽虧蒼翠浮日夕青冥窗戶寒居者非咫尺子𥘉得從誰有此煙霧宅燕坐逺世喧及門無塵客築亭更求深綏帶聊自適時花笑婀娜山鳥吟格家釀熟新樽歡言命良席故巳輕華簮寧論珍拱璧我亦有災田相望在阡陌安得巾柴車過從佇三益秋夜露坐偶作白雲飛尚低清露泫猶早風來亦依微濁暑焉得掃客堂虛四楹灑水悢枯稿喜茲宵漏𥘉露坐散襟抱河明帶飛觀月白通馳道顧眄塵慮銷瓶泉謝頻倒恨無同聲人詩義與探討踟躇拂方床歸卧夢亦好韓玉汝使歸顧命逮殊鄰輶軒遵北道公府戒行期禁庭須重寶積雪正東流度河盛前導士勇踐胡塵馬驕嘶塞草玉莭所鎮臨氊廬先汛掃赫爾示威靈坦然布懷抱國倚材實優虜得聲名早慷慨服天驕從容問遺老光華反原隰沆碭看西皓迎勞動都門旌旗風亦好苦熱憶𥘉中伏時怫欎炎氣升赫日已照灼赤雲助軒騰積水殆將沸清風豈能興草木恐焚燎窗扉似炊蒸冰窗氣巳奪蚊蠅勢相矜發狂憂不免暑飲詎復勝過介甫日暮驅馬去停鑣叩君門頗諳肺肝盡不聞可否言淡爾非外樂恬然忘世喧况值秋節應清風蕩歊煩徘徊至星漢更復坐前軒過介甫歸偶成結交謂無嫌忠告期有輔直道詎非難盡言竟多知者尚復然悠悠誰可語合醬作孺人捨我亡稚子未堪役家居拙經營生理見侵迫海鹽從私求厨麵自官得揀豆連數晨汲泉候將夕調撓遵古書煎熬需日力庶以具藜羹故將供膾食豈有寄徑憂提瓶無所適但慙著書非覆瓿固其職送章婺州方擁使君節駕言自東還又聞白氶相懷紱出九關遂縱大船去欲追詎能攀巳喜所寄徑幽尋足溪山仍誇越西部逈在雲林間屋瓦遍高下青蒼更回環穿路竹裊裊鳴沙水潺潺會有樽酒適每需庭訟間况席鼓琴舊政行故非艱嵗暮當趨召馳歸復玉班瞿祕校新授官還南豐抑色映馳道水聲通御溝雖喜芳物盛未同故人遊叩門忽去我躍馬振輕裘佩印自兹始過家當少留中園何時到薇蕨亦已柔山翠入幽屐渚香浮逈舟阡陌有還往壺觴時獻酬應笑天祿閣寂寥誰見求元豐類藁卷之四
